<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Belly Bump Bash – K2 Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f172a;overflow:hidden;touch-action:none;font-family:'Segoe UI',sans-serif;}
canvas{display:block;}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(15,23,42,.94);backdrop-filter:blur(14px);}
.screen h1{font-size:clamp(2rem,6vw,4rem);font-weight:900;background:linear-gradient(135deg,#f59e0b,#ef4444,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem;}
.screen p{color:#94a3b8;margin:.5rem 0 1.6rem;font-size:1rem;text-align:center;max-width:360px;line-height:1.5;}
.btn{padding:.9rem 2.4rem;border-radius:50px;border:none;cursor:pointer;font-size:1rem;font-weight:800;letter-spacing:1px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;transition:.25s;box-shadow:0 0 24px rgba(245,158,11,.4);}
.btn:hover{transform:scale(1.07);filter:brightness(1.15);}
.btn-ghost{margin-top:.7rem;background:transparent;border:1px solid rgba(255,255,255,.2);color:#94a3b8;box-shadow:none;font-weight:600;}
.score-big{font-size:clamp(2.5rem,8vw,5rem);font-weight:900;color:#f59e0b;text-shadow:0 0 40px rgba(245,158,11,.5);margin:.3rem 0;}
#hud{position:fixed;top:0;left:0;width:100%;display:flex;justify-content:space-between;padding:.8rem 1.2rem;z-index:10;pointer-events:none;}
.hstat{background:rgba(0,0,0,.5);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:.35rem .85rem;color:#fff;font-size:.8rem;font-weight:700;}
.hstat span{color:#f59e0b;}
#ctrl-hint{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.3);font-size:.72rem;z-index:10;pointer-events:none;transition:opacity .5s;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hstat">ROUND <span id="rnd">1</span></div>
  <div class="hstat">WINS <span id="wins">0</span></div>
  <div class="hstat">LEFT <span id="enem">0</span></div>
</div>
<div id="ctrl-hint">WASD · SPACE TO DASH · TOUCH LEFT/RIGHT SIDE</div>

<div class="screen" id="ss">
  <h1>🥋 BELLY BUMP BASH</h1>
  <p>Charge, shove, and outmaneuver rivals. Last sumo standing wins the round! First to 3 wins takes glory.</p>
  <button class="btn" id="sb">FIGHT!</button>
  <button class="btn btn-ghost" onclick="location='index.html'">← Back to Vault</button>
</div>
<div class="screen" id="ws" style="display:none">
  <h1>CHAMPION! 🏆</h1>
  <div class="score-big" id="wsc">3</div>
  <p id="wmsg">Undefeated grand champion!</p>
  <button class="btn" id="wb">PLAY AGAIN</button>
  <button class="btn btn-ghost" onclick="location='index.html'">← Back to Vault</button>
</div>
<div class="screen" id="ls" style="display:none">
  <h1>RING OUT! 😤</h1>
  <div class="score-big" id="lsc">0</div>
  <p>Wins this run. Give it another shot!</p>
  <button class="btn" id="lb">RETRY</button>
  <button class="btn btn-ghost" onclick="location='index.html'">← Back to Vault</button>
</div>

<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H,CX,CY,RR;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight;CX=W/2;CY=H/2;RR=Math.min(W,H)*.36;}
addEventListener('resize',resize);resize();

let GS='idle',round,wins,fc,player,enemies,sparks,roundPhase,roundTimer;
const WINS_NEEDED=3,FRICTION=.88,DASH_F=9,DASH_CD=95,DASH_DUR=12;
const PR=30,ER=26;

// Input
const keys={};
addEventListener('keydown',e=>{keys[e.code]=true;['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)&&e.preventDefault();});
addEventListener('keyup',e=>{keys[e.code]=false;});
let tL=false,tR=false,tU=false,tD=false,tDash=false;
C.addEventListener('pointerdown',e=>{
  tDash=true;
  if(e.clientX<W/3)tL=true;else if(e.clientX>W*2/3)tR=true;
  else if(e.clientY<H/2)tU=true;else tD=true;
});
C.addEventListener('pointerup',()=>{tL=tR=tU=tD=tDash=false;});
C.addEventListener('pointermove',e=>{
  if(e.buttons>0){
    tL=e.clientX<W/3;tR=e.clientX>W*2/3;
    tU=e.clientY<H/2;tD=e.clientY>H/2;
  }else{tL=tR=tU=tD=false;}
});
function inp(){
  return{L:keys.ArrowLeft||keys.KeyA||tL,R:keys.ArrowRight||keys.KeyD||tR,
    U:keys.ArrowUp||keys.KeyW||tU,D:keys.ArrowDown||keys.KeyS||tD,
    dash:keys.Space||tDash};
}

function mkPlayer(){return{x:CX,y:CY+RR*.5,vx:0,vy:0,r:PR,alive:true,dashCD:0,dashT:0,isDashing:false,mass:1.4,ang:Math.PI*1.5};}
function mkEnemy(i,n){
  const a=(i/n)*Math.PI*2+Math.PI*.12;
  const cols=['#374151','#1e293b','#4b5563'];
  return{x:CX+Math.cos(a)*RR*.56,y:CY+Math.sin(a)*RR*.56,vx:0,vy:0,r:ER,alive:true,mass:1.0,ang:a+Math.PI,aiT:0,adx:0,ady:0,col:cols[i%3]};
}

function mkSparks(x,y,n,col){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*4.5;sparks.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,dc:.032+Math.random()*.04,r:2+Math.random()*3,col});}
}

function startRound(){
  roundPhase='intro';roundTimer=fc+60;
  player=mkPlayer();
  enemies=[];
  const ec=Math.min(round,3);
  for(let i=0;i<ec;i++)enemies.push(mkEnemy(i,ec));
  sparks=[];
}

function aiUpdate(e){
  if(!e.alive)return;
  e.aiT++;
  if(e.aiT%28===0){
    const dx=player.x-e.x+(Math.random()-.5)*RR*.55;
    const dy=player.y-e.y+(Math.random()-.5)*RR*.55;
    const d=Math.sqrt(dx*dx+dy*dy)||1;
    const spd=1.5+round*.18+Math.random()*.4;
    e.adx=dx/d*spd;e.ady=dy/d*spd;
    if(Math.random()<.05+round*.015){e.vx+=e.adx*4.5;e.vy+=e.ady*4.5;}
  }
  // Ring avoidance
  const dx=e.x-CX,dy=e.y-CY,d=Math.sqrt(dx*dx+dy*dy);
  if(d>RR*.70){e.adx-=dx/d*.7;e.ady-=dy/d*.7;}
  e.vx+=e.adx*.11;e.vy+=e.ady*.11;
  e.ang=Math.atan2(e.vy,e.vx);
}

function physics(){
  const all=[player,...enemies.filter(e=>e.alive)];
  // Player movement
  if(player.alive){
    const i=inp(),spd=3.4;
    if(i.L){player.vx-=spd*.26;player.ang=Math.PI;}
    if(i.R){player.vx+=spd*.26;player.ang=0;}
    if(i.U){player.vy-=spd*.26;player.ang=Math.PI*1.5;}
    if(i.D){player.vy+=spd*.26;player.ang=Math.PI*.5;}
    if(i.L&&i.U)player.ang=Math.PI*1.25;if(i.R&&i.U)player.ang=Math.PI*1.75;
    if(i.L&&i.D)player.ang=Math.PI*.75; if(i.R&&i.D)player.ang=Math.PI*.25;
    if(i.dash&&player.dashCD<=0){
      player.isDashing=true;player.dashT=DASH_DUR;player.dashCD=DASH_CD;
      player.vx+=Math.cos(player.ang)*DASH_F;player.vy+=Math.sin(player.ang)*DASH_F;
      mkSparks(player.x,player.y,12,'#f59e0b');
    }
    if(player.dashT>0)player.dashT--;else player.isDashing=false;
    if(player.dashCD>0)player.dashCD--;
  }
  // Move
  for(const c of all){if(!c.alive)continue;c.vx*=FRICTION;c.vy*=FRICTION;c.x+=c.vx;c.y+=c.vy;}
  // Collisions
  for(let i=0;i<all.length;i++){
    for(let j=i+1;j<all.length;j++){
      const a=all[i],b=all[j];if(!a.alive||!b.alive)continue;
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||.001;
      const md=a.r+b.r;
      if(d<md){
        const ov=md-d,nx=dx/d,ny=dy/d;
        const f=ov*.42,am=b.mass/(a.mass+b.mass),bm=a.mass/(a.mass+b.mass);
        a.vx-=nx*f*am*2.2;a.vy-=ny*f*am*2.2;b.vx+=nx*f*bm*2.2;b.vy+=ny*f*bm*2.2;
        a.x-=nx*ov*am*.5;a.y-=ny*ov*am*.5;b.x+=nx*ov*bm*.5;b.y+=ny*ov*bm*.5;
        if(ov>2)mkSparks((a.x+b.x)/2,(a.y+b.y)/2,6,'#fbbf24');
      }
    }
  }
  // Ring check
  for(const c of all){
    if(!c.alive)continue;
    const dx=c.x-CX,dy=c.y-CY,d=Math.sqrt(dx*dx+dy*dy);
    if(d>RR+c.r*.1){c.alive=false;mkSparks(c.x,c.y,20,'#ef4444');}
    else if(d>RR-c.r*.4){
      const nx=dx/d,ny=dy/d,dot=c.vx*nx+c.vy*ny;
      if(dot>0){c.vx-=dot*nx*1.4;c.vy-=dot*ny*1.4;}
      c.x=CX+nx*(RR-c.r*.45);c.y=CY+ny*(RR-c.r*.45);
    }
  }
}

function drawArena(){
  X.fillStyle='#0f172a';X.fillRect(0,0,W,H);
  // Outer glow
  const og=X.createRadialGradient(CX,CY,RR*.7,CX,CY,RR*1.5);
  og.addColorStop(0,'rgba(180,138,74,.15)');og.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=og;X.fillRect(0,0,W,H);
  // Shadow
  X.fillStyle='rgba(0,0,0,.5)';X.beginPath();X.arc(CX+12,CY+12,RR,0,Math.PI*2);X.fill();
  // Surface
  const rg=X.createRadialGradient(CX-RR*.25,CY-RR*.25,0,CX,CY,RR);
  rg.addColorStop(0,'#c9a870');rg.addColorStop(.55,'#b08a4a');rg.addColorStop(1,'#8a6a35');
  X.fillStyle=rg;X.beginPath();X.arc(CX,CY,RR,0,Math.PI*2);X.fill();
  // Grain rings
  X.save();X.beginPath();X.arc(CX,CY,RR,0,Math.PI*2);X.clip();
  X.strokeStyle='rgba(0,0,0,.07)';X.lineWidth=1;
  for(let r=25;r<RR;r+=24){X.beginPath();X.arc(CX,CY,r,0,Math.PI*2);X.stroke();}
  X.restore();
  // Tawara rope
  X.strokeStyle='#78350f';X.lineWidth=13;X.beginPath();X.arc(CX,CY,RR-5,0,Math.PI*2);X.stroke();
  X.strokeStyle='#a16207';X.lineWidth=4.5;X.setLineDash([14,10]);
  X.beginPath();X.arc(CX,CY,RR-5,0,Math.PI*2);X.stroke();X.setLineDash([]);
  // Start marks
  X.strokeStyle='rgba(0,0,0,.38)';X.lineWidth=3;
  X.beginPath();X.moveTo(CX-8,CY-RR*.28);X.lineTo(CX-8,CY+RR*.28);X.stroke();
  X.beginPath();X.moveTo(CX+8,CY-RR*.28);X.lineTo(CX+8,CY+RR*.28);X.stroke();
}

function drawChar(c,isP){
  if(!c.alive)return;
  const r=c.r;
  const spd=Math.sqrt(c.vx*c.vx+c.vy*c.vy);

  // Speed trail
  if(spd>1.8){
    X.save();X.translate(c.x,c.y);
    const mx=-c.vx*.7,my=-c.vy*.7;
    const tg=X.createLinearGradient(0,0,mx*2,my*2);
    tg.addColorStop(0,isP?'rgba(239,68,68,.3)':'rgba(100,116,139,.3)');
    tg.addColorStop(1,'rgba(0,0,0,0)');
    X.fillStyle=tg;X.beginPath();X.ellipse(mx,my,r*.9,r*.55,Math.atan2(my,mx),0,Math.PI*2);X.fill();
    X.restore();
  }

  X.save();
  X.translate(c.x,c.y);
  // Orient to face movement direction
  X.rotate(c.ang+Math.PI*.5);

  const skin=isP?'#e8b48a':'#c8956a';
  const hair='#1a0d06';
  const belt=isP?'#fbbf24':'#6b7280';
  const bodyHi=isP?'#fca5a5':'#d1d5db';
  const bodyMid=isP?'#ef4444':c.col;
  const bodyDark=isP?'#7f1d1d':'#111827';

  // Ground shadow
  X.fillStyle='rgba(0,0,0,.38)';
  X.beginPath();X.ellipse(4,6,r*1.08,r*.62,0,0,Math.PI*2);X.fill();

  // ── Legs ──
  X.fillStyle=skin;
  X.beginPath();X.ellipse(-r*.3,r*.52,r*.27,r*.34,.2,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse( r*.3,r*.52,r*.27,r*.34,-.2,0,Math.PI*2);X.fill();
  // Knee shading
  X.fillStyle='rgba(0,0,0,.13)';
  X.beginPath();X.ellipse(-r*.3,r*.58,r*.2,r*.18,0,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse( r*.3,r*.58,r*.2,r*.18,0,0,Math.PI*2);X.fill();

  // ── Body / Torso ──
  const bg=X.createRadialGradient(-r*.18,-r*.12,r*.04,0,0,r*.92);
  bg.addColorStop(0,bodyHi);bg.addColorStop(.5,bodyMid);bg.addColorStop(1,bodyDark);
  X.fillStyle=bg;
  X.beginPath();X.ellipse(0,r*.08,r*.84,r*.72,0,0,Math.PI*2);X.fill();
  // Belly bump highlight
  X.fillStyle='rgba(255,255,255,.11)';
  X.beginPath();X.ellipse(-r*.16,-r*.08,r*.38,r*.28,-.5,0,Math.PI*2);X.fill();

  // ── Mawashi belt ──
  X.fillStyle=belt;
  X.beginPath();
  X.moveTo(-r*.76,r*.1);
  X.bezierCurveTo(-r*.7,r*.55,r*.7,r*.55,r*.76,r*.1);
  X.bezierCurveTo(r*.62,-r*.1,0,-r*.22,-0,-r*.22);
  X.bezierCurveTo(0,-r*.22,-r*.62,-r*.1,-r*.76,r*.1);
  X.closePath();X.fill();
  // Belt border
  X.strokeStyle=isP?'#d97706':'#4b5563';X.lineWidth=1.5;
  X.beginPath();
  X.moveTo(-r*.76,r*.1);X.bezierCurveTo(-r*.7,r*.55,r*.7,r*.55,r*.76,r*.1);
  X.stroke();
  // Front knot (obi)
  X.fillStyle=isP?'#f59e0b':'#9ca3af';
  X.beginPath();X.ellipse(0,r*.28,r*.15,r*.11,0,0,Math.PI*2);X.fill();
  X.fillStyle=isP?'#fde68a':'#cbd5e1';
  X.beginPath();X.ellipse(-r*.08,r*.24,r*.07,r*.05,-.3,0,Math.PI*2);X.fill();

  // ── Arms ──
  X.fillStyle=skin;
  // Left arm
  X.beginPath();X.ellipse(-r*.96,r*.04,r*.32,r*.21,.5,0,Math.PI*2);X.fill();
  // Right arm
  X.beginPath();X.ellipse( r*.96,r*.04,r*.32,r*.21,-.5,0,Math.PI*2);X.fill();
  // Fists
  X.beginPath();X.arc(-r*.94,r*.07,r*.16,0,Math.PI*2);X.fill();
  X.beginPath();X.arc( r*.94,r*.07,r*.16,0,Math.PI*2);X.fill();
  // Knuckle lines
  X.strokeStyle='rgba(0,0,0,.25)';X.lineWidth=1.5;
  X.beginPath();X.moveTo(-r*.88,r*.02);X.lineTo(-r*.88,r*.13);X.stroke();
  X.beginPath();X.moveTo( r*.88,r*.02);X.lineTo( r*.88,r*.13);X.stroke();

  // ── Neck ──
  X.fillStyle=skin;
  X.beginPath();X.ellipse(0,-r*.36,r*.2,r*.16,0,0,Math.PI*2);X.fill();

  // ── Head ──
  // Head base
  X.fillStyle=skin;
  X.beginPath();X.arc(0,-r*.67,r*.34,0,Math.PI*2);X.fill();
  // Head shading (side)
  X.fillStyle='rgba(0,0,0,.1)';
  X.beginPath();X.ellipse(r*.08,-r*.64,r*.32,r*.32,0,0,Math.PI*2);X.fill();
  // Ears
  X.fillStyle=skin;
  X.beginPath();X.ellipse(-r*.31,-r*.67,r*.11,r*.09,.3,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse( r*.31,-r*.67,r*.11,r*.09,-.3,0,Math.PI*2);X.fill();
  X.strokeStyle='rgba(0,0,0,.18)';X.lineWidth=1;
  X.beginPath();X.ellipse(-r*.31,-r*.67,r*.07,r*.06,.3,0,Math.PI*2);X.stroke();
  X.beginPath();X.ellipse( r*.31,-r*.67,r*.07,r*.06,-.3,0,Math.PI*2);X.stroke();

  // ── Hair (top half black) ──
  X.fillStyle=hair;
  X.beginPath();
  X.arc(0,-r*.67,r*.34,Math.PI,0);
  X.closePath();X.fill();

  // ── Topknot ──
  X.fillStyle=hair;
  X.beginPath();X.ellipse(0,-r*.99,r*.11,r*.15,0,0,Math.PI*2);X.fill();
  // Topknot tie cord
  X.fillStyle='#c9a030';
  X.beginPath();X.ellipse(0,-r*.9,r*.09,r*.045,0,0,Math.PI*2);X.fill();

  // ── Eyes (white + pupil) ──
  X.fillStyle='rgba(255,255,255,.92)';
  X.beginPath();X.ellipse(-r*.11,-r*.7,r*.09,r*.07,0,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse( r*.11,-r*.7,r*.09,r*.07,0,0,Math.PI*2);X.fill();
  X.fillStyle='#111';
  X.beginPath();X.arc(-r*.11,-r*.7,r*.045,0,Math.PI*2);X.fill();
  X.beginPath();X.arc( r*.11,-r*.7,r*.045,0,Math.PI*2);X.fill();
  // Eye gleam
  X.fillStyle='rgba(255,255,255,.7)';
  X.beginPath();X.arc(-r*.13,-r*.72,r*.018,0,Math.PI*2);X.fill();
  X.beginPath();X.arc( r*.09,-r*.72,r*.018,0,Math.PI*2);X.fill();

  // ── Angry eyebrows ──
  X.strokeStyle=hair;X.lineWidth=r*.07;X.lineCap='round';
  X.beginPath();X.moveTo(-r*.2,-r*.8);X.lineTo(-r*.03,-r*.76);X.stroke();
  X.beginPath();X.moveTo( r*.2,-r*.8);X.lineTo( r*.03,-r*.76);X.stroke();

  // ── Mouth (grimace) ──
  X.fillStyle='#8b1c1c';
  X.beginPath();X.arc(0,-r*.59,r*.11,0,Math.PI);X.fill();
  X.fillStyle='rgba(255,255,255,.85)';
  X.fillRect(-r*.1,-r*.6,r*.2,r*.055);

  // ── Nose ──
  X.fillStyle='rgba(0,0,0,.2)';
  X.beginPath();X.ellipse(0,-r*.64,r*.04,r*.03,0,0,Math.PI*2);X.fill();

  // ── Dash aura (player) ──
  if(isP&&c.isDashing){
    X.strokeStyle='rgba(251,191,36,.75)';X.lineWidth=5;
    X.beginPath();X.arc(0,0,r+7,0,Math.PI*2);X.stroke();
    X.strokeStyle='rgba(251,191,36,.22)';X.lineWidth=11;
    X.beginPath();X.arc(0,0,r+13,0,Math.PI*2);X.stroke();
  }
  X.restore();
}

function drawSparks(){
  for(const p of sparks){
    X.globalAlpha=p.life;X.fillStyle=p.col;
    X.beginPath();X.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;
}

function drawOverlay(){
  if(roundPhase==='intro'){
    X.fillStyle='rgba(0,0,0,.6)';X.fillRect(0,0,W,H);
    X.textAlign='center';X.textBaseline='middle';
    X.fillStyle='#f59e0b';X.font=`bold ${Math.min(W,H)*.11}px 'Segoe UI'`;
    X.fillText(`ROUND ${round}`,CX,CY-15);
    X.fillStyle='rgba(255,255,255,.7)';X.font=`${Math.min(W,H)*.045}px 'Segoe UI'`;
    X.fillText('FIGHT!',CX,CY+40);
  } else if(roundPhase==='result'){
    X.fillStyle='rgba(0,0,0,.58)';X.fillRect(0,0,W,H);
    X.textAlign='center';X.textBaseline='middle';
    const msg=player.alive?'ROUND WIN! 🏆':'RING OUT! 💥';
    X.fillStyle=player.alive?'#f59e0b':'#ef4444';
    X.font=`bold ${Math.min(W,H)*.09}px 'Segoe UI'`;
    X.fillText(msg,CX,CY-12);
    X.fillStyle='rgba(255,255,255,.65)';X.font=`${Math.min(W,H)*.04}px 'Segoe UI'`;
    X.fillText(`Wins: ${wins}/${WINS_NEEDED}`,CX,CY+38);
  }
}

function hud(){
  document.getElementById('rnd').textContent=round;
  document.getElementById('wins').textContent=wins;
  document.getElementById('enem').textContent=enemies.filter(e=>e.alive).length;
}

function update(){
  fc++;
  for(let i=sparks.length-1;i>=0;i--){
    const p=sparks[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.16;p.life-=p.dc;
    if(p.life<=0)sparks.splice(i,1);
  }
  if(roundPhase==='intro'){
    if(fc>roundTimer)roundPhase='fight';
    return;
  }
  if(roundPhase==='fight'){
    enemies.forEach(e=>aiUpdate(e));
    physics();hud();
    const ea=enemies.filter(e=>e.alive).length;
    if(!player.alive||ea===0){
      roundPhase='result';roundTimer=fc;
      if(player.alive)wins++;hud();
    }
  } else if(roundPhase==='result'){
    if(fc-roundTimer>140){
      round++;
      if(wins>=WINS_NEEDED){showWin();}
      else if(!player.alive&&round>WINS_NEEDED+2){showLoss();}
      else{startRound();}
    }
  }
}

function draw(){drawArena();enemies.forEach(e=>drawChar(e,false));drawChar(player,true);drawSparks();drawOverlay();}

let rid;
function loop(){if(GS!=='playing')return;update();draw();rid=requestAnimationFrame(loop);}

function showWin(){
  GS='won';cancelAnimationFrame(rid);
  document.getElementById('wsc').textContent=wins;
  document.getElementById('wmsg').textContent=wins>=WINS_NEEDED?'Grand champion! Undefeated! 👑':'You won the series!';
  document.getElementById('ws').style.display='flex';
}
function showLoss(){
  GS='lost';cancelAnimationFrame(rid);
  document.getElementById('lsc').textContent=wins;
  document.getElementById('ls').style.display='flex';
}
function startGame(){
  GS='playing';round=1;wins=0;fc=0;
  ['ss','ws','ls'].forEach(id=>document.getElementById(id).style.display='none');
  startRound();loop();
  setTimeout(()=>document.getElementById('ctrl-hint').style.opacity='0',4500);
}
document.getElementById('sb').onclick=startGame;
document.getElementById('wb').onclick=startGame;
document.getElementById('lb').onclick=startGame;
drawArena();
</script>
