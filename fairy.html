<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fairy Charm: Master Edition - K2 games</title>
    <style>
        :root {
            --p-bg: #fdf2f8;
            --p-primary: #ec4899;
            --p-accent: #fbcfe8;
            --glass: rgba(255, 255, 255, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: #0c0a09;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 90vmin;
            height: 67.5vmin; /* 800:600 ratio */
            max-width: 800px;
            max-height: 600px;
            background: #000;
            border-radius: 20px;
            border: 6px solid #f0f9ff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; }

        #hud {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            pointer-events: none;
            z-index: 100;
        }

        .stat-card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            font-weight: 900;
            color: #fbcfe8;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(12, 10, 9, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
            padding: 20px;
        }

        h1 { font-size: 3.5rem; font-weight: 900; color: var(--p-primary); font-style: italic; margin-bottom: 10px; text-shadow: 0 0 30px rgba(236, 72, 153, 0.4); }
        .subtitle { font-size: 1.1rem; color: var(--p-accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; }

        .btn {
            background: var(--p-primary);
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 10px 25px rgba(236, 72, 153, 0.3);
        }
        .btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        #mobile-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            padding: 0 30px;
            display: none;
            justify-content: space-between;
            z-index: 200;
            pointer-events: none;
        }

        @media (max-width: 900px) { #mobile-controls { display: flex; } }

        .dpad { display: grid; grid-template-columns: repeat(3, 60px); gap: 10px; pointer-events: auto; }
        .circle-btn { width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); color: white; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .circle-btn:active { background: var(--p-primary); }

        .back-link {
            position: fixed; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 12px; z-index: 1100;
            font-weight: bold; font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← HUB</a>

    <div id="game-container">
        <div id="hud">
            <div class="stat-card">✨ <span id="found-count">0/3</span></div>
            <div class="stat-card">SCORE: <span id="score-val">0000</span></div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="mobile-controls">
            <div class="dpad">
                <div></div><div class="circle-btn" id="btn-up">↑</div><div></div>
                <div class="circle-btn" id="btn-left">←</div><div></div><div class="circle-btn" id="btn-right">→</div>
                <div></div><div class="circle-btn" id="btn-down">↓</div><div></div>
            </div>
        </div>

        <div id="start-screen" class="overlay">
            <h1>FAIRY CHARM</h1>
            <div class="subtitle">MASTER EDITION</div>
            <p style="opacity: 0.7; max-width: 400px; margin-bottom: 30px;">Lost in the mystical woods. Find the three lost sisters and return home.</p>
            <button class="btn" onclick="game.start()">Begin Journey</button>
        </div>

        <div id="win-screen" class="overlay" style="display: none;">
            <h1 style="color: #4ade80;">QUEST COMPLETE</h1>
            <div class="subtitle">THE FOREST IS AT PEACE</div>
            <p id="final-stats" style="margin-bottom: 30px; font-size: 1.2rem;"></p>
            <button class="btn" onclick="location.reload()">Return Home</button>
        </div>
    </div>

    <script>
        class FairyGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.width = 800;
                this.height = 600;
                this.canvas.width = this.width;
                this.canvas.height = this.height;

                this.playing = false;
                this.player = { x: 400, y: 300, r: 15, speed: 5 };
                this.keys = {};
                this.fairiesFound = 0;
                this.points = [];
                this.particles = [];
                
                this.init();
            }

            init() {
                this.setupInput();
                this.loop();
            }

            setupInput() {
                window.onkeydown = e => this.keys[e.code] = true;
                window.onkeyup = e => this.keys[e.code] = false;

                const btns = { 'btn-up': 'KeyW', 'btn-down': 'KeyS', 'btn-left': 'KeyA', 'btn-right': 'KeyD' };
                Object.entries(btns).forEach(([id, key]) => {
                    const el = document.getElementById(id);
                    el.ontouchstart = (e) => { e.preventDefault(); this.keys[key] = true; };
                    el.ontouchend = () => this.keys[key] = false;
                });
            }

            start() {
                document.getElementById('start-screen').style.display = 'none';
                this.playing = true;
                this.spawnFairies();
            }

            spawnFairies() {
                this.points = [
                    { x: 100, y: 100, found: false },
                    { x: 700, y: 100, found: false },
                    { x: 400, y: 500, found: false }
                ];
            }

            update() {
                if(!this.playing) return;

                // Gamepad Polling
                const pads = navigator.getGamepads();
                if (pads[0]) {
                    const p = pads[0];
                    if (this.playing) {
                        this.keys['KeyA'] = p.axes[0] < -0.3 || p.buttons[14].pressed;
                        this.keys['KeyD'] = p.axes[0] > 0.3 || p.buttons[15].pressed;
                        this.keys['KeyW'] = p.axes[1] < -0.3 || p.buttons[12].pressed;
                        this.keys['KeyS'] = p.axes[1] > 0.3 || p.buttons[13].pressed;
                    } else if (p.buttons[0].pressed || p.buttons[9].pressed) {
                        this.start();
                    }
                }

                if(this.keys['KeyW'] || this.keys['ArrowUp']) this.player.y -= this.player.speed;
                if(this.keys['KeyS'] || this.keys['ArrowDown']) this.player.y += this.player.speed;
                if(this.keys['KeyA'] || this.keys['ArrowLeft']) this.player.x -= this.player.speed;
                if(this.keys['KeyD'] || this.keys['ArrowRight']) this.player.x += this.player.speed;

                this.player.x = Math.max(this.player.r, Math.min(this.width - this.player.r, this.player.x));
                this.player.y = Math.max(this.player.r, Math.min(this.height - this.player.r, this.player.y));

                this.points.forEach(p => {
                    if(!p.found && Math.hypot(this.player.x - p.x, this.player.y - p.y) < 40) {
                        p.found = true;
                        this.fairiesFound++;
                        document.getElementById('found-count').textContent = `${this.fairiesFound}/3`;
                        if(this.fairiesFound === 3) this.win();
                    }
                });

                if(Math.random() < 0.3) this.spawnParticle(this.player.x, this.player.y);
                this.particles.forEach((p, i) => {
                    p.y += 1; p.life -= 0.02;
                    if(p.life <= 0) this.particles.splice(i, 1);
                });
            }

            spawnParticle(x, y) {
                this.particles.push({ x: x + (Math.random()-0.5)*20, y: y + (Math.random()-0.5)*20, life: 1, color: '#fbcfe8' });
            }

            win() {
                this.playing = false;
                document.getElementById('win-screen').style.display = 'flex';
                document.getElementById('final-stats').textContent = `FAIRIES FOUND: 3/3`;
            }

            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.width, this.height);

                // Background
                ctx.fillStyle = '#0c0a09';
                ctx.fillRect(0, 0, this.width, this.height);

                // Forest dots
                ctx.fillStyle = '#1c1917';
                for(let i=0; i<100; i++) {
                    ctx.beginPath(); ctx.arc((i*137)%this.width, (i*251)%this.height, 2, 0, Math.PI*2); ctx.fill();
                }

                // Fairies
                this.points.forEach(p => {
                    if(p.found) return;
                    ctx.fillStyle = '#ec4899';
                    ctx.shadowBlur = 20; ctx.shadowColor = '#ec4899';
                    ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, Math.PI*2); ctx.fill();
                    ctx.shadowBlur = 0;
                });

                // Particles
                this.particles.forEach(p => {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
                });
                ctx.globalAlpha = 1;

                // Player
                ctx.fillStyle = '#f0f9ff';
                ctx.shadowBlur = 30; ctx.shadowColor = '#f0f9ff';
                ctx.beginPath(); ctx.arc(this.player.x, this.player.y, 15, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            }

            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        }

        const game = new FairyGame();
    </script>
</body>
</html>
