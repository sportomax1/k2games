<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K2 Tower: Elite Tycoon - K2 games</title>
    <style>
        :root {
            --bg: #0f172a;
            --primary: #3b82f6;
            --accent: #fbbf24;
            --residential: #4ade80;
            --food: #fb7185;
            --service: #818cf8;
            --creative: #a78bfa;
            --retail: #38bdf8;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        nav {
            height: 60px; padding: 0 1rem;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; border-bottom: 1px solid var(--border);
        }

        .logo { font-weight: 900; font-size: 1.2rem; color: var(--accent); letter-spacing: -0.5px; }
        .back-link { color: #94a3b8; text-decoration: none; font-size: 0.8rem; font-weight: bold; }

        #game-layout { flex: 1; display: flex; position: relative; overflow: hidden; }

        /* Sidebar */
        #sidebar {
            width: 80px; background: rgba(0,0,0,0.2); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 20px; z-index: 50;
        }

        .elevator-btn {
            width: 50px; height: 50px; background: var(--accent); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: none;
        }

        /* Tower View */
        #tower-viewport {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column-reverse;
            align-items: center; padding: 40px 0 150px 0;
            background: linear-gradient(to top, #1e293b, #020617);
            scroll-behavior: smooth;
        }

        .floor {
            width: 90vmin; max-width: 320px; height: 100px;
            background: var(--glass); border: 2px solid var(--border);
            margin-bottom: -2px; position: relative; display: flex;
            align-items: center; padding: 0 15px; transition: background 0.3s; flex-shrink: 0;
        }

        .floor.residential { border-left: 10px solid var(--residential); }
        .floor.food { border-left: 10px solid var(--food); }
        .floor.service { border-left: 10px solid var(--service); }
        .floor.creative { border-left: 10px solid var(--creative); }
        .floor.retail { border-left: 10px solid var(--retail); }
        .floor.construction { border-left: 10px solid #64748b; background: rgba(0,0,0,0.4); }

        .floor-label { position: absolute; top: 5px; right: 10px; font-size: 0.6rem; opacity: 0.4; font-weight: 900; }
        .floor-name { font-weight: 800; font-size: 0.85rem; text-transform: uppercase; color: #fff; }
        .floor-icon { font-size: 1.8rem; margin-right: 15px; }

        .restock-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.7);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; cursor: pointer;
        }
        .timer-bar { width: 60%; height: 6px; background: #333; border-radius: 3px; overflow: hidden; margin-top: 5px; }
        .timer-fill { height: 100%; width: 0%; background: var(--accent); transition: width 1s linear; }

        .bitizen-container { position: absolute; bottom: 5px; left: 60px; right: 10px; height: 40px; display: flex; gap: 10px; }
        .bitizen { font-size: 1.5rem; animation: walk 3s infinite ease-in-out alternate; }
        @keyframes walk { from { transform: translateX(0); } to { transform: translateX(20px); } }

        /* Elevator */
        #elevator {
            position: absolute; left: 80px; width: 45px; height: 100px;
            background: rgba(251, 191, 36, 0.15); border: 2px solid var(--accent);
            z-index: 40; transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem; backdrop-filter: blur(5px);
        }

        /* Stats HUD */
        #stats {
            position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7);
            padding: 12px 24px; border-radius: 50px; display: flex; gap: 25px;
            font-weight: 900; border: 1px solid var(--border); z-index: 100;
        }

        /* Build Menu */
        #build-menu {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); padding: 8px;
            border-radius: 24px; border: 1px solid var(--border); display: flex; gap: 8px;
            z-index: 100; width: 95%; max-width: 500px; justify-content: center;
        }

        .build-opt {
            padding: 10px 5px; border-radius: 16px; cursor: pointer; text-align: center;
            font-size: 0.6rem; font-weight: 800; flex: 1;
        }
        .build-opt b { display: block; font-size: 1.1rem; }

        .notification {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #000; padding: 10px 30px; border-radius: 50px;
            font-weight: 900; z-index: 1000; animation: slideDown 0.5s forwards;
        }
        @keyframes slideDown { from { transform: translate(-50%, -100%); } to { transform: translate(-50%, 0); } }
    </style>
</head>
<body>
    <nav>
        <div class="logo">K2 TOWER ELITE</div>
        <a href="index.html" class="back-link">← HUB</a>
    </nav>

    <div id="game-layout">
        <div id="sidebar">
            <button class="elevator-btn" onclick="game.moveElevator(1)">🔼</button>
            <div id="elev-level" style="font-weight: 900; color: var(--accent); font-size: 1.2rem;">1</div>
            <button class="elevator-btn" onclick="game.moveElevator(-1)">🔽</button>
        </div>

        <div id="stats">
            <div>🪙 <span id="coins">1500</span></div>
            <div>🏠 <span id="pop-count">0</span></div>
            <div>🏢 <span id="floors-count">1</span></div>
        </div>

        <div id="tower-viewport">
            <div id="elevator" style="bottom: 40px;">👨‍✈️</div>
        </div>

        <div id="build-menu">
            <div class="build-opt" onclick="game.buildFloor('residential')" style="color:var(--residential)"><b>🏠</b> RESI<br>$500</div>
            <div class="build-opt" onclick="game.buildFloor('food')" style="color:var(--food)"><b>🍔</b> FOOD<br>$1000</div>
            <div class="build-opt" onclick="game.buildFloor('service')" style="color:var(--service)"><b>🛠️</b> SERV<br>$1500</div>
            <div class="build-opt" onclick="game.buildFloor('retail')" style="color:var(--retail)"><b>🛍️</b> SHOP<br>$2000</div>
        </div>
    </div>

    <script>
        const FLOOR_DEFS = {
            lobby: { name: 'Grand Lobby', icons: ['🏢'], cost: 0 },
            residential: { name: 'Apartments', icons: ['🛌'], cost: 500 },
            food: { name: 'Sky Cafe', icons: ['🍕'], cost: 1000, income: 25 },
            service: { name: 'Auto Repair', icons: ['🛠️'], cost: 1500, income: 45 },
            retail: { name: 'Boutique', icons: ['🛍️'], cost: 2000, income: 75 }
        };

        const BITIZENS = ['👨‍💼', '👩‍💼', '👨‍🎨', '👩‍🎨', '👨‍🔬', '👩‍🔬', '👨‍🍳', '👩‍🍳'];

        class TinyTowerElite {
            constructor() {
                this.coins = 1500;
                this.floors = [{ type: 'lobby', level: 1, occupants: [], stock: 100, timer: 0 }];
                this.elevatorLevel = 1;
                this.population = 0;
                this.init();
            }

            init() {
                this.renderTower();
                this.updateUI();
                
                setInterval(() => this.tick(), 1000);
                setInterval(() => this.spawnVisitor(), 12000);
            }

            tick() {
                this.floors.forEach(f => {
                    const def = FLOOR_DEFS[f.type];
                    if(f.type === 'construction') {
                        f.timer--;
                        if(f.timer <= 0) {
                            f.type = f.targetType;
                            f.stock = 100;
                            this.notify(`Floor ${f.level} Construction Complete!`);
                            this.renderTower();
                        }
                    } else if(def.income && f.stock > 0) {
                        f.stock -= 2.0; // Faster stock drain
                        const dreamJobBonus = f.occupants.some(b => b.dream === f.type) ? 3 : 1;
                        this.addCoins(def.income * dreamJobBonus / 2); // Much higher income
                        if(f.stock <= 0) {
                            f.stock = 0;
                            this.renderTower();
                        }
                    } else if(f.type !== 'residential' && f.type !== 'lobby' && f.stock <= 0 && f.timer > 0) {
                        f.timer--;
                        if(f.timer <= 0) {
                            f.stock = 100;
                            this.notify(`${def.name} Restocked!`);
                            this.renderTower();
                        }
                    }
                });
                this.updateUI();
                this.updateTimers();
            }

            addCoins(amt) { this.coins += amt; this.updateUI(); }

            updateUI() {
                document.getElementById('coins').textContent = Math.floor(this.coins);
                document.getElementById('floors-count').textContent = this.floors.length;
                document.getElementById('pop-count').textContent = this.population;
                document.getElementById('elev-level').textContent = this.elevatorLevel;
            }

            updateTimers() {
                this.floors.forEach((f, i) => {
                    const el = document.getElementById(`timer-fill-${i}`);
                    if(el) {
                        const total = f.type === 'construction' ? 5 : 3;
                        const pct = ((total - f.timer) / total) * 100;
                        el.style.width = pct + '%';
                    }
                });
            }

            renderTower() {
                const viewport = document.getElementById('tower-viewport');
                viewport.innerHTML = '<div id="elevator">👨‍✈️</div>';
                this.floors.forEach((f, i) => {
                    const def = f.type === 'construction' ? { name: 'Under Construction', icons: ['🏗️'] } : FLOOR_DEFS[f.type];
                    const div = document.createElement('div');
                    div.className = `floor ${f.type}`;
                    
                    let content = `
                        <span class="floor-label">FL ${f.level}</span>
                        <span class="floor-icon">${def.icons[0]}</span>
                        <div style="display:flex; flex-direction:column">
                            <span class="floor-name">${def.name}</span>
                            <div class="bitizen-container">${f.occupants ? f.occupants.map(b => `<span class="bitizen">${b.emoji}</span>`).join('') : ''}</div>
                        </div>
                    `;

                    if(f.stock <= 0 && f.type !== 'residential' && f.type !== 'lobby' && f.type !== 'construction') {
                        content += `
                            <div class="restock-overlay" onclick="game.restock(${i})">
                                <b style="font-size:0.7rem">${f.timer > 0 ? 'RESTOCKING...' : 'OUT OF STOCK!'}</b>
                                ${f.timer > 0 ? `<div class="timer-bar"><div class="timer-fill" id="timer-fill-${i}"></div></div>` : '<small>TAP TO ORDER</small>'}
                            </div>
                        `;
                    } else if(f.type === 'construction') {
                        content += `
                            <div class="restock-overlay">
                                <b style="font-size:0.7rem">BUILDING...</b>
                                <div class="timer-bar"><div class="timer-fill" id="timer-fill-${i}"></div></div>
                            </div>
                        `;
                    }

                    div.innerHTML = content;
                    viewport.appendChild(div);
                });
                this.moveElevator(0);
            }

            restock(idx) {
                const f = this.floors[idx];
                if(f.timer <= 0) {
                    f.timer = 3;
                    this.renderTower();
                }
            }

            buildFloor(type) {
                const cost = FLOOR_DEFS[type].cost;
                if(this.coins >= cost) {
                    this.coins -= cost;
                    this.floors.push({ 
                        type: 'construction', 
                        targetType: type, 
                        level: this.floors.length + 1, 
                        occupants: [], 
                        timer: 5 
                    });
                    this.renderTower();
                }
            }

            moveElevator(dir) {
                this.elevatorLevel = Math.max(1, Math.min(this.floors.length, this.elevatorLevel + dir));
                const el = document.getElementById('elevator');
                el.style.bottom = (40 + (this.elevatorLevel-1) * 100) + 'px';
                document.getElementById('elev-level').textContent = this.elevatorLevel;
            }

            spawnVisitor() {
                const isVIP = Math.random() < 0.15;
                const emoji = isVIP ? '🎩' : BITIZENS[Math.floor(Math.random() * BITIZENS.length)];
                this.notify(isVIP ? "VIP IN LOBBY!" : "New Bitizen arriving!");
                
                const resi = this.floors.filter(f => f.type === 'residential' && f.occupants.length < 5);
                if(resi.length > 0) {
                    const f = resi[0];
                    f.occupants.push({ emoji, dream: Object.keys(FLOOR_DEFS)[Math.floor(Math.random()*4)+1] });
                    this.population++;
                    this.renderTower();
                }
            }

            notify(msg) {
                const div = document.createElement('div');
                div.className = 'notification';
                div.textContent = msg;
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 3000);
            }
        }
        const game = new TinyTowerElite();
    </script>
</body>
</html>
