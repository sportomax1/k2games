<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="description" content="A responsive multi-theme Pong game from K2 Games.">
<meta name="theme-color" content="#07577a" id="themeMeta">
<title>Pong - K2 Games</title>
<style>
:root{color-scheme:dark;--bg1:#07577a;--bg2:#021a31;--panel:rgba(3,43,70,.86);--ink:#effcff;--muted:#a6dce8;--line:rgba(160,235,245,.28);--a:#71f5dd;--b:#ffca72;--stage:#032a43;--button:#012a37}*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}body{min-height:100vh;display:grid;place-items:center;padding:18px;color:var(--ink);background:radial-gradient(circle at 15% 10%,color-mix(in srgb,var(--a) 22%,transparent),transparent 28%),linear-gradient(180deg,var(--bg1),var(--bg2));overflow-x:hidden;transition:.3s}button,select{font:inherit;color:var(--ink);background:var(--panel);border:1px solid var(--line);border-radius:13px;min-height:42px;padding:0 14px;cursor:pointer}button:hover,select:hover{border-color:var(--a)}button:focus-visible,select:focus-visible{outline:3px solid var(--a);outline-offset:2px}.hub{position:fixed;top:12px;left:12px;z-index:20;text-decoration:none;color:var(--ink);font-weight:800;font-size:.82rem;padding:9px 13px;border:1px solid var(--line);border-radius:999px;background:var(--panel);backdrop-filter:blur(12px)}.app{width:min(1100px,100%)}header,.score,.controls,.themes{display:flex;align-items:center;justify-content:space-between;gap:12px}header{margin:4px 0 13px}h1{margin:0;font-size:clamp(2rem,5vw,3rem);letter-spacing:-.05em}header p{margin:5px 0 0;color:var(--muted)}.sound{width:48px;padding:0;font-size:1.15rem}.themes{justify-content:flex-start;overflow:auto;padding:9px;margin-bottom:11px;border:1px solid var(--line);border-radius:17px;background:var(--panel);backdrop-filter:blur(12px)}.theme{flex:0 0 auto;border-radius:999px;font-weight:800}.theme[aria-pressed=true]{color:var(--button);background:var(--a);border-color:transparent}.score{padding:10px 15px;margin-bottom:11px;border:1px solid var(--line);border-radius:17px;background:var(--panel);backdrop-filter:blur(12px)}.scoreBox{display:flex;align-items:baseline;gap:10px}.label{font-size:.76rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}.score strong{font-size:1.9rem}.status{font-weight:900;color:var(--b);text-align:center}.stage{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:26px;background:var(--stage);box-shadow:0 24px 70px rgba(0,0,0,.38)}canvas{display:block;width:100%;height:auto;aspect-ratio:16/9;touch-action:none}.overlay{position:absolute;inset:0;display:grid;place-items:center;padding:22px;background:rgba(0,0,0,.42);backdrop-filter:blur(7px);opacity:0;pointer-events:none;transition:.2s}.overlay.show{opacity:1;pointer-events:auto}.card{width:min(430px,100%);text-align:center;padding:28px;border:1px solid var(--line);border-radius:23px;background:var(--panel)}.card h2{font-size:clamp(1.8rem,5vw,2.7rem);margin:5px 0}.card p{color:var(--muted);line-height:1.5}.primary{font-weight:900;color:var(--button);background:linear-gradient(135deg,var(--a),var(--b));border:0;padding:0 24px}.controls{flex-wrap:wrap;margin-top:11px;padding:12px 14px;border:1px solid var(--line);border-radius:17px;background:var(--panel);backdrop-filter:blur(12px)}.controls label{display:flex;align-items:center;gap:8px;font-weight:800}.controls p{margin:0;color:var(--muted);font-size:.86rem}.mobile{position:absolute;left:12px;bottom:12px;display:none;flex-direction:column;gap:7px}.mobile button{width:54px;height:46px;font-weight:900;background:var(--panel)}@media(max-width:720px),(pointer:coarse){body{padding:9px}.hub{position:absolute}header{padding-top:38px}header p,.controls p{display:none}.mobile{display:flex}.score{padding:8px 10px}.score strong{font-size:1.45rem}.status{font-size:.76rem}.controls{justify-content:center}.theme{font-size:.83rem;padding:0 11px}}@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-CCZ9JJGEDP');</script>
</head>
<body>
<a class="hub" href="index.html">← K2 HUB</a>
<main class="app">
<header><div><h1 id="title">Pong</h1><p id="subtitle">Underwater arena</p></div><button id="sound" class="sound" aria-label="Toggle sound" aria-pressed="true">🔊</button></header>
<nav class="themes" aria-label="Game themes"><button class="theme" data-theme="underwater" aria-pressed="true">🌊 Underwater</button><button class="theme" data-theme="space">🚀 Space</button><button class="theme" data-theme="forest">🌲 Forest</button><button class="theme" data-theme="volcano">🌋 Volcano</button><button class="theme" data-theme="ice">❄️ Ice</button><button class="theme" data-theme="neon">⚡ Neon</button></nav>
<section class="score"><div class="scoreBox"><span class="label" id="pLabel">Diver</span><strong id="pScore">0</strong></div><div class="status" id="status" aria-live="polite">First to 7 wins</div><div class="scoreBox"><span class="label" id="cLabel">Kraken</span><strong id="cScore">0</strong></div></section>
<section class="stage"><canvas id="game" width="960" height="540" aria-label="Pong game area"></canvas><div class="overlay show" id="overlay"><div class="card"><h2 id="overlayTitle">Ready?</h2><p id="overlayText">Move with W/S, arrow keys, mouse, touch, or gamepad.</p><button class="primary" id="start">Start Match</button></div></div><div class="mobile"><button id="up">▲</button><button id="down">▼</button></div></section>
<section class="controls"><label>Difficulty <select id="difficulty"><option value=".76">Relaxed</option><option value=".9" selected>Normal</option><option value="1.04">Expert</option></select></label><p><b>Move:</b> W/S, ↑/↓, mouse, touch, or gamepad · <b>Pause:</b> Space</p><div><button id="pause">Pause</button> <button id="reset">Reset</button></div></section>
</main>
<script>
const themes={underwater:{sub:'Underwater arena',p:'Diver',c:'Kraken',bg:['#07577a','#021a31','rgba(3,43,70,.86)','#effcff','#a6dce8','rgba(160,235,245,.28)','#71f5dd','#ffca72','#032a43','#012a37'],colors:['#0a7296','#06324f','#011627','#72f5dd','#ffca72','#eaffff'],kind:'bubbles'},space:{sub:'Outer-space arena',p:'Pilot',c:'Invader',bg:['#151b4d','#050617','rgba(14,17,54,.86)','#f2f1ff','#b8b9ef','rgba(164,166,255,.3)','#8fa8ff','#ff8de1','#090b2f','#07081a'],colors:['#151b4d','#090b2f','#03040f','#91a7ff','#ff8de1','#fff'],kind:'stars'},forest:{sub:'Forest arena',p:'Ranger',c:'Stag',bg:['#25613d','#071b12','rgba(9,44,27,.86)','#efffe9','#afd9b5','rgba(167,231,174,.28)','#94e67c','#ffd66f','#0b331f','#082414'],colors:['#25613d','#113522','#06150e','#9ae681','#ffd66f','#f7ffe9'],kind:'leaves'},volcano:{sub:'Volcano arena',p:'Forge',c:'Titan',bg:['#7b1e12','#160403','rgba(55,12,7,.88)','#fff4e7','#e8b09a','rgba(255,167,109,.28)','#ff6b2c','#ffd166','#280805','#1f0503'],colors:['#7c1e10','#350805','#120202','#ff6b2c','#ffd166','#fff3cb'],kind:'embers'},ice:{sub:'Frozen arena',p:'Skater',c:'Guardian',bg:['#3c7da4','#071c35','rgba(12,49,75,.87)','#f2fdff','#b8dfeb','rgba(190,239,255,.3)','#a9f1ff','#d8c5ff','#0b3652','#08253a'],colors:['#3f83ac','#16445f','#061726','#aef4ff','#d8c5ff','#fff'],kind:'snow'},neon:{sub:'Neon arena',p:'Pulse',c:'Glitch',bg:['#351052','#07030f','rgba(28,7,42,.88)','#fff4ff','#d7b3e4','rgba(239,139,255,.3)','#00ffd5','#ff4fd8','#10051a','#0b0310'],colors:['#351052','#170522','#050108','#00ffd5','#ff4fd8','#fff'],kind:'grid'}};
const $=id=>document.getElementById(id),canvas=$('game'),ctx=canvas.getContext('2d');let theme='underwater',playing=false,paused=false,sound=true,last=0,score={p:0,c:0},keys={},particles=[];const p={x:34,y:210,w:18,h:120},c={x:908,y:210,w:18,h:120},ball={x:480,y:270,r:11,vx:410,vy:170};
function applyTheme(name){theme=name;const t=themes[name],r=document.documentElement;['--bg1','--bg2','--panel','--ink','--muted','--line','--a','--b','--stage','--button'].forEach((v,i)=>r.style.setProperty(v,t.bg[i]));$('subtitle').textContent=t.sub;$('pLabel').textContent=t.p;$('cLabel').textContent=t.c;$('themeMeta').content=t.bg[0];document.querySelectorAll('.theme').forEach(b=>b.setAttribute('aria-pressed',b.dataset.theme===name));try{localStorage.setItem('pong-theme',name)}catch{};makeParticles()}
function makeParticles(){particles=Array.from({length:70},()=>({x:Math.random()*960,y:Math.random()*540,s:1+Math.random()*3,v:.15+Math.random()*.5}))}
function resetBall(dir=Math.random()<.5?-1:1){ball.x=480;ball.y=270;ball.vx=dir*(360+Math.random()*70);ball.vy=(Math.random()-.5)*330}
function beep(freq=350){if(!sound)return;const A=window.AudioContext||window.webkitAudioContext;if(!A)return;const a=beep.a||(beep.a=new A),o=a.createOscillator(),g=a.createGain();o.frequency.value=freq;g.gain.setValueAtTime(.05,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.08);o.connect(g).connect(a.destination);o.start();o.stop(a.currentTime+.08)}
function background(t){const col=t.colors,g=ctx.createLinearGradient(0,0,0,540);g.addColorStop(0,col[0]);g.addColorStop(.55,col[1]);g.addColorStop(1,col[2]);ctx.fillStyle=g;ctx.fillRect(0,0,960,540);ctx.save();if(t.kind==='grid'){ctx.strokeStyle='rgba(0,255,213,.12)';for(let x=0;x<960;x+=48){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,540);ctx.stroke()}for(let y=0;y<540;y+=48){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(960,y);ctx.stroke()}}else{particles.forEach(q=>{q.y-=q.v;if(q.y<-5)q.y=545;ctx.globalAlpha=.2+.35*Math.sin((q.x+q.y)/45);ctx.fillStyle=col[5];ctx.beginPath();ctx.arc(q.x,q.y,q.s,0,7);ctx.fill()})}ctx.restore()}
function draw(){const t=themes[theme];background(t);ctx.setLineDash([12,14]);ctx.strokeStyle='rgba(255,255,255,.28)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(480,20);ctx.lineTo(480,520);ctx.stroke();ctx.setLineDash([]);ctx.shadowBlur=22;ctx.fillStyle=t.colors[3];ctx.shadowColor=t.colors[3];ctx.fillRect(p.x,p.y,p.w,p.h);ctx.fillStyle=t.colors[4];ctx.shadowColor=t.colors[4];ctx.fillRect(c.x,c.y,c.w,c.h);ctx.fillStyle=t.colors[5];ctx.shadowColor=t.colors[5];ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,7);ctx.fill();ctx.shadowBlur=0}
function hit(r){return ball.x+ball.r>r.x&&ball.x-ball.r<r.x+r.w&&ball.y+ball.r>r.y&&ball.y-ball.r<r.y+r.h}
function update(dt){if(!playing||paused)return;let move=0;if(keys.ArrowUp||keys.w)move-=1;if(keys.ArrowDown||keys.s)move+=1;const pads=navigator.getGamepads?.();if(pads&&pads[0]&&Math.abs(pads[0].axes[1])>.15)move=pads[0].axes[1];p.y=Math.max(0,Math.min(420,p.y+move*470*dt));const aiSpeed=390*Number($('difficulty').value);c.y+=Math.sign(ball.y-(c.y+c.h/2))*Math.min(Math.abs(ball.y-(c.y+c.h/2)),aiSpeed*dt);c.y=Math.max(0,Math.min(420,c.y));ball.x+=ball.vx*dt;ball.y+=ball.vy*dt;if(ball.y-ball.r<0||ball.y+ball.r>540){ball.vy*=-1;ball.y=Math.max(ball.r,Math.min(540-ball.r,ball.y));beep(250)}if(ball.vx<0&&hit(p)){ball.x=p.x+p.w+ball.r;ball.vx=Math.min(800,Math.abs(ball.vx)*1.055);ball.vy+=(ball.y-(p.y+p.h/2))*5;beep(520)}if(ball.vx>0&&hit(c)){ball.x=c.x-ball.r;ball.vx=-Math.min(800,Math.abs(ball.vx)*1.055);ball.vy+=(ball.y-(c.y+c.h/2))*5;beep(430)}if(ball.x<-30){score.c++;point('CPU scores');resetBall(1)}if(ball.x>990){score.p++;point('You score');resetBall(-1)}}
function point(msg){$('pScore').textContent=score.p;$('cScore').textContent=score.c;$('status').textContent=msg;beep(700);if(score.p>=7||score.c>=7){playing=false;$('overlayTitle').textContent=score.p>score.c?'You win!':'CPU wins';$('overlayText').textContent='Final score '+score.p+'–'+score.c;$('start').textContent='Play Again';$('overlay').classList.add('show')}}
function start(){score={p:0,c:0};$('pScore').textContent=0;$('cScore').textContent=0;$('status').textContent='First to 7 wins';$('overlay').classList.remove('show');playing=true;paused=false;$('pause').textContent='Pause';resetBall()}
function frame(ts){const dt=Math.min(.025,(ts-last)/1000||0);last=ts;update(dt);draw();requestAnimationFrame(frame)}
function setY(clientY){const r=canvas.getBoundingClientRect();p.y=Math.max(0,Math.min(420,(clientY-r.top)*540/r.height-p.h/2))}
window.addEventListener('keydown',e=>{keys[e.key]=true;if(e.code==='Space'){e.preventDefault();togglePause()}});window.addEventListener('keyup',e=>keys[e.key]=false);canvas.addEventListener('pointermove',e=>setY(e.clientY));canvas.addEventListener('touchmove',e=>{e.preventDefault();setY(e.touches[0].clientY)},{passive:false});function togglePause(){if(!playing)return;paused=!paused;$('pause').textContent=paused?'Resume':'Pause';$('status').textContent=paused?'Paused':'First to 7 wins'}
document.querySelectorAll('.theme').forEach(b=>b.addEventListener('click',()=>applyTheme(b.dataset.theme)));$('start').addEventListener('click',start);$('pause').addEventListener('click',togglePause);$('reset').addEventListener('click',start);$('sound').addEventListener('click',()=>{sound=!sound;$('sound').textContent=sound?'🔊':'🔇';$('sound').setAttribute('aria-pressed',sound)});for(const [id,k] of [['up','ArrowUp'],['down','ArrowDown']]){const b=$(id);b.addEventListener('pointerdown',()=>keys[k]=true);b.addEventListener('pointerup',()=>keys[k]=false);b.addEventListener('pointerleave',()=>keys[k]=false)}
try{applyTheme(localStorage.getItem('pong-theme')||'underwater')}catch{applyTheme('underwater')}requestAnimationFrame(frame)
</script>
</body>
</html>
