<style>
:root{color-scheme:dark;--bg1:#07577a;--bg2:#021a31;--panel:rgba(3,43,70,.86);--ink:#effcff;--muted:#a6dce8;--line:rgba(160,235,245,.28);--a:#71f5dd;--b:#ffca72;--stage:#032a43;--button:#012a37}*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}body{min-height:100vh;display:grid;place-items:center;padding:20px;color:var(--ink);background:radial-gradient(circle at 15% 10%,color-mix(in srgb,var(--a) 22%,transparent),transparent 28%),linear-gradient(180deg,var(--bg1),var(--bg2));overflow-x:hidden;transition:.3s}button,select{font:inherit;color:var(--ink);background:var(--panel);border:1px solid var(--line);border-radius:13px;min-height:42px;padding:0 14px;cursor:pointer}button:hover,select:hover{border-color:var(--a)}button:focus-visible,select:focus-visible{outline:3px solid var(--a);outline-offset:2px}.hub{position:fixed;top:12px;left:12px;z-index:20;text-decoration:none;color:var(--ink);font-weight:800;font-size:.82rem;padding:9px 13px;border:1px solid var(--line);border-radius:999px;background:var(--panel);backdrop-filter:blur(12px)}.app{width:min(1100px,100%)}header,.score,.controls,.themes{display:flex;align-items:center;justify-content:space-between;gap:12px}header{margin:4px 0 13px}h1{margin:0;font-size:clamp(1.9rem,5vw,3rem);letter-spacing:-.05em}header p{margin:5px 0 0;color:var(--muted)}.sound{width:48px;padding:0;font-size:1.15rem}.themes{justify-content:flex-start;overflow:auto;padding:9px;margin-bottom:11px;border:1px solid var(--line);border-radius:17px;background:var(--panel);backdrop-filter:blur(12px)}.theme{flex:0 0 auto;border-radius:999px;font-weight:800}.theme[aria-pressed=true]{color:var(--button);background:var(--a);border-color:transparent}.score{padding:10px 15px;margin-bottom:11px;border:1px solid var(--line);border-radius:17px;background:var(--panel);backdrop-filter:blur(12px)}.scoreBox{display:flex;align-items:baseline;gap:10px}.label{font-size:.76rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}.score strong{font-size:1.9rem}.status{font-weight:900;color:var(--b);text-align:center}.stage{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:26px;background:var(--stage);box-shadow:0 24px 70px rgba(0,0,0,.38)}canvas{display:block;width:100%;height:auto;aspect-ratio:16/9;touch-action:none}.overlay{position:absolute;inset:0;display:grid;place-items:center;padding:22px;background:rgba(0,0,0,.42);backdrop-filter:blur(7px);opacity:0;pointer-events:none;transition:.2s}.overlay.show{opacity:1;pointer-events:auto}.card{width:min(430px,100%);text-align:center;padding:28px;border:1px solid var(--line);border-radius:23px;background:var(--panel)}.card h2{font-size:clamp(1.8rem,5vw,2.7rem);margin:5px 0}.card p{color:var(--muted);line-height:1.5}.eyebrow{font-size:.74rem!important;color:var(--a)!important;text-transform:uppercase;letter-spacing:.14em;font-weight:900}.primary{font-weight:900;color:var(--button);background:linear-gradient(135deg,var(--a),var(--b));border:0;padding:0 24px}.controls{flex-wrap:wrap;margin-top:11px;padding:12px 14px;border:1px solid var(--line);border-radius:17px;background:var(--panel);backdrop-filter:blur(12px)}.controls label{display:flex;align-items:center;gap:8px;font-weight:800}.controls p{margin:0;color:var(--muted);font-size:.86rem}.mobile{position:absolute;left:12px;bottom:12px;display:none;flex-direction:column;gap:7px}.mobile button{width:54px;height:46px;font-weight:900;background:var(--panel)}@media(max-width:720px),(pointer:coarse){body{padding:9px}.hub{position:absolute}header{padding-top:38px}header p,.controls p{display:none}.mobile{display:flex}.score{padding:8px 10px}.score strong{font-size:1.45rem}.status{font-size:.76rem}.controls{justify-content:center}.theme{font-size:.83rem;padding:0 11px}}@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>

<body>
<a class="hub" href="index.html">← K2 HUB</a>
<main class="app">
<header><div><h1 id="title">Abyssal Pong</h1><p id="subtitle">Defend your reef and send the pearl past your rival.</p></div><button id="sound" class="sound" aria-label="Toggle sound" aria-pressed="true">🔊</button></header>
<nav class="themes" aria-label="Game themes"><button class="theme" data-theme="underwater" aria-pressed="true">🌊 Underwater</button><button class="theme" data-theme="space" aria-pressed="false">🚀 Space</button><button class="theme" data-theme="forest" aria-pressed="false">🌲 Forest</button><button class="theme" data-theme="volcano" aria-pressed="false">🌋 Volcano</button><button class="theme" data-theme="ice" aria-pressed="false">❄️ Ice</button><button class="theme" data-theme="neon" aria-pressed="false">⚡ Neon</button></nav>
<section class="score"><div class="scoreBox"><span class="label" id="pLabel">Diver</span><strong id="pScore">0</strong></div><div class="status" id="status" aria-live="polite">First to 7 wins</div><div class="scoreBox"><span class="label" id="cLabel">Kraken</span><strong id="cScore">0</strong></div></section>
<section class="stage"><canvas id="game" width="960" height="540" aria-label="Pong game area"></canvas><div class="overlay show" id="overlay"><div class="card"><p class="eyebrow" id="eyebrow">Deep-sea challenge</p><h2 id="overlayTitle">Ready to dive?</h2><p id="overlayText">Move with W/S, arrow keys, mouse, or touch. First to 7 wins.</p><button class="primary" id="start">Start Match</button></div></div><div class="mobile"><button id="up" aria-label="Move up">▲</button><button id="down" aria-label="Move down">▼</button></div></section>
<section class="controls"><label>Difficulty <select id="difficulty"><option value=".76">Relaxed</option><option value=".9" selected>Normal</option><option value="1.04">Expert</option></select></label><p><b>Move:</b> W/S, ↑/↓, mouse, or touch · <b>Pause:</b> Space</p><div><button id="pause">Pause</button> <button id="reset">Reset</button></div></section>
</main>
<script>
const themes={underwater:{title:'Abyssal Pong',sub:'Defend your reef and send the pearl past your rival.',p:'Diver',c:'Kraken',eye:'Deep-sea challenge',ready:'Ready to dive?',win:'The reef is yours!',lose:'The Kraken wins this tide.',scoreP:'Pearl secured!',scoreC:'The Kraken scores!',vars:['#07577a','#021a31','rgba(3,43,70,.86)','#effcff','#a6dce8','rgba(160,235,245,.28)','#71f5dd','#ffca72','#032a43','#012a37'],colors:['#0a7296','#06324f','#011627','#72f5dd','#ffca72','#ff8d78','#ffcb5c','#eaffff']},space:{title:'Orbit Pong',sub:'Hold your sector and launch the comet beyond the invader.',p:'Pilot',c:'Invader',eye:'Zero-gravity duel',ready:'Launch sequence ready?',win:'Sector secured!',lose:'The invader claims orbit.',scoreP:'Direct hit!',scoreC:'Hull breach!',vars:['#151b4d','#050617','rgba(14,17,54,.86)','#f2f1ff','#b8b9ef','rgba(164,166,255,.3)','#8fa8ff','#ff8de1','#090b2f','#07081a'],colors:['#151b4d','#090b2f','#03040f','#91a7ff','#ff8de1','#ff6b95','#a98fff','#fff']},forest:{title:'Wildwood Pong',sub:'Guard the grove and send the firefly through the ancient woods.',p:'Ranger',c:'Stag',eye:'Woodland rally',ready:'Enter the grove?',win:'The grove celebrates!',lose:'The ancient stag prevails.',scoreP:'Firefly guided!',scoreC:'The forest answers!',vars:['#25613d','#071b12','rgba(9,44,27,.86)','#efffe9','#afd9b5','rgba(167,231,174,.28)','#94e67c','#ffd66f','#0b331f','#082414'],colors:['#25613d','#113522','#06150e','#9ae681','#ffd66f','#ff9b6d','#cf8aff','#f7ffe9']},volcano:{title:'Magma Pong',sub:'Survive the caldera and smash the ember through the flames.',p:'Forge',c:'Titan',eye:'Volcanic showdown',ready:'Enter the caldera?',win:'You rule the volcano!',lose:'The fire titan prevails.',scoreP:'Magma strike!',scoreC:'Eruption point!',vars:['#7b1e12','#160403','rgba(55,12,7,.88)','#fff4e7','#e8b09a','rgba(255,167,109,.28)','#ff6b2c','#ffd166','#280805','#1f0503'],colors:['#7c1e10','#350805','#120202','#ff6b2c','#ffd166','#ff4057','#ff9d3d','#fff3cb']},ice:{title:'Frost Pong',sub:'Hold the glacier and send the crystal beyond the frost guardian.',p:'Skater',c:'Guardian',eye:'Frozen rally',ready:'Step onto the ice?',win:'The glacier is yours!',lose:'The frost guardian wins.',scoreP:'Crystal captured!',scoreC:'Ice break!',vars:['#3c7da4','#071c35','rgba(12,49,75,.87)','#f2fdff','#b8dfeb','rgba(190,239,255,.3)','#a9f1ff','#d8c5ff','#0b3652','#08253a'],colors:['#3f83ac','#16445f','#061726','#aef4ff','#d8c5ff','#70dfff','#9c8fff','#fff']},neon:{title:'Neon Pong',sub:'Own the grid and drive the pulse beyond the rival program.',p:'Pulse',c:'Glitch',eye:'Arcade showdown',ready:'Enter the grid?',win:'High score secured!',lose:'The glitch takes the grid.',scoreP:'Pulse point!',scoreC:'System breach!',vars:['#351052','#07030f','rgba(28,7,42,.88)','#fff4ff','#d7b3e4','rgba(239,139,255,.3)','#00ffd5','#ff4fd8','#10051a','#0b0310'],colors:['#351052','#170522','#050108','#00ffd5','#ff4fd8','#ff3b6b','#9a65ff','#fff']}};
const $=id=>document.getElementById(id),canvas=$('game'),ctx=canvas.getContext('2d'),root=document.documentElement,buttons=[...document.querySelectorAll('.theme')];let key=new Set(),active=localStorage.getItem('k2-pong-theme')||'underwater',running=false,paused=false,soundOn=true,last=0,audio;const G={p:{x:28,y:210,w:18,h:120,score:0},c:{x:914,y:210,w:18,h:120,score:0},b:{x:480,y:270,r:12,vx:420,vy:170,trail:[]},particles:[],stars:[]};
function T(){return themes[active]}function applyTheme(name,save=true){active=themes[name]?name:'underwater';const t=T(),v=['--bg1','--bg2','--panel','--ink','--muted','--line','--a','--b','--stage','--button'];v.forEach((x,i)=>root.style.setProperty(x,t.vars[i]));$('themeMeta').content=t.vars[1];$('title').textContent=t.title;$('subtitle').textContent=t.sub;$('pLabel').textContent=t.p;$('cLabel').textContent=t.c;$('eyebrow').textContent=t.eye;$('overlayTitle').textContent=t.ready;buttons.forEach(b=>b.setAttribute('aria-pressed',b.dataset.theme===active));if(save)localStorage.setItem('k2-pong-theme',active);makeStars();draw()}
function makeStars(){G.stars=Array.from({length:75},()=>({x:Math.random()*960,y:Math.random()*540,s:1+Math.random()*3,p:Math.random()*6}))}function reset(dir=Math.random()<.5?-1:1){G.b={x:480,y:270,r:12,vx:dir*(370+Math.random()*70),vy:(Math.random()-.5)*300,trail:[]}}function resetMatch(show=true){G.p.score=G.c.score=0;$('pScore').textContent=$('cScore').textContent='0';running=false;paused=false;$('pause').textContent='Pause';$('status').textContent='First to 7 wins';reset();if(show){$('overlay').classList.add('show');$('overlayTitle').textContent=T().ready;$('overlayText').textContent='Move with W/S, arrow keys, mouse, or touch. First to 7 wins.';$('start').textContent='Start Match'}draw()}
function start(){G.p.score=G.c.score=0;$('pScore').textContent=$('cScore').textContent='0';running=true;paused=false;$('overlay').classList.remove('show');$('status').textContent='First to 7 wins';reset();last=performance.now();requestAnimationFrame(loop)}function togglePause(){if(!running)return;paused=!paused;$('pause').textContent=paused?'Resume':'Pause';$('overlay').classList.toggle('show',paused);if(paused){$('overlayTitle').textContent='Paused';$('overlayText').textContent='Press Space or Resume to continue.';$('start').textContent='Resume'}else{last=performance.now();requestAnimationFrame(loop)}}
function tone(f,d=.08,type='sine'){if(!soundOn)return;try{audio||=new(AudioContext||webkitAudioContext)();const o=audio.createOscillator(),g=audio.createGain();o.type=type;o.frequency.value=f;g.gain.setValueAtTime(.07,audio.currentTime);g.gain.exponentialRampToValueAtTime(.001,audio.currentTime+d);o.connect(g).connect(audio.destination);o.start();o.stop(audio.currentTime+d)}catch{}}
function score(who){G[who].score++;$(who==='p'?'pScore':'cScore').textContent=G[who].score;$('status').textContent=who==='p'?T().scoreP:T().scoreC;tone(who==='p'?640:190,.16,who==='p'?'triangle':'sawtooth');if(G[who].score>=7){running=false;$('overlay').classList.add('show');$('overlayTitle').textContent=who==='p'?T().win:T().lose;$('overlayText').textContent=`Final score ${G.p.score}–${G.c.score}`;$('start').textContent='Play Again';return}reset(who==='p'?-1:1)}
function hit(p,isPlayer){const b=G.b;if(b.x+b.r>p.x&&b.x-b.r<p.x+p.w&&b.y+b.r>p.y&&b.y-b.r<p.y+p.h&&((isPlayer&&b.vx<0)||(!isPlayer&&b.vx>0))){b.x=isPlayer?p.x+p.w+b.r:p.x-b.r;b.vx*=-1.055;const n=(b.y-(p.y+p.h/2))/(p.h/2);b.vy=n*430;tone(isPlayer?420:330);burst(b.x,b.y)}}function burst(x,y){for(let i=0;i<10;i++)G.particles.push({x,y,vx:(Math.random()-.5)*220,vy:(Math.random()-.5)*220,l:.45})}
function update(dt){const speed=520;if(key.has('w')||key.has('arrowup'))G.p.y-=speed*dt;if(key.has('s')||key.has('arrowdown'))G.p.y+=speed*dt;G.p.y=Math.max(12,Math.min(408,G.p.y));const ai=Number($('difficulty').value),target=G.b.y-G.c.h/2;G.c.y+=Math.max(-380*ai*dt,Math.min(380*ai*dt,target-G.c.y));G.c.y=Math.max(12,Math.min(408,G.c.y));const b=G.b;b.trail.unshift({x:b.x,y:b.y});b.trail=b.trail.slice(0,10);b.x+=b.vx*dt;b.y+=b.vy*dt;if(b.y-b.r<0){b.y=b.r;b.vy=Math.abs(b.vy);tone(250)}if(b.y+b.r>540){b.y=540-b.r;b.vy=-Math.abs(b.vy);tone(250)}hit(G.p,true);hit(G.c,false);if(b.x<-30)score('c');if(b.x>990)score('p');G.particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.l-=dt});G.particles=G.particles.filter(p=>p.l>0)}
function bg(){const c=T().colors,g=ctx.createLinearGradient(0,0,0,540);g.addColorStop(0,c[0]);g.addColorStop(.55,c[1]);g.addColorStop(1,c[2]);ctx.fillStyle=g;ctx.fillRect(0,0,960,540);if(active==='space'||active==='forest'||active==='volcano'||active==='ice'||active==='neon'){G.stars.forEach(s=>{ctx.globalAlpha=.25+.55*Math.abs(Math.sin(performance.now()/800+s.p));ctx.fillStyle=active==='forest'?c[3]:active==='volcano'?c[4]:'#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.s,0,7);ctx.fill()});ctx.globalAlpha=1}if(active==='underwater'){ctx.globalAlpha=.12;ctx.fillStyle='#fff';for(let i=0;i<6;i++){ctx.beginPath();ctx.moveTo(i*185-70,0);ctx.lineTo(i*185+45,0);ctx.lineTo(i*185+180,540);ctx.lineTo(i*185+60,540);ctx.fill()}ctx.globalAlpha=1}if(active==='forest'){ctx.fillStyle='rgba(4,25,10,.55)';for(let x=0;x<960;x+=90){ctx.beginPath();ctx.moveTo(x,540);ctx.lineTo(x+45,340-(x%180));ctx.lineTo(x+90,540);ctx.fill()}}if(active==='volcano'){ctx.fillStyle='rgba(25,4,2,.62)';ctx.beginPath();ctx.moveTo(0,540);ctx.lineTo(180,300);ctx.lineTo(350,540);ctx.lineTo(650,540);ctx.lineTo(790,270);ctx.lineTo(960,540);ctx.fill()}if(active==='ice'){ctx.fillStyle='rgba(230,255,255,.16)';for(let x=0;x<960;x+=120){ctx.beginPath();ctx.moveTo(x,540);ctx.lineTo(x+60,420-(x%150));ctx.lineTo(x+120,540);ctx.fill()}}if(active==='neon'){ctx.strokeStyle='rgba(0,255,213,.14)';for(let y=300;y<540;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(960,y);ctx.stroke()}for(let x=-200;x<1160;x+=80){ctx.beginPath();ctx.moveTo(480,280);ctx.lineTo(x,540);ctx.stroke()}}}
function paddle(p,left){const c=T().colors,light=left?c[5]:c[6],dark=left?c[5]+'aa':c[6]+'aa',g=ctx.createLinearGradient(p.x,p.y,p.x+p.w,p.y);g.addColorStop(0,dark);g.addColorStop(1,light);ctx.shadowColor=light;ctx.shadowBlur=16;ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(p.x,p.y,p.w,p.h,10);ctx.fill();ctx.shadowBlur=0}function draw(){bg();ctx.save();ctx.setLineDash([12,16]);ctx.strokeStyle=T().colors[3];ctx.globalAlpha=.55;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(480,20);ctx.lineTo(480,520);ctx.stroke();ctx.restore();paddle(G.p,true);paddle(G.c,false);G.b.trail.forEach((q,i)=>{ctx.globalAlpha=.28*(1-i/10);ctx.fillStyle=T().colors[7];ctx.beginPath();ctx.arc(q.x,q.y,Math.max(2,10-i),0,7);ctx.fill()});ctx.globalAlpha=1;ctx.shadowColor=T().colors[7];ctx.shadowBlur=20;ctx.fillStyle=T().colors[7];ctx.beginPath();ctx.arc(G.b.x,G.b.y,G.b.r,0,7);ctx.fill();ctx.shadowBlur=0;G.particles.forEach(p=>{ctx.globalAlpha=p.l*2;ctx.fillStyle=T().colors[3];ctx.beginPath();ctx.arc(p.x,p.y,4,0,7);ctx.fill()});ctx.globalAlpha=1}
function loop(now){if(!running||paused)return;const dt=Math.min(.025,(now-last)/1000||0);last=now;update(dt);draw();if(running)requestAnimationFrame(loop)}function pointer(e){const r=canvas.getBoundingClientRect();G.p.y=Math.max(12,Math.min(408,(e.clientY-r.top)*540/r.height-G.p.h/2))}function hold(btn,k){btn.onpointerdown=e=>{e.preventDefault();key.add(k)};['onpointerup','onpointercancel','onpointerleave'].forEach(x=>btn[x]=()=>key.delete(k))}
addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(['w','s','arrowup','arrowdown',' '].includes(k))e.preventDefault();if(k===' ')togglePause();else key.add(k)});addEventListener('keyup',e=>key.delete(e.key.toLowerCase()));canvas.addEventListener('pointermove',pointer);canvas.addEventListener('pointerdown',pointer);$('start').onclick=()=>paused?togglePause():start();$('pause').onclick=togglePause;$('reset').onclick=()=>resetMatch(true);$('sound').onclick=()=>{soundOn=!soundOn;$('sound').textContent=soundOn?'🔊':'🔇';$('sound').setAttribute('aria-pressed',soundOn)};buttons.forEach(b=>b.onclick=()=>applyTheme(b.dataset.theme));hold($('up'),'arrowup');hold($('down'),'arrowdown');applyTheme(active,false);resetMatch(true);
</script>
