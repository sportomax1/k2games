<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Donkey Smash 3D - K2 games</title>
    <style>
        :root {
            --panel: rgba(5, 9, 18, 0.82);
            --line: rgba(255, 255, 255, 0.16);
            --red: #ff4f5e;
            --blue: #47c8ff;
            --gold: #ffd166;
            --green: #70f2a0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #050912;
            color: white;
            font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
        }

        #app,
        canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        .back-link {
            position: fixed;
            top: calc(14px + env(safe-area-inset-top, 0px));
            left: 14px;
            z-index: 50;
            padding: 8px 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(5, 9, 18, 0.74);
            color: white;
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 1000;
            letter-spacing: 0.08em;
        }

        #hud {
            position: fixed;
            inset: calc(14px + env(safe-area-inset-top, 0px)) 14px auto 92px;
            z-index: 30;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            pointer-events: none;
        }

        .cluster {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .panel {
            min-width: 94px;
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 14px 32px rgba(0, 0, 0, 0.24);
        }

        .brand {
            min-width: 185px;
            border-color: rgba(255, 79, 94, 0.42);
        }

        .label {
            display: block;
            color: rgba(255, 255, 255, 0.64);
            font-size: 0.62rem;
            font-weight: 900;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .value {
            margin-top: 4px;
            font-size: 1.34rem;
            line-height: 1;
            font-weight: 1000;
        }

        .brand .value {
            color: var(--red);
            font-size: 1.42rem;
        }

        .gold { color: var(--gold); }
        .blue { color: var(--blue); }
        .green { color: var(--green); }

        #toast {
            position: fixed;
            left: 50%;
            top: 44%;
            z-index: 35;
            transform: translate(-50%, -50%) scale(0.8);
            color: white;
            font-size: clamp(2rem, 8vw, 5.6rem);
            line-height: 0.9;
            font-weight: 1000;
            text-align: center;
            text-shadow: 0 7px 0 #050912, 0 0 28px rgba(255, 79, 94, 0.52);
            opacity: 0;
            pointer-events: none;
        }

        #toast.show {
            animation: toast 1.28s ease-out forwards;
        }

        @keyframes toast {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.72); }
            18% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
            72% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.18); }
        }

        #overlay {
            position: fixed;
            inset: 0;
            z-index: 60;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22px;
            background: linear-gradient(180deg, rgba(5, 9, 18, 0.72), rgba(5, 9, 18, 0.96));
        }

        .modal {
            width: min(535px, 100%);
            padding: 24px;
            border: 2px solid rgba(255, 79, 94, 0.34);
            border-radius: 8px;
            background: rgba(5, 9, 18, 0.9);
            text-align: center;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.44);
        }

        h1 {
            color: var(--red);
            font-size: clamp(2.7rem, 12vw, 5.8rem);
            line-height: 0.82;
            font-weight: 1000;
            letter-spacing: 0;
            text-transform: uppercase;
            text-shadow: 0 7px 0 #5f0f18;
        }

        .brief {
            margin: 18px auto 20px;
            max-width: 430px;
            color: rgba(255, 255, 255, 0.78);
            font-size: 0.96rem;
            line-height: 1.45;
        }

        .btn {
            width: min(330px, 100%);
            height: 62px;
            border: 0;
            border-radius: 8px;
            background: white;
            color: #050912;
            box-shadow: 0 8px 0 #9ca3af;
            cursor: pointer;
            font-size: 1.08rem;
            font-weight: 1000;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #9ca3af;
        }

        #touch {
            position: fixed;
            inset: auto 16px calc(22px + env(safe-area-inset-bottom, 0px)) 16px;
            z-index: 34;
            display: none;
            justify-content: space-between;
            pointer-events: none;
        }

        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 64px);
            grid-template-rows: repeat(2, 64px);
            gap: 8px;
            pointer-events: auto;
        }

        .actions {
            display: flex;
            align-items: end;
            gap: 10px;
            pointer-events: auto;
        }

        .touch-btn {
            width: 64px;
            height: 64px;
            border: 2px solid rgba(255, 255, 255, 0.72);
            border-radius: 8px;
            background: rgba(5, 9, 18, 0.72);
            color: white;
            font-size: 1rem;
            font-weight: 1000;
        }

        .touch-btn.primary {
            width: 88px;
            height: 88px;
            background: var(--red);
            border-color: white;
        }

        .touch-btn.alt {
            background: var(--gold);
            color: #050912;
        }

        @media (max-width: 900px) {
            #hud { inset-right: 10px; }
            .brand { display: none; }
            .panel { min-width: 82px; padding: 8px 9px; }
            .value { font-size: 1.06rem; }
            #touch { display: flex; }
        }
    </style>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CCZ9JJGEDP');
    </script>
</head>
<body>
    <div id="app"></div>
    <a href="index.html" class="back-link">HUB</a>

    <div id="hud">
        <div class="cluster">
            <div class="panel brand">
                <span class="label">Donkey Smash</span>
                <div class="value">3D</div>
            </div>
            <div class="panel">
                <span class="label">Score</span>
                <div id="score" class="value gold">000000</div>
            </div>
            <div class="panel">
                <span class="label">Best</span>
                <div id="best" class="value">000000</div>
            </div>
        </div>
        <div class="cluster">
            <div class="panel">
                <span class="label">Lives</span>
                <div id="lives" class="value green">3</div>
            </div>
            <div class="panel">
                <span class="label">Hammer</span>
                <div id="hammer" class="value blue">0</div>
            </div>
        </div>
    </div>

    <div id="touch">
        <div class="dpad">
            <span></span><button class="touch-btn" data-key="ArrowUp">UP</button><span></span>
            <button class="touch-btn" data-key="ArrowLeft">L</button>
            <button class="touch-btn" data-key="ArrowDown">DN</button>
            <button class="touch-btn" data-key="ArrowRight">R</button>
        </div>
        <div class="actions">
            <button class="touch-btn alt" data-key="KeyX">SMASH</button>
            <button class="touch-btn primary" data-key="Space">JUMP</button>
        </div>
    </div>

    <div id="toast"></div>

    <div id="overlay">
        <div class="modal">
            <h1 id="title">Donkey Smash</h1>
            <div id="brief" class="brief">Climb the neon tower, dodge rolling barrels, grab hammers, smash danger, and reach the top platform.</div>
            <button id="start" class="btn">Start Game</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from "three";

        const clamp = THREE.MathUtils.clamp;
        const lerp = THREE.MathUtils.lerp;

        class DonkeySmash3D {
            constructor() {
                this.state = "menu";
                this.keys = {};
                this.score = 0;
                this.best = Number(localStorage.getItem("k2-donkeysmash3d-best") || 0);
                this.lives = 3;
                this.lastTime = performance.now();
                this.spawnTimer = 0;
                this.barrels = [];
                this.particles = [];
                this.hammerPickups = [];
                this.ui = {
                    score: document.getElementById("score"),
                    best: document.getElementById("best"),
                    lives: document.getElementById("lives"),
                    hammer: document.getElementById("hammer"),
                    overlay: document.getElementById("overlay"),
                    title: document.getElementById("title"),
                    brief: document.getElementById("brief"),
                    start: document.getElementById("start"),
                    toast: document.getElementById("toast")
                };
                this.ui.best.textContent = this.format(this.best);
                this.initThree();
                this.createWorld();
                this.createPlayer();
                this.createBoss();
                this.bindInput();
                this.resetPlayer();
                this.ui.start.addEventListener("click", () => this.start());
                requestAnimationFrame((time) => this.loop(time));
            }

            initThree() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x070b16);
                this.scene.fog = new THREE.Fog(0x070b16, 160, 520);
                this.camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.1, 1200);
                this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
                this.renderer.setSize(innerWidth, innerHeight);
                this.renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
                this.renderer.shadowMap.enabled = true;
                document.getElementById("app").appendChild(this.renderer.domElement);

                this.scene.add(new THREE.HemisphereLight(0x9fdcff, 0x16080b, 1.35));
                const key = new THREE.DirectionalLight(0xffe5b8, 1.8);
                key.position.set(-80, 140, 120);
                key.castShadow = true;
                key.shadow.mapSize.set(1024, 1024);
                key.shadow.camera.left = -170;
                key.shadow.camera.right = 170;
                key.shadow.camera.top = 170;
                key.shadow.camera.bottom = -170;
                this.scene.add(key);
                const red = new THREE.PointLight(0xff4f5e, 3, 250);
                red.position.set(-60, 85, 55);
                this.scene.add(red);
                const blue = new THREE.PointLight(0x47c8ff, 2.4, 260);
                blue.position.set(75, 55, -45);
                this.scene.add(blue);

                window.addEventListener("resize", () => {
                    this.camera.aspect = innerWidth / innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(innerWidth, innerHeight);
                    this.renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
                });
            }

            mat(color, extra = {}) {
                return new THREE.MeshStandardMaterial({ color, roughness: 0.62, metalness: 0.06, ...extra });
            }

            createWorld() {
                this.mats = {
                    girder: this.mat(0xff4f5e, { emissive: 0x4b0710, emissiveIntensity: 0.45 }),
                    ladder: this.mat(0x47c8ff, { emissive: 0x063f66, emissiveIntensity: 0.55 }),
                    deck: this.mat(0x101827),
                    gold: this.mat(0xffd166),
                    player: this.mat(0x3b82f6),
                    shirt: this.mat(0xff4f5e),
                    skin: this.mat(0xf2bd8a),
                    hair: this.mat(0x1a1010),
                    barrel: this.mat(0x9a5a28),
                    dark: this.mat(0x090e19),
                    smoke: new THREE.MeshBasicMaterial({ color: 0xfff0d2, transparent: true, opacity: 0.88 })
                };

                const back = new THREE.Mesh(new THREE.BoxGeometry(170, 120, 3), this.mats.dark);
                back.position.set(0, 56, -18);
                back.receiveShadow = true;
                this.scene.add(back);

                this.platforms = [
                    { x: -1, y: 0, w: 150, slope: 0 },
                    { x: -8, y: 18, w: 138, slope: 8 },
                    { x: 8, y: 36, w: 138, slope: -8 },
                    { x: -8, y: 54, w: 138, slope: 8 },
                    { x: 8, y: 72, w: 138, slope: -8 },
                    { x: -34, y: 92, w: 52, slope: 0 },
                    { x: 32, y: 106, w: 36, slope: 0 }
                ];
                this.ladders = [
                    { x: 55, y: 2, h: 18 },
                    { x: -55, y: 20, h: 18 },
                    { x: 55, y: 38, h: 18 },
                    { x: -55, y: 56, h: 18 },
                    { x: 47, y: 74, h: 20 },
                    { x: -18, y: 92, h: 16 }
                ];

                this.platforms.forEach((p, i) => this.addPlatform(p, i));
                this.ladders.forEach((l) => this.addLadder(l));
                this.addHammerPickup(-48, 41);
                this.addHammerPickup(46, 23);

                const crown = new THREE.Group();
                const pedestal = new THREE.Mesh(new THREE.BoxGeometry(14, 2, 8), this.mats.gold);
                pedestal.position.set(32, 109, 0);
                const prism = new THREE.Mesh(new THREE.ConeGeometry(4, 9, 4), this.mats.gold);
                prism.position.set(32, 115, 0);
                crown.add(pedestal, prism);
                crown.traverse((n) => n.isMesh && (n.castShadow = true));
                this.scene.add(crown);
                this.goal = new THREE.Vector3(32, 112, 0);
            }

            addPlatform(p, index) {
                const group = new THREE.Group();
                const beam = new THREE.Mesh(new THREE.BoxGeometry(p.w, 2.2, 7), this.mats.girder);
                beam.castShadow = true;
                beam.receiveShadow = true;
                group.add(beam);
                for (let x = -p.w / 2 + 8; x < p.w / 2; x += 12) {
                    const brace = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 7.4), this.mats.girder);
                    brace.position.set(x, -2.4, 0);
                    brace.rotation.z = (index % 2 ? -1 : 1) * 0.42;
                    brace.castShadow = true;
                    group.add(brace);
                }
                group.position.set(p.x, p.y, 0);
                group.rotation.z = Math.atan2(p.slope, p.w);
                this.scene.add(group);
                p.group = group;
            }

            addLadder(l) {
                const group = new THREE.Group();
                [-2.8, 2.8].forEach((x) => {
                    const side = new THREE.Mesh(new THREE.BoxGeometry(1.2, l.h, 1.2), this.mats.ladder);
                    side.position.set(x, l.h / 2, 0);
                    side.castShadow = true;
                    group.add(side);
                });
                for (let y = 2; y < l.h; y += 3.4) {
                    const rung = new THREE.Mesh(new THREE.BoxGeometry(7, 0.8, 1.2), this.mats.ladder);
                    rung.position.set(0, y, 0);
                    rung.castShadow = true;
                    group.add(rung);
                }
                group.position.set(l.x, l.y, 2.8);
                this.scene.add(group);
            }

            addHammerPickup(x, y) {
                const hammer = this.createHammer();
                hammer.position.set(x, y + 5, 3.5);
                hammer.userData = { active: true, x, y };
                this.hammerPickups.push(hammer);
                this.scene.add(hammer);
            }

            createHammer() {
                const group = new THREE.Group();
                const handle = new THREE.Mesh(new THREE.BoxGeometry(1, 7, 1), this.mats.gold);
                const head = new THREE.Mesh(new THREE.BoxGeometry(6, 2.6, 2.6), this.mats.girder);
                handle.rotation.z = -0.7;
                head.position.set(2, 2.7, 0);
                group.add(handle, head);
                group.traverse((n) => n.isMesh && (n.castShadow = true));
                return group;
            }

            createPlayer() {
                this.playerGroup = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(4.2, 6, 2.8), this.mats.player);
                const shirt = new THREE.Mesh(new THREE.BoxGeometry(4.4, 3.1, 3), this.mats.shirt);
                const head = new THREE.Mesh(new THREE.BoxGeometry(3.2, 3.2, 3.2), this.mats.skin);
                const hair = new THREE.Mesh(new THREE.BoxGeometry(3.4, 1, 3.4), this.mats.hair);
                const legA = new THREE.Mesh(new THREE.BoxGeometry(1.3, 4.2, 1.4), this.mats.player);
                const legB = legA.clone();
                shirt.position.y = 1.8;
                head.position.y = 6.1;
                hair.position.y = 8.0;
                legA.position.set(-1.1, -4.6, 0);
                legB.position.set(1.1, -4.6, 0);
                this.playerParts = { body, shirt, head, hair, legA, legB };
                this.playerGroup.add(body, shirt, head, hair, legA, legB);
                this.playerGroup.traverse((n) => n.isMesh && (n.castShadow = true));
                this.scene.add(this.playerGroup);
            }

            createBoss() {
                this.boss = new THREE.Group();
                const fur = this.mat(0x5a331f);
                const belly = this.mat(0x8e5b33);
                const body = new THREE.Mesh(new THREE.BoxGeometry(12, 11, 8), fur);
                const chest = new THREE.Mesh(new THREE.BoxGeometry(8, 7, 8.4), belly);
                const head = new THREE.Mesh(new THREE.BoxGeometry(9, 7, 8), fur);
                const armA = new THREE.Mesh(new THREE.BoxGeometry(3, 12, 3), fur);
                const armB = armA.clone();
                body.position.y = 5;
                chest.position.y = 5;
                head.position.y = 14;
                armA.position.set(-8, 6, 0);
                armB.position.set(8, 6, 0);
                this.bossArms = [armA, armB];
                this.boss.add(body, chest, head, armA, armB);
                this.boss.position.set(-34, 94, 2);
                this.boss.traverse((n) => n.isMesh && (n.castShadow = true));
                this.scene.add(this.boss);
            }

            bindInput() {
                window.addEventListener("keydown", (event) => {
                    const code = this.mapKey(event.code);
                    this.keys[code] = true;
                    if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Space", "KeyX"].includes(code)) event.preventDefault();
                });
                window.addEventListener("keyup", (event) => {
                    const code = this.mapKey(event.code);
                    this.keys[code] = false;
                    if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Space", "KeyX"].includes(code)) event.preventDefault();
                });
                document.querySelectorAll("[data-key]").forEach((button) => {
                    const code = button.dataset.key;
                    const down = (event) => {
                        event.preventDefault();
                        this.keys[code] = true;
                    };
                    const up = (event) => {
                        event.preventDefault();
                        this.keys[code] = false;
                    };
                    button.addEventListener("pointerdown", down);
                    button.addEventListener("pointerup", up);
                    button.addEventListener("pointercancel", up);
                    button.addEventListener("pointerleave", up);
                });
            }

            mapKey(code) {
                const map = { KeyA: "ArrowLeft", KeyD: "ArrowRight", KeyW: "ArrowUp", KeyS: "ArrowDown", KeyH: "KeyX" };
                return map[code] || code;
            }

            start() {
                this.score = 0;
                this.lives = 3;
                this.barrels.forEach((barrel) => this.scene.remove(barrel.mesh));
                this.barrels = [];
                this.hammerPickups.forEach((h) => {
                    h.visible = true;
                    h.userData.active = true;
                });
                this.resetPlayer();
                this.state = "play";
                this.ui.overlay.style.display = "none";
                this.flash("CLIMB");
                this.updateUI();
            }

            resetPlayer() {
                this.player = {
                    x: -66,
                    y: 5,
                    vx: 0,
                    vy: 0,
                    dir: 1,
                    onGround: false,
                    climbing: false,
                    hammer: 0,
                    invuln: 0,
                    anim: 0
                };
            }

            platformY(x, p) {
                return p.y + ((x - (p.x - p.w / 2)) / p.w - 0.5) * p.slope;
            }

            findPlatform(x, y, margin = 3.5) {
                return this.platforms.find((p) => {
                    const left = p.x - p.w / 2;
                    const right = p.x + p.w / 2;
                    if (x < left || x > right) return false;
                    const py = this.platformY(x, p);
                    return y >= py - margin && y <= py + margin;
                });
            }

            nearLadder(entity) {
                return this.ladders.find((l) => Math.abs(entity.x - l.x) < 5.8 && entity.y > l.y - 2 && entity.y < l.y + l.h + 3);
            }

            spawnBarrel() {
                const mesh = new THREE.Mesh(new THREE.CylinderGeometry(3.2, 3.2, 4.5, 18), this.mats.barrel);
                mesh.rotation.z = Math.PI / 2;
                mesh.castShadow = true;
                const barrel = { x: -20, y: 99, vx: 1.15, vy: 0, mesh, jumped: false, dropCooldown: 0 };
                this.barrels.push(barrel);
                this.scene.add(mesh);
                this.bossArms[0].rotation.z = -1.2;
                this.bossArms[1].rotation.z = 1.2;
            }

            updatePlayer(dt) {
                const p = this.player;
                const ladder = this.nearLadder(p);
                const up = this.keys.ArrowUp;
                const down = this.keys.ArrowDown;
                if (ladder && (up || down || p.climbing)) {
                    p.climbing = true;
                    p.vx = 0;
                    p.vy = 0;
                    p.x = lerp(p.x, ladder.x, 0.25);
                    if (up) p.y += 0.95 * dt;
                    if (down) p.y -= 0.95 * dt;
                    if (!up && !down && !this.keys.ArrowLeft && !this.keys.ArrowRight) p.y += 0;
                    if (p.y > ladder.y + ladder.h + 1 || p.y < ladder.y - 1) p.climbing = false;
                } else {
                    p.climbing = false;
                }

                if (!p.climbing) {
                    const move = (this.keys.ArrowRight ? 1 : 0) - (this.keys.ArrowLeft ? 1 : 0);
                    p.vx = lerp(p.vx, move * 1.35, 0.18);
                    if (move) p.dir = Math.sign(move);
                    if (this.keys.Space && p.onGround) {
                        p.vy = 4.2;
                        p.onGround = false;
                    }
                    p.vy -= 0.22 * dt;
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                }

                p.x = clamp(p.x, -78, 78);
                p.onGround = false;
                if (!p.climbing && p.vy <= 0) {
                    const plat = this.findPlatform(p.x, p.y - 5, 6);
                    if (plat) {
                        p.y = this.platformY(p.x, plat) + 5;
                        p.vy = 0;
                        p.onGround = true;
                    }
                }
                if (this.keys.KeyX) this.smash();

                if (p.hammer > 0) p.hammer = Math.max(0, p.hammer - dt);
                if (p.invuln > 0) p.invuln = Math.max(0, p.invuln - dt);
                if (Math.abs(p.vx) > 0.1 || p.climbing) p.anim += 0.18 * dt;
                if (p.y < -18) this.hurt();
                this.playerGroup.position.set(p.x, p.y, 4);
                this.playerGroup.rotation.y = p.dir < 0 ? Math.PI : 0;
                this.playerGroup.visible = p.invuln <= 0 || Math.floor(p.invuln / 5) % 2 === 0;
                this.playerParts.legA.rotation.x = Math.sin(p.anim) * 0.5;
                this.playerParts.legB.rotation.x = -Math.sin(p.anim) * 0.5;
            }

            updateBarrels(dt) {
                for (let i = this.barrels.length - 1; i >= 0; i--) {
                    const b = this.barrels[i];
                    b.vy -= 0.24 * dt;
                    b.x += b.vx * dt;
                    b.y += b.vy * dt;
                    const plat = this.findPlatform(b.x, b.y - 3, 5);
                    if (plat && b.vy <= 0) {
                        b.y = this.platformY(b.x, plat) + 3;
                        b.vy = 0;
                        const slopeDir = Math.sign(plat.slope || (b.x > 0 ? -1 : 1));
                        b.vx += slopeDir * 0.045 * dt;
                        b.vx = clamp(b.vx, -1.65, 1.65);
                        if (b.x < plat.x - plat.w / 2 + 4) b.vx = Math.abs(b.vx);
                        if (b.x > plat.x + plat.w / 2 - 4) b.vx = -Math.abs(b.vx);
                    }
                    if (b.dropCooldown > 0) b.dropCooldown -= dt;
                    const ladder = this.nearLadder(b);
                    if (ladder && b.dropCooldown <= 0 && Math.random() < 0.01 * dt) {
                        b.vx *= 0.25;
                        b.vy = -2.3;
                        b.dropCooldown = 40;
                    }
                    b.mesh.position.set(b.x, b.y, 4);
                    b.mesh.rotation.x += b.vx * 0.18 * dt;
                    const dx = this.player.x - b.x;
                    const dy = this.player.y - b.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < 6.5) {
                        if (this.player.hammer > 0) this.destroyBarrel(i);
                        else if (this.player.invuln <= 0) this.hurt();
                    }
                    if (!b.jumped && this.player.y > b.y + 8 && Math.abs(dx) < 5) {
                        b.jumped = true;
                        this.addScore(100);
                        this.flash("+100");
                    }
                    if (b.y < -22) {
                        this.scene.remove(b.mesh);
                        this.barrels.splice(i, 1);
                    }
                }
            }

            updatePickups(dt) {
                this.hammerPickups.forEach((h) => {
                    if (!h.userData.active) return;
                    h.rotation.y += 0.05 * dt;
                    h.position.y = h.userData.y + 5 + Math.sin(performance.now() * 0.006) * 0.5;
                    if (Math.hypot(this.player.x - h.userData.x, this.player.y - h.userData.y) < 7) {
                        h.userData.active = false;
                        h.visible = false;
                        this.player.hammer = 420;
                        this.addScore(250);
                        this.flash("HAMMER");
                    }
                });
            }

            smash() {
                if (this.player.hammer <= 0 || this.state !== "play") return;
                for (let i = this.barrels.length - 1; i >= 0; i--) {
                    const b = this.barrels[i];
                    if (Math.hypot(this.player.x - b.x, this.player.y - b.y) < 13) this.destroyBarrel(i);
                }
            }

            destroyBarrel(index) {
                const b = this.barrels[index];
                this.createBurst(b.x, b.y, 0xffd166);
                this.scene.remove(b.mesh);
                this.barrels.splice(index, 1);
                this.addScore(500);
                this.flash("SMASH");
            }

            createBurst(x, y, color) {
                const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 });
                for (let i = 0; i < 18; i++) {
                    const spark = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), mat.clone());
                    spark.position.set(x, y, 4);
                    spark.userData.vel = new THREE.Vector3((Math.random() - 0.5) * 2.2, Math.random() * 2, (Math.random() - 0.5) * 2);
                    spark.userData.life = 1;
                    this.particles.push(spark);
                    this.scene.add(spark);
                }
            }

            hurt() {
                if (this.player.invuln > 0 || this.state !== "play") return;
                this.lives -= 1;
                this.createBurst(this.player.x, this.player.y, 0xff4f5e);
                if (this.lives <= 0) {
                    this.end("Game Over");
                } else {
                    this.resetPlayer();
                    this.player.invuln = 150;
                    this.barrels.forEach((barrel) => this.scene.remove(barrel.mesh));
                    this.barrels = [];
                    this.flash("TRY AGAIN");
                }
            }

            addScore(points) {
                this.score += points;
                this.best = Math.max(this.best, this.score);
                localStorage.setItem("k2-donkeysmash3d-best", this.best);
                this.updateUI();
            }

            end(title) {
                this.state = "over";
                this.ui.overlay.style.display = "flex";
                this.ui.title.textContent = title;
                this.ui.brief.textContent = "Score " + this.format(this.score) + " | Best " + this.format(this.best);
                this.ui.start.textContent = "Play Again";
            }

            updateParticles(dt) {
                this.particles = this.particles.filter((spark) => {
                    spark.position.addScaledVector(spark.userData.vel, dt);
                    spark.userData.vel.y -= 0.08 * dt;
                    spark.userData.life -= 0.035 * dt;
                    spark.material.opacity = Math.max(0, spark.userData.life);
                    if (spark.userData.life <= 0) {
                        this.scene.remove(spark);
                        return false;
                    }
                    return true;
                });
            }

            update(dt, time) {
                if (this.state !== "play") {
                    this.boss.rotation.y = Math.sin(time * 0.002) * 0.1;
                    return;
                }
                this.spawnTimer -= dt;
                if (this.spawnTimer <= 0) {
                    this.spawnBarrel();
                    this.spawnTimer = Math.max(70, 145 - this.score / 180);
                }
                this.bossArms.forEach((arm) => arm.rotation.z = lerp(arm.rotation.z, 0, 0.08));
                this.updatePlayer(dt);
                this.updateBarrels(dt);
                this.updatePickups(dt);
                this.updateParticles(dt);
                if (this.player.y > 106 && this.player.x > 17) {
                    this.addScore(4000);
                    this.end("Victory");
                }
                this.updateUI();
                const target = new THREE.Vector3(this.player.x * 0.35, 54, 0);
                this.camera.position.lerp(new THREE.Vector3(target.x, 78, 155), 1 - Math.pow(0.001, dt / 16.67));
                this.camera.lookAt(target.x, 52, 0);
            }

            updateUI() {
                this.ui.score.textContent = this.format(this.score);
                this.ui.best.textContent = this.format(this.best);
                this.ui.lives.textContent = this.lives;
                this.ui.hammer.textContent = Math.ceil(this.player?.hammer || 0);
            }

            format(n) {
                return String(Math.floor(n)).padStart(6, "0");
            }

            flash(text) {
                this.ui.toast.textContent = text;
                this.ui.toast.classList.remove("show");
                void this.ui.toast.offsetWidth;
                this.ui.toast.classList.add("show");
            }

            loop(time) {
                const dt = clamp((time - this.lastTime) / 16.67, 0.25, 2.1);
                this.lastTime = time;
                if (this.state === "menu") {
                    this.camera.position.lerp(new THREE.Vector3(0, 80, 155), 0.035);
                    this.camera.lookAt(0, 54, 0);
                    this.update(time, time);
                } else {
                    this.update(dt, time);
                }
                this.renderer.render(this.scene, this.camera);
                requestAnimationFrame((next) => this.loop(next));
            }
        }

        window.game = new DonkeySmash3D();
    </script>
</body>
</html>
