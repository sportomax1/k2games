<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Donkey Smash: Master Edition - K2 games</title>
    <style>
        :root {
            --bg: #020617;
            --girder: #ef4444;
            --ladder: #38bdf8;
            --accent: #fbbf24;
            --text: #f8fafc;
            --panel: rgba(15, 23, 42, 0.8);
            --neon-red: 0 0 15px rgba(239, 68, 68, 0.6);
            --neon-blue: 0 0 15px rgba(56, 189, 248, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100dvh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; position: fixed; width: 100%;
        }

        #game-container {
            position: relative; background: #000; border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.9); border: 4px solid #1e293b;
            overflow: hidden; width: 100%; height: 100%; max-width: 640px; max-height: 800px;
            display: flex; align-items: center; justify-content: center;
        }

        canvas { display: block; image-rendering: pixelated; width: 100%; height: 100%; object-fit: contain; }

        #hud { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; pointer-events: none; z-index: 100; }
        .stat-group { background: var(--panel); backdrop-filter: blur(10px); padding: 8px 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; margin-bottom: 2px; }
        .stat-value { font-size: 1.4rem; font-weight: 900; color: var(--accent); font-family: monospace; }

        #mobile-controls { position: absolute; bottom: 30px; left: 20px; right: 20px; display: none; justify-content: space-between; align-items: flex-end; z-index: 500; }
        @media (max-width: 1024px) { #mobile-controls { display: flex; } }
        .d-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .ctrl-btn { width: 70px; height: 70px; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 15px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; backdrop-filter: blur(5px); }
        .ctrl-btn:active { background: rgba(255,255,255,0.4); transform: scale(0.95); }
        .action-pad { display: flex; flex-direction: column; gap: 15px; }
        .jump-btn { width: 100px; height: 100px; border-radius: 50%; background: var(--girder); border: 4px solid white; font-weight: 900; font-size: 1.2rem; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .smash-btn { width: 70px; height: 70px; border-radius: 50%; background: var(--accent); border: 3px solid white; color: #000; font-weight: 900; }

        .back-link { position: fixed; top: 15px; left: 15px; color: white; text-decoration: none; background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 10px; z-index: 1000; font-weight: bold; backdrop-filter: blur(10px); font-size: 0.8rem; }

        .modal { position: absolute; inset: 0; background: rgba(2, 6, 23, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(15px); text-align: center; padding: 20px; }
        h1 { font-size: clamp(3rem, 10vw, 4.5rem); color: var(--accent); font-style: italic; font-weight: 900; margin-bottom: 20px; line-height: 1; text-shadow: 0 10px 30px rgba(251, 191, 36, 0.4); }
        .btn-play { background: var(--girder); color: white; border: none; padding: 18px 50px; border-radius: 100px; font-weight: 900; cursor: pointer; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 15px 30px rgba(239, 68, 68, 0.4); margin-top: 30px; }
        #hammer-glow { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 5px 15px; border-radius: 8px; font-weight: 900; font-size: 0.7rem; display: none; animation: flash 0.3s infinite; z-index: 200; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CCZ9JJGEDP');
    </script>
</head>
<body>
    <a href="index.html" class="back-link">← HUB</a>
    <div id="game-container">
        <canvas id="gameCanvas" width="640" height="800"></canvas>
        <div id="hud">
            <div class="stat-group"><div class="stat-label">Score</div><div id="score-val" class="stat-value">000000</div></div>
            <div class="stat-group"><div class="stat-label">Lives</div><div id="lives-val" class="stat-value">❤️❤️❤️</div></div>
            <div class="stat-group"><div class="stat-label">Hi-Score</div><div id="hi-val" class="stat-value">000000</div></div>
        </div>
        <div id="mobile-controls">
            <div class="d-pad">
                <div></div><div class="ctrl-btn" id="btn-up">↑</div><div></div>
                <div class="ctrl-btn" id="btn-left">←</div><div class="ctrl-btn" id="btn-down">↓</div><div class="ctrl-btn" id="btn-right">→</div>
            </div>
            <div class="action-pad">
                <button class="smash-btn" id="btn-smash">🔨</button>
                <button class="jump-btn" id="btn-jump">JUMP</button>
            </div>
        </div>
        <div id="hammer-glow">🔨 SMASH READY (X / H)</div>
        <div id="start-modal" class="modal">
            <h1>DONKEY<br>SMASH</h1>
            <p style="opacity: 0.6; max-width: 300px; margin-top: 10px;">Reach the top, rescue the Princess, and avoid the barrels!</p>
            <button class="btn-play" onclick="game.start()">START GAME</button>
        </div>
        <div id="over-modal" class="modal" style="display: none;">
            <h1 id="over-title">GAME OVER</h1>
            <p id="final-stats" style="font-size: 1.5rem; margin: 20px 0; font-weight: 700;"></p>
            <button class="btn-play" onclick="location.reload()">REPLAY</button>
        </div>
    </div>

    <script>
        const GRAVITY = 0.45;
        const JUMP = -8.5;
        const SPEED = 4;

        class DonkeySmash {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.width = 640; this.height = 800;
                this.player = { x: 50, y: 720, w: 36, h: 42, vx: 0, vy: 0, dir: 1, anim: 0, onGround: false, climbing: false, hammer: 0, invuln: 0 };
                this.platforms = []; this.ladders = []; this.barrels = []; this.hammers = []; this.particles = [];
                this.score = 0; this.lives = 3; this.frame = 0; this.gameActive = false;
                this.hiScore = parseInt(localStorage.getItem('k2-donkeysmash-hi') || 0);
                this.kong = { state: 'idle', timer: 0, x: 100, y: 120 };
                this.keys = {};
                this.initLevel(); this.setupInputs(); this.updateUI();
            }

            initLevel() {
                // Zig-Zag SLOPED Platforms
                this.platforms = [
                    { x: 0, y: 760, w: 640, s: 0 },   // Base
                    { x: 0, y: 660, w: 580, s: 30 },  // R1: Slopes DOWN to Left (s is right-offset, so s=30 means right side is +30px)
                    { x: 60, y: 560, w: 580, s: -30 }, // R2: Slopes DOWN to Right
                    { x: 0, y: 460, w: 580, s: 30 },  // R3: Slopes DOWN to Left
                    { x: 60, y: 360, w: 580, s: -30 }, // R4: Slopes DOWN to Right
                    { x: 0, y: 260, w: 580, s: 30 },  // R5: Slopes DOWN to Left
                    { x: 100, y: 160, w: 200, s: 0 }, // Kong
                    { x: 300, y: 100, w: 100, s: 0 }  // Princess
                ];
                this.ladders = [
                    { x: 530, y: 655, h: 105 + 30 },
                    { x: 80, y: 565, h: 95 + 30 },
                    { x: 530, y: 465, h: 95 + 30 },
                    { x: 80, y: 365, h: 95 + 30 },
                    { x: 530, y: 265, h: 95 + 30 },
                    { x: 250, y: 160, h: 105 },
                    { x: 340, y: 100, h: 60 }
                ];
                this.hammers = [ { x: 100, y: 430, active: true }, { x: 520, y: 630, active: true } ];
            }

            setupInputs() {
                window.onkeydown = e => { this.keys[e.code] = true; if(e.code === 'KeyX' || e.code === 'KeyH') this.smash(); };
                window.onkeyup = e => this.keys[e.code] = false;
                const bind = (id, key) => {
                    const el = document.getElementById(id);
                    el.onmousedown = el.ontouchstart = (e) => { e.preventDefault(); this.keys[key] = true; if(key === 'X') this.smash(); };
                    el.onmouseup = el.ontouchend = () => this.keys[key] = false;
                };
                bind('btn-up', 'ArrowUp'); bind('btn-down', 'ArrowDown'); bind('btn-left', 'ArrowLeft'); bind('btn-right', 'ArrowRight'); bind('btn-jump', 'Space'); bind('btn-smash', 'X');
            }

            start() { this.gameActive = true; document.getElementById('start-modal').style.display = 'none'; this.animate(); }

            getPlatformY(x, plat) {
                const relX = (x - plat.x) / plat.w;
                return plat.y + (relX * plat.s);
            }

            spawnBarrel() {
                this.kong.state = 'throwing'; this.kong.timer = 30;
                this.barrels.push({ x: 180, y: 120, r: 15, vx: 3, vy: 0, angle: 0, dir: 1, jumped: false });
            }

            update() {
                if(!this.gameActive) return;
                this.frame++;
                if(this.frame % 140 === 0) this.spawnBarrel();
                if(this.kong.timer > 0) this.kong.timer--; else this.kong.state = 'idle';

                const p = this.player;
                if(!p.climbing) {
                    if(this.keys['ArrowLeft']) { p.vx = -SPEED; p.dir = -1; }
                    else if(this.keys['ArrowRight']) { p.vx = SPEED; p.dir = 1; }
                    else p.vx *= 0.8;
                    p.vy += GRAVITY; p.x += p.vx; p.y += p.vy;
                } else {
                    if(this.keys['ArrowUp']) p.y -= 3;
                    else if(this.keys['ArrowDown']) p.y += 3;
                }

                let nearLadder = null;
                this.ladders.forEach(l => { if(Math.abs(p.x + p.w/2 - (l.x + 12)) < 25 && p.y + p.h > l.y && p.y < l.y + l.h) nearLadder = l; });
                
                const upPressed = this.keys['ArrowUp'] || this.keys['KeyW'];
                const downPressed = this.keys['ArrowDown'] || this.keys['KeyS'];

                if(nearLadder && (upPressed || downPressed || p.climbing)) {
                    p.climbing = true; p.vx = 0; p.vy = 0; p.x = nearLadder.x + 12 - p.w/2;
                    if(upPressed) p.y -= 3;
                    else if(downPressed) p.y += 3;
                } else {
                    p.climbing = false;
                }

                p.onGround = false;
                if(!p.climbing) {
                    this.platforms.forEach(plat => {
                        if(p.x + p.w/2 > plat.x && p.x + p.w/2 < plat.x + plat.w) {
                            let py = this.getPlatformY(p.x + p.w/2, plat);
                            if(p.y + p.h >= py && p.y + p.h <= py + 25 && p.vy >= 0) {
                                p.y = py - p.h; p.vy = 0; p.onGround = true;
                            }
                        }
                    });
                }

                // JUMPING: Space or ArrowUp (if not climbing)
                if((this.keys['Space'] || (upPressed && !nearLadder)) && p.onGround) {
                    p.vy = JUMP;
                    p.onGround = false;
                }

                // Barrel Logic (Zig-Zag DOWN)
                for(let i = this.barrels.length - 1; i >= 0; i--) {
                    const b = this.barrels[i];
                    b.vy += GRAVITY; b.x += b.vx; b.y += b.vy;
                    b.angle += b.vx * 0.1;

                    let onP = false;
                    this.platforms.forEach(plat => {
                        if(b.x > plat.x && b.x < plat.x + plat.w) {
                            let py = this.getPlatformY(b.x, plat);
                            if(b.y + b.r >= py && b.y + b.r <= py + 20 && b.vy >= 0) {
                                b.y = py - b.r; b.vy = 0; onP = true;
                                
                                // Gravity acceleration down the slope (Corrected)
                                const slopeDir = (plat.s > 0 ? 1 : (plat.s < 0 ? -1 : 0));
                                if (slopeDir !== 0) {
                                    b.vx += slopeDir * 0.15;
                                    // Speed limit
                                    if (Math.abs(b.vx) > 4) b.vx = slopeDir * 4;
                                }

                                // Fall down ladder chance
                                this.ladders.forEach(l => {
                                    if (Math.abs(b.x - (l.x + 12)) < 15 && b.y + b.r >= l.y - 5 && b.y + b.r <= l.y + 5) {
                                        if (Math.random() < 0.02) { // 2% chance per frame while over ladder
                                            b.y += 10; b.vx = 0; // Drop it
                                        }
                                    }
                                });
                            }
                        }
                    });

                    // Screen Bounds
                    if(b.x < 5) { b.x = 5; b.vx = Math.abs(b.vx); }
                    if(b.x > this.width - 5) { b.x = this.width - 5; b.vx = -Math.abs(b.vx); }

                    const dist = Math.hypot(p.x + p.w/2 - b.x, p.y + p.h/2 - b.y);
                    if(dist < 30) { if(p.hammer > 0) this.destroyBarrel(b, i); else if(p.invuln <= 0) this.die(); }
                    if(!b.jumped && p.y + p.h < b.y && Math.abs(p.x + p.w/2 - b.x) < 20) { b.jumped = true; this.score += 100; this.spawnParticles(b.x, b.y, '#fff', 5); }
                    if(b.y > this.height) this.barrels.splice(i, 1);
                }

                if(p.hammer > 0) { p.hammer--; document.getElementById('hammer-glow').style.display = 'block'; } else document.getElementById('hammer-glow').style.display = 'none';
                this.hammers.forEach(h => { if(h.active && Math.hypot(p.x - h.x, p.y - h.y) < 40) { h.active = false; p.hammer = 400; this.score += 200; this.spawnParticles(h.x, h.y, '#fbbf24', 15); } });
                for(let i=this.particles.length-1; i>=0; i--) { const part = this.particles[i]; part.x += part.vx; part.y += part.vy; part.life -= 0.02; if(part.life <= 0) this.particles.splice(i, 1); }
                if(p.y < 100 && p.x > 300) this.endGame("VICTORY!");
                if(p.invuln > 0) p.invuln--;
                if(Math.abs(p.vx) > 0.1 || p.climbing) p.anim += 0.2;
                if(p.y > this.height) this.die();
                this.updateUI();
            }

            destroyBarrel(b, i) { this.spawnParticles(b.x, b.y, '#92400e', 15); this.barrels.splice(i, 1); this.score += 500; }
            smash() { if(this.player.hammer <= 0) return; this.barrels.forEach((b, i) => { if(Math.hypot(this.player.x - b.x, this.player.y - b.y) < 80) this.destroyBarrel(b, i); }); }
            spawnParticles(x, y, color, count) { for(let i=0; i<count; i++) { this.particles.push({ x, y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 1, color }); } }
            die() { this.lives--; this.spawnParticles(this.player.x, this.player.y, '#ef4444', 20); if(this.lives <= 0) this.endGame("GAME OVER"); else { this.player.x = 50; this.player.y = 720; this.player.invuln = 120; this.barrels = []; } }
            endGame(msg) { this.gameActive = false; document.getElementById('over-modal').style.display = 'flex'; document.getElementById('over-title').textContent = msg; document.getElementById('final-stats').innerHTML = `SCORE: ${this.score}<br>HI-SCORE: ${Math.max(this.score, this.hiScore)}`; if(this.score > this.hiScore) localStorage.setItem('k2-donkeysmash-hi', this.score); }
            updateUI() { document.getElementById('score-val').textContent = this.score.toString().padStart(6, '0'); document.getElementById('lives-val').textContent = "❤️".repeat(this.lives); document.getElementById('hi-val').textContent = this.hiScore.toString().padStart(6, '0'); }

            draw() {
                const ctx = this.ctx; ctx.fillStyle = '#000'; ctx.fillRect(0, 0, this.width, this.height);
                ctx.lineWidth = 6;
                this.platforms.forEach(p => {
                    ctx.strokeStyle = '#ef4444'; ctx.shadowBlur = 10; ctx.shadowColor = '#ef4444';
                    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x + p.w, p.y + p.s); ctx.stroke();
                    ctx.lineWidth = 2;
                    for(let x=p.x; x<p.x+p.w; x+=20) { const y = this.getPlatformY(x, p); ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y+10); ctx.stroke(); }
                    ctx.lineWidth = 6;
                });
                ctx.shadowBlur = 0; ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 5;
                this.ladders.forEach(l => { ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(l.x, l.y+l.h); ctx.moveTo(l.x+24, l.y); ctx.lineTo(l.x+24, l.y+l.h); ctx.stroke(); for(let y=l.y+8; y<l.y+l.h; y+=12) { ctx.beginPath(); ctx.moveTo(l.x, y); ctx.lineTo(l.x+24, y); ctx.stroke(); } });
                ctx.font = '80px Arial'; ctx.fillText('🦍', this.kong.x, this.kong.y + (this.kong.state === 'throwing' ? -10 : 0));
                ctx.font = '50px Arial'; ctx.fillText('👸', 330, 95);
                this.hammers.forEach(h => { if(!h.active) return; ctx.font = '40px Arial'; ctx.save(); ctx.translate(h.x, h.y); ctx.rotate(Math.sin(this.frame/10)*0.3); ctx.fillText('🔨', -20, 20); ctx.restore(); });
                this.barrels.forEach(b => { ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(b.angle); ctx.fillStyle = '#92400e'; ctx.beginPath(); ctx.arc(0,0,b.r,0,Math.PI*2); ctx.fill(); ctx.strokeStyle = '#451a03'; ctx.lineWidth=3; ctx.stroke(); ctx.beginPath(); ctx.moveTo(-b.r, -5); ctx.lineTo(b.r, -5); ctx.stroke(); ctx.beginPath(); ctx.moveTo(-b.r, 5); ctx.lineTo(b.r, 5); ctx.stroke(); ctx.restore(); });
                this.particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill(); });
                ctx.globalAlpha = 1; const p = this.player;
                if(p.invuln % 10 < 5) { ctx.save(); ctx.translate(p.x + p.w/2, p.y + p.h/2); if(p.dir === -1) ctx.scale(-1, 1); const walk = Math.sin(p.anim) * 5; ctx.fillStyle = '#ef4444'; ctx.fillRect(-12, -25 + walk, 24, 25); ctx.fillStyle = '#3b82f6'; ctx.fillRect(-12, -10 + walk, 24, 18); ctx.fillStyle = '#fecaca'; ctx.fillRect(2, -22 + walk, 12, 12); if(p.hammer > 0) { ctx.shadowBlur = 15; ctx.shadowColor = '#fff'; ctx.font = '35px Arial'; ctx.fillText('🔨', 10, -15 + walk); } ctx.restore(); }
                if(this.gameActive) { this.update(); requestAnimationFrame(() => this.draw()); }
            }
            animate() { this.draw(); }
        }
        window.game = new DonkeySmash();
    </script>
</body>
</html>
