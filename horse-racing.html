<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Derby King Pro - K2 games</title>
    <style>
        :root {
            --turf: #15803d;
            --dirt: #92400e;
            --accent: #f59e0b;
            --glass: rgba(15, 23, 42, 0.8);
        }

        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; color: white; touch-action: none; }
        
        #ui-layer {
            position: absolute; inset: 0; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between; padding: 20px;
            z-index: 10;
        }

        .hud-top { display: flex; justify-content: space-between; }
        
        .stat-card {
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 10px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; min-width: 100px;
        }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; opacity: 0.7; letter-spacing: 1px; }
        .stat-val { font-size: 1.5rem; font-weight: 900; color: var(--accent); }

        #stamina-container {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            width: 300px; text-align: center;
        }
        #stamina-bar-bg {
            width: 100%; height: 12px; background: rgba(0,0,0,0.5);
            border: 2px solid white; border-radius: 6px; overflow: hidden; margin-top: 5px;
        }
        #stamina-bar {
            width: 100%; height: 100%; background: linear-gradient(to right, #ef4444, #eab308, #22c55e);
            transform-origin: left; transition: transform 0.1s linear;
        }
        .hud-label { font-weight: 800; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; }

        #controls-display {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; pointer-events: none;
            background: rgba(0,0,0,0.5); padding: 15px; border-radius: 20px; backdrop-filter: blur(5px);
        }
        .keys-grid { display: grid; grid-template-columns: repeat(3, 40px); gap: 4px; }
        .key-cap { 
            width: 40px; height: 40px; background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.3); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 0.8rem;
        }
        .key-cap.active { background: var(--accent); color: #000; border-color: #fff; transform: translateY(2px); }
        .key-space { width: 120px; height: 30px; margin-top: 5px; }

        #mobile-controls {
            position: absolute; bottom: 40px; left: 0; right: 0;
            display: none; justify-content: space-between; padding: 0 30px;
            pointer-events: none; z-index: 50;
        }
        @media (max-width: 1024px) { 
            #mobile-controls { display: flex; } 
            #controls-display { display: none; }
        }
        .m-btn {
            width: 80px; height: 80px; background: rgba(255,255,255,0.1);
            border: 2px solid white; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; color: white;
            font-weight: 900; pointer-events: auto; backdrop-filter: blur(5px);
        }

        #overlay {
            position: absolute; inset: 0; background: rgba(15, 23, 42, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center; padding: 30px;
        }
        h1 { font-size: 4rem; color: var(--accent); font-style: italic; font-weight: 900; line-height: 0.9; margin: 0; }
        .brief { color: #94a3b8; max-width: 400px; line-height: 1.5; margin: 20px 0; }
        .btn {
            padding: 20px 80px; font-size: 1.5rem; background: #fff; color: #000;
            border: none; border-radius: 50px; font-weight: 900; cursor: pointer;
            box-shadow: 0 10px 0 #cbd5e1; transition: all 0.1s;
        }
        .btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #cbd5e1; }

        .back-link {
            position: fixed; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 10px; z-index: 2000;
            font-weight: bold; font-size: 0.8rem; backdrop-filter: blur(5px); pointer-events: auto;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← HUB</a>

    <div id="ui-layer">
        <div class="hud-top">
            <div class="stat-card">
                <div class="stat-label">Position</div>
                <div id="pos-val" class="stat-val">1 / 6</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Distance</div>
                <div id="dist-val" class="stat-val">0m</div>
            </div>
        </div>

        <div id="stamina-container">
            <div class="hud-label">Horse Stamina</div>
            <div id="stamina-bar-bg"><div id="stamina-bar"></div></div>
        </div>

        <div id="controls-display">
            <div style="text-align: center;">
                <div class="hud-label" style="margin-bottom: 5px;">Steer</div>
                <div class="keys-grid">
                    <div></div><div></div><div></div>
                    <div class="key-cap" id="key-ArrowLeft">←</div><div></div><div class="key-cap" id="key-ArrowRight">→</div>
                </div>
            </div>
            <div style="text-align: center;">
                <div class="hud-label" style="margin-bottom: 5px;">Action</div>
                <div class="key-cap key-space" id="key-Space" style="width: 150px;">SPACE (WHIP)</div>
            </div>
        </div>
    </div>

    <div id="mobile-controls">
        <div style="display:flex; gap:10px;">
            <div class="m-btn" id="m-left">L</div>
            <div class="m-btn" id="m-right">R</div>
        </div>
        <div class="m-btn" id="m-hit" style="background:var(--accent); color:black; width:100px; height:100px;">WHIP</div>
    </div>

    <div id="overlay">
        <h1>DERBY KING<br>PRO</h1>
        <div class="brief">
            Race for the Triple Crown! <br>
            <b>LEFT/RIGHT</b> to change lanes and avoid other horses.<br>
            <b>SPACE / WHIP</b> for a burst of speed.<br>
            Manage your stamina!
        </div>
        <button class="btn" onclick="window.game.start()">ENTER GATE</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        class DerbyGame {
            constructor() {
                this.state = 'menu';
                this.trackLength = 2000;
                this.trackWidth = 24;
                this.initEngine();
                this.createTrack();
                this.createHorses();
                this.setupInput();
                
                this.loop = this.loop.bind(this);
                requestAnimationFrame(this.loop);
            }

            initEngine() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x87ceeb);
                this.scene.fog = new THREE.Fog(0x87ceeb, 100, 1000);

                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 3000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                document.body.appendChild(this.renderer.domElement);

                const sun = new THREE.DirectionalLight(0xfffae3, 1.5);
                sun.position.set(100, 400, 100);
                sun.castShadow = true;
                sun.shadow.mapSize.width = 2048;
                sun.shadow.mapSize.height = 2048;
                sun.shadow.camera.left = -600; sun.shadow.camera.right = 600;
                sun.shadow.camera.top = 600; sun.shadow.camera.bottom = -600;
                this.scene.add(sun);
                this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            createTrack() {
                // Oval Track Path
                const shape = new THREE.Shape();
                shape.moveTo(0, 0);
                shape.lineTo(0, 800);
                shape.absarc(200, 800, 200, Math.PI, 0, true);
                shape.lineTo(400, 0);
                shape.absarc(200, 0, 200, 0, Math.PI, true);

                const points = shape.getPoints(150);
                this.curve = new THREE.CatmullRomCurve3(points.map(p => new THREE.Vector3(p.x, 0, p.y)));
                this.curve.closed = true;

                // Track Geometry
                const trackGeo = new THREE.TubeGeometry(this.curve, 300, this.trackWidth, 12, true);
                const trackMat = new THREE.MeshStandardMaterial({ color: 0x92400e, roughness: 1 });
                const track = new THREE.Mesh(trackGeo, trackMat);
                track.receiveShadow = true;
                track.position.y = -this.trackWidth + 0.5;
                this.scene.add(track);

                // Turf and Surroundings
                const ground = new THREE.Mesh(new THREE.PlaneGeometry(4000, 4000), new THREE.MeshStandardMaterial({ color: 0x15803d }));
                ground.rotation.x = -Math.PI/2; ground.position.y = -this.trackWidth; ground.receiveShadow = true;
                this.scene.add(ground);

                // Fences
                const fenceMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
                for(let i=0; i<400; i++) {
                    const t = i / 400;
                    const pos = this.curve.getPointAt(t);
                    const tan = this.curve.getTangentAt(t);
                    const normal = new THREE.Vector3(-tan.z, 0, tan.x).normalize();
                    [this.trackWidth+2, -this.trackWidth-2].forEach(offset => {
                        const post = new THREE.Mesh(new THREE.BoxGeometry(0.5, 5, 0.5), fenceMat);
                        post.position.copy(pos).add(normal.clone().multiplyScalar(offset));
                        post.position.y = 2;
                        this.scene.add(post);
                    });
                }
            }

            createHorses() {
                this.horses = [];
                const jockeyColors = [0xef4444, 0x3b82f6, 0x10b981, 0xf59e0b, 0x8b5cf6, 0xec4899];
                const horseColors = [0x5c3a21, 0x3d2b1f, 0x8b4513, 0x271910, 0x7b3f00, 0x4a3728];
                
                for(let i=0; i<6; i++) {
                    const group = new THREE.Group();
                    const hMat = new THREE.MeshStandardMaterial({ color: horseColors[i] });
                    
                    const body = new THREE.Mesh(new THREE.CapsuleGeometry(1, 3, 4, 8), hMat);
                    body.rotation.z = Math.PI/2; body.position.y = 2.5;
                    const neck = new THREE.Mesh(new THREE.CapsuleGeometry(0.6, 2, 4, 8), hMat);
                    neck.position.set(1.5, 3.5, 0); neck.rotation.z = -0.5;
                    const head = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.8, 0.8), hMat);
                    head.position.set(2.2, 4.5, 0);
                    
                    const legGeo = new THREE.BoxGeometry(0.4, 2.5, 0.4);
                    const legs = [];
                    const offsets = [[1.2, 0.5], [1.2, -0.5], [-1.2, 0.5], [-1.2, -0.5]];
                    offsets.forEach(off => {
                        const leg = new THREE.Mesh(legGeo, hMat);
                        leg.position.set(off[0], 1.2, off[1]);
                        group.add(leg); legs.push(leg);
                    });
                    
                    const jMat = new THREE.MeshStandardMaterial({ color: jockeyColors[i] });
                    const jBody = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.8), jMat); jBody.position.set(0, 4, 0);
                    const jHead = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({ color: 0xffdbac })); jHead.position.set(0, 4.8, 0);
                    const helmet = new THREE.Mesh(new THREE.SphereGeometry(0.42, 8, 8, 0, Math.PI*2, 0, Math.PI/2), jMat); helmet.position.set(0, 4.8, 0);

                    group.add(body, neck, head, jBody, jHead, helmet);
                    group.castShadow = true; this.scene.add(group);

                    this.horses.push({
                        mesh: group, legs, progress: 0,
                        lane: (i - 2.5) * 3.5, speed: 0, stamina: 100,
                        isPlayer: i === 3, rank: i + 1, whipCooldown: 0, gallopPhase: Math.random() * 10
                    });
                }
                this.player = this.horses.find(h => h.isPlayer);
            }

            setupInput() {
                this.keys = {};
                window.onkeydown = e => { this.keys[e.code] = true; this.updateKeyViz(e.code, true); };
                window.onkeyup = e => { this.keys[e.code] = false; this.updateKeyViz(e.code, false); };
                const bind = (id, key) => {
                    const el = document.getElementById(id);
                    el.ontouchstart = (e) => { e.preventDefault(); this.keys[key] = true; this.updateKeyViz(key, true); };
                    el.ontouchend = (e) => { e.preventDefault(); this.keys[key] = false; this.updateKeyViz(key, false); };
                };
                bind('m-left', 'ArrowLeft'); bind('m-right', 'ArrowRight'); bind('m-hit', 'Space');
            }

            updateKeyViz(code, active) {
                const el = document.getElementById('key-' + code);
                if(el) active ? el.classList.add('active') : el.classList.remove('active');
            }

            start() { this.state = 'playing'; document.getElementById('overlay').style.display = 'none'; }

            update(dt) {
                if(this.state === 'menu') return;

                this.horses.forEach(h => {
                    if (this.state === 'over') { h.speed *= 0.98; return; }

                    if (h.isPlayer) {
                        const isWhipping = this.keys['Space'];
                        if (isWhipping && h.stamina > 0 && h.whipCooldown <= 0) {
                            h.speed += 0.0006; h.stamina -= 2.5; h.whipCooldown = 12;
                        }
                        if (!isWhipping) h.stamina = Math.min(100, h.stamina + 0.12);
                        if (h.whipCooldown > 0) h.whipCooldown--;

                        // Lateral movement
                        if (this.keys['ArrowLeft']) h.lane += 0.2;
                        if (this.keys['ArrowRight']) h.lane -= 0.2;
                        h.lane = THREE.MathUtils.clamp(h.lane, -this.trackWidth+5, this.trackWidth-5);
                    } else {
                        const distToEnd = 1 - h.progress;
                        if (h.stamina > 20 && (distToEnd < 0.25 || Math.random() < 0.015)) {
                            h.speed += 0.00045; h.stamina -= 1.8;
                        } else { h.stamina = Math.min(100, h.stamina + 0.18); }
                        // AI wanders
                        h.lane += Math.sin(Date.now()*0.001 + h.mesh.id) * 0.05;
                    }

                    h.speed = Math.max(0.0015, h.speed * 0.988);
                    h.speed = Math.min(0.0075, h.speed);
                    h.progress += h.speed * dt * 60;

                    // Animation
                    h.gallopPhase += h.speed * 350;
                    h.mesh.position.y = Math.abs(Math.sin(h.gallopPhase)) * 0.4;
                    h.mesh.rotation.x = Math.sin(h.gallopPhase) * 0.15;
                    h.legs.forEach((l, i) => { l.rotation.z = Math.sin(h.gallopPhase + (i < 2 ? 0 : Math.PI)) * 0.9; });

                    const p = this.curve.getPointAt(h.progress % 1);
                    const t = this.curve.getTangentAt(h.progress % 1);
                    const n = new THREE.Vector3(-t.z, 0, t.x).normalize();
                    const finalPos = p.add(n.multiplyScalar(h.lane));
                    h.mesh.position.set(finalPos.x, finalPos.y + h.mesh.position.y, finalPos.z);
                    h.mesh.lookAt(finalPos.clone().add(t));

                    if (h.progress >= 1 && this.state !== 'over') if (h.isPlayer) this.endRace(h.rank);
                });

                const sorted = [...this.horses].sort((a,b) => b.progress - a.progress);
                sorted.forEach((h, i) => h.rank = i + 1);

                // Camera follow
                const camOff = this.curve.getTangentAt(this.player.progress % 1).negate().multiplyScalar(25);
                this.camera.position.lerp(this.player.mesh.position.clone().add(camOff).add(new THREE.Vector3(0, 18, 0)), 0.1);
                this.camera.lookAt(this.player.mesh.position.clone().add(new THREE.Vector3(0,5,0)));

                this.updateUI();
            }

            updateUI() {
                document.getElementById('pos-val').textContent = `${this.player.rank} / 6`;
                document.getElementById('dist-val').textContent = Math.floor(this.player.progress * this.trackLength) + "m";
                document.getElementById('stamina-bar').style.transform = `scaleX(${this.player.stamina / 100})`;
            }

            endRace(rank) {
                this.state = 'over'; document.getElementById('overlay').style.display = 'flex';
                document.querySelector('h1').textContent = rank === 1 ? "VICTORY!" : "FINISHED";
                document.querySelector('.brief').innerHTML = `You placed #${rank}!<br>The crowd is going wild.`;
                document.querySelector('.btn').textContent = "RACE AGAIN";
            }

            loop() { this.update(0.016); this.renderer.render(this.scene, this.camera); requestAnimationFrame(this.loop); }
        }
        window.game = new DerbyGame();
    </script>
</body>
</html>
