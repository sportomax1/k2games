<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>8-Bit Derby Dash - K2 games</title>
    <style>
        :root {
            --sky: #8ed7ff;
            --ink: #101923;
            --panel: rgba(12, 18, 29, 0.84);
            --line: rgba(255, 255, 255, 0.18);
            --rose: #ff6b83;
            --gold: #ffd166;
            --mint: #5effc7;
            --blue: #65c7ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #060911;
            color: white;
            font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
        }

        #app {
            position: fixed;
            inset: 0;
            overflow: hidden;
            background: linear-gradient(#8ed7ff 0%, #d8f5ff 58%, #3b9451 58%, #1e5f38 100%);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        .back-link {
            position: fixed;
            top: calc(14px + env(safe-area-inset-top, 0px));
            left: 14px;
            z-index: 40;
            padding: 8px 12px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: rgba(8, 13, 20, 0.72);
            color: white;
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 1000;
            letter-spacing: 0.08em;
        }

        #hud {
            position: fixed;
            inset: calc(14px + env(safe-area-inset-top, 0px)) 14px auto 92px;
            z-index: 30;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            pointer-events: none;
        }

        .cluster {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .panel {
            min-width: 98px;
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
        }

        .brand {
            min-width: 190px;
            border-color: rgba(255, 209, 102, 0.38);
        }

        .label {
            display: block;
            color: rgba(255, 255, 255, 0.64);
            font-size: 0.62rem;
            font-weight: 900;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .value {
            margin-top: 4px;
            color: white;
            font-size: 1.38rem;
            line-height: 1;
            font-weight: 1000;
        }

        .brand .value {
            color: var(--gold);
            font-size: 1.45rem;
        }

        .gold { color: var(--gold); }
        .mint { color: var(--mint); }
        .rose { color: var(--rose); }

        #meters {
            position: fixed;
            left: 50%;
            bottom: calc(18px + env(safe-area-inset-bottom, 0px));
            z-index: 32;
            width: min(470px, calc(100% - 28px));
            transform: translateX(-50%);
            display: grid;
            gap: 8px;
            pointer-events: none;
        }

        .meter-row {
            display: grid;
            grid-template-columns: 82px 1fr 50px;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(8, 13, 20, 0.78);
            color: rgba(255, 255, 255, 0.72);
            font-size: 0.68rem;
            font-weight: 1000;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .meter {
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.34);
            background: rgba(0, 0, 0, 0.34);
            overflow: hidden;
        }

        .fill {
            width: 100%;
            height: 100%;
            transform-origin: left;
            transform: scaleX(1);
            background: linear-gradient(90deg, #ff6b83, #ffd166, #5effc7);
        }

        #toast {
            position: fixed;
            left: 50%;
            top: 44%;
            z-index: 35;
            transform: translate(-50%, -50%) scale(0.8);
            color: white;
            font-size: clamp(2.1rem, 8vw, 5.8rem);
            line-height: 0.9;
            font-weight: 1000;
            text-align: center;
            text-shadow: 0 7px 0 #101923, 0 0 26px rgba(255, 209, 102, 0.52);
            opacity: 0;
            pointer-events: none;
        }

        #toast.show {
            animation: toast 1.35s ease-out forwards;
        }

        @keyframes toast {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.72); }
            18% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
            72% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.18); }
        }

        #overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22px;
            background: linear-gradient(180deg, rgba(7, 11, 18, 0.82), rgba(7, 11, 18, 0.94));
        }

        .modal {
            width: min(520px, 100%);
            padding: 24px;
            border: 2px solid rgba(255, 209, 102, 0.34);
            border-radius: 8px;
            background: rgba(12, 18, 29, 0.9);
            text-align: center;
            box-shadow: 0 22px 70px rgba(0, 0, 0, 0.42);
        }

        h1 {
            color: var(--gold);
            font-size: clamp(2.6rem, 12vw, 5.8rem);
            line-height: 0.82;
            font-weight: 1000;
            letter-spacing: 0;
            text-transform: uppercase;
            text-shadow: 0 7px 0 #4a260f;
        }

        .brief {
            margin: 18px auto 20px;
            max-width: 430px;
            color: rgba(255, 255, 255, 0.78);
            font-size: 0.96rem;
            line-height: 1.45;
        }

        .btn {
            width: min(330px, 100%);
            height: 62px;
            border: 0;
            border-radius: 8px;
            background: white;
            color: #101923;
            box-shadow: 0 8px 0 #9ca3af;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 1000;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #9ca3af;
        }

        #touch {
            position: fixed;
            inset: auto 16px calc(88px + env(safe-area-inset-bottom, 0px)) 16px;
            z-index: 34;
            display: none;
            justify-content: space-between;
            pointer-events: none;
        }

        .pad,
        .actions {
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }

        .touch-btn {
            width: 68px;
            height: 68px;
            border: 2px solid rgba(255, 255, 255, 0.72);
            border-radius: 8px;
            background: rgba(8, 13, 20, 0.72);
            color: white;
            font-size: 1.08rem;
            font-weight: 1000;
        }

        .touch-btn.primary {
            width: 94px;
            background: var(--gold);
            color: #101923;
            border-color: white;
        }

        @media (max-width: 900px) {
            #hud { inset-right: 10px; gap: 8px; }
            .brand { display: none; }
            .panel { min-width: 82px; padding: 8px 9px; }
            .value { font-size: 1.08rem; }
            #touch { display: flex; }
            #meters { bottom: calc(10px + env(safe-area-inset-bottom, 0px)); }
        }
    </style>

</head>
<body>
    <div id="app"></div>
    <a href="index.html" class="back-link">HUB</a>

    <div id="hud">
        <div class="cluster">
            <div class="panel brand">
                <span class="label">8-Bit Derby</span>
                <div class="value">Dash</div>
            </div>
            <div class="panel">
                <span class="label">Place</span>
                <div id="place" class="value gold">1/8</div>
            </div>
            <div class="panel">
                <span class="label">Lane</span>
                <div id="lane" class="value">4</div>
            </div>
        </div>
        <div class="cluster">
            <div class="panel">
                <span class="label">Speed</span>
                <div id="speed" class="value mint">0</div>
            </div>
            <div class="panel">
                <span class="label">Furlong</span>
                <div id="distance" class="value">0/8</div>
            </div>
        </div>
    </div>

    <div id="meters">
        <div class="meter-row">
            <span>Stamina</span>
            <div class="meter"><div id="stamina-fill" class="fill"></div></div>
            <b id="stamina-label">100</b>
        </div>
    </div>

    <div id="touch">
        <div class="pad">
            <button class="touch-btn" data-key="ArrowLeft">L</button>
            <button class="touch-btn" data-key="ArrowRight">R</button>
        </div>
        <div class="actions">
            <button class="touch-btn" data-key="ArrowDown">EASE</button>
            <button class="touch-btn primary" data-key="Space">GO</button>
        </div>
    </div>

    <div id="toast"></div>

    <div id="overlay">
        <div class="modal">
            <h1 id="title">Derby Dash</h1>
            <div id="brief" class="brief">A chunky 3D sprint with crowded lanes, stamina bursts, grandstands, and a photo-finish charge.</div>
            <button id="start" class="btn">Enter Gate</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from "three";

        const TAU = Math.PI * 2;
        const clamp = THREE.MathUtils.clamp;
        const lerp = THREE.MathUtils.lerp;

        class DerbyDash {
            constructor() {
                this.state = "menu";
                this.trackHalfWidth = 28;
                this.trackLength = 1.12;
                this.keys = {};
                this.horses = [];
                this.lastTime = performance.now();
                this.rumble = 0;
                this.ui = {
                    place: document.getElementById("place"),
                    lane: document.getElementById("lane"),
                    speed: document.getElementById("speed"),
                    distance: document.getElementById("distance"),
                    staminaFill: document.getElementById("stamina-fill"),
                    staminaLabel: document.getElementById("stamina-label"),
                    overlay: document.getElementById("overlay"),
                    title: document.getElementById("title"),
                    brief: document.getElementById("brief"),
                    start: document.getElementById("start"),
                    toast: document.getElementById("toast")
                };

                this.initThree();
                this.createWorld();
                this.createHorses();
                this.bindInput();
                this.ui.start.addEventListener("click", () => this.start());
                requestAnimationFrame((time) => this.loop(time));
            }

            initThree() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x8ed7ff);
                this.scene.fog = new THREE.Fog(0x8ed7ff, 220, 1050);

                this.camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.1, 1800);
                this.renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
                this.renderer.setSize(innerWidth, innerHeight);
                this.renderer.setPixelRatio(1);
                this.renderer.shadowMap.enabled = false;
                document.getElementById("app").appendChild(this.renderer.domElement);

                this.scene.add(new THREE.HemisphereLight(0xe6fbff, 0x3c2a1b, 1.75));
                const sun = new THREE.DirectionalLight(0xfff1b3, 2.25);
                sun.position.set(-110, 300, 150);
                sun.castShadow = true;
                sun.shadow.mapSize.set(1024, 1024);
                sun.shadow.camera.left = -520;
                sun.shadow.camera.right = 520;
                sun.shadow.camera.top = 520;
                sun.shadow.camera.bottom = -520;
                this.scene.add(sun);

                window.addEventListener("resize", () => {
                    this.camera.aspect = innerWidth / innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(innerWidth, innerHeight);
                    this.renderer.setPixelRatio(1);
                });
            }

            makePixelTexture(colors, size = 64) {
                const canvas = document.createElement("canvas");
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext("2d");
                for (let y = 0; y < size; y += 4) {
                    for (let x = 0; x < size; x += 4) {
                        const n = (x * 11 + y * 23 + ((x ^ y) * 5)) % colors.length;
                        ctx.fillStyle = colors[n];
                        ctx.fillRect(x, y, 4, 4);
                    }
                }
                const tex = new THREE.CanvasTexture(canvas);
                tex.magFilter = THREE.NearestFilter;
                tex.minFilter = THREE.NearestFilter;
                tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                tex.repeat.set(10, 10);
                return tex;
            }

            mat(color, extra = {}) {
                return new THREE.MeshStandardMaterial({
                    color,
                    roughness: 0.84,
                    metalness: 0.02,
                    flatShading: true,
                    ...extra
                });
            }

            createWorld() {
                this.materials = {
                    dirt: this.mat(0xb97832, { map: this.makePixelTexture(["#b97832", "#8a461d", "#d89545", "#6e3717"]) }),
                    turf: this.mat(0x2f9350, { map: this.makePixelTexture(["#2f9350", "#20733f", "#48aa5c", "#2b7941"]) }),
                    rail: this.mat(0xf8fafc),
                    red: this.mat(0xff5f76),
                    blue: this.mat(0x65c7ff),
                    gold: this.mat(0xffcc55),
                    black: this.mat(0x101923),
                    wood: this.mat(0x754326),
                    shadow: new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.22, depthWrite: false })
                };

                const ground = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000, 18, 18), this.materials.turf);
                ground.rotation.x = -Math.PI / 2;
                ground.receiveShadow = true;
                this.scene.add(ground);

                const pts = [];
                const straight = 420;
                const radius = 130;
                for (let i = 0; i < 64; i++) pts.push(new THREE.Vector3(-radius, 0, -straight / 2 + (i / 63) * straight));
                for (let i = 0; i < 64; i++) {
                    const a = Math.PI + (i / 63) * Math.PI;
                    pts.push(new THREE.Vector3(Math.cos(a) * radius, 0, straight / 2 + Math.sin(a) * radius));
                }
                for (let i = 0; i < 64; i++) pts.push(new THREE.Vector3(radius, 0, straight / 2 - (i / 63) * straight));
                for (let i = 0; i < 64; i++) {
                    const a = (i / 63) * Math.PI;
                    pts.push(new THREE.Vector3(Math.cos(a) * radius, 0, -straight / 2 + Math.sin(a) * -radius));
                }
                this.curve = new THREE.CatmullRomCurve3(pts, true, "catmullrom", 0.08);

                this.createTrackTiles();
                this.createRails();
                this.createGrandstand();
                this.createFinish();
            }

            createTrackTiles() {
                const trackGeo = new THREE.BoxGeometry(58, 1.05, 14);
                const stripeGeo = new THREE.BoxGeometry(1.1, 1.12, 12);
                for (let i = 0; i < 300; i++) {
                    const t = i / 300;
                    const p = this.curve.getPointAt(t);
                    const tangent = this.curve.getTangentAt(t);
                    const yaw = Math.atan2(tangent.x, tangent.z);
                    const normal = new THREE.Vector3(tangent.z, 0, -tangent.x).normalize();

                    const tile = new THREE.Mesh(trackGeo, this.materials.dirt);
                    tile.position.copy(p);
                    tile.position.y = 0.08;
                    tile.rotation.y = yaw;
                    tile.receiveShadow = true;
                    this.scene.add(tile);

                    if (i % 4 === 0) {
                        for (let lane = -3; lane <= 3; lane++) {
                            const stripe = new THREE.Mesh(stripeGeo, this.materials.rail);
                            stripe.position.copy(p).add(normal.clone().multiplyScalar(lane * 7));
                            stripe.position.y = 0.72;
                            stripe.rotation.y = yaw;
                            stripe.receiveShadow = true;
                            this.scene.add(stripe);
                        }
                    }
                }
            }

            createRails() {
                const postGeo = new THREE.BoxGeometry(1.6, 8, 1.6);
                const railGeo = new THREE.BoxGeometry(2.2, 2, 16);
                for (let i = 0; i < 160; i++) {
                    const t = i / 160;
                    const p = this.curve.getPointAt(t);
                    const tangent = this.curve.getTangentAt(t);
                    const yaw = Math.atan2(tangent.x, tangent.z);
                    const normal = new THREE.Vector3(tangent.z, 0, -tangent.x).normalize();
                    [-1, 1].forEach((side) => {
                        const pos = p.clone().add(normal.clone().multiplyScalar(side * (this.trackHalfWidth + 6)));
                        const post = new THREE.Mesh(postGeo, this.materials.rail);
                        const rail = new THREE.Mesh(railGeo, this.materials.rail);
                        post.position.set(pos.x, 4, pos.z);
                        rail.position.set(pos.x, 7, pos.z);
                        rail.rotation.y = yaw;
                        post.castShadow = rail.castShadow = true;
                        this.scene.add(post, rail);
                    });
                }
            }

            createGrandstand() {
                const stand = new THREE.Group();
                const base = new THREE.Mesh(new THREE.BoxGeometry(260, 20, 42), this.materials.wood);
                base.position.set(0, 10, 360);
                const roof = new THREE.Mesh(new THREE.BoxGeometry(290, 12, 52), this.materials.red);
                roof.position.set(0, 40, 352);
                stand.add(base, roof);
                for (let row = 0; row < 4; row++) {
                    for (let col = 0; col < 22; col++) {
                        const color = [this.materials.gold, this.materials.blue, this.materials.red, this.materials.rail][(row + col) % 4];
                        const fan = new THREE.Mesh(new THREE.BoxGeometry(7, 7, 4), color);
                        fan.position.set(-118 + col * 11, 23 + row * 5, 336 + row * 6);
                        stand.add(fan);
                    }
                }
                stand.traverse((n) => {
                    if (n.isMesh) {
                        n.castShadow = true;
                        n.receiveShadow = true;
                    }
                });
                this.scene.add(stand);

                for (let i = 0; i < 30; i++) {
                    const marker = new THREE.Mesh(new THREE.BoxGeometry(8, 14, 3), i % 2 ? this.materials.gold : this.materials.blue);
                    marker.position.set(-290 + i * 20, 8, 306 + (i % 3) * 8);
                    marker.castShadow = true;
                    this.scene.add(marker);
                }
            }

            createFinish() {
                const arch = new THREE.Group();
                const postGeo = new THREE.BoxGeometry(4, 42, 4);
                const beamGeo = new THREE.BoxGeometry(78, 8, 5);
                const postA = new THREE.Mesh(postGeo, this.materials.rail);
                const postB = postA.clone();
                const beam = new THREE.Mesh(beamGeo, this.materials.gold);
                postA.position.set(-38, 21, 0);
                postB.position.set(38, 21, 0);
                beam.position.set(0, 42, 0);
                arch.add(postA, postB, beam);
                const p = this.curve.getPointAt(0);
                const tangent = this.curve.getTangentAt(0);
                arch.position.copy(p);
                arch.rotation.y = Math.atan2(tangent.x, tangent.z) + Math.PI / 2;
                arch.traverse((n) => n.isMesh && (n.castShadow = true));
                this.scene.add(arch);
            }

            createHorse(bodyColor, jockeyColor) {
                const group = new THREE.Group();
                const bodyMat = this.mat(bodyColor);
                const jockeyMat = this.mat(jockeyColor);
                const skinMat = this.mat(0xf2bf8a);
                const maneMat = this.mat(0x15100e);

                const shadow = new THREE.Mesh(new THREE.CircleGeometry(6.4, 8), this.materials.shadow);
                shadow.rotation.x = -Math.PI / 2;
                shadow.position.y = 0.05;
                group.add(shadow);

                const body = new THREE.Mesh(new THREE.BoxGeometry(8.5, 4.2, 3.2), bodyMat);
                body.position.y = 6.2;
                const chest = new THREE.Mesh(new THREE.BoxGeometry(3.5, 4.6, 3.4), bodyMat);
                chest.position.set(4.7, 6.4, 0);
                const neck = new THREE.Mesh(new THREE.BoxGeometry(2.2, 5.8, 2.5), bodyMat);
                neck.position.set(6, 9.2, 0);
                neck.rotation.z = -0.38;
                const head = new THREE.Mesh(new THREE.BoxGeometry(3.8, 2.4, 2.6), bodyMat);
                head.position.set(8.4, 11.6, 0);
                const mane = new THREE.Mesh(new THREE.BoxGeometry(0.8, 5.4, 2.8), maneMat);
                mane.position.set(4.9, 10.1, 0);
                mane.rotation.z = -0.34;
                const tail = new THREE.Mesh(new THREE.BoxGeometry(1.2, 5, 1.2), maneMat);
                tail.position.set(-5.2, 6.8, 0);
                tail.rotation.z = 0.55;

                const legGeo = new THREE.BoxGeometry(1.1, 5.8, 1.1);
                const legs = [];
                [[3.6, 1.1], [3.6, -1.1], [-3.4, 1.1], [-3.4, -1.1]].forEach(([x, z]) => {
                    const leg = new THREE.Mesh(legGeo, bodyMat);
                    leg.position.set(x, 2.7, z);
                    group.add(leg);
                    legs.push(leg);
                });

                const saddle = new THREE.Mesh(new THREE.BoxGeometry(4.4, 0.8, 3.6), this.materials.black);
                saddle.position.set(-0.4, 8.7, 0);
                const jockey = new THREE.Mesh(new THREE.BoxGeometry(2.5, 3.2, 2), jockeyMat);
                jockey.position.set(0.2, 11.1, 0);
                jockey.rotation.z = -0.32;
                const headJ = new THREE.Mesh(new THREE.BoxGeometry(1.45, 1.45, 1.45), skinMat);
                headJ.position.set(1.05, 13.5, 0);
                const helmet = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.75, 1.8), jockeyMat);
                helmet.position.set(1.05, 14.15, 0);

                group.add(body, chest, neck, head, mane, tail, saddle, jockey, headJ, helmet);
                group.userData = { legs, body, jockey, tail, shadow };
                group.traverse((n) => {
                    if (n.isMesh && n.material !== this.materials.shadow) {
                        n.castShadow = true;
                        n.receiveShadow = true;
                    }
                });
                return group;
            }

            createHorses() {
                const bodies = [0x653719, 0x3f2818, 0x8a5529, 0x201610, 0x9f652e, 0x4b3525, 0x74401e, 0xd2a35a];
                const silks = [0xff5f76, 0x65c7ff, 0x5effc7, 0xffcc55, 0xa78bfa, 0xffffff, 0xf97316, 0x38bdf8];
                for (let i = 0; i < 8; i++) {
                    const mesh = this.createHorse(bodies[i], silks[i]);
                    this.scene.add(mesh);
                    this.horses.push({
                        mesh,
                        progress: -i * 0.0045,
                        speed: 0.003 + i * 0.00008,
                        stamina: 100,
                        lane: i - 3.5,
                        targetLane: i - 3.5,
                        rank: i + 1,
                        isPlayer: i === 3,
                        stride: Math.random() * TAU,
                        kickCooldown: 0,
                        finished: false
                    });
                }
                this.player = this.horses.find((h) => h.isPlayer);
            }

            bindInput() {
                window.addEventListener("keydown", (event) => {
                    const code = this.mapKey(event.code);
                    this.keys[code] = true;
                    if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Space"].includes(code)) event.preventDefault();
                });
                window.addEventListener("keyup", (event) => {
                    const code = this.mapKey(event.code);
                    this.keys[code] = false;
                    if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Space"].includes(code)) event.preventDefault();
                });
                document.querySelectorAll("[data-key]").forEach((button) => {
                    const code = button.dataset.key;
                    const down = (event) => {
                        event.preventDefault();
                        this.keys[code] = true;
                    };
                    const up = (event) => {
                        event.preventDefault();
                        this.keys[code] = false;
                    };
                    button.addEventListener("pointerdown", down);
                    button.addEventListener("pointerup", up);
                    button.addEventListener("pointercancel", up);
                    button.addEventListener("pointerleave", up);
                });
            }

            mapKey(code) {
                const map = {
                    KeyA: "ArrowLeft",
                    KeyD: "ArrowRight",
                    KeyW: "Space",
                    ArrowUp: "Space",
                    KeyS: "ArrowDown"
                };
                return map[code] || code;
            }

            start() {
                this.resetRace();
                this.state = "race";
                this.ui.overlay.style.display = "none";
                this.flash("GATES OPEN");
            }

            resetRace() {
                this.horses.forEach((h, i) => {
                    h.progress = -i * 0.0045;
                    h.speed = 0.003 + i * 0.00008;
                    h.stamina = 100;
                    h.lane = i - 3.5;
                    h.targetLane = i - 3.5;
                    h.rank = i + 1;
                    h.finished = false;
                    h.kickCooldown = 0;
                });
            }

            updateHorse(h, dt, index) {
                if (h.finished) {
                    h.speed *= 0.96;
                    return;
                }

                if (h.isPlayer) {
                    if (this.keys.ArrowLeft) h.targetLane += 0.07 * dt;
                    if (this.keys.ArrowRight) h.targetLane -= 0.07 * dt;
                    const urge = this.keys.Space && h.stamina > 1;
                    const ease = this.keys.ArrowDown;
                    if (urge) {
                        h.speed += 0.00022 * dt;
                        h.stamina = Math.max(0, h.stamina - 0.56 * dt);
                        h.kickCooldown = 8;
                        this.rumble = Math.min(1, this.rumble + 0.03);
                    } else {
                        h.stamina = Math.min(100, h.stamina + (ease ? 0.38 : 0.18) * dt);
                    }
                    if (ease) h.speed -= 0.00009 * dt;
                } else {
                    const stretch = h.progress > 0.72 ? 0.00035 : 0.00013;
                    if (h.stamina > 16 && Math.random() < (h.progress > 0.62 ? 0.08 : 0.035) * dt) {
                        h.speed += stretch * dt;
                        h.stamina -= 0.42 * dt;
                    } else {
                        h.stamina = Math.min(100, h.stamina + 0.16 * dt);
                    }
                    h.targetLane += Math.sin(performance.now() * 0.001 + index * 2.1) * 0.011 * dt;
                }

                h.targetLane = clamp(h.targetLane, -3.65, 3.65);
                h.lane = lerp(h.lane, h.targetLane, 0.16);

                const edgePenalty = Math.abs(h.lane) > 3.35 ? 0.00009 * dt : 0;
                h.speed = clamp((h.speed - edgePenalty) * (1 - 0.0018 * dt), 0.0018, 0.0082);

                this.horses.forEach((other) => {
                    if (other === h) return;
                    const closeTrack = Math.abs(other.progress - h.progress) < 0.014;
                    const closeLane = Math.abs(other.lane - h.lane) < 0.48;
                    if (closeTrack && closeLane) {
                        h.speed *= 0.988;
                        if (h.isPlayer) this.rumble = Math.min(1, this.rumble + 0.08);
                    }
                });

                h.progress += h.speed * dt;
                if (h.progress >= this.trackLength && !h.finished) {
                    h.finished = true;
                    if (h.isPlayer) this.finishRace();
                }

                const loopProgress = ((h.progress % 1) + 1) % 1;
                const p = this.curve.getPointAt(loopProgress);
                const tangent = this.curve.getTangentAt(loopProgress);
                const normal = new THREE.Vector3(tangent.z, 0, -tangent.x).normalize();
                const laneOffset = h.lane * 7;
                const pos = p.add(normal.clone().multiplyScalar(laneOffset));
                const next = pos.clone().add(tangent.clone().multiplyScalar(16));

                h.stride += h.speed * dt * 1250;
                const bounce = Math.abs(Math.sin(h.stride)) * 1.1;
                h.mesh.position.set(pos.x, bounce, pos.z);
                h.mesh.lookAt(next);
                h.mesh.rotation.z = lerp(h.mesh.rotation.z, (h.targetLane - h.lane) * -0.12, 0.16);
                h.mesh.userData.body.rotation.z = Math.sin(h.stride) * 0.035;
                h.mesh.userData.jockey.rotation.z = -0.32 + Math.sin(h.stride + 1.2) * 0.05;
                h.mesh.userData.tail.rotation.z = 0.55 + Math.sin(h.stride * 0.5) * 0.28;
                h.mesh.userData.shadow.scale.setScalar(1 - bounce * 0.035);
                h.mesh.userData.legs.forEach((leg, i) => {
                    const side = i < 2 ? 0 : Math.PI;
                    leg.rotation.z = Math.sin(h.stride + side) * 0.62;
                    leg.position.y = 2.7 + Math.max(0, Math.sin(h.stride + side)) * 0.45;
                });
            }

            finishRace() {
                if (this.state === "over") return;
                this.state = "over";
                this.rankHorses();
                this.ui.overlay.style.display = "flex";
                this.ui.title.textContent = this.player.rank === 1 ? "Crown Won!" : "Photo Finish";
                this.ui.brief.textContent = "You placed " + this.player.rank + " of 8 after the final furlong.";
                this.ui.start.textContent = "Race Again";
            }

            rankHorses() {
                [...this.horses].sort((a, b) => b.progress - a.progress).forEach((h, i) => {
                    h.rank = i + 1;
                });
            }

            updateCamera(dt) {
                const h = this.player;
                const p = h.mesh.position.clone();
                const tangent = this.curve.getTangentAt(((h.progress % 1) + 1) % 1);
                const normal = new THREE.Vector3(tangent.z, 0, -tangent.x).normalize();
                const side = normal.multiplyScalar(-10);
                const chase = p.clone()
                    .add(tangent.clone().multiplyScalar(-54 - h.speed * 2600))
                    .add(side)
                    .add(new THREE.Vector3(0, 31 + h.speed * 900, 0));
                const shake = this.rumble * 0.8;
                chase.x += (Math.random() - 0.5) * shake;
                chase.y += (Math.random() - 0.5) * shake;
                this.camera.position.lerp(chase, 1 - Math.pow(0.001, dt / 16.67));
                this.camera.lookAt(p.clone().add(new THREE.Vector3(0, 10, 0)).add(tangent.multiplyScalar(18)));
                this.rumble = Math.max(0, this.rumble - 0.032 * dt);
            }

            updateUI() {
                this.ui.place.textContent = this.player.rank + "/8";
                this.ui.lane.textContent = clamp(Math.round(4.5 - this.player.lane), 1, 8);
                this.ui.speed.textContent = Math.round(this.player.speed * 12800);
                this.ui.distance.textContent = Math.min(8, Math.floor((this.player.progress / this.trackLength) * 8)) + "/8";
                this.ui.staminaFill.style.transform = "scaleX(" + this.player.stamina / 100 + ")";
                this.ui.staminaLabel.textContent = Math.round(this.player.stamina);
            }

            flash(text) {
                this.ui.toast.textContent = text;
                this.ui.toast.classList.remove("show");
                void this.ui.toast.offsetWidth;
                this.ui.toast.classList.add("show");
            }

            loop(time) {
                const dt = clamp((time - this.lastTime) / 16.67, 0.25, 2.25);
                this.lastTime = time;
                if (this.state !== "menu") {
                    this.horses.forEach((h, i) => this.updateHorse(h, dt, i));
                    this.rankHorses();
                    this.updateCamera(dt);
                    this.updateUI();
                } else {
                    this.camera.position.lerp(new THREE.Vector3(-105, 102, 190), 0.03);
                    this.camera.lookAt(0, 8, 18);
                }
                this.renderer.render(this.scene, this.camera);
                requestAnimationFrame((next) => this.loop(next));
            }
        }

        window.game = new DerbyDash();
    </script>
</body>
</html>
