<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper</title>
    <style>
        body { font-family: sans-serif; background: #cbd5e1; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr); gap: 2px; background: #94a3b8; padding: 2px; border: 4px solid #64748b; width: 90vmin; height: 90vmin; max-width: 500px; max-height: 500px; }
        .cell { width: 100%; height: 100%; background: #e2e8f0; border: 1px solid #cbd5e1; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; user-select: none; font-size: 4vmin; }
        .cell.cursor { outline: 4px solid #fbbf24; z-index: 10; transform: scale(1.1); }
        .cell.revealed { background: #f1f5f9; border: none; }
        .cell.mine { background: #ef4444; }
        .cell.flag::after { content: '🚩'; font-size: 0.8rem; }
        .back { margin-top: 20px; text-decoration: none; color: #475569; }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-CCZ9JJGEDP');
</script>
</head>
<body>
    <h1>Minesweeper</h1>
    <div id="grid" class="grid"></div>
    <button onclick="location.reload()" style="margin-top:20px; padding:8px 16px;">Reset</button>
    <a href="index.html" class="back">← HUB</a>

    <script>
        const SIZE = 10, MINES = 12;
        let board = [], revealed = 0;

        function init() {
            const grid = document.getElementById('grid');
            for(let i=0; i<SIZE*SIZE; i++) {
                board[i] = { mine: false, revealed: false, flag: false, count: 0 };
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = i;
                cell.onclick = () => reveal(i);
                cell.oncontextmenu = (e) => { e.preventDefault(); toggleFlag(i); };
                grid.appendChild(cell);
            }
            for(let i=0; i<MINES; i++) {
                let r; do { r = Math.floor(Math.random()*(SIZE*SIZE)); } while(board[r].mine);
                board[r].mine = true;
            }
            for(let i=0; i<SIZE*SIZE; i++) {
                if(board[i].mine) continue;
                let c = 0;
                getAdj(i).forEach(j => { if(board[j].mine) c++; });
                board[i].count = c;
            }
        }

        function getAdj(i) {
            let res = [], r = Math.floor(i/SIZE), c = i%SIZE;
            for(let dr=-1; dr<=1; dr++) for(let dc=-1; dc<=1; dc++) {
                let nr=r+dr, nc=c+dc;
                if(nr>=0 && nr<SIZE && nc>=0 && nc<SIZE && !(dr===0 && dc===0)) res.push(nr*SIZE+nc);
            }
            return res;
        }

        function reveal(i) {
            if(board[i].revealed || board[i].flag) return;
            board[i].revealed = true;
            const el = document.getElementById(i);
            el.classList.add('revealed');
            
            if(board[i].mine) {
                el.classList.add('mine'); el.textContent = '💣';
                alert("Game Over!"); location.reload(); return;
            }
            
            if(board[i].count > 0) el.textContent = board[i].count;
            else getAdj(i).forEach(reveal);
            
            revealed++;
            if(revealed === SIZE*SIZE - MINES) alert("Victory!");
        }

        function toggleFlag(i) {
            if(board[i].revealed) return;
            board[i].flag = !board[i].flag;
            document.getElementById(i).classList.toggle('flag');
        }

        init();

        // Gamepad Adapter (Virtual Cursor)
        (function() {
            let cursor = 0;
            let lastP = 0;
            function poll() {
                const pads = navigator.getGamepads();
                if (pads[0]) {
                    const p = pads[0]; const now = Date.now();
                    document.querySelectorAll('.cell').forEach(c => c.classList.remove('cursor'));
                    document.getElementById(cursor).classList.add('cursor');

                    if (now - lastP > 180) {
                        const b = p.buttons;
                        const axes = p.axes;
                        if (axes[1] < -0.5 || b[12].pressed) if(cursor >= SIZE) cursor -= SIZE;
                        if (axes[1] > 0.5 || b[13].pressed) if(cursor < SIZE*(SIZE-1)) cursor += SIZE;
                        if (axes[0] < -0.5 || b[14].pressed) if(cursor % SIZE !== 0) cursor--;
                        if (axes[0] > 0.5 || b[15].pressed) if(cursor % SIZE !== SIZE-1) cursor++;
                        
                        if (b[0].pressed) reveal(cursor);
                        if (b[1].pressed || b[2].pressed) toggleFlag(cursor);
                        lastP = now;
                    }
                }
                requestAnimationFrame(poll);
            }
            poll();
        })();
    </script>
</body>
</html>
