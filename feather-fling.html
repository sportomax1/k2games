<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bird Sling: Material World - K2 games</title>
    <style>
        :root {
            --sky-top: #0ea5e9;
            --sky-bottom: #bae6fd;
            --grass: #16a34a;
            --dirt: #78350f;
            --ui-bg: rgba(15, 23, 42, 0.8);
            --accent: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: none; }
        
        body {
            background-color: #020617;
            color: white; font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden; height: 100vh;
        }

        #game-container {
            position: relative; width: 100%; height: 100%;
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
            overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; }

        #hud {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; pointer-events: none; z-index: 100;
        }

        .stat-card {
            background: var(--ui-bg); backdrop-filter: blur(12px);
            padding: 12px 24px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; min-width: 120px;
        }

        .stat-label { font-size: 0.6rem; text-transform: uppercase; opacity: 0.6; letter-spacing: 1.5px; }
        .stat-val { font-size: 1.5rem; color: var(--accent); font-family: monospace; font-weight: 900; }

        #overlay {
            position: absolute; inset: 0; background: rgba(2, 6, 23, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(15px); text-align: center; padding: 20px;
        }

        h1 { font-size: 4rem; color: var(--accent); font-weight: 900; font-style: italic; margin-bottom: 10px; }
        .btn-large {
            background: var(--accent); color: #000; border: none; padding: 1.2rem 4rem;
            border-radius: 50px; font-weight: 900; cursor: pointer; margin-top: 2rem;
            font-size: 1.4rem; box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4);
        }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CCZ9JJGEDP');
    </script>
</head>
<body>
    <div id="game-container">
        <div id="hud">
            <div class="stat-card">
                <div class="stat-label">Score</div>
                <div id="score-val" class="stat-val">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Level</div>
                <div id="lvl-val" class="stat-val">1</div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="overlay">
            <h1 id="over-title">LEVEL CLEAR</h1>
            <p id="over-msg" style="font-size: 1.5rem; opacity: 0.7;">Structural integrity compromised.</p>
            <div style="font-size:0.85rem; opacity:0.5; margin-top:0.5rem;" id="over-sub"></div>
            <button class="btn-large" onclick="game.nextLevel()">NEXT LEVEL →</button>
        </div>
    </div>

    <script>
        const clearMessages = [
            'Structural integrity: ZERO.',
            'The pigs never saw it coming.',
            'Perfect trajectory!',
            'Chaos unlocked.',
            'Boom! Next challenge awaits.',
            'They should\'ve used more stone.',
            'A masterclass in destruction.',
            'Clean sweep!',
        ];

        const MATERIALS = {
            wood: { color: '#92400e', stroke: '#451a03', hp: 50, weight: 1 },
            stone: { color: '#475569', stroke: '#1e293b', hp: 150, weight: 2.5 },
            ice: { color: '#bae6fd', stroke: '#0ea5e9', hp: 20, weight: 0.5 }
        };

        class BirdSlingElite {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                // Initialize state and objects BEFORE resize/load
                this.level = 1;
                this.score = 0;
                this.bird = { x: 0, y: 0, r: 24, vx: 0, vy: 0, active: false, dragging: false, anchorX: 250, anchorY: 0, trail: [] };
                this.objects = [];
                this.particles = [];
                this.shake = 0;
                this.state = 'play';

                this.resize();
                this.setupInputs();
                this.loadLevel(1);
                window.onresize = () => this.resize();
                requestAnimationFrame(() => this.loop());
            }

            resize() {
                this.width = window.innerWidth;
                this.height = window.innerHeight;
                this.canvas.width = this.width;
                this.canvas.height = this.height;
                this.bird.anchorY = this.height - 180;
                if(!this.bird.active) { this.bird.x = this.bird.anchorX; this.bird.y = this.bird.anchorY; }
            }

            loadLevel(n) {
                this.level = n;
                this.objects = [];
                this.bird.active = false;
                this.bird.trail = [];
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('lvl-val').textContent = n;

                const groundY = this.height - 80;
                const sX = this.width * 0.7;  // primary start X
                const sX2 = this.width * 0.55; // alternate start X

                // Helper shorthand
                const B = (x,y,w,h,m) => this.addBlock(x,y,w,h,m);
                const E = (x,y) => this.addEnemy(x,y);

                if(n===1){
                    // Tutorial: simple wood bridge
                    B(sX, groundY, 40, 150, 'wood');
                    B(sX+120, groundY, 40, 150, 'wood');
                    B(sX-20, groundY-150, 180, 30, 'wood');
                    E(sX+70, groundY-180);
                }
                else if(n===2){
                    // Stone arch with ice tower
                    B(sX, groundY, 40, 120, 'stone');
                    B(sX+120, groundY, 40, 120, 'stone');
                    B(sX-10, groundY-120, 160, 30, 'wood');
                    B(sX+30, groundY-150, 30, 80, 'ice');
                    B(sX+100, groundY-150, 30, 80, 'ice');
                    B(sX+20, groundY-230, 120, 20, 'ice');
                    E(sX+70, groundY-260);
                }
                else if(n===3){
                    // Double tower: 2 wood columns, 2 enemies
                    B(sX, groundY, 35, 200, 'wood');
                    B(sX+110, groundY, 35, 200, 'wood');
                    B(sX-10, groundY-200, 155, 25, 'wood');
                    E(sX+10, groundY-230);
                    E(sX+110, groundY-230);
                }
                else if(n===4){
                    // Staircase: ascending wood blocks
                    B(sX, groundY, 50, 60, 'wood');
                    B(sX+60, groundY, 50, 100, 'stone');
                    B(sX+120, groundY, 50, 150, 'wood');
                    B(sX+180, groundY, 50, 200, 'stone');
                    E(sX+25, groundY-90);
                    E(sX+145, groundY-180);
                }
                else if(n===5){
                    // Ice fortress: solid ice columns with heavy roof
                    B(sX-20, groundY, 30, 160, 'ice');
                    B(sX+40, groundY, 30, 160, 'ice');
                    B(sX+100, groundY, 30, 160, 'ice');
                    B(sX+160, groundY, 30, 160, 'ice');
                    B(sX-30, groundY-160, 210, 35, 'stone');
                    E(sX+30, groundY-200);
                    E(sX+130, groundY-200);
                }
                else if(n===6){
                    // Castle wall: stone base, wood top, enemy on parapet
                    B(sX, groundY, 180, 25, 'stone');
                    B(sX, groundY-25, 25, 120, 'stone');
                    B(sX+155, groundY-25, 25, 120, 'stone');
                    B(sX+20, groundY-145, 140, 25, 'wood');
                    B(sX+45, groundY-170, 30, 40, 'stone');
                    B(sX+115, groundY-170, 30, 40, 'stone');
                    E(sX+90, groundY-200);
                }
                else if(n===7){
                    // Triple threat: 3 separate mini-towers
                    B(sX-60, groundY, 30, 180, 'wood'); B(sX-20, groundY, 30, 180, 'wood');
                    B(sX-70, groundY-180, 80, 20, 'stone'); E(sX-30, groundY-210);
                    B(sX+50, groundY, 30, 200, 'stone'); B(sX+90, groundY, 30, 200, 'stone');
                    B(sX+40, groundY-200, 90, 20, 'wood'); E(sX+85, groundY-230);
                    B(sX+160, groundY, 25, 120, 'ice'); B(sX+195, groundY, 25, 120, 'ice');
                    B(sX+150, groundY-120, 80, 15, 'ice'); E(sX+190, groundY-145);
                }
                else if(n===8){
                    // Suspension bridge: pillars holding a plank
                    B(sX, groundY, 40, 230, 'stone');
                    B(sX+200, groundY, 40, 230, 'stone');
                    B(sX-20, groundY-230, 280, 20, 'wood');
                    B(sX+70, groundY-250, 80, 20, 'ice');
                    E(sX+80, groundY-280); E(sX+120, groundY-280);
                }
                else if(n===9){
                    // Pyramid: wide base narrowing up
                    B(sX-40, groundY, 30, 60, 'wood'); B(sX, groundY, 30, 60, 'wood');
                    B(sX+40, groundY, 30, 60, 'wood'); B(sX+80, groundY, 30, 60, 'wood');
                    B(sX+120, groundY, 30, 60, 'wood');
                    B(sX-20, groundY-60, 30, 60, 'stone'); B(sX+20, groundY-60, 30, 60, 'stone');
                    B(sX+60, groundY-60, 30, 60, 'stone'); B(sX+100, groundY-60, 30, 60, 'stone');
                    B(sX+10, groundY-120, 30, 60, 'ice'); B(sX+50, groundY-120, 30, 60, 'ice');
                    B(sX+90, groundY-120, 30, 60, 'ice');
                    B(sX+30, groundY-180, 60, 25, 'wood');
                    E(sX+60, groundY-215); E(sX+20, groundY-100);
                }
                else if(n===10){
                    // Fortress with inner keep: 2 enemies inside
                    B(sX-30, groundY, 20, 200, 'stone'); B(sX+190, groundY, 20, 200, 'stone');
                    B(sX-30, groundY-200, 240, 25, 'stone');
                    B(sX+30, groundY-25, 150, 20, 'wood');
                    B(sX+60, groundY-45, 30, 130, 'wood'); B(sX+130, groundY-45, 30, 130, 'wood');
                    B(sX+60, groundY-175, 100, 20, 'ice');
                    E(sX+95, groundY-205); E(sX+30, groundY-230);
                }
                else if(n===11){
                    // Narrow tall tower: 4 enemies stacked vertically
                    B(sX+40, groundY, 40, 300, 'stone');
                    B(sX+30, groundY-300, 60, 20, 'wood');
                    E(sX+60, groundY-330);
                    B(sX+40, groundY-350, 40, 100, 'ice');
                    E(sX+60, groundY-460);
                    B(sX, groundY, 35, 100, 'wood'); B(sX+85, groundY, 35, 100, 'wood');
                    E(sX+18, groundY-130); E(sX+103, groundY-130);
                }
                else if(n===12){
                    // Double arch bridge with center platform
                    B(sX-40, groundY, 30, 150, 'stone'); B(sX+10, groundY, 30, 150, 'stone');
                    B(sX-50, groundY-150, 100, 20, 'wood'); E(sX, groundY-180);
                    B(sX+130, groundY, 30, 150, 'stone'); B(sX+180, groundY, 30, 150, 'stone');
                    B(sX+120, groundY-150, 100, 20, 'wood'); E(sX+170, groundY-180);
                    B(sX+40, groundY-80, 70, 20, 'ice'); E(sX+75, groundY-110);
                }
                else if(n===13){
                    // Battlements: alternating heights
                    B(sX, groundY, 30, 80, 'stone'); B(sX+40, groundY, 30, 130, 'stone');
                    B(sX+80, groundY, 30, 80, 'stone'); B(sX+120, groundY, 30, 130, 'stone');
                    B(sX+160, groundY, 30, 80, 'stone'); B(sX+200, groundY, 30, 130, 'stone');
                    E(sX+55, groundY-160); E(sX+135, groundY-160); E(sX+215, groundY-160);
                    B(sX-10, groundY-200, 240, 20, 'wood');
                    E(sX+100, groundY-230);
                }
                else if(n===14){
                    // Ice palace: all ice, very fragile but lots of enemies
                    B(sX, groundY, 25, 200, 'ice'); B(sX+75, groundY, 25, 200, 'ice');
                    B(sX+150, groundY, 25, 200, 'ice');
                    B(sX-10, groundY-200, 190, 20, 'ice');
                    B(sX+30, groundY-220, 25, 80, 'ice'); B(sX+120, groundY-220, 25, 80, 'ice');
                    B(sX+20, groundY-300, 145, 20, 'ice');
                    E(sX+12, groundY-230); E(sX+87, groundY-230); E(sX+162, groundY-230);
                    E(sX+80, groundY-330);
                }
                else if(n===15){
                    // Overlapping towers (harder to hit all at once)
                    B(sX2, groundY, 35, 250, 'stone');
                    B(sX2+50, groundY, 35, 180, 'wood');
                    B(sX2+100, groundY, 35, 250, 'stone');
                    B(sX2-10, groundY-250, 155, 25, 'stone');
                    B(sX2+20, groundY-275, 30, 80, 'ice'); B(sX2+100, groundY-275, 30, 80, 'ice');
                    E(sX2+35, groundY-365); E(sX2+115, groundY-365);
                    E(sX2+70, groundY-215); B(sX2+45, groundY-180, 70, 20, 'wood');
                }
                else if(n===16){
                    // Maze of blocks: 3 rows of obstacles
                    for(let col=0; col<4; col++){
                        const mx = sX2 + col * 60;
                        const ht = 60 + (col%2)*80;
                        B(mx, groundY, 30, ht, col%2===0?'stone':'wood');
                        if(col < 3) E(mx+15, groundY - ht - 5);
                    }
                    // Second row elevated
                    B(sX2+10, groundY-200, 30, 80, 'ice');
                    B(sX2+80, groundY-200, 30, 80, 'ice');
                    B(sX2+150, groundY-200, 30, 80, 'ice');
                    E(sX2+25, groundY-290); E(sX2+165, groundY-290);
                }
                else if(n===17){
                    // Grand castle: comprehensive structure
                    // Base wall
                    B(sX2-20, groundY, 260, 20, 'stone');
                    // Left tower
                    B(sX2-20, groundY-20, 30, 200, 'stone'); B(sX2-30, groundY-220, 50, 25, 'stone');
                    E(sX2-5, groundY-255);
                    // Right tower
                    B(sX2+210, groundY-20, 30, 200, 'stone'); B(sX2+200, groundY-220, 50, 25, 'stone');
                    E(sX2+225, groundY-255);
                    // Inner wall
                    B(sX2+20, groundY-20, 180, 15, 'wood');
                    B(sX2+20, groundY-35, 25, 130, 'wood'); B(sX2+175, groundY-35, 25, 130, 'wood');
                    B(sX2+20, groundY-165, 180, 20, 'stone');
                    // Inner top
                    B(sX2+70, groundY-185, 80, 15, 'ice'); E(sX2+110, groundY-210);
                    // Keep
                    B(sX2+80, groundY-220, 60, 80, 'stone'); E(sX2+110, groundY-310);
                }
                else if(n===18){
                    // Chaos: mixed dense structures, 5 enemies
                    B(sX2-30, groundY, 25, 100, 'ice');
                    B(sX2+10, groundY, 25, 160, 'stone');
                    B(sX2+55, groundY, 25, 80, 'wood');
                    B(sX2+100, groundY, 25, 200, 'stone');
                    B(sX2+145, groundY, 25, 120, 'ice');
                    B(sX2+190, groundY, 25, 180, 'wood');
                    B(sX2+235, groundY, 25, 100, 'stone');
                    // Bridges
                    B(sX2-35, groundY-160, 80, 15, 'wood');
                    B(sX2+50, groundY-200, 100, 15, 'stone');
                    B(sX2+140, groundY-180, 110, 15, 'ice');
                    E(sX2-15, groundY-185); E(sX2+22, groundY-190);
                    E(sX2+100, groundY-225); E(sX2+168, groundY-205);
                    E(sX2+248, groundY-210);
                }
                else if(n===19){
                    // Sky fortress: extremely tall structures
                    const hh = Math.min(360, this.height - 100);
                    B(sX2, groundY, 40, hh, 'stone');
                    B(sX2+50, groundY, 40, hh*0.7, 'ice');
                    B(sX2+100, groundY, 40, hh, 'stone');
                    B(sX2+150, groundY, 40, hh*0.7, 'ice');
                    B(sX2+200, groundY, 40, hh, 'stone');
                    B(sX2-10, groundY-hh, 260, 20, 'wood');
                    B(sX2+50, groundY-hh*0.7, 120, 20, 'ice');
                    E(sX2+20, groundY-hh-30);
                    E(sX2+120, groundY-hh-30);
                    E(sX2+220, groundY-hh-30);
                    E(sX2+70, groundY-hh*0.7-30);
                    E(sX2+170, groundY-hh*0.7-30);
                }
                else {
                    // Level 20+: Ultimate fortress — everything combined
                    // Base layer
                    B(sX2-40, groundY, 20, 50, 'wood');
                    B(sX2-10, groundY, 20, 120, 'stone');
                    B(sX2+30, groundY, 20, 80, 'ice');
                    B(sX2+60, groundY, 20, 200, 'stone');
                    B(sX2+90, groundY, 20, 60, 'wood');
                    B(sX2+120, groundY, 20, 180, 'stone');
                    B(sX2+150, groundY, 20, 90, 'ice');
                    B(sX2+180, groundY, 20, 200, 'stone');
                    B(sX2+220, groundY, 20, 80, 'wood');
                    B(sX2+250, groundY, 20, 120, 'stone');
                    // Mid platforms
                    B(sX2-50, groundY-130, 100, 15, 'stone');
                    B(sX2+70, groundY-210, 130, 15, 'stone');
                    B(sX2+195, groundY-190, 100, 15, 'stone');
                    // Top caps
                    B(sX2+50, groundY-200, 90, 20, 'wood');
                    B(sX2+150, groundY-200, 90, 20, 'wood');
                    // Upper tier
                    B(sX2+60, groundY-220, 25, 100, 'ice');
                    B(sX2+195, groundY-220, 25, 100, 'ice');
                    B(sX2+60, groundY-320, 180, 20, 'stone');
                    B(sX2+110, groundY-340, 25, 80, 'stone'); E(sX2+122, groundY-430);
                    // Enemies scattered throughout
                    E(sX2+0, groundY-150);
                    E(sX2+90, groundY-230);
                    E(sX2+215, groundY-215);
                    E(sX2-25, groundY-165);
                    E(sX2+265, groundY-155);
                }
            }

            addBlock(x, y, w, h, mat) { this.objects.push({ type: 'block', x, y: y-h, w, h, ...MATERIALS[mat], currentHp: MATERIALS[mat].hp }); }
            addEnemy(x, y) { this.objects.push({ type: 'enemy', x, y: y-25, r: 25, alive: true }); }

            setupInputs() {
                const getP = (e) => { const t = e.touches ? e.touches[0] : e; return { x: t.clientX, y: t.clientY }; };
                const down = (e) => {
                    const p = getP(e);
                    if(!this.bird.active && Math.hypot(p.x - this.bird.x, p.y - this.bird.y) < 80) this.bird.dragging = true;
                };
                const move = (e) => {
                    if(this.bird.dragging) {
                        const p = getP(e);
                        const dx = p.x - this.bird.anchorX, dy = p.y - this.bird.anchorY;
                        const dist = Math.min(120, Math.hypot(dx, dy)), ang = Math.atan2(dy, dx);
                        this.bird.x = this.bird.anchorX + Math.cos(ang) * dist;
                        this.bird.y = this.bird.anchorY + Math.sin(ang) * dist;
                    }
                };
                const up = () => {
                    if(this.bird.dragging) {
                        this.bird.dragging = false; this.bird.active = true;
                        this.bird.vx = (this.bird.anchorX - this.bird.x) * 0.18;
                        this.bird.vy = (this.bird.anchorY - this.bird.y) * 0.18;
                    }
                };
                this.canvas.onmousedown = down; window.onmousemove = move; window.onmouseup = up;
                this.canvas.ontouchstart = (e) => { e.preventDefault(); down(e); };
                this.canvas.ontouchmove = (e) => { e.preventDefault(); move(e); };
                this.canvas.ontouchend = (e) => { e.preventDefault(); up(); };
            }

            update() {
                if(this.shake > 0) this.shake *= 0.9;
                if(this.bird.active) {
                    this.bird.vy += 0.25; this.bird.x += this.bird.vx; this.bird.y += this.bird.vy;
                    this.bird.trail.push({x: this.bird.x, y: this.bird.y, o: 1});
                    if(this.bird.trail.length > 25) this.bird.trail.shift();

                    this.objects.forEach((obj, i) => {
                        let hit = false;
                        if(obj.type === 'block') {
                            if(this.bird.x + this.bird.r > obj.x && this.bird.x - this.bird.r < obj.x + obj.w &&
                               this.bird.y + this.bird.r > obj.y && this.bird.y - this.bird.r < obj.y + obj.h) hit = true;
                        } else {
                            if(Math.hypot(this.bird.x - obj.x, this.bird.y - obj.y) < this.bird.r + obj.r) hit = true;
                        }

                        if(hit) {
                            this.shake = 12;
                            this.spawnParticles(this.bird.x, this.bird.y, obj.color || '#4ade80', 15);
                            if(obj.type === 'enemy') { this.score += 2500; this.objects.splice(i, 1); }
                            else { this.score += 500; obj.currentHp -= 60; if(obj.currentHp <= 0) this.objects.splice(i, 1); }
                            this.bird.vx *= 0.4; this.bird.vy *= 0.4;
                            this.updateUI();
                        }
                    });

                    if(this.bird.x > this.width + 100 || this.bird.y > this.height - 70) this.resetBird();
                }

                this.particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.o -= 0.02; if(p.o <= 0) this.particles.splice(i, 1); });

                // ── GRAVITY SIMULATION ──────────────────────────────────
                const groundY = this.height - 80;
                const blocks = this.objects.filter(o => o.type === 'block');
                // Build supported set bottom-up (multi-pass)
                const supported = new Set();
                blocks.forEach(b => { if (b.vy === undefined) b.vy = 0; if (b.y + b.h >= groundY - 3) supported.add(b); });
                let gChg = true;
                while (gChg) {
                    gChg = false;
                    blocks.forEach(b => {
                        if (supported.has(b)) return;
                        const ok = blocks.some(s =>
                            supported.has(s) &&
                            Math.abs((b.y + b.h) - s.y) < 5 &&
                            b.x + b.w > s.x && b.x < s.x + s.w
                        );
                        if (ok) { supported.add(b); gChg = true; }
                    });
                }
                blocks.forEach(b => {
                    if (supported.has(b)) { b.vy = 0; }
                    else { b.vy = Math.min((b.vy || 0) + 0.5, 20); b.y += b.vy; }
                    if (b.y + b.h >= groundY) { b.y = groundY - b.h; b.vy = 0; }
                });
                this.objects.filter(o => o.type === 'enemy').forEach(obj => {
                    if (obj.vy === undefined) obj.vy = 0;
                    const onSurface = obj.y + obj.r >= groundY - 2 ||
                        blocks.some(b => {
                            const gap = b.y - (obj.y + obj.r);
                            return gap >= -3 && gap < 8 && obj.x > b.x && obj.x < b.x + b.w;
                        });
                    if (!onSurface) { obj.vy = Math.min(obj.vy + 0.5, 20); }
                    else { obj.vy = 0; }
                    obj.y += obj.vy;
                    if (obj.y + obj.r >= groundY) { obj.y = groundY - obj.r; obj.vy = 0; }
                });
                // ───────────────────────────────────────────────────────

                if(this.objects.filter(o => o.type === 'enemy').length === 0 && this.state !== 'win') {
                    this.state = 'win';
                    const maxLevel = 20;
                    setTimeout(() => {
                        const overlay = document.getElementById('overlay');
                        const sub = document.getElementById('over-sub');
                        if(this.level >= maxLevel) {
                            document.getElementById('over-title').textContent = 'YOU WIN!';
                            document.getElementById('over-msg').textContent = '🏆 All 20 levels conquered!';
                            if(sub) sub.textContent = 'Score: ' + this.score;
                        } else {
                            document.getElementById('over-title').textContent = `LEVEL ${this.level} CLEAR!`;
                            document.getElementById('over-msg').textContent = clearMessages[Math.floor(Math.random()*clearMessages.length)];
                            if(sub) sub.textContent = `Score: ${this.score}  •  Level ${this.level} of 20`;
                        }
                        overlay.style.display = 'flex';
                    }, 1000);
                }
            }

            resetBird() {
                this.bird.active = false; this.bird.x = this.bird.anchorX; this.bird.y = this.bird.anchorY;
                this.bird.vx = this.bird.vy = 0; this.bird.trail = [];
            }

            nextLevel() { this.state = 'play'; this.loadLevel(this.level + 1); }

            spawnParticles(x, y, color, count) { for(let i=0; i<count; i++) this.particles.push({ x, y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, o: 1, color }); }

            updateUI() { document.getElementById('score-val').textContent = this.score; }

            draw() {
                const ctx = this.ctx; ctx.save();
                if(this.shake > 0.5) ctx.translate((Math.random()-0.5)*this.shake, (Math.random()-0.5)*this.shake);
                ctx.clearRect(0, 0, this.width, this.height);

                // Ground
                ctx.fillStyle = '#78350f'; ctx.fillRect(0, this.height - 80, this.width, 80);
                ctx.fillStyle = '#16a34a'; ctx.fillRect(0, this.height - 80, this.width, 15);

                // Slingshot
                ctx.strokeStyle = '#451a03'; ctx.lineWidth = 14; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(this.bird.anchorX, this.height - 80); ctx.lineTo(this.bird.anchorX, this.bird.anchorY + 40); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(this.bird.anchorX - 25, this.bird.anchorY - 20); ctx.lineTo(this.bird.anchorX, this.bird.anchorY + 40); ctx.lineTo(this.bird.anchorX + 25, this.bird.anchorY - 20); ctx.stroke();

                // Elastic
                if(this.bird.dragging) {
                    ctx.strokeStyle = '#1c1917'; ctx.lineWidth = 5;
                    ctx.beginPath(); ctx.moveTo(this.bird.anchorX - 20, this.bird.anchorY - 10); ctx.lineTo(this.bird.x, this.bird.y); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(this.bird.anchorX + 20, this.bird.anchorY - 10); ctx.lineTo(this.bird.x, this.bird.y); ctx.stroke();
                }

                // Trail
                this.bird.trail.forEach(t => { ctx.fillStyle = `rgba(255,255,255,${t.o})`; ctx.beginPath(); ctx.arc(t.x, t.y, 4, 0, Math.PI*2); ctx.fill(); t.o -= 0.04; });

                // Objects
                this.objects.forEach(obj => {
                    if(obj.type === 'block') {
                        ctx.fillStyle = obj.color; ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
                        ctx.strokeStyle = obj.stroke; ctx.lineWidth = 3; ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
                    } else {
                        ctx.fillStyle = '#4ade80'; ctx.beginPath(); ctx.arc(obj.x, obj.y, obj.r, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(obj.x-8, obj.y-5, 6, 0, Math.PI*2); ctx.arc(obj.x+8, obj.y-5, 6, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(obj.x-8, obj.y-5, 2, 0, Math.PI*2); ctx.arc(obj.x+8, obj.y-5, 2, 0, Math.PI*2); ctx.fill();
                    }
                });

                // The Bird
                ctx.save(); ctx.translate(this.bird.x, this.bird.y);
                if(this.bird.active) ctx.rotate(Math.atan2(this.bird.vy, this.bird.vx));
                ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.arc(0, 0, this.bird.r, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(10, -5, 8, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(12, -5, 2, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#fbbf24'; ctx.beginPath(); ctx.moveTo(15, 0); ctx.lineTo(25, 5); ctx.lineTo(15, 10); ctx.fill();
                ctx.restore();

                // Particles
                this.particles.forEach(p => { ctx.globalAlpha = p.o; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill(); });
                ctx.restore();
            }

            loop() { this.update(); this.draw(); requestAnimationFrame(() => this.loop()); }
        }
        const game = new BirdSlingElite();
    </script>
</body>
</html>
