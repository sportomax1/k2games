<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Tow & Go</title>
<style>
:root{--bg:#07131d;--panel:#08111ddd;--line:#ffffff25;--ink:#f8fafc;--blue:#38bdf8;--gold:#fbbf24;--red:#ef4444;--green:#4ade80}*{box-sizing:border-box;user-select:none;-webkit-user-select:none;touch-action:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:system-ui,sans-serif}#wrap{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 20% 10%,#0ea5e933,transparent 35%),#07131d}#stage{position:relative;width:min(100vw,calc(100dvh * 16 / 10));height:min(100dvh,calc(100vw * 10 / 16));max-width:1280px;max-height:800px;overflow:hidden;background:#244735;box-shadow:0 0 50px #0009}canvas{position:absolute;inset:0;width:100%;height:100%;display:block}.hud{position:absolute;z-index:5;background:var(--panel);border:1px solid var(--line);border-radius:13px;backdrop-filter:blur(8px);box-shadow:0 8px 22px #0005}.home{top:max(10px,env(safe-area-inset-top));left:max(10px,env(safe-area-inset-left));padding:9px 12px;color:white;text-decoration:none;font-size:12px;font-weight:900}.top{top:max(10px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);padding:8px 14px;text-align:center;min-width:250px}.top b{display:block;font-size:18px}.top small{opacity:.72}.stats{top:10px;right:10px;padding:8px 11px;display:grid;grid-template-columns:repeat(4,auto);gap:12px;font-weight:900;font-size:11px}.stats span{color:var(--blue);display:block;font-size:17px}.stars{display:flex;gap:3px}.star{width:15px;height:15px;background:var(--gold);clip-path:polygon(50% 0,62% 35%,100% 38%,70% 59%,80% 100%,50% 76%,20% 100%,30% 59%,0 38%,38% 35%)}.star.dim{background:#475569}.controls{position:absolute;z-index:8;left:14px;right:14px;bottom:14px;display:flex;justify-content:space-between;align-items:end;pointer-events:none}.dpad{display:grid;grid-template-columns:64px 64px 64px;grid-template-rows:58px 58px;gap:7px;pointer-events:auto}.btn{border:1px solid #ffffff30;border-radius:16px;background:#020617cc;color:white;font-size:22px;font-weight:1000;box-shadow:0 6px 0 #0006}.btn.on{transform:translateY(4px);box-shadow:0 2px 0 #0006;background:#0284c7}.up{grid-column:2}.left{grid-column:1;grid-row:2}.down{grid-column:2;grid-row:2}.right{grid-column:3;grid-row:2}.actions{display:grid;gap:8px;pointer-events:auto}.actions .btn{width:100px;height:48px;font-size:12px}.menu{position:absolute;inset:0;z-index:20;display:grid;place-items:center;background:#020617d9;padding:16px}.card{width:min(94vw,760px);max-height:94vh;overflow:auto;background:linear-gradient(180deg,#0f172af7,#0c4a6ef2);border:1px solid #ffffff25;border-radius:28px;padding:22px;text-align:center;box-shadow:0 30px 90px #0008}.card h1{font-size:clamp(44px,10vw,78px);line-height:.9;margin:0 0 8px}.card p{color:#dbeafe;font-weight:700;line-height:1.4}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:12px 0}.choice{border:1px solid #ffffff25;border-radius:16px;padding:11px;background:#ffffff0d;color:white;text-align:left;font-weight:900}.choice.active{outline:3px solid #38bdf866;background:#0ea5e92c}.choice span{display:block;font-size:11px;opacity:.7;margin-top:3px}.play{border:0;border-radius:17px;padding:14px 24px;background:linear-gradient(135deg,#fbbf24,#fb923c);font-weight:1000;font-size:18px;color:#321500}.message{position:absolute;z-index:9;left:50%;top:50%;transform:translate(-50%,-50%);display:none;width:min(88%,440px);text-align:center;padding:18px}.message.show{display:block}.message h2{margin:0 0 8px;font-size:32px}.message button{margin-top:10px}.legend{font-size:11px;opacity:.75;margin-top:8px}@media(max-width:760px){#stage{width:100vw;height:100dvh;max-width:none;max-height:none}.stats{top:58px;right:8px;grid-template-columns:repeat(2,auto);gap:5px 10px}.top{min-width:190px}.grid{grid-template-columns:1fr}.dpad{grid-template-columns:56px 56px 56px;grid-template-rows:52px 52px}.actions .btn{width:88px}.home{font-size:10px}}
</style>
</head>
<body>
<div id="wrap"><main id="stage">
<canvas id="game" width="1280" height="800"></canvas>
<a class="hud home" href="index.html">← K2 HUB</a>
<div class="hud top"><b id="mission">TOW & GO</b><small id="sub">Choose a challenge</small></div>
<div class="hud stats"><div>GEAR<span id="gear">P</span></div><div>MPH<span id="speed">0</span></div><div>ANGLE<span id="angle">0°</span></div><div>DAMAGE<span id="damage">0%</span></div><div class="stars" id="stars"><i class="star"></i><i class="star"></i><i class="star"></i></div></div>
<div class="controls"><div class="dpad"><button class="btn up" data-key="ArrowUp">▲</button><button class="btn left" data-key="ArrowLeft">◀</button><button class="btn down" data-key="ArrowDown">▼</button><button class="btn right" data-key="ArrowRight">▶</button></div><div class="actions"><button class="btn" id="camera">CAMERA</button><button class="btn" data-key="Space">BRAKE</button><button class="btn" id="reset">RESET</button></div></div>
<div class="menu" id="menu"><div class="card"><h1>TOW & GO</h1><p>Drive the full trip or jump straight into precision backing. Tow an RV or boat trailer, avoid damage, and finish straight and slow.</p><h3>GAME MODE</h3><div class="grid" id="modeChoices"></div><h3>RIG</h3><div class="grid" id="rigChoices"></div><h3>CHALLENGE</h3><div class="grid" id="levelChoices"></div><button class="play" id="play">START ENGINE</button><div class="legend">↑ forward · ↓ reverse · ←/→ steer · Space brake</div></div></div>
<div class="hud message" id="message"><h2 id="msgTitle"></h2><p id="msgBody"></p><button class="play" id="again">PLAY AGAIN</button></div>
</main></div>
<script>
const C=document.getElementById('game'),X=C.getContext('2d'),W=1280,H=800,keys=new Set(),ui=id=>document.getElementById(id);let running=false,view=0,mode='trip',rig='rv',level=0,last=0;const truck={x:220,y:400,a:0,v:0},trailer={x:100,y:400,a:0};const state={damage:0,stars:3,phase:'drive',win:false,t:0,tracks:[]};const levels=[{name:'Easy Camp',desc:'Wide RV campsite',type:'rv',obs:[[700,140,85,180],[700,480,85,180]],target:[930,500,170,210,Math.PI/2]},{name:'Tight Camp',desc:'Trees and narrow pad',type:'rv',obs:[[650,90,110,240],[650,500,110,220],[1050,120,80,210]],target:[850,470,150,220,Math.PI/2]},{name:'Boat Ramp',desc:'Back toward the water',type:'boat',obs:[[790,100,90,250],[1080,100,90,250]],target:[900,520,170,220,Math.PI/2]},{name:'Slalom Lot',desc:'Cones and sharp turns',type:'rv',obs:[[470,220,60,100],[650,480,60,100],[830,210,60,100]],target:[1030,300,150,210,0]}];const rigs={rv:{name:'Travel Trailer',len:155,w:64,color:'#f3ead7'},boat:{name:'Boat Trailer',len:175,w:58,color:'#dbeafe'}};const modes=[{id:'trip',name:'Full Trip',desc:'Road, exit, lot, then back in'},{id:'practice',name:'Backing Practice',desc:'Start near the target'},{id:'free',name:'Free Drive',desc:'Open lot with no timer'}];
function norm(a){while(a>Math.PI)a-=Math.PI*2;while(a<-Math.PI)a+=Math.PI*2;return a}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function choices(){ui('modeChoices').innerHTML=modes.map((m,i)=>`<button class="choice ${i===0?'active':''}" data-mode="${m.id}">${m.name}<span>${m.desc}</span></button>`).join('');ui('rigChoices').innerHTML=`<button class="choice active" data-rig="rv">RV TRAILER<span>Stable and forgiving</span></button><button class="choice" data-rig="boat">BOAT TRAILER<span>Longer tail swing</span></button>`;ui('levelChoices').innerHTML=levels.map((l,i)=>`<button class="choice ${i===0?'active':''}" data-level="${i}">${l.name}<span>${l.desc}</span></button>`).join('');document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>select('mode',b));document.querySelectorAll('[data-rig]').forEach(b=>b.onclick=()=>select('rig',b));document.querySelectorAll('[data-level]').forEach(b=>b.onclick=()=>select('level',b))}function select(kind,b){document.querySelectorAll(`[data-${kind}]`).forEach(x=>x.classList.remove('active'));b.classList.add('active');if(kind==='mode')mode=b.dataset.mode;if(kind==='rig')rig=b.dataset.rig;if(kind==='level')level=+b.dataset.level}
function init(){ui('menu').style.display='none';ui('message').classList.remove('show');running=true;state.damage=0;state.stars=3;state.win=false;state.t=0;state.tracks=[];state.phase=mode==='trip'?'drive':'back';const L=levels[level];if(mode==='practice'){truck.x=690;truck.y=390;truck.a=0;trailer.x=540;trailer.y=390;trailer.a=0}else{truck.x=220;truck.y=400;truck.a=0;trailer.x=65;trailer.y=400;trailer.a=0}truck.v=0;rig=L.type==='boat'?'boat':rig;ui('mission').textContent=mode==='trip'?'DRIVE TO THE LOT':'BACK INTO THE TARGET';ui('sub').textContent=`${L.name} · ${rigs[rig].name}`;last=performance.now()}
function hitch(){return{x:truck.x-Math.cos(truck.a)*58,y:truck.y-Math.sin(truck.a)*58}}function update(dt){if(!running)return;state.t+=dt;let gas=keys.has('ArrowUp')||keys.has('KeyW'),rev=keys.has('ArrowDown')||keys.has('KeyS'),brake=keys.has('Space'),steer=(keys.has('ArrowRight')||keys.has('KeyD')?1:0)-(keys.has('ArrowLeft')||keys.has('KeyA')?1:0);if(gas)truck.v+=72*dt;if(rev)truck.v-=58*dt;if(brake)truck.v*=Math.pow(.015,dt);if(!gas&&!rev)truck.v*=Math.pow(.58,dt);truck.v=clamp(truck.v,-42,80);truck.a+=truck.v/105*steer*.72*dt;truck.x+=Math.cos(truck.a)*truck.v*dt;truck.y+=Math.sin(truck.a)*truck.v*dt;const h=hitch(),R=rigs[rig],dx=h.x-trailer.x,dy=h.y-trailer.y,desired=Math.atan2(dy,dx);trailer.a+=norm(desired-trailer.a)*clamp(dt*4.2,0,1);trailer.x=h.x-Math.cos(trailer.a)*R.len*.48;trailer.y=h.y-Math.sin(trailer.a)*R.len*.48;if(Math.abs(truck.v)>3&&state.t%0.08<dt)state.tracks.push([trailer.x,trailer.y,trailer.a]);if(state.tracks.length>160)state.tracks.shift();collide();progress();hud()}
function hitRect(x,y,o,m=0){return x>o[0]-m&&x<o[0]+o[2]+m&&y>o[1]-m&&y<o[1]+o[3]+m}function collide(){const L=levels[level],pts=[[truck.x,truck.y],[trailer.x,trailer.y],[trailer.x-Math.cos(trailer.a)*rigs[rig].len*.35,trailer.y-Math.sin(trailer.a)*rigs[rig].len*.35]];let hit=L.obs.some(o=>pts.some(p=>hitRect(p[0],p[1],o,24)))||pts.some(p=>p[0]<20||p[0]>1260||p[1]<20||p[1]>780);if(hit&&Math.abs(truck.v)>5){state.damage=clamp(state.damage+Math.abs(truck.v)*.045,0,100);truck.v*=-.2;if(state.damage>18)state.stars=2;if(state.damage>45)state.stars=1;if(state.damage>=100)finish(false)}}function progress(){const L=levels[level],t=L.target;if(mode==='trip'&&state.phase==='drive'&&truck.x>610){state.phase='back';ui('mission').textContent='BACK IT IN';ui('sub').textContent='Slow down and line up the trailer'}const inside=hitRect(trailer.x,trailer.y,t),ang=Math.abs(norm(trailer.a-t[4]));if(mode!=='free'&&inside&&ang<.38&&Math.abs(truck.v)<10)finish(true)}function finish(win){running=false;state.win=win;ui('message').classList.add('show');ui('msgTitle').textContent=win?'TOW COMPLETE!':'RIG WRECKED';ui('msgBody').textContent=win?`${state.stars} star finish · ${Math.round(state.damage)}% damage · trailer angle ${Math.round(Math.abs(norm(truck.a-trailer.a))*180/Math.PI)}°`:'Damage reached 100%. Slow down and leave more room for trailer swing.'}
function hud(){ui('gear').textContent=truck.v>1?'D':truck.v<-1?'R':'N';ui('speed').textContent=Math.round(Math.abs(truck.v)*.22);ui('angle').textContent=Math.round(Math.abs(norm(truck.a-trailer.a))*180/Math.PI)+'°';ui('damage').textContent=Math.round(state.damage)+'%';[...ui('stars').children].forEach((s,i)=>s.classList.toggle('dim',i>=state.stars))}
function rect(x,y,w,h,a,c){X.save();X.translate(x,y);X.rotate(a);X.fillStyle=c;X.strokeStyle='#111827';X.lineWidth=3;X.beginPath();X.roundRect(-w/2,-h/2,w,h,9);X.fill();X.stroke();X.restore()}function draw(){X.clearRect(0,0,W,H);X.fillStyle='#2f5b3e';X.fillRect(0,0,W,H);X.fillStyle='#454b50';X.fillRect(20,315,1240,180);X.fillRect(810,80,280,650);X.strokeStyle='#d8dde2';X.lineWidth=3;X.setLineDash([22,20]);X.beginPath();X.moveTo(40,405);X.lineTo(1240,405);X.stroke();X.setLineDash([]);const L=levels[level],t=L.target;if(L.type==='boat'){X.fillStyle='#256b8a';X.fillRect(810,650,280,150);for(let y=665;y<800;y+=22){X.strokeStyle='#60a5c4';X.beginPath();X.moveTo(810,y);X.lineTo(1090,y);X.stroke()}}X.fillStyle=state.win?'#22c55e66':'#3b82f655';X.strokeStyle=state.win?'#86efac':'#93c5fd';X.lineWidth=4;X.setLineDash([12,8]);X.fillRect(t[0],t[1],t[2],t[3]);X.strokeRect(t[0],t[1],t[2],t[3]);X.setLineDash([]);L.obs.forEach((o,i)=>{X.fillStyle=i%2?'#6b442a':'#315c2c';X.fillRect(o[0],o[1],o[2],o[3]);X.strokeStyle='#d6a477';X.strokeRect(o[0],o[1],o[2],o[3])});X.globalAlpha=.23;X.fillStyle='#111';state.tracks.forEach(p=>{X.save();X.translate(p[0],p[1]);X.rotate(p[2]);X.fillRect(-5,-2,10,4);X.restore()});X.globalAlpha=1;const h=hitch();X.strokeStyle='#d1d5db';X.lineWidth=6;X.beginPath();X.moveTo(h.x,h.y);X.lineTo(trailer.x+Math.cos(trailer.a)*rigs[rig].len*.48,trailer.y+Math.sin(trailer.a)*rigs[rig].len*.48);X.stroke();if(rig==='boat'){rect(trailer.x,trailer.y,rigs.boat.len,rigs.boat.w,trailer.a,'#cde8f5');X.save();X.translate(trailer.x,trailer.y);X.rotate(trailer.a);X.fillStyle='#2563eb';X.beginPath();X.moveTo(70,0);X.lineTo(-68,-24);X.lineTo(-68,24);X.closePath();X.fill();X.restore()}else{rect(trailer.x,trailer.y,rigs.rv.len,rigs.rv.w,trailer.a,rigs.rv.color);X.save();X.translate(trailer.x,trailer.y);X.rotate(trailer.a);X.fillStyle='#94a3b8';X.fillRect(-20,-19,36,38);X.fillStyle='#bfdbfe';X.fillRect(34,-20,28,40);X.restore()}rect(truck.x,truck.y,92,50,truck.a,'#ef4444');X.save();X.translate(truck.x,truck.y);X.rotate(truck.a);X.fillStyle='#93c5fd';X.fillRect(10,-20,25,40);X.fillStyle='#111827';X.fillRect(-35,-18,28,36);X.restore();const ja=Math.abs(norm(truck.a-trailer.a));if(ja>.72){X.fillStyle='#b91c1cee';X.fillRect(20,90,255,38);X.fillStyle='white';X.font='bold 16px system-ui';X.fillText('JACKKNIFE RISK — STRAIGHTEN',32,115)}}
function loop(t){const dt=Math.min((t-last)/1000,.035);last=t;update(dt);draw();requestAnimationFrame(loop)}function bind(){document.querySelectorAll('[data-key]').forEach(b=>{const k=b.dataset.key,down=e=>{e.preventDefault();keys.add(k);b.classList.add('on')},up=e=>{e.preventDefault();keys.delete(k);b.classList.remove('on')};b.onpointerdown=down;b.onpointerup=up;b.onpointercancel=up;b.onpointerleave=up});addEventListener('keydown',e=>{if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault();keys.add(e.code)});addEventListener('keyup',e=>keys.delete(e.code));ui('play').onclick=init;ui('again').onclick=init;ui('reset').onclick=init;ui('camera').onclick=()=>view=(view+1)%3}choices();bind();last=performance.now();requestAnimationFrame(loop);
</script>
</body>
</html>
