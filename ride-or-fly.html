<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Ride or Fly</title><style>*{box-sizing:border-box;user-select:none;-webkit-user-select:none;touch-action:none}html,body{margin:0;height:100%;overflow:hidden;background:#120b08;color:#fff;font-family:system-ui,-apple-system,Segoe UI,sans-serif}canvas{width:100vw;height:100vh;display:block;background:#7c2d12}.hud{position:fixed;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;gap:8px;z-index:5;pointer-events:none}.pill{background:rgba(20,10,5,.74);border:1px solid rgba(255,255,255,.22);border-radius:14px;padding:8px 10px;font-weight:1000;box-shadow:0 8px 22px rgba(0,0,0,.25)}.overlay{position:fixed;inset:0;display:grid;place-items:center;background:rgba(17,7,3,.84);z-index:10;padding:20px;text-align:center}.card{width:min(92vw,560px);background:linear-gradient(180deg,#991b1b,#431407);border:2px solid #fecaca;border-radius:26px;padding:24px;box-shadow:0 24px 80px rgba(0,0,0,.55)}h1{font-size:clamp(44px,12vw,76px);line-height:.82;margin:0 0 12px;color:#fecaca;text-shadow:0 4px 0 rgba(0,0,0,.35)}p{color:#fee2e2;font-weight:750;line-height:1.4}.btn{border:0;border-radius:999px;background:linear-gradient(135deg,#fca5a5,#f97316);color:#431407;font-weight:1000;padding:14px 22px;font-size:18px;margin-top:14px}.controls{position:fixed;bottom:16px;left:0;right:0;display:flex;justify-content:center;gap:10px;z-index:6}.cbtn{width:72px;height:64px;border-radius:18px;border:2px solid rgba(255,255,255,.32);background:rgba(67,20,7,.72);color:#fff;font-weight:1000;font-size:20px;box-shadow:0 7px 0 rgba(0,0,0,.28)}.cbtn.on{transform:scale(.93);background:rgba(248,113,113,.7)}a{position:fixed;left:50%;bottom:8px;transform:translateX(-50%);z-index:7;color:#fee2e2;text-decoration:none;font-size:12px;font-weight:900;background:rgba(0,0,0,.25);padding:6px 10px;border-radius:999px}</style></head><body><canvas id="c"></canvas><div class="hud"><div class="pill" id="time">Ride 0.0s</div><div class="pill" id="level">Bronco</div><div class="pill" id="best">Best 0.0s</div></div><div class="controls"><button class="cbtn" data-k="ArrowLeft">◀</button><button class="cbtn" data-k="ArrowUp">▲</button><button class="cbtn" data-k="ArrowDown">▼</button><button class="cbtn" data-k="ArrowRight">▶</button></div><a href="index.html">← K2 HUB</a><div class="overlay" id="overlay"><div class="card"><h1>Ride or Fly</h1><p>Stay balanced on the wildest rodeo ride in town. The animal bucks, spins, and changes direction. Counter the lean before you go flying.</p><button class="btn" id="start">CLIMB ON</button></div></div><script>(()=>{const c=document.getElementById('c'),x=c.getContext('2d');let W,H,D=1;function rs(){D=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0)}addEventListener('resize',rs);rs();const keys={},ui={time:gid('time'),level:gid('level'),best:gid('best'),overlay:gid('overlay')};function gid(id){return document.getElementById(id)}let run=false,last=0,t=0,best=Number(localStorage.rideOrFlyBest||0),lean=0,force=0,buck=0,spin=0,shake=0,riderY=0,animal='BRONCO';function reset(){run=true;t=0;lean=0;force=0;buck=0;spin=0;shake=0;riderY=0;animal=Math.random()<.5?'BULL':'BRONCO';ui.overlay.style.display='none';last=performance.now();requestAnimationFrame(loop)}function update(dt){if(!run)return;t+=dt;let diff=1+t*.08;buck+=dt*(3.5+diff*.8);spin+=dt*(1.6+Math.sin(t*.8)*.8);force+=Math.sin(buck)*dt*diff*.9+Math.sin(spin*2.1)*dt*diff*.55+(Math.random()-.5)*dt*diff*.7;let input=(keys.ArrowRight||keys.KeyD?1:0)-(keys.ArrowLeft||keys.KeyA?1:0);let up=(keys.ArrowUp||keys.KeyW?1:0)-(keys.ArrowDown||keys.KeyS?1:0);lean+=force+input*dt*1.85+up*dt*.55;lean*=.993;if(Math.abs(lean)>1.15){end();return}ui.time.textContent='Ride '+t.toFixed(1)+'s';ui.level.textContent=animal+' x'+diff.toFixed(1);ui.best.textContent='Best '+best.toFixed(1)+'s'}function end(){run=false;best=Math.max(best,t);localStorage.rideOrFlyBest=best;ui.overlay.style.display='grid';ui.overlay.querySelector('h1').textContent='You Flew!';ui.overlay.querySelector('p').textContent='Ride time: '+t.toFixed(1)+' seconds. Best: '+best.toFixed(1)+' seconds. Gravity remains undefeated.';ui.overlay.querySelector('.btn').textContent='RIDE AGAIN'}function draw(){x.clearRect(0,0,W,H);x.fillStyle='#78350f';x.fillRect(0,0,W,H);x.fillStyle='#451a03';x.fillRect(0,H*.68,W,H*.32);for(let i=0;i<18;i++){x.fillStyle=i%2?'#92400e':'#b45309';x.fillRect(i*W/18,H*.68,20,H*.32)}let cx=W/2+(Math.random()-.5)*shake,cy=H*.55;let bodyTilt=Math.sin(buck)*.28+lean*.25;x.save();x.translate(cx,cy);x.rotate(bodyTilt);x.fillStyle=animal==='BULL'?'#4b1d0b':'#7c2d12';x.beginPath();x.ellipse(0,28,105,48,0,0,7);x.fill();x.fillStyle=animal==='BULL'?'#3f1608':'#92400e';x.beginPath();x.arc(72,0,44,0,7);x.fill();if(animal==='BULL'){x.strokeStyle='#fef3c7';x.lineWidth=6;x.beginPath();x.moveTo(92,-26);x.lineTo(130,-48);x.moveTo(92,-12);x.lineTo(132,-18);x.stroke()}x.fillStyle='#111827';x.fillRect(-64,60,18,56);x.fillRect(22,60,18,56);x.fillRect(-8,60,18,56);x.fillRect(72,42,18,50);x.restore();let rx=cx+lean*120,ry=cy-72+Math.sin(buck*2)*18;x.save();x.translate(rx,ry);x.rotate(lean*.95+Math.sin(buck)*.18);x.fillStyle='#2563eb';x.fillRect(-16,-18,32,48);x.fillStyle='#fed7aa';x.beginPath();x.arc(0,-34,15,0,7);x.fill();x.fillStyle='#78350f';x.fillRect(-30,-49,60,8);x.fillRect(-18,-64,36,16);x.strokeStyle='#f8fafc';x.lineWidth=6;x.beginPath();x.moveTo(-12,-5);x.lineTo(-54,-24);x.moveTo(12,-5);x.lineTo(48,-32);x.stroke();x.restore();x.fillStyle='rgba(255,255,255,.12)';x.fillRect(W*.15,H*.14,W*.70,22);let safe=1-Math.abs(lean)/1.15;x.fillStyle=safe>.55?'#22c55e':safe>.25?'#facc15':'#ef4444';x.fillRect(W*.15,H*.14,W*.70*safe,22);x.strokeStyle='#fff';x.strokeRect(W*.15,H*.14,W*.70,22)}function loop(now){let dt=Math.min(.033,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}document.getElementById('start').onclick=reset;addEventListener('keydown',e=>{keys[e.code]=true;if(e.code.startsWith('Arrow'))e.preventDefault()});addEventListener('keyup',e=>keys[e.code]=false);document.querySelectorAll('[data-k]').forEach(b=>{let k=b.dataset.k;b.onpointerdown=e=>{keys[k]=true;b.classList.add('on');e.preventDefault()};b.onpointerup=b.onpointercancel=()=>{keys[k]=false;b.classList.remove('on')}});})();</script></body></html>
