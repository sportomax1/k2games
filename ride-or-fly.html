<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Ride or Fly</title><style>*{box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;touch-action:none}html,body{margin:0;height:100%;overflow:hidden;background:#120b08;color:#fff;font-family:system-ui,-apple-system,Segoe UI,sans-serif}canvas{width:100vw;height:100vh;display:block}.hud{position:fixed;top:max(10px,env(safe-area-inset-top));left:10px;right:10px;display:flex;justify-content:space-between;gap:8px;z-index:5;pointer-events:none}.pill{background:rgba(20,10,5,.78);border:1px solid rgba(255,255,255,.22);border-radius:14px;padding:8px 10px;font-weight:1000;box-shadow:0 8px 22px rgba(0,0,0,.25)}.pill b{color:#fecaca}.overlay{position:fixed;inset:0;display:grid;place-items:center;background:rgba(17,7,3,.84);z-index:10;padding:20px;text-align:center}.card{width:min(94vw,680px);background:linear-gradient(180deg,#991b1b,#431407);border:2px solid #fecaca;border-radius:28px;padding:24px;box-shadow:0 24px 80px rgba(0,0,0,.55)}h1{font-size:clamp(44px,12vw,80px);line-height:.82;margin:0 0 12px;color:#fecaca;text-shadow:0 5px 0 rgba(0,0,0,.35)}p{color:#fee2e2;font-weight:760;line-height:1.4}.btn{border:0;border-radius:999px;background:linear-gradient(135deg,#fca5a5,#f97316);color:#431407;font-weight:1000;padding:14px 22px;font-size:18px;margin-top:14px}.controls{position:fixed;bottom:calc(16px + env(safe-area-inset-bottom));left:0;right:0;display:flex;justify-content:center;gap:10px;z-index:6}.cbtn{width:72px;height:64px;border-radius:18px;border:2px solid rgba(255,255,255,.32);background:rgba(67,20,7,.74);color:#fff;font-weight:1000;font-size:18px;box-shadow:0 7px 0 rgba(0,0,0,.28)}.cbtn small{display:block;font-size:9px;opacity:.72}.cbtn.on{transform:scale(.93);background:rgba(248,113,113,.75)}#meter{position:fixed;left:50%;top:86px;transform:translateX(-50%);width:min(460px,76vw);height:20px;border-radius:999px;background:rgba(0,0,0,.46);border:1px solid rgba(255,255,255,.24);z-index:5;overflow:hidden}#meter i{display:block;height:100%;width:50%;margin-left:25%;background:linear-gradient(90deg,#ef4444,#facc15,#22c55e,#facc15,#ef4444);border-radius:999px}a{position:fixed;left:50%;bottom:6px;transform:translateX(-50%);z-index:7;color:#fee2e2;text-decoration:none;font-size:12px;font-weight:900;background:rgba(0,0,0,.25);padding:6px 10px;border-radius:999px}@media(max-width:700px){.pill{font-size:12px;padding:7px 8px}.cbtn{width:63px;height:58px;font-size:14px}.hud{gap:5px}}</style></head><body><canvas id="c"></canvas><div class="hud"><div class="pill" id="time">Ride <b>0.0s</b></div><div class="pill" id="rank">Rookie</div><div class="pill" id="combo">Tricks 0</div><div class="pill" id="best">Best 0.0s</div></div><div id="meter"><i id="safe"></i></div><div class="controls"><button class="cbtn" data-k="ArrowLeft">◀<small>LEAN</small></button><button class="cbtn" data-k="ArrowUp">▲<small>GRIP</small></button><button class="cbtn" data-k="ArrowDown">▼<small>DUCK</small></button><button class="cbtn" data-k="ArrowRight">▶<small>LEAN</small></button></div><a href="index.html">← K2 HUB</a><div class="overlay" id="overlay"><div class="card"><h1>Ride or Fly</h1><p>Survive the bucking pattern, counter lean, duck spins, grip through jumps, and score trick bonuses without getting launched into the cheap seats.</p><button class="btn" id="start">CLIMB ON</button></div></div><script>(()=>{const c=document.getElementById('c'),x=c.getContext('2d');let W,H,D=1;function rs(){D=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0)}addEventListener('resize',rs);rs();const keys={},ui={time:gid('time'),rank:gid('rank'),combo:gid('combo'),best:gid('best'),overlay:gid('overlay'),safe:gid('safe')};function gid(id){return document.getElementById(id)}let run=false,last=0,t=0,best=Number(localStorage.rideOrFlyBest||0),lean=0,pitch=0,force=0,buck=0,spin=0,shake=0,animal='BRONCO',tricks=0,score=0,comboT=0,pattern='BUCK',warning='',sparks=[],crowd=[];function rnd(a,b){return a+Math.random()*(b-a)}for(let i=0;i<70;i++)crowd.push({x:Math.random(),y:Math.random(),c:['#fee2e2','#fed7aa','#bfdbfe','#fde68a'][i%4]});function reset(){run=true;t=0;lean=0;pitch=0;force=0;buck=0;spin=0;shake=0;tricks=0;score=0;comboT=0;pattern='BUCK';warning='';sparks=[];animal=Math.random()<.55?'BULL':Math.random()<.75?'BRONCO':'BISON';ui.overlay.style.display='none';last=performance.now();requestAnimationFrame(loop)}function burst(px,py,n){for(let i=0;i<n;i++)sparks.push({x:px,y:py,vx:rnd(-5,5),vy:rnd(-7,1),l:rnd(18,50),c:['#fecaca','#f97316','#fde68a'][i%3]})}function update(dt){if(!run)return;t+=dt;let diff=1+t*.085;let oldPattern=pattern;if(Math.floor(t*1.35)%5===0)pattern='SPIN';else if(Math.floor(t*1.1)%7===0)pattern='JUMP';else if(Math.floor(t*.9)%6===0)pattern='REV';else pattern='BUCK';if(pattern!==oldPattern){warning=pattern;burst(W/2,H*.42,18)}buck+=dt*(3.7+diff*.82);spin+=dt*(1.55+Math.sin(t*.78)*.9);let dir=pattern==='REV'?-1:1,grip=keys.ArrowUp||keys.KeyW,duck=keys.ArrowDown||keys.KeyS;force+=Math.sin(buck)*dt*diff*.95+Math.sin(spin*2.15)*dt*diff*.56+(Math.random()-.5)*dt*diff*.72;if(pattern==='SPIN')force+=dir*Math.sin(spin*4)*dt*diff*1.2;if(pattern==='JUMP')pitch+=Math.sin(buck*2)*dt*diff*.55*(grip?.45:1);let input=(keys.ArrowRight||keys.KeyD?1:0)-(keys.ArrowLeft||keys.KeyA?1:0);let vertical=(grip?1:0)-(duck?1:0);lean+=force+input*dt*(2.0+(duck?.4:0))+vertical*dt*.22;lean*=grip?.989:.994;pitch*=.985;let danger=Math.max(Math.abs(lean),Math.abs(pitch)*.75);if(danger>1.16){end();return}if(danger<.32&&Math.abs(input)>0&&comboT<=0){tricks++;score+=100+Math.floor(t*5);comboT=.55;burst(W/2+lean*120,H*.46,10)}comboT-=dt;score+=dt*(30+tricks*2);sparks.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.l--});sparks=sparks.filter(p=>p.l>0);let rank=t>45?'Legend':t>30?'Pro Rider':t>18?'Wrangler':t>8?'Cowpoke':'Rookie';ui.time.innerHTML='Ride <b>'+t.toFixed(1)+'s</b>';ui.rank.textContent=rank+' · '+animal;ui.combo.textContent='Tricks '+tricks;ui.best.textContent='Best '+best.toFixed(1)+'s';let safe=1-danger/1.16;ui.safe.style.width=Math.round(Math.max(0,safe)*100)+'%';ui.safe.style.marginLeft='0'}function end(){run=false;best=Math.max(best,t);localStorage.rideOrFlyBest=best;ui.overlay.style.display='grid';ui.overlay.querySelector('h1').textContent='You Flew!';ui.overlay.querySelector('p').textContent='Ride '+t.toFixed(1)+'s · tricks '+tricks+' · score '+Math.floor(score)+'. Best ride '+best.toFixed(1)+'s.';ui.overlay.querySelector('.btn').textContent='RIDE AGAIN'}function draw(){x.clearRect(0,0,W,H);let g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#450a0a');g.addColorStop(.65,'#7c2d12');g.addColorStop(1,'#451a03');x.fillStyle=g;x.fillRect(0,0,W,H);x.fillStyle='rgba(0,0,0,.24)';x.fillRect(0,0,W,H*.25);crowd.forEach((p,i)=>{x.fillStyle=p.c;x.globalAlpha=.75;x.fillRect(p.x*W,(.04+p.y*.18)*H,5,5);x.globalAlpha=1});x.fillStyle='#451a03';x.fillRect(0,H*.68,W,H*.32);for(let i=0;i<18;i++){x.fillStyle=i%2?'#92400e':'#b45309';x.fillRect(i*W/18,H*.68,20,H*.32)}let cx=W/2+(Math.random()-.5)*shake,cy=H*.55;let bodyTilt=Math.sin(buck)*.30+lean*.25;x.save();x.translate(cx,cy);x.rotate(bodyTilt);x.fillStyle=animal==='BULL'?'#4b1d0b':animal==='BISON'?'#2f1a12':'#7c2d12';x.beginPath();x.ellipse(0,28,animal==='BISON'?122:105,animal==='BISON'?55:48,0,0,7);x.fill();x.fillStyle=animal==='BULL'?'#3f1608':animal==='BISON'?'#1c100b':'#92400e';x.beginPath();x.arc(72,0,animal==='BISON'?54:44,0,7);x.fill();x.strokeStyle='#fef3c7';x.lineWidth=6;x.beginPath();x.moveTo(92,-26);x.lineTo(130,-48);x.moveTo(92,-12);x.lineTo(132,-18);x.stroke();x.fillStyle='#111827';for(let i=0;i<4;i++)x.fillRect([-64,-8,22,72][i],i===3?42:60,18,i===3?50:56);x.restore();let rx=cx+lean*128,ry=cy-74+Math.sin(buck*2)*20+pitch*50;x.save();x.translate(rx,ry);x.rotate(lean*.95+Math.sin(buck)*.18+pitch*.5);x.fillStyle='#2563eb';x.fillRect(-17,-19,34,50);x.fillStyle='#fed7aa';x.beginPath();x.arc(0,-36,16,0,7);x.fill();x.fillStyle='#78350f';x.fillRect(-31,-51,62,8);x.fillRect(-19,-67,38,17);x.strokeStyle='#f8fafc';x.lineWidth=6;x.beginPath();x.moveTo(-12,-5);x.lineTo(-54,-24);x.moveTo(12,-5);x.lineTo(48,-32);x.stroke();x.restore();x.fillStyle=pattern==='SPIN'?'#fca5a5':pattern==='JUMP'?'#fde68a':pattern==='REV'?'#93c5fd':'#fff';x.font='1000 32px system-ui';x.textAlign='center';x.fillText(pattern,W/2,H*.34);sparks.forEach(p=>{x.fillStyle=p.c;x.fillRect(p.x,p.y,5,5)})}function loop(now){let dt=Math.min(.033,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}document.getElementById('start').onclick=reset;addEventListener('keydown',e=>{keys[e.code]=true;if(e.code.startsWith('Arrow'))e.preventDefault()});addEventListener('keyup',e=>keys[e.code]=false);document.querySelectorAll('[data-k]').forEach(b=>{let k=b.dataset.k;b.onpointerdown=e=>{keys[k]=true;b.classList.add('on');e.preventDefault()};b.onpointerup=b.onpointercancel=()=>{keys[k]=false;b.classList.remove('on')}});})();</script></body></html>
