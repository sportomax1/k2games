<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#07111f"><title>Weather Whiz</title><style>:root{--b:#07111f;--p:#10233b;--p2:#172f4c;--t:#f7fbff;--m:#9fb4c9;--a:#58d6ff;--g:#49e3a4;--l:#ffffff18}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#173d69,var(--b) 42%);color:var(--t);font:15px system-ui,sans-serif}button,input,select{font:inherit}.app{max-width:1180px;margin:auto;padding:16px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;gap:12px;align-items:center}.logo{width:48px;height:48px;border-radius:15px;display:grid;place-items:center;font-size:26px;background:linear-gradient(135deg,var(--a),#8d7dff)}h1{margin:0;font-size:28px}.muted{color:var(--m)}.tabs{display:flex;gap:8px;overflow:auto;padding:14px 0}.tab,.btn{border:1px solid var(--l);background:#ffffff0d;color:var(--t);padding:10px 13px;border-radius:13px;cursor:pointer}.tab.active,.primary{background:linear-gradient(135deg,var(--a),#3b9cff);color:#00131e;font-weight:800;border:0}.grid{display:grid;grid-template-columns:1fr 310px;gap:16px}.card{background:linear-gradient(180deg,var(--p),#0b1a2d);border:1px solid var(--l);border-radius:22px;box-shadow:0 20px 60px #0006}.game{min-height:650px;padding:22px;display:flex;flex-direction:column}.meta{display:flex;justify-content:space-between;color:var(--m)}.hero{margin:auto;text-align:center;width:min(720px,100%)}.emoji{font-size:68px}.q{font-size:clamp(32px,6vw,58px);font-weight:900;line-height:1;margin:12px 0}.big{font-size:clamp(44px,8vw,80px);font-weight:950}.choices{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.choice{min-height:62px}.choice.sel{outline:3px solid #58d6ff66;background:#58d6ff22}.actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:22px}.side{display:grid;gap:16px;align-content:start}.panel{padding:16px}.panel h2{font-size:15px;margin:0 0 12px}.field{margin:10px 0}.field label{display:block;color:var(--m);font-size:12px;margin-bottom:5px}.field input,.field select{width:100%;background:#081729;color:white;border:1px solid var(--l);border-radius:11px;padding:10px}.players{display:grid;gap:8px}.player{display:grid;grid-template-columns:34px 1fr auto;gap:9px;align-items:center;padding:9px;border-radius:12px}.player.active{background:#58d6ff1c}.av{width:34px;height:34px;border-radius:10px;background:var(--p2);display:grid;place-items:center;font-weight:900}.score{font-size:20px;font-weight:900}.timebox{display:grid;gap:10px}.step{display:grid;grid-template-columns:64px 1fr 64px;gap:8px}.step button{font-size:24px}.minute{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.range{width:100%;accent-color:var(--a)}.details{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:18px}.detail{background:#ffffff0d;border:1px solid var(--l);padding:10px;border-radius:12px}.detail b{display:block;font-size:18px}.hidden{display:none}.modal{position:fixed;inset:0;background:#000b;display:none;place-items:center;padding:16px}.modal.show{display:grid}.modalbox{width:min(500px,100%);padding:20px;background:#0c1a2b;border:1px solid var(--l);border-radius:20px}.pinput{display:grid;grid-template-columns:1fr auto;gap:8px;margin:8px 0}@media(max-width:850px){.grid{grid-template-columns:1fr}.side{grid-template-columns:1fr 1fr}.game{min-height:560px}}@media(max-width:560px){.side{grid-template-columns:1fr}.choices,.details{grid-template-columns:1fr 1fr}.app{padding:10px}h1{font-size:23px}}</style></head><body><div class="app"><header class="top"><div class="brand"><div class="logo">🌦️</div><div><h1>Weather Whiz</h1><div class="muted">Live weather, time zones and retro trivia</div></div></div><button class="btn" id="playersBtn">👥 Players</button></header><nav class="tabs" id="tabs"></nav><main class="grid"><section class="card game"><div class="meta"><span id="roundText">Round 1</span><span id="turnText">Kevin</span></div><div class="hero" id="game"></div></section><aside class="side"><section class="card panel"><h2>Scoreboard</h2><div class="players" id="scores"></div></section><section class="card panel"><h2>Settings</h2><div class="field"><label>Location pool</label><select id="pool"><option value="world">World Mix</option><option value="usa">United States</option><option value="capitals">World Capitals</option></select></div><div class="field"><label>Rounds</label><select id="rounds"><option>5</option><option selected>10</option><option>15</option><option>20</option></select></div><div class="field"><label>Units</label><select id="units"><option value="fahrenheit">°F / mph</option><option value="celsius">°C / km/h</option></select></div><div id="retroSettings" class="hidden"><div class="field"><label>Retro type</label><select id="retroType"><option value="random">Random historical day</option><option value="custom">Custom date</option><option value="month">Monthly average</option><option value="dayavg">Calendar-date average</option></select></div><div class="field" id="dateField"><label>Date</label><input id="retroDate" type="date" value="2020-07-04"></div><div class="field"><label>Average years</label><select id="years"><option>10</option><option selected>20</option><option>30</option></select></div></div><button class="btn primary" id="newBtn" style="width:100%;margin-top:10px">New Game</button></section></aside></main></div><div class="modal" id="modal"><div class="modalbox"><h2>Local Players</h2><div id="playerInputs"></div><div class="actions"><button class="btn" id="addPlayer">Add Player</button><button class="btn primary" id="savePlayers">Save</button></div></div></div><script>const MODES=[['temperature','🌡️ Temperature'],['time','🕐 Local Time'],['condition','🌦️ Condition'],['feels','🥵 Feels Like'],['wind','💨 Wind'],['humidity','💧 Humidity'],['rain','☔ Rain Chance'],['hotter','🔥 Hotter?'],['later','⏰ Later?'],['coldest','❄️ Coldest'],['ranking','📊 Ranking'],['world','🌍 World Challenge'],['retro','📼 Retro']];const LOCS=[['Denver','USA',39.739,-104.99,'America/Denver','🇺🇸'],['Miami','USA',25.76,-80.19,'America/New_York','🇺🇸'],['Anchorage','USA',61.22,-149.9,'America/Anchorage','🇺🇸'],['Honolulu','USA',21.31,-157.86,'Pacific/Honolulu','🇺🇸'],['New York','USA',40.71,-74.01,'America/New_York','🇺🇸'],['Phoenix','USA',33.45,-112.07,'America/Phoenix','🇺🇸'],['London','UK',51.51,-.13,'Europe/London','🇬🇧'],['Tokyo','Japan',35.68,139.69,'Asia/Tokyo','🇯🇵'],['Delhi','India',28.61,77.21,'Asia/Kolkata','🇮🇳'],['Kathmandu','Nepal',27.72,85.32,'Asia/Kathmandu','🇳🇵'],['Sydney','Australia',-33.87,151.21,'Australia/Sydney','🇦🇺'],['Paris','France',48.86,2.35,'Europe/Paris','🇫🇷'],['Reykjavik','Iceland',64.15,-21.94,'Atlantic/Reykjavik','🇮🇸'],['Nairobi','Kenya',-1.29,36.82,'Africa/Nairobi','🇰🇪'],['Lima','Peru',-12.05,-77.04,'America/Lima','🇵🇪'],['St. John’s','Canada',47.56,-52.71,'America/St_Johns','🇨🇦']].map(x=>({name:x[0],country:x[1],lat:x[2],lon:x[3],tz:x[4],emoji:x[5]}));let S={mode:'temperature',players:[{name:'Kevin',score:0},{name:'Player 2',score:0}],round:1,total:10,pi:0,locs:[],weather:[],guess:null,phase:'guess'};const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],rand=a=>a[Math.floor(Math.random()*a.length)],fmt=(n,u)=>Math.round(n)+(u==='fahrenheit'?'°F':'°C');function pool(){let p=$('#pool').value;if(p==='usa')return LOCS.filter(x=>x.country==='USA');if(p==='capitals')return LOCS.filter(x=>!['Denver','Miami','Anchorage','Honolulu','Phoenix','St. John’s'].includes(x.name));return LOCS}function pick(n){return [...pool()].sort(()=>Math.random()-.5).slice(0,n)}function tabs(){$('#tabs').innerHTML=MODES.map(m=>`<button class="tab ${S.mode===m[0]?'active':''}" data-mode="${m[0]}">${m[1]}</button>`).join('');$$('[data-mode]').forEach(b=>b.onclick=()=>{S.mode=b.dataset.mode;$('#retroSettings').classList.toggle('hidden',S.mode!=='retro');newGame()})}function scores(){$('#scores').innerHTML=S.players.map((p,i)=>`<div class="player ${i===S.pi?'active':''}"><div class="av">${i+1}</div><div><b>${p.name}</b><div class="muted">Player ${i+1}</div></div><div class="score">${p.score}</div></div>`).join('')}async function current(l){let u=$('#units').value;let url=`https://api.open-meteo.com/v1/forecast?latitude=${l.lat}&longitude=${l.lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&hourly=precipitation_probability&temperature_unit=${u}&wind_speed_unit=${u==='fahrenheit'?'mph':'kmh'}&timezone=auto&forecast_days=1`;let d=await (await fetch(url)).json();return {...d.current,rain:d.hourly?.precipitation_probability?.[0]||0}}async function retro(l){let type=$('#retroType').value,date=$('#retroDate').value||'2020-07-04',years=+$('#years').value,u=$('#units').value,dates=[];if(type==='random'){let y=1950+Math.floor(Math.random()*75),m=1+Math.floor(Math.random()*12),day=1+Math.floor(Math.random()*28);dates=[`${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`]}else if(type==='custom')dates=[date];else{let md=date.slice(5),end=new Date().getFullYear()-1;for(let y=end-years+1;y<=end;y++)dates.push(type==='month'?`${y}-${md.slice(0,2)}-15`:`${y}-${md}`)}let vals=[];for(let d of dates){let url=`https://archive-api.open-meteo.com/v1/archive?latitude=${l.lat}&longitude=${l.lon}&start_date=${d}&end_date=${d}&daily=temperature_2m_mean,temperature_2m_max,temperature_2m_min&temperature_unit=${u}&timezone=auto`;let j=await (await fetch(url)).json();if(j.daily?.temperature_2m_mean?.[0]!=null)vals.push([j.daily.temperature_2m_mean[0],j.daily.temperature_2m_max[0],j.daily.temperature_2m_min[0]])}let avg=i=>vals.reduce((a,v)=>a+v[i],0)/vals.length;return{temperature_2m:avg(0),apparent_temperature:avg(0),relative_humidity_2m:0,weather_code:0,wind_speed_10m:0,rain:0,retro:true,label:type==='random'||type==='custom'?dates[0]:`${years}-year average`,max:avg(1),min:avg(2),samples:vals.length}}async function prepare(){S.phase='guess';S.guess=null;let n=['hotter','later'].includes(S.mode)?2:['coldest','ranking'].includes(S.mode)?4:1;S.locs=pick(n);$('#game').innerHTML='<div class="emoji">⏳</div><div class="q">Loading...</div>';try{S.weather=S.mode==='retro'?[await retro(S.locs[0])]:await Promise.all(S.locs.map(current));renderGuess()}catch(e){$('#game').innerHTML='<div class="emoji">⚠️</div><div class="q">Could not load weather</div><div class="muted">Check your connection and try again.</div><div class="actions"><button class="btn primary" onclick="prepare()">Retry</button></div>'}meta();scores()}function meta(){$('#roundText').textContent=`Round ${S.round} / ${S.total}`;$('#turnText').textContent=`${S.players[S.pi].name}'s turn`}function localMinutes(tz){let p=new Intl.DateTimeFormat('en-US',{timeZone:tz,hour:'numeric',minute:'2-digit',hour12:false}).formatToParts(new Date()),h=+(p.find(x=>x.type==='hour')?.value||0),m=+(p.find(x=>x.type==='minute')?.value||0);return (h%24)*60+m}function timeFmt(v){v=(v+1440)%1440;let h=Math.floor(v/60),m=v%60;return `${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`}function renderGuess(){let l=S.locs[0],u=$('#units').value,html=`<div class="emoji">${l.emoji}</div><div class="muted">${l.name}, ${l.country}</div>`;if(S.mode==='time'){S.guess=localMinutes(Intl.DateTimeFormat().resolvedOptions().timeZone);html+=`<div class="q">What time is it?</div><div class="big" id="timeVal">${timeFmt(S.guess)}</div><div class="timebox"><div class="step"><button class="btn" data-h="-1">−1h</button><div class="btn">Hour adjustment</div><button class="btn" data-h="1">+1h</button></div><div class="minute"><button class="btn" data-min="0">Same minutes</button><button class="btn" data-min="30">+30</button><button class="btn" data-min="45">+45</button></div></div>`}else if(['condition','hotter','later','coldest'].includes(S.mode)){let opts=S.mode==='condition'?['Clear','Cloudy','Rain','Snow','Fog','Storm']:S.locs.map((x,i)=>`${x.emoji} ${x.name}`);html+=`<div class="q">${S.mode==='condition'?'What is the weather?':S.mode==='hotter'?'Which is hotter?':S.mode==='later'?'Which has the later local time?':'Which is coldest?'}</div><div class="choices">${opts.map((x,i)=>`<button class="btn choice" data-choice="${i}">${x}</button>`).join('')}</div>`}else if(S.mode==='ranking'){S.guess=[0,1,2,3];html+=`<div class="q">Rank hottest to coldest</div><div class="choices">${S.locs.map((x,i)=>`<button class="btn choice" data-rank="${i}">${i+1}. ${x.name}</button>`).join('')}</div><div class="muted">Tap two locations to swap them.</div>`}else{let labels={temperature:'Guess the temperature',feels:'Guess the feels-like temperature',wind:'Guess the wind speed',humidity:'Guess the humidity',rain:'Guess the rain chance',world:'Guess the temperature',retro:'Guess the historical temperature'},min=u==='fahrenheit'?-40:-40,max=S.mode==='wind'?100:S.mode==='humidity'||S.mode==='rain'?100:u==='fahrenheit'?120:50,suf=S.mode==='wind'?(u==='fahrenheit'?' mph':' km/h'):S.mode==='humidity'||S.mode==='rain'?'%':u==='fahrenheit'?'°F':'°C';S.guess=Math.round((min+max)/2);html+=`<div class="q">${labels[S.mode]}</div><div class="big" id="numVal">${S.guess}${suf}</div><input class="range" id="range" type="range" min="${min}" max="${max}" value="${S.guess}">`}html+=`<div class="actions"><button class="btn primary" id="submit">Lock Guess</button></div>`;$('#game').innerHTML=html;wire()}function wire(){if($('#range'))$('#range').oninput=e=>{S.guess=+e.target.value;$('#numVal').textContent=e.target.value+($('#numVal').textContent.match(/[°% ].*/)?.[0]||'')};$$('[data-choice]').forEach(b=>b.onclick=()=>{$$('[data-choice]').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');S.guess=+b.dataset.choice});$$('[data-h]').forEach(b=>b.onclick=()=>{S.guess=(S.guess+1440+(+b.dataset.h)*60)%1440;$('#timeVal').textContent=timeFmt(S.guess)});$$('[data-min]').forEach(b=>b.onclick=()=>{let base=localMinutes(Intl.DateTimeFormat().resolvedOptions().timeZone),off=Math.round((S.guess-base)/60)*60;S.guess=(base+off+(+b.dataset.min)+1440)%1440;$('#timeVal').textContent=timeFmt(S.guess)});let selected=null;$$('[data-rank]').forEach(b=>b.onclick=()=>{let i=+b.dataset.rank;if(selected==null){selected=i;b.classList.add('sel')}else{[S.guess[selected],S.guess[i]]=[S.guess[i],S.guess[selected]];selected=null;renderGuess()}});$('#submit').onclick=reveal}function cat(c){return c===0||c<=2?'Clear':c===3?'Cloudy':[45,48].includes(c)?'Fog':c>=71&&c<=86?'Snow':c>=95?'Storm':'Rain'}function td(a,b){let d=Math.abs(a-b);return Math.min(d,1440-d)}function reveal(){let w=S.weather[0],u=$('#units').value,pts=0,actual='',truth=0;if(S.mode==='time'){truth=localMinutes(S.locs[0].tz);pts=Math.max(0,Math.round(100-td(S.guess,truth)/7.2));actual=timeFmt(truth)}else if(S.mode==='condition'){truth=['Clear','Cloudy','Rain','Snow','Fog','Storm'].indexOf(cat(w.weather_code));pts=S.guess===truth?100:0;actual=cat(w.weather_code)}else if(S.mode==='hotter'||S.mode==='later'||S.mode==='coldest'){let vals=S.mode==='later'?S.locs.map(x=>localMinutes(x.tz)):S.weather.map(x=>x.temperature_2m);truth=S.mode==='coldest'?vals.indexOf(Math.min(...vals)):vals.indexOf(Math.max(...vals));pts=S.guess===truth?100:0;actual=S.locs[truth].name}else if(S.mode==='ranking'){truth=S.weather.map((x,i)=>({i,v:x.temperature_2m})).sort((a,b)=>b.v-a.v).map(x=>x.i);pts=S.guess.filter((x,i)=>x===truth[i]).length*25;actual=truth.map(i=>S.locs[i].name).join(' → ')}else{let key={temperature:'temperature_2m',feels:'apparent_temperature',wind:'wind_speed_10m',humidity:'relative_humidity_2m',rain:'rain',world:'temperature_2m',retro:'temperature_2m'}[S.mode],v=w[key],span=['humidity','rain'].includes(S.mode)?50:S.mode==='wind'?40:u==='fahrenheit'?25:14;pts=Math.max(0,Math.round(100-Math.abs(S.guess-v)/span*100));actual=['humidity','rain'].includes(S.mode)?Math.round(v)+'%':S.mode==='wind'?Math.round(v)+(u==='fahrenheit'?' mph':' km/h'):fmt(v,u)}S.players[S.pi].score+=pts;scores();let extra=w.retro?`<div class="details"><div class="detail"><b>${fmt(w.temperature_2m,u)}</b><span>Mean</span></div><div class="detail"><b>${fmt(w.max,u)}</b><span>High</span></div><div class="detail"><b>${fmt(w.min,u)}</b><span>Low</span></div><div class="detail"><b>${w.samples}</b><span>Samples</span></div></div>`:'';$('#game').innerHTML=`<div class="emoji">${pts>=80?'🎯':pts>=40?'👍':'🧭'}</div><div class="muted">Correct answer</div><div class="q">${actual}</div><div class="big" style="color:var(--g)">+${pts}</div>${extra}<div class="actions"><button class="btn primary" id="next">${S.pi<S.players.length-1?'Pass Device':S.round<S.total?'Next Round':'Final Scores'}</button></div>`;$('#next').onclick=next}function next(){if(S.pi<S.players.length-1){S.pi++;prepare()}else if(S.round<S.total){S.pi=0;S.round++;prepare()}else final()}function final(){let a=[...S.players].sort((x,y)=>y.score-x.score);$('#game').innerHTML=`<div class="emoji">🏆</div><div class="q">${a[0].name} wins!</div>${a.map((p,i)=>`<div class="detail" style="margin:8px"><b>${i+1}. ${p.name}</b><span>${p.score} points</span></div>`).join('')}<div class="actions"><button class="btn primary" onclick="newGame()">Play Again</button></div>`}function newGame(){S.round=1;S.pi=0;S.total=+$('#rounds').value;S.players.forEach(p=>p.score=0);tabs();prepare()}function editPlayers(){let box=$('#playerInputs');box.innerHTML=S.players.map((p,i)=>`<div class="pinput"><input value="${p.name}" data-p="${i}"><button class="btn" data-del="${i}">✕</button></div>`).join('');$('#modal').classList.add('show');$$('[data-del]').forEach(b=>b.onclick=()=>{if(S.players.length>1){S.players.splice(+b.dataset.del,1);editPlayers()}})}$('#playersBtn').onclick=editPlayers;$('#addPlayer').onclick=()=>{if(S.players.length<8){S.players.push({name:`Player ${S.players.length+1}`,score:0});editPlayers()}};$('#savePlayers').onclick=()=>{$$('[data-p]').forEach(i=>S.players[+i.dataset.p].name=i.value.trim()||`Player ${+i.dataset.p+1}`);$('#modal').classList.remove('show');newGame()};$('#newBtn').onclick=newGame;$('#retroType').onchange=()=>$('#dateField').classList.toggle('hidden',$('#retroType').value==='random');tabs();newGame();</script></body></html>
