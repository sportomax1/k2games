<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird Pro - K2 games</title>
    <style>
        :root {
            --bg: #70c5ce;
            --bird: #f1c40f;
            --accent: #e67e22;
            --glass: rgba(255, 255, 255, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 90vmin;
            height: 120vmin; /* 400:600 ratio approx */
            max-width: 400px;
            max-height: 600px;
            background: #fff;
            border-radius: 20px;
            border: 6px solid #333;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; }

        #hud {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 100;
        }

        #score-val { font-size: 3rem; font-weight: 900; text-shadow: 0 4px 0 #000; }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
            padding: 20px;
        }

        h1 { font-size: 3.5rem; font-weight: 900; color: var(--bird); text-shadow: 0 4px 0 #000; margin-bottom: 10px; }
        .btn {
            background: #e67e22;
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 10px 0 #d35400;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 6px 0 #d35400; }

        .back-link {
            position: fixed; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(0,0,0,0.2); padding: 10px 20px; border-radius: 12px; z-index: 1100;
            font-weight: bold; font-size: 0.8rem;
        }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CCZ9JJGEDP');
    </script>
</head>
<body>
    <a href="index.html" class="back-link">← HUB</a>

    <div id="game-container">
        <div id="hud">
            <div id="score-val">0</div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="start-screen" class="overlay">
            <h1>FLAPPY BIRD</h1>
            <p style="margin-bottom: 10px;">Tap or Press Space to Fly</p>
            <p id="start-hi-score" style="margin-bottom: 30px; font-weight: bold; color: var(--accent);"></p>
            <button class="btn" onclick="game.start()">START</button>
        </div>

        <div id="over-screen" class="overlay" style="display: none;">
            <h1>OOF!</h1>
            <p id="final-stats" style="margin-bottom: 10px; font-size: 1.2rem;"></p>
            <p id="over-hi-score" style="margin-bottom: 30px; font-weight: bold; color: var(--bird);"></p>
            <button class="btn" onclick="location.reload()">RETRY</button>
        </div>
    </div>

    <script>
        class FlappyGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.width = 400;
                this.height = 600;
                this.canvas.width = this.width;
                this.canvas.height = this.height;

                this.bird = { x: 50, y: 300, w: 34, h: 24, vy: 0, gravity: 0.25, jump: -4.6, rot: 0 };
                this.pipes = [];
                this.score = 0;
                this.highScore = parseInt(localStorage.getItem('k2-flappy-hi') || 0);
                this.playing = false;
                this.gameOver = false;
                this.frame = 0;

                document.getElementById('start-hi-score').textContent = `BEST: ${this.highScore}`;
                this.setupInput();
                this.loop();
            }

            setupInput() {
                const jump = () => {
                    if (!this.playing && !this.gameOver) this.start();
                    if (this.playing) this.bird.vy = this.bird.jump;
                };
                window.onkeydown = (e) => { if (e.code === 'Space' || e.code === 'ArrowUp') jump(); };
                this.canvas.ontouchstart = (e) => { e.preventDefault(); jump(); };
            }

            start() {
                document.getElementById('start-screen').style.display = 'none';
                this.playing = true;
                this.spawnPipe();
            }

            spawnPipe() {
                const gap = 150;
                const minH = 50;
                const maxH = this.height - gap - minH;
                const topH = Math.random() * (maxH - minH) + minH;
                this.pipes.push({ x: this.width, topH, bottomY: topH + gap, w: 50, passed: false });
            }

            update() {
                // Gamepad Polling
                const pads = navigator.getGamepads();
                if (pads[0]) {
                    const p = pads[0];
                    if (p.buttons[0].pressed || p.buttons[7].pressed) {
                        if (!this.padHandled) {
                            if (!this.playing && !this.gameOver) this.start();
                            if (this.playing) this.bird.vy = this.bird.jump;
                            this.padHandled = true;
                        }
                    } else {
                        this.padHandled = false;
                    }
                    if (p.buttons[9].pressed && this.gameOver) location.reload();
                }

                if(!this.playing) return;

                this.frame++;
                this.bird.vy += this.bird.gravity;
                this.bird.y += this.bird.vy;
                this.bird.rot = Math.min(Math.PI/4, Math.max(-Math.PI/4, this.bird.vy * 0.1));

                if (this.bird.y < 0 || this.bird.y + this.bird.h > this.height) this.die();

                if (this.frame % 100 === 0) this.spawnPipe();

                this.pipes.forEach((p, i) => {
                    p.x -= 3;
                    if (p.x + p.w < 0) this.pipes.splice(i, 1);

                    if (!p.passed && p.x < this.bird.x) {
                        p.passed = true;
                        this.score++;
                        document.getElementById('score-val').textContent = this.score;
                    }

                    if (this.bird.x + this.bird.w > p.x && this.bird.x < p.x + p.w) {
                        if (this.bird.y < p.topH || this.bird.y + this.bird.h > p.bottomY) this.die();
                    }
                });
            }

            die() {
                this.playing = false;
                this.gameOver = true;
                
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('k2-flappy-hi', this.highScore);
                }

                document.getElementById('over-screen').style.display = 'flex';
                document.getElementById('final-stats').textContent = `SCORE: ${this.score}`;
                document.getElementById('over-hi-score').textContent = `BEST: ${this.highScore}`;
            }

            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.width, this.height);

                // Sky
                ctx.fillStyle = '#70c5ce';
                ctx.fillRect(0, 0, this.width, this.height);

                // Pipes
                ctx.fillStyle = '#2ecc71';
                this.pipes.forEach(p => {
                    ctx.fillRect(p.x, 0, p.w, p.topH);
                    ctx.fillRect(p.x, p.bottomY, p.w, this.height - p.bottomY);
                    ctx.strokeStyle = '#27ae60'; ctx.lineWidth = 4;
                    ctx.strokeRect(p.x, 0, p.w, p.topH);
                    ctx.strokeRect(p.x, p.bottomY, p.w, this.height - p.bottomY);
                });

                // Bird
                ctx.save();
                ctx.translate(this.bird.x + this.bird.w/2, this.bird.y + this.bird.h/2);
                ctx.rotate(this.bird.rot);
                ctx.font = '30px Arial';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('🐤', 0, 0);
                ctx.restore();
            }

            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        }

        const game = new FlappyGame();
    </script>
</body>
</html>
