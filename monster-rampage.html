<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaiju City Rampage - K2 Games</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between; padding: 20px;
        }

        .score-board {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            align-self: flex-start;
            border: 2px solid #ef4444;
        }

        .controls-hint {
            color: rgba(255,255,255,0.7);
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
        }

        #mobile-controls {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
            padding-bottom: 20px;
            pointer-events: auto;
        }

        .joystick-area {
            width: 150px; height: 150px;
            position: relative;
        }

        .joystick-base {
            width: 140px; height: 140px;
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            position: absolute; bottom: 0; left: 0;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }

        .joystick-stick {
            width: 60px; height: 60px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }

        .action-btn {
            width: 120px; height: 120px;
            background: #ef4444;
            border-radius: 50%;
            border: 6px solid #b91c1c;
            color: white;
            font-weight: 900;
            font-size: 24px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            transition: transform 0.1s, background 0.2s;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btn:active { transform: scale(0.95); background: #dc2626; }

        @media (min-width: 769px) {
            #mobile-controls { display: none; }
        }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CCZ9JJGEDP');
    </script>
</head>
<body>

<div id="ui">
    <div class="score-board">
        DESTRUCTION: <span id="score">0</span>%
        <div class="controls-hint">WASD to Move • SPACE to Smash</div>
    </div>
    
    <div id="mobile-controls">
        <div class="joystick-area" id="joystick">
            <div class="joystick-base">
                <div class="joystick-stick" id="stick"></div>
            </div>
        </div>
        <button class="action-btn" id="smashBtn">SMASH!</button>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // Config
    const CITY_SIZE = 12; // Blocks
    const BLOCK_SIZE = 40;
    const BUILDING_SCALE = 15;
    
    // State
    let scene, camera, renderer, monster;
    let buildings = [];
    let cars = [];
    let particles = [];
    let score = 0;
    let totalBuildings = 0;
    
    // Inputs
    const keys = { w: false, a: false, s: false, d: false, space: false };
    const joystick = { x: 0, y: 0, active: false };

    init();
    animate();

    function init() {
        // Scene Setup
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 20, 150);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 80, 120);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lights
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(50, 100, 50);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 100;
        dirLight.shadow.camera.bottom = -100;
        dirLight.shadow.camera.left = -100;
        dirLight.shadow.camera.right = 100;
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(1000, 1000);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        createCity();
        createMonster();
        setupInputs();

        window.addEventListener('resize', onResize);
    }

    function createCity() {
        const buildingColors = [0xaaaaaa, 0x88ccff, 0xffdd88, 0xccddcc];
        
        // Grid generation
        for (let x = -CITY_SIZE/2; x < CITY_SIZE/2; x++) {
            for (let z = -CITY_SIZE/2; z < CITY_SIZE/2; z++) {
                // Roads are spaces between blocks. 
                // We verify we aren't in the center spawn
                if (Math.abs(x) < 2 && Math.abs(z) < 2) continue;

                const posX = x * BLOCK_SIZE;
                const posZ = z * BLOCK_SIZE;

                // Create Sidewalk
                const sidewalk = new THREE.Mesh(
                    new THREE.BoxGeometry(BLOCK_SIZE - 4, 1, BLOCK_SIZE - 4),
                    new THREE.MeshStandardMaterial({ color: 0x555555 })
                );
                sidewalk.position.set(posX, 0.5, posZ);
                sidewalk.receiveShadow = true;
                scene.add(sidewalk);

                // Create Building(s)
                const height = 10 + Math.random() * 40;
                const width = 10 + Math.random() * 15;
                const depth = 10 + Math.random() * 15;
                
                const geo = new THREE.BoxGeometry(width, height, depth);
                const mat = new THREE.MeshStandardMaterial({ 
                    color: buildingColors[Math.floor(Math.random() * buildingColors.length)],
                    roughness: 0.2
                });
                
                // Add Windows Texture (Procedural)
                const canvas = document.createElement('canvas');
                canvas.width = 64; canvas.height = 64;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = mat.color.getStyle();
                ctx.fillRect(0,0,64,64);
                ctx.fillStyle = '#111'; // Windows
                if(Math.random() > 0.3) {
                    for(let i=4; i<64; i+=16) {
                        for(let j=4; j<64; j+=16) ctx.fillRect(i, j, 8, 12);
                    }
                }
                const tex = new THREE.CanvasTexture(canvas);
                tex.magFilter = THREE.NearestFilter;
                mat.map = tex;

                const b = new THREE.Mesh(geo, mat);
                b.position.set(posX, 1 + height/2, posZ);
                b.castShadow = true;
                b.receiveShadow = true;
                b.userData = { hp: height, maxHp: height, originalY: 1 + height/2 };
                
                scene.add(b);
                buildings.push(b);
                totalBuildings++;
            }
        }

        // Add Cars
        for(let i=0; i<30; i++) {
            const car = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(4, 2, 8), new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff }));
            body.position.y = 1.5;
            car.add(body);
            
            // Wheels
            const wheelGeo = new THREE.CylinderGeometry(1,1,1);
            const wheelMat = new THREE.MeshBasicMaterial({color:0x000000});
            [[-2.1, 4], [2.1, 4], [-2.1, -4], [2.1, -4]].forEach(pos => {
                const w = new THREE.Mesh(wheelGeo, wheelMat);
                w.rotation.z = Math.PI/2;
                w.position.set(pos[0], 0.5, pos[1]);
                car.add(w);
            });

            // Random pos on road grid
            const isHoriz = Math.random() > 0.5;
            const lane = (Math.floor(Math.random() * CITY_SIZE) - CITY_SIZE/2) * BLOCK_SIZE + BLOCK_SIZE/2;
            const travel = (Math.random() * 400) - 200;
            
            car.position.set(isHoriz ? travel : lane, 0, isHoriz ? lane : travel);
            if(isHoriz) car.rotation.y = Math.PI/2;
            
            car.userData = { 
                speed: 0.5 + Math.random() * 1, 
                axis: isHoriz ? 'x' : 'z',
                limit: 250 
            };
            
            scene.add(car);
            cars.push(car);
        }
    }

    function createMonster() {
        monster = new THREE.Group();

        const skinMat = new THREE.MeshStandardMaterial({ color: 0x228B22, roughness: 0.6 });

        // Body - Scaled up 2.5x
        const body = new THREE.Mesh(new THREE.BoxGeometry(15, 35, 18), skinMat);
        body.position.y = 25;
        body.castShadow = true;
        monster.add(body);

        // Head
        const head = new THREE.Mesh(new THREE.BoxGeometry(12, 12, 15), skinMat);
        head.position.set(0, 50, 5);
        monster.add(head);

        // Eyes
        const eyeGeo = new THREE.BoxGeometry(2, 2, 2);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
        const eyeL = new THREE.Mesh(eyeGeo, eyeMat); eyeL.position.set(3, 52, 12);
        const eyeR = new THREE.Mesh(eyeGeo, eyeMat); eyeR.position.set(-3, 52, 12);
        monster.add(eyeL); monster.add(eyeR);

        // Tail
        const tail = new THREE.Mesh(new THREE.BoxGeometry(8, 8, 25), skinMat);
        tail.position.set(0, 15, -20);
        monster.add(tail);
        monster.userData.tail = tail;

        // Limbs (Pivoted)
        function createLimb(x, y, z, w, h, d) {
            const group = new THREE.Group();
            group.position.set(x, y, z);
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), skinMat);
            mesh.position.y = -h/2; // Pivot at top
            mesh.castShadow = true;
            group.add(mesh);
            monster.add(group);
            return group;
        }

        monster.userData.legL = createLimb(6, 12, 0, 6, 18, 8);
        monster.userData.legR = createLimb(-6, 12, 0, 6, 18, 8);
        monster.userData.armL = createLimb(10, 35, 4, 4, 15, 4);
        monster.userData.armR = createLimb(-10, 35, 4, 4, 15, 4);

        scene.add(monster);
    }

    function setupInputs() {
        document.addEventListener('keydown', e => {
            const k = e.key.toLowerCase();
            if (k === 'w' || k === 'arrowup') keys.w = true;
            if (k === 'a' || k === 'arrowleft') keys.a = true;
            if (k === 's' || k === 'arrowdown') keys.s = true;
            if (k === 'd' || k === 'arrowright') keys.d = true;
            if (e.code === 'Space') smash();
        });
        
        document.addEventListener('keyup', e => {
            const k = e.key.toLowerCase();
            if (k === 'w' || k === 'arrowup') keys.w = false;
            if (k === 'a' || k === 'arrowleft') keys.a = false;
            if (k === 's' || k === 'arrowdown') keys.s = false;
            if (k === 'd' || k === 'arrowright') keys.d = false;
        });

        const smashBtn = document.getElementById('smashBtn');
        smashBtn.addEventListener('touchstart', (e) => { e.preventDefault(); smash(); });
        smashBtn.addEventListener('mousedown', (e) => { e.preventDefault(); smash(); });

        // Joystick Logic
        const stick = document.getElementById('stick');
        const base = document.getElementById('joystick');
        
        base.addEventListener('touchstart', e => {
            e.preventDefault();
            joystick.active = true;
            updateJoystick(e.touches[0]);
        }, {passive: false});

        base.addEventListener('touchmove', e => {
            e.preventDefault();
            if(joystick.active) updateJoystick(e.touches[0]);
        }, {passive: false});

        base.addEventListener('touchend', e => {
            e.preventDefault();
            joystick.active = false;
            joystick.x = 0; joystick.y = 0;
            stick.style.transform = `translate(0px, 0px)`;
        });

        function updateJoystick(touch) {
            const rect = base.getBoundingClientRect();
            const centerX = rect.left + rect.width/2;
            const centerY = rect.top + rect.height/2;
            
            const maxDist = 35;
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(dist > maxDist) {
                dx = (dx/dist) * maxDist;
                dy = (dy/dist) * maxDist;
            }
            
            stick.style.transform = `translate(${dx}px, ${dy}px)`;
            
            // Normalize -1 to 1
            joystick.x = dx / maxDist;
            joystick.y = dy / maxDist;
        }
    }

    function smash() {
        if(monster.userData.isAttacking) return;
        monster.userData.isAttacking = true;
        
        // Attack Animation
        let t = 0;
        const interval = setInterval(() => {
            t += 0.2;
            monster.userData.armL.rotation.x = -Math.PI/2 - Math.sin(t) * 1.5;
            monster.userData.armR.rotation.x = -Math.PI/2 - Math.sin(t) * 1.5;
            
            if(t > Math.PI) {
                clearInterval(interval);
                monster.userData.isAttacking = false;
                // Deal Damage Area
                checkDestruction(20, 20); // High damage radius
                
                // Shake Camera
                camera.position.y -= 1;
                setTimeout(() => camera.position.y += 1, 100);
            }
        }, 16);
    }

    function checkDestruction(radius, damage) {
        buildings.forEach((b, index) => {
            if(!b.visible) return;
            
            const dist = monster.position.distanceTo(b.position);
            
            if(dist < radius + 5) { // 5 is approx building radius
                b.userData.hp -= damage;
                
                // Flash red
                b.material.emissive.setHex(0xff0000);
                setTimeout(() => b.material.emissive.setHex(0x000000), 100);
                
                if(b.userData.hp <= 0) {
                    destroyBuilding(b);
                }
            }
        });
    }

    function destroyBuilding(b) {
        b.visible = false;
        createParticles(b.position, b.geometry.parameters.height);
        
        // Update Score
        const destroyed = buildings.filter(b => !b.visible).length;
        score = Math.floor((destroyed / totalBuildings) * 100);
        document.getElementById('score').innerText = score;
    }

    function createParticles(pos, height) {
        const count = 10;
        const geometry = new THREE.BoxGeometry(2, 2, 2);
        const material = new THREE.MeshBasicMaterial({ color: 0x555555 });

        for(let i=0; i<count; i++) {
            const p = new THREE.Mesh(geometry, material);
            p.position.set(
                pos.x + (Math.random() - 0.5) * 10,
                (Math.random() * height),
                pos.z + (Math.random() - 0.5) * 10
            );
            p.userData = {
                vel: new THREE.Vector3((Math.random()-0.5), Math.random(), (Math.random()-0.5))
            };
            scene.add(p);
            particles.push(p);
        }
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);

        const time = Date.now() * 0.005;
        const dt = 0.5; // Speed factor

        // --- Movement Logic ---
        const moveSpeed = 0.5;
        const rotSpeed = 0.05;
        let isMoving = false;

        // Input Vector
        let inputX = 0;
        let inputY = 0;

        if (keys.w) inputY = -1;
        if (keys.s) inputY = 1;
        if (keys.a) inputX = -1;
        if (keys.d) inputX = 1;
        
        if (joystick.active) {
            inputX = joystick.x;
            inputY = joystick.y;
        }

        if (Math.abs(inputX) > 0.1 || Math.abs(inputY) > 0.1) {
            isMoving = true;
            
            // Calculate Target Rotation
            // Camera is looking -Z. 
            const angle = Math.atan2(inputX, inputY);
            const targetRot = angle;
            
            // Smooth Rotation
            let diff = targetRot - monster.rotation.y;
            while(diff > Math.PI) diff -= Math.PI*2;
            while(diff < -Math.PI) diff += Math.PI*2;
            monster.rotation.y += diff * rotSpeed;

            // Move Forward
            monster.position.x += Math.sin(monster.rotation.y) * moveSpeed;
            monster.position.z += Math.cos(monster.rotation.y) * moveSpeed;
            
            // Walk Collision (Trample)
            checkDestruction(12, 0.5); // Radius, Damage per frame
        }

        // --- Animation ---
        if (isMoving) {
            // Legs Walk Cycle
            monster.userData.legL.rotation.x = Math.sin(time * 3) * 0.5;
            monster.userData.legR.rotation.x = Math.sin(time * 3 + Math.PI) * 0.5;
            
            // Arms Swing
            if(!monster.userData.isAttacking) {
                monster.userData.armL.rotation.x = Math.sin(time * 3 + Math.PI) * 0.3;
                monster.userData.armR.rotation.x = Math.sin(time * 3) * 0.3;
            }
            
            // Tail Wag
            monster.userData.tail.rotation.y = Math.sin(time * 3) * 0.2;
            
            // Body Bob
            monster.position.y = Math.abs(Math.sin(time * 6)) * 0.5;
        } else {
            // Idle Breaths
            monster.scale.y = 1 + Math.sin(time) * 0.02;
            
            // Reset Limbs
            monster.userData.legL.rotation.x *= 0.9;
            monster.userData.legR.rotation.x *= 0.9;
            if(!monster.userData.isAttacking) {
                monster.userData.armL.rotation.x *= 0.9;
                monster.userData.armR.rotation.x *= 0.9;
            }
        }

        // --- Camera Follow ---
        const camY = 80;
        const camZ = 100;
        camera.position.x = monster.position.x;
        camera.position.y = camY;
        camera.position.z = monster.position.z + camZ;
        camera.lookAt(monster.position.x, 10, monster.position.z);

        // --- Particles ---
        particles.forEach((p, i) => {
            p.position.add(p.userData.vel);
            p.userData.vel.y -= 0.05; // Gravity
            p.rotation.x += 0.1;
            p.scale.multiplyScalar(0.95); // Shrink
            
            if(p.position.y < 0) p.userData.vel.y *= -0.5; // Bounce
            
            if(p.scale.x < 0.1) {
                scene.remove(p);
                particles[i] = null;
            }
        });
        particles = particles.filter(p => p !== null);

        // --- Cars ---
        cars.forEach(c => {
            const axis = c.userData.axis;
            c.position[axis] += c.userData.speed;
            
            // Loop around city
            if(c.position[axis] > c.userData.limit) c.position[axis] = -c.userData.limit;
            
            // Simple car collision (Stop if monster near)
            if(c.position.distanceTo(monster.position) < 15) {
                // Panic spin
                c.rotation.y += 0.2;
            } else {
                if(axis === 'x') c.rotation.y = Math.PI/2;
                else c.rotation.y = 0;
            }
        });

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
