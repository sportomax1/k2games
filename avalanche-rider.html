<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Avalanche Rider - K2 Games</title>
<meta name="theme-color" content="#0f172a" />
<style>
  :root{--bg:#07111f;--panel:#101b2f;--ice:#bff3ff;--snow:#f8fbff;--warn:#ff4d4d;--gold:#ffd166;--green:#39d353;}
  *{box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none}
  html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 0,#28486f 0,#07111f 55%,#020611 100%);font-family:system-ui,-apple-system,Segoe UI,sans-serif;color:var(--snow)}
  #wrap{position:fixed;inset:0;display:grid;place-items:center;padding:10px}
  canvas{width:min(100vw,760px);height:min(100vh,1040px);max-height:100vh;image-rendering:pixelated;border:4px solid #e9fbff;border-radius:18px;background:#9edfff;box-shadow:0 24px 80px rgba(0,0,0,.55)}
  .hud{position:fixed;top:12px;left:50%;transform:translateX(-50%);width:min(96vw,720px);display:flex;gap:7px;justify-content:space-between;align-items:center;pointer-events:none;font-weight:900;text-shadow:0 2px 0 #00172a;font-size:13px}.pill{background:rgba(6,13,28,.72);border:2px solid rgba(255,255,255,.24);border-radius:999px;padding:8px 10px;backdrop-filter:blur(6px)}
  .overlay{position:fixed;inset:0;display:grid;place-items:center;background:linear-gradient(rgba(2,6,17,.12),rgba(2,6,17,.76));padding:24px}.card{width:min(92vw,540px);background:rgba(8,16,34,.93);border:3px solid #e9fbff;border-radius:22px;padding:24px;text-align:center;box-shadow:0 18px 70px rgba(0,0,0,.62)}h1{margin:0 0 8px;font-size:clamp(32px,8vw,58px);letter-spacing:-2px;line-height:.9}.sub{opacity:.92;line-height:1.45}.btn{display:inline-block;margin-top:16px;background:linear-gradient(#fff,#a8efff);color:#07111f;border:0;border-bottom:5px solid #4ab3d1;border-radius:14px;padding:14px 22px;font-weight:950;font-size:18px;cursor:pointer}.small{font-size:13px;opacity:.8;margin-top:12px}.controls{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);width:min(96vw,720px);display:flex;justify-content:space-between;align-items:end;gap:12px}.pad{display:flex;gap:10px}.cbtn{width:68px;height:58px;border-radius:18px;border:2px solid rgba(255,255,255,.35);background:rgba(8,16,34,.62);color:white;font-weight:950;font-size:26px;box-shadow:0 8px 0 rgba(0,0,0,.25)}@media (pointer:fine){.controls{display:none}}
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="480" height="720"></canvas></div>
<div class="hud"><div class="pill">🏂 <span id="dist">0</span>m</div><div class="pill">⚡ <span id="speed">1.0</span>x</div><div class="pill">🌨️ GAP <span id="gap">260</span></div><div class="pill">🏆 <span id="best">0</span>m</div></div>
<div class="controls"><div class="pad"><button class="cbtn" id="left">◀</button><button class="cbtn" id="right">▶</button></div><button class="cbtn" id="jump">⤴</button></div>
<div class="overlay" id="overlay"><div class="card"><h1>AVALANCHE<br>RIDER</h1><div class="sub">Reverse-drone downhill snowboarding. The avalanche is the huge wall uphill at the TOP. Carve through rocks and trees, hit ramps, and keep the gap alive.</div><button class="btn" id="start">START RUN</button><div class="small">Keyboard: ← → or A/D to carve, Space/W/↑ to jump. Mobile: buttons or drag.</div></div></div>
<script>
(() => {
  const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const ui = {dist:byId('dist'), speed:byId('speed'), best:byId('best'), gap:byId('gap'), overlay:byId('overlay')};
  function byId(id){return document.getElementById(id)}
  let best = Number(localStorage.getItem('avalancheRiderBest')||0); ui.best.textContent = best;
  const keys = {}, rnd = (a,b)=>a+Math.random()*(b-a), clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  let running=false, over=false, t=0, dist=0, speed=1, shake=0, spawn=0, avalancheY=86, bonusFlash=0;
  const horizonY = 92, riderBaseY = 514;
  const player={x:W/2,y:riderBaseY,vx:0,air:0,spin:0,ghost:0};
  let obs=[], flakes=[], chunks=[];

  function reset(){
    running=true;over=false;t=0;dist=0;speed=1;shake=0;spawn=0;avalancheY=82;bonusFlash=0;obs=[];flakes=[];chunks=[];
    player.x=W/2;player.vx=0;player.air=0;player.spin=0;player.ghost=0;
    for(let i=0;i<150;i++)flakes.push({x:rnd(0,W),y:rnd(0,H),s:rnd(1,3),z:rnd(.4,1.9)});
    for(let i=0;i<34;i++)chunks.push({x:rnd(0,W),y:rnd(18,118),s:rnd(4,18),v:rnd(.3,1.8)});
    ui.overlay.style.display='none';
  }

  function laneToX(lane,y){
    const p=perspective(y), center=W/2+Math.sin((y+t*45)*.006)*10;
    return center + lane * 184 * p;
  }
  function perspective(y){return clamp(.34 + (y-horizonY)/(H-horizonY)*.96,.32,1.32)}
  function drawPixelRect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h))}
  function addObs(){
    const r=Math.random();
    obs.push({lane:rnd(-.92,.92),y:horizonY-34,type:r<.46?'tree':r<.76?'rock':r<.92?'jump':'flag',hit:false,phase:rnd(0,99)});
  }

  function drawSlope(){
    ctx.save();ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
    const sky=ctx.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#72c8f4');sky.addColorStop(.38,'#c9f6ff');sky.addColorStop(1,'#f8fdff');ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#102b4f';ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(160,0);ctx.lineTo(64,horizonY+16);ctx.lineTo(0,156);ctx.closePath();ctx.fill();
    ctx.fillStyle='#173a66';ctx.beginPath();ctx.moveTo(W,0);ctx.lineTo(322,0);ctx.lineTo(420,horizonY+18);ctx.lineTo(W,166);ctx.closePath();ctx.fill();
    ctx.fillStyle='#f7fdff';ctx.beginPath();ctx.moveTo(W/2-66,horizonY);ctx.lineTo(W/2+66,horizonY);ctx.lineTo(W+78,H+26);ctx.lineTo(-78,H+26);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(77,135,172,.38)';ctx.lineWidth=4;for(let l=-1;l<=1;l+=.5){ctx.beginPath();ctx.moveTo(laneToX(l,horizonY),horizonY);ctx.lineTo(laneToX(l,H),H);ctx.stroke()}
    for(let y=horizonY+((t*92*speed)%64);y<H;y+=64){const p=perspective(y);ctx.fillStyle='rgba(90,151,182,.13)';ctx.fillRect(laneToX(-1,y),y,Math.max(20,368*p),Math.max(4,12*p))}
    ctx.fillStyle='rgba(2,6,17,.08)';ctx.fillRect(0,0,W,H);ctx.restore();
  }

  function drawAvalanche(){
    avalancheY += .0035*speed + Math.max(0, speed-1)*.001;
    const wallY = avalancheY + Math.sin(t*6)*3;
    ctx.save();ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
    ctx.fillStyle='rgba(255,77,77,.18)';ctx.fillRect(0,0,W,wallY+22);
    const grad=ctx.createLinearGradient(0,0,0,wallY+86);grad.addColorStop(0,'#ffffff');grad.addColorStop(.52,'#e2fbff');grad.addColorStop(1,'rgba(255,255,255,.15)');ctx.fillStyle=grad;ctx.fillRect(0,0,W,wallY+72);
    ctx.fillStyle='#ffffff';
    for(let i=0;i<30;i++){const x=(i*23+t*120)% (W+60)-30;const h=20+Math.sin(t*4+i)*14;ctx.fillRect(x,wallY+h*.12,24,h)}
    chunks.forEach(c=>{c.y+=c.v*speed*.82;if(c.y>wallY+58)c.y=rnd(12,wallY+12);c.x+=Math.sin(t*3+c.y)*.7;ctx.fillStyle=c.s>10?'#ffffff':'#dff8ff';ctx.fillRect(c.x,c.y,c.s,c.s*.72)});
    ctx.fillStyle='rgba(7,17,31,.25)';ctx.fillRect(0,wallY+60,W,10);
    ctx.fillStyle='rgba(255,77,77,.8)';ctx.fillRect(0,wallY+70,W,4);
    ctx.font='900 13px system-ui';ctx.textAlign='center';ctx.fillStyle='#7f1d1d';ctx.fillText('AVALANCHE WALL',W/2,Math.max(26,wallY+48));
    ctx.restore();
  }

  function drawObs(o){
    const p=perspective(o.y), x=laneToX(o.lane,o.y), y=o.y, s=p;
    ctx.save();ctx.translate(x,y);ctx.scale(s,s);
    ctx.fillStyle='rgba(1,20,32,.18)';ctx.fillRect(-22,22,44,8);
    if(o.type==='tree'){
      drawPixelRect(-7,8,14,34,'#6b3f20');drawPixelRect(-28,-18,56,42,'#14532d');drawPixelRect(-21,-38,42,35,'#15803d');drawPixelRect(-12,-55,24,28,'#22c55e');drawPixelRect(-22,-42,12,8,'#f8fbff');
    } else if(o.type==='rock'){
      drawPixelRect(-22,-10,44,26,'#475569');drawPixelRect(-14,-24,30,20,'#64748b');drawPixelRect(4,-5,14,9,'#1e293b');drawPixelRect(-20,6,8,7,'#94a3b8');
    } else if(o.type==='jump'){
      drawPixelRect(-36,-8,72,20,'#8b5a2b');drawPixelRect(-28,-22,56,16,'#f8fbff');drawPixelRect(-20,-30,40,9,'#bae6fd');ctx.fillStyle='rgba(255,209,102,.8)';ctx.fillRect(-28,-36,56,4);
    } else {
      drawPixelRect(-32,-20,8,40,'#111827');drawPixelRect(25,-20,8,40,'#111827');drawPixelRect(-24,-20,49,22,'#facc15');drawPixelRect(-15,-13,11,9,'#111827');drawPixelRect(8,-13,11,9,'#111827');
    }
    ctx.restore();
  }

  function drawPlayer(){
    const py=player.y-player.air, p=1.12+player.air*.004;
    ctx.save();ctx.translate(player.x,py);ctx.scale(p,p);ctx.rotate(player.vx*.025+player.spin);
    ctx.fillStyle='rgba(1,18,28,.18)';ctx.fillRect(-25,29,50,9);
    drawPixelRect(-22,16,44,8,'#1f2937');drawPixelRect(-16,8,32,8,'#f8fafc');drawPixelRect(-10,-14,20,27,'#ef4444');drawPixelRect(-9,-29,18,15,'#111827');drawPixelRect(-5,-35,10,6,'#facc15');drawPixelRect(-20,-3,9,17,'#1e3a8a');drawPixelRect(11,-3,9,17,'#1e3a8a');
    ctx.restore();
    if(player.air>0){ctx.fillStyle='rgba(250,204,21,.18)';ctx.fillRect(player.x-34,player.y+36,68,7)}
  }

  function collide(o){
    if(player.air>16||player.ghost>0||o.hit)return false;
    const x=laneToX(o.lane,o.y), p=perspective(o.y), dx=Math.abs(player.x-x), dy=Math.abs(player.y-o.y);
    if(o.type==='flag'){if(dx<44*p&&dy<34*p){o.hit=true;dist+=65;bonusFlash=18;player.ghost=24}return false}
    if(o.type==='jump'){if(dx<48*p&&dy<32*p){o.hit=true;player.air=68;player.spin=.4;dist+=28;bonusFlash=12}return false}
    return dx<28*p&&dy<34*p;
  }

  function end(reason){
    if(!running)return;running=false;over=true;shake=20;best=Math.max(best,Math.floor(dist));localStorage.setItem('avalancheRiderBest',best);ui.best.textContent=best;ui.overlay.style.display='grid';ui.overlay.querySelector('h1').innerHTML=(reason==='snow'?'BURIED':'WIPEOUT')+'<br>'+Math.floor(dist)+'m';ui.overlay.querySelector('.sub').textContent=reason==='snow'?'The avalanche wall caught your tail. More speed, fewer tree hugs.':'You clipped the mountain. Powder is soft; rocks are not.';ui.overlay.querySelector('.btn').textContent='RIDE AGAIN';
  }

  function update(){
    if(!running)return;t+=1/60;speed=1+dist/1450;dist += speed*.92;spawn-=speed;
    if(spawn<=0){addObs();spawn=rnd(28,60)-Math.min(24,dist/95)}
    const steer=(keys.ArrowRight||keys.d?1:0)-(keys.ArrowLeft||keys.a?1:0);player.vx=player.vx*.83+steer*1.55;player.x=clamp(player.x+player.vx*4.2,58,W-58);
    if((keys[' ']||keys.ArrowUp||keys.w)&&player.air<=0){player.air=52;player.spin=.24}
    if(player.air>0){player.air-=1.75;player.spin*=.94;if(player.air<0){player.air=0;player.spin=0}}
    if(player.ghost>0)player.ghost--; if(bonusFlash>0)bonusFlash--;
    obs.forEach(o=>{o.y+=3.45*speed;if(collide(o))end('crash')});obs=obs.filter(o=>o.y<H+80);
    flakes.forEach(f=>{f.y+=speed*f.z*4.5;f.x+=Math.sin(t*2+f.y)*.8;if(f.y>H){f.y=-5;f.x=rnd(0,W)}});
    const gap=Math.max(0,Math.floor(player.y-avalancheY-76)); if(gap<85)shake=Math.max(shake,4); if(avalancheY+86>=player.y-20)end('snow');
    ui.dist.textContent=Math.floor(dist);ui.speed.textContent=speed.toFixed(1);ui.gap.textContent=gap;shake=Math.max(0,shake*.9);
  }

  function draw(){
    drawSlope();drawAvalanche();obs.slice().sort((a,b)=>a.y-b.y).forEach(drawObs);
    flakes.forEach(f=>{ctx.fillStyle=f.z>1.2?'rgba(255,255,255,.88)':'rgba(255,255,255,.58)';ctx.fillRect(f.x,f.y,f.s,f.s)});
    drawPlayer();
    if(bonusFlash>0){ctx.fillStyle='rgba(255,209,102,.20)';ctx.fillRect(0,0,W,H)}
    ctx.fillStyle='rgba(2,6,17,.22)';ctx.fillRect(0,0,W,30);
    ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1;for(let y=0;y<H;y+=4){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  }
  function loop(){update();draw();requestAnimationFrame(loop)}
  byId('start').onclick=reset; addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowLeft','ArrowRight','ArrowUp',' '].includes(e.key))e.preventDefault()}); addEventListener('keyup',e=>keys[e.key]=false);
  const bind=(id,key)=>{const b=byId(id);b.onpointerdown=()=>keys[key]=true;b.onpointerup=b.onpointercancel=()=>keys[key]=false}; bind('left','ArrowLeft');bind('right','ArrowRight');bind('jump',' ');
  let dragging=false;canvas.onpointerdown=e=>{dragging=true;canvas.setPointerCapture(e.pointerId)};canvas.onpointermove=e=>{if(!dragging)return;const r=canvas.getBoundingClientRect(),x=e.clientX-r.left;keys.ArrowLeft=x<r.width*.42;keys.ArrowRight=x>r.width*.58};canvas.onpointerup=canvas.onpointercancel=()=>{dragging=false;keys.ArrowLeft=keys.ArrowRight=false};
  loop();
})();
</script>
</body>
</html>
