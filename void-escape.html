<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void-Escape - K2 Games</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --bg: #020617;
            --text: #f8fafc;
            --void: #1e1b4b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #game-canvas {
            background: linear-gradient(to bottom, #020617, #1e1b4b);
            display: block;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            border-left: 1px solid rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        #ui {
            position: absolute; top: 20px; left: 20px;
            pointer-events: none;
        }
        .stat { font-size: 1.5rem; font-weight: 800; color: var(--primary); text-shadow: 0 0 10px rgba(139, 92, 246, 0.5); }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.8);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; z-index: 10;
        }
        #overlay.active { display: flex; }

        .btn {
            background: var(--primary); color: white; border: none;
            padding: 1rem 2.5rem; border-radius: 12px; font-weight: 700;
            cursor: pointer; font-size: 1.2rem; transition: 0.3s; margin-top: 1rem;
            pointer-events: all;
        }
        .btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        .back-link { margin-top: 2rem; color: #94a3b8; text-decoration: none; font-size: 0.9rem; pointer-events: all; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stat">Height: <span id="height-val">0</span>m</div>
    </div>

    <canvas id="game-canvas"></canvas>

    <div id="overlay">
        <h1 id="title" style="font-size: 4rem; margin-bottom: 0.5rem; color: #ef4444;">VOID TAKEN</h1>
        <p id="final-score" style="font-size: 1.5rem; color: #94a3b8; margin-bottom: 2rem;">You climbed 0 meters.</p>
        <button class="btn" onclick="resetGame()">Try Again</button>
        <a href="index.html" class="back-link">← Back to Vault</a>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const heightVal = document.getElementById('height-val');
        const overlay = document.getElementById('overlay');

        const WIDTH = 400;
        const HEIGHT = 700;
        canvas.width = WIDTH;
        canvas.height = HEIGHT;

        let player = {
            x: WIDTH / 2,
            y: HEIGHT - 100,
            w: 20,
            h: 20,
            vx: 0,
            vy: 0,
            speed: 5,
            jump: -12,
            grounded: false
        };

        let platforms = [];
        let particles = [];
        let score = 0;
        let viewY = 0;
        let voidY = HEIGHT + 200;
        let gameActive = false;
        let keys = {};

        function init() {
            player.x = WIDTH / 2;
            player.y = HEIGHT - 100;
            player.vx = 0;
            player.vy = 0;
            score = 0;
            viewY = 0;
            voidY = HEIGHT + 200;
            platforms = [];
            
            // Base platform
            platforms.push({ x: 0, y: HEIGHT - 50, w: WIDTH, h: 20, crumbling: false });
            
            for (let i = 0; i < 10; i++) {
                spawnPlatform(HEIGHT - 150 - (i * 100));
            }
            
            gameActive = true;
            overlay.classList.remove('active');
            requestAnimationFrame(loop);
        }

        function spawnPlatform(y) {
            const w = 60 + Math.random() * 40;
            const x = Math.random() * (WIDTH - w);
            platforms.push({
                x, y, w, h: 10,
                crumbling: true,
                timer: 0,
                shaking: false,
                broken: false
            });
        }

        function loop() {
            if (!gameActive) return;

            update();
            draw();
            requestAnimationFrame(loop);
        }

        function update() {
            // Input
            if (keys['ArrowLeft'] || keys['a']) player.vx = -player.speed;
            else if (keys['ArrowRight'] || keys['d']) player.vx = player.speed;
            else player.vx *= 0.8;

            if ((keys['ArrowUp'] || keys['w'] || keys[' ']) && player.grounded) {
                player.vy = player.jump;
                player.grounded = false;
            }

            // Physics
            player.vy += 0.5; // Gravity
            player.x += player.vx;
            player.y += player.vy;

            // Screen wrap
            if (player.x < -player.w) player.x = WIDTH;
            if (player.x > WIDTH) player.x = -player.w;

            // Platform Collision
            player.grounded = false;
            if (player.vy > 0) {
                platforms.forEach(p => {
                    if (!p.broken && 
                        player.x + player.w > p.x && 
                        player.x < p.x + p.w &&
                        player.y + player.h > p.y &&
                        player.y + player.h < p.y + p.h + player.vy) {
                        
                        player.y = p.y - player.h;
                        player.vy = 0;
                        player.grounded = true;

                        if (p.crumbling && !p.shaking) {
                            p.shaking = true;
                        }
                    }
                });
            }

            // Camera follow
            if (player.y < viewY + HEIGHT / 2) {
                let diff = (viewY + HEIGHT / 2) - player.y;
                viewY -= diff;
                score = Math.max(score, Math.floor(-viewY / 10));
                heightVal.textContent = score;
            }

            // Void rising
            voidY -= 1.2 + (score / 100);
            if (player.y > voidY) gameOver();

            // Crumbling logic
            platforms.forEach(p => {
                if (p.shaking && !p.broken) {
                    p.timer++;
                    if (p.timer > 30) {
                        p.broken = true;
                        spawnParticles(p.x + p.w/2, p.y, p.w);
                    }
                }
            });

            // Cleanup & Spawn
            platforms = platforms.filter(p => p.y < viewY + HEIGHT + 100);
            while (platforms[platforms.length - 1].y > viewY - 100) {
                spawnPlatform(platforms[platforms.length - 1].y - 100);
            }

            // Particles
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.life -= 0.02;
            });
            particles = particles.filter(p => p.life > 0);
        }

        function draw() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            ctx.save();
            ctx.translate(0, -viewY);

            // Draw Platforms
            platforms.forEach(p => {
                if (p.broken) return;
                ctx.fillStyle = p.crumbling ? '#475569' : '#6366f1';
                if (p.shaking) {
                    ctx.save();
                    ctx.translate(Math.sin(Date.now() / 20) * 2, 0);
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.restore();
                } else {
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                }
            });

            // Draw Particles
            particles.forEach(p => {
                ctx.fillStyle = `rgba(139, 92, 246, ${p.life})`;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });

            // Draw Player (Person Sprite)
            ctx.save();
            ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
            
            // Body wobble based on movement
            const tilt = player.vx * 0.05;
            ctx.rotate(tilt);

            ctx.strokeStyle = '#8b5cf6';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // Head
            ctx.beginPath();
            ctx.arc(0, -10, 5, 0, Math.PI * 2);
            ctx.stroke();

            // Torso
            ctx.beginPath();
            ctx.moveTo(0, -5);
            ctx.lineTo(0, 5);
            ctx.stroke();

            // Legs
            const legSwing = Math.sin(Date.now() / 100) * (Math.abs(player.vx) > 0.1 ? 10 : 2);
            // Left Leg
            ctx.beginPath();
            ctx.moveTo(0, 5);
            ctx.lineTo(-legSwing, 15);
            ctx.stroke();
            // Right Leg
            ctx.beginPath();
            ctx.moveTo(0, 5);
            ctx.lineTo(legSwing, 15);
            ctx.stroke();

            // Arms
            const armReach = player.vy < 0 ? -10 : 0;
            // Left Arm
            ctx.beginPath();
            ctx.moveTo(0, -2);
            ctx.lineTo(-8, armReach);
            ctx.stroke();
            // Right Arm
            ctx.beginPath();
            ctx.moveTo(0, -2);
            ctx.lineTo(8, armReach);
            ctx.stroke();

            ctx.restore();

            // Draw Void
            const grad = ctx.createLinearGradient(0, voidY, 0, voidY + 300);
            grad.addColorStop(0, 'rgba(239, 68, 68, 0.8)');
            grad.addColorStop(1, '#020617');
            ctx.fillStyle = grad;
            ctx.fillRect(0, voidY, WIDTH, HEIGHT + 1000);

            ctx.restore();
        }

        function spawnParticles(x, y, w) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x + (Math.random() - 0.5) * w,
                    y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 1) * 4,
                    size: 4 + Math.random() * 4,
                    life: 1,
                });
            }
        }

        function gameOver() {
            gameActive = false;
            overlay.classList.add('active');
            document.getElementById('final-score').textContent = `You climbed ${score} meters.`;
        }

        function resetGame() {
            init();
        }

        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        init();
    </script>
</body>
</html>
