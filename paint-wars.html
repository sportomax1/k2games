<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paint Wars: Battle Edition - K2 games</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --accent: #e94560;
            --text: #f8fafc;
            --p1-color: #3498db;
            --p2-color: #e74c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100dvh;
            width: 100%;
            position: fixed;
            display: flex;
            flex-direction: column;
        }

        #game-container {
            position: relative;
            width: 100%;
            flex: 1;
            background: var(--panel);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 600px) {
            #header { padding: 10px; gap: 5px; }
            .stat-value { font-size: 1.1rem; }
            .stat-label { font-size: 0.5rem; }
            .score-bar-wrapper { height: 10px; margin: 0 10px; }
            h1 { font-size: 2.5rem !important; }
        }

        #header {
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.4);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 50;
        }

        .stat-box { display: flex; flex-direction: column; align-items: center; min-width: 60px; }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; margin-bottom: 2px; }
        .stat-value { font-size: 1.4rem; font-weight: 900; }

        .score-bar-wrapper {
            flex: 1;
            height: 12px;
            background: #000;
            border-radius: 20px;
            margin: 0 20px;
            display: flex;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        canvas {
            flex: 1;
            display: block;
            background: #000;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Mobile Controls */
        #mobile-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: none;
            justify-content: space-between;
            padding: 0 25px;
            pointer-events: none;
            z-index: 100;
        }
        @media (max-width: 900px) { #mobile-controls { display: flex; } }

        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(3, 50px);
            gap: 5px;
            pointer-events: auto;
        }
        .ctrl-btn {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            backdrop-filter: blur(5px);
        }
        .ctrl-btn:active { background: var(--accent); }
        .turbo-btn {
            width: 80px;
            height: 80px;
            background: rgba(233, 69, 96, 0.3);
            border: 2px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            pointer-events: auto;
            align-self: flex-end;
        }
        .turbo-btn:active { background: var(--accent); }

        .back-link {
            position: fixed; top: 15px; left: 15px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 10px; z-index: 200;
            font-size: 0.8rem; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
        }

        #overlay {
            position: absolute; inset: 0; background: rgba(15, 23, 42, 0.98);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; backdrop-filter: blur(15px); text-align: center; padding: 20px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← HUB</a>

    <div id="game-container">
        <div id="header">
            <div class="stat-box">
                <span class="stat-label">P1</span>
                <span id="p1-score-val" class="stat-value" style="color: #3498db;">0%</span>
            </div>
            
            <div class="stat-box">
                <span class="stat-label">TIME</span>
                <span id="timer" class="stat-value timer-display">60</span>
            </div>

            <div class="score-bar-wrapper">
                <div id="score-p1" style="width: 0%; background: #3498db;"></div>
                <div id="score-p2" style="width: 0%; background: #e74c3c;"></div>
            </div>

            <div class="stat-box">
                <span class="stat-label">CPU</span>
                <span id="p2-score-val" class="stat-value" style="color: #e74c3c;">0%</span>
            </div>
        </div>

        <canvas id="paintCanvas"></canvas>

        <div id="mobile-controls">
            <div class="dpad">
                <div></div><div class="ctrl-btn" id="up">▲</div><div></div>
                <div class="ctrl-btn" id="left">◀</div><div></div><div class="ctrl-btn" id="right">▶</div>
                <div></div><div class="ctrl-btn" id="down">▼</div><div></div>
            </div>
            <div class="turbo-btn" id="turbo">TURBO</div>
        </div>

        <div id="overlay">
            <h1 id="overlay-title" style="font-size: 3.5rem; margin-bottom: 10px; color: #f1c40f; font-style: italic; font-weight: 900;">PAINT WARS</h1>
            <p id="overlay-msg" style="margin-bottom: 30px; font-weight: 700; opacity: 0.7; letter-spacing: 2px;">PAINT THE ARENA TO WIN</p>
            
            <div style="display: flex; gap: 15px; margin-bottom: 20px;" id="color-picker">
                <div class="color-opt selected" style="background: #3498db;" data-color="#3498db"></div>
                <div class="color-opt" style="background: #2ecc71;" data-color="#2ecc71"></div>
                <div class="color-opt" style="background: #9b59b6;" data-color="#9b59b6"></div>
                <div class="color-opt" style="background: #f1c40f;" data-color="#f1c40f"></div>
                <div class="color-opt" style="background: #ff9f43;" data-color="#ff9f43"></div>
            </div>

            <button class="btn" onclick="startGame()">START BATTLE</button>
        </div>
    </div>

    <script>
        class PaintWar {
            constructor() {
                this.canvas = document.getElementById('paintCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.gridSize = 25;
                this.cols = 40;
                this.rows = 40;
                this.canvas.width = this.cols * this.gridSize;
                this.canvas.height = this.rows * this.gridSize;

                this.grid = Array.from({length: this.rows}, () => Array(this.cols).fill(null));
                this.p1 = { x: 5, y: 20, color: '#3498db', score: 0 };
                this.p2 = { x: 34, y: 20, color: '#e74c3c', score: 0 };
                this.keys = {};
                this.isPlaying = false;
                this.cooldown = 0;
                this.timer = 60;
                this.timerInterval = null;

                this.setupControls();
                this.loop();
            }

            setupControls() {
                window.onkeydown = (e) => this.keys[e.code] = true;
                window.onkeyup = (e) => this.keys[e.code] = false;

                const addTouch = (id, key) => {
                    const el = document.getElementById(id);
                    el.addEventListener('touchstart', (e) => { e.preventDefault(); this.keys[key] = true; }, {passive: false});
                    el.addEventListener('touchend', () => this.keys[key] = false);
                };
                addTouch('up', 'ArrowUp');
                addTouch('down', 'ArrowDown');
                addTouch('left', 'ArrowLeft');
                addTouch('right', 'ArrowRight');
                addTouch('turbo', 'ShiftLeft');

                document.querySelectorAll('.color-opt').forEach(opt => {
                    opt.onclick = () => {
                        document.querySelectorAll('.color-opt').forEach(o => o.classList.remove('selected'));
                        opt.classList.add('selected');
                        this.p1.color = opt.dataset.color;
                        document.getElementById('score-p1').style.background = this.p1.color;
                        document.getElementById('p1-score-val').style.color = this.p1.color;
                    };
                });
            }

            start() {
                this.grid = Array.from({length: this.rows}, () => Array(this.cols).fill(null));
                this.p1.x = 5; this.p1.y = 20;
                this.p2.x = 34; this.p2.y = 20;
                this.timer = 60;
                this.isPlaying = true;
                document.getElementById('overlay').style.display = 'none';
                
                if(this.timerInterval) clearInterval(this.timerInterval);
                this.timerInterval = setInterval(() => {
                    if(this.isPlaying) {
                        this.timer--;
                        document.getElementById('timer').textContent = this.timer;
                        if(this.timer <= 0) this.endGame();
                    }
                }, 1000);

                this.paintArea(this.p1.x, this.p1.y, this.p1.color);
                this.paintArea(this.p2.x, this.p2.y, this.p2.color);
            }

            paintArea(cx, cy, color) {
                for(let dy = -1; dy <= 1; dy++) {
                    for(let dx = -1; dx <= 1; dx++) {
                        const nx = cx + dx;
                        const ny = cy + dy;
                        if(nx >= 0 && nx < this.cols && ny >= 0 && ny < this.rows) {
                            this.grid[ny][nx] = color;
                        }
                    }
                }
            }

            update() {
                if(!this.isPlaying) return;

                const baseCooldown = this.keys['ShiftLeft'] || this.keys['ShiftRight'] ? 2 : 4;

                if(this.cooldown > 0) {
                    this.cooldown--;
                } else {
                    let moved = false;
                    if(this.keys['ArrowUp'] || this.keys['KeyW']) { this.p1.y--; moved = true; }
                    else if(this.keys['ArrowDown'] || this.keys['KeyS']) { this.p1.y++; moved = true; }
                    else if(this.keys['ArrowLeft'] || this.keys['KeyA']) { this.p1.x--; moved = true; }
                    else if(this.keys['ArrowRight'] || this.keys['KeyD']) { this.p1.x++; moved = true; }

                    if(moved) {
                        this.p1.x = Math.max(0, Math.min(this.cols-1, this.p1.x));
                        this.p1.y = Math.max(0, Math.min(this.rows-1, this.p1.y));
                        this.paintArea(this.p1.x, this.p1.y, this.p1.color);
                        this.cooldown = baseCooldown;
                    }
                }

                // Smarter AI
                if(Math.random() < 0.25) {
                    const dirs = [[0,1], [0,-1], [1,0], [-1,0]];
                    // AI looks for non-AI color or edge
                    let bestDir = dirs[Math.floor(Math.random()*4)];
                    let maxVal = -1;

                    dirs.forEach(d => {
                        const nx = this.p2.x + d[0];
                        const ny = this.p2.y + d[1];
                        if(nx >= 0 && nx < this.cols && ny >= 0 && ny < this.rows) {
                            let val = 0;
                            if(this.grid[ny][nx] === null) val = 2;
                            if(this.grid[ny][nx] === this.p1.color) val = 3;
                            if(val > maxVal) { maxVal = val; bestDir = d; }
                        }
                    });

                    this.p2.x = Math.max(0, Math.min(this.cols-1, this.p2.x + bestDir[0]));
                    this.p2.y = Math.max(0, Math.min(this.rows-1, this.p2.y + bestDir[1]));
                    this.paintArea(this.p2.x, this.p2.y, this.p2.color);
                }

                this.calculateScores();
            }

            calculateScores() {
                let s1 = 0, s2 = 0, total = 0;
                this.grid.forEach(row => row.forEach(cell => {
                    if(cell === this.p1.color) s1++;
                    if(cell === this.p2.color) s2++;
                    if(cell) total++;
                }));
                
                const gridTotal = this.cols * this.rows;
                const p1Pct = (s1 / gridTotal) * 100;
                const p2Pct = (s2 / gridTotal) * 100;
                
                document.getElementById('score-p1').style.width = p1Pct + '%';
                document.getElementById('score-p2').style.width = p2Pct + '%';
                document.getElementById('p1-score-val').textContent = Math.floor(p1Pct) + '%';
                document.getElementById('p2-score-val').textContent = Math.floor(p2Pct) + '%';

                if(total === gridTotal) this.endGame();
            }

            endGame() {
                this.isPlaying = false;
                clearInterval(this.timerInterval);
                const s1 = parseInt(document.getElementById('p1-score-val').textContent);
                const s2 = parseInt(document.getElementById('p2-score-val').textContent);
                
                const overlay = document.getElementById('overlay');
                const title = document.getElementById('overlay-title');
                const msg = document.getElementById('overlay-msg');
                
                overlay.style.display = 'flex';
                if(s1 > s2) {
                    title.textContent = "VICTORY!";
                    title.style.color = "#2ecc71";
                    msg.textContent = `You painted ${s1}% of the arena!`;
                } else if(s2 > s1) {
                    title.textContent = "DEFEAT!";
                    title.style.color = "#e74c3c";
                    msg.textContent = `The AI claimed ${s2}% of the territory.`;
                } else {
                    title.textContent = "DRAW!";
                    title.style.color = "#f1c40f";
                    msg.textContent = "Exactly even. An honorable stalemate.";
                }
            }

            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                // Grid
                this.grid.forEach((row, y) => {
                    row.forEach((cell, x) => {
                        if(cell) {
                            ctx.fillStyle = cell;
                            ctx.fillRect(x*this.gridSize, y*this.gridSize, this.gridSize, this.gridSize);
                        } else {
                            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
                            ctx.strokeRect(x*this.gridSize, y*this.gridSize, this.gridSize, this.gridSize);
                        }
                    });
                });

                // Player Pulse effect
                const pulse = Math.sin(Date.now() / 100) * 3;

                // Players
                ctx.lineWidth = 4;
                ctx.strokeStyle = 'white';
                
                // P1
                ctx.save();
                ctx.shadowBlur = 15; ctx.shadowColor = this.p1.color;
                ctx.fillStyle = this.p1.color;
                ctx.beginPath(); 
                ctx.arc(this.p1.x*this.gridSize + this.gridSize/2, this.p1.y*this.gridSize + this.gridSize/2, 8 + pulse, 0, Math.PI*2); 
                ctx.fill(); ctx.stroke();
                ctx.restore();

                // P2
                ctx.save();
                ctx.shadowBlur = 15; ctx.shadowColor = this.p2.color;
                ctx.fillStyle = this.p2.color;
                ctx.beginPath(); 
                ctx.arc(this.p2.x*this.gridSize + this.gridSize/2, this.p2.y*this.gridSize + this.gridSize/2, 8, 0, Math.PI*2); 
                ctx.fill(); ctx.stroke();
                ctx.restore();
            }

            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        }

        const game = new PaintWar();
        
        // Gamepad Adapter
        (function() {
            let lastP = 0;
            let colCursor = 0;
            function poll() {
                const pads = navigator.getGamepads();
                if (pads[0]) {
                    const p = pads[0], ax = p.axes[0], ay = p.axes[1], b = p.buttons;
                    if (game.isPlaying) {
                        game.keys['ArrowUp'] = ay < -0.3 || b[12].pressed;
                        game.keys['ArrowDown'] = ay > 0.3 || b[13].pressed;
                        game.keys['ArrowLeft'] = ax < -0.3 || b[14].pressed;
                        game.keys['ArrowRight'] = ax > 0.3 || b[15].pressed;
                        game.keys['ShiftLeft'] = b[7].pressed; // R2
                    } else if (document.getElementById('overlay').style.display !== 'none') {
                        const opts = document.querySelectorAll('.color-opt');
                        opts.forEach(o => o.classList.remove('cursor'));
                        if (opts[colCursor]) opts[colCursor].classList.add('cursor');

                        if (Date.now() - lastP > 200) {
                            if (b[14].pressed || ax < -0.5) colCursor = Math.max(0, colCursor - 1);
                            if (b[15].pressed || ax > 0.5) colCursor = Math.min(opts.length-1, colCursor + 1);
                            if (b[0].pressed) opts[colCursor].click();
                            if (b[9].pressed) startGame();
                            lastP = Date.now();
                        }
                    }
                }
                requestAnimationFrame(poll);
            }
            poll();
        })();

        function startGame() { game.start(); }
    </script>
</body>
</html>
