<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paint Wars: Strategic Domination - K2 games</title>
    <style>
        :root {
            --bg: #020617;
            --panel: #1e293b;
            --accent: #fbbf24;
            --p1: #3b82f6;
            --p2: #ef4444;
            --glass: rgba(15, 23, 42, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: none; }
        
        body {
            background-color: var(--bg);
            color: white; font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        #hud {
            padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;
            background: var(--glass); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 50;
        }

        .stat-card { text-align: center; min-width: 80px; }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; color: #94a3b8; letter-spacing: 1.5px; }
        .stat-val { font-size: 1.5rem; font-weight: 900; color: var(--accent); }

        .progress-container { flex: 1; height: 12px; background: #000; margin: 0 30px; border-radius: 10px; overflow: hidden; display: flex; border: 1px solid rgba(255,255,255,0.1); }
        #bar-p1 { height: 100%; transition: width 0.3s; box-shadow: 0 0 10px var(--p1); }
        #bar-p2 { height: 100%; transition: width 0.3s; box-shadow: 0 0 10px var(--p2); }

        #game-container { flex: 1; position: relative; background: #000; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; object-fit: contain; }

        #mobile-controls {
            position: absolute; bottom: 30px; left: 0; right: 0;
            display: none; justify-content: space-between; padding: 0 30px;
            pointer-events: none; z-index: 60;
        }
        @media (max-width: 900px) { #mobile-controls { display: flex; } }

        .joy-base { width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); position: relative; pointer-events: auto; }
        .joy-thumb { width: 50px; height: 50px; background: #fff; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .turbo-btn { width: 90px; height: 90px; background: rgba(251, 191, 36, 0.2); border: 3px solid var(--accent); border-radius: 50%; color: white; font-weight: 900; display: flex; align-items: center; justify-content: center; pointer-events: auto; }
        .turbo-btn:active { background: var(--accent); color: black; }

        #overlay { position: absolute; inset: 0; background: rgba(2, 6, 23, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 40px; }
        .btn-start { background: var(--accent); color: black; border: none; padding: 1.2rem 4rem; border-radius: 50px; font-weight: 900; font-size: 1.2rem; cursor: pointer; margin-top: 30px; }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CCZ9JJGEDP');
    </script>
</head>
<body>
    <div id="hud">
        <div class="stat-card"><div class="stat-label">Player</div><div id="p1-score" class="stat-val" style="color:var(--p1)">0%</div></div>
        <div class="progress-container">
            <div id="bar-p1" style="background:var(--p1); width: 0%;"></div>
            <div id="bar-p2" style="background:var(--p2); width: 0%;"></div>
        </div>
        <div class="stat-card"><div class="stat-label">CPU</div><div id="p2-score" class="stat-val" style="color:var(--p2)">0%</div></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="mobile-controls">
            <div class="joy-base" id="joy-base"><div class="joy-thumb" id="joy-thumb"></div></div>
            <div class="turbo-btn" id="btn-turbo">TURBO</div>
        </div>
        <div id="overlay">
            <h1 style="font-size: 4rem; color: var(--accent); font-style: italic;">PAINT WARS</h1>
            <p style="opacity: 0.7; max-width: 400px; line-height: 1.6;">Command your unit to paint the arena. Outsmart the enemy AI using strategic pathfinding and high-velocity turbo bursts.</p>
            <button class="btn-start" onclick="game.start()">ENGAGE BATTLE</button>
        </div>
    </div>

    <script>
        class PaintWarPro {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.gridSize = 20;
                this.cols = 50; this.rows = 50;
                this.canvas.width = this.cols * this.gridSize;
                this.canvas.height = this.rows * this.gridSize;

                this.grid = Array.from({length: this.rows}, () => Array(this.cols).fill(null));
                this.p1 = { x: 5, y: 25, vx: 0, vy: 0, color: '#3b82f6', score: 0 };
                this.p2 = { x: 44, y: 25, vx: 0, vy: 0, color: '#ef4444', score: 0 };
                
                this.keys = {}; this.joy = { active: false, x: 0, y: 0 };
                this.isPlaying = false; this.cooldown = 0;
                this.setupInputs();
                requestAnimationFrame(() => this.loop());
            }

            setupInputs() {
                window.onkeydown = (e) => this.keys[e.code] = true;
                window.onkeyup = (e) => this.keys[e.code] = false;
                
                const base = document.getElementById('joy-base'), thumb = document.getElementById('joy-thumb');
                base.addEventListener('touchstart', (e) => { this.joy.active = true; e.preventDefault(); });
                window.addEventListener('touchmove', (e) => {
                    if(!this.joy.active) return;
                    const r = base.getBoundingClientRect(); const t = e.touches[0];
                    const dx = t.clientX - (r.left + r.width/2), dy = t.clientY - (r.top + r.height/2);
                    const d = Math.min(50, Math.hypot(dx, dy)), a = Math.atan2(dy, dx);
                    this.joy.x = (Math.cos(a)*d)/50; this.joy.y = (Math.sin(a)*d)/50;
                    thumb.style.transform = `translate(calc(-50% + ${Math.cos(a)*d}px), calc(-50% + ${Math.sin(a)*d}px))`;
                });
                window.addEventListener('touchend', () => { this.joy.active = false; this.joy.x = 0; this.joy.y = 0; thumb.style.transform = 'translate(-50%, -50%)'; });
                document.getElementById('btn-turbo').addEventListener('touchstart', (e) => { this.keys['ShiftLeft'] = true; e.preventDefault(); });
                document.getElementById('btn-turbo').addEventListener('touchend', () => this.keys['ShiftLeft'] = false);
            }

            start() {
                this.grid = Array.from({length: this.rows}, () => Array(this.cols).fill(null));
                this.p1.x = 5; this.p1.y = 25; this.p2.x = 44; this.p2.y = 25;
                this.isPlaying = true; document.getElementById('overlay').style.display = 'none';
            }

            paint(x, y, color) {
                for(let dy=-1; dy<=1; dy++) {
                    for(let dx=-1; dx<=1; dx++) {
                        const nx = Math.floor(x)+dx, ny = Math.floor(y)+dy;
                        if(nx>=0 && nx<this.cols && ny>=0 && ny<this.rows) this.grid[ny][nx] = color;
                    }
                }
            }

            update() {
                if(!this.isPlaying) return;
                const speed = this.keys['ShiftLeft'] ? 0.6 : 0.3;
                
                // P1 Movement
                let moveX = 0, moveY = 0;
                if(this.keys['ArrowLeft']) moveX = -1; else if(this.keys['ArrowRight']) moveX = 1;
                if(this.keys['ArrowUp']) moveY = -1; else if(this.keys['ArrowDown']) moveY = 1;
                if(this.joy.active) { moveX = this.joy.x; moveY = this.joy.y; }
                
                this.p1.x = Math.max(1, Math.min(this.cols-2, this.p1.x + moveX * speed));
                this.p1.y = Math.max(1, Math.min(this.rows-2, this.p1.y + moveY * speed));
                this.paint(this.p1.x, this.p1.y, this.p1.color);

                // Strategic AI (BFS Pathfinding)
                if(Math.random() < 0.8) {
                    const target = this.findAITarget();
                    const dx = target.x - this.p2.x, dy = target.y - this.p2.y;
                    const dist = Math.hypot(dx, dy);
                    if(dist > 0.1) {
                        this.p2.x += (dx/dist) * 0.35;
                        this.p2.y += (dy/dist) * 0.35;
                        this.paint(this.p2.x, this.p2.y, this.p2.color);
                    }
                }

                this.calcScores();
            }

            findAITarget() {
                // Simplified BFS: check random nearby cells for player color or null
                for(let i=0; i<20; i++) {
                    const rx = Math.floor(Math.random()*this.cols), ry = Math.floor(Math.random()*this.rows);
                    if(this.grid[ry][rx] !== this.p2.color) return {x:rx, y:ry};
                }
                return {x: this.p1.x, y: this.p1.y};
            }

            calcScores() {
                let s1 = 0, s2 = 0;
                this.grid.forEach(r => r.forEach(c => { if(c===this.p1.color) s1++; if(c===this.p2.color) s2++; }));
                const total = this.cols * this.rows;
                const p1 = Math.floor((s1/total)*100), p2 = Math.floor((s2/total)*100);
                document.getElementById('p1-score').textContent = p1 + '%';
                document.getElementById('p2-score').textContent = p2 + '%';
                document.getElementById('bar-p1').style.width = p1 + '%';
                document.getElementById('bar-p2').style.width = p2 + '%';
                if(p1 + p2 >= 95) this.isPlaying = false;
            }

            draw() {
                const ctx = this.ctx; ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
                this.grid.forEach((r,y) => r.forEach((c,x) => {
                    if(c) { ctx.fillStyle = c; ctx.fillRect(x*this.gridSize, y*this.gridSize, this.gridSize, this.gridSize); }
                    else { ctx.strokeStyle = 'rgba(255,255,255,0.02)'; ctx.strokeRect(x*this.gridSize, y*this.gridSize, this.gridSize, this.gridSize); }
                }));
                ctx.lineWidth = 4; ctx.strokeStyle = 'white';
                ctx.fillStyle = this.p1.color; ctx.beginPath(); ctx.arc(this.p1.x*this.gridSize, this.p1.y*this.gridSize, 12, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = this.p2.color; ctx.beginPath(); ctx.arc(this.p2.x*this.gridSize, this.p2.y*this.gridSize, 12, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            }

            loop() { this.update(); this.draw(); requestAnimationFrame(() => this.loop()); }
        }
        const game = new PaintWarPro();
    </script>
</body>
</html>
