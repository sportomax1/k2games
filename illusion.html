<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K2 Illusion: Optical Order - K2 games</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: rgba(30, 41, 59, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --red: #ef4444;
            --blue: #3b82f6;
            --yellow: #eab308;
            --green: #22c55e;
            --gold: #fbbf24;
            --p1: #3b82f6;
            --p2: #ef4444;
            --p3: #22c55e;
            --p4: #eab308;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        nav {
            padding: 0.75rem 1.5rem;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .logo { font-weight: 900; font-size: 1.2rem; color: #fff; letter-spacing: -0.5px; }
        .back-link { color: #94a3b8; text-decoration: none; font-size: 0.8rem; font-weight: bold; }

        #game-layout {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            gap: 15px;
            overflow: hidden;
        }

        #players-hud {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 600px;
            justify-content: center;
        }
        .player-chip {
            background: var(--panel);
            padding: 8px 15px;
            border-radius: 12px;
            border: 2px solid transparent;
            opacity: 0.4;
            transition: 0.3s;
            font-weight: bold;
            font-size: 0.8rem;
            text-align: center;
        }
        .player-chip.active { opacity: 1; transform: scale(1.1); border-color: #fff; }
        .player-chip.p1.active { border-color: var(--p1); }
        .player-chip.p2.active { border-color: var(--p2); }
        .player-chip.p3.active { border-color: var(--p3); }
        .player-chip.p4.active { border-color: var(--p4); }
        .cpu-tag { font-size: 0.6rem; color: var(--gold); display: block; }

        #round-info {
            background: var(--panel);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .color-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #fff; }

        #sequence-container {
            width: 100%;
            flex: 1;
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            border: 2px dashed rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            padding: 20px;
            overflow-x: auto;
            position: relative;
            scrollbar-width: thin;
        }

        .card {
            min-width: 120px;
            height: 170px;
            background: #fff;
            border-radius: 10px;
            position: relative;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            flex-shrink: 0;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.3s;
            overflow: hidden;
            border: 4px solid transparent;
        }
        .card.wrong { border-color: var(--red); box-shadow: 0 0 20px var(--red); }
        .card.right { border-color: var(--green); box-shadow: 0 0 20px var(--green); }

        .percentage-reveal {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.9);
            color: #fff;
            font-size: 1.2rem;
            font-weight: 900;
            text-align: center;
            padding: 10px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-top: 2px solid var(--gold);
        }
        .revealed .percentage-reveal { transform: translateY(0); }

        .drop-zone {
            width: 40px;
            height: 150px;
            background: rgba(255,255,255,0.08);
            border-radius: 8px;
            transition: 0.2s;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: rgba(255,255,255,0.3);
            border: 2px solid transparent;
            touch-action: manipulation;
        }
        .drop-zone:hover { background: rgba(59, 130, 246, 0.2); color: #fff; border-color: var(--blue); }
        .drop-zone.disabled { pointer-events: none; opacity: 0; }

        #action-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 15px;
            background: var(--panel);
            width: 100%;
            border-top: 1px solid var(--border);
        }

        .btn-check {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 12px 40px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(251, 191, 36, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            touch-action: manipulation;
        }
        .btn-check:disabled { opacity: 0.3; cursor: not-allowed; }

        .screen-overlay {
            position: absolute; inset: 0;
            background: rgba(2, 6, 23, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; text-align: center; padding: 20px;
        }

        .btn-large {
            background: var(--blue); color: white; border: none; padding: 1.2rem 3rem;
            border-radius: 50px; font-weight: 800; cursor: pointer; margin-top: 1.5rem;
            font-size: 1.2rem;
            touch-action: manipulation;
        }

        #msg-popup {
            position: absolute; top: 120px;
            background: var(--panel);
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 900;
            opacity: 0;
            transition: 0.4s;
            pointer-events: none;
            z-index: 300;
            border: 2px solid currentColor;
        }
        #msg-popup.show { opacity: 1; transform: translateY(-20px); }

        .loading-bar { width: 100px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; margin-top: 10px; display: none; }
        .loading-progress { width: 0%; height: 100%; background: var(--gold); transition: 0.1s linear; }

        @media (max-width: 600px) {
            .card { min-width: 100px; height: 140px; }
            .drop-zone { width: 35px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">K2 ILLUSION</div>
        <a href="index.html" class="back-link">← HUB</a>
    </nav>

    <div id="game-layout">
        <div id="players-hud">
            <div id="p1-chip" class="player-chip p1 active">P1: <span id="p1-score">0</span></div>
            <div id="p2-chip" class="player-chip p2">P2: <span id="p2-score">0</span> <span class="cpu-tag">CPU</span></div>
            <div id="p3-chip" class="player-chip p3" style="display:none">P3: 0</div>
            <div id="p4-chip" class="player-chip p4" style="display:none">P4: 0</div>
        </div>

        <div id="round-info">
            <span style="font-size: 0.7rem; opacity: 0.7;">SORT BY:</span>
            <div id="target-dot" class="color-dot"></div>
            <span id="target-name" style="font-weight: 900; letter-spacing: 1px;">BLUE</span>
        </div>

        <div id="msg-popup">Correct Sequence!</div>

        <div id="sequence-container"></div>

        <div id="action-area">
            <div id="cpu-status" style="font-size: 0.8rem; color: var(--gold); margin-bottom: 5px; height: 1.2rem;"></div>
            <div class="loading-bar" id="cpu-timer"><div class="loading-progress" id="cpu-progress"></div></div>
            
            <div id="next-card-container"></div>
            
            <div style="display:flex; gap:10px; margin-top: 5px;">
                <button class="btn-check" id="check-btn" onclick="game.checkSequence()">I DOUBT THE ORDER!</button>
                <button class="btn-check" id="next-round-btn" style="display:none; background: var(--green); color: white;" onclick="game.nextRound()">NEXT ROUND</button>
            </div>
        </div>

        <div id="start-screen" class="screen-overlay">
            <h1 style="font-size: 3.5rem; font-style: italic; font-weight: 900; color: var(--gold);">ILLUSION</h1>
            <p style="opacity: 0.7; margin-top: 10px; max-width: 400px;">Sort cards by the percentage of the target color. Doubt the player before you if you think they're wrong!</p>
            <div style="display:flex; flex-direction:column; gap:10px; margin-top: 20px;">
                <button class="btn-large" onclick="game.init(1, 1)" style="margin-top:0">1 PLAYER VS CPU</button>
                <button class="btn-large" onclick="game.init(2, 0)" style="margin-top:0; background: var(--blue);">2 PLAYERS (LOCAL)</button>
                <button class="btn-large" onclick="game.init(1, 3)" style="margin-top:0; background: #8b5cf6;">1 PLAYER VS 3 CPUS</button>
            </div>
        </div>
    </div>

    <script>
        const COLORS = {
            red: { hex: '#ef4444', rgb: [239, 68, 68] },
            blue: { hex: '#3b82f6', rgb: [59, 130, 246] },
            yellow: { hex: '#eab308', rgb: [234, 179, 8] },
            green: { hex: '#22c55e', rgb: [34, 197, 94] }
        };

        class CardGenerator {
            static generate() {
                const canvas = document.createElement('canvas');
                canvas.width = 140;
                canvas.height = 200;
                const ctx = canvas.getContext('2d');
                
                const colors = Object.keys(COLORS);
                // Background
                ctx.fillStyle = COLORS[colors[Math.floor(Math.random() * colors.length)]].hex;
                ctx.fillRect(0, 0, 140, 200);

                // Random Shapes
                for(let i = 0; i < 40; i++) {
                    ctx.fillStyle = COLORS[colors[Math.floor(Math.random() * colors.length)]].hex;
                    const type = Math.random();
                    if(type < 0.4) {
                        ctx.fillRect(Math.random() * 140, Math.random() * 200, Math.random() * 60 + 20, Math.random() * 60 + 20);
                    } else if (type < 0.7) {
                        ctx.beginPath();
                        ctx.arc(Math.random() * 140, Math.random() * 200, Math.random() * 40 + 10, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.beginPath();
                        ctx.moveTo(Math.random() * 140, Math.random() * 200);
                        ctx.lineTo(Math.random() * 140, Math.random() * 200);
                        ctx.lineTo(Math.random() * 140, Math.random() * 200);
                        ctx.fill();
                    }
                }

                // Accurate Percentages using closest color matching
                const imgData = ctx.getImageData(0, 0, 140, 200).data;
                const counts = { red: 0, blue: 0, yellow: 0, green: 0 };
                const totalPixels = 140 * 200;

                for(let i = 0; i < imgData.length; i += 4) {
                    const r = imgData[i], g = imgData[i+1], b = imgData[i+2];
                    let closest = 'red';
                    let minDist = Infinity;
                    
                    for(const [name, data] of Object.entries(COLORS)) {
                        const dr = r - data.rgb[0];
                        const dg = g - data.rgb[1];
                        const db = b - data.rgb[2];
                        const dist = dr*dr + dg*dg + db*db;
                        if(dist < minDist) {
                            minDist = dist;
                            closest = name;
                        }
                    }
                    counts[closest]++;
                }

                const percentages = {};
                Object.keys(counts).forEach(k => {
                    percentages[k] = Math.max(1, Math.round((counts[k] / totalPixels) * 100));
                });

                return { img: canvas.toDataURL(), percentages };
            }
        }

        class Illusion {
            constructor() {
                this.sequence = [];
                this.nextCard = null;
                this.targetColor = 'blue';
                this.revealed = false;
                this.players = [];
                this.turn = 0;
                this.container = document.getElementById('sequence-container');
                this.nextContainer = document.getElementById('next-card-container');
                this.cpuThinking = false;
            }

            init(humanCount, cpuCount) {
                this.players = [];
                for(let i=0; i<humanCount; i++) this.players.push({ id: i, isCPU: false, score: 0 });
                for(let i=0; i<cpuCount; i++) this.players.push({ id: humanCount + i, isCPU: true, score: 0 });
                
                for(let i = 1; i <= 4; i++) {
                    const el = document.getElementById(`p${i}-chip`);
                    if (el) {
                        const p = this.players[i-1];
                        if (p) {
                            el.style.display = 'block';
                            el.innerHTML = `P${i}: <span id="p${i}-score">0</span>${p.isCPU ? '<span class="cpu-tag">CPU</span>' : ''}`;
                        } else {
                            el.style.display = 'none';
                        }
                    }
                }
                document.getElementById('start-screen').style.display = 'none';
                this.nextRound();
            }

            nextRound() {
                this.sequence = [];
                this.revealed = false;
                this.targetColor = Object.keys(COLORS)[Math.floor(Math.random() * 4)];
                
                const dot = document.getElementById('target-dot');
                const name = document.getElementById('target-name');
                dot.style.backgroundColor = COLORS[this.targetColor].hex;
                name.textContent = this.targetColor.toUpperCase();
                name.style.color = COLORS[this.targetColor].hex;

                document.getElementById('msg-popup').classList.remove('show');
                document.getElementById('check-btn').style.display = 'block';
                document.getElementById('check-btn').disabled = true;
                document.getElementById('next-round-btn').style.display = 'none';
                document.getElementById('cpu-status').textContent = '';

                this.sequence.push(CardGenerator.generate());
                this.drawNextCard();
                this.renderSequence();
                this.updateUI();
                this.checkCPUTurn();
            }

                this.checkCPUTurn();

                // Gamepad Adapter
                const pollGamepad = () => {
                    const pads = navigator.getGamepads();
                    if (pads[0] && this.players[this.turn] && !this.players[this.turn].isCPU && !this.revealed) {
                        const p = pads[0]; const now = Date.now();
                        const dropZones = document.querySelectorAll('.drop-zone:not(.disabled)');
                        dropZones.forEach(dz => dz.style.background = '');
                        if (dropZones[this.gpCursor || 0]) dropZones[this.gpCursor || 0].style.background = 'rgba(59, 130, 246, 0.4)';

                        if (now - (this.lastGP || 0) > 200) {
                            const b = p.buttons;
                            if (!this.gpCursor) this.gpCursor = 0;
                            if (b[14].pressed || p.axes[0] < -0.5) this.gpCursor = Math.max(0, this.gpCursor - 1);
                            if (b[15].pressed || p.axes[0] > 0.5) this.gpCursor = Math.min(dropZones.length - 1, this.gpCursor + 1);
                            
                            if (b[0].pressed && dropZones[this.gpCursor]) dropZones[this.gpCursor].click();
                            if (b[2].pressed || b[3].pressed) this.checkSequence(); // X or Y to doubt
                            
                            this.lastGP = now;
                        }
                    } else if (pads[0] && this.revealed) {
                        if (pads[0].buttons[0].pressed) this.nextRound();
                    }
                    requestAnimationFrame(pollGamepad);
                };
                pollGamepad();
            }

                this.checkCPUTurn();

                // Gamepad Adapter
                const pollGamepad = () => {
                    const pads = navigator.getGamepads();
                    if (pads[0] && this.players[this.turn] && !this.players[this.turn].isCPU && !this.revealed) {
                        const p = pads[0]; const now = Date.now();
                        const dropZones = document.querySelectorAll('.drop-zone:not(.disabled)');
                        dropZones.forEach(dz => dz.style.background = '');
                        if (dropZones[this.gpCursor || 0]) dropZones[this.gpCursor || 0].style.background = 'rgba(59, 130, 246, 0.4)';

                        if (now - (this.lastGP || 0) > 200) {
                            const b = p.buttons;
                            if (!this.gpCursor) this.gpCursor = 0;
                            if (b[14].pressed || p.axes[0] < -0.5) this.gpCursor = Math.max(0, this.gpCursor - 1);
                            if (b[15].pressed || p.axes[0] > 0.5) this.gpCursor = Math.min(dropZones.length - 1, this.gpCursor + 1);
                            
                            if (b[0].pressed && dropZones[this.gpCursor]) dropZones[this.gpCursor].click();
                            if (b[2].pressed || b[3].pressed) this.checkSequence(); // X or Y to doubt
                            
                            this.lastGP = now;
                        }
                    } else if (pads[0] && this.revealed) {
                        if (pads[0].buttons[0].pressed) this.nextRound();
                    }
                    requestAnimationFrame(pollGamepad);
                };
                pollGamepad();
            }

            drawNextCard() {
                this.nextCard = CardGenerator.generate();
                this.nextContainer.innerHTML = '';
                const cardEl = this.createCardElement(this.nextCard);
                this.nextContainer.appendChild(cardEl);
            }

            createCardElement(data) {
                const div = document.createElement('div');
                div.className = 'card' + (this.revealed ? ' revealed' : '');
                div.style.backgroundImage = `url("${data.img}")`;
                div.style.backgroundSize = 'cover';
                
                const reveal = document.createElement('div');
                reveal.className = 'percentage-reveal';
                reveal.textContent = `${data.percentages[this.targetColor]}%`;
                div.appendChild(reveal);
                return div;
            }

            renderSequence() {
                this.container.innerHTML = '';
                this.sequence.forEach((data, i) => {
                    this.container.appendChild(this.createDropZone(i));
                    this.container.appendChild(this.createCardElement(data));
                });
                this.container.appendChild(this.createDropZone(this.sequence.length));
            }

            createDropZone(idx) {
                const div = document.createElement('div');
                div.className = 'drop-zone' + (this.revealed ? ' disabled' : '');
                div.innerHTML = '<span>+</span>';
                div.onclick = () => this.placeCardAt(idx);
                return div;
            }

            placeCardAt(idx) {
                if (this.revealed || !this.nextCard || this.cpuThinking) return;
                
                this.sequence.splice(idx, 0, this.nextCard);
                this.turn = (this.turn + 1) % this.players.length;
                this.drawNextCard();
                this.renderSequence();
                this.updateUI();
                
                document.getElementById('check-btn').disabled = false;
                setTimeout(() => {
                    const cards = this.container.querySelectorAll('.card');
                    if (cards[idx]) cards[idx].scrollIntoView({ behavior: 'smooth', inline: 'center' });
                }, 50);
                
                this.checkCPUTurn();
            }

            updateUI() {
                this.players.forEach((p, i) => {
                    const chip = document.getElementById(`p${i+1}-chip`);
                    if (chip) {
                        chip.classList.toggle('active', this.turn === i);
                        const scoreEl = document.getElementById(`p${i+1}-score`);
                        if (scoreEl) scoreEl.textContent = p.score;
                    }
                });
            }

            checkCPUTurn() {
                const player = this.players[this.turn];
                if (player && player.isCPU && !this.revealed) {
                    this.cpuThinking = true;
                    document.getElementById('check-btn').disabled = true;
                    this.runCPUAI();
                }
            }

            async runCPUAI() {
                const status = document.getElementById('cpu-status');
                const timer = document.getElementById('cpu-timer');
                const progress = document.getElementById('cpu-progress');
                
                status.textContent = `CPU ${this.turn + 1} is analyzing...`;
                timer.style.display = 'block';
                
                let p = 0;
                while(p < 100) {
                    p += 5;
                    progress.style.width = p + '%';
                    await new Promise(r => setTimeout(r, 100));
                }
                
                timer.style.display = 'none';
                
                // CPU Logic:
                // 1. Check if the sequence is already broken. If so, high chance to doubt.
                // 2. If not broken, place card in a plausible position.
                
                let brokenAt = -1;
                for(let i=0; i<this.sequence.length-1; i++) {
                    if (this.sequence[i].percentages[this.targetColor] > this.sequence[i+1].percentages[this.targetColor]) {
                        brokenAt = i; break;
                    }
                }

                const myTarget = this.nextCard.percentages[this.targetColor];
                
                // CPU Bluff-calling
                // If sequence is broken, CPU will likely doubt (85% chance if broken)
                if (brokenAt !== -1 && Math.random() < 0.85) {
                    status.textContent = `CPU ${this.turn + 1}: "I DOUBT THE ORDER!"`;
                    await new Promise(r => setTimeout(r, 1000));
                    this.cpuThinking = false;
                    this.checkSequence();
                    return;
                }

                // If sequence is long, CPU might doubt even if not broken (small chance of paranoia)
                if (this.sequence.length > 5 && Math.random() < 0.1) {
                    status.textContent = `CPU ${this.turn + 1}: "Something feels off... I DOUBT!"`;
                    await new Promise(r => setTimeout(r, 1000));
                    this.cpuThinking = false;
                    this.checkSequence();
                    return;
                }

                // Placing the card
                // Find best spot based on actual values (CPU is good but not perfect)
                let bestIdx = 0;
                for (let i = 0; i < this.sequence.length; i++) {
                    if (myTarget >= this.sequence[i].percentages[this.targetColor]) {
                        bestIdx = i + 1;
                    }
                }
                
                // Add some "human error" to CPU placement occasionally
                if (Math.random() < 0.15) {
                    bestIdx = Math.floor(Math.random() * (this.sequence.length + 1));
                }

                status.textContent = `CPU ${this.turn + 1} placed a card.`;
                await new Promise(r => setTimeout(r, 500));
                this.cpuThinking = false;
                this.placeCardAt(bestIdx);
            }

            checkSequence() {
                this.revealed = true;
                this.renderSequence();
                
                let brokenAt = -1;
                for(let i=0; i<this.sequence.length-1; i++) {
                    if (this.sequence[i].percentages[this.targetColor] > this.sequence[i+1].percentages[this.targetColor]) {
                        brokenAt = i;
                        break;
                    }
                }

                const correct = (brokenAt === -1);
                const previousPlayer = (this.turn - 1 + this.players.length) % this.players.length;
                const currentPlayer = this.turn;

                const cardEls = this.container.querySelectorAll('.card');
                if (!correct) {
                    cardEls[brokenAt].classList.add('wrong');
                    cardEls[brokenAt+1].classList.add('wrong');
                    this.players[currentPlayer].score++;
                } else {
                    cardEls.forEach(el => el.classList.add('right'));
                    this.players[previousPlayer].score++;
                }

                const pop = document.getElementById('msg-popup');
                pop.textContent = correct ? "ORDER WAS CORRECT! 🏆" : "SEQUENCE BROKEN! ❌";
                pop.style.color = correct ? "var(--green)" : "var(--red)";
                pop.classList.add('show');
                
                document.getElementById('check-btn').style.display = 'none';
                document.getElementById('next-round-btn').style.display = 'block';
                document.getElementById('cpu-status').textContent = '';
                this.updateUI();
            }
        }

        const game = new Illusion();
    </script>
</body>
</html>
