<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Surf City Pro - K2 Games</title>
<style>
:root{--ocean:#0ea5e9;--deep:#075985;--foam:#f8fafc;--sand:#f4c983;--ink:#07111f;--panel:rgba(15,23,42,.72);--gold:#fbbf24;--danger:#fb7185;--good:#34d399}*{box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none}html,body{margin:0;height:100%;overflow:hidden;background:linear-gradient(#7dd3fc,#0284c7 48%,#075985);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:white}#wrap{position:fixed;inset:0;display:grid;place-items:center;padding:8px}canvas{width:min(100vw,760px);height:min(100vh,1040px);max-height:100vh;background:#0ea5e9;border:4px solid rgba(255,255,255,.8);border-radius:18px;box-shadow:0 24px 80px rgba(0,0,0,.42)}.back{position:fixed;top:12px;left:12px;z-index:20;color:white;text-decoration:none;background:rgba(15,23,42,.65);padding:8px 13px;border-radius:12px;font-weight:900;border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(6px)}.hud{position:fixed;top:12px;left:50%;transform:translateX(-50%);width:min(96vw,720px);display:grid;grid-template-columns:repeat(4,1fr);gap:7px;pointer-events:none;z-index:10}.pill{background:var(--panel);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:8px 9px;text-align:center;font-size:13px;font-weight:950;text-shadow:0 2px 0 rgba(0,0,0,.35);backdrop-filter:blur(6px)}.overlay{position:fixed;inset:0;display:grid;place-items:center;background:linear-gradient(rgba(2,6,23,.12),rgba(2,6,23,.75));z-index:15;padding:24px}.card{width:min(92vw,540px);background:rgba(8,16,34,.93);border:3px solid rgba(255,255,255,.84);border-radius:22px;padding:24px;text-align:center;box-shadow:0 18px 70px rgba(0,0,0,.62)}h1{margin:0 0 8px;font-size:clamp(34px,8vw,62px);font-style:italic;letter-spacing:-2px;line-height:.88}.sub{opacity:.92;line-height:1.48}.btn{display:inline-block;margin-top:16px;background:linear-gradient(#fff,#bae6fd);color:#07111f;border:0;border-bottom:5px solid #0284c7;border-radius:14px;padding:14px 22px;font-weight:950;font-size:18px;cursor:pointer}.small{font-size:13px;opacity:.82;margin-top:12px}.controls{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);width:min(96vw,720px);display:flex;justify-content:space-between;align-items:end;gap:12px;z-index:12}.pad{display:flex;gap:10px}.cbtn{width:68px;height:58px;border-radius:18px;border:2px solid rgba(255,255,255,.45);background:rgba(8,16,34,.55);color:white;font-weight:950;font-size:24px;box-shadow:0 8px 0 rgba(0,0,0,.22);backdrop-filter:blur(5px)}@media(pointer:fine){.controls{display:none}}@media(max-width:640px){.hud{grid-template-columns:repeat(2,1fr);top:48px}.pill{font-size:12px;padding:7px 8px}}
</style>
</head>
<body>
<a class="back" href="index.html">← HUB</a>
<div id="wrap"><canvas id="game" width="480" height="720"></canvas></div>
<div class="hud"><div class="pill">🏄 <span id="phase">READY</span></div><div class="pill">🏆 <span id="score">0</span></div><div class="pill">⚡ <span id="speed">0</span></div><div class="pill">⚖️ <span id="balance">100</span></div></div>
<div class="controls"><div class="pad"><button class="cbtn" id="left">◀</button><button class="cbtn" id="right">▶</button></div><div class="pad"><button class="cbtn" id="down">▼</button><button class="cbtn" id="jump">⤴</button><button class="cbtn" id="up">▲</button></div></div>
<div class="overlay" id="overlay"><div class="card"><h1>SURF CITY<br>PRO</h1><div class="sub">Working arcade surfing: paddle to catch waves, carve the wave face, dodge foam, hit ramps, and land tricks. Simple controls, no external 3D engine weirdness.</div><button class="btn" id="start">HIT THE SURF</button><div class="small">Keyboard: ←/→ or A/D carve · ↑/W speed · ↓/S brake · Space jump/trick. Mobile: buttons or drag.</div></div></div>
<script>
(()=>{
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
const ui={phase:byId('phase'),score:byId('score'),speed:byId('speed'),balance:byId('balance'),overlay:byId('overlay')};
function byId(id){return document.getElementById(id)}
const keys={},rnd=(a,b)=>a+Math.random()*(b-a),clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
let running=false,gameOver=false,t=0,score=0,best=Number(localStorage.getItem('surfCityBest')||0),spawn=0,foamSpawn=0,waveOffset=0,message='Catch the wave!';
const surfer={x:W/2,y:H*.62,vx:0,vy:0,speed:0,balance:100,air:0,spin:0,combo:1,streak:0};
let foam=[],ramps=[],spray=[];
function reset(){running=true;gameOver=false;t=0;score=0;spawn=0;foamSpawn=0;waveOffset=0;message='Paddle! Build speed to catch the wave';foam=[];ramps=[];spray=[];Object.assign(surfer,{x:W/2,y:H*.62,vx:0,vy:0,speed:18,balance:100,air:0,spin:0,combo:1,streak:0});ui.overlay.style.display='none'}
function end(msg){running=false;gameOver=true;best=Math.max(best,Math.floor(score));localStorage.setItem('surfCityBest',best);ui.overlay.style.display='grid';ui.overlay.querySelector('h1').innerHTML='WIPEOUT<br>'+Math.floor(score);ui.overlay.querySelector('.sub').textContent=msg+' Best ride: '+best+' points. Try again — ocean says “skill issue,” rude but fair.';ui.overlay.querySelector('.btn').textContent='SURF AGAIN'}
function addFoam(){foam.push({x:rnd(42,W-42),y:-30,w:rnd(34,88),h:rnd(14,28),v:rnd(2.2,4.2),kind:Math.random()<.72?'foam':'rock'})}
function addRamp(){ramps.push({x:rnd(55,W-55),y:-40,w:58,h:22,v:rnd(2.6,4.1),hit:false})}
function splash(x,y,n,col){for(let i=0;i<n;i++)spray.push({x,y,vx:rnd(-2.6,2.6),vy:rnd(-3.5,1.2),life:rnd(18,42),col:col||'rgba(255,255,255,.75)'})}
function update(){if(!running)return;t+=1/60;waveOffset+=surfer.speed*.05;const left=keys.ArrowLeft||keys.a,right=keys.ArrowRight||keys.d,up=keys.ArrowUp||keys.w,down=keys.ArrowDown||keys.s,jump=keys[' ']||keys.Space;
let steer=(right?1:0)-(left?1:0);surfer.vx=surfer.vx*.84+steer*(1.2+surfer.speed*.015);surfer.x=clamp(surfer.x+surfer.vx*3.2,30,W-30);
if(up)surfer.speed+=.52;if(down)surfer.speed-=.72;surfer.speed=clamp(surfer.speed,12,76);
const waveFace=Math.sin((surfer.x+waveOffset)*.018)*42+Math.sin(t*1.7)*18;surfer.y=H*.62+waveFace*.18-surfer.air;
const sweet=1-Math.abs(surfer.x-W/2)/(W*.54);surfer.balance+=sweet*.18-Math.abs(steer)*.28-(surfer.speed>62?.18:0);surfer.balance=clamp(surfer.balance,0,100);
score+=(surfer.speed*.12+sweet*1.8)*surfer.combo;if(surfer.balance<=0)end('You lost balance carving too hard.');
if(jump&&surfer.air<=0&&surfer.speed>24){surfer.air=46;surfer.spin=steer*.18+(Math.random()<.25?.24:0);surfer.combo+=.08;score+=80*surfer.combo;splash(surfer.x,surfer.y+22,12)}
if(surfer.air>0){surfer.air-=1.55;surfer.spin*=.96;if(surfer.air<0){surfer.air=0;if(Math.abs(surfer.vx)>8){surfer.balance-=18;message='Sketchy landing!'}else{score+=150*surfer.combo;message='Clean landing! Combo x'+surfer.combo.toFixed(1);splash(surfer.x,surfer.y+26,20)}}}
spawn-=surfer.speed*.035;foamSpawn-=surfer.speed*.05;if(spawn<=0){addFoam();spawn=rnd(22,48)}if(foamSpawn<=0){addRamp();foamSpawn=rnd(95,160)}
foam.forEach(o=>{o.y+=o.v+surfer.speed*.025;if(hit(o)){if(o.kind==='rock'&&surfer.air<10)end('You clipped a hidden rock.');else if(o.kind==='foam'&&surfer.air<8){surfer.balance-=14;surfer.speed-=7;message='Whitewater hit!';splash(surfer.x,surfer.y,16)}}});foam=foam.filter(o=>o.y<H+60);
ramps.forEach(r=>{r.y+=r.v+surfer.speed*.025;if(!r.hit&&Math.abs(surfer.x-r.x)<44&&Math.abs(surfer.y-r.y)<32){r.hit=true;surfer.air=62;surfer.speed+=8;score+=220*surfer.combo;message='Ramp boost!';splash(r.x,r.y,24)}});ramps=ramps.filter(r=>r.y<H+60&&!r.hit);
spray.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life--});spray=spray.filter(p=>p.life>0);
ui.phase.textContent=surfer.speed<28?'PADDLING':surfer.air>0?'AIR':'SURFING';ui.score.textContent=Math.floor(score);ui.speed.textContent=Math.floor(surfer.speed);ui.balance.textContent=Math.floor(surfer.balance)}
function hit(o){return Math.abs(surfer.x-o.x)<(o.w*.45+13)&&Math.abs(surfer.y-o.y)<(o.h*.75+20)}
function drawOcean(){const grad=ctx.createLinearGradient(0,0,0,H);grad.addColorStop(0,'#67e8f9');grad.addColorStop(.38,'#0ea5e9');grad.addColorStop(1,'#075985');ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);ctx.fillStyle='#f4c983';ctx.fillRect(0,H-58,W,58);ctx.fillStyle='rgba(255,255,255,.55)';for(let y=-40;y<H;y+=42){const yy=(y+waveOffset)%42;ctx.fillRect(0,yy,W,3)}for(let i=0;i<8;i++){ctx.beginPath();const y=(i*95+waveOffset*1.7)%H;ctx.strokeStyle='rgba(255,255,255,.22)';ctx.lineWidth=8;ctx.moveTo(-40,y);for(let x=-40;x<W+60;x+=40)ctx.lineTo(x,y+Math.sin(x*.04+t+i)*12);ctx.stroke()}ctx.fillStyle='rgba(255,255,255,.75)';ctx.fillRect(0,H-66,W,12)}
function drawFoam(o){ctx.save();ctx.translate(o.x,o.y);if(o.kind==='rock'){ctx.fillStyle='#475569';roundRect(-o.w/2,-o.h/2,o.w,o.h,8);ctx.fill();ctx.fillStyle='#64748b';roundRect(-o.w*.22,-o.h*.8,o.w*.45,o.h*.7,6);ctx.fill()}else{ctx.fillStyle='rgba(255,255,255,.82)';for(let i=0;i<5;i++){ctx.beginPath();ctx.arc(-o.w/2+i*o.w/4,Math.sin(t*4+i)*4,10+o.h*.25,0,Math.PI*2);ctx.fill()}}ctx.restore()}
function drawRamp(r){ctx.save();ctx.translate(r.x,r.y);ctx.fillStyle='#8b5a2b';roundRect(-30,-8,60,20,4);ctx.fill();ctx.fillStyle='#f8fafc';roundRect(-23,-17,46,10,4);ctx.fill();ctx.fillStyle='#bae6fd';ctx.fillRect(-16,-22,32,5);ctx.restore()}
function drawSurfer(){const x=surfer.x,y=surfer.y;ctx.save();ctx.translate(x,y);ctx.rotate(surfer.vx*.035+surfer.spin);ctx.fillStyle='rgba(0,0,0,.16)';ctx.fillRect(-23,25+surfer.air,46,7);ctx.fillStyle='#fbbf24';roundRect(-12,-30,24,68,12);ctx.fill();ctx.fillStyle='#f59e0b';ctx.fillRect(-8,-28,16,11);ctx.fillStyle='#111827';ctx.fillRect(-9,-16,18,25);ctx.fillStyle='#ef4444';ctx.fillRect(-7,-34,14,17);ctx.fillStyle='#ffdbac';ctx.beginPath();ctx.arc(0,-44,8,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111827';ctx.fillRect(-8,-52,16,6);ctx.strokeStyle='#ffdbac';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(-10,-17);ctx.lineTo(-24,-5);ctx.moveTo(10,-17);ctx.lineTo(24,-5);ctx.stroke();ctx.restore()}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function draw(){drawOcean();foam.forEach(drawFoam);ramps.forEach(drawRamp);spray.forEach(p=>{ctx.fillStyle=p.col;ctx.fillRect(p.x,p.y,3,3)});drawSurfer();ctx.fillStyle='rgba(15,23,42,.55)';roundRect(12,H-110,W-24,36,18);ctx.fill();ctx.fillStyle='white';ctx.font='900 14px system-ui';ctx.textAlign='center';ctx.fillText(message,W/2,H-87);ctx.fillStyle='rgba(255,255,255,.85)';ctx.font='800 12px system-ui';ctx.fillText('Best: '+best,W/2,H-18)}
function loop(){update();draw();requestAnimationFrame(loop)}
document.getElementById('start').onclick=reset;addEventListener('keydown',e=>{keys[e.key]=true;keys[e.code]=true;if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space',' '].includes(e.key)||e.code==='Space')e.preventDefault()});addEventListener('keyup',e=>{keys[e.key]=false;keys[e.code]=false});
function bind(id,key){const b=document.getElementById(id);b.onpointerdown=e=>{e.preventDefault();keys[key]=true};b.onpointerup=b.onpointercancel=b.onpointerleave=e=>{keys[key]=false}}
bind('left','ArrowLeft');bind('right','ArrowRight');bind('up','ArrowUp');bind('down','ArrowDown');bind('jump',' ');
let drag=false;canvas.onpointerdown=e=>{drag=true;canvas.setPointerCapture(e.pointerId)};canvas.onpointermove=e=>{if(!drag)return;const r=canvas.getBoundingClientRect(),x=e.clientX-r.left;keys.ArrowLeft=x<r.width*.43;keys.ArrowRight=x>r.width*.57};canvas.onpointerup=canvas.onpointercancel=()=>{drag=false;keys.ArrowLeft=keys.ArrowRight=false};
loop();
})();
</script>
</body>
</html>
