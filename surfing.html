<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Surf City Pro - K2 games</title>
    <style>
        :root {
            --primary: #0ea5e9;
            --accent: #fbbf24;
            --glass: rgba(15, 23, 42, 0.7);
        }

        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; color: white; touch-action: none; }
        
        #ui-layer {
            position: absolute; inset: 0; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between; padding: 20px;
            z-index: 10;
        }

        .hud-top { display: flex; justify-content: space-between; }
        
        .stat-card {
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 10px 25px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; min-width: 120px;
        }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.8; letter-spacing: 1px; font-weight: 700; }
        .stat-val { font-size: 1.8rem; font-weight: 900; color: var(--accent); font-family: monospace; }

        #hint-text {
            position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%);
            background: var(--glass); padding: 12px 30px; border-radius: 30px;
            font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.2); transition: all 0.3s;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5); text-align: center;
        }

        #mobile-controls {
            position: absolute; bottom: 40px; left: 0; right: 0;
            display: none; justify-content: space-between; padding: 0 30px;
            pointer-events: none; z-index: 50;
        }
        @media (max-width: 1024px) { #mobile-controls { display: flex; } }
        .m-btn {
            width: 80px; height: 80px; background: rgba(255,255,255,0.1);
            border: 2px solid white; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; color: white;
            font-weight: 900; pointer-events: auto; backdrop-filter: blur(5px);
        }

        #overlay {
            position: absolute; inset: 0; background: radial-gradient(circle at center, rgba(14, 165, 233, 0.4), rgba(15, 23, 42, 0.95));
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center; padding: 30px; backdrop-filter: blur(5px);
        }
        h1 { font-size: 4rem; color: #fff; font-style: italic; font-weight: 900; line-height: 0.9; margin: 0; }
        .btn {
            padding: 20px 80px; font-size: 1.5rem; background: var(--accent); color: #000;
            border: none; border-radius: 50px; font-weight: 900; cursor: pointer; margin-top: 40px;
            box-shadow: 0 10px 0 #b45309; transition: transform 0.1s;
        }
        .btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #b45309; }

        .back-link {
            position: fixed; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 10px; z-index: 2000;
            font-weight: bold; font-size: 0.8rem; backdrop-filter: blur(5px); pointer-events: auto;
        }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CCZ9JJGEDP');
    </script>
</head>
<body>
    <a href="index.html" class="back-link">← HUB</a>

    <div id="ui-layer">
        <div class="hud-top">
            <div class="stat-card">
                <div class="stat-label">Phase</div>
                <div id="phase-val" class="stat-val">BEACH</div>
            </div>
            <div class="stat-card">
                <div id="score-label" class="stat-label">Score</div>
                <div id="score-val" class="stat-val">0</div>
            </div>
        </div>
        <div id="hint-text">WALK TO THE WATER (UP)</div>
    </div>

    <div id="mobile-controls">
        <div style="display:flex; gap:10px;">
            <div class="m-btn" id="m-left">L</div>
            <div class="m-btn" id="m-right">R</div>
        </div>
        <div style="display:flex; gap:10px;">
            <div class="m-btn" id="m-down">DN</div>
            <div class="m-btn" id="m-up">UP</div>
        </div>
    </div>

    <div id="overlay">
        <h1>SURF CITY<br>PRO</h1>
        <p style="color: #cbd5e1; margin-top: 20px; max-width: 450px; line-height: 1.6;">
            1. <b>Beach:</b> Walk to the water.<br>
            2. <b>Paddle:</b> Go out past the breakers.<br>
            3. <b>Lineup:</b> Turn around and catch a swell.<br>
            4. <b>Surf:</b> Stand up and ride back to shore!
        </p>
        <button class="btn" onclick="window.game.start()">HIT THE SURF</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        class SurfGame {
            constructor() {
                this.phase = 'BEACH'; 
                this.score = 0;
                this.time = 0;
                this.waves = [];
                this.state = 'menu';
                
                this.initEngine();
                this.createWorld();
                this.createPlayer();
                this.setupInput();
                
                this.loop = this.loop.bind(this);
                requestAnimationFrame(this.loop);
            }

            initEngine() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x7dd3fc);
                this.scene.fog = new THREE.FogExp2(0x7dd3fc, 0.0015);

                this.camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 4000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                document.body.appendChild(this.renderer.domElement);

                this.scene.add(new THREE.AmbientLight(0xffffff, 0.7));
                const sun = new THREE.DirectionalLight(0xfffae3, 1.2);
                sun.position.set(100, 300, 100); sun.castShadow = true;
                this.scene.add(sun);

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            createWorld() {
                // Ocean Surface
                const waterGeo = new THREE.PlaneGeometry(4000, 4000, 64, 64);
                const waterMat = new THREE.MeshStandardMaterial({ color: 0x0ea5e9, transparent: true, opacity: 0.8, roughness: 0.1 });
                this.water = new THREE.Mesh(waterGeo, waterMat);
                this.water.rotation.x = -Math.PI/2;
                this.scene.add(this.water);

                // Beach
                const beachGeo = new THREE.PlaneGeometry(4000, 400);
                const beachMat = new THREE.MeshStandardMaterial({ color: 0xe6c288 });
                const beach = new THREE.Mesh(beachGeo, beachMat);
                beach.rotation.x = -Math.PI/2;
                beach.position.set(0, 0.5, 450);
                this.scene.add(beach);

                // Breaker Lines
                for(let i=0; i<15; i++) {
                    const wave = new THREE.Mesh(new THREE.BoxGeometry(400, 0.2, 2), new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.4}));
                    wave.position.set(0, 0.6, -i*100 + 200);
                    this.scene.add(wave);
                    this.waves.push(wave);
                }
            }

            createPlayer() {
                this.player = new THREE.Group();
                this.board = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.2, 5), new THREE.MeshStandardMaterial({ color: 0xfbbf24 }));
                this.player.add(this.board);

                this.surfer = new THREE.Group();
                const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1.5), new THREE.MeshStandardMaterial({ color: 0x333333 }));
                body.position.y = 0.75;
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
                head.position.y = 1.8;
                this.surfer.add(body, head);
                this.player.add(this.surfer);

                this.player.position.set(0, 2, 450); // Start on Beach
                this.scene.add(this.player);
            }

            setupInput() {
                this.keys = {};
                window.onkeydown = e => this.keys[e.code] = true;
                window.onkeyup = e => this.keys[e.code] = false;
                const bind = (id, k) => {
                    const el = document.getElementById(id);
                    el.ontouchstart = (e) => { e.preventDefault(); this.keys[k] = true; };
                    el.ontouchend = (e) => { e.preventDefault(); this.keys[k] = false; };
                };
                bind('m-up', 'ArrowUp'); bind('m-down', 'ArrowDown'); bind('m-left', 'ArrowLeft'); bind('m-right', 'ArrowRight');
            }

            start() { this.state = 'playing'; document.getElementById('overlay').style.display = 'none'; }

            update(dt) {
                if(this.state !== 'playing') return;
                this.time += dt;

                // Animate Breakers
                this.waves.forEach(w => {
                    w.position.z += 15 * dt;
                    if(w.position.z > 300) w.position.z = -1200;
                });

                const p = this.player;
                const moveUp = this.keys['ArrowUp'] || this.keys['KeyW'];
                const moveDown = this.keys['ArrowDown'] || this.keys['KeyS'];
                const moveLeft = this.keys['ArrowLeft'] || this.keys['KeyA'];
                const moveRight = this.keys['ArrowRight'] || this.keys['KeyD'];

                if (this.phase === 'BEACH') {
                    if (moveUp) p.position.z -= 15 * dt;
                    if (p.position.z < 250) {
                        this.phase = 'PADDLING';
                        document.getElementById('phase-val').textContent = 'PADDLING';
                        document.getElementById('hint-text').textContent = 'PADDLE OUT PAST THE BREAKERS';
                        this.surfer.rotation.x = -Math.PI/2;
                        this.surfer.position.y = 0.3;
                    }
                } 
                else if (this.phase === 'PADDLING') {
                    if (moveUp) p.position.z -= 20 * dt;
                    if (moveLeft) p.position.x -= 15 * dt;
                    if (moveRight) p.position.x += 15 * dt;
                    p.position.y = 0.5 + Math.sin(this.time * 4) * 0.2;

                    if (p.position.z < -800) {
                        this.phase = 'LINEUP';
                        document.getElementById('phase-val').textContent = 'LINEUP';
                        document.getElementById('hint-text').textContent = 'HOLD DOWN TO TURN AROUND';
                    }
                }
                else if (this.phase === 'LINEUP') {
                    if (moveDown) {
                        p.rotation.y = Math.PI;
                        this.phase = 'CATCHING';
                        document.getElementById('phase-val').textContent = 'WAITING';
                        document.getElementById('hint-text').textContent = 'PADDLE (UP) WHEN YOU SEE THE SWELL!';
                    }
                }
                else if (this.phase === 'CATCHING') {
                    if (moveUp) {
                        p.position.z += 15 * dt;
                        // Trigger surf after some paddling towards shore
                        if (p.position.z > -600) {
                            this.phase = 'SURFING';
                            document.getElementById('phase-val').textContent = 'SURFING!';
                            document.getElementById('hint-text').textContent = 'CARVE LEFT/RIGHT!';
                            this.surfer.rotation.x = 0;
                            this.surfer.position.y = 0.8;
                        }
                    }
                }
                else if (this.phase === 'SURFING') {
                    p.position.z += 40 * dt;
                    if (moveLeft) { p.position.x += 25 * dt; p.rotation.z = -0.3; }
                    else if (moveRight) { p.position.x -= 25 * dt; p.rotation.z = 0.3; }
                    else { p.rotation.z = 0; }

                    this.score += 50 * dt;
                    document.getElementById('score-val').textContent = Math.floor(this.score);

                    if (p.position.z > 250) {
                        this.phase = 'BEACH';
                        p.rotation.set(0,0,0);
                        document.getElementById('phase-val').textContent = 'FINISHED';
                        document.getElementById('hint-text').textContent = 'NICE RIDE! GO AGAIN?';
                    }
                }

                // Camera Logic
                let camTarget = p.position.clone().add(new THREE.Vector3(0, 15, 45));
                if (this.phase === 'LINEUP' || this.phase === 'CATCHING' || this.phase === 'SURFING') {
                    camTarget = p.position.clone().add(new THREE.Vector3(0, 15, -45));
                }
                this.camera.position.lerp(camTarget, 0.1);
                this.camera.lookAt(p.position);
            }

            loop() {
                this.update(0.016);
                this.renderer.render(this.scene, this.camera);
                requestAnimationFrame(this.loop);
            }
        }

        window.game = new SurfGame();
    </script>
</body>
</html>
