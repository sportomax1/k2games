<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jetpack Pro: Infinite - K2 games</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --accent: #f59e0b;
            --primary: #3b82f6;
            --danger: #ef4444;
            --text: #f8fafc;
            --glass: rgba(15, 23, 42, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
        }

        /* --- HUD --- */
        #hud {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 100;
        }

        .stat-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 10px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            min-width: 100px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .stat-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; display: block; }
        .stat-val { font-size: 1.4rem; font-weight: 900; color: var(--accent); font-family: monospace; }

        /* --- OVERLAYS --- */
        .screen {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(15px);
            text-align: center;
            padding: 20px;
        }

        h1 { font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; font-style: italic; color: var(--accent); margin-bottom: 10px; }
        
        .btn-large {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 1.2rem 4rem;
            border-radius: 100px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 2rem;
            font-size: 1.4rem;
            box-shadow: 0 15px 30px rgba(245, 158, 11, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 12px;
            z-index: 2000;
            font-weight: bold;
            backdrop-filter: blur(5px);
            font-size: 0.8rem;
        }

        #hint {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            opacity: 0.4;
            font-weight: bold;
            pointer-events: none;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        @media (max-height: 500px) {
            h1 { font-size: 2.5rem; }
            .btn-large { padding: 0.8rem 3rem; font-size: 1rem; }
        }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CCZ9JJGEDP');
    </script>
</head>
<body>
    <a href="index.html" class="back-link">← HUB</a>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="hud">
            <div class="stat-card">
                <span class="stat-label">Distance</span>
                <span id="dist-val" class="stat-val">0m</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Coins</span>
                <span id="coin-val" class="stat-val">0</span>
            </div>
        </div>

        <div id="hint">HOLD ANYWHERE TO THRUST</div>

        <div id="start-screen" class="screen">
            <h1>JETPACK<br>PRO</h1>
            <p style="opacity: 0.7; font-size: 1.2rem;">Elite Flight Challenge</p>
            <div style="margin-top: 20px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; font-size: 0.9rem;">
                Avoid zappers and missiles.<br>Collect coins to boost score.
            </div>
            <button class="btn-large" onclick="game.start()">LIFTOFF</button>
        </div>

        <div id="over-screen" class="screen" style="display: none;">
            <h1 style="color: var(--danger);">CRASHED!</h1>
            <p id="final-stats" style="font-size: 1.5rem; font-weight: 800; margin-top: 10px;"></p>
            <button class="btn-large" onclick="game.start()">RETRY</button>
        </div>
    </div>

    <script>
        class JetpackPro {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                // Fixed logic resolution for consistent physics
                this.baseW = 1000;
                this.baseH = 600;
                
                this.player = {
                    x: 150, y: 300, w: 45, h: 60,
                    vy: 0, thrust: 0.65, gravity: 0.35,
                    anim: 0, shield: 0
                };

                this.obstacles = [];
                this.coins = [];
                this.particles = [];
                this.bgOffset = 0;
                this.speed = 6;
                this.score = 0;
                this.distance = 0;
                this.playing = false;
                this.input = false;

                this.resize();
                this.setupInput();
                
                window.addEventListener('resize', () => this.resize());
                this.loop = this.loop.bind(this);
                requestAnimationFrame(this.loop);
            }

            resize() {
                // Keep 1000:600 aspect ratio
                this.canvas.width = this.baseW;
                this.canvas.height = this.baseH;
            }

            setupInput() {
                const triggerStart = (e) => {
                    if (e.type === 'touchstart') e.preventDefault();
                    if (this.playing) this.input = true;
                };
                const triggerEnd = () => this.input = false;

                window.addEventListener('mousedown', triggerStart);
                window.addEventListener('mouseup', triggerEnd);
                window.addEventListener('touchstart', triggerStart, {passive: false});
                window.addEventListener('touchend', triggerEnd);
                
                window.addEventListener('keydown', (e) => {
                    if(e.code === 'Space' || e.code === 'ArrowUp') this.input = true;
                    if(e.code === 'Enter' && !this.playing) this.start();
                });
                window.addEventListener('keyup', (e) => {
                    if(e.code === 'Space' || e.code === 'ArrowUp') this.input = false;
                });

                // Gamepad
                setInterval(() => {
                    const pads = navigator.getGamepads();
                    if (pads[0]) {
                        const p = pads[0];
                        this.input = p.buttons[0].pressed || p.buttons[7].pressed;
                        if (p.buttons[9].pressed && !this.playing) this.start();
                    }
                }, 16);
            }

            start() {
                this.player.y = 300; this.player.vy = 0;
                this.obstacles = []; this.coins = []; this.particles = [];
                this.speed = 6; this.distance = 0; this.score = 0;
                this.playing = true;
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('over-screen').style.display = 'none';
            }

            spawnObstacle() {
                if (this.obstacles.length > 8) return;
                const type = Math.random();
                if (type < 0.6) { 
                    const h = 120 + Math.random() * 80;
                    const y = Math.random() * (this.baseH - h - 100) + 50;
                    this.obstacles.push({ x: this.baseW, y, w: 25, h, type: 'zapper', rot: 0 });
                } else { 
                    this.obstacles.push({ x: this.baseW + 200, y: this.player.y, w: 50, h: 25, type: 'missile', warn: 80 });
                }
            }

            spawnCoins() {
                const y = Math.random() * (this.baseH - 150) + 75;
                const pattern = Math.floor(Math.random() * 3);
                for(let i=0; i<8; i++) {
                    let ox = i * 35;
                    let oy = pattern === 1 ? Math.sin(i*0.5) * 40 : (pattern === 2 ? i * 10 : 0);
                    this.coins.push({ x: this.baseW + ox, y: y + oy, r: 12, collected: false });
                }
            }

            update() {
                if (!this.playing) return;

                if (this.input) {
                    this.player.vy -= this.player.thrust;
                    this.spawnParticles(this.player.x + 5, this.player.y + 50, 3, '#f59e0b');
                }
                this.player.vy += this.player.gravity;
                this.player.y += this.player.vy;

                // Ceiling/Floor bounce
                if (this.player.y < 50) { this.player.y = 50; this.player.vy = 0; }
                if (this.player.y > this.baseH - 110) {
                    this.player.y = this.baseH - 110;
                    this.player.vy = 0;
                }

                this.distance += this.speed * 0.05;
                this.speed = Math.min(18, 6 + this.distance / 500);
                this.bgOffset = (this.bgOffset + this.speed * 0.4) % this.baseW;

                if (Math.random() < 0.015) this.spawnObstacle();
                if (Math.random() < 0.01) this.spawnCoins();

                // Obstacles
                for (let i = this.obstacles.length - 1; i >= 0; i--) {
                    const o = this.obstacles[i];
                    if (o.type === 'missile') {
                        if (o.warn > 0) { o.warn--; o.y = this.player.y; }
                        else o.x -= this.speed * 2.2;
                    } else {
                        o.x -= this.speed;
                        o.rot += 0.05;
                    }

                    if (this.checkCollision(this.player, o)) this.die();
                    if (o.x < -200) this.obstacles.splice(i, 1);
                }

                // Coins
                for (let i = this.coins.length - 1; i >= 0; i--) {
                    const c = this.coins[i];
                    c.x -= this.speed;
                    if (!c.collected && Math.hypot(this.player.x + 22 - c.x, this.player.y + 30 - c.y) < 45) {
                        c.collected = true;
                        this.score += 10;
                        this.spawnParticles(c.x, c.y, 5, '#fbbf24');
                    }
                    if (c.x < -100) this.coins.splice(i, 1);
                }

                // Particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x -= this.speed * 0.6; p.y += p.vy; p.life -= 0.04;
                    if (p.life <= 0) this.particles.splice(i, 1);
                }

                this.updateUI();
            }

            checkCollision(p, o) {
                if (o.type === 'missile' && o.warn > 0) return false;
                // Tight hitbox for better feel
                const padding = 10;
                return p.x + padding < o.x + o.w && 
                       p.x + p.w - padding > o.x && 
                       p.y + padding < o.y + o.h && 
                       p.y + p.h - padding > o.y;
            }

            spawnParticles(x, y, count, color) {
                for(let i=0; i<count; i++) {
                    this.particles.push({
                        x, y, vx: (Math.random()-0.5)*4, vy: (Math.random()*4),
                        life: 1, color: color || '#fff'
                    });
                }
            }

            updateUI() {
                document.getElementById('dist-val').textContent = Math.floor(this.distance) + 'm';
                document.getElementById('coin-val').textContent = this.score;
            }

            die() {
                this.playing = false;
                this.spawnParticles(this.player.x + 20, this.player.y + 30, 30, '#ef4444');
                document.getElementById('over-screen').style.display = 'flex';
                document.getElementById('final-stats').innerHTML = `DISTANCE: ${Math.floor(this.distance)}m<br>SCORE: ${this.score}`;
            }

            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0,0,this.baseW,this.baseH);

                // Sky
                const grad = ctx.createLinearGradient(0,0,0,this.baseH);
                grad.addColorStop(0, '#1e293b'); grad.addColorStop(1, '#0f172a');
                ctx.fillStyle = grad; ctx.fillRect(0,0,this.baseW,this.baseH);

                // Moving Background Pillars
                ctx.fillStyle = '#1e293b';
                for(let i=0; i<15; i++) {
                    let bx = (i * 150 - this.bgOffset + 1500) % 1500 - 250;
                    ctx.fillRect(bx, 50, 40, this.baseH - 100);
                }

                // Floor/Ceiling
                ctx.fillStyle = '#334155';
                ctx.fillRect(0, 0, this.baseW, 50);
                ctx.fillRect(0, this.baseH-50, this.baseW, 50);
                ctx.fillStyle = varColor('--accent');
                ctx.fillRect(0, 45, this.baseW, 5);
                ctx.fillRect(0, this.baseH-50, this.baseW, 5);

                // Coins
                this.coins.forEach(c => {
                    if (c.collected) return;
                    ctx.save();
                    ctx.shadowBlur = 10; ctx.shadowColor = varColor('--accent');
                    ctx.fillStyle = varColor('--accent');
                    ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                    ctx.fillStyle = '#000'; ctx.font='900 14px Arial'; ctx.textAlign='center'; ctx.fillText('$', c.x, c.y+5);
                    ctx.restore();
                });

                // Obstacles
                this.obstacles.forEach(o => {
                    if (o.type === 'zapper') {
                        ctx.save();
                        ctx.translate(o.x + o.w/2, o.y + o.h/2);
                        ctx.rotate(o.rot);
                        ctx.fillStyle = '#fbbf24';
                        ctx.shadowBlur = 15; ctx.shadowColor = '#fbbf24';
                        ctx.fillRect(-o.w/2, -o.h/2, o.w, o.h);
                        ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.strokeRect(-o.w/2, -o.h/2, o.w, o.h);
                        // Electric core
                        ctx.fillStyle = '#fff';
                        ctx.fillRect(-2, -o.h/2 + 10, 4, o.h - 20);
                        ctx.restore();
                    } else {
                        if (o.warn > 0) {
                            ctx.fillStyle = (Math.floor(Date.now()/100)%2===0) ? '#ef4444' : 'transparent';
                            ctx.font = '900 60px Arial'; ctx.textAlign='center'; ctx.fillText('⚠', this.baseW - 80, o.y + 25);
                        } else {
                            ctx.save();
                            ctx.fillStyle = '#ef4444';
                            ctx.beginPath(); ctx.roundRect(o.x, o.y, o.w, o.h, 5); ctx.fill();
                            ctx.fillStyle = '#fff'; ctx.fillRect(o.x + o.w - 15, o.y + 5, 10, o.h - 10);
                            // Fire trail
                            ctx.fillStyle = '#f59e0b';
                            ctx.beginPath(); ctx.moveTo(o.x, o.y); ctx.lineTo(o.x-20, o.y + o.h/2); ctx.lineTo(o.x, o.y+o.h); ctx.fill();
                            ctx.restore();
                        }
                    }
                });

                // Particles
                this.particles.forEach(p => {
                    ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
                });
                ctx.globalAlpha = 1;

                // Player
                if (this.playing || this.particles.length > 0) {
                    ctx.save();
                    ctx.translate(this.player.x, this.player.y);
                    // Tilt based on velocity
                    ctx.rotate(this.player.vy * 0.05);
                    
                    // Jetpack
                    ctx.fillStyle = '#64748b';
                    ctx.fillRect(-12, 10, 15, 35);
                    if (this.input) {
                        const fireH = 20 + Math.random() * 20;
                        const grad = ctx.createLinearGradient(0,45,0,45+fireH);
                        grad.addColorStop(0, '#fbbf24'); grad.addColorStop(1, 'transparent');
                        ctx.fillStyle = grad;
                        ctx.beginPath(); ctx.moveTo(-10, 45); ctx.lineTo(-2, 45); ctx.lineTo(-6, 45 + fireH); ctx.fill();
                    }

                    // Body
                    ctx.fillStyle = '#3b82f6';
                    ctx.beginPath(); ctx.roundRect(0, 0, 40, 55, 8); ctx.fill();
                    // Visor
                    ctx.fillStyle = '#0f172a';
                    ctx.beginPath(); ctx.roundRect(20, 8, 22, 18, 4); ctx.fill();
                    // Stripes
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(5, 30, 20, 4); ctx.fillRect(5, 40, 15, 4);
                    
                    ctx.restore();
                }

                if(this.playing) this.update();
                requestAnimationFrame(this.loop);
            }

            loop() {
                this.draw();
            }
        }

        function varColor(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name.startsWith('--') ? name : '--' + name.replace('var(', '').replace(')', '')).trim() || name;
        }

        const game = new JetpackPro();
    </script>
</body>
</html>
