<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rush Hour: Escape - K2 games</title>
    <style>
        :root {
            --bg: #1e293b;
            --grid: #334155;
            --accent: #ef4444;
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background-color: #0f172a;
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            background: var(--bg);
            padding: 3vmin;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 4px solid #475569;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 1vmin;
            background: #0f172a;
            padding: 1vmin;
            border-radius: 8px;
            position: relative;
            width: 80vmin;
            height: 80vmin;
            max-width: 500px;
            max-height: 500px;
        }

        .cell {
            background: rgba(255,255,255,0.03);
            border-radius: 4px;
        }

        .vehicle {
            position: absolute;
            border-radius: 8px;
            cursor: grab;
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.5rem;
            color: rgba(255,255,255,0.2);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3), inset 0 0 15px rgba(255,255,255,0.1);
        }
        .vehicle:active { cursor: grabbing; z-index: 10; transform: scale(0.98); }
        .vehicle.cursor { outline: 6px solid #fbbf24; z-index: 20; transform: scale(1.05); box-shadow: 0 0 20px #fbbf24; }

        .exit-marker {
            position: absolute;
            right: -25px;
            top: 33.3%; /* 3rd row */
            width: 20px;
            height: 16.6%;
            background: var(--accent);
            border-radius: 0 4px 4px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            writing-mode: vertical-rl;
            font-size: 0.7rem;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .header {
            width: 90vmin;
            max-width: 540px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title { font-size: 2rem; font-weight: 900; color: #f8fafc; }
        .lvl { font-weight: 800; color: var(--accent); }

        .back-link {
            position: fixed; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 12px; z-index: 100;
            font-weight: bold; border: 1px solid rgba(255,255,255,0.1);
        }

        #overlay {
            position: absolute; inset: 0; background: rgba(15, 23, 42, 0.95);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; border-radius: 20px; backdrop-filter: blur(8px);
        }

        .btn {
            background: var(--accent); color: white; border: none; padding: 12px 40px;
            border-radius: 50px; font-weight: 800; cursor: pointer; margin-top: 20px;
        }

        @media (max-width: 600px) {
            .title { font-size: 1.5rem; }
            .header { margin-bottom: 10px; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← HUB</a>

    <div class="header">
        <div class="title">RUSH <span class="lvl">HOUR</span></div>
        <div style="font-weight: bold;">Level <span id="level-val">1</span></div>
    </div>

    <div id="game-container">
        <div class="grid" id="grid">
            <div class="exit-marker">EXIT</div>
        </div>
        <div id="overlay">
            <h1 style="font-size: 3rem; color: #4ade80;">ESCAPED!</h1>
            <button class="btn" onclick="game.nextLevel()">Next Level</button>
        </div>
    </div>

    <div style="margin-top: 20px; opacity: 0.5; font-size: 0.8rem; text-align: center; max-width: 300px;">
        Drag vehicles to clear a path for the Red Car. GAMEPAD: Use D-pad to cycle, A + Stick to move.
    </div>

    <script>
        const LEVELS = [
            { vehicles: [{ id: 'player', x: 0, y: 2, l: 2, d: 'h', color: '#ef4444' }, { id: 'c1', x: 2, y: 0, l: 3, d: 'v', color: '#3b82f6' }, { id: 'c2', x: 3, y: 1, l: 2, d: 'h', color: '#10b981' }, { id: 'c3', x: 4, y: 4, l: 2, d: 'v', color: '#f59e0b' }] },
            { vehicles: [{ id: 'player', x: 1, y: 2, l: 2, d: 'h', color: '#ef4444' }, { id: 'c1', x: 0, y: 0, l: 2, d: 'v', color: '#a855f7' }, { id: 'c2', x: 3, y: 0, l: 3, d: 'v', color: '#3b82f6' }, { id: 'c3', x: 4, y: 1, l: 2, d: 'h', color: '#10b981' }, { id: 'c4', x: 0, y: 3, l: 2, d: 'h', color: '#f59e0b' }, { id: 'c5', x: 5, y: 3, l: 3, d: 'v', color: '#64748b' }] },
            { vehicles: [{ id: 'player', x: 0, y: 2, l: 2, d: 'h', color: '#ef4444' }, { id: 't1', x: 2, y: 0, l: 3, d: 'v', color: '#1e40af' }, { id: 't2', x: 5, y: 0, l: 3, d: 'v', color: '#1e40af' }, { id: 'c1', x: 3, y: 0, l: 2, d: 'h', color: '#9333ea' }, { id: 'c2', x: 3, y: 2, l: 2, d: 'v', color: '#059669' }, { id: 'c3', x: 4, y: 2, l: 2, d: 'v', color: '#d97706' }, { id: 'c4', x: 0, y: 4, l: 2, d: 'h', color: '#2563eb' }, { id: 'c5', x: 3, y: 5, l: 3, d: 'h', color: '#4b5563' }] },
            { vehicles: [{ id: 'player', x: 2, y: 2, l: 2, d: 'h', color: '#ef4444' }, { id: 't1', x: 0, y: 0, l: 3, d: 'h', color: '#1e40af' }, { id: 't2', x: 0, y: 1, l: 3, d: 'v', color: '#1e40af' }, { id: 'c1', x: 4, y: 0, l: 2, d: 'v', color: '#9333ea' }, { id: 'c2', x: 5, y: 0, l: 2, d: 'v', color: '#059669' }, { id: 'c3', x: 1, y: 4, l: 2, d: 'h', color: '#d97706' }, { id: 'c4', x: 4, y: 4, l: 2, d: 'v', color: '#2563eb' }, { id: 'c5', x: 0, y: 5, l: 3, d: 'h', color: '#4b5563' }] },
            { vehicles: [{ id: 'player', x: 0, y: 2, l: 2, d: 'h', color: '#ef4444' }, { id: 't1', x: 2, y: 1, l: 3, d: 'v', color: '#1e40af' }, { id: 'c1', x: 0, y: 0, l: 2, d: 'h', color: '#9333ea' }, { id: 'c2', x: 3, y: 0, l: 2, d: 'h', color: '#059669' }, { id: 'c3', x: 5, y: 0, l: 3, d: 'v', color: '#d97706' }, { id: 'c4', x: 0, y: 1, l: 2, d: 'v', color: '#2563eb' }, { id: 'c5', x: 1, y: 1, l: 2, d: 'v', color: '#4b5563' }, { id: 'c6', x: 3, y: 2, l: 2, d: 'v', color: '#db2777' }, { id: 'c7', x: 4, y: 3, l: 2, d: 'h', color: '#7c3aed' }] },
            { vehicles: [{ id: 'player', x: 1, y: 2, l: 2, d: 'h', color: '#ef4444' }, { id: 't1', x: 0, y: 0, l: 3, d: 'v', color: '#1e40af' }, { id: 't2', x: 3, y: 0, l: 3, d: 'h', color: '#1e40af' }, { id: 'c1', x: 4, y: 1, l: 2, d: 'v', color: '#9333ea' }, { id: 'c2', x: 5, y: 1, l: 2, d: 'v', color: '#059669' }, { id: 'c3', x: 1, y: 3, l: 2, d: 'v', color: '#d97706' }, { id: 'c4', x: 2, y: 3, l: 2, d: 'v', color: '#2563eb' }, { id: 'c5', x: 3, y: 4, l: 2, d: 'h', color: '#4b5563' }, { id: 'c6', x: 0, y: 5, l: 3, d: 'h', color: '#db2777' }] },
            { vehicles: [{ id: 'player', x: 0, y: 2, l: 2, d: 'h', color: '#ef4444' }, { id: 't1', x: 3, y: 0, l: 3, d: 'v', color: '#1e40af' }, { id: 'c1', x: 0, y: 0, l: 2, d: 'v', color: '#9333ea' }, { id: 'c2', x: 1, y: 0, l: 2, d: 'v', color: '#059669' }, { id: 'c3', x: 2, y: 0, l: 2, d: 'h', color: '#d97706' }, { id: 'c4', x: 4, y: 1, l: 2, d: 'h', color: '#2563eb' }, { id: 'c5', x: 0, y: 3, l: 2, d: 'v', color: '#4b5563' }, { id: 'c6', x: 1, y: 3, l: 2, d: 'v', color: '#db2777' }, { id: 'c7', x: 2, y: 3, l: 2, d: 'h', color: '#7c3aed' }, { id: 'c8', x: 4, y: 4, l: 2, d: 'v', color: '#0891b2' }] },
            { vehicles: [{ id: 'player', x: 2, y: 2, l: 2, d: 'h', color: '#ef4444' }, { id: 't1', x: 0, y: 0, l: 3, d: 'v', color: '#1e40af' }, { id: 't2', x: 1, y: 3, l: 3, d: 'h', color: '#1e40af' }, { id: 'c1', x: 1, y: 0, l: 2, d: 'h', color: '#9333ea' }, { id: 'c2', x: 3, y: 0, l: 2, d: 'v', color: '#059669' }, { id: 'c3', x: 4, y: 0, l: 2, d: 'h', color: '#d97706' }, { id: 'c4', x: 5, y: 1, l: 2, d: 'v', color: '#2563eb' }, { id: 'c5', x: 0, y: 4, l: 2, d: 'h', color: '#4b5563' }, { id: 'c6', x: 4, y: 4, l: 2, d: 'h', color: '#db2777' }, { id: 'c7', x: 2, y: 5, l: 2, d: 'h', color: '#7c3aed' }] }
        ];

        class RushHour {
            constructor() {
                this.gridEl = document.getElementById('grid');
                this.level = 0;
                this.vehicles = [];
                this.init();
            }

            init() {
                this.loadLevel(this.level);
            }

            loadLevel(idx) {
                const data = LEVELS[idx % LEVELS.length];
                document.getElementById('level-val').textContent = idx + 1;
                document.getElementById('overlay').style.display = 'none';
                this.vehicles = JSON.parse(JSON.stringify(data.vehicles));
                this.render();
            }

            render() {
                this.gridEl.innerHTML = '<div class="exit-marker">EXIT</div>';
                for(let i=0; i<36; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    this.gridEl.appendChild(cell);
                }

                this.vehicles.forEach((v, i) => {
                    const el = document.createElement('div');
                    el.className = 'vehicle';
                    el.dataset.idx = i;
                    el.style.backgroundColor = v.color;
                    el.style.width = (v.d === 'h' ? `calc(${v.l} * 100% / 6 - 5px)` : `calc(100% / 6 - 5px)`);
                    el.style.height = (v.d === 'v' ? `calc(${v.l} * 100% / 6 - 5px)` : `calc(100% / 6 - 5px)`);
                    el.style.left = `calc(${v.x} * 100% / 6 + 2.5px)`;
                    el.style.top = `calc(${v.y} * 100% / 6 + 2.5px)`;
                    
                    if(v.id === 'player') el.style.border = '3px solid gold';

                    this.setupDragging(el, v);
                    this.gridEl.appendChild(el);
                });
            }

            setupDragging(el, v) {
                let startPos = 0;
                let startGrid = 0;

                const onMove = (e) => {
                    const rect = this.gridEl.getBoundingClientRect();
                    const size = rect.width / 6;
                    const currentPos = v.d === 'h' ? (e.touches ? e.touches[0].clientX : e.clientX) : (e.touches ? e.touches[0].clientY : e.clientY);
                    const diff = (currentPos - startPos) / size;
                    let newGrid = Math.round(startGrid + diff);

                    newGrid = Math.max(0, Math.min(6 - v.l, newGrid));

                    if (this.canMoveTo(v, newGrid)) {
                        if(v.d === 'h') v.x = newGrid; else v.y = newGrid;
                        el.style.left = `calc(${v.x} * 100% / 6 + 2.5px)`;
                        el.style.top = `calc(${v.y} * 100% / 6 + 2.5px)`;
                        if(v.id === 'player' && v.x === 4) this.showWin();
                    }
                };

                const onUp = () => {
                    window.removeEventListener('mousemove', onMove);
                    window.removeEventListener('mouseup', onUp);
                    window.removeEventListener('touchmove', onMove);
                    window.removeEventListener('touchend', onUp);
                };

                const onDown = (e) => {
                    startPos = v.d === 'h' ? (e.touches ? e.touches[0].clientX : e.clientX) : (e.touches ? e.touches[0].clientY : e.clientY);
                    startGrid = v.d === 'h' ? v.x : v.y;
                    window.addEventListener('mousemove', onMove);
                    window.addEventListener('mouseup', onUp);
                    window.addEventListener('touchmove', onMove, {passive: false});
                    window.addEventListener('touchend', onUp);
                };

                el.addEventListener('mousedown', onDown);
                el.addEventListener('touchstart', onDown, {passive: false});
            }

            canMoveTo(v, newPos) {
                const tempX = v.d === 'h' ? newPos : v.x;
                const tempY = v.d === 'v' ? newPos : v.y;

                for (let other of this.vehicles) {
                    if (other === v) continue;
                    const oCells = [];
                    for(let i=0; i<other.l; i++) oCells.push(other.d === 'h' ? {x: other.x+i, y: other.y} : {x: other.x, y: other.y+i});
                    for(let i=0; i<v.l; i++) {
                        const myCell = v.d === 'h' ? {x: tempX+i, y: tempY} : {x: tempX, y: tempY+i};
                        if (oCells.some(oc => oc.x === myCell.x && oc.y === myCell.y)) return false;
                    }
                }
                return true;
            }

            showWin() { document.getElementById('overlay').style.display = 'flex'; }
            nextLevel() { this.level++; this.loadLevel(this.level); }
        }

        const game = new RushHour();

        // Gamepad Adapter
        (function() {
            let cursor = 0;
            let lastP = 0;
            function poll() {
                const pads = navigator.getGamepads();
                if (pads[0]) {
                    const p = pads[0]; const now = Date.now();
                    const vEls = document.querySelectorAll('.vehicle');
                    vEls.forEach(el => el.classList.remove('cursor'));
                    if (vEls[cursor]) vEls[cursor].classList.add('cursor');

                    if (now - lastP > 180) {
                        const b = p.buttons; const ax = p.axes[0], ay = p.axes[1];
                        if (b[14].pressed || ax < -0.5) cursor = (cursor + vEls.length - 1) % vEls.length;
                        if (b[15].pressed || ax > 0.5) cursor = (cursor + 1) % vEls.length;
                        
                        const vIdx = parseInt(vEls[cursor].dataset.idx);
                        const v = game.vehicles[vIdx];
                        if (v && b[0].pressed) {
                            if (v.d === 'h') {
                                if (ax < -0.5) if(game.canMoveTo(v, v.x - 1)) v.x--;
                                if (ax > 0.5) if(game.canMoveTo(v, v.x + 1)) v.x++;
                            } else {
                                if (ay < -0.5) if(game.canMoveTo(v, v.y - 1)) v.y--;
                                if (ay > 0.5) if(game.canMoveTo(v, v.y + 1)) v.y++;
                            }
                            game.render();
                            if(v.id === 'player' && v.x === 4) game.showWin();
                        }
                        if (b[9].pressed && document.getElementById('overlay').style.display !== 'none') game.nextLevel();
                        lastP = now;
                    }
                }
                requestAnimationFrame(poll);
            }
            poll();
        })();
    </script>
</body>
</html>
