<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>8-Bit Dirt Bike GP - K2 games</title>
    <style>
        :root {
            --sky: #82d7ff;
            --ink: #101923;
            --panel: rgba(11, 18, 28, 0.82);
            --line: rgba(255, 255, 255, 0.18);
            --gold: #ffd166;
            --mint: #62ffc8;
            --red: #ff6b62;
            --blue: #5cc9ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #05080d;
            color: white;
            font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
        }

        #app {
            position: fixed;
            inset: 0;
            overflow: hidden;
            background: linear-gradient(#82d7ff 0%, #beeaff 58%, #4ca45f 58%, #1d5c36 100%);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        .back-link {
            position: fixed;
            top: calc(14px + env(safe-area-inset-top, 0px));
            left: 14px;
            z-index: 40;
            padding: 8px 12px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: rgba(8, 13, 20, 0.72);
            color: white;
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 1000;
            letter-spacing: 0.08em;
        }

        #hud {
            position: fixed;
            inset: calc(14px + env(safe-area-inset-top, 0px)) 14px auto 92px;
            z-index: 30;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            pointer-events: none;
        }

        .cluster {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .panel {
            min-width: 96px;
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
        }

        .brand {
            min-width: 190px;
            border-color: rgba(255, 209, 102, 0.38);
        }

        .label {
            display: block;
            color: rgba(255, 255, 255, 0.64);
            font-size: 0.62rem;
            font-weight: 900;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .value {
            margin-top: 4px;
            color: white;
            font-size: 1.38rem;
            line-height: 1;
            font-weight: 1000;
        }

        .brand .value {
            color: var(--gold);
            font-size: 1.45rem;
        }

        .gold { color: var(--gold); }
        .mint { color: var(--mint); }
        .red { color: var(--red); }

        #meters {
            position: fixed;
            left: 50%;
            bottom: calc(18px + env(safe-area-inset-bottom, 0px));
            z-index: 32;
            width: min(440px, calc(100% - 28px));
            transform: translateX(-50%);
            display: grid;
            gap: 8px;
            pointer-events: none;
        }

        .meter-row {
            display: grid;
            grid-template-columns: 72px 1fr 48px;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(8, 13, 20, 0.78);
            color: rgba(255, 255, 255, 0.72);
            font-size: 0.68rem;
            font-weight: 1000;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .meter {
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.34);
            background: rgba(0, 0, 0, 0.34);
            overflow: hidden;
        }

        .fill {
            width: 100%;
            height: 100%;
            transform-origin: left;
            transform: scaleX(0);
            background: linear-gradient(90deg, #ff6b62, #ffd166, #62ffc8);
        }

        #toast {
            position: fixed;
            left: 50%;
            top: 44%;
            z-index: 35;
            transform: translate(-50%, -50%) scale(0.8);
            color: white;
            font-size: clamp(2.1rem, 8vw, 5.8rem);
            line-height: 0.9;
            font-weight: 1000;
            text-align: center;
            text-shadow: 0 7px 0 #101923, 0 0 26px rgba(255, 209, 102, 0.52);
            opacity: 0;
            pointer-events: none;
        }

        #toast.show {
            animation: toast 1.35s ease-out forwards;
        }

        @keyframes toast {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.72); }
            18% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
            72% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.18); }
        }

        #overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22px;
            background: linear-gradient(180deg, rgba(7, 11, 18, 0.82), rgba(7, 11, 18, 0.94));
        }

        .modal {
            width: min(520px, 100%);
            padding: 24px;
            border: 2px solid rgba(255, 209, 102, 0.34);
            border-radius: 8px;
            background: rgba(11, 18, 28, 0.9);
            text-align: center;
            box-shadow: 0 22px 70px rgba(0, 0, 0, 0.42);
        }

        h1 {
            color: var(--gold);
            font-size: clamp(2.7rem, 12vw, 5.8rem);
            line-height: 0.82;
            font-weight: 1000;
            letter-spacing: 0;
            text-transform: uppercase;
            text-shadow: 0 7px 0 #422006;
        }

        .brief {
            margin: 18px auto 20px;
            max-width: 430px;
            color: rgba(255, 255, 255, 0.78);
            font-size: 0.96rem;
            line-height: 1.45;
        }

        .btn {
            width: min(330px, 100%);
            height: 62px;
            border: 0;
            border-radius: 8px;
            background: white;
            color: #101923;
            box-shadow: 0 8px 0 #9ca3af;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 1000;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #9ca3af;
        }

        #touch {
            position: fixed;
            inset: auto 16px calc(88px + env(safe-area-inset-bottom, 0px)) 16px;
            z-index: 34;
            display: none;
            justify-content: space-between;
            pointer-events: none;
        }

        .pad,
        .actions {
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }

        .touch-btn {
            width: 68px;
            height: 68px;
            border: 2px solid rgba(255, 255, 255, 0.72);
            border-radius: 8px;
            background: rgba(8, 13, 20, 0.72);
            color: white;
            font-size: 1.08rem;
            font-weight: 1000;
        }

        .touch-btn.primary {
            width: 86px;
            background: var(--gold);
            color: #101923;
            border-color: white;
        }

        @media (max-width: 900px) {
            #hud { inset-right: 10px; gap: 8px; }
            .brand { display: none; }
            .panel { min-width: 82px; padding: 8px 9px; }
            .value { font-size: 1.08rem; }
            #touch { display: flex; }
            #meters { bottom: calc(10px + env(safe-area-inset-bottom, 0px)); }
        }
    </style>

<body>
    <div id="app"></div>
    <a href="index.html" class="back-link">HUB</a>

    <div id="hud">
        <div class="cluster">
            <div class="panel brand">
                <span class="label">8-Bit Dirt Bike</span>
                <div class="value">Dust GP</div>
            </div>
            <div class="panel">
                <span class="label">Place</span>
                <div id="place" class="value gold">1/6</div>
            </div>
            <div class="panel">
                <span class="label">Lap</span>
                <div id="lap" class="value">1/3</div>
            </div>
        </div>
        <div class="cluster">
            <div class="panel">
                <span class="label">Speed</span>
                <div id="speed" class="value mint">0</div>
            </div>
            <div class="panel">
                <span class="label">Air</span>
                <div id="air" class="value">0</div>
            </div>
        </div>
    </div>

    <div id="meters">
        <div class="meter-row">
            <span>Boost</span>
            <div class="meter"><div id="boost-fill" class="fill"></div></div>
            <b id="boost-label">100</b>
        </div>
    </div>

    <div id="touch">
        <div class="pad">
            <button class="touch-btn" data-key="ArrowLeft">L</button>
            <button class="touch-btn" data-key="ArrowRight">R</button>
        </div>
        <div class="actions">
            <button class="touch-btn" data-key="Space">JMP</button>
            <button class="touch-btn primary" data-key="ArrowUp">GAS</button>
        </div>
    </div>

    <div id="toast"></div>

    <div id="overlay">
        <div class="modal">
            <h1 id="title">Dust GP</h1>
            <div id="brief" class="brief">Chunky bikes, dusty jumps, smart rivals, and a three-lap desert circuit.</div>
            <button id="start" class="btn">Start Race</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from "three";

        const TAU = Math.PI * 2;
        const clamp = THREE.MathUtils.clamp;
        const lerp = THREE.MathUtils.lerp;

        class DirtBikeGP {
            constructor() {
                this.state = "menu";
                this.laps = 3;
                this.trackHalfWidth = 18;
                this.keys = {};
                this.lastTime = performance.now();
                this.rumble = 0;
                this.racers = [];
                this.ramps = [
                    { t: 0.125, width: 0.022, power: 1.55 },
                    { t: 0.34, width: 0.026, power: 1.35 },
                    { t: 0.58, width: 0.024, power: 1.7 },
                    { t: 0.79, width: 0.021, power: 1.45 }
                ];

                this.ui = {
                    place: document.getElementById("place"),
                    lap: document.getElementById("lap"),
                    speed: document.getElementById("speed"),
                    air: document.getElementById("air"),
                    boostFill: document.getElementById("boost-fill"),
                    boostLabel: document.getElementById("boost-label"),
                    overlay: document.getElementById("overlay"),
                    title: document.getElementById("title"),
                    brief: document.getElementById("brief"),
                    start: document.getElementById("start"),
                    toast: document.getElementById("toast")
                };

                this.initThree();
                this.createWorld();
                this.createRacers();
                this.bindInput();
                this.ui.start.addEventListener("click", () => this.start());
                requestAnimationFrame((time) => this.loop(time));
            }

            initThree() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x82d7ff);
                this.scene.fog = new THREE.Fog(0x82d7ff, 190, 850);

                this.camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.1, 1800);
                this.renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
                this.renderer.setSize(innerWidth, innerHeight);
                this.renderer.setPixelRatio(1);
                this.renderer.shadowMap.enabled = false;
                document.getElementById("app").appendChild(this.renderer.domElement);

                const hemi = new THREE.HemisphereLight(0xe6fbff, 0x40301b, 1.9);
                this.scene.add(hemi);

                const sun = new THREE.DirectionalLight(0xfff1b3, 2.25);
                sun.position.set(-140, 260, 120);
                sun.castShadow = true;
                sun.shadow.mapSize.set(1024, 1024);
                sun.shadow.camera.left = -420;
                sun.shadow.camera.right = 420;
                sun.shadow.camera.top = 420;
                sun.shadow.camera.bottom = -420;
                this.scene.add(sun);

                window.addEventListener("resize", () => {
                    this.camera.aspect = innerWidth / innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(innerWidth, innerHeight);
                    this.renderer.setPixelRatio(1);
                });
            }

            makePixelTexture(colors, size = 64) {
                const canvas = document.createElement("canvas");
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext("2d");
                for (let y = 0; y < size; y += 4) {
                    for (let x = 0; x < size; x += 4) {
                        const n = (x * 17 + y * 31 + ((x ^ y) * 7)) % colors.length;
                        ctx.fillStyle = colors[n];
                        ctx.fillRect(x, y, 4, 4);
                    }
                }
                const tex = new THREE.CanvasTexture(canvas);
                tex.magFilter = THREE.NearestFilter;
                tex.minFilter = THREE.NearestFilter;
                tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                tex.repeat.set(9, 9);
                return tex;
            }

            mat(color, extra = {}) {
                return new THREE.MeshStandardMaterial({
                    color,
                    roughness: 0.82,
                    metalness: 0.02,
                    flatShading: true,
                    ...extra
                });
            }

            createWorld() {
                this.materials = {
                    dirt: this.mat(0xb96e28, { map: this.makePixelTexture(["#b96e28", "#8c4519", "#d3903e", "#5f3218"]) }),
                    darkDirt: this.mat(0x6b3518),
                    grass: this.mat(0x2f8f45, { map: this.makePixelTexture(["#2f8f45", "#1e6e38", "#47a651", "#236734"]) }),
                    hay: this.mat(0xd9a83c),
                    white: this.mat(0xf8fafc),
                    black: this.mat(0x121820),
                    wood: this.mat(0x6f4324),
                    red: this.mat(0xff5a4e),
                    blue: this.mat(0x36a7ff),
                    mint: this.mat(0x42e69f),
                    gold: this.mat(0xffc84a),
                    shadow: new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.22, depthWrite: false })
                };

                const points = [
                    [0, 0], [88, 68], [210, 42], [326, -72], [250, -210],
                    [75, -258], [-135, -224], [-280, -92], [-214, 72], [-70, 118]
                ].map(([x, z]) => new THREE.Vector3(x, 0, z));
                this.curve = new THREE.CatmullRomCurve3(points, true, "catmullrom", 0.42);

                const ground = new THREE.Mesh(new THREE.PlaneGeometry(1800, 1800, 18, 18), this.materials.grass);
                ground.rotation.x = -Math.PI / 2;
                ground.receiveShadow = true;
                this.scene.add(ground);

                this.track = new THREE.Group();
                this.scene.add(this.track);
                const tileGeo = new THREE.BoxGeometry(32, 1.15, 14);
                const edgeGeo = new THREE.BoxGeometry(7, 2.8, 10);
                for (let i = 0; i < 220; i++) {
                    const t = i / 220;
                    const p = this.curve.getPointAt(t);
                    const tangent = this.curve.getTangentAt(t);
                    const yaw = Math.atan2(tangent.x, tangent.z);
                    const normal = new THREE.Vector3(tangent.z, 0, -tangent.x).normalize();

                    const tile = new THREE.Mesh(tileGeo, this.materials.dirt);
                    tile.position.copy(p);
                    tile.position.y = 0.12 + Math.sin(t * TAU * 8) * 0.1;
                    tile.rotation.y = yaw;
                    tile.receiveShadow = true;
                    this.track.add(tile);

                    if (i % 2 === 0) {
                        [-1, 1].forEach((side) => {
                            const edge = new THREE.Mesh(edgeGeo, side > 0 ? this.materials.hay : this.materials.darkDirt);
                            edge.position.copy(p).add(normal.clone().multiplyScalar(side * (this.trackHalfWidth + 5)));
                            edge.position.y = 1.1;
                            edge.rotation.y = yaw;
                            edge.castShadow = true;
                            edge.receiveShadow = true;
                            this.track.add(edge);
                        });
                    }
                }

                this.ramps.forEach((ramp) => {
                    const p = this.curve.getPointAt(ramp.t);
                    const tangent = this.curve.getTangentAt(ramp.t);
                    const yaw = Math.atan2(tangent.x, tangent.z);
                    const rampMesh = new THREE.Group();
                    const base = new THREE.Mesh(new THREE.BoxGeometry(42, 5, 16), this.materials.darkDirt);
                    const lip = new THREE.Mesh(new THREE.BoxGeometry(42, 3, 6), this.materials.hay);
                    base.position.y = 2;
                    base.rotation.x = -0.28;
                    lip.position.set(0, 4.8, -5.2);
                    lip.rotation.x = -0.28;
                    rampMesh.add(base, lip);
                    rampMesh.position.copy(p);
                    rampMesh.rotation.y = yaw;
                    rampMesh.traverse((n) => {
                        if (n.isMesh) {
                            n.castShadow = true;
                            n.receiveShadow = true;
                        }
                    });
                    this.scene.add(rampMesh);
                    ramp.mesh = rampMesh;
                });

                this.createScenery();
            }

            createScenery() {
                const makeTree = (x, z, s) => {
                    const tree = new THREE.Group();
                    const trunk = new THREE.Mesh(new THREE.BoxGeometry(5 * s, 22 * s, 5 * s), this.materials.wood);
                    trunk.position.y = 11 * s;
                    const crown = new THREE.Mesh(new THREE.BoxGeometry(22 * s, 20 * s, 22 * s), this.materials.mint);
                    crown.position.y = 28 * s;
                    tree.add(trunk, crown);
                    tree.position.set(x, 0, z);
                    tree.traverse((n) => n.isMesh && (n.castShadow = true));
                    this.scene.add(tree);
                };

                for (let i = 0; i < 72; i++) {
                    const ring = i % 2 ? 360 : 480;
                    const a = (i / 72) * TAU;
                    const wobble = Math.sin(i * 7.31) * 42;
                    makeTree(Math.cos(a) * (ring + wobble), Math.sin(a) * (ring - wobble), 0.72 + (i % 5) * 0.08);
                }

                for (let i = 0; i < 18; i++) {
                    const t = i / 18;
                    const p = this.curve.getPointAt(t);
                    const tangent = this.curve.getTangentAt(t);
                    const normal = new THREE.Vector3(tangent.z, 0, -tangent.x).normalize();
                    const sign = i % 2 ? 1 : -1;
                    const banner = new THREE.Group();
                    const postA = new THREE.Mesh(new THREE.BoxGeometry(2, 20, 2), this.materials.white);
                    const postB = postA.clone();
                    const flag = new THREE.Mesh(new THREE.BoxGeometry(26, 10, 1), i % 3 ? this.materials.red : this.materials.blue);
                    postA.position.set(-15, 10, 0);
                    postB.position.set(15, 10, 0);
                    flag.position.y = 16;
                    banner.add(postA, postB, flag);
                    banner.position.copy(p).add(normal.multiplyScalar(sign * 42));
                    banner.rotation.y = Math.atan2(tangent.x, tangent.z) + Math.PI / 2;
                    banner.traverse((n) => n.isMesh && (n.castShadow = true));
                    this.scene.add(banner);
                }
            }

            createBike(color, riderColor) {
                const bike = new THREE.Group();
                const bodyMat = this.mat(color);
                const riderMat = this.mat(riderColor);
                const skinMat = this.mat(0xf4c08a);

                const shadow = new THREE.Mesh(new THREE.CircleGeometry(4.6, 8), this.materials.shadow);
                shadow.rotation.x = -Math.PI / 2;
                shadow.position.y = 0.04;
                bike.add(shadow);

                const wheelGeo = new THREE.CylinderGeometry(1.8, 1.8, 0.7, 8);
                wheelGeo.rotateZ(Math.PI / 2);
                const wheelA = new THREE.Mesh(wheelGeo, this.materials.black);
                const wheelB = wheelA.clone();
                wheelA.position.set(0, 2, 3.8);
                wheelB.position.set(0, 2, -3.8);

                const frame = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.5, 5.6), bodyMat);
                frame.position.y = 3.15;
                const fork = new THREE.Mesh(new THREE.BoxGeometry(0.8, 3.8, 0.8), bodyMat);
                fork.position.set(0, 3.2, 4.6);
                fork.rotation.x = -0.28;
                const seat = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.5, 1.8), this.materials.black);
                seat.position.set(0, 4.15, -0.9);
                const bars = new THREE.Mesh(new THREE.BoxGeometry(5, 0.45, 0.55), this.materials.white);
                bars.position.set(0, 5.2, 4.3);

                const torso = new THREE.Mesh(new THREE.BoxGeometry(1.7, 2.2, 1.1), riderMat);
                torso.position.set(0, 6.1, -0.5);
                torso.rotation.x = 0.42;
                const head = new THREE.Mesh(new THREE.BoxGeometry(1.25, 1.25, 1.25), skinMat);
                head.position.set(0, 7.6, 0.15);
                const helmet = new THREE.Mesh(new THREE.BoxGeometry(1.55, 0.72, 1.55), riderMat);
                helmet.position.set(0, 8.2, 0.02);
                const armGeo = new THREE.BoxGeometry(0.45, 2.4, 0.45);
                const armA = new THREE.Mesh(armGeo, riderMat);
                const armB = armA.clone();
                armA.position.set(-1.35, 5.78, 1.58);
                armB.position.set(1.35, 5.78, 1.58);
                armA.rotation.x = armB.rotation.x = 1.0;

                bike.add(wheelA, wheelB, frame, fork, seat, bars, torso, head, helmet, armA, armB);
                bike.userData = { wheels: [wheelA, wheelB], torso, shadow };
                bike.traverse((n) => {
                    if (n.isMesh && n.material !== this.materials.shadow) {
                        n.castShadow = true;
                        n.receiveShadow = true;
                    }
                });
                return bike;
            }

            createRacers() {
                const paint = [
                    [0x36a7ff, 0xffd166],
                    [0xff5a4e, 0xffffff],
                    [0x42e69f, 0x182233],
                    [0xf97316, 0x4c1d95],
                    [0xa78bfa, 0x101923],
                    [0xfb7185, 0xfff7ed]
                ];
                for (let i = 0; i < 6; i++) {
                    const mesh = this.createBike(paint[i][0], paint[i][1]);
                    this.scene.add(mesh);
                    this.racers.push({
                        mesh,
                        progress: -i * 0.006,
                        lap: 1,
                        speed: 0.002 + i * 0.00008,
                        lateral: (i - 2.5) * 5,
                        targetLateral: (i - 2.5) * 5,
                        boost: 100,
                        air: 0,
                        vy: 0,
                        rank: i + 1,
                        isPlayer: i === 0,
                        finished: false,
                        bob: Math.random() * TAU
                    });
                }
                this.player = this.racers[0];
            }

            bindInput() {
                const setKey = (code, on, event) => {
                    this.keys[code] = on;
                    if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space", "ShiftLeft"].includes(code)) {
                        event?.preventDefault?.();
                    }
                };

                window.addEventListener("keydown", (event) => {
                    const code = this.mapKey(event.code);
                    setKey(code, true, event);
                });
                window.addEventListener("keyup", (event) => {
                    const code = this.mapKey(event.code);
                    setKey(code, false, event);
                });

                document.querySelectorAll("[data-key]").forEach((button) => {
                    const code = button.dataset.key;
                    const down = (event) => {
                        event.preventDefault();
                        this.keys[code] = true;
                        button.classList.add("down");
                    };
                    const up = (event) => {
                        event.preventDefault();
                        this.keys[code] = false;
                        button.classList.remove("down");
                    };
                    button.addEventListener("pointerdown", down);
                    button.addEventListener("pointerup", up);
                    button.addEventListener("pointercancel", up);
                    button.addEventListener("pointerleave", up);
                });
            }

            mapKey(code) {
                const map = {
                    KeyW: "ArrowUp",
                    KeyS: "ArrowDown",
                    KeyA: "ArrowLeft",
                    KeyD: "ArrowRight",
                    ShiftRight: "ShiftLeft"
                };
                return map[code] || code;
            }

            start() {
                this.resetRace();
                this.state = "race";
                this.ui.overlay.style.display = "none";
                this.flash("GO!");
            }

            resetRace() {
                this.racers.forEach((r, i) => {
                    r.progress = -i * 0.006;
                    r.lap = 1;
                    r.speed = 0.002 + i * 0.00008;
                    r.lateral = (i - 2.5) * 5;
                    r.targetLateral = r.lateral;
                    r.boost = 100;
                    r.air = 0;
                    r.vy = 0;
                    r.finished = false;
                    r.rank = i + 1;
                });
            }

            signedTrackDistance(a, b) {
                let d = Math.abs((a % 1) - (b % 1));
                return Math.min(d, 1 - d);
            }

            rampLift(progress) {
                let lift = 0;
                let launch = 0;
                this.ramps.forEach((ramp) => {
                    const d = this.signedTrackDistance(progress, ramp.t);
                    if (d < ramp.width) {
                        const n = 1 - d / ramp.width;
                        lift = Math.max(lift, Math.sin(n * Math.PI) * 4.8);
                        launch = Math.max(launch, n * ramp.power);
                    }
                });
                return { lift, launch };
            }

            updateRacer(r, dt, index) {
                if (r.finished) {
                    r.speed *= 0.94;
                    return;
                }

                if (r.isPlayer) {
                    const throttle = this.keys.ArrowUp ? 1 : 0;
                    const brake = this.keys.ArrowDown ? 1 : 0;
                    const boost = (this.keys.ShiftLeft || this.keys.KeyX) && r.boost > 1;
                    r.speed += (0.00013 * throttle - 0.00011 * brake - 0.000035) * dt;
                    if (boost && throttle) {
                        r.speed += 0.00012 * dt;
                        r.boost = Math.max(0, r.boost - 0.72 * dt);
                        this.rumble = Math.min(1, this.rumble + 0.05);
                    } else {
                        r.boost = Math.min(100, r.boost + (r.speed < 0.0042 ? 0.25 : 0.12) * dt);
                    }
                    if (this.keys.ArrowLeft) r.targetLateral += 0.7 * dt;
                    if (this.keys.ArrowRight) r.targetLateral -= 0.7 * dt;
                    if (this.keys.Space && r.air <= 0.02) {
                        r.vy = Math.max(r.vy, 0.56 + r.speed * 56);
                        r.air = 0.05;
                    }
                } else {
                    const chase = 0.0048 + index * 0.00009 + Math.sin(performance.now() * 0.001 + index * 4) * 0.00028;
                    r.speed = lerp(r.speed, chase, 0.025 * dt);
                    r.targetLateral += Math.sin(performance.now() * 0.0014 + index * 2.8) * 0.08 * dt;
                    if (Math.random() < 0.01 * dt) r.targetLateral += (Math.random() - 0.5) * 7;
                }

                r.targetLateral = clamp(r.targetLateral, -this.trackHalfWidth + 4, this.trackHalfWidth - 4);
                r.lateral = lerp(r.lateral, r.targetLateral, 0.12);
                r.speed = clamp(r.speed * (1 - 0.0025 * dt), 0.0008, 0.0071);

                const previous = r.progress;
                r.progress += r.speed * dt;
                if (r.progress >= 1) {
                    r.progress -= 1;
                    r.lap += 1;
                    if (r.isPlayer && r.lap <= this.laps) this.flash("LAP " + r.lap);
                    if (r.lap > this.laps) this.finishRace();
                } else if (previous < 0 && r.progress >= 0) {
                    r.progress = Math.max(0, r.progress);
                }

                const ramp = this.rampLift((r.progress + 1) % 1);
                if (ramp.launch > 0.65 && r.air < ramp.lift + 0.1) {
                    r.vy = Math.max(r.vy, ramp.launch * r.speed * 90);
                }
                r.air += r.vy * dt;
                r.vy -= 0.045 * dt;
                const terrain = ramp.lift;
                if (r.air <= terrain) {
                    if (r.vy < -0.4 && r.isPlayer) this.rumble = Math.min(1, this.rumble + 0.22);
                    r.air = terrain;
                    r.vy = Math.max(0, r.vy);
                }

                const p = this.curve.getPointAt(((r.progress % 1) + 1) % 1);
                const tangent = this.curve.getTangentAt(((r.progress % 1) + 1) % 1);
                const normal = new THREE.Vector3(tangent.z, 0, -tangent.x).normalize();
                const next = p.clone().add(tangent.clone().multiplyScalar(12)).add(normal.clone().multiplyScalar(r.lateral));
                const pos = p.add(normal.multiplyScalar(r.lateral));
                r.mesh.position.set(pos.x, r.air + 0.4, pos.z);
                r.mesh.lookAt(next);
                r.mesh.rotation.z = lerp(r.mesh.rotation.z, (r.targetLateral - r.lateral) * -0.035, 0.18);
                r.mesh.rotation.x = lerp(r.mesh.rotation.x, clamp(r.vy * -0.025, -0.35, 0.45), 0.12);

                r.bob += r.speed * dt * 850;
                r.mesh.userData.wheels.forEach((w) => w.rotation.x -= r.speed * dt * 220);
                r.mesh.userData.torso.position.y = 6.1 + Math.sin(r.bob) * 0.18;
                r.mesh.userData.shadow.scale.setScalar(clamp(1 - r.air * 0.035, 0.38, 1));
            }

            finishRace() {
                if (this.state === "over") return;
                this.state = "over";
                this.player.finished = true;
                this.ui.overlay.style.display = "flex";
                this.ui.title.textContent = this.player.rank === 1 ? "Victory!" : "Finish";
                this.ui.brief.textContent = "You placed " + this.player.rank + " of 6. The dust is still hanging over the last jump.";
                this.ui.start.textContent = "Race Again";
            }

            rankRacers() {
                const score = (r) => (r.lap - 1) + Math.max(0, r.progress);
                [...this.racers].sort((a, b) => score(b) - score(a)).forEach((r, i) => {
                    r.rank = i + 1;
                });
            }

            updateCamera(dt) {
                const r = this.player;
                const p = r.mesh.position.clone();
                const tangent = this.curve.getTangentAt(((r.progress % 1) + 1) % 1);
                const chase = p.clone()
                    .add(tangent.clone().multiplyScalar(-42 - r.speed * 2600))
                    .add(new THREE.Vector3(0, 25 + r.speed * 1050, 0));
                const shake = this.rumble * 0.8;
                chase.x += (Math.random() - 0.5) * shake;
                chase.y += (Math.random() - 0.5) * shake;
                this.camera.position.lerp(chase, 1 - Math.pow(0.001, dt / 16.67));
                this.camera.lookAt(p.clone().add(new THREE.Vector3(0, 7, 0)).add(tangent.multiplyScalar(12)));
                this.rumble = Math.max(0, this.rumble - 0.035 * dt);
            }

            updateUI() {
                this.ui.place.textContent = this.player.rank + "/6";
                this.ui.lap.textContent = Math.min(this.player.lap, this.laps) + "/" + this.laps;
                this.ui.speed.textContent = Math.round(this.player.speed * 15600);
                this.ui.air.textContent = Math.round(Math.max(0, this.player.air) * 2.6);
                this.ui.boostFill.style.transform = "scaleX(" + this.player.boost / 100 + ")";
                this.ui.boostLabel.textContent = Math.round(this.player.boost);
            }

            flash(text) {
                this.ui.toast.textContent = text;
                this.ui.toast.classList.remove("show");
                void this.ui.toast.offsetWidth;
                this.ui.toast.classList.add("show");
            }

            loop(time) {
                const dt = clamp((time - this.lastTime) / 16.67, 0.25, 2.25);
                this.lastTime = time;
                if (this.state !== "menu") {
                    this.racers.forEach((r, i) => this.updateRacer(r, dt, i));
                    this.rankRacers();
                    this.updateCamera(dt);
                    this.updateUI();
                } else {
                    this.camera.position.lerp(new THREE.Vector3(-85, 90, 155), 0.03);
                    this.camera.lookAt(0, 4, -40);
                }
                this.renderer.render(this.scene, this.camera);
                requestAnimationFrame((next) => this.loop(next));
            }
        }

        window.game = new DirtBikeGP();
    </script>
</body>
</html>
