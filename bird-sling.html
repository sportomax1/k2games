<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bird Sling: Evolution - K2 games</title>
    <style>
        :root {
            --sky-top: #87ceeb;
            --sky-bottom: #e0f2f1;
            --grass: #2ecc71;
            --dirt: #8d6e63;
            --wood: #a1887f;
            --pig: #4ade80;
            --ui-bg: rgba(15, 23, 42, 0.7);
            --accent: #fbbf24;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #020617;
            color: white; font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden; height: 100dvh; width: 100%;
            position: fixed; touch-action: none;
            display: flex; justify-content: center; align-items: center;
        }

        #game-container {
            position: relative; width: 100%; height: 100%;
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
            overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; }

        #ui {
            position: absolute; top: env(safe-area-inset-top, 20px);
            left: 20px; right: 20px;
            display: flex; justify-content: space-between;
            pointer-events: none; z-index: 100;
        }

        .stat-card {
            background: var(--ui-bg); backdrop-filter: blur(15px);
            padding: 10px 20px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center; min-width: 100px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }

        .stat-label { font-size: 0.6rem; text-transform: uppercase; opacity: 0.6; letter-spacing: 1px; }
        .stat-val { font-size: 1.3rem; color: var(--accent); font-family: monospace; font-weight: 900; }

        #power-hint {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: var(--ui-bg); padding: 12px 30px; border-radius: 50px;
            font-weight: 900; color: white; border: 2px solid var(--accent);
            opacity: 0; transition: opacity 0.3s, transform 0.3s;
            pointer-events: none; z-index: 50;
        }

        .back-link {
            position: fixed; top: 15px; left: 15px; color: white; text-decoration: none;
            background: rgba(0,0,0,0.2); padding: 8px 16px; border-radius: 10px; z-index: 200;
            font-weight: bold; font-size: 0.8rem; backdrop-filter: blur(10px);
        }

        #overlay {
            position: absolute; inset: 0;
            background: rgba(15, 23, 42, 0.95);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; backdrop-filter: blur(20px); text-align: center; padding: 20px;
        }

        h1 { font-size: 3.5rem; color: var(--accent); font-weight: 900; font-style: italic; }
        .btn-large {
            background: var(--accent); color: #000; border: none; padding: 1.2rem 4rem;
            border-radius: 100px; font-weight: 900; cursor: pointer; margin-top: 2rem;
            font-size: 1.4rem; box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <a href="index.html" class="back-link">← HUB</a>

        <div id="ui">
            <div class="stat-card">
                <span class="stat-label">Score</span>
                <span id="score-val" class="stat-val">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Current Bird</span>
                <span id="bird-type" class="stat-val">🔴 RED</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Pigs Left</span>
                <span id="pigs-val" class="stat-val">0</span>
            </div>
        </div>

        <div id="power-hint">TAP FOR SPEED!</div>
        <canvas id="gameCanvas"></canvas>

        <div id="overlay">
            <h1 id="overlay-title">VICTORY</h1>
            <p id="overlay-msg" style="font-size: 1.5rem; margin-top: 10px; opacity: 0.7;">Ready for the next challenge?</p>
            <button class="btn-large" id="action-btn" onclick="game.handleAction()">NEXT LEVEL</button>
        </div>
    </div>

    <script>
        const BIRD_TYPES = [
            { id: 'red', name: 'RED', emoji: '🔴', color: '#ff4757', power: 'NONE' },
            { id: 'yellow', name: 'YELLOW', emoji: '🟡', color: '#eccc68', power: 'DASH', hint: 'TAP FOR SPEED BOOST!' },
            { id: 'blue', name: 'BLUE', emoji: '🔵', color: '#70a1ff', power: 'SIZE', hint: 'TAP TO GET HUGE!' }
        ];

        class BirdSlingEvolution {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                this.level = 1;
                this.score = 0;
                this.isGameOver = false;
                this.shake = 0;
                
                this.bird = { x: 0, y: 0, r: 22, vx: 0, vy: 0, active: false, dragging: false, anchorX: 200, anchorY: 450, powerUsed: false, typeIndex: 0, trail: [] };
                this.objects = [];
                this.particles = [];
                this.parallax = [
                    { x: 0, y: 350, h: 200, s: 0.1, color: '#66bb6a' }, // Distant hills
                    { x: 0, y: 450, h: 150, s: 0.3, color: '#43a047' }  // Near hills
                ];

                this.init();
            }

            init() {
                this.resize();
                this.setupInputs();
                this.loadLevel(1);
                
                window.addEventListener('resize', () => this.resize());
                this.loop();
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.bird.anchorX = this.canvas.width * 0.2;
                this.bird.anchorY = this.canvas.height - 150;
                if (!this.bird.active) {
                    this.bird.x = this.bird.anchorX;
                    this.bird.y = this.bird.anchorY;
                }
            }

            loadLevel(num) {
                this.level = num;
                this.objects = [];
                this.isGameOver = false;
                this.bird.typeIndex = 0;
                this.resetBird();
                document.getElementById('overlay').style.display = 'none';

                const layout = [
                    [],
                    [{x: 0.7, y: 0, w: 40, h: 120}, {x: 0.85, y: 0, w: 40, h: 120}, {x: 0.7, y: 120, w: 190, h: 30}, {x: 0.78, y: 150, p: true}],
                    [{x: 0.65, y: 0, w: 30, h: 100}, {x: 0.75, y: 0, w: 30, h: 100}, {x: 0.85, y: 0, w: 30, h: 100}, {x: 0.65, y: 100, w: 230, h: 30}, {x: 0.7, y: 130, p: true}, {x: 0.8, y: 130, p: true}],
                    [{x: 0.7, y: 0, w: 40, h: 180}, {x: 0.85, y: 0, w: 40, h: 180}, {x: 0.7, y: 180, w: 190, h: 30}, {x: 0.72, y: 210, w: 30, h: 100}, {x: 0.82, y: 210, w: 30, h: 100}, {x: 0.77, y: 310, p: true}, {x: 0.77, y: 50, p: true}],
                    [{x: 0.6, y: 0, w: 20, h: 220}, {x: 0.7, y: 0, w: 20, h: 220}, {x: 0.8, y: 0, w: 20, h: 220}, {x: 0.9, y: 0, w: 20, h: 220}, {x: 0.6, y: 220, w: 320, h: 30}, {x: 0.65, y: 250, p: true}, {x: 0.75, y: 250, p: true}, {x: 0.85, y: 250, p: true}],
                    [{x: 0.7, y: 0, w: 100, h: 100}, {x: 0.7, y: 100, w: 100, h: 100}, {x: 0.7, y: 200, w: 100, h: 100}, {x: 0.75, y: 300, p: true}, {x: 0.75, y: 50, p: true}, {x: 0.6, y: 0, w: 20, h: 350}, {x: 0.9, y: 0, w: 20, h: 350}]
                ][this.level];

                const groundY = this.canvas.height - 80;
                layout.forEach(o => {
                    const realX = this.canvas.width * o.x;
                    if (o.p) this.objects.push({ type: 'enemy', x: realX, y: groundY - o.y - 25, r: 22 });
                    else this.objects.push({ type: 'block', x: realX, y: groundY - o.y - o.h, w: o.w, h: o.h, hp: 100 });
                });

                this.updateUI();
            }

            setupInputs() {
                const getPos = (e) => {
                    const t = e.touches ? e.touches[0] : e;
                    return { x: t.clientX, y: t.clientY };
                };

                const down = (e) => {
                    if (this.isGameOver) return;
                    const pos = getPos(e);
                    if (this.bird.active && !this.bird.powerUsed) {
                        this.usePower();
                    } else if (!this.bird.active && Math.hypot(pos.x - this.bird.x, pos.y - this.bird.y) < 80) {
                        this.bird.dragging = true;
                    }
                };

                const move = (e) => {
                    if (this.bird.dragging) {
                        const pos = getPos(e);
                        const dx = pos.x - this.bird.anchorX;
                        const dy = pos.y - this.bird.anchorY;
                        const dist = Math.min(130, Math.hypot(dx, dy));
                        const angle = Math.atan2(dy, dx);
                        this.bird.x = this.bird.anchorX + Math.cos(angle) * dist;
                        this.bird.y = this.bird.anchorY + Math.sin(angle) * dist;
                    }
                };

                const up = () => {
                    if (this.bird.dragging) {
                        this.bird.dragging = false;
                        this.bird.active = true;
                        this.bird.vx = (this.bird.anchorX - this.bird.x) * 0.16;
                        this.bird.vy = (this.bird.anchorY - this.bird.y) * 0.16;
                        
                        const type = BIRD_TYPES[this.bird.typeIndex];
                        if (type.power !== 'NONE') {
                            const hint = document.getElementById('power-hint');
                            hint.textContent = type.hint;
                            hint.style.opacity = 1;
                            setTimeout(() => hint.style.opacity = 0, 2000);
                        }
                    }
                };

                this.canvas.onmousedown = down;
                window.onmousemove = move;
                window.onmouseup = up;
                this.canvas.ontouchstart = (e) => { e.preventDefault(); down(e); };
                this.canvas.ontouchmove = (e) => { e.preventDefault(); move(e); };
                this.canvas.ontouchend = (e) => { e.preventDefault(); up(); };
            }

            usePower() {
                const type = BIRD_TYPES[this.bird.typeIndex];
                if (type.power === 'DASH') {
                    this.bird.vx *= 2.5; this.bird.vy *= 0.2;
                    this.spawnParticles(this.bird.x, this.bird.y, '#fff', 15);
                } else if (type.power === 'SIZE') {
                    this.bird.r *= 2;
                }
                this.bird.powerUsed = true;
                this.shake = 5;
                document.getElementById('power-hint').style.opacity = 0;
            }

            resetBird() {
                this.bird.active = false; this.bird.powerUsed = false;
                this.bird.x = this.bird.anchorX; this.bird.y = this.bird.anchorY;
                this.bird.vx = this.bird.vy = 0; this.bird.r = 22; this.bird.trail = [];
                this.bird.typeIndex = (this.bird.typeIndex + 1) % BIRD_TYPES.length;
                this.updateUI();
            }

            update() {
                if (this.shake > 0) this.shake *= 0.9;
                
                this.parallax.forEach(p => { p.x -= p.s; if(p.x < -this.canvas.width) p.x = 0; });

                if (this.bird.active) {
                    this.bird.vy += 0.25;
                    this.bird.x += this.bird.vx;
                    this.bird.y += this.bird.vy;
                    this.bird.trail.push({x: this.bird.x, y: this.bird.y, l: 1});
                    if (this.bird.trail.length > 20) this.bird.trail.shift();

                    this.objects.forEach((obj, i) => {
                        let hit = false;
                        if (obj.type === 'block') {
                            if (this.bird.x + this.bird.r > obj.x && this.bird.x - this.bird.r < obj.x + obj.w &&
                                this.bird.y + this.bird.r > obj.y && this.bird.y - this.bird.r < obj.y + obj.h) hit = true;
                        } else {
                            if (Math.hypot(this.bird.x - obj.x, this.bird.y - obj.y) < this.bird.r + obj.r) hit = true;
                        }

                        if (hit) {
                            this.shake = 10;
                            this.spawnParticles(this.bird.x, this.bird.y, obj.type === 'enemy' ? '#4ade80' : '#8d6e63', 12);
                            if (obj.type === 'enemy') { this.score += 1000; this.objects.splice(i, 1); }
                            else { this.score += 100; obj.hp -= 50; if (obj.hp <= 0) this.objects.splice(i, 1); }
                            this.bird.vx *= 0.5; this.bird.vy *= 0.5;
                            this.updateUI();
                        }
                    });

                    if (this.bird.x > this.canvas.width + 100 || this.bird.y > this.canvas.height - 70) this.resetBird();
                }

                this.particles.forEach((p, i) => {
                    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.l -= 0.02;
                    if (p.l <= 0) this.particles.splice(i, 1);
                });

                if (this.objects.filter(o => o.type === 'enemy').length === 0 && !this.isGameOver) {
                    this.isGameOver = true;
                    setTimeout(() => {
                        document.getElementById('overlay').style.display = 'flex';
                        if (this.level >= 5) document.getElementById('overlay-title').textContent = "CHAMPION!";
                    }, 800);
                }
            }

            spawnParticles(x, y, color, count) {
                for(let i=0; i<count; i++) this.particles.push({ x, y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, l: 1, color });
            }

            updateUI() {
                document.getElementById('score-val').textContent = this.score;
                document.getElementById('pigs-val').textContent = this.objects.filter(o => o.type === 'enemy').length;
                const type = BIRD_TYPES[this.bird.typeIndex];
                document.getElementById('bird-type').textContent = `${type.emoji} ${type.name}`;
                document.getElementById('bird-type').style.color = type.color;
            }

            handleAction() {
                if (this.level < 5) this.loadLevel(this.level + 1);
                else { this.score = 0; this.loadLevel(1); }
            }

            draw() {
                const ctx = this.ctx;
                ctx.save();
                if (this.shake > 0.1) ctx.translate((Math.random()-0.5)*this.shake, (Math.random()-0.5)*this.shake);
                
                ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                // Parallax Hills
                this.parallax.forEach(p => {
                    ctx.fillStyle = p.color;
                    for(let i=0; i<3; i++) {
                        ctx.beginPath();
                        ctx.arc(p.x + i*this.canvas.width, this.canvas.height - 80, this.canvas.width*0.6, Math.PI, 0);
                        ctx.fill();
                    }
                });

                // Ground
                ctx.fillStyle = '#8d6e63';
                ctx.fillRect(0, this.canvas.height - 80, this.canvas.width, 80);
                ctx.fillStyle = '#2ecc71';
                ctx.fillRect(0, this.canvas.height - 80, this.canvas.width, 15);

                // Slingshot (Wooden Frame)
                const sX = this.bird.anchorX;
                const sY = this.bird.anchorY;
                ctx.strokeStyle = '#5d4037'; ctx.lineWidth = 12; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(sX, this.canvas.height - 80); ctx.lineTo(sX, sY + 30); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(sX - 20, sY - 20); ctx.lineTo(sX, sY + 30); ctx.lineTo(sX + 20, sY - 20); ctx.stroke();

                // Elastic Bands
                if (this.bird.dragging || this.bird.active) {
                    ctx.strokeStyle = '#3e2723'; ctx.lineWidth = 4;
                    if (this.bird.dragging) {
                        ctx.beginPath(); ctx.moveTo(sX - 15, sY - 10); ctx.lineTo(this.bird.x, this.bird.y); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(sX + 15, sY - 10); ctx.lineTo(this.bird.x, this.bird.y); ctx.stroke();
                    }
                }

                // Bird Trail
                this.bird.trail.forEach(t => {
                    ctx.fillStyle = `rgba(255, 255, 255, ${t.l})`;
                    ctx.beginPath(); ctx.arc(t.x, t.y, 4, 0, Math.PI*2); ctx.fill();
                    t.l -= 0.05;
                });

                // The Bird
                const type = BIRD_TYPES[this.bird.typeIndex];
                ctx.save();
                ctx.translate(this.bird.x, this.bird.y);
                if (this.bird.active) ctx.rotate(Math.atan2(this.bird.vy, this.bird.vx));
                ctx.fillStyle = type.color;
                ctx.beginPath(); ctx.arc(0, 0, this.bird.r, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(this.bird.r*0.4, -this.bird.r*0.2, this.bird.r*0.3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(this.bird.r*0.5, -this.bird.r*0.2, this.bird.r*0.1, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ffa502'; ctx.beginPath(); ctx.moveTo(this.bird.r*0.6, 0); ctx.lineTo(this.bird.r, this.bird.r*0.2); ctx.lineTo(this.bird.r*0.6, this.bird.r*0.4); ctx.fill();
                ctx.restore();

                // Objects
                this.objects.forEach(obj => {
                    if (obj.type === 'block') {
                        const grad = ctx.createLinearGradient(obj.x, obj.y, obj.x, obj.y+obj.h);
                        grad.addColorStop(0, '#a1887f'); grad.addColorStop(1, '#5d4037');
                        ctx.fillStyle = grad;
                        ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
                        ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 2; ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
                    } else {
                        ctx.fillStyle = '#4ade80';
                        ctx.beginPath(); ctx.arc(obj.x, obj.y, obj.r, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = '#000'; ctx.beginPath(); 
                        ctx.arc(obj.x-6, obj.y-4, 3, 0, Math.PI*2); ctx.arc(obj.x+6, obj.y-4, 3, 0, Math.PI*2); ctx.fill();
                        ctx.strokeStyle = '#1b5e20'; ctx.lineWidth = 3; ctx.stroke();
                    }
                });

                // Particles
                this.particles.forEach(p => {
                    ctx.globalAlpha = p.l; ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
                });

                ctx.restore();
            }

            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        }

        const game = new BirdSlingEvolution();
    </script>
</body>
</html>
