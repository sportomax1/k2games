<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mower Mayhem - K2 Games</title>
<style>
:root{--bg:#0b1720;--ink:#ecfeff;--panel:rgba(7,18,25,.84)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;touch-action:none}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:Segoe UI,system-ui,sans-serif;color:var(--ink)}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at top,#143d28,#0b1720 72%)}
canvas{width:100vw;height:100vh;display:block;background:#17391f}
#top{position:fixed;top:10px;left:10px;right:10px;z-index:3;display:flex;gap:8px;align-items:flex-start;justify-content:space-between;pointer-events:none}
.pill{background:var(--panel);border:1px solid rgba(255,255,255,.16);border-radius:14px;padding:8px 10px;box-shadow:0 8px 24px rgba(0,0,0,.28);font-weight:900;font-size:13px;line-height:1.25}
#mini{width:128px;height:90px;border-radius:12px;background:rgba(0,0,0,.45);border:2px solid rgba(255,255,255,.25)}
#start,#report{position:fixed;inset:0;z-index:5;background:rgba(4,12,18,.9);display:flex;align-items:center;justify-content:center;padding:18px;text-align:center}
.card{width:min(540px,94vw);background:linear-gradient(180deg,rgba(19,52,35,.97),rgba(6,24,33,.97));border:1px solid rgba(255,255,255,.18);border-radius:26px;padding:24px;box-shadow:0 24px 70px rgba(0,0,0,.45)}
h1{font-size:42px;line-height:.95;margin-bottom:10px;color:#bbf7d0;text-shadow:0 4px 0 rgba(0,0,0,.25)}
p{color:#d9f99d;font-weight:750;margin:8px 0 14px}.small{font-size:13px;color:#bae6fd}.btn{border:0;border-radius:999px;background:linear-gradient(135deg,#84cc16,#16a34a);color:#052e16;font-weight:1000;padding:14px 24px;font-size:16px;box-shadow:0 10px 30px rgba(132,204,22,.28)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0;text-align:left}.stat{background:rgba(255,255,255,.08);border-radius:14px;padding:10px;font-weight:850}.hidden{display:none!important}
#joy{position:fixed;left:18px;bottom:18px;width:126px;height:126px;border-radius:50%;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.2);z-index:4}.knob{position:absolute;left:38px;top:38px;width:48px;height:48px;border-radius:50%;background:rgba(190,242,100,.9);box-shadow:0 6px 18px rgba(0,0,0,.35)}
#boost{position:fixed;right:20px;bottom:24px;width:112px;height:112px;border-radius:50%;border:2px solid rgba(255,255,255,.28);background:rgba(250,204,21,.88);color:#422006;font-size:17px;font-weight:1000;z-index:4;box-shadow:0 8px 28px rgba(0,0,0,.35)}
#boost.off{opacity:.45;background:rgba(148,163,184,.8)}#home{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);z-index:4;color:#d9f99d;text-decoration:none;font-weight:900;font-size:13px;background:rgba(0,0,0,.28);padding:8px 12px;border-radius:999px}
@media(max-width:700px){h1{font-size:34px}.pill{font-size:12px;padding:7px 8px}#mini{width:104px;height:74px}#joy{width:112px;height:112px}.knob{left:34px;top:34px;width:42px;height:42px}#boost{width:94px;height:94px;font-size:14px}}
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>
<div id="top"><div class="pill" id="hud">TIME 90<br>SCORE 0<br>CUT 0%</div><canvas id="mini"></canvas></div>
<div id="joy"><div class="knob" id="knob"></div></div><button id="boost">BOOST</button><a href="index.html" id="home">BACK TO HUB</a>
<div id="start"><div class="card"><h1>Mower Mayhem</h1><p>Random backyard. Riding mower. Dog chaos. Beat the timer.</p><p class="small">Joystick or WASD/arrow keys. Hold BOOST for speed and a wider blade. The start zone is now safe, because spawning into a wall is rude.</p><button class="btn" id="startBtn">START MOWING</button></div></div>
<div id="report" class="hidden"><div class="card"><h1>Yard Report</h1><div class="row"><div class="stat" id="r1"></div><div class="stat" id="r2"></div><div class="stat" id="r3"></div><div class="stat" id="r4"></div></div><p id="stars"></p><button class="btn" id="againBtn">NEW RANDOM YARD</button></div></div>
<script>
(function(){
var c=document.getElementById('game'),x=c.getContext('2d'),m=document.getElementById('mini'),mx=m.getContext('2d');
var hud=document.getElementById('hud'),boostBtn=document.getElementById('boost'),start=document.getElementById('start'),report=document.getElementById('report');
var W=0,H=0,DPR=1,yardW=2200,yardH=1500,tile=50,cols=44,rows=30,grass=[],ob=[],pick=[],keys={},playing=false,last=0,time=90,score=0,totalGrass=0,cutGrass=0,damage=0,flowerHits=0,poopHits=0,boost=100,boosting=false,grace=0,hitCooldown=0,msgTimer=0;
var spawnX=650,spawnY=310,safeR=260;
var joy={active:false,dx:0,dy:0};var mower={x:spawnX,y:spawnY,vx:0,vy:0,a:0,r:22};var dog={x:1450,y:900,vx:120,vy:80,r:20,t:0};
function resize(){DPR=Math.min(2,window.devicePixelRatio||1);W=window.innerWidth;H=window.innerHeight;c.width=W*DPR;c.height=H*DPR;x.setTransform(DPR,0,0,DPR,0,0);m.width=128*DPR;m.height=90*DPR;mx.setTransform(DPR,0,0,DPR,0,0)}
window.addEventListener('resize',resize);resize();
function rnd(a,b){return a+Math.random()*(b-a)}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function dist(a,b,c,d){var dx=a-c,dy=b-d;return Math.sqrt(dx*dx+dy*dy)}
function nearSpawn(x1,y1,r){return dist(x1,y1,spawnX,spawnY)<safeR+(r||0)}
function reset(){grass=[];ob=[];pick=[];totalGrass=0;cutGrass=0;score=0;damage=0;flowerHits=0;poopHits=0;time=90;boost=100;grace=4;hitCooldown=0;msgTimer=3;mower.x=spawnX;mower.y=spawnY;mower.vx=0;mower.vy=0;mower.a=0;dog.x=rnd(1150,1850);dog.y=rnd(700,1250);dog.vx=120;dog.vy=70;
 for(var r=0;r<rows;r++){grass[r]=[];for(var q=0;q<cols;q++){var edge=q<2||r<2||q>cols-3||r>rows-3;var px=q*tile+tile/2,py=r*tile+tile/2;var h=edge?0:(Math.random()<.16?3:(Math.random()<.36?2:1));if(nearSpawn(px,py,80))h=1;grass[r][q]={h:h,o:h};if(h>0)totalGrass++;}}
 addRect('house',0,0,480,170);addRect('pool',1570,1030,430,260);addRect('patio',0,1180,420,240);
 placeCircles('tree',18,28,48);placeCircles('rock',18,14,25);placeRects('flower',8,80,150,35,70);placeCircles('poop',14,12,12);placePickups(8);
 clearSpawnArea();playing=true;last=performance.now();start.className='hidden';report.className='hidden';requestAnimationFrame(loop)}
function placeCircles(t,n,r1,r2){var placed=0,tries=0;while(placed<n&&tries<500){tries++;var rr=rnd(r1,r2),xx=rnd(240,2100),yy=rnd(220,1340);if(!nearSpawn(xx,yy,rr+50)){addCircle(t,xx,yy,rr);placed++}}}
function placeRects(t,n,w1,w2,h1,h2){var placed=0,tries=0;while(placed<n&&tries<500){tries++;var w=rnd(w1,w2),h=rnd(h1,h2),xx=rnd(250,1900),yy=rnd(250,1200);if(!nearSpawn(xx+w/2,yy+h/2,120)){addRect(t,xx,yy,w,h);placed++}}}
function placePickups(n){for(var i=0;i<n;i++){var ok=false,tries=0;while(!ok&&tries<200){tries++;var xx=rnd(300,2000),yy=rnd(260,1280);if(!nearSpawn(xx,yy,90)){pick.push({x:xx,y:yy,r:15,type:i%3});ok=true}}}}
function clearSpawnArea(){for(var i=ob.length-1;i>=0;i--){var o=ob[i],cx=o.r?o.x:o.x+o.w/2,cy=o.r?o.y:o.y+o.h/2,rr=o.r?o.r:120;if(nearSpawn(cx,cy,rr))ob.splice(i,1)}}
function addCircle(t,x1,y1,r){ob.push({t:t,x:x1,y:y1,r:r})}function addRect(t,x1,y1,w,h){ob.push({t:t,x:x1,y:y1,w:w,h:h})}
function circleRect(cx,cy,rr,o){var nx=clamp(cx,o.x,o.x+o.w),ny=clamp(cy,o.y,o.y+o.h);return dist(cx,cy,nx,ny)<rr}
function hitObj(o,rad){if(o.r)return dist(mower.x,mower.y,o.x,o.y)<rad+o.r;return circleRect(mower.x,mower.y,rad,o)}
function update(dt){time-=dt;if(grace>0)grace-=dt;if(hitCooldown>0)hitCooldown-=dt;if(msgTimer>0)msgTimer-=dt;if(time<=0){end();return}var ax=0,ay=0;if(keys.left)ax--;if(keys.right)ax++;if(keys.up)ay--;if(keys.down)ay++;ax+=joy.dx;ay+=joy.dy;var len=Math.sqrt(ax*ax+ay*ay);if(len>1){ax/=len;ay/=len}boosting=(keys.boost||boostBtn.dataset.down==='1')&&boost>0;var sp=boosting?355:235;if(boosting)boost-=34*dt;else boost=Math.min(100,boost+18*dt);mower.vx=ax*sp;mower.vy=ay*sp;if(len>.05)mower.a=Math.atan2(ay,ax);var ox=mower.x,oy=mower.y;mower.x=clamp(mower.x+mower.vx*dt,35,yardW-35);mower.y=clamp(mower.y+mower.vy*dt,35,yardH-35);
 for(var i=0;i<ob.length;i++){var o=ob[i];if(hitObj(o,mower.r)){mower.x=ox;mower.y=oy;if(hitCooldown<=0&&grace<=0){if(o.t==='flower'){damage+=5;flowerHits++;o.t='flowerHit'}else if(o.t==='poop'){damage+=4;poopHits++;o.t='poopHit'}else damage+=2;hitCooldown=.65}}}
 cutGrassAt(mower.x,mower.y,boosting?76:50,boosting?2:1);
 for(i=pick.length-1;i>=0;i--){var p=pick[i];if(dist(mower.x,mower.y,p.x,p.y)<mower.r+p.r){if(p.type===0)boost=100;if(p.type===1)time+=8;if(p.type===2)score+=250;pick.splice(i,1)}}
 dog.t-=dt;if(dog.t<=0){dog.t=rnd(1,2.8);var ang=rnd(0,Math.PI*2);dog.vx=Math.cos(ang)*rnd(70,155);dog.vy=Math.sin(ang)*rnd(70,155)}dog.x+=dog.vx*dt;dog.y+=dog.vy*dt;if(dog.x<120||dog.x>yardW-120)dog.vx*=-1;if(dog.y<180||dog.y>yardH-120)dog.vy*=-1;if(dist(mower.x,mower.y,dog.x,dog.y)<mower.r+dog.r){dog.vx*=-1.4;dog.vy*=-1.4;if(hitCooldown<=0&&grace<=0){damage+=6;hitCooldown=.8}}
 if(damage>=100){end();return}}
function cutGrassAt(cx,cy,rad,power){var c1=Math.max(0,Math.floor((cx-rad)/tile)),c2=Math.min(cols-1,Math.floor((cx+rad)/tile)),r1=Math.max(0,Math.floor((cy-rad)/tile)),r2=Math.min(rows-1,Math.floor((cy+rad)/tile));for(var r=r1;r<=r2;r++){for(var q=c1;q<=c2;q++){var g=grass[r][q];if(g.h>0){var tx=q*tile+tile/2,ty=r*tile+tile/2;if(dist(cx,cy,tx,ty)<rad){g.h-=power;if(g.h<=0){g.h=0;cutGrass++;score+=g.o*25}}}}}}
function draw(){x.clearRect(0,0,W,H);var zoom=W<700?1.12:1.32;var viewW=W/zoom,viewH=H/zoom;var camX=clamp(mower.x-viewW/2,0,yardW-viewW),camY=clamp(mower.y-viewH/2,0,yardH-viewH);x.save();x.scale(zoom,zoom);x.translate(-camX,-camY);drawYard();drawObjects();drawDog();drawMower();if(grace>0)drawSafeZone();x.restore();drawMini(camX,camY,viewW,viewH);var pct=Math.floor(cutGrass/totalGrass*100);hud.innerHTML='TIME '+Math.max(0,Math.ceil(time))+'<br>SCORE '+score+'<br>CUT '+pct+'%<br>DAMAGE '+Math.floor(damage)+'%'+(grace>0?'<br>SAFE START':'');boostBtn.className=boost>15?'':'off'}
function drawYard(){x.fillStyle='#3f6212';x.fillRect(0,0,yardW,yardH);for(var r=0;r<rows;r++){for(var q=0;q<cols;q++){var g=grass[r][q],px=q*tile,py=r*tile;if(g.h===0)x.fillStyle=(q+r)%2?'#65a30d':'#4d7c0f';else if(g.h===1)x.fillStyle='#86b93b';else if(g.h===2)x.fillStyle='#b6a932';else x.fillStyle='#766d2a';x.fillRect(px,py,tile-1,tile-1);if(g.h===0){x.fillStyle='rgba(255,255,255,.10)';x.fillRect(px+4,py+22,tile-8,3)}}}x.strokeStyle='rgba(255,255,255,.18)';x.lineWidth=10;x.strokeRect(5,5,yardW-10,yardH-10)}
function drawObjects(){for(var i=0;i<ob.length;i++){var o=ob[i];if(o.t==='house'){x.fillStyle='#8b5e34';x.fillRect(o.x,o.y,o.w,o.h);x.fillStyle='#5b3420';x.fillRect(o.x,o.y+o.h-28,o.w,o.h/5)}else if(o.t==='pool'){x.fillStyle='#38bdf8';round(o.x,o.y,o.w,o.h,28);x.fillStyle='rgba(255,255,255,.3)';x.fillRect(o.x+30,o.y+50,o.w-60,8)}else if(o.t==='patio'){x.fillStyle='#a8a29e';x.fillRect(o.x,o.y,o.w,o.h)}else if(o.t==='tree'){x.fillStyle='#854d0e';x.fillRect(o.x-8,o.y-3,16,30);x.fillStyle='#166534';circ(o.x,o.y,o.r)}else if(o.t==='rock'){x.fillStyle='#78716c';circ(o.x,o.y,o.r)}else if(o.t==='flower'||o.t==='flowerHit'){x.fillStyle=o.t==='flower'?'#f472b6':'#7f1d1d';round(o.x,o.y,o.w,o.h,12)}else if(o.t==='poop'||o.t==='poopHit'){x.fillStyle=o.t==='poop'?'#7c2d12':'#3f1d10';circ(o.x,o.y,o.r)}}for(i=0;i<pick.length;i++){var p=pick[i];x.fillStyle=p.type===0?'#facc15':p.type===1?'#60a5fa':'#c084fc';circ(p.x,p.y,p.r);x.fillStyle='#111827';x.font='18px Segoe UI';x.textAlign='center';x.textBaseline='middle';x.fillText(p.type===0?'B':p.type===1?'+':'$',p.x,p.y)}}
function drawDog(){x.fillStyle='#a16207';circ(dog.x,dog.y,dog.r);x.fillStyle='#422006';circ(dog.x+8,dog.y-7,5);circ(dog.x-8,dog.y-7,5)}
function drawSafeZone(){x.strokeStyle='rgba(190,242,100,.55)';x.lineWidth=5;x.beginPath();x.arc(spawnX,spawnY,safeR,0,Math.PI*2);x.stroke()}
function drawMower(){x.save();x.translate(mower.x,mower.y);x.rotate(mower.a);x.fillStyle=grace>0?'rgba(190,242,100,.18)':'rgba(0,0,0,.22)';circ(0,0,boosting?76:50);x.fillStyle='#dc2626';round(-28,-18,56,36,8);x.fillStyle='#111827';x.fillRect(6,-12,26,24);x.fillStyle='#020617';circ(-18,-23,8);circ(-18,23,8);circ(22,-23,8);circ(22,23,8);x.restore()}
function circ(a,b,r){x.beginPath();x.arc(a,b,r,0,Math.PI*2);x.fill()}function round(a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.lineTo(a+w-r,b);x.quadraticCurveTo(a+w,b,a+w,b+r);x.lineTo(a+w,b+h-r);x.quadraticCurveTo(a+w,b+h,a+w-r,b+h);x.lineTo(a+r,b+h);x.quadraticCurveTo(a,b+h,a,b+h-r);x.lineTo(a,b+r);x.quadraticCurveTo(a,b,a+r,b);x.fill()}
function drawMini(cx,cy,vw,vh){var sw=m.clientWidth||128,sh=m.clientHeight||90;mx.clearRect(0,0,sw,sh);mx.fillStyle='#365314';mx.fillRect(0,0,sw,sh);mx.fillStyle='#bef264';for(var r=0;r<rows;r++)for(var q=0;q<cols;q++)if(grass[r][q].h>0)mx.fillRect(q/cols*sw,r/rows*sh,2,2);mx.fillStyle='#ef4444';mx.fillRect(mower.x/yardW*sw-2,mower.y/yardH*sh-2,4,4);mx.strokeStyle='#fff';mx.lineWidth=1;mx.strokeRect(cx/yardW*sw,cy/yardH*sh,vw/yardW*sw,vh/yardH*sh)}
function end(){playing=false;report.className='';var pct=Math.floor(cutGrass/totalGrass*100),starsN=pct>=92&&damage<30?5:pct>=80?4:pct>=65?3:pct>=45?2:1;document.getElementById('r1').innerHTML='Grass Cut<br>'+pct+'%';document.getElementById('r2').innerHTML='Score<br>'+score;document.getElementById('r3').innerHTML='Damage<br>'+Math.floor(damage)+'%';document.getElementById('r4').innerHTML='Poop Hits<br>'+poopHits;document.getElementById('stars').innerHTML=new Array(starsN+1).join('⭐')}
function loop(t){if(!playing)return;var dt=Math.min(.04,(t-last)/1000);last=t;update(dt);draw();requestAnimationFrame(loop)}
document.getElementById('startBtn').onclick=reset;document.getElementById('againBtn').onclick=reset;
window.addEventListener('keydown',function(e){setKey(e.key,true);if(e.key===' ')e.preventDefault()});window.addEventListener('keyup',function(e){setKey(e.key,false)});function setKey(k,v){if(k==='ArrowLeft'||k==='a'||k==='A')keys.left=v;if(k==='ArrowRight'||k==='d'||k==='D')keys.right=v;if(k==='ArrowUp'||k==='w'||k==='W')keys.up=v;if(k==='ArrowDown'||k==='s'||k==='S')keys.down=v;if(k===' ')keys.boost=v}
boostBtn.addEventListener('pointerdown',function(e){e.preventDefault();boostBtn.dataset.down='1'});boostBtn.addEventListener('pointerup',function(){boostBtn.dataset.down='0'});boostBtn.addEventListener('pointercancel',function(){boostBtn.dataset.down='0'});
var jb=document.getElementById('joy'),kn=document.getElementById('knob');jb.addEventListener('pointerdown',joyStart);jb.addEventListener('pointermove',joyMove);jb.addEventListener('pointerup',joyEnd);jb.addEventListener('pointercancel',joyEnd);function joyStart(e){joy.active=true;if(jb.setPointerCapture)jb.setPointerCapture(e.pointerId);joyMove(e)}function joyMove(e){if(!joy.active)return;var r=jb.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,dx=e.clientX-cx,dy=e.clientY-cy,len=Math.sqrt(dx*dx+dy*dy),max=r.width*.32;if(len>max){dx=dx/len*max;dy=dy/len*max}joy.dx=dx/max;joy.dy=dy/max;kn.style.transform='translate('+dx+'px,'+dy+'px)'}function joyEnd(){joy.active=false;joy.dx=0;joy.dy=0;kn.style.transform='translate(0,0)'}
draw();
})();
</script>
</body>
</html>
