<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number Ninja - K2 games</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --accent: #fbbf24;
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --muted: #94a3b8;
            --secondary: #10b981;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        nav {
            height: 60px;
            padding: 0 1.5rem;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .logo { font-weight: 900; color: var(--accent); letter-spacing: 1px; }
        .restart-btn { background: var(--surface); border: 1px solid var(--border); color: white; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }

        #game-layout {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 20px;
            position: relative;
        }

        #game-container {
            background: var(--surface);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            text-align: center;
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        h1 { margin-top: 0; color: var(--accent); font-style: italic; font-weight: 900; }

        #stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            font-weight: bold;
            font-size: 1.2rem;
        }

        #equation {
            font-size: 3rem;
            margin: 2rem 0;
            min-height: 4rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        #options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .btn {
            padding: 1.2rem;
            font-size: 1.5rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background-color: rgba(255,255,255,0.05);
            color: white;
            font-weight: 800;
        }

        .btn:hover { background-color: rgba(255,255,255,0.1); border-color: var(--accent); transform: translateY(-2px); }
        .btn:active { transform: scale(0.95); }

        .correct { background-color: var(--secondary) !important; border-color: #fff !important; color: white; }
        .incorrect { background-color: var(--danger) !important; border-color: #fff !important; color: white; }

        #difficulty-screen, #game-screen, #result-screen {
            display: none;
        }

        #difficulty-screen.active, #game-screen.active, #result-screen.active {
            display: block;
        }

        #timer-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        #timer-bar {
            height: 100%;
            background: var(--accent);
            width: 100%;
            transition: width 0.1s linear;
        }

        .difficulty-btn {
            display: block;
            width: 100%;
            margin: 1rem 0;
            padding: 1.2rem;
            font-size: 1.2rem;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 15px;
            color: white;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }
        .difficulty-btn:hover { border-color: var(--accent); background: rgba(251, 191, 36, 0.1); transform: translateX(5px); }

        .overlay {
            position: absolute; inset: 0;
            background: rgba(15, 23, 42, 0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center; padding: 20px;
        }

        .btn-large {
            background: var(--accent); color: #000; border: none; padding: 1rem 3rem;
            border-radius: 50px; font-weight: 900; cursor: pointer; margin-top: 1.5rem;
            font-size: 1.3rem;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">NUMBER NINJA</div>
        <button class="restart-btn" onclick="resetGame()">QUIT MISSION</button>
    </nav>

    <div id="game-layout">
        <div id="game-container">
            <div id="difficulty-screen" class="active">
                <h1>NUMBER NINJA</h1>
                <p style="opacity: 0.7; margin-bottom: 2rem;">Choose your level of operations:</p>
                <button class="difficulty-btn" onclick="startGame('easy')">EASY (+, -, *)</button>
                <button class="difficulty-btn" onclick="startGame('normal')" style="border-color: var(--accent);">NORMAL (PEMDAS)</button>
                <button class="difficulty-btn" onclick="startGame('hard')" style="border-color: var(--danger);">HARD (ADVANCED)</button>
            </div>

            <div id="game-screen">
                <div id="stats">
                    <div>Score: <span id="score" style="color: var(--accent)">0</span></div>
                    <div>Time: <span id="timer">30</span>s</div>
                </div>
                <div id="timer-bar-container">
                    <div id="timer-bar"></div>
                </div>
                <div id="equation">2 + 3 * 4</div>
                <div id="options">
                    <!-- Buttons generated by JS -->
                </div>
            </div>

            <div id="result-screen">
                <h1>MISSION OVER</h1>
                <p style="opacity: 0.7;">Your final calculation score:</p>
                <div style="font-size: 4rem; font-weight: 900; margin: 1.5rem 0; color: var(--accent);" id="final-score">0</div>
                <button class="btn-large" onclick="resetGame()">PLAY AGAIN</button>
            </div>
        </div>
    </div>

<script>
    let score = 0;
    let timeLeft = 30;
    let timerInterval;
    let currentCorrectAnswer;
    let difficulty = 'normal';

    const screens = {
        difficulty: document.getElementById('difficulty-screen'),
        game: document.getElementById('game-screen'),
        result: document.getElementById('result-screen')
    };

    function showScreen(screenName) {
        Object.values(screens).forEach(s => s.classList.remove('active'));
        screens[screenName].classList.add('active');
    }

    function startGame(diff) {
        difficulty = diff;
        score = 0;
        timeLeft = 30;
        document.getElementById('score').innerText = score;
        showScreen('game');
        nextQuestion();
        startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            document.getElementById('timer').innerText = Math.ceil(timeLeft);
            document.getElementById('timer-bar').style.width = (timeLeft / 30 * 100) + '%';
            
            if (timeLeft <= 0) {
                endGame();
            }
        }, 100);
    }

    function generateEquation(diff) {
        const ops = ['+', '-', '*'];
        if (diff !== 'easy') ops.push('/');
        
        let equation = '';
        let result = 0;

        const getRand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        if (diff === 'easy') {
            const a = getRand(2, 10);
            const b = getRand(2, 10);
            const c = getRand(1, 5);
            const op1 = ops[getRand(0, 2)];
            const op2 = ops[getRand(0, 2)];
            equation = `${a} ${op1} ${b} ${op2} ${c}`;
        } else if (diff === 'normal') {
            const useParens = Math.random() > 0.5;
            const a = getRand(2, 10);
            const b = getRand(2, 10);
            const c = getRand(2, 5);
            const op1 = ops[getRand(0, ops.length - 1)];
            const op2 = ops[getRand(0, ops.length - 1)];
            
            if (useParens) {
                equation = `(${a} ${op1} ${b}) ${op2} ${c}`;
            } else {
                equation = `${a} ${op1} ${b} ${op2} ${c}`;
            }
        } else { // hard
            const a = getRand(2, 12);
            const b = getRand(2, 12);
            const c = getRand(2, 6);
            const d = getRand(2, 4);
            const op1 = ops[getRand(0, ops.length - 1)];
            const op2 = ops[getRand(0, ops.length - 1)];
            const op3 = ops[getRand(0, ops.length - 1)];
            
            if (Math.random() > 0.5) {
                equation = `${a} ${op1} (${b} ${op2} ${c}) ${op3} ${d}`;
            } else {
                equation = `(${a} ${op1} ${b}) ${op2} (${c} ${op3} ${d})`;
            }
        }

        try {
            result = new Function(`return ${equation.replace(/ /g, '')}`)();
            if (!Number.isInteger(result) || result > 1000 || result < -100) {
                return generateEquation(diff);
            }
            return { equation, result };
        } catch(e) {
            return generateEquation(diff);
        }
    }

    function nextQuestion() {
        const { equation, result } = generateEquation(difficulty);
        currentCorrectAnswer = result;
        document.getElementById('equation').innerText = equation.replace(/\*/g, '×').replace(/\//g, '÷');
        
        const options = [result];
        while (options.length < 4) {
            const offset = Math.floor(Math.random() * 10) - 5;
            const wrong = result + (offset === 0 ? 3 : offset);
            if (!options.includes(wrong)) options.push(wrong);
        }
        
        options.sort(() => Math.random() - 0.5);
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, btn);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(selected, btn) {
        const btns = document.querySelectorAll('#options .btn');
        btns.forEach(b => b.disabled = true);

        if (selected === currentCorrectAnswer) {
            btn.classList.add('correct');
            score += 10;
            timeLeft += 2; // Bonus time
            if (timeLeft > 30) timeLeft = 30;
            document.getElementById('score').innerText = score;
            setTimeout(nextQuestion, 500);
        } else {
            btn.classList.add('incorrect');
            btns.forEach(b => {
                if (parseInt(b.innerText) === currentCorrectAnswer) b.classList.add('correct');
            });
            setTimeout(nextQuestion, 1000);
        }
    }

    function endGame() {
        clearInterval(timerInterval);
        document.getElementById('final-score').innerText = score;
        showScreen('result');
    }

    function resetGame() {
        showScreen('difficulty');
    }
</script>
</body>
</html>
