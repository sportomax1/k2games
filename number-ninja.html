<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Ninja</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #2ecc71;
            --danger: #e74c3c;
            --background: #f4f7f9;
            --text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        h1 { margin-top: 0; color: var(--primary); }

        #stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            font-weight: bold;
            font-size: 1.2rem;
        }

        #equation {
            font-size: 2.5rem;
            margin: 2rem 0;
            min-height: 3.5rem;
            font-weight: bold;
        }

        #options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .btn {
            padding: 1rem;
            font-size: 1.2rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            background-color: var(--primary);
            color: white;
        }

        .btn:hover { background-color: #357abd; }
        .btn:active { transform: scale(0.95); }

        .correct { background-color: var(--secondary) !important; }
        .incorrect { background-color: var(--danger) !important; }

        #difficulty-screen, #game-screen, #result-screen {
            display: none;
        }

        #difficulty-screen.active, #game-screen.active, #result-screen.active {
            display: block;
        }

        #timer-bar-container {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        #timer-bar {
            height: 100%;
            background: var(--primary);
            width: 100%;
            transition: width 0.1s linear;
        }

        .difficulty-btn {
            display: block;
            width: 100%;
            margin: 1rem 0;
            padding: 1rem;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="difficulty-screen" class="active">
        <h1>Number Ninja</h1>
        <p>Choose your level of operations:</p>
        <button class="btn difficulty-btn" onclick="startGame('easy')">Easy (+, -, *)</button>
        <button class="btn difficulty-btn" onclick="startGame('normal')">Normal (PEMDAS)</button>
        <button class="btn difficulty-btn" onclick="startGame('hard')">Hard (Advanced PEMDAS)</button>
    </div>

    <div id="game-screen">
        <div id="stats">
            <div>Score: <span id="score">0</span></div>
            <div>Time: <span id="timer">30</span>s</div>
        </div>
        <div id="timer-bar-container">
            <div id="timer-bar"></div>
        </div>
        <div id="equation">2 + 3 * 4</div>
        <div id="options">
            <!-- Buttons generated by JS -->
        </div>
    </div>

    <div id="result-screen">
        <h1>Game Over!</h1>
        <p>Your Final Score:</p>
        <div style="font-size: 3rem; font-weight: bold; margin: 1rem 0;" id="final-score">0</div>
        <button class="btn difficulty-btn" onclick="resetGame()">Play Again</button>
    </div>
</div>

<script>
    let score = 0;
    let timeLeft = 30;
    let timerInterval;
    let currentCorrectAnswer;
    let difficulty = 'normal';

    const screens = {
        difficulty: document.getElementById('difficulty-screen'),
        game: document.getElementById('game-screen'),
        result: document.getElementById('result-screen')
    };

    function showScreen(screenName) {
        Object.values(screens).forEach(s => s.classList.remove('active'));
        screens[screenName].classList.add('active');
    }

    function startGame(diff) {
        difficulty = diff;
        score = 0;
        timeLeft = 30;
        document.getElementById('score').innerText = score;
        showScreen('game');
        nextQuestion();
        startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            document.getElementById('timer').innerText = Math.ceil(timeLeft);
            document.getElementById('timer-bar').style.width = (timeLeft / 30 * 100) + '%';
            
            if (timeLeft <= 0) {
                endGame();
            }
        }, 100);
    }

    function generateEquation(diff) {
        const ops = ['+', '-', '*'];
        if (diff !== 'easy') ops.push('/');
        
        let equation = '';
        let result = 0;

        const getRand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        if (diff === 'easy') {
            const a = getRand(2, 10);
            const b = getRand(2, 10);
            const c = getRand(1, 5);
            const op1 = ops[getRand(0, 2)];
            const op2 = ops[getRand(0, 2)];
            equation = `${a} ${op1} ${b} ${op2} ${c}`;
        } else if (diff === 'normal') {
            const useParens = Math.random() > 0.5;
            const a = getRand(2, 10);
            const b = getRand(2, 10);
            const c = getRand(2, 5);
            const op1 = ops[getRand(0, ops.length - 1)];
            const op2 = ops[getRand(0, ops.length - 1)];
            
            if (useParens) {
                equation = `(${a} ${op1} ${b}) ${op2} ${c}`;
            } else {
                equation = `${a} ${op1} ${b} ${op2} ${c}`;
            }
        } else { // hard
            const a = getRand(2, 12);
            const b = getRand(2, 12);
            const c = getRand(2, 6);
            const d = getRand(2, 4);
            const op1 = ops[getRand(0, ops.length - 1)];
            const op2 = ops[getRand(0, ops.length - 1)];
            const op3 = ops[getRand(0, ops.length - 1)];
            
            if (Math.random() > 0.5) {
                equation = `${a} ${op1} (${b} ${op2} ${c}) ${op3} ${d}`;
            } else {
                equation = `(${a} ${op1} ${b}) ${op2} (${c} ${op3} ${d})`;
            }
        }

        try {
            // Using Function constructor to evaluate safely (ish) as it's a game
            result = new Function(`return ${equation.replace(/ /g, '')}`)();
            
            // Ensure result is a clean integer and not too crazy
            if (!Number.isInteger(result) || result > 1000 || result < -100) {
                return generateEquation(diff);
            }
            return { equation, result };
        } catch(e) {
            return generateEquation(diff);
        }
    }

    function nextQuestion() {
        const { equation, result } = generateEquation(difficulty);
        currentCorrectAnswer = result;
        document.getElementById('equation').innerText = equation.replace(/\*/g, '×').replace(/\//g, '÷');
        
        const options = [result];
        while (options.length < 4) {
            const offset = Math.floor(Math.random() * 10) - 5;
            const wrong = result + (offset === 0 ? 3 : offset);
            if (!options.includes(wrong)) options.push(wrong);
        }
        
        options.sort(() => Math.random() - 0.5);
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, btn);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(selected, btn) {
        const btns = document.querySelectorAll('#options .btn');
        btns.forEach(b => b.disabled = true);

        if (selected === currentCorrectAnswer) {
            btn.classList.add('correct');
            score += 10;
            timeLeft += 2; // Bonus time
            if (timeLeft > 30) timeLeft = 30;
            document.getElementById('score').innerText = score;
            setTimeout(nextQuestion, 500);
        } else {
            btn.classList.add('incorrect');
            // Show correct answer
            btns.forEach(b => {
                if (parseInt(b.innerText) === currentCorrectAnswer) b.classList.add('correct');
            });
            setTimeout(nextQuestion, 1000);
        }
    }

    function endGame() {
        clearInterval(timerInterval);
        document.getElementById('final-score').innerText = score;
        showScreen('result');
    }

    function resetGame() {
        showScreen('difficulty');
    }
</script>

</body>
</html>
