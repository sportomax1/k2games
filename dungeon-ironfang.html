<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Dungeon Ironfang Duel</title>
    <style>
        :root {
            --bg: #090b12;
            --panel: #141a2b;
            --accent: #6ee7ff;
            --danger: #ff6b6b;
            --text: #edf4ff;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #1f2c4f, #090b12 45%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 14px;
        }
        .wrap { width: min(920px, 100%); }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
            flex-wrap: wrap;
        }
        a {
            color: var(--accent);
            text-decoration: none;
            border: 1px solid rgba(110, 231, 255, 0.35);
            border-radius: 999px;
            padding: 8px 12px;
            font-weight: 700;
        }
        .card {
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 12px;
        }
        #arena {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: linear-gradient(#283c65 0%, #1a2642 55%, #0f172a 56%, #101726 100%);
            border-radius: 12px;
            display: block;
        }
        .hud {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 10px 0;
        }
        .bar {
            background: rgba(255,255,255,0.08);
            border-radius: 999px;
            height: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.12);
        }
        .fill {
            height: 100%;
            width: 100%;
            transition: width 0.12s linear;
        }
        #p-fill { background: linear-gradient(90deg, #22d3ee, #38bdf8); }
        #e-fill { background: linear-gradient(90deg, #fb7185, #ef4444); }
        .msg { min-height: 24px; font-weight: 700; color: #dbeafe; }
        .controls {
            margin-top: 8px;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
        }
        button {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: #1d2740;
            color: var(--text);
            font-weight: 800;
            font-size: 0.95rem;
        }
        @media (max-width: 700px) {
            .controls { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .topbar h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="topbar">
            <a href="index.html">← Back</a>
            <h1>⚔️ Dungeon Ironfang Duel</h1>
            <span>Desktop: A/D move, J attack, K guard</span>
        </div>
        <div class="card">
            <canvas id="arena" width="960" height="540" aria-label="Dueling arena"></canvas>
            <div class="hud">
                <div><strong>You</strong><div class="bar"><div class="fill" id="p-fill"></div></div></div>
                <div><strong>Ironfang Guard</strong><div class="bar"><div class="fill" id="e-fill"></div></div></div>
            </div>
            <div class="msg" id="msg">No maze. Pure duel. Defeat the guard.</div>
            <div class="controls">
                <button data-act="left">⬅ Move</button>
                <button data-act="right">Move ➡</button>
                <button data-act="attack">🗡 Attack</button>
                <button data-act="guard">🛡 Guard</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('arena');
        const ctx = canvas.getContext('2d');
        const msg = document.getElementById('msg');
        const pFill = document.getElementById('p-fill');
        const eFill = document.getElementById('e-fill');

        const state = {
            player: { x: 240, hp: 100, guard: 0, cooldown: 0, hitFlash: 0 },
            enemy: { x: 720, hp: 100, cooldown: 0, hitFlash: 0 },
            over: false,
            keys: new Set()
        };

        function reset() {
            state.player = { x: 240, hp: 100, guard: 0, cooldown: 0, hitFlash: 0 };
            state.enemy = { x: 720, hp: 100, cooldown: 0, hitFlash: 0 };
            state.over = false;
            msg.textContent = 'No maze. Pure duel. Defeat the guard.';
        }

        function distance() {
            return Math.abs(state.player.x - state.enemy.x);
        }

        function attackPlayer() {
            if (state.player.cooldown > 0 || state.over) return;
            state.player.cooldown = 22;
            if (distance() < 170) {
                state.enemy.hp = Math.max(0, state.enemy.hp - 11);
                state.enemy.hitFlash = 7;
                msg.textContent = 'Clean hit!';
            } else {
                msg.textContent = 'Too far. Step in.';
            }
        }

        function guardPlayer() {
            if (state.over) return;
            state.player.guard = 14;
            msg.textContent = 'Guard up.';
        }

        function enemyBrain() {
            if (state.enemy.cooldown > 0 || state.over) return;
            const dir = state.player.x < state.enemy.x ? -1 : 1;
            if (distance() > 145) {
                state.enemy.x += dir * 2.3;
                return;
            }
            state.enemy.cooldown = 28;
            let damage = 10;
            if (state.player.guard > 0) {
                damage = 4;
                msg.textContent = 'You blocked most of the strike.';
            } else {
                msg.textContent = 'Guard hit you.';
            }
            state.player.hp = Math.max(0, state.player.hp - damage);
            state.player.hitFlash = 7;
        }

        function update() {
            if (!state.over) {
                if (state.keys.has('a') || state.keys.has('ArrowLeft')) state.player.x -= 4;
                if (state.keys.has('d') || state.keys.has('ArrowRight')) state.player.x += 4;
                state.player.x = Math.max(70, Math.min(890, state.player.x));

                if (state.player.cooldown > 0) state.player.cooldown--;
                if (state.enemy.cooldown > 0) state.enemy.cooldown--;
                if (state.player.guard > 0) state.player.guard--;
                if (state.player.hitFlash > 0) state.player.hitFlash--;
                if (state.enemy.hitFlash > 0) state.enemy.hitFlash--;

                enemyBrain();

                if (state.player.hp <= 0) {
                    state.over = true;
                    msg.textContent = 'Defeat. Tap attack to rematch.';
                } else if (state.enemy.hp <= 0) {
                    state.over = true;
                    msg.textContent = 'Victory! Tap attack for another duel.';
                }
            }

            pFill.style.width = state.player.hp + '%';
            eFill.style.width = state.enemy.hp + '%';
        }

        function drawFighter(x, color, facing, flash, guarding) {
            ctx.save();
            ctx.translate(x, 410);
            ctx.scale(facing, 1);
            ctx.fillStyle = flash > 0 ? '#fff' : color;
            ctx.fillRect(-25, -95, 50, 95);
            ctx.fillRect(-32, -135, 64, 40);
            ctx.fillRect(-12, 0, 10, 40);
            ctx.fillRect(2, 0, 10, 40);
            if (guarding) {
                ctx.strokeStyle = '#93c5fd';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.arc(35, -80, 22, -1.3, 1.3);
                ctx.stroke();
            }
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#f59e0b';
            ctx.fillRect(0, 420, canvas.width, 120);
            for (let i = 0; i < 16; i++) {
                ctx.fillStyle = i % 2 ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)';
                ctx.fillRect(i * 60, 420, 60, 120);
            }

            drawFighter(state.player.x, '#60a5fa', 1, state.player.hitFlash, state.player.guard > 0);
            drawFighter(state.enemy.x, '#ef4444', -1, state.enemy.hitFlash, false);

            ctx.strokeStyle = 'rgba(255,255,255,0.12)';
            ctx.beginPath();
            ctx.moveTo(0, 420);
            ctx.lineTo(canvas.width, 420);
            ctx.stroke();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        document.addEventListener('keydown', (e) => {
            state.keys.add(e.key);
            if (e.key === 'j' || e.key === 'J') {
                if (state.over) reset();
                else attackPlayer();
            }
            if (e.key === 'k' || e.key === 'K') guardPlayer();
        });
        document.addEventListener('keyup', (e) => state.keys.delete(e.key));

        document.querySelectorAll('[data-act]').forEach((button) => {
            const act = button.dataset.act;
            let hold = false;
            const down = () => {
                hold = true;
                if (act === 'left' || act === 'right') state.keys.add(act === 'left' ? 'ArrowLeft' : 'ArrowRight');
                if (act === 'attack') {
                    if (state.over) reset();
                    else attackPlayer();
                }
                if (act === 'guard') guardPlayer();
            };
            const up = () => {
                hold = false;
                if (act === 'left' || act === 'right') state.keys.delete(act === 'left' ? 'ArrowLeft' : 'ArrowRight');
            };
            button.addEventListener('pointerdown', down);
            button.addEventListener('pointerup', up);
            button.addEventListener('pointerleave', up);
            button.addEventListener('pointercancel', up);
        });

        loop();
    </script>
</body>
</html>
