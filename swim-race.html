<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K2 Swim Race: Olympic Outdoor - K2 games</title>
    <style>
        :root {
            --pool-blue: #0ea5e9;
            --pool-deep: #0369a1;
            --accent: #f59e0b;
            --bg: #0f172a;
            --text: #f8fafc;
            --border: rgba(255, 255, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: none; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        nav {
            height: 60px;
            padding: 0 1.5rem;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .logo { font-weight: 900; font-size: 1.2rem; color: var(--accent); letter-spacing: -0.5px; }
        .back-link { color: #94a3b8; text-decoration: none; font-size: 0.8rem; font-weight: bold; }

        #game-container {
            flex: 1;
            position: relative;
            background: #0ea5e9;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 100%;
            max-height: 100%;
        }

        #hud {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 30px;
            pointer-events: none; z-index: 50;
        }

        .stat-card {
            background: rgba(0,0,0,0.6); backdrop-filter: blur(12px);
            padding: 10px 20px; border-radius: 12px; border: 1px solid var(--border);
            text-align: center; min-width: 120px;
        }

        .stat-val { font-size: 1.5rem; font-weight: 900; color: var(--accent); font-family: monospace; }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }

        .stamina-bar {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 300px; height: 14px; background: rgba(0,0,0,0.5);
            border-radius: 10px; overflow: hidden; border: 2px solid var(--border);
            z-index: 50;
        }
        #stamina-fill { height: 100%; width: 100%; background: #22c55e; transition: width 0.1s; }

        #mobile-taps {
            position: absolute; inset: 0; display: grid; grid-template-columns: 1fr 1fr; z-index: 40;
        }
        .tap-zone { background: transparent; }

        .screen-overlay {
            position: absolute; inset: 0; background: rgba(2, 6, 23, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; text-align: center; padding: 20px; backdrop-filter: blur(10px);
        }

        .char-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 20px 0; }
        .char-opt {
            background: rgba(255,255,255,0.1); border: 2px solid var(--border);
            padding: 15px; border-radius: 15px; cursor: pointer; font-size: 2rem; transition: 0.2s;
        }
        .char-opt.selected { background: #fff; border-color: var(--accent); transform: scale(1.1); }

        .dist-select { display: flex; gap: 10px; margin-bottom: 20px; }
        .dist-btn { background: rgba(255,255,255,0.1); border: 2px solid var(--border); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .dist-btn.active { background: var(--accent); color: black; border-color: white; }

        .btn-large { background: var(--accent); color: #000; border: none; padding: 1rem 3rem; border-radius: 50px; font-weight: 800; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">K2 OUTDOOR SWIM</div>
        <a href="index.html" class="back-link">← EXIT HUB</a>
    </nav>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="hud">
            <div class="stat-card"><div class="stat-label">Timer</div><div id="time-val" class="stat-val">0.00</div></div>
            <div class="stat-card"><div class="stat-label">Position</div><div id="pos-val" class="stat-val">1st</div></div>
        </div>
        <div class="stamina-bar"><div id="stamina-fill"></div></div>
        <div id="mobile-taps"><div class="tap-zone" id="tap-left"></div><div class="tap-zone" id="tap-right"></div></div>

        <div id="start-screen" class="screen-overlay">
            <h1 style="font-size: 3rem; color: var(--accent); font-weight: 900;">OLYMPIC FREESTYLE</h1>
            <p style="opacity: 0.7; margin-top: 5px;">Outdoor Invitational 2026</p>
            
            <div class="char-grid">
                <div class="char-opt selected" onclick="game.setChar(0)">🏊‍♂️</div>
                <div class="char-opt" onclick="game.setChar(1)">🏊‍♀️</div>
                <div class="char-opt" onclick="game.setChar(2)">🦈</div>
                <div class="char-opt" onclick="game.setChar(3)">🐢</div>
            </div>

            <div class="dist-select">
                <button class="dist-btn" onclick="game.setDist(50, this)">50m</button>
                <button class="dist-btn active" onclick="game.setDist(100, this)">100m</button>
                <button class="dist-btn" onclick="game.setDist(200, this)">200m</button>
            </div>

            <button class="btn-large" onclick="game.startCountdown()">DIVE IN</button>
        </div>

        <div id="win-screen" class="screen-overlay" style="display:none">
            <h1 id="winner-text" style="font-size: 3.5rem; color: var(--accent);">GOLD MEDAL!</h1>
            <div id="final-time" style="font-size: 2rem; font-weight: 900; margin: 10px 0;">Time: 12.45s</div>
            <button class="btn-large" onclick="location.reload()">NEW RACE</button>
        </div>
    </div>

    <script>
        const CHARS = ['🏊‍♂️', '🏊‍♀️', '🦈', '🐢', '🐊', '🐧'];

        class SwimRace {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.width = 1200; this.height = 600;
                this.canvas.width = this.width; this.canvas.height = this.height;

                this.playing = false; this.state = 'menu';
                this.stamina = 100; this.lastSide = null;
                this.raceDist = 100; this.totalDist = 2000;
                this.startTime = 0; this.playerLane = 2;
                
                this.swimmers = []; this.particles = [];
                this.init();
            }

            init() {
                this.swimmers = Array(6).fill(0).map((_, i) => ({
                    lane: i, x: 100, vx: 0, finished: false, isPlayer: i === this.playerLane,
                    emoji: CHARS[Math.floor(Math.random() * CHARS.length)],
                    aiSpeed: 1.2 + Math.random() * 1.8, anim: 0, time: 0
                }));
                this.swimmers[this.playerLane].emoji = CHARS[0];
                this.setupControls();
                requestAnimationFrame(() => this.loop());
            }

            setChar(idx) {
                document.querySelectorAll('.char-opt').forEach((el, i) => el.classList.toggle('selected', i === idx));
                this.swimmers[this.playerLane].emoji = CHARS[idx];
            }

            setDist(m, btn) {
                this.raceDist = m;
                this.totalDist = m * 20;
                document.querySelectorAll('.dist-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }

            setupControls() {
                const stroke = (side) => {
                    if (this.state !== 'racing' || this.stamina < 5) return;
                    let force = this.lastSide === side ? 0.8 : 2.8;
                    this.swimmers[this.playerLane].vx += force;
                    this.stamina -= 3.5; this.lastSide = side;
                    this.spawnSplash(this.swimmers[this.playerLane].x, 100 + this.playerLane * 80 + 40);
                };
                window.onkeydown = (e) => { if(e.key==='ArrowLeft'||e.key==='a') stroke('left'); if(e.key==='ArrowRight'||e.key==='d') stroke('right'); };
                document.getElementById('tap-left').onclick = () => stroke('left');
                document.getElementById('tap-right').onclick = () => stroke('right');
            }

            startCountdown() {
                document.getElementById('start-screen').style.display = 'none';
                this.state = 'racing'; this.startTime = Date.now();
            }

            update() {
                if (this.state !== 'racing') return;
                this.stamina = Math.min(100, this.stamina + 0.4);
                document.getElementById('stamina-fill').style.width = this.stamina + '%';

                this.swimmers.forEach(s => {
                    if (s.finished) return;
                    if (!s.isPlayer && Math.random() < 0.07) {
                        s.vx += s.aiSpeed * 0.75;
                        if (Math.random() < 0.1) this.spawnSplash(s.x, 100 + s.lane * 80 + 40);
                    }
                    s.x += s.vx; s.vx *= 0.93; s.anim += s.vx * 0.15;
                    if (s.x > this.width - 150) {
                        s.finished = true; s.time = (Date.now() - this.startTime) / 1000;
                        if (this.swimmers.every(sw => sw.finished)) this.finishRace();
                    }
                });

                document.getElementById('time-val').textContent = ((Date.now() - this.startTime)/1000).toFixed(2);
                const sorted = [...this.swimmers].sort((a,b) => b.x - a.x);
                const pos = sorted.findIndex(s => s.isPlayer) + 1;
                document.getElementById('pos-val').textContent = pos + (['st','nd','rd','th','th','th'][pos-1]);

                this.particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life -= 0.02; if(p.life<=0) this.particles.splice(i,1); });
            }

            spawnSplash(x, y) { for(let i=0; i<8; i++) this.particles.push({ x, y, vx: -2-Math.random()*4, vy: (Math.random()-0.5)*5, life: 1, r: 2+Math.random()*4 }); }

            finishRace() {
                this.state = 'results';
                const results = [...this.swimmers].sort((a, b) => a.time - b.time);
                const rank = results.findIndex(s => s.isPlayer) + 1;
                document.getElementById('win-screen').style.display = 'flex';
                document.getElementById('winner-text').textContent = rank === 1 ? "🥇 GOLD MEDAL!" : (rank === 2 ? "🥈 SILVER" : "🥉 BRONZE");
                document.getElementById('final-time').textContent = `Time: ${this.swimmers[this.playerLane].time.toFixed(2)}s (${this.raceDist}m)`;
            }

            draw() {
                const ctx = this.ctx; ctx.clearRect(0,0,this.width,this.height);
                const skyGrad = ctx.createLinearGradient(0,0,0,this.height);
                skyGrad.addColorStop(0, '#0ea5e9'); skyGrad.addColorStop(1, '#0369a1');
                ctx.fillStyle = skyGrad; ctx.fillRect(0,0,this.width,this.height);

                for(let i=0; i<6; i++) {
                    const y = 100 + i * 80;
                    ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
                    ctx.fillRect(0, y, this.width, 80);
                    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.font = 'bold 40px Arial';
                    ctx.fillText(i + 1, 30, y + 55);
                    ctx.strokeStyle = i % 2 === 0 ? '#ef4444' : '#facc15'; ctx.setLineDash([15, 10]); ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(this.width, y); ctx.stroke();
                }

                ctx.strokeStyle = '#fff'; ctx.lineWidth = 10; ctx.setLineDash([]);
                ctx.beginPath(); ctx.moveTo(this.width - 150, 100); ctx.lineTo(this.width - 150, 580); ctx.stroke();

                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                this.particles.forEach(p => { ctx.globalAlpha = p.life; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); });
                ctx.globalAlpha = 1;

                this.swimmers.forEach(s => {
                    ctx.save(); ctx.translate(s.x, 100 + s.lane * 80 + 40);
                    ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.beginPath(); ctx.ellipse(0, 15, 30, 10, 0, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = '#ffccaa'; ctx.lineWidth = 6; ctx.lineCap = 'round';
                    const ang = Math.sin(s.anim) * 1.8;
                    ctx.beginPath(); ctx.moveTo(10, -10); ctx.lineTo(10 + Math.cos(ang)*35, -25 + Math.sin(ang)*15); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(10, 10); ctx.lineTo(10 + Math.cos(ang+Math.PI)*35, 25 + Math.sin(ang+Math.PI)*15); ctx.stroke();
                    ctx.font = '50px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(s.emoji, 0, 0);
                    if(s.isPlayer) { ctx.fillStyle = 'var(--accent)'; ctx.beginPath(); ctx.moveTo(0, -45); ctx.lineTo(-10, -60); ctx.lineTo(10, -60); ctx.fill(); }
                    ctx.restore();
                });
            }

            loop() { this.update(); this.draw(); requestAnimationFrame(() => this.loop()); }
        }
        window.game = new SwimRace();
    </script>
</body>
</html>
