<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Phantom Path</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#070913;color:#eef6ff;font-family:system-ui,sans-serif;touch-action:none}canvas{width:100%;height:100%;display:block}.hud{position:fixed;inset:0;pointer-events:none;padding:14px}.top{display:flex;justify-content:space-between}.brand{font-weight:900;letter-spacing:.14em}.stats{display:flex;gap:8px}.box{background:#0d1222d9;border:1px solid #ffffff1f;border-radius:10px;padding:7px 10px;text-align:center;min-width:70px}.box b{display:block}.box small{color:#9aa8ca}.card{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(520px,calc(100vw - 28px));padding:24px;background:#090d1deb;border:1px solid #ffffff20;border-radius:22px;text-align:center;pointer-events:auto}.hide{display:none}.card h1{font-size:clamp(38px,9vw,68px);line-height:.86;margin:0}.card p{color:#b9c6e4;line-height:1.5}.card button{border:0;border-radius:13px;padding:13px 20px;font-weight:900;background:linear-gradient(135deg,#57e8ff,#7dffb2);cursor:pointer}.bar{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);width:min(520px,72vw);height:12px;border:1px solid #ffffff1f;border-radius:99px;overflow:hidden;background:#ffffff0d}.fill{height:100%;background:linear-gradient(90deg,#57e8ff,#ff4fa3,#ff5c71);width:0}.msg{position:absolute;left:50%;top:18%;transform:translateX(-50%);font-weight:900;opacity:0;text-shadow:0 0 18px currentColor}.msg.on{opacity:1}.touch{display:none}.stick{position:absolute;left:24px;bottom:28px;width:120px;height:120px;border-radius:50%;border:1px solid #ffffff24;background:#ffffff0a;pointer-events:auto}.knob{position:absolute;left:34px;top:34px;width:52px;height:52px;border-radius:50%;background:#57e8ff40;border:2px solid #57e8ff}.pulse{position:absolute;right:26px;bottom:34px;width:90px;height:90px;border-radius:50%;pointer-events:auto;background:#ff4fa330;border:2px solid #ff4fa3;color:white;font-weight:900}@media(pointer:coarse),(max-width:700px){.touch{display:block}.stats{gap:4px}.box{min-width:58px;padding:6px}.brand{font-size:14px}.bar{width:44vw}}</style></head><body><canvas id="c"></canvas><div class="hud"><div class="top"><div class="brand">PHANTOM PATH</div><div class="stats"><div class="box"><b id="sc">0</b><small>SCORE</small></div><div class="box"><b id="wv">1</b><small>WAVE</small></div><div class="box"><b id="bs">0</b><small>BEST</small></div></div></div><div id="msg" class="msg"></div><div class="bar"><div id="fill" class="fill"></div></div><div id="card" class="card"><h1>PHANTOM<br>PATH</h1><p>Collect shards while hostile phantoms replay your exact movement a few seconds later. Your past becomes the maze.</p><p><b>Move:</b> WASD / arrows / controller &nbsp; <b>Pulse:</b> Space / A</p><button id="start">ENTER THE PATH</button></div><div class="touch"><div id="stick" class="stick"><div id="knob" class="knob"></div></div><button id="pulse" class="pulse">PULSE</button></div></div><script>(()=>{const c=document.getElementById('c'),x=c.getContext('2d'),sc=document.getElementById('sc'),wv=document.getElementById('wv'),bs=document.getElementById('bs'),card=document.getElementById('card'),fill=document.getElementById('fill'),msg=document.getElementById('msg');let W,H,d=1,last=0,t=0,on=0,score=0,wave=1,best=+localStorage.ppbest||0,spawn=0,shake=0,flash=0,ctxa,pad=0;bs.textContent=best;const K={},trail=[],ghosts=[],gems=[],parts=[],rings=[],joy={x:0,y:0},P={x:0,y:0,vx:0,vy:0,fx:1,fy:0,step:0,inv:0,pulse:1,r:12};function size(){d=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;c.width=W*d;c.height=H*d;x.setTransform(d,0,0,d,0,0)}onresize=size;size();const R=(a,b)=>a+Math.random()*(b-a),D=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y),C=(v,a,b)=>Math.max(a,Math.min(b,v));function sound(f=400,l=.08){if(!ctxa)return;let o=ctxa.createOscillator(),g=ctxa.createGain();o.frequency.value=f;g.gain.value=.04;g.gain.exponentialRampToValueAtTime(.0001,ctxa.currentTime+l);o.connect(g).connect(ctxa.destination);o.start();o.stop(ctxa.currentTime+l)}function say(s,col='#fff'){msg.textContent=s;msg.style.color=col;msg.classList.add('on');clearTimeout(say.z);say.z=setTimeout(()=>msg.classList.remove('on'),600)}function boom(px,py,col,n=14){for(let i=0;i<n;i++){let a=R(0,7),q=R(30,180);parts.push({x:px,y:py,vx:Math.cos(a)*q,vy:Math.sin(a)*q,l:R(.3,.8),c:col})}}function gem(){let g;do g={x:R(45,W-45),y:R(75,H-45),r:8,c:['#57e8ff','#ff4fa3','#ffd166','#7dffb2'][Math.random()*4|0],a:R(0,7)};while(D(g,P)<130);gems.push(g)}function ghost(){if(trail.length<30)return;let delay=Math.max(2.1,3.2-wave*.08),target=t-delay,i=trail.findIndex(p=>p.t>=target);if(i<0)i=0;ghosts.push({i,x:trail[i].x,y:trail[i].y,fx:1,fy:0,step:0,stun:0,age:0})}function reset(){score=0;wave=1;t=spawn=0;trail.length=ghosts.length=gems.length=parts.length=rings.length=0;P.x=W/2;P.y=H/2;P.vx=P.vy=0;P.inv=1.2;P.pulse=1;for(let i=0;i<5;i++)gem();on=1;card.classList.add('hide');say('THE PATH REMEMBERS','#57e8ff')}function end(){if(!on)return;on=0;shake=18;flash=.8;boom(P.x,P.y,'#ff5c71',40);sound(130,.4);if(score>best){best=score|0;localStorage.ppbest=best;bs.textContent=best}setTimeout(()=>{card.classList.remove('hide');card.querySelector('h1').innerHTML='PATH<br>ENDED';card.querySelector('p').textContent=`Score ${score|0} · Wave ${wave} · Best ${best}`;document.getElementById('start').textContent='RUN AGAIN'},450)}function pulse(){if(!on||P.pulse<1)return;P.pulse=0;P.inv=.7;rings.push({x:P.x,y:P.y,r:8,l:.5});let n=0;ghosts.forEach(g=>{if(D(P,g)<120){g.stun=.9;n++;score+=8}});shake=6;sound(520,.15);say(n?'PHASED '+n:'PHASE PULSE','#ff4fa3')}function inp(){let a=(K.ArrowRight||K.KeyD?1:0)-(K.ArrowLeft||K.KeyA?1:0)+joy.x,b=(K.ArrowDown||K.KeyS?1:0)-(K.ArrowUp||K.KeyW?1:0)+joy.y,p=navigator.getGamepads?.()[0];if(p){a+=Math.abs(p.axes[0])>.16?p.axes[0]:0;b+=Math.abs(p.axes[1])>.16?p.axes[1]:0;let q=p.buttons[0]?.pressed;if(q&&!pad)pulse();pad=q}let m=Math.hypot(a,b)||1;return{x:a/m,y:b/m,a:Math.hypot(a,b)>.08}}function upd(dt){if(!on)return;t+=dt;wave=1+(score/130|0);P.inv=Math.max(0,P.inv-dt);P.pulse=Math.min(1,P.pulse+dt/4.8);let i=inp();P.vx+=((i.a?i.x*285:0)-P.vx)*Math.min(1,dt*7);P.vy+=((i.a?i.y*285:0)-P.vy)*Math.min(1,dt*7);P.x=C(P.x+P.vx*dt,20,W-20);P.y=C(P.y+P.vy*dt,58,H-20);let sp=Math.hypot(P.vx,P.vy);if(sp>15){P.fx=P.vx/sp;P.fy=P.vy/sp}P.step+=dt*sp*.08;trail.push({x:P.x,y:P.y,fx:P.fx,fy:P.fy,t});while(trail[0]&&trail[0].t<t-10)trail.shift();spawn+=dt;if(spawn>Math.max(.5,1.5-wave*.04)){spawn=0;ghost();if(gems.length<7)gem()}ghosts.forEach((g,j)=>{g.age+=dt;g.stun=Math.max(0,g.stun-dt);if(!g.stun){let target=t-Math.max(2.1,3.2-wave*.08);while(g.i<trail.length-1&&trail[g.i].t<target)g.i++;let p=trail[g.i];if(p){g.x+=(p.x-g.x)*Math.min(1,dt*17);g.y+=(p.y-g.y)*Math.min(1,dt*17);g.fx=p.fx;g.fy=p.fy}}g.step+=dt*8;if(P.inv<=0&&!g.stun&&D(P,g)<24)end();if(g.age>9)ghosts.splice(j,1)});gems.forEach((g,j)=>{g.a+=dt*3;if(D(P,g)<25){gems.splice(j,1);score+=10;P.pulse=Math.min(1,P.pulse+.08);boom(g.x,g.y,g.c);sound(600,.07);if(gems.length<4)gem()}});parts.forEach((p,j)=>{p.l-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.97;p.vy*=.97;if(p.l<0)parts.splice(j,1)});rings.forEach((r,j)=>{r.l-=dt;r.r+=dt*220;if(r.l<0)rings.splice(j,1)});sc.textContent=score|0;wv.textContent=wave;fill.style.width=Math.min(100,ghosts.length/18*100)+'%'}function char(px,py,fx,fy,s,ghost=0){let a=Math.atan2(fy,fx),bob=Math.sin(s*2)*2,leg=Math.sin(s*5)*6;x.save();x.translate(px,py);x.rotate(a);x.globalAlpha=ghost?.8:1;x.shadowColor=ghost?'#ff4fa3':'#57e8ff';x.shadowBlur=18;x.strokeStyle=ghost?'#ff4fa3':'#ffd166';x.lineWidth=4;x.beginPath();x.moveTo(-6,-1);x.quadraticCurveTo(-18,-6,-30,Math.sin(s*3)*5);x.stroke();x.fillStyle=ghost?'#ff4fa3':'#57e8ff';x.fillRect(-7,-6+bob,14,18);x.fillStyle=ghost?'#ffb5d5':'#eef8ff';x.beginPath();x.arc(0,-12+bob/2,8,0,7);x.fill();x.fillStyle='#0a1430';x.fillRect(2,-15+bob/2,7,4);x.strokeStyle=ghost?'#ff9aca':'#eaffff';x.lineWidth=4;x.beginPath();x.moveTo(-3,11+bob);x.lineTo(-7,19+leg/2+bob);x.moveTo(3,11+bob);x.lineTo(8,19-leg/2+bob);x.stroke();x.restore()}function draw(){x.save();x.translate(shake?R(-shake,shake):0,shake?R(-shake,shake):0);x.fillStyle='#070913';x.fillRect(0,0,W,H);x.strokeStyle='#7890c012';x.beginPath();for(let q=(t*10)%44;q<W;q+=44){x.moveTo(q,0);x.lineTo(q,H)}for(let q=(t*6)%44;q<H;q+=44){x.moveTo(0,q);x.lineTo(W,q)}x.stroke();if(trail.length){x.strokeStyle='#57e8ff24';x.beginPath();trail.forEach((p,i)=>i?x.lineTo(p.x,p.y):x.moveTo(p.x,p.y));x.stroke()}gems.forEach(g=>{x.save();x.translate(g.x,g.y);x.rotate(g.a);x.fillStyle=g.c;x.shadowColor=g.c;x.shadowBlur=20;x.fillRect(-7,-7,14,14);x.restore()});ghosts.forEach(g=>char(g.x,g.y,g.fx,g.fy,g.step,1));rings.forEach(r=>{x.strokeStyle='#ff4fa3';x.beginPath();x.arc(r.x,r.y,r.r,0,7);x.stroke()});parts.forEach(p=>{x.fillStyle=p.c;x.globalAlpha=Math.max(0,p.l);x.fillRect(p.x,p.y,3,3)});x.globalAlpha=1;if(on)char(P.x,P.y,P.fx,P.fy,P.step);if(flash){x.fillStyle=`rgba(255,80,110,${flash*.3})`;x.fillRect(0,0,W,H)}x.restore();shake=Math.max(0,shake-.7);flash=Math.max(0,flash-.03)}function loop(n){let dt=Math.min(.033,(n-last)/1000||0);last=n;upd(dt);draw();requestAnimationFrame(loop)}requestAnimationFrame(loop);onkeydown=e=>{K[e.code]=1;if(e.code==='Space'){e.preventDefault();pulse()}if(!on&&e.code==='Enter')reset()};onkeyup=e=>K[e.code]=0;document.getElementById('start').onclick=()=>{ctxa=new(window.AudioContext||webkitAudioContext)();reset()};document.getElementById('pulse').onpointerdown=pulse;const st=document.getElementById('stick'),kn=document.getElementById('knob');let id;function jm(e){let r=st.getBoundingClientRect(),dx=e.clientX-r.left-r.width/2,dy=e.clientY-r.top-r.height/2,m=Math.hypot(dx,dy),l=40;if(m>l){dx=dx/m*l;dy=dy/m*l}joy.x=dx/l;joy.y=dy/l;kn.style.transform=`translate(${dx}px,${dy}px)`}st.onpointerdown=e=>{id=e.pointerId;st.setPointerCapture(id);jm(e)};st.onpointermove=e=>{if(e.pointerId===id)jm(e)};st.onpointerup=st.onpointercancel=e=>{if(e.pointerId===id){id=null;joy.x=joy.y=0;kn.style.transform='none'}}})();</script></body></html>
