<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beer Pong Pro - K2 games</title>
    <style>
        :root {
            --table: #3e2723;
            --cup: #ef4444;
            --rim: #ffffff;
            --ball: #ffffff;
            --bg: #1e293b;
            --accent: #facc15;
        }

        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; touch-action: none; display: flex; flex-direction: column; height: 100vh; }

        #game-container { position: relative; width: 100%; flex-grow: 1; background: #0f172a; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }

        #ui-layer {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; pointer-events: none; z-index: 10;
        }
        
        .score-card {
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            padding: 10px 25px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .team-name { font-size: 0.8rem; text-transform: uppercase; color: #94a3b8; font-weight: 700; letter-spacing: 1px; }
        .cup-count { font-size: 2.5rem; font-weight: 900; color: var(--accent); }

        #turn-indicator {
            position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #000; padding: 10px 30px;
            border-radius: 20px; font-weight: 900; font-size: 1.2rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: transform 0.2s;
        }

        #power-meter {
            position: absolute; bottom: 40px; right: 30px; width: 30px; height: 200px;
            background: rgba(255,255,255,0.1); border: 2px solid white; border-radius: 15px;
            overflow: hidden; display: none;
        }
        #power-fill {
            width: 100%; height: 0%; background: linear-gradient(to top, #22c55e, #eab308, #ef4444);
            position: absolute; bottom: 0; transition: height 0.05s linear;
        }

        #overlay {
            position: absolute; inset: 0; background: rgba(15, 23, 42, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; text-align: center;
        }
        h1 { font-size: 4rem; color: var(--accent); font-style: italic; font-weight: 900; margin: 0; }
        .btn {
            padding: 20px 60px; font-size: 1.5rem; background: var(--cup); color: white;
            border: none; border-radius: 50px; font-weight: 900; cursor: pointer; margin-top: 40px;
            box-shadow: 0 10px 0 #991b1b; transition: transform 0.1s;
        }
        .btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #991b1b; }

        .back-link { position: fixed; top: 20px; left: 20px; color: white; text-decoration: none; font-size: 0.8rem; z-index: 200; opacity: 0.5; }
    </style>

<body>
    <a href="index.html" class="back-link">← HUB</a>

    <div id="game-container">
        <div id="ui-layer">
            <div class="score-card">
                <div class="team-name">Player</div>
                <div id="p1-score" class="cup-count">10</div>
            </div>
            <div class="score-card">
                <div class="team-name">CPU</div>
                <div id="p2-score" class="cup-count">10</div>
            </div>
        </div>

        <div id="turn-indicator">YOUR TURN</div>
        
        <div id="power-meter"><div id="power-fill"></div></div>
        
        <canvas id="gameCanvas"></canvas>

        <div id="overlay">
            <h1>BEER PONG<br>PRO</h1>
            <p style="color: #cbd5e1; margin-top: 20px; font-weight: bold;">
                Drag to Aim. Release to Throw.<br>Hit all cups to win!
            </p>
            <button class="btn" onclick="window.game.start()">PLAY</button>
        </div>
    </div>

    <script>
        class BeerPong {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                this.state = 'MENU'; // MENU, AIMING, THROWING, BALL_FLYING, CHECK_RESULT, AI_TURN, GAME_OVER
                this.turn = 'PLAYER';
                
                this.cupsP1 = [];
                this.cupsP2 = [];
                this.ball = { x: 0, y: 0, z: 0, vx: 0, vy: 0, vz: 0, radius: 6, active: false };
                
                this.dragStart = null;
                this.power = 0;
                this.aimAngle = 0;
                
                this.resize();
                this.setupInput();
                window.addEventListener('resize', () => this.resize());
                
                this.loop = this.loop.bind(this);
                requestAnimationFrame(this.loop);
            }

            resize() {
                this.width = window.innerWidth;
                this.height = window.innerHeight;
                this.canvas.width = this.width;
                this.canvas.height = this.height;
                // Center table
                this.table = {
                    x: this.width / 2,
                    y: this.height / 2,
                    w: Math.min(400, this.width * 0.8),
                    h: Math.min(800, this.height * 0.8)
                };
            }

            setupInput() {
                const start = (e) => {
                    if (this.state !== 'AIMING' || this.turn !== 'PLAYER') return;
                    const t = e.touches ? e.touches[0] : e;
                    this.dragStart = { x: t.clientX, y: t.clientY };
                    this.power = 0;
                    document.getElementById('power-meter').style.display = 'block';
                };

                const move = (e) => {
                    if (!this.dragStart) return;
                    const t = e.touches ? e.touches[0] : e;
                    const dy = this.dragStart.y - t.clientY;
                    const dx = this.dragStart.x - t.clientX;
                    
                    // Power based on drag down
                    this.power = Math.min(100, Math.max(0, dy * 0.5));
                    document.getElementById('power-fill').style.height = this.power + '%';
                    
                    // Angle
                    this.aimAngle = dx * 0.005;
                };

                const end = (e) => {
                    if (!this.dragStart) return;
                    this.throwBall(this.power, this.aimAngle);
                    this.dragStart = null;
                    document.getElementById('power-meter').style.display = 'none';
                };

                this.canvas.addEventListener('mousedown', start);
                this.canvas.addEventListener('mousemove', move);
                window.addEventListener('mouseup', end);
                
                this.canvas.addEventListener('touchstart', start, {passive: false});
                this.canvas.addEventListener('touchmove', (e) => { move(e); e.preventDefault(); }, {passive: false});
                window.addEventListener('touchend', end);
            }

            initCups() {
                this.cupsP1 = []; // Bottom (Player)
                this.cupsP2 = []; // Top (CPU)
                
                const startY_P1 = this.table.y + this.table.h/2 - 80;
                const startY_P2 = this.table.y - this.table.h/2 + 80;
                const cupR = 18;
                const gap = 5;

                // Triangle formation logic
                const rows = [4, 3, 2, 1];
                let yOff = 0;
                
                // CPU Cups (Target)
                rows.forEach((count, r) => {
                    const rowW = count * (cupR*2 + gap) - gap;
                    let startX = this.table.x - rowW/2 + cupR;
                    for(let c=0; c<count; c++) {
                        this.cupsP2.push({ x: startX + c*(cupR*2+gap), y: startY_P2 + yOff, r: cupR, active: true });
                    }
                    yOff += (cupR*2); // Move down towards center
                });

                // Player Cups (Visual mostly)
                yOff = 0;
                rows.forEach((count, r) => {
                    const rowW = count * (cupR*2 + gap) - gap;
                    let startX = this.table.x - rowW/2 + cupR;
                    for(let c=0; c<count; c++) {
                        this.cupsP1.push({ x: startX + c*(cupR*2+gap), y: startY_P1 - yOff, r: cupR, active: true });
                    }
                    yOff += (cupR*2);
                });
            }

            start() {
                document.getElementById('overlay').style.display = 'none';
                this.initCups();
                this.turn = 'PLAYER';
                this.startTurn();
            }

            startTurn() {
                this.state = this.turn === 'PLAYER' ? 'AIMING' : 'AI_TURN';
                const ind = document.getElementById('turn-indicator');
                ind.textContent = this.turn === 'PLAYER' ? "YOUR TURN" : "CPU TURN";
                ind.style.background = this.turn === 'PLAYER' ? "#facc15" : "#ef4444";
                
                // Reset ball position
                this.ball.active = false;
                this.ball.z = 0;
                
                if (this.turn === 'AI_TURN') {
                    setTimeout(() => this.aiThrow(), 1000);
                }
            }

            aiThrow() {
                // Pick a target cup
                const targets = this.cupsP1.filter(c => c.active);
                if (targets.length === 0) return;
                
                const target = targets[Math.floor(Math.random() * targets.length)];
                
                // Calculate distance
                const startX = this.table.x;
                const startY = this.table.y - this.table.h/2 - 20; // Top
                
                const dx = target.x - startX;
                const dy = target.y - startY;
                
                // AI Error
                const errX = (Math.random()-0.5) * 30; 
                const errY = (Math.random()-0.5) * 30;

                // Simple physics calc simulation
                const dist = Math.hypot(dx + errX, dy + errY);
                const speed = dist * 0.028; // Adjusted throw power
                
                const angle = Math.atan2(dy + errY, dx + errX);
                
                this.ball.x = startX;
                this.ball.y = startY;
                this.ball.z = 50;
                
                this.ball.vx = Math.cos(angle) * speed;
                this.ball.vy = Math.sin(angle) * speed;
                this.ball.vz = 8; // Arc height
                
                this.ball.active = true;
                this.state = 'BALL_FLYING';
            }

            throwBall(power, angle) {
                // Ball starts at bottom center
                this.ball.x = this.table.x;
                this.ball.y = this.table.y + this.table.h/2 + 20;
                this.ball.z = 50; // Height off ground
                
                // Reduced power for better control
                const speed = 4 + (power / 100) * 10;
                
                // Convert angle to velocity vector (shooting UP screen = negative Y)
                this.ball.vx = -Math.sin(angle) * speed * 0.5; // X aims left/right
                this.ball.vy = -speed; // Y aims up
                this.ball.vz = 4 + (power/100) * 8; // Lower arc
                
                this.ball.active = true;
                this.state = 'BALL_FLYING';
            }

            update() {
                if (this.state === 'BALL_FLYING') {
                    // Physics
                    this.ball.x += this.ball.vx;
                    this.ball.y += this.ball.vy;
                    this.ball.z += this.ball.vz;
                    this.ball.vz -= 0.25; // Gravity

                    // Bounce
                    if (this.ball.z <= 0) {
                        this.ball.z = 0;
                        this.ball.vz *= -0.6; // Dampen
                        this.ball.vx *= 0.8;
                        this.ball.vy *= 0.8;
                        
                        // Stop if slow
                        if (Math.abs(this.ball.vz) < 1 && Math.abs(this.ball.vy) < 1) {
                            this.ball.active = false;
                            this.state = 'CHECK_RESULT';
                            setTimeout(() => this.endTurn(false), 500);
                        }
                    }

                    // Check Cups (in mid-air or bounce)
                    if (this.ball.z < 20) { // Height check for rim
                        const targetCups = this.turn === 'PLAYER' ? this.cupsP2 : this.cupsP1;
                        for (let cup of targetCups) {
                            if (cup.active) {
                                const dist = Math.hypot(this.ball.x - cup.x, this.ball.y - cup.y);
                                if (dist < cup.r * 0.8) {
                                    // Sunk!
                                    cup.active = false;
                                    this.ball.active = false;
                                    this.state = 'CHECK_RESULT';
                                    setTimeout(() => this.endTurn(true), 500);
                                    return;
                                } else if (dist < cup.r + this.ball.radius) {
                                    // Rim hit (bounce away)
                                    this.ball.vx *= -1;
                                    this.ball.vy *= -1;
                                }
                            }
                        }
                    }
                    
                    // Miss bounds
                    if (this.ball.y < -100 || this.ball.y > this.height + 100) {
                        this.state = 'CHECK_RESULT';
                        setTimeout(() => this.endTurn(false), 500);
                    }
                }
            }

            endTurn(scored) {
                const p1Count = this.cupsP1.filter(c => c.active).length;
                const p2Count = this.cupsP2.filter(c => c.active).length;
                
                document.getElementById('p1-score').textContent = p1Count;
                document.getElementById('p2-score').textContent = p2Count;

                if (p1Count === 0 || p2Count === 0) {
                    this.gameOver(p2Count === 0);
                } else {
                    // Switch
                    this.turn = this.turn === 'PLAYER' ? 'AI_TURN' : 'PLAYER';
                    this.startTurn();
                }
            }

            gameOver(playerWon) {
                this.state = 'GAME_OVER';
                const over = document.getElementById('overlay');
                over.style.display = 'flex';
                over.querySelector('h1').textContent = playerWon ? "YOU WIN!" : "CPU WINS!";
                over.querySelector('p').textContent = "Another round?";
                over.querySelector('button').textContent = "REMATCH";
            }

            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.width, this.height);

                // Table
                ctx.fillStyle = '#3e2723';
                ctx.fillRect(this.table.x - this.table.w/2, this.table.y - this.table.h/2, this.table.w, this.table.h);
                // Table Stripe
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.fillRect(this.table.x - 2, this.table.y - this.table.h/2, 4, this.table.h);

                // Draw Cups
                const drawCup = (c) => {
                    if (!c.active) return;
                    // Shadow
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.beginPath(); ctx.arc(c.x + 5, c.y + 5, c.r, 0, Math.PI*2); ctx.fill();
                    // Cup Body
                    ctx.fillStyle = '#ef4444';
                    ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.fill();
                    // Inner Drink
                    ctx.fillStyle = '#f59e0b';
                    ctx.beginPath(); ctx.arc(c.x, c.y, c.r - 4, 0, Math.PI*2); ctx.fill();
                    // White Brim
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.arc(c.x, c.y, c.r - 1, 0, Math.PI*2); ctx.stroke();
                };

                this.cupsP2.forEach(drawCup);
                this.cupsP1.forEach(drawCup);

                // Draw Ball
                if (this.state === 'BALL_FLYING' || this.state === 'CHECK_RESULT') {
                    // Ball Shadow (scale with height)
                    const shadowScale = Math.max(0.2, 1 - this.ball.z / 100);
                    ctx.fillStyle = 'rgba(0,0,0,0.4)';
                    ctx.beginPath();
                    ctx.ellipse(this.ball.x + this.ball.z*0.2, this.ball.y + this.ball.z*0.2, this.ball.radius*shadowScale, this.ball.radius*0.6*shadowScale, 0, 0, Math.PI*2);
                    ctx.fill();

                    // Ball (scale with height for pseudo-3D)
                    const scale = 1 + this.ball.z * 0.01;
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(this.ball.x, this.ball.y, this.ball.radius * scale, 0, Math.PI*2);
                    ctx.fill();
                    // Shading
                    ctx.fillStyle = 'rgba(0,0,0,0.1)';
                    ctx.beginPath();
                    ctx.arc(this.ball.x - 2*scale, this.ball.y - 2*scale, this.ball.radius * scale * 0.8, 0, Math.PI*2);
                    ctx.fill();
                } else if (this.state === 'AIMING') {
                    // Ghost ball at start
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.beginPath();
                    ctx.arc(this.table.x, this.table.y + this.table.h/2 + 20, this.ball.radius, 0, Math.PI*2);
                    ctx.fill();
                    
                    if (this.dragStart) {
                        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                        ctx.lineWidth = 2;
                        ctx.setLineDash([5, 5]);
                        ctx.beginPath();
                        ctx.moveTo(this.table.x, this.table.y + this.table.h/2 + 20);
                        // Visualize trajectory
                        const aimX = this.table.x - (this.aimAngle * 500);
                        const aimY = (this.table.y + this.table.h/2) - (this.power * 5);
                        ctx.lineTo(aimX, aimY);
                        ctx.stroke();
                        ctx.setLineDash([]);
                    }
                }
            }

            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(this.loop);
            }
        }

        window.game = new BeerPong();
    </script>
</body>
