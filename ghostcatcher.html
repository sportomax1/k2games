<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostCatcher: Phantom Protocol - K2 games</title>
    <style>
        :root {
            --primary: #a855f7;
            --accent: #22d3ee;
            --danger: #ef4444;
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.9);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: none; }
        
        body {
            background-color: var(--bg);
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }

        #hud {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; pointer-events: none; z-index: 50;
        }

        .stat-card {
            background: var(--panel); backdrop-filter: blur(10px);
            padding: 10px 20px; border-radius: 15px; border: 1px solid var(--glass-border);
            display: flex; flex-direction: column; min-width: 120px;
        }

        .stat-label { font-size: 0.6rem; text-transform: uppercase; color: #94a3b8; }
        .stat-val { font-size: 1.4rem; font-weight: 900; font-family: monospace; color: var(--accent); }

        #mobile-controls {
            position: absolute; bottom: 30px; left: 0; right: 0;
            padding: 0 30px; display: none; justify-content: space-between; align-items: flex-end; z-index: 60;
        }
        @media (max-width: 900px) { #mobile-controls { display: flex; } }

        .joystick-base { width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); position: relative; pointer-events: auto; }
        .joystick-thumb { width: 50px; height: 50px; background: #fff; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .action-btns { display: flex; gap: 15px; pointer-events: auto; }
        .circle-btn { width: 75px; height: 75px; border-radius: 50%; background: var(--panel); border: 2px solid var(--primary); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: white; }

        .screen-overlay { position: absolute; inset: 0; background: rgba(2, 6, 23, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px; }
        .btn-large { background: var(--primary); color: white; border: none; padding: 1rem 3rem; border-radius: 50px; font-weight: 800; cursor: pointer; font-size: 1.2rem; }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CCZ9JJGEDP');
    </script>
</head>
<body>
    <a href="index.html" style="position:fixed; top:20px; left:50%; transform:translateX(-50%); color:#94a3b8; text-decoration:none; font-size:0.8rem; z-index:70;">← EXIT</a>

    <div id="hud">
        <div class="stat-card"><span class="stat-label">Ghosts</span><span id="score-val" class="stat-val">0</span></div>
        <div class="stat-card" style="align-items: flex-end;"><span class="stat-label">Stability</span><span id="hp-val" class="stat-val">100%</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="mobile-controls">
        <div class="joystick-base" id="joy-base"><div class="joystick-thumb" id="joy-thumb"></div></div>
        <div class="action-btns">
            <div class="circle-btn" id="btn-trap">🪤</div>
            <div class="circle-btn" id="btn-fire">🔥</div>
        </div>
    </div>

    <div id="start-screen" class="screen-overlay">
        <h1 style="font-size: 3.5rem; color: var(--primary);">GHOSTCATCHER</h1>
        <p style="opacity: 0.7; margin-top: 5px;">Spectral Containment Unit</p>
        <button class="btn-large" onclick="game.start()">ENGAGE SCAN</button>
    </div>

    <script>
        class GhostCatcher {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                this.player = { x: 0, y: 0, r: 25, speed: 5, angle: 0, hp: 100 };
                this.mouse = { x: 0, y: 0, down: false };
                this.joy = { active: false, x: 0, y: 0 };
                this.ghosts = []; this.particles = []; this.traps = [];
                this.score = 0; this.gameActive = false;
                this.setupInputs();
                requestAnimationFrame(() => this.loop());
            }

            resize() { this.width = window.innerWidth; this.height = window.innerHeight; this.canvas.width = this.width; this.canvas.height = this.height; }

            setupInputs() {
                const base = document.getElementById('joy-base'), thumb = document.getElementById('joy-thumb');
                base.addEventListener('touchstart', (e) => { this.joy.active = true; e.preventDefault(); });
                window.addEventListener('touchmove', (e) => {
                    if(!this.joy.active) return;
                    const r = base.getBoundingClientRect(); const t = e.touches[0];
                    const dx = t.clientX - (r.left + r.width/2), dy = t.clientY - (r.top + r.height/2);
                    const d = Math.min(50, Math.hypot(dx, dy)), a = Math.atan2(dy, dx);
                    this.joy.x = (Math.cos(a)*d)/50; this.joy.y = (Math.sin(a)*d)/50;
                    thumb.style.transform = `translate(calc(-50% + ${Math.cos(a)*d}px), calc(-50% + ${Math.sin(a)*d}px))`;
                });
                window.addEventListener('touchend', () => { this.joy.active = false; this.joy.x = 0; this.joy.y = 0; thumb.style.transform = 'translate(-50%, -50%)'; });
                document.getElementById('btn-fire').addEventListener('touchstart', (e) => { this.mouse.down = !this.mouse.down; e.preventDefault(); });
                document.getElementById('btn-trap').addEventListener('touchstart', (e) => { this.spawnTrap(); e.preventDefault(); });
                window.onmousemove = (e) => { this.mouse.x = e.clientX; this.mouse.y = e.clientY; };
                window.onmousedown = () => this.mouse.down = true; window.onmouseup = () => this.mouse.down = false;
            }

            start() { document.getElementById('start-screen').style.display = 'none'; this.player.x = this.width/2; this.player.y = this.height/2; for(let i=0; i<5; i++) this.spawnGhost(); this.gameActive = true; }

            spawnGhost() {
                const a = Math.random()*Math.PI*2;
                this.ghosts.push({
                    x: this.player.x + Math.cos(a)*800, y: this.player.y + Math.sin(a)*800,
                    color: `hsl(${Math.random()*360}, 70%, 70%)`, hp: 100, t: Math.random()*100
                });
            }

            spawnTrap() { if(this.traps.length < 1) this.traps.push({ x: this.player.x, y: this.player.y, r: 100, l: 500 }); }

            update() {
                if(!this.gameActive) return;
                if(this.joy.active) { this.player.x += this.joy.x*5; this.player.y += this.joy.y*5; this.player.angle = Math.atan2(this.joy.y, this.joy.x); }
                else { this.player.angle = Math.atan2(this.mouse.y - this.player.y, this.mouse.x - this.player.x); }

                this.ghosts.forEach((g, gi) => {
                    g.t += 0.05; g.x += Math.cos(g.t)*2; g.y += Math.sin(g.t*0.8)*2;
                    const d = Math.hypot(g.x - this.player.x, g.y - this.player.y);
                    if(this.mouse.down && d < 400) {
                        const a = Math.atan2(g.y - this.player.y, g.x - this.player.x);
                        if(Math.abs(a - this.player.angle) < 0.4) { g.hp -= 1.5; g.x += (this.player.x - g.x)*0.02; g.y += (this.player.y - g.y)*0.02; }
                    }
                });

                this.traps.forEach((t, ti) => {
                    t.l--; this.ghosts.forEach((g, gi) => {
                        if(Math.hypot(g.x-t.x, g.y-t.y) < t.r && g.hp < 30) {
                            g.x += (t.x-g.x)*0.1; g.y += (t.y-g.y)*0.1;
                            if(Math.hypot(g.x-t.x, g.y-t.y) < 10) { this.ghosts.splice(gi, 1); this.score++; this.spawnGhost(); }
                        }
                    });
                    if(t.l <= 0) this.traps.splice(ti, 1);
                });

                document.getElementById('score-val').textContent = this.score;
                document.getElementById('hp-val').textContent = Math.ceil(this.player.hp) + '%';
            }

            draw() {
                const ctx = this.ctx; ctx.fillStyle = '#020617'; ctx.fillRect(0,0,this.width,this.height);
                this.traps.forEach(t => { ctx.fillStyle = '#fbbf24'; ctx.fillRect(t.x-10, t.y-5, 20, 10); ctx.strokeStyle = '#22d3ee'; ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, Math.PI*2); ctx.stroke(); });
                this.ghosts.forEach(g => {
                    ctx.save(); ctx.globalAlpha = 0.6; ctx.fillStyle = g.color; ctx.shadowBlur = 20; ctx.shadowColor = g.color;
                    ctx.beginPath(); ctx.ellipse(g.x, g.y, 20, 25, 0, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(g.x-7, g.y-5, 3, 0, Math.PI*2); ctx.arc(g.x+7, g.y-5, 3, 0, Math.PI*2); ctx.fill();
                    ctx.restore();
                });
                if(this.mouse.down) { ctx.strokeStyle = '#fb923c'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(this.player.x, this.player.y); ctx.lineTo(this.player.x + Math.cos(this.player.angle)*400, this.player.y + Math.sin(this.player.angle)*400); ctx.stroke(); }
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(this.player.x, this.player.y, 20, 0, Math.PI*2); ctx.fill();
            }

            loop() { this.update(); this.draw(); requestAnimationFrame(() => this.loop()); }
        }
        window.game = new GhostCatcher();
    </script>
</body>
</html>
