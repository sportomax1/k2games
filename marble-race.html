<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marble Rush Lab 2D - K2 Games</title>
<link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8Xw8AAnUB9WQ0N2IAAAAASUVORK5CYII=">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#101825;color:#f8fafc;font-family:Inter,"Segoe UI",system-ui,sans-serif;padding:16px;display:flex;flex-direction:column;align-items:center}
a.back{align-self:flex-start;color:#9fb2cc;text-decoration:none;font-size:.82rem;font-weight:800;margin-bottom:8px}
h1{font-size:clamp(2.2rem,6vw,4.4rem);line-height:.9;text-transform:uppercase;letter-spacing:0;background:linear-gradient(135deg,#7dd3fc,#fbbf24,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{margin:8px 0 14px;color:#94a3b8;font-size:.76rem;font-weight:900;text-transform:uppercase;letter-spacing:2px;text-align:center}
.layout{width:min(1120px,100%);display:grid;grid-template-columns:minmax(320px,720px) 300px;gap:16px;align-items:start}
#wrap{position:relative;background:#0b1220;border:1px solid rgba(255,255,255,.12);box-shadow:0 24px 60px rgba(0,0,0,.34);overflow:hidden}
canvas{display:block;width:100%;height:auto;max-height:calc(100vh - 155px)}
.panel{background:#172033;border:1px solid rgba(255,255,255,.1);padding:14px;display:flex;flex-direction:column;gap:12px}
.wallet{text-align:center;font-weight:1000;font-size:1.8rem;color:#fbbf24}.wallet span{display:block;font-size:.72rem;color:#94a3b8;font-weight:900;text-transform:uppercase}
.section{font-size:.7rem;color:#7dd3fc;font-weight:1000;text-transform:uppercase;letter-spacing:1.4px}
.marbles{display:grid;grid-template-columns:1fr 1fr;gap:8px}.pick{border:2px solid transparent;background:#0b1220;color:#cbd5e1;padding:8px;display:flex;align-items:center;gap:8px;font-weight:900;cursor:pointer}.pick:hover,.pick.selected{border-color:#fbbf24;background:#111c2e}.dot{width:18px;height:18px;border-radius:50%;box-shadow:inset -4px -5px 8px rgba(0,0,0,.25),inset 4px 4px 6px rgba(255,255,255,.25)}
.row{display:flex;gap:8px;align-items:center}.row input{flex:1;min-width:0;padding:10px;background:#0b1220;border:1px solid rgba(255,255,255,.12);color:#f8fafc;font:inherit;font-weight:900;text-align:center}.presets{display:flex;gap:6px;flex-wrap:wrap}.presets button,.big{border:0;background:#263247;color:#dbeafe;padding:8px 10px;font:inherit;font-size:.8rem;font-weight:1000;cursor:pointer}.presets button:hover{background:#33415d}.big{width:100%;min-height:46px;background:#22c55e;color:#06120a;font-size:1rem}.big.secondary{background:#33415d;color:#f8fafc}.big:disabled{opacity:.45;cursor:not-allowed}
.results{display:none;background:#0b1220;border:1px solid rgba(255,255,255,.1);padding:12px;line-height:1.7;font-size:.86rem}.results.show{display:block}.win{color:#22c55e;font-weight:1000}.loss{color:#fb7185;font-weight:1000}.msg{text-align:center;color:#fbbf24;font-weight:1000;min-height:20px}
#banner{position:absolute;inset:0;display:grid;place-items:center;background:rgba(8,14,24,.78);opacity:0;pointer-events:none;transition:opacity .25s;text-align:center}#banner.show{opacity:1}.banner-title{font-size:clamp(2rem,7vw,4.8rem);font-weight:1000;color:#fbbf24;text-shadow:0 0 34px rgba(251,191,36,.42)}.banner-sub{color:#cbd5e1;font-weight:900;margin-top:6px}
@media(max-width:860px){.layout{grid-template-columns:1fr}.panel{width:100%}canvas{max-height:none}}
</style>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>

<body>
<a class="back" href="index.html">HUB</a>
<h1>Marble Rush Lab 2D</h1>
<p class="subtitle">2D physics race / bumpers / bets / instant remixes</p>
<div class="layout">
  <div id="wrap"><canvas id="c" width="720" height="920"></canvas><div id="banner"><div><div class="banner-title" id="banner-title">READY</div><div class="banner-sub" id="banner-sub">Pick a marble and start.</div></div></div></div>
  <div class="panel">
    <div class="wallet"><span>Wallet</span>$<b id="wallet">1000</b></div>
    <div><div class="section">Pick A Marble</div><div class="marbles" id="picks"></div></div>
    <div><div class="section">Bet Amount</div><div class="row"><span>$</span><input id="bet" type="number" min="10" step="10" value="50"></div><div class="presets"><button data-bet="10">$10</button><button data-bet="25">$25</button><button data-bet="50">$50</button><button data-bet="100">$100</button><button data-bet="250">$250</button><button id="allin">All In</button></div></div>
    <button class="big" id="start">Start Race</button>
    <button class="big secondary" id="remix">Remix Track</button>
    <div class="msg" id="msg"></div>
    <div class="results" id="results"></div>
  </div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),W=720,H=920,finishY=875;
const colors=[
 {name:'Red',hex:'#ef4444',dark:'#991b1b'},{name:'Blue',hex:'#3b82f6',dark:'#1d4ed8'},
 {name:'Green',hex:'#22c55e',dark:'#166534'},{name:'Gold',hex:'#eab308',dark:'#854d0e'},
 {name:'Purple',hex:'#a855f7',dark:'#6b21a8'},{name:'Cyan',hex:'#06b6d4',dark:'#155e75'},
 {name:'Pink',hex:'#ec4899',dark:'#9d174d'},{name:'Lime',hex:'#84cc16',dark:'#3f6212'}
];
let wallet=+localStorage.getItem('mrl_wallet')||1000,selected=0,bet=50,phase='idle',marbles=[],walls=[],bumpers=[],boosts=[],finish=[],tick=0,seed=Math.random()*9999,raf=null;
const ui={wallet:document.getElementById('wallet'),picks:document.getElementById('picks'),bet:document.getElementById('bet'),msg:document.getElementById('msg'),results:document.getElementById('results'),banner:document.getElementById('banner'),bt:document.getElementById('banner-title'),bs:document.getElementById('banner-sub')};
const rnd=(a,b)=>a+Math.random()*(b-a);
function showBanner(t,s,ms=1200){ui.bt.textContent=t;ui.bs.textContent=s;ui.banner.classList.add('show');clearTimeout(showBanner.t);showBanner.t=setTimeout(()=>ui.banner.classList.remove('show'),ms)}
function buildPickers(){ui.picks.innerHTML=colors.map((c,i)=>`<button class="pick ${i===selected?'selected':''}" data-i="${i}"><span class="dot" style="background:${c.hex}"></span>${c.name}</button>`).join('');ui.picks.querySelectorAll('.pick').forEach(b=>b.onclick=()=>{selected=+b.dataset.i;buildPickers()})}
function saveWallet(){localStorage.setItem('mrl_wallet',wallet);ui.wallet.textContent=wallet}
function wall(ax,ay,bx,by,type='wall'){walls.push({ax,ay,bx,by,type})}
function makeTrack(){
 walls=[];bumpers=[];boosts=[];finish=[];Math.random=(()=>{let s=seed%2147483647;return()=>((s=s*16807%2147483647)-1)/2147483646})();
 wall(28,35,28,H-12,'rail');wall(W-28,35,W-28,H-12,'rail');wall(70,70,300,126);wall(650,70,420,126);
 const rows=[185,270,360,455,550,650,752];rows.forEach((y,row)=>{const left=row%2===0;const gap=130+rnd(-35,35);if(left){wall(40,y,420-gap/2,y+35);wall(420+gap/2,y+15,680,y-25)}else{wall(40,y-25,300-gap/2,y+15);wall(300+gap/2,y+35,680,y)}});
 for(let i=0;i<12;i++)bumpers.push({x:rnd(92,628),y:160+i*56+rnd(-16,16),r:rnd(15,28),pulse:rnd(0,Math.PI*2)});
 for(let i=0;i<5;i++)boosts.push({x:rnd(130,590),y:230+i*120,r:24,used:false,a:rnd(-.9,.9)});
 wall(70,finishY,W-70,finishY,'finish');
 resetMarbles();
 Math.random=window.crypto?Math.random:Math.random;
}
function resetMarbles(){marbles=colors.map((c,i)=>({i,c,x:82+i*79,y:42,vx:rnd(-8,8),vy:0,r:11,done:false,place:0,trail:[],spin:0}))}
function startRace(){if(phase==='race')return;bet=Math.max(10,Math.floor(+ui.bet.value||0));if(bet>wallet){ui.msg.textContent='Not enough cash for that bet.';return}wallet-=bet;saveWallet();finish=[];resetMarbles();phase='race';tick=0;ui.results.classList.remove('show');ui.msg.textContent='Racing...';showBanner('DROP','Marbles are live.',900)}
function remix(){seed=Math.random()*9999;makeTrack();phase='idle';ui.results.classList.remove('show');showBanner('REMIXED','Fresh bumper layout.',900)}
function step(){
 if(phase==='race'){tick++;
  marbles.forEach(m=>{if(m.done)return;m.vy+=.34;m.vx+=Math.sin((tick+m.i*21)*.021)*.035;m.vx*=.993;m.vy*=.998;m.x+=m.vx;m.y+=m.vy;m.spin+=Math.hypot(m.vx,m.vy)*.12;m.trail.push([m.x,m.y]);if(m.trail.length>16)m.trail.shift();
   walls.forEach(w=>collideWall(m,w));bumpers.forEach(b=>collideBumper(m,b));boosts.forEach(b=>{if(Math.hypot(m.x-b.x,m.y-b.y)<m.r+b.r){m.vy+=Math.cos(b.a)*4.8;m.vx+=Math.sin(b.a)*5.2;b.used=true}});
   if(m.x<m.r+28){m.x=m.r+28;m.vx=Math.abs(m.vx)*.62}if(m.x>W-28-m.r){m.x=W-28-m.r;m.vx=-Math.abs(m.vx)*.62}
   if(m.y>finishY&&!m.done){m.done=true;m.place=finish.length+1;finish.push(m)}
  });
  if(finish.length===marbles.length||tick>3600)endRace();
 }
 draw();raf=requestAnimationFrame(step)
}
function collideWall(m,w){const ax=w.ax,ay=w.ay,bx=w.bx,by=w.by,dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy||1,t=Math.max(0,Math.min(1,((m.x-ax)*dx+(m.y-ay)*dy)/l2)),px=ax+dx*t,py=ay+dy*t,ox=m.x-px,oy=m.y-py,d=Math.hypot(ox,oy);if(d<m.r+3&&d>0){const nx=ox/d,ny=oy/d,over=m.r+3-d;m.x+=nx*over;m.y+=ny*over;const dot=m.vx*nx+m.vy*ny;if(dot<0){m.vx-=1.55*dot*nx;m.vy-=1.55*dot*ny;m.vx*=.92;m.vy*=.92}}}
function collideBumper(m,b){const dx=m.x-b.x,dy=m.y-b.y,d=Math.hypot(dx,dy);if(d<m.r+b.r){const nx=dx/(d||1),ny=dy/(d||1),p=(m.r+b.r-d);m.x+=nx*p;m.y+=ny*p;const impulse=7.5;m.vx+=nx*impulse;m.vy+=ny*impulse;b.pulse=1}}
function endRace(){phase='done';const winner=finish[0]||marbles.slice().sort((a,b)=>b.y-a.y)[0];const picked=finish.find(m=>m.i===selected)||marbles[selected];let html=`<div class="${winner.i===selected?'win':'loss'}">${winner.i===selected?'You won!':'You lost.'}</div>`;if(winner.i===selected){const payout=bet*4;wallet+=payout;html+=`Payout: $${payout}<br>`}html+=`Winner: ${winner.c.name}<br>Your marble: ${picked.place?ordinal(picked.place):'DNF'}<hr style="border-color:rgba(255,255,255,.08);margin:8px 0">`+finish.slice(0,5).map(m=>`${ordinal(m.place)} ${m.c.name}`).join('<br>');saveWallet();ui.results.innerHTML=html;ui.results.classList.add('show');ui.msg.textContent='Race complete.';showBanner(winner.i===selected?'WIN':'FINISH',`${winner.c.name} took first.`,1500)}
function ordinal(n){return n===1?'1st':n===2?'2nd':n===3?'3rd':n+'th'}
function draw(){
 const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#172033');g.addColorStop(.45,'#0f172a');g.addColorStop(1,'#111827');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
 ctx.strokeStyle='rgba(125,211,252,.08)';ctx.lineWidth=1;for(let y=0;y<H;y+=28){ctx.beginPath();ctx.moveTo(0,y+tick%28);ctx.lineTo(W,y+tick%28);ctx.stroke()}
 ctx.fillStyle='rgba(255,255,255,.06)';ctx.fillRect(58,36,W-116,28);ctx.fillStyle='#22c55e';ctx.fillRect(58,finishY,W-116,8);ctx.fillStyle='rgba(34,197,94,.18)';ctx.fillRect(58,finishY+8,W-116,28);
 walls.forEach(w=>{ctx.strokeStyle=w.type==='finish'?'#22c55e':'#94a3b8';ctx.lineWidth=w.type==='rail'?8:7;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(w.ax,w.ay);ctx.lineTo(w.bx,w.by);ctx.stroke();ctx.strokeStyle='rgba(255,255,255,.24)';ctx.lineWidth=2;ctx.stroke()});
 boosts.forEach(b=>{ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.a);ctx.fillStyle=b.used?'rgba(125,211,252,.16)':'rgba(125,211,252,.45)';ctx.fillRect(-22,-11,44,22);ctx.fillStyle='#e0f2fe';ctx.beginPath();ctx.moveTo(-8,-8);ctx.lineTo(11,0);ctx.lineTo(-8,8);ctx.closePath();ctx.fill();ctx.restore()});
 bumpers.forEach(b=>{b.pulse*=.9;const r=b.r+b.pulse*12;const grd=ctx.createRadialGradient(b.x-r*.3,b.y-r*.3,3,b.x,b.y,r);grd.addColorStop(0,'#fef3c7');grd.addColorStop(.45,'#f59e0b');grd.addColorStop(1,'#92400e');ctx.fillStyle=grd;ctx.beginPath();ctx.arc(b.x,b.y,r,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=2;ctx.stroke()});
 marbles.forEach(m=>{m.trail.forEach((p,i)=>{ctx.fillStyle=`${m.c.hex}${Math.floor((i/m.trail.length)*90).toString(16).padStart(2,'0')}`;ctx.beginPath();ctx.arc(p[0],p[1],m.r*(i/m.trail.length),0,Math.PI*2);ctx.fill()});const grd=ctx.createRadialGradient(m.x-4,m.y-5,2,m.x,m.y,m.r);grd.addColorStop(0,'#fff');grd.addColorStop(.25,m.c.hex);grd.addColorStop(1,m.c.dark);ctx.fillStyle=grd;ctx.beginPath();ctx.arc(m.x,m.y,m.r,0,Math.PI*2);ctx.fill();ctx.strokeStyle=m.i===selected?'#fbbf24':'rgba(255,255,255,.45)';ctx.lineWidth=m.i===selected?3:1.5;ctx.stroke();ctx.save();ctx.translate(m.x,m.y);ctx.rotate(m.spin);ctx.strokeStyle='rgba(255,255,255,.45)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-m.r*.5,0);ctx.lineTo(m.r*.5,0);ctx.stroke();ctx.restore();if(m.place){ctx.fillStyle='#f8fafc';ctx.font='900 11px Segoe UI';ctx.textAlign='center';ctx.fillText(ordinal(m.place),m.x,m.y-16)}});
 ctx.fillStyle='#cbd5e1';ctx.font='900 14px Segoe UI';ctx.textAlign='left';ctx.fillText(phase==='race'?'LIVE RACE':'READY',62,25);ctx.textAlign='right';ctx.fillText('FINISH',W-62,finishY-8)
}
document.getElementById('start').onclick=startRace;document.getElementById('remix').onclick=remix;document.getElementById('allin').onclick=()=>{ui.bet.value=wallet};document.querySelectorAll('[data-bet]').forEach(b=>b.onclick=()=>ui.bet.value=b.dataset.bet);
buildPickers();saveWallet();makeTrack();draw();showBanner('READY','Pick a marble and start.',1300);step();
</script>
</body>
</html>
