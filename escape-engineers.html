<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Escape Engineers</title>
<style>
:root{--bg:#081018;--panel:#101b26;--ink:#eef6ff;--muted:#8ea3b5;--cyan:#4ddcff;--green:#61e6a8;--amber:#ffc85a;--red:#ff6c76;--line:#2a3a48}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:system-ui,Segoe UI,Arial,sans-serif}button,input{font:inherit}button{cursor:pointer}.app{height:100%;display:grid;grid-template-rows:auto 1fr}header{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);background:#0a141e}.brand h1{font-size:18px;margin:0;letter-spacing:.08em;text-transform:uppercase}.brand small{color:var(--muted)}.hud{display:flex;gap:7px;align-items:center;flex-wrap:wrap;justify-content:flex-end}.badge,.timer,.btn{border:1px solid var(--line);background:#07111a;color:var(--ink);padding:8px 10px;border-radius:7px}.timer{font-size:20px;font-weight:900;min-width:100px;text-align:center}.btn{background:#152433;font-weight:800}.btn.primary{background:var(--cyan);color:#02202a;border-color:var(--cyan)}main{min-height:0;display:grid;grid-template-columns:minmax(0,1fr) 310px}.gameWrap{position:relative;min-width:0;min-height:0;background:#050b11}canvas{width:100%;height:100%;display:block}.sidebar{min-height:0;border-left:1px solid var(--line);background:var(--panel);display:grid;grid-template-rows:auto auto 1fr auto;overflow:hidden}.section{border-bottom:1px solid var(--line)}.section h2{font-size:11px;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);margin:0;padding:9px 11px;border-bottom:1px solid var(--line)}.objective,.controls{padding:11px;font-size:12px;line-height:1.45}.objective strong{display:block;margin-bottom:4px}.objective p{margin:0;color:#bccbd8}.players{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:9px}.pc{padding:9px;border:1px solid var(--line);background:#0b1620}.pc:first-child{border-top:2px solid var(--cyan)}.pc:last-child{border-top:2px solid var(--green)}.pc small{display:block;color:var(--muted)}.inv{margin-top:6px;color:var(--amber);font-size:10px}.log{padding:7px 10px;overflow:auto;font-size:11px;color:#b5c4d0}.entry{padding:5px 0;border-bottom:1px dashed #ffffff14}.key{display:inline-block;padding:1px 5px;border:1px solid var(--line);background:#07111a;color:var(--ink);border-radius:4px}.toast{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);background:#07111a;border:1px solid var(--line);padding:9px 13px;border-radius:8px;opacity:0;transition:.2s;pointer-events:none;text-align:center}.toast.show{opacity:1}.modal{position:absolute;inset:0;background:#000b;display:none;place-items:center;z-index:10}.modal.show{display:grid}.box{width:min(500px,calc(100% - 26px));background:#0e1a25;border:1px solid var(--line)}.mh,.mb,.ma{padding:14px}.mh{border-bottom:1px solid var(--line);font-weight:900}.ma{border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px}.code{width:100%;margin-top:10px;background:#07111a;border:1px solid var(--line);color:var(--ink);padding:11px;text-align:center;font-size:21px;letter-spacing:.16em;text-transform:uppercase}.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.choice{padding:11px;border:1px solid var(--line);background:#09141e;color:var(--ink)}.choice.on{border-color:var(--amber)}@media(max-width:850px){main{grid-template-columns:1fr;grid-template-rows:minmax(0,1fr) 260px}.sidebar{border-left:0;border-top:1px solid var(--line);grid-template-columns:1fr 1fr;grid-template-rows:auto 1fr}.sidebar .section:nth-child(3){grid-row:1/3;grid-column:2}.sidebar .section:nth-child(4){display:none}}
</style></head>
<body><div class="app"><header><div class="brand"><h1>Escape Engineers</h1><small>Dynamic two-player escape facility</small></div><div class="hud"><div class="badge" id="seed">Seed</div><div class="badge" id="stage">1/6</div><div class="timer" id="timer">30:00</div><button class="btn" id="pause">Pause</button><button class="btn primary" id="new">New Escape</button></div></header><main><section class="gameWrap" id="wrap"><canvas id="c"></canvas><div class="toast" id="toast"></div><div class="modal" id="modal"><div class="box"><div class="mh" id="mt"></div><div class="mb" id="mb"></div><div class="ma" id="ma"></div></div></div></section><aside class="sidebar"><section class="section"><h2>Objective</h2><div class="objective" id="objective"></div></section><section class="section"><h2>Engineers</h2><div class="players" id="players"></div></section><section class="section"><h2>Radio Log</h2><div class="log" id="log"></div></section><section class="section"><h2>Controls</h2><div class="controls">Player 1: <span class="key">WASD</span> + <span class="key">E</span><br>Player 2: <span class="key">Arrows</span> + <span class="key">/</span><br>Some systems require both engineers together.</div></section></aside></main></div>
<script>
(()=>{const $=s=>document.querySelector(s),cv=$('#c'),x=cv.getContext('2d'),wrap=$('#wrap');let W,H,d=1,g,K={},last=0,tt;const T=44,C={wall:'#263746',f1:'#0d1822',f2:'#101e2a',door:'#d84f5a',open:'#4f8e69',a:'#4ddcff',b:'#61e6a8',obj:'#89b9d4',art:'#ffc85a'};const rnd=a=>a[Math.random()*a.length|0],sh=a=>[...a].sort(()=>Math.random()-.5),mk=n=>Array.from({length:n},()=>Math.random()*10|0).join('');function resize(){let r=wrap.getBoundingClientRect();d=Math.min(devicePixelRatio||1,2);cv.width=r.width*d;cv.height=r.height*d;cv.style.width=r.width+'px';cv.style.height=r.height+'px';x.setTransform(d,0,0,d,0,0);W=r.width;H=r.height}addEventListener('resize',resize);
function O(X,Y,k,n,t,z={}){return{x:X,y:Y,k,name:n,type:t,done:false,...z}}function D(X,Y,id){return{x:X,y:Y,id,open:false}}function level(){let cols=24,rows=15,map=Array.from({length:rows},()=>Array(cols).fill(0)),rs=[{x:1,y:1,w:7,h:5},{x:9,y:1,w:6,h:5},{x:17,y:1,w:6,h:5},{x:1,y:8,w:6,h:6},{x:9,y:8,w:6,h:6},{x:17,y:8,w:6,h:6}];rs.forEach(r=>{for(let y=r.y;y<r.y+r.h;y++)for(let q=r.x;q<r.x+r.w;q++)map[y][q]=1});for(let q=7;q<=17;q++)map[3][q]=1;for(let q=6;q<=18;q++)map[10][q]=1;for(let y=3;y<=10;y++)map[y][12]=map[y][4]=map[y][20]=1;let relay=mk(4),word=rnd(['ECHO','NOVA','LAMP','RIFT','VAULT']),sy=sh(['SUN','MOON','KEY','EYE']),final=word[0]+relay.slice(-2)+(sy.indexOf('KEY')+1);return{cols,rows,map,data:{relay,word,sy,final},doors:[D(8,3,'d1'),D(16,3,'d2'),D(7,10,'d3'),D(16,10,'d4')],objects:[O(3,2,'note','Relay Note','note',{text:'A torn note reads: RELAY '+relay,reward:'Relay Note'}),O(10,2,'key','Relay Keypad','code',{answer:relay,who:'B',door:'d1'}),O(18,2,'art','Amber Artifact','pickup',{reward:'Amber Shard'}),O(21,4,'note','Cipher Tablet','note',{text:'The tablet shows '+word+'. Remember its first letter.',reward:'Cipher Tablet'}),O(2,11,'plate','Twin Plate A','plate'),O(13,11,'plate','Twin Plate B','plate'),O(10,12,'art','Silver Artifact','pickup',{reward:'Silver Seal'}),O(18,11,'riddle','Symbol Riddle','choice',{answer:'KEY',options:sy,text:'What opens a lock but has no door?',door:'d4'}),O(21,12,'term','Exit Terminal','final',{answer:final})]}}
function fresh(){g={id:Math.random().toString(36).slice(2,8).toUpperCase(),time:1800,paused:false,won:false,L:level(),P:[{id:'A',x:2.5,y:3.5,color:C.a,inv:[]},{id:'B',x:21.5,y:3.5,color:C.b,inv:[]}],stage:0,log:[]};log('Facility generated. Engineers separated.');log('Share clues. Some tasks are solo; others require both players.');ui()}
function log(m){g.log.unshift({t:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),m});g.log=g.log.slice(0,30)}function toast(m){$('#toast').textContent=m;$('#toast').classList.add('show');clearTimeout(tt);tt=setTimeout(()=>$('#toast').classList.remove('show'),1700)}const objectives=[['Find the relay code','Player 1 must inspect the note.'],['Unlock the relay door','Player 2 must enter the shared code.'],['Collect both artifacts','Search separate rooms.'],['Synchronize twin plates','Each engineer must stand at a different plate.'],['Solve the symbol riddle','Choose the object that opens a lock.'],['Open the exit','Use first letter + last relay digits + KEY position.']];
function ui(){let o=objectives[Math.min(g.stage,5)];$('#seed').textContent='Seed: '+g.id;$('#stage').textContent=`${Math.min(g.stage+1,6)}/6`;$('#objective').innerHTML=`<strong>${o[0]}</strong><p>${o[1]}</p>`;$('#players').innerHTML=g.P.map((p,i)=>`<div class="pc"><b>Player ${i+1}</b><small>Engineer ${p.id}</small><div class="inv">${p.inv.join(' · ')||'Empty'}</div></div>`).join('');$('#log').innerHTML=g.log.map(v=>`<div class="entry"><b>${v.t}</b> ${v.m}</div>`).join('')}
function walk(X,Y){let q=Math.floor(X),y=Math.floor(Y);if(q<0||y<0||q>=g.L.cols||y>=g.L.rows||!g.L.map[y][q])return false;return !g.L.doors.some(z=>!z.open&&Math.abs(X-z.x-.5)<.43&&Math.abs(Y-z.y-.5)<.43)}function move(p,dx,dy,dt){let s=3.2,nx=p.x+dx*s*dt,ny=p.y+dy*s*dt;if(walk(nx,p.y))p.x=nx;if(walk(p.x,ny))p.y=ny}function near(p){let b=null,dist=9;g.L.objects.forEach(o=>{if(o.done&&o.type!=='plate')return;let q=Math.hypot(p.x-o.x-.5,p.y-o.y-.5);if(q<dist){dist=q;b=o}});return dist<1.2?b:null}
function modal(title,body,actions){$('#mt').textContent=title;$('#mb').innerHTML=body;$('#ma').innerHTML='';actions.forEach(a=>{let b=document.createElement('button');b.className='btn '+(a.primary?'primary':'');b.textContent=a.label;b.onclick=a.go;$('#ma').appendChild(b)});$('#modal').classList.add('show')}function close(){$('#modal').classList.remove('show')}
function interact(p){if(g.paused||g.won)return;let o=near(p);if(!o)return toast('Move closer to an object.');if(o.who&&o.who!==p.id)return toast('Only the other engineer can use this console.');if(o.type==='note'){o.done=true;p.inv.push(o.reward);log('Engineer '+p.id+' inspected '+o.name+'.');modal(o.name,'<p>'+o.text+'</p>',[{label:'Close',go:close}]);advance();ui()}else if(o.type==='pickup'){o.done=true;p.inv.push(o.reward);log('Engineer '+p.id+' collected '+o.reward+'.');advance();ui()}else if(o.type==='code'||o.type==='final'){modal(o.name,`<p>${o.type==='final'?'Enter the final mixed code.':'Enter the relay code.'}</p><input class="code" id="answer">`,[{label:'Cancel',go:close},{label:'Submit',primary:true,go:()=>{let v=$('#answer').value.trim().toUpperCase();if(v===o.answer){o.done=true;if(o.door)g.L.doors.find(z=>z.id===o.door).open=true;log('Engineer '+p.id+' solved '+o.name+'.');close();if(o.type==='final')win();else{advance();ui()}}else{g.time=Math.max(0,g.time-20);toast('Incorrect. 20-second penalty.')}}}]);setTimeout(()=>$('#answer').focus(),0)}else if(o.type==='choice'){let pick='';modal(o.name,'<p>'+o.text+'</p><div class="choices">'+o.options.map(v=>`<button class="choice" data-v="${v}">${v}</button>`).join('')+'</div>',[{label:'Cancel',go:close},{label:'Submit',primary:true,go:()=>{if(pick===o.answer){o.done=true;g.L.doors.find(z=>z.id===o.door).open=true;log('Symbol riddle solved.');close();advance();ui()}else toast('Wrong symbol.')}}]);setTimeout(()=>document.querySelectorAll('.choice').forEach(b=>b.onclick=()=>{pick=b.dataset.v;document.querySelectorAll('.choice').forEach(q=>q.classList.remove('on'));b.classList.add('on')}),0)}else toast('Both engineers must occupy separate plates.')}
function advance(){let a=g.L.objects;if(g.stage===0&&a.find(o=>o.name==='Relay Note').done)g.stage=1;if(g.stage===1&&a.find(o=>o.name==='Relay Keypad').done)g.stage=2;if(g.stage===2&&a.filter(o=>o.type==='pickup'&&o.done).length===2)g.stage=3;if(g.stage===3&&a.filter(o=>o.type==='plate'&&o.done).length===2)g.stage=4;if(g.stage===4&&a.find(o=>o.type==='choice').done)g.stage=5}function plates(){let ps=g.L.objects.filter(o=>o.type==='plate');if(ps.every(o=>g.P.some(p=>Math.hypot(p.x-o.x-.5,p.y-o.y-.5)<.75))&&!ps.every(o=>o.done)){ps.forEach(o=>o.done=true);g.L.doors.find(z=>z.id==='d2').open=g.L.doors.find(z=>z.id==='d3').open=true;log('Twin plates synchronized.');toast('Co-op objective complete!');advance();ui()}}
function win(){g.won=true;log('Exit opened. Both engineers escaped.');ui();modal('Escape Complete',`<p>You escaped with <b>${$('#timer').textContent}</b> remaining.</p><p>Seed: <b>${g.id}</b></p>`,[{label:'New Escape',primary:true,go:()=>{close();fresh()}}])}
function update(dt){if(g.paused||g.won)return;g.time-=dt;if(g.time<=0){g.time=0;g.paused=true;modal('Lockdown','<p>Time expired.</p>',[{label:'New Escape',primary:true,go:()=>{close();fresh()}}])}let p=g.P[0],dx=(K.d?1:0)-(K.a?1:0),dy=(K.s?1:0)-(K.w?1:0);if(dx||dy){let l=Math.hypot(dx,dy);move(p,dx/l,dy/l,dt)}p=g.P[1];dx=(K.arrowright?1:0)-(K.arrowleft?1:0);dy=(K.arrowdown?1:0)-(K.arrowup?1:0);if(dx||dy){let l=Math.hypot(dx,dy);move(p,dx/l,dy/l,dt)}plates();let m=String(g.time/60|0).padStart(2,'0'),s=String(g.time%60|0).padStart(2,'0');$('#timer').textContent=m+':'+s}
function cam(){let sc=Math.min(W/(g.L.cols*T),H/(g.L.rows*T));return{sc,x:0,y:0}}function draw(){x.clearRect(0,0,W,H);let c=cam();x.save();x.scale(c.sc,c.sc);for(let y=0;y<g.L.rows;y++)for(let q=0;q<g.L.cols;q++){x.fillStyle=g.L.map[y][q]?((q+y)%2?C.f1:C.f2):C.wall;x.fillRect(q*T,y*T,T,T)}g.L.doors.forEach(o=>{x.fillStyle=o.open?C.open:C.door;x.fillRect(o.x*T+6,o.y*T+8,T-12,T-16)});g.L.objects.forEach(o=>{if(o.done&&o.type!=='plate')return;let X=(o.x+.5)*T,Y=(o.y+.5)*T;x.save();x.translate(X,Y);x.fillStyle=o.k==='art'?C.art:C.obj;x.shadowColor=x.fillStyle;x.shadowBlur=14;if(o.k==='art'){x.beginPath();x.moveTo(0,-14);x.lineTo(13,0);x.lineTo(0,14);x.lineTo(-13,0);x.closePath();x.fill()}else if(o.k==='plate')x.fillRect(-12,-12,24,24);else{x.beginPath();x.arc(0,0,12,0,7);x.fill()}x.restore()});g.P.forEach((p,i)=>{x.fillStyle=p.color;x.shadowColor=p.color;x.shadowBlur=15;x.beginPath();x.arc(p.x*T,p.y*T,13,0,7);x.fill();x.shadowBlur=0;x.fillStyle='#041017';x.font='900 12px system-ui';x.textAlign='center';x.textBaseline='middle';x.fillText(i+1,p.x*T,p.y*T);let n=near(p);if(n){x.fillStyle='#fff';x.font='12px system-ui';x.fillText((i?' / ':' E ')+n.name,p.x*T,(p.y-.55)*T)}});x.restore()}
function loop(t){let dt=Math.min(.033,(t-last)/1000||0);last=t;update(dt);draw();requestAnimationFrame(loop)}addEventListener('keydown',e=>{let k=e.key.toLowerCase();K[k]=true;if(['arrowup','arrowdown','arrowleft','arrowright','/'].includes(k))e.preventDefault();if(!e.repeat){if(k==='e')interact(g.P[0]);if(k==='/')interact(g.P[1])}});addEventListener('keyup',e=>K[e.key.toLowerCase()]=false);$('#pause').onclick=()=>{g.paused=!g.paused;$('#pause').textContent=g.paused?'Resume':'Pause'};$('#new').onclick=fresh;resize();fresh();requestAnimationFrame(loop)})();
</script></body></html>
