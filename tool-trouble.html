<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Tool Trouble</title><style>*{box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;touch-action:none}html,body{margin:0;height:100%;overflow:hidden;background:#111827;color:#fff;font-family:system-ui,-apple-system,Segoe UI,sans-serif}canvas{width:100vw;height:100vh;display:block}.hud{position:fixed;top:max(10px,env(safe-area-inset-top));left:10px;right:10px;display:flex;justify-content:space-between;gap:8px;z-index:5;pointer-events:none}.pill{background:rgba(15,23,42,.78);border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:8px 10px;font-weight:1000;box-shadow:0 8px 22px rgba(0,0,0,.25)}.pill b{color:#facc15}.overlay{position:fixed;inset:0;display:grid;place-items:center;background:rgba(2,6,23,.86);z-index:20;padding:20px;text-align:center}.card{width:min(94vw,720px);background:linear-gradient(180deg,#334155,#111827);border:2px solid #e5e7eb;border-radius:28px;padding:24px;box-shadow:0 24px 80px rgba(0,0,0,.58)}h1{font-size:clamp(44px,12vw,82px);line-height:.82;margin:0 0 12px;color:#facc15;text-shadow:0 5px 0 rgba(0,0,0,.38)}p{color:#e5e7eb;font-weight:760;line-height:1.4}.btn{border:0;border-radius:999px;background:linear-gradient(135deg,#facc15,#fb923c);color:#111827;font-weight:1000;padding:14px 22px;font-size:18px;margin-top:14px}.tools{position:fixed;left:0;right:0;bottom:calc(12px + env(safe-area-inset-bottom));display:flex;justify-content:center;gap:8px;z-index:8;pointer-events:auto;flex-wrap:wrap;padding:0 8px}.tool{width:72px;height:66px;border-radius:18px;border:2px solid rgba(255,255,255,.25);background:rgba(15,23,42,.82);color:#fff;font-size:25px;font-weight:1000;box-shadow:0 7px 0 rgba(0,0,0,.3)}.tool small{display:block;font-size:9px;opacity:.7}.tool.active{transform:scale(.94);background:rgba(250,204,21,.35);border-color:#facc15}.action{position:fixed;right:18px;bottom:calc(98px + env(safe-area-inset-bottom));width:96px;height:88px;border-radius:28px;border:2px solid rgba(255,255,255,.3);background:rgba(34,197,94,.88);color:#052e16;font-weight:1000;font-size:17px;z-index:8;box-shadow:0 8px 0 rgba(0,0,0,.3)}.action:active{transform:scale(.94)}#meter{position:fixed;left:50%;top:88px;transform:translateX(-50%);width:min(450px,76vw);height:16px;border-radius:999px;background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.22);z-index:5;overflow:hidden}#meter i{display:block;height:100%;width:0;background:linear-gradient(90deg,#22c55e,#facc15,#ef4444)}a{position:fixed;left:50%;bottom:4px;transform:translateX(-50%);z-index:9;color:#e5e7eb;text-decoration:none;font-size:12px;font-weight:900;background:rgba(0,0,0,.25);padding:5px 10px;border-radius:999px}@media(max-width:760px){.pill{font-size:12px;padding:7px 8px}.tool{width:58px;height:56px;font-size:20px}.action{width:78px;height:72px;bottom:calc(82px + env(safe-area-inset-bottom));font-size:14px}.hud{gap:5px}}</style></head><body><canvas id="c"></canvas><div class="hud"><div class="pill" id="score">Coins <b>0</b></div><div class="pill" id="time">90</div><div class="pill" id="job">Job 1</div><div class="pill" id="shop">Shop Lv 1</div></div><div id="meter"><i id="bar"></i></div><div class="tools" id="tools"></div><button class="action" id="action">FIX!</button><a href="index.html">← K2 HUB</a><div class="overlay" id="overlay"><div class="card"><h1>Tool Trouble</h1><p>Grab the right tool, then complete fast repair mini-challenges. Wrong tools cause leaks, sparks, explosions, and bigger problems. Earn coins and upgrade the workshop as disasters speed up.</p><button class="btn" id="start">OPEN WORKSHOP</button></div></div><script>(()=>{const c=document.getElementById('c'),x=c.getContext('2d');let W,H,D=1;function rs(){D=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0)}addEventListener('resize',rs);rs();const toolData=[['wrench','🔧','Wrench'],['plunger','🪠','Plunger'],['hammer','🔨','Hammer'],['tape','🧻','Tape'],['screw','🪛','Driver'],['ext','🧯','Exting.']];const jobs=[{item:'TOASTER',icon:'🍞',tool:'ext',mini:'tap',bad:'SPARKS!'},{item:'SINK',icon:'🚰',tool:'plunger',mini:'hold',bad:'FLOOD!'},{item:'SHELF',icon:'📚',tool:'hammer',mini:'rhythm',bad:'CRASH!'},{item:'WASHER',icon:'🧺',tool:'wrench',mini:'dial',bad:'SHAKE!'},{item:'WIRE',icon:'🔌',tool:'tape',mini:'trace',bad:'ZAP!'},{item:'CABINET',icon:'🗄️',tool:'screw',mini:'rhythm',bad:'LOOSE!'}];const ui={score:gid('score'),time:gid('time'),job:gid('job'),shop:gid('shop'),bar:gid('bar'),overlay:gid('overlay'),tools:gid('tools')};function gid(id){return document.getElementById(id)}let run=false,last=0,t=90,coins=0,shop=1,jobNo=1,selected='wrench',job=null,phase='choose',progress=0,need=0,fail=0,shake=0,fx=[],texts=[],keys={};function rnd(a,b){return a+Math.random()*(b-a)}function buildTools(){ui.tools.innerHTML=toolData.map(([id,ico,name],i)=>`<button class="tool ${i===0?'active':''}" data-tool="${id}">${ico}<small>${name}</small></button>`).join('');document.querySelectorAll('[data-tool]').forEach(b=>{b.onclick=()=>selectTool(b.dataset.tool)})}buildTools();function selectTool(id){selected=id;document.querySelectorAll('[data-tool]').forEach(b=>b.classList.toggle('active',b.dataset.tool===id))}function reset(){run=true;t=90;coins=0;shop=1;jobNo=1;fail=0;fx=[];texts=[];selected='wrench';selectTool(selected);ui.overlay.style.display='none';newJob();last=performance.now();requestAnimationFrame(loop)}function newJob(){job=jobs[Math.floor(Math.random()*jobs.length)];phase='choose';progress=0;need=100+jobNo*6;ui.job.textContent='Job '+jobNo+' · '+job.item}function pop(px,py,n,cset){for(let i=0;i<n;i++)fx.push({x:px,y:py,vx:rnd(-6,6),vy:rnd(-7,3),l:rnd(20,60),s:rnd(3,8),c:(cset||['#facc15','#fb923c','#e5e7eb'])[i%3]})}function text(txt,px,py,c){texts.push({txt,x:px,y:py,l:70,vy:-1.2,c})}function tryFix(){if(!run)return;if(phase==='choose'){if(selected!==job.tool){fail++;t-=4;shake=12;text(job.bad,W/2,H*.35,'#fca5a5');pop(W/2,H*.5,42,['#ef4444','#f97316','#111827']);return}phase=job.mini;progress=0;text('GOOD TOOL!',W/2,H*.35,'#bbf7d0');return}if(phase==='tap'){progress+=18+shop*3;pop(W/2,H*.55,8)}else if(phase==='rhythm'){let sweet=Math.abs(Math.sin(performance.now()*.006));progress+=sweet>.72?24:8;text(sweet>.72?'PERFECT':'OK',W/2,H*.42,sweet>.72?'#bbf7d0':'#fde68a')}else if(phase==='dial'){let sweet=1-Math.abs(Math.sin(performance.now()*.003));progress+=sweet>.72?26:7;text(sweet>.72?'LOCKED':'SLIP',W/2,H*.42,sweet>.72?'#bbf7d0':'#fca5a5')}if(progress>=need){let reward=20+jobNo*3+shop*7;coins+=reward;jobNo++;if(coins>=shop*110){coins-=shop*110;shop++;text('WORKSHOP UPGRADE!',W/2,H*.28,'#fde047')}text('+'+reward+' COINS',W/2,H*.36,'#fde047');pop(W/2,H*.55,48,['#22c55e','#fde047','#e5e7eb']);newJob()}}function update(dt){if(!run)return;t-=dt;if(t<=0||fail>=6){end();return}if(phase==='hold'){progress+=(keys.Space||gid('action').dataset.down==='1')?(33+shop*4)*dt:-18*dt;progress=Math.max(0,progress);if(progress>=need){coins+=25+jobNo*4;jobNo++;text('DRAINED!',W/2,H*.36,'#bbf7d0');pop(W/2,H*.55,42);newJob()}}if(phase==='trace'){let mx=pointer.x||W/2,my=pointer.y||H/2,d=Math.hypot(mx-W/2,my-H*.55);if(d<90)progress+=(24+shop*3)*dt;else progress-=20*dt;progress=Math.max(0,progress);if(progress>=need){coins+=28+jobNo*4;jobNo++;text('SEALED!',W/2,H*.36,'#bbf7d0');pop(W/2,H*.55,42);newJob()}}fx.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.l--});fx=fx.filter(p=>p.l>0);texts.forEach(p=>{p.y+=p.vy;p.l--});texts=texts.filter(p=>p.l>0);shake=Math.max(0,shake-1);ui.score.innerHTML='Coins <b>'+coins+'</b>';ui.time.textContent=Math.ceil(t);ui.shop.textContent='Shop Lv '+shop;ui.bar.style.width=Math.min(100,progress/need*100)+'%'}function end(){run=false;ui.overlay.style.display='grid';ui.overlay.querySelector('h1').textContent='Shop Closed';ui.overlay.querySelector('p').textContent='Jobs fixed: '+(jobNo-1)+'. Workshop level '+shop+'. Disasters survived until the tools union filed a complaint.';ui.overlay.querySelector('.btn').textContent='REOPEN'}function draw(){x.clearRect(0,0,W,H);if(shake)x.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);let g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#334155');g.addColorStop(.7,'#1f2937');g.addColorStop(1,'#111827');x.fillStyle=g;x.fillRect(-20,-20,W+40,H+40);x.fillStyle='#475569';x.fillRect(0,H*.68,W,H*.32);x.fillStyle='#78350f';x.fillRect(W*.08,H*.62,W*.84,28);for(let i=0;i<8;i++){x.fillStyle=i%2?'#64748b':'#94a3b8';x.fillRect(W*.1+i*W*.1,H*.16,44,38)}drawJob();fx.forEach(p=>{x.fillStyle=p.c;x.fillRect(p.x,p.y,p.s,p.s)});texts.forEach(p=>{x.globalAlpha=Math.min(1,p.l/25);x.fillStyle=p.c;x.font='1000 26px system-ui';x.textAlign='center';x.fillText(p.txt,p.x,p.y);x.globalAlpha=1});x.setTransform(D,0,0,D,0,0)}function drawJob(){x.save();x.translate(W/2,H*.48);x.fillStyle='#0f172a';round(-120,-90,240,170,24);x.fill();x.strokeStyle=selected===job?.tool?'#22c55e':'#facc15';x.lineWidth=6;x.stroke();x.font='90px system-ui';x.textAlign='center';x.fillText(job?job.icon:'🔧',0,15);x.fillStyle='#fff';x.font='1000 25px system-ui';x.fillText(job?job.item:'WORKSHOP',0,70);x.fillStyle=phase==='choose'?'#fde68a':'#bbf7d0';x.font='900 16px system-ui';x.fillText(phase==='choose'?'PICK TOOL: '+toolData.find(t=>t[0]===job.tool)[2].toUpperCase():phase.toUpperCase()+' CHALLENGE',0,98);if(phase==='dial'){x.strokeStyle='#fff';x.lineWidth=8;x.beginPath();x.arc(0,-18,60,0,7);x.stroke();let a=Math.sin(performance.now()*.003)*Math.PI;x.strokeStyle='#22c55e';x.beginPath();x.moveTo(0,-18);x.lineTo(Math.cos(a)*60, -18+Math.sin(a)*60);x.stroke()}if(phase==='trace'){x.strokeStyle='#fde68a';x.lineWidth=5;x.beginPath();x.arc(0,0,90,0,7);x.stroke()}x.restore()}function round(x0,y0,w,h,r){x.beginPath();x.moveTo(x0+r,y0);x.arcTo(x0+w,y0,x0+w,y0+h,r);x.arcTo(x0+w,y0+h,x0,y0+h,r);x.arcTo(x0,y0+h,x0,y0,r);x.arcTo(x0,y0,x0+w,y0,r);x.closePath()}function loop(now){let dt=Math.min(.033,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}const pointer={x:0,y:0};addEventListener('pointermove',e=>{pointer.x=e.clientX;pointer.y=e.clientY});gid('start').onclick=reset;gid('action').onclick=tryFix;gid('action').onpointerdown=e=>{gid('action').dataset.down='1';e.preventDefault()};gid('action').onpointerup=gid('action').onpointercancel=()=>gid('action').dataset.down='0';addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space'){e.preventDefault();tryFix()}let n=Number(e.key);if(n>=1&&n<=toolData.length)selectTool(toolData[n-1][0])});addEventListener('keyup',e=>keys[e.code]=false)})();</script></body></html>
