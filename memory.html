<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Elite - K2 games</title>
    <style>
        :root {
            --bg: #fdf2f8;
            --accent: #d946ef;
            --secondary: #86198f;
            --card-back: linear-gradient(135deg, #d946ef 0%, #a21caf 100%);
            --glass: rgba(255, 255, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: var(--secondary);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100dvh;
            width: 100%;
            overflow: hidden;
            position: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #hud {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 20px;
            z-index: 100;
        }

        .stat-card {
            background: white;
            padding: 10px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            font-weight: 900;
            border: 2px solid var(--accent);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            width: 90vmin;
            height: 90vmin;
            max-width: 500px;
            max-height: 500px;
            perspective: 1000px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card.flipped { transform: rotateY(180deg); }
        .card.matched { pointer-events: none; opacity: 0.5; filter: grayscale(0.5); }

        .card-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 10vmin;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border: 2px solid var(--accent);
        }

        .card-back {
            background: var(--card-back);
            color: white;
        }
        .card-back::after { content: '❓'; opacity: 0.3; font-size: 0.5em; }

        .card-front {
            background: white;
            transform: rotateY(180deg);
        }

        .card.cursor .card-face {
            outline: 6px solid #fbbf24;
            outline-offset: 4px;
            transform: scale(1.05);
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 10px 20px rgba(217, 70, 239, 0.3);
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); }

        .back-hub {
            position: absolute; bottom: 20px; color: var(--accent); text-decoration: none;
            font-weight: bold; font-size: 0.9rem;
        }

        #overlay {
            position: absolute; inset: 0; background: rgba(253, 242, 248, 0.95);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; text-align: center;
        }

        @media (min-width: 1024px) {
            .card-face { font-size: 60px; }
        }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CCZ9JJGEDP');
    </script>
</head>
<body>
    <div id="hud">
        <div class="stat-card">Moves: <span id="moves">0</span></div>
        <div class="stat-card">Best: <span id="best">--</span></div>
    </div>

    <div id="grid" class="grid"></div>

    <button class="btn" onclick="location.reload()">RESET GAME</button>
    <a href="index.html" class="back-hub">← BACK TO HUB</a>

    <div id="overlay">
        <h1 style="font-size: 3.5rem; font-style: italic; font-weight: 900;">MATCHED!</h1>
        <p id="final-stats" style="font-size: 1.5rem; margin: 20px 0; font-weight: 800;"></p>
        <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <script>
        const symbols = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼'];
        let cardsData = [...symbols, ...symbols].sort(() => Math.random() - 0.5);
        let flipped = [], matchedCount = 0, moves = 0;
        let bestMoves = localStorage.getItem('memory_best') || '--';

        function init() {
            document.getElementById('best').textContent = bestMoves;
            const grid = document.getElementById('grid');
            cardsData.forEach((symbol, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.id = i;
                card.dataset.symbol = symbol;
                
                const back = document.createElement('div');
                back.className = 'card-face card-back';
                
                const front = document.createElement('div');
                front.className = 'card-face card-front';
                front.textContent = symbol;

                card.appendChild(back);
                card.appendChild(front);
                card.onclick = () => flip(card);
                grid.appendChild(card);
            });
        }

        function flip(card) {
            if(flipped.length === 2 || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            
            card.classList.add('flipped');
            flipped.push(card);

            if(flipped.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                const [c1, c2] = flipped;
                
                if(c1.dataset.symbol === c2.dataset.symbol) {
                    setTimeout(() => {
                        c1.classList.add('matched');
                        c2.classList.add('matched');
                        matchedCount++;
                        flipped = [];
                        if(matchedCount === 8) endGame();
                    }, 600);
                } else {
                    setTimeout(() => {
                        c1.classList.remove('flipped');
                        c2.classList.remove('flipped');
                        flipped = [];
                    }, 1000);
                }
            }
        }

        function endGame() {
            if(bestMoves === '--' || moves < bestMoves) {
                bestMoves = moves;
                localStorage.setItem('memory_best', bestMoves);
            }
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('final-stats').textContent = `YOU FINISHED IN ${moves} MOVES!`;
        }

        init();

        // Gamepad polling
        (function() {
            let cursor = 0; let lastP = 0;
            function poll() {
                const pads = navigator.getGamepads();
                if (pads[0]) {
                    const p = pads[0]; const now = Date.now();
                    const cards = document.querySelectorAll('.card');
                    cards.forEach(c => c.classList.remove('cursor'));
                    if (cards[cursor]) cards[cursor].classList.add('cursor');
                    if (now - lastP > 200) {
                        const b = p.buttons;
                        if (b[12].pressed || p.axes[1] < -0.5) cursor = Math.max(0, cursor - 4);
                        else if (b[13].pressed || p.axes[1] > 0.5) cursor = Math.min(cards.length - 1, cursor + 4);
                        else if (b[14].pressed || p.axes[0] < -0.5) cursor = Math.max(0, cursor - 1);
                        else if (b[15].pressed || p.axes[0] > 0.5) cursor = Math.min(cards.length - 1, cursor + 1);
                        if (b[0].pressed && cards[cursor]) cards[cursor].click();
                        lastP = now;
                    }
                }
                requestAnimationFrame(poll);
            }
            poll();
        })();
    </script>
</body>
</html>
