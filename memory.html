<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match</title>
    <style>
        body { font-family: sans-serif; background: #fdf2f8; color: #86198f; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; width: 90vmin; height: 90vmin; max-width: 400px; max-height: 400px; }
        .card { width: 100%; height: 100%; background: #d946ef; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 8vmin; transition: transform 0.3s; transform-style: preserve-3d; }
        .card.cursor { outline: 6px solid #fbbf24; z-index: 10; transform: scale(1.05); }
        .card.flipped { transform: rotateY(180deg); background: #fff; border: 2px solid #d946ef; }
        .card.matched { visibility: hidden; }
        .back { margin-top: 30px; text-decoration: none; color: #d946ef; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Memory Match</h1>
    <div id="grid" class="grid"></div>
    <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; border-radius:8px; border:none; background:#d946ef; color:white; cursor:pointer;">Reset</button>
    <a href="index.html" class="back">← HUB</a>

    <script>
        const symbols = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼'];
        let cards = [...symbols, ...symbols].sort(() => Math.random() - 0.5);
        let flipped = [], matched = 0;

        function init() {
            const grid = document.getElementById('grid');
            cards.forEach((symbol, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = i;
                card.onclick = () => flip(card, symbol);
                grid.appendChild(card);
            });
        }

        function flip(card, symbol) {
            if(flipped.length === 2 || card.classList.contains('flipped')) return;
            card.classList.add('flipped');
            card.textContent = symbol;
            flipped.push({ card, symbol });

            if(flipped.length === 2) {
                if(flipped[0].symbol === flipped[1].symbol) {
                    setTimeout(() => {
                        flipped.forEach(f => f.card.classList.add('matched'));
                        matched++; flipped = [];
                        if(matched === 8) alert("You found them all!");
                    }, 500);
                } else {
                    setTimeout(() => {
                        flipped.forEach(f => { f.card.classList.remove('flipped'); f.card.textContent = ''; });
                        flipped = [];
                    }, 1000);
                }
            }
        }

        init();

        // Gamepad Adapter
        (function() {
            let cursor = 0;
            let lastP = 0;
            function poll() {
                const pads = navigator.getGamepads();
                if (pads[0]) {
                    const p = pads[0]; const now = Date.now();
                    const cards = document.querySelectorAll('.card');
                    cards.forEach(c => c.classList.remove('cursor'));
                    if (cards[cursor]) cards[cursor].classList.add('cursor');

                    if (now - lastP > 200) {
                        const b = p.buttons;
                        if (b[12].pressed || p.axes[1] < -0.5) cursor = Math.max(0, cursor - 4);
                        if (b[13].pressed || p.axes[1] > 0.5) cursor = Math.min(cards.length - 1, cursor + 4);
                        if (b[14].pressed || p.axes[0] < -0.5) cursor = Math.max(0, cursor - 1);
                        if (b[15].pressed || p.axes[0] > 0.5) cursor = Math.min(cards.length - 1, cursor + 1);
                        
                        if (b[0].pressed && cards[cursor]) cards[cursor].click();
                        lastP = now;
                    }
                }
                requestAnimationFrame(poll);
            }
            poll();
        })();
    </script>
</body>
</html>
