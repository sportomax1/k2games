<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mad Lips Ultra - K2 games</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-light: #a78bfa;
            --primary-dark: #7c3aed;
            --secondary: #ec4899;
            --bg: #0f172a;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --accent: #f59e0b;
            --success: #10b981;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            --radius: 24px;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,15%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,20%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,20%,1) 0, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 600px;
            animation: slideDown 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            letter-spacing: -2px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
            margin-top: 5px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .instant-btn {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            justify-content: center;
            margin-bottom: 10px;
        }

        .instant-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.6);
        }

        .instant-btn span { font-size: 1.4rem; }

        #game-container {
            width: 100%;
            max-width: 800px; /* Wider for grid */
            perspective: 1000px;
            z-index: 10;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.4s ease;
            min-height: 400px;
        }

        .screen {
            display: none;
            opacity: 0;
            transform: translateY(30px);
        }

        .screen.active {
            display: block;
            animation: screenIn 0.6s forwards cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes screenIn {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Story Grid */
        .story-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            max-height: 60vh;
            overflow-y: auto;
            padding: 4px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary-light) transparent;
        }

        .story-card {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            padding: 15px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 140px;
        }

        .story-card:hover {
            border-color: var(--primary);
            background: #fff;
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 10px 15px -5px rgba(139, 92, 246, 0.2);
            z-index: 1;
        }

        .story-emoji {
            font-size: 2.5rem;
            margin-bottom: 8px;
            transition: transform 0.2s;
        }
        
        .story-card:hover .story-emoji { transform: scale(1.2); }

        .story-card h3 {
            margin: 0;
            font-size: 0.9rem;
            color: var(--text-main);
            font-weight: 700;
            line-height: 1.2;
        }

        /* Input Experience */
        .input-wrapper {
            margin-bottom: 24px;
            animation: fadeInUp 0.5s ease backwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        label {
            font-weight: 800;
            font-size: 0.8rem;
            color: var(--primary-dark);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-container {
            display: flex;
            gap: 8px;
        }

        input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 1.05rem;
            outline: none;
            transition: all 0.2s;
            font-weight: 600;
            background: #fdfdfd;
        }

        input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
        }

        .surprise-btn {
            background: #eff6ff;
            border: 2px solid #dbeafe;
            width: 54px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .surprise-btn:hover { 
            background: #dbeafe; 
            transform: rotate(15deg) scale(1.1);
        }

        /* Suggestions Tray */
        .suggestions {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 10px 0 4px;
            scrollbar-width: none;
        }

        .suggestions::-webkit-scrollbar { display: none; }

        .pill {
            background: #f5f3ff;
            color: var(--primary-dark);
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
            border: 1.5px solid #ddd6fe;
            transition: all 0.2s;
        }

        .pill:hover { 
            background: var(--primary); 
            color: white; 
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .btn {
            padding: 18px 24px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 10px 20px -5px rgba(124, 58, 237, 0.4);
        }

        .btn-primary:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 15px 25px -5px rgba(124, 58, 237, 0.5); 
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
            flex: 0.4;
        }

        .btn-secondary:hover { background: #e2e8f0; transform: translateY(-2px); }

        /* Result */
        .result-text {
            font-size: 1.4rem;
            line-height: 1.8;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 40px;
            text-align: left;
        }

        .hl {
            display: inline-block;
            background: linear-gradient(120deg, #fef08a 0%, #fef08a 100%);
            background-repeat: no-repeat;
            background-size: 100% 0.35em;
            background-position: 0 90%;
            padding: 0 4px;
            font-weight: 800;
            color: var(--primary-dark);
            transition: all 0.3s;
        }
        
        .hl:hover { background-size: 100% 100%; color: black; border-radius: 4px; }

        /* Responsive */
        @media (max-width: 480px) {
            h1 { font-size: 2.2rem; }
            .card { padding: 20px; border-radius: 0; min-height: 100vh; background: white; }
            #game-container { max-width: 100%; margin: -20px; }
            body { padding: 0; background: white; }
            .btn-group { flex-direction: column-reverse; }
            .btn-secondary { flex: 1; }
            .story-grid { grid-template-columns: repeat(2, 1fr); }
            .story-card { height: 120px; }
            .story-emoji { font-size: 2rem; }
            .story-card h3 { font-size: 0.8rem; }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0, 0);
        }

        function getRandomWord(type) {
            // Handle compound types like "Verb (past)" by splitting
            const key = type.split(' ')[0];
            const list = library[type] || library[key] || library['Noun'] || generic;
            return list[Math.floor(Math.random() * list.length)];
        }

        function playRandomStory() {
            // 1. Pick random story
            const rStoryIndex = Math.floor(Math.random() * stories.length);
            const story = stories[rStoryIndex];
            
            // 2. Generate random values
            const values = story.b.map(blankType => getRandomWord(blankType));
            
            // 3. Render result
            const finalHtml = story.tm(values.map(v => `<span class="hl">${v}</span>`));
            document.getElementById('result-content').innerHTML = finalHtml;
            showScreen('screen-result');
        }

        function startStory(idx) {
            activeStory = stories[idx];
            document.getElementById('story-title').innerText = activeStory.t;
            const container = document.getElementById('input-fields');
            container.innerHTML = '';

            activeStory.b.forEach((b, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'input-wrapper';
                wrapper.style.animationDelay = `${i * 0.05}s`;
                
                const key = b.split(' ')[0];
                const category = library[b] || library[key] || library['Noun'];
                const suggestions = [...category].sort(() => 0.5 - Math.random()).slice(0, 6);

                wrapper.innerHTML = `
                    <div class="label-row"><label>${b}</label></div>
                    <div class="input-container">
                        <input type="text" id="in-${i}" placeholder="Type here..." autocomplete="off">
                        <button class="surprise-btn" onclick="randomizeField(${i}, '${b}')" title="Surprise Me">🎲</button>
                    </div>
                    <div class="suggestions">
                        ${suggestions.map(s => `<span class="pill" onclick="setField(${i}, '${s}')">${s}</span>`).join('')}
                    </div>
                `;
                container.appendChild(wrapper);
            });
            showScreen('screen-inputs');
        }

        function setField(idx, val) {
            const input = document.getElementById(`in-${idx}`);
            input.value = val;
            input.style.borderColor = 'var(--primary)';
            input.style.backgroundColor = '#f5f3ff';
            setTimeout(() => {
                input.style.borderColor = '';
                input.style.backgroundColor = '';
            }, 800);
        }

        function randomizeField(idx, type) {
            const val = getRandomWord(type);
            setField(idx, val);
            
            const btn = document.querySelectorAll('.surprise-btn')[idx];
            btn.style.transform = 'rotate(360deg) scale(1.2)';
            setTimeout(() => btn.style.transform = '', 500);
        }

            const vals = [];
            let missing = false;
            activeStory.b.forEach((_, i) => {
