    <title>Life: The Ultra Edition | K2 Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;900&display=swap');
        :root { --primary:#6366f1; --accent:#f59e0b; --bg:#020617; --glass:rgba(10,16,35,0.88); }
        *,*::before,*::after{box-sizing:border-box;}
        body{margin:0;padding:0;background:var(--bg);font-family:'Montserrat',sans-serif;overflow:hidden;touch-action:none;user-select:none;color:#fff;}
        #canvas-container{width:100vw;height:100vh;cursor:crosshair;}
        #hud{position:absolute;inset:0;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:20px;z-index:10;}
        .status-bar{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:860px;margin:0 auto;gap:12px;}
        .panel{background:var(--glass);backdrop-filter:blur(18px);padding:12px 22px;border-radius:14px;border:1px solid rgba(255,255,255,0.1);box-shadow:0 8px 32px rgba(0,0,0,0.6);}
        .label{font-size:.55rem;letter-spacing:3px;color:var(--accent);font-weight:900;margin-bottom:3px;text-transform:uppercase;}
        .value{font-size:.95rem;font-weight:700;white-space:nowrap;}
        #crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:18px;height:18px;pointer-events:none;opacity:.7;}
        #crosshair::before,#crosshair::after{content:'';position:absolute;background:#fff;border-radius:2px;}
        #crosshair::before{width:2px;height:100%;left:50%;transform:translateX(-50%);}
        #crosshair::after{width:100%;height:2px;top:50%;transform:translateY(-50%);}
        #interaction-prompt{position:absolute;bottom:130px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.95);color:#000;padding:11px 32px;border-radius:40px;font-weight:900;font-size:.78rem;display:none;box-shadow:0 0 40px rgba(255,255,255,0.35);animation:floatup 1.6s ease-in-out infinite;letter-spacing:1px;}
        @keyframes floatup{0%,100%{transform:translate(-50%,0);}50%{transform:translate(-50%,-7px);}}
        #look-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;font-size:1.1rem;font-weight:700;opacity:.8;pointer-events:none;transition:opacity .5s;}
        #mobile-controls{position:absolute;bottom:28px;width:100%;display:none;justify-content:space-between;padding:0 28px;pointer-events:none;}
        #joystick{width:110px;height:110px;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.18);border-radius:50%;position:relative;pointer-events:auto;}
        #joystick-knob{width:44px;height:44px;background:rgba(255,255,255,0.85);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 2px 12px rgba(0,0,0,0.5);}
        #action-btn{width:86px;height:86px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.75rem;pointer-events:auto;box-shadow:0 0 28px rgba(99,102,241,0.6);letter-spacing:1px;}
        #transition-overlay{position:absolute;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .9s ease;}
        #trans-icon{font-size:3rem;margin-bottom:12px;}
        #trans-title{font-size:2.2rem;font-weight:900;letter-spacing:3px;}
        #trans-sub{color:#64748b;font-size:.78rem;margin-top:8px;letter-spacing:2px;}
        .loader{width:220px;height:3px;background:#1e293b;border-radius:2px;margin-top:22px;overflow:hidden;}
        .loader-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));width:0%;transition:width .6s cubic-bezier(.4,0,.2,1);}
        #minimap{position:absolute;top:80px;right:20px;width:90px;height:90px;background:rgba(10,16,35,0.75);border-radius:12px;border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;font-size:.55rem;letter-spacing:1px;color:#94a3b8;flex-direction:column;gap:4px;}
        #minimap-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse-dot 1s infinite;}
        @keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:.3;}}
        @media(max-width:768px){#mobile-controls{display:flex;}}
    </style>

<script type="module">
import * as THREE from 'three';

const ROOMS=[
    {id:'BEDROOM_START',  name:'Master Bedroom', task:'Wake up and get out of bed',    icon:'Bed'},
    {id:'HALLWAY_UP',     name:'Upper Hallway',  task:'Head to the bathroom',           icon:'Hall'},
    {id:'BATHROOM',       name:'Bathroom',       task:'Brush your teeth and freshen up',icon:'Bath'},
    {id:'BEDROOM_DRESS',  name:'Master Bedroom', task:'Get dressed for the day',        icon:'Dress'},
    {id:'HALLWAY_STAIRS', name:'Staircase',      task:'Head downstairs',                icon:'Stairs'},
    {id:'KITCHEN_COOK',   name:'Kitchen',        task:'Cook eggs and bacon',            icon:'Cook'},
    {id:'KITCHEN_EAT',    name:'Dining Area',    task:'Eat your breakfast',             icon:'Eat'},
    {id:'GARAGE',         name:'Garage',         task:'Get in your car',                icon:'Car'},
    {id:'DRIVE_WORK',     name:'Highway',        task:'Commute to the office',          icon:'Drive'},
    {id:'OFFICE_LOBBY',   name:'Office Lobby',   task:'Check in at reception',          icon:'Lobby'},
    {id:'OFFICE_DESK',    name:'Your Workspace', task:'Start morning reports',          icon:'Work'},
    {id:'OFFICE_COFFEE',  name:'Break Room',     task:'Grab a coffee',                  icon:'Coffee'},
    {id:'OFFICE_CAFE',    name:'Lunch Cafe',     task:'Enjoy a sandwich',               icon:'Cafe'},
    {id:'OFFICE_NETWORK', name:'Conference Room',task:'Talk to the team',               icon:'Meet'},
    {id:'DRIVE_HOME',     name:'Highway',        task:'Drive back home',                icon:'Home'},
    {id:'HOME_DINNER',    name:'Dining Room',    task:'Eat dinner',                     icon:'Dinner'},
    {id:'LIVING_MOVIE',   name:'Living Room',    task:'Watch a movie',                  icon:'Movie'},
    {id:'BEDROOM_SLEEP',  name:'Master Bedroom', task:'Go to sleep',                    icon:'Sleep'},
];

function makeWoodCanvas(){
    const c=document.createElement('canvas');c.width=256;c.height=256;
    const ctx=c.getContext('2d');
    ctx.fillStyle='#7c5230';ctx.fillRect(0,0,256,256);
    for(let i=0;i<80;i++){
        ctx.strokeStyle='rgba('+(80+Math.random()*40|0)+','+(40+Math.random()*20|0)+','+(10+Math.random()*10|0)+',0.25)';
        ctx.lineWidth=1+Math.random()*2;ctx.beginPath();
        ctx.moveTo(0,i*3.2);ctx.lineTo(256,i*3.2+Math.random()*6-3);ctx.stroke();
    }
    return c;
}
function makeConcreteCanvas(){
    const c=document.createElement('canvas');c.width=256;c.height=256;
    const ctx=c.getContext('2d');
    const g=ctx.createLinearGradient(0,0,256,256);
    g.addColorStop(0,'#475569');g.addColorStop(1,'#334155');
    ctx.fillStyle=g;ctx.fillRect(0,0,256,256);
    for(let i=0;i<600;i++){
        ctx.fillStyle='rgba(255,255,255,0.03)';
        ctx.fillRect(Math.random()*256,Math.random()*256,Math.random()*3+1,Math.random()*3+1);
    }
    return c;
}
function makeTileCanvas(){
    const c=document.createElement('canvas');c.width=256;c.height=256;
    const ctx=c.getContext('2d');
    ctx.fillStyle='#f1f5f9';ctx.fillRect(0,0,256,256);
    ctx.strokeStyle='#cbd5e1';ctx.lineWidth=2;
    for(let x=0;x<=256;x+=64){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,256);ctx.stroke();}
    for(let y=0;y<=256;y+=64){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(256,y);ctx.stroke();}
    return c;
}
function canvasTex(canvas,rep=1){
    const t=new THREE.CanvasTexture(canvas);
    t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(rep,rep);return t;
}

class LifeGame{
    constructor(){
        this.roomIdx=0;this.objects=[];this.lights=[];
        this.interactable=null;this.transitioning=true;
        this.keys={};this.joyPos={x:0,y:0};this.isJoyActive=false;
        this.yaw=0;this.pitch=0;this.pointerLocked=false;
        this.clock=new THREE.Clock();this.animObjs=[];
        this.initRenderer();this.setupControls();
        this.loadRoom(ROOMS[0]);
        requestAnimationFrame(this.loop.bind(this));
    }

    initRenderer(){
        this.scene=new THREE.Scene();
        this.camera=new THREE.PerspectiveCamera(72,innerWidth/innerHeight,0.05,600);
        this.renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
        this.renderer.setPixelRatio(Math.min(devicePixelRatio,2));
        this.renderer.setSize(innerWidth,innerHeight);
        this.renderer.shadowMap.enabled=true;
        this.renderer.shadowMap.type=THREE.PCFSoftShadowMap;
        this.renderer.toneMapping=THREE.ACESFilmicToneMapping;
        this.renderer.toneMappingExposure=1.1;
        this.renderer.outputColorSpace=THREE.SRGBColorSpace;
        document.getElementById('canvas-container').appendChild(this.renderer.domElement);
        this.player=new THREE.Group();
        this.player.add(this.camera);
        this.camera.position.set(0,1.72,0);
        this.scene.add(this.player);
        window.addEventListener('resize',()=>{
            this.camera.aspect=innerWidth/innerHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(innerWidth,innerHeight);
        });
    }

    setupControls(){
        window.addEventListener('keydown',e=>{
            this.keys[e.code]=true;
            if(this.transitioning)this.dismissTransition();
            if(e.code==='Space'){e.preventDefault();this.doInteract();}
        });
        window.addEventListener('keyup',e=>{this.keys[e.code]=false;});
        const canvas=this.renderer.domElement;
        canvas.addEventListener('click',()=>{if(!this.pointerLocked)canvas.requestPointerLock();});
        document.addEventListener('pointerlockchange',()=>{
            this.pointerLocked=document.pointerLockElement===canvas;
            document.getElementById('look-hint').style.opacity=this.pointerLocked?'0':'0.8';
        });
        document.addEventListener('mousemove',e=>{
            if(!this.pointerLocked)return;
            this.yaw-=e.movementX*0.0015;
            this.pitch-=e.movementY*0.0015;
            this.pitch=Math.max(-1.2,Math.min(1.2,this.pitch));
        });
        const joy=document.getElementById('joystick');
        const knob=document.getElementById('joystick-knob');
        joy.addEventListener('touchstart',e=>{e.preventDefault();this.isJoyActive=true;},{passive:false});
        joy.addEventListener('touchmove',e=>{
            e.preventDefault();
            const r=joy.getBoundingClientRect(),t=e.touches[0];
            const dx=(t.clientX-(r.left+r.width/2))/(r.width/2);
            const dy=(t.clientY-(r.top+r.height/2))/(r.height/2);
            const mg=Math.min(1,Math.sqrt(dx*dx+dy*dy));
            const ag=Math.atan2(dy,dx);
            this.joyPos.x=Math.cos(ag)*mg;this.joyPos.y=Math.sin(ag)*mg;
            knob.style.transform='translate(calc(-50% + '+(this.joyPos.x*28)+'px),calc(-50% + '+(this.joyPos.y*28)+'px))';
        },{passive:false});
        joy.addEventListener('touchend',()=>{this.isJoyActive=false;this.joyPos={x:0,y:0};knob.style.transform='translate(-50%,-50%)';});
        document.getElementById('action-btn').addEventListener('touchstart',e=>{e.preventDefault();this.doInteract();});
    }

    mat(color,rough=0.5,metal=0,map=null,emissive=null,emInt=0){
        const o={color,roughness:rough,metalness:metal};
        if(map)o.map=map;
        if(emissive){o.emissive=new THREE.Color(emissive);o.emissiveIntensity=emInt;}
        return new THREE.MeshStandardMaterial(o);
    }
    tmat(color,rough=0.5,metal=0,opacity=0.5){
        return new THREE.MeshStandardMaterial({color,roughness:rough,metalness:metal,transparent:true,opacity,side:THREE.DoubleSide});
    }
    box(w,h,d,material,px,py,pz,rx=0,ry=0,rz=0){
        const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),material);
        m.position.set(px,py,pz);m.rotation.set(rx,ry,rz);
        m.castShadow=true;m.receiveShadow=true;
        this.scene.add(m);this.objects.push(m);return m;
    }
    cyl(rt,rb,h,segs,material,px,py,pz){
        const m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,segs),material);
        m.position.set(px,py,pz);m.castShadow=true;m.receiveShadow=true;
        this.scene.add(m);this.objects.push(m);return m;
    }
    sphere(r,segs,material,px,py,pz){
        const m=new THREE.Mesh(new THREE.SphereGeometry(r,segs,segs),material);
        m.position.set(px,py,pz);m.castShadow=true;
        this.scene.add(m);this.objects.push(m);return m;
    }
    grp(parts,ox=0,oy=0,oz=0){
        const g=new THREE.Group();g.position.set(ox,oy,oz);
        parts.forEach(([w,h,d,mat,px,py,pz,rx=0,ry=0,rz=0])=>{
            const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
            m.position.set(px,py,pz);m.rotation.set(rx,ry,rz);
            m.castShadow=true;m.receiveShadow=true;g.add(m);
        });
        this.scene.add(g);this.objects.push(g);return g;
    }
    floor(w,d,mat,px=0,pz=0){
        const m=new THREE.Mesh(new THREE.PlaneGeometry(w,d),mat);
        m.rotation.x=-Math.PI/2;m.receiveShadow=true;m.position.set(px,0,pz);
        this.scene.add(m);this.objects.push(m);return m;
    }
    ceil(w,d,h,mat){
        const m=new THREE.Mesh(new THREE.PlaneGeometry(w,d),mat);
        m.rotation.x=Math.PI/2;m.position.set(0,h,0);m.receiveShadow=true;
        this.scene.add(m);this.objects.push(m);return m;
    }
    wall(px,pz,w,h,d,mat){return this.box(w,h,d,mat,px,h/2,pz);}
    addLight(l){this.scene.add(l);this.lights.push(l);return l;}
    ptLight(color,intensity,dist,px,py,pz,cast=false){
        const l=new THREE.PointLight(color,intensity,dist);
        l.position.set(px,py,pz);l.castShadow=cast;
        if(cast){l.shadow.mapSize.set(512,512);l.shadow.radius=3;}
        return this.addLight(l);
    }
    spotLight(color,intensity,dist,angle,pen,px,py,pz,tx=0,ty=0,tz=0,cast=true){
        const l=new THREE.SpotLight(color,intensity,dist,angle,pen);
        l.position.set(px,py,pz);l.target.position.set(tx,ty,tz);
        l.castShadow=cast;if(cast){l.shadow.mapSize.set(1024,1024);l.shadow.bias=-0.001;}
        this.addLight(l);this.scene.add(l.target);return l;
    }
    setInteract(obj,name,phase,isTrans=false){
        obj.userData.interactName=name;obj.userData.phaseId=phase;obj.userData.isTrans=isTrans;
    }

    loadRoom(room){
        this.showTransition(room.name,room.task,room.icon);
        this.objects.forEach(o=>{
            this.scene.remove(o);
            o.traverse(n=>{
                if(n.geometry)n.geometry.dispose();
                if(n.material){const ms=Array.isArray(n.material)?n.material:[n.material];ms.forEach(m=>m.dispose());}
            });
        });
        this.lights.forEach(l=>this.scene.remove(l));
        this.objects=[];this.lights=[];this.animObjs=[];this.scene.fog=null;
        const id=room.id;
        if(id.includes('BEDROOM'))this.buildBedroom(id);
        else if(id.includes('HALLWAY')||id.includes('STAIRS'))this.buildHallway(id);
        else if(id.includes('BATHROOM'))this.buildBathroom();
        else if(id.includes('KITCHEN'))this.buildKitchen(id);
        else if(id.includes('GARAGE'))this.buildGarage();
        else if(id.includes('DRIVE'))this.buildRoad(id);
        else if(id.includes('OFFICE'))this.buildOffice(id);
        else if(id.includes('LIVING'))this.buildLivingRoom();
        else if(id.includes('HOME_DINNER'))this.buildDiningRoom();
        this.updateHUD();
    }

    buildBedroom(id){
        this.scene.background=new THREE.Color(0x1a1a2e);
        const woodTex=canvasTex(makeWoodCanvas(),6);
        const wallMat=this.mat(0x2d3561,0.9,0);
        const floorMat=this.mat(0x6b4c2a,0.7,0,woodTex);
        const ceilMat=this.mat(0x1e2040,1,0);
        this.floor(12,12,floorMat);
        this.ceil(12,12,3.4,ceilMat);
        this.wall(0,-6,12,3.4,0.18,wallMat);
        this.wall(-6,0,0.18,3.4,12,wallMat);
        this.wall(6,0,0.18,3.4,12,wallMat);
        this.wall(0,6,12,3.4,0.18,wallMat);
        // baseboard
        [-6,6].forEach(x=>this.box(0.1,0.15,12,this.mat(0x4a3f6b,0.8,0.1),x,0.075,0));
        [-6,6].forEach(z=>this.box(12,0.15,0.1,this.mat(0x4a3f6b,0.8,0.1),0,0.075,z));
        // crown molding
        [-6,6].forEach(x=>this.box(0.12,0.12,12,this.mat(0x3a3060,0.6,0.2),x,3.34,0));
        [-6,6].forEach(z=>this.box(12,0.12,0.12,this.mat(0x3a3060,0.6,0.2),0,3.34,z));
        // --- BED ---
        const bedWood=this.mat(0x3d1f0f,0.65,0.05,canvasTex(makeWoodCanvas(),1));
        const mattMat=this.mat(0xf8f4ee,0.9,0);
        const duvetMat=this.mat(0x3b4785,0.95,0);
        const pillowMat=this.mat(0xffffff,0.95,0);
        const bed=new THREE.Group();bed.position.set(-3.5,0,-2.5);
        const bx=(w,h,d,mat,px,py,pz)=>{const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);m.position.set(px,py,pz);m.castShadow=true;m.receiveShadow=true;bed.add(m);};
        bx(2.4,0.22,3.8,bedWood,0,0.11,0);
        bx(2.4,1.5,0.22,bedWood,0,0.75,-1.9);
        bx(2.0,1.3,0.08,this.mat(0x4a2510,0.5,0.1),0,0.75,-1.78);
        [-0.55,0,0.55].forEach(ox=>bx(0.5,0.8,0.1,this.mat(0x2d3561,0.9,0),ox,0.75,-1.72));
        bx(2.4,0.25,3.8,mattMat,0,0.345,0);
        bx(2.35,0.08,3.5,duvetMat,0,0.49,0.1);
        for(let i=0;i<5;i++)bx(2.35,0.04,0.1,this.mat(0x3040a0,0.95,0),0,0.53,-1.5+i*0.7);
        bx(0.7,0.13,0.55,pillowMat,-0.6,0.55,-1.55);
        bx(0.7,0.13,0.55,pillowMat,0.6,0.55,-1.55);
        [[-1.1,-1.8],[1.1,-1.8],[-1.1,1.8],[1.1,1.8]].forEach(([x,z])=>bx(0.12,0.22,0.12,bedWood,x,0.06,z));
        this.scene.add(bed);this.objects.push(bed);
        this.setInteract(bed,'Your Bed',['BEDROOM_START','BEDROOM_SLEEP']);
        // --- NIGHTSTAND ---
        const ns=new THREE.Group();ns.position.set(-5.4,0,-4.3);
        const nx=(w,h,d,mat,px,py,pz)=>{const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);m.position.set(px,py,pz);m.castShadow=true;m.receiveShadow=true;ns.add(m);};
        nx(0.7,0.65,0.55,bedWood,0,0.32,0);
        nx(0.55,0.04,0.4,this.mat(0x2a1505,0.5,0.15),0,0.67,0);
        nx(0.12,0.28,0.12,this.mat(0xe8c37a,0.3,0.7),0,0.93,0);
        nx(0.04,0.4,0.04,this.mat(0xe8c37a,0.3,0.7),0,1.27,0);
        const shade=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.28,0.3,12),this.mat(0xfff8e1,0.8,0));
        shade.position.set(0,1.5,0);shade.castShadow=true;ns.add(shade);
        this.scene.add(ns);this.objects.push(ns);
        this.ptLight(0xffcc88,1.2,4,-5.4,1.6,-4.3,false);
        // --- WARDROBE ---
        const wMat=this.mat(0x2a1a0a,0.6,0.05,canvasTex(makeWoodCanvas(),1));
        const wardrobe=this.grp([

    doInteract(){
        if(!this.interactable)return;
        const p=ROOMS[this.roomIdx];
        const trigger=this.interactable.userData.phaseId;
        const canDo=Array.isArray(trigger)?trigger.includes(p.id):trigger===p.id;
        if(canDo){
            this.roomIdx++;
            if(this.roomIdx>=ROOMS.length)this.roomIdx=0;
            this.loadRoom(ROOMS[this.roomIdx]);
        }
    }

    showTransition(title,sub,icon){
        this.transitioning=true;
        const ov=document.getElementById('transition-overlay');
        ov.style.display='flex';ov.style.opacity='1';
        document.getElementById('trans-title').innerText=title;
        document.getElementById('trans-sub').innerText=sub;
        if(icon)document.getElementById('trans-icon').innerText=icon;
        const bar=document.getElementById('loader-fill');
        bar.style.width='0%';
        setTimeout(()=>bar.style.width='100%',80);
    }
    dismissTransition(){
        this.transitioning=false;
        const ov=document.getElementById('transition-overlay');
        ov.style.opacity='0';
        setTimeout(()=>ov.style.display='none',900);
    }
    updateHUD(){
        const r=ROOMS[this.roomIdx];
        document.getElementById('loc-val').innerText=r.name;
        document.getElementById('task-val').innerText=r.task;
        document.getElementById('prog-val').innerText=(this.roomIdx+1)+' / '+ROOMS.length;
        document.getElementById('minimap-label').innerText=r.name.split(' ')[0].toUpperCase();
    }

    updatePhysics(dt){
        if(this.transitioning)return;
        this.player.rotation.y=this.yaw;
        this.camera.rotation.x=this.pitch;
        const speed=8*dt;
        const fwd=new THREE.Vector3();
        this.camera.getWorldDirection(fwd);fwd.y=0;fwd.normalize();
        const right=new THREE.Vector3();
        right.crossVectors(fwd,new THREE.Vector3(0,1,0)).normalize();
        if(this.keys['KeyW']||this.keys['ArrowUp'])   this.player.position.addScaledVector(fwd,speed);
        if(this.keys['KeyS']||this.keys['ArrowDown']) this.player.position.addScaledVector(fwd,-speed);
        if(this.keys['KeyA']||this.keys['ArrowLeft']) this.player.position.addScaledVector(right,-speed);
        if(this.keys['KeyD']||this.keys['ArrowRight'])this.player.position.addScaledVector(right,speed);
        if(this.isJoyActive){
            this.player.position.addScaledVector(fwd,-this.joyPos.y*speed);
            this.player.position.addScaledVector(right,this.joyPos.x*speed);
        }
        const moving=this.keys['KeyW']||this.keys['KeyS']||this.keys['KeyA']||this.keys['KeyD']||this.isJoyActive;
        this.player.position.y=moving?Math.abs(Math.sin(Date.now()*0.008))*0.05:0;
        this.interactable=null;
        document.getElementById('interaction-prompt').style.display='none';
        const pp=this.player.position;
        for(const obj of this.objects){
            if(!obj.userData.phaseId)continue;
            const op=new THREE.Vector3();
            obj.getWorldPosition(op);
            if(pp.distanceTo(op)<4.0){
                this.interactable=obj;
                document.getElementById('interaction-prompt').style.display='block';
                document.getElementById('interaction-prompt').innerText='[SPACE]  '+obj.userData.interactName;
                break;
            }
        }
    }

    updateAnimations(t){
        for(const a of this.animObjs){
            if(a.type==='tvflicker'){
                a.mesh.material.emissiveIntensity=0.55+0.15*Math.sin(t*3.7)+0.08*Math.sin(t*11.3);
            }
        }
    }

    loop(){
        const dt=Math.min(this.clock.getDelta(),0.05);
        const t=this.clock.getElapsedTime();
        this.updatePhysics(dt);
        this.updateAnimations(t);
        this.renderer.render(this.scene,this.camera);
        requestAnimationFrame(this.loop.bind(this));
    }
}

new LifeGame();
