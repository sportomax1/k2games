<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life: The Ultra Edition | K2 Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;900&display=swap');

        :root {
            --primary: #6366f1;
            --accent: #f59e0b;
            --bg: #020617;
            --glass: rgba(15, 23, 42, 0.9);
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            color: white;
        }

        #canvas-container { width: 100vw; height: 100vh; }

        /* HUD */
        #hud {
            position: absolute; inset: 0; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 20px; z-index: 10;
        }

        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; max-width: 800px; margin: 0 auto;
        }

        .panel {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .label { font-size: 0.6rem; letter-spacing: 2px; color: var(--accent); font-weight: 900; margin-bottom: 2px; text-transform: uppercase; }
        .value { font-size: 1rem; font-weight: 700; }

        #interaction-prompt {
            position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%);
            background: white; color: black; padding: 12px 30px; border-radius: 30px;
            font-weight: 900; font-size: 0.8rem; display: none;
            box-shadow: 0 0 30px rgba(255,255,255,0.4);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -5px); } 100% { transform: translate(-50%, 0); } }

        /* Mobile Controls */
        #mobile-controls { position: absolute; bottom: 30px; width: 100%; display: none; justify-content: space-between; padding: 0 30px; box-sizing: border-box; pointer-events: none; }
        #joystick { width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; position: relative; pointer-events: auto; }
        #joystick-knob { width: 40px; height: 40px; background: white; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #action-btn { width: 80px; height: 80px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; pointer-events: auto; box-shadow: 0 0 20px rgba(99, 102, 241, 0.5); }

        /* Fades */
        #transition-overlay {
            position: absolute; inset: 0; background: black;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; transition: opacity 0.8s ease;
        }

        .loader { width: 200px; height: 2px; background: #1e293b; border-radius: 1px; margin-top: 20px; overflow: hidden; }
        .loader-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.5s; }

        @media (max-width: 768px) { #mobile-controls { display: flex; } }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="hud">
        <div class="status-bar">
            <div class="panel">
                <div class="label">LOCATION</div>
                <div id="loc-val" class="value">Bedroom</div>
            </div>
            <div class="panel">
                <div class="label">OBJECTIVE</div>
                <div id="task-val" class="value">Wake Up</div>
            </div>
        </div>
        <div id="interaction-prompt">SPACE TO INTERACT</div>
        <div id="mobile-controls">
            <div id="joystick"><div id="joystick-knob"></div></div>
            <div id="action-btn">ACTION</div>
        </div>
    </div>

    <div id="transition-overlay">
        <div id="trans-title" style="font-size: 2rem; font-weight: 900;">LIFE</div>
        <div id="trans-sub" style="color: #64748b; font-size: 0.8rem; margin-top: 10px;">PREPARING YOUR DAY...</div>
        <div class="loader"><div id="loader-fill" class="loader-fill"></div></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- ROOM CONFIGURATIONS ---
        const ROOMS = [
            { id: 'BEDROOM_START', name: 'Master Bedroom', task: 'Wake up and get out of bed', color: 0x334155 },
            { id: 'HALLWAY_UP', name: 'Upper Hallway', task: 'Go to the Bathroom', color: 0x1e293b },
            { id: 'BATHROOM', name: 'Bathroom', task: 'Brush your teeth', color: 0xe2e8f0 },
            { id: 'BEDROOM_DRESS', name: 'Master Bedroom', task: 'Change your clothes', color: 0x334155 },
            { id: 'HALLWAY_STAIRS', name: 'Hallway', task: 'Go downstairs', color: 0x1e293b },
            { id: 'KITCHEN_COOK', name: 'Kitchen', task: 'Cook Eggs & Bacon', color: 0x0f172a },
            { id: 'KITCHEN_EAT', name: 'Dining Area', task: 'Eat your breakfast', color: 0x0f172a },
            { id: 'GARAGE', name: 'Garage', task: 'Get in your car', color: 0x1e293b },
            { id: 'DRIVE_WORK', name: 'Highway', task: 'Commute to the Office', color: 0x020617 },
            { id: 'OFFICE_LOBBY', name: 'Office Lobby', task: 'Check in at Reception', color: 0x94a3b8 },
            { id: 'OFFICE_DESK', name: 'Your Workspace', task: 'Start Morning Reports', color: 0xf1f5f9 },
            { id: 'OFFICE_COFFEE', name: 'Breakroom', task: 'Get a Coffee', color: 0xf1f5f9 },
            { id: 'OFFICE_CAFE', name: 'Lunch Cafe', task: 'Enjoy a Sandwich', color: 0xe2e8f0 },
            { id: 'OFFICE_NETWORK', name: 'Conference Room', task: 'Talk to the Team', color: 0xf1f5f9 },
            { id: 'DRIVE_HOME', name: 'Highway', task: 'Drive back home', color: 0x020617 },
            { id: 'HOME_DINNER', name: 'Dining Room', task: 'Eat Dinner', color: 0x0f172a },
            { id: 'LIVING_MOVIE', name: 'Living Room', task: 'Watch a Movie', color: 0x0f172a },
            { id: 'BEDROOM_SLEEP', name: 'Master Bedroom', task: 'Go to Sleep', color: 0x334155 }
        ];

        class LifeGame {
            constructor() {
                this.currentRoomIdx = 0;
                this.objects = [];
                this.interactable = null;
                this.isTransitioning = true;
                this.keys = {};
                this.joyPos = { x: 0, y: 0 };
                this.isJoyActive = false;

                this.initEngine();
                this.setupControls();
                this.loadRoom(ROOMS[this.currentRoomIdx]);
                
                this.animate = this.loop.bind(this);
                requestAnimationFrame(this.animate);
            }

            initEngine() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                document.getElementById('canvas-container').appendChild(this.renderer.domElement);

                this.player = new THREE.Group();
                this.player.add(this.camera);
                this.camera.position.set(0, 1.7, 0); 
                this.scene.add(this.player);

                // Lighting
                this.scene.add(new THREE.AmbientLight(0xffffff, 0.4));
                this.sun = new THREE.DirectionalLight(0xffffff, 1.0);
                this.sun.position.set(5, 10, 5);
                this.sun.castShadow = true;
                this.sun.shadow.mapSize.set(2048, 2048);
                this.scene.add(this.sun);

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            setupControls() {
                window.addEventListener('keydown', (e) => {
                    this.keys[e.code] = true;
                    if(this.isTransitioning && e.code) this.dismissTransition();
                    if(e.code === 'Space') this.interact();
                });
                window.addEventListener('keyup', (e) => this.keys[e.code] = false);

                const joy = document.getElementById('joystick');
                const knob = document.getElementById('joystick-knob');
                joy.addEventListener('touchstart', (e) => { e.preventDefault(); this.isJoyActive = true; }, {passive: false});
                joy.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const rect = joy.getBoundingClientRect();
                    const t = e.touches[0];
                    const dx = (t.clientX - (rect.left + rect.width/2)) / (rect.width/2);
                    const dy = (t.clientY - (rect.top + rect.height/2)) / (rect.height/2);
                    const mag = Math.min(1, Math.sqrt(dx*dx + dy*dy));
                    const ang = Math.atan2(dy, dx);
                    this.joyPos.x = Math.cos(ang) * mag;
                    this.joyPos.y = Math.sin(ang) * mag;
                    knob.style.transform = `translate(calc(-50% + ${this.joyPos.x*25}px), calc(-50% + ${this.joyPos.y*25}px))`;
                }, {passive: false});
                joy.addEventListener('touchend', () => { this.isJoyActive = false; this.joyPos = {x:0, y:0}; knob.style.transform = 'translate(-50%, -50%)'; });
                document.getElementById('action-btn').addEventListener('touchstart', (e) => { e.preventDefault(); this.interact(); });
            }

            // --- SCENE BUILDER ---
            loadRoom(room) {
                // Fade out current
                this.showTransition(room.name, room.task);
                
                // Clear previous
                this.objects.forEach(obj => this.scene.remove(obj));
                this.objects = [];

                // Build geometry based on ID
                if (room.id.includes('BEDROOM')) this.buildBedroom();
                else if (room.id.includes('HALLWAY')) this.buildHallway();
                else if (room.id.includes('BATHROOM')) this.buildBathroom();
                else if (room.id.includes('KITCHEN')) this.buildKitchen();
                else if (room.id.includes('GARAGE')) this.buildGarage();
                else if (room.id.includes('DRIVE')) this.buildRoad();
                else if (room.id.includes('OFFICE')) this.buildOffice();

                this.updateHUD();
            }

            buildBedroom() {
                this.scene.background = new THREE.Color(0x334155);
                this.createWall(0, 0, -5, 10, 4, 0.2); // Back wall
                this.createWall(-5, 0, 0, 0.2, 4, 10); // Left
                this.createWall(5, 0, 0, 0.2, 4, 10);  // Right
                this.createWall(0, 0, 5, 10, 4, 0.2);  // Front (with door)
                this.createFloor(10, 10, 0x1e293b);

                // Bed (High Detail)
                const bed = new THREE.Group();
                this.addPart(bed, 2.2, 0.4, 3.2, 0x451a03, 0, 0.2, 0); // Frame
                this.addPart(bed, 2.2, 1.2, 0.2, 0x451a03, 0, 0.6, -1.5); // Headboard
                this.addPart(bed, 2, 0.3, 3, 0xffffff, 0, 0.55, 0); // Mattress
                this.addPart(bed, 2.1, 0.1, 2.5, 0x64748b, 0, 0.7, 0.3); // Duvet
                this.addPart(bed, 0.8, 0.1, 0.5, 0xffffff, -0.5, 0.75, -1.1); // Pillow 1
                this.addPart(bed, 0.8, 0.1, 0.5, 0xffffff, 0.5, 0.75, -1.1);  // Pillow 2
                bed.position.set(-3, 0, -2);
                this.scene.add(bed); this.objects.push(bed);
                this.setInteract(bed, 'Your Bed', ['BEDROOM_START', 'BEDROOM_SLEEP']);

                // Nightstand
                const stand = new THREE.Group();
                this.addPart(stand, 0.6, 0.6, 0.6, 0x451a03, 0, 0.3, 0); // Base
                this.addPart(stand, 0.1, 0.3, 0.1, 0xffd700, 0, 0.75, 0); // Lamp Base
                this.addPart(stand, 0.4, 0.4, 0.4, 0xf8fafc, 0, 1.0, 0); // Lampshade
                stand.position.set(-4.5, 0, -4.5);
                this.scene.add(stand); this.objects.push(stand);

                // Closet
                const closet = this.createPart(2.5, 3.5, 0.8, 0x1e293b, {x: 3.5, y: 1.75, z: -4.5});
                this.setInteract(closet, 'Wardrobe', 'BEDROOM_DRESS');

                // Exit Door
                const door = this.createPart(1.2, 2.5, 0.1, 0x6366f1, {x: 0, y: 1.25, z: 4.9});
                this.setInteract(door, 'Open Door', ['BEDROOM_START', 'BEDROOM_DRESS'], true);

                this.player.position.set(-2, 0, -1);
            }

            buildHallway() {
                this.scene.background = new THREE.Color(0x1e293b);
                this.createFloor(4, 20, 0x0f172a);
                this.createWall(-2, 0, 0, 0.2, 4, 20);
                this.createWall(2, 0, 0, 0.2, 4, 20);
                
                // Details
                for(let i=0; i<3; i++) {
                    this.createPart(0.8, 1.2, 0.05, 0x000000, {x: -1.85, y: 2, z: -5 + i*5}); // Pictures
                    this.createPart(0.2, 0.2, 0.2, 0xffd700, {x: 1.8, y: 2.5, z: -5 + i*5}); // Sconces
                }

                const door1 = this.createPart(1.2, 2.5, 0.1, 0xffffff, {x: 0, y: 1.25, z: -9.9});
                this.setInteract(door1, 'Next Area', ['HALLWAY_UP', 'HALLWAY_STAIRS'], true);

                this.player.position.set(0, 0, 8);
            }

            buildBathroom() {
                this.scene.background = new THREE.Color(0xe2e8f0);
                this.createFloor(8, 8, 0xffffff); // Tiled
                this.createWall(0, 0, -4, 8, 4, 0.2);
                this.createWall(-4, 0, 0, 0.2, 4, 8);
                this.createWall(4, 0, 0, 0.2, 4, 8);
                
                // Vanity
                const vanity = new THREE.Group();
                this.addPart(vanity, 3, 0.9, 1.2, 0xf1f5f9, 0, 0.45, -3); // Cabinet
                this.addPart(vanity, 1.2, 0.2, 0.8, 0x94a3b8, 0, 1.0, -3); // Sink
                this.addPart(vanity, 2.5, 1.5, 0.05, 0xbae6fd, 0, 2.2, -3.9); // Mirror
                this.scene.add(vanity); this.objects.push(vanity);
                this.setInteract(vanity, 'Brush Teeth', 'BATHROOM');

                // Shower
                const shower = this.createPart(3, 4, 3, 0xbae6fd, {x: -2.5, y: 2, z: 2.5});
                shower.material.transparent = true; shower.material.opacity = 0.3;

                const exit = this.createPart(1.2, 2.5, 0.1, 0x6366f1, {x: 3.9, y: 1.25, z: 0});
                exit.rotation.y = Math.PI/2;
                this.setInteract(exit, 'Exit Bathroom', 'BATHROOM', true);

                this.player.position.set(0, 0, 0);
            }

            buildKitchen() {
                this.scene.background = new THREE.Color(0x0f172a);
                this.createFloor(15, 15, 0x334155);
                
                // Island
                const island = this.createPart(4, 1, 1.5, 0xffffff, {x: 0, y: 0.5, z: 0});
                this.setInteract(island, 'Kitchen Counter', ['KITCHEN_COOK', 'KITCHEN_EAT', 'HOME_DINNER']);

                // Fridge
                this.createPart(1.5, 3, 1.2, 0xd1d5db, {x: -6, y: 1.5, z: -5});
                
                // Table
                const table = this.createPart(3, 0.8, 2, 0x451a03, {x: 0, y: 0.4, z: 5});

                const exit = this.createPart(1.2, 3, 0.1, 0xf59e0b, {x: 7.4, y: 1.5, z: 0});
                exit.rotation.y = Math.PI/2;
                this.setInteract(exit, 'Garage Door', ['KITCHEN_EAT', 'HOME_DINNER'], true);

                this.player.position.set(-4, 0, 4);
            }

            buildGarage() {
                this.scene.background = new THREE.Color(0x1e293b);
                this.createFloor(12, 15, 0x475569);
                
                // Shelves
                for(let i=0; i<3; i++) this.createPart(4, 0.1, 1, 0x94a3b8, {x: -5, y: 1 + i, z: -6});

                // The Car
                const car = new THREE.Group();
                this.addPart(car, 2.2, 1.2, 4.5, 0x6366f1, 0, 0.6, 0); // Body
                this.addPart(car, 2.0, 0.8, 2.5, 0xbae6fd, 0, 1.4, 0); // Cabin
                this.scene.add(car); this.objects.push(car);
                this.setInteract(car, 'Your Car', 'GARAGE', true);

                this.player.position.set(-4, 0, 5);
            }

            buildRoad() {
                this.scene.background = new THREE.Color(0x020617);
                this.scene.fog = new THREE.Fog(0x020617, 10, 150);
                this.createFloor(20, 1000, 0x1e293b); // Road
                
                // Lane Lines
                for(let i=0; i<40; i++) this.createPart(0.4, 0.05, 6, 0xffffff, {x:0, y:0.1, z: 500 - i*25});

                // Car Cockpit Mockup
                const dash = this.createPart(4, 1, 1, 0x000000, {x: 0, y: 0.5, z: 495});
                dash.material.emissive = new THREE.Color(0x00f2ff);
                dash.material.emissiveIntensity = 0.2;

                const dest = this.createPart(40, 30, 40, 0x6366f1, {x: 0, y: 15, z: -450});
                this.setInteract(dest, 'Destination', ['DRIVE_WORK', 'LUNCH_WALK', 'DRIVE_HOME'], true);

                this.player.position.set(0, 0, 498);
            }

            buildOffice() {
                this.scene.background = new THREE.Color(0xf1f5f9);
                this.createFloor(40, 40, 0xe2e8f0);
                
                // Modern Desks
                for(let i=0; i<4; i++) {
                    const d = this.createPart(3, 0.8, 1.5, 0xffffff, {x: -10 + i*6, y: 0.4, z: -5});
                    this.addPart(d, 0.8, 0.6, 0.1, 0x111111, 0, 0.8, -0.6); // Monitor
                    if(i === 1) this.setInteract(d, 'Your Desk', ['OFFICE_DESK', 'WORK_MORE']);
                }

                // Coffee
                const pot = this.createPart(1, 1.5, 1, 0xef4444, {x: 15, y: 0.75, z: 15});
                this.setInteract(pot, 'Coffee Machine', 'OFFICE_COFFEE');

                const exit = this.createPart(2, 4, 0.2, 0x3b82f6, {x: 0, y: 2, z: 19.8});
                this.setInteract(exit, 'Exit Office', ['OFFICE_COFFEE', 'OFFICE_NETWORK'], true);

                this.player.position.set(0, 0, 15);
            }

            // --- HELPERS ---
            createFloor(w, d, color) {
                const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, d), new THREE.MeshStandardMaterial({color, roughness: 0.8}));
                mesh.rotation.x = -Math.PI/2; mesh.receiveShadow = true;
                this.scene.add(mesh); this.objects.push(mesh);
                return mesh;
            }

            createWall(x, y, z, w, h, d) { return this.createPart(w, h, d, 0xffffff, {x, y: y+h/2, z}); }

            createPart(w, h, d, color, pos) {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({color, roughness: 0.4}));
                m.position.set(pos.x, pos.y, pos.z); m.castShadow = true; m.receiveShadow = true;
                this.scene.add(m); this.objects.push(m);
                return m;
            }

            addPart(group, w, h, d, color, x, y, z) {
                const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({color, roughness: 0.4}));
                m.position.set(x, y, z); m.castShadow = true; m.receiveShadow = true;
                group.add(m);
                return m;
            }

            setInteract(obj, name, phaseId, isTrans = false) {
                obj.userData.interactName = name;
                obj.userData.phaseId = phaseId;
                obj.userData.isTrans = isTrans;
            }

            interact() {
                if(!this.interactable) return;
                const p = ROOMS[this.currentRoomIdx];
                const trigger = this.interactable.userData.phaseId;
                const canDo = Array.isArray(trigger) ? trigger.includes(p.id) : trigger === p.id;

                if(canDo) {
                    this.currentRoomIdx++;
                    if(this.currentRoomIdx >= ROOMS.length) {
                        this.currentRoomIdx = 0;
                        this.loadRoom(ROOMS[0]);
                        return;
                    }
                    const next = ROOMS[this.currentRoomIdx];
                    if(this.interactable.userData.isTrans || next.name !== p.name) {
                        this.loadRoom(next);
                    } else {
                        this.updateHUD();
                    }
                }
            }

            showTransition(title, sub) {
                this.isTransitioning = true;
                const overlay = document.getElementById('transition-overlay');
                const bar = document.getElementById('loader-fill');
                overlay.style.display = 'flex';
                overlay.style.opacity = 1;
                document.getElementById('trans-title').innerText = title;
                document.getElementById('trans-sub').innerText = sub;
                bar.style.width = '0%';
                setTimeout(() => bar.style.width = '100%', 100);
            }

            dismissTransition() {
                this.isTransitioning = false;
                document.getElementById('transition-overlay').style.opacity = 0;
                setTimeout(() => document.getElementById('transition-overlay').style.display = 'none', 800);
            }

            updateHUD() {
                const r = ROOMS[this.currentRoomIdx];
                document.getElementById('loc-val').innerText = r.name;
                document.getElementById('task-val').innerText = r.task;
            }

            updatePhysics(dt) {
                if(this.isTransitioning) return;
                
                const speed = 12 * dt;
                const move = new THREE.Vector3();
                if(this.keys['KeyW'] || this.keys['ArrowUp']) move.z -= 1;
                if(this.keys['KeyS'] || this.keys['ArrowDown']) move.z += 1;
                if(this.keys['KeyA'] || this.keys['ArrowLeft']) move.x -= 1;
                if(this.keys['KeyD'] || this.keys['ArrowRight']) move.x += 1;
                if(this.isJoyActive) { move.x = this.joyPos.x; move.z = this.joyPos.y; }

                if(move.length() > 0) {
                    move.normalize().multiplyScalar(speed);
                    this.player.position.add(move);
                    this.player.position.y = Math.abs(Math.sin(Date.now()*0.01))*0.04;
                }

                this.interactable = null;
                document.getElementById('interaction-prompt').style.display = 'none';
                this.objects.forEach(obj => {
                    if(obj.userData.phaseId && this.player.position.distanceTo(obj.position) < 3.5) {
                        this.interactable = obj;
                        document.getElementById('interaction-prompt').style.display = 'block';
                        document.getElementById('interaction-prompt').innerText = `[SPACE] ${obj.userData.interactName}`;
                    }
                });
            }

            loop() {
                this.updatePhysics(0.016);
                this.renderer.render(this.scene, this.camera);
                requestAnimationFrame(this.animate);
            }
        }

        new LifeGame();
    </script>
</body>
</html>
