<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dice Football Pro - K2 games</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --accent: #fbbf24;
            --field: #15803d;
            --p1: #3b82f6;
            --p2: #ef4444;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: manipulation; }
        
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #top-bar {
            background: #000;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            z-index: 100;
        }

        .score-box { display: flex; align-items: center; gap: 15px; }
        .team-score { font-size: 2rem; font-weight: 900; font-family: monospace; }
        .active-pos { width: 12px; height: 12px; border-radius: 50%; background: #fff; box-shadow: 0 0 10px #fff; opacity: 0; transition: 0.3s; }
        .active-pos.visible { opacity: 1; }

        .clock-box { text-align: center; }
        .time { font-size: 1.5rem; font-weight: bold; font-family: monospace; color: var(--accent); }
        .qtr { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }

        #game-content {
            flex: 1;
            display: flex;
            flex-direction: row;
            position: relative;
        }

        @media (max-width: 900px) {
            #game-content { flex-direction: column; }
            #sidebar { width: 100% !important; height: auto !important; border-right: none !important; border-top: 1px solid var(--border); padding: 10px !important; }
            .play-grid { grid-template-columns: repeat(3, 1fr) !important; }
        }

        #sidebar {
            width: 350px;
            background: var(--surface);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-right: 1px solid var(--border);
            overflow-y: auto;
        }

        .status-panel {
            background: var(--glass);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .down-text { font-size: 1.4rem; font-weight: 900; }
        .yard-text { font-size: 0.8rem; opacity: 0.6; text-transform: uppercase; margin-top: 5px; }

        .play-section-title { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; color: var(--accent); margin-top: 10px; opacity: 0.8; }
        
        .play-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .play-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 12px 8px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            transition: 0.2s;
            text-align: center;
        }
        .play-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(255,255,255,0.1); }
        .play-btn:active:not(:disabled) { transform: scale(0.95); }
        .play-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        .play-btn span { font-size: 0.55rem; opacity: 0.6; text-transform: uppercase; }
        .play-btn b { font-size: 0.8rem; }

        #field-area {
            flex: 1;
            position: relative;
            background: var(--field);
            overflow: hidden;
        }

        canvas { width: 100%; height: 100%; display: block; }

        #dice-overlay {
            position: absolute; inset: 0;
            background: rgba(15, 23, 42, 0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; backdrop-filter: blur(10px); text-align: center; padding: 20px;
        }

        .dice-box { display: flex; gap: 20px; margin: 20px 0; }
        .die {
            width: 80px; height: 80px; background: white; color: black;
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }
        .die.rolling { animation: dieRoll 0.15s infinite; }
        @keyframes dieRoll { 
            0% { transform: translate(2px, 2px) rotate(0deg); }
            25% { transform: translate(-2px, -2px) rotate(5deg); }
            50% { transform: translate(-2px, 2px) rotate(-5deg); }
            75% { transform: translate(2px, -2px) rotate(5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .coin {
            width: 80px; height: 80px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: white; border: 4px solid rgba(255,255,255,0.3);
            font-size: 0.8rem; text-align: center;
        }

        #event-banner {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 4rem; font-weight: 900; color: var(--accent);
            text-shadow: 0 0 20px rgba(0,0,0,0.8); display: none; z-index: 150;
            pointer-events: none; white-space: nowrap; font-style: italic;
            animation: bannerPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes bannerPop { from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        .commentary {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); padding: 10px 30px; border-radius: 20px;
            font-size: 1rem; color: #fff; white-space: nowrap; border: 1px solid var(--border);
            pointer-events: none; opacity: 0; transition: 0.3s;
        }
        .commentary.visible { opacity: 1; bottom: 40px; }

        .back-link {
            position: fixed; bottom: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 10px; font-size: 0.8rem;
            z-index: 1000;
        }

        #defense-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.8);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 180; backdrop-filter: blur(5px);
        }
    </style>

<body>

    <div id="top-bar">
        <div class="score-box">
            <div id="pos-p" class="active-pos"></div>
            <div id="p-score" class="team-score" style="color: var(--p1)">0</div>
            <div style="font-size: 0.7rem; opacity: 0.5;">PLAYER</div>
        </div>
        <div class="clock-box">
            <div id="qtr-text" class="qtr">1ST QTR</div>
            <div id="time-text" class="time">15:00</div>
        </div>
        <div class="score-box" style="flex-direction: row-reverse;">
            <div id="pos-ai" class="active-pos"></div>
            <div id="ai-score" class="team-score" style="color: var(--p2)">0</div>
            <div style="font-size: 0.7rem; opacity: 0.5;">CPU</div>
        </div>
    </div>

    <div id="game-content">
        <aside id="sidebar">
            <div class="status-panel">
                <div id="down-val" class="down-text">1ST & 10</div>
                <div id="yard-val" class="yard-text">BALL ON OWN 20</div>
            </div>

            <div id="playbook-offense">
                <div class="play-section-title">Run Plays</div>
                <div class="play-grid">
                    <button class="play-btn" onclick="game.play('dive')">
                        <b>FB DIVE</b><span>D6 Safe</span>
                    </button>
                    <button class="play-btn" onclick="game.play('stretch')">
                        <b>STRETCH</b><span>D10 Mid</span>
                    </button>
                </div>

                <div class="play-section-title">Pass Plays</div>
                <div class="play-grid">
                    <button class="play-btn" onclick="game.play('slant')">
                        <b>SLANT</b><span>D8 High %</span>
                    </button>
                    <button class="play-btn" onclick="game.play('post')">
                        <b>POST</b><span>D20 Mid %</span>
                    </button>
                    <button class="play-btn" onclick="game.play('hailmary')">
                        <b>HAIL MARY</b><span>D100 Chaos</span>
                    </button>
                </div>

                <div class="play-section-title">Special Teams</div>
                <div class="play-grid">
                    <button class="play-btn" id="punt-btn" onclick="game.play('punt')">
                        <b>PUNT</b><span>Change Pos</span>
                    </button>
                    <button class="play-btn" id="fg-btn" onclick="game.play('fg')">
                        <b>FIELD GOAL</b><span>Inside 45</span>
                    </button>
                </div>
            </div>

            <div id="playbook-defense" style="display:none">
                <div class="play-section-title">Choose Defense</div>
                <div class="play-grid">
                    <button class="play-btn" onclick="game.setDefense('base')">
                        <b>BASE</b><span>Balanced</span>
                    </button>
                    <button class="play-btn" onclick="game.setDefense('blitz')">
                        <b>BLITZ</b><span>Stop Run</span>
                    </button>
                    <button class="play-btn" onclick="game.setDefense('nickel')">
                        <b>NICKEL</b><span>Stop Pass</span>
                    </button>
                </div>
            </div>
            
            <button onclick="location.reload()" style="background:transparent; color: #64748b; border: 1px solid #334155; padding: 10px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; margin-top: auto;">RESTART GAME</button>
        </aside>

        <main id="field-area">
            <canvas id="fieldCanvas"></canvas>
            <div id="event-banner">TOUCHDOWN!</div>
            <div id="commentary-box" class="commentary">The kick is up... and it's good!</div>

            <div id="dice-overlay">
                <h3 id="dice-title" style="letter-spacing: 2px; color: var(--accent);">SHAKING...</h3>
                <div class="dice-box">
                    <div id="coin-res" class="coin" style="display:none">PASS</div>
                    <div id="die-res" class="die" style="display:none">6</div>
                </div>
                <p id="dice-desc" style="opacity: 0.9; font-weight: bold; font-size: 1.2rem; min-height: 1.5em;"></p>
                <button id="dice-cont" class="play-btn" style="margin-top: 20px; padding: 15px 40px; display:none;" onclick="game.resolvePlay()">
                    <b>CONTINUE</b>
                </button>
            </div>
        </main>
    </div>

    <script>
        class DiceFootball {
            constructor() {
                this.canvas = document.getElementById('fieldCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                this.state = {
                    score: [0, 0], // P1, CPU
                    possession: 0, // 0=P1, 1=CPU
                    qtr: 1,
                    time: 300, // 5:00 per quarter
                    yardLine: 20, 
                    down: 1,
                    dist: 10,
                    fdLine: 30,
                    gameOver: false,
                    selectedDefense: 'base',
                    waitingForDefense: false
                };

                this.pending = null;
                this.resize();
                this.setupUI();
                window.addEventListener('resize', () => this.resize());
                this.loop();
            }

            resize() {
                this.canvas.width = this.canvas.clientWidth;
                this.canvas.height = this.canvas.clientHeight;
            }

            setupUI() {
                document.getElementById('p-score').textContent = this.state.score[0];
                document.getElementById('ai-score').textContent = this.state.score[1];
                document.getElementById('pos-p').classList.toggle('visible', this.state.possession === 0);
                document.getElementById('pos-ai').classList.toggle('visible', this.state.possession === 1);
                
                const m = Math.floor(this.state.time / 60);
                const s = this.state.time % 60;
                document.getElementById('time-text').textContent = `${m}:${s.toString().padStart(2, '0')}`;
                document.getElementById('qtr-text').textContent = `${['1ST','2ND','3RD','4TH'][this.state.qtr-1]} QTR`;

                const relativeYard = this.state.possession === 0 ? this.state.yardLine : (100 - this.state.yardLine);
                const side = relativeYard <= 50 ? 'OWN' : 'OPP';
                const num = relativeYard > 50 ? 100 - relativeYard : relativeYard;
                document.getElementById('yard-val').textContent = `BALL ON ${side} ${num}`;
                document.getElementById('down-val').textContent = `${['1ST','2ND','3RD','4TH'][this.state.down-1]} & ${this.state.dist}`;

                const isPlayerTurn = this.state.possession === 0 && !this.state.gameOver;
                document.getElementById('playbook-offense').style.display = isPlayerTurn ? 'block' : 'none';
                document.getElementById('playbook-defense').style.display = (!isPlayerTurn && !this.state.gameOver) ? 'block' : 'none';

                const distToEZ = this.state.possession === 0 ? (100 - this.state.yardLine) : this.state.yardLine;
                document.getElementById('fg-btn').disabled = distToEZ > 50;
                document.getElementById('punt-btn').disabled = this.state.down < 4;
            }

            setDefense(type) {
                this.state.selectedDefense = type;
                this.aiPlay();
            }

            async play(type, defenseType = 'base') {
                if (this.state.gameOver) return;
                
                const overlay = document.getElementById('dice-overlay');
                const coin = document.getElementById('coin-res');
                const die = document.getElementById('die-res');
                const title = document.getElementById('dice-title');
                const desc = document.getElementById('dice-desc');
                const cont = document.getElementById('dice-cont');

                overlay.style.display = 'flex';
                title.textContent = "SHAKING...";
                coin.style.display = die.style.display = cont.style.display = 'none';
                die.classList.add('rolling');
                desc.textContent = "";

                await new Promise(r => setTimeout(r, 1200));
                die.classList.remove('rolling');

                let yards = 0;
                let dieVal = 0;
                let msg = "";
                let turnOver = false;
                let isSuccess = false;
                let points = 0;

                const roll = (max) => Math.floor(Math.random() * max) + 1;

                if (type === 'dive') { // D6 Safe Run
                    dieVal = roll(6);
                    isSuccess = defenseType !== 'blitz' || Math.random() > 0.3;
                    yards = isSuccess ? dieVal : roll(2);
                    msg = isSuccess ? `Plunged ahead for ${yards} yards.` : `Stuffed! Gained only ${yards} yards.`;
                } 
                else if (type === 'stretch') { // D10 Mid Run
                    dieVal = roll(10);
                    isSuccess = defenseType !== 'blitz' || Math.random() > 0.6;
                    if (isSuccess) {
                        yards = dieVal;
                        msg = `Swept outside for ${yards} yards!`;
                    } else {
                        yards = -roll(3);
                        msg = `Loss on the play! ${yards} yards.`;
                    }
                }
                else if (type === 'slant') { // D8 High % Pass
                    dieVal = roll(8);
                    isSuccess = defenseType !== 'nickel' || Math.random() > 0.4;
                    if (isSuccess) {
                        yards = dieVal + 2;
                        msg = `Quick slant! Caught for ${yards} yards.`;
                    } else {
                        msg = "Incomplete pass.";
                    }
                }
                else if (type === 'post') { // D20 Mid % Pass
                    dieVal = roll(20);
                    isSuccess = Math.random() > (defenseType === 'nickel' ? 0.6 : 0.45);
                    if (isSuccess) {
                        yards = dieVal;
                        msg = `A beauty! Caught downfield for ${yards} yards!`;
                    } else {
                        if (dieVal === 1) { turnOver = true; msg = "INTERCEPTED!"; }
                        else if (dieVal < 4) { yards = -8; msg = "SACKED! -8 Yards."; }
                        else msg = "Incomplete pass.";
                    }
                }
                else if (type === 'hailmary') { // D100 Chaos
                    dieVal = roll(100);
                    if (dieVal > 90) { yards = 50 + roll(40); isSuccess = true; msg = "THE MIRACLE! UNBELIEVABLE CATCH!"; }
                    else if (dieVal < 15) { turnOver = true; msg = "INTERCEPTED in the endzone!"; }
                    else msg = "Incomplete, ball knocked down.";
                }
                else if (type === 'fg') {
                    const distToEZ = this.state.possession === 0 ? (100 - this.state.yardLine) : this.state.yardLine;
                    const totalDist = distToEZ + 17;
                    dieVal = roll(20);
                    isSuccess = (dieVal + 30) > totalDist;
                    points = isSuccess ? 3 : 0;
                    msg = isSuccess ? `IT'S GOOD! (${totalDist} yards)` : "WIDE LEFT! No good.";
                }
                else if (type === 'punt') {
                    dieVal = roll(20) + 30;
                    yards = dieVal;
                    msg = `Punted ${yards} yards.`;
                    isSuccess = true;
                }

                title.textContent = "THE RESULTS";
                coin.style.display = 'flex';
                coin.textContent = (type === 'fg' || type === 'punt') ? type.toUpperCase() : (isSuccess ? 'SUCCESS' : 'FAIL');
                coin.style.background = isSuccess ? '#22c55e' : '#ef4444';
                die.style.display = 'flex';
                die.textContent = dieVal;
                desc.textContent = msg;
                cont.style.display = 'flex';

                this.pending = { type, yards, isSuccess, turnOver, points };
            }

            resolvePlay() {
                document.getElementById('dice-overlay').style.display = 'none';
                const p = this.pending;
                if (!p) return;

                // Clock management
                this.state.time -= 25 + Math.floor(Math.random() * 20);
                if (this.state.time <= 0) {
                    this.state.time = 0;
                    this.nextQuarter();
                }

                if (p.points > 0) {
                    this.scorePoints(p.points);
                } else if (p.turnOver) {
                    this.turnover("TURNOVER!");
                } else if (p.type === 'punt') {
                    this.changePossession(p.yards);
                } else {
                    const dir = this.state.possession === 0 ? 1 : -1;
                    this.state.yardLine += (p.yards * dir);

                    if (this.state.yardLine >= 100 || this.state.yardLine <= 0) {
                        this.scorePoints(7);
                    } else {
                        this.state.dist -= p.yards;
                        if (this.state.dist <= 0) {
                            this.state.down = 1;
                            this.state.dist = 10;
                            this.state.fdLine = this.state.yardLine + (10 * dir);
                            this.flashMsg("FIRST DOWN!");
                        } else {
                            this.state.down++;
                            if (this.state.down > 4) this.turnover("TURNOVER ON DOWNS");
                        }
                    }
                }

                this.pending = null;
                this.setupUI();
            }

            nextQuarter() {
                if (this.state.qtr < 4) {
                    this.state.qtr++;
                    this.state.time = 300;
                    this.flashMsg(`END OF ${['1ST','2ND','3RD','4TH'][this.state.qtr-2]} QTR`);
                    if (this.state.qtr === 3) {
                        // Halftime: switch sides logic could go here
                        this.flashMsg("HALFTIME");
                    }
                } else {
                    this.endGame();
                }
            }

            aiPlay() {
                if (this.state.gameOver) return;
                const distToEZ = this.state.yardLine; // AI is trying to get to 0
                let type = 'dive';
                
                if (this.state.down === 4) {
                    if (distToEZ < 35) type = 'fg';
                    else type = 'punt';
                } else {
                    if (this.state.dist > 12) type = Math.random() > 0.5 ? 'post' : 'slant';
                    else if (this.state.dist < 3) type = 'dive';
                    else type = Math.random() > 0.4 ? 'stretch' : 'slant';
                }
                
                this.play(type, this.state.selectedDefense);
            }

            scorePoints(pts) {
                this.state.score[this.state.possession] += pts;
                this.flashMsg(pts === 7 ? "TOUCHDOWN!" : "FIELD GOAL!");
                setTimeout(() => {
                    this.state.possession = 1 - this.state.possession;
                    this.state.yardLine = this.state.possession === 0 ? 25 : 75;
                    this.state.down = 1;
                    this.state.dist = 10;
                    this.state.fdLine = this.state.possession === 0 ? 35 : 65;
                    this.setupUI();
                }, 2000);
            }

            turnover(msg) {
                this.flashMsg(msg);
                setTimeout(() => {
                    this.state.possession = 1 - this.state.possession;
                    this.state.down = 1;
                    this.state.dist = 10;
                    const dir = this.state.possession === 0 ? 1 : -1;
                    this.state.fdLine = this.state.yardLine + (10 * dir);
                    this.setupUI();
                }, 2000);
            }

            changePossession(puntYards) {
                const dir = this.state.possession === 0 ? 1 : -1;
                this.state.yardLine += (puntYards * dir);
                if (this.state.yardLine > 100) this.state.yardLine = 80;
                if (this.state.yardLine < 0) this.state.yardLine = 20;
                this.state.possession = 1 - this.state.possession;
                this.state.down = 1;
                this.state.dist = 10;
                const newDir = this.state.possession === 0 ? 1 : -1;
                this.state.fdLine = this.state.yardLine + (10 * newDir);
                this.setupUI();
            }

            flashMsg(txt) {
                const el = document.getElementById('event-banner');
                el.textContent = txt;
                el.style.display = 'block';
                setTimeout(() => el.style.display = 'none', 2000);
                this.logCommentary(txt);
            }

            logCommentary(msg) {
                const cb = document.getElementById('commentary-box');
                cb.textContent = msg;
                cb.classList.add('visible');
                setTimeout(() => cb.classList.remove('visible'), 3000);
            }

            endGame() {
                this.state.gameOver = true;
                const p1 = this.state.score[0], ai = this.state.score[1];
                const msg = p1 > ai ? "VICTORY!" : (p1 < ai ? "DEFEAT" : "IT'S A TIE!");
                this.flashMsg(`FINAL: ${p1} - ${ai}`);
                setTimeout(() => alert(`GAME OVER\nPlayer: ${p1}\nCPU: ${ai}\n\n${msg}`), 2500);
            }

            draw() {
                const ctx = this.ctx;
                const w = this.canvas.width;
                const h = this.canvas.height;
                ctx.clearRect(0,0,w,h);

                // Field
                ctx.fillStyle = '#15803d';
                ctx.fillRect(0,0,w,h);
                
                // Stripes
                ctx.fillStyle = 'rgba(0,0,0,0.05)';
                for(let i=0; i<w; i+=w/10) ctx.fillRect(i, 0, w/20, h);

                const fieldW = w * 0.8;
                const fieldStart = w * 0.1;

                // Endzones
                ctx.fillStyle = '#1e40af'; ctx.fillRect(0, 0, fieldStart, h);
                ctx.fillStyle = '#991b1b'; ctx.fillRect(fieldStart + fieldW, 0, fieldStart, h);
                
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.save();
                ctx.translate(fieldStart/2, h/2); ctx.rotate(-Math.PI/2); ctx.fillText("HOME", 0, 0);
                ctx.restore();
                ctx.save();
                ctx.translate(fieldStart + fieldW + fieldStart/2, h/2); ctx.rotate(Math.PI/2); ctx.fillText("VISITOR", 0, 0);
                ctx.restore();

                // Lines
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 2;
                for(let i=0; i<=100; i+=10) {
                    const x = fieldStart + (i/100 * fieldW);
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
                    if (i > 0 && i < 100) {
                        ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '12px Courier';
                        const val = i > 50 ? 100 - i : i;
                        ctx.fillText(val, x, 30); ctx.fillText(val, x, h - 20);
                    }
                }

                // First Down Marker
                const fdX = fieldStart + (this.state.fdLine/100 * fieldW);
                ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 4;
                ctx.setLineDash([10, 5]);
                ctx.beginPath(); ctx.moveTo(fdX, 0); ctx.lineTo(fdX, h); ctx.stroke();
                ctx.setLineDash([]);

                // Ball
                const ballX = fieldStart + (this.state.yardLine/100 * fieldW);
                ctx.fillStyle = '#78350f';
                ctx.beginPath();
                ctx.ellipse(ballX, h/2, 18, 11, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                // Laces
                ctx.beginPath(); ctx.moveTo(ballX-5, h/2-2); ctx.lineTo(ballX+5, h/2-2); ctx.stroke();
                
                // Player Indicator (Arrow)
                const dir = this.state.possession === 0 ? 1 : -1;
                ctx.fillStyle = this.state.possession === 0 ? 'var(--p1)' : 'var(--p2)';
                ctx.beginPath();
                ctx.moveTo(ballX + (dir*25), h/2);
                ctx.lineTo(ballX + (dir*35), h/2 - 10);
                ctx.lineTo(ballX + (dir*35), h/2 + 10);
                ctx.fill();
            }

            loop() {
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        }

        window.game = new DiceFootball();

        // Gamepad Adapter
        (function() {
            let cursor = 0;
            let lastP = 0;
            function poll() {
                const pads = navigator.getGamepads();
                if (pads[0]) {
                    const p = pads[0]; const now = Date.now();
                    const btns = document.querySelectorAll('.play-btn:not(:disabled)');
                    btns.forEach(b => b.style.outline = '');
                    if (btns[cursor]) btns[cursor].style.outline = '4px solid var(--accent)';

                    if (now - lastP > 200) {
                        const b = p.buttons;
                        if (b[12].pressed || p.axes[1] < -0.5) cursor = Math.max(0, cursor - 2);
                        if (b[13].pressed || p.axes[1] > 0.5) cursor = Math.min(btns.length - 1, cursor + 2);
                        if (b[14].pressed || p.axes[0] < -0.5) cursor = Math.max(0, cursor - 1);
                        if (b[15].pressed || p.axes[0] > 0.5) cursor = Math.min(btns.length - 1, cursor + 1);

                        if (b[0].pressed && btns[cursor]) {
                            btns[cursor].click();
                            cursor = 0;
                        }
                        if (b[0].pressed && document.getElementById('dice-cont').style.display !== 'none') {
                            window.game.resolvePlay();
                        }
                        lastP = now;
                    }
                }
                requestAnimationFrame(poll);
            }
            poll();
        })();
        </script></body>
</html>
