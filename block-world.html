<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiniCraft Elite - K2 games</title>
    <style>
        :root {
            --ui-bg: rgba(0, 0, 0, 0.4);
            --ui-border: rgba(255, 255, 255, 0.3);
            --accent: #fbbf24;
        }

        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.8); font-size: 24px; pointer-events: none;
            z-index: 10;
        }

        #ui-header {
            position: absolute; top: 20px; left: 20px;
            color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none; z-index: 100;
        }

        #inventory {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 12px;
            background: var(--ui-bg); backdrop-filter: blur(10px);
            padding: 10px; border-radius: 16px; border: 1px solid var(--ui-border);
            z-index: 100;
        }
        .inv-slot {
            width: 55px; height: 55px; border: 3px solid #666;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: white; border-radius: 10px; cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }
        .inv-slot.active { border-color: var(--accent); background: rgba(255,255,255,0.2); transform: scale(1.1); }

        /* Mobile Controls */
        #mobile-overlay {
            position: absolute; inset: 0;
            display: none; pointer-events: none;
            z-index: 200;
        }

        .joystick-container {
            position: absolute; bottom: 40px; left: 40px;
            width: 150px; height: 150px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%; border: 2px solid var(--ui-border);
            pointer-events: auto;
        }
        .joystick-knob {
            position: absolute; top: 50%; left: 50%;
            width: 60px; height: 60px;
            background: white; border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .action-btns {
            position: absolute; bottom: 40px; right: 40px;
            display: flex; flex-direction: column; gap: 15px;
            pointer-events: auto;
        }
        .m-btn {
            width: 80px; height: 80px; background: var(--ui-bg);
            border: 2px solid white; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 900; font-size: 0.8rem;
            backdrop-filter: blur(5px);
        }
        .m-btn:active { background: white; color: black; }

        .back-link {
            position: fixed; top: 20px; right: 20px; color: white; text-decoration: none;
            background: rgba(0,0,0,0.3); padding: 10px 20px; border-radius: 12px; z-index: 1000;
            font-weight: bold; backdrop-filter: blur(5px); font-size: 0.9rem;
        }

        #instruction { font-size: 0.75rem; opacity: 0.7; margin-top: 4px; }
    </style>
</head>
<body>

<a href="index.html" class="back-link">← HUB</a>
<div id="crosshair">+</div>
<div id="ui-header">
    <h2 style="margin:0">MiniCraft Elite</h2>
    <div id="instruction">WASD: Move • Click: Mine • Right Click: Build</div>
</div>

<div id="inventory">
    <div class="inv-slot active" id="slot-1" onclick="selectSlot(0)" style="background-color:#4a7c3a">1</div>
    <div class="inv-slot" id="slot-2" onclick="selectSlot(1)" style="background-color:#7b5c3d">2</div>
    <div class="inv-slot" id="slot-3" onclick="selectSlot(2)" style="background-color:#808080">3</div>
</div>

<div id="mobile-overlay">
    <div class="joystick-container" id="joy-container">
        <div class="joystick-knob" id="joy-knob"></div>
    </div>
    <div class="action-btns">
        <div class="m-btn" id="btn-jump">JUMP</div>
        <div class="m-btn" id="btn-mine" style="border-color:#ef4444; color:#ef4444">MINE</div>
        <div class="m-btn" id="btn-build" style="border-color:#22c55e; color:#22c55e">BUILD</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let camera, scene, renderer;
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
    let velocity = new THREE.Vector3();
    let direction = new THREE.Vector3();
    let blocks = [];
    let selectedBlockType = 0;

    const worldSize = 32;
    const blockSize = 1;

    // Materials
    const materials = [
        new THREE.MeshLambertMaterial({ color: 0x4a7c3a }), // Grass
        new THREE.MeshLambertMaterial({ color: 0x7b5c3d }), // Dirt
        new THREE.MeshLambertMaterial({ color: 0x808080 })  // Stone
    ];
    const geometry = new THREE.BoxGeometry(blockSize, blockSize, blockSize);

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 0, 50);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(worldSize/2, 10, worldSize/2);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sunLight.position.set(10, 20, 10);
        sunLight.castShadow = true;
        scene.add(sunLight);

        // Movement Keys
        document.addEventListener('keydown', (e) => setMove(e.code, true));
        document.addEventListener('keyup', (e) => setMove(e.code, false));
        
        // Mouse Look
        document.body.addEventListener('mousedown', () => {
            if (!('ontouchstart' in window)) document.body.requestPointerLock();
        });

        document.addEventListener('mousemove', (event) => {
            if (document.pointerLockElement === document.body) {
                camera.rotation.y -= event.movementX * 0.002;
                camera.rotation.x -= event.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            }
        });

        // Terrain
        for (let x = 0; x < worldSize; x++) {
            for (let z = 0; z < worldSize; z++) {
                const h = Math.floor(Math.sin(x/6) * Math.cos(z/6) * 3) + 3;
                for (let y = 0; y <= h; y++) {
                    const type = y === h ? 0 : (y > h-2 ? 1 : 2);
                    addBlock(x, y, z, type);
                }
            }
        }

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        window.addEventListener('resize', onWindowResize);

        // Action Handlers
        document.addEventListener('mousedown', (e) => {
            if (document.pointerLockElement !== document.body && !('ontouchstart' in window)) return;
            if (e.button === 0) handleAction('mine');
            if (e.button === 2) handleAction('build');
        });

        document.addEventListener('keydown', (e) => {
            if(e.key === '1') selectSlot(0);
            if(e.key === '2') selectSlot(1);
            if(e.key === '3') selectSlot(2);
        });
        
        window.oncontextmenu = () => false;

        // Mobile Enhancement
        if ('ontouchstart' in window) {
            initMobileControls();
        }
    }

    function initMobileControls() {
        document.getElementById('mobile-overlay').style.display = 'block';
        document.getElementById('instruction').textContent = 'Tap Right Side to Look • Joysticks to Move';
        
        // Jump
        const btnJump = document.getElementById('btn-jump');
        btnJump.ontouchstart = (e) => { e.preventDefault(); if(canJump) velocity.y += 0.25; };
        
        // Mine/Build
        document.getElementById('btn-mine').ontouchstart = (e) => { e.preventDefault(); handleAction('mine'); };
        document.getElementById('btn-build').ontouchstart = (e) => { e.preventDefault(); handleAction('build'); };

        // Joystick
        const joyContainer = document.getElementById('joy-container');
        const joyKnob = document.getElementById('joy-knob');
        let joyActive = false;

        joyContainer.ontouchstart = (e) => { joyActive = true; };
        window.ontouchmove = (e) => {
            const touch = Array.from(e.touches).find(t => t.target.closest('#joy-container'));
            if (touch && joyActive) {
                const rect = joyContainer.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const dx = touch.clientX - centerX;
                const dy = touch.clientY - centerY;
                const dist = Math.min(60, Math.hypot(dx, dy));
                const angle = Math.atan2(dy, dx);
                
                joyKnob.style.left = `calc(50% + ${Math.cos(angle) * dist}px)`;
                joyKnob.style.top = `calc(50% + ${Math.sin(angle) * dist}px)`;
                
                moveForward = dy < -20;
                moveBackward = dy > 20;
                moveLeft = dx < -20;
                moveRight = dx > 20;
            }

            // Look Swipe (Right side of screen)
            const lookTouch = Array.from(e.touches).find(t => t.clientX > window.innerWidth / 2 && !t.target.closest('.m-btn'));
            if (lookTouch) {
                if (this.lastTouchX) {
                    const dx = lookTouch.clientX - this.lastTouchX;
                    const dy = lookTouch.clientY - this.lastTouchY;
                    camera.rotation.y -= dx * 0.005;
                    camera.rotation.x -= dy * 0.005;
                    camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
                }
                this.lastTouchX = lookTouch.clientX;
                this.lastTouchY = lookTouch.clientY;
            }
        };
        window.ontouchend = (e) => {
            if (e.touches.length === 0 || !Array.from(e.touches).some(t => t.target.closest('#joy-container'))) {
                joyActive = false;
                joyKnob.style.left = '50%';
                joyKnob.style.top = '50%';
                moveForward = moveBackward = moveLeft = moveRight = false;
            }
            this.lastTouchX = this.lastTouchY = null;
        };
    }

    function addBlock(x, y, z, type) {
        const block = new THREE.Mesh(geometry, materials[type]);
        block.position.set(x, y, z);
        block.userData.type = type;
        scene.add(block);
        blocks.push(block);
    }

    function handleAction(type) {
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera({x: 0, y: 0}, camera);
        const intersects = raycaster.intersectObjects(blocks);

        if (intersects.length > 0) {
            const intersect = intersects[0];
            if (type === 'mine') {
                scene.remove(intersect.object);
                blocks = blocks.filter(b => b !== intersect.object);
            } else {
                const pos = intersect.object.position.clone().add(intersect.face.normal);
                if(pos.distanceTo(camera.position) > 0.8) addBlock(pos.x, pos.y, pos.z, selectedBlockType);
            }
        }
    }

    function selectSlot(idx) {
        selectedBlockType = idx;
        document.querySelectorAll('.inv-slot').forEach((s, i) => {
            s.classList.toggle('active', i === idx);
        });
    }

    function setMove(code, active) {
        switch (code) {
            case 'KeyW': moveForward = active; break;
            case 'KeyA': moveLeft = active; break;
            case 'KeyS': moveBackward = active; break;
            case 'KeyD': moveRight = active; break;
            case 'Space': if (active && canJump) { velocity.y += 0.22; canJump = false; } break;
        }
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);

        const delta = 0.1;
        velocity.x -= velocity.x * 10.0 * delta * 0.1;
        velocity.z -= velocity.z * 10.0 * delta * 0.1;
        velocity.y -= 0.5 * delta * 0.15; // Gravity

        direction.z = Number(moveForward) - Number(moveBackward);
        direction.x = Number(moveRight) - Number(moveLeft);
        direction.normalize();

        if (moveForward || moveBackward) velocity.z -= direction.z * 1.5 * delta;
        if (moveLeft || moveRight) velocity.x -= direction.x * 1.5 * delta;

        camera.translateX(-velocity.x);
        camera.translateZ(velocity.z);
        camera.position.y += velocity.y;

        if (camera.position.y < 3) {
            velocity.y = 0;
            camera.position.y = 3;
            canJump = true;
        }

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
