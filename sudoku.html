<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(9, 1fr); grid-template-rows: repeat(9, 1fr); border: 3px solid #1e293b; background: #fff; width: 90vmin; height: 90vmin; max-width: 450px; max-height: 450px; }
        .cell { width: 100%; height: 100%; border: 1px solid #cbd5e1; display: flex; align-items: center; justify-content: center; font-size: 4vmin; cursor: pointer; }
        .cell.cursor { outline: 4px solid #fbbf24; z-index: 10; transform: scale(1.1); box-shadow: 0 0 15px #fbbf24; }
        .cell:nth-child(3n) { border-right: 2px solid #1e293b; }
        .grid > .cell:nth-child(n+19):nth-child(-n+27), .grid > .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid #1e293b; }
        .fixed { background: #f8fafc; font-weight: bold; }
        .selected { background: #3b82f6 !important; color: white; }
        .controls { margin-top: 20px; display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; width: 360px; }
        .num-btn { width: 35px; height: 35px; background: #fff; border: 1px solid #cbd5e1; border-radius: 4px; cursor: pointer; }
        .back { margin-top: 20px; text-decoration: none; color: #64748b; }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-CCZ9JJGEDP');
</script>
</head>
<body>
    <h1>Sudoku</h1>
    <div id="grid" class="grid"></div>
    <div class="controls" id="controls"></div>
    <button onclick="location.reload()" style="margin-top:20px; padding:8px 16px;">New Game</button>
    <a href="index.html" class="back">← HUB</a>

    <script>
        const grid = document.getElementById('grid');
        const controls = document.getElementById('controls');
        let selected = null;
        let puzzle = [
            5,3,0,0,7,0,0,0,0, 6,0,0,1,9,5,0,0,0, 0,9,8,0,0,0,0,6,0,
            8,0,0,0,6,0,0,0,3, 4,0,0,8,0,3,0,0,1, 7,0,0,0,2,0,0,0,6,
            0,6,0,0,0,0,2,8,0, 0,0,0,4,1,9,0,0,5, 0,0,0,0,8,0,0,7,9
        ];

        function init() {
            puzzle.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = 'cell' + (val !== 0 ? ' fixed' : '');
                cell.textContent = val !== 0 ? val : '';
                cell.onclick = () => { if(val === 0) selectCell(cell, i); };
                grid.appendChild(cell);
            });

            for(let i=1; i<=9; i++) {
                const btn = document.createElement('button');
                btn.className = 'num-btn'; btn.textContent = i;
                btn.onclick = () => setNum(i);
                controls.appendChild(btn);
            }
        }

        function selectCell(el, i) {
            if(selected) selected.el.classList.remove('selected');
            selected = { el, i };
            el.classList.add('selected');
        }

        function setNum(n) {
            if(!selected) return;
            selected.el.textContent = n;
            // Simplified validation check could be added here
        }

        init();

        // Gamepad Adapter
        (function() {
            let r=4, c=4;
            let lastP = 0;
            function poll() {
                const pads = navigator.getGamepads();
                if (pads[0]) {
                    const p = pads[0]; const now = Date.now();
                    document.querySelectorAll('.cell').forEach(el => el.classList.remove('cursor'));
                    const idx = r * 9 + c;
                    const cells = document.querySelectorAll('.cell');
                    if (cells[idx]) cells[idx].classList.add('cursor');

                    if (now - lastP > 180) {
                        const b = p.buttons;
                        if (b[12].pressed || p.axes[1] < -0.5) r = Math.max(0, r - 1);
                        if (b[13].pressed || p.axes[1] > 0.5) r = Math.min(8, r + 1);
                        if (b[14].pressed || p.axes[0] < -0.5) c = Math.max(0, c - 1);
                        if (b[15].pressed || p.axes[0] > 0.5) c = Math.min(8, c + 1);
                        
                        if (b[0].pressed) selectCell(cells[idx], idx);
                        // Map pad buttons to numbers 1-4 (standard diamond)
                        if (b[0].pressed) setNum(1); if (b[1].pressed) setNum(2);
                        if (b[2].pressed) setNum(3); if (b[3].pressed) setNum(4);
                        if (b[4].pressed) setNum(5); if (b[5].pressed) setNum(6);
                        lastP = now;
                    }
                }
                requestAnimationFrame(poll);
            }
            poll();
        })();
    </script>
</body>
</html>
