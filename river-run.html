<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>River Run – K2 Games</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a1628; overflow:hidden; touch-action:none; font-family:'Segoe UI',sans-serif; }
canvas { display:block; }
#ui { position:fixed; top:0; left:0; width:100%; pointer-events:none; display:flex; justify-content:space-between; padding:1rem 1.4rem; z-index:10; }
.stat { background:rgba(0,0,0,.50); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,.15); border-radius:10px; padding:.4rem .9rem; color:#fff; font-size:.82rem; font-weight:600; }
.stat span { color:#38bdf8; }
.screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:20; background:rgba(10,22,40,.93); backdrop-filter:blur(14px); }
.screen h1 { font-size:clamp(2rem,6vw,4rem); font-weight:900; background:linear-gradient(135deg,#38bdf8,#0ea5e9,#7dd3fc); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.screen p { color:#94a3b8; margin:.6rem 0 1.8rem; font-size:1rem; text-align:center; max-width:320px; }
.btn { padding:.9rem 2.4rem; border-radius:50px; border:none; cursor:pointer; font-size:1rem; font-weight:800; letter-spacing:1px; background:linear-gradient(135deg,#0ea5e9,#0284c7); color:#fff; transition:.25s; box-shadow:0 0 24px rgba(14,165,233,.4); }
.btn:hover { transform:scale(1.07); filter:brightness(1.15); }
.btn-ghost { margin-top:.7rem; background:transparent; border:1px solid rgba(255,255,255,.2); color:#94a3b8; box-shadow:none; font-weight:600; }
.score-big { font-size:clamp(3rem,10vw,6rem); font-weight:900; color:#38bdf8; text-shadow:0 0 40px rgba(56,189,248,.5); margin:.3rem 0; }
.hi { font-size:.85rem; color:#64748b; margin-bottom:1.4rem; }
.hi span { color:#f59e0b; }
#touch-hint { position:fixed; bottom:1.2rem; left:50%; transform:translateX(-50%); color:rgba(255,255,255,.35); font-size:.75rem; pointer-events:none; z-index:10; transition:opacity .5s; }
#drop-flash { position:fixed; inset:0; pointer-events:none; z-index:8; background:rgba(255,255,255,0); transition:background .12s; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="drop-flash"></div>
<div id="ui">
  <div class="stat">SCORE <span id="sco">0</span></div>
  <div class="stat">LEVEL <span id="lev">1</span></div>
  <div class="stat">LIVES <span id="liv">❤️❤️❤️</span></div>
</div>
<div id="touch-hint">TOUCH LEFT / RIGHT TO STEER</div>
<div class="screen" id="ss">
  <h1>🚣 RIVER RUN</h1>
  <p>Ride the rapids — steer through gorges, dodge rocks &amp; logs as the river rages.</p>
  <button class="btn" id="sb">LAUNCH</button>
  <button class="btn btn-ghost" onclick="location='index.html'">← Back to Vault</button>
</div>
<div class="screen" id="os" style="display:none">
  <h1>WIPED OUT</h1>
  <div class="score-big" id="fs">0</div>
  <div class="hi">Best: <span id="hs">0</span></div>
  <button class="btn" id="rb">TRY AGAIN</button>
  <button class="btn btn-ghost" onclick="location='index.html'">← Back to Vault</button>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H,HY,PY;
const HP=.20,PP=.70;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight;HY=H*HP;PY=H*PP;}
addEventListener('resize',()=>{resize();if(GS!=='playing')bg();});
resize();

const MAXD=1100,SPND=MAXD*.88,BSP=2.5,SPI=.00025,PMAX=300,ST=90;
const RBW=52,RFW=38,RL=80;

let GS='idle',wO,sp,fc,lv,sc,li,nO,iT,sY,wT;
let raft,obs,pts,wks;
let LE=[],RE=[];
let hiS=+localStorage.getItem('rr_hi')||0;

function river(d){
  const k=d*.001;
  const cx=W*.5+Math.sin(k*6.9)*W*.094+Math.sin(k*2.7+1.5)*W*.047;
  const g=Math.max(0,Math.sin(k*5.1+.8)),pl=Math.max(0,Math.sin(k*1.8+2.1));
  return{cx,hw:Math.max(W*.06,Math.min(W*.30,W*.175-g*W*.088+pl*W*.082))};
}
const isR=d=>Math.sin(d*.022)>.54;
const isD=d=>Math.sin(d*.009)>.86;
const pSY=t=>HY+t*(PY-HY);
const pSX=(x,t)=>W*.5+(x-W*.5)*t;
const pSC=t=>t*.88+.12;

function edges(){
  LE.length=RE.length=0;
  for(let i=0;i<=ST;i++){
    const t=i/ST,sy=pSY(t),dep=wO+(1-t)*MAXD;
    const{cx,hw}=river(dep),px=pSX(cx,t);
    LE.push([px-hw*t,sy]);RE.push([px+hw*t,sy]);
  }
}

function bg(){
  const sg=X.createLinearGradient(0,0,0,HY*1.35);
  sg.addColorStop(0,'#0c1f0c');sg.addColorStop(.55,'#153615');sg.addColorStop(1,'#1e5c1e');
  X.fillStyle=sg;X.fillRect(0,0,W,HY*1.4);
  const mg=X.createLinearGradient(0,HY*.6,0,HY*1.3);
  mg.addColorStop(0,'rgba(160,220,190,0)');mg.addColorStop(1,'rgba(140,215,180,.36)');
  X.fillStyle=mg;X.fillRect(0,HY*.6,W,HY*.7);
}

function banks(){
  const bg=X.createLinearGradient(0,HY,0,PY+35);
  bg.addColorStop(0,'#1a3d1a');bg.addColorStop(.5,'#1e5c1e');bg.addColorStop(1,'#15803d');
  X.beginPath();X.moveTo(0,HY);
  LE.forEach(([a,b])=>X.lineTo(a,b));
  X.lineTo(0,PY+35);X.closePath();X.fillStyle=bg;X.fill();
  X.beginPath();X.moveTo(W,HY);
  RE.forEach(([a,b])=>X.lineTo(a,b));
  X.lineTo(W,PY+35);X.closePath();X.fillStyle=bg;X.fill();
  X.strokeStyle='rgba(56,189,248,.18)';X.lineWidth=2;
  X.beginPath();LE.forEach(([a,b],i)=>i?X.lineTo(a,b):X.moveTo(a,b));X.stroke();
  X.beginPath();RE.forEach(([a,b],i)=>i?X.lineTo(a,b):X.moveTo(a,b));X.stroke();
}

function water(){
  X.beginPath();
  LE.forEach(([a,b],i)=>i?X.lineTo(a,b):X.moveTo(a,b));
  for(let i=RE.length-1;i>=0;i--)X.lineTo(RE[i][0],RE[i][1]);
  X.closePath();
  const r=isR(wO),d=isD(wO);
  const wg=X.createLinearGradient(W*.5,HY,W*.5,PY);
  wg.addColorStop(0,d?'#081a2e':'#0b2e47');wg.addColorStop(.42,r?'#0369a1':'#075985');wg.addColorStop(1,r?'#38bdf8':'#0ea5e9');
  X.fillStyle=wg;X.fill();
  X.save();
  const rp=new Path2D();
  LE.forEach(([a,b],i)=>i?rp.lineTo(a,b):rp.moveTo(a,b));
  for(let i=RE.length-1;i>=0;i--)rp.lineTo(RE[i][0],RE[i][1]);
  rp.closePath();X.clip(rp);
  for(let s=4;s<ST;s+=7){
    const t=s/ST,sy=pSY(t),lx=LE[s]?.[0]??W*.2,rx=RE[s]?.[0]??W*.8,w=rx-lx;
    if(w<4)continue;
    const ph=(wT*.018+s*.31)%(Math.PI*2),al=(0.038+Math.sin(wT*.05+s*.4)*.028)*t;
    if(al<.004)continue;
    X.strokeStyle=(r||d)?`rgba(255,255,255,${Math.min(.35,al*3.5)})`:`rgba(147,210,255,${al})`;
    X.lineWidth=((r||d)?2.2:1.3)*t;
    const amp=w*.055*t;
    X.beginPath();
    X.moveTo(lx+w*.1,sy+Math.sin(ph)*amp);
    X.quadraticCurveTo(lx+w*.5,sy+Math.sin(ph+1.2)*amp,rx-w*.1,sy+Math.sin(ph+2.4)*amp);
    X.stroke();
  }
  X.restore();
}

function ptree(x,y,r){
  if(x<-r||x>W+r||y<HY-r*2||y>PY+r)return;
  const hu=128+Math.sin(x*.09)*7,li=21+Math.sin(x*.13)*4;
  X.fillStyle='#3d1f0a';X.fillRect(x-r*.12,y,r*.24,r*.46);
  X.fillStyle=`hsl(${hu},53%,${li}%)`;
  X.beginPath();X.moveTo(x,y-r*1.48);X.lineTo(x-r*.90,y+r*.10);X.lineTo(x+r*.90,y+r*.10);X.closePath();X.fill();
  X.fillStyle=`hsl(${hu},53%,${li+8}%)`;
  X.beginPath();X.moveTo(x,y-r*2.1);X.lineTo(x-r*.62,y-r*.52);X.lineTo(x+r*.62,y-r*.52);X.closePath();X.fill();
}

function trees(){
  for(let s=3;s<ST-2;s+=5){
    const t=s/ST,tr=5+t*44,dep=wO+(1-t)*MAXD;
    const n1=Math.abs(Math.sin(dep*.031+3.1)),n2=Math.abs(Math.sin(dep*.048+7.3));
    const n3=Math.abs(Math.sin(dep*.023+1.7)),n4=Math.abs(Math.sin(dep*.061+5.9));
    const lx=LE[s]?.[0]??W*.3,ly=LE[s]?.[1]??pSY(t);
    const rx=RE[s]?.[0]??W*.7,ry=RE[s]?.[1]??pSY(t);
    ptree(lx-tr*(.55+n1*2.8),ly,tr);ptree(lx-tr*(.45+n2*1.9),ly-tr*.35,tr*.80);
    ptree(rx+tr*(.55+n3*2.8),ry,tr);ptree(rx+tr*(.45+n4*1.9),ry-tr*.35,tr*.80);
  }
}

function spawn(){
  const sd=wO+SPND,{cx,hw}=river(sd),maxDev=Math.max(hw*.6,W*.08);
  const wx=cx+(Math.random()-.5)*maxDev*2;
  const weights=[0,0,0.3,0.7];
  const r=Math.random(),tp=weights.reduce((sum,w,i)=>r<sum+w?['rock','rock','log'][i]:null)??'branch';
  const o={wd:sd,wx,tp,rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.022,active:true};
  if(tp==='rock'){o.rx=W*.022+Math.random()*W*.012;o.ry=W*.015+Math.random()*W*.009;o.col=`hsl(${195+Math.random()*28|0},11%,${40+Math.random()*18|0}%)`;}
  else if(tp==='log'){o.ln=W*.12+Math.random()*W*.08;o.w=W*.013+Math.random()*W*.008;o.an=(Math.random()-.5)*1.3;}
  else{o.ln=W*.10+Math.random()*W*.07;o.br=2+(0|Math.random()*2);}
  obs.push(o);
}

function hr(o){
  if(o.tp==='rock')return Math.max(o.rx,o.ry)*.82;
  if(o.tp==='log')return o.ln*.35;
  return o.ln*.30;
}

function dobs(o){
  const rd=o.wd-wO;
  if(rd<-40||rd>MAXD*.97)return;
  const t=1-rd/MAXD;
  if(t<.05||t>1.06)return;
  const sy=pSY(t),sx=pSX(o.wx,t),sc=pSC(t);
  X.save();X.translate(sx,sy);X.scale(sc,sc*.60);
  if(o.tp==='rock'){
    X.fillStyle='rgba(0,0,0,.22)';X.beginPath();X.ellipse(5,8,o.rx,o.ry*.45,0,0,Math.PI*2);X.fill();
    X.fillStyle=o.col;X.beginPath();X.ellipse(0,0,o.rx,o.ry,o.rot,0,Math.PI*2);X.fill();
    X.fillStyle='rgba(255,255,255,.13)';X.beginPath();X.ellipse(-o.rx*.22,-o.ry*.32,o.rx*.40,o.ry*.27,o.rot-.5,0,Math.PI*2);X.fill();
    X.strokeStyle='rgba(255,255,255,.20)';X.lineWidth=2.5;X.beginPath();X.ellipse(0,0,o.rx+9,o.ry+6,o.rot,0,Math.PI*2);X.stroke();
  }else if(o.tp==='log'){
    X.rotate(o.an);
    const g=X.createLinearGradient(-o.ln/2,0,o.ln/2,0);g.addColorStop(0,'#92400e');g.addColorStop(.5,'#78350f');g.addColorStop(1,'#92400e');
    X.fillStyle=g;X.beginPath();X.roundRect(-o.ln/2,-o.w/2,o.ln,o.w,o.w/2);X.fill();
    X.strokeStyle='rgba(0,0,0,.28)';X.lineWidth=1;
    for(let j=-o.ln*.35;j<o.ln*.35;j+=13){X.beginPath();X.moveTo(j,-o.w/2);X.lineTo(j+5,o.w/2);X.stroke();}
  }else{
    X.rotate(o.rot);X.strokeStyle='#78350f';X.lineWidth=4;X.lineCap='round';
    X.beginPath();X.moveTo(-o.ln/2,0);X.lineTo(o.ln/2,0);X.stroke();
    for(let b=0;b<o.br;b++){const bx=-o.ln*.3+(b/(o.br-1||1))*o.ln*.6,by=(b%2?1:-1)*(14+b*6);X.lineWidth=2;X.beginPath();X.moveTo(bx,0);X.lineTo(bx+8,by);X.stroke();}
  }
  X.restore();
}

function draftA(){
  const r=isR(wO),sh=sY>.3?(Math.random()-.5)*sY:0,bob=Math.sin(raft.bobT)*(r?4.5:2.5);
  X.save();X.translate(raft.x,PY+bob+sh);X.rotate(raft.tilt*.17);
  const bY=RL*.44,fY=-RL*.56;
  X.fillStyle='rgba(14,165,233,.12)';X.beginPath();X.ellipse(0,bY+6,RBW*.88,7,0,0,Math.PI*2);X.fill();
  // tube rim
  X.fillStyle='#9b1c1c';
  X.beginPath();X.moveTo(-RBW*.5,bY);X.bezierCurveTo(-RBW*.5,bY+8,RBW*.5,bY+8,RBW*.5,bY);X.lineTo(RFW*.5,fY);X.bezierCurveTo(RFW*.5,fY-6,-RFW*.5,fY-6,-RFW*.5,fY);X.closePath();X.fill();
  // top face
  X.fillStyle='#dc2626';
  X.beginPath();X.moveTo(-RBW*.5+1,bY-2);X.lineTo(RBW*.5-1,bY-2);X.lineTo(RFW*.5-1,fY+2);X.lineTo(-RFW*.5+1,fY+2);X.closePath();X.fill();
  // left wall
  X.fillStyle='#b91c1c';
  X.beginPath();X.moveTo(-RBW*.5,bY);X.lineTo(-RBW*.5+11,bY-4);X.lineTo(-RFW*.5+9,fY+4);X.lineTo(-RFW*.5,fY);X.closePath();X.fill();
  // right wall
  X.beginPath();X.moveTo(RBW*.5,bY);X.lineTo(RBW*.5-11,bY-4);X.lineTo(RFW*.5-9,fY+4);X.lineTo(RFW*.5,fY);X.closePath();X.fill();
  // floor
  X.fillStyle='#0c3a5a';
  X.beginPath();X.moveTo(-RBW*.5+11,bY-5);X.lineTo(RBW*.5-11,bY-5);X.lineTo(RFW*.5-9,fY+5);X.lineTo(-RFW*.5+9,fY+5);X.closePath();X.fill();
  // sheen
  X.fillStyle='rgba(255,120,120,.17)';
  X.beginPath();X.moveTo(-RBW*.5,bY-2);X.lineTo(-RBW*.5+9,bY-6);X.lineTo(-RFW*.5+7,fY+5);X.lineTo(-RFW*.5,fY+2);X.closePath();X.fill();
  // paddlers
  pad(-17,bY-17,-1);pad(17,bY-17,1);pad(-14,fY+24,-1);pad(14,fY+24,1);
  // inv flash
  if(iT>0&&Math.floor(iT/5)%2===0){X.fillStyle='rgba(255,255,255,.42)';X.beginPath();X.moveTo(-RBW*.5,bY);X.lineTo(RBW*.5,bY);X.lineTo(RFW*.5,fY);X.lineTo(-RFW*.5,fY);X.closePath();X.fill();}
  X.restore();
}

function pad(x,y,s){
  X.save();X.translate(x,y);
  X.fillStyle=s===-1?'#1e40af':'#1e3a5f';
  X.beginPath();X.roundRect(-5,-12,10,13,[3,3,2,2]);X.fill();
  X.strokeStyle='#2563eb';X.lineWidth=1;
  X.beginPath();X.moveTo(-3,-8);X.lineTo(3,-8);X.stroke();
  X.beginPath();X.moveTo(-3,-4);X.lineTo(3,-4);X.stroke();
  X.fillStyle=s===-1?'#fbbf24':'#f97316';
  X.beginPath();X.ellipse(0,-14,6.5,5.2,0,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(255,255,255,.28)';X.beginPath();X.ellipse(-2,-15.2,2.4,1.7,-.3,0,Math.PI*2);X.fill();
  X.strokeStyle=s===-1?'#d97706':'#ea580c';X.lineWidth=1.5;X.beginPath();X.ellipse(0,-14,7.5,6.2,0,0,Math.PI*2);X.stroke();
  X.fillStyle='#3b82f6';X.beginPath();X.roundRect(s*4,-9,s*7,5,2);X.fill();
  const pT=Math.sin(raft.bobT*2.9+(s>0?Math.PI:0));
  X.save();X.translate(s*11,-5);
  const ex=s*20,ey=-12+pT*10;
  X.strokeStyle='#92400e';X.lineWidth=2.5;X.lineCap='round';
  X.beginPath();X.moveTo(0,0);X.lineTo(ex,ey);X.stroke();
  X.save();X.translate(ex,ey);X.rotate(s*(.58+pT*.22));
  X.fillStyle='#a16207';X.strokeStyle='#78350f';X.lineWidth=1;
  X.beginPath();X.ellipse(0,0,5,11,0,0,Math.PI*2);X.fill();X.stroke();
  if(pT<-.55){X.fillStyle='rgba(147,210,255,.78)';X.beginPath();X.arc(s*2,12,2,0,Math.PI*2);X.fill();}
  X.restore();X.restore();X.restore();
}

function splash(x,y,n=14,c='#7dd3fc'){
  for(let i=0;i<n&&pts.length<PMAX;i++){
    const a=Math.random()*Math.PI*2,sp=1.4+Math.random()*3.8;
    pts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2.8,life:1,dc:.026+Math.random()*.04,r:1.8+Math.random()*3,c});
  }
}
function wake(x,y){wks.push({x,y,life:1,w:7+Math.random()*5});}

function upPts(){
  for(let i=pts.length-1;i>=0;i--){const p=pts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.19;p.life-=p.dc;if(p.life<=0)pts.splice(i,1);}
  for(let i=wks.length-1;i>=0;i--){wks[i].life-=.024;wks[i].w+=.7;if(wks[i].life<=0)wks.splice(i,1);}
}
function drPts(){
  for(const p of pts){X.globalAlpha=p.life;X.fillStyle=p.c;X.beginPath();X.arc(p.x,p.y,p.r,0,Math.PI*2);X.fill();}
  X.globalAlpha=1;X.strokeStyle='rgba(255,255,255,.32)';
  for(const w of wks){X.globalAlpha=w.life*.44;X.lineWidth=1.5;X.beginPath();X.ellipse(w.x,w.y,w.w,w.w*.32,0,0,Math.PI*2);X.stroke();}
  X.globalAlpha=1;
}

const keys={};
addEventListener('keydown',e=>{keys[e.code]=true;});
addEventListener('keyup',e=>{keys[e.code]=false;});
let txS=null,txC=null;
C.addEventListener('pointerdown',e=>{txS=txC=e.clientX;});
C.addEventListener('pointermove',e=>{if(txS!==null)txC=e.clientX;});
C.addEventListener('pointerup',()=>{txS=txC=null;});
C.addEventListener('pointercancel',()=>{txS=txC=null;});
let tX=0;addEventListener('deviceorientation',e=>{if(e.gamma!==null)tX=Math.max(-30,Math.min(30,e.gamma))/30;});
function inp(){
  if(keys.ArrowLeft||keys.KeyA)return -1;if(keys.ArrowRight||keys.KeyD)return 1;
  if(Math.abs(tX)>.08)return tX;
  if(txS!==null&&txC!==null)return Math.max(-1,Math.min(1,(txC-txS)/60));
  return 0;
}

const S=document.getElementById('sco'),L=document.getElementById('lev'),V=document.getElementById('liv');
function hud(){S.textContent=sc;L.textContent=lv;V.textContent='❤️'.repeat(Math.max(0,li))||'💀';}

function init(){
  wO=0;sp=BSP;fc=0;lv=1;li=3;sc=0;nO=160;iT=0;sY=0;wT=0;
  const{cx}=river(0);raft={x:cx,vx:0,tilt:0,bobT:0};
  obs=[];pts=[];wks=[];hud();
}

function col(){
  if(iT>0)return;
  for(let i=obs.length-1;i>=0;i--){
    const o=obs[i];
    const rd=o.wd-wO;if(rd<-40||rd>120)continue;
    const t=1-rd/MAXD,sx=pSX(o.wx,t),sy=pSY(t);
    const hitDist=hr(o)+RBW*.42;
    if(Math.abs(raft.x-sx)<hitDist&&Math.abs(PY-sy)<40){
      li--;iT=90;sY=18;splash(raft.x,PY,38,'#93c5fd');hud();
      obs.splice(i,1);
      if(li<=0)end();break;
    }
  }
}

let ldp=false;
function upd(){
  fc++;wT+=1;wO+=sp;sp+=SPI;
  const nl=1+(fc/600|0);if(nl!==lv){lv=nl;hud();}
  sc=wO*.55|0;S.textContent=sc;
  if(sY>.3)sY*=.85;else sY=0;if(iT>0)iT--;
  const i=inp();raft.vx+=i*.42;raft.vx*=.84;raft.x+=raft.vx;raft.tilt+=(i-raft.tilt)*.11;raft.bobT+=.07;
  const{cx,hw}=river(wO),hR=RBW*.48+5;
  if(raft.x<cx-hw+hR){raft.x=cx-hw+hR;raft.vx*=-.35;}
  if(raft.x>cx+hw-hR){raft.x=cx+hw-hR;raft.vx*=-.35;}
  if(fc%4===0)wake(raft.x,PY+RL*.44);
  const cd=isD(wO);
  if(cd&&!ldp){const f=document.getElementById('drop-flash');f.style.background='rgba(255,255,255,.2)';setTimeout(()=>f.style.background='rgba(255,255,255,0)',130);}
  ldp=cd;
  if(cd&&fc%6===0){splash(raft.x-RBW*.55,PY+5,8,'#bfdbfe');splash(raft.x+RBW*.55,PY+5,8,'#bfdbfe');}
  if(isR(wO)&&fc%10===0)splash(raft.x+(Math.random()-.5)*RBW,PY-8,3,'rgba(200,235,255,.9)');
  if(fc>=nO){
    const dn=Math.max(48,200-lv*14);nO=fc+dn+Math.random()*dn;
    const cn=1+(lv>4?1:0)+(lv>8?1:0);
    for(let c=0;c<cn;c++)setTimeout(()=>{if(GS==='playing')spawn();},c*290);
  }
  for(let i=obs.length-1;i>=0;i--){
    const o=obs[i];o.rot+=o.rs;const rd=o.wd-wO;
    if(rd<-55){obs.splice(i,1);continue;}
    if(fc%30===i%30&&rd>10&&rd<MAXD*.95){const t=1-rd/MAXD;splash(pSX(o.wx,t),pSY(t),2,'rgba(147,210,255,.65)');}
  }
  upPts();col();
}

function drw(){
  X.clearRect(0,0,W,H);
  edges();bg();banks();water();trees();
  const sr=[...obs].sort((a,b)=>b.wd-a.wd);for(const o of sr)dobs(o);
  drPts();draftA();
  if(sp>BSP+1.8){
    const it=Math.min(1,(sp-BSP-1.8)/3.5);
    X.strokeStyle=`rgba(147,210,255,${it*.14})`;X.lineWidth=1;
    const lx=LE[ST]?.[0]??W*.3,rx=RE[ST]?.[0]??W*.7;
    for(let i=0;i<14;i++){const sx=lx+Math.random()*(rx-lx),sy=HY+Math.random()*(PY-HY);X.beginPath();X.moveTo(sx,sy);X.lineTo(sx,sy+25+Math.random()*35);X.stroke();}
  }
  const{hw}=river(wO);
  if(hw<W*.10){const vg=X.createRadialGradient(W/2,PY,0,W/2,PY,W*.55);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,`rgba(200,40,40,${(.10-hw/W)*3.5})`);X.fillStyle=vg;X.fillRect(0,0,W,H);}
}

let rid;
function loop(){if(GS!=='playing')return;upd();drw();rid=requestAnimationFrame(loop);}

function go(){
  document.getElementById('ss').style.display='none';document.getElementById('os').style.display='none';
  document.getElementById('touch-hint').style.opacity='1';
  init();GS='playing';loop();
  setTimeout(()=>document.getElementById('touch-hint').style.opacity='0',4000);
}
function end(){
  GS='dead';cancelAnimationFrame(rid);
  if(sc>hiS){hiS=sc;localStorage.setItem('rr_hi',hiS);}
  document.getElementById('fs').textContent=sc;document.getElementById('hs').textContent=hiS;
  document.getElementById('os').style.display='flex';
}
document.getElementById('sb').onclick=go;document.getElementById('rb').onclick=go;
bg();
</script>
</body>
