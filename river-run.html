<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rapid Canyon 3D - K2 Games</title>
<link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8Xw8AAnUB9WQ0N2IAAAAASUVORK5CYII=">
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#081a24;color:#f7fbff;font-family:Inter,"Segoe UI",system-ui,sans-serif;touch-action:none}
#game{position:fixed;inset:0;width:100vw;height:100vh;display:block}
#home{position:fixed;top:12px;left:12px;z-index:20;color:#f7fbff;text-decoration:none;background:rgba(6,18,28,.72);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(14px);padding:9px 13px;font-size:.75rem;font-weight:1000}
.hud{position:fixed;inset:12px 12px auto 82px;z-index:10;display:grid;grid-template-columns:minmax(230px,1fr) repeat(4,minmax(76px,auto));gap:10px;pointer-events:none}
.panel,.stat,.overlay,.touch{background:rgba(6,18,28,.72);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(14px);box-shadow:0 20px 46px rgba(0,0,0,.28)}
.panel{display:grid;grid-template-columns:46px minmax(0,1fr);gap:12px;align-items:center;padding:11px 12px}
.mark{width:46px;height:46px;display:grid;place-items:center;background:linear-gradient(145deg,#7dd3fc,#fef3c7);color:#08202c;font-weight:1000}
h1{font-size:clamp(1.25rem,2.6vw,2.25rem);line-height:.94;text-transform:uppercase;letter-spacing:0}
.objective{margin-top:6px;color:#7dd3fc;font-size:.78rem;font-weight:900}
.stat{padding:10px;min-width:76px}.label{display:block;color:rgba(247,251,255,.68);font-size:.62rem;font-weight:900;text-transform:uppercase}.value{display:block;margin-top:4px;color:#fbbf24;font-size:1.1rem;font-weight:1000;font-variant-numeric:tabular-nums}
.overlay{position:fixed;inset:0;z-index:30;display:grid;place-items:center;background:linear-gradient(150deg,rgba(4,24,36,.95),rgba(17,86,105,.82));text-align:center;padding:22px}
.menu{width:min(700px,100%)}.menu h2{font-size:clamp(3rem,9vw,6rem);line-height:.86;text-transform:uppercase;color:#f7fbff;text-shadow:0 0 40px rgba(125,211,252,.35)}.menu p{margin:16px auto 22px;max-width:520px;color:rgba(247,251,255,.72);line-height:1.55;font-weight:750}
button{appearance:none;border:0;background:#fbbf24;color:#10202a;min-height:48px;padding:12px 22px;font:inherit;font-weight:1000;cursor:pointer}
.ghost{margin-left:8px;background:rgba(255,255,255,.11);border:1px solid rgba(255,255,255,.18);color:#f7fbff}
.touch{display:none;position:fixed;left:12px;right:12px;bottom:12px;z-index:15;grid-template-columns:repeat(5,1fr);gap:8px;padding:9px;pointer-events:auto}
.touch button{min-height:42px;background:rgba(255,255,255,.13);color:#f7fbff;border:1px solid rgba(255,255,255,.2)}
.touch button:active,.touch button.active{background:#7dd3fc;color:#08202c}
@media(max-width:820px){.hud{inset:9px 9px auto 70px;grid-template-columns:1fr 74px 74px}.stat:nth-of-type(n+4){display:none}.touch{display:grid}.objective{font-size:.72rem}}
</style>
<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-CCZ9JJGEDP');</script>
</head>
<body>
<a id="home" href="index.html">HUB</a>
<canvas id="game"></canvas>
<div class="hud">
  <div class="panel"><div class="mark">RR</div><div><h1>Rapid Canyon 3D</h1><div class="objective" id="objective">Run gates, dodge rocks, survive the gorge.</div></div></div>
  <div class="stat"><span class="label">Distance</span><span class="value" id="dist">0m</span></div>
  <div class="stat"><span class="label">Gates</span><span class="value" id="gates">0</span></div>
  <div class="stat"><span class="label">Lives</span><span class="value" id="lives">3</span></div>
  <div class="stat"><span class="label">Speed</span><span class="value" id="speed">0</span></div>
</div>
<div class="overlay" id="menu"><div class="menu"><h2>Rapid Canyon 3D</h2><p>Pilot a raft through a living 3D canyon. Follow the blue gate line, avoid rocks and logs, and use paddle boost when the rapids open up.</p><button id="start">LAUNCH</button><button class="ghost" onclick="location.href='index.html'">HUB</button></div></div>
<div class="touch"><button data-key="a">LEFT</button><button data-key="w">GAS</button><button data-key="d">RIGHT</button><button data-key=" ">BOOST</button><button data-key="s">BRAKE</button></div>
<script type="module">
import * as THREE from 'three';

const canvas=document.getElementById('game');
const ui={dist:document.getElementById('dist'),gates:document.getElementById('gates'),lives:document.getElementById('lives'),speed:document.getElementById('speed'),menu:document.getElementById('menu'),objective:document.getElementById('objective')};
const scene=new THREE.Scene();scene.background=new THREE.Color(0x9bd6e6);scene.fog=new THREE.Fog(0x9bd6e6,180,760);
const camera=new THREE.PerspectiveCamera(62,1,.1,1300);
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;renderer.outputColorSpace=THREE.SRGBColorSpace;
scene.add(new THREE.HemisphereLight(0xdff8ff,0x34512d,1.35));
const sun=new THREE.DirectionalLight(0xfff3cf,2.1);sun.position.set(-180,300,140);sun.castShadow=true;sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.left=-260;sun.shadow.camera.right=260;sun.shadow.camera.top=260;sun.shadow.camera.bottom=-260;scene.add(sun);

const mats={
 water:new THREE.MeshStandardMaterial({color:0x0d9bd1,roughness:.28,metalness:.18,flatShading:true}),
 bank:new THREE.MeshStandardMaterial({color:0x2f7d43,roughness:.9}),
 cliff:new THREE.MeshStandardMaterial({color:0x9b7650,roughness:.85}),
 raft:new THREE.MeshStandardMaterial({color:0xdc2626,roughness:.45}),
 floor:new THREE.MeshStandardMaterial({color:0x0f3a55,roughness:.7}),
 skin:new THREE.MeshStandardMaterial({color:0xf2b985,roughness:.6}),
 vest:new THREE.MeshStandardMaterial({color:0x1d4ed8,roughness:.7}),
 wood:new THREE.MeshStandardMaterial({color:0x8b4a19,roughness:.72}),
 rock:new THREE.MeshStandardMaterial({color:0x64748b,roughness:.88}),
 gate:new THREE.MeshStandardMaterial({color:0x7dd3fc,emissive:0x0b7f9e,emissiveIntensity:.9}),
 foam:new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.55})
};
const keys=new Map();let playing=false,distance=0,speed=0,steer=0,lives=3,gateCount=0,hitCooldown=0,shake=0;
const obstacles=[],gates=[],foam=[],clock=new THREE.Clock();

function key(k){return keys.get(k.toLowerCase())||false}
function setKey(k,v){keys.set(k.toLowerCase(),v)}
function riverX(z){return Math.sin(z*.006)*34+Math.sin(z*.014+1.7)*18}
function riverWidth(z){return 72+Math.sin(z*.004+2)*14}
function box(w,h,d,mat){const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);m.castShadow=true;m.receiveShadow=true;return m}
function cyl(r1,r2,h,s,mat){const m=new THREE.Mesh(new THREE.CylinderGeometry(r1,r2,h,s),mat);m.castShadow=true;m.receiveShadow=true;return m}

const waterGeo=new THREE.PlaneGeometry(210,1200,38,160);const water=new THREE.Mesh(waterGeo,mats.water);water.rotation.x=-Math.PI/2;water.receiveShadow=true;scene.add(water);
const leftBank=new THREE.Group(),rightBank=new THREE.Group();scene.add(leftBank,rightBank);
for(let i=0;i<46;i++){
 const z=-i*28+60,hw=riverWidth(z),cx=riverX(z);
 const l=box(70,2,31,mats.bank);l.position.set(cx-hw-35,-.7,z);leftBank.add(l);
 const r=box(70,2,31,mats.bank);r.position.set(cx+hw+35,-.7,z);rightBank.add(r);
 if(i%3===0){const cliff=box(24,22+Math.random()*28,24,mats.cliff);cliff.position.set(cx-hw-72,cliff.geometry.parameters.height/2-1,z+(Math.random()-.5)*16);scene.add(cliff);const cliff2=cliff.clone();cliff2.position.x=cx+hw+72;scene.add(cliff2)}
}

const raft=new THREE.Group();
const hull=box(18,2.8,30,mats.raft);hull.position.y=1.4;const deck=box(14,1,22,mats.floor);deck.position.y=3.1;raft.add(hull,deck);
const riders=[];[-5,5].forEach((x,i)=>{const g=new THREE.Group();const body=cyl(1.6,1.7,4,10,mats.vest);body.position.y=6;const head=new THREE.Mesh(new THREE.SphereGeometry(1.35,14,10),mats.skin);head.position.y=9;const paddle=box(.45,.45,10,mats.wood);paddle.position.set(x>0?3:-3,5.1,-1);paddle.rotation.z=x>0?.8:-.8;g.add(body,head,paddle);g.position.set(x,0,i?5:-5);g.userData={paddle};raft.add(g);riders.push(g)});
raft.position.set(0,0,30);scene.add(raft);

function makeRock(x,z){const m=new THREE.Mesh(new THREE.DodecahedronGeometry(5+Math.random()*5,0),mats.rock);m.position.set(x,3,z);m.castShadow=true;m.receiveShadow=true;m.userData={r:7,type:'rock'};scene.add(m);obstacles.push(m)}
function makeLog(x,z){const m=cyl(2.2,2.4,24,12,mats.wood);m.rotation.z=Math.PI/2;m.rotation.y=(Math.random()-.5)*.8;m.position.set(x,2.3,z);m.userData={r:12,type:'log'};scene.add(m);obstacles.push(m)}
function makeGate(x,z,i){const g=new THREE.Group();const ring=new THREE.Mesh(new THREE.TorusGeometry(14,.55,10,48),mats.gate);ring.rotation.y=Math.PI/2;ring.position.y=13;const p1=cyl(.35,.5,17,10,mats.gate);p1.position.set(-15,7,0);const p2=p1.clone();p2.position.x=15;g.add(ring,p1,p2);g.position.set(x,0,z);g.userData={hit:false,i};scene.add(g);gates.push(g)}
for(let i=0;i<34;i++){const z=-120-i*48,cx=riverX(z),hw=riverWidth(z);if(i%4===1)makeGate(cx+Math.sin(i)*18,z,i);else(Math.random()>.45?makeRock:makeLog)(cx+(Math.random()-.5)*hw*1.35,z)}

function spawnFoam(){const f=new THREE.Mesh(new THREE.PlaneGeometry(5+Math.random()*5,1.6+Math.random()*2),mats.foam.clone());f.rotation.x=-Math.PI/2;f.rotation.z=(Math.random()-.5)*.6;f.position.set(raft.position.x+(Math.random()-.5)*16,.22,raft.position.z+14);f.userData={life:1};scene.add(f);foam.push(f)}
function resetAfterHit(){lives--;hitCooldown=1.4;shake=1.8;speed*=.35;raft.position.x=riverX(raft.position.z);if(lives<=0){playing=false;ui.menu.style.display='grid';ui.menu.querySelector('h2').textContent='Wiped Out';ui.menu.querySelector('p').textContent=`You cleared ${gateCount} gates and rode ${Math.floor(distance)} meters. Launch again for a cleaner line.`}}
function update(dt){
 if(!playing)return;
 distance+=speed*dt;hitCooldown=Math.max(0,hitCooldown-dt);shake*=.9;
 if(key('w')||key('arrowup'))speed=THREE.MathUtils.lerp(speed,72,.018);else speed*=Math.pow(.985,dt*60);
 if(key('s')||key('arrowdown'))speed*=Math.pow(.94,dt*60);if(key(' ')||key('space'))speed=THREE.MathUtils.lerp(speed,102,.028);
 const turn=(key('a')||key('arrowleft')?-1:0)+(key('d')||key('arrowright')?1:0);steer=THREE.MathUtils.lerp(steer,turn,.14);
 raft.position.x+=steer*(speed*.018);raft.position.z-=speed*dt;
 const cx=riverX(raft.position.z),hw=riverWidth(raft.position.z);if(Math.abs(raft.position.x-cx)>hw){raft.position.x=THREE.MathUtils.clamp(raft.position.x,cx-hw,cx+hw);if(hitCooldown<=0)resetAfterHit()}
 const y=Math.sin(performance.now()*.008)*.35+Math.sin(raft.position.z*.05)*.45;raft.position.y=y;raft.rotation.z=-steer*.45;raft.rotation.x=Math.sin(performance.now()*.012)*.04-speed*.0008;raft.rotation.y=-steer*.18;
 riders.forEach((r,i)=>{r.userData.paddle.rotation.x=Math.sin(performance.now()*.012+i*Math.PI)*.55});
 if(speed>38&&Math.random()<.7)spawnFoam();
 obstacles.forEach(o=>{o.rotation.x+=dt*(o.userData.type==='log'?1.5:.35);if(o.position.distanceTo(raft.position)<o.userData.r+8&&hitCooldown<=0)resetAfterHit()});
 gates.forEach(g=>{g.rotation.y+=dt*.9;g.children[0].rotation.z+=dt*2;if(!g.userData.hit&&g.position.distanceTo(raft.position)<18){g.userData.hit=true;gateCount++;g.children.forEach(c=>c.material.color.setHex(0x6df2a0));speed+=8}});
 foam.forEach((f,i)=>{f.userData.life-=dt*.8;f.material.opacity=f.userData.life*.5;f.scale.x+=dt*1.6;if(f.userData.life<=0){scene.remove(f);foam.splice(i,1)}});
 updateWater();updateCamera(dt);updateUi();
}
function updateWater(){const pos=waterGeo.attributes.position;for(let i=0;i<pos.count;i++){const x=pos.getX(i),y=pos.getY(i);pos.setZ(i,Math.sin((x+performance.now()*.05)*.08)*.55+Math.sin((y+distance)*.05)*.7)}pos.needsUpdate=true;water.position.z=raft.position.z-410;leftBank.position.z=raft.position.z%28;rightBank.position.z=raft.position.z%28}
function updateCamera(dt){const desired=new THREE.Vector3(raft.position.x,25,raft.position.z+58);desired.x+=(Math.random()-.5)*shake;desired.y+=(Math.random()-.5)*shake;camera.position.lerp(desired,1-Math.pow(.001,dt));camera.lookAt(raft.position.x,4,raft.position.z-46)}
function updateUi(){ui.dist.textContent=Math.floor(distance)+'m';ui.gates.textContent=gateCount;ui.lives.textContent=lives;ui.speed.textContent=Math.round(speed)}
function resize(){renderer.setSize(innerWidth,innerHeight,false);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix()}addEventListener('resize',resize);resize();
addEventListener('keydown',e=>{setKey(e.key,true);setKey(e.code,true);if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault()});addEventListener('keyup',e=>{setKey(e.key,false);setKey(e.code,false)});
document.querySelectorAll('[data-key]').forEach(b=>{const v=b.dataset.key;const p=s=>{setKey(v,s);b.classList.toggle('active',s)};b.addEventListener('pointerdown',e=>{e.preventDefault();p(true)});['pointerup','pointercancel','pointerleave'].forEach(ev=>b.addEventListener(ev,()=>p(false)))});
document.getElementById('start').onclick=()=>{playing=true;ui.menu.style.display='none';distance=0;speed=28;lives=3;gateCount=0;raft.position.set(0,0,30);obstacles.forEach(o=>o.visible=true);gates.forEach(g=>{g.userData.hit=false;g.children.forEach(c=>c.material.color.setHex(0x7dd3fc))})};
function loop(){const dt=Math.min(clock.getDelta(),.04);update(dt);renderer.render(scene,camera);requestAnimationFrame(loop)}loop();
</script>
</body>
</html>
