<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>River Run – K2 Games</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a1628;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    touch-action: none;
    padding-top: env(safe-area-inset-top, 0);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  canvas { display: block; width: 100vw; height: 100vh; }

  #ui {
    position: fixed; top: 0; left: 0; width: 100%; pointer-events: none;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: calc(1rem + env(safe-area-inset-top, 0px)) 1.1rem 1rem 1.1rem;
    z-index: 10;
    gap: 0.5rem;
  }
  .stat {
    background: rgba(0,0,0,0.45); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
    padding: 0.4rem 0.9rem; color: #fff; font-size: 0.82rem; font-weight: 600;
    letter-spacing: 0.5px;
  }
  .stat span { color: #38bdf8; }

  /* screens */
  .screen {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 20;
    background: rgba(10,22,40,0.92); backdrop-filter: blur(12px);
  }
  .screen h1 { font-size: clamp(2rem,6vw,4rem); font-weight: 900;
    background: linear-gradient(135deg,#38bdf8,#0ea5e9,#7dd3fc);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .screen p { color: #94a3b8; margin: 0.6rem 0 1.8rem; font-size: 1rem; text-align:center; max-width:320px; }
  .btn {
    padding: 0.9rem 2.4rem; border-radius: 50px; border: none; cursor: pointer;
    font-size: 1rem; font-weight: 800; letter-spacing: 1px;
    background: linear-gradient(135deg,#0ea5e9,#0284c7);
    color: #fff; transition: 0.25s; box-shadow: 0 0 24px rgba(14,165,233,0.4);
  }
  .btn:hover { transform: scale(1.07); filter: brightness(1.15); }
  .btn-ghost {
    margin-top: 0.7rem; background: transparent;
    border: 1px solid rgba(255,255,255,0.2); color: #94a3b8;
    box-shadow: none; font-weight: 600;
  }

  .mode-row {
    display: flex;
    gap: 0.55rem;
    margin-bottom: 0.9rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .mode-btn {
    border: 1px solid rgba(125,211,252,0.38);
    background: rgba(14,165,233,0.14);
    color: #dbeafe;
    border-radius: 999px;
    padding: 0.42rem 0.95rem;
    font-size: 0.75rem;
    font-weight: 800;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: 0.2s;
  }

  .mode-btn.active {
    background: linear-gradient(135deg,#0ea5e9,#0284c7);
    border-color: rgba(125,211,252,0.8);
    box-shadow: 0 0 16px rgba(14,165,233,0.35);
    color: #fff;
  }
  .score-big { font-size: clamp(3rem,10vw,6rem); font-weight: 900; color: #38bdf8;
    text-shadow: 0 0 40px rgba(56,189,248,0.5); margin: 0.3rem 0; }
  .hi { font-size: 0.85rem; color: #64748b; margin-bottom: 1.4rem; }
  .hi span { color: #f59e0b; }

  /* mobile touch controls */
  #touch-hint {
    position: fixed; bottom: 1.2rem; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.3); font-size: 0.75rem; pointer-events: none;
    z-index: 10; letter-spacing: 1px;
  }

  #touch-zones {
    position: fixed;
    inset: 0;
    z-index: 9;
    display: none;
    pointer-events: auto;
  }

  .touch-zone {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 50%;
  }

  #tz-left { left: 0; }
  #tz-right { right: 0; }

  @media (max-width: 900px), (pointer: coarse) {
    #touch-zones { display: block; }
    .stat { font-size: 0.72rem; padding: 0.35rem 0.65rem; }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <div class="stat">SCORE <span id="score-ui">0</span></div>
  <div class="stat">LEVEL <span id="level-ui">1</span></div>
  <div class="stat">LIVES <span id="lives-ui">❤️❤️❤️</span></div>
</div>

<div id="touch-hint">TILT PHONE OR TOUCH LEFT / RIGHT</div>

<div id="touch-zones">
  <div class="touch-zone" id="tz-left"></div>
  <div class="touch-zone" id="tz-right"></div>
</div>

<!-- START SCREEN -->
<div class="screen" id="start-screen">
  <h1>🚣 RIVER RUN</h1>
  <p>Navigate the rapids — dodge rocks, logs &amp; branches as the river rages faster.</p>
  <div class="mode-row">
    <button class="mode-btn active" data-mode="arcade" id="mode-arcade">ARCADE FEEL</button>
    <button class="mode-btn" data-mode="realistic" id="mode-realistic">REALISTIC FEEL</button>
  </div>
  <button class="btn" id="start-btn">LAUNCH</button>
  <button class="btn btn-ghost" onclick="window.location='index.html'">← Back to Vault</button>
</div>

<!-- GAME OVER SCREEN -->
<div class="screen" id="over-screen" style="display:none">
  <h1>WIPED OUT</h1>
  <div class="score-big" id="final-score">0</div>
  <div class="hi">Best: <span id="hi-score">0</span></div>
  <button class="btn" id="retry-btn">TRY AGAIN</button>
  <button class="btn btn-ghost" onclick="window.location='index.html'">← Back to Vault</button>
</div>

<script>
// ─────────────────────────────────────────────
//  RIVER RUN  –  single-file canvas game
// ─────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── constants ──
const RAFT_W = 40, RAFT_H = 46;
const BANK_W_PCT = 0.22;       // fraction of canvas reserved per bank
const BASE_SPEED = 3.2;
const SPEED_INC  = 0.0004;
const OBSTACLE_RATE_START = 180;
const PARTICLE_MAX = 220;

const FEELS = {
  arcade: {
    label: 'Arcade',
    accel: 0.47,
    damping: 0.81,
    tiltResponse: 0.17,
    headingResponse: 0.24,
    headingScale: 0.23,
    widthAmpA: 0.2,
    widthAmpB: 0.13,
    centerAmpA: 0.11,
    centerAmpB: 0.05,
    obstacleDrift: 0.58
  },
  realistic: {
    label: 'Realistic',
    accel: 0.28,
    damping: 0.9,
    tiltResponse: 0.08,
    headingResponse: 0.14,
    headingScale: 0.14,
    widthAmpA: 0.12,
    widthAmpB: 0.07,
    centerAmpA: 0.07,
    centerAmpB: 0.03,
    obstacleDrift: 0.32
  }
};

// ── state ──
let W, H, riverL, riverR;
let gameState = 'idle'; // idle | playing | dead
let score, level, lives, hiScore;
let speed, frameCount, nextObs, invTimer;
let raft, obstacles, particles, wakes, bankSegs;
let shakeAmt, shakeDecay;
let camOffX, camOffY, camTargetX;
let riverDriftT;
let keys = {};
let touchHeld = { left: false, right: false };
let feelMode = 'arcade';

// ── resize ──
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  riverL = W * BANK_W_PCT;
  riverR = W * (1 - BANK_W_PCT);
}
window.addEventListener('resize', () => { resize(); if (gameState === 'idle') drawTitle(); });
resize();

// ─────────────────────────────────────────────
//  COLOUR HELPERS
// ─────────────────────────────────────────────
function hsl(h,s,l,a=1){ return `hsla(${h},${s}%,${l}%,${a})`; }
function lerpColor(a,b,t){
  const ah=parseInt(a.slice(1,3),16), ag=parseInt(a.slice(3,5),16), ab=parseInt(a.slice(5,7),16);
  const bh=parseInt(b.slice(1,3),16), bg=parseInt(b.slice(3,5),16), bb=parseInt(b.slice(5,7),16);
  const r=Math.round(ah+(bh-ah)*t), g=Math.round(ag+(bg-ag)*t), bl2=Math.round(ab+(bb-ab)*t);
  return `rgb(${r},${g},${bl2})`;
}

// ─────────────────────────────────────────────
//  INIT / RESET
// ─────────────────────────────────────────────
function initGame() {
  score      = 0;
  level      = 1;
  lives      = 3;
  speed      = BASE_SPEED;
  frameCount = 0;
  nextObs    = OBSTACLE_RATE_START;
  invTimer   = 0;
  shakeAmt   = 0;
  shakeDecay = 0.88;
  camOffX    = 0;
  camOffY    = 0;
  camTargetX = 0;
  riverDriftT = 0;

  raft = {
    x: W / 2,
    y: H * 0.72,
    vx: 0,
    tilt: 0,
    heading: 0,
    bob: 0,
    bobT: 0
  };

  obstacles = [];
  particles = [];
  wakes     = [];
  bankSegs  = buildBank();

  updateHUD();
}

function buildBank() {
  // pre-seed scrolling bank tiles
  const segs = [];
  for (let y = -200; y < H + 200; y += 60) segs.push({ y, offset: 0 });
  return segs;
}

function getRiverAtY(y) {
  const feel = FEELS[feelMode];
  const t = y + riverDriftT;
  const baseW = W * (1 - BANK_W_PCT * 2);

  // Perspective: river appears narrower far away and wider near camera.
  const depth = Math.max(0, Math.min(1, y / H));
  const perspectiveWidth = 0.72 + depth * 0.44;

  const centerOffset =
    Math.sin(t * 0.0039) * W * feel.centerAmpA +
    Math.sin(t * 0.0018 + 1.4) * W * feel.centerAmpB;

  // Wider and skinnier sections.
  const sectionScale =
    1 +
    Math.sin(t * 0.0047 + 0.8) * feel.widthAmpA +
    Math.sin(t * 0.0092 - 1.1) * feel.widthAmpB;

  const width = Math.max(W * 0.24, baseW * perspectiveWidth * sectionScale);
  const center = W * 0.5 + centerOffset;
  const left = center - width * 0.5;
  const right = center + width * 0.5;
  return { left, right, center, width };
}

// ─────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────
document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

// touch / pointer drag
let touchStartX = null;
let touchCurX   = null;

canvas.addEventListener('pointerdown', e => { touchStartX = touchCurX = e.clientX; });
canvas.addEventListener('pointermove', e => {
  if (touchStartX !== null) touchCurX = e.clientX;
});
canvas.addEventListener('pointerup',   () => { touchStartX = touchCurX = null; });
canvas.addEventListener('pointercancel', () => { touchStartX = touchCurX = null; });

// device orientation (tilt)
let tiltX = 0;
window.addEventListener('deviceorientation', e => {
  if (e.gamma !== null) tiltX = Math.max(-30, Math.min(30, e.gamma)) / 30;
});

function getHInput() {
  if (keys['ArrowLeft']  || keys['KeyA'] || touchHeld.left) return -1;
  if (keys['ArrowRight'] || keys['KeyD'] || touchHeld.right) return  1;
  if (Math.abs(tiltX) > 0.08) return tiltX;
  if (touchStartX !== null && touchCurX !== null) {
    const delta = touchCurX - touchStartX;
    return Math.max(-1, Math.min(1, delta / 60));
  }
  return 0;
}

// ─────────────────────────────────────────────
//  PARTICLES
// ─────────────────────────────────────────────
function spawnSplash(x, y, count = 14, col = '#7dd3fc') {
  for (let i = 0; i < count && particles.length < PARTICLE_MAX; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 1.5 + Math.random() * 3.5;
    particles.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd - 3,
      life: 1, decay: 0.03 + Math.random() * 0.04,
      r: 2 + Math.random() * 3,
      col
    });
  }
}

function spawnWake(x, y) {
  wakes.push({ x, y, life: 1, w: 6 + Math.random() * 4 });
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.18;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = wakes.length - 1; i >= 0; i--) {
    wakes[i].life -= 0.025;
    wakes[i].w   += 0.6;
    if (wakes[i].life <= 0) wakes.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.col;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  for (const w of wakes) {
    ctx.globalAlpha = w.life * 0.5;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(w.x, w.y, w.w, w.w * 0.35, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// ─────────────────────────────────────────────
//  WATER RENDERING
// ─────────────────────────────────────────────
let waveT = 0;

function drawWater() {
  const top = getRiverAtY(-80);
  const bottom = getRiverAtY(H + 80);

  // deep water gradient
  const grad = ctx.createLinearGradient(top.left, 0, top.right, 0);
  grad.addColorStop(0,   '#0c4a6e');
  grad.addColorStop(0.3, '#075985');
  grad.addColorStop(0.5, '#0369a1');
  grad.addColorStop(0.7, '#075985');
  grad.addColorStop(1,   '#0c4a6e');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(top.left, -80);
  ctx.lineTo(top.right, -80);
  ctx.lineTo(bottom.right, H + 80);
  ctx.lineTo(bottom.left, H + 80);
  ctx.closePath();
  ctx.fill();

  // animated caustic shimmer lines
  ctx.save();
  const riverPath = new Path2D();
  riverPath.moveTo(top.left, -80);
  riverPath.lineTo(top.right, -80);
  riverPath.lineTo(bottom.right, H + 80);
  riverPath.lineTo(bottom.left, H + 80);
  riverPath.closePath();
  ctx.clip(riverPath);

  ctx.lineWidth = 1;
  const lineCount = 18;
  for (let i = 0; i < lineCount; i++) {
    const t = (waveT * 0.6 + i * 137.5) % (H * 2);
    const yBase = (t % H);
    const xOffset = Math.sin(waveT * 0.03 + i * 0.9) * 18;
    const seg = getRiverAtY(yBase);
    const cx = seg.left + seg.width * (0.15 + (i / lineCount) * 0.7) + xOffset;
    const alpha = 0.04 + Math.sin(waveT * 0.04 + i) * 0.03;
    ctx.strokeStyle = `rgba(147,210,255,${Math.max(0, alpha)})`;
    ctx.beginPath();
    ctx.moveTo(cx - 20, yBase);
    ctx.bezierCurveTo(cx, yBase + 30, cx + 20, yBase + 60, cx, yBase + 80);
    ctx.stroke();
  }

  // white foam ripples
  for (let row = 0; row < 8; row++) {
    const yFoam = ((waveT * speed * 0.9 + row * (H / 7)) % H);
    const segFoam = getRiverAtY(yFoam);
    const foamX = segFoam.left + 12 + Math.sin(waveT * 0.05 + row * 2.3) * 10;
    const alpha = 0.08 + Math.sin(waveT * 0.07 + row) * 0.04;
    ctx.strokeStyle = `rgba(255,255,255,${Math.max(0, alpha)})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(foamX, yFoam);
    ctx.quadraticCurveTo(foamX + 28, yFoam - 8, foamX + 56, yFoam);
    ctx.stroke();

    const foamX2 = segFoam.right - 12 + Math.sin(waveT * 0.05 + row * 1.7 + 1) * 10;
    ctx.beginPath();
    ctx.moveTo(foamX2, yFoam + 20);
    ctx.quadraticCurveTo(foamX2 - 28, yFoam + 12, foamX2 - 56, yFoam + 20);
    ctx.stroke();
  }
  ctx.restore();
}

// ─────────────────────────────────────────────
//  BANKS / TERRAIN
// ─────────────────────────────────────────────
function drawBanks() {
  const top = getRiverAtY(-100);
  const bottom = getRiverAtY(H + 100);

  // left bank
  const lg = ctx.createLinearGradient(0, 0, Math.max(top.left, bottom.left), 0);
  lg.addColorStop(0, '#14532d');
  lg.addColorStop(0.6, '#166534');
  lg.addColorStop(1, '#15803d');
  ctx.fillStyle = lg;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(top.left, -80);
  ctx.lineTo(bottom.left, H + 80);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fill();

  // right bank
  const rg = ctx.createLinearGradient(Math.min(top.right, bottom.right), 0, W, 0);
  rg.addColorStop(0, '#15803d');
  rg.addColorStop(0.4, '#166534');
  rg.addColorStop(1, '#14532d');
  ctx.fillStyle = rg;
  ctx.beginPath();
  ctx.moveTo(top.right, -80);
  ctx.lineTo(W, 0);
  ctx.lineTo(W, H);
  ctx.lineTo(bottom.right, H + 80);
  ctx.closePath();
  ctx.fill();

  // water edge highlight
  ctx.strokeStyle = 'rgba(56,189,248,0.25)';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(top.left, -80); ctx.lineTo(bottom.left, H + 80); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(top.right, -80); ctx.lineTo(bottom.right, H + 80); ctx.stroke();

  // bank texture details (trees / bushes)
  drawBankDetails();
}

let treePhase = 0;
function drawBankDetails() {
  // scrolling tree silhouettes on banks
  const treeSpacing = 70;
  const treeCount   = Math.ceil(H / treeSpacing) + 2;
  for (let i = 0; i < treeCount; i++) {
    const ty = ((treePhase + i * treeSpacing) % (H + treeSpacing)) - treeSpacing * 0.5;
    const seg = getRiverAtY(ty);
    // left side trees
    drawTree(seg.left * 0.35, ty, 14 + (i % 3) * 4);
    drawTree(seg.left * 0.72, ty + 28, 12 + (i % 4) * 3);
    // right side
    drawTree(seg.right + (W - seg.right) * 0.28, ty, 14 + (i % 3) * 4);
    drawTree(seg.right + (W - seg.right) * 0.65, ty + 28, 12 + (i % 4) * 3);
  }
}

function drawTree(x, y, r) {
  ctx.fillStyle = '#15803d';
  ctx.beginPath();
  ctx.moveTo(x, y - r * 1.3);
  ctx.lineTo(x - r, y + r * 0.3);
  ctx.lineTo(x + r, y + r * 0.3);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#166534';
  ctx.beginPath();
  ctx.moveTo(x, y - r * 0.9);
  ctx.lineTo(x - r * 0.75, y + r * 0.7);
  ctx.lineTo(x + r * 0.75, y + r * 0.7);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#4a2c0a';
  ctx.fillRect(x - 2, y + r * 0.7, 4, r * 0.5);
}

// ─────────────────────────────────────────────
//  OBSTACLES
// ─────────────────────────────────────────────
const OBS_TYPES = ['rock', 'log', 'branch'];

function spawnObstacle() {
  const feel = FEELS[feelMode];
  const type = OBS_TYPES[Math.floor(Math.random() * OBS_TYPES.length)];
  const margin = 40;
  const spawnSeg = getRiverAtY(-60);
  const x = spawnSeg.left + margin + Math.random() * (spawnSeg.width - margin * 2);
  const o = {
    type,
    x,
    y: -60,
    rot: Math.random() * Math.PI * 2,
    rotSpd: (Math.random() - 0.5) * 0.025,
    drift: (Math.random() - 0.5) * feel.obstacleDrift,
    entered: false
  };
  if (type === 'rock') {
    o.rx = 18 + Math.random() * 16;
    o.ry = 14 + Math.random() * 12;
    o.col = `hsl(${200 + Math.random() * 30},10%,${38 + Math.random() * 18}%)`;
  } else if (type === 'log') {
    o.len = 60 + Math.random() * 60;
    o.w   = 10 + Math.random() * 6;
    o.angle = (Math.random() - 0.5) * 1.2;
  } else {
    o.len = 50 + Math.random() * 50;
    o.branches = Math.floor(2 + Math.random() * 3);
  }
  obstacles.push(o);
}

function drawObstacle(o) {
  ctx.save();
  const depth = Math.max(0.55, Math.min(1.2, 0.62 + (o.y / H) * 0.62));
  ctx.translate(o.x, o.y);
  ctx.scale(depth, depth);

  if (o.type === 'rock') {
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(3, 5, o.rx, o.ry * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // rock body
    ctx.fillStyle = o.col;
    ctx.beginPath();
    ctx.ellipse(0, 0, o.rx, o.ry, o.rot, 0, Math.PI * 2);
    ctx.fill();
    // highlight
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath();
    ctx.ellipse(-o.rx * 0.2, -o.ry * 0.3, o.rx * 0.45, o.ry * 0.3, o.rot - 0.5, 0, Math.PI * 2);
    ctx.fill();
    // foam ring around rock
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(0, 0, o.rx + 8, o.ry + 5, o.rot, 0, Math.PI * 2);
    ctx.stroke();

  } else if (o.type === 'log') {
    ctx.rotate(o.angle);
    const g = ctx.createLinearGradient(-o.len/2, -o.w/2, -o.len/2, o.w/2);
    g.addColorStop(0, '#92400e');
    g.addColorStop(0.5, '#78350f');
    g.addColorStop(1, '#6b3009');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.roundRect(-o.len / 2, -o.w / 2, o.len, o.w, o.w / 2);
    ctx.fill();
    // bark lines
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    for (let i = -o.len * 0.3; i < o.len * 0.3; i += 14) {
      ctx.beginPath(); ctx.moveTo(i, -o.w / 2); ctx.lineTo(i + 5, o.w / 2); ctx.stroke();
    }

  } else { // branch
    ctx.rotate(o.rot);
    ctx.strokeStyle = '#78350f';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-o.len / 2, 0); ctx.lineTo(o.len / 2, 0); ctx.stroke();
    for (let b = 0; b < o.branches; b++) {
      const bx = -o.len * 0.3 + (b / o.branches) * o.len * 0.6;
      const by = (b % 2 === 0 ? -1 : 1) * (14 + b * 5);
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(bx, 0); ctx.lineTo(bx + 8, by); ctx.stroke();
    }
  }
  ctx.restore();
}

function hitRadius(o) {
  if (o.type === 'rock')   return Math.max(o.rx, o.ry) * 0.75;
  if (o.type === 'log')    return o.len * 0.38;
  return o.len * 0.35;
}

// ─────────────────────────────────────────────
//  RAFT RENDERING
// ─────────────────────────────────────────────
function drawRaft() {
  const r = raft;
  ctx.save();
  ctx.translate(r.x, r.y + Math.sin(r.bobT) * 2.5);
  ctx.rotate(r.heading);

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(2, RAFT_H * 0.8, RAFT_W * 0.8, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // canoe hull (front points up-river)
  const raftGrad = ctx.createLinearGradient(0, -RAFT_H/2, 0, RAFT_H/2);
  raftGrad.addColorStop(0, '#b45309');
  raftGrad.addColorStop(0.55, '#92400e');
  raftGrad.addColorStop(1, '#78350f');
  ctx.fillStyle = raftGrad;
  ctx.beginPath();
  ctx.moveTo(0, -RAFT_H * 0.58);
  ctx.quadraticCurveTo(RAFT_W * 0.6, -RAFT_H * 0.25, RAFT_W * 0.42, RAFT_H * 0.5);
  ctx.quadraticCurveTo(0, RAFT_H * 0.7, -RAFT_W * 0.42, RAFT_H * 0.5);
  ctx.quadraticCurveTo(-RAFT_W * 0.6, -RAFT_H * 0.25, 0, -RAFT_H * 0.58);
  ctx.closePath();
  ctx.fill();

  // plank lines
  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 1.5;
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.moveTo(-RAFT_W * 0.33, i * 9);
    ctx.lineTo(RAFT_W * 0.33, i * 9);
    ctx.stroke();
  }

  // rope border
  ctx.strokeStyle = '#fde68a';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, -RAFT_H * 0.5);
  ctx.quadraticCurveTo(RAFT_W * 0.52, -RAFT_H * 0.2, RAFT_W * 0.36, RAFT_H * 0.45);
  ctx.quadraticCurveTo(0, RAFT_H * 0.61, -RAFT_W * 0.36, RAFT_H * 0.45);
  ctx.quadraticCurveTo(-RAFT_W * 0.52, -RAFT_H * 0.2, 0, -RAFT_H * 0.5);
  ctx.stroke();

  // paddles on both sides
  const paddleSwing = Math.sin(r.bobT * 2.2) * 0.32 + r.tilt * 0.22;
  const drawPaddle = (side) => {
    ctx.save();
    ctx.translate(side * (RAFT_W * 0.44), -2);
    ctx.rotate(side * paddleSwing);
    ctx.strokeStyle = '#a16207';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, -9);
    ctx.lineTo(side * 17, 8);
    ctx.stroke();
    ctx.fillStyle = '#78350f';
    ctx.beginPath();
    ctx.ellipse(side * 21, 11, 6, 10, side * 0.18, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  };
  drawPaddle(-1);
  drawPaddle(1);

  // riders
  const drawRider = (x, y, shirt) => {
    ctx.fillStyle = shirt;
    ctx.beginPath();
    ctx.roundRect(x - 5, y - 2, 10, 12, 4);
    ctx.fill();
    ctx.fillStyle = '#f1c27d';
    ctx.beginPath();
    ctx.arc(x, y - 7, 4.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.arc(x - 1.4, y - 8.2, 0.7, 0, Math.PI * 2);
    ctx.arc(x + 1.4, y - 8.2, 0.7, 0, Math.PI * 2);
    ctx.fill();
  };
  drawRider(-8, 2, '#1d4ed8');
  drawRider(8, 7, '#0f766e');

  // invincibility flash
  if (invTimer > 0 && Math.floor(invTimer / 6) % 2 === 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.roundRect(-RAFT_W/2, -RAFT_H/2, RAFT_W, RAFT_H, 6);
    ctx.fill();
  }

  ctx.restore();
}

// ─────────────────────────────────────────────
//  CAMERA & SHAKE
// ─────────────────────────────────────────────
function applyCamera() {
  const shX = (Math.random() - 0.5) * shakeAmt;
  const shY = (Math.random() - 0.5) * shakeAmt;
  ctx.translate(shX, shY);
  // subtle cam drift following raft horizontal
  camTargetX = (raft.x - W / 2) * 0.06;
  camOffX += (camTargetX - camOffX) * 0.08;
  ctx.translate(-camOffX, 0);

  // Behind-and-above perspective tilt.
  ctx.translate(W * 0.5, H * 0.08);
  ctx.transform(1, 0, 0, 0.86, 0, 0);
  ctx.transform(1, 0.08, 0, 1, 0, 0);
  ctx.translate(-W * 0.5, -H * 0.08);
}

// ─────────────────────────────────────────────
//  HUD
// ─────────────────────────────────────────────
const scoreUI = document.getElementById('score-ui');
const levelUI = document.getElementById('level-ui');
const livesUI = document.getElementById('lives-ui');

function updateHUD() {
  scoreUI.textContent = score;
  levelUI.textContent = level;
  livesUI.textContent = '❤️'.repeat(lives) || '💀';
}

// ─────────────────────────────────────────────
//  COLLISION
// ─────────────────────────────────────────────
function checkCollisions() {
  if (invTimer > 0) return;
  for (const o of obstacles) {
    const dx = raft.x - o.x;
    const dy = raft.y - o.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < hitRadius(o) + 18) {
      lives--;
      invTimer = 90;
      shakeAmt = 14;
      spawnSplash(raft.x, raft.y, 30, '#bfdbfe');
      updateHUD();
      if (lives <= 0) endGame();
      break;
    }
  }
}

// ─────────────────────────────────────────────
//  MAIN UPDATE
// ─────────────────────────────────────────────
function update() {
  const feel = FEELS[feelMode];
  frameCount++;
  waveT      += 1;
  riverDriftT += speed * 3.8;
  treePhase  += speed * 0.9;
  speed      += SPEED_INC;

  // level up every 300 frames
  const newLevel = 1 + Math.floor(frameCount / 300);
  if (newLevel !== level) { level = newLevel; updateHUD(); }
  score = Math.floor(frameCount * 0.8);
  scoreUI.textContent = score;

  // shake decay
  if (shakeAmt > 0.3) shakeAmt *= shakeDecay; else shakeAmt = 0;
  if (invTimer > 0) invTimer--;

  // raft physics
  const input  = getHInput();
  const accel  = input * feel.accel;
  raft.vx     += accel;
  raft.vx     *= feel.damping;
  raft.x      += raft.vx;
  raft.tilt   += (input - raft.tilt) * feel.tiltResponse;
  raft.heading += (raft.tilt * feel.headingScale - raft.heading) * feel.headingResponse;
  raft.bobT   += 0.07;

  // clamp to river
  const halfW = RAFT_W / 2 + 6;
  const localRiver = getRiverAtY(raft.y);
  if (raft.x < localRiver.left + halfW) {
    raft.x = localRiver.left + halfW;
    raft.vx *= -0.4;
    spawnSplash(raft.x, raft.y + RAFT_H * 0.45, 6);
  }
  if (raft.x > localRiver.right - halfW) {
    raft.x = localRiver.right - halfW;
    raft.vx *= -0.4;
    spawnSplash(raft.x, raft.y + RAFT_H * 0.45, 6);
  }

  // wake trail
  if (frameCount % 4 === 0) spawnWake(raft.x, raft.y + RAFT_H / 2);
  if (frameCount % 16 === 0 && Math.abs(raft.vx) > 0.35) {
    spawnSplash(raft.x, raft.y + RAFT_H * 0.48, 3, 'rgba(186,230,253,0.8)');
  }

  // obstacle spawn
  if (frameCount >= nextObs) {
    const density = Math.max(40, OBSTACLE_RATE_START - level * 12);
    nextObs = frameCount + density + Math.random() * density;
    const count = 1 + (level > 3 ? 1 : 0) + (level > 6 ? 1 : 0);
    for (let c = 0; c < count; c++) {
      setTimeout(() => { if (gameState === 'playing') spawnObstacle(); }, c * 280);
    }
  }

  // move & cull obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    o.y   += speed;
    o.x   += o.drift + Math.sin((o.y + frameCount) * 0.015) * 0.15;
    const flowSeg = getRiverAtY(o.y);
    o.x = Math.max(flowSeg.left + 18, Math.min(flowSeg.right - 18, o.x));
    o.rot += o.rotSpd;
    if (!o.entered && o.y > 8) {
      o.entered = true;
      spawnSplash(o.x, o.y, 10, 'rgba(147,210,255,0.9)');
    }
    // small passive splash
    if (frameCount % 22 === i % 22 && o.y > 0 && o.y < H) {
      spawnSplash(o.x, o.y, 3, 'rgba(147,210,255,0.8)');
    }
    if (o.y > H + 100) obstacles.splice(i, 1);
  }

  updateParticles();
  checkCollisions();
}

// ─────────────────────────────────────────────
//  DRAW
// ─────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  applyCamera();

  drawBanks();
  drawWater();
  drawParticles();

  for (const o of obstacles) drawObstacle(o);
  drawRaft();

  // speed lines at high speed
  if (speed > BASE_SPEED + 1.5) {
    const intensity = Math.min(1, (speed - BASE_SPEED - 1.5) / 3);
    ctx.strokeStyle = `rgba(147,210,255,${intensity * 0.18})`;
    ctx.lineWidth = 1;
    for (let i = 0; i < 12; i++) {
      const ly = Math.random() * H;
      const seg = getRiverAtY(ly);
      const lx = seg.left + Math.random() * seg.width;
      const len = 20 + Math.random() * 40;
      ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx, ly + len); ctx.stroke();
    }
  }

  ctx.restore();
}

// ─────────────────────────────────────────────
//  GAME LOOP
// ─────────────────────────────────────────────
let rafId;
function loop() {
  if (gameState !== 'playing') return;
  update();
  draw();
  rafId = requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────
//  SCREENS
// ─────────────────────────────────────────────
hiScore = parseInt(localStorage.getItem('riverrun_hi') || '0');

function setupTouchZones() {
  const left = document.getElementById('tz-left');
  const right = document.getElementById('tz-right');

  const bindZone = (el, dir) => {
    el.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      touchHeld[dir] = true;
      if (el.setPointerCapture) el.setPointerCapture(e.pointerId);
    });
    el.addEventListener('pointerup', () => { touchHeld[dir] = false; });
    el.addEventListener('pointercancel', () => { touchHeld[dir] = false; });
    el.addEventListener('pointerleave', () => { touchHeld[dir] = false; });
  };

  bindZone(left, 'left');
  bindZone(right, 'right');
}

async function tryEnableIOSOrientation() {
  try {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      const res = await DeviceOrientationEvent.requestPermission();
      if (res !== 'granted') tiltX = 0;
    }
  } catch (_) {
    tiltX = 0;
  }
}

function startGame() {
  tryEnableIOSOrientation();
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('over-screen').style.display  = 'none';
  document.getElementById('touch-hint').style.opacity   = '1';
  initGame();
  gameState = 'playing';
  loop();
  // hide hint after 4s
  setTimeout(() => { document.getElementById('touch-hint').style.opacity = '0'; }, 4000);
}

function endGame() {
  gameState = 'dead';
  cancelAnimationFrame(rafId);
  if (score > hiScore) {
    hiScore = score;
    localStorage.setItem('riverrun_hi', hiScore);
  }
  document.getElementById('final-score').textContent = score;
  document.getElementById('hi-score').textContent    = hiScore;
  document.getElementById('over-screen').style.display = 'flex';
}

function drawTitle() {
  ctx.fillStyle = '#0a1628';
  ctx.fillRect(0, 0, W, H);
  const top = getRiverAtY(-80);
  const bottom = getRiverAtY(H + 80);
  const g = ctx.createLinearGradient(top.left, 0, top.right, 0);
  g.addColorStop(0, '#0c4a6e');
  g.addColorStop(0.5, '#0369a1');
  g.addColorStop(1, '#0c4a6e');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(top.left, -80);
  ctx.lineTo(top.right, -80);
  ctx.lineTo(bottom.right, H + 80);
  ctx.lineTo(bottom.left, H + 80);
  ctx.closePath();
  ctx.fill();
}

function setFeelMode(mode) {
  feelMode = FEELS[mode] ? mode : 'arcade';
  const a = document.getElementById('mode-arcade');
  const r = document.getElementById('mode-realistic');
  a.classList.toggle('active', feelMode === 'arcade');
  r.classList.toggle('active', feelMode === 'realistic');
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('retry-btn').addEventListener('click', startGame);
document.getElementById('mode-arcade').addEventListener('click', () => setFeelMode('arcade'));
document.getElementById('mode-realistic').addEventListener('click', () => setFeelMode('realistic'));
setupTouchZones();
setFeelMode('arcade');

// initial title background
drawTitle();
</script>
</body>
