<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bocce Pro 3D - K2 Games</title>
    <style>
        :root {
            --p1: #3b82f6;
            --p2: #ef4444;
            --accent: #fbbf24;
            --bg: #0f172a;
            --panel: rgba(30, 41, 59, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: none; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; }
        
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 10; display: flex; flex-direction: column; }
        .pointer { pointer-events: auto; }

        /* HUD */
        #hud { display: flex; justify-content: space-between; padding: 20px; }
        .stat-card { background: var(--panel); backdrop-filter: blur(10px); padding: 12px 24px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); min-width: 120px; text-align: center; }
        .label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; }
        .val { font-size: 1.8rem; font-weight: 900; font-family: monospace; }
        
        #turn-indicator { position: absolute; top: 90px; left: 50%; transform: translateX(-50%); background: var(--panel); padding: 8px 20px; border-radius: 20px; font-weight: 800; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.1); }
        .p1-turn { color: var(--p1); box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        .p2-turn { color: var(--p2); box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }

        /* Bottom Controls */
        #footer { position: absolute; bottom: 30px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .instruction { background: rgba(0,0,0,0.4); padding: 10px 20px; border-radius: 30px; font-size: 0.75rem; font-weight: bold; letter-spacing: 1px; opacity: 0.8; }
        
        #controls-row { display: flex; gap: 20px; align-items: center; }
        .m-btn { width: 60px; height: 60px; border-radius: 15px; background: var(--panel); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; transition: 0.2s; }
        .m-btn:active { transform: scale(0.9); background: white; color: black; }

        /* Overlays */
        .overlay { position: absolute; inset: 0; background: rgba(2, 6, 23, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px; transition: 0.5s; }
        .hidden { opacity: 0; pointer-events: none; }
        
        h1 { font-size: 4rem; font-weight: 900; font-style: italic; color: var(--accent); margin-bottom: 10px; }
        .btn-main { background: var(--accent); color: black; border: none; padding: 15px 60px; border-radius: 50px; font-weight: 900; font-size: 1.2rem; cursor: pointer; margin-top: 20px; }

        #aim-guide { position: absolute; bottom: 150px; width: 4px; height: 100px; background: linear-gradient(to top, var(--accent), transparent); left: 50%; transform: translateX(-50%); border-radius: 2px; opacity: 0; transition: 0.2s; }

        /* Course Panel */
        #course-select { position: absolute; top: 150px; right: 20px; display: flex; flex-direction: column; gap: 10px; }
        .course-btn { width: 50px; height: 50px; border-radius: 12px; background: var(--panel); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .course-btn.active { border-color: var(--accent); background: rgba(251, 191, 36, 0.2); }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CCZ9JJGEDP');
    </script>
</head>
<body>
    <div id="ui-layer">
        <div id="hud">
            <div class="stat-card"><div class="label">PLAYER</div><div id="score-p1" class="val" style="color:var(--p1)">0</div></div>
            <div class="stat-card"><div class="label">CPU</div><div id="score-p2" class="val" style="color:var(--p2)">0</div></div>
        </div>

        <div id="turn-indicator" class="p1-turn">PLAYER'S TURN</div>

        <div id="course-select" class="pointer">
            <div class="course-btn active" data-type="park" title="Park">🌳</div>
            <div class="course-btn" data-type="beach" title="Beach">🏖️</div>
            <div class="course-btn" data-type="clay" title="Stadium">🏟️</div>
        </div>

        <div id="aim-guide"></div>

        <div id="footer">
            <div class="instruction" id="hint-text">SWIPE UP TO THROW</div>
            <div id="controls-row" class="pointer">
                <div class="m-btn" id="btn-left">◀</div>
                <div style="text-align:center; min-width:80px;"><div class="label" id="ball-label">Balls</div><div id="ball-count" class="val">4</div></div>
                <div class="m-btn" id="btn-right">▶</div>
            </div>
        </div>
    </div>

    <div id="start-overlay" class="overlay pointer">
        <h1>BOCCE PRO</h1>
        <p style="opacity:0.7; max-width:400px;">Experience the professional tour. Realistic physics, varied courts, and expert AI.</p>
        <button class="btn-main" onclick="game.startMatch()">ENTER TOUR</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const CONFIG = {
            BALL_R: 0.16,
            JACK_R: 0.08,
            W: 4.6,
            L: 26,
            FRICTION: 0.985
        };

        const COURTS = {
            park: { color: 0x3d6e3d, bounce: 0.4, drag: 0.985, sky: 0x87CEEB },
            beach: { color: 0xdec196, bounce: 0.1, drag: 0.965, sky: 0x4dabff },
            clay: { color: 0x9c3a3a, bounce: 0.5, drag: 0.99, sky: 0x1a1a2e }
        };

        class BocceGame {
            constructor() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                document.body.appendChild(this.renderer.domElement);

                this.state = 'menu';
                this.balls = [];
                this.scores = {p1:0, p2:0};
                this.p1Balls = 4;
                this.p2Balls = 4;
                this.turn = 'p1';
                this.jackThrown = false;
                this.course = 'park';
                this.aimX = 0;

                this.initScene();
                this.setupInputs();
                this.loop();
            }

            initScene() {
                this.courtGroup = new THREE.Group();
                this.scene.add(this.courtGroup);
                this.updateCourse('park');

                this.camera.position.set(0, 3, 6);
                this.camera.lookAt(0, 0, -10);

                const amb = new THREE.AmbientLight(0xffffff, 0.6);
                this.scene.add(amb);
                const sun = new THREE.DirectionalLight(0xffffff, 1.2);
                sun.position.set(10, 20, 10);
                sun.castShadow = true;
                this.scene.add(sun);
            }

            updateCourse(type) {
                const c = COURTS[type];
                this.course = type;
                this.scene.background = new THREE.Color(c.sky);
                this.courtGroup.clear();

                const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({color: 0x1e293b}));
                ground.rotation.x = -Math.PI/2; ground.position.y = -0.05; ground.receiveShadow = true;
                this.courtGroup.add(ground);

                const surface = new THREE.Mesh(new THREE.PlaneGeometry(CONFIG.W, CONFIG.L), new THREE.MeshStandardMaterial({color: c.color, roughness: 0.9}));
                surface.rotation.x = -Math.PI/2; surface.position.z = -CONFIG.L/2 + 5; surface.receiveShadow = true;
                this.courtGroup.add(surface);

                const wallMat = new THREE.MeshStandardMaterial({color: 0x4a3222});
                const sideL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.6, CONFIG.L), wallMat);
                sideL.position.set(-CONFIG.W/2-0.15, 0.3, surface.position.z);
                const sideR = sideL.clone(); sideR.position.x *= -1;
                const end = new THREE.Mesh(new THREE.BoxGeometry(CONFIG.W+0.6, 0.6, 0.3), wallMat);
                end.position.set(0, 0.3, -CONFIG.L+5);
                this.courtGroup.add(sideL, sideR, end);
            }

            setupInputs() {
                let startY = 0, startX = 0, dragging = false;
                window.onmousedown = window.ontouchstart = (e) => {
                    if(this.state !== 'aim' || this.turn !== 'p1') return;
                    const t = e.touches ? e.touches[0] : e;
                    startY = t.clientY; startX = t.clientX; dragging = true;
                    document.getElementById('aim-guide').style.opacity = '1';
                };

                window.onmousemove = window.ontouchmove = (e) => {
                    if(!dragging) return;
                    const t = e.touches ? e.touches[0] : e;
                    const dy = startY - t.clientY;
                    const dx = t.clientX - startX;
                    const power = Math.min(100, Math.max(0, dy / 3));
                    const angle = dx * 0.005;
                    this.renderAim(power, angle);
                };

                window.onmouseup = window.ontouchend = (e) => {
                    if(!dragging) return;
                    dragging = false;
                    const t = e.changedTouches ? e.changedTouches[0] : e;
                    const dy = startY - t.clientY;
                    const dx = t.clientX - startX;
                    const power = Math.min(100, Math.max(0, dy / 3));
                    const angle = dx * 0.005;
                    if(power > 10) this.throw(power, angle);
                    document.getElementById('aim-guide').style.opacity = '0';
                };

                document.querySelectorAll('.course-btn').forEach(btn => {
                    btn.onclick = () => {
                        document.querySelectorAll('.course-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.updateCourse(btn.dataset.type);
                    };
                });

                document.getElementById('btn-left').onclick = () => { this.aimX = Math.max(-1.5, this.aimX - 0.2); this.updateCam(); };
                document.getElementById('btn-right').onclick = () => { this.aimX = Math.min(1.5, this.aimX + 0.2); this.updateCam(); };
            }

            renderAim(pwr, ang) {
                const guide = document.getElementById('aim-guide');
                guide.style.height = (pwr * 2) + 'px';
                guide.style.transform = `translateX(-50%) rotate(${ang * 50}deg)`;
            }

            startMatch() {
                document.getElementById('start-overlay').classList.add('hidden');
                this.state = 'aim';
                this.resetMatch();
            }

            resetMatch() {
                this.balls.forEach(b => this.scene.remove(b.mesh));
                this.balls = [];
                this.p1Balls = 4; this.p2Balls = 4;
                this.jackThrown = false;
                this.turn = 'p1';
                this.updateUI();
                this.updateCam();
            }

            throw(power, angle) {
                this.state = 'rolling';
                const isJack = !this.jackThrown;
                const r = isJack ? CONFIG.JACK_R : CONFIG.BALL_R;
                const mat = isJack ? new THREE.MeshStandardMaterial({color:0xffffff}) : (this.turn === 'p1' ? new THREE.MeshStandardMaterial({color:0x3b82f6, metalness:0.6, roughness:0.2}) : new THREE.MeshStandardMaterial({color:0xef4444, metalness:0.6, roughness:0.2}));
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(r, 32, 32), mat);
                mesh.castShadow = true;
                mesh.position.set(this.aimX, r, 4);
                this.scene.add(mesh);

                const speed = power * 0.4;
                const vel = new THREE.Vector3(Math.sin(angle)*speed*0.8, power*0.05, -Math.cos(angle)*speed);
                this.balls.push({ mesh, vel, r, owner: isJack ? 'jack' : this.turn, stopped: false });

                if(isJack) this.jackThrown = true;
                else if(this.turn === 'p1') this.p1Balls--;
                else this.p2Balls--;

                this.updateUI();
            }

            updateUI() {
                document.getElementById('score-p1').textContent = this.scores.p1;
                document.getElementById('score-p2').textContent = this.scores.p2;
                document.getElementById('ball-count').textContent = this.turn === 'p1' ? this.p1Balls : this.p2Balls;
                const ind = document.getElementById('turn-indicator');
                ind.textContent = this.turn === 'p1' ? "PLAYER'S TURN" : "CPU'S TURN";
                ind.className = this.turn === 'p1' ? "p1-turn" : "p2-turn";
                document.getElementById('hint-text').textContent = !this.jackThrown ? "THROW THE PALLINO (WHITE BALL)" : "THROW CLOSE TO THE PALLINO";
            }

            updateCam() {
                this.camera.position.set(this.aimX, 2.5, 6);
                this.camera.lookAt(this.aimX, 0, -10);
            }

            cpuTurn() {
                const jack = this.balls.find(b => b.owner === 'jack');
                const target = jack ? jack.mesh.position : new THREE.Vector3(0, 0, -15);
                const dx = target.x - this.aimX;
                const dz = target.z - 4;
                const angle = Math.atan2(dx, -dz) + (Math.random()-0.5)*0.05;
                const dist = Math.sqrt(dx*dx + dz*dz);
                const pwr = dist * 2.2 + (Math.random()-0.5)*10;
                setTimeout(() => this.throw(pwr, angle), 1000);
            }

            updatePhysics(dt) {
                const c = COURTS[this.course];
                let moving = false;
                this.balls.forEach((b, i) => {
                    if(b.stopped) return;
                    moving = true;
                    b.vel.multiplyScalar(c.drag);
                    if(b.mesh.position.y > b.r) b.vel.y -= 9.8 * dt;
                    else {
                        if(Math.abs(b.vel.y) > 0.5) b.vel.y *= -c.bounce;
                        else { b.vel.y = 0; b.mesh.position.y = b.r; }
                    }
                    b.mesh.position.add(b.vel.clone().multiplyScalar(dt * 10));

                    // Walls
                    if(Math.abs(b.mesh.position.x) > CONFIG.W/2 - b.r) { b.mesh.position.x = Math.sign(b.mesh.position.x)*(CONFIG.W/2-b.r); b.vel.x *= -0.5; }
                    if(b.mesh.position.z < -CONFIG.L + 5 + b.r) { b.mesh.position.z = -CONFIG.L+5+b.r; b.vel.z *= -0.5; }
                    if(b.mesh.position.z > 5 - b.r) { b.mesh.position.z = 5-b.r; b.vel.z *= -0.5; }

                    // Ball-Ball
                    for(let j=i+1; j<this.balls.length; j++) {
                        const b2 = this.balls[j];
                        const d = b.mesh.position.distanceTo(b2.mesh.position);
                        if(d < b.r + b2.r) {
                            const n = b.mesh.position.clone().sub(b2.mesh.position).normalize();
                            const vRel = b.vel.clone().sub(b2.vel);
                            if(vRel.dot(n) < 0) {
                                const imp = n.multiplyScalar(-(1 + c.bounce) * vRel.dot(n) / 2);
                                b.vel.add(imp); b2.vel.sub(imp);
                                b.stopped = b2.stopped = false;
                            }
                        }
                    }

                    if(b.vel.length() < 0.05 && b.mesh.position.y <= b.r + 0.01) { b.stopped = true; b.vel.set(0,0,0); }
                });
                return moving;
            }

            resolveTurn() {
                if(this.p1Balls === 0 && this.p2Balls === 0) { this.endRound(); return; }
                
                const jack = this.balls.find(b => b.owner === 'jack');
                const p1 = this.balls.filter(b => b.owner === 'p1');
                const p2 = this.balls.filter(b => b.owner === 'p2');

                if(p1.length === 0) this.turn = 'p1';
                else if(p2.length === 0) this.turn = 'p2';
                else {
                    const d1 = Math.min(...p1.map(b => b.mesh.position.distanceTo(jack.mesh.position)));
                    const d2 = Math.min(...p2.map(b => b.mesh.position.distanceTo(jack.mesh.position)));
                    if(this.p1Balls > 0 && this.p2Balls > 0) this.turn = d1 < d2 ? 'p2' : 'p1';
                    else this.turn = this.p1Balls > 0 ? 'p1' : 'p2';
                }

                this.state = 'aim';
                this.updateUI();
                this.updateCam();
                if(this.turn === 'p2') this.cpuTurn();
            }

            endRound() {
                const jack = this.balls.find(b => b.owner === 'jack');
                const all = this.balls.filter(b => b.owner !== 'jack').sort((a,b) => a.mesh.position.distanceTo(jack.mesh.position) - b.mesh.position.distanceTo(jack.mesh.position));
                const winner = all[0].owner;
                let pts = 0;
                for(let b of all) { if(b.owner === winner) pts++; else break; }
                if(winner === 'p1') this.scores.p1 += pts; else this.scores.p2 += pts;
                
                this.state = 'menu';
                const ov = document.getElementById('start-overlay');
                ov.classList.remove('hidden');
                ov.querySelector('h1').textContent = winner === 'p1' ? "ROUND WON!" : "ROUND LOST";
                ov.querySelector('p').textContent = `You scored ${pts} points this round. Total: ${this.scores.p1} - ${this.scores.p2}`;
                ov.querySelector('button').textContent = "NEXT ROUND";
            }

            loop() {
                requestAnimationFrame(() => this.loop());
                if(this.state === 'rolling') {
                    if(!this.updatePhysics(0.016)) this.resolveTurn();
                    const active = this.balls.find(b => !b.stopped);
                    if(active) {
                        this.camera.position.lerp(new THREE.Vector3(active.mesh.position.x, 3, active.mesh.position.z + 5), 0.1);
                        this.camera.lookAt(active.mesh.position);
                    }
                }
                this.renderer.render(this.scene, this.camera);
            }
        }

        window.game = new BocceGame();
    </script>
</body>
</html>
