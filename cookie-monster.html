<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cookie Monster Pro - K2 Games</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between; padding: 20px;
        }
        .stats {
            display: flex; gap: 20px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 3px solid #3b82f6;
            color: #1e3a8a;
            font-weight: 900;
            font-size: 20px;
        }
        .speed-meter {
            width: 200px; height: 10px; background: #ddd; border-radius: 5px; margin-top: 5px; overflow: hidden;
        }
        #speed-fill { width: 100%; height: 100%; background: #10b981; transition: width 0.3s; }

        #mobile-controls {
            display: flex; justify-content: space-between; align-items: flex-end; width: 100%; pointer-events: auto; padding-bottom: 20px;
        }
        .joystick-base {
            width: 120px; height: 120px; background: rgba(0,0,0,0.1); border-radius: 50%; position: relative; border: 2px solid rgba(255,255,255,0.5);
        }
        .joystick-stick {
            width: 50px; height: 50px; background: #fff; border-radius: 50%; position: absolute; top: 35px; left: 35px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .scare-btn {
            width: 90px; height: 90px; background: #3b82f6; border-radius: 50%; color: white; font-weight: 900; border: 4px solid #1e40af; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center;
        }

        @media (min-width: 769px) { #mobile-controls { display: none; } }
    </style>
</head>
<body>

<div id="ui">
    <div class="stats">
        <div class="stat-card">
            Cookies: <span id="cookies">0</span>
            <div style="font-size: 10px; margin-top: 5px;">STOMACH FULLNESS</div>
            <div class="speed-meter"><div id="speed-fill"></div></div>
        </div>
        <div class="stat-card">
            Scared: <span id="scared">0</span>
        </div>
    </div>
    
    <div id="mobile-controls">
        <div class="joystick-base" id="joyBase">
            <div class="joystick-stick" id="joyStick"></div>
        </div>
        <button class="scare-btn" id="scareBtn">SCARE!</button>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, monster;
    let ground, cookies = [], people = [], particles = [];
    let scoreCookies = 0, scoreScared = 0;
    let baseSpeed = 0.6;
    let currentSpeed = 0.6;
    
    const keys = { w: false, a: false, s: false, d: false };
    const joy = { x: 0, y: 0, active: false };

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 50, 200);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 40);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lights
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(50, 100, 50);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(1000, 1000);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x7cfc00 }); // Grass
        ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        createNeighborhood();
        createMonster();
        setupInputs();

        window.addEventListener('resize', onResize);
    }

    function createNeighborhood() {
        // Simple Road Cross
        const roadGeo = new THREE.PlaneGeometry(40, 1000);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
        const r1 = new THREE.Mesh(roadGeo, roadMat);
        r1.rotation.x = -Math.PI/2; r1.position.y = 0.01;
        scene.add(r1);
        
        const r2 = new THREE.Mesh(roadGeo, roadMat);
        r2.rotation.x = -Math.PI/2; r2.rotation.z = Math.PI/2; r2.position.y = 0.01;
        scene.add(r2);

        // Houses & Trees
        for(let i=0; i<40; i++) {
            const house = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(15, 10, 15), new THREE.MeshStandardMaterial({color: Math.random()*0xffffff}));
            body.position.y = 5;
            body.castShadow = true;
            house.add(body);
            
            const roof = new THREE.Mesh(new THREE.ConeGeometry(12, 8, 4), new THREE.MeshStandardMaterial({color: 0x8b4513}));
            roof.position.y = 14; roof.rotation.y = Math.PI/4;
            house.add(roof);

            const x = (Math.random()-0.5)*400;
            const z = (Math.random()-0.5)*400;
            if(Math.abs(x) < 30 || Math.abs(z) < 30) continue; // Keep roads clear
            house.position.set(x, 0, z);
            scene.add(house);
        }

        // Spawn Cookies
        for(let i=0; i<20; i++) spawnCookie();
        
        // Spawn People
        for(let i=0; i<15; i++) spawnPerson();
    }

    function spawnCookie() {
        const geo = new THREE.CylinderGeometry(2, 2, 0.5, 16);
        const mat = new THREE.MeshStandardMaterial({ color: 0xd2b48c }); // Tan
        const cookie = new THREE.Mesh(geo, mat);
        
        // Choc chips
        for(let i=0; i<5; i++) {
            const chip = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshBasicMaterial({color: 0x3d2b1f}));
            chip.position.set((Math.random()-0.5)*2.5, 0.3, (Math.random()-0.5)*2.5);
            cookie.add(chip);
        }

        cookie.position.set((Math.random()-0.5)*300, 1, (Math.random()-0.5)*300);
        cookie.rotation.x = Math.random();
        scene.add(cookie);
        cookies.push(cookie);
    }

    function spawnPerson() {
        const person = new THREE.Group();
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 2), new THREE.MeshStandardMaterial({color: Math.random()*0xffffff}));
        body.position.y = 1.5;
        person.add(body);
        
        person.position.set((Math.random()-0.5)*100, 0, (Math.random()-0.5)*100);
        person.userData = { 
            state: 'idle', 
            target: new THREE.Vector3(),
            timer: 0 
        };
        scene.add(person);
        people.push(person);
    }

    function createMonster() {
        monster = new THREE.Group();
        const furMat = new THREE.MeshStandardMaterial({ color: 0x0000ff, roughness: 1 });

        // Body (Round & Fuzzy)
        const body = new THREE.Mesh(new THREE.SphereGeometry(5, 16, 16), furMat);
        body.position.y = 6;
        body.scale.set(1, 1.2, 0.9);
        monster.add(body);

        // Head
        const head = new THREE.Mesh(new THREE.SphereGeometry(4, 16, 16), furMat);
        head.position.set(0, 12, 1);
        monster.add(head);

        // Big Googly Eyes
        const eyeGeo = new THREE.SphereGeometry(1.2, 16, 16);
        const eyeMat = new THREE.MeshBasicMaterial({color: 0xffffff});
        const pupilMat = new THREE.MeshBasicMaterial({color: 0x000000});
        
        const eyeL = new THREE.Mesh(eyeGeo, eyeMat); eyeL.position.set(1.5, 13.5, 4);
        const pL = new THREE.Mesh(new THREE.SphereGeometry(0.4), pupilMat); pL.position.set(0, 0, 1); eyeL.add(pL);
        
        const eyeR = new THREE.Mesh(eyeGeo, eyeMat); eyeR.position.set(-1.5, 13.5, 4);
        const pR = new THREE.Mesh(new THREE.SphereGeometry(0.4), pupilMat); pR.position.set(0, 0, 1); eyeR.add(pR);
        
        monster.add(eyeL, eyeR);
        monster.userData.eyes = [pL, pR];

        // Mouth (Open)
        const mouth = new THREE.Mesh(new THREE.BoxGeometry(4, 1, 2), new THREE.MeshBasicMaterial({color: 0x000000}));
        mouth.position.set(0, 11, 4);
        monster.add(mouth);

        // Legs
        const legGeo = new THREE.CapsuleGeometry(1.2, 3);
        const legL = new THREE.Mesh(legGeo, furMat); legL.position.set(2, 2, 0);
        const legR = new THREE.Mesh(legGeo, furMat); legR.position.set(-2, 2, 0);
        monster.add(legL, legR);
        monster.userData.legs = [legL, legR];

        scene.add(monster);
    }

    function setupInputs() {
        document.addEventListener('keydown', e => {
            const k = e.key.toLowerCase();
            if (k === 'w' || k === 'arrowup') keys.w = true;
            if (k === 's' || k === 'arrowdown') keys.s = true;
            if (k === 'a' || k === 'arrowleft') keys.a = true;
            if (k === 'd' || k === 'arrowright') keys.d = true;
            if (e.code === 'Space') scare();
        });
        document.addEventListener('keyup', e => {
            const k = e.key.toLowerCase();
            if (k === 'w' || k === 'arrowup') keys.w = false;
            if (k === 's' || k === 'arrowdown') keys.s = false;
            if (k === 'a' || k === 'arrowleft') keys.a = false;
            if (k === 'd' || k === 'arrowright') keys.d = false;
        });

        // Mobile
        const joyStick = document.getElementById('joyStick');
        const joyBase = document.getElementById('joyBase');
        joyBase.addEventListener('touchstart', e => { e.preventDefault(); joy.active = true; updateJoy(e.touches[0]); }, {passive:false});
        joyBase.addEventListener('touchmove', e => { e.preventDefault(); updateJoy(e.touches[0]); }, {passive:false});
        joyBase.addEventListener('touchend', () => { joy.active = false; joyStick.style.transform = `translate(0,0)`; joy.x = 0; joy.y = 0; });
        
        document.getElementById('scareBtn').addEventListener('touchstart', (e) => { e.preventDefault(); scare(); });

        function updateJoy(touch) {
            const rect = joyBase.getBoundingClientRect();
            const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
            let dx = touch.clientX - cx, dy = touch.clientY - cy;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(dist > 40) { dx *= 40/dist; dy *= 40/dist; }
            joyStick.style.transform = `translate(${dx}px, ${dy}px)`;
            joy.x = dx/40; joy.y = dy/40;
        }
    }

    function scare() {
        monster.scale.set(1.2, 1.2, 1.2);
        setTimeout(() => monster.scale.set(1, 1, 1), 200);
        
        people.forEach(p => {
            if(p.position.distanceTo(monster.position) < 25) {
                if(p.userData.state !== 'scared') {
                    scoreScared++;
                    document.getElementById('scared').innerText = scoreScared;
                }
                p.userData.state = 'scared';
                p.userData.timer = 100;
                p.userData.target.copy(p.position).sub(monster.position).normalize().multiplyScalar(50).add(p.position);
            }
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.001;

        // Movement
        let ix = 0, iy = 0;
        if(keys.w) iy = -1; if(keys.s) iy = 1; if(keys.a) ix = -1; if(keys.d) ix = 1;
        if(joy.active) { ix = joy.x; iy = joy.y; }

        if(Math.abs(ix) > 0.1 || Math.abs(iy) > 0.1) {
            const angle = Math.atan2(ix, iy);
            monster.rotation.y = THREE.MathUtils.lerp(monster.rotation.y, angle, 0.1);
            monster.position.x += Math.sin(monster.rotation.y) * currentSpeed;
            monster.position.z += Math.cos(monster.rotation.y) * currentSpeed;
            
            // Walk Animation
            monster.userData.legs[0].rotation.x = Math.sin(time*10)*0.5;
            monster.userData.legs[1].rotation.x = Math.sin(time*10 + Math.PI)*0.5;
            monster.position.y = Math.abs(Math.sin(time*20))*0.5;
        }

        // Camera
        camera.position.x = THREE.MathUtils.lerp(camera.position.x, monster.position.x, 0.05);
        camera.position.z = THREE.MathUtils.lerp(camera.position.z, monster.position.z + 40, 0.05);
        camera.lookAt(monster.position);

        // Cookies logic
        cookies.forEach((c, i) => {
            c.rotation.y += 0.02;
            if(c.position.distanceTo(monster.position) < 6) {
                scene.remove(c);
                cookies.splice(i, 1);
                scoreCookies++;
                document.getElementById('cookies').innerText = scoreCookies;
                spawnCookie();
                
                // Slow down monster
                currentSpeed = Math.max(0.15, baseSpeed - (scoreCookies * 0.02));
                document.getElementById('speed-fill').style.width = (currentSpeed / baseSpeed * 100) + '%';
            }
        });

        // People logic
        people.forEach(p => {
            if(p.userData.state === 'scared') {
                p.position.lerp(p.userData.target, 0.02);
                p.userData.timer--;
                if(p.userData.timer <= 0) p.userData.state = 'idle';
                p.rotation.y += 0.5; // Panic spin
            } else {
                p.rotation.y = 0;
            }
        });

        // Googly Eyes
        monster.userData.eyes.forEach(p => {
            p.position.x = Math.sin(time*5)*0.2;
            p.position.y = Math.cos(time*5)*0.2;
        });

        renderer.render(scene, camera);
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
</script>
</body>
</html>
