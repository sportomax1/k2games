<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cookie Monster Pro - K2 Games</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between; padding: 20px;
        }
        .stats {
            display: flex; gap: 20px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 3px solid #3b82f6;
            color: #1e3a8a;
            font-weight: 900;
            font-size: 20px;
        }
        .speed-meter {
            width: 200px; height: 10px; background: #ddd; border-radius: 5px; margin-top: 5px; overflow: hidden;
        }
        #speed-fill { width: 100%; height: 100%; background: #10b981; transition: width 0.3s; }

        #mobile-controls {
            display: flex; justify-content: space-between; align-items: flex-end; width: 100%; pointer-events: auto; padding-bottom: 20px;
        }
        .joystick-base {
            width: 120px; height: 120px; background: rgba(0,0,0,0.1); border-radius: 50%; position: relative; border: 2px solid rgba(255,255,255,0.5);
        }
        .joystick-stick {
            width: 50px; height: 50px; background: #fff; border-radius: 50%; position: absolute; top: 35px; left: 35px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .scare-btn {
            width: 90px; height: 90px; background: #3b82f6; border-radius: 50%; color: white; font-weight: 900; border: 4px solid #1e40af; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center;
        }
        #action-btn {
            width: 90px; height: 90px; background: #fbbf24; border-radius: 50%; color: #92400e; font-weight: 900; border: 4px solid #b45309; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: none; justify-content: center; align-items: center; pointer-events: auto;
        }

        @media (min-width: 769px) { #mobile-controls { display: none; } }
    </style>

<body>

<div id="ui">
    <div class="stats">
        <div class="stat-card">
            Cookies: <span id="cookies">0</span>
            <div style="font-size: 10px; margin-top: 5px;">STOMACH FULLNESS</div>
            <div class="speed-meter"><div id="speed-fill"></div></div>
        </div>
        <div class="stat-card">
            Scared: <span id="scared">0</span>
        </div>
    </div>
    
    <div id="mobile-controls">
        <div class="joystick-base" id="joyBase">
            <div class="joystick-stick" id="joyStick"></div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button id="action-btn">RIDE!</button>
            <button class="scare-btn" id="scareBtn">SCARE!</button>
        </div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, monster;
    let ground, cookies = [], people = [], particles = [], bikes = [];
    let scoreCookies = 0, scoreScared = 0;
    let baseSpeed = 0.6;
    let currentSpeedLimit = 0.6;
    let ridingBike = null;
    
    const velocity = new THREE.Vector3();
    const acceleration = 0.05;
    const friction = 0.92;
    const rotationSpeed = 0.15;

    const keys = { w: false, a: false, s: false, d: false, e: false };
    const joy = { x: 0, y: 0, active: false };

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 100, 500);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 30, 40);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lights
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(50, 100, 50);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -300;
        dirLight.shadow.camera.right = 300;
        dirLight.shadow.camera.top = 300;
        dirLight.shadow.camera.bottom = -300;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.bias = -0.0005;
        scene.add(dirLight);
        scene.userData.dirLight = dirLight;

        // Ground (Much Bigger)
        const groundGeo = new THREE.PlaneGeometry(4000, 4000);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x7cfc00 });
        ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        createNeighborhood();
        createMonster();
        setupInputs();

        window.addEventListener('resize', onResize);
    }

    function createNeighborhood() {
        // Massive Roads
        const roadGeo = new THREE.PlaneGeometry(60, 4000);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
        
        for(let i=-2; i<=2; i++) {
            const r1 = new THREE.Mesh(roadGeo, roadMat);
            r1.rotation.x = -Math.PI/2; r1.position.set(i*800, 0.02, 0);
            r1.receiveShadow = true; scene.add(r1);
            
            const r2 = new THREE.Mesh(roadGeo, roadMat);
            r2.rotation.x = -Math.PI/2; r2.rotation.z = Math.PI/2; r2.position.set(0, 0.02, i*800);
            r2.receiveShadow = true; scene.add(r2);
        }

        // Detailed Houses (More)
        for(let i=0; i<300; i++) {
            const x = (Math.random()-0.5)*3000;
            const z = (Math.random()-0.5)*3000;
            if(Math.abs(x % 800) < 60 || Math.abs(z % 800) < 60) continue;
            createDetailedHouse(x, z);
        }

        // More Trees
        for(let i=0; i<400; i++) {
            const x = (Math.random()-0.5)*3500;
            const z = (Math.random()-0.5)*3500;
            if(Math.abs(x % 800) < 40 || Math.abs(z % 800) < 40) continue;
            createTree(x, z);
        }

        // Random Bikes
        for(let i=0; i<20; i++) {
            const x = (Math.random()-0.5)*2000;
            const z = (Math.random()-0.5)*2000;
            createBike(x, z);
        }

        for(let i=0; i<100; i++) spawnCookie();
        for(let i=0; i<100; i++) spawnPerson();
    }

    function createBike(x, z) {
        const bike = new THREE.Group();
        const frameMat = new THREE.MeshStandardMaterial({color: Math.random()*0xffffff});
        const wheelMat = new THREE.MeshStandardMaterial({color: 0x222222});

        // Wheels
        const wheelGeo = new THREE.TorusGeometry(1.5, 0.2, 8, 24);
        const w1 = new THREE.Mesh(wheelGeo, wheelMat); w1.position.set(0, 1.5, 2.5);
        const w2 = new THREE.Mesh(wheelGeo, wheelMat); w2.position.set(0, 1.5, -2.5);
        bike.add(w1, w2);

        // Frame
        const f1 = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 5), frameMat);
        f1.position.set(0, 2.5, 0); f1.rotation.x = Math.PI/2.5;
        bike.add(f1);
        
        const f2 = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 4), frameMat);
        f2.position.set(0, 3, 1); f2.rotation.x = -Math.PI/4;
        bike.add(f2);

        // Handlebars
        const h = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 4), wheelMat);
        h.position.set(0, 4.5, -2); h.rotation.z = Math.PI/2;
        bike.add(h);

        bike.position.set(x, 0, z);
        bike.userData.wheels = [w1, w2];
        bike.traverse(n => { if(n.isMesh) n.castShadow = true; });
        scene.add(bike);
        bikes.push(bike);
    }

    function createDetailedHouse(x, z) {
        const house = new THREE.Group();
        const color = new THREE.Color().setHSL(Math.random(), 0.5, 0.6);
        
        // Main Body
        const body = new THREE.Mesh(new THREE.BoxGeometry(15, 12, 15), new THREE.MeshStandardMaterial({color: color}));
        body.position.y = 6;
        body.castShadow = true; body.receiveShadow = true;
        house.add(body);
        
        // Roof
        const roof = new THREE.Mesh(new THREE.ConeGeometry(13, 8, 4), new THREE.MeshStandardMaterial({color: 0x442211}));
        roof.position.y = 16; roof.rotation.y = Math.PI/4;
        roof.castShadow = true;
        house.add(roof);

        // Windows
        const winGeo = new THREE.PlaneGeometry(2, 3);
        const winMat = new THREE.MeshStandardMaterial({color: 0xadd8e6, emissive: 0x224466, roughness: 0.1});
        for(let j=0; j<4; j++) {
            const win = new THREE.Mesh(winGeo, winMat);
            const angle = (j/4) * Math.PI * 2;
            win.position.set(Math.cos(angle)*7.6, 8, Math.sin(angle)*7.6);
            win.rotation.y = -angle + Math.PI/2;
            house.add(win);
        }

        house.position.set(x, 0, z);
        scene.add(house);
    }

    function createTree(x, z) {
        const tree = new THREE.Group();
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.2, 5), new THREE.MeshStandardMaterial({color: 0x4d2926}));
        trunk.position.y = 2.5;
        trunk.castShadow = true;
        tree.add(trunk);
        
        const leaves = new THREE.Mesh(new THREE.SphereGeometry(4, 8, 8), new THREE.MeshStandardMaterial({color: 0x2d5a27, roughness: 0.8}));
        leaves.position.y = 8;
        leaves.scale.y = 1.5;
        leaves.castShadow = true;
        tree.add(leaves);

        tree.position.set(x, 0, z);
        scene.add(tree);
    }

    function createStreetLight(x, z, rotate=false) {
        const light = new THREE.Group();
        const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 15), new THREE.MeshStandardMaterial({color: 0x222222}));
        pole.position.y = 7.5;
        light.add(pole);
        
        const lamp = new THREE.Mesh(new THREE.SphereGeometry(1), new THREE.MeshBasicMaterial({color: 0xffffaa}));
        lamp.position.set(0, 15, 0);
        light.add(lamp);
        
        const pLight = new THREE.PointLight(0xffffaa, 50, 50);
        pLight.position.set(0, 15, 0);
        pLight.castShadow = false; // Disable to stay under WebGL texture unit limits
        light.add(pLight);

        light.position.set(x, 0, z);
        scene.add(light);
    }

    function spawnCookie() {
        const geo = new THREE.CylinderGeometry(2, 2, 0.5, 16);
        const mat = new THREE.MeshStandardMaterial({ color: 0xd2b48c }); // Tan
        const cookie = new THREE.Mesh(geo, mat);
        
        // Choc chips
        for(let i=0; i<5; i++) {
            const chip = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshBasicMaterial({color: 0x3d2b1f}));
            chip.position.set((Math.random()-0.5)*2.5, 0.3, (Math.random()-0.5)*2.5);
            cookie.add(chip);
        }

        cookie.position.set((Math.random()-0.5)*600, 1, (Math.random()-0.5)*600);
        cookie.rotation.x = Math.random();
        scene.add(cookie);
        cookies.push(cookie);
    }

    function spawnPerson() {
        const person = new THREE.Group();
        const skinColor = new THREE.Color().setHSL(Math.random(), 0.3, 0.7);
        const clothColor = new THREE.Color().setHSL(Math.random(), 0.6, 0.5);

        // Legs
        const legGeo = new THREE.CapsuleGeometry(0.3, 1);
        const lL = new THREE.Mesh(legGeo, new THREE.MeshStandardMaterial({color: 0x333333}));
        lL.position.set(0.4, 0.5, 0);
        const lR = new THREE.Mesh(legGeo, new THREE.MeshStandardMaterial({color: 0x333333}));
        lR.position.set(-0.4, 0.5, 0);
        person.add(lL, lR);

        // Body
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.8, 1.5), new THREE.MeshStandardMaterial({color: clothColor}));
        body.position.y = 2.2;
        person.add(body);

        // Head
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.6), new THREE.MeshStandardMaterial({color: skinColor}));
        head.position.y = 3.8;
        person.add(head);
        
        // Arms
        const armGeo = new THREE.CapsuleGeometry(0.25, 1.2);
        const aL = new THREE.Mesh(armGeo, new THREE.MeshStandardMaterial({color: clothColor}));
        aL.position.set(1.1, 2.5, 0); aL.rotation.z = -0.2;
        const aR = new THREE.Mesh(armGeo, new THREE.MeshStandardMaterial({color: clothColor}));
        aR.position.set(-1.1, 2.5, 0); aR.rotation.z = 0.2;
        person.add(aL, aR);
        
        person.scale.setScalar(0.8 + Math.random()*0.4);
        person.position.set((Math.random()-0.5)*500, 0, (Math.random()-0.5)*500);
        person.userData = { 
            state: 'idle', 
            target: new THREE.Vector3(),
            timer: 0,
            legs: [lL, lR],
            arms: [aL, aR]
        };
        person.traverse(n => { if(n.isMesh) n.castShadow = true; });
        scene.add(person);
        people.push(person);
    }

    function createMonster() {
        monster = new THREE.Group();
        
        // Procedural Fur Texture
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#0000ff';
        ctx.fillRect(0,0,256,256);
        for(let i=0; i<5000; i++) {
            ctx.fillStyle = `rgba(0, 0, ${150 + Math.random()*105}, ${0.5 + Math.random()*0.5})`;
            ctx.fillRect(Math.random()*256, Math.random()*256, 2, 8);
        }
        const furTex = new THREE.CanvasTexture(canvas);
        furTex.wrapS = furTex.wrapT = THREE.RepeatWrapping;
        furTex.repeat.set(4, 4);

        const furMat = new THREE.MeshStandardMaterial({ 
            map: furTex,
            roughness: 1,
            metalness: 0,
            bumpMap: furTex,
            bumpScale: 0.1
        });

        // Body
        const body = new THREE.Mesh(new THREE.SphereGeometry(5, 32, 32), furMat);
        body.position.y = 6;
        body.scale.set(1.1, 1.3, 1);
        monster.add(body);

        // Head
        const head = new THREE.Mesh(new THREE.SphereGeometry(4.5, 32, 32), furMat);
        head.position.set(0, 13, 0.5);
        monster.add(head);

        // Eyes (High Quality)
        const eyeL = createEye(); eyeL.position.set(1.8, 14.5, 4);
        const eyeR = createEye(); eyeR.position.set(-1.8, 14.5, 4);
        monster.add(eyeL, eyeR);
        monster.userData.eyes = [eyeL.userData.pupil, eyeR.userData.pupil];

        // Mouth (Deep)
        const mouthGeo = new THREE.BoxGeometry(5, 2, 2.5);
        const mouthMat = new THREE.MeshStandardMaterial({ color: 0x220000, roughness: 1 });
        const mouth = new THREE.Mesh(mouthGeo, mouthMat);
        mouth.position.set(0, 11.5, 3.5);
        mouth.rotation.x = 0.2;
        monster.add(mouth);

        // Arms
        const armGeo = new THREE.CapsuleGeometry(1, 4, 4, 8);
        const armL = new THREE.Mesh(armGeo, furMat);
        armL.position.set(5.5, 9, 0); armL.rotation.z = -0.5;
        const armR = new THREE.Mesh(armGeo, furMat);
        armR.position.set(-5.5, 9, 0); armR.rotation.z = 0.5;
        monster.add(armL, armR);
        monster.userData.arms = [armL, armR];

        // Legs
        const legGeo = new THREE.CapsuleGeometry(1.5, 3.5, 4, 8);
        const legL = new THREE.Mesh(legGeo, furMat); legL.position.set(2.5, 2.5, 0);
        const legR = new THREE.Mesh(legGeo, furMat); legR.position.set(-2.5, 2.5, 0);
        monster.add(legL, legR);
        monster.userData.legs = [legL, legR];

        monster.traverse(n => { if(n.isMesh) { n.castShadow = true; n.receiveShadow = true; } });
        scene.add(monster);
    }

    function createEye() {
        const eye = new THREE.Group();
        const white = new THREE.Mesh(new THREE.SphereGeometry(1.4, 24, 24), new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 0.1}));
        eye.add(white);
        
        const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), new THREE.MeshBasicMaterial({color: 0x000000}));
        pupil.position.z = 1.1;
        eye.add(pupil);
        
        const shine = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), new THREE.MeshBasicMaterial({color: 0xffffff}));
        shine.position.set(0.3, 0.3, 1.4);
        eye.add(shine);
        
        eye.userData.pupil = pupil;
        return eye;
    }

    function setupInputs() {
        document.addEventListener('keydown', e => {
            const k = e.key.toLowerCase();
            if (k === 'w' || k === 'arrowup') keys.w = true;
            if (k === 's' || k === 'arrowdown') keys.s = true;
            if (k === 'a' || k === 'arrowleft') keys.a = true;
            if (k === 'd' || k === 'arrowright') keys.d = true;
            if (e.code === 'Space') scare();
        });
        document.addEventListener('keyup', e => {
            const k = e.key.toLowerCase();
            if (k === 'w' || k === 'arrowup') keys.w = false;
            if (k === 's' || k === 'arrowdown') keys.s = false;
            if (k === 'a' || k === 'arrowleft') keys.a = false;
            if (k === 'd' || k === 'arrowright') keys.d = false;
        });

        // Mobile
        const joyStick = document.getElementById('joyStick');
        const joyBase = document.getElementById('joyBase');
        joyBase.addEventListener('touchstart', e => { e.preventDefault(); joy.active = true; updateJoy(e.touches[0]); }, {passive:false});
        joyBase.addEventListener('touchmove', e => { e.preventDefault(); updateJoy(e.touches[0]); }, {passive:false});
        joyBase.addEventListener('touchend', () => { joy.active = false; joyStick.style.transform = `translate(0,0)`; joy.x = 0; joy.y = 0; });
        
        document.getElementById('scareBtn').addEventListener('touchstart', (e) => { e.preventDefault(); scare(); });

        function updateJoy(touch) {
            const rect = joyBase.getBoundingClientRect();
            const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
            let dx = touch.clientX - cx, dy = touch.clientY - cy;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(dist > 40) { dx *= 40/dist; dy *= 40/dist; }
            joyStick.style.transform = `translate(${dx}px, ${dy}px)`;
            joy.x = dx/40; joy.y = dy/40;
        }
    }

    function spawnCrumb(pos) {
        for(let i=0; i<5; i++) {
            const crumb = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), new THREE.MeshBasicMaterial({color: 0x3d2b1f}));
            crumb.position.copy(pos);
            crumb.userData.vel = new THREE.Vector3((Math.random()-0.5)*2, Math.random()*2, (Math.random()-0.5)*2);
            scene.add(crumb);
            particles.push(crumb);
            setTimeout(() => { scene.remove(crumb); particles.splice(particles.indexOf(crumb), 1); }, 1000);
        }
    }

    function scare() {
        monster.scale.set(1.2, 1.2, 1.2);
        setTimeout(() => monster.scale.set(1, 1, 1), 200);
        
        people.forEach(p => {
            if(p.position.distanceTo(monster.position) < 35) {
                if(p.userData.state !== 'scared') {
                    scoreScared++;
                    document.getElementById('scared').innerText = scoreScared;
                    
                    // Panic Emote
                    const emote = new THREE.Mesh(new THREE.PlaneGeometry(3, 3), new THREE.MeshBasicMaterial({
                        map: createEmoteTex('!'), 
                        transparent: true,
                        side: THREE.DoubleSide
                    }));
                    emote.position.y = 6;
                    p.add(emote);
                    p.userData.emote = emote;
                }
                p.userData.state = 'scared';
                p.userData.timer = 150;
                p.userData.target.copy(p.position).sub(monster.position).normalize().multiplyScalar(100).add(p.position);
            }
        });
    }

    function createEmoteTex(char) {
        const can = document.createElement('canvas'); can.width = 64; can.height = 64;
        const c = can.getContext('2d');
        c.fillStyle = 'white'; c.beginPath(); c.arc(32,32,30,0,Math.PI*2); c.fill();
        c.fillStyle = 'red'; c.font = 'bold 40px Arial'; c.textAlign = 'center'; c.fillText(char, 32, 45);
        return new THREE.CanvasTexture(can);
    }

    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.001;

        // Particles
        particles.forEach(p => {
            p.position.add(p.userData.vel);
            p.userData.vel.y -= 0.1;
            if(p.position.y < 0) p.position.y = 0;
        });

        // Inputs
        let ix = 0, iy = 0;
        if(keys.w) iy = -1; if(keys.s) iy = 1; if(keys.a) ix = -1; if(keys.d) ix = 1;
        if(joy.active) { ix = joy.x; iy = joy.y; }

        // Proximity to Bikes
        const actionBtn = document.getElementById('action-btn');
        let nearBike = null;
        if (!ridingBike) {
            bikes.forEach(b => {
                if (monster.position.distanceTo(b.position) < 20) nearBike = b;
            });
        }

        if (ridingBike) {
            actionBtn.style.display = 'flex';
            actionBtn.innerText = 'DISMOUNT';
            currentSpeedLimit = Math.max(1.2, (baseSpeed - (scoreCookies * 0.01)) * 3);
        } else if (nearBike) {
            actionBtn.style.display = 'flex';
            actionBtn.innerText = 'RIDE!';
        } else {
            actionBtn.style.display = 'none';
        }

        if (keys.e) {
            keys.e = false;
            toggleBike(nearBike);
        }

        // Apply Acceleration
        if (Math.abs(ix) > 0.1 || Math.abs(iy) > 0.1) {
            velocity.x += ix * acceleration;
            velocity.z += iy * acceleration;
        }

        // Apply Friction
        velocity.multiplyScalar(friction);

        // Speed Limit
        const speed = velocity.length();
        if (speed > currentSpeedLimit) velocity.setLength(currentSpeedLimit);

        // Apply Velocity
        monster.position.add(velocity);

        // Bike Following
        if (ridingBike) {
            ridingBike.position.copy(monster.position);
            ridingBike.rotation.y = monster.rotation.y;
            ridingBike.userData.wheels.forEach(w => w.rotation.x += speed * 0.5);
        }

        // Rotation
        if (speed > 0.05) {
            const targetAngle = Math.atan2(velocity.x, velocity.z);
            let diff = targetAngle - monster.rotation.y;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            monster.rotation.y += diff * rotationSpeed;

            // Animations
            if (ridingBike) {
                monster.position.y = 2.5;
                monster.userData.legs[0].rotation.x = 1.2;
                monster.userData.legs[1].rotation.x = 1.2;
                monster.userData.arms[0].rotation.x = -1.0;
                monster.userData.arms[1].rotation.x = -1.0;
            } else {
                const animSpeed = speed * 20;
                monster.userData.legs[0].rotation.x = Math.sin(time * animSpeed) * 0.5;
                monster.userData.legs[1].rotation.x = Math.sin(time * animSpeed + Math.PI) * 0.5;
                monster.userData.arms[0].rotation.x = Math.sin(time * animSpeed + Math.PI) * 0.5;
                monster.userData.arms[1].rotation.x = Math.sin(time * animSpeed) * 0.5;
                monster.position.y = Math.abs(Math.sin(time * animSpeed * 2)) * 0.5;
            }
        } else if (!ridingBike) {
            monster.position.y = THREE.MathUtils.lerp(monster.position.y, 0, 0.1);
        }

        // Camera
        camera.position.x = THREE.MathUtils.lerp(camera.position.x, monster.position.x, 0.05);
        camera.position.z = THREE.MathUtils.lerp(camera.position.z, monster.position.z + 60, 0.05);
        camera.lookAt(monster.position);

        // Directional Light follow
        if (scene.userData.dirLight) {
            scene.userData.dirLight.position.set(monster.position.x + 50, 150, monster.position.z + 50);
            scene.userData.dirLight.target = monster;
        }

        // Cookies
        cookies.forEach((c, i) => {
            c.rotation.y += 0.02;
            if(c.position.distanceTo(monster.position) < 10) {
                spawnCrumb(c.position); scene.remove(c); cookies.splice(i, 1);
                scoreCookies++; document.getElementById('cookies').innerText = scoreCookies;
                spawnCookie();
                if (!ridingBike) {
                    currentSpeedLimit = Math.max(0.15, baseSpeed - (scoreCookies * 0.01));
                    document.getElementById('speed-fill').style.width = (currentSpeedLimit / baseSpeed * 100) + '%';
                }
            }
        });

        // People
        people.forEach(p => {
            if(p.userData.state === 'scared') {
                p.position.lerp(p.userData.target, 0.03); p.userData.timer--;
                if(p.userData.timer <= 0) {
                    p.userData.state = 'idle';
                    if(p.userData.emote) { p.remove(p.userData.emote); p.userData.emote = null; }
                }
                p.rotation.y += 0.5;
                p.userData.legs[0].rotation.x = Math.sin(time*20)*0.8;
                p.userData.legs[1].rotation.x = Math.sin(time*20+Math.PI)*0.8;
                if(p.userData.emote) p.userData.emote.lookAt(camera.position);
            } else {
                p.rotation.y = 0; p.userData.legs[0].rotation.x = 0; p.userData.legs[1].rotation.x = 0;
            }
        });

        // Eyes
        monster.userData.eyes.forEach(p => {
            p.position.x = Math.sin(time*5)*0.3; p.position.y = Math.cos(time*5)*0.3;
        });

        renderer.render(scene, camera);
    }

    function toggleBike(bike) {
        if (ridingBike) {
            ridingBike = null;
            currentSpeedLimit = Math.max(0.15, baseSpeed - (scoreCookies * 0.01));
        } else if (bike) {
            ridingBike = bike;
        }
    }

        // Googly Eyes
        monster.userData.eyes.forEach(p => {
            p.position.x = Math.sin(time*5)*0.3;
            p.position.y = Math.cos(time*5)*0.3;
        });

        renderer.render(scene, camera);
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
</script>
</body>
</html>
