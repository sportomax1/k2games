<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Lasso Legends</title><style>*{box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;touch-action:none}html,body{margin:0;height:100%;overflow:hidden;background:#211006;color:#fff;font-family:system-ui,-apple-system,Segoe UI,sans-serif}canvas{width:100vw;height:100vh;display:block}.hud{position:fixed;top:max(10px,env(safe-area-inset-top));left:10px;right:10px;display:flex;justify-content:space-between;gap:8px;z-index:5;pointer-events:none}.pill{background:rgba(41,18,5,.78);border:1px solid rgba(255,255,255,.22);border-radius:15px;padding:8px 10px;font-weight:1000;box-shadow:0 8px 22px rgba(0,0,0,.25);text-shadow:0 2px 3px #000}.pill b{color:#fde68a}.overlay{position:fixed;inset:0;display:grid;place-items:center;background:rgba(35,15,5,.84);z-index:10;padding:20px;text-align:center}.card{width:min(94vw,720px);background:linear-gradient(180deg,#7c2d12,#431407);border:2px solid #fed7aa;border-radius:28px;padding:24px;box-shadow:0 24px 80px rgba(0,0,0,.58)}h1{font-size:clamp(44px,12vw,82px);line-height:.82;margin:0 0 12px;color:#fde68a;text-shadow:0 5px 0 rgba(0,0,0,.35)}p{color:#ffedd5;font-weight:760;line-height:1.4}.btn{border:0;border-radius:999px;background:linear-gradient(135deg,#fde047,#fb923c);color:#431407;font-weight:1000;padding:14px 22px;font-size:18px;margin-top:14px}.controls{position:fixed;bottom:calc(16px + env(safe-area-inset-bottom));left:0;right:0;display:flex;justify-content:space-between;padding:0 18px;z-index:6;pointer-events:none}.pad{display:flex;gap:10px;pointer-events:auto}.cbtn{width:72px;height:64px;border-radius:18px;border:2px solid rgba(255,255,255,.32);background:rgba(67,20,7,.76);color:#fff;font-weight:1000;font-size:15px;box-shadow:0 7px 0 rgba(0,0,0,.28)}.cbtn.on{transform:scale(.93);background:rgba(251,146,60,.75)}#power{position:fixed;left:50%;bottom:calc(92px + env(safe-area-inset-bottom));transform:translateX(-50%);width:min(280px,54vw);height:12px;border-radius:999px;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.25);z-index:6;overflow:hidden}#power i{display:block;height:100%;width:0;background:linear-gradient(90deg,#22c55e,#facc15,#ef4444)}a{position:fixed;left:50%;bottom:6px;transform:translateX(-50%);z-index:7;color:#ffedd5;text-decoration:none;font-size:12px;font-weight:900;background:rgba(0,0,0,.25);padding:6px 10px;border-radius:999px}@media(max-width:700px){.pill{font-size:12px;padding:7px 8px}.cbtn{width:64px;height:58px;font-size:13px}.controls{padding:0 12px}}</style></head><body><canvas id="c"></canvas><div class="hud"><div class="pill" id="score">Score <b>0</b></div><div class="pill" id="time">60</div><div class="pill" id="stage">Stage 1</div><div class="pill" id="streak">Streak 0</div></div><div id="power"><i></i></div><div class="controls"><div class="pad"><button class="cbtn" data-k="ArrowLeft">◀ AIM</button><button class="cbtn" data-k="ArrowRight">AIM ▶</button></div><div class="pad"><button class="cbtn" data-k="Space">HOLD<br>THROW</button><button class="cbtn" data-k="ShiftLeft">REEL</button></div></div><a href="index.html">← K2 HUB</a><div class="overlay" id="overlay"><div class="card"><h1>Lasso Legends</h1><p>Hold throw to charge power, release to cast the rope, then reel to tighten the loop. Catch streaks, avoid decoys, grab gold targets, and survive bonus stampedes.</p><button class="btn" id="start">START RODEO</button></div></div><script>(()=>{const c=document.getElementById('c'),x=c.getContext('2d');let W,H,D=1;function rs(){D=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0)}addEventListener('resize',rs);rs();const keys={},prev={},ui={score:gid('score'),time:gid('time'),stage:gid('stage'),streak:gid('streak'),overlay:gid('overlay'),power:document.querySelector('#power i')};function gid(id){return document.getElementById(id)}let run=false,last=0,t=75,score=0,streak=0,stage=1,spawn=0,bonusT=0,animals=[],fx=[],texts=[],dust=[],cowboy={x:0,y:0,a:-Math.PI/2},rope={swing:0,thrown:false,x:0,y:0,r:20,vx:0,vy:0,life:0,power:0,charging:false,catching:null};function rnd(a,b){return a+Math.random()*(b-a)}function reset(){run=true;t=75;score=0;streak=0;stage=1;spawn=0;bonusT=0;animals=[];fx=[];texts=[];dust=[];rope.thrown=false;rope.power=0;cowboy.x=W/2;cowboy.y=H*.78;ui.overlay.style.display='none';last=performance.now();requestAnimationFrame(loop)}function makeAnimal(bonus=false){let roll=Math.random(),type=roll<.38?'cow':roll<.65?'goat':roll<.84?'calf':roll<.94?'bull':'gold';if(bonus)type=Math.random()<.5?'gold':'calf';let sp={cow:95,goat:150,calf:195,bull:135,gold:220}[type]*(1+stage*.06),side=Math.random()<.5?-1:1;return{x:side<0?-60:W+60,y:rnd(H*.20,H*.62),vx:-side*rnd(sp*.75,sp*1.2),vy:rnd(-35,35),type,r:{cow:30,goat:22,calf:17,bull:32,gold:19}[type],wob:rnd(0,7),zig:rnd(.7,1.7),value:{cow:220,goat:340,calf:470,bull:-360,gold:900}[type],caught:false}}function pop(px,py,n,cset){for(let i=0;i<n;i++)fx.push({x:px,y:py,vx:rnd(-5,5),vy:rnd(-6,2),l:rnd(20,54),c:(cset||['#fde047','#fb923c','#fff7ed'])[i%3],s:rnd(3,7)})}function floatText(txt,px,py,c){texts.push({txt,x:px,y:py,vy:-1.1,l:70,c})}function throwRope(power){if(rope.thrown)return;rope.thrown=true;rope.x=cowboy.x;rope.y=cowboy.y-28;rope.r=18+power*16;rope.vx=Math.cos(cowboy.a)*(440+power*360);rope.vy=Math.sin(cowboy.a)*(440+power*360);rope.life=.75+power*.55;rope.catching=null}function catchAnimal(o){if(o.type==='bull'){streak=0;score=Math.max(0,score+o.value);floatText('BULL! -360',o.x,o.y,'#fca5a5');pop(o.x,o.y,24,['#ef4444','#991b1b','#fee2e2'])}else{streak++;let mult=Math.min(6,1+streak*.18),pts=Math.floor(o.value*mult);score+=pts;t+=o.type==='gold'?3:.8;floatText('+'+pts,o.x,o.y,o.type==='gold'?'#fde047':'#fff7ed');pop(o.x,o.y,o.type==='gold'?46:30,o.type==='gold'?['#fde047','#facc15','#fff7ed']:null)}animals.splice(animals.indexOf(o),1);rope.thrown=false;rope.power=0}function update(dt){if(!run)return;t-=dt;stage=1+Math.floor((75-t)/15);if(t<=0){end();return}spawn-=dt;bonusT-=dt;if(spawn<=0){let count=bonusT>0?3:1;for(let i=0;i<count;i++)animals.push(makeAnimal(bonusT>0));spawn=bonusT>0?rnd(.22,.38):rnd(.35,.78)/(1+stage*.05)}if(Math.random()<dt*.22&&bonusT<=0&&t<55){bonusT=4.5;floatText('BONUS STAMPEDE!',W/2,H*.18,'#fde047')}let aim=(keys.ArrowRight?1:0)-(keys.ArrowLeft?1:0);cowboy.a+=aim*dt*(3.0+Math.min(2,stage*.12));cowboy.a=Math.max(-Math.PI+.18,Math.min(-.08,cowboy.a));rope.swing+=dt*(8+stage*.25);if(keys.Space&&!rope.thrown){rope.charging=true;rope.power=clamp(rope.power+dt*.92,0,1)}if(prev.Space&&!keys.Space&&!rope.thrown){throwRope(Math.max(.15,rope.power));rope.charging=false}animals.forEach(o=>{o.x+=o.vx*dt;o.y+=(Math.sin(performance.now()*.004*o.zig+o.wob)*38+o.vy)*dt;if(o.type==='goat'||o.type==='calf'||o.type==='gold')o.vy+=Math.sin(o.wob+performance.now()*.006)*14*dt;if(o.y<H*.17||o.y>H*.66)o.vy*=-1;if(Math.random()<dt*.9&&o.type==='calf')o.vx*=1+rnd(-.08,.12)});animals=animals.filter(o=>o.x>-110&&o.x<W+110);if(rope.thrown){rope.x+=rope.vx*dt;rope.y+=rope.vy*dt;rope.vx*=.986;rope.vy*=.986;rope.life-=dt;rope.r+=28*dt;if(keys.ShiftLeft||keys.ShiftRight){rope.vx+=(cowboy.x-rope.x)*dt*6;rope.vy+=(cowboy.y-40-rope.y)*dt*6;rope.r=Math.max(16,rope.r-50*dt)}let best=null,bd=999;for(const o of animals){let d=Math.hypot(o.x-rope.x,o.y-rope.y);if(d<rope.r+o.r&&d<bd){best=o;bd=d}}if(best)catchAnimal(best);if(rope.life<=0||rope.x<-120||rope.x>W+120||rope.y<0||rope.y>H+100){rope.thrown=false;rope.power=0;streak=0;floatText('MISS',cowboy.x,H*.72,'#fca5a5')}}for(let i=0;i<2;i++)dust.push({x:rnd(0,W),y:rnd(H*.68,H*.96),vx:rnd(-.4,.4),vy:rnd(-.3,.1),l:rnd(50,120),s:rnd(1,3)});dust.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.l--});dust=dust.filter(p=>p.l>0);fx.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.14;p.l--});fx=fx.filter(p=>p.l>0);texts.forEach(p=>{p.y+=p.vy;p.l--});texts=texts.filter(p=>p.l>0);ui.score.innerHTML='Score <b>'+Math.floor(score)+'</b>';ui.time.textContent=Math.ceil(t);ui.stage.textContent='Stage '+stage;ui.streak.textContent='Streak '+streak;ui.power.style.width=Math.round(rope.power*100)+'%';Object.assign(prev,keys)}function end(){run=false;ui.overlay.style.display='grid';ui.overlay.querySelector('h1').textContent='Score '+Math.floor(score);ui.overlay.querySelector('p').textContent='Stage '+stage+' reached. Best streak '+streak+'. Upgrade verdict: much less sleepy than MVP.';ui.overlay.querySelector('.btn').textContent='PLAY AGAIN'}function draw(){x.clearRect(0,0,W,H);let g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#7c2d12');g.addColorStop(.68,'#b45309');g.addColorStop(1,'#78350f');x.fillStyle=g;x.fillRect(0,0,W,H);x.fillStyle='rgba(255,237,213,.16)';for(let i=0;i<20;i++){x.beginPath();x.arc((i*97+performance.now()*.018)%W,H*.16+(i%7)*74,3,0,7);x.fill()}x.fillStyle='rgba(67,20,7,.6)';x.fillRect(0,H*.69,W,H*.31);x.strokeStyle='rgba(255,255,255,.24)';x.lineWidth=5;x.strokeRect(26,H*.14,W-52,H*.55);dust.forEach(p=>{x.globalAlpha=p.l/120;x.fillStyle='#fed7aa';x.fillRect(p.x,p.y,p.s,p.s);x.globalAlpha=1});animals.forEach(drawAnimal);drawCowboy();drawRope();fx.forEach(p=>{x.fillStyle=p.c;x.fillRect(p.x,p.y,p.s,p.s)});texts.forEach(p=>{x.globalAlpha=Math.min(1,p.l/25);x.fillStyle=p.c;x.font='1000 24px system-ui';x.textAlign='center';x.fillText(p.txt,p.x,p.y);x.globalAlpha=1})}function drawRope(){if(rope.thrown){x.strokeStyle='#fde68a';x.lineWidth=5;x.beginPath();x.moveTo(cowboy.x,cowboy.y-32);x.lineTo(rope.x,rope.y);x.stroke();x.strokeStyle='#fff7ed';x.lineWidth=6;x.beginPath();x.arc(rope.x,rope.y,rope.r,0,7);x.stroke()}else{x.strokeStyle='#fde68a';x.lineWidth=5;let rx=cowboy.x+Math.cos(cowboy.a)*(55+rope.power*24)+Math.sin(rope.swing)*14,ry=cowboy.y+Math.sin(cowboy.a)*(55+rope.power*24);x.beginPath();x.arc(rx,ry,24+rope.power*24+Math.sin(rope.swing)*4,0,7);x.stroke();x.strokeStyle='rgba(255,255,255,.5)';x.beginPath();x.moveTo(cowboy.x,cowboy.y-30);x.lineTo(cowboy.x+Math.cos(cowboy.a)*220,cowboy.y-30+Math.sin(cowboy.a)*220);x.stroke()}}function drawCowboy(){x.save();x.translate(cowboy.x,cowboy.y);x.fillStyle='#1e293b';x.fillRect(-20,-48,40,54);x.fillStyle='#fed7aa';x.beginPath();x.arc(0,-62,16,0,7);x.fill();x.fillStyle='#78350f';x.fillRect(-34,-78,68,10);x.fillRect(-19,-96,38,19);x.strokeStyle='#fff7ed';x.lineWidth=6;x.beginPath();x.moveTo(0,-32);x.lineTo(Math.cos(cowboy.a)*58,Math.sin(cowboy.a)*58-32);x.stroke();x.restore()}function drawAnimal(o){x.save();x.translate(o.x,o.y);x.scale(o.vx<0?1:-1,1);x.fillStyle=o.type==='cow'?'#f8fafc':o.type==='goat'?'#d6d3d1':o.type==='bull'?'#3f1608':o.type==='gold'?'#fde047':'#facc15';x.beginPath();x.ellipse(0,0,o.r*1.35,o.r*.75,0,0,7);x.fill();if(o.type==='cow'){x.fillStyle='#111827';x.beginPath();x.arc(-6,-4,8,0,7);x.arc(13,5,9,0,7);x.fill()}x.fillStyle='#111827';x.fillRect(-o.r*.5,o.r*.5,7,18);x.fillRect(o.r*.35,o.r*.5,7,18);x.fillStyle=o.type==='bull'?'#111827':o.type==='gold'?'#b45309':'#7c2d12';x.beginPath();x.arc(o.r*1.15,-o.r*.25,o.r*.5,0,7);x.fill();if(o.type==='bull'){x.strokeStyle='#fee2e2';x.lineWidth=4;x.beginPath();x.moveTo(o.r*1.35,-o.r*.58);x.lineTo(o.r*1.75,-o.r*.9);x.moveTo(o.r*1.3,-o.r*.25);x.lineTo(o.r*1.75,-o.r*.2);x.stroke()}x.restore()}function loop(now){let dt=Math.min(.033,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}document.getElementById('start').onclick=reset;addEventListener('keydown',e=>{keys[e.code]=true;if(['ArrowLeft','ArrowRight','Space','ShiftLeft','ShiftRight'].includes(e.code))e.preventDefault()});addEventListener('keyup',e=>{keys[e.code]=false});document.querySelectorAll('[data-k]').forEach(b=>{let k=b.dataset.k;b.onpointerdown=e=>{keys[k]=true;b.classList.add('on');e.preventDefault()};b.onpointerup=b.onpointercancel=()=>{keys[k]=false;b.classList.remove('on')}});function clamp(v,a,b){return Math.max(a,Math.min(b,v))}})();</script></body></html>
