<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Lasso Legends</title><style>*{box-sizing:border-box;user-select:none;-webkit-user-select:none;touch-action:none}html,body{margin:0;height:100%;overflow:hidden;background:#3b1d0b;color:#fff;font-family:system-ui,-apple-system,Segoe UI,sans-serif}canvas{width:100vw;height:100vh;display:block;background:#a16207}.hud{position:fixed;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;gap:8px;z-index:5;pointer-events:none}.pill{background:rgba(41,18,5,.72);border:1px solid rgba(255,255,255,.22);border-radius:14px;padding:8px 10px;font-weight:1000;box-shadow:0 8px 22px rgba(0,0,0,.25)}.overlay{position:fixed;inset:0;display:grid;place-items:center;background:rgba(35,15,5,.82);z-index:10;padding:20px;text-align:center}.card{width:min(92vw,560px);background:linear-gradient(180deg,#7c2d12,#431407);border:2px solid #fed7aa;border-radius:26px;padding:24px;box-shadow:0 24px 80px rgba(0,0,0,.55)}h1{font-size:clamp(42px,11vw,72px);line-height:.85;margin:0 0 12px;color:#fde68a;text-shadow:0 4px 0 rgba(0,0,0,.35)}p{color:#ffedd5;font-weight:750;line-height:1.4}.btn{border:0;border-radius:999px;background:linear-gradient(135deg,#fde047,#fb923c);color:#431407;font-weight:1000;padding:14px 22px;font-size:18px;margin-top:14px}.controls{position:fixed;bottom:16px;left:0;right:0;display:flex;justify-content:space-between;padding:0 20px;z-index:6;pointer-events:none}.pad{display:flex;gap:10px;pointer-events:auto}.cbtn{width:72px;height:64px;border-radius:18px;border:2px solid rgba(255,255,255,.32);background:rgba(67,20,7,.72);color:#fff;font-weight:1000;font-size:16px;box-shadow:0 7px 0 rgba(0,0,0,.28)}.cbtn.on{transform:scale(.93);background:rgba(251,146,60,.7)}a{position:fixed;left:50%;bottom:8px;transform:translateX(-50%);z-index:7;color:#ffedd5;text-decoration:none;font-size:12px;font-weight:900;background:rgba(0,0,0,.25);padding:6px 10px;border-radius:999px}@media(pointer:fine){.controls{opacity:.8}}</style></head><body><canvas id="c"></canvas><div class="hud"><div class="pill" id="score">Score 0</div><div class="pill" id="time">60</div><div class="pill" id="streak">Streak 0</div></div><div class="controls"><div class="pad"><button class="cbtn" data-k="ArrowLeft">◀</button><button class="cbtn" data-k="ArrowRight">▶</button></div><div class="pad"><button class="cbtn" data-k="Space">THROW</button><button class="cbtn" data-k="ShiftLeft">REEL</button></div></div><a href="index.html">← K2 HUB</a><div class="overlay" id="overlay"><div class="card"><h1>Lasso Legends</h1><p>Swing your rope, aim the loop, and release at the perfect moment to catch runaway cows, goats, and speedy critters. Streaks multiply your score.</p><button class="btn" id="start">START ROPING</button></div></div><script>(()=>{const c=document.getElementById('c'),x=c.getContext('2d');let W,H,D=1;function rs(){D=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0)}addEventListener('resize',rs);rs();const keys={},ui={score:gid('score'),time:gid('time'),streak:gid('streak'),overlay:gid('overlay')};function gid(id){return document.getElementById(id)}let run=false,last=0,t=60,score=0,streak=0,spawn=0,animals=[],fx=[],cowboy={x:W/2,y:H*.76,a:-Math.PI/2},rope={swing:0,thrown:false,x:0,y:0,r:20,vx:0,vy:0,life:0};function rnd(a,b){return a+Math.random()*(b-a)}function reset(){run=true;t=60;score=0;streak=0;spawn=0;animals=[];fx=[];rope.thrown=false;cowboy.x=W/2;cowboy.y=H*.76;ui.overlay.style.display='none';last=performance.now();requestAnimationFrame(loop)}function animal(){let type=Math.random()<.46?'cow':Math.random()<.72?'goat':'calf',sp=type==='cow'?rnd(70,110):type==='goat'?rnd(120,170):rnd(160,220);let side=Math.random()<.5?-1:1;return{x:side<0?-50:W+50,y:rnd(H*.22,H*.62),vx:-side*sp,vy:rnd(-28,28),type,r:type==='cow'?28:type==='goat'?20:16,wob:rnd(0,7)}}function pop(px,py,n){for(let i=0;i<n;i++)fx.push({x:px,y:py,vx:rnd(-4,4),vy:rnd(-5,2),l:rnd(18,44),c:['#fde047','#fb923c','#fff7ed'][i%3]})}function throwRope(){if(rope.thrown)return;rope.thrown=true;rope.x=cowboy.x;rope.y=cowboy.y;rope.r=24;rope.vx=Math.cos(cowboy.a)*520;rope.vy=Math.sin(cowboy.a)*520;rope.life=1.05}function update(dt){if(!run)return;t-=dt;if(t<=0){end();return}spawn-=dt;if(spawn<=0){animals.push(animal());spawn=rnd(.45,1.0)}let aim=(keys.ArrowRight?1:0)-(keys.ArrowLeft?1:0);cowboy.a+=aim*dt*3.2;cowboy.a=Math.max(-Math.PI+.25,Math.min(-.15,cowboy.a));rope.swing+=dt*8;if(keys.Space)throwRope();animals.forEach(o=>{o.x+=o.vx*dt;o.y+=Math.sin(performance.now()*.003+o.wob)*30*dt+o.vy*dt;if(o.y<H*.18||o.y>H*.66)o.vy*=-1});animals=animals.filter(o=>o.x>-90&&o.x<W+90);if(rope.thrown){rope.x+=rope.vx*dt;rope.y+=rope.vy*dt;rope.vx*=.992;rope.vy*=.992;rope.life-=dt;rope.r+=45*dt;if(keys.ShiftLeft||keys.ShiftRight){rope.vx+=(cowboy.x-rope.x)*dt*4;rope.vy+=(cowboy.y-rope.y)*dt*4}for(let i=animals.length-1;i>=0;i--){let o=animals[i],d=Math.hypot(o.x-rope.x,o.y-rope.y);if(d<rope.r+o.r){streak++;let pts=(o.type==='cow'?220:o.type==='goat'?310:420)*Math.min(5,1+streak*.15);score+=Math.floor(pts);pop(o.x,o.y,28);animals.splice(i,1);rope.thrown=false;break}}if(rope.life<=0||rope.x<-80||rope.x>W+80||rope.y<0||rope.y>H+80){rope.thrown=false;streak=0}}fx.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.l--});fx=fx.filter(p=>p.l>0);ui.score.textContent='Score '+Math.floor(score);ui.time.textContent=Math.ceil(t);ui.streak.textContent='Streak '+streak}function end(){run=false;ui.overlay.style.display='grid';ui.overlay.querySelector('h1').textContent='Final Score '+Math.floor(score);ui.overlay.querySelector('p').textContent='Best streak: '+streak+'. The arena is dusty, the rope is tired, and somebody owes the goat an apology.';ui.overlay.querySelector('.btn').textContent='PLAY AGAIN'}function draw(){x.clearRect(0,0,W,H);x.fillStyle='#b45309';x.fillRect(0,0,W,H);x.fillStyle='rgba(255,237,213,.18)';for(let i=0;i<16;i++){x.beginPath();x.arc((i*97+performance.now()*.02)%W,H*.18+(i%6)*80,3,0,7);x.fill()}x.fillStyle='#92400e';x.fillRect(0,H*.70,W,H*.30);x.strokeStyle='rgba(255,255,255,.22)';x.lineWidth=4;x.strokeRect(26,H*.15,W-52,H*.56);animals.forEach(drawAnimal);drawCowboy();if(rope.thrown){x.strokeStyle='#fde68a';x.lineWidth=5;x.beginPath();x.moveTo(cowboy.x,cowboy.y-30);x.lineTo(rope.x,rope.y);x.stroke();x.strokeStyle='#fff7ed';x.lineWidth=6;x.beginPath();x.arc(rope.x,rope.y,rope.r,0,7);x.stroke()}else{x.strokeStyle='#fde68a';x.lineWidth=5;let rx=cowboy.x+Math.cos(cowboy.a)*55+Math.sin(rope.swing)*14,ry=cowboy.y+Math.sin(cowboy.a)*55;x.beginPath();x.arc(rx,ry,24+Math.sin(rope.swing)*4,0,7);x.stroke()}fx.forEach(p=>{x.fillStyle=p.c;x.fillRect(p.x,p.y,5,5)})}function drawCowboy(){x.save();x.translate(cowboy.x,cowboy.y);x.fillStyle='#1e293b';x.fillRect(-18,-44,36,50);x.fillStyle='#fed7aa';x.beginPath();x.arc(0,-58,15,0,7);x.fill();x.fillStyle='#78350f';x.fillRect(-32,-74,64,10);x.fillRect(-18,-90,36,18);x.strokeStyle='#fff7ed';x.lineWidth=6;x.beginPath();x.moveTo(0,-30);x.lineTo(Math.cos(cowboy.a)*56,Math.sin(cowboy.a)*56-30);x.stroke();x.restore()}function drawAnimal(o){x.save();x.translate(o.x,o.y);x.scale(o.vx<0?1:-1,1);x.fillStyle=o.type==='cow'?'#f8fafc':o.type==='goat'?'#d6d3d1':'#facc15';x.beginPath();x.ellipse(0,0,o.r*1.35,o.r*.75,0,0,7);x.fill();x.fillStyle='#111827';x.fillRect(-o.r*.4,o.r*.5,7,18);x.fillRect(o.r*.3,o.r*.5,7,18);x.fillStyle=o.type==='cow'?'#111827':'#7c2d12';x.beginPath();x.arc(o.r*1.15,-o.r*.25,o.r*.48,0,7);x.fill();x.restore()}function loop(now){let dt=Math.min(.033,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}document.getElementById('start').onclick=reset;addEventListener('keydown',e=>{keys[e.code]=true;keys[e.key]=true;if(['ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault()});addEventListener('keyup',e=>{keys[e.code]=false;keys[e.key]=false});document.querySelectorAll('[data-k]').forEach(b=>{let k=b.dataset.k;b.onpointerdown=e=>{keys[k]=true;b.classList.add('on');e.preventDefault()};b.onpointerup=b.onpointercancel=()=>{keys[k]=false;b.classList.remove('on')}});})();</script></body></html>
