<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Station 19: Forest Fire - K2 games</title>
    <style>
        :root { --fire: #ef4444; --water: #3b82f6; --truck: #dc2626; --grass: #166534; --sky: #7dd3fc; --panel: #ffffff; --text: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: none; }
        body { background-color: #f1f5f9; color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: row; overflow: hidden; }
        #sidebar { width: 280px; background: var(--panel); padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; box-shadow: 10px 0 30px rgba(0,0,0,0.05); z-index: 50; }
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--fire); letter-spacing: -1px; }
        .stat-card { background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid #f1f5f9; }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; color: #64748b; font-weight: 800; }
        .stat-val { font-size: 1.4rem; font-weight: 900; color: var(--fire); }
        #game-view { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; padding: 20px; }
        #canvas-container { position: relative; background: #000; border-radius: 20px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.2); width: 1000px; height: 600px; max-width: 100%; max-height: 100%; }
        canvas { display: block; width: 100%; height: 100%; }
        #mobile-btns { position: absolute; bottom: 20px; right: 20px; display: none; gap: 15px; }
        .m-btn { width: 80px; height: 80px; background: rgba(255,255,255,0.2); border: 3px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; backdrop-filter: blur(10px); }
        @media (max-width: 900px) { body { flex-direction: column; } #sidebar { width: 100%; height: auto; flex-direction: row; padding: 10px; flex-wrap: wrap; } #mobile-btns { display: flex; } }
        #overlay { position: absolute; inset: 0; background: rgba(15,23,42,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; text-align: center; }
        .btn-main { background: var(--fire); color: white; border: none; padding: 15px 50px; border-radius: 50px; font-weight: 800; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>
    <aside id="sidebar">
        <div class="logo">STATION 19</div>
        <div class="stat-card"><div class="stat-label">Forest Loss</div><div id="loss-val" class="stat-val">0%</div></div>
        <div class="stat-card"><div class="stat-label">Water Supply</div><div id="water-val" class="stat-val">100%</div></div>
        <div style="margin-top:auto; font-size:0.75rem; opacity:0.6; line-height:1.5;"><b>CONTROLS:</b><br>Arrows to Drive<br>SPACE to spray water</div>
    </aside>
    <main id="game-view">
        <div id="canvas-container">
            <canvas id="gameCanvas" width="1000" height="600"></canvas>
            <div id="overlay">
                <h1 style="font-size:4rem; margin-bottom:10px;">FOREST FIRE</h1>
                <p style="margin-bottom:20px; opacity:0.8;">Extinguish the blaze before the woods are lost.</p>
                <button class="btn-main" onclick="game.start()">ENGAGE UNIT</button>
            </div>
            <div id="mobile-btns">
                <div class="m-btn" id="m-left">◀</div><div class="m-btn" id="m-right">▶</div><div class="m-btn" id="m-water" style="background:var(--water)">💧</div>
            </div>
        </div>
    </main>
    <script>
        class Station19 {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.trees = []; this.water = []; this.truck = { x: 500, vx: 0 };
                this.playing = false; this.keys = {}; this.supply = 100;
                this.setupInputs();
                requestAnimationFrame(() => this.loop());
            }
            setupInputs() {
                window.onkeydown = (e) => this.keys[e.code] = true;
                window.onkeyup = (e) => this.keys[e.code] = false;
                const bind = (id, k) => { const el = document.getElementById(id); el.ontouchstart = (e) => { e.preventDefault(); this.keys[k]=true; }; el.ontouchend = () => this.keys[k]=false; };
                bind('m-left', 'ArrowLeft'); bind('m-right', 'ArrowRight'); bind('m-water', 'Space');
            }
            start() {
                this.trees = []; this.water = []; this.supply = 100; this.truck.x = 500;
                for(let i=0; i<60; i++) this.trees.push({ x: Math.random()*900+50, y: 150+Math.random()*300, burn: 0, dead: false, h: 100 });
                this.playing = true; document.getElementById('overlay').style.display = 'none';
            }
            update() {
                if(!this.playing) return;
                if(this.keys['ArrowLeft']) this.truck.vx -= 0.8; if(this.keys['ArrowRight']) this.truck.vx += 0.8;
                this.truck.x += this.truck.vx; this.truck.vx *= 0.9;
                this.truck.x = Math.max(50, Math.min(950, this.truck.x));

                if(this.keys['Space'] && this.supply > 0) {
                    this.supply -= 0.2;
                    for(let i=0; i<3; i++) this.water.push({ x: this.truck.x, y: 540, vx: (Math.random()-0.5)*6, vy: -15-Math.random()*5, life: 1 });
                } else this.supply = Math.min(100, this.supply + 0.05);

                if(Math.random() < 0.015) {
                    const healthy = this.trees.filter(t => t.burn === 0 && !t.dead);
                    if(healthy.length > 0) healthy[Math.floor(Math.random()*healthy.length)].burn = 1;
                }

                this.trees.forEach(t => {
                    if(t.burn > 0) {
                        t.h -= 0.15; if(t.h <= 0) { t.burn = 0; t.dead = true; }
                        if(Math.random() < 0.005) {
                            const neighbors = this.trees.filter(n => n.burn===0 && !n.dead && Math.hypot(t.x-n.x, t.y-n.y)<80);
                            if(neighbors.length > 0) neighbors[Math.floor(Math.random()*neighbors.length)].burn = 1;
                        }
                    }
                });

                this.water.forEach((w, i) => {
                    w.x += w.vx; w.y += w.vy; w.vy += 0.5; w.life -= 0.02;
                    this.trees.forEach(t => { if(t.burn > 0 && Math.hypot(w.x-t.x, w.y-t.y) < 40) { t.h = Math.min(100, t.h + 5); if(t.h >= 100) t.burn = 0; w.life = 0; }});
                    if(w.life <= 0) this.water.splice(i, 1);
                });

                const loss = (this.trees.filter(t => t.dead).length / this.trees.length) * 100;
                document.getElementById('loss-val').textContent = Math.floor(loss) + '%';
                document.getElementById('water-val').textContent = Math.floor(this.supply) + '%';
                if(loss >= 50) { this.playing = false; document.getElementById('overlay').style.display='flex'; document.querySelector('h1').textContent = "FOREST LOST"; }
            }
            draw() {
                const ctx = this.ctx; ctx.clearRect(0,0,1000,600);
                ctx.fillStyle = '#7dd3fc'; ctx.fillRect(0,0,1000,600);
                ctx.fillStyle = '#166534'; ctx.fillRect(0,450,1000,150);
                this.trees.forEach(t => {
                    ctx.save(); ctx.translate(t.x, t.y);
                    ctx.fillStyle = '#451a03'; ctx.fillRect(-3, 0, 6, 15);
                    ctx.fillStyle = t.dead ? '#1e293b' : (t.burn > 0 ? '#ef4444' : '#22c55e');
                    if(t.burn > 0 && Math.random()>0.5) ctx.fillStyle='#f97316';
                    ctx.beginPath(); ctx.moveTo(0,-35); ctx.lineTo(20,5); ctx.lineTo(-20,5); ctx.fill();
                    if(t.burn > 0) { ctx.font='20px Arial'; ctx.fillText('🔥',-10,-15); }
                    ctx.restore();
                });
                ctx.fillStyle = '#3b82f6'; this.water.forEach(w => { ctx.globalAlpha=w.life; ctx.beginPath(); ctx.arc(w.x, w.y, 5*w.life, 0, Math.PI*2); ctx.fill(); });
                ctx.globalAlpha = 1; ctx.save(); ctx.translate(this.truck.x, 540); ctx.fillStyle='#dc2626'; ctx.fillRect(-40,-20,80,35);
                ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-25,15,10,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(25,15,10,0,Math.PI*2); ctx.fill();
                ctx.fillStyle='#fff'; ctx.fillRect(20,-15,15,15); ctx.restore();
            }
            loop() { this.update(); this.draw(); requestAnimationFrame(() => this.loop()); }
        }
        const game = new Station19();
    </script>
</body>
</html>
