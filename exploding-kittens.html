<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exploding Kittens: Digital - K2 games</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --card-front: #ffffff;
            --card-back: #e74c3c;
            --accent: #f1c40f;
            --text: #333333;
            --panel: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* Game Layout */
        #game-board {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 10px;
            background: radial-gradient(circle, #2c3e50, #000000);
        }

        /* Opponents Area */
        #opponents {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .ai-player {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding: 10px;
            background: var(--panel);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
            min-width: 100px;
        }
        .ai-player.active { border-color: var(--accent); box-shadow: 0 0 20px var(--accent); }

        /* Center Deck Area */
        #center {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        .deck, .discard {
            width: 100px;
            height: 140px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            font-size: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .deck { background: var(--card-back); border: 4px solid white; color: white; }
        .deck:hover { transform: translateY(-5px); }
        .discard { background: rgba(255,255,255,0.1); border: 2px dashed rgba(255,255,255,0.3); color: rgba(255,255,255,0.3); }

        /* Player Hand Area */
        #player-hand-container {
            display: flex;
            justify-content: center;
            height: 180px;
            padding-bottom: 10px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        #player-hand {
            display: flex;
            justify-content: center;
            width: fit-content;
            padding: 0 40px;
        }

        .card {
            width: 110px;
            height: 155px;
            background: white;
            border-radius: 10px;
            margin-left: -40px;
            padding: 10px;
            color: var(--text);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            border: 1px solid #ddd;
            flex-shrink: 0;
        }
        .card:first-child { margin-left: 0; }
        .card:hover { transform: translateY(-30px) scale(1.1); z-index: 100 !important; margin-right: 40px; }
        .card.selected { border: 4px solid var(--accent); transform: translateY(-40px); }

        .card-emoji { font-size: 2rem; text-align: center; margin: 5px 0; }
        .card-title { font-weight: 800; font-size: 0.8rem; text-align: center; text-transform: uppercase; }
        .card-desc { font-size: 0.6rem; color: #666; line-height: 1.2; margin-top: auto; }

        /* Turn Log */
        #log {
            position: fixed; top: 70px; right: 10px; width: 200px; max-height: 200px;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            padding: 10px; border-radius: 12px; font-size: 0.7rem; overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 50;
        }
        .log-entry { margin-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 4px; }

        .back-link {
            position: fixed; top: 10px; left: 10px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 8px; z-index: 1100;
        }

        /* Overlay */
        #setup-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
            backdrop-filter: blur(10px);
        }
        .setup-box { background: #222; padding: 30px; border-radius: 24px; border: 2px solid var(--accent); text-align: center; width: 90%; max-width: 400px; }

        .btn {
            background: var(--accent); color: black; border: none; padding: 12px 30px;
            border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.1rem;
            margin-top: 20px; transition: 0.2s;
        }
        .btn:hover { transform: scale(1.05); }

        @media (max-width: 600px) {
            #log { display: none; }
            .ai-player { min-width: 80px; padding: 5px; }
            .card { width: 90px; height: 130px; margin-left: -30px; }
            .card-title { font-size: 0.7rem; }
            #player-hand-container { height: 150px; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← HUB</a>

    <div id="game-board">
        <div id="opponents"></div>

        <div id="center">
            <div class="deck" id="main-deck">DECK</div>
            <div class="discard" id="discard-pile">DISCARD</div>
        </div>

        <div id="player-hand-container">
            <div id="player-hand"></div>
        </div>
    </div>

    <div id="log"></div>

    <div id="setup-overlay">
        <div class="setup-box">
            <h1 style="font-size: 2.5rem; color: var(--accent); margin-bottom: 1rem; font-weight: 900;">KITTENS</h1>
            <p style="margin-bottom: 1rem; opacity: 0.8;">Don't explode. Use defuses wisely.</p>
            <button class="btn" onclick="startGame()">START GAME</button>
        </div>
    </div>

    <script>
        const CARD_TYPES = [
            { type: 'Exploding Kitten', emoji: '💥', count: 4, desc: 'Avoid drawing this!' },
            { type: 'Defuse', emoji: '💚', count: 6, desc: 'Prevents explosion.' },
            { type: 'Attack', emoji: '⚔️', count: 4, desc: 'Next player takes 2 turns.' },
            { type: 'Skip', emoji: '🏃', count: 4, desc: 'End turn without drawing.' },
            { type: 'Shuffle', emoji: '🌀', count: 4, desc: 'Shuffle the deck.' },
            { type: 'See Future', emoji: '🔮', count: 5, desc: 'Peek at the top 3 cards.' },
            { type: 'Taco Cat', emoji: '🌮', count: 4, desc: 'Steal from a player.' }
        ];

        class Game {
            constructor() {
                this.deck = [];
                this.discard = [];
                this.players = [
                    { id: 'player', name: 'You', hand: [], isAI: false },
                    { id: 'ai1', name: 'Whiskers', hand: [], isAI: true },
                    { id: 'ai2', name: 'Catbot', hand: [], isAI: true }
                ];
                this.currentPlayerIdx = 0;
                this.turnsLeft = 1;
                this.isGameOver = false;

                this.init();
                this.setupGamepad();
            }

            init() {
                this.buildDeck();
                this.dealHands();
                this.insertKittens();
                this.render();
                this.log("Game started!");
            }

            buildDeck() {
                CARD_TYPES.forEach(ct => {
                    if(ct.type !== 'Exploding Kitten' && ct.type !== 'Defuse') {
                        for(let i=0; i<ct.count; i++) this.deck.push({...ct});
                    }
                });
                this.shuffle(this.deck);
            }

            dealHands() {
                this.players.forEach(p => {
                    p.hand.push({ type: 'Defuse', emoji: '💚', desc: 'Prevents explosion.' });
                    for(let i=0; i<4; i++) p.hand.push(this.deck.pop());
                });
            }

            setupGamepad() {
                let cursor = 0;
                let lastP = 0;
                const poll = () => {
                    const pads = navigator.getGamepads();
                    if (pads[0] && this.currentPlayerIdx === 0 && !this.isGameOver) {
                        const p = pads[0]; const now = Date.now();
                        const cards = document.querySelectorAll('#player-hand .card');
                        cards.forEach(c => c.classList.remove('selected'));
                        if (cards[cursor]) cards[cursor].classList.add('selected');

                        if (now - lastP > 200) {
                            const b = p.buttons;
                            if (b[14].pressed || p.axes[0] < -0.5) cursor = Math.max(0, cursor - 1);
                            if (b[15].pressed || p.axes[0] > 0.5) cursor = Math.min(this.players[0].hand.length - 1, cursor + 1);
                            if (b[0].pressed && cards[cursor]) cards[cursor].click();
                            if (b[3].pressed || b[7].pressed) document.getElementById('main-deck').click();
                            lastP = now;
                        }
                    }
                    requestAnimationFrame(poll);
                };
                poll();
            }

            insertKittens() {
                for(let i=0; i<this.players.length-1; i++) {
                    this.deck.push({ type: 'Exploding Kitten', emoji: '💥', desc: 'YOU EXPLODE!' });
                }
                this.shuffle(this.deck);
            }

            shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
            }

            log(msg) {
                const logEl = document.getElementById('log');
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.textContent = `> ${msg}`;
                logEl.prepend(entry);
            }

            render() {
                const opps = document.getElementById('opponents');
                opps.innerHTML = '';
                this.players.forEach((p, i) => {
                    if(p.id !== 'player') {
                        const div = document.createElement('div');
                        div.className = `ai-player ${this.currentPlayerIdx === i ? 'active' : ''}`;
                        div.innerHTML = `
                            <div style="font-size: 1.5rem;">🐱</div>
                            <div style="font-weight: bold; font-size: 0.8rem;">${p.name}</div>
                            <div style="font-size: 0.7rem; opacity: 0.6;">${p.hand.length} Cards</div>
                        `;
                        opps.appendChild(div);
                    }
                });

                const handEl = document.getElementById('player-hand');
                handEl.innerHTML = '';
                this.players[0].hand.forEach((card, i) => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.style.zIndex = i;
                    div.innerHTML = `
                        <div class="card-title">${card.type}</div>
                        <div class="card-emoji">${card.emoji}</div>
                        <div class="card-desc">${card.desc}</div>
                    `;
                    div.onclick = () => this.playCard(0, i);
                    handEl.appendChild(div);
                });

                document.getElementById('main-deck').textContent = `${this.deck.length} CARDS`;
                document.getElementById('main-deck').onclick = () => {
                    if(this.currentPlayerIdx === 0) this.drawCard(0);
                };

                if(this.discard.length > 0) {
                    const top = this.discard[this.discard.length-1];
                    document.getElementById('discard-pile').innerHTML = `
                        <div style="font-size: 2rem;">${top.emoji}</div>
                    `;
                }
            }

            drawCard(pIdx) {
                const p = this.players[pIdx];
                const card = this.deck.pop();
                this.log(`${p.name} drew a card.`);

                if(card.type === 'Exploding Kitten') {
                    const defuseIdx = p.hand.findIndex(c => c.type === 'Defuse');
                    if(defuseIdx > -1) {
                        p.hand.splice(defuseIdx, 1);
                        this.log(`💥 ${p.name} defused!`);
                        this.deck.push(card);
                        this.shuffle(this.deck);
                    } else {
                        this.log(`💀 BOOM! ${p.name} exploded!`);
                        this.isGameOver = true;
                        alert(pIdx === 0 ? "GAME OVER!" : `${p.name} exploded! YOU WIN!`);
                        location.reload();
                        return;
                    }
                } else {
                    p.hand.push(card);
                }

                this.turnsLeft--;
                if(this.turnsLeft <= 0) {
                    this.currentPlayerIdx = (this.currentPlayerIdx + 1) % this.players.length;
                    this.turnsLeft = 1;
                }
                this.render();
                
                if(this.players[this.currentPlayerIdx].isAI) {
                    setTimeout(() => this.aiTurn(), 1000);
                }
            }

            playCard(pIdx, cIdx) {
                if(this.currentPlayerIdx !== pIdx) return;
                const p = this.players[pIdx];
                const card = p.hand.splice(cIdx, 1)[0];
                this.discard.push(card);
                this.log(`${p.name} played ${card.type}.`);

                switch(card.type) {
                    case 'Skip': this.turnsLeft = 0; break;
                    case 'Attack': 
                        this.turnsLeft = 0; 
                        this.currentPlayerIdx = (this.currentPlayerIdx + 1) % this.players.length;
                        this.turnsLeft = 2; 
                        break;
                    case 'Shuffle': this.shuffle(this.deck); break;
                    case 'See Future':
                        if(pIdx === 0) {
                            const top = this.deck.slice(-3).map(c => c.type).join(', ');
                            alert(`Top 3: ${top}`);
                        }
                        break;
                }

                if(this.turnsLeft <= 0) {
                    this.currentPlayerIdx = (this.currentPlayerIdx + 1) % this.players.length;
                    this.turnsLeft = 1;
                }

                this.render();
                if(this.players[this.currentPlayerIdx].isAI) {
                    setTimeout(() => this.aiTurn(), 1000);
                }
            }

            aiTurn() {
                const p = this.players[this.currentPlayerIdx];
                if(p.hand.length > 1 && Math.random() > 0.5) {
                    const idx = Math.floor(Math.random() * p.hand.length);
                    if(p.hand[idx].type !== 'Defuse') {
                        this.playCard(this.currentPlayerIdx, idx);
                        return;
                    }
                }
                this.drawCard(this.currentPlayerIdx);
            }
        }

        let game;
        function startGame() {
            document.getElementById('setup-overlay').style.display = 'none';
            game = new Game();
        }
    </script>
</body>
</html>
