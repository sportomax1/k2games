    <style>
        :root {
            --primary: #6366f1;
            --accent: #f59e0b;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1rem;
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0, transparent 50%);
        }

        .container { max-width: 1400px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 3rem; }
        h1 { font-size: 3.5rem; font-weight: 900; background: linear-gradient(to right, #818cf8, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: var(--muted); margin-top: 0.5rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }

        .controls { max-width: 800px; margin: 2rem auto; display: flex; gap: 1rem; flex-wrap: wrap; }
        #search { flex: 1; min-width: 200px; padding: 1rem; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: white; outline: none; }
        #sort { padding: 1rem; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: white; cursor: pointer; }
        #random-btn {
            padding: 1rem 2rem; border-radius: 12px; border: none;
            background: linear-gradient(135deg, var(--accent), #d97706);
            color: white; font-weight: 700; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; gap: 0.5rem;
        }
        #random-btn:hover { transform: scale(1.05); filter: brightness(1.1); box-shadow: 0 0 20px rgba(245, 158, 11, 0.4); }

        #launcher {
            position: fixed; top: -100%; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }
        #launcher.active { top: 0; }
        .launcher-content { text-align: center; }
        .launcher-icon { font-size: 8rem; margin-bottom: 2rem; animation: bounce 1s infinite; }
        .launcher-title { font-size: 2.5rem; font-weight: 900; color: var(--accent); }
        .launcher-sub { color: var(--muted); margin-top: 1rem; font-size: 1.2rem; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }

        .card {
            position: relative;
            background: var(--surface); border-radius: 16px; padding: 1.5rem;
            text-decoration: none; color: inherit; border: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; text-align: center;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); background: #2d3748; }
        .game-idx { position: absolute; top: 10px; left: 10px; font-size: 0.6rem; opacity: 0.3; }
        .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
        .title { font-size: 0.85rem; font-weight: 700; text-transform: capitalize; }
        .date { font-size: 0.6rem; color: var(--muted); margin-top: 0.5rem; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .card { flex-direction: row; text-align: left; padding: 1rem; gap: 1rem; }
            .icon { margin-bottom: 0; font-size: 1.5rem; }
        }

        footer { margin-top: 4rem; padding: 2rem; border-top: 1px solid var(--border); text-align: center; color: var(--muted); font-size: 0.8rem; }
        .disclaimer { max-width: 600px; margin: 1rem auto; line-height: 1.6; opacity: 0.7; }
    </style>
</head>

        const search = document.getElementById('search');
        const sort = document.getElementById('sort');
        const grid = document.getElementById('grid');
        const count = document.getElementById('count');

        function render() {
            const query = search.value.toLowerCase();
            const mode = sort.value;

            let filtered = games.filter(g => g.t.toLowerCase().includes(query));

            filtered.sort((a, b) => {
                if (mode === 'alpha') return a.t.localeCompare(b.t);
                if (mode === 'updated') return new Date(b.u) - new Date(a.u);
                if (mode === 'newest') return new Date(b.c) - new Date(a.c);
                return 0;
            });

            grid.innerHTML = filtered.map((g, idx) => `
                <a href="${g.f}" class="card">
                    <div class="game-idx">${idx + 1}</div>
                    <div class="icon">${g.i}</div>
                    <div class="title">${g.t}</div>
                    <div class="date">${new Date(g.u).toLocaleDateString()}</div>
                </a>
            `).join('');
            
            count.textContent = filtered.length;
        }

        search.addEventListener('input', render);
        sort.addEventListener('change', render);
        render();

        // Random Launcher
        const randomBtn = document.getElementById('random-btn');
        const launcher = document.getElementById('launcher');
        const lIcon = document.getElementById('l-icon');
        const lTitle = document.getElementById('l-title');

        randomBtn.addEventListener('click', () => {
            const game = games[Math.floor(Math.random() * games.length)];
            
            // Start Animation
            launcher.classList.add('active');
            
            // Spin through some icons
            let count = 0;
            const icons = ['🚀', '🎲', '👾', '🕹️', '🎨', '🧩', '⚔️', '🏎️'];
            const interval = setInterval(() => {
                lIcon.textContent = icons[count % icons.length];
                count++;
            }, 100);

            setTimeout(() => {
                clearInterval(interval);
                lIcon.textContent = game.i;
                lTitle.textContent = game.t;
                
                setTimeout(() => {
                    window.location.href = game.f;
                }, 1000);
            }, 1500);
        });
    </script>
