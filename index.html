<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K2 Games: The Vault</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="K2 Games">
<link rel="manifest" href="./manifest.json?v=20260611-dates">
<link rel="apple-touch-icon" href="./football-mobile.png?v=20260611-dates">
<style>
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#263449;--primary:#38bdf8;--accent:#8b5cf6;--text:#f8fafc;--muted:#94a3b8;--border:rgba(255,255,255,.1);--warn:#fbbf24;--good:#86efac;--bad:#fca5a5}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top left,rgba(56,189,248,.16),transparent 34%),radial-gradient(circle at top right,rgba(139,92,246,.14),transparent 32%),var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:2rem}.container{max-width:1200px;margin:0 auto}header{text-align:center;padding:2rem 0 1rem}h1{font-size:clamp(2.8rem,8vw,5.5rem);margin:0;letter-spacing:-.08em;font-weight:950;background:linear-gradient(135deg,#fff,var(--primary),var(--accent));-webkit-background-clip:text;color:transparent}.subtitle{color:var(--muted);margin-top:.5rem;text-transform:uppercase;letter-spacing:2px;font-weight:700}.controls{max-width:950px;margin:2rem auto 1rem;display:flex;gap:1rem;flex-wrap:wrap;align-items:center}#search,#sort,#filter,#app-filter{padding:1rem;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:white;outline:none}#search{flex:2;min-width:220px}#sort,#filter,#app-filter{flex:1;min-width:150px;background:var(--surface);cursor:pointer}#random-btn{padding:1rem 1.25rem;border-radius:14px;border:0;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-weight:950;cursor:pointer;box-shadow:0 12px 30px rgba(56,189,248,.18)}.status{max-width:950px;margin:0 auto 1.5rem;padding:.75rem 1rem;border-radius:12px;border:1px solid var(--border);font-size:.9rem;text-align:center;background:rgba(255,255,255,.05);color:var(--muted)}.loading{color:#fde68a;border-color:rgba(245,158,11,.5)}.ready{color:var(--good);border-color:rgba(34,197,94,.5)}.offline{color:var(--bad);border-color:rgba(239,68,68,.5)}.count-row{max-width:950px;margin:0 auto 1rem;color:var(--muted);font-size:.92rem}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:1rem}.card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:1.25rem 1rem;text-align:center;text-decoration:none;color:inherit;min-height:164px;display:flex;flex-direction:column;justify-content:center;overflow:hidden;transition:transform .18s,border-color .18s,background .18s}.card:hover{transform:translateY(-5px);border-color:var(--primary);background:var(--surface2)}.idx{position:absolute;top:10px;left:10px;font-size:.65rem;opacity:.38;font-weight:800}.fav{position:absolute;top:9px;right:9px;width:31px;height:31px;border-radius:999px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;background:rgba(15,23,42,.88);font-size:.9rem;cursor:pointer;user-select:none}.fav.active{border-color:#fb7185;box-shadow:0 0 0 2px rgba(244,63,94,.28)}.icon{font-size:2.55rem;margin-bottom:.75rem}.title{font-size:.9rem;font-weight:800;text-transform:capitalize;line-height:1.2}.date{font-size:.68rem;color:var(--muted);margin-top:.65rem}.badge{position:absolute;bottom:9px;right:9px;font-size:.62rem;color:var(--primary);opacity:.75;font-weight:900}footer{margin-top:4rem;padding:2rem;border-top:1px solid var(--border);text-align:center;color:var(--muted);font-size:.85rem}@media(max-width:640px){body{padding:1rem}.controls{gap:.65rem}#search,#sort,#filter,#app-filter,#random-btn{width:100%;flex:none}.grid{grid-template-columns:1fr}.card{min-height:96px;flex-direction:row;text-align:left;justify-content:flex-start;align-items:center;padding:1rem 3rem 1rem 1rem;gap:1rem}.icon{margin-bottom:0;font-size:1.8rem}.date{margin-top:.35rem}}
</style>
</head>
<body>
<div class="container">
<header><h1>K2 Games</h1><div class="subtitle">The Vault</div></header>
<div class="controls">
<input id="search" type="search" placeholder="Search games...">
<select id="sort"><option value="recent">Sort Recent</option><option value="name">Sort A-Z</option><option value="oldest">Sort Oldest</option></select>
<select id="filter"><option value="all">All Titles</option><option value="favorites">Favorites</option><option value="classics">Classics</option><option value="originals">Originals</option></select>
<select id="app-filter"><option value="all">All App Icons</option></select>
<button id="random-btn">🎲 Random Game</button>
</div>
<p id="status" class="status loading">Loading game vault and GitHub file dates...</p>
<div class="count-row"><span id="count">0</span> games loaded</div>
<main id="grid" class="grid"></main>
<footer>Each game stays in its own HTML file. Created/updated dates come from GitHub file history when available.</footer>
</div>
<script>
const OWNER='sportomax1', REPO='k2games', DEFAULT_BRANCH='main';
const EXTRA_GAMES=['avalanche-rider.html'];
const DATE_CACHE_KEY='k2-file-date-cache-v2';
const FAV_KEY='k2-favorites';
const CLASSICS=new Set(['2048.html','backgammon.html','blackjack.html','checkers.html','chess.html','connect-6.html','craps.html','crossword.html','darts.html','dots-and-boxes.html','mahjong.html','memory.html','mexican-train.html','minesweeper.html','pinball.html','reversi.html','roulette.html','rush-hour.html','shuffleboard.html','shutthebox.html','slots.html','snake.html','sudoku.html','tic-tac-toe.html','war.html','word-search.html']);
const TITLE_OVERRIDES={'2048.html':'2048','gta.html':'GTA Retro','hr-derby.html':'HR Derby Pro','nashball.html':'Nashball Elite','surfing.html':'Surf City Pro','avalanche-rider.html':'Avalanche Rider'};
const EMOJI=[['avalanche','🏂'],['surf','🏄‍♂️'],['wave','🌊'],['hoops','🏀'],['basketball','🏀'],['dunk','🏀'],['football','🏈'],['blitz','🏈'],['soccer','⚽'],['hockey','🏒'],['baseball','⚾'],['plate','⚾'],['golf','⛳'],['volleyball','🏐'],['ping-pong','🏓'],['billiards','🎱'],['pool','🎱'],['bowling','🎳'],['curling','🥌'],['ski','🎿'],['snow','❄️'],['downhill','⛷️'],['sled','🛷'],['bmx','🚲'],['bike','🚲'],['racing','🏎️'],['space','🚀'],['galaxy','🚀'],['lander','🚀'],['flight','✈️'],['drone','🚁'],['parachute','🪂'],['maze','🌀'],['dungeon','⚔️'],['quest','⚔️'],['war','⚔️'],['dragon','🐉'],['monster','🦖'],['dino','🦖'],['dog','🐕'],['cat','🐱'],['kitten','🐱'],['duck','🦆'],['quack','🦆'],['panda','🐼'],['monkey','🐒'],['banana','🍌'],['pizza','🍕'],['chef','🍳'],['kitchen','🍳'],['burger','🍔'],['fruit','🍉'],['cookie','🍪'],['word','🔡'],['letter','🔡'],['number','🔢'],['puzzle','🧩'],['memory','🧠'],['brain','🧠'],['laser','🔦'],['tower','🏰'],['city','🏙️'],['road','🛣️'],['river','🚣'],['lake','🛶'],['station','🚒'],['parking','🅿️'],['truck','🚚'],['rail','🛤️'],['subway','🚇'],['paint','🎨'],['music','🎧'],['dj','🎧'],['card','🃏'],['dice','🎲'],['slots','🎰'],['roulette','🎰'],['garden','🌱'],['farm','🌽'],['corn','🌽'],['life','🚶'],['running','🏃'],['stride','🏃'],['jump','⤴️']];
let games=[], filtered=[];
const grid=document.getElementById('grid'), search=document.getElementById('search'), sort=document.getElementById('sort'), filter=document.getElementById('filter'), appFilter=document.getElementById('app-filter'), count=document.getElementById('count'), statusEl=document.getElementById('status');
const favorites=loadSet(FAV_KEY), dateCache=loadObject(DATE_CACHE_KEY);
function loadSet(k){try{return new Set(JSON.parse(localStorage.getItem(k)||'[]'))}catch{return new Set()}}
function loadObject(k){try{return JSON.parse(localStorage.getItem(k)||'{}')}catch{return {}}}
function saveDates(){try{localStorage.setItem(DATE_CACHE_KEY,JSON.stringify(dateCache))}catch{}}
function saveFavs(){localStorage.setItem(FAV_KEY,JSON.stringify([...favorites]))}
function title(file){if(TITLE_OVERRIDES[file])return TITLE_OVERRIDES[file];return file.replace('.html','').split('-').map(p=>p==='3d'?'3D':p==='8bit'?'8-Bit':p.toUpperCase()==='BMX'?'BMX':p.charAt(0).toUpperCase()+p.slice(1)).join(' ')}
function icon(file){const hit=EMOJI.find(([k])=>file.toLowerCase().includes(k));return hit?hit[1]:'🎮'}
function fmt(d){return d?new Date(d).toLocaleDateString():'date loading'}
function setStatus(msg,cls){statusEl.textContent=msg;statusEl.className='status '+cls}
function parseSW(text){const m=text.match(/var\s+GAME_HTML_FILES\s*=\s*\[([\s\S]*?)\];/);if(!m)return[];return[...m[1].matchAll(/['"]\.\/([^'"]+\.html)['"]/g)].map(x=>x[1]).filter(f=>f!=='index.html')}
function uniq(a){return[...new Set(a.filter(Boolean))]}
async function loadVault(){try{const r=await fetch('./service-worker.js?v=20260611-dates',{cache:'no-store'});const text=await r.text();const files=uniq(parseSW(text).concat(EXTRA_GAMES));games=files.map((f,i)=>{const cached=dateCache[f]||{};return{f,t:title(f),i:icon(f),c:cached.created||null,u:cached.updated||null,cl:CLASSICS.has(f),n:i+1,datesLoaded:!!cached.updated}});populateIcons();render();setStatus(`Loaded ${games.length} games. Pulling original created/last updated dates from GitHub...`,'loading');refreshDatesProgressively();}catch(e){games=['avalanche-rider.html','surfing.html','half-court-hoops.html','mahjong.html','snake.html','war.html'].map((f,i)=>({f,t:title(f),i:icon(f),c:null,u:null,cl:CLASSICS.has(f),n:i+1}));populateIcons();render();setStatus('Fallback vault loaded. Could not read service-worker.js.','offline')}}
function populateIcons(){const cur=appFilter.value;const counts=games.reduce((a,g)=>(a[g.i]=(a[g.i]||0)+1,a),{});appFilter.innerHTML='<option value="all">All App Icons</option>'+Object.entries(counts).sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0])).map(([i,n])=>`<option value="${i}">${i} ${n}</option>`).join('');if([...appFilter.options].some(o=>o.value===cur))appFilter.value=cur}
function render(){const q=search.value.trim().toLowerCase(), fm=filter.value, am=appFilter.value;filtered=games.filter(g=>(!q||g.t.toLowerCase().includes(q)||g.f.toLowerCase().includes(q))&&(fm==='all'||(fm==='classics'&&g.cl)||(fm==='originals'&&!g.cl)||(fm==='favorites'&&favorites.has(g.f)))&&(am==='all'||g.i===am));filtered.sort((a,b)=>sort.value==='name'?a.t.localeCompare(b.t):sort.value==='oldest'?(dateVal(a.c)-dateVal(b.c)||a.t.localeCompare(b.t)):(dateVal(b.u)-dateVal(a.u)||a.t.localeCompare(b.t)));grid.innerHTML=filtered.map((g,idx)=>{const fav=favorites.has(g.f);return`<a href="${g.f}" class="card" data-file="${g.f}"><div class="idx">${idx+1}</div><span class="fav ${fav?'active':''}" role="button" tabindex="0" data-file="${g.f}">${fav?'❤️':'🤍'}</span><div class="icon">${g.i}</div><div><div class="title">${g.t}</div><div class="date">Created ${fmt(g.c)} · Updated ${fmt(g.u)}</div></div><div class="badge">HTML</div></a>`}).join('');count.textContent=filtered.length}
function dateVal(d){return d?new Date(d).getTime():0}
async function fetchFileDates(file){const cached=dateCache[file];if(cached&&cached.created&&cached.updated)return cached;const base=`https://api.github.com/repos/${OWNER}/${REPO}/commits?sha=${DEFAULT_BRANCH}&path=${encodeURIComponent(file)}&per_page=1`;const first=await fetch(base);if(!first.ok)throw new Error('GitHub date lookup failed');const latest=(await first.json())[0];let created=latest?.commit?.committer?.date||latest?.commit?.author?.date||null;let updated=created;const link=first.headers.get('Link')||'';const lastUrl=(link.match(/<([^>]+)>; rel="last"/)||[])[1];if(lastUrl){const last=await fetch(lastUrl);if(last.ok){const arr=await last.json();const oldest=arr[arr.length-1];created=oldest?.commit?.committer?.date||oldest?.commit?.author?.date||created}}dateCache[file]={created,updated,checkedAt:new Date().toISOString()};return dateCache[file]}
async function refreshDatesProgressively(){let done=0, changed=0;const queue=games.filter(g=>!g.datesLoaded);if(!queue.length){setStatus(`✅ Real GitHub file dates loaded from cache for ${games.length} games.`,'ready');return}for(const g of queue){try{const d=await fetchFileDates(g.f);g.c=d.created;g.u=d.updated;g.datesLoaded=true;changed++;if(changed%8===0){saveDates();render();setStatus(`Loading GitHub dates... ${changed}/${queue.length} refreshed. Sorting improves as dates arrive.`,'loading')}}catch(e){g.datesLoaded=true}done++;await new Promise(r=>setTimeout(r,130))}saveDates();render();setStatus(`✅ File dates loaded. Created = first commit touching file; Updated = latest commit touching file.`,'ready')}
grid.addEventListener('click',e=>{const b=e.target.closest('.fav');if(!b)return;e.preventDefault();e.stopPropagation();const f=b.dataset.file;if(favorites.has(f))favorites.delete(f);else favorites.add(f);saveFavs();render()});
grid.addEventListener('keydown',e=>{if(e.key!=='Enter'&&e.key!==' ')return;const b=e.target.closest('.fav');if(!b)return;e.preventDefault();b.click()});
document.getElementById('random-btn').onclick=()=>{const list=filtered.length?filtered:games;if(list.length)location.href=list[Math.floor(Math.random()*list.length)].f};
[search,sort,filter,appFilter].forEach(el=>el.addEventListener(el===search?'input':'change',render));
if('serviceWorker'in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./service-worker.js?v=20260611-dates').catch(()=>{});navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.update())).catch(()=>{})})}
loadVault();
</script>
</body>
</html>
