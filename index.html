<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>K2 Games: The Vault</title><meta name="theme-color" content="#0f172a"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="K2 Games"><link rel="manifest" href="./manifest.json"><link rel="apple-touch-icon" href="./football-mobile.png"><style>:root{--primary:#6366f1;--accent:#f59e0b;--bg:#0f172a;--surface:#1e293b;--text:#f8fafc;--muted:#94a3b8;--border:#ffffff1a}*{margin:0;padding:0;box-sizing:border-box}body{font-family:Segoe UI,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem;background-image:radial-gradient(at 0 0,#6366f11a,transparent 50%)}.container{max-width:1400px;margin:auto}header{text-align:center;margin-bottom:3rem}h1{font-size:clamp(2.5rem,7vw,3.5rem);font-weight:900;background:linear-gradient(90deg,#818cf8,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.subtitle{color:var(--muted);margin-top:.5rem;text-transform:uppercase;letter-spacing:2px;font-weight:600}.controls{max-width:900px;margin:2rem auto;display:flex;gap:1rem;flex-wrap:wrap;align-items:center}.offline-status{max-width:900px;margin:0 auto 1rem;padding:.75rem 1rem;border-radius:10px;border:1px solid var(--border);font-size:.9rem;text-align:center;background:#ffffff0d;color:var(--muted)}input,select,#random-btn{padding:1rem;border-radius:12px;border:1px solid var(--border);color:white}#search{flex:2;min-width:200px;background:#ffffff0d;outline:none}select{flex:1;background:var(--surface);cursor:pointer}#random-btn{background:linear-gradient(135deg,var(--accent),#d97706);font-weight:700;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem}.card{position:relative;background:var(--surface);border-radius:16px;padding:1.5rem;text-decoration:none;color:inherit;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;text-align:center;transition:.25s}.card:hover{transform:translateY(-5px);border-color:var(--primary);background:#2d3748}.game-idx{position:absolute;top:10px;left:10px;font-size:.6rem;opacity:.3}.classic-tag{position:absolute;top:10px;right:46px;font-size:.6rem;background:var(--accent);padding:2px 6px;border-radius:4px;font-weight:800}.favorite-toggle{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:999px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;background:#0f172ae6;cursor:pointer}.favorite-toggle.active{border-color:#fb7185}.icon{font-size:2.5rem;margin-bottom:.75rem}.title{font-size:.85rem;font-weight:700;text-transform:capitalize}.date{font-size:.6rem;color:var(--muted);margin-top:.5rem}footer{margin-top:4rem;padding:2rem;border-top:1px solid var(--border);text-align:center;color:var(--muted);font-size:.8rem}.disclaimer{max-width:600px;margin:1rem auto;line-height:1.6;opacity:.7}#launcher{position:fixed;inset:0;transform:translateY(-110%);background:var(--bg);z-index:1000;display:grid;place-items:center;transition:.7s}.launcher-content{text-align:center}.launcher-icon{font-size:8rem}.launcher-title{font-size:2.5rem;font-weight:900;color:var(--accent)}#launcher.active{transform:none}@media(max-width:600px){body{padding:1rem}.grid{grid-template-columns:1fr}.card{flex-direction:row;text-align:left;padding:1rem;gap:1rem}.icon{margin:0;font-size:1.5rem}.date{margin-left:auto}}</style></head><body><div class="container"><header><h1>K2 Games</h1><p class="subtitle"><span id="count">0</span> Legendary Titles</p></header><div class="controls"><input id="search" placeholder="Search the vault..."><select id="filter"><option value="all">All Titles</option><option value="originals">Originals</option><option value="classics">Classics</option><option value="favorites">Favorites</option></select><select id="app-filter"><option value="all">All App Icons</option></select><select id="sort"><option value="updated">Recently Updated</option><option value="newest">Newest Additions</option><option value="alpha">A-Z</option></select><button id="random-btn">🎲 Random Game</button></div><p id="offline-status" class="offline-status" role="status">Preparing offline cache...</p><div id="launcher"><div class="launcher-content"><div class="launcher-icon" id="l-icon">🚀</div><div class="launcher-title" id="l-title">Picking a Game...</div><p>Launching in high fidelity...</p></div></div><div class="grid" id="grid"></div><footer><p>&copy; 2026 K2 Games. All rights reserved.</p><div class="disclaimer">K2 Games is a personal tribute project. No data collection. No microtransactions. Just pure gameplay.</div></footer></div><script src="./games.js"></script><script>let games=window.K2_GAMES||[];const overrides=[{f:'phantom-path.html',t:'Phantom Path',i:'👻',c:'2026-07-15T19:10:00-06:00',u:'2026-07-15T19:10:00-06:00',cl:false},{f:'floor-is-lava.html',t:'Floor Is Lava',i:'🌋',c:'2026-07-15T10:15:00-06:00',u:'2026-07-15T10:15:00-06:00',cl:false},{f:'drop-zone.html',t:'Drop Zone',i:'🐦',c:'2026-07-11T08:35:00-06:00',u:'2026-07-11T08:35:00-06:00',cl:false},{f:'range-ranger.html',t:'Range Ranger',i:'🏆',c:'2026-07-07T08:00:00-04:00',u:'2026-07-07T08:00:00-04:00',cl:false},{f:'peak-freak.html',t:'Peak Freak',i:'🏆',c:'2026-06-18T10:00:03-06:00',u:'2026-06-18T10:00:03-06:00',cl:false}];overrides.slice().reverse().forEach(g=>{if(!games.some(x=>x.f===g.f))games.unshift(g)});const $=id=>document.getElementById(id),search=$('search'),sort=$('sort'),filter=$('filter'),appFilter=$('app-filter'),grid=$('grid'),count=$('count'),favKey='k2-favorites';let shown=[];const favorites=new Set(JSON.parse(localStorage.getItem(favKey)||'[]'));function save(){localStorage.setItem(favKey,JSON.stringify([...favorites]))}function populate(){const prev=appFilter.value||'all',counts={};games.forEach(g=>counts[g.i]=(counts[g.i]||0)+1);appFilter.innerHTML='<option value="all">All App Icons</option>';Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([icon,n])=>appFilter.add(new Option(`${icon} ${n} app${n===1?'':'s'}`,icon)));appFilter.value=[...appFilter.options].some(o=>o.value===prev)?prev:'all'}function render(){const q=search.value.toLowerCase(),mode=filter.value,icon=appFilter.value;shown=games.filter(g=>(g.t.toLowerCase().includes(q)||g.f.toLowerCase().includes(q))&&(mode==='all'||mode==='classics'&&g.cl||mode==='originals'&&!g.cl||mode==='favorites'&&favorites.has(g.f))&&(icon==='all'||g.i===icon));shown.sort((a,b)=>sort.value==='alpha'?a.t.localeCompare(b.t):sort.value==='newest'?new Date(b.c)-new Date(a.c):new Date(b.u)-new Date(a.u));grid.innerHTML=shown.map((g,i)=>`<a href="${g.f}" class="card"><span class="game-idx">${i+1}</span>${g.cl?'<span class="classic-tag">CLASSIC</span>':''}<span class="favorite-toggle ${favorites.has(g.f)?'active':''}" data-file="${g.f}" role="button">${favorites.has(g.f)?'❤️':'🤍'}</span><div class="icon">${g.i}</div><div class="title">${g.t}</div><div class="date">Added ${new Date(g.c).toLocaleDateString()} · Updated ${new Date(g.u).toLocaleDateString()}</div></a>`).join('');count.textContent=shown.length}grid.onclick=e=>{const b=e.target.closest('.favorite-toggle');if(!b)return;e.preventDefault();e.stopPropagation();favorites.has(b.dataset.file)?favorites.delete(b.dataset.file):favorites.add(b.dataset.file);save();render()};[search,sort,filter,appFilter].forEach(el=>el.addEventListener(el===search?'input':'change',render));$('random-btn').onclick=()=>{if(!shown.length)return;const g=shown[Math.random()*shown.length|0];$('launcher').classList.add('active');$('l-icon').textContent=g.i;$('l-title').textContent=g.t;setTimeout(()=>location.href=g.f,1100)};populate();render();if('serviceWorker'in navigator){navigator.serviceWorker.register('./service-worker.js',{updateViaCache:'none'}).then(()=>{$('offline-status').textContent='✅ Offline cache is enabled for Home Screen play.'}).catch(()=>{$('offline-status').textContent='⚠️ Offline cache could not be prepared.'})}else $('offline-status').textContent='Online play ready.';</script></body></html>
