    <meta charset="UTF-8">

    <title>K2 Games: The Vault</title>
    <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8Xw8AAnUB9WQ0N2IAAAAASUVORK5CYII=">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #f59e0b;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1rem;
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0, transparent 50%);
        }

        .container { max-width: 1400px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 3rem; }
        h1 { font-size: 3.5rem; font-weight: 900; background: linear-gradient(to right, #818cf8, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: var(--muted); margin-top: 0.5rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }

        .controls { max-width: 900px; margin: 2rem auto; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
        #search { flex: 2; min-width: 200px; padding: 1rem; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: white; outline: none; }
        #sort, #filter { flex: 1; padding: 1rem; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: white; cursor: pointer; }
        #random-btn {
            padding: 1rem 2rem; border-radius: 12px; border: none;
            background: linear-gradient(135deg, var(--accent), #d97706);
            color: white; font-weight: 700; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; gap: 0.5rem;
        }
        #random-btn:hover { transform: scale(1.05); filter: brightness(1.1); box-shadow: 0 0 20px rgba(245, 158, 11, 0.4); }

        #launcher {
            position: fixed; top: -100%; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }
        #launcher.active { top: 0; }
        .launcher-content { text-align: center; }
        .launcher-icon { font-size: 8rem; margin-bottom: 2rem; animation: bounce 1s infinite; }
        .launcher-title { font-size: 2.5rem; font-weight: 900; color: var(--accent); }
        .launcher-sub { color: var(--muted); margin-top: 1rem; font-size: 1.2rem; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }

        .card {
            position: relative;
            background: var(--surface); border-radius: 16px; padding: 1.5rem;
            text-decoration: none; color: inherit; border: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; text-align: center;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); background: #2d3748; }
        .game-idx { position: absolute; top: 10px; left: 10px; font-size: 0.6rem; opacity: 0.3; }
        .classic-tag { position: absolute; top: 10px; right: 10px; font-size: 0.6rem; background: var(--accent); color: white; padding: 2px 6px; border-radius: 4px; font-weight: 800; }
        .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
        .title { font-size: 0.85rem; font-weight: 700; text-transform: capitalize; }
        .date { font-size: 0.6rem; color: var(--muted); margin-top: 0.5rem; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .card { flex-direction: row; text-align: left; padding: 1rem; gap: 1rem; }
            .icon { margin-bottom: 0; font-size: 1.5rem; }
            .classic-tag { bottom: 10px; top: auto; }
        }

        footer { margin-top: 4rem; padding: 2rem; border-top: 1px solid var(--border); text-align: center; color: var(--muted); font-size: 0.8rem; }
        .disclaimer { max-width: 600px; margin: 1rem auto; line-height: 1.6; opacity: 0.7; }
    </style>
</head>

            { f: 'skypark-symphony.html', t: 'Skypark Symphony', i: '🎆', c: '2026-03-29T00:00:00', u: '2026-03-29T00:00:00', cl: false },
            { f: 'eggscape-runner.html', t: 'Eggscape Runner', i: '🥚', c: '2026-03-29T00:00:00', u: '2026-03-29T00:00:00', cl: false },
            { f: 'countdown-catch.html', t: 'Countdown Catch', i: '🎊', c: '2026-03-29T00:00:00', u: '2026-03-29T00:00:00', cl: false },
            { f: 'love-shot.html', t: 'Love Shot', i: '💘', c: '2026-03-29T00:00:00', u: '2026-03-29T00:00:00', cl: false },
            { f: 'leash-and-lanes.html', t: 'Leash and Lanes', i: '🐕', c: '2026-03-29T00:00:00', u: '2026-03-29T00:00:00', cl: false }
        ];

        const search = document.getElementById('search');
        const sort = document.getElementById('sort');
        const filter = document.getElementById('filter');
        const grid = document.getElementById('grid');
        const count = document.getElementById('count');

        let filteredGames = [];

        function render() {
            const query = search.value.toLowerCase();
            const sortMode = sort.value;
            const filterMode = filter.value;

            filteredGames = games.filter(g => {
                const matchesSearch = g.t.toLowerCase().includes(query);
                const matchesFilter = filterMode === 'all' || 
                                     (filterMode === 'classics' && g.cl) || 
                                     (filterMode === 'originals' && !g.cl);
                return matchesSearch && matchesFilter;
            });

            filteredGames.sort((a, b) => {
                if (sortMode === 'alpha') return a.t.localeCompare(b.t);
                if (sortMode === 'updated') return new Date(b.u) - new Date(a.u);
                if (sortMode === 'newest') return new Date(b.c) - new Date(a.c);
                return 0;
            });

            grid.innerHTML = filteredGames.map((g, idx) => `
                <a href="${g.f}" class="card">
                    <div class="game-idx">${idx + 1}</div>
                    ${g.cl ? '<div class="classic-tag">CLASSIC</div>' : ''}
                    <div class="icon">${g.i}</div>
                    <div class="title">${g.t}</div>
                    <div class="date">${new Date(g.u).toLocaleDateString()}</div>
                </a>
            `).join('');
            
            count.textContent = filteredGames.length;
        }

        search.addEventListener('input', render);
        sort.addEventListener('change', render);
        filter.addEventListener('change', render);
        render();

        // Random Launcher
        const randomBtn = document.getElementById('random-btn');
        const launcher = document.getElementById('launcher');
        const lIcon = document.getElementById('l-icon');
        const lTitle = document.getElementById('l-title');

        randomBtn.addEventListener('click', () => {
            if (filteredGames.length === 0) return;
            const game = filteredGames[Math.floor(Math.random() * filteredGames.length)];
            
            launcher.classList.add('active');
            let spinCount = 0;
            const icons = ['🚀', '🎲', '👾', '🕹️', '🎨', '🧩', '⚔️', '🏎️'];
            const interval = setInterval(() => {
                lIcon.textContent = icons[spinCount % icons.length];
                spinCount++;
            }, 100);

            setTimeout(() => {
                clearInterval(interval);
                lIcon.textContent = game.i;
                lTitle.textContent = game.t;
                setTimeout(() => { window.location.href = game.f; }, 1000);
            }, 1500);
        });
    </script>
</body>
</html>
