<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K2 Games: The Vault</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="K2 Games">
    <link rel="manifest" href="./manifest.json?v=20260611-restore">
    <link rel="apple-touch-icon" href="./football-mobile.png?v=20260611-restore">
    <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8Xw8AAnUB9WQ0N2IAAAAASUVORK5CYII=">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-2: #263449;
            --primary: #38bdf8;
            --accent: #8b5cf6;
            --gold: #f59e0b;
            --text: #f8fafc;
            --muted: #94a3b8;
            --border: rgba(255,255,255,0.1);
            --danger: #fb7185;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 34%),
                radial-gradient(circle at top right, rgba(139, 92, 246, 0.14), transparent 32%),
                var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            padding: 2rem;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; padding: 2rem 0 1rem; }
        h1 {
            font-size: clamp(2.8rem, 8vw, 5.5rem);
            margin: 0;
            letter-spacing: -0.08em;
            font-weight: 950;
            background: linear-gradient(135deg, #fff, var(--primary), var(--accent));
            -webkit-background-clip: text;
            color: transparent;
        }
        .subtitle { color: var(--muted); margin-top: 0.5rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
        .controls { max-width: 950px; margin: 2rem auto 1rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
        #search, #sort, #filter, #app-filter {
            padding: 1rem;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
        }
        #search { flex: 2; min-width: 220px; }
        #sort, #filter, #app-filter { flex: 1; min-width: 150px; background: var(--surface); cursor: pointer; }
        #random-btn {
            padding: 1rem 1.25rem;
            border-radius: 14px;
            border: 0;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff;
            font-weight: 950;
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(56, 189, 248, 0.18);
        }
        .offline-status {
            max-width: 950px;
            margin: 0 auto 1.5rem;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-size: 0.9rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            color: var(--muted);
        }
        .offline-status--loading { color: #fde68a; border-color: rgba(245, 158, 11, 0.5); }
        .offline-status--ready { color: #86efac; border-color: rgba(34, 197, 94, 0.5); }
        .offline-status--offline { color: #fca5a5; border-color: rgba(239, 68, 68, 0.5); }
        .count-row { max-width: 950px; margin: 0 auto 1rem; color: var(--muted); font-size: 0.92rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 1rem; }
        .card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1.25rem 1rem;
            text-align: center;
            text-decoration: none;
            color: inherit;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
            transition: transform 0.18s, border-color 0.18s, background 0.18s;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); background: var(--surface-2); }
        .game-idx { position: absolute; top: 10px; left: 10px; font-size: 0.65rem; opacity: 0.38; font-weight: 800; }
        .favorite-toggle {
            position: absolute;
            top: 9px;
            right: 9px;
            width: 31px;
            height: 31px;
            border-radius: 999px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.88);
            font-size: 0.9rem;
            cursor: pointer;
            user-select: none;
        }
        .favorite-toggle.active { border-color: #fb7185; box-shadow: 0 0 0 2px rgba(244, 63, 94, 0.28); }
        .icon { font-size: 2.55rem; margin-bottom: 0.75rem; }
        .title { font-size: 0.9rem; font-weight: 800; text-transform: capitalize; line-height: 1.2; }
        .date { font-size: 0.68rem; color: var(--muted); margin-top: 0.65rem; }
        .badge { position: absolute; bottom: 9px; right: 9px; font-size: 0.62rem; color: var(--primary); opacity: 0.75; font-weight: 900; }
        #launcher {
            position: fixed;
            inset: 0;
            display: none;
            place-items: center;
            background: rgba(2,6,23,0.72);
            backdrop-filter: blur(8px);
            z-index: 50;
            padding: 1.5rem;
        }
        .launcher-content {
            width: min(90vw, 440px);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            text-align: center;
            padding: 2rem;
            box-shadow: 0 24px 90px rgba(0,0,0,0.45);
        }
        .launcher-icon { font-size: 4rem; }
        #l-title { margin: 0.75rem 0 1.5rem; font-size: 1.5rem; font-weight: 950; }
        .play-now {
            display: inline-block;
            text-decoration: none;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            padding: 0.9rem 1.3rem;
            border-radius: 999px;
            font-weight: 950;
        }
        footer { margin-top: 4rem; padding: 2rem; border-top: 1px solid var(--border); text-align: center; color: var(--muted); font-size: 0.85rem; }
        @media (max-width: 640px) {
            body { padding: 1rem; }
            .controls { gap: 0.65rem; }
            #search, #sort, #filter, #app-filter, #random-btn { width: 100%; flex: none; }
            .grid { grid-template-columns: 1fr; }
            .card { min-height: 96px; flex-direction: row; text-align: left; justify-content: flex-start; align-items: center; padding: 1rem 3rem 1rem 1rem; gap: 1rem; }
            .icon { margin-bottom: 0; font-size: 1.8rem; }
            .date { margin-top: 0.35rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>K2 Games</h1>
            <div class="subtitle">The Vault</div>
        </header>

        <div class="controls">
            <input id="search" type="search" placeholder="Search games...">
            <select id="sort">
                <option value="name">Sort A-Z</option>
                <option value="recent">Sort Recent</option>
                <option value="oldest">Sort Oldest</option>
            </select>
            <select id="filter">
                <option value="all">All Titles</option>
                <option value="favorites">Favorites</option>
                <option value="classics">Classics</option>
                <option value="originals">Originals</option>
            </select>
            <select id="app-filter">
                <option value="all">All App Icons</option>
            </select>
            <button id="random-btn">🎲 Random Game</button>
        </div>

        <p id="offline-status" class="offline-status offline-status--loading" role="status" aria-live="polite">
            Loading game vault...
        </p>

        <div class="count-row"><span id="count">0</span> games loaded</div>

        <div id="launcher">
            <div class="launcher-content">
                <div class="launcher-icon" id="l-icon">🎮</div>
                <div id="l-title">Game</div>
                <a id="l-link" href="#" class="play-now">Play Now</a>
            </div>
        </div>

        <main id="grid" class="grid"></main>

        <footer>
            K2 Games vault restored. Each game stays in its own HTML file; index.html is the launcher only.
        </footer>
    </div>

    <script>
        const EXTRA_GAMES = [
            'avalanche-rider.html'
        ];

        const CLASSIC_HINTS = new Set([
            '2048.html', 'backgammon.html', 'blackjack.html', 'checkers.html', 'chess.html', 'connect-6.html',
            'craps.html', 'crossword.html', 'darts.html', 'dots-and-boxes.html', 'hangman.html', 'mahjong.html',
            'memory.html', 'mexican-train.html', 'minesweeper.html', 'pinball.html', 'reversi.html', 'roulette.html',
            'rush-hour.html', 'shuffleboard.html', 'shutthebox.html', 'slots.html', 'snake.html', 'sudoku.html',
            'tic-tac-toe.html', 'war.html', 'word-search.html'
        ]);

        const EMOJI_MAP = [
            ['avalanche', '🏂'], ['surf', '🏄‍♂️'], ['wave', '🌊'], ['hoops', '🏀'], ['basketball', '🏀'], ['dunk', '🏀'],
            ['football', '🏈'], ['blitz', '🏈'], ['soccer', '⚽'], ['hockey', '🏒'], ['baseball', '⚾'], ['plate', '⚾'],
            ['golf', '⛳'], ['disc-golf', '🥏'], ['volleyball', '🏐'], ['ping-pong', '🏓'], ['tennis', '🎾'],
            ['billiards', '🎱'], ['pool', '🎱'], ['bowling', '🎳'], ['curling', '🥌'], ['ski', '🎿'], ['snow', '❄️'],
            ['downhill', '⛷️'], ['sled', '🛷'], ['bobsled', '🛷'], ['bmx', '🚲'], ['bike', '🚲'], ['racing', '🏎️'],
            ['space', '🚀'], ['galaxy', '🚀'], ['lander', '🚀'], ['flight', '✈️'], ['drone', '🚁'], ['parachute', '🪂'],
            ['maze', '🌀'], ['dungeon', '⚔️'], ['quest', '⚔️'], ['war', '⚔️'], ['dragon', '🐉'], ['monster', '🦖'], ['dino', '🦖'],
            ['dog', '🐕'], ['cat', '🐱'], ['kitten', '🐱'], ['duck', '🦆'], ['quack', '🦆'], ['panda', '🐼'], ['monkey', '🐒'],
            ['banana', '🍌'], ['pizza', '🍕'], ['chef', '🍳'], ['kitchen', '🍳'], ['burger', '🍔'], ['fruit', '🍉'], ['cookie', '🍪'],
            ['word', '🔡'], ['letter', '🔡'], ['number', '🔢'], ['puzzle', '🧩'], ['memory', '🧠'], ['brain', '🧠'],
            ['laser', '🔦'], ['tower', '🏰'], ['city', '🏙️'], ['road', '🛣️'], ['river', '🚣'], ['lake', '🛶'], ['station', '🚒'],
            ['parking', '🅿️'], ['truck', '🚚'], ['rail', '🛤️'], ['subway', '🚇'], ['paint', '🎨'], ['music', '🎧'], ['dj', '🎧'],
            ['card', '🃏'], ['dice', '🎲'], ['slots', '🎰'], ['roulette', '🎰'], ['garden', '🌱'], ['farm', '🌽'], ['corn', '🌽'],
            ['life', '🚶'], ['running', '🏃'], ['stride', '🏃'], ['jump', '⤴️']
        ];

        const TITLE_OVERRIDES = {
            '2048.html': '2048',
            'gta.html': 'GTA Retro',
            'hr-derby.html': 'HR Derby Pro',
            'nashball.html': 'Nashball Elite',
            'surfing.html': 'Surf City Pro',
            'avalanche-rider.html': 'Avalanche Rider'
        };

        const RECENT_OVERRIDES = {
            'avalanche-rider.html': '2026-06-11T00:00:00',
            'surfing.html': '2026-06-11T00:00:00'
        };

        const FAVORITES_STORAGE_KEY = 'k2-favorites';
        let games = [];
        let filteredGames = [];
        const favorites = loadFavorites();

        const grid = document.getElementById('grid');
        const search = document.getElementById('search');
        const sort = document.getElementById('sort');
        const filter = document.getElementById('filter');
        const appFilter = document.getElementById('app-filter');
        const count = document.getElementById('count');
        const statusEl = document.getElementById('offline-status');
        const launcher = document.getElementById('launcher');
        const randomBtn = document.getElementById('random-btn');

        function titleFromFile(file) {
            if (TITLE_OVERRIDES[file]) return TITLE_OVERRIDES[file];
            return file.replace('.html', '').split('-').map(part => {
                if (part === '3d') return '3D';
                if (part === '8bit') return '8-Bit';
                if (part === 'bmx') return 'BMX';
                return part.charAt(0).toUpperCase() + part.slice(1);
            }).join(' ');
        }

        function emojiForFile(file) {
            const lower = file.toLowerCase();
            const found = EMOJI_MAP.find(([key]) => lower.includes(key));
            return found ? found[1] : '🎮';
        }

        function normalizeGameFile(raw) {
            return raw.replace(/^\.\//, '').trim();
        }

        function parseServiceWorkerGames(text) {
            const match = text.match(/var\s+GAME_HTML_FILES\s*=\s*\[([\s\S]*?)\];/);
            if (!match) return [];
            return [...match[1].matchAll(/['"]\.\/([^'"]+\.html)['"]/g)]
                .map(item => normalizeGameFile(item[1]))
                .filter(file => file !== 'index.html');
        }

        function unique(items) {
            return [...new Set(items.filter(Boolean))];
        }

        function loadFavorites() {
            try {
                const raw = localStorage.getItem(FAVORITES_STORAGE_KEY);
                const parsed = raw ? JSON.parse(raw) : [];
                return new Set(Array.isArray(parsed) ? parsed : []);
            } catch (error) {
                return new Set();
            }
        }

        function saveFavorites() {
            localStorage.setItem(FAVORITES_STORAGE_KEY, JSON.stringify([...favorites]));
        }

        function updateStatus(message, className) {
            statusEl.textContent = message;
            statusEl.className = 'offline-status ' + className;
        }

        function buildGames(files) {
            const now = '2026-06-11T00:00:00';
            return unique(files.concat(EXTRA_GAMES)).map((file, index) => ({
                f: file,
                t: titleFromFile(file),
                i: emojiForFile(file),
                c: RECENT_OVERRIDES[file] || '2026-03-01T00:00:00',
                u: RECENT_OVERRIDES[file] || now,
                cl: CLASSIC_HINTS.has(file),
                n: index + 1
            }));
        }

        function populateAppFilter() {
            const current = appFilter.value;
            const counts = games.reduce((acc, game) => {
                acc[game.i] = (acc[game.i] || 0) + 1;
                return acc;
            }, {});
            appFilter.innerHTML = '<option value="all">All App Icons</option>' +
                Object.entries(counts)
                    .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
                    .map(([icon, total]) => `<option value="${icon}">${icon} ${total}</option>`)
                    .join('');
            if ([...appFilter.options].some(opt => opt.value === current)) appFilter.value = current;
        }

        function render() {
            const query = search.value.trim().toLowerCase();
            const filterMode = filter.value;
            const appMode = appFilter.value;

            filteredGames = games.filter(g => {
                const matchesSearch = !query || g.t.toLowerCase().includes(query) || g.f.toLowerCase().includes(query);
                const matchesFilter = filterMode === 'all' ||
                    (filterMode === 'classics' && g.cl) ||
                    (filterMode === 'originals' && !g.cl) ||
                    (filterMode === 'favorites' && favorites.has(g.f));
                const matchesApp = appMode === 'all' || g.i === appMode;
                return matchesSearch && matchesFilter && matchesApp;
            });

            filteredGames.sort((a, b) => {
                if (sort.value === 'recent') return new Date(b.u) - new Date(a.u) || a.t.localeCompare(b.t);
                if (sort.value === 'oldest') return new Date(a.c) - new Date(b.c) || a.t.localeCompare(b.t);
                return a.t.localeCompare(b.t);
            });

            grid.innerHTML = filteredGames.map((g, idx) => {
                const favoriteState = favorites.has(g.f);
                return `
                    <a href="${g.f}" class="card" data-file="${g.f}">
                        <div class="game-idx">${idx + 1}</div>
                        <span class="favorite-toggle ${favoriteState ? 'active' : ''}" role="button" tabindex="0" aria-label="${favoriteState ? 'Remove from favorites' : 'Save to favorites'}" data-file="${g.f}">${favoriteState ? '❤️' : '🤍'}</span>
                        <div class="icon">${g.i}</div>
                        <div class="title">${g.t}</div>
                        <div class="date">${g.cl ? 'Classic' : 'Original'} · ${new Date(g.u).toLocaleDateString()}</div>
                        <div class="badge">HTML</div>
                    </a>
                `;
            }).join('');

            count.textContent = filteredGames.length;
        }

        async function loadVault() {
            try {
                const response = await fetch('./service-worker.js?v=20260611-restore', { cache: 'no-store' });
                if (!response.ok) throw new Error('Service worker file not found');
                const text = await response.text();
                const files = parseServiceWorkerGames(text);
                if (!files.length) throw new Error('No game files found');
                games = buildGames(files);
                populateAppFilter();
                render();
                updateStatus(`✅ Vault restored: ${games.length} game files loaded from service-worker.js.`, 'offline-status--ready');
            } catch (error) {
                games = buildGames(['avalanche-rider.html', 'surfing.html', 'half-court-hoops.html', 'cruise-control.html', 'mahjong.html', 'snake.html', 'war.html']);
                populateAppFilter();
                render();
                updateStatus('⚠️ Loaded fallback vault. Check service-worker.js if the full list does not appear.', 'offline-status--offline');
            }
        }

        grid.addEventListener('click', event => {
            const button = event.target.closest('.favorite-toggle');
            if (!button) return;
            event.preventDefault();
            event.stopPropagation();
            const file = button.dataset.file;
            if (favorites.has(file)) favorites.delete(file);
            else favorites.add(file);
            saveFavorites();
            render();
        });

        grid.addEventListener('keydown', event => {
            if (event.key !== 'Enter' && event.key !== ' ') return;
            const button = event.target.closest('.favorite-toggle');
            if (!button) return;
            event.preventDefault();
            button.click();
        });

        grid.addEventListener('click', event => {
            const card = event.target.closest('.card');
            if (!card || event.target.closest('.favorite-toggle')) return;
            const game = games.find(g => g.f === card.dataset.file);
            if (!game) return;
            if (window.matchMedia('(min-width: 768px)').matches && !event.metaKey && !event.ctrlKey) {
                event.preventDefault();
                document.getElementById('l-icon').textContent = game.i;
                document.getElementById('l-title').textContent = game.t;
                document.getElementById('l-link').href = game.f;
                launcher.style.display = 'grid';
                setTimeout(() => { window.location.href = game.f; }, 650);
            }
        });

        launcher.addEventListener('click', event => {
            if (event.target === launcher) launcher.style.display = 'none';
        });

        randomBtn.addEventListener('click', () => {
            const list = filteredGames.length ? filteredGames : games;
            if (!list.length) return;
            const pick = list[Math.floor(Math.random() * list.length)];
            window.location.href = pick.f;
        });

        search.addEventListener('input', render);
        sort.addEventListener('change', render);
        filter.addEventListener('change', render);
        appFilter.addEventListener('change', render);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js?v=20260611-restore').catch(() => {});
                navigator.serviceWorker.getRegistrations().then(registrations => registrations.forEach(reg => reg.update())).catch(() => {});
            });
        }

        loadVault();
    </script>
</body>
</html>
