<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pinball Classic Pro - K2 games</title>
    <style>
        :root {
            --cabinet: #1e293b;
            --playfield: #0f172a;
            --steel: #cbd5e1;
            --gold: #fbbf24;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: #020617;
            color: white; font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        #hud {
            width: 100%; max-width: 500px; padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.4); border-bottom: 2px solid rgba(255,255,255,0.1);
        }

        .stat-card { text-align: center; }
        .label { font-size: 0.6rem; text-transform: uppercase; opacity: 0.6; letter-spacing: 1.5px; }
        .val { font-size: 1.8rem; font-weight: 900; color: var(--gold); font-family: monospace; }

        #game-area {
            position: relative; flex: 1; width: 100%; max-width: 500px;
            border: 8px solid var(--cabinet); border-bottom: none;
            background: var(--playfield); overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; }

        #controls {
            width: 100%; max-width: 500px; height: 120px;
            background: var(--cabinet); display: flex; justify-content: space-between;
            padding: 20px; gap: 15px; border-top: 4px solid rgba(255,255,255,0.1);
        }

        .f-btn {
            flex: 1; background: #334155; border: 3px solid rgba(255,255,255,0.2);
            border-radius: 12px; color: white; font-weight: 900; display: flex;
            align-items: center; justify-content: center; font-size: 1.2rem;
            box-shadow: 0 6px 0 #0f172a; cursor: pointer;
        }
        .f-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #0f172a; background: var(--gold); color: black; }

        #btn-plunger {
            width: 80px; background: var(--danger); border-radius: 50%;
            border: 4px solid white; display: flex; align-items: center;
            justify-content: center; font-size: 1.5rem; cursor: pointer;
            box-shadow: 0 6px 0 #7f1d1d; transition: 0.1s;
        }
        #btn-plunger:active { transform: scale(0.9) translateY(4px); box-shadow: none; filter: brightness(1.2); }

        #overlay {
            position: absolute; inset: 0; background: rgba(2, 6, 23, 0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; text-align: center; padding: 20px;
        }

        .btn-start {
            background: var(--gold); color: black; border: none; padding: 15px 50px;
            border-radius: 50px; font-weight: 900; font-size: 1.5rem; cursor: pointer;
            margin-top: 30px; box-shadow: 0 8px 20px rgba(251, 191, 36, 0.3);
        }
    </style>

</head>
<body>
    <div id="hud">
        <div class="stat-card"><div class="label">Score</div><div id="score-val" class="val">000,000</div></div>
        <div class="stat-card" style="text-align:right;"><div class="label">Balls</div><div id="balls-val" class="val">3</div></div>
    </div>

    <div id="game-area">
        <canvas id="pinball-canvas"></canvas>
        <div id="overlay">
            <h1 style="font-size: 3.5rem; font-style: italic; color: var(--gold);">PINBALL<br>CLASSIC PRO</h1>
            <p style="opacity: 0.7; margin-top: 10px;">High Tension Spring Physics</p>
            <button class="btn-start" onclick="game.start()">PULL PLUNGER</button>
        </div>
    </div>

    <div id="controls">
        <div class="f-btn" id="btn-left">LEFT</div>
        <div id="btn-plunger">🚀</div>
        <div class="f-btn" id="btn-right">RIGHT</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        const { Engine, Render, Runner, World, Bodies, Body, Events, Vector, Composite, Constraint } = Matter;

        class PinballElite {
            constructor() {
                this.score = 0; this.balls = 3; this.state = 'menu';
                this.initPhysics();
                this.createTable();
                this.setupInputs();
                Runner.run(Runner.create(), this.engine);
                Render.run(this.render);
            }

            initPhysics() {
                this.engine = Engine.create();
                this.render = Render.create({
                    canvas: document.getElementById('pinball-canvas'),
                    engine: this.engine,
                    options: { width: 450, height: 700, wireframes: false, background: '#0f172a' }
                });
                this.width = 450; this.height = 700;
            }

            createTable() {
                const W = this.width, H = this.height;
                const wallOpts = { isStatic: true, render: { fillStyle: '#1e293b' } };
                
                World.add(this.engine.world, [
                    Bodies.rectangle(W/2, 0, W, 20, wallOpts),
                    Bodies.rectangle(0, H/2, 20, H, wallOpts),
                    Bodies.rectangle(W, H/2, 20, H, wallOpts),
                    Bodies.rectangle(W - 40, H - 150, 10, 350, wallOpts), // Plunger Lane
                    // Top curve
                    Bodies.fromVertices(W/2, 60, [{x:0,y:0},{x:W,y:0},{x:W,y:100},{x:0,y:100}], {isStatic:true, render:{fillStyle:'#020617'}}, true)
                ]);

                this.leftFlipper = this.createFlipper(140, H-100, 'left');
                this.rightFlipper = this.createFlipper(270, H-100, 'right');

                // Bumpers
                const bOpts = { isStatic: true, label: 'bumper', render: { fillStyle: '#ef4444', strokeStyle: '#fff', lineWidth: 3 } };
                World.add(this.engine.world, [
                    Bodies.circle(W/2, 200, 25, bOpts),
                    Bodies.circle(W/2 - 70, 280, 25, bOpts),
                    Bodies.circle(W/2 + 70, 280, 25, bOpts)
                ]);

                Events.on(this.engine, 'collisionStart', (e) => {
                    e.pairs.forEach(p => {
                        const labels = [p.bodyA.label, p.bodyB.label];
                        if(labels.includes('bumper')) {
                            this.score += 1000; this.updateUI();
                            const b = p.bodyA.label === 'ball' ? p.bodyA : p.bodyB;
                            const bump = p.bodyA.label === 'bumper' ? p.bodyA : p.bodyB;
                            Body.applyForce(b, b.position, Vector.mult(Vector.normalise(Vector.sub(b.position, bump.position)), 0.05));
                        }
                    });
                });

                Events.on(this.engine, 'beforeUpdate', () => {
                    if(this.state !== 'play') return;
                    [this.leftFlipper, this.rightFlipper].forEach(f => {
                        const target = f.side === 'left' ? (this.keys.left ? -0.8 : 0.4) : (this.keys.right ? 0.8 : -0.4);
                        Body.setAngle(f.body, f.body.angle + (target - f.body.angle) * 0.4);
                    });
                    if(this.ball && this.ball.position.y > H + 50) this.drain();
                });
            }

            createFlipper(x, y, side) {
                const f = Bodies.rectangle(x, y, 80, 20, { chamfer: { radius: 10 }, render: { fillStyle: '#fff' } });
                const pivot = Bodies.circle(side==='left' ? x-30 : x+30, y, 5, { isStatic: true, render: { visible: false } });
                World.add(this.engine.world, [f, pivot, Constraint.create({ bodyA: f, pointA: { x: side==='left' ? -30 : 30, y: 0 }, bodyB: pivot, stiffness: 1, length: 0 })]);
                return { body: f, side };
            }

            setupInputs() {
                this.keys = { left: false, right: false };
                window.onkeydown = (e) => {
                    if(e.code === 'ArrowLeft') this.keys.left = true;
                    if(e.code === 'ArrowRight') this.keys.right = true;
                    if(e.code === 'ArrowDown' || e.code === 'Space') this.launch();
                };
                window.onkeyup = (e) => {
                    if(e.code === 'ArrowLeft') this.keys.left = false;
                    if(e.code === 'ArrowRight') this.keys.right = false;
                };
                const bL = document.getElementById('btn-left'), bR = document.getElementById('btn-right'), bP = document.getElementById('btn-plunger');
                bL.ontouchstart = (e) => { e.preventDefault(); this.keys.left = true; }; bL.ontouchend = () => this.keys.left = false;
                bR.ontouchstart = (e) => { e.preventDefault(); this.keys.right = true; }; bR.ontouchend = () => this.keys.right = false;
                bP.onclick = () => this.launch();
            }

            start() {
                this.score = 0; this.balls = 3; this.state = 'play';
                document.getElementById('overlay').style.display = 'none';
                this.spawnBall(); this.updateUI();
            }

            spawnBall() {
                if(this.ball) World.remove(this.engine.world, this.ball);
                this.ball = Bodies.circle(this.width - 25, this.height - 50, 12, { label: 'ball', restitution: 0.4, density: 0.01, friction: 0.005, render: { fillStyle: '#cbd5e1' } });
                World.add(this.engine.world, this.ball);
            }

            launch() {
                if(this.ball && this.ball.position.x > this.width - 50 && this.ball.position.y > this.height - 100) {
                    Body.applyForce(this.ball, this.ball.position, { x: 0, y: -0.2 });
                }
            }

            drain() {
                this.balls--; this.updateUI();
                if(this.balls > 0) this.spawnBall();
                else { this.state = 'menu'; document.getElementById('overlay').style.display='flex'; }
            }

            updateUI() {
                document.getElementById('score-val').textContent = this.score.toLocaleString();
                document.getElementById('balls-val').textContent = this.balls;
            }
        }
        window.game = new PinballElite();
    </script>
</body>
</html>
