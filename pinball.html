<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pinball Pro: Classic Edition</title>
    <style>
        :root {
            --cabinet: #2d1b0e;
            --playfield: #1a1a1a;
            --steel: #b0c4de;
            --gold: #ffd700;
            --led-off: #330000;
            --led-on: #ff0000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: #111;
            color: white;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* --- DMD SCOREBOARD --- */
        #scoreboard {
            width: 100%;
            max-width: 500px;
            background: #000;
            border: 4px solid #444;
            padding: 10px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 20px rgba(255, 100, 0, 0.2);
        }

        .dmd-text {
            color: #ff5500;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 5px #ff5500;
            letter-spacing: 2px;
        }

        .dmd-label { font-size: 0.6rem; color: #884400; display: block; }

        /* --- GAME CABINET --- */
        #game-area {
            position: relative;
            flex: 1;
            width: 100%;
            max-width: 500px;
            background: #000;
            margin: 10px 0;
            border: 8px solid var(--cabinet);
            border-radius: 10px 10px 0 0;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* --- CONTROLS --- */
        #controls {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            gap: 20px;
            background: #222;
        }

        .flipper-btn {
            flex: 1;
            height: 80px;
            background: #b91c1c;
            border: 4px solid #7f1d1d;
            border-radius: 10px;
            color: white;
            font-weight: 900;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 0 #550000;
            cursor: pointer;
        }
        .flipper-btn:active { transform: translateY(5px); box-shadow: none; }

        .plunger-btn {
            width: 80px;
            background: var(--gold);
            border-color: #b8860b;
            color: black;
            border-radius: 50%;
            box-shadow: 0 5px 0 #8b6508;
        }

        /* --- OVERLAYS --- */
        #overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100; text-align: center;
        }

        h1 { font-size: 3rem; color: var(--gold); text-shadow: 2px 2px 0 #b8860b; margin-bottom: 10px; }
        
        .btn-start {
            padding: 15px 40px; font-size: 1.5rem;
            background: #ef4444; color: white; border: none;
            border-radius: 5px; cursor: pointer; font-weight: 900;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .back-link {
            position: absolute; top: 10px; left: 10px;
            color: #666; text-decoration: none; font-size: 0.7rem;
            z-index: 200;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← EXIT</a>

    <div id="scoreboard">
        <div>
            <span class="dmd-label">SCORE</span>
            <div id="score-display" class="dmd-text">000,000</div>
        </div>
        <div style="text-align: right;">
            <span class="dmd-label">BALL</span>
            <div id="ball-display" class="dmd-text">1</div>
        </div>
    </div>

    <div id="game-area">
        <canvas id="pinball-canvas"></canvas>
        <div id="overlay">
            <h1>PINBALL<br>CLASSIC</h1>
            <p style="color: #ccc; margin-bottom: 20px;">Insert Coin to Start</p>
            <button class="btn-start" onclick="game.start()">START</button>
        </div>
    </div>

    <div id="controls">
        <div class="flipper-btn" id="btn-left">LEFT</div>
        <button class="plunger-btn" id="btn-plunger">🚀</button>
        <div class="flipper-btn" id="btn-right">RIGHT</div>
    </div>

    <!-- Matter.js Physics Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

    <script>
        const { Engine, Render, Runner, World, Bodies, Body, Composite, Events, Vector, Constraint } = Matter;

        class PinballGame {
            constructor() {
                this.score = 0;
                this.balls = 3;
                this.state = 'menu';
                
                this.initPhysics();
                this.createTable();
                this.setupInputs();
                
                this.runner = Runner.create();
                Runner.run(this.runner, this.engine);
                Render.run(this.render);
            }

            initPhysics() {
                this.engine = Engine.create();
                this.world = this.engine.world;
                this.world.gravity.y = 1.0; // Standard gravity

                const container = document.getElementById('game-area');
                this.width = container.clientWidth;
                this.height = container.clientHeight;

                this.render = Render.create({
                    canvas: document.getElementById('pinball-canvas'),
                    engine: this.engine,
                    options: {
                        width: this.width,
                        height: this.height,
                        wireframes: false,
                        background: '#1a1a1a'
                    }
                });
            }

            createTable() {
                const W = this.width;
                const H = this.height;
                const wallOpts = { isStatic: true, render: { fillStyle: '#333' } };
                
                // --- BOUNDARIES ---
                World.add(this.world, [
                    // Outer Walls
                    Bodies.rectangle(W/2, -50, W, 100, wallOpts), // Top (Invisible)
                    Bodies.rectangle(-10, H/2, 20, H, wallOpts),  // Left
                    Bodies.rectangle(W+10, H/2, 20, H, wallOpts), // Right
                    
                    // Plunger Lane Wall
                    Bodies.rectangle(W - 35, H - 150, 10, 300, wallOpts),
                    
                    // Top Arch
                    Bodies.fromVertices(W/2, 50, [
                        {x:0, y:0}, {x: W-20, y:0}, {x: W-20, y: 20}, 
                        {x: W-60, y: 60}, {x: 60, y: 60}, {x: 20, y: 20}, {x: 0, y: 20}
                    ], { isStatic: true, render: { fillStyle: '#222' } }, true)
                ]);

                // --- FLIPPERS ---
                this.leftFlipper = this.createFlipper(W/2 - 70, H - 80, 'left');
                this.rightFlipper = this.createFlipper(W/2 + 50, H - 80, 'right');

                // --- SLINGSHOTS (Above Flippers) ---
                const slingOpts = { isStatic: true, label: 'slingshot', render: { fillStyle: '#444', strokeStyle: '#fff', lineWidth: 2 } };
                World.add(this.world, [
                    Bodies.fromVertices(W/2 - 120, H - 140, [{x:0, y:0}, {x:40, y:80}, {x:0, y:100}], slingOpts, true),
                    Bodies.fromVertices(W/2 + 100, H - 140, [{x:40, y:0}, {x:0, y:80}, {x:40, y:100}], slingOpts, true)
                ]);

                // --- BUMPERS ---
                const bumpOpts = { isStatic: true, label: 'bumper', render: { fillStyle: '#ef4444', strokeStyle: '#fff', lineWidth: 3 } };
                World.add(this.world, [
                    Bodies.circle(W/2, 180, 25, bumpOpts),
                    Bodies.circle(W/2 - 60, 250, 25, bumpOpts),
                    Bodies.circle(W/2 + 60, 250, 25, bumpOpts)
                ]);

                // --- DRAIN LANES ---
                World.add(this.world, [
                    Bodies.fromVertices(20, H - 100, [{x:0,y:0}, {x:40,y:150}, {x:0,y:150}], { isStatic: true, render: { fillStyle: '#111' } }, true),
                    Bodies.fromVertices(W-60, H - 100, [{x:40,y:0}, {x:0,y:150}, {x:40,y:150}], { isStatic: true, render: { fillStyle: '#111' } }, true)
                ]);

                // --- PLUNGER STOP ---
                this.plunger = Bodies.rectangle(W - 20, H - 20, 30, 20, { 
                    isStatic: true, label: 'plunger', render: { fillStyle: '#ffd700' } 
                });
                World.add(this.world, this.plunger);

                // --- COLLISION EVENTS ---
                Events.on(this.engine, 'collisionStart', (e) => this.handleCollisions(e));
                Events.on(this.engine, 'beforeUpdate', () => this.updateLoop());
            }

            createFlipper(x, y, side) {
                const w = 90, h = 20;
                const flipper = Bodies.rectangle(x, y, w, h, {
                    label: 'flipper',
                    chamfer: { radius: 10 },
                    render: { fillStyle: '#fff' },
                    density: 0.1
                });
                
                const pivotX = side === 'left' ? x - w/2 + 10 : x + w/2 - 10;
                const pivot = Bodies.circle(pivotX, y, 5, { isStatic: true, render: { visible: false } });
                
                const constraint = Constraint.create({
                    bodyA: flipper, pointA: { x: side==='left' ? -w/2+10 : w/2-10, y: 0 },
                    bodyB: pivot,
                    stiffness: 0.1, length: 0,
                    render: { visible: false }
                });

                // Add stopper to prevent full rotation
                const stopperX = side === 'left' ? x - w/2 - 10 : x + w/2 + 10;
                const stopper = Bodies.circle(stopperX, y + 20, 20, { isStatic: true, render: { visible: false } });

                World.add(this.world, [flipper, pivot, constraint, stopper]);
                return { body: flipper, side, pivot };
            }

            spawnBall() {
                if (this.ball) World.remove(this.world, this.ball);
                
                this.ball = Bodies.circle(this.width - 20, this.height - 60, 12, {
                    label: 'ball',
                    restitution: 0.5,
                    density: 0.05, // Heavy steel ball
                    friction: 0.001,
                    render: { fillStyle: '#b0c4de' }
                });
                World.add(this.world, this.ball);
            }

            handleCollisions(event) {
                event.pairs.forEach(pair => {
                    const labels = [pair.bodyA.label, pair.bodyB.label];
                    const ballBody = pair.bodyA.label === 'ball' ? pair.bodyA : (pair.bodyB.label === 'ball' ? pair.bodyB : null);
                    
                    if (!ballBody) return;

                    // Bumper Hit
                    if (labels.includes('bumper')) {
                        this.addScore(1000);
                        const bumper = pair.bodyA.label === 'bumper' ? pair.bodyA : pair.bodyB;
                        // Active kick
                        const force = Vector.mult(Vector.normalise(Vector.sub(ballBody.position, bumper.position)), 0.04);
                        Body.applyForce(ballBody, ballBody.position, force);
                        // Flash effect (simple color swap)
                        bumper.render.fillStyle = '#fff';
                        setTimeout(() => bumper.render.fillStyle = '#ef4444', 100);
                    }

                    // Slingshot Hit
                    if (labels.includes('slingshot')) {
                        this.addScore(250);
                        Body.applyForce(ballBody, ballBody.position, { x: 0, y: -0.02 });
                    }
                });
            }

            addScore(points) {
                this.score += points;
                document.getElementById('score-display').innerText = this.score.toLocaleString();
            }

            start() {
                document.getElementById('overlay').style.display = 'none';
                this.score = 0;
                this.balls = 3;
                this.state = 'playing';
                this.addScore(0);
                this.updateBalls();
                this.spawnBall();
            }

            updateBalls() {
                document.getElementById('ball-display').innerText = this.balls;
            }

            flip(side, active) {
                const flipper = side === 'left' ? this.leftFlipper : this.rightFlipper;
                const angle = side === 'left' ? (active ? -0.5 : 0.5) : (active ? 0.5 : -0.5);
                
                // Manual torque for snappier feel
                if(active) {
                    Body.setAngularVelocity(flipper.body, side === 'left' ? -0.5 : 0.5);
                }
                
                // Constraint-based angle target logic handled in update loop or via simple force
                // For simplicity/stability in Matter.js without plugins:
                const current = flipper.body.angle;
                const target = angle;
                const torque = (target - current) * 0.2;
                flipper.body.torque = torque;
            }

            plunge() {
                if (this.ball && this.ball.position.x > this.width - 40 && this.ball.position.y > this.height - 150) {
                    Body.applyForce(this.ball, this.ball.position, { x: 0, y: -0.15 });
                }
            }

            updateLoop() {
                if (this.state !== 'playing') return;

                // Flipper Servo Logic
                [this.leftFlipper, this.rightFlipper].forEach(f => {
                    const target = f.side === 'left' ? (this.keys.left ? -0.6 : 0.5) : (this.keys.right ? 0.6 : -0.5);
                    const diff = target - f.body.angle;
                    // Apply torque to move towards target angle
                    f.body.torque = diff * 200; 
                    Body.setAngularVelocity(f.body, diff * 0.5);
                });

                // Ball Drain
                if (this.ball && this.ball.position.y > this.height + 50) {
                    this.balls--;
                    if (this.balls > 0) {
                        this.updateBalls();
                        this.spawnBall();
                    } else {
                        this.state = 'over';
                        document.getElementById('overlay').style.display = 'flex';
                        document.querySelector('#overlay h1').innerText = "GAME OVER";
                        document.querySelector('#overlay p').innerText = `Final Score: ${this.score.toLocaleString()}`;
                    }
                }
            }

            setupInputs() {
                this.keys = { left: false, right: false };

                window.addEventListener('keydown', e => {
                    if (e.key === 'ArrowLeft' || e.key === 'a') this.keys.left = true;
                    if (e.key === 'ArrowRight' || e.key === 'd') this.keys.right = true;
                    if (e.key === 'ArrowDown' || e.key === ' ') this.plunge();
                });

                window.addEventListener('keyup', e => {
                    if (e.key === 'ArrowLeft' || e.key === 'a') this.keys.left = false;
                    if (e.key === 'ArrowRight' || e.key === 'd') this.keys.right = false;
                });

                // Touch
                const btnL = document.getElementById('btn-left');
                const btnR = document.getElementById('btn-right');
                const btnP = document.getElementById('btn-plunger');

                btnL.addEventListener('touchstart', (e) => { e.preventDefault(); this.keys.left = true; });
                btnL.addEventListener('touchend', (e) => { e.preventDefault(); this.keys.left = false; });
                
                btnR.addEventListener('touchstart', (e) => { e.preventDefault(); this.keys.right = true; });
                btnR.addEventListener('touchend', (e) => { e.preventDefault(); this.keys.right = false; });

                btnP.addEventListener('touchstart', (e) => { e.preventDefault(); this.plunge(); });
            }
        }

        const game = new PinballGame();
        window.game = game; // Expose for start button
    </script>
</body>
</html>
