<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subway Runner 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif; touch-action: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .stats-container {
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0,0,0,0.6); padding: 12px 24px; border-radius: 20px;
            color: #fff; font-size: 24px; border: 2px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(5px);
        }
        #game-over { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; border-radius: 30px; padding: 40px;
            text-align: center; display: none; pointer-events: auto; color: #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4); width: 320px;
        }
        .btn {
            background: #ffcc00; color: #fff; padding: 15px 40px; border-radius: 50px;
            font-weight: 800; cursor: pointer; border: none; transition: 0.2s; 
            margin-top: 20px; text-transform: uppercase; font-size: 18px;
            box-shadow: 0 5px 0 #ccaa00; text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .btn:hover { background: #ffd633; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #ccaa00; }
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; color: #2c3e50; pointer-events: auto;
        }
        .title-card { font-size: 3.5rem; font-weight: 900; color: #2c3e50; margin-bottom: 0; line-height: 1; text-align: center; text-shadow: 2px 2px 0px #fff; }
        .subtitle { color: #e67e22; font-weight: bold; margin-bottom: 30px; font-size: 1.4rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="stats-container">
            SCORE: <span id="score-val">0</span>
        </div>
        
        <div id="start-screen">
            <h1 class="title-card">SUBWAY<br>RUNNER</h1>
            <p class="subtitle">STEADY RUNNING</p>
            <button class="btn" onclick="startGame()">Tap to Play</button>
            <div class="mt-8 text-gray-600 text-sm text-center bg-white/50 p-4 rounded-xl">
                <b>PC:</b> Arrow Keys or WASD<br>
                <b>Mobile:</b> Swipe to Move/Jump/Slide
            </div>
        </div>

        <div id="game-over">
            <h2 style="font-size: 28px; font-weight: 900; margin-bottom: 10px; color: #e74c3c;">OUTFUN!</h2>
            <p class="text-gray-600">Distance Covered: <span id="final-score" class="font-bold">0</span>m</p>
            <button class="btn" onclick="resetGame()">Run Again</button>
        </div>
    </div>

    <script>
        // --- Game Constants (HEAVILY SLOWED DOWN) ---
        const LANE_WIDTH = 4.5;
        const LANES = [-LANE_WIDTH, 0, LANE_WIDTH];
        const INITIAL_SPEED = 0.12; // Lowered from 0.18 for a much calmer start
        const SPEED_INC = 0.000005; // Reduced acceleration by 4x for a very slow build-up
        const SPAWN_CHANCE = 0.008; // Lowered spawn frequency further
        
        let scene, camera, renderer, player, playerGroup;
        let playerTargetLane = 1; 
        let currentSpeed = INITIAL_SPEED;
        let score = 0;
        let isGameOver = false;
        let isJumping = false;
        let isSliding = false;
        let gameActive = false;
        
        let obstacles = [];
        let coins = [];
        let worldChunks = [];
        let touchStart = { x: 0, y: 0 };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 30, 160); // Increased fog distance for better visibility

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 15); // Pulled back for a wider view of oncoming objects
            camera.lookAt(0, 2, -10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
            scene.add(hemiLight);

            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(10, 20, 10);
            sun.castShadow = true;
            scene.add(sun);

            createCharacter();
            createInitialWorld();
            
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', handleInput);
            document.addEventListener('touchstart', e => { 
                touchStart.x = e.touches[0].clientX; 
                touchStart.y = e.touches[0].clientY; 
            }, {passive: true});
            document.addEventListener('touchend', handleSwipe, {passive: true});

            animate();
        }

        function createCharacter() {
            playerGroup = new THREE.Group();
            
            const mat = new THREE.MeshPhongMaterial({ color: 0x3498db });
            const skinMat = new THREE.MeshPhongMaterial({ color: 0xffdbac });
            const shirtMat = new THREE.MeshPhongMaterial({ color: 0xe67e22 });
            const shoeMat = new THREE.MeshPhongMaterial({ color: 0x333333 });

            // Torso
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.1, 0.5), shirtMat);
            torso.position.y = 1.45;
            playerGroup.add(torso);

            // Head
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.55, 0.55), skinMat);
            head.position.y = 2.25;
            playerGroup.add(head);

            // Legs
            const legGeo = new THREE.BoxGeometry(0.35, 0.9, 0.35);
            const legL = new THREE.Mesh(legGeo, mat);
            legL.position.set(-0.22, 0.45, 0);
            const legR = new THREE.Mesh(legGeo, mat);
            legR.position.set(0.22, 0.45, 0);
            playerGroup.add(legL, legR);

            // Shoes
            const shoeGeo = new THREE.BoxGeometry(0.4, 0.2, 0.5);
            const shoeL = new THREE.Mesh(shoeGeo, shoeMat);
            shoeL.position.set(-0.22, 0.1, 0.05);
            const shoeR = new THREE.Mesh(shoeGeo, shoeMat);
            shoeR.position.set(0.22, 0.1, 0.05);
            playerGroup.add(shoeL, shoeR);

            playerGroup.traverse(n => { if(n.isMesh) n.castShadow = true; });
            player = playerGroup;
            player.position.set(LANES[playerTargetLane], 0, 0);
            scene.add(player);
        }

        function addWorldChunk(z) {
            const chunk = new THREE.Group();
            
            // Ground
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(24, 60),
                new THREE.MeshPhongMaterial({ color: 0x6e7a7b })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            chunk.add(ground);

            // Rails
            const railGeo = new THREE.BoxGeometry(0.25, 0.15, 60);
            const railMat = new THREE.MeshPhongMaterial({ color: 0x2c3e50 });
            
            LANES.forEach(lx => {
                const r1 = new THREE.Mesh(railGeo, railMat);
                r1.position.set(lx - 0.75, 0.07, 0);
                const r2 = new THREE.Mesh(railGeo, railMat);
                r2.position.set(lx + 0.75, 0.07, 0);
                chunk.add(r1, r2);

                for(let i = -30; i < 30; i += 2.5) {
                    const tie = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.08, 0.5), new THREE.MeshPhongMaterial({color: 0x4a3728}));
                    tie.position.set(lx, 0.04, i);
                    chunk.add(tie);
                }
            });

            chunk.position.z = z;
            scene.add(chunk);
            worldChunks.push(chunk);
        }

        function createInitialWorld() {
            for(let i = 0; i < 6; i++) {
                addWorldChunk(i * -60);
            }
        }

        function spawnObstacle() {
            if (!gameActive || isGameOver) return;
            
            // Ensure significant gap between obstacles for ease of play
            if (obstacles.length > 0) {
                const lastObs = obstacles[obstacles.length-1];
                if (lastObs.position.z > -80) return; 
            }

            const lane = Math.floor(Math.random() * 3);
            const type = Math.floor(Math.random() * 3);
            let obs;

            if (type === 0) { // Barrier
                obs = new THREE.Group();
                const bar = new THREE.Mesh(new THREE.BoxGeometry(3.5, 1.2, 0.6), new THREE.MeshPhongMaterial({color: 0xc0392b}));
                bar.position.y = 0.6;
                obs.add(bar);
                obs.userData = { type: 'jump', h: 1.2 };
            } else if (type === 1) { // High Sign
                obs = new THREE.Group();
                const sign = new THREE.Mesh(new THREE.BoxGeometry(3.5, 1.8, 0.4), new THREE.MeshPhongMaterial({color: 0x2c3e50}));
                sign.position.y = 3.2;
                const postL = new THREE.Mesh(new THREE.BoxGeometry(0.25, 4.5, 0.25), new THREE.MeshPhongMaterial({color: 0x7f8c8d}));
                postL.position.set(-1.6, 2, 0);
                const postR = postL.clone();
                postR.position.set(1.6, 2, 0);
                obs.add(sign, postL, postR);
                obs.userData = { type: 'slide', h: 3.2 };
            } else { // Train
                obs = new THREE.Mesh(new THREE.BoxGeometry(4.2, 5.5, 18), new THREE.MeshPhongMaterial({color: 0x27ae60}));
                obs.position.y = 2.75;
                obs.userData = { type: 'train', h: 5.5 };
            }

            obs.position.x = LANES[lane];
            obs.position.z = -180; // Spawn even further back so user has time to see it
            scene.add(obs);
            obstacles.push(obs);

            if (Math.random() > 0.5) spawnCoin(lane, -180);
        }

        function spawnCoin(lane, z) {
            const coin = new THREE.Mesh(
                new THREE.CylinderGeometry(0.5, 0.5, 0.15, 16),
                new THREE.MeshPhongMaterial({ color: 0xf1c40f, emissive: 0x442200 })
            );
            coin.rotation.x = Math.PI / 2;
            coin.position.set(LANES[lane], 1.5, z - 8);
            scene.add(coin);
            coins.push(coin);
        }

        function handleInput(e) {
            if (!gameActive) return;
            if (e.key === 'ArrowLeft' || e.key === 'a') moveLane(-1);
            if (e.key === 'ArrowRight' || e.key === 'd') moveLane(1);
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') jump();
            if (e.key === 'ArrowDown' || e.key === 's') slide();
        }

        function handleSwipe(e) {
            const dx = e.changedTouches[0].clientX - touchStart.x;
            const dy = e.changedTouches[0].clientY - touchStart.y;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 40) moveLane(1); else if (dx < -40) moveLane(-1);
            } else {
                if (dy < -40) jump(); else if (dy > 40) slide();
            }
        }

        function moveLane(dir) {
            playerTargetLane = Math.max(0, Math.min(2, playerTargetLane + dir));
        }

        function jump() {
            if (isJumping || isSliding) return;
            isJumping = true;
            let v = 0.3; 
            const g = 0.01; // Slightly floatier jump for better control
            const loop = setInterval(() => {
                player.position.y += v;
                v -= g;
                if (player.position.y <= 0) {
                    player.position.y = 0;
                    isJumping = false;
                    clearInterval(loop);
                }
            }, 16);
        }

        function slide() {
            if (isSliding || isJumping) return;
            isSliding = true;
            player.scale.y = 0.45;
            setTimeout(() => { 
                player.scale.y = 1; 
                isSliding = false; 
            }, 850); // Increased slide time for easier dodging
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!gameActive || isGameOver) { renderer.render(scene, camera); return; }

            currentSpeed += SPEED_INC;
            score += (currentSpeed * 5); 
            document.getElementById('score-val').innerText = Math.floor(score);

            // Lane transition speed
            player.position.x = THREE.MathUtils.lerp(player.position.x, LANES[playerTargetLane], 0.1);
            
            // Animation
            player.rotation.z = (player.position.x - LANES[playerTargetLane]) * 0.08;
            player.rotation.x = Math.sin(Date.now() * 0.004) * 0.03; // Slower bobbing

            // Move World
            const frameMove = currentSpeed * 60;
            worldChunks.forEach(chunk => {
                chunk.position.z += frameMove;
                if (chunk.position.z > 60) chunk.position.z -= 360; 
            });

            // Obstacle processing
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.position.z += frameMove;

                const dx = Math.abs(player.position.x - obs.position.x);
                const dz = Math.abs(player.position.z - obs.position.z);
                
                // Extra forgiving hitboxes
                const hitZ = obs.userData.type === 'train' ? 9.0 : 1.0;
                if (dz < hitZ && dx < 1.2) {
                    if (obs.userData.type === 'jump' && player.position.y < 1.1) endGame();
                    if (obs.userData.type === 'slide' && !isSliding) endGame();
                    if (obs.userData.type === 'train' && player.position.y < 4) endGame();
                }

                if (obs.position.z > 30) { 
                    scene.remove(obs); 
                    obstacles.splice(i, 1); 
                }
            }

            // Coin processing
            for (let i = coins.length - 1; i >= 0; i--) {
                const c = coins[i];
                c.position.z += frameMove;
                c.rotation.z += 0.03;
                
                if (Math.abs(player.position.x - c.position.x) < 1.8 && Math.abs(player.position.z - c.position.z) < 2) {
                    score += 100;
                    scene.remove(c);
                    coins.splice(i, 1);
                } else if (c.position.z > 30) {
                    scene.remove(c);
                    coins.splice(i, 1);
                }
            }

            if (Math.random() < SPAWN_CHANCE) spawnObstacle();
            
            renderer.render(scene, camera);
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameActive = true;
        }

        function endGame() {
            isGameOver = true;
            gameActive = false;
            document.getElementById('final-score').innerText = Math.floor(score);
            document.getElementById('game-over').style.display = 'block';
        }

        function resetGame() {
            score = 0; currentSpeed = INITIAL_SPEED; isGameOver = false; gameActive = true;
            playerTargetLane = 1; player.position.set(0,0,0);
            obstacles.forEach(o => scene.remove(o)); coins.forEach(c => scene.remove(c));
            obstacles = []; coins = [];
            document.getElementById('game-over').style.display = 'none';
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
