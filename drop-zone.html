<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=5">
<title>Drop Zone — K2 Games</title>
<meta name="theme-color" content="#6f1d1b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{--ink:#fffaf0;--muted:#d8c7b7;--glass:rgba(47,24,19,.78);--gold:#f4c95d;--red:#b3392f;--green:#2f7d55}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#25140f;color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{touch-action:manipulation}
canvas{display:block;width:100%;height:100%;touch-action:none}
button{font:inherit}
.hud{position:fixed;inset:0;pointer-events:none}
.top{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;padding:max(10px,env(safe-area-inset-top)) 10px 0}
.panel{background:var(--glass);border:1px solid #ffffff2a;backdrop-filter:blur(10px);border-radius:14px;padding:8px 10px;min-width:0;box-shadow:0 8px 24px #0004}
.label{font-size:9px;color:var(--muted);letter-spacing:.11em;text-transform:uppercase;font-weight:900;white-space:nowrap}
.value{font-size:clamp(15px,4.7vw,22px);font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mission{position:fixed;top:max(70px,calc(env(safe-area-inset-top) + 62px));left:50%;transform:translateX(-50%);width:min(300px,74vw);text-align:center}
.bar{height:5px;margin-top:7px;background:#ffffff1f;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--gold))}
.toolbar{position:fixed;right:10px;top:max(112px,calc(env(safe-area-inset-top) + 104px));display:grid;gap:8px;pointer-events:auto}
.iconbtn{width:44px;height:44px;border:1px solid #ffffff30;border-radius:14px;background:var(--glass);color:white;font-size:21px;font-weight:900;box-shadow:0 8px 22px #0004}
.controls{position:fixed;inset:auto 0 max(12px,env(safe-area-inset-bottom));display:flex;align-items:flex-end;justify-content:space-between;padding:0 14px;pointer-events:none}
.stick,.alt,.drop{pointer-events:auto;user-select:none;touch-action:none}
.stick{width:118px;height:118px;border-radius:50%;background:#2f1813c9;border:2px solid #ffffff38;position:relative;box-shadow:inset 0 0 28px #0007}
.knob{position:absolute;width:50px;height:50px;border-radius:50%;left:32px;top:32px;background:linear-gradient(145deg,#fff8e8,#b7d2bd);box-shadow:0 8px 16px #0007}
.right{display:flex;gap:12px;align-items:flex-end}.alt{width:54px;height:124px;border-radius:27px;background:#2f1813c9;border:2px solid #ffffff38;position:relative}.alt:before{content:'ALT';position:absolute;top:-20px;width:100%;text-align:center;font-size:10px;color:var(--muted);font-weight:900}.alt-knob{position:absolute;left:7px;bottom:42px;width:36px;height:36px;border-radius:50%;background:linear-gradient(145deg,#fff8e8,#65d9ff)}
.drop{width:88px;height:88px;border:0;border-radius:50%;background:radial-gradient(circle at 35% 25%,#fff7bd,var(--gold) 55%,#d27b1e);box-shadow:0 8px 0 #7d4310,0 14px 28px #0007;color:#352000;font-weight:1000;font-size:15px}.drop:active{transform:translateY(5px);box-shadow:0 3px 0 #7d4310}
.overlay{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 50% 22%,#a44a3f66,#170b08f4);padding:18px;z-index:20}
.card{width:min(560px,95vw);padding:26px;border:1px solid #ffffff30;border-radius:26px;background:#2b1712ef;text-align:center;box-shadow:0 30px 90px #0009}
.logo{font-size:clamp(46px,12vw,78px);line-height:.86;font-weight:1000;letter-spacing:-.08em;background:linear-gradient(#fffaf0,#f4c95d 60%,#c65740);-webkit-background-clip:text;color:transparent}.tag{margin:15px 0 18px;color:var(--muted);font-weight:750}
.how{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}.how div{background:#ffffff0e;border-radius:14px;padding:11px 6px;font-size:12px;color:#eadfd4}.how b{display:block;color:white;font-size:20px;margin-bottom:5px}.start,.secondary{border:0;border-radius:14px;padding:14px 24px;font-size:16px;font-weight:950}.start{background:linear-gradient(135deg,var(--gold),#f09b42);color:#341d08}.secondary{background:#ffffff12;color:white;border:1px solid #ffffff26}.menu-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.small{font-size:11px;color:#bca999;margin-top:13px;line-height:1.5}.hidden{display:none!important}
.toast{position:fixed;left:50%;top:42%;transform:translate(-50%,-50%) scale(.9);font-size:clamp(22px,7vw,34px);font-weight:1000;text-shadow:0 4px 18px #000;opacity:0;transition:.2s;pointer-events:none;z-index:12}.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.zoom-hint{position:fixed;left:50%;bottom:max(150px,calc(env(safe-area-inset-bottom) + 145px));transform:translateX(-50%);font-size:10px;color:#f8e7d6aa;background:#2b1712b8;border:1px solid #ffffff22;border-radius:999px;padding:6px 10px;pointer-events:none}
@media(min-width:900px){.controls{opacity:.34}.controls:hover{opacity:1}.toolbar{top:90px}}
@media(max-width:380px){.top{gap:5px;padding-left:6px;padding-right:6px}.panel{padding:7px 6px}.stick{width:104px;height:104px}.knob{left:27px;top:27px}.drop{width:78px;height:78px}.alt{height:112px}.right{gap:8px}.controls{padding:0 8px}}
@media(orientation:landscape) and (max-height:520px){.mission{top:max(58px,calc(env(safe-area-inset-top) + 52px))}.controls{padding:0 20px}.stick{width:98px;height:98px}.knob{left:23px;top:23px}.alt{height:98px}.drop{width:74px;height:74px}.toolbar{top:max(62px,calc(env(safe-area-inset-top) + 56px))}.zoom-hint{display:none}}
</style>
</head>
<body>
<canvas id="game" aria-label="Drop Zone game canvas"></canvas>
<div class="hud hidden" id="hud">
  <div class="top">
    <div class="panel"><div class="label">Score</div><div class="value" id="score">0</div></div>
    <div class="panel"><div class="label">Combo</div><div class="value" id="combo">×1</div></div>
    <div class="panel"><div class="label">Lives</div><div class="value" id="lives">♥♥♥♥</div></div>
    <div class="panel"><div class="label">Best</div><div class="value" id="best">0</div></div>
  </div>
  <div class="panel mission"><div class="label" id="missionText">Hit 5 cars</div><div class="bar"><i id="missionBar"></i></div></div>
  <div class="toolbar">
    <button class="iconbtn" id="zoomIn" aria-label="Zoom in">＋</button>
    <button class="iconbtn" id="zoomOut" aria-label="Zoom out">−</button>
    <button class="iconbtn" id="pause" aria-label="Pause game">Ⅱ</button>
    <button class="iconbtn" id="home" aria-label="Return to menu">⌂</button>
  </div>
</div>
<div class="controls hidden" id="controls"><div class="stick" id="stick"><div class="knob" id="knob"></div></div><div class="right"><div class="alt" id="alt"><div class="alt-knob" id="altKnob"></div></div><button class="drop" id="drop">DROP</button></div></div>
<div class="zoom-hint hidden" id="zoomHint">Pinch or use + / − to zoom</div>
<div class="toast" id="toast"></div>
<div class="overlay" id="menu"><div class="card"><div class="logo">DROP<br>ZONE</div><div class="tag" id="tag">A bird's-eye arcade run over the packed streets of Italy.</div><div class="how"><div><b>🕹️</b>Fly</div><div><b>↕️</b>Altitude</div><div><b>🤌</b>Pinch zoom</div></div><div class="menu-actions"><button class="start" id="start">START FLIGHT</button></div><div class="small">Desktop: WASD / arrows · Q & E altitude · Space to drop · + / − zoom · P pause</div></div></div>
<div class="overlay hidden" id="pauseMenu"><div class="card"><div class="logo" style="font-size:54px">PAUSED</div><div class="tag">The pigeon is circling.</div><div class="menu-actions"><button class="start" id="resume">RESUME</button><button class="secondary" id="restart">RESTART</button><button class="secondary" id="quit">HOME</button></div></div></div>
<script>
(()=>{'use strict';
const c=document.querySelector('#game'),ctx=c.getContext('2d'),$=s=>document.querySelector(s);
let W=0,H=0,D=1,last=0,on=false,paused=false,time=0,spawn=0,road=0,shake=0,score=0,combo=1,comboTimer=0,miss=0,best=+(localStorage.getItem('drop-zone-best')||0),zoom=1,zoomTarget=1;
let drops=[],targets=[],splats=[],parts=[],pinch=null,audio=null;
const p={x:0,y:0,vx:0,vy:0,alt:.55,ta:.55},inp={x:0,y:0,k:{}};
const missions=[['car',5,'Hit 5 cars'],['person',7,'Tag 7 pedestrians'],['building',4,'Splatter 4 rooftops'],['scooter',5,'Tag 5 scooters'],['any',10,'Land 10 hits']];let mission={};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),rnd=(a,b)=>a+Math.random()*(b-a);
function resize(){D=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;ctx.setTransform(D,0,0,D,0,0);if(!p.x){p.x=W/2;p.y=H*.34}}
addEventListener('resize',resize);resize();$('#best').textContent=best;
function ensureAudio(){if(audio)return;audio=new (window.AudioContext||window.webkitAudioContext)()}
function beep(freq=440,dur=.06,type='sine',gain=.035){try{ensureAudio();const o=audio.createOscillator(),g=audio.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(gain,audio.currentTime);g.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+dur);o.connect(g).connect(audio.destination);o.start();o.stop(audio.currentTime+dur)}catch{}}
function haptic(pattern){if(navigator.vibrate)navigator.vibrate(pattern)}
function livesText(){const left=Math.max(0,4-Math.floor(miss/3));return '♥'.repeat(left)+'♡'.repeat(4-left)}
function updateHud(){$('#score').textContent=score|0;$('#combo').textContent='×'+combo;$('#lives').textContent=livesText();$('#best').textContent=Math.max(best,score|0);$('#missionText').textContent=mission.text+' '+mission.done+'/'+mission.need;$('#missionBar').style.width=mission.done/mission.need*100+'%'}
function nextMission(){let choices=missions.filter(m=>m[0]!==mission.type),a=choices[Math.random()*choices.length|0];mission={type:a[0],need:a[1],text:a[2],done:0}}
function reset(){score=0;combo=1;comboTimer=0;miss=0;time=0;spawn=0;drops=[];targets=[];splats=[];parts=[];p.x=W/2;p.y=H*.32;p.alt=p.ta=.55;zoom=zoomTarget=1;mission={};nextMission();updateHud()}
function start(){ensureAudio();reset();on=true;paused=false;$('#menu').classList.add('hidden');$('#pauseMenu').classList.add('hidden');$('#hud').classList.remove('hidden');$('#controls').classList.remove('hidden');$('#zoomHint').classList.remove('hidden');setTimeout(()=>$('#zoomHint').classList.add('hidden'),3500);last=performance.now();requestAnimationFrame(loop)}
function end(reason='Flight over'){on=false;paused=false;best=Math.max(best,score|0);localStorage.setItem('drop-zone-best',best);$('#menu').classList.remove('hidden');$('#pauseMenu').classList.add('hidden');$('#hud').classList.add('hidden');$('#controls').classList.add('hidden');$('#zoomHint').classList.add('hidden');$('#tag').textContent=reason+' — '+(score|0)+' points. Best '+best;$('#start').textContent='FLY AGAIN';beep(130,.35,'sawtooth',.05);haptic([60,40,100])}
function setPaused(value){if(!on)return;paused=value;$('#pauseMenu').classList.toggle('hidden',!paused);if(!paused){last=performance.now();requestAnimationFrame(loop)}}
$('#start').onclick=start;$('#resume').onclick=()=>setPaused(false);$('#restart').onclick=start;$('#quit').onclick=()=>end('Flight ended');$('#pause').onclick=()=>setPaused(true);$('#home').onclick=()=>end('Flight ended');
function toast(t){const e=$('#toast');e.textContent=t;e.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>e.classList.remove('show'),650)}
function addTarget(){const lane=Math.random()*5|0,r=Math.random(),type=r<.34?'car':r<.58?'person':r<.74?'scooter':'building';targets.push({type,x:W*(.10+lane*.20)+rnd(-14,14),y:H+70,w:type==='car'?32:type==='person'?15:type==='scooter'?23:62,h:type==='car'?58:type==='person'?24:type==='scooter'?40:66,s:type==='car'?rnd(90,150):type==='person'?rnd(35,65):type==='scooter'?rnd(80,125):0,v:type==='car'?130:type==='person'?190:type==='scooter'?220:105,hue:rnd(0,360),dir:Math.random()<.5?-1:1})}
function drop(){if(!on||paused||drops.length>4)return;drops.push({gx:p.x,gy:p.y+95+p.alt*230/zoom,y:p.y,t:0,d:.32+p.alt*.48});beep(260,.035,'square',.025);haptic(15)}
$('#drop').onpointerdown=e=>{e.preventDefault();drop()};
addEventListener('keydown',e=>{inp.k[e.code]=1;if(e.code==='Space'){e.preventDefault();drop()}if(!on&&e.code==='Enter')start();if(e.code==='KeyP'&&on)setPaused(!paused);if(e.code==='Equal'||e.code==='NumpadAdd')setZoom(zoomTarget+.1);if(e.code==='Minus'||e.code==='NumpadSubtract')setZoom(zoomTarget-.1)});addEventListener('keyup',e=>inp.k[e.code]=0);
function setZoom(v){zoomTarget=clamp(v,.7,1.75);toast('ZOOM '+Math.round(zoomTarget*100)+'%')}
$('#zoomIn').onclick=()=>setZoom(zoomTarget+.12);$('#zoomOut').onclick=()=>setZoom(zoomTarget-.12);
function stick(el,knob,cb){let id=null;const move=e=>{if(e.pointerId!==id)return;const r=el.getBoundingClientRect(),dx=e.clientX-r.left-r.width/2,dy=e.clientY-r.top-r.height/2,max=r.width*.32,mag=Math.min(max,Math.hypot(dx,dy)),a=Math.atan2(dy,dx),xx=Math.cos(a)*mag,yy=Math.sin(a)*mag;knob.style.transform=`translate(${xx}px,${yy}px)`;cb(xx/max,yy/max)};el.onpointerdown=e=>{id=e.pointerId;el.setPointerCapture(id);move(e)};el.onpointermove=move;el.onpointerup=el.onpointercancel=e=>{if(e.pointerId===id){id=null;knob.style.transform='';cb(0,0)}}}
stick($('#stick'),$('#knob'),(a,b)=>{inp.x=a;inp.y=b});
let altId=null,A=$('#alt'),AK=$('#altKnob');function moveAlt(e){if(e.pointerId!==altId)return;const r=A.getBoundingClientRect();p.ta=clamp(1-(e.clientY-r.top)/r.height,0,1);AK.style.bottom=8+p.ta*(r.height-52)+'px'}A.onpointerdown=e=>{altId=e.pointerId;A.setPointerCapture(altId);moveAlt(e)};A.onpointermove=moveAlt;A.onpointerup=A.onpointercancel=e=>{if(e.pointerId===altId)altId=null};
const touches=new Map();c.addEventListener('pointerdown',e=>{if(e.pointerType==='touch'){touches.set(e.pointerId,{x:e.clientX,y:e.clientY});if(touches.size===2){const a=[...touches.values()];pinch={dist:Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y),zoom:zoomTarget}}}}, {passive:false});c.addEventListener('pointermove',e=>{if(!touches.has(e.pointerId))return;touches.set(e.pointerId,{x:e.clientX,y:e.clientY});if(touches.size===2&&pinch){const a=[...touches.values()],dist=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);setZoom(pinch.zoom*dist/pinch.dist)}},{passive:false});function clearTouch(e){touches.delete(e.pointerId);if(touches.size<2)pinch=null}c.addEventListener('pointerup',clearTouch);c.addEventListener('pointercancel',clearTouch);
function hit(t,d){t.hit=1;const q=clamp(1-Math.hypot(t.x-d.gx,t.y-d.gy)/55,0,1),pts=Math.round(t.v*(.7+q*.8)*combo);score+=pts;combo=Math.min(9,combo+1);comboTimer=2.2;shake=5;toast('+'+pts+(q>.82?' PERFECT!':''));beep(q>.82?880:620,.08,'triangle',.05);haptic(q>.82?[25,25,40]:25);splats.push({x:d.gx,y:d.gy,r:8+q*14,l:1});for(let i=0;i<14;i++)parts.push({x:d.gx,y:d.gy,vx:rnd(-110,110),vy:rnd(-110,40),l:rnd(.3,.7)});if(mission.type==='any'||mission.type===t.type)mission.done++;if(mission.done>=mission.need){score+=1000;toast('MISSION +1000');beep(1040,.2,'sine',.06);haptic([30,30,60]);nextMission()}updateHud()}
function update(dt){time+=dt;road=(road+170*dt)%100;zoom+=(zoomTarget-zoom)*Math.min(1,dt*8);let kx=(inp.k.KeyD||inp.k.ArrowRight?1:0)-(inp.k.KeyA||inp.k.ArrowLeft?1:0),ky=(inp.k.KeyS||inp.k.ArrowDown?1:0)-(inp.k.KeyW||inp.k.ArrowUp?1:0);if(inp.k.KeyQ)p.ta-=dt;if(inp.k.KeyE)p.ta+=dt;p.ta=clamp(p.ta,0,1);p.alt+=(p.ta-p.alt)*dt*5;p.vx+=(clamp(inp.x+kx,-1,1)*380-p.vx)*dt*7;p.vy+=(clamp(inp.y+ky,-1,1)*300-p.vy)*dt*7;p.x=clamp(p.x+p.vx*dt,35,W-35);p.y=clamp(p.y+p.vy*dt,95,H*.68);spawn-=dt;if(spawn<=0){addTarget();if(Math.random()<.45)addTarget();spawn=Math.max(.18,.58-time*.0018)}for(const t of targets){t.y-=t.s*dt+74*dt;if(t.type==='person'||t.type==='scooter')t.x+=Math.sin((time+t.hue)*1.3)*10*dt*t.dir}targets=targets.filter(t=>t.y>-110&&!t.hit);for(const d of drops){d.t+=dt;const z=clamp(d.t/d.d,0,1);d.y=p.y+(d.gy-p.y)*z;if(z>=1&&!d.done){d.done=1;const f=targets.filter(t=>!t.hit).sort((a,b)=>Math.hypot(a.x-d.gx,a.y-d.gy)-Math.hypot(b.x-d.gx,b.y-d.gy))[0];if(f&&Math.abs(f.x-d.gx)<f.w*.72+18&&Math.abs(f.y-d.gy)<f.h*.62+18)hit(f,d);else{combo=1;miss++;toast('MISS '+miss+'/12');beep(120,.09,'square',.035);haptic(40);updateHud();splats.push({x:d.gx,y:d.gy,r:8,l:.55})}}}drops=drops.filter(d=>!d.done);splats.forEach(s=>s.l-=dt);splats=splats.filter(s=>s.l>0);for(const q of parts){q.x+=q.vx*dt;q.y+=q.vy*dt;q.vy+=130*dt;q.l-=dt}parts=parts.filter(q=>q.l>0);if(comboTimer>0&&(comboTimer-=dt)<=0){combo=1;updateHud()}if(miss>=12)end();shake*=.82}
function rr(a,b,w,h,r){ctx.beginPath();ctx.roundRect(a,b,w,h,r)}
function drawItaly(){ctx.fillStyle='#cfa66b';ctx.fillRect(0,0,W,H);const block=92/zoom,street=46/zoom,offset=(road/zoom)%block;for(let gy=-block+offset;gy<H+block;gy+=block){for(let gx=-block;gx<W+block;gx+=block){const col=((gx/block+gy/block)|0)%4;ctx.fillStyle=['#d67b54','#e6b566','#b95f4b','#e2c181'][Math.abs(col)];rr(gx+street*.35,gy+street*.22,block-street*.55,block-street*.4,5);ctx.fill();ctx.fillStyle='#f5dfb3';for(let wx=gx+street*.48;wx<gx+block-street*.35;wx+=18/zoom){for(let wy=gy+street*.38;wy<gy+block-street*.25;wy+=19/zoom){ctx.fillRect(wx,wy,6/zoom,8/zoom)}}ctx.fillStyle='#7d3c31';ctx.fillRect(gx+street*.35,gy+street*.22,block-street*.55,7/zoom)}}ctx.fillStyle='#8c7864';for(let gx=block*.2;gx<W+block;gx+=block){ctx.fillRect(gx-street*.18,0,street*.36,H)}for(let gy=block*.4-offset;gy<H+block;gy+=block){ctx.fillRect(0,gy-street*.16,W,street*.32)}ctx.strokeStyle='#f3e2bf88';ctx.lineWidth=Math.max(1,2/zoom);ctx.setLineDash([14/zoom,16/zoom]);for(let gx=block*.2;gx<W+block;gx+=block){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke()}for(let gy=block*.4-offset;gy<H+block;gy+=block){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke()}ctx.setLineDash([]);ctx.fillStyle='#397c4b';for(let i=0;i<20;i++){const tx=(i*137%W),ty=(i*211+road*1.2)%H;ctx.beginPath();ctx.arc(tx,ty,7/zoom,0,Math.PI*2);ctx.fill()}ctx.fillStyle='#6c9bcf';ctx.beginPath();ctx.arc(W*.83,H*.22,28/zoom,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#e8f4ff';ctx.lineWidth=3/zoom;ctx.stroke();ctx.fillStyle='#fff';ctx.font=`${16/zoom}px serif`;ctx.fillText('⛲',W*.83-9/zoom,H*.22+6/zoom)}
function drawTarget(t){ctx.save();ctx.translate(t.x,t.y);if(t.type==='car'){ctx.rotate(.02*Math.sin(time*3+t.hue));ctx.fillStyle=`hsl(${t.hue} 70% 52%)`;rr(-t.w/2,-t.h/2,t.w,t.h,7);ctx.fill();ctx.fillStyle='#dceeff';rr(-t.w*.32,-t.h*.27,t.w*.64,t.h*.25,4);ctx.fill();ctx.fillStyle='#202833';ctx.fillRect(-t.w*.55,-t.h*.32,4,t.h*.18);ctx.fillRect(t.w*.45,-t.h*.32,4,t.h*.18);ctx.fillRect(-t.w*.55,t.h*.16,4,t.h*.18);ctx.fillRect(t.w*.45,t.h*.16,4,t.h*.18)}else if(t.type==='person'){ctx.fillStyle='#f2c49b';ctx.beginPath();ctx.arc(0,-8,5,0,Math.PI*2);ctx.fill();ctx.strokeStyle=`hsl(${t.hue} 60% 45%)`;ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(0,-2);ctx.lineTo(0,10);ctx.stroke();ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,1);ctx.lineTo(-6,7);ctx.moveTo(0,1);ctx.lineTo(6,7);ctx.moveTo(0,10);ctx.lineTo(-5,18);ctx.moveTo(0,10);ctx.lineTo(5,18);ctx.stroke()}else if(t.type==='scooter'){ctx.strokeStyle='#1e293b';ctx.lineWidth=3;ctx.beginPath();ctx.arc(-6,12,5,0,Math.PI*2);ctx.arc(7,12,5,0,Math.PI*2);ctx.stroke();ctx.strokeStyle=`hsl(${t.hue} 70% 50%)`;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(-5,10);ctx.lineTo(4,1);ctx.lineTo(9,11);ctx.moveTo(4,1);ctx.lineTo(4,-7);ctx.stroke();ctx.fillStyle='#f2c49b';ctx.beginPath();ctx.arc(4,-12,5,0,Math.PI*2);ctx.fill()}else{ctx.fillStyle=`hsl(${t.hue} 35% 52%)`;rr(-t.w/2,-t.h/2,t.w,t.h,6);ctx.fill();ctx.fillStyle='#e9d9b0';ctx.fillRect(-t.w*.36,-t.h*.28,t.w*.72,t.h*.56);ctx.fillStyle='#9b3d2f';ctx.beginPath();ctx.moveTo(-t.w*.43,-t.h*.28);ctx.lineTo(0,-t.h*.48);ctx.lineTo(t.w*.43,-t.h*.28);ctx.closePath();ctx.fill();ctx.fillStyle='#3f6f45';ctx.fillRect(-5,-3,10,18)}ctx.restore()}
function drawBird(){ctx.save();ctx.translate(p.x,p.y);const s=.8+p.alt*.35;ctx.scale(s,s);ctx.shadowColor='#0008';ctx.shadowBlur=16;ctx.fillStyle='#d9dde3';ctx.beginPath();ctx.ellipse(0,0,22,30,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#8f98a5';ctx.beginPath();ctx.ellipse(-20,0,18,8,-.45,0,Math.PI*2);ctx.ellipse(20,0,18,8,.45,0,Math.PI*2);ctx.fill();ctx.fillStyle='#44515f';ctx.beginPath();ctx.arc(0,-18,12,0,Math.PI*2);ctx.fill();ctx.fillStyle='#efb43f';ctx.beginPath();ctx.moveTo(0,-25);ctx.lineTo(8,-20);ctx.lineTo(0,-18);ctx.closePath();ctx.fill();ctx.restore();ctx.strokeStyle='#fff8';ctx.lineWidth=1.5;ctx.beginPath();ctx.ellipse(p.x,p.y+95+p.alt*230/zoom,18+8/zoom,10+5/zoom,0,0,Math.PI*2);ctx.stroke()}
function draw(){ctx.save();ctx.translate(rnd(-shake,shake),rnd(-shake,shake));ctx.translate(W/2,H/2);ctx.scale(zoom,zoom);ctx.translate(-W/2,-H/2);drawItaly();for(const s of splats){ctx.globalAlpha=s.l;ctx.fillStyle='#f8f0df';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1;for(const t of targets)drawTarget(t);for(const d of drops){ctx.fillStyle='#fff4cf';ctx.beginPath();ctx.arc(d.gx,d.y,5+d.t*7,0,Math.PI*2);ctx.fill()}for(const q of parts){ctx.globalAlpha=Math.max(0,q.l*2);ctx.fillStyle='#fff3cf';ctx.fillRect(q.x,q.y,3,3)}ctx.globalAlpha=1;drawBird();ctx.restore()}
function loop(now){if(!on||paused)return;const dt=Math.min(.034,(now-last)/1000||.016);last=now;update(dt);draw();if(on&&!paused)requestAnimationFrame(loop)}
