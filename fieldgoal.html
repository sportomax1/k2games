<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Field Goal Pro: Stadium Elite - K2 games</title>
    <style>
        :root {
            --grass: #22c55e;
            --grass-dark: #16a34a;
            --sky-top: #0ea5e9;
            --sky-bottom: #bae6fd;
            --gold: #facc15;
            --accent: #ef4444;
            --panel: rgba(15, 23, 42, 0.85);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: #020617;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        #game-container {
            position: relative;
            flex: 1;
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
            overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* HUD Layer */
        #hud {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; pointer-events: none; z-index: 100;
        }

        .stat-card {
            background: var(--panel);
            backdrop-filter: blur(12px);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            min-width: 120px;
        }

        .stat-val { font-size: 1.5rem; font-weight: 900; color: var(--gold); font-family: monospace; }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; display: block; }

        /* Wind Indicator */
        #wind-box {
            position: absolute; top: 90px; left: 50%; transform: translateX(-50%);
            background: var(--panel); padding: 8px 20px; border-radius: 50px;
            border: 1px solid var(--border); display: flex; align-items: center; gap: 10px;
            z-index: 100; backdrop-filter: blur(10px);
        }
        #wind-arrow { font-size: 1.2rem; transition: transform 0.3s ease; display: inline-block; }
        #wind-val { font-size: 0.9rem; font-weight: 900; font-family: monospace; }

        /* Meters */
        #meters-ui {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: none; flex-direction: column; align-items: center; gap: 15px;
            z-index: 150; background: var(--panel); padding: 20px;
            border-radius: 24px; border: 2px solid var(--gold);
            width: 90%; max-width: 380px; backdrop-filter: blur(15px);
        }

        .meter-label { font-size: 0.7rem; font-weight: 900; color: #fff; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }

        .meter-container { 
            width: 100%; height: 30px; background: #000; border-radius: 15px; 
            border: 2px solid rgba(255,255,255,0.2); position: relative; overflow: hidden; 
        }
        
        .meter-fill { height: 100%; width: 0%; transition: width 0.05s linear; }
        .power-fill { background: linear-gradient(to right, #22c55e, #facc15, #ef4444); }
        
        .meter-marker { 
            position: absolute; top: 0; bottom: 0; width: 4px; background: #fff; 
            box-shadow: 0 0 15px #fff; z-index: 30; transform: translateX(-50%);
        }
        
        .target-zone { 
            position: absolute; top: 0; bottom: 0; left: 40%; width: 20%; 
            background: rgba(34, 197, 94, 0.3); border-left: 1px solid rgba(255,255,255,0.3); 
            border-right: 1px solid rgba(255,255,255,0.3); z-index: 10;
        }

        .active-meter { border-color: var(--gold) !important; box-shadow: 0 0 15px rgba(250, 204, 21, 0.3); }

        /* Overlays */
        #banner {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 4rem; font-weight: 900; color: var(--gold); text-shadow: 0 10px 40px rgba(0,0,0,0.8);
            display: none; z-index: 200; font-style: italic; text-align: center; width: 100%;
            pointer-events: none; animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        .screen {
            position: absolute; inset: 0; background: rgba(2, 6, 23, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 500; text-align: center; padding: 20px; backdrop-filter: blur(10px);
        }

        .btn-large {
            background: var(--gold); color: #000; border: none; padding: 1.2rem 4rem;
            border-radius: 100px; font-weight: 900; cursor: pointer; margin-top: 2rem;
            font-size: 1.4rem; box-shadow: 0 10px 30px rgba(250, 204, 21, 0.4);
            text-transform: uppercase; letter-spacing: 2px; transition: transform 0.2s;
        }
        .btn-large:active { transform: scale(0.95); }

        .kick-btn {
            position: absolute; bottom: 30px; right: 30px; width: 90px; height: 90px;
            background: var(--gold); border-radius: 50%; border: 5px solid #fff;
            color: #000; font-weight: 900; font-size: 1.1rem; cursor: pointer;
            z-index: 160; box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: none;
        }
        @media (max-width: 900px) { .kick-btn { display: block; } }

        .back-link {
            position: fixed; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 12px; z-index: 1000;
            font-weight: bold; font-size: 0.8rem; backdrop-filter: blur(10px);
        }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CCZ9JJGEDP');
    </script>
</head>
<body>
    <div id="game-container">
        <a href="index.html" class="back-link">← HUB</a>
        <canvas id="gameCanvas"></canvas>
        
        <div id="hud">
            <div class="stat-card">
                <span class="stat-label">Season Record</span>
                <div id="best-val" class="stat-val">0</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">Current Streak</span>
                <div id="score-val" class="stat-val">0</div>
            </div>
        </div>

        <div id="wind-box">
            <span class="stat-label" style="font-size: 0.5rem; opacity: 0.5;">WIND</span>
            <div id="wind-arrow">➡️</div>
            <span id="wind-val">0 MPH</span>
        </div>

        <div id="meters-ui">
            <div style="width:100%;">
                <div class="meter-label">ACCURACY</div>
                <div class="meter-container active-meter" id="angle-container">
                    <div class="target-zone"></div>
                    <div id="angle-marker" class="meter-marker" style="left: 50%"></div>
                </div>
            </div>
            <div style="width:100%;">
                <div class="meter-label">POWER</div>
                <div class="meter-container" id="power-container">
                    <div id="power-fill" class="meter-fill power-fill"></div>
                </div>
            </div>
        </div>

        <div id="banner">IT'S GOOD!</div>
        <button class="kick-btn" onclick="game.handleAction()">KICK</button>

        <div id="start-screen" class="screen">
            <h1 style="font-size: 4rem; font-style: italic; color: var(--gold); font-weight: 900; line-height: 1;">FIELD GOAL<br>PRO</h1>
            <p style="opacity: 0.6; margin-top: 15px; font-size: 1.2rem;">All-Pro Championship Stadium</p>
            <div style="margin-top: 30px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; font-size: 0.9rem; max-width: 350px;">
                <b>Desktop:</b> Press SPACE to time meters.<br>
                <b>Mobile:</b> Tap KICK button or Flick the ball up.
            </div>
            <button class="btn-large" onclick="game.start()">KICK OFF</button>
        </div>
    </div>

    <script>
        class FieldGoalPro {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.resize();

                this.state = 'menu';
                this.score = 0;
                this.best = parseInt(localStorage.getItem('k2-fieldgoal-hi')) || 0;
                
                this.ball = { x: 0, y: 0, z: 0, vx: 0, vy: 0, vz: 0, rot: 0, scale: 1 };
                this.wind = { force: 0, angle: 0 };
                this.meters = { angle: 50, power: 0, aDir: 1, pDir: 1, speed: 1.5 }; // SLOWER METERS
                
                this.kicker = { x: 0, y: 0, legAngle: 0, state: 'idle' };
                this.referee = { x: 500, y: 310, state: 'idle', armsY: 0 };
                
                this.particles = [];
                this.initFans();

                this.setupInputs();
                window.onresize = () => this.resize();
                
                this.loop = this.loop.bind(this);
                requestAnimationFrame(this.loop);
            }

            initFans() {
                this.fans = [];
                for(let i=0; i<80; i++) {
                    this.fans.push({
                        x: Math.random() * 1000,
                        y: 180 + Math.random() * 80,
                        offset: Math.random() * Math.PI * 2,
                        color: ['#fff', '#facc15', '#3b82f6', '#ef4444'][Math.floor(Math.random()*4)]
                    });
                }
            }

            resize() {
                this.canvas.width = 1000;
                this.canvas.height = 750;
                // Scale factor for drawing if window is small
                const rect = this.canvas.getBoundingClientRect();
                this.scaleX = 1000 / rect.width;
                this.scaleY = 750 / rect.height;
            }

            setupInputs() {
                window.onkeydown = (e) => { if(e.code === 'Space') this.handleAction(); };
                
                // Flick support
                let startPos = { x: 0, y: 0, time: 0 };
                this.canvas.ontouchstart = (e) => {
                    if (this.state !== 'angle') return;
                    startPos = { x: e.touches[0].clientX, y: e.touches[0].clientY, time: Date.now() };
                };
                this.canvas.ontouchend = (e) => {
                    if (this.state !== 'angle') return;
                    const dx = e.changedTouches[0].clientX - startPos.x;
                    const dy = e.changedTouches[0].clientY - startPos.y;
                    const dt = Date.now() - startPos.time;
                    if (dy < -50 && dt < 300) {
                        this.meters.angle = 50 + (dx * 0.1);
                        this.meters.power = Math.min(100, Math.abs(dy) * 0.3);
                        this.kick();
                    }
                };
            }

            start() {
                this.state = 'angle';
                document.getElementById('start-screen').style.display = 'none';
                this.resetRound();
            }

            resetRound() {
                this.ball = { x: 500, y: 680, z: 0, vx: 0, vy: 0, vz: 0, rot: 0, scale: 1 };
                this.kicker = { x: 440, y: 680, legAngle: 0, state: 'idle' };
                this.referee.state = 'idle';
                this.meters.angle = 50;
                this.meters.power = 0;
                this.state = 'angle';
                
                // Wind logic
                this.wind.force = Math.random() * 12;
                this.wind.angle = (Math.random() - 0.5) * Math.PI;
                const arrow = document.getElementById('wind-arrow');
                arrow.style.transform = `rotate(${this.wind.angle}rad)`;
                document.getElementById('wind-val').textContent = Math.floor(this.wind.force) + " MPH";
            }

            handleAction() {
                if (this.state === 'angle') {
                    this.state = 'power';
                } else if (this.state === 'power') {
                    this.kick();
                }
            }

            kick() {
                this.state = 'kicking';
                this.kicker.state = 'animating';
                
                setTimeout(() => {
                    this.state = 'flight';
                    // FORGIVING PHYSICS
                    const p = this.meters.power / 100;
                    const a = (this.meters.angle - 50) / 50; // -1 to 1
                    
                    this.ball.vy = -18 - (p * 12);
                    this.ball.vx = a * 10;
                    this.ball.vz = 8 + (p * 15);
                }, 200);
            }

            update() {
                if (this.state === 'angle') {
                    this.meters.angle += this.meters.speed * this.meters.aDir;
                    if (this.meters.angle >= 100 || this.meters.angle <= 0) this.meters.aDir *= -1;
                } else if (this.state === 'power') {
                    this.meters.power += (this.meters.speed + 0.5) * this.meters.pDir;
                    if (this.meters.power >= 100 || this.meters.power <= 0) this.meters.pDir *= -1;
                }

                if (this.state === 'flight') {
                    this.ball.x += this.ball.vx;
                    this.ball.y += this.ball.vy;
                    this.ball.z += this.ball.vz;
                    
                    this.ball.vy += 0.45; // Gravity
                    // Wind impact
                    this.ball.vx += Math.cos(this.wind.angle) * (this.wind.force * 0.012);
                    this.ball.rot += 0.2;

                    if (this.ball.z > 350) this.resolve();
                }

                if (this.kicker.state === 'animating') {
                    this.kicker.legAngle -= 0.3;
                    if (this.kicker.legAngle < -1.5) this.kicker.state = 'done';
                }

                this.particles.forEach((p, i) => {
                    p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                    if (p.life <= 0) this.particles.splice(i, 1);
                });

                this.updateUI();
            }

            resolve() {
                this.state = 'result';
                // Success detection: Crossbar is at z=350, y=340, width=190
                const isGood = Math.abs(this.ball.x - 500) < 95 && this.ball.y < 340;
                
                const banner = document.getElementById('banner');
                banner.textContent = isGood ? "IT'S GOOD! 🙌" : "NO GOOD ❌";
                banner.style.display = 'block';
                banner.style.color = isGood ? 'var(--gold)' : 'var(--accent)';
                this.referee.state = isGood ? 'good' : 'bad';
                
                if (isGood) {
                    this.score++;
                    if (this.score > this.best) {
                        this.best = this.score;
                        localStorage.setItem('k2-fieldgoal-hi', this.best);
                    }
                    this.spawnParticles(this.ball.x, this.ball.y, 'var(--gold)', 40);
                } else {
                    this.score = 0;
                }

                setTimeout(() => {
                    banner.style.display = 'none';
                    this.resetRound();
                }, 2000);
            }

            updateUI() {
                document.getElementById('score-val').textContent = this.score;
                document.getElementById('best-val').textContent = this.best;
                
                const ui = document.getElementById('meters-ui');
                if (this.state === 'angle' || this.state === 'power') {
                    ui.style.display = 'flex';
                    document.getElementById('angle-container').className = `meter-container ${this.state === 'angle' ? 'active-meter' : ''}`;
                    document.getElementById('power-container').className = `meter-container ${this.state === 'power' ? 'active-meter' : ''}`;
                } else ui.style.display = 'none';

                document.getElementById('angle-marker').style.left = this.meters.angle + '%';
                document.getElementById('power-fill').style.width = this.meters.power + '%';
            }

            spawnParticles(x, y, color, count) {
                for(let i=0; i<count; i++) {
                    this.particles.push({ 
                        x, y, 
                        vx: (Math.random()-0.5)*20, 
                        vy: (Math.random()-0.5)*20, 
                        life: 1, color 
                    });
                }
            }

            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, 1000, 750);

                // Sky
                const sky = ctx.createLinearGradient(0, 0, 0, 350);
                sky.addColorStop(0, '#0ea5e9'); sky.addColorStop(1, '#bae6fd');
                ctx.fillStyle = sky; ctx.fillRect(0, 0, 1000, 350);

                // Stadium / Fans
                ctx.fillStyle = '#1e293b'; ctx.fillRect(0, 180, 1000, 150);
                this.fans.forEach(f => {
                    const jump = Math.sin(Date.now()/200 + f.offset) * (this.referee.state === 'good' ? 15 : 3);
                    ctx.fillStyle = f.color;
                    ctx.beginPath(); ctx.arc(f.x, f.y + jump, 5, 0, Math.PI*2); ctx.fill();
                });

                // Field
                for(let i=0; i<15; i++) {
                    const y = 350 + i * 30;
                    ctx.fillStyle = i % 2 === 0 ? '#22c55e' : '#16a34a';
                    ctx.fillRect(0, y, 1000, 30);
                    // Yard lines
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.fillRect(0, y, 1000, 2);
                }

                // Goal Posts
                ctx.save();
                ctx.translate(500, 340);
                ctx.strokeStyle = '#facc15'; ctx.lineWidth = 14; ctx.lineCap = 'round';
                ctx.shadowBlur = 10; ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.moveTo(0, 150); ctx.lineTo(0, 0); // Post
                ctx.moveTo(-100, 0); ctx.lineTo(100, 0); // Bar
                ctx.moveTo(-100, 0); ctx.lineTo(-100, -200); // Left
                ctx.moveTo(100, 0); ctx.lineTo(100, -200); // Right
                ctx.stroke();
                // Flags
                ctx.fillStyle = '#ef4444';
                const fOff = Math.sin(Date.now()/200) * 5;
                ctx.fillRect(-100, -200, 15 + fOff, 10);
                ctx.fillRect(100, -200, 15 + fOff, 10);
                ctx.restore();

                // Referee
                ctx.font = '50px Arial';
                ctx.textAlign = 'center';
                if (this.referee.state === 'good') ctx.fillText('🙌', this.referee.x, this.referee.y);
                else if (this.referee.state === 'bad') ctx.fillText('🙅‍♂️', this.referee.x, this.referee.y);
                else ctx.fillText('👨‍⚖️', this.referee.x, this.referee.y);

                // Kicker
                if (this.state !== 'flight' && this.state !== 'result') {
                    ctx.save();
                    ctx.translate(this.kicker.x, this.kicker.y);
                    ctx.font = '100px Arial'; ctx.textAlign = 'center';
                    ctx.fillText('🏃', 0, 0);
                    ctx.save();
                    ctx.translate(15, -10); ctx.rotate(this.kicker.legAngle);
                    ctx.font = '50px Arial'; ctx.fillText('👟', 10, 20);
                    ctx.restore();
                    ctx.restore();
                }

                // Ball
                if (this.state !== 'menu') {
                    const ballScale = Math.max(0.4, 1.2 - (this.ball.z / 350));
                    ctx.save();
                    ctx.translate(this.ball.x, this.ball.y);
                    ctx.scale(ballScale, ballScale);
                    ctx.rotate(this.ball.rot);
                    // Ball Shadow
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.beginPath(); ctx.ellipse(0, 30, 40, 15, 0, 0, Math.PI*2); ctx.fill();
                    // Ball
                    const ballGrad = ctx.createRadialGradient(-10, -10, 5, 0, 0, 30);
                    ballGrad.addColorStop(0, '#a16207'); ballGrad.addColorStop(1, '#451a03');
                    ctx.fillStyle = ballGrad;
                    ctx.beginPath(); ctx.ellipse(0, 0, 30, 20, 0, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.moveTo(-15, 0); ctx.lineTo(15, 0); ctx.stroke();
                    for(let i=-10; i<=10; i+=5) { ctx.beginPath(); ctx.moveTo(i, -5); ctx.lineTo(i, 5); ctx.stroke(); }
                    ctx.restore();
                }

                // Particles
                this.particles.forEach(p => {
                    ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2); ctx.fill();
                });
                ctx.globalAlpha = 1;
            }

            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(this.loop);
            }
        }

        const game = new FieldGoalPro();
    </script>
</body>
</html>
