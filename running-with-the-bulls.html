<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Running With the Bulls</title><meta name="theme-color" content="#b91c1c"><style>*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#120b08;color:#fff;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;touch-action:none}canvas{display:block;width:100vw;height:100vh}.hud{position:fixed;z-index:8;top:max(10px,env(safe-area-inset-top));left:10px;right:10px;display:flex;justify-content:space-between;gap:8px;pointer-events:none}.stats{display:flex;gap:8px;flex-wrap:wrap}.pill,.btn{border:1px solid #ffffff30;background:#1c1917d9;color:#fff;border-radius:14px;padding:9px 12px;font-weight:900;box-shadow:0 8px 24px #0006;backdrop-filter:blur(8px)}.pill b{color:#fcd34d}.btn{pointer-events:auto;cursor:pointer}.overlay{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 50% 25%,#7f1d1d99,#090504e8 60%);z-index:30;padding:20px;text-align:center}.card{width:min(92vw,650px);padding:26px;border:1px solid #ffffff2c;border-radius:26px;background:linear-gradient(180deg,#29211dcc,#17110fcc);box-shadow:0 30px 100px #000b}.card h1{font-size:clamp(42px,9vw,78px);line-height:.86;margin:0;color:#fcd34d;text-shadow:0 6px 0 #7f1d1d}.card p{color:#e7e5e4;line-height:1.5}.primary{border:0;border-radius:999px;background:linear-gradient(135deg,#fbbf24,#f97316);color:#431407;font-size:18px;font-weight:1000;padding:14px 24px;cursor:pointer}.controls{position:fixed;inset:0;z-index:12;pointer-events:none}.joy{position:absolute;left:18px;bottom:calc(18px + env(safe-area-inset-bottom));width:118px;height:118px;border-radius:50%;border:2px solid #ffffff35;background:#0005;pointer-events:auto}.nub{position:absolute;left:36px;top:36px;width:46px;height:46px;border-radius:50%;background:#fcd34dcc;box-shadow:0 6px 18px #0007}.action{position:absolute;right:22px;bottom:calc(25px + env(safe-area-inset-bottom));width:94px;height:94px;border-radius:50%;border:2px solid #ffffff50;background:linear-gradient(135deg,#dc2626,#7f1d1d);color:#fff;font-weight:1000;font-size:14px;pointer-events:auto;box-shadow:0 8px 0 #450a0a}.action:active{transform:translateY(5px);box-shadow:0 3px 0 #450a0a}.home{position:fixed;left:50%;bottom:6px;transform:translateX(-50%);z-index:20;color:#fff;text-decoration:none;font-size:12px;font-weight:900;background:#0008;padding:6px 10px;border-radius:999px}@media(pointer:fine){.joy,.action{opacity:.48}}@media(max-width:650px){.pill{font-size:12px;padding:7px 9px}.joy{width:106px;height:106px}.nub{left:30px;top:30px}.action{width:82px;height:82px}}</style></head><body><canvas id="c"></canvas><div class="hud"><div class="stats"><div class="pill">DIST <b id="dist">0</b>m</div><div class="pill">FLOW <b id="flow">x1</b></div><div class="pill">HERD <b id="herd">SAFE</b></div></div><button class="btn" id="pause">PAUSE</button></div><div class="controls"><div class="joy" id="joy"><div class="nub" id="nub"></div></div><button class="action" id="dodge">DODGE</button></div><a class="home" href="index.html">← K2 HUB</a><div class="overlay" id="ov"><div class="card"><h1>RUNNING WITH<br>THE BULLS</h1><p>A fast top-down street escape. Steering is immediate, forward momentum is automatic, and dodge gives a short invulnerable side-step.</p><p><b>Move:</b> WASD/arrows or joystick &nbsp; <b>Dodge:</b> Space/Shift or button</p><button class="primary" id="start">START RUN</button></div></div><script>(()=>{const c=document.getElementById('c'),x=c.getContext('2d'),$=id=>document.getElementById(id),clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),rnd=(a,b)=>a+Math.random()*(b-a);let W=1,H=1,D=1,run=false,paused=false,last=0,scroll=0,dist=0,speed=300,flow=1,flowT=0,pressure=0,spawn=0,keys={},joy={x:0,y:0},obs=[],dust=[],texts=[],shake=0,flash=0,player={x:0,y:0,r:17,dodge:1,inv:0,lean:0};function resize(){D=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0);if(!run){player.x=W/2;player.y=H*.64}}addEventListener('resize',resize);resize();function obstacle(){const t=['cart','barrier','hay','stall','runner'][Math.floor(Math.random()*5)],w=t==='barrier'?rnd(85,140):t==='stall'?rnd(70,105):rnd(38,64),h=t==='stall'?60:rnd(28,46);obs.push({x:rnd(70,W-70-w),y:-90,w,h,t,passed:false,hit:false})}function reset(){run=true;paused=false;scroll=0;dist=0;speed=300;flow=1;flowT=0;pressure=0;spawn=.5;obs=[];dust=[];texts=[];shake=0;flash=0;player.x=W/2;player.y=H*.64;player.dodge=1;player.inv=0;$('ov').style.display='none';$('pause').textContent='PAUSE';last=performance.now()}function rectHit(p,o){return p.x+p.r>o.x&&p.x-p.r<o.x+o.w&&p.y+p.r>o.y&&p.y-p.r<o.y+o.h}function update(dt){if(paused)return;speed=Math.min(530,speed+dt*7);scroll+=speed*dt;dist+=speed*dt*.04;spawn-=dt;if(spawn<=0){obstacle();if(Math.random()<.28)obstacle();spawn=rnd(.42,.7)*Math.max(.58,320/speed)}let ax=((keys.ArrowRight||keys.KeyD)?1:0)-((keys.ArrowLeft||keys.KeyA)?1:0)+joy.x,ay=((keys.ArrowDown||keys.KeyS)?1:0)-((keys.ArrowUp||keys.KeyW)?1:0)+joy.y,l=Math.hypot(ax,ay);if(l>1){ax/=l;ay/=l}const dodgePressed=keys.Space||keys.ShiftLeft||keys.ShiftRight||$('dodge').dataset.down==='1';if(dodgePressed&&player.dodge>=1){const dir=ax||joy.x||1;player.x+=Math.sign(dir)*92;player.inv=.38;player.dodge=0;shake=7;for(let i=0;i<18;i++)dust.push({x:player.x,y:player.y,vx:rnd(-70,70),vy:rnd(20,100),t:rnd(.25,.55),s:rnd(2,6)});keys.Space=0;$('dodge').dataset.down='0'}player.dodge=Math.min(1,player.dodge+dt*.78);player.inv=Math.max(0,player.inv-dt);player.lean+=(ax-player.lean)*Math.min(1,dt*12);const move=280;player.x=clamp(player.x+ax*move*dt,55,W-55);player.y=clamp(player.y+ay*175*dt,95,H*.73);obs.forEach(o=>{o.y+=speed*dt;if(!o.passed&&o.y>player.y+o.h){o.passed=true;const gap=Math.abs(player.x-(o.x+o.w/2))-o.w/2;if(gap<32){flow=Math.min(8,flow+1);flowT=3;texts.push({x:player.x,y:player.y-38,t:1,txt:'NEAR MISS x'+flow})}}if(!o.hit&&player.inv<=0&&rectHit(player,o)){o.hit=true;pressure+=30;flow=1;flowT=0;shake=14;flash=.22;texts.push({x:player.x,y:player.y-42,t:1,txt:'STUMBLE!'});o.y=H+100}});obs=obs.filter(o=>o.y<H+130);flowT-=dt;if(flowT<=0)flow=1;pressure=Math.max(0,pressure-dt*3.2);if(pressure>=100){run=false;$('ov').style.display='grid';$('ov').querySelector('h1').innerHTML='CAUGHT!';$('ov').querySelector('p').innerHTML='You ran <b>'+Math.floor(dist)+'</b> meters with a best flow of <b>x'+flow+'</b>.';$('start').textContent='RUN AGAIN'}dust.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.t-=dt});dust=dust.filter(p=>p.t>0);texts.forEach(t=>{t.y-=28*dt;t.t-=dt});texts=texts.filter(t=>t.t>0);shake=Math.max(0,shake-dt*28);flash=Math.max(0,flash-dt);$('dist').textContent=Math.floor(dist);$('flow').textContent='x'+flow;$('herd').textContent=pressure<35?'SAFE':pressure<70?'CLOSE':'DANGER'}function road(){x.fillStyle='#d9a066';x.fillRect(0,0,W,H);x.fillStyle='#d6d3d1';x.fillRect(38,0,W-76,H);x.fillStyle='#57534e';x.fillRect(54,0,W-108,H);x.fillStyle='#f8fafc';for(let y=(scroll%100)-100;y<H;y+=100){x.fillRect(W/2-3,y,6,50)}x.fillStyle='#b45309';for(let y=(scroll%210)-210;y<H;y+=210){x.fillRect(0,y,38,120);x.fillRect(W-38,y+70,38,120)}x.fillStyle='#fef3c7';for(let y=(scroll%160)-160;y<H;y+=160){x.fillRect(9,y,18,34);x.fillRect(W-27,y+55,18,34)}}function drawObstacle(o){x.save();x.translate(o.x,o.y);if(o.t==='cart'){x.fillStyle='#7c2d12';x.fillRect(0,8,o.w,o.h-8);x.fillStyle='#fde68a';x.fillRect(6,0,o.w-12,14);x.fillStyle='#111827';x.beginPath();x.arc(10,o.h+2,7,0,7);x.arc(o.w-10,o.h+2,7,0,7);x.fill()}else if(o.t==='barrier'){x.fillStyle='#fff';x.fillRect(0,4,o.w,o.h-8);x.fillStyle='#dc2626';for(let i=0;i<o.w;i+=28)x.fillRect(i,4,14,o.h-8)}else if(o.t==='hay'){x.fillStyle='#fbbf24';x.fillRect(0,0,o.w,o.h);x.strokeStyle='#92400e';x.strokeRect(0,0,o.w,o.h);for(let i=8;i<o.w;i+=14){x.beginPath();x.moveTo(i,2);x.lineTo(i-5,o.h-2);x.stroke()}}else if(o.t==='stall'){x.fillStyle='#7f1d1d';x.fillRect(0,14,o.w,o.h-14);x.fillStyle='#fef2f2';for(let i=0;i<o.w;i+=20)x.fillRect(i,0,10,18)}else{x.fillStyle='#0ea5e9';x.beginPath();x.arc(o.w/2,10,9,0,7);x.fill();x.fillRect(o.w/2-7,18,14,o.h-18)}x.restore()}function drawRunner(){x.save();x.translate(player.x,player.y);x.rotate(player.lean*.17);x.globalAlpha=player.inv>0&&Math.floor(player.inv*20)%2?0.45:1;x.strokeStyle='#172554';x.lineWidth=6;x.beginPath();x.moveTo(-6,10);x.lineTo(-11,29+Math.sin(scroll*.08)*5);x.moveTo(6,10);x.lineTo(11,29-Math.sin(scroll*.08)*5);x.stroke();x.fillStyle='#2563eb';x.beginPath();x.roundRect(-13,-15,26,34,9);x.fill();x.fillStyle='#fed7aa';x.beginPath();x.arc(0,-25,11,0,7);x.fill();x.fillStyle='#991b1b';x.fillRect(-13,-34,26,6);x.globalAlpha=1;x.restore()}function bulls(){const base=H-18+pressure*.18;for(let i=0;i<9;i++){const bx=W*.14+i*(W*.72/8)+Math.sin(i*2+scroll*.02)*8,by=base+Math.sin(i+scroll*.03)*7;x.save();x.translate(bx,by);x.fillStyle=i%2?'#4a2a16':'#2b160d';x.beginPath();x.ellipse(0,0,22,15,0,0,7);x.fill();x.strokeStyle='#fef3c7';x.lineWidth=3;x.beginPath();x.moveTo(-15,-8);x.lineTo(-28,-18);x.moveTo(15,-8);x.lineTo(28,-18);x.stroke();x.restore()}}function draw(){x.save();if(shake)x.translate(rnd(-shake,shake),rnd(-shake,shake));road();obs.forEach(drawObstacle);dust.forEach(p=>{x.globalAlpha=Math.max(0,p.t*2);x.fillStyle='#fef3c7';x.fillRect(p.x,p.y,p.s,p.s);x.globalAlpha=1});drawRunner();bulls();texts.forEach(t=>{x.globalAlpha=t.t;x.fillStyle='#fff';x.strokeStyle='#7f1d1d';x.lineWidth=5;x.font='1000 22px system-ui';x.textAlign='center';x.strokeText(t.txt,t.x,t.y);x.fillText(t.txt,t.x,t.y);x.globalAlpha=1});if(flash){x.globalAlpha=flash*2;x.fillStyle='#ef4444';x.fillRect(0,0,W,H);x.globalAlpha=1}x.restore();x.fillStyle='#ffffff22';x.fillRect(W-20,H-140,8,100);x.fillStyle='#fbbf24';x.fillRect(W-20,H-140+(1-player.dodge)*100,8,player.dodge*100)}function loop(t){const dt=Math.min(.033,(t-last)/1000||0);last=t;if(run)update(dt);draw();requestAnimationFrame(loop)}function setupJoy(){const el=$('joy'),nub=$('nub');let id=null;function move(e){const r=el.getBoundingClientRect(),dx=e.clientX-r.left-r.width/2,dy=e.clientY-r.top-r.height/2,m=Math.hypot(dx,dy)||1,s=Math.min(1,43/m);joy.x=dx/43*s;joy.y=dy/43*s;nub.style.transform=`translate(${joy.x*31}px,${joy.y*31}px)`}el.onpointerdown=e=>{id=e.pointerId;el.setPointerCapture(id);move(e)};el.onpointermove=e=>{if(e.pointerId===id)move(e)};el.onpointerup=()=>{id=null;joy.x=joy.y=0;nub.style.transform=''}}setupJoy();addEventListener('keydown',e=>{keys[e.code]=1;if(e.code==='KeyP'){$('pause').click()}});addEventListener('keyup',e=>keys[e.code]=0);$('dodge').onpointerdown=e=>{e.preventDefault();$('dodge').dataset.down='1'};$('dodge').onpointerup=()=>$('dodge').dataset.down='0';$('start').onclick=reset;$('pause').onclick=()=>{if(!run)return;paused=!paused;$('pause').textContent=paused?'RESUME':'PAUSE'};requestAnimationFrame(loop)})()</script></body></html>
