<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Running With the Bulls</title><meta name="theme-color" content="#fbbf24"><style>*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#111827;color:white;font-family:system-ui,-apple-system,Segoe UI,sans-serif;touch-action:none}canvas{display:block;width:100vw;height:100vh}.hud{position:fixed;top:max(10px,env(safe-area-inset-top));left:10px;right:10px;display:flex;justify-content:space-between;gap:8px;z-index:5;pointer-events:none}.group{display:flex;gap:8px;flex-wrap:wrap}.pill,.btn{border:1px solid #ffffff33;background:#111827cc;color:#fff;border-radius:14px;padding:9px 12px;font-weight:900;backdrop-filter:blur(8px)}.btn{pointer-events:auto;cursor:pointer}.overlay{position:fixed;inset:0;display:grid;place-items:center;background:#030712d9;z-index:20;padding:18px;text-align:center}.card{width:min(92vw,620px);border:1px solid #ffffff33;border-radius:24px;padding:24px;background:linear-gradient(180deg,#1f2937,#111827);box-shadow:0 28px 80px #0009}.card h1{font-size:clamp(40px,10vw,74px);line-height:.88;margin:0 0 14px}.card p{color:#d1d5db;line-height:1.45}.primary{border:0;border-radius:999px;padding:14px 22px;font-size:18px;font-weight:1000;cursor:pointer}.controls{position:fixed;inset:0;z-index:8;pointer-events:none}.joy{position:absolute;left:18px;bottom:calc(18px + env(safe-area-inset-bottom));width:120px;height:120px;border-radius:50%;border:2px solid #ffffff33;background:#11182766;pointer-events:auto}.nub{position:absolute;left:37px;top:37px;width:46px;height:46px;border-radius:50%;background:#fff9}.action{position:absolute;right:22px;bottom:calc(24px + env(safe-area-inset-bottom));width:94px;height:94px;border-radius:50%;border:2px solid #ffffff55;color:#fff;font-weight:1000;font-size:15px;pointer-events:auto}.home{position:fixed;left:50%;bottom:6px;transform:translateX(-50%);z-index:30;color:#fff;text-decoration:none;font-size:12px;font-weight:900;background:#0007;padding:6px 10px;border-radius:999px}@media(pointer:fine){.joy,.action{opacity:.55}}@media(max-width:640px){.pill{font-size:12px;padding:7px 9px}.joy{width:108px;height:108px}.nub{left:31px;top:31px}.action{width:84px;height:84px}}</style></head><body><canvas id="c"></canvas><div class="hud"><div class="group"><div class="pill">DIST <b id="dist">0</b>m</div><div class="pill">MULTI <b id="multi">x1</b></div><div class="pill">HERD <b id="herd">100%</b></div></div><button class="btn" id="pause">PAUSE</button></div><div class="controls"><div class="joy" id="joy"><div class="nub" id="nub"></div></div><button class="action" id="dash" style="background:#f59e0b">DODGE</button></div><a class="home" href="index.html">← K2 HUB</a><div class="overlay" id="ov"><div class="card"><h1 style="color:#fbbf24">RUNNING WITH<br>THE BULLS</h1><p>Top-down street escape. Read intersections, dodge carts and barricades, take risky shortcuts, and keep the herd behind you.</p><p><b>Move:</b> WASD/arrows or joystick &nbsp; <b>Dodge:</b> Space/Shift or button</p><button class="primary" id="start" style="background:#fbbf24;color:#451a03">START RUN</button></div></div><script>(()=>{const c=document.getElementById('c'),g=c.getContext('2d');let W,H,D=1,run=0,last=0,dist=0,multi=1,herd=100,speed=240,scroll=0,spawn=0,keys={},obs=[],fx=[],joy={x:0,y:0},dash=1,inv=0,player={x:0,y:0,vx:0,vy:0,r:18};const $=id=>document.getElementById(id),rnd=(a,b)=>a+Math.random()*(b-a),clamp=(v,a,b)=>Math.max(a,Math.min(b,v));function rs(){D=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;g.setTransform(D,0,0,D,0,0)}addEventListener('resize',rs);rs();function reset(){run=1;dist=0;multi=1;herd=100;speed=240;scroll=0;spawn=0;obs=[];fx=[];dash=1;inv=0;player.x=W/2;player.y=H*.62;player.vx=player.vy=0;$('ov').style.display='none';last=performance.now()}function addObs(){let lane=rnd(70,W-70),types=['cart','barrier','hay','stall','people'],type=types[Math.floor(Math.random()*types.length)],w=type==='barrier'?rnd(90,160):rnd(38,68),h=type==='stall'?58:rnd(28,48);obs.push({x:lane-w/2,y:-90,w,h,type,near:0})}function hit(a,b){return a.x+a.r>b.x&&a.x-a.r<b.x+b.w&&a.y+a.r>b.y&&a.y-a.r<b.y+b.h}function update(dt){speed=Math.min(520,speed+dt*3.3);scroll+=speed*dt;dist+=speed*dt*.035;spawn-=dt;if(spawn<=0){addObs();if(Math.random()<.25)addObs();spawn=rnd(.38,.7)*Math.max(.55,300/speed)}let ax=((keys.ArrowRight||keys.KeyD)?1:0)-((keys.ArrowLeft||keys.KeyA)?1:0)+joy.x,ay=((keys.ArrowDown||keys.KeyS)?1:0)-((keys.ArrowUp||keys.KeyW)?1:0)+joy.y,l=Math.hypot(ax,ay)||1;player.vx=player.vx*.82+ax/l*26;player.vy=player.vy*.82+ay/l*22;if((keys.Space||keys.ShiftLeft||$('dash').dataset.down==='1')&&dash>=1){player.vx+=ax/l*70;player.vy+=ay/l*55;dash=0;inv=.34}dash=Math.min(1,dash+dt*.7);inv=Math.max(0,inv-dt);player.x=clamp(player.x+player.vx,28,W-28);player.y=clamp(player.y+player.vy,90,H-45);obs.forEach(o=>{o.y+=speed*dt;if(!o.near&&o.y>player.y-20&&o.y<player.y+35&&Math.abs((o.x+o.w/2)-player.x)<o.w/2+36){o.near=1;multi=Math.min(8,multi+1);fx.push({x:player.x,y:player.y,t:1,txt:'NEAR MISS x'+multi})}if(inv<=0&&hit(player,o)){herd-=24;multi=1;inv=.8;o.y=H+100}});obs=obs.filter(o=>o.y<H+120);herd=Math.min(100,herd+dt*4);if(herd<=0){run=0;$('ov').style.display='grid';$('ov').querySelector('h1').innerHTML='CAUGHT!';$('ov').querySelector('p').innerHTML='Distance <b>'+Math.floor(dist)+'</b> m. Press start to run again.';$('start').textContent='RUN AGAIN'}fx.forEach(f=>f.t-=dt);fx=fx.filter(f=>f.t>0);$('dist').textContent=Math.floor(dist);$('multi').textContent='x'+multi;$('herd').textContent=Math.max(0,Math.floor(herd))+'%'}function draw(){g.fillStyle='#d97706';g.fillRect(0,0,W,H);g.fillStyle='#6b7280';g.fillRect(38,0,W-76,H);g.fillStyle='#9ca3af';for(let y=(scroll%90)-90;y<H;y+=90)g.fillRect(W/2-3,y,6,42);g.fillStyle='#92400e';for(let y=(scroll%180)-180;y<H;y+=180){g.fillRect(0,y,38,100);g.fillRect(W-38,y+60,38,100)}obs.forEach(o=>{g.fillStyle={cart:'#78350f',barrier:'#ef4444',hay:'#facc15',stall:'#7c3aed',people:'#0ea5e9'}[o.type];g.fillRect(o.x,o.y,o.w,o.h);g.fillStyle='#fff';g.font='900 12px system-ui';g.textAlign='center';g.fillText(o.type.toUpperCase(),o.x+o.w/2,o.y+o.h/2+4)});g.save();g.translate(player.x,player.y);g.fillStyle=inv>0?'#fde68a':'#2563eb';g.beginPath();g.arc(0,0,player.r,0,7);g.fill();g.fillStyle='#fed7aa';g.beginPath();g.arc(0,-18,10,0,7);g.fill();g.restore();g.fillStyle='#451a03';for(let i=0;i<8;i++){let x=W*.18+i*(W*.64/7),y=H-20+Math.sin(i)*8;g.beginPath();g.arc(x,y,18,0,7);g.fill()}fx.forEach(f=>{g.globalAlpha=f.t;g.fillStyle='#fff';g.font='1000 22px system-ui';g.textAlign='center';g.fillText(f.txt,f.x,f.y-35);g.globalAlpha=1})}function loop(t){let dt=Math.min(.033,(t-last)/1000||0);last=t;if(run)update(dt);draw();requestAnimationFrame(loop)}function joystick(){const el=$('joy'),n=$('nub');let id=null;function mv(e){let r=el.getBoundingClientRect(),x=e.clientX-(r.left+r.width/2),y=e.clientY-(r.top+r.height/2),m=Math.hypot(x,y)||1,s=Math.min(1,48/m);joy.x=x/48*s;joy.y=y/48*s;n.style.transform=`translate(${joy.x*34}px,${joy.y*34}px)`}el.addEventListener('pointerdown',e=>{id=e.pointerId;el.setPointerCapture(id);mv(e)});el.addEventListener('pointermove',e=>{if(e.pointerId===id)mv(e)});el.addEventListener('pointerup',()=>{id=null;joy.x=joy.y=0;n.style.transform=''})}joystick();addEventListener('keydown',e=>{keys[e.code]=1;if(e.code==='KeyP')run=!run});addEventListener('keyup',e=>keys[e.code]=0);$('dash').onpointerdown=()=> $('dash').dataset.down='1';$('dash').onpointerup=()=> $('dash').dataset.down='0';$('start').onclick=reset;$('pause').onclick=()=>run=!run;requestAnimationFrame(loop)})()</script></html>
