<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Logic Riddles</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-color: #6366f1;
            --secondary-color: #10b981;
            --text-color: #f8fafc;
            --muted-text: #94a3b8;
            --error-color: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0, transparent 50%);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
        }

        #game-container {
            background-color: var(--card-bg);
            padding: 32px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin-top: 0;
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--muted-text);
            font-size: 0.9rem;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        #riddle-box {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #riddle-text {
            font-size: 1.15rem;
            line-height: 1.6;
            font-weight: 500;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .option-btn {
            padding: 16px;
            font-size: 1rem;
            font-weight: 600;
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .option-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .option-btn:active {
            transform: translateY(0);
        }

        .option-btn.correct {
            background-color: var(--secondary-color) !important;
            border-color: var(--secondary-color) !important;
            color: white;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .option-btn.incorrect {
            background-color: var(--error-color) !important;
            border-color: var(--error-color) !important;
            color: white;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }

        #stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--muted-text);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-value {
            color: var(--text-color);
            font-weight: 700;
            font-size: 1.1rem;
        }

        #progress-container {
            width: 100%;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            width: 0%;
            transition: width 0.4s ease;
        }

        #feedback {
            font-size: 1.1rem;
            height: 1.5rem;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        #restart-btn {
            display: none;
            width: 100%;
            margin-top: 16px;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #4f46e5 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            transition: all 0.2s;
        }

        #restart-btn:hover {
            filter: brightness(1.1);
            transform: scale(1.02);
        }

        @media (max-width: 400px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
            #game-container {
                padding: 24px;
            }
        }
    </style>

</head>
<body>

    <div id="game-container">
        <div id="progress-container">
            <div id="progress-fill"></div>
        </div>
        
        <h1>Logic Vault</h1>
        <div class="subtitle">120 Random Challenges</div>
        
        <div id="feedback"></div>

        <div id="riddle-box">
            <div id="riddle-text">Initializing challenges...</div>
        </div>

        <div class="options-grid" id="options">
            <!-- Options populated by JS -->
        </div>

        <div id="stats">
            <div class="stat-item">
                <span>PROGRESS</span>
                <span class="stat-value"><span id="current-riddle">1</span>/120</span>
            </div>
            <div class="stat-item">
                <span>SCORE</span>
                <span class="stat-value" id="score">0</span>
            </div>
        </div>

        <button id="restart-btn" onclick="initGame()">RESTART CHALLENGE</button>
    </div>

    <script>
        const names = [
            "Frank", "Sally", "Ben", "Alice", "Bob", "Charlie", "David", "Eve", 
            "Grace", "Heidi", "Ivan", "Judy", "Kevin", "Linda", "Mike", "Nancy", 
            "Oscar", "Peggy", "Quinn", "Rose", "Sam", "Tina", "Ursula", "Victor", 
            "Wendy", "Xander", "Yvonne", "Zack", "Amy", "Brad", "Claire", "Dan", 
            "Emma", "Fred", "George", "Hannah", "Iris", "Jack", "Kathy", "Leo", 
            "Mia", "Noah", "Olivia", "Paul", "Ruby", "Steve", "Tess", "Umar", 
            "Vera", "Will", "Liam", "Sophia", "Mason", "Isabella", "Ethan", "Aria"
        ];

        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        const templateGenerators = [
            // Proximity
            () => {
                const n = shuffle([...names]).slice(0, 4);
                return {
                    story: `${n[0]} is next to ${n[1]}. ${n[1]} is next to ${n[2]}. Who is next to ${n[2]}?`,
                    answer: n[1],
                    options: shuffle([n[0], n[1], n[2], n[3]])
                };
            },
            () => {
                const n = shuffle([...names]).slice(0, 4);
                return {
                    story: `${n[0]} is between ${n[1]} and ${n[2]}. Who is next to ${n[1]}?`,
                    answer: n[0],
                    options: shuffle([n[0], n[1], n[2], n[3]])
                };
            },
            // Crowd Math
            () => {
                const vehicle = shuffle(["plane", "bus", "train", "elevator"])[0];
                let count = getRandomInt(20, 100);
                const off = getRandomInt(5, 15);
                const on = getRandomInt(5, 15);
                const final = count - off + on;
                return {
                    story: `There are ${count} people on a ${vehicle}. ${off} people get off, then ${on} more get on. How many people are on the ${vehicle} now?`,
                    answer: final.toString(),
                    options: shuffle([final.toString(), (final + 5).toString(), (final - 5).toString(), (count - off).toString()])
                };
            },
            () => {
                const count = getRandomInt(10, 40);
                const pairs = Math.floor(count / 2);
                return {
                    story: `There are ${count} people in a room. Everyone shakes hands with exactly one person, forming pairs. How many pairs are there?`,
                    answer: pairs.toString(),
                    options: shuffle([pairs.toString(), count.toString(), (pairs + 2).toString(), (pairs - 1).toString()])
                };
            },
            // Family Tree
            () => {
                const n = shuffle([...names]).slice(0, 5);
                return {
                    story: `${n[0]} and ${n[1]} are the parents of ${n[2]}. ${n[2]} has a brother named ${n[3]}. Who is ${n[3]}'s mother?`,
                    answer: n[1],
                    options: shuffle([n[0], n[1], n[2], n[4]])
                };
            },
            () => {
                const n = shuffle([...names]).slice(0, 5);
                return {
                    story: `${n[0]} is the sister of ${n[1]}. ${n[1]} is the mother of ${n[2]}. What is the relationship of ${n[0]} to ${n[2]}?`,
                    answer: "Aunt",
                    options: shuffle(["Aunt", "Mother", "Cousin", "Niece"])
                };
            },
            () => {
                const n = shuffle([...names]).slice(0, 5);
                return {
                    story: `${n[0]} is the brother of ${n[1]}. ${n[1]} is the father of ${n[2]}. Who is the uncle of ${n[2]}?`,
                    answer: n[0],
                    options: shuffle([n[0], n[1], n[2], n[3]])
                };
            },
            // Race / Order
            () => {
                const n = shuffle([...names]).slice(0, 4);
                return {
                    story: `In a sprint, ${n[0]} was faster than ${n[1]}. ${n[1]} was faster than ${n[2]}. Who took the bronze medal?`,
                    answer: n[2],
                    options: shuffle([n[0], n[1], n[2], n[3]])
                };
            },
            () => {
                const n = shuffle([...names]).slice(0, 4);
                return {
                    story: `In a line, ${n[0]} is behind ${n[1]}. ${n[1]} is behind ${n[2]}. Who is at the very front?`,
                    answer: n[2],
                    options: shuffle([n[0], n[1], n[2], n[3]])
                };
            },
            () => {
                const n = shuffle([...names]).slice(0, 4);
                return {
                    story: `${n[0]} is to the right of ${n[1]}. ${n[1]} is to the right of ${n[2]}. Who is on the far left?`,
                    answer: n[2],
                    options: shuffle([n[0], n[1], n[2], n[3]])
                };
            }
        ];

        let puzzles = [];
        let currentIdx = 0;
        let score = 0;
        let canAnswer = true;

        function generatePuzzles() {
            const generated = [];
            for (let i = 0; i < 120; i++) {
                const genFn = templateGenerators[Math.floor(Math.random() * templateGenerators.length)];
                generated.push(genFn());
            }
            return generated;
        }

        function initGame() {
            puzzles = generatePuzzles();
            currentIdx = 0;
            score = 0;
            canAnswer = true;
            
            document.getElementById('restart-btn').style.display = 'none';
            document.getElementById('score').innerText = score;
            document.getElementById('feedback').innerText = '';
            
            renderPuzzle();
        }

        function renderPuzzle() {
            if (currentIdx >= puzzles.length) {
                endGame();
                return;
            }

            const p = puzzles[currentIdx];
            document.getElementById('current-riddle').innerText = currentIdx + 1;
            document.getElementById('riddle-text').innerText = p.story;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            p.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                optionsDiv.appendChild(btn);
            });

            const progress = (currentIdx / puzzles.length) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
            canAnswer = true;
        }

        function checkAnswer(selected, btn) {
            if (!canAnswer) return;
            canAnswer = false;

            const correct = puzzles[currentIdx].answer;
            const feedback = document.getElementById('feedback');

            if (selected === correct) {
                btn.classList.add('correct');
                score++;
                document.getElementById('score').innerText = score;
                feedback.innerText = "CORRECT";
                feedback.style.color = "var(--secondary-color)";
                vibrate(50);
            } else {
                btn.classList.add('incorrect');
                feedback.innerText = "INCORRECT";
                feedback.style.color = "var(--error-color)";
                vibrate([50, 50, 50]);
                
                const buttons = document.querySelectorAll('.option-btn');
                buttons.forEach(b => {
                    if (b.innerText === correct) b.classList.add('correct');
                });
            }

            setTimeout(() => {
                currentIdx++;
                renderPuzzle();
                feedback.innerText = '';
            }, 1200);
        }

        function vibrate(pattern) {
            if (navigator.vibrate) navigator.vibrate(pattern);
        }

        function endGame() {
            document.getElementById('riddle-text').innerText = `VAULT CLEARED\n\nFinal Score: ${score} / 120`;
            document.getElementById('options').innerHTML = '';
            document.getElementById('restart-btn').style.display = 'block';
            document.getElementById('progress-fill').style.width = '100%';
        }

        initGame();
    </script>
</body>
</html>
