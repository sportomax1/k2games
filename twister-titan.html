<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twister Titan - K2 games</title>
    <style>
        :root {
            --bg: #1e293b;
            --tornado: #94a3b8;
            --accent: #fbbf24;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; align-items: center; justify-content: center; }

        #game-container { position: relative; width: 100%; height: 100%; background: #334155; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }

        #ui { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        .stat-card { background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 12px; text-align: center; min-width: 100px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1); }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; opacity: 0.7; }
        .stat-val { font-size: 1.5rem; font-weight: 900; color: var(--accent); font-family: monospace; }

        #overlay { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .btn { padding: 15px 40px; font-size: 1.2rem; background: var(--accent); color: #000; border: none; border-radius: 50px; font-weight: 900; cursor: pointer; margin-top: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        .back-link { position: fixed; top: 20px; left: 20px; color: white; text-decoration: none; opacity: 0.5; font-size: 0.8rem; z-index: 200; }
        
        #growth-bar-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 400px; height: 10px; background: rgba(0,0,0,0.5); border-radius: 5px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
        #growth-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.3s; }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
<script>

  function gtag(){dataLayer.push(arguments);}

</head>
<body>
    <a href="index.html" class="back-link">← HUB</a>

    <div id="game-container">
        <div id="ui">
            <div class="stat-card">
                <div class="stat-label">Score</div>
                <div id="score-val" class="stat-val">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Category</div>
                <div id="rank-val" class="stat-val">EF0</div>
            </div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div id="growth-bar-container"><div id="growth-fill"></div></div>

        <div id="overlay">
            <h1 style="font-size: 3.5rem; color: var(--accent); font-style: italic; font-weight: 900;">TWISTER TITAN</h1>
            <p id="final-stats" style="color:#cbd5e1; max-width: 350px; line-height: 1.5;">Drag to move your tornado. Consume smaller objects to grow into a monster storm!</p>
            <button class="btn" onclick="window.game.start()">START THE STORM</button>
        </div>
    </div>

    <script>
        class TwisterTitan {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');

                this.score = 0;
                this.growth = 0;
                this.size = 20;
                this.targetSize = 20;
                this.level = 0;
                this.isPlaying = false;
                
                this.tornado = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
                this.mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
                this.objects = [];
                this.particles = [];
                this.frame = 0;

                this.resize();
                this.setupInputs();
                window.addEventListener('resize', () => this.resize());
                this.loop();
            }

            resize() {
                this.width = window.innerWidth;
                this.height = window.innerHeight;
                this.canvas.width = this.width;
                this.canvas.height = this.height;
            }

            setupInputs() {
                const handleMove = (e) => {
                    const t = e.touches ? e.touches[0] : e;
                    this.mouse.x = t.clientX;
                    this.mouse.y = t.clientY;
                };
                window.addEventListener('mousemove', handleMove);
                window.addEventListener('touchmove', (e) => { handleMove(e); e.preventDefault(); }, {passive: false});
            }

            start() {
                this.isPlaying = true;
                this.score = 0;
                this.growth = 0;
                this.size = 20;
                this.targetSize = 20;
                this.level = 0;
                this.objects = [];
                this.particles = [];
                document.getElementById('overlay').style.display = 'none';
                this.updateUI();
            }

            spawnObject() {
                if(this.objects.length > 80) return;
                
                const typeRoll = Math.random();
                let type;
                
                if (this.level >= 4) {
                    if (typeRoll < 0.1) type = 'silo';
                    else if (typeRoll < 0.2) type = 'barn';
                    else if (typeRoll < 0.3) type = 'building';
                    else if (typeRoll < 0.5) type = 'house';
                    else if (typeRoll < 0.7) type = 'tractor';
                    else type = 'car';
                } else if (this.level >= 3) {
                    if (typeRoll < 0.1) type = 'silo';
                    else if (typeRoll < 0.3) type = 'house';
                    else if (typeRoll < 0.5) type = 'tractor';
                    else if (typeRoll < 0.7) type = 'car';
                    else type = 'cow';
                } else if (this.level >= 2) {
                    if (typeRoll < 0.2) type = 'tractor';
                    else if (typeRoll < 0.4) type = 'car';
                    else if (typeRoll < 0.7) type = 'cow';
                    else type = 'tree';
                } else if (this.level >= 1) {
                    if (typeRoll < 0.3) type = 'cow';
                    else if (typeRoll < 0.6) type = 'tree';
                    else if (typeRoll < 0.8) type = 'haybale';
                    else type = 'corn';
                } else {
                    if (typeRoll < 0.3) type = 'cow';
                    else if (typeRoll < 0.6) type = 'haybale';
                    else type = 'corn';
                }

                const obj = {
                    x: Math.random() * this.width,
                    y: Math.random() * this.height,
                    type: type,
                    angle: Math.random() * Math.PI * 2,
                    rot: (Math.random()-0.5)*0.1
                };

                if(Math.hypot(obj.x - this.tornado.x, obj.y - this.tornado.y) < this.size + 150) return;
                this.objects.push(obj);
            }

            update() {
                if(!this.isPlaying) return;
                this.frame++;

                this.tornado.x += (this.mouse.x - this.tornado.x) * 0.1;
                this.tornado.y += (this.mouse.y - this.tornado.y) * 0.1;
                this.size += (this.targetSize - this.size) * 0.05;

                if(this.frame % 6 === 0) this.spawnObject();

                for(let i=this.objects.length-1; i>=0; i--) {
                    const obj = this.objects[i];
                    const dist = Math.hypot(obj.x - this.tornado.x, obj.y - this.tornado.y);
                    const pullDist = this.size * 5;
                    
                    if(dist < pullDist) {
                        const angle = Math.atan2(obj.y - this.tornado.y, obj.x - this.tornado.x);
                        const force = (1 - dist / pullDist) * 7;
                        obj.x -= Math.cos(angle) * force;
                        obj.y -= Math.sin(angle) * force;
                        obj.x += Math.cos(angle + Math.PI/2) * force * 3;
                        obj.y += Math.sin(angle + Math.PI/2) * force * 3;
                        obj.angle += force * 0.2;

                        if(dist < this.size * 0.9) this.consume(obj, i);
                    }
                }

                if(this.frame % 2 === 0) {
                    this.particles.push({
                        x: this.tornado.x + (Math.random()-0.5)*this.size,
                        y: this.tornado.y + (Math.random()-0.5)*this.size,
                        vx: (Math.random()-0.5)*15,
                        vy: -Math.random()*8 - 4,
                        life: 1.0,
                        size: Math.random()*6 + 2
                    });
                }

                for(let i=this.particles.length-1; i>=0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx; p.y += p.vy; p.life -= 0.025;
                    if(p.life <= 0) this.particles.splice(i, 1);
                }
            }

            consume(obj, index) {
                const values = { corn: 5, haybale: 10, cow: 30, tree: 50, tractor: 150, car: 200, house: 500, barn: 1000, silo: 1200, building: 1500 };
                const growthVals = { corn: 1, haybale: 2, cow: 5, tree: 6, tractor: 12, car: 15, house: 30, barn: 50, silo: 55, building: 60 };
                this.score += values[obj.type];
                this.growth += growthVals[obj.type];
                this.objects.splice(index, 1);
                if(this.growth >= 100) this.levelUp();
                this.updateUI();
            }

            levelUp() {
                this.level++;
                this.growth = 0;
                this.targetSize += 25;
                this.updateUI();
            }

            updateUI() {
                document.getElementById('score-val').textContent = this.score;
                document.getElementById('rank-val').textContent = 'EF' + Math.min(5, this.level);
                document.getElementById('growth-fill').style.width = Math.min(100, this.growth) + '%';
            }

            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.width, this.height);

                // Draw Floor Grid (Pseudo-3D effect)
                ctx.strokeStyle = '#475569';
                ctx.lineWidth = 1;
                ctx.beginPath();
                for(let x=0; x<=this.width; x+=100) { ctx.moveTo(x, 0); ctx.lineTo(x, this.height); }
                for(let y=0; y<=this.height; y+=100) { ctx.moveTo(0, y); ctx.lineTo(this.width, y); }
                ctx.stroke();

                this.objects.forEach(obj => {
                    ctx.save();
                    ctx.translate(obj.x, obj.y);
                    ctx.rotate(obj.angle);
                    
                    if(obj.type === 'corn') {
                        ctx.fillStyle = '#16a34a'; ctx.fillRect(-6, -6, 12, 12);
                        ctx.fillStyle = '#facc15'; ctx.beginPath(); ctx.arc(0, -6, 3, 0, Math.PI*2); ctx.fill();
                    } else if(obj.type === 'haybale') {
                        ctx.fillStyle = '#facc15'; ctx.beginPath(); ctx.roundRect(-8, -6, 16, 12, 4); ctx.fill();
                        ctx.strokeStyle = '#a16207'; ctx.lineWidth = 1; ctx.stroke();
                    } else if(obj.type === 'cow') {
                        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.ellipse(0, 0, 10, 6, 0, 0, Math.PI*2); ctx.fill(); // Body
                        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-4, -2, 3, 0, Math.PI*2); ctx.fill(); // Spot
                        ctx.beginPath(); ctx.arc(5, 1, 2, 0, Math.PI*2); ctx.fill(); // Spot
                        ctx.beginPath(); ctx.arc(8, -3, 4, 0, Math.PI*2); ctx.fill(); // Head
                    } else if(obj.type === 'tree') { 
                        ctx.fillStyle = '#166534'; ctx.beginPath(); ctx.moveTo(0, -18); ctx.lineTo(-12, 6); ctx.lineTo(12, 6); ctx.fill(); 
                    } else if(obj.type === 'tractor') {
                        ctx.fillStyle = '#15803d'; ctx.fillRect(-12, -8, 24, 16); 
                        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(8, 8, 6, 0, Math.PI*2); ctx.fill(); 
                        ctx.beginPath(); ctx.arc(-8, 8, 4, 0, Math.PI*2); ctx.fill(); 
                        ctx.fillStyle = '#facc15'; ctx.fillRect(0, -12, 8, 8); 
                    } else if(obj.type === 'car') { 
                        ctx.fillStyle = '#ef4444'; ctx.fillRect(-15, -8, 30, 16); ctx.fillStyle='#000'; ctx.fillRect(5, -6, 8, 12); 
                    } else if(obj.type === 'house') {
                        ctx.fillStyle = '#f8fafc'; ctx.fillRect(-20, -15, 40, 30); 
                        ctx.fillStyle = '#991b1b'; ctx.beginPath(); ctx.moveTo(-25, -15); ctx.lineTo(0, -35); ctx.lineTo(25, -15); ctx.fill(); 
                        ctx.fillStyle = '#3b82f6'; ctx.fillRect(-10, -5, 8, 8); ctx.fillRect(2, -5, 8, 8); 
                    } else if(obj.type === 'barn') {
                        ctx.fillStyle = '#991b1b'; ctx.fillRect(-30, -20, 60, 45); 
                        ctx.fillStyle = '#450a0a'; ctx.beginPath(); ctx.moveTo(-35, -20); ctx.lineTo(-15, -45); ctx.lineTo(15, -45); ctx.lineTo(35, -20); ctx.fill(); 
                        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(-10, 5); ctx.lineTo(10, 25); ctx.moveTo(10, 5); ctx.lineTo(-10, 25); ctx.stroke(); 
                    } else if(obj.type === 'silo') {
                        ctx.fillStyle = '#cbd5e1'; ctx.beginPath(); ctx.ellipse(0, 0, 12, 25, 0, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = '#94a3b8'; ctx.beginPath(); ctx.arc(0, -25, 12, Math.PI, 0); ctx.fill(); // Dome top
                        ctx.strokeStyle = '#64748b'; ctx.lineWidth = 2; ctx.stroke();
                    } else if(obj.type === 'building') { 
                        ctx.fillStyle = '#334155'; ctx.fillRect(-30, -50, 60, 100); ctx.fillStyle = '#fbbf24'; ctx.fillRect(-20, -40, 12, 12); ctx.fillRect(8, -40, 12, 12); ctx.fillRect(-20, -10, 12, 12); ctx.fillRect(8, -10, 12, 12); 
                    }
                    ctx.restore();
                });

                // Particles (Debris)
                this.particles.forEach(p => {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = '#94a3b8';
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                });
                ctx.globalAlpha = 1.0;

                // Tornado Body
                for(let i=0; i<15; i++) {
                    const layerY = this.tornado.y - i * 20;
                    const layerSize = this.size + i * (this.size * 0.7);
                    const spin = this.frame * 0.3 + i * 0.5;
                    
                    ctx.shadowBlur = 20; ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.strokeStyle = `rgba(148, 163, 184, ${0.8 - i*0.05})`;
                    ctx.lineWidth = 6;
                    
                    ctx.beginPath();
                    // Wobble effect
                    const wobble = Math.sin(this.frame * 0.1 + i) * 10;
                    ctx.ellipse(this.tornado.x + wobble, layerY, layerSize, layerSize/3, spin, 0, Math.PI*2);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }
            }

            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        }

        window.game = new TwisterTitan();
    </script>
</body>
</html>
