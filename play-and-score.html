<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Play and Score - K2 games</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --accent: #f59e0b;
            --border: rgba(255, 255, 255, 0.1);
            --r1: #ef4444; --r2: #f97316; --r3: #eab308; --r4: #22c55e; --r5: #3b82f6; --r6: #8b5cf6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        nav {
            height: 50px;
            padding: 0 1rem;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .logo { font-weight: 900; color: var(--accent); font-style: italic; letter-spacing: 1px; }
        .restart-btn { background: var(--surface); border: 1px solid var(--border); color: white; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }

        #game-layout {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            position: relative;
        }

        /* Opponents */
        #opponents {
            display: flex;
            justify-content: center;
            gap: 8px;
            height: 80px;
        }

        .player-info {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 6px;
            text-align: center;
            flex: 1;
            max-width: 100px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .player-info.active { border-color: var(--accent); background: rgba(245, 158, 11, 0.1); }
        .player-info.out { opacity: 0.4; filter: grayscale(1); }
        .player-info .name { font-size: 0.55rem; font-weight: 800; text-transform: uppercase; color: #94a3b8; }
        .player-info .stats { font-size: 1rem; font-weight: 900; }
        .player-info .cards { font-size: 0.6rem; color: var(--accent); font-weight: bold; }

        /* Middle - Reward cards */
        #middle-area {
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            padding: 10px;
        }

        .reward-label { font-size: 0.6rem; font-weight: 900; opacity: 0.5; text-transform: uppercase; }
        #point-piles { display: flex; gap: 10px; justify-content: center; }

        .point-pile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: -40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .point-pile:hover { transform: scale(1.1); }
        .point-pile.disabled { opacity: 0.3; pointer-events: none; }
        .point-pile .card { margin-top: -65px; }
        .point-pile .card:first-child { margin-top: 0; }

        /* Table - Current Trick */
        #table {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .played-combo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .combo-cards { display: flex; gap: 4px; }
        .p-label { font-size: 0.55rem; font-weight: 900; opacity: 0.6; text-transform: uppercase; }

        /* Card Styling */
        .card {
            width: 50px;
            height: 75px;
            background: #fff;
            border-radius: 6px;
            color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.5rem;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 3px solid #eee;
            transition: 0.2s;
        }
        .card.rank-1 { border-color: var(--r1); color: var(--r1); }
        .card.rank-2 { border-color: var(--r2); color: var(--r2); }
        .card.rank-3 { border-color: var(--r3); color: var(--r3); }
        .card.rank-4 { border-color: var(--r4); color: var(--r4); }
        .card.rank-5 { border-color: var(--r5); color: var(--r5); }
        .card.rank-6 { border-color: var(--r6); color: var(--r6); }
        
        .card.selected { transform: translateY(-15px); border-color: #fff; box-shadow: 0 0 15px #fff; }

        /* Hand */
        #hand-container {
            background: rgba(0,0,0,0.3);
            border-top: 1px solid var(--border);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #hand {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding: 10px 5px;
            justify-content: center;
            min-height: 100px;
        }

        .hand-card { cursor: pointer; transition: 0.2s; }
        .hand-card:hover { transform: translateY(-10px); }
        .hand-card.disabled { opacity: 0.3; pointer-events: none; }

        #controls {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn-play {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 30px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
        }
        .btn-play:disabled { opacity: 0.3; cursor: not-allowed; }

        #status-msg {
            position: absolute;
            top: 90px;
            width: 100%;
            text-align: center;
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--accent);
            text-shadow: 0 0 15px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 50;
        }

        /* Overlay */
        .overlay {
            position: absolute; inset: 0;
            background: rgba(15, 23, 42, 0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 500; text-align: center; padding: 20px;
        }

        .btn-large {
            background: var(--accent); color: #000; border: none; padding: 1.2rem 3.5rem;
            border-radius: 50px; font-weight: 900; cursor: pointer; margin-top: 1.5rem;
            font-size: 1.3rem;
        }

        @media (max-width: 600px) {
            .card { width: 40px; height: 60px; font-size: 1.1rem; }
            .point-pile .card { margin-top: -50px; }
        }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>

    </script>
</head>
<body>
    <nav>
        <div class="logo">PLAY AND SCORE</div>
        <button class="restart-btn" onclick="location.reload()">RESTART</button>
    </nav>

    <div id="game-layout">
        <div id="opponents"></div>
        <div id="status-msg"></div>

        <div id="middle-area">
            <div class="reward-label">Available Points</div>
            <div id="point-piles"></div>
        </div>

        <div id="table">
            <!-- Current trick combos -->
        </div>

        <div id="hand-container">
            <div id="controls">
                <button id="btn-play" class="btn-play" onclick="game.playCombo()" disabled>PLAY COMBO</button>
            </div>
            <div id="hand"></div>
        </div>

        <div id="start-screen" class="overlay">
            <h1 style="font-size: 3rem; color: var(--accent); font-style: italic; font-weight: 900;">PLAY AND SCORE</h1>
            <p style="opacity: 0.8; margin-top: 15px; max-width: 400px; font-weight: 600;">The colorful card game of combos. Play the biggest set or run to take first pick of the points!</p>
            <div style="margin-top: 25px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;">
                <button class="btn-large" onclick="game.init(3)">3 PLAYERS</button>
                <button class="btn-large" onclick="game.init(4)" style="background: #818cf8; color: white;">4 PLAYERS</button>
                <button class="btn-large" onclick="game.init(5)" style="background: #22c55e; color: white;">5 PLAYERS</button>
            </div>
        </div>

        <div id="win-screen" class="overlay" style="display:none">
            <h1 id="winner-title" style="font-size: 3.5rem; color: var(--accent);">GAME OVER</h1>
            <div id="final-stats" style="margin-top: 25px; font-size: 1.2rem; line-height: 1.6;"></div>
            <button class="btn-large" onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        class PlayAndScore {
            constructor() {
                this.deck = [];
                this.players = [];
                this.pointPiles = [];
                this.currentTrick = [];
                this.trickType = 'any'; // any, set, run
                this.turn = 0;
                this.state = 'idle'; // idle, playing, scoring
                this.selectedHandIndices = new Set();
                this.firstTrick = true;
            }

            init(count) {
                // Build Deck (60 cards, ranks 1-6, 10 each)
                this.deck = [];
                for(let r=1; r<=6; r++) {
                    for(let i=0; i<10; i++) this.deck.push(r);
                }
                this.deck.sort(() => Math.random() - 0.5);

                // Setup Players
                this.players = Array(count).fill(0).map((_, i) => ({
                    id: i, name: i === 0 ? 'You' : `Bot #${i}`,
                    hand: [], score: 0, isBot: i !== 0, out: false
                }));

                // Initial Deal
                const handSize = count === 3 ? 14 : count === 4 ? 14 : count === 5 ? 11 : 9;
                this.players.forEach(p => {
                    for(let i=0; i<handSize; i++) p.hand.push(this.deck.pop());
                    p.hand.sort((a,b) => a-b);
                });

                // Initial Points
                const initialPoints = [];
                for(let i=0; i<count; i++) initialPoints.push(this.deck.pop());
                initialPoints.sort((a,b) => a-b);
                this.pointPiles = initialPoints.map(val => [val]);

                document.getElementById('start-screen').style.display = 'none';
                this.startRound();
            }

            startRound() {
                this.currentTrick = [];
                this.trickType = 'any';
                this.state = 'playing';
                this.selectedHandIndices.clear();
                this.updateUI();
                this.processNextTurn();
            }

            updateUI() {
                // Opponents
                const oppsEl = document.getElementById('opponents');
                oppsEl.innerHTML = '';
                this.players.forEach(p => {
                    if (p.id === 0) return;
                    const div = document.createElement('div');
                    div.className = `player-info ${this.turn === p.id ? 'active' : ''} ${p.out ? 'out' : ''}`;
                    div.innerHTML = `
                        <div class="name">${p.name}</div>
                        <div class="stats">${p.score} pts</div>
                        <div class="cards">${p.hand.length} cards</div>
                    `;
                    oppsEl.appendChild(div);
                });

                // Point Piles
                const pilesEl = document.getElementById('point-piles');
                pilesEl.innerHTML = '';
                this.pointPiles.forEach((pile, i) => {
                    const div = document.createElement('div');
                    div.className = `point-pile ${this.state === 'scoring' && this.turn === 0 ? '' : 'disabled'}`;
                    div.onclick = () => this.claimPointPile(i);
                    pile.forEach(val => div.appendChild(this.createCardEl(val)));
                    pilesEl.appendChild(div);
                });

                // Trick Table
                const tableEl = document.getElementById('table');
                tableEl.innerHTML = '';
                this.currentTrick.forEach(t => {
                    const div = document.createElement('div');
                    div.className = 'played-combo';
                    const cardsRow = document.createElement('div');
                    cardsRow.className = 'combo-cards';
                    t.cards.forEach(val => cardsRow.appendChild(this.createCardEl(val)));
                    div.appendChild(cardsRow);
                    const label = document.createElement('div');
                    label.className = 'p-label';
                    label.textContent = this.players[t.pId].name;
                    div.appendChild(label);
                    tableEl.appendChild(div);
                });

                // Hand
                const handEl = document.getElementById('hand');
                handEl.innerHTML = '';
                this.players[0].hand.forEach((val, i) => {
                    const div = this.createCardEl(val);
                    div.classList.add('hand-card');
                    if (this.selectedHandIndices.has(i)) div.classList.add('selected');
                    if (this.state !== 'playing' || this.turn !== 0) div.classList.add('disabled');
                    div.onclick = () => this.toggleCard(i);
                    handEl.appendChild(div);
                });

                // Play Button
                const btn = document.getElementById('btn-play');
                btn.disabled = !this.isValidCombo();
                btn.style.display = this.state === 'playing' && this.turn === 0 ? 'block' : 'none';
            }

            createCardEl(val) {
                const div = document.createElement('div');
                div.className = `card rank-${val}`;
                div.textContent = val;
                return div;
            }

            toggleCard(idx) {
                if (this.selectedHandIndices.has(idx)) this.selectedHandIndices.delete(idx);
                else this.selectedHandIndices.add(idx);
                this.updateUI();
            }

            isValidCombo() {
                const selected = Array.from(this.selectedHandIndices).map(i => this.players[0].hand[i]);
                if (selected.length === 0) return false;
                
                // Rule: Must follow trick type
                const combo = this.identifyCombo(selected);
                if (!combo) return false;

                if (this.trickType === 'set' && combo.type === 'run') return false;
                if (this.trickType === 'run' && combo.type === 'set') return false;

                return true;
            }

            identifyCombo(cards) {
                if (cards.length === 1) return { type: 'single', size: 1, max: cards[0] };
                
                cards.sort((a,b) => a-b);
                
                // Set
                if (cards.every(c => c === cards[0])) return { type: 'set', size: cards.length, max: cards[0] };
                
                // Run
                let isRun = true;
                for(let i=1; i<cards.length; i++) {
                    if (cards[i] !== cards[i-1] + 1) isRun = false;
                }
                if (isRun) return { type: 'run', size: cards.length, max: cards[cards.length-1] };

                return null;
            }

            processNextTurn() {
                if (this.currentTrick.length === this.players.filter(p => !p.out).length) {
                    this.resolveTrick();
                    return;
                }

                let safety = 0;
                while(this.players[this.turn].out) {
                    this.turn = (this.turn + 1) % this.players.length;
                    if (++safety > this.players.length) { this.endGame(); return; }
                }

                this.updateUI();
                this.showStatus(`${this.players[this.turn].name}'s turn...`);

                if (this.players[this.turn].isBot) {
                    setTimeout(() => this.botPlay(), 1000);
                }
            }

            botPlay() {
                const p = this.players[this.turn];
                // Simple AI: play largest valid combo
                let bestCombo = null;
                let bestIndices = [];

                // Power set of indices is too slow, just check all sets and runs
                // For simplicity, bots will play a random single if they can't find a big one
                const singles = p.hand.map((v, i) => [i]);
                const validOptions = singles.filter(idxArr => {
                    const cards = idxArr.map(i => p.hand[i]);
                    const combo = this.identifyCombo(cards);
                    return combo && (this.trickType === 'any' || combo.type === 'single' || combo.type === this.trickType);
                });

                if (validOptions.length === 0) return;
                const pick = validOptions[Math.floor(Math.random() * validOptions.length)];
                this.selectedHandIndices = new Set(pick);
                this.playCombo();
            }

            playCombo() {
                const p = this.players[this.turn];
                const indices = Array.from(this.selectedHandIndices).sort((a,b) => b-a);
                const cards = indices.map(i => p.hand.splice(i, 1)[0]);
                const combo = this.identifyCombo(cards);

                if (this.trickType === 'any' && combo.type !== 'single') {
                    this.trickType = combo.type;
                }

                this.currentTrick.push({ pId: this.turn, cards, combo });
                this.turn = (this.turn + 1) % this.players.length;
                this.selectedHandIndices.clear();
                this.processNextTurn();
            }

            resolveTrick() {
                this.state = 'scoring';
                // Sorting order: Biggest size, then highest card, then turn order
                this.scoringOrder = this.currentTrick.map((t, idx) => ({ 
                    pId: t.pId, 
                    size: t.combo.size, 
                    max: t.combo.max,
                    order: idx
                }));

                this.scoringOrder.sort((a,b) => b.size - a.size || b.max - a.max || a.order - b.order);
                this.currentScorerIdx = 0;
                this.processScoring();
            }

            processScoring() {
                if (this.currentScorerIdx >= this.scoringOrder.length || this.pointPiles.length === 0) {
                    this.endTrick();
                    return;
                }

                this.turn = this.scoringOrder[this.currentScorerIdx].pId;
                this.updateUI();
                this.showStatus(`${this.players[this.turn].name} is choosing points...`);

                if (this.players[this.turn].isBot) {
                    setTimeout(() => {
                        this.claimPointPile(Math.floor(Math.random() * this.pointPiles.length));
                    }, 800);
                }
            }

            claimPointPile(idx) {
                if (this.state !== 'scoring') return;
                const p = this.players[this.turn];
                const pile = this.pointPiles.splice(idx, 1)[0];
                pile.forEach(val => p.score += val);

                this.currentScorerIdx++;
                this.processScoring();
            }

            endTrick() {
                // Check if players out of cards
                let outThisTrick = 0;
                this.players.forEach(p => {
                    if (p.hand.length === 0 && !p.out) {
                        p.out = true;
                        outThisTrick++;
                    }
                });

                // Move played cards to middle
                const playedCards = [];
                this.currentTrick.forEach(t => playedCards.push(...t.cards));
                
                // Each played card becomes its own pile
                this.pointPiles = playedCards.map(v => [v]);

                // Discard lowest to match player count
                this.pointPiles.sort((a,b) => (a[0] * a.length) - (b[0] * b.length));
                const activeCount = this.players.filter(p => !p.out).length;
                while (this.pointPiles.length > activeCount && activeCount > 0) {
                    this.pointPiles.shift();
                }

                // Game End Check
                const totalOut = this.players.filter(p => p.out).length;
                if (totalOut >= 2 || this.players.filter(p => !p.out).length === 0) {
                    this.endGame();
                } else {
                    // Winner of trick leads next (first in scoring order)
                    this.turn = this.scoringOrder[0].pId;
                    this.firstTrick = false;
                    this.startRound();
                }
            }

            showStatus(msg) { document.getElementById('status-msg').textContent = msg; }

            endGame() {
                this.state = 'end';
                const screen = document.getElementById('win-screen');
                const stats = document.getElementById('final-stats');
                const sorted = [...this.players].sort((a,b) => b.score - a.score);
                
                document.getElementById('winner-title').textContent = sorted[0].id === 0 ? "VICTORY!" : "DEFEAT";
                stats.innerHTML = sorted.map((p, i) => `
                    <div style="${i===0?'color:var(--accent); font-weight:900;':''}">
                        #${i+1} ${p.name}: ${p.score} points
                    </div>
                `).join('');
                screen.style.display = 'flex';
            }
        }

        const game = new PlayAndScore();
    </script>
</body>
</html>
