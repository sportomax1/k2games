<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Quick Draw</title><style>*{box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;touch-action:none}html,body{margin:0;height:100%;overflow:hidden;background:#111827;color:#fff;font-family:system-ui,-apple-system,Segoe UI,sans-serif}canvas{width:100vw;height:100vh;display:block}.hud{position:fixed;top:max(10px,env(safe-area-inset-top));left:10px;right:10px;display:flex;justify-content:space-between;gap:8px;z-index:5;pointer-events:none}.pill{background:rgba(17,24,39,.78);border:1px solid rgba(255,255,255,.22);border-radius:14px;padding:8px 10px;font-weight:1000}.pill b{color:#fde68a}.overlay{position:fixed;inset:0;display:grid;place-items:center;background:rgba(15,23,42,.84);z-index:10;padding:20px;text-align:center}.card{width:min(94vw,700px);background:linear-gradient(180deg,#1f2937,#7c2d12);border:2px solid #fed7aa;border-radius:28px;padding:24px;box-shadow:0 24px 80px rgba(0,0,0,.55)}h1{font-size:clamp(44px,12vw,80px);line-height:.82;margin:0 0 12px;color:#fde68a;text-shadow:0 5px 0 rgba(0,0,0,.35)}p{color:#ffedd5;font-weight:760;line-height:1.4}.btn{border:0;border-radius:999px;background:linear-gradient(135deg,#fde047,#fb923c);color:#431407;font-weight:1000;padding:14px 22px;font-size:18px;margin-top:14px}.draw{position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));transform:translateX(-50%);width:160px;height:94px;border-radius:24px;border:3px solid rgba(255,255,255,.32);background:rgba(251,146,60,.9);color:#431407;font-weight:1000;font-size:25px;z-index:6;box-shadow:0 9px 0 rgba(0,0,0,.32)}.draw:active{transform:translateX(-50%) scale(.94)}.focus{position:fixed;right:20px;bottom:calc(34px + env(safe-area-inset-bottom));width:84px;height:74px;border-radius:22px;border:2px solid rgba(255,255,255,.32);background:rgba(59,130,246,.82);color:#fff;font-weight:1000;z-index:6;box-shadow:0 7px 0 rgba(0,0,0,.28)}#meter{position:fixed;left:50%;top:92px;transform:translateX(-50%);width:min(420px,74vw);height:16px;border-radius:999px;background:rgba(0,0,0,.46);border:1px solid rgba(255,255,255,.25);z-index:5;overflow:hidden}#meter i{display:block;height:100%;width:0;background:linear-gradient(90deg,#22c55e,#facc15,#ef4444)}a{position:fixed;left:50%;bottom:6px;transform:translateX(-50%);z-index:7;color:#ffedd5;text-decoration:none;font-size:12px;font-weight:900;background:rgba(0,0,0,.25);padding:6px 10px;border-radius:999px}@media(max-width:720px){.pill{font-size:12px;padding:7px 8px}.draw{width:138px;height:82px}.focus{right:12px;width:70px;height:62px;font-size:12px}}</style></head><body><canvas id="c"></canvas><div class="hud"><div class="pill" id="wins">Wins <b>0</b></div><div class="pill" id="status">Wait...</div><div class="pill" id="opp">Opponent</div><div class="pill" id="best">Best --</div></div><div id="meter"><i id="bar"></i></div><button class="draw" id="draw">DRAW</button><button class="focus" id="focus">FOCUS</button><a href="index.html">← K2 HUB</a><div class="overlay" id="overlay"><div class="card"><h1>Quick Draw</h1><p>Watch for fake-outs, use focus to steady your nerves, wait for the real DRAW signal, then fire faster than increasingly nasty opponents.</p><button class="btn" id="start">START DUEL</button></div></div><script>(()=>{const c=document.getElementById('c'),x=c.getContext('2d');let W,H,D=1;function rs(){D=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0)}addEventListener('resize',rs);rs();const ui={wins:gid('wins'),status:gid('status'),best:gid('best'),opp:gid('opp'),overlay:gid('overlay'),bar:gid('bar')};function gid(id){return document.getElementById(id)}let run=false,state='idle',wins=0,streak=0,best=Number(localStorage.quickDrawBest||0),roundStart=0,signalAt=0,oppTime=0,result='',flash=0,fakeouts=[],focus=1,focusDown=false,shake=0,smoke=[],opponent={name:'Dusty Dan',color:'#1f2937',speed:760};const names=['Dusty Dan','Lefty Lou','Cactus Kate','Iron Ike','No-Blink Nell','Lightning Lopez','One-Shot Otis','The Undertaker'];function rnd(a,b){return a+Math.random()*(b-a)}function reset(){wins=0;streak=0;focus=1;ui.overlay.style.display='none';nextRound()}function nextRound(){run=true;state='wait';result='';roundStart=performance.now();let idx=Math.min(names.length-1,wins);opponent={name:names[idx],color:['#1f2937','#365314','#7f1d1d','#312e81','#4a044e','#0f766e','#713f12','#020617'][idx],speed:Math.max(180,820-wins*62+rnd(-25,65))};signalAt=roundStart+1100+rnd(0,1900)+Math.max(0,600-wins*35);fakeouts=[];let fakes=Math.min(3,Math.floor(wins/2));for(let i=0;i<fakes;i++)fakeouts.push(roundStart+rnd(500,signalAt-roundStart-250));oppTime=opponent.speed;ui.status.textContent='WAIT...';ui.wins.innerHTML='Wins <b>'+wins+'</b>';ui.opp.textContent=opponent.name}function shoot(){if(!run)return;let now=performance.now();if(state==='wait'||state==='fake'){lose(state==='fake'?'Fake-out got you!':'Too early!');return}if(state==='draw'){let rt=now-signalAt,window=oppTime+(focusDown?80:0);if(rt<window){wins++;streak++;if(!best||rt<best){best=rt;localStorage.quickDrawBest=best}result='Draw '+Math.round(rt)+'ms';flash=16;shake=8;pop(W*.5,H*.5,26);state='won';setTimeout(nextRound,950)}else lose('Too slow! '+Math.round(rt)+'ms')}}function lose(msg){run=false;state='lost';result=msg;streak=0;ui.overlay.style.display='grid';ui.overlay.querySelector('h1').textContent='Duel Over';ui.overlay.querySelector('p').textContent=msg+' Wins: '+wins+'. Best draw: '+(best?Math.round(best)+'ms':'--')+'. Opponent: '+opponent.name+'.';ui.overlay.querySelector('.btn').textContent='TRY AGAIN'}function pop(px,py,n){for(let i=0;i<n;i++)smoke.push({x:px,y:py,vx:rnd(-5,5),vy:rnd(-5,1),l:rnd(20,60),c:['#fff7ed','#fde68a','#9ca3af'][i%3],s:rnd(3,9)})}function update(){let now=performance.now();if(state==='wait'){let fake=fakeouts.find(f=>Math.abs(now-f)<80);if(fake){state='fake';ui.status.textContent='TWITCH!';flash=5;setTimeout(()=>{if(state==='fake'){state='wait';ui.status.textContent='WAIT...'}},160)}if(now>=signalAt){state='draw';ui.status.textContent='DRAW!';flash=20;shake=5}}if(state==='draw'&&now>signalAt+oppTime+(focusDown?80:0))lose(opponent.name+' fired first!');focusDown=keys.Space||keys.ArrowDown||gid('focus').dataset.down==='1';if(focusDown&&state==='wait')focus=Math.max(0,focus-.006);else focus=Math.min(1,focus+.004);ui.best.textContent='Best '+(best?Math.round(best)+'ms':'--');ui.bar.style.width=state==='draw'?Math.max(0,100-(now-signalAt)/oppTime*100)+'%':focus*100+'%';smoke.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.l--});smoke=smoke.filter(p=>p.l>0);shake=Math.max(0,shake-.5)}function drawScene(){x.setTransform(D,0,0,D,0,0);x.clearRect(0,0,W,H);if(shake)x.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);let g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0f172a');g.addColorStop(.62,'#92400e');g.addColorStop(1,'#451a03');x.fillStyle=g;x.fillRect(-20,-20,W+40,H+40);x.fillStyle='rgba(255,237,213,.12)';for(let i=0;i<34;i++)x.fillRect((i*83+performance.now()*.018)%W,H*.12+(i%8)*52,4,4);x.fillStyle='#451a03';x.fillRect(-20,H*.64,W+40,H*.36);drawCowboy(W*.25,H*.58,false,'#1f2937','YOU');drawCowboy(W*.75,H*.58,true,opponent.color,opponent.name);x.fillStyle=state==='draw'?'#ef4444':state==='fake'?'#f97316':state==='wait'?'#fde047':'#fff';x.font='1000 '+Math.floor(Math.min(62,W/8))+'px system-ui';x.textAlign='center';x.fillText(state==='draw'?'DRAW!':state==='fake'?'FAKE!':state==='wait'?'WAIT FOR IT':result||'READY',W/2,H*.25);if(state==='wait'){let sec=Math.max(0,(signalAt-performance.now())/1000);x.fillStyle='rgba(255,255,255,.72)';x.font='900 18px system-ui';x.fillText('Fake-outs: '+fakeouts.length+' · Focus: '+Math.round(focus*100)+'%',W/2,H*.31)}if(state==='draw'){let remain=Math.max(0,1-(performance.now()-signalAt)/oppTime);x.fillStyle='rgba(0,0,0,.45)';x.fillRect(W*.25,H*.32,W*.5,18);x.fillStyle=remain>.45?'#22c55e':'#ef4444';x.fillRect(W*.25,H*.32,W*.5*remain,18)}smoke.forEach(p=>{x.globalAlpha=Math.min(1,p.l/20);x.fillStyle=p.c;x.fillRect(p.x,p.y,p.s,p.s);x.globalAlpha=1});if(flash>0){x.fillStyle='rgba(255,255,255,'+(flash/22)+')';x.fillRect(-20,-20,W+40,H+40);flash--}}function drawCowboy(px,py,flip,color,label){x.save();x.translate(px,py);x.scale(flip?-1:1,1);x.fillStyle=color;x.fillRect(-24,-60,48,80);x.fillStyle='#fed7aa';x.beginPath();x.arc(0,-82,20,0,7);x.fill();x.fillStyle='#78350f';x.fillRect(-46,-105,92,11);x.fillRect(-24,-128,48,25);x.fillStyle='#111827';x.fillRect(-34,20,18,64);x.fillRect(16,20,18,64);x.strokeStyle='#fed7aa';x.lineWidth=10;x.beginPath();x.moveTo(22,-36);x.lineTo(58,-2);x.stroke();x.fillStyle='#0f172a';x.fillRect(48,-6,42,12);x.restore();x.fillStyle='#ffedd5';x.font='900 13px system-ui';x.textAlign='center';x.fillText(label,px,py+115)}function loop(){update();drawScene();requestAnimationFrame(loop)}const keys={};gid('start').onclick=reset;gid('draw').onclick=shoot;gid('focus').onpointerdown=e=>{gid('focus').dataset.down='1';e.preventDefault()};gid('focus').onpointerup=gid('focus').onpointercancel=()=>gid('focus').dataset.down='0';addEventListener('keydown',e=>{keys[e.code]=true;if(['Enter','ArrowUp'].includes(e.code)){e.preventDefault();shoot()}if(['Space','ArrowDown'].includes(e.code))e.preventDefault()});addEventListener('keyup',e=>keys[e.code]=false);requestAnimationFrame(loop);})();</script></body></html>
