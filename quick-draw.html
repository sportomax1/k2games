<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Quick Draw</title><style>*{box-sizing:border-box;user-select:none;-webkit-user-select:none;touch-action:none}html,body{margin:0;height:100%;overflow:hidden;background:#111827;color:#fff;font-family:system-ui,-apple-system,Segoe UI,sans-serif}canvas{width:100vw;height:100vh;display:block;background:#92400e}.hud{position:fixed;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;gap:8px;z-index:5;pointer-events:none}.pill{background:rgba(17,24,39,.76);border:1px solid rgba(255,255,255,.22);border-radius:14px;padding:8px 10px;font-weight:1000}.overlay{position:fixed;inset:0;display:grid;place-items:center;background:rgba(15,23,42,.84);z-index:10;padding:20px;text-align:center}.card{width:min(92vw,560px);background:linear-gradient(180deg,#1f2937,#7c2d12);border:2px solid #fed7aa;border-radius:26px;padding:24px;box-shadow:0 24px 80px rgba(0,0,0,.55)}h1{font-size:clamp(44px,12vw,76px);line-height:.82;margin:0 0 12px;color:#fde68a;text-shadow:0 4px 0 rgba(0,0,0,.35)}p{color:#ffedd5;font-weight:750;line-height:1.4}.btn{border:0;border-radius:999px;background:linear-gradient(135deg,#fde047,#fb923c);color:#431407;font-weight:1000;padding:14px 22px;font-size:18px;margin-top:14px}.draw{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);width:150px;height:92px;border-radius:24px;border:3px solid rgba(255,255,255,.32);background:rgba(251,146,60,.88);color:#431407;font-weight:1000;font-size:25px;z-index:6;box-shadow:0 9px 0 rgba(0,0,0,.32)}.draw:active{transform:translateX(-50%) scale(.94)}a{position:fixed;left:50%;bottom:8px;transform:translateX(-50%);z-index:7;color:#ffedd5;text-decoration:none;font-size:12px;font-weight:900;background:rgba(0,0,0,.25);padding:6px 10px;border-radius:999px}</style></head><body><canvas id="c"></canvas><div class="hud"><div class="pill" id="wins">Wins 0</div><div class="pill" id="status">Wait...</div><div class="pill" id="best">Best --</div></div><button class="draw" id="draw">DRAW</button><a href="index.html">← K2 HUB</a><div class="overlay" id="overlay"><div class="card"><h1>Quick Draw</h1><p>Wait for the signal, then draw faster than your rival. Fire too early and you lose. Each victory brings quicker opponents and tougher reaction windows.</p><button class="btn" id="start">START DUEL</button></div></div><script>(()=>{const c=document.getElementById('c'),x=c.getContext('2d');let W,H,D=1;function rs(){D=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0)}addEventListener('resize',rs);rs();const ui={wins:gid('wins'),status:gid('status'),best:gid('best'),overlay:gid('overlay')};function gid(id){return document.getElementById(id)}let run=false,state='idle',wins=0,best=Number(localStorage.quickDrawBest||0),roundStart=0,signalAt=0,oppTime=0,result='',flash=0;function reset(){wins=0;ui.overlay.style.display='none';nextRound()}function nextRound(){run=true;state='wait';result='';roundStart=performance.now();signalAt=roundStart+1100+Math.random()*2100;oppTime=Math.max(240,850-wins*55+Math.random()*130);ui.status.textContent='WAIT...';ui.wins.textContent='Wins '+wins}function shoot(){if(!run)return;let now=performance.now();if(state==='wait'){lose('Too Early!');return}if(state==='draw'){let rt=now-signalAt;if(rt<oppTime){wins++;if(!best||rt<best){best=rt;localStorage.quickDrawBest=best}result='You drew in '+Math.round(rt)+'ms';flash=12;state='won';setTimeout(nextRound,1050)}else lose('Too Slow! '+Math.round(rt)+'ms')}}function lose(msg){run=false;state='lost';result=msg;ui.overlay.style.display='grid';ui.overlay.querySelector('h1').textContent='Duel Over';ui.overlay.querySelector('p').textContent=msg+' Wins: '+wins+'. Best draw: '+(best?Math.round(best)+'ms':'--')+'.';ui.overlay.querySelector('.btn').textContent='TRY AGAIN'}function update(){if(state==='wait'&&performance.now()>=signalAt){state='draw';ui.status.textContent='DRAW!';flash=18}ui.best.textContent='Best '+(best?Math.round(best)+'ms':'--');if(state==='draw'&&performance.now()>signalAt+oppTime)lose('Opponent fired first!')}function drawScene(){x.clearRect(0,0,W,H);x.fillStyle='#92400e';x.fillRect(0,0,W,H);x.fillStyle='#451a03';x.fillRect(0,H*.64,W,H*.36);x.fillStyle='rgba(255,237,213,.12)';for(let i=0;i<24;i++){x.fillRect((i*83+performance.now()*.02)%W,H*.12+(i%7)*54,4,4)}drawCowboy(W*.25,H*.58,false);drawCowboy(W*.75,H*.58,true);x.fillStyle=state==='draw'?'#ef4444':state==='wait'?'#fde047':'#fff';x.font='1000 '+Math.floor(Math.min(64,W/8))+'px system-ui';x.textAlign='center';x.fillText(state==='draw'?'DRAW!':state==='wait'?'WAIT FOR IT':result||'READY',W/2,H*.25);if(state==='draw'){let remain=Math.max(0,1-(performance.now()-signalAt)/oppTime);x.fillStyle='rgba(0,0,0,.45)';x.fillRect(W*.25,H*.32,W*.5,18);x.fillStyle=remain>.45?'#22c55e':'#ef4444';x.fillRect(W*.25,H*.32,W*.5*remain,18)}if(flash>0){x.fillStyle='rgba(255,255,255,'+(flash/18)+')';x.fillRect(0,0,W,H);flash--}}function drawCowboy(px,py,flip){x.save();x.translate(px,py);x.scale(flip?-1:1,1);x.fillStyle='#1f2937';x.fillRect(-24,-60,48,80);x.fillStyle='#fed7aa';x.beginPath();x.arc(0,-82,20,0,7);x.fill();x.fillStyle='#78350f';x.fillRect(-46,-105,92,11);x.fillRect(-24,-128,48,25);x.fillStyle='#111827';x.fillRect(-34,20,18,64);x.fillRect(16,20,18,64);x.strokeStyle='#fed7aa';x.lineWidth=10;x.beginPath();x.moveTo(22,-36);x.lineTo(58,-2);x.stroke();x.fillStyle='#0f172a';x.fillRect(48,-6,42,12);x.restore()}function loop(){update();drawScene();requestAnimationFrame(loop)}document.getElementById('start').onclick=reset;document.getElementById('draw').onclick=shoot;addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='Enter'){e.preventDefault();shoot()}});requestAnimationFrame(loop);})();</script></body></html>
