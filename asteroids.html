<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroids Pro</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        canvas { border: 2px solid #00f2ff; box-shadow: 0 0 20px #00f2ff; width: 90vmin; height: 67.5vmin; max-width: 800px; max-height: 600px; }
        .hud { position: absolute; top: 20px; left: 20px; color: #00f2ff; font-family: 'Courier New', Courier, monospace; font-size: 1.5rem; text-shadow: 0 0 10px #00f2ff; }
    </style>
</head>
<body>
    <div class="hud">SCORE: <span id="score">0</span></div>
    <canvas id="game"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = 800; canvas.height = 600;

        let score = 0;
        let ship = { x: 400, y: 300, a: 0, v: {x:0, y:0}, thrust: false, dead: false };
        let asteroids = [];
        let bullets = [];
        let particles = [];
        let keys = {};

        function spawnAsteroid(x, y, r) {
            asteroids.push({
                x: x || Math.random()*800,
                y: y || Math.random()*600,
                r: r || 40,
                v: {x: (Math.random()-0.5)*4, y: (Math.random()-0.5)*4},
                verts: Math.floor(Math.random()*5)+7
            });
        }

        for(let i=0; i<5; i++) spawnAsteroid();

        function checkGamepad() {
            const pads = navigator.getGamepads();
            if (pads[0]) {
                const p = pads[0]; const b = p.buttons;
                if (Math.abs(p.axes[0]) > 0.1) ship.a += p.axes[0] * 0.08;
                ship.thrust = b[0].pressed || b[7].pressed || p.axes[1] < -0.5;
                
                const now = Date.now();
                if ((b[2].pressed || b[5].pressed) && (!this.lastFire || now - this.lastFire > 250)) {
                    shoot();
                    this.lastFire = now;
                }
            }
        }

        function shoot() {
            if(ship.dead) return;
            bullets.push({x:ship.x, y:ship.y, v:{x:ship.v.x + Math.cos(ship.a)*8, y:ship.v.y + Math.sin(ship.a)*8}, life: 50});
        }

        function explode(x, y, color, count) {
            for(let i=0; i<count; i++) {
                particles.push({x, y, v:{x:(Math.random()-0.5)*10, y:(Math.random()-0.5)*10}, life: 30, color});
            }
        }

        function update() {
            checkGamepad();
            if(!ship.dead) {
                if(keys['ArrowLeft'] || keys['a']) ship.a -= 0.08;
                if(keys['ArrowRight'] || keys['d']) ship.a += 0.08;
                if(keys['ArrowUp'] || keys['w'] || ship.thrust) {
                    ship.v.x += Math.cos(ship.a) * 0.2;
                    ship.v.y += Math.sin(ship.a) * 0.2;
                }
                ship.x += ship.v.x; ship.y += ship.v.y;
                ship.v.x *= 0.99; ship.v.y *= 0.99;
                if(ship.x < 0) ship.x = 800; if(ship.x > 800) ship.x = 0;
                if(ship.y < 0) ship.y = 600; if(ship.y > 600) ship.y = 0;
            }

            bullets.forEach((b, i) => {
                b.x += b.v.x; b.y += b.v.y; b.life--;
                if(b.life <= 0) bullets.splice(i, 1);
                if(b.x < 0) b.x = 800; if(b.x > 800) b.x = 0;
                if(b.y < 0) b.y = 600; if(b.y > 600) b.y = 0;
            });

            asteroids.forEach((a, ai) => {
                a.x += a.v.x; a.y += a.v.y;
                if(a.x < -a.r) a.x = 800+a.r; if(a.x > 800+a.r) a.x = -a.r;
                if(a.y < -a.r) a.y = 600+a.r; if(a.y > 600+a.r) a.y = -a.r;

                if(!ship.dead && Math.hypot(ship.x - a.x, ship.y - a.y) < a.r) {
                    ship.dead = true;
                    explode(ship.x, ship.y, 'cyan', 20);
                    setTimeout(() => location.reload(), 2000);
                }

                bullets.forEach((b, bi) => {
                    if(Math.hypot(b.x - a.x, b.y - a.y) < a.r) {
                        bullets.splice(bi, 1);
                        explode(a.x, a.y, '#00f2ff', 10);
                        if(a.r > 15) {
                            spawnAsteroid(a.x, a.y, a.r/2);
                            spawnAsteroid(a.x, a.y, a.r/2);
                        }
                        asteroids.splice(ai, 1);
                        score += 100;
                        document.getElementById('score').innerText = score;
                    }
                });
            });

            particles.forEach((p, i) => {
                p.x += p.v.x; p.y += p.v.y; p.life--;
                if(p.life <= 0) particles.splice(i, 1);
            });
        }

        function draw() {
            ctx.fillStyle = 'black'; ctx.fillRect(0, 0, 800, 600);
            
            if(!ship.dead) {
                ctx.strokeStyle = 'cyan'; ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(ship.x + Math.cos(ship.a)*15, ship.y + Math.sin(ship.a)*15);
                ctx.lineTo(ship.x + Math.cos(ship.a+2.5)*10, ship.y + Math.sin(ship.a+2.5)*10);
                ctx.lineTo(ship.x + Math.cos(ship.a-2.5)*10, ship.y + Math.sin(ship.a-2.5)*10);
                ctx.closePath(); ctx.stroke();
                if(keys['ArrowUp'] || ship.thrust) {
                    ctx.beginPath();
                    ctx.moveTo(ship.x + Math.cos(ship.a+Math.PI)*10, ship.y + Math.sin(ship.a+Math.PI)*10);
                    ctx.lineTo(ship.x + Math.cos(ship.a+Math.PI+0.5)*5, ship.y + Math.sin(ship.a+Math.PI+0.5)*5);
                    ctx.lineTo(ship.x + Math.cos(ship.a+Math.PI-0.5)*5, ship.y + Math.sin(ship.a+Math.PI-0.5)*5);
                    ctx.stroke();
                }
            }

            ctx.strokeStyle = '#00f2ff';
            asteroids.forEach(a => {
                ctx.beginPath();
                for(let i=0; i<a.verts; i++) {
                    const ang = (i/a.verts)*Math.PI*2;
                    const r = a.r * (0.8 + Math.random()*0.2);
                    ctx[i===0?'moveTo':'lineTo'](a.x + Math.cos(ang)*r, a.y + Math.sin(ang)*r);
                }
                ctx.closePath(); ctx.stroke();
            });

            ctx.fillStyle = 'white';
            bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 2, 0, Math.PI*2); ctx.fill(); });

            particles.forEach(p => {
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life/30;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        window.onkeydown = e => { keys[e.key] = true; if(e.key === ' ') shoot(); };
        window.onkeyup = e => keys[e.key] = false;
        loop();
    </script>
</body>
</html>
