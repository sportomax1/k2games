<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Kitchen: World Tour - K2 games</title>
    <style>
        :root {
            --bg: #0f172a;
            --floor: #1e293b;
            --accent: #f59e0b;
            --text: #f8fafc;
            --panel: rgba(30, 41, 59, 0.9);
            --danger: #ef4444;
            --success: #22c55e;
            --counter: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        nav {
            padding: 1rem 2rem;
            background: rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            height: 60px;
        }

        .logo { font-weight: 900; color: var(--accent); text-decoration: none; font-size: 1.2rem; }
        .back-link { color: var(--text); text-decoration: none; opacity: 0.7; transition: 0.2s; }

        #game-layout {
            flex: 1;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 1rem;
            padding: 1rem;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            overflow: hidden;
        }

        @media (max-width: 1024px) {
            #game-layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; overflow-y: auto; }
            #order-sidebar { height: 250px !important; }
            #screen-area { height: 600px; }
        }

        #order-sidebar {
            background: var(--panel);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
        }

        .sidebar-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 0.5rem;
            font-weight: 800;
        }

        .order-card {
            background: #fff;
            color: #1e293b;
            padding: 1rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
            border-left: 8px solid var(--accent);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .customer-id { font-size: 0.7rem; font-weight: 800; background: #e2e8f0; padding: 2px 6px; border-radius: 4px; }
        .recipe-name { font-weight: 900; font-size: 1rem; }
        
        .ingredient-list { display: flex; gap: 4px; font-size: 1.4rem; margin: 8px 0; }
        
        .patience-container { height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
        .patience-fill { height: 100%; background: var(--success); transition: width 0.1s linear; }

        #screen-area {
            position: relative;
            background: #000;
            border-radius: 24px;
            border: 8px solid #334155;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas { max-width: 100%; max-height: 100%; background: #1e293b; }

        .hud {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            pointer-events: none;
        }

        .stat-pill {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; opacity: 0.7; }
        .stat-value { font-size: 1.4rem; font-weight: 900; color: var(--accent); font-family: monospace; }

        #overlay {
            position: absolute; inset: 0;
            background: rgba(15, 23, 42, 0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center;
        }

        .btn {
            background: var(--accent); color: #000; border: none; padding: 1rem 2.5rem;
            border-radius: 50px; font-weight: 800; cursor: pointer; font-size: 1.2rem;
            margin-top: 1rem; transition: 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3); }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
            width: 100%;
            max-width: 900px;
            padding: 0 20px;
        }

        .theme-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .theme-card:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .theme-icon { font-size: 4rem; }
        .theme-name { font-weight: 900; font-size: 1.2rem; letter-spacing: 1px; }

        .hint {
            position: absolute; bottom: 20px; left: 20px;
            font-size: 0.75rem; color: #94a3b8; background: rgba(0,0,0,0.4);
            padding: 8px 15px; border-radius: 8px;
        }
    </style>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>

      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

</head>
<body>
    <nav>
        <a href="index.html" class="logo">K2 KITCHEN WORLD TOUR</a>
        <a href="index.html" class="back-link">← EXIT HUB</a>
    </nav>

    <div id="game-layout">
        <aside id="order-sidebar">
            <div class="sidebar-title">Incoming Orders</div>
            <div id="order-list"></div>
        </aside>

        <main id="screen-area">
            <canvas id="gameCanvas" width="1100" height="750"></canvas>
            
            <div class="hud">
                <div class="stat-pill">
                    <span class="stat-label">Earnings</span>
                    <span id="score-val" class="stat-value">$0</span>
                </div>
                <div class="stat-pill">
                    <span class="stat-label">Shift Timer</span>
                    <span id="timer-val" class="stat-value">3:00</span>
                </div>
            </div>

            <div id="overlay">
                <div id="selection-screen">
                    <h1 style="font-size: 3rem; color: #fff; margin-bottom: 0.5rem;">CHOOSE YOUR KITCHEN</h1>
                    <p style="opacity: 0.7;">Select a theme to start your shift</p>
                    <div class="theme-grid">
                        <div class="theme-card" onclick="game.initTheme('american')">
                            <span class="theme-icon">🍔</span>
                            <span class="theme-name">AMERICAN</span>
                        </div>
                        <div class="theme-card" onclick="game.initTheme('italian')">
                            <span class="theme-icon">🍕</span>
                            <span class="theme-name">ITALIAN</span>
                        </div>
                        <div class="theme-card" onclick="game.initTheme('mexican')">
                            <span class="theme-icon">🌮</span>
                            <span class="theme-name">MEXICAN</span>
                        </div>
                    </div>
                </div>

                <div id="results-screen" style="display: none;">
                    <h1 id="overlay-title" style="font-size: 4rem; color: var(--accent); margin-bottom: 0.5rem;">SHIFT ENDED</h1>
                    <p id="final-stats" style="font-size: 1.5rem; color: #fff;"></p>
                    <button class="btn" onclick="location.reload()">BACK TO MENU</button>
                </div>
            </div>

            <div class="hint">
                [WASD] Move • [SPACE] Interact • [X] Dash • [R] Restart
            </div>
        </main>
    </div>

    <script>
        const THEMES = {
            american: {
                name: 'Burger Joint',
                colors: { primary: '#ef4444', secondary: '#fbbf24' },
                items: {
                    main: { id: 'raw_meat', name: 'Raw Patty', emoji: '🥩', type: 'cookable' },
                    cooked: { id: 'cooked_meat', name: 'Patty', emoji: '🍖' },
                    burnt: { id: 'burnt_meat', name: 'Burnt!', emoji: '⚫' },
                    bun: { id: 'bun', name: 'Bun', emoji: '🥯' },
                    addon1: { id: 'cheese', name: 'Cheese', emoji: '🧀' },
                    addon2: { id: 'lettuce', name: 'Lettuce', emoji: '🥬' },
                    addon3: { id: 'tomato', name: 'Tomato', emoji: '🍅' }
                },
                recipes: [
                    { name: 'Plain Burger', req: ['bun', 'cooked_meat'] },
                    { name: 'Cheeseburger', req: ['bun', 'cooked_meat', 'cheese'] },
                    { name: 'Veggie Burger', req: ['bun', 'cheese', 'lettuce', 'tomato'] },
                    { name: 'Classic Deluxe', req: ['bun', 'cooked_meat', 'cheese', 'lettuce', 'tomato'] },
                    { name: 'The Monster', req: ['bun', 'cooked_meat', 'cooked_meat', 'cheese', 'lettuce'] }
                ],
                stations: { main: 'Meat', cooker: 'Grill', base: 'Buns', a1: 'Cheese', a2: 'Lettuce', a3: 'Tomato' }
            },
            italian: {
                name: 'Pizzeria',
                colors: { primary: '#166534', secondary: '#f87171' },
                items: {
                    main: { id: 'raw_dough', name: 'Raw Dough', emoji: '🍞', type: 'cookable' },
                    cooked: { id: 'cooked_pizza', name: 'Baked Pizza', emoji: '🍕' },
                    burnt: { id: 'burnt_pizza', name: 'Burnt!', emoji: '⚫' },
                    bun: { id: 'sauce', name: 'Sauce', emoji: '🍅' },
                    addon1: { id: 'mozzarella', name: 'Mozzarella', emoji: '🧀' },
                    addon2: { id: 'basil', name: 'Basil', emoji: '🌿' },
                    addon3: { id: 'pepperoni', name: 'Pepperoni', emoji: '🍖' }
                },
                recipes: [
                    { name: 'Margherita', req: ['sauce', 'cooked_pizza', 'mozzarella', 'basil'] },
                    { name: 'Pepperoni', req: ['sauce', 'cooked_pizza', 'mozzarella', 'pepperoni'] },
                    { name: 'Marinara', req: ['sauce', 'cooked_pizza', 'basil'] },
                    { name: 'Cheese Pizza', req: ['sauce', 'cooked_pizza', 'mozzarella'] },
                    { name: 'Deluxe Special', req: ['sauce', 'cooked_pizza', 'mozzarella', 'basil', 'pepperoni'] }
                ],
                stations: { main: 'Dough', cooker: 'Oven', base: 'Sauce', a1: 'Cheese', a2: 'Basil', a3: 'Toppings' }
            },
            mexican: {
                name: 'Taco Shop',
                colors: { primary: '#ea580c', secondary: '#22c55e' },
                items: {
                    main: { id: 'raw_beef', name: 'Raw Beef', emoji: '🥩', type: 'cookable' },
                    cooked: { id: 'cooked_beef', name: 'Beef', emoji: '🍖' },
                    burnt: { id: 'burnt_beef', name: 'Burnt!', emoji: '⚫' },
                    bun: { id: 'tortilla', name: 'Tortilla', emoji: '🫓' },
                    addon1: { id: 'salsa', name: 'Salsa', emoji: '🌶️' },
                    addon2: { id: 'beans', name: 'Beans', emoji: '🫘' },
                    addon3: { id: 'avocado', name: 'Avocado', emoji: '🥑' }
                },
                recipes: [
                    { name: 'Beef Taco', req: ['tortilla', 'cooked_beef', 'salsa'] },
                    { name: 'Bean Burrito', req: ['tortilla', 'beans', 'salsa'] },
                    { name: 'Quesadilla', req: ['tortilla', 'salsa', 'avocado'] },
                    { name: 'Super Taco', req: ['tortilla', 'cooked_beef', 'beans', 'salsa', 'avocado'] },
                    { name: 'Protein Bowl', req: ['cooked_beef', 'beans', 'avocado'] }
                ],
                stations: { main: 'Meat', cooker: 'Stove', base: 'Tortilla', a1: 'Salsa', a2: 'Beans', a3: 'Avocado' }
            }
        };

        const CUSTOMER_EMOJIS = ['👨', '👩', '👴', '👵', '👱', '👲', '👳', '👧', '👦', '🧔'];

        class CrazyKitchen {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.width = 1100;
                this.height = 750;

                this.player = { x: 550, y: 500, w: 60, h: 60, vx: 0, vy: 0, holding: [], anim: 0, dir: 1, dash: 0 };
                this.keys = {};
                this.score = 0;
                this.timeLeft = 180;
                this.gameActive = false;
                this.difficulty = 1;
                this.theme = null;
                
                this.stations = [];
                this.tables = [
                    { id: 'A', x: 100, y: 580, w: 120, h: 120, customer: null },
                    { id: 'B', x: 350, y: 580, w: 120, h: 120, customer: null },
                    { id: 'C', x: 600, y: 580, w: 120, h: 120, customer: null },
                    { id: 'D', x: 850, y: 580, w: 120, h: 120, customer: null }
                ];

                this.particles = [];
                this.spawnTimer = 0;
                
                window.onkeydown = (e) => {
                    this.keys[e.code] = true;
                    if(e.code === 'Space') this.interact();
                    if(e.code === 'KeyX') this.dash();
                    if(e.code === 'KeyR') location.reload();
                };
                window.onkeyup = (e) => this.keys[e.code] = false;
                
                this.loop();
            }

            initTheme(themeId) {
                this.theme = THEMES[themeId];
                this.gameActive = true;
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('selection-screen').style.display = 'none';
                
                // Initialize Stations
                this.stations = [
                    { id: 'crate_main', x: 50, y: 50, w: 100, h: 100, label: this.theme.stations.main, color: '#8B4513', icon: this.theme.items.main.emoji },
                    { id: 'cooker_1', x: 200, y: 50, w: 120, h: 100, label: this.theme.stations.cooker, color: '#334155', cooking: null, progress: 0, icon: '🔥' },
                    { id: 'cooker_2', x: 330, y: 50, w: 120, h: 100, label: this.theme.stations.cooker, color: '#334155', cooking: null, progress: 0, icon: '🔥' },
                    
                    { id: 'crate_bun', x: 500, y: 50, w: 100, h: 100, label: this.theme.stations.base, color: this.theme.colors.secondary, icon: this.theme.items.bun.emoji },
                    { id: 'crate_a1', x: 610, y: 50, w: 100, h: 100, label: this.theme.stations.a1, color: this.theme.colors.primary, icon: this.theme.items.addon1.emoji },
                    { id: 'crate_a2', x: 720, y: 50, w: 100, h: 100, label: this.theme.stations.a2, color: this.theme.colors.primary, icon: this.theme.items.addon2.emoji },
                    { id: 'crate_a3', x: 830, y: 50, w: 100, h: 100, label: this.theme.stations.a3, color: this.theme.colors.primary, icon: this.theme.items.addon3.emoji },
                    
                    { id: 'trash', x: 970, y: 50, w: 80, h: 100, label: 'Trash', color: '#64748b', icon: '🗑️' },
                    
                    { id: 'prep_1', x: 200, y: 350, w: 150, h: 100, label: 'Worktop', color: '#f1f5f9', items: [], icon: '🍽️' },
                    { id: 'prep_2', x: 400, y: 350, w: 150, h: 100, label: 'Worktop', color: '#f1f5f9', items: [], icon: '🍽️' },
                ];

                setInterval(() => {
                    if(this.gameActive) {
                        this.timeLeft--;
                        if(this.timeLeft % 30 === 0) this.difficulty++;
                        if(this.timeLeft <= 0) this.endGame();
                        this.updateTimerUI();
                    }
                }, 1000);
            }

            spawnCustomer() {
                const freeTable = this.tables.find(t => !t.customer);
                if(!freeTable) return;

                const recipes = this.theme.recipes;
                const recipe = recipes[Math.floor(Math.random() * recipes.length)];
                
                freeTable.customer = {
                    id: freeTable.id,
                    emoji: CUSTOMER_EMOJIS[Math.floor(Math.random() * CUSTOMER_EMOJIS.length)],
                    order: recipe,
                    patience: 100,
                    maxPatience: 100
                };
                this.updateOrderUI();
            }

            interact() {
                if(!this.gameActive) return;
                let nearest = null;
                let minDist = 100;

                [...this.stations, ...this.tables].forEach(s => {
                    const d = Math.hypot(this.player.x - (s.x + s.w/2), this.player.y - (s.y + s.h/2));
                    if(d < minDist) { minDist = d; nearest = s; }
                });

                if(!nearest) return;

                if(nearest.id.startsWith('crate')) {
                    const type = nearest.id.split('_')[1];
                    const itemId = type === 'main' ? this.theme.items.main.id : this.theme.items[type].id;
                    this.player.holding = [itemId];
                } else if(nearest.id.startsWith('cooker')) {
                    if(nearest.cooking) {
                        if(nearest.progress >= 100) {
                            this.player.holding = [nearest.progress >= 160 ? this.theme.items.burnt.id : this.theme.items.cooked.id];
                            nearest.cooking = null; nearest.progress = 0;
                        }
                    } else if(this.player.holding[0] === this.theme.items.main.id) {
                        nearest.cooking = this.theme.items.main.id; nearest.progress = 0;
                        this.player.holding = [];
                    }
                } else if(nearest.id.startsWith('prep')) {
                    if(this.player.holding.length > 0) {
                        nearest.items.push(this.player.holding[0]);
                        this.player.holding = [];
                    } else if(nearest.items.length > 0) {
                        this.player.holding = [...nearest.items];
                        nearest.items = [];
                    }
                } else if(nearest.id === 'trash') {
                    this.player.holding = [];
                } else if(nearest.id.length === 1) { // Table
                    if(nearest.customer && this.player.holding.length > 0) {
                        this.deliverToCustomer(nearest);
                    }
                }
            }

            deliverToCustomer(table) {
                const order = table.customer.order;
                const stack = this.player.holding;

                const isMatch = stack.length === order.req.length && 
                                order.req.every(item => stack.filter(i => i === item).length === order.req.filter(i => i === item).length);

                if(isMatch) {
                    const tip = Math.floor(table.customer.patience / 2);
                    this.score += 50 + tip;
                    this.spawnParticles(table.x + table.w/2, table.y, '#22c55e');
                    table.customer = null;
                    this.player.holding = [];
                } else {
                    this.score = Math.max(0, this.score - 25);
                    this.spawnParticles(this.player.x, this.player.y, '#ef4444');
                }
                this.updateOrderUI();
                document.getElementById('score-val').textContent = `$${this.score}`;
            }

            dash() {
                if(this.player.dash > 0) return;
                this.player.dash = 20;
            }

            update() {
                if(!this.gameActive) return;

                this.spawnTimer++;
                if(this.spawnTimer > Math.max(80, 240 - this.difficulty * 30)) {
                    this.spawnCustomer();
                    this.spawnTimer = 0;
                }

                let dx = 0, dy = 0;
                if(this.keys['ArrowUp'] || this.keys['KeyW']) dy = -1;
                if(this.keys['ArrowDown'] || this.keys['KeyS']) dy = 1;
                if(this.keys['ArrowLeft'] || this.keys['KeyA']) dx = -1;
                if(this.keys['ArrowRight'] || this.keys['KeyD']) dx = 1;

                const speed = this.player.dash > 0 ? 16 : 7;
                if(this.player.dash > 0) this.player.dash--;

                this.player.x += dx * speed;
                this.player.y += dy * speed;
                if(dx !== 0) this.player.dir = dx;
                if(dx !== 0 || dy !== 0) this.player.anim += 0.25;

                this.player.x = Math.max(30, Math.min(this.width - 30, this.player.x));
                this.player.y = Math.max(30, Math.min(this.height - 30, this.player.y));

                this.stations.forEach(s => {
                    if(s.id.startsWith('cooker') && s.cooking) s.progress += 0.4;
                });

                this.tables.forEach(t => {
                    if(t.customer) {
                        t.customer.patience -= 0.04 + (this.difficulty * 0.01);
                        if(t.customer.patience <= 0) {
                            t.customer = null;
                            this.score = Math.max(0, this.score - 50);
                            this.updateOrderUI();
                        }
                    }
                });

                this.particles.forEach((p, i) => {
                    p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                    if(p.life <= 0) this.particles.splice(i, 1);
                });
            }

            updateOrderUI() {
                const list = document.getElementById('order-list');
                const customers = this.tables.filter(t => t.customer).map(t => t.customer);
                list.innerHTML = customers.map(c => `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="recipe-name">${c.order.name}</span>
                            <span class="customer-id">TABLE ${c.id}</span>
                        </div>
                        <div class="ingredient-list">
                            ${c.order.req.map(i => {
                                // Map req ID to emoji
                                for(let key in this.theme.items) {
                                    if(this.theme.items[key].id === i) return this.theme.items[key].emoji;
                                }
                                return '❓';
                            }).join('')}
                        </div>
                        <div class="patience-container">
                            <div class="patience-fill" style="width: ${c.patience}%; background: ${c.patience < 30 ? 'var(--danger)' : 'var(--success)'}"></div>
                        </div>
                    </div>
                `).join('');
            }

            updateTimerUI() {
                const m = Math.floor(this.timeLeft / 60);
                const s = this.timeLeft % 60;
                document.getElementById('timer-val').textContent = `${m}:${s.toString().padStart(2, '0')}`;
            }

            spawnParticles(x, y, color) {
                for(let i=0; i<12; i++) {
                    this.particles.push({
                        x, y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12,
                        color, life: 1.0
                    });
                }
            }

            endGame() {
                this.gameActive = false;
                document.getElementById('overlay').style.display = 'flex';
                document.getElementById('results-screen').style.display = 'block';
                document.getElementById('final-stats').textContent = `Total Profit: $${this.score}`;
            }

            getItemEmoji(id) {
                for(let key in this.theme.items) {
                    if(this.theme.items[key].id === id) return this.theme.items[key].emoji;
                }
                return '❓';
            }

            draw() {
                const ctx = this.ctx;
                ctx.globalAlpha = 1.0;
                ctx.clearRect(0, 0, this.width, this.height);

                // Floor
                ctx.fillStyle = '#1e293b';
                ctx.fillRect(0, 0, this.width, this.height);
                ctx.strokeStyle = 'rgba(255,255,255,0.03)';
                for(let i=0; i<this.width; i+=60) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,this.height); ctx.stroke(); }
                for(let i=0; i<this.height; i+=60) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(this.width,i); ctx.stroke(); }

                if(!this.theme) return;

                // Stations
                this.stations.forEach(s => {
                    ctx.save();
                    ctx.fillStyle = s.color;
                    ctx.beginPath();
                    ctx.roundRect(s.x, s.y, s.w, s.h, 15);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.stroke();
                    
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '45px "Segoe UI Emoji"';
                    ctx.textAlign = 'center';
                    ctx.fillText(s.icon, s.x + s.w/2, s.y + s.h/2 + 15);
                    
                    // Cooking Progress
                    if(s.id.startsWith('cooker') && s.cooking) {
                        const p = Math.min(100, s.progress);
                        ctx.fillStyle = '#000'; ctx.fillRect(s.x + 10, s.y + s.h - 20, s.w - 20, 10);
                        ctx.fillStyle = s.progress > 100 ? (s.progress > 160 ? '#000' : '#ef4444') : '#fbbf24';
                        ctx.fillRect(s.x + 10, s.y + s.h - 20, (p/100)*(s.w-20), 10);
                    }

                    // Prep items
                    if(s.items) {
                        s.items.forEach((item, i) => {
                            ctx.font = '35px "Segoe UI Emoji"';
                            ctx.fillText(this.getItemEmoji(item), s.x + s.w/2, s.y + s.h/2 + 15 - (i*12));
                        });
                    }
                    ctx.restore();
                });

                // Tables
                this.tables.forEach(t => {
                    ctx.save();
                    ctx.fillStyle = '#475569';
                    ctx.beginPath(); ctx.roundRect(t.x, t.y, t.w, t.h, 20); ctx.fill();
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.font = '80px Arial'; ctx.textAlign = 'center';
                    ctx.fillText(t.id, t.x + t.w/2, t.y + t.h/2 + 25);

                    if(t.customer) {
                        ctx.translate(t.x + t.w/2, t.y + t.h/2);
                        const bob = Math.sin(Date.now()/250) * 8;
                        ctx.font = '75px "Segoe UI Emoji"';
                        ctx.fillText(t.customer.emoji, 0, bob);
                        
                        // Bubble
                        ctx.fillStyle = 'white';
                        ctx.beginPath(); ctx.arc(45, -50 + bob, 25, 0, Math.PI*2); ctx.fill();
                        ctx.font = '28px "Segoe UI Emoji"';
                        ctx.fillText(this.getItemEmoji(this.theme.items.cooked.id), 45, -40 + bob);
                    }
                    ctx.restore();
                });

                // Chef
                ctx.save();
                ctx.translate(this.player.x, this.player.y);
                if(this.player.dir === -1) ctx.scale(-1, 1);
                const waddle = Math.sin(this.player.anim) * 6;
                ctx.font = '75px "Segoe UI Emoji"';
                ctx.textAlign = 'center';
                ctx.fillText('👨‍🍳', 0, waddle);
                
                if(this.player.holding.length > 0) {
                    this.player.holding.forEach((item, i) => {
                        ctx.font = '40px "Segoe UI Emoji"';
                        ctx.fillText(this.getItemEmoji(item), 40, -35 - (i*15) + waddle);
                    });
                }
                ctx.restore();

                // Particles
                this.particles.forEach(p => {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
                });
                ctx.globalAlpha = 1.0;
            }

            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        }

        const game = new CrazyKitchen();

        // Gamepad Adapter
        (function() {
            let lastInteract = 0;
            let lastDash = 0;
            function poll() {
                const pads = navigator.getGamepads();
                if (pads[0]) {
                    const p = pads[0];
                    const ax = p.axes[0];
                    const ay = p.axes[1];
                    const now = Date.now();
                    game.keys['ArrowLeft'] = ax < -0.3 || p.buttons[14].pressed;
                    game.keys['ArrowRight'] = ax > 0.3 || p.buttons[15].pressed;
                    game.keys['ArrowUp'] = ay < -0.3 || p.buttons[12].pressed;
                    game.keys['ArrowDown'] = ay > 0.3 || p.buttons[13].pressed;
                    if (p.buttons[0].pressed && now - lastInteract > 250) { game.interact(); lastInteract = now; }
                    if (p.buttons[2].pressed && now - lastDash > 500) { game.dash(); lastDash = now; }
                }
                requestAnimationFrame(poll);
            }
            poll();
        })();
    </script>
</body>
</html>
