<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Hog Hustle</title><style>*{box-sizing:border-box;user-select:none;-webkit-user-select:none;touch-action:none}html,body{margin:0;height:100%;overflow:hidden;background:#2b170d;color:#fff;font-family:system-ui,-apple-system,Segoe UI,sans-serif}canvas{width:100vw;height:100vh;display:block;background:#854d0e}.hud{position:fixed;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;gap:8px;z-index:5;pointer-events:none}.pill{background:rgba(41,18,5,.74);border:1px solid rgba(255,255,255,.22);border-radius:14px;padding:8px 10px;font-weight:1000}.overlay{position:fixed;inset:0;display:grid;place-items:center;background:rgba(26,10,4,.84);z-index:10;padding:20px;text-align:center}.card{width:min(92vw,560px);background:linear-gradient(180deg,#be185d,#7c2d12);border:2px solid #fbcfe8;border-radius:26px;padding:24px;box-shadow:0 24px 80px rgba(0,0,0,.55)}h1{font-size:clamp(44px,12vw,76px);line-height:.82;margin:0 0 12px;color:#fbcfe8;text-shadow:0 4px 0 rgba(0,0,0,.35)}p{color:#fce7f3;font-weight:750;line-height:1.4}.btn{border:0;border-radius:999px;background:linear-gradient(135deg,#f9a8d4,#fb923c);color:#431407;font-weight:1000;padding:14px 22px;font-size:18px;margin-top:14px}.joy{position:fixed;left:18px;bottom:18px;width:126px;height:126px;border-radius:50%;background:rgba(67,20,7,.44);border:2px solid rgba(255,255,255,.22);z-index:6}.nub{position:absolute;left:39px;top:39px;width:46px;height:46px;border-radius:50%;background:#f9a8d4}.catch{position:fixed;right:20px;bottom:24px;width:104px;height:104px;border-radius:50%;border:2px solid rgba(255,255,255,.32);background:rgba(251,146,60,.85);color:#431407;font-weight:1000;font-size:18px;z-index:6;box-shadow:0 8px 0 rgba(0,0,0,.28)}a{position:fixed;left:50%;bottom:8px;transform:translateX(-50%);z-index:7;color:#fce7f3;text-decoration:none;font-size:12px;font-weight:900;background:rgba(0,0,0,.25);padding:6px 10px;border-radius:999px}</style></head><body><canvas id="c"></canvas><div class="hud"><div class="pill" id="score">Caught 0</div><div class="pill" id="time">60</div><div class="pill" id="round">Round 1</div></div><div class="joy" id="joy"><div class="nub" id="nub"></div></div><button class="catch" id="catch">GRAB</button><a href="index.html">← K2 HUB</a><div class="overlay" id="overlay"><div class="card"><h1>Hog Hustle</h1><p>Slippery pigs are loose in the rodeo arena. Chase, corner, and grab as many as you can before the clock runs out. Every round gets faster and messier.</p><button class="btn" id="start">START HUSTLE</button></div></div><script>(()=>{const c=document.getElementById('c'),x=c.getContext('2d');let W,H,D=1;function rs(){D=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0)}addEventListener('resize',rs);rs();const ui={score:gid('score'),time:gid('time'),round:gid('round'),overlay:gid('overlay')};function gid(id){return document.getElementById(id)}let run=false,last=0,t=60,score=0,round=1,spawn=0,pigs=[],fx=[],keys={},joy={x:0,y:0},player={x:W/2,y:H/2,vx:0,vy:0,r:24,cool:0};function rnd(a,b){return a+Math.random()*(b-a)}function reset(){run=true;t=60;score=0;round=1;spawn=0;pigs=[];fx=[];player.x=W/2;player.y=H/2;player.vx=player.vy=0;ui.overlay.style.display='none';last=performance.now();requestAnimationFrame(loop)}function pig(){let a=rnd(0,7);return{x:rnd(70,W-70),y:rnd(120,H-130),vx:Math.cos(a)*rnd(80,140+round*20),vy:Math.sin(a)*rnd(80,140+round*20),r:rnd(18,25),zig:rnd(.3,1.2),t:rnd(0,7)}}function pop(px,py,n){for(let i=0;i<n;i++)fx.push({x:px,y:py,vx:rnd(-4,4),vy:rnd(-5,2),l:rnd(18,42),c:['#f9a8d4','#fef3c7','#fb923c'][i%3]})}function update(dt){if(!run)return;t-=dt;if(t<=0){end();return}round=1+Math.floor((60-t)/15);spawn-=dt;if(spawn<=0&&pigs.length<5+round){pigs.push(pig());spawn=rnd(.6,1.2)}let ax=(keys.ArrowRight||keys.KeyD?1:0)-(keys.ArrowLeft||keys.KeyA?1:0)+joy.x,ay=(keys.ArrowDown||keys.KeyS?1:0)-(keys.ArrowUp||keys.KeyW?1:0)+joy.y,l=Math.hypot(ax,ay)||1;player.vx=player.vx*.82+ax/l*18;player.vy=player.vy*.82+ay/l*18;player.x=clamp(player.x+player.vx,32,W-32);player.y=clamp(player.y+player.vy,88,H-40);player.cool=Math.max(0,player.cool-dt);pigs.forEach(o=>{o.t+=dt;let fear=Math.hypot(o.x-player.x,o.y-player.y);if(fear<140){o.vx+=(o.x-player.x)/fear*80*dt;o.vy+=(o.y-player.y)/fear*80*dt}o.vx+=Math.sin(o.t*5)*o.zig*20*dt;o.vy+=Math.cos(o.t*4)*o.zig*20*dt;o.x+=o.vx*dt;o.y+=o.vy*dt;o.vx*=.995;o.vy*=.995;if(o.x<40||o.x>W-40)o.vx*=-1;if(o.y<90||o.y>H-50)o.vy*=-1;o.x=clamp(o.x,40,W-40);o.y=clamp(o.y,90,H-50)});if((keys.Space||document.getElementById('catch').dataset.down==='1')&&player.cool<=0){player.cool=.45;for(let i=pigs.length-1;i>=0;i--){let o=pigs[i];if(Math.hypot(o.x-player.x,o.y-player.y)<player.r+o.r+22){score++;pop(o.x,o.y,26);pigs.splice(i,1);break}}}fx.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.l--});fx=fx.filter(p=>p.l>0);ui.score.textContent='Caught '+score;ui.time.textContent=Math.ceil(t);ui.round.textContent='Round '+round}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function end(){run=false;ui.overlay.style.display='grid';ui.overlay.querySelector('h1').textContent='Caught '+score;ui.overlay.querySelector('p').textContent='The pigs remain slippery and emotionally unavailable. Round reached: '+round+'.';ui.overlay.querySelector('.btn').textContent='PLAY AGAIN'}function draw(){x.clearRect(0,0,W,H);x.fillStyle='#92400e';x.fillRect(0,0,W,H);x.fillStyle='#713f12';x.fillRect(0,H*.72,W,H*.28);x.strokeStyle='rgba(255,255,255,.22)';x.lineWidth=5;x.strokeRect(28,82,W-56,H-126);for(let i=0;i<10;i++){x.strokeStyle='rgba(255,255,255,.12)';x.beginPath();x.moveTo(28,110+i*70);x.lineTo(W-28,110+i*70);x.stroke()}pigs.forEach(drawPig);x.save();x.translate(player.x,player.y);x.fillStyle='#2563eb';x.fillRect(-18,-24,36,50);x.fillStyle='#fed7aa';x.beginPath();x.arc(0,-38,15,0,7);x.fill();x.fillStyle='#78350f';x.fillRect(-30,-54,60,8);x.fillRect(-18,-70,36,17);if(player.cool>.25){x.strokeStyle='#fde68a';x.lineWidth=6;x.beginPath();x.arc(0,0,player.r+30,0,7);x.stroke()}x.restore();fx.forEach(p=>{x.fillStyle=p.c;x.fillRect(p.x,p.y,5,5)})}function drawPig(o){x.save();x.translate(o.x,o.y);x.rotate(Math.atan2(o.vy,o.vx));x.fillStyle='#f9a8d4';x.beginPath();x.ellipse(0,0,o.r*1.35,o.r*.8,0,0,7);x.fill();x.fillStyle='#fbcfe8';x.beginPath();x.arc(o.r*1.2,0,o.r*.55,0,7);x.fill();x.fillStyle='#831843';x.fillRect(o.r*1.45,-3,5,6);x.fillStyle='#111827';x.fillRect(-o.r*.5,o.r*.5,6,12);x.fillRect(o.r*.25,o.r*.5,6,12);x.restore()}function loop(now){let dt=Math.min(.033,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}document.getElementById('start').onclick=reset;addEventListener('keydown',e=>{keys[e.code]=true;if(e.code.startsWith('Arrow')||e.code==='Space')e.preventDefault()});addEventListener('keyup',e=>keys[e.code]=false);const joyEl=gid('joy'),nub=gid('nub');joyEl.onpointerdown=e=>{joyEl.setPointerCapture(e.pointerId);moveJoy(e)};joyEl.onpointermove=moveJoy;joyEl.onpointerup=joyEl.onpointercancel=()=>{joy.x=joy.y=0;nub.style.left='39px';nub.style.top='39px'};function moveJoy(e){let r=joyEl.getBoundingClientRect(),dx=e.clientX-r.left-r.width/2,dy=e.clientY-r.top-r.height/2,m=Math.min(42,Math.hypot(dx,dy)),a=Math.atan2(dy,dx);joy.x=Math.cos(a)*m/42;joy.y=Math.sin(a)*m/42;nub.style.left=39+joy.x*42+'px';nub.style.top=39+joy.y*42+'px'}const cb=gid('catch');cb.onpointerdown=e=>{cb.dataset.down='1';e.preventDefault()};cb.onpointerup=cb.onpointercancel=()=>cb.dataset.down='0';})();</script></body></html>
