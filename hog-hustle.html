<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Hog Hustle</title><style>*{box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;touch-action:none}html,body{margin:0;height:100%;overflow:hidden;background:#2b170d;color:#fff;font-family:system-ui,-apple-system,Segoe UI,sans-serif}canvas{width:100vw;height:100vh;display:block}.hud{position:fixed;top:max(10px,env(safe-area-inset-top));left:10px;right:10px;display:flex;justify-content:space-between;gap:8px;z-index:5;pointer-events:none}.pill{background:rgba(41,18,5,.78);border:1px solid rgba(255,255,255,.22);border-radius:14px;padding:8px 10px;font-weight:1000}.pill b{color:#f9a8d4}.overlay{position:fixed;inset:0;display:grid;place-items:center;background:rgba(26,10,4,.84);z-index:10;padding:20px;text-align:center}.card{width:min(94vw,680px);background:linear-gradient(180deg,#be185d,#7c2d12);border:2px solid #fbcfe8;border-radius:28px;padding:24px;box-shadow:0 24px 80px rgba(0,0,0,.55)}h1{font-size:clamp(44px,12vw,80px);line-height:.82;margin:0 0 12px;color:#fbcfe8;text-shadow:0 5px 0 rgba(0,0,0,.35)}p{color:#fce7f3;font-weight:760;line-height:1.4}.btn{border:0;border-radius:999px;background:linear-gradient(135deg,#f9a8d4,#fb923c);color:#431407;font-weight:1000;padding:14px 22px;font-size:18px;margin-top:14px}.joy{position:fixed;left:18px;bottom:calc(18px + env(safe-area-inset-bottom));width:126px;height:126px;border-radius:50%;background:rgba(67,20,7,.48);border:2px solid rgba(255,255,255,.22);z-index:6}.nub{position:absolute;left:39px;top:39px;width:46px;height:46px;border-radius:50%;background:#f9a8d4}.catch{position:fixed;right:20px;bottom:calc(24px + env(safe-area-inset-bottom));width:104px;height:104px;border-radius:50%;border:2px solid rgba(255,255,255,.32);background:rgba(251,146,60,.9);color:#431407;font-weight:1000;font-size:17px;z-index:6;box-shadow:0 8px 0 rgba(0,0,0,.28)}.dash{position:fixed;right:138px;bottom:calc(42px + env(safe-area-inset-bottom));width:76px;height:76px;border-radius:22px;border:2px solid rgba(255,255,255,.32);background:rgba(59,130,246,.82);color:#fff;font-weight:1000;z-index:6;box-shadow:0 7px 0 rgba(0,0,0,.28)}.catch:active,.dash:active{transform:scale(.94)}a{position:fixed;left:50%;bottom:6px;transform:translateX(-50%);z-index:7;color:#fce7f3;text-decoration:none;font-size:12px;font-weight:900;background:rgba(0,0,0,.25);padding:6px 10px;border-radius:999px}@media(max-width:720px){.pill{font-size:12px;padding:7px 8px}.joy{width:112px;height:112px}.nub{left:33px;top:33px}.catch{width:92px;height:92px}.dash{right:118px;width:66px;height:66px;font-size:12px}}</style></head><body><canvas id="c"></canvas><div class="hud"><div class="pill" id="score">Score <b>0</b></div><div class="pill" id="time">75</div><div class="pill" id="round">Round 1</div><div class="pill" id="combo">Combo 0</div></div><div class="joy" id="joy"><div class="nub" id="nub"></div></div><button class="dash" id="dash">DASH</button><button class="catch" id="catch">GRAB</button><a href="index.html">← K2 HUB</a><div class="overlay" id="overlay"><div class="card"><h1>Hog Hustle</h1><p>Chase smart pigs through mud, fences, gates, feed traps, and bonus golden hogs. Dash, grab, build combos, and avoid the angry boar.</p><button class="btn" id="start">START HUSTLE</button></div></div><script>(()=>{const c=document.getElementById('c'),x=c.getContext('2d');let W,H,D=1;function rs(){D=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0)}addEventListener('resize',rs);rs();const ui={score:gid('score'),time:gid('time'),round:gid('round'),combo:gid('combo'),overlay:gid('overlay')};function gid(id){return document.getElementById(id)}let run=false,last=0,t=75,score=0,round=1,spawn=0,pigs=[],fx=[],texts=[],mud=[],feed=[],gates=[],keys={},joy={x:0,y:0},player={x:0,y:0,vx:0,vy:0,r:24,cool:0,dash:1,stun:0},combo=0,comboT=0;function rnd(a,b){return a+Math.random()*(b-a)}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function reset(){run=true;t=75;score=0;round=1;spawn=0;pigs=[];fx=[];texts=[];mud=[];feed=[];gates=[];combo=0;comboT=0;player.x=W/2;player.y=H/2;player.vx=player.vy=0;player.cool=0;player.dash=1;player.stun=0;buildArena();ui.overlay.style.display='none';last=performance.now();requestAnimationFrame(loop)}function buildArena(){for(let i=0;i<5;i++)mud.push({x:rnd(70,W-170),y:rnd(130,H-210),w:rnd(90,150),h:rnd(55,95)});for(let i=0;i<4;i++)gates.push({x:rnd(80,W-180),y:rnd(150,H-230),w:rnd(90,150),h:12});feed.push({x:W*.5,y:H*.32,r:28,l:10})}function pig(type){let a=rnd(0,7),speed={pig:125,greased:185,gold:230,boar:150}[type]||130;return{x:rnd(70,W-70),y:rnd(120,H-130),vx:Math.cos(a)*rnd(speed*.7,speed*1.2),vy:Math.sin(a)*rnd(speed*.7,speed*1.2),r:type==='boar'?28:type==='gold'?19:rnd(18,25),zig:rnd(.4,1.5),t:rnd(0,7),type,state:'run',bait:0}}function pop(px,py,n,cset){for(let i=0;i<n;i++)fx.push({x:px,y:py,vx:rnd(-5,5),vy:rnd(-6,2),l:rnd(18,50),c:(cset||['#f9a8d4','#fef3c7','#fb923c'])[i%3],s:rnd(3,7)})}function floatText(txt,px,py,c){texts.push({txt,x:px,y:py,vy:-1.2,l:64,c})}function update(dt){if(!run)return;t-=dt;if(t<=0){end();return}round=1+Math.floor((75-t)/15);spawn-=dt;if(spawn<=0&&pigs.length<5+round){let type=Math.random()<.08?'boar':Math.random()<.20?'gold':Math.random()<.46?'greased':'pig';pigs.push(pig(type));spawn=rnd(.45,1.0)/(1+round*.06)}if(Math.random()<dt*.08)feed.push({x:rnd(80,W-80),y:rnd(125,H-95),r:24,l:9});feed.forEach(f=>f.l-=dt);feed=feed.filter(f=>f.l>0);let ax=(keys.ArrowRight||keys.KeyD?1:0)-(keys.ArrowLeft||keys.KeyA?1:0)+joy.x,ay=(keys.ArrowDown||keys.KeyS?1:0)-(keys.ArrowUp||keys.KeyW?1:0)+joy.y,l=Math.hypot(ax,ay)||1;let slow=mud.some(m=>player.x>m.x&&player.x<m.x+m.w&&player.y>m.y&&player.y<m.y+m.h)?.62:1;if(player.stun>0){player.stun-=dt;slow=.25}player.vx=player.vx*.80+ax/l*20*slow;player.vy=player.vy*.80+ay/l*20*slow;if((keys.ShiftLeft||keys.ShiftRight||gid('dash').dataset.down==='1')&&player.dash>=1){player.vx+=ax/l*46;player.vy+=ay/l*46;player.dash=0;pop(player.x,player.y,16,['#93c5fd','#dbeafe','#60a5fa'])}player.dash=clamp(player.dash+dt*.45,0,1);player.x=clamp(player.x+player.vx,32,W-32);player.y=clamp(player.y+player.vy,88,H-40);player.cool=Math.max(0,player.cool-dt);comboT-=dt;if(comboT<=0)combo=0;pigs.forEach(o=>{o.t+=dt;let fear=Math.hypot(o.x-player.x,o.y-player.y)||1;let nearestFeed=feed.find(f=>Math.hypot(f.x-o.x,f.y-o.y)<150);if(nearestFeed&&o.type!=='boar'){o.vx+=(nearestFeed.x-o.x)/Math.hypot(nearestFeed.x-o.x,nearestFeed.y-o.y)*42*dt;o.vy+=(nearestFeed.y-o.y)/Math.hypot(nearestFeed.x-o.x,nearestFeed.y-o.y)*42*dt}else if(fear<170){o.vx+=(o.x-player.x)/fear*(o.type==='greased'?150:95)*dt;o.vy+=(o.y-player.y)/fear*(o.type==='greased'?150:95)*dt}if(o.type==='boar'&&fear<260){o.vx+=(player.x-o.x)/fear*150*dt;o.vy+=(player.y-o.y)/fear*150*dt}o.vx+=Math.sin(o.t*5)*o.zig*25*dt;o.vy+=Math.cos(o.t*4)*o.zig*25*dt;let oslow=mud.some(m=>o.x>m.x&&o.x<m.x+m.w&&o.y>m.y&&o.y<m.y+m.h)?.72:1;o.x+=o.vx*dt*oslow;o.y+=o.vy*dt*oslow;o.vx*=.994;o.vy*=.994;gates.forEach(g=>{if(o.x>g.x&&o.x<g.x+g.w&&Math.abs(o.y-g.y)<12)o.vy*=-1;if(player.x>g.x&&player.x<g.x+g.w&&Math.abs(player.y-g.y)<10)player.y+=player.y<g.y?-8:8});if(o.x<40||o.x>W-40)o.vx*=-1;if(o.y<90||o.y>H-50)o.vy*=-1;o.x=clamp(o.x,40,W-40);o.y=clamp(o.y,90,H-50);if(o.type==='boar'&&fear<player.r+o.r+8){player.stun=.7;pop(player.x,player.y,20,['#ef4444','#fee2e2','#991b1b']);floatText('BONK!',player.x,player.y,'#fca5a5')}});if((keys.Space||gid('catch').dataset.down==='1')&&player.cool<=0){player.cool=.40;let got=false;for(let i=pigs.length-1;i>=0;i--){let o=pigs[i],d=Math.hypot(o.x-player.x,o.y-player.y);if(d<player.r+o.r+26&&o.type!=='boar'){combo++;comboT=2.2;let pts=Math.floor((o.type==='gold'?750:o.type==='greased'?260:180)*(1+combo*.18));score+=pts;t+=o.type==='gold'?2:.45;floatText('+'+pts,o.x,o.y,o.type==='gold'?'#fde047':'#fff7ed');pop(o.x,o.y,o.type==='gold'?42:26,o.type==='gold'?['#fde047','#facc15','#fff7ed']:null);pigs.splice(i,1);got=true;break}}if(!got){combo=0;floatText('WHIFF',player.x,player.y,'#fecaca')}}fx.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.13;p.l--});fx=fx.filter(p=>p.l>0);texts.forEach(p=>{p.y+=p.vy;p.l--});texts=texts.filter(p=>p.l>0);ui.score.innerHTML='Score <b>'+score+'</b>';ui.time.textContent=Math.ceil(t);ui.round.textContent='Round '+round;ui.combo.textContent='Combo '+combo}function end(){run=false;ui.overlay.style.display='grid';ui.overlay.querySelector('h1').textContent='Score '+score;ui.overlay.querySelector('p').textContent='Round '+round+' reached. Greased pigs, bait traps, boar bonks, and mud chaos completed.';ui.overlay.querySelector('.btn').textContent='PLAY AGAIN'}function draw(){x.clearRect(0,0,W,H);let g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#92400e');g.addColorStop(.7,'#a16207');g.addColorStop(1,'#713f12');x.fillStyle=g;x.fillRect(0,0,W,H);x.strokeStyle='rgba(255,255,255,.23)';x.lineWidth=5;x.strokeRect(28,82,W-56,H-126);mud.forEach(m=>{x.fillStyle='rgba(69,26,3,.55)';roundRect(m.x,m.y,m.w,m.h,26);x.fill()});gates.forEach(g=>{x.fillStyle='#7c2d12';x.fillRect(g.x,g.y,g.w,g.h);x.fillStyle='#fef3c7';x.fillRect(g.x,g.y-3,g.w,3)});feed.forEach(f=>{x.fillStyle='#facc15';x.beginPath();x.arc(f.x,f.y,f.r,0,7);x.fill();x.fillStyle='#7c2d12';x.font='900 17px system-ui';x.textAlign='center';x.fillText('FEED',f.x,f.y+6)});pigs.forEach(drawPig);drawPlayer();fx.forEach(p=>{x.fillStyle=p.c;x.fillRect(p.x,p.y,p.s,p.s)});texts.forEach(p=>{x.globalAlpha=Math.min(1,p.l/25);x.fillStyle=p.c;x.font='1000 24px system-ui';x.textAlign='center';x.fillText(p.txt,p.x,p.y);x.globalAlpha=1})}function roundRect(x0,y0,w,h,r){x.beginPath();x.moveTo(x0+r,y0);x.arcTo(x0+w,y0,x0+w,y0+h,r);x.arcTo(x0+w,y0+h,x0,y0+h,r);x.arcTo(x0,y0+h,x0,y0,r);x.arcTo(x0,y0,x0+w,y0,r);x.closePath()}function drawPlayer(){x.save();x.translate(player.x,player.y);x.fillStyle=player.stun>0?'#94a3b8':'#2563eb';x.fillRect(-18,-24,36,50);x.fillStyle='#fed7aa';x.beginPath();x.arc(0,-38,15,0,7);x.fill();x.fillStyle='#78350f';x.fillRect(-30,-54,60,8);x.fillRect(-18,-70,36,17);if(player.cool>.18){x.strokeStyle='#fde68a';x.lineWidth=6;x.beginPath();x.arc(0,0,player.r+30,0,7);x.stroke()}x.strokeStyle='#93c5fd';x.lineWidth=5;x.beginPath();x.arc(0,0,player.r+42*player.dash,-Math.PI*.5,Math.PI*1.5*player.dash-Math.PI*.5);x.stroke();x.restore()}function drawPig(o){x.save();x.translate(o.x,o.y);x.rotate(Math.atan2(o.vy,o.vx));x.fillStyle=o.type==='gold'?'#fde047':o.type==='boar'?'#4b1d0b':o.type==='greased'?'#f0abfc':'#f9a8d4';x.beginPath();x.ellipse(0,0,o.r*1.35,o.r*.8,0,0,7);x.fill();x.fillStyle=o.type==='boar'?'#2b0d06':'#fbcfe8';x.beginPath();x.arc(o.r*1.2,0,o.r*.55,0,7);x.fill();x.fillStyle='#831843';x.fillRect(o.r*1.45,-3,5,6);x.fillStyle='#111827';x.fillRect(-o.r*.5,o.r*.5,6,12);x.fillRect(o.r*.25,o.r*.5,6,12);if(o.type==='boar'){x.strokeStyle='#fff7ed';x.lineWidth=3;x.beginPath();x.moveTo(o.r*1.45,-6);x.lineTo(o.r*1.85,-16);x.moveTo(o.r*1.45,6);x.lineTo(o.r*1.85,16);x.stroke()}x.restore()}function loop(now){let dt=Math.min(.033,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}gid('start').onclick=reset;addEventListener('keydown',e=>{keys[e.code]=true;if(e.code.startsWith('Arrow')||['Space','ShiftLeft','ShiftRight'].includes(e.code))e.preventDefault()});addEventListener('keyup',e=>keys[e.code]=false);const joyEl=gid('joy'),nub=gid('nub');joyEl.onpointerdown=e=>{joyEl.setPointerCapture(e.pointerId);moveJoy(e)};joyEl.onpointermove=moveJoy;joyEl.onpointerup=joyEl.onpointercancel=()=>{joy.x=joy.y=0;nub.style.left='39px';nub.style.top='39px'};function moveJoy(e){let r=joyEl.getBoundingClientRect(),dx=e.clientX-r.left-r.width/2,dy=e.clientY-r.top-r.height/2,m=Math.min(42,Math.hypot(dx,dy)),a=Math.atan2(dy,dx);joy.x=Math.cos(a)*m/42;joy.y=Math.sin(a)*m/42;nub.style.left=39+joy.x*42+'px';nub.style.top=39+joy.y*42+'px'}const cb=gid('catch'),db=gid('dash');cb.onpointerdown=e=>{cb.dataset.down='1';e.preventDefault()};cb.onpointerup=cb.onpointercancel=()=>cb.dataset.down='0';db.onpointerdown=e=>{db.dataset.down='1';e.preventDefault()};db.onpointerup=db.onpointercancel=()=>db.dataset.down='0';})();</script></body></html>
