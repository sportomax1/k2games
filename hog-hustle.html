<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Hog Hustle</title><meta name="theme-color" content="#be185d"><style>*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#19340f;color:#fff;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;touch-action:none}canvas{width:100vw;height:100vh;display:block}.hud{position:fixed;z-index:9;top:max(10px,env(safe-area-inset-top));left:10px;right:10px;display:flex;justify-content:space-between;gap:8px;pointer-events:none}.stats{display:flex;gap:8px;flex-wrap:wrap}.pill,.btn{border:1px solid #ffffff32;background:#1f2937d8;color:#fff;border-radius:14px;padding:9px 12px;font-weight:900;box-shadow:0 8px 24px #0005;backdrop-filter:blur(8px)}.pill b{color:#f9a8d4}.btn{pointer-events:auto}.overlay{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 50% 25%,#be185d66,#091005ed 62%);z-index:30;padding:20px;text-align:center}.card{width:min(92vw,650px);padding:26px;border:1px solid #ffffff2d;border-radius:27px;background:linear-gradient(180deg,#3f1d2dcc,#182316e8);box-shadow:0 30px 100px #000b}.card h1{font-size:clamp(44px,10vw,82px);line-height:.82;margin:0;color:#f9a8d4;text-shadow:0 6px 0 #831843}.card p{line-height:1.5;color:#fce7f3}.primary{border:0;border-radius:999px;background:linear-gradient(135deg,#f9a8d4,#fb7185);color:#500724;padding:14px 24px;font-size:18px;font-weight:1000}.controls{position:fixed;inset:0;z-index:12;pointer-events:none}.joy{position:absolute;left:18px;bottom:calc(18px + env(safe-area-inset-bottom));width:118px;height:118px;border-radius:50%;border:2px solid #ffffff35;background:#0005;pointer-events:auto}.nub{position:absolute;left:36px;top:36px;width:46px;height:46px;border-radius:50%;background:#f9a8dcc}.action{position:absolute;right:22px;bottom:calc(24px + env(safe-area-inset-bottom));width:94px;height:94px;border-radius:50%;border:2px solid #ffffff50;color:#fff;font-weight:1000;pointer-events:auto;box-shadow:0 8px 0 #4a044e}.feed{right:130px;bottom:calc(42px + env(safe-area-inset-bottom));width:70px;height:70px;background:#eab308;color:#422006;box-shadow:0 7px 0 #713f12}.lasso{background:linear-gradient(135deg,#ec4899,#9d174d)}.home{position:fixed;left:50%;bottom:6px;transform:translateX(-50%);z-index:20;color:#fff;text-decoration:none;font-size:12px;font-weight:900;background:#0008;padding:6px 10px;border-radius:999px}@media(pointer:fine){.joy,.action{opacity:.48}}@media(max-width:650px){.pill{font-size:12px;padding:7px 9px}.joy{width:106px;height:106px}.nub{left:30px;top:30px}.action{width:82px;height:82px}.feed{right:112px;width:62px;height:62px}}</style></head><body><canvas id="c"></canvas><div class="hud"><div class="stats"><div class="pill">CAUGHT <b id="caught">0/10</b></div><div class="pill">TIME <b id="time">90</b></div><div class="pill">COMBO <b id="combo">x1</b></div></div><button class="btn" id="pause">PAUSE</button></div><div class="controls"><div class="joy" id="joy"><div class="nub" id="nub"></div></div><button class="action feed" id="feed">FEED</button><button class="action lasso" id="lasso">LASSO</button></div><a class="home" href="index.html">← K2 HUB</a><div class="overlay" id="ov"><div class="card"><h1>HOG<br>HUSTLE</h1><p>Move tightly, face the pig, and cast a directional lasso. Use feed to lure pigs into open ground and avoid the charging boar.</p><p><b>Move:</b> WASD/arrows or joystick &nbsp; <b>Aim:</b> movement direction/mouse &nbsp; <b>Lasso:</b> Space &nbsp; <b>Feed:</b> F</p><button class="primary" id="start">START HUSTLE</button></div></div><script>(()=>{const c=document.getElementById('c'),x=c.getContext('2d'),$=id=>document.getElementById(id),rnd=(a,b)=>a+Math.random()*(b-a),clamp=(v,a,b)=>Math.max(a,Math.min(b,v));let W=1,H=1,D=1,run=false,paused=false,last=0,time=90,target=10,caught=0,combo=1,comboT=0,keys={},joy={x:0,y:0},mouse={x:0,y:0},pigs=[],mud=[],fences=[],feed=[],fx=[],texts=[],shake=0,player={x:0,y:0,r:18,dirX:1,dirY:0,cast:0,cool:0,stun:0};function resize(){D=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0)}addEventListener('resize',resize);resize();function makePig(type='pig'){let a=rnd(0,Math.PI*2),s={pig:82,greased:115,gold:128,boar:92}[type];return{x:rnd(55,W-55),y:rnd(115,H-55),vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:type==='boar'?25:type==='gold'?17:20,type,turn:rnd(.6,1.8),t:rnd(0,8),caught:0}}function build(){mud=[];fences=[];for(let i=0;i<5;i++)mud.push({x:rnd(35,W-170),y:rnd(120,H-150),w:rnd(95,165),h:rnd(55,90)});for(let i=0;i<7;i++){const vertical=Math.random()<.45;fences.push({x:rnd(50,W-170),y:rnd(125,H-130),w:vertical?12:rnd(90,155),h:vertical?rnd(90,155):12})}}function reset(){run=true;paused=false;time=90;target=10;caught=0;combo=1;comboT=0;pigs=[];feed=[];fx=[];texts=[];shake=0;build();player.x=W/2;player.y=H*.58;player.dirX=1;player.dirY=0;player.cast=0;player.cool=0;player.stun=0;for(let i=0;i<8;i++)pigs.push(makePig(i===6?'greased':'pig'));pigs.push(makePig('gold'));pigs.push(makePig('boar'));$('ov').style.display='none';$('pause').textContent='PAUSE';last=performance.now()}function hitRect(px,py,r,o){return px+r>o.x&&px-r<o.x+o.w&&py+r>o.y&&py-r<o.y+o.h}function blocked(px,py,r){return fences.some(f=>hitRect(px,py,r,f))}function cast(){if(player.cool>0||player.stun>0)return;player.cool=.48;player.cast=.22;let best=null,bd=130;for(const p of pigs){if(p.type==='boar')continue;const dx=p.x-player.x,dy=p.y-player.y,d=Math.hypot(dx,dy)||1,dot=(dx/d)*player.dirX+(dy/d)*player.dirY;if(d<bd&&dot>.72){best=p;bd=d}}if(best){best.caught=1;combo=comboT>0?Math.min(6,combo+1):1;comboT=3;const pts=best.type==='gold'?600:best.type==='greased'?260:150;texts.push({x:best.x,y:best.y,t:1,txt:'+'+pts*combo});for(let i=0;i<24;i++)fx.push({x:best.x,y:best.y,vx:rnd(-90,90),vy:rnd(-90,90),t:rnd(.3,.7),c:best.type==='gold'?'#fde047':'#f9a8d4'});caught++;setTimeout(()=>{if(run)pigs.push(makePig(Math.random()<.12?'gold':Math.random()<.28?'greased':'pig'))},500)}else{texts.push({x:player.x+player.dirX*80,y:player.y+player.dirY*80,t:.65,txt:'MISS'})}}function update(dt){if(paused)return;time-=dt;if(time<=0||caught>=target){run=false;$('ov').style.display='grid';$('ov').querySelector('h1').innerHTML=caught>=target?'PEN SECURED!':'TIME UP';$('ov').querySelector('p').innerHTML='You caught <b>'+caught+'</b> of '+target+' hogs.';$('start').textContent='PLAY AGAIN';return}let ax=((keys.ArrowRight||keys.KeyD)?1:0)-((keys.ArrowLeft||keys.KeyA)?1:0)+joy.x,ay=((keys.ArrowDown||keys.KeyS)?1:0)-((keys.ArrowUp||keys.KeyW)?1:0)+joy.y,l=Math.hypot(ax,ay);if(l>1){ax/=l;ay/=l}if(l>.12){player.dirX=ax/l;player.dirY=ay/l}else if(mouse.x||mouse.y){let dx=mouse.x-player.x,dy=mouse.y-player.y,d=Math.hypot(dx,dy)||1;if(d>35){player.dirX=dx/d;player.dirY=dy/d}}let slow=mud.some(m=>hitRect(player.x,player.y,player.r,m))?.58:1;if(player.stun>0){player.stun-=dt;slow=.18}const nx=clamp(player.x+ax*245*slow*dt,30,W-30),ny=clamp(player.y+ay*245*slow*dt,95,H-30);if(!blocked(nx,player.y,player.r))player.x=nx;if(!blocked(player.x,ny,player.r))player.y=ny;player.cool=Math.max(0,player.cool-dt);player.cast=Math.max(0,player.cast-dt);if((keys.Space||$('lasso').dataset.down==='1')&&player.cool<=0){cast();keys.Space=0;$('lasso').dataset.down='0'}if((keys.KeyF||$('feed').dataset.down==='1')&&feed.length<2){feed.push({x:player.x+player.dirX*55,y:player.y+player.dirY*55,t:7});keys.KeyF=0;$('feed').dataset.down='0'}feed.forEach(f=>f.t-=dt);feed=feed.filter(f=>f.t>0);pigs.forEach(p=>{if(p.caught)return;p.t+=dt;p.turn-=dt;let dx=p.x-player.x,dy=p.y-player.y,d=Math.hypot(dx,dy)||1;if(p.type==='boar'&&d<270){p.vx+=(player.x-p.x)/d*220*dt;p.vy+=(player.y-p.y)/d*220*dt}else{let nearest=null,fd=9999;for(const f of feed){let q=Math.hypot(f.x-p.x,f.y-p.y);if(q<fd){fd=q;nearest=f}}if(nearest&&fd<260){p.vx+=(nearest.x-p.x)/fd*160*dt;p.vy+=(nearest.y-p.y)/fd*160*dt}else if(d<175){p.vx+=dx/d*(p.type==='greased'?180:125)*dt;p.vy+=dy/d*(p.type==='greased'?180:125)*dt}if(p.turn<=0){p.turn=rnd(.5,1.5);let a=rnd(-1.2,1.2),cs=Math.cos(a),sn=Math.sin(a),vx=p.vx*cs-p.vy*sn,vy=p.vx*sn+p.vy*cs;p.vx=vx;p.vy=vy}}const max={pig:105,greased:150,gold:165,boar:135}[p.type],spd=Math.hypot(p.vx,p.vy)||1;if(spd>max){p.vx=p.vx/spd*max;p.vy=p.vy/spd*max}let px=p.x+p.vx*dt,py=p.y+p.vy*dt;if(blocked(px,p.y,p.r)||px<30||px>W-30)p.vx*=-1;else p.x=px;if(blocked(p.x,py,p.r)||py<95||py>H-30)p.vy*=-1;else p.y=py;p.vx*=.995;p.vy*=.995;if(p.type==='boar'&&d<p.r+player.r+5&&player.stun<=0){player.stun=.75;shake=12;texts.push({x:player.x,y:player.y-30,t:.8,txt:'BONK!'});p.vx*=-1.4;p.vy*=-1.4}});pigs=pigs.filter(p=>!p.caught);comboT-=dt;if(comboT<=0)combo=1;fx.forEach(f=>{f.x+=f.vx*dt;f.y+=f.vy*dt;f.t-=dt});fx=fx.filter(f=>f.t>0);texts.forEach(t=>{t.y-=25*dt;t.t-=dt});texts=texts.filter(t=>t.t>0);shake=Math.max(0,shake-dt*30);$('caught').textContent=caught+'/'+target;$('time').textContent=Math.ceil(time);$('combo').textContent='x'+combo}function farm(){x.fillStyle='#65a30d';x.fillRect(0,0,W,H);x.fillStyle='#84cc16';for(let yy=100;yy<H;yy+=46){x.fillRect(0,yy,W,3)}x.fillStyle='#a16207';mud.forEach(m=>{x.beginPath();x.roundRect(m.x,m.y,m.w,m.h,26);x.fill();x.fillStyle='#713f12';for(let i=0;i<8;i++){x.beginPath();x.arc(rnd(m.x,m.x+m.w),rnd(m.y,m.y+m.h),rnd(3,8),0,7);x.fill()}x.fillStyle='#a16207'});fences.forEach(f=>{x.fillStyle='#fef3c7';x.fillRect(f.x,f.y,f.w,f.h);x.fillStyle='#92400e';if(f.w>f.h)for(let q=f.x;q<f.x+f.w;q+=26)x.fillRect(q,f.y-10,6,32);else for(let q=f.y;q<f.y+f.h;q+=26)x.fillRect(f.x-10,q,32,6)})}function pigDraw(p){x.save();x.translate(p.x,p.y);x.rotate(Math.atan2(p.vy,p.vx));x.fillStyle=p.type==='gold'?'#fde047':p.type==='boar'?'#4a2110':'#f9a8d4';x.beginPath();x.ellipse(0,0,p.r*1.2,p.r*.82,0,0,7);x.fill();x.fillStyle=p.type==='boar'?'#78350f':'#fbcfe8';x.beginPath();x.arc(p.r*.95,0,p.r*.46,0,7);x.fill();x.fillStyle='#111';x.beginPath();x.arc(p.r*.35,-p.r*.35,2.5,0,7);x.fill();x.strokeStyle='#7c2d12';x.lineWidth=2;x.beginPath();x.arc(-p.r*1.05,0,7,-1.5,1.5);x.stroke();if(p.type==='boar'){x.strokeStyle='#fff7ed';x.beginPath();x.moveTo(p.r*.9,-7);x.lineTo(p.r*1.45,-13);x.moveTo(p.r*.9,7);x.lineTo(p.r*1.45,13);x.stroke()}x.restore()}function playerDraw(){x.save();x.translate(player.x,player.y);x.rotate(Math.atan2(player.dirY,player.dirX));x.fillStyle=player.stun>0?'#94a3b8':'#2563eb';x.beginPath();x.roundRect(-13,-15,26,32,8);x.fill();x.fillStyle='#fed7aa';x.beginPath();x.arc(0,-22,10,0,7);x.fill();x.fillStyle='#78350f';x.fillRect(-18,-31,36,5);x.fillRect(-10,-40,20,10);x.strokeStyle='#fef3c7';x.lineWidth=3;x.beginPath();x.arc(26,0,13,0,7);x.stroke();if(player.cast>0){x.strokeStyle='#fff7ed';x.lineWidth=4;x.beginPath();x.moveTo(18,0);x.lineTo(130,0);x.stroke();x.beginPath();x.arc(130,0,24,0,7);x.stroke()}x.restore()}function draw(){x.save();if(shake)x.translate(rnd(-shake,shake),rnd(-shake,shake));farm();feed.forEach(f=>{x.fillStyle='#facc15';x.beginPath();x.arc(f.x,f.y,19,0,7);x.fill();x.fillStyle='#713f12';x.font='900 10px system-ui';x.textAlign='center';x.fillText('FEED',f.x,f.y+4)});pigs.forEach(pigDraw);playerDraw();fx.forEach(f=>{x.globalAlpha=Math.max(0,f.t*2);x.fillStyle=f.c;x.fillRect(f.x,f.y,5,5);x.globalAlpha=1});texts.forEach(t=>{x.globalAlpha=t.t;x.fillStyle='#fff';x.strokeStyle='#831843';x.lineWidth=5;x.font='1000 22px system-ui';x.textAlign='center';x.strokeText(t.txt,t.x,t.y);x.fillText(t.txt,t.x,t.y);x.globalAlpha=1});x.restore()}function loop(t){let dt=Math.min(.033,(t-last)/1000||0);last=t;if(run)update(dt);draw();requestAnimationFrame(loop)}function stick(){const el=$('joy'),nub=$('nub');let id=null;function mv(e){let r=el.getBoundingClientRect(),dx=e.clientX-r.left-r.width/2,dy=e.clientY-r.top-r.height/2,m=Math.hypot(dx,dy)||1,s=Math.min(1,43/m);joy.x=dx/43*s;joy.y=dy/43*s;nub.style.transform=`translate(${joy.x*31}px,${joy.y*31}px)`}el.onpointerdown=e=>{id=e.pointerId;el.setPointerCapture(id);mv(e)};el.onpointermove=e=>{if(e.pointerId===id)mv(e)};el.onpointerup=()=>{id=null;joy.x=joy.y=0;nub.style.transform=''}}stick();addEventListener('pointermove',e=>{mouse.x=e.clientX;mouse.y=e.clientY});addEventListener('keydown',e=>{keys[e.code]=1;if(e.code==='KeyP')$('pause').click()});addEventListener('keyup',e=>keys[e.code]=0);$('lasso').onpointerdown=e=>{e.preventDefault();$('lasso').dataset.down='1'};$('lasso').onpointerup=()=>$('lasso').dataset.down='0';$('feed').onpointerdown=e=>{e.preventDefault();$('feed').dataset.down='1'};$('feed').onpointerup=()=>$('feed').dataset.down='0';$('start').onclick=reset;$('pause').onclick=()=>{if(!run)return;paused=!paused;$('pause').textContent=paused?'RESUME':'PAUSE'};requestAnimationFrame(loop)})()</script></body></html>
