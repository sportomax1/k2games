<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Hog Hustle</title><meta name="theme-color" content="#f9a8d4"><style>*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#111827;color:white;font-family:system-ui,-apple-system,Segoe UI,sans-serif;touch-action:none}canvas{display:block;width:100vw;height:100vh}.hud{position:fixed;top:max(10px,env(safe-area-inset-top));left:10px;right:10px;display:flex;justify-content:space-between;gap:8px;z-index:5;pointer-events:none}.group{display:flex;gap:8px;flex-wrap:wrap}.pill,.btn{border:1px solid #ffffff33;background:#111827cc;color:#fff;border-radius:14px;padding:9px 12px;font-weight:900;backdrop-filter:blur(8px)}.btn{pointer-events:auto;cursor:pointer}.overlay{position:fixed;inset:0;display:grid;place-items:center;background:#030712d9;z-index:20;padding:18px;text-align:center}.card{width:min(92vw,620px);border:1px solid #ffffff33;border-radius:24px;padding:24px;background:linear-gradient(180deg,#1f2937,#111827);box-shadow:0 28px 80px #0009}.card h1{font-size:clamp(40px,10vw,74px);line-height:.88;margin:0 0 14px}.card p{color:#d1d5db;line-height:1.45}.primary{border:0;border-radius:999px;padding:14px 22px;font-size:18px;font-weight:1000;cursor:pointer}.controls{position:fixed;inset:0;z-index:8;pointer-events:none}.joy{position:absolute;left:18px;bottom:calc(18px + env(safe-area-inset-bottom));width:120px;height:120px;border-radius:50%;border:2px solid #ffffff33;background:#11182766;pointer-events:auto}.nub{position:absolute;left:37px;top:37px;width:46px;height:46px;border-radius:50%;background:#fff9}.action{position:absolute;right:22px;bottom:calc(24px + env(safe-area-inset-bottom));width:94px;height:94px;border-radius:50%;border:2px solid #ffffff55;color:#fff;font-weight:1000;font-size:15px;pointer-events:auto}.action2{right:128px;width:72px;height:72px;bottom:calc(42px + env(safe-area-inset-bottom))}.home{position:fixed;left:50%;bottom:6px;transform:translateX(-50%);z-index:30;color:#fff;text-decoration:none;font-size:12px;font-weight:900;background:#0007;padding:6px 10px;border-radius:999px}@media(pointer:fine){.joy,.action,.action2{opacity:.55}}@media(max-width:640px){.pill{font-size:12px;padding:7px 9px}.joy{width:108px;height:108px}.nub{left:31px;top:31px}.action{width:84px;height:84px}.action2{right:112px;width:64px;height:64px}}</style></head><body><canvas id="c"></canvas><div class="hud"><div class="group"><div class="pill">SCORE <b id="score">0</b></div><div class="pill">TIME <b id="time">90</b></div><div class="pill">TARGET <b id="target">0/8</b></div></div><button class="btn" id="pause">PAUSE</button></div><div class="controls"><div class="joy" id="joy"><div class="nub" id="nub"></div></div><button class="action action2" id="bait" style="background:#facc15;color:#422006">FEED</button><button class="action" id="grab" style="background:#f472b6;color:#500724">LASSO</button></div><a class="home" href="index.html">← K2 HUB</a><div class="overlay" id="ov"><div class="card"><h1 style="color:#f9a8d4">HOG<br>HUSTLE</h1><p>Track, funnel, and capture runaway pigs across a scrolling farm. Mud slows you, feed distracts pigs, and boars charge.</p><p><b>Move:</b> WASD/arrows or joystick &nbsp; <b>Lasso:</b> Space &nbsp; <b>Feed:</b> F</p><button class="primary" id="start" style="background:#f9a8d4;color:#500724">START HUSTLE</button></div></div><script>(()=>{const c=document.getElementById('c'),g=c.getContext('2d');let W,H,D=1,run=0,last=0,keys={},joy={x:0,y:0},score=0,time=90,caught=0,target=8,pigs=[],mud=[],feed=[],walls=[],player={x:0,y:0,vx:0,vy:0,r:20,cool:0,stun:0};const $=id=>document.getElementById(id),rnd=(a,b)=>a+Math.random()*(b-a),clamp=(v,a,b)=>Math.max(a,Math.min(b,v));function rs(){D=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;g.setTransform(D,0,0,D,0,0)}addEventListener('resize',rs);rs();function pig(type='pig'){let a=rnd(0,7),s={pig:115,greased:165,gold:205,boar:140}[type];return{x:rnd(60,W-60),y:rnd(110,H-70),vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:type==='boar'?27:20,type,t:rnd(0,8)}}function build(){mud=[];walls=[];for(let i=0;i<6;i++)mud.push({x:rnd(30,W-150),y:rnd(100,H-140),w:rnd(90,170),h:rnd(55,95)});for(let i=0;i<6;i++)walls.push({x:rnd(45,W-170),y:rnd(120,H-120),w:rnd(90,160),h:12})}function reset(){run=1;score=0;time=90;caught=0;target=8;pigs=[];feed=[];player.x=W/2;player.y=H/2;player.vx=player.vy=0;build();for(let i=0;i<9;i++)pigs.push(pig(Math.random()<.15?'greased':'pig'));pigs.push(pig('boar'));$('ov').style.display='none';last=performance.now()}function update(dt){time-=dt;if(time<=0||caught>=target){run=0;$('ov').style.display='grid';$('ov').querySelector('h1').innerHTML=caught>=target?'PEN SECURED!':'TIME UP';$('ov').querySelector('p').innerHTML='Caught <b>'+caught+'</b> of '+target+' pigs. Score <b>'+score+'</b>.';$('start').textContent='PLAY AGAIN';return}let ax=((keys.ArrowRight||keys.KeyD)?1:0)-((keys.ArrowLeft||keys.KeyA)?1:0)+joy.x,ay=((keys.ArrowDown||keys.KeyS)?1:0)-((keys.ArrowUp||keys.KeyW)?1:0)+joy.y,l=Math.hypot(ax,ay)||1,slow=mud.some(m=>player.x>m.x&&player.x<m.x+m.w&&player.y>m.y&&player.y<m.y+m.h)?.55:1;if(player.stun>0){player.stun-=dt;slow=.2}player.vx=player.vx*.8+ax/l*24*slow;player.vy=player.vy*.8+ay/l*24*slow;player.x=clamp(player.x+player.vx,28,W-28);player.y=clamp(player.y+player.vy,90,H-35);player.cool=Math.max(0,player.cool-dt);feed.forEach(f=>f.t-=dt);feed=feed.filter(f=>f.t>0);pigs.forEach(o=>{o.t+=dt;let dx=o.x-player.x,dy=o.y-player.y,d=Math.hypot(dx,dy)||1,food=feed.reduce((a,f)=>Math.hypot(f.x-o.x,f.y-o.y)<Math.hypot((a?.x||9999)-o.x,(a?.y||9999)-o.y)?f:a,null);if(o.type==='boar'&&d<250){o.vx+=(player.x-o.x)/d*190*dt;o.vy+=(player.y-o.y)/d*190*dt}else if(food&&o.type!=='boar'){let fd=Math.hypot(food.x-o.x,food.y-o.y)||1;o.vx+=(food.x-o.x)/fd*115*dt;o.vy+=(food.y-o.y)/fd*115*dt}else if(d<180){o.vx+=dx/d*110*dt;o.vy+=dy/d*110*dt}o.vx+=Math.sin(o.t*4)*25*dt;o.vy+=Math.cos(o.t*3)*25*dt;o.x+=o.vx*dt;o.y+=o.vy*dt;o.vx*=.995;o.vy*=.995;walls.forEach(w=>{if(o.x>w.x&&o.x<w.x+w.w&&Math.abs(o.y-w.y)<15)o.vy*=-1});if(o.x<30||o.x>W-30)o.vx*=-1;if(o.y<90||o.y>H-30)o.vy*=-1;o.x=clamp(o.x,30,W-30);o.y=clamp(o.y,90,H-30);if(o.type==='boar'&&d<o.r+player.r){player.stun=.65;o.vx*=-1;o.vy*=-1}});if((keys.Space||$('grab').dataset.down==='1')&&player.cool<=0){player.cool=.42;let best=-1,bd=92;for(let i=0;i<pigs.length;i++){let o=pigs[i],d=Math.hypot(o.x-player.x,o.y-player.y);if(o.type!=='boar'&&d<bd){bd=d;best=i}}if(best>=0){let o=pigs.splice(best,1)[0];caught++;score+=o.type==='gold'?600:o.type==='greased'?250:150;pigs.push(pig(Math.random()<.1?'gold':Math.random()<.3?'greased':'pig'))}}if((keys.KeyF||$('bait').dataset.down==='1')&&feed.length<3){feed.push({x:player.x,y:player.y,t:6});keys.KeyF=0;$('bait').dataset.down='0'}$('score').textContent=score;$('time').textContent=Math.ceil(time);$('target').textContent=caught+'/'+target}function draw(){g.fillStyle='#65a30d';g.fillRect(0,0,W,H);g.fillStyle='#a16207';for(let y=100;y<H;y+=72)g.fillRect(0,y,W,4);mud.forEach(m=>{g.fillStyle='#713f12';g.beginPath();g.roundRect(m.x,m.y,m.w,m.h,24);g.fill()});walls.forEach(w=>{g.fillStyle='#fef3c7';g.fillRect(w.x,w.y,w.w,w.h);g.fillStyle='#92400e';for(let x=w.x;x<w.x+w.w;x+=28)g.fillRect(x,w.y-12,7,36)});feed.forEach(f=>{g.fillStyle='#facc15';g.beginPath();g.arc(f.x,f.y,20,0,7);g.fill()});pigs.forEach(o=>{g.save();g.translate(o.x,o.y);g.rotate(Math.atan2(o.vy,o.vx));g.fillStyle=o.type==='gold'?'#fde047':o.type==='boar'?'#451a03':'#f9a8d4';g.beginPath();g.ellipse(0,0,o.r*1.2,o.r*.8,0,0,7);g.fill();g.fillStyle='#fbcfe8';g.beginPath();g.arc(o.r*.9,0,o.r*.45,0,7);g.fill();g.fillStyle='#111';g.fillRect(o.r*.95,-4,3,3);g.restore()});g.save();g.translate(player.x,player.y);g.fillStyle=player.stun>0?'#94a3b8':'#2563eb';g.beginPath();g.arc(0,0,player.r,0,7);g.fill();g.strokeStyle='#fef3c7';g.lineWidth=4;g.beginPath();g.arc(0,0,player.cool>.15?65:30,0,7);g.stroke();g.restore()}function loop(t){let dt=Math.min(.033,(t-last)/1000||0);last=t;if(run)update(dt);draw();requestAnimationFrame(loop)}function stick(){let el=$('joy'),n=$('nub'),id=null;function mv(e){let r=el.getBoundingClientRect(),x=e.clientX-r.left-r.width/2,y=e.clientY-r.top-r.height/2,m=Math.hypot(x,y)||1,s=Math.min(1,45/m);joy.x=x/45*s;joy.y=y/45*s;n.style.transform=`translate(${joy.x*32}px,${joy.y*32}px)`}el.onpointerdown=e=>{id=e.pointerId;el.setPointerCapture(id);mv(e)};el.onpointermove=e=>{if(e.pointerId===id)mv(e)};el.onpointerup=()=>{id=null;joy.x=joy.y=0;n.style.transform=''}}stick();addEventListener('keydown',e=>keys[e.code]=1);addEventListener('keyup',e=>keys[e.code]=0);$('grab').onpointerdown=()=> $('grab').dataset.down='1';$('grab').onpointerup=()=> $('grab').dataset.down='0';$('bait').onpointerdown=()=> $('bait').dataset.down='1';$('start').onclick=reset;$('pause').onclick=()=>run=!run;requestAnimationFrame(loop)})()</script></html>
