<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flavor Flux - K2 games</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --accent: #f59e0b;
            --border: rgba(255, 255, 255, 0.1);
            --strawberry: #f87171;
            --blueberry: #60a5fa;
            --lemon: #fbbf24;
            --mint: #34d399;
            --orange: #fb923c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        nav {
            height: 50px;
            padding: 0 1rem;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .logo { font-weight: 900; color: var(--accent); letter-spacing: 1px; }
        .restart-btn { background: var(--surface); border: 1px solid var(--border); color: white; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }

        #game-layout {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            position: relative;
        }

        /* Opponents */
        #opponents {
            display: flex;
            justify-content: center;
            gap: 8px;
            height: 80px;
        }

        .player-info {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 6px;
            text-align: center;
            flex: 1;
            max-width: 110px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }
        .player-info.active { border-color: var(--accent); background: rgba(245, 158, 11, 0.1); }
        .player-info .name { font-size: 0.55rem; font-weight: 800; text-transform: uppercase; color: #94a3b8; }
        .player-info .score { font-size: 1.1rem; font-weight: 900; color: white; }
        .player-info .hand-count { font-size: 0.6rem; opacity: 0.6; }

        /* Taps Area */
        #taps-area {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
        }

        .tap-card {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 15px;
            padding: 12px;
            width: 120px;
            text-align: center;
            position: relative;
            transition: 0.2s;
            cursor: pointer;
        }
        .tap-card:hover { border-color: var(--accent); transform: scale(1.05); }
        .tap-card.active-placement { border-color: var(--accent); box-shadow: 0 0 15px rgba(245, 158, 11, 0.3); }

        .tap-name { font-size: 0.6rem; font-weight: 900; opacity: 0.7; margin-bottom: 5px; text-transform: uppercase; }
        .tap-value { font-size: 1.8rem; font-weight: 900; margin: 5px 0; }
        .tap-value.pos { color: #4ade80; }
        .tap-value.neg { color: #f87171; }

        .tap-history { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; margin-top: 5px; height: 30px; overflow-y: auto; }
        .hist-item { width: 12px; height: 12px; border-radius: 2px; font-size: 0.4rem; display: flex; align-items: center; justify-content: center; color: white; }

        /* Interaction Area */
        #interaction-container {
            background: rgba(0,0,0,0.3);
            border-top: 1px solid var(--border);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #hand {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 15px 5px;
            justify-content: center;
            min-height: 100px;
        }

        .flavor-card {
            width: 50px;
            height: 70px;
            background: #fff;
            border-radius: 6px;
            color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.4rem;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            border: 3px solid #eee;
            transition: 0.2s;
            cursor: pointer;
        }
        .flavor-card.strawberry { border-color: var(--strawberry); color: var(--strawberry); }
        .flavor-card.blueberry { border-color: var(--blueberry); color: var(--blueberry); }
        .flavor-card.lemon { border-color: var(--lemon); color: var(--lemon); }
        .flavor-card.mint { border-color: var(--mint); color: var(--mint); }
        .flavor-card.orange { border-color: var(--orange); color: var(--orange); }

        .flavor-card:hover { transform: translateY(-10px); z-index: 10; }
        .flavor-card.selected { transform: translateY(-20px); border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }

        #controls {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn-action {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .btn-action:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-action.secondary { background: var(--surface); color: white; border: 1px solid var(--border); }

        #status-msg {
            position: absolute;
            top: 95px;
            width: 100%;
            text-align: center;
            font-weight: 900;
            font-size: 1.1rem;
            color: var(--accent);
            text-shadow: 0 0 15px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 50;
        }

        .overlay {
            position: absolute; inset: 0;
            background: rgba(15, 23, 42, 0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 500; text-align: center; padding: 20px;
        }

        .btn-large {
            background: var(--accent); color: #000; border: none; padding: 1.2rem 3.5rem;
            border-radius: 50px; font-weight: 900; cursor: pointer; margin-top: 1.5rem;
            font-size: 1.3rem;
        }

        #scoring-list { margin-top: 20px; width: 100%; max-width: 400px; }
        .score-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .tap-card { width: 100px; padding: 8px; }
            .tap-value { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">FLAVOR FLUX</div>
        <button class="restart-btn" onclick="location.reload()">RESTART</button>
    </nav>

    <div id="game-layout">
        <div id="opponents"></div>
        <div id="status-msg"></div>

        <div id="taps-area">
            <!-- Taps rendered here -->
        </div>

        <div id="interaction-container">
            <div id="controls">
                <button id="btn-place" class="btn-action" onclick="game.startPlacement()" disabled>PLACE CARD</button>
                <button id="btn-flip" class="btn-action secondary" onclick="game.startFlip()">FLIP CARD</button>
            </div>
            <div id="hand"></div>
        </div>

        <div id="start-screen" class="overlay">
            <h1 style="font-size: 3rem; color: var(--accent); font-style: italic; font-weight: 900;">FLAVOR FLUX</h1>
            <p style="opacity: 0.8; margin-top: 15px; max-width: 400px; font-weight: 600;">Mix matching flavors to increase their value, or sour the batch for your rivals. Land your cards on high-value taps to win!</p>
            <div style="margin-top: 25px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;">
                <button class="btn-large" onclick="game.init(3)">3 PLAYERS</button>
                <button class="btn-large" onclick="game.init(4)" style="background: #818cf8; color: white;">4 PLAYERS</button>
            </div>
        </div>

        <div id="round-screen" class="overlay hidden">
            <h1 id="round-title">ROUND OVER</h1>
            <div id="round-stats" style="margin-top: 20px; width: 100%; max-width: 400px;"></div>
            <button class="btn-large" id="btn-next-round">NEXT ROUND</button>
        </div>

        <div id="win-screen" class="overlay hidden">
            <h1 id="winner-title" style="font-size: 3rem; color: var(--accent);">MARKET LEADER</h1>
            <div id="final-stats" style="margin-top: 20px; width: 100%; max-width: 400px;"></div>
            <button class="btn-large" onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const FLAVORS = ['strawberry', 'blueberry', 'lemon', 'mint', 'orange'];
        const ICONS = { strawberry:'🍓', blueberry:'🫐', lemon:'🍋', mint:'🌿', orange:'🍊' };

        class FlavorFlux {
            constructor() {
                this.players = [];
                this.taps = [];
                this.cardsInPlay = {};
                this.deck = [];
                this.currentRound = 1;
                this.turn = 0;
                this.state = 'setup';
                this.selectedCardIdx = -1;
                this.interactionMode = 'none'; // 'placing', 'flipping'
            }

            init(count) {
                this.players = Array(count).fill(0).map((_, i) => ({
                    id: i, name: i === 0 ? 'You' : `Robot #${i}`,
                    hand: [], roundScore: 0, totalScore: 0, isBot: i !== 0
                }));

                this.taps = FLAVORS.map(f => ({ flavor: f, icon: ICONS[f] }));
                this.createDeck();
                this.deal();
                
                document.getElementById('start-screen').classList.add('hidden');
                this.startRound();
            }

            createDeck() {
                this.deck = [];
                FLAVORS.forEach(f => {
                    for(let v=1; v<=9; v++) this.deck.push({ flavor: f, value: v });
                });
                this.deck.sort(() => Math.random() - 0.5);
            }

            deal() {
                const handSize = this.players.length === 3 ? 10 : 13;
                this.players.forEach(p => {
                    p.hand = this.deck.splice(0, handSize);
                    p.hand.sort((a,b) => a.flavor.localeCompare(b.flavor) || a.value - b.value);
                });
            }

            startRound() {
                this.cardsInPlay = {};
                this.taps.forEach((_, i) => this.cardsInPlay[i] = []);
                this.turn = (this.currentRound - 1) % this.players.length;
                this.state = 'playing';
                this.beginTurn();
            }

            beginTurn() {
                this.selectedCardIdx = -1;
                this.interactionMode = 'none';
                this.updateUI();
                const p = this.players[this.turn];
                this.showStatus(`${p.name}'s turn...`);
                if(p.isBot) setTimeout(() => this.botTurn(), 1000);
            }

            updateUI() {
                const opps = document.getElementById('opponents');
                opps.innerHTML = '';
                this.players.forEach(p => {
                    if(p.id === 0) return;
                    const div = document.createElement('div');
                    div.className = `player-info ${this.turn === p.id ? 'active' : ''}`;
                    div.innerHTML = `<div class="name">${p.name}</div><div class="score">${p.totalScore}</div><div class="hand-count">${p.hand.length} cards</div>`;
                    opps.appendChild(div);
                });

                const tapsArea = document.getElementById('taps-area');
                tapsArea.innerHTML = '';
                this.taps.forEach((t, i) => {
                    const cards = this.cardsInPlay[i];
                    let val = 0;
                    cards.forEach(c => {
                        if(c.revealed) {
                            if(c.flavor === t.flavor) val += c.value;
                            else val -= c.value;
                        }
                    });

                    const div = document.createElement('div');
                    div.className = `tap-card ${this.interactionMode === 'placing' ? 'active-placement' : ''}`;
                    div.onclick = () => this.handleTapClick(i);
                    div.innerHTML = `
                        <div class="tap-name">${t.flavor}</div>
                        <div class="tap-value ${val >= 0 ? 'pos' : 'neg'}">${val >= 0 ? '+' : ''}${val}</div>
                        <div class="tap-history">
                            ${cards.map(c => `<div class="hist-item" style="background:${this.getFlavorColor(c.flavor)}">${c.revealed ? c.value : '?'}</div>`).join('')}
                        </div>
                    `;
                    tapsArea.appendChild(div);
                });

                const handEl = document.getElementById('hand');
                handEl.innerHTML = '';
                this.players[0].hand.forEach((c, i) => {
                    const div = document.createElement('div');
                    div.className = `flavor-card ${c.flavor} ${this.selectedCardIdx === i ? 'selected' : ''}`;
                    div.innerHTML = `<div>${c.value}</div><div style="font-size:0.5rem">${ICONS[c.flavor]}</div>`;
                    div.onclick = () => { this.selectedCardIdx = i; this.updateUI(); };
                    handEl.appendChild(div);
                });

                document.getElementById('btn-place').disabled = this.selectedCardIdx === -1 || this.turn !== 0;
                document.getElementById('btn-flip').disabled = this.turn !== 0 || !this.hasUnrevealedCards();
            }

            getFlavorColor(f) {
                return { strawberry:'#f87171', blueberry:'#60a5fa', lemon:'#fbbf24', mint:'#34d399', orange:'#fb923c' }[f];
            }

            hasUnrevealedCards() {
                return Object.values(this.cardsInPlay).some(list => list.some(c => !c.revealed));
            }

            startPlacement() {
                this.interactionMode = 'placing';
                this.updateUI();
                this.showStatus("Select a tap to place your card");
            }

            startFlip() {
                this.interactionMode = 'flipping';
                this.updateUI();
                this.showStatus("Select a tap to reveal a card");
            }

            handleTapClick(i) {
                if(this.turn !== 0) return;
                if(this.interactionMode === 'placing') {
                    const card = this.players[0].hand.splice(this.selectedCardIdx, 1)[0];
                    card.revealed = false;
                    this.cardsInPlay[i].push(card);
                    this.finishTurn();
                } else if(this.interactionMode === 'flipping') {
                    const unrevealed = this.cardsInPlay[i].find(c => !c.revealed);
                    if(unrevealed) {
                        unrevealed.revealed = true;
                        this.finishTurn();
                    }
                }
            }

            botTurn() {
                const p = this.players[this.turn];
                const r = Math.random();
                if(r < 0.7 && p.hand.length > 0) {
                    const cIdx = Math.floor(Math.random() * p.hand.length);
                    const tIdx = Math.floor(Math.random() * this.taps.length);
                    const card = p.hand.splice(cIdx, 1)[0];
                    card.revealed = false;
                    this.cardsInPlay[tIdx].push(card);
                } else {
                    const validTaps = Object.keys(this.cardsInPlay).filter(k => this.cardsInPlay[k].some(c => !c.revealed));
                    if(validTaps.length > 0) {
                        const tIdx = validTaps[Math.floor(Math.random() * validTaps.length)];
                        const unrevealed = this.cardsInPlay[tIdx].find(c => !c.revealed);
                        unrevealed.revealed = true;
                    } else if(p.hand.length > 0) {
                        const cIdx = Math.floor(Math.random() * p.hand.length);
                        const tIdx = Math.floor(Math.random() * this.taps.length);
                        const card = p.hand.splice(cIdx, 1)[0];
                        card.revealed = false;
                        this.cardsInPlay[tIdx].push(card);
                    }
                }
                this.finishTurn();
            }

            finishTurn() {
                this.checkRoundEnd();
                if(this.state === 'playing') {
                    this.turn = (this.turn + 1) % this.players.length;
                    this.beginTurn();
                }
            }

            checkRoundEnd() {
                // End if someone has 3 cards left
                if(this.players.some(p => p.hand.length === 3)) this.endRound();
            }

            endRound() {
                this.state = 'scoring';
                const tapValues = this.taps.map((t, i) => {
                    let val = 0;
                    this.cardsInPlay[i].forEach(c => {
                        if(c.flavor === t.flavor) val += c.value;
                        else val -= c.value;
                    });
                    return val;
                });

                this.players.forEach(p => {
                    p.roundScore = 0;
                    p.hand.forEach(c => {
                        const tIdx = this.taps.findIndex(t => t.flavor === c.flavor);
                        p.roundScore += tapValues[tIdx];
                    });
                    p.totalScore += p.roundScore;
                });

                const ov = document.getElementById('round-screen');
                const stats = document.getElementById('round-stats');
                stats.innerHTML = this.players.map(p => `
                    <div class="score-row"><span>${p.name}</span><span>${p.roundScore} pts (Total: ${p.totalScore})</span></div>
                `).join('');
                
                const btn = document.getElementById('btn-next-round');
                if(this.currentRound < 3) {
                    btn.textContent = `START ROUND ${this.currentRound + 1}`;
                    btn.onclick = () => {
                        this.currentRound++;
                        ov.classList.add('hidden');
                        this.startRound();
                    };
                } else {
                    btn.textContent = "VIEW FINAL RESULTS";
                    btn.onclick = () => {
                        ov.classList.add('hidden');
                        this.endGame();
                    };
                }
                ov.classList.remove('hidden');
            }

            endGame() {
                this.state = 'gameOver';
                const ov = document.getElementById('win-screen');
                const stats = document.getElementById('final-stats');
                const sorted = [...this.players].sort((a,b) => b.totalScore - a.totalScore);
                document.getElementById('winner-title').textContent = sorted[0].id === 0 ? "FLAVOR MASTER" : "SOUR DEFEAT";
                stats.innerHTML = sorted.map((p, i) => `
                    <div class="score-row" style="${i===0?'color:var(--accent);font-weight:900':''}">
                        <span>#${i+1} ${p.name}</span><span>${p.totalScore} points</span>
                    </div>
                `).join('');
                ov.classList.remove('hidden');
            }

            showStatus(m) { document.getElementById('status-msg').textContent = m; }
        }

        const game = new FlavorFlux();
    </script>
</body>
</html>
