<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Red Light Green Light Pro - K2 games</title>
    <style>
        :root {
            --red: #ef4444;
            --green: #22c55e;
            --accent: #fbbf24;
            --bg: #0f172a;
            --panel: rgba(15, 23, 42, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100dvh;
            width: 100%;
            overflow: hidden;
            position: fixed;
            display: flex;
            flex-direction: column;
        }

        #game-container {
            position: relative;
            flex: 1;
            width: 100%;
            background: #1e293b;
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* HUD */
        #hud {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 100;
        }

        .light-indicator {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #334155;
            border: 4px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .light-indicator.green { background: var(--green); box-shadow: 0 0 50px var(--green); transform: scale(1.1); }
        .light-indicator.red { background: var(--red); box-shadow: 0 0 50px var(--red); transform: scale(1.1); }

        .distance-meter {
            margin-top: 15px;
            background: var(--panel);
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--accent);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        /* Controls */
        #mobile-controls {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: none;
        }
        @media (max-width: 1024px) { #mobile-controls { display: block; } }

        .move-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 4px solid white;
            color: white;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            font-size: 1.2rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .move-btn:active { background: white; color: black; transform: scale(0.9); }

        .back-link {
            position: absolute; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 10px; z-index: 200;
            font-weight: bold; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.1);
        }

        /* Overlays */
        .modal {
            position: absolute; inset: 0;
            background: rgba(2, 6, 23, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; text-align: center; padding: 30px;
            backdrop-filter: blur(15px);
        }

        .btn-large {
            background: var(--green); color: white; border: none; padding: 1.2rem 3.5rem;
            border-radius: 50px; font-weight: 900; cursor: pointer; margin-top: 2rem;
            font-size: 1.4rem; box-shadow: 0 10px 25px rgba(34, 197, 94, 0.3);
            text-transform: uppercase; letter-spacing: 2px;
        }

        #fail-msg { font-size: 4rem; font-weight: 900; color: var(--red); display: none; }
    </style>
</head>
<body>
    <div id="game-container">
        <a href="index.html" class="back-link">← EXIT HUB</a>

        <div id="hud">
            <div id="light" class="light-indicator"></div>
            <div class="distance-meter">GOAL: <span id="dist-val">50</span>m</div>
        </div>

        <div id="mobile-controls">
            <button class="move-btn" id="btn-move">HOLD<br>TO RUN</button>
        </div>

        <div id="start-modal" class="modal">
            <h1 style="font-size: 4rem; font-style: italic; font-weight: 900; color: var(--green);">RED LIGHT<br>GREEN LIGHT</h1>
            <p style="margin-top: 15px; opacity: 0.7; max-width: 400px; font-weight: 600;">Reach the finish line. Move only on <b>GREEN</b>. If you move on <b>RED</b>, you are eliminated.</p>
            <button class="btn-large" onclick="game.start()">START GAME</button>
        </div>

        <div id="result-modal" class="modal" style="display:none">
            <div id="fail-msg">ELIMINATED</div>
            <h1 id="res-title" style="font-size: 4rem; font-style: italic; font-weight: 900;">VICTORY!</h1>
            <p id="res-stats" style="font-size: 1.5rem; margin: 20px 0; font-weight: 800;"></p>
            <button class="btn-large" onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        class RedLightGreenLight {
            constructor() {
                this.container = document.getElementById('game-container');
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x87ceeb);
                this.scene.fog = new THREE.Fog(0x87ceeb, 20, 150);

                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                this.container.appendChild(this.renderer.domElement);

                this.state = 'menu';
                this.light = 'green';
                this.lightTimer = 0;
                this.player = { x: 0, z: 0, speed: 0, active: true };
                this.opponents = [];
                
                this.initScene();
                this.setupControls();
                this.animate();
                
                window.addEventListener('resize', () => this.resize());
            }

            initScene() {
                // Lights
                const ambient = new THREE.AmbientLight(0xffffff, 0.6);
                this.scene.add(ambient);
                const sun = new THREE.DirectionalLight(0xffffff, 1.2);
                sun.position.set(50, 100, 50);
                sun.castShadow = true;
                this.scene.add(sun);

                // Ground
                const groundGeo = new THREE.PlaneGeometry(100, 200);
                const groundMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8 });
                const ground = new THREE.Mesh(groundGeo, groundMat);
                ground.rotation.x = -Math.PI / 2;
                ground.receiveShadow = true;
                this.scene.add(ground);

                // Finish Line
                const finishGeo = new THREE.PlaneGeometry(100, 5);
                const finishMat = new THREE.MeshStandardMaterial({ color: 0xef4444 });
                const finish = new THREE.Mesh(finishGeo, finishMat);
                finish.rotation.x = -Math.PI / 2;
                finish.position.set(0, 0.05, -80);
                this.scene.add(finish);

                // Doll / Guard
                this.doll = new THREE.Group();
                const body = new THREE.Mesh(new THREE.CylinderGeometry(1, 1.5, 5), new THREE.MeshStandardMaterial({ color: 0xffbb00 }));
                body.position.y = 2.5;
                const head = new THREE.Mesh(new THREE.SphereGeometry(1.2), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
                head.position.y = 6;
                this.doll.add(body, head);
                this.doll.position.set(0, 0, -90);
                this.scene.add(this.doll);

                // Trees / Walls
                for(let i=0; i<20; i++) {
                    const wall = new THREE.Mesh(new THREE.BoxGeometry(10, 20, 10), new THREE.MeshStandardMaterial({ color: 0x1e293b }));
                    wall.position.set(i % 2 === 0 ? -30 : 30, 10, -i * 10);
                    this.scene.add(wall);
                }

                // Player Model
                this.playerMesh = this.createPerson(0x3b82f6);
                this.scene.add(this.playerMesh);

                // Opponents
                for(let i=0; i<12; i++) {
                    const opp = {
                        mesh: this.createPerson(0x64748b),
                        x: (Math.random() - 0.5) * 40,
                        z: Math.random() * 10,
                        speed: 0,
                        reaction: 0.1 + Math.random() * 0.3,
                        active: true
                    };
                    opp.mesh.position.set(opp.x, 0, opp.z);
                    this.opponents.push(opp);
                    this.scene.add(opp.mesh);
                }
            }

            createPerson(color) {
                const group = new THREE.Group();
                const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1), new THREE.MeshStandardMaterial({ color }));
                body.position.y = 1.2;
                body.castShadow = true;
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
                head.position.y = 2.2;
                group.add(body, head);
                return group;
            }

            setupControls() {
                this.keys = {};
                window.onkeydown = e => this.keys[e.code] = true;
                window.onkeyup = e => this.keys[e.code] = false;

                const btn = document.getElementById('btn-move');
                btn.onmousedown = () => this.keys['Space'] = true;
                window.onmouseup = () => this.keys['Space'] = false;
                btn.ontouchstart = (e) => { e.preventDefault(); this.keys['Space'] = true; };
                btn.ontouchend = () => this.keys['Space'] = false;

                // Gamepad
                const poll = () => {
                    const pads = navigator.getGamepads();
                    if(pads[0]) {
                        const p = pads[0];
                        this.keys['Space'] = p.buttons[0].pressed || p.buttons[7].pressed;
                        if(p.buttons[9].pressed && this.state === 'menu') this.start();
                    }
                    requestAnimationFrame(poll);
                };
                poll();
            }

            start() {
                this.state = 'playing';
                document.getElementById('start-modal').style.display = 'none';
                this.switchLight('green');
            }

            switchLight(type) {
                this.light = type;
                this.lightTimer = 1.5 + Math.random() * 3;
                const el = document.getElementById('light');
                el.className = 'light-indicator ' + type;
                
                // Rotate doll
                const targetRot = type === 'red' ? 0 : Math.PI;
                new Promise(r => {
                    const start = this.doll.rotation.y;
                    let t = 0;
                    const anim = setInterval(() => {
                        t += 0.1;
                        this.doll.rotation.y = start + (targetRot - start) * t;
                        if(t >= 1) { clearInterval(anim); r(); }
                    }, 16);
                });
            }

            update() {
                if(this.state !== 'playing') return;

                this.lightTimer -= 1/60;
                if(this.lightTimer <= 0) {
                    this.switchLight(this.light === 'green' ? 'red' : 'green');
                }

                // Player Movement
                if(this.player.active) {
                    const moving = this.keys['Space'] || this.keys['ArrowUp'] || this.keys['KeyW'];
                    if(moving) {
                        this.player.speed = Math.min(0.25, this.player.speed + 0.01);
                    } else {
                        this.player.speed *= 0.85;
                    }

                    if(this.player.speed > 0.01) {
                        if(this.light === 'red' && this.lightTimer < (this.lightTimer + 0.5)) { // Small grace period
                            this.eliminatePlayer();
                        }
                        this.player.z -= this.player.speed;
                    }

                    this.playerMesh.position.z = this.player.z;
                    const bob = Math.sin(Date.now() * 0.01) * this.player.speed * 2;
                    this.playerMesh.position.y = Math.abs(bob);
                    
                    if(this.player.z < -80) this.win();
                }

                // Opponents AI
                this.opponents.forEach(opp => {
                    if(!opp.active) return;
                    
                    if(this.light === 'green') {
                        if(Math.random() < 0.05) opp.targetSpeed = 0.15 + Math.random() * 0.1;
                    } else {
                        if(this.lightTimer < 1.0) opp.targetSpeed = 0;
                    }

                    opp.speed += (opp.targetSpeed - opp.speed) * 0.1;
                    opp.z -= opp.speed;
                    opp.mesh.position.z = opp.z;

                    if(this.light === 'red' && opp.speed > 0.05 && Math.random() < 0.01) {
                        opp.active = false;
                        opp.mesh.rotation.x = -Math.PI/2;
                    }
                });

                // Camera follow
                this.camera.position.set(0, 8, this.player.z + 15);
                this.camera.lookAt(0, 2, this.player.z - 20);

                document.getElementById('dist-val').textContent = Math.max(0, Math.floor(80 + this.player.z));
            }

            eliminatePlayer() {
                this.player.active = false;
                this.player.speed = 0;
                this.playerMesh.rotation.x = -Math.PI/2;
                setTimeout(() => {
                    this.state = 'gameover';
                    document.getElementById('result-modal').style.display = 'flex';
                    document.getElementById('fail-msg').style.display = 'block';
                    document.getElementById('res-title').style.display = 'none';
                    document.getElementById('res-stats').textContent = "Eliminated by the guard.";
                }, 1000);
            }

            win() {
                this.state = 'win';
                document.getElementById('result-modal').style.display = 'flex';
                document.getElementById('res-title').textContent = "VICTORY!";
                document.getElementById('res-stats').textContent = "You crossed the line safely.";
            }

            resize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            animate() {
                this.update();
                this.renderer.render(this.scene, this.camera);
                requestAnimationFrame(() => this.animate());
            }
        }

        window.game = new RedLightGreenLight();
    </script>
</body>
</html>
