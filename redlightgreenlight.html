<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Red Light Green Light Pro - K2 games</title>
    <style>
        :root {
            --red: #ef4444;
            --green: #22c55e;
            --accent: #fbbf24;
            --bg: #0f172a;
            --panel: rgba(15, 23, 42, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100dvh;
            width: 100%;
            overflow: hidden;
            position: fixed;
            display: flex;
            flex-direction: column;
        }

        #game-container {
            position: relative;
            flex: 1;
            width: 100%;
            background: #1e293b;
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* HUD */
        #hud {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 100;
        }

        .light-indicator {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #1e293b;
            border: 6px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .light-indicator::after {
            content: '';
            position: absolute;
            inset: 5px;
            border-radius: 50%;
            opacity: 0.3;
            background: white;
        }
        .light-indicator.green { background: var(--green); box-shadow: 0 0 60px var(--green); transform: scale(1.1); }
        .light-indicator.yellow { background: #eab308; box-shadow: 0 0 60px #eab308; transform: scale(1.1); }
        .light-indicator.red { background: var(--red); box-shadow: 0 0 60px var(--red); transform: scale(1.1); }

        .hud-stats {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .stat-pill {
            background: var(--panel);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1rem;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stat-pill b { color: var(--accent); }

        /* Controls */
        #mobile-controls {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: none;
        }
        @media (max-width: 1024px) { #mobile-controls { display: block; } }

        .move-btn {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 5px solid white;
            color: white;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            font-size: 1.1rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            text-transform: uppercase;
            text-align: center;
            line-height: 1.2;
        }
        .move-btn:active { background: white; color: black; transform: scale(0.9); }

        .back-link {
            position: absolute; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 12px; z-index: 200;
            font-weight: bold; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        /* Overlays */
        .modal {
            position: absolute; inset: 0;
            background: radial-gradient(circle at center, rgba(15, 23, 42, 0.9) 0%, rgba(2, 6, 23, 0.98) 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; text-align: center; padding: 30px;
            backdrop-filter: blur(20px);
        }

        .btn-large {
            background: var(--green); color: white; border: none; padding: 1.4rem 4rem;
            border-radius: 100px; font-weight: 900; cursor: pointer; margin-top: 2.5rem;
            font-size: 1.5rem; box-shadow: 0 15px 35px rgba(34, 197, 94, 0.4);
            text-transform: uppercase; letter-spacing: 2px;
            transition: transform 0.2s;
        }
        .btn-large:active { transform: scale(0.95); }

        #fail-msg { font-size: 5rem; font-weight: 900; color: var(--red); display: none; margin-bottom: 10px; font-style: italic; }
    </style>
</head>
<body>
    <div id="game-container">
        <a href="index.html" class="back-link">← HUB</a>

        <div id="hud">
            <div id="light" class="light-indicator"></div>
            <div class="hud-stats">
                <div class="stat-pill">GOAL: <b id="dist-val">200</b>m</div>
                <div class="stat-pill">ALIVE: <b id="alive-val">30</b></div>
            </div>
        </div>

        <div id="mobile-controls">
            <button class="move-btn" id="btn-move">HOLD TO<br>MOVE</button>
        </div>

        <div id="start-modal" class="modal">
            <h1 style="font-size: clamp(3rem, 10vw, 5rem); font-style: italic; font-weight: 900; color: var(--green); line-height: 1;">RED LIGHT<br>GREEN LIGHT</h1>
            <p style="margin-top: 20px; opacity: 0.7; max-width: 500px; font-size: 1.2rem; font-weight: 600;">Reach the goal line before time runs out.<br>Move only on <b>GREEN</b>. Any movement on <b>RED</b> results in elimination.</p>
            <button class="btn-large" onclick="game.start()">ENTER ARENA</button>
        </div>

        <div id="result-modal" class="modal" style="display:none">
            <div id="fail-msg">ELIMINATED</div>
            <h1 id="res-title" style="font-size: 4rem; font-style: italic; font-weight: 900;">VICTORY!</h1>
            <p id="res-stats" style="font-size: 1.5rem; margin: 20px 0; font-weight: 800;"></p>
            <button class="btn-large" onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        class RedLightGreenLight {
            constructor() {
                this.container = document.getElementById('game-container');
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0xa5f3fc);
                this.scene.fog = new THREE.Fog(0xa5f3fc, 40, 300);

                this.camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                this.container.appendChild(this.renderer.domElement);

                this.state = 'menu';
                this.light = 'green';
                this.lightTimer = 0;
                this.goalDist = 200;
                this.player = { x: 0, z: 0, speed: 0, active: true };
                this.opponents = [];
                this.particles = [];
                
                this.initScene();
                this.setupControls();
                this.animate();
                
                window.addEventListener('resize', () => this.resize());
            }

            initScene() {
                // Lights
                const ambient = new THREE.AmbientLight(0xffffff, 0.5);
                this.scene.add(ambient);
                const sun = new THREE.DirectionalLight(0xffffff, 1.5);
                sun.position.set(100, 200, 100);
                sun.castShadow = true;
                sun.shadow.camera.left = -100; sun.shadow.camera.right = 100;
                sun.shadow.camera.top = 100; sun.shadow.camera.bottom = -100;
                sun.shadow.mapSize.set(2048, 2048);
                this.scene.add(sun);

                // Ground (Sand/Dirt Texture feel)
                const groundGeo = new THREE.PlaneGeometry(200, 600);
                const groundMat = new THREE.MeshStandardMaterial({ 
                    color: 0xeab308, // Goldish sand
                    roughness: 0.9,
                    metalness: 0.0
                });
                const ground = new THREE.Mesh(groundGeo, groundMat);
                ground.rotation.x = -Math.PI / 2;
                ground.position.z = -100;
                ground.receiveShadow = true;
                this.scene.add(ground);

                // Finish Line
                const finishGeo = new THREE.PlaneGeometry(200, 10);
                const finishMat = new THREE.MeshStandardMaterial({ color: 0xef4444, emissive: 0xef4444, emissiveIntensity: 0.5 });
                const finish = new THREE.Mesh(finishGeo, finishMat);
                finish.rotation.x = -Math.PI / 2;
                finish.position.set(0, 0.1, -this.goalDist);
                this.scene.add(finish);

                // The Guard / Doll
                this.doll = new THREE.Group();
                const dBody = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 2.5, 8), new THREE.MeshStandardMaterial({ color: 0xf59e0b }));
                dBody.position.y = 4;
                const dHead = new THREE.Mesh(new THREE.SphereGeometry(2), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
                dHead.position.y = 10;
                // Add eyes to doll for more creepiness
                const eyeGeo = new THREE.SphereGeometry(0.3);
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
                const e1 = new THREE.Mesh(eyeGeo, eyeMat); e1.position.set(-0.7, 10.5, 1.8);
                const e2 = new THREE.Mesh(eyeGeo, eyeMat); e2.position.set(0.7, 10.5, 1.8);
                this.doll.add(dBody, dHead, e1, e2);
                this.doll.position.set(0, 0, -this.goalDist - 15);
                this.scene.add(this.doll);

                // Side Walls
                for(let i=0; i<40; i++) {
                    const wall = new THREE.Mesh(new THREE.BoxGeometry(20, 30, 15), new THREE.MeshStandardMaterial({ color: 0x1e293b }));
                    wall.position.set(i % 2 === 0 ? -60 : 60, 15, -i * 15 + 50);
                    wall.castShadow = true;
                    wall.receiveShadow = true;
                    this.scene.add(wall);
                }

                // Player Model
                this.playerMesh = this.createPerson(0x3b82f6);
                this.scene.add(this.playerMesh);

                // Opponents (Increased count to 30)
                for(let i=0; i<30; i++) {
                    const opp = {
                        mesh: this.createPerson(0x64748b),
                        x: (Math.random() - 0.5) * 80,
                        z: Math.random() * 30,
                        speed: 0,
                        targetSpeed: 0,
                        active: true
                    };
                    opp.mesh.position.set(opp.x, 0, opp.z);
                    this.opponents.push(opp);
                    this.scene.add(opp.mesh);
                }
            }

            createPerson(color) {
                const group = new THREE.Group();
                // Body
                const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1.2), new THREE.MeshStandardMaterial({ color }));
                torso.position.y = 1.5;
                torso.castShadow = true;
                // Head
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.45), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
                head.position.y = 2.8;
                // Arms
                const armGeo = new THREE.CapsuleGeometry(0.15, 0.8);
                const lArm = new THREE.Mesh(armGeo, new THREE.MeshStandardMaterial({ color }));
                lArm.position.set(-0.7, 1.8, 0);
                const rArm = lArm.clone();
                rArm.position.x = 0.7;
                group.add(torso, head, lArm, rArm);
                return group;
            }

            setupControls() {
                this.keys = {};
                window.onkeydown = e => this.keys[e.code] = true;
                window.onkeyup = e => this.keys[e.code] = false;

                const btn = document.getElementById('btn-move');
                const startMove = (e) => { e.preventDefault(); this.keys['Space'] = true; };
                const endMove = () => this.keys['Space'] = false;
                
                btn.onmousedown = startMove;
                window.onmouseup = endMove;
                btn.ontouchstart = startMove;
                btn.ontouchend = endMove;

                // Gamepad
                const poll = () => {
                    const pads = navigator.getGamepads();
                    if(pads[0]) {
                        const p = pads[0], b = p.buttons;
                        this.keys['Space'] = b[0].pressed || b[7].pressed;
                        if(b[9].pressed && this.state === 'menu') this.start();
                    }
                    requestAnimationFrame(poll);
                };
                poll();
            }

            start() {
                this.state = 'playing';
                document.getElementById('start-modal').style.display = 'none';
                this.switchLight('green');
            }

            switchLight(type) {
                this.light = type;
                if (type === 'green') {
                    this.lightTimer = 2.0 + Math.random() * 3.5;
                } else if (type === 'yellow') {
                    this.lightTimer = 0.8 + Math.random() * 0.4;
                } else {
                    this.lightTimer = 2.0 + Math.random() * 2.5;
                }
                
                const el = document.getElementById('light');
                el.className = 'light-indicator ' + type;
                
                // Doll Turn Animation - starts turning during yellow
                const targetRot = (type === 'red' || type === 'yellow') ? 0 : Math.PI;
                const startRot = this.doll.rotation.y;
                let startTime = null;
                const duration = type === 'yellow' ? 800 : 400;

                const animateTurn = (now) => {
                    if(!startTime) startTime = now;
                    const elapsed = now - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    this.doll.rotation.y = startRot + (targetRot - startRot) * progress;
                    if(progress < 1) requestAnimationFrame(animateTurn);
                };
                requestAnimationFrame(animateTurn);
            }

            update() {
                if(this.state !== 'playing') return;

                this.lightTimer -= 1/60;
                if(this.lightTimer <= 0) {
                    if (this.light === 'green') {
                        this.switchLight('yellow');
                    } else if (this.light === 'yellow') {
                        this.switchLight('red');
                    } else {
                        this.switchLight('green');
                    }
                }

                // Player Physics
                if(this.player.active) {
                    const moving = this.keys['Space'] || this.keys['ArrowUp'] || this.keys['KeyW'];
                    if(moving) {
                        this.player.speed = Math.min(0.35, this.player.speed + 0.015);
                    } else {
                        this.player.speed *= 0.82;
                    }

                    if(this.player.speed > 0.01) {
                        if(this.light === 'red') {
                            this.eliminatePlayer();
                        }
                        this.player.z -= this.player.speed;
                    }

                    this.playerMesh.position.z = this.player.z;
                    const bob = Math.sin(Date.now() * 0.012) * this.player.speed * 1.5;
                    this.playerMesh.position.y = Math.abs(bob);
                    
                    if(this.player.z < -this.goalDist) this.win();
                }

                // AI Opponents
                let aliveCount = 0;
                this.opponents.forEach(opp => {
                    if(!opp.active) return;
                    aliveCount++;
                    
                    if(this.light === 'green') {
                        if(Math.random() < 0.03) opp.targetSpeed = 0.2 + Math.random() * 0.15;
                    } else if (this.light === 'yellow') {
                        // AI starts to slow down during yellow
                        if(Math.random() < 0.1) opp.targetSpeed = Math.max(0, opp.targetSpeed * 0.5);
                    } else {
                        opp.targetSpeed = 0;
                    }

                    opp.speed += (opp.targetSpeed - opp.speed) * 0.08;
                    opp.z -= opp.speed;
                    opp.mesh.position.z = opp.z;
                    const bob = Math.sin(Date.now() * 0.01 + opp.z) * opp.speed * 1.5;
                    opp.mesh.position.y = Math.abs(bob);

                    if(this.light === 'red' && opp.speed > 0.08 && Math.random() < 0.05) {
                        this.eliminateAI(opp);
                    }
                });

                // HUD
                document.getElementById('dist-val').textContent = Math.max(0, Math.floor(this.goalDist + this.player.z));
                document.getElementById('alive-val').textContent = aliveCount + (this.player.active ? 1 : 0);

                // Particles
                this.updateParticles();

                // Cinematic Camera
                this.camera.position.x = THREE.MathUtils.lerp(this.camera.position.x, this.player.x * 0.5, 0.05);
                this.camera.position.y = THREE.MathUtils.lerp(this.camera.position.y, 8, 0.05);
                this.camera.position.z = THREE.MathUtils.lerp(this.camera.position.z, this.player.z + 20, 0.05);
                this.camera.lookAt(0, 2, this.player.z - 30);
            }

            eliminatePlayer() {
                this.player.active = false;
                this.player.speed = 0;
                this.playerMesh.rotation.x = -Math.PI/2;
                this.spawnExplosion(this.playerMesh.position.x, 2, this.player.z);
                
                setTimeout(() => {
                    this.state = 'gameover';
                    document.getElementById('result-modal').style.display = 'flex';
                    document.getElementById('fail-msg').style.display = 'block';
                    document.getElementById('res-title').style.display = 'none';
                    document.getElementById('res-stats').textContent = "Movement detected. Game over.";
                }, 1200);
            }

            eliminateAI(opp) {
                opp.active = false;
                opp.speed = 0;
                opp.mesh.rotation.x = -Math.PI/2;
                this.spawnExplosion(opp.mesh.position.x, 2, opp.z);
            }

            spawnExplosion(x, y, z) {
                for(let i=0; i<15; i++) {
                    const p = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), new THREE.MeshBasicMaterial({ color: 0xef4444 }));
                    p.position.set(x, y, z);
                    const v = new THREE.Vector3((Math.random()-0.5)*0.5, Math.random()*0.5, (Math.random()-0.5)*0.5);
                    this.particles.push({ mesh: p, vel: v, life: 1.0 });
                    this.scene.add(p);
                }
            }

            updateParticles() {
                for(let i=this.particles.length-1; i>=0; i--) {
                    const p = this.particles[i];
                    p.mesh.position.add(p.vel);
                    p.life -= 0.02;
                    p.mesh.material.opacity = p.life;
                    p.mesh.material.transparent = true;
                    if(p.life <= 0) {
                        this.scene.remove(p.mesh);
                        this.particles.splice(i, 1);
                    }
                }
            }

            win() {
                this.state = 'win';
                document.getElementById('result-modal').style.display = 'flex';
                document.getElementById('res-title').textContent = "VICTORY!";
                document.getElementById('res-stats').textContent = "You survived the game.";
            }

            resize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            animate() {
                this.update();
                this.renderer.render(this.scene, this.camera);
                requestAnimationFrame(() => this.animate());
            }
        }

        window.game = new RedLightGreenLight();
    </script>
</body>
</html>
