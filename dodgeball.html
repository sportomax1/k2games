<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dodgeball Pro: Elite Athletes - K2 games</title>
    <style>
        :root {
            --red: #ef4444;
            --blue: #3b82f6;
            --accent: #facc15;
            --bg: #020617;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #ui-layer {
            position: absolute; inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            z-index: 100;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-score {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 10px 30px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .score-num { font-size: 2.5rem; font-weight: 900; font-family: monospace; }
        .team-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; }

        #hit-msg {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 6rem;
            font-weight: 900;
            font-style: italic;
            color: var(--accent);
            text-shadow: 0 0 40px rgba(0,0,0,0.8);
            display: none;
            z-index: 150;
            animation: popOut 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popOut { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        #mobile-controls {
            position: absolute; bottom: 40px; left: 0; right: 0;
            display: none; justify-content: space-between; padding: 0 40px;
            pointer-events: none;
        }
        @media (max-width: 1024px) { #mobile-controls { display: flex; } }

        .joy-base {
            width: 140px; height: 140px;
            background: rgba(255,255,255,0.05);
            border: 3px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            position: relative;
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }

        .joy-thumb {
            width: 60px; height: 60px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .action-btns {
            display: flex; gap: 20px; align-items: center;
            pointer-events: auto;
        }

        .m-btn {
            width: 90px; height: 90px;
            background: rgba(255,255,255,0.1);
            border: 4px solid white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .m-btn:active { transform: scale(0.9); background: white; color: black; }

        #overlay {
            position: absolute; inset: 0;
            background: rgba(2, 6, 23, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center; padding: 40px;
        }

        .logo-main { font-size: 5rem; font-weight: 900; font-style: italic; color: white; line-height: 0.8; margin-bottom: 10px; }
        .logo-main span { color: var(--accent); }

        .btn-start {
            background: var(--accent);
            color: black;
            border: none;
            padding: 1.2rem 5rem;
            border-radius: 100px;
            font-weight: 900;
            font-size: 1.5rem;
            cursor: pointer;
            margin-top: 2rem;
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4);
        }

        .back-link { position: fixed; top: 20px; left: 20px; color: #94a3b8; text-decoration: none; font-weight: bold; font-size: 0.8rem; z-index: 1100; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← EXIT ARENA</a>

    <div id="ui-layer">
        <div class="hud-top">
            <div class="team-score">
                <div style="text-align:center"><div class="team-label">Team Blue</div><div id="blue-count" class="score-num" style="color:var(--blue)">5</div></div>
                <div style="font-weight:900; opacity:0.3; font-size:1.5rem;">VS</div>
                <div style="text-align:center"><div class="team-label">Team Red</div><div id="red-count" class="score-num" style="color:var(--red)">5</div></div>
            </div>
        </div>

        <div id="hit-msg">OUT!</div>

        <div id="mobile-controls">
            <div class="joy-base" id="joy-base"><div class="joy-thumb" id="joy-thumb"></div></div>
            <div class="action-btns">
                <div class="m-btn" id="m-catch">🧤</div>
                <div class="m-btn" id="m-throw" style="background:var(--accent)">💥</div>
            </div>
        </div>
    </div>

    <div id="overlay">
        <h1 class="logo-main">DODGEBALL<span>PRO</span></h1>
        <p style="opacity: 0.7; max-width: 450px; line-height: 1.6;">Elite athlete simulation. Build your team, dodge incoming attacks, and dominate the court.</p>
        <button class="btn-start" onclick="game.startMatch()">ENTER ARENA</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        class DodgeballPro {
            constructor() {
                this.initEngine();
                this.initArena();
                this.initPlayers();
                this.setupInputs();
                
                this.balls = [];
                this.state = 'menu';
                this.loop();
            }

            initEngine() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x020617);
                
                this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(0, 25, 55);
                this.camera.lookAt(0, 0, 0);

                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                document.body.appendChild(this.renderer.domElement);

                // Lighting
                this.scene.add(new THREE.AmbientLight(0xffffff, 0.4));
                const key = new THREE.DirectionalLight(0xffffff, 1.2);
                key.position.set(0, 50, 20);
                key.castShadow = true;
                key.shadow.camera.left = -50; key.shadow.camera.right = 50;
                key.shadow.camera.top = 50; key.shadow.camera.bottom = -50;
                this.scene.add(key);

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            initArena() {
                // Polished Court
                const floorGeo = new THREE.PlaneGeometry(60, 100);
                const floorMat = new THREE.MeshStandardMaterial({ 
                    color: 0x1e293b, 
                    roughness: 0.1, 
                    metalness: 0.2 
                });
                const floor = new THREE.Mesh(floorGeo, floorMat);
                floor.rotation.x = -Math.PI/2;
                floor.receiveShadow = true;
                this.scene.add(floor);

                // Court Lines
                const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const midLine = new THREE.Mesh(new THREE.PlaneGeometry(60, 0.8), lineMat);
                midLine.rotation.x = -Math.PI/2; midLine.position.y = 0.05;
                this.scene.add(midLine);

                const border = new THREE.Mesh(new THREE.PlaneGeometry(60.8, 100.8), new THREE.MeshBasicMaterial({ color: 0x334155 }));
                border.rotation.x = -Math.PI/2; border.position.y = -0.05;
                this.scene.add(border);
            }

            initPlayers() {
                this.players = [];
                // 5 vs 5
                for(let i=0; i<5; i++) this.createAthlete(i, 'blue', (i-2)*10, 35);
                for(let i=0; i<5; i++) this.createAthlete(i+5, 'red', (i-2)*10, -35);
            }

            createAthlete(id, team, x, z) {
                const group = new THREE.Group();
                const skin = new THREE.MeshStandardMaterial({ color: 0xffdbac, roughness: 0.6 });
                const kit = new THREE.MeshStandardMaterial({ color: team === 'blue' ? 0x3b82f6 : 0xef4444, roughness: 0.8 });
                
                // Torso
                const torso = new THREE.Mesh(new THREE.BoxGeometry(1.4, 2.2, 0.8), kit);
                torso.position.y = 2.6;
                group.add(torso);

                // Head
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.65), skin);
                head.position.y = 4.2;
                group.add(head);

                // Arms
                const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.2, 1.8), skin);
                armL.position.set(-1, 3, 0); armL.rotation.z = 0.2;
                const armR = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.2, 1.8), skin);
                armR.position.set(1, 3, 0); armR.rotation.z = -0.2;
                group.add(armL, armR);

                // Legs
                const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.25, 2), kit);
                legL.position.set(-0.45, 1, 0);
                const legR = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.25, 2), kit);
                legR.position.set(0.45, 1, 0);
                group.add(legL, legR);

                group.position.set(x, 0, z);
                group.castShadow = true;
                group.receiveShadow = true;
                
                if(team === 'red') group.rotation.y = Math.PI;

                this.scene.add(group);
                this.players.push({ 
                    id, team, mesh: group, alive: true, 
                    limbs: { legL, legR, armR, armL },
                    targetX: x, targetZ: z,
                    lastThrow: Date.now() + Math.random()*2000
                });
            }

            setupInputs() {
                this.keys = {};
                window.onkeydown = (e) => this.keys[e.code] = true;
                window.onkeyup = (e) => this.keys[e.code] = false;

                this.joy = { active: false, x: 0, y: 0 };
                const base = document.getElementById('joy-base'), thumb = document.getElementById('joy-thumb');
                
                base.addEventListener('touchstart', (e) => { this.joy.active = true; e.preventDefault(); });
                window.addEventListener('touchmove', (e) => {
                    if(!this.joy.active) return;
                    const r = base.getBoundingClientRect(); const t = e.touches[0];
                    const dx = t.clientX - (r.left + r.width/2), dy = t.clientY - (r.top + r.height/2);
                    const d = Math.min(50, Math.hypot(dx, dy)), a = Math.atan2(dy, dx);
                    this.joy.x = (Math.cos(a)*d)/50; this.joy.y = (Math.sin(a)*d)/50;
                    thumb.style.transform = `translate(calc(-50% + ${Math.cos(a)*d}px), calc(-50% + ${Math.sin(a)*d}px))`;
                });
                window.addEventListener('touchend', () => { this.joy.active = false; this.joy.x = 0; this.joy.y = 0; thumb.style.transform = 'translate(-50%, -50%)'; });

                document.getElementById('m-throw').addEventListener('touchstart', (e) => { this.keys['Space'] = true; e.preventDefault(); });
                document.getElementById('m-throw').addEventListener('touchend', () => this.keys['Space'] = false);
            }

            startMatch() {
                this.state = 'playing';
                document.getElementById('overlay').style.display = 'none';
            }

            spawnBall(owner) {
                const geo = new THREE.SphereGeometry(0.5);
                const mat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xff5500, emissiveIntensity: 0.5 });
                const m = new THREE.Mesh(geo, mat);
                m.position.copy(owner.mesh.position);
                m.position.y = 3;
                this.scene.add(m);

                const dir = owner.team === 'blue' ? new THREE.Vector3(0, 0, -1) : new THREE.Vector3(0, 0, 1);
                this.balls.push({ mesh: m, vel: dir.multiplyScalar(45), team: owner.team });
                
                // Throw Anim
                this.animate(owner.limbs.armR.rotation, { x: -1.5 }, 100);
                setTimeout(() => this.animate(owner.limbs.armR.rotation, { x: 0 }, 200), 150);
            }

            animate(obj, target, dur) {
                const start = { ...obj }, t0 = performance.now();
                const loop = () => {
                    const p = Math.min((performance.now() - t0) / dur, 1);
                    for(let k in target) obj[k] = start[k] + (target[k] - start[k]) * p;
                    if(p < 1) requestAnimationFrame(loop);
                }; requestAnimationFrame(loop);
            }

            update(dt) {
                if(this.state !== 'playing') return;

                const p = this.players[2]; // Main Player
                if(p.alive) {
                    let mx = 0, mz = 0;
                    if(this.keys['ArrowLeft'] || this.keys['KeyA']) mx = -1;
                    if(this.keys['ArrowRight'] || this.keys['KeyD']) mx = 1;
                    if(this.keys['ArrowUp'] || this.keys['KeyW']) mz = -1;
                    if(this.keys['ArrowDown'] || this.keys['KeyS']) mz = 1;
                    
                    if(this.joy.active) { mx = this.joy.x; mz = this.joy.y; }

                    p.mesh.position.x += mx * 20 * dt;
                    p.mesh.position.z += mz * 20 * dt;
                    p.mesh.position.x = THREE.MathUtils.clamp(p.mesh.position.x, -28, 28);
                    p.mesh.position.z = THREE.MathUtils.clamp(p.mesh.position.z, 5, 45);

                    if(Math.hypot(mx, mz) > 0.1) {
                        const t = Date.now() * 0.01;
                        p.limbs.legL.rotation.x = Math.sin(t) * 0.6;
                        p.limbs.legR.rotation.x = -Math.sin(t) * 0.6;
                    }

                    if(this.keys['Space'] && Date.now() - (p.lastThrow || 0) > 800) {
                        this.spawnBall(p); p.lastThrow = Date.now();
                    }
                }

                // AI Athletes
                this.players.forEach(ai => {
                    if(!ai.alive || ai === p) return;
                    
                    // Simple movement
                    ai.mesh.position.x += Math.sin(Date.now()*0.002 + ai.id) * 0.15;
                    const t = Date.now() * 0.01;
                    ai.limbs.legL.rotation.x = Math.sin(t) * 0.3; ai.limbs.legR.rotation.x = -Math.sin(t) * 0.3;

                    if(ai.team === 'red' && Date.now() - ai.lastThrow > 2000 + Math.random()*3000) {
                        this.spawnBall(ai); ai.lastThrow = Date.now();
                    }
                });

                // Ball Physics & Collisions
                this.balls.forEach((b, bi) => {
                    b.mesh.position.add(b.vel.clone().multiplyScalar(dt));
                    
                    this.players.forEach(target => {
                        if(target.alive && target.team !== b.team && b.mesh.position.distanceTo(target.mesh.position.clone().add(new THREE.Vector3(0,2.5,0))) < 2) {
                            target.alive = false;
                            target.mesh.rotation.x = Math.PI/2;
                            this.scene.remove(b.mesh);
                            this.balls.splice(bi, 1);
                            this.showMsg(target === p ? "YOU'RE OUT!" : "OPPONENT OUT!");
                        }
                    });

                    if(Math.abs(b.mesh.position.z) > 60) {
                        this.scene.remove(b.mesh);
                        this.balls.splice(bi, 1);
                    }
                });

                document.getElementById('blue-count').textContent = this.players.filter(pl=>pl.team==='blue'&&pl.alive).length;
                document.getElementById('red-count').textContent = this.players.filter(pl=>pl.team==='red'&&pl.alive).length;
            }

            showMsg(txt) {
                const el = document.getElementById('hit-msg');
                el.textContent = txt; el.style.display = 'block';
                setTimeout(() => el.style.display = 'none', 1000);
            }

            loop() {
                this.update(0.016);
                this.renderer.render(this.scene, this.camera);
                requestAnimationFrame(() => this.loop());
            }
        }

        window.game = new DodgeballPro();
    </script>
</body>
</html>
