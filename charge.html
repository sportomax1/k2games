<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rhino Charge - K2 games</title>
    <style>
        :root {
            --primary: #f59e0b;
            --accent: #ef4444;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            height: 100dvh;
            background: #1a1a1a;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--text);
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100dvh;
            max-width: 800px;
            margin: 0 auto;
            background: #000;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .top-hud {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            backdrop-filter: blur(4px);
        }

        .label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; font-weight: 900; letter-spacing: 1px; }
        .value { font-size: 1.4rem; font-weight: 900; color: #fff; display: block; }

        #charge-meter {
            width: 200px;
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            overflow: hidden;
            margin-top: 8px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        #charge-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f59e0b, #fbbf24, #fff);
            box-shadow: 0 0 15px var(--primary);
            transition: width 0.1s;
        }

        .combo-counter {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -150%);
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(245, 158, 11, 0.5);
            opacity: 0;
            transition: 0.3s;
        }
        .combo-counter.active { opacity: 1; transform: translate(-50%, -150%) scale(1.2); }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 25px;
            z-index: 100;
            text-align: center;
            padding: 40px;
        }

        .overlay h1 { font-size: 4rem; font-style: italic; font-weight: 900; color: var(--primary); text-shadow: 0 0 30px rgba(245, 158, 11, 0.4); }
        .overlay p { max-width: 400px; line-height: 1.6; color: var(--muted); }

        .btn-play {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 15px 45px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3);
        }
        .btn-play:hover { transform: scale(1.05); }

        #home-btn {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            background: rgba(255,255,255,0.1); color: white; text-decoration: none;
            padding: 8px 15px; border-radius: 8px; font-weight: bold; font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <a href="index.html" id="home-btn">← HUB</a>
    
    <div id="game-container">
        <div id="ui-layer">
            <div class="top-hud">
                <div class="stat-box">
                    <span class="label">Score</span>
                    <span id="score-val" class="value">0</span>
                </div>
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <div class="stat-box" style="text-align: center;">
                        <span class="label">Charge Power</span>
                        <div id="charge-meter"><div id="charge-fill"></div></div>
                    </div>
                    <div id="lives-display" style="margin-top: 10px; font-size: 1.5rem;"></div>
                </div>
                <div class="stat-box">
                    <span class="label">High Score</span>
                    <span id="high-val" class="value">0</span>
                </div>
            </div>
            
            <div id="combo-display" class="combo-counter">x5 COMBO</div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="menu-overlay" class="overlay">
            <h1>CHARGE!</h1>
            <p>Slam through obstacles to build your legend. Hold <b>SPACE</b> or <b>TAP</b> to charge your might. Release at 100% to enter a <b>RAGE SPRINT</b>!</p>
            <div style="font-size: 0.8rem; color: #666;">
                Crates: Any power | Boulders: 50% Power | Walls: 100% Power
            </div>
            <button class="btn-play" onclick="game.start()">START RUN</button>
        </div>

        <div id="over-overlay" class="overlay hidden">
            <h1 style="color: var(--accent);">EXTINCT</h1>
            <div class="stat-box" style="min-width: 200px;">
                <span class="label">Final Score</span>
                <span id="final-score-val" class="value">0</span>
            </div>
            <button class="btn-play" onclick="game.start()">TRY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        class RhinoCharge {
            constructor() {
                this.width = 0;
                this.height = 0;
                this.active = false;
                this.score = 0;
                this.highScore = parseInt(localStorage.getItem('rhinoHighScore') || '0');
                this.lives = 3;
                this.inputDown = false;
                
                this.rhino = {
                    x: 120, y: 0, w: 80, h: 60,
                    charge: 0,
                    isSprinting: false,
                    sprintTimer: 0,
                    invincible: 0,
                    frame: 0,
                    bob: 0,
                    state: 'run' // run, hit, sprint
                };

                this.obstacles = [];
                this.particles = [];
                this.groundX = 0;
                this.speed = 5;
                this.combo = 0;
                this.comboTimer = 0;
                this.shake = 0;
                this.flash = 0;

                this.init();
            }

            init() {
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                const setDown = (e) => { e.preventDefault(); this.inputDown = true; };
                const setUp = (e) => { 
                    e.preventDefault(); 
                    this.inputDown = false; 
                    if(this.rhino.charge >= 100) this.triggerSprint();
                };

                window.addEventListener('keydown', (e) => { if(e.code === 'Space') this.inputDown = true; });
                window.addEventListener('keyup', (e) => { if(e.code === 'Space') { this.inputDown = false; if(this.rhino.charge >= 100) this.triggerSprint(); }});
                canvas.addEventListener('touchstart', setDown);
                canvas.addEventListener('touchend', setUp);

                document.getElementById('high-val').textContent = this.highScore;
                this.render();
            }

            resize() {
                this.width = canvas.parentElement.clientWidth;
                this.height = canvas.parentElement.clientHeight;
                canvas.width = this.width;
                canvas.height = this.height;
                this.rhino.y = this.height * 0.75;
            }

            start() {
                this.active = true;
                this.score = 0;
                this.lives = 3;
                this.speed = 5;
                this.obstacles = [];
                this.rhino.charge = 0;
                this.rhino.isSprinting = false;
                this.rhino.invincible = 0;
                this.combo = 0;
                
                document.getElementById('menu-overlay').classList.add('hidden');
                document.getElementById('over-overlay').classList.add('hidden');
                this.updateHUD();
                this.loop();
            }

            triggerSprint() {
                if(this.rhino.isSprinting) return;
                this.rhino.isSprinting = true;
                this.rhino.sprintTimer = 180;
                this.rhino.charge = 0;
                this.shake = 10;
                this.flash = 5;
            }

            update() {
                if(!this.active) return;

                // Handle Input
                if(this.inputDown && !this.rhino.isSprinting) {
                    this.rhino.charge = Math.min(100, this.rhino.charge + 1.2);
                } else if(!this.rhino.isSprinting) {
                    this.rhino.charge = Math.max(0, this.rhino.charge - 0.5);
                }

                if(this.rhino.isSprinting) {
                    this.rhino.sprintTimer--;
                    if(this.rhino.sprintTimer <= 0) this.rhino.isSprinting = false;
                }

                if(this.rhino.invincible > 0) this.rhino.invincible--;
                if(this.comboTimer > 0) {
                    this.comboTimer--;
                    if(this.comboTimer === 0) this.combo = 0;
                }

                // Speed & Parallax
                let currentSpeed = this.speed;
                if(this.rhino.isSprinting) currentSpeed *= 2.5;
                this.groundX = (this.groundX + currentSpeed) % this.width;

                // Obstacles
                if(Math.random() < 0.02) this.spawnObstacle();

                this.obstacles.forEach((obs, i) => {
                    obs.x -= currentSpeed;
                    
                    // Collision
                    if(!obs.destroyed && this.rhino.invincible <= 0) {
                        if(obs.x < this.rhino.x + 60 && obs.x + obs.w > this.rhino.x) {
                            this.handleCollision(obs);
                        }
                    }
                });
                this.obstacles = this.obstacles.filter(o => o.x > -100);

                // Particles
                this.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.3;
                    p.life--;
                });
                this.particles = this.particles.filter(p => p.life > 0);

                // Animation
                this.rhino.frame += currentSpeed * 0.05;
                this.rhino.bob = Math.sin(this.rhino.frame) * 5;

                this.speed = 5 + (this.score / 500);
                this.updateHUD();
            }

            spawnObstacle() {
                const last = this.obstacles[this.obstacles.length-1];
                if(last && this.width - last.x < 300) return;

                const r = Math.random();
                let type = 'crate';
                if(r > 0.8) type = 'wall';
                else if(r > 0.5) type = 'boulder';

                const configs = {
                    crate: { w: 50, h: 50, color: '#8b4513' },
                    boulder: { w: 60, h: 60, color: '#666' },
                    wall: { w: 40, h: 100, color: '#444' }
                };

                this.obstacles.push({
                    x: this.width + 100,
                    y: this.rhino.y + 40 - configs[type].h,
                    ...configs[type],
                    type,
                    destroyed: false
                });
            }

            handleCollision(obs) {
                let canBreak = false;
                if(this.rhino.isSprinting) canBreak = true;
                else if(obs.type === 'crate') canBreak = true;
                else if(obs.type === 'boulder' && this.rhino.charge > 50) canBreak = true;
                else if(obs.type === 'wall' && this.rhino.charge >= 95) canBreak = true;

                if(canBreak) {
                    obs.destroyed = true;
                    this.score += 10 + (this.combo * 5);
                    this.combo++;
                    this.comboTimer = 60;
                    this.createExplosion(obs.x + obs.w/2, obs.y + obs.h/2, obs.color);
                    this.shake = obs.type === 'wall' ? 15 : 5;
                    if(obs.type === 'wall') this.flash = 3;
                } else {
                    this.lives--;
                    this.rhino.invincible = 90;
                    this.shake = 20;
                    this.combo = 0;
                    if(this.lives <= 0) this.gameOver();
                }
            }

            createExplosion(x, y, color) {
                for(let i=0; i<15; i++) {
                    this.particles.push({
                        x, y,
                        vx: (Math.random()-0.5) * 10,
                        vy: (Math.random()-0.5) * 10 - 5,
                        life: 30 + Math.random()*20,
                        color,
                        size: 4 + Math.random()*8
                    });
                }
            }

            gameOver() {
                this.active = false;
                if(this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('rhinoHighScore', this.highScore);
                }
                document.getElementById('over-overlay').classList.remove('hidden');
                document.getElementById('final-score-val').textContent = this.score;
                document.getElementById('high-val').textContent = this.highScore;
            }

            updateHUD() {
                document.getElementById('score-val').textContent = this.score;
                document.getElementById('charge-fill').style.width = this.rhino.charge + '%';
                document.getElementById('lives-display').textContent = '🦏'.repeat(Math.max(0, this.lives));
                
                const comboEl = document.getElementById('combo-display');
                if(this.combo > 1) {
                    comboEl.textContent = `x${this.combo} COMBO`;
                    comboEl.classList.add('active');
                } else {
                    comboEl.classList.remove('active');
                }
            }

            draw() {
                ctx.clearRect(0, 0, this.width, this.height);

                ctx.save();
                if(this.shake > 0) {
                    ctx.translate((Math.random()-0.5)*this.shake, (Math.random()-0.5)*this.shake);
                    this.shake *= 0.9;
                }

                // Sky
                const sky = ctx.createLinearGradient(0, 0, 0, this.height);
                sky.addColorStop(0, '#0f172a');
                sky.addColorStop(0.6, '#1e293b');
                ctx.fillStyle = sky;
                ctx.fillRect(0, 0, this.width, this.height);

                // Background Parallax
                this.drawMountains(0.1, '#161e2e', 100);
                this.drawMountains(0.3, '#1c2538', 50);

                // Ground
                ctx.fillStyle = '#2d3a4f';
                ctx.fillRect(0, this.height * 0.75 + 40, this.width, this.height);
                
                // Ground detail
                ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                ctx.lineWidth = 2;
                for(let i=0; i<10; i++) {
                    const y = this.height * 0.75 + 60 + i*20;
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(this.width, y);
                    ctx.stroke();
                }

                // Obstacles
                this.obstacles.forEach(obs => {
                    if(obs.destroyed) return;
                    ctx.fillStyle = obs.color;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = 'black';
                    
                    if(obs.type === 'crate') {
                        ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                        ctx.strokeRect(obs.x+5, obs.y+5, obs.w-10, obs.h-10);
                    } else if(obs.type === 'boulder') {
                        ctx.beginPath();
                        ctx.roundRect(obs.x, obs.y, obs.w, obs.h, 15);
                        ctx.fill();
                    } else {
                        ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                    }
                    ctx.shadowBlur = 0;
                });

                // Rhino
                this.drawRhino();

                // Particles
                this.particles.forEach(p => {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life / 50;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                });
                ctx.globalAlpha = 1;

                // Flash
                if(this.flash > 0) {
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.fillRect(0, 0, this.width, this.height);
                    this.flash--;
                }

                ctx.restore();
            }

            drawMountains(speed, color, height) {
                ctx.fillStyle = color;
                const offset = (this.score * speed * 10) % this.width;
                ctx.beginPath();
                ctx.moveTo(0, this.height * 0.75 + 40);
                for(let x=0; x<=this.width+100; x+=100) {
                    const peakY = this.height * 0.75 + 40 - (height + Math.sin((x+offset)*0.01)*30);
                    ctx.lineTo(x, peakY);
                }
                ctx.lineTo(this.width, this.height * 0.75 + 40);
                ctx.fill();
            }

            drawRhino() {
                const {x, y, bob, invincible, isSprinting, charge} = this.rhino;
                if(invincible % 4 > 2) return;

                ctx.save();
                ctx.translate(x, y + bob);

                // Sprint trail
                if(isSprinting) {
                    ctx.fillStyle = 'rgba(245, 158, 11, 0.2)';
                    ctx.fillRect(-40, 5, 40, 40);
                    ctx.fillRect(-80, 10, 40, 30);
                }

                // Body
                const bodyGrad = ctx.createLinearGradient(0, 0, 0, 60);
                bodyGrad.addColorStop(0, '#4b5563');
                bodyGrad.addColorStop(1, '#1f2937');
                ctx.fillStyle = isSprinting ? '#f59e0b' : bodyGrad;
                
                // Main Barrel
                ctx.beginPath();
                ctx.roundRect(0, 0, 80, 50, [20, 30, 10, 10]);
                ctx.fill();

                // Head
                ctx.beginPath();
                ctx.roundRect(60, -10, 35, 40, [10, 20, 10, 10]);
                ctx.fill();

                // Horn
                ctx.fillStyle = charge > 80 || isSprinting ? '#fff' : '#d1d5db';
                if(isSprinting) ctx.shadowBlur = 20, ctx.shadowColor = 'white';
                ctx.beginPath();
                ctx.moveTo(85, -5);
                ctx.lineTo(110, -25);
                ctx.lineTo(100, 10);
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 0;

                // Eye
                ctx.fillStyle = isSprinting ? '#fff' : '#ef4444';
                ctx.beginPath();
                ctx.arc(80, 5, 4, 0, Math.PI*2);
                ctx.fill();

                // Legs
                ctx.fillStyle = isSprinting ? '#f59e0b' : '#111827';
                const legMove = Math.sin(this.rhino.frame) * 15;
                ctx.fillRect(10, 45, 12, 15 + legMove);
                ctx.fillRect(55, 45, 12, 15 - legMove);

                // Charge Aura
                if(charge > 0) {
                    ctx.strokeStyle = `rgba(245, 158, 11, ${charge/100})`;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(40, 25, 45 + Math.sin(Date.now()*0.01)*5, 0, Math.PI*2);
                    ctx.stroke();
                }

                ctx.restore();
            }

            loop() {
                this.update();
                this.draw();
                if(this.active) requestAnimationFrame(() => this.loop());
            }

            render() {
                this.draw();
                if(!this.active) requestAnimationFrame(() => this.render());
            }
        }

        const game = new RhinoCharge();
    </script>
</body>
</html>
