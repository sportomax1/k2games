<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sinkhole Master - K2 games</title>
    <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8Xw8AAnUB9WQ0N2IAAAAASUVORK5CYII=">
    <style>
        :root {
            --accent: #ff3e3e;
            --ui-bg: rgba(0, 0, 0, 0.6);
            --text: #ffffff;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a1a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text);
            touch-action: none;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .score-box {
            background: var(--ui-bg);
            padding: 10px 20px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .label { font-size: 0.8rem; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 1.8rem; font-weight: 800; color: var(--accent); }

        #level-progress {
            width: 200px;
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            margin-top: 10px;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .back-link {
            position: fixed;
            top: 20px;
            right: 20px;
            color: white;
            text-decoration: none;
            background: var(--ui-bg);
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: bold;
            backdrop-filter: blur(8px);
            pointer-events: auto;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--ui-bg);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            display: none;
            pointer-events: auto;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            min-width: 300px;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.95); }

        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: none;
            pointer-events: auto;
            touch-action: none;
        }

        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .info-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            background: var(--ui-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: auto;
            z-index: 100;
        }

        #controls-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            pointer-events: auto;
        }

        .modal-content {
            background: #222;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 80%;
            text-align: center;
            border: 1px solid var(--accent);
        }

        .control-item {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            font-size: 1.1rem;
        }

        .key {
            background: #444;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            border-bottom: 2px solid #000;
        }

        #msg-popup {
            position: fixed;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 800;
            display: none;
            animation: popUp 1s ease-out forwards;
        }

        @keyframes popUp {
            0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50px) scale(1.1); opacity: 1; }
            100% { transform: translate(-50%, -80px) scale(1); opacity: 0; }
        }

        @media (max-width: 768px) {
            #joystick-zone { display: block; }
        }
    </style>
</head>
<body>
    <div class="info-btn" onclick="toggleControls()">i</div>
    <a href="index.html" class="back-link">← HUB</a>
    <div id="msg-popup">GROWTH!</div>

    <div id="controls-modal" onclick="toggleControls()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="color: var(--accent)">CONTROLS</h2>
            <div class="control-item">
                <span>Move</span>
                <span><span class="key">WASD</span> or <span class="key">ARROWS</span></span>
            </div>
            <div class="control-item">
                <span>Desktop</span>
                <span>Mouse Move</span>
            </div>
            <div class="control-item">
                <span>Mobile</span>
                <span>Touch Joystick</span>
            </div>
            <div style="margin-top: 20px; font-size: 0.9rem; opacity: 0.8;">
                🔵 Cyan Orbs: Grow Faster<br>
                🔴 Red Orbs: Shrink Sinkhole<br>
                🟡 Gold Orbs: +10s Time
            </div>
            <button onclick="toggleControls()" style="width: 100%">GOT IT!</button>
        </div>
    </div>

    <div id="ui-layer">
        <div class="stats">
            <div style="width: 44px"></div>
            <div class="score-box">
                <div class="label">Score</div>
                <div id="score" class="value">0</div>
                <div class="label" style="margin-top:5px">Size Lvl</div>
                <div id="level" class="value" style="font-size: 1.2rem;">1</div>
                <div id="level-progress"><div id="progress-bar"></div></div>
            </div>
            <div class="score-box">
                <div class="label">Time</div>
                <div id="timer" class="value">60</div>
            </div>
        </div>

        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>

        <div id="game-over">
            <h1 style="font-size: 3rem; margin: 0;">TIME'S UP!</h1>
            <p id="final-score-msg" style="font-size: 1.2rem; opacity: 0.8; margin: 10px 0 20px;">You swallowed 0 items.</p>
            <button onclick="restartGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // Sinkhole Master (refactor): single dt-driven loop, no stacking intervals, safer item iteration.
        // This stays self-contained, but is organized into config/state/input/entities/render.

        const ui = {
            score: document.getElementById('score'),
            level: document.getElementById('level'),
            timer: document.getElementById('timer'),
            progressBar: document.getElementById('progress-bar'),
            gameOver: document.getElementById('game-over'),
            finalMsg: document.getElementById('final-score-msg'),
            msgPopup: document.getElementById('msg-popup'),
            controlsModal: document.getElementById('controls-modal'),
            joyZone: document.getElementById('joystick-zone'),
            joyKnob: document.getElementById('joystick-knob'),
        };

        const cfg = {
            maxItems: 250,
            bounds: 95,
            itemsToNextLevel: 10,
            baseHoleRadius: 1.2,
            holeGrowPerLevel: 0.4,
            maxHoleRadius: 11.5,
            maxLevel: 26,
            baseTime: 60,
            moveSpeedKeys: 22,
            moveSpeedJoy: 24,
            holeLerp: 0.15,
            fallSpeed: 10.5,
            swallowScaleRate: 4.2,
            minSwallowScale: 0.05,
            spawnGrace: 0.45,
            spawnMinBuffer: 9,
        };

        const input = {
            keys: { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false },
            mouseNdc: new THREE.Vector2(),
            raycaster: new THREE.Raycaster(),
            targetFromMouse: false,
            joystick: { active: false, x: 0, y: 0, id: null },
        };

        const state = {
            score: 0,
            timeLeft: cfg.baseTime,
            gameActive: false,
            currentLevel: 1,
            progress: 0,
            holeRadius: cfg.baseHoleRadius,
            last: performance.now(),
            timeAcc: 0,
            swallowed: 0,
            finale: false,
        };

        const world = {
            scene: null,
            camera: null,
            renderer: null,
            ground: null,
            holeGroup: null,
            holeDisc: null,
            holeFunnel: null,
            holeRim: null,
            crater: null,
            sun: null,
            targetHolePos: new THREE.Vector3(0, 0, 0),
            currentHolePos: new THREE.Vector3(0, 0, 0),
            items: [],
        };

        // ---- Public UI hooks (used by inline HTML onclick) ----
        window.restartGame = () => restartGame();
        window.toggleControls = () => toggleControls();

        init();
        requestAnimationFrame(loop);

        function init() {
            world.scene = new THREE.Scene();
            world.scene.background = new THREE.Color(0x87ceeb);
            world.scene.fog = new THREE.Fog(0x87ceeb, 24, 64);

            world.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            world.camera.position.set(0, 18, 12);
            world.camera.lookAt(0, 0, 0);

            world.renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            world.renderer.setSize(window.innerWidth, window.innerHeight);
            world.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
            world.renderer.shadowMap.enabled = true;
            world.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(world.renderer.domElement);

            addSkyDome();

            const ambient = new THREE.HemisphereLight(0xffffff, 0x2b3d57, 0.55);
            world.scene.add(ambient);

            world.sun = new THREE.DirectionalLight(0xffffff, 0.9);
            world.sun.position.set(18, 26, 14);
            world.sun.castShadow = true;
            world.sun.shadow.mapSize.set(2048, 2048);
            world.sun.shadow.camera.left = -40;
            world.sun.shadow.camera.right = 40;
            world.sun.shadow.camera.top = 40;
            world.sun.shadow.camera.bottom = -40;
            world.scene.add(world.sun);

            const groundGeo = new THREE.PlaneGeometry(200, 200, 80, 80);
            const groundMat = new THREE.MeshStandardMaterial({
                color: 0x4aa04a,
                roughness: 0.95,
                metalness: 0.0,
            });
            groundMat.map = makeGrassTexture();
            groundMat.map.colorSpace = THREE.SRGBColorSpace || undefined;
            groundMat.map.anisotropy = 4;
            groundMat.map.needsUpdate = true;
            world.ground = new THREE.Mesh(groundGeo, groundMat);
            world.ground.rotation.x = -Math.PI / 2;
            world.ground.receiveShadow = true;
            world.scene.add(world.ground);

            buildHole();
            spawnInitialItems();

            // Show the on-screen joystick on touch-capable devices.
            const isTouch = matchMedia('(hover: none)').matches || ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            ui.joyZone.style.display = isTouch ? 'block' : 'none';

            // Pointer input for desktop: drag target around with mouse move.
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('resize', onResize);
            window.addEventListener('keydown', e => { if (Object.prototype.hasOwnProperty.call(input.keys, e.key)) input.keys[e.key] = true; });
            window.addEventListener('keyup', e => { if (Object.prototype.hasOwnProperty.call(input.keys, e.key)) input.keys[e.key] = false; });

            // Touch joystick (mobile)
            ui.joyZone.addEventListener('touchstart', e => { e.preventDefault(); input.joystick.active = true; handleJoystickMove(e); }, { passive: false });
            window.addEventListener('touchmove', handleJoystickMove, { passive: false });
            window.addEventListener('touchend', () => { input.joystick.active = false; input.joystick.x = 0; input.joystick.y = 0; ui.joyKnob.style.left = ui.joyKnob.style.top = '50%'; });

            startGame();
        }

        function addSkyDome() {
            const skyGeo = new THREE.SphereGeometry(320, 32, 18);
            const skyMat = new THREE.MeshBasicMaterial({ map: makeSkyTexture(), side: THREE.BackSide });
            const sky = new THREE.Mesh(skyGeo, skyMat);
            sky.position.y = -10;
            world.scene.add(sky);
        }

        function makeSkyTexture() {
            const c = document.createElement('canvas');
            c.width = 512;
            c.height = 256;
            const g = c.getContext('2d');
            const grad = g.createLinearGradient(0, 0, 0, c.height);
            grad.addColorStop(0, '#8fd8ff');
            grad.addColorStop(0.55, '#bfe9ff');
            grad.addColorStop(1, '#f7f2c4');
            g.fillStyle = grad;
            g.fillRect(0, 0, c.width, c.height);
            for (let i = 0; i < 220; i++) {
                const x = Math.random() * c.width;
                const y = Math.random() * c.height * 0.55;
                const r = 10 + Math.random() * 34;
                g.fillStyle = `rgba(255,255,255,${0.03 + Math.random() * 0.06})`;
                g.beginPath();
                g.ellipse(x, y, r * 1.5, r, 0, 0, Math.PI * 2);
                g.fill();
            }
            const tex = new THREE.CanvasTexture(c);
            tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
            tex.needsUpdate = true;
            return tex;
        }

        function makeGrassTexture() {
            const c = document.createElement('canvas');
            c.width = 256;
            c.height = 256;
            const g = c.getContext('2d');
            g.fillStyle = '#4aa04a';
            g.fillRect(0, 0, c.width, c.height);
            for (let i = 0; i < 5200; i++) {
                const x = Math.random() * c.width;
                const y = Math.random() * c.height;
                const v = 90 + Math.random() * 80;
                g.fillStyle = `rgba(20, ${v}, 20, ${0.16 + Math.random() * 0.22})`;
                g.fillRect(x, y, 1, 1);
            }
            for (let i = 0; i < 900; i++) {
                const x = Math.random() * c.width;
                const y = Math.random() * c.height;
                const len = 3 + Math.random() * 9;
                const a = Math.random() * Math.PI * 2;
                g.strokeStyle = `rgba(10,80,10,${0.18 + Math.random() * 0.18})`;
                g.lineWidth = 1;
                g.beginPath();
                g.moveTo(x, y);
                g.lineTo(x + Math.cos(a) * len, y + Math.sin(a) * len);
                g.stroke();
            }
            const tex = new THREE.CanvasTexture(c);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(18, 18);
            tex.needsUpdate = true;
            return tex;
        }

        function buildHole() {
            if (world.holeGroup) world.scene.remove(world.holeGroup);

            world.holeGroup = new THREE.Group();
            world.holeGroup.position.set(0, 0, 0);

            // Dark disc (opening)
            const discGeo = new THREE.CircleGeometry(1, 64);
            const discMat = new THREE.MeshStandardMaterial({ color: 0x05070a, roughness: 1, metalness: 0 });
            discMat.map = makeHoleTexture();
            discMat.map.needsUpdate = true;
            world.holeDisc = new THREE.Mesh(discGeo, discMat);
            world.holeDisc.rotation.x = -Math.PI / 2;
            world.holeDisc.position.y = 0.02;
            world.holeDisc.receiveShadow = false;
            world.holeDisc.castShadow = false;
            world.holeGroup.add(world.holeDisc);

            // Funnel (gives a proper 3D "sink" feel)
            const funnelGeo = new THREE.CylinderGeometry(0.25, 1.02, 1.25, 64, 1, true);
            const funnelMat = new THREE.MeshStandardMaterial({
                color: 0x101317,
                roughness: 0.7,
                metalness: 0.05,
                side: THREE.DoubleSide,
            });
            world.holeFunnel = new THREE.Mesh(funnelGeo, funnelMat);
            world.holeFunnel.position.y = -0.58;
            world.holeFunnel.castShadow = false;
            world.holeFunnel.receiveShadow = true;
            world.holeGroup.add(world.holeFunnel);

            // Rim (torus)
            const rimGeo = new THREE.TorusGeometry(1.05, 0.12, 12, 64);
            const rimMat = new THREE.MeshStandardMaterial({ color: 0x2b2f35, roughness: 0.75, metalness: 0.08 });
            world.holeRim = new THREE.Mesh(rimGeo, rimMat);
            world.holeRim.rotation.x = -Math.PI / 2;
            world.holeRim.position.y = 0.03;
            world.holeRim.castShadow = true;
            world.holeRim.receiveShadow = true;
            world.holeGroup.add(world.holeRim);

            // Crater tint ring to sell depth
            const craterGeo = new THREE.RingGeometry(1.08, 2.2, 96);
            const craterMat = new THREE.MeshStandardMaterial({
                color: 0x2d3b2a,
                roughness: 1,
                metalness: 0,
                transparent: true,
                opacity: 0.75,
                side: THREE.DoubleSide,
            });
            world.crater = new THREE.Mesh(craterGeo, craterMat);
            world.crater.rotation.x = -Math.PI / 2;
            world.crater.position.y = 0.015;
            world.crater.receiveShadow = false;
            world.crater.castShadow = false;
            world.holeGroup.add(world.crater);

            world.scene.add(world.holeGroup);
            syncHoleScale();
        }

        function makeHoleTexture() {
            const c = document.createElement('canvas');
            c.width = 256;
            c.height = 256;
            const g = c.getContext('2d');
            const cx = c.width / 2;
            const cy = c.height / 2;
            const grad = g.createRadialGradient(cx, cy, 8, cx, cy, 120);
            grad.addColorStop(0, 'rgba(0,0,0,1)');
            grad.addColorStop(0.55, 'rgba(12,14,18,1)');
            grad.addColorStop(1, 'rgba(40,44,52,1)');
            g.fillStyle = grad;
            g.fillRect(0, 0, c.width, c.height);
            g.globalCompositeOperation = 'screen';
            for (let i = 0; i < 36; i++) {
                const a = (i / 36) * Math.PI * 2;
                g.strokeStyle = `rgba(255,255,255,${0.03})`;
                g.lineWidth = 2;
                g.beginPath();
                g.arc(cx, cy, 28 + (i % 3) * 8, a, a + 1.1);
                g.stroke();
            }
            g.globalCompositeOperation = 'source-over';
            const tex = new THREE.CanvasTexture(c);
            tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
            tex.needsUpdate = true;
            return tex;
        }

        // --- Model Factories ---
        function withPhong(color) {
            return new THREE.MeshStandardMaterial({ color, roughness: 0.8, metalness: 0.05 });
        }

        function createPerson(color = 0x3366ff) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.45, 0.2), withPhong(color));
            body.position.y = 0.35;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), withPhong(0xffdbac));
            head.position.y = 0.65;
            const armGeo = new THREE.BoxGeometry(0.1, 0.3, 0.1);
            const lArm = new THREE.Mesh(armGeo, withPhong(0xffdbac));
            lArm.position.set(-0.2, 0.4, 0);
            const rArm = new THREE.Mesh(armGeo, withPhong(0xffdbac));
            rArm.position.set(0.2, 0.4, 0);
            group.add(body, head, lArm, rArm);
            return group;
        }

        function createAnimal() {
            const group = new THREE.Group();
            const color = [0x8b4513, 0xd2b48c, 0x333333][Math.floor(Math.random() * 3)];
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.3, 0.25), withPhong(color));
            body.position.y = 0.25;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), withPhong(color));
            head.position.set(0.25, 0.35, 0);
            group.add(body, head);
            return group;
        }

        function createTree() {
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 0.8), withPhong(0x5d4037));
            trunk.position.y = 0.4;
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(0.6, 1.2, 8), withPhong(0x2e7d32));
            leaves.position.y = 1.2;
            group.add(trunk, leaves);
            return group;
        }

        function createCar() {
            const group = new THREE.Group();
            const carColor = Math.random() * 0xffffff;
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 0.6), withPhong(carColor));
            body.position.y = 0.25;
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.4, 0.5), withPhong(0x333333));
            cabin.position.set(-0.1, 0.6, 0);
            group.add(body, cabin);
            return group;
        }

        function createStreetlight() {
            const group = new THREE.Group();
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 2.5), withPhong(0x444444));
            pole.position.y = 1.25;
            const light = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshStandardMaterial({ color: 0xffffaa, emissive: 0xffffaa, emissiveIntensity: 0.75 }));
            light.position.y = 2.5;
            group.add(pole, light);
            return group;
        }

        function createBuilding(w, h, d) {
            const group = new THREE.Group();
            const color = [0x999999, 0x777777, 0x555555][Math.floor(Math.random() * 3)];
            const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), withPhong(color));
            body.position.y = h / 2;
            group.add(body);
            const rows = Math.floor(h / 0.6);
            for (let i = 0; i < rows; i++) {
                const win = new THREE.Mesh(new THREE.PlaneGeometry(w * 0.8, 0.1), new THREE.MeshStandardMaterial({ color: 0xffffaa, emissive: 0xffffaa, emissiveIntensity: 0.55 }));
                win.position.set(0, (i + 1) * 0.6, d / 2 + 0.01);
                group.add(win);
            }
            return group;
        }

        function createPowerUp(type) {
            const colors = { grow: 0x00ffff, shrink: 0xff0000, time: 0xffd700 };
            const geo = new THREE.OctahedronGeometry(0.5, 0);
            const mat = new THREE.MeshStandardMaterial({ color: colors[type], emissive: colors[type], emissiveIntensity: 0.7, roughness: 0.2, metalness: 0.1 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.userData.powerType = type;
            return mesh;
        }

        // --- Spawning ---
        function spawnInitialItems() {
            for (let i = 0; i < cfg.maxItems; i++) spawnOneItem(true);
        }

        function spawnOneItem(initial = false) {
            const roll = Math.random();
            let entity;

            if (roll < 0.06) {
                const pRoll = Math.random();
                const pType = pRoll < 0.4 ? 'grow' : (pRoll < 0.7 ? 'time' : 'shrink');
                entity = { mesh: createPowerUp(pType), size: 0.5, value: 0, power: pType };
            } else if (roll < 0.3) entity = { mesh: createPerson(), size: 0.5, value: 5 };
            else if (roll < 0.45) entity = { mesh: createAnimal(), size: 0.4, value: 3 };
            else if (roll < 0.6) entity = { mesh: createTree(), size: 0.8, value: 10 };
            else if (roll < 0.7) entity = { mesh: createStreetlight(), size: 0.3, value: 15 };
            else if (roll < 0.85) entity = { mesh: createCar(), size: 1.2, value: 25 };
            else {
                const w = 2 + Math.random() * 2;
                const h = 3 + Math.random() * 5;
                entity = { mesh: createBuilding(w, h, w), size: w * 1.5, value: 100 };
            }

            const mesh = entity.mesh;
            const spawnPoint = chooseSpawnPoint(initial, entity.size);
            mesh.position.x = spawnPoint.x;
            mesh.position.z = spawnPoint.z;

            const box = new THREE.Box3().setFromObject(mesh);
            const height = box.max.y - box.min.y;
            mesh.position.y = -box.min.y;
            mesh.traverse(o => { if (o.isMesh) { o.castShadow = o.receiveShadow = true; } });
            world.scene.add(mesh);
            world.items.push({
                mesh,
                size: entity.size,
                value: entity.value,
                power: entity.power,
                falling: false,
                fallT: 0,
                spawnAge: 0,
                baseY: mesh.position.y,
                height,
                baseScale: mesh.scale.clone(),
            });
        }

        function chooseSpawnPoint(initial, itemSize) {
            const minClearance = state.holeRadius + cfg.spawnMinBuffer + itemSize;
            const limit = initial ? 62 : cfg.bounds - 7;

            for (let attempt = 0; attempt < 36; attempt++) {
                let x;
                let z;
                if (initial) {
                    x = (Math.random() - 0.5) * limit * 2;
                    z = (Math.random() - 0.5) * limit * 2;
                } else {
                    const angle = Math.random() * Math.PI * 2;
                    const ring = Math.max(28, minClearance) + Math.random() * 34;
                    x = world.currentHolePos.x + Math.cos(angle) * ring;
                    z = world.currentHolePos.z + Math.sin(angle) * ring;
                }

                x = Math.max(-cfg.bounds + 5, Math.min(cfg.bounds - 5, x));
                z = Math.max(-cfg.bounds + 5, Math.min(cfg.bounds - 5, z));
                const dx = x - world.currentHolePos.x;
                const dz = z - world.currentHolePos.z;
                if (dx * dx + dz * dz > minClearance * minClearance) return { x, z };
            }

            const fallbackAngle = Math.random() * Math.PI * 2;
            return {
                x: Math.max(-cfg.bounds + 5, Math.min(cfg.bounds - 5, Math.cos(fallbackAngle) * (cfg.bounds - 10))),
                z: Math.max(-cfg.bounds + 5, Math.min(cfg.bounds - 5, Math.sin(fallbackAngle) * (cfg.bounds - 10))),
            };
        }

        // --- Game Logic ---
        function startGame() {
            state.score = 0;
            state.timeLeft = cfg.baseTime;
            state.gameActive = true;
            state.currentLevel = 1;
            state.holeRadius = cfg.baseHoleRadius;
            state.progress = 0;
            state.timeAcc = 0;
            state.swallowed = 0;
            state.finale = false;
            world.targetHolePos.set(0, 0, 0);
            world.currentHolePos.set(0, 0, 0);
            if (world.holeGroup) world.holeGroup.position.set(0, 0, 0);

            ui.gameOver.style.display = 'none';
            updateUI();
            showMsg("GO!", "#222");
        }

        function endGame(reason = "TIME'S UP!") {
            state.gameActive = false;
            ui.gameOver.style.display = 'block';
            ui.gameOver.querySelector('h1').innerText = reason;
            ui.finalMsg.innerText = `You reached Level ${state.currentLevel} with ${state.score} points! You swallowed ${state.swallowed} items.`;
        }

        function restartGame() {
            // Clear meshes
            for (const it of world.items) world.scene.remove(it.mesh);
            world.items = [];
            spawnInitialItems();
            startGame();
        }

        function toggleControls() {
            ui.controlsModal.style.display = ui.controlsModal.style.display === 'flex' ? 'none' : 'flex';
        }

        function showMsg(txt, color) {
            ui.msgPopup.innerText = txt;
            ui.msgPopup.style.background = color;
            ui.msgPopup.style.display = 'block';
            setTimeout(() => { ui.msgPopup.style.display = 'none'; }, 1000);
        }

        function onMouseMove(e) {
            input.mouseNdc.x = (e.clientX / window.innerWidth) * 2 - 1;
            input.mouseNdc.y = -(e.clientY / window.innerHeight) * 2 + 1;
            input.targetFromMouse = true;
            updateTargetFromPointer();
        }

        function onTouchMove(e) {
            // Avoid fighting with the joystick touch.
            if (input.joystick.active) return;
            if (!e.touches.length) return;
            input.mouseNdc.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
            input.mouseNdc.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
            input.targetFromMouse = true;
            updateTargetFromPointer();
        }

        function updateTargetFromPointer() {
            input.raycaster.setFromCamera(input.mouseNdc, world.camera);
            const intersects = input.raycaster.intersectObject(world.ground);
            if (intersects.length) world.targetHolePos.copy(intersects[0].point);
        }

        function onResize() {
            world.camera.aspect = window.innerWidth / window.innerHeight;
            world.camera.updateProjectionMatrix();
            world.renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function updateUI() {
            ui.score.innerText = state.score;
            ui.level.innerText = state.currentLevel;
            ui.timer.innerText = Math.max(0, Math.ceil(state.timeLeft));
            ui.progressBar.style.width = `${Math.min(100, (state.progress / cfg.itemsToNextLevel) * 100)}%`;
            syncHoleScale();
        }

        function syncHoleScale() {
            const r = state.holeRadius;
            if (!world.holeGroup) return;
            world.holeGroup.scale.set(r, 1, r);
            world.crater.scale.set(1.28, 1, 1.28);
        }

        // --- Main Loop ---
        function loop(now) {
            const dt = Math.min(0.033, (now - state.last) / 1000);
            state.last = now;

            if (state.gameActive) update(dt);
            world.renderer.render(world.scene, world.camera);
            requestAnimationFrame(loop);
        }

        function update(dt) {
            // Countdown via accumulated dt (no intervals)
            state.timeAcc += dt;
            if (state.timeAcc >= 1) {
                const dec = Math.floor(state.timeAcc);
                state.timeAcc -= dec;
                state.timeLeft -= dec;
                if (state.timeLeft <= 0) {
                    state.timeLeft = 0;
                    updateUI();
                    endGame("TIME'S UP!");
                    return;
                }
            }

            // Movement input
            const mX = (input.keys.d || input.keys.ArrowRight ? 1 : 0) - (input.keys.a || input.keys.ArrowLeft ? 1 : 0);
            const mZ = (input.keys.s || input.keys.ArrowDown ? 1 : 0) - (input.keys.w || input.keys.ArrowUp ? 1 : 0);
            if (mX || mZ) {
                world.targetHolePos.x += mX * cfg.moveSpeedKeys * dt;
                world.targetHolePos.z += mZ * cfg.moveSpeedKeys * dt;
            }
            if (input.joystick.active) {
                world.targetHolePos.x += input.joystick.x * cfg.moveSpeedJoy * dt;
                world.targetHolePos.z += input.joystick.y * cfg.moveSpeedJoy * dt;
            }

            world.targetHolePos.x = Math.max(-cfg.bounds, Math.min(cfg.bounds, world.targetHolePos.x));
            world.targetHolePos.z = Math.max(-cfg.bounds, Math.min(cfg.bounds, world.targetHolePos.z));
            world.currentHolePos.lerp(world.targetHolePos, 1 - Math.pow(1 - cfg.holeLerp, dt * 60));
            world.holeGroup.position.set(world.currentHolePos.x, 0, world.currentHolePos.z);

            // Camera follow: slightly offset and smoothed
            world.camera.position.x += (world.currentHolePos.x * 0.4 - world.camera.position.x) * (1 - Math.pow(0.86, dt * 60));
            world.camera.position.z += ((world.currentHolePos.z * 0.4 + 18) - world.camera.position.z) * (1 - Math.pow(0.86, dt * 60));
            world.camera.lookAt(world.currentHolePos.x, 0, world.currentHolePos.z);

            // Visual: subtle funnel spin
            world.holeFunnel.rotation.y += dt * 0.9;
            world.holeRim.rotation.z -= dt * 0.3;

            // Items update (iterate backwards so removals are safe)
            const r = state.holeRadius;
            const rSq = r * r;
            for (let i = world.items.length - 1; i >= 0; i--) {
                const item = world.items[i];
                item.spawnAge += dt;

                if (item.falling) {
                    item.fallT += dt;
                    const t = Math.min(1, item.fallT);
                    const swirl = (1 - t) * 1.2;
                    const dx = item.mesh.position.x - world.currentHolePos.x;
                    const dz = item.mesh.position.z - world.currentHolePos.z;
                    const ang = Math.atan2(dz, dx) + dt * (3.2 + (1 - t) * 6.5);
                    const dist = Math.hypot(dx, dz) * (1 - dt * 1.7);
                    item.mesh.position.x = world.currentHolePos.x + Math.cos(ang) * dist;
                    item.mesh.position.z = world.currentHolePos.z + Math.sin(ang) * dist;

                    item.mesh.position.y -= cfg.fallSpeed * dt;
                    const s = Math.max(cfg.minSwallowScale, 1 - item.fallT * cfg.swallowScaleRate);
                    item.mesh.scale.set(item.baseScale.x * s, item.baseScale.y * s, item.baseScale.z * s);
                    item.mesh.rotation.y += dt * (2.5 + swirl);
                    item.mesh.rotation.x += dt * (1.3 + swirl * 0.6);

                    if (item.mesh.scale.x <= cfg.minSwallowScale + 0.001) {
                        world.scene.remove(item.mesh);
                        world.items.splice(i, 1);
                        if (world.items.length < cfg.maxItems) spawnOneItem(false);
                    }
                    continue;
                }

                const dx = item.mesh.position.x - world.currentHolePos.x;
                const dz = item.mesh.position.z - world.currentHolePos.z;
                const dSq = dx * dx + dz * dz;
                if (item.spawnAge >= cfg.spawnGrace && dSq < rSq) {
                    if (item.power) {
                        item.falling = true;
                        item.fallT = 0;
                        applyPower(item.power);
                    } else if (item.size < r * 1.6) {
                        item.falling = true;
                        item.fallT = 0;
                        state.score += item.value;
                        state.swallowed++;
                        state.progress += 1;
                        checkLevelUp();
                        updateUI();
                    } else {
                        // Too big: hover/bounce slightly (use cached height)
                        item.mesh.position.y = item.baseY + Math.sin(performance.now() * 0.008) * 0.1;
                    }
                } else {
                    item.mesh.position.y = item.baseY;
                }
            }

            updateUI();
        }

        function applyPower(power) {
            if (power === 'grow') {
                state.progress += 3;
                state.holeRadius = Math.min(cfg.maxHoleRadius, state.holeRadius + 0.18);
                showMsg("GROWTH!", "#00ffff");
            } else if (power === 'shrink') {
                state.progress = Math.max(0, state.progress - 3);
                state.holeRadius = Math.max(cfg.baseHoleRadius, state.holeRadius - 0.55);
                showMsg("SHRINK!", "#ff0000");
            } else if (power === 'time') {
                state.timeLeft += 10;
                showMsg("+10 SECONDS", "#ffd700");
            }
            checkLevelUp();
            updateUI();
        }

        function checkLevelUp() {
            if (state.finale) return;
            let leveled = false;
            while (state.progress >= cfg.itemsToNextLevel) {
                leveled = true;
                state.currentLevel += 1;
                state.progress -= cfg.itemsToNextLevel;
                state.holeRadius = Math.min(cfg.maxHoleRadius, state.holeRadius + cfg.holeGrowPerLevel);
            }
            if (!leveled) return;
            showMsg("LEVEL UP!", "#ff3e3e");
            if (state.holeRadius >= cfg.maxHoleRadius || state.currentLevel >= cfg.maxLevel) {
                state.finale = true;
                state.holeRadius = cfg.maxHoleRadius;
                updateUI();
                showMsg("CITY CLAIMED!", "#ff3e3e");
                setTimeout(() => {
                    if (state.gameActive) endGame("CITY CLAIMED!");
                }, 900);
            }
        }

        function handleJoystickMove(e) {
            if (!input.joystick.active) return;
            e.preventDefault();
            if (!e.touches || !e.touches.length) return;
            const t = e.touches[0];
            const r = ui.joyZone.getBoundingClientRect();
            const cX = r.left + r.width / 2;
            const cY = r.top + r.height / 2;
            let dx = t.clientX - cX;
            let dy = t.clientY - cY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const max = r.width / 2;
            if (dist > max) { dx *= max / dist; dy *= max / dist; }
            input.joystick.x = dx / max;
            input.joystick.y = dy / max;
            ui.joyKnob.style.left = `calc(50% + ${dx}px)`;
            ui.joyKnob.style.top = `calc(50% + ${dy}px)`;
        }
    </script>
</body>
