<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Real Life: Daily Drive - K2 games</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: rgba(30, 41, 59, 0.8);
            --accent: #38bdf8;
            --text: #f8fafc;
            --success: #22c55e;
            --danger: #ef4444;
            --gold: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100dvh;
            width: 100%;
            overflow: hidden;
            position: fixed;
            display: flex;
            flex-direction: column;
        }

        #game-container {
            flex: 1;
            position: relative;
            width: 100%;
            background: #1e293b;
            display: flex;
            flex-direction: column;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #0f172a;
        }

        /* Top HUD */
        .hud-top {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .hud-card {
            background: var(--panel);
            backdrop-filter: blur(12px);
            padding: 10px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .clock-val { font-family: monospace; font-size: 1.5rem; font-weight: 900; color: var(--gold); }

        /* Schedule Drawer */
        #schedule-drawer {
            position: absolute;
            top: 80px;
            right: 20px;
            width: 280px;
            background: var(--panel);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-height: 60vh;
            overflow-y: auto;
            z-index: 50;
            transition: transform 0.3s;
        }

        @media (max-width: 900px) {
            #schedule-drawer {
                top: auto;
                bottom: 120px;
                right: 20px;
                left: 20px;
                width: auto;
                max-height: 30vh;
            }
        }

        .schedule-title { font-size: 0.7rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; margin-bottom: 15px; }
        
        .schedule-item {
            padding: 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            margin-bottom: 8px;
            border: 1px solid transparent;
            transition: 0.3s;
        }
        .schedule-item.active { background: rgba(56, 189, 248, 0.1); border-color: var(--accent); }
        .schedule-item.done { opacity: 0.4; filter: grayscale(1); }
        .time-slot { font-size: 0.75rem; font-weight: 800; color: var(--accent); }
        .location-name { font-weight: 600; display: block; }

        /* Controls */
        #mobile-controls {
            position: absolute;
            bottom: 30px;
            left: 20px;
            display: none;
            gap: 10px;
            z-index: 100;
        }
        @media (max-width: 1024px) { #mobile-controls { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); } }

        .ctrl-btn {
            background: var(--panel);
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            backdrop-filter: blur(5px);
        }
        .ctrl-btn:active { background: var(--accent); }

        /* Modals */
        .modal {
            position: absolute; inset: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center; padding: 30px;
        }

        .btn-large {
            background: var(--accent); color: #000; border: none; padding: 15px 50px;
            border-radius: 50px; font-weight: 900; cursor: pointer; margin-top: 30px;
            font-size: 1.2rem;
        }

        #status-msg {
            position: absolute;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 25px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.9rem;
            z-index: 100;
            transition: 0.3s;
        }
        .status-ok { background: var(--success); color: white; }
        .status-warn { background: var(--danger); color: white; }

        .back-hub { position: fixed; top: 20px; left: 20px; color: #94a3b8; text-decoration: none; font-weight: bold; font-size: 0.8rem; z-index: 200; }
    </style>
</head>
<body>
    <div id="game-container">
        <a href="index.html" class="back-hub">← HUB</a>

        <div class="hud-top">
            <div style="width: 100px;"></div> <!-- Spacer -->
            <div class="hud-card">
                <span id="time-icon">☀️</span>
                <span id="time-val" class="clock-val">06:00 AM</span>
            </div>
            <div style="width: 100px;"></div>
        </div>

        <div id="status-msg" class="status-ok">✔ AT HOME</div>

        <div id="schedule-drawer">
            <div class="schedule-title">Daily Grind</div>
            <div id="schedule-list"></div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="mobile-controls">
            <div></div><div class="ctrl-btn" id="up">▲</div><div></div>
            <div class="ctrl-btn" id="left">◀</div><div class="ctrl-btn" id="down">▼</div><div class="ctrl-btn" id="right">▶</div>
        </div>

        <!-- Start Modal -->
        <div id="start-modal" class="modal">
            <h1 style="font-size: 3rem; font-style: italic; font-weight: 900; color: var(--accent);">REAL LIFE</h1>
            <p style="opacity: 0.7; max-width: 400px; margin-top: 15px;">A day in the life of a commuter. Follow your schedule and stay on time!</p>
            <button class="btn-large" onclick="game.start()">ENGAGE GEARS</button>
        </div>

        <!-- End Modal -->
        <div id="end-modal" class="modal" style="display:none">
            <h1 style="font-size: 3rem; color: var(--gold);">DAY COMPLETE</h1>
            <p id="stats-report" style="font-size: 1.2rem; margin: 20px 0;"></p>
            <button class="btn-large" onclick="location.reload()">NEXT DAY</button>
        </div>
    </div>

    <script>
        const LOCATIONS = [
            { id: 'House', x: 100, y: 500, color: '#4caf50', icon: '🏠' },
            { id: 'Work', x: 700, y: 100, color: '#2196f3', icon: '💼' },
            { id: 'Gym', x: 700, y: 500, color: '#f44336', icon: '🏋️' },
            { id: 'Church', x: 100, y: 100, color: '#ffeb3b', icon: '⛪' },
            { id: 'Store', x: 400, y: 300, color: '#9c27b0', icon: '🛒' }
        ];

        const ROADS = [[0, 4], [4, 1], [4, 2], [4, 3], [0, 3], [1, 2]];

        const SCHEDULE = [
            { hour: 6, place: 'House', task: 'Wake Up' },
            { hour: 7, place: 'Gym', task: 'Workout' },
            { hour: 8.5, place: 'House', task: 'Shower' },
            { hour: 9, place: 'Work', task: 'The Grind' },
            { hour: 17, place: 'Store', task: 'Groceries' },
            { hour: 18, place: 'House', task: 'Dinner' },
            { hour: 19, place: 'Church', task: 'Evening Service' },
            { hour: 20.5, place: 'House', task: 'Sleep' }
        ];

        class RealLifeGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.width = 800;
                this.height = 600;
                this.canvas.width = this.width;
                this.canvas.height = this.height;

                this.car = { x: 100, y: 500, angle: 0, speed: 0, targetAngle: 0 };
                this.time = 6 * 60; // Start at 6:00 AM
                this.currentIdx = 0;
                this.playing = false;
                this.keys = {};
                this.lateness = 0;

                this.init();
            }

            init() {
                window.onkeydown = e => this.keys[e.code] = true;
                window.onkeyup = e => this.keys[e.code] = false;

                const bind = (id, key) => {
                    const el = document.getElementById(id);
                    el.ontouchstart = (e) => { e.preventDefault(); this.keys[key] = true; };
                    el.ontouchend = () => this.keys[key] = false;
                };
                bind('up', 'ArrowUp'); bind('down', 'ArrowDown'); bind('left', 'ArrowLeft'); bind('right', 'ArrowRight');

                this.renderSchedule();
                this.loop();
            }

            start() {
                this.playing = true;
                document.getElementById('start-modal').style.display = 'none';
            }

            renderSchedule() {
                const list = document.getElementById('schedule-list');
                list.innerHTML = SCHEDULE.map((s, i) => `
                    <div class="schedule-item ${i === this.currentIdx ? 'active' : ''} ${i < this.currentIdx ? 'done' : ''}" id="sched-${i}">
                        <div class="time-slot">${this.formatHour(s.hour)}</div>
                        <span class="location-name">${s.place}: ${s.task}</span>
                    </div>
                `).join('');
                
                const activeItem = document.getElementById(`sched-${this.currentIdx}`);
                if (activeItem) activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            formatHour(hour) {
                const h = Math.floor(hour) % 24;
                const m = Math.round((hour - Math.floor(hour)) * 60);
                const ampm = h >= 12 ? 'PM' : 'AM';
                const h12 = h % 12 || 12;
                return `${h12}:${m.toString().padStart(2, '0')} ${ampm}`;
            }

            update() {
                if(!this.playing) return;

                // Time Logic (1 second = 5 mins)
                this.time += 0.083; // roughly
                const hour = this.time / 60;
                document.getElementById('time-val').textContent = this.formatHour(hour);
                document.getElementById('time-icon').textContent = (hour >= 6 && hour < 18) ? '☀️' : '🌙';

                // Car Physics
                if (this.keys['ArrowUp'] || this.keys['KeyW']) this.car.speed = Math.min(5, this.car.speed + 0.2);
                else if (this.keys['ArrowDown'] || this.keys['KeyS']) this.car.speed = Math.max(-2, this.car.speed - 0.2);
                else this.car.speed *= 0.95;

                if (Math.abs(this.car.speed) > 0.1) {
                    const turnSpeed = 0.05 * (Math.abs(this.car.speed) / 5 + 0.5);
                    if (this.keys['ArrowLeft'] || this.keys['KeyA']) this.car.angle -= turnSpeed;
                    if (this.keys['ArrowRight'] || this.keys['KeyD']) this.car.angle += turnSpeed;
                }

                this.car.x += Math.cos(this.car.angle) * this.car.speed;
                this.car.y += Math.sin(this.car.angle) * this.car.speed;

                // Wrap or Clamp? Let's Clamp to map
                this.car.x = Math.max(20, Math.min(this.width - 20, this.car.x));
                this.car.y = Math.max(20, Math.min(this.height - 20, this.car.y));

                // Check Schedule
                const current = SCHEDULE[this.currentIdx];
                const target = LOCATIONS.find(l => l.id === current.place);
                const dist = Math.hypot(this.car.x - target.x, this.car.y - target.y);
                
                const status = document.getElementById('status-msg');
                if (dist < 50) {
                    status.textContent = `✔ AT ${current.place.toUpperCase()}`;
                    status.className = 'status-ok';
                    
                    // If arrived early or on time, wait for schedule to progress
                    if (hour >= current.hour) {
                        this.currentIdx++;
                        if (this.currentIdx >= SCHEDULE.length) this.endDay();
                        else this.renderSchedule();
                    }
                } else {
                    const isLate = hour > current.hour + 0.5;
                    if (isLate) this.lateness += 0.01;
                    status.textContent = isLate ? `⚠ LATE! GO TO ${current.place.toUpperCase()}` : `GO TO ${current.place.toUpperCase()}`;
                    status.className = isLate ? 'status-warn' : '';
                }
            }

            endDay() {
                this.playing = false;
                document.getElementById('end-modal').style.display = 'flex';
                const performance = Math.max(0, 100 - Math.floor(this.lateness * 10));
                document.getElementById('stats-report').innerHTML = `Day Grade: ${performance}%<br>${performance > 80 ? 'Promoted!' : 'Stay safe out there.'}`;
            }

            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.width, this.height);

                // Draw Roads (Map Background)
                ctx.strokeStyle = '#334155'; ctx.lineWidth = 40; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                ROADS.forEach(pair => {
                    const l1 = LOCATIONS[pair[0]], l2 = LOCATIONS[pair[1]];
                    ctx.beginPath(); ctx.moveTo(l1.x, l1.y); ctx.lineTo(l2.x, l2.y); ctx.stroke();
                });
                ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
                ROADS.forEach(pair => {
                    const l1 = LOCATIONS[pair[0]], l2 = LOCATIONS[pair[1]];
                    ctx.setLineDash([10, 10]);
                    ctx.beginPath(); ctx.moveTo(l1.x, l1.y); ctx.lineTo(l2.x, l2.y); ctx.stroke();
                    ctx.setLineDash([]);
                });

                // Locations
                LOCATIONS.forEach(loc => {
                    ctx.save();
                    ctx.shadowBlur = 20; ctx.shadowColor = loc.color;
                    ctx.fillStyle = loc.color;
                    ctx.beginPath(); ctx.arc(loc.x, loc.y, 35, 0, Math.PI*2); ctx.fill();
                    ctx.restore();
                    
                    ctx.fillStyle = 'white'; ctx.font = '30px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(loc.icon, loc.x, loc.y);
                    
                    ctx.font = '900 10px Segoe UI'; ctx.fillText(loc.id.toUpperCase(), loc.x, loc.y + 50);
                });

                // The Car
                ctx.save();
                ctx.translate(this.car.x, this.car.y);
                ctx.rotate(this.car.angle);
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(-15, -10, 40, 25);
                // Body
                ctx.fillStyle = '#ef4444'; ctx.fillRect(-20, -12, 40, 24);
                // Roof
                ctx.fillStyle = '#991b1b'; ctx.fillRect(-10, -10, 20, 20);
                // Windshield
                ctx.fillStyle = '#bae6fd'; ctx.fillRect(5, -8, 5, 16);
                ctx.restore();
            }

            loop() { this.update(); this.draw(); requestAnimationFrame(() => this.loop()); }
        }

        const game = new RealLifeGame();
    </script>
</body>
</html>
