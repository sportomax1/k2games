<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suit Sync - K2 games</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --accent: #f59e0b;
            --border: rgba(255, 255, 255, 0.1);
            --H: #f87171;
            --D: #fbbf24;
            --C: #4ade80;
            --S: #a78bfa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        nav {
            height: 50px;
            padding: 0 1rem;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .logo { font-weight: 900; color: var(--accent); letter-spacing: 1px; }
        .restart-btn { background: var(--surface); border: 1px solid var(--border); color: white; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }

        #game-layout {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            position: relative;
        }

        /* Opponents */
        #opponents {
            display: flex;
            justify-content: center;
            gap: 8px;
            height: 80px;
        }

        .player-info {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 6px;
            text-align: center;
            flex: 1;
            max-width: 110px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }
        .player-info.active { border-color: var(--accent); background: rgba(245, 158, 11, 0.1); }
        .player-info .name { font-size: 0.55rem; font-weight: 800; text-transform: uppercase; color: #94a3b8; }
        .player-info .score { font-size: 1.1rem; font-weight: 900; color: white; }
        .player-info .hand-count { font-size: 0.6rem; opacity: 0.6; }

        /* Table Area */
        #table-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            position: relative;
        }

        #harmony-zone {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 20px;
            border: 1px dashed var(--border);
        }

        .harmony-card {
            width: 100px;
            height: 140px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 3px solid var(--accent);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .harmony-card.solo { border-color: #94a3b8; }
        .harmony-card.duet { border-color: #34d399; }
        .harmony-card.trio { border-color: #60a5fa; }
        .harmony-card.quartet { border-color: #c084fc; }

        .h-name { font-weight: 900; font-size: 1.1rem; letter-spacing: 2px; }
        .h-req { font-size: 0.6rem; font-weight: bold; opacity: 0.6; text-transform: uppercase; }
        
        .h-slots { display: flex; gap: 5px; margin-top: 10px; }
        .h-slot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }
        .h-slot.active { border-color: white; background: rgba(255,255,255,0.1); }

        #trick-area {
            display: flex;
            gap: 15px;
            justify-content: center;
            min-height: 100px;
        }

        .trick-card {
            width: 60px;
            height: 85px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            position: relative;
            transition: 0.3s;
        }
        .trick-card.empty { border-style: dashed; opacity: 0.3; }
        .trick-card.winner { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); transform: scale(1.1); }

        /* Interaction Area */
        #interaction-container {
            background: rgba(0,0,0,0.3);
            border-top: 1px solid var(--border);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #hand {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 15px 5px;
            justify-content: center;
            min-height: 100px;
        }

        .hand-card {
            width: 50px;
            height: 75px;
            background: #fff;
            border-radius: 8px;
            color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 5px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.2s;
            border: 3px solid #eee;
        }
        .hand-card:hover { transform: translateY(-10px); z-index: 10; }
        .hand-card.invalid { opacity: 0.3; cursor: not-allowed; }

        .rank-top { align-self: flex-start; font-size: 0.8rem; line-height: 1; }
        .suit-center { font-size: 1.8rem; line-height: 1; }
        .rank-bottom { align-self: flex-end; font-size: 0.8rem; line-height: 1; transform: rotate(180deg); }

        #status-msg {
            position: absolute;
            top: 95px;
            width: 100%;
            text-align: center;
            font-weight: 900;
            font-size: 1.1rem;
            color: var(--accent);
            text-shadow: 0 0 15px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 50;
        }

        .overlay {
            position: absolute; inset: 0;
            background: rgba(15, 23, 42, 0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 500; text-align: center; padding: 20px;
        }

        .btn-large {
            background: var(--accent); color: #000; border: none; padding: 1.2rem 3.5rem;
            border-radius: 50px; font-weight: 900; cursor: pointer; margin-top: 1.5rem;
            font-size: 1.3rem;
        }

        .score-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); width: 100%; max-width: 400px; }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .harmony-card { width: 80px; height: 110px; }
            .trick-card { width: 50px; height: 75px; }
        }
    </style>

<body>
    <nav>
        <div class="logo">SUIT SYNC</div>
        <button class="restart-btn" onclick="location.reload()">RESTART</button>
    </nav>

    <div id="game-layout">
        <div id="opponents"></div>
        <div id="status-msg"></div>

        <div id="table-area">
            <div id="harmony-zone">
                <div id="active-harmony" class="harmony-card"></div>
                <div id="next-harmony" class="harmony-card" style="width: 60px; height: 80px; opacity: 0.5;"></div>
            </div>

            <div id="trick-area"></div>
        </div>

        <div id="interaction-container">
            <div id="hand"></div>
        </div>

        <div id="start-screen" class="overlay">
            <h1 style="font-size: 3rem; color: var(--accent); font-style: italic; font-weight: 900;">SUIT SYNC</h1>
            <p style="opacity: 0.8; margin-top: 15px; max-width: 400px; font-weight: 600;">Coordinate suits to match the Harmony! Score high for facedown points, or low for faceup rank points.</p>
            <button class="btn-large" onclick="game.init()">START MATCH</button>
        </div>

        <div id="round-screen" class="overlay hidden">
            <h1 id="round-title">ROUND OVER</h1>
            <div id="round-stats" style="margin-top: 20px; width: 100%; max-width: 400px;"></div>
            <button class="btn-large" id="btn-next-round">NEXT ROUND</button>
        </div>

        <div id="win-screen" class="overlay hidden">
            <h1 id="winner-title" style="font-size: 3rem; color: var(--accent);">CONCERT MASTER</h1>
            <div id="final-stats" style="margin-top: 20px; width: 100%; max-width: 400px;"></div>
            <button class="btn-large" onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const SUITS = ['H','D','C','S'];
        const SYM = {H:'♥',D:'♦',C:'♣',S:'♠'};
        const COL = {H:'#f87171',D:'#fbbf24',C:'#4ade80',S:'#a78bfa'};

        class SuitSync {
            constructor() {
                this.players = [];
                this.hDeck = [];
                this.hActive = null;
                this.hNext = null;
                this.trick = [];
                this.suitsInTrick = new Set();
                this.turn = 0;
                this.lead = 0;
                this.round = 1;
                this.trickNum = 0;
                this.state = 'setup';
            }

            init() {
                this.players = Array(4).fill(0).map((_, i) => ({
                    id: i, name: i === 0 ? 'You' : `AI #${i}`,
                    hand: [], score: 0, roundScores: [], isBot: i !== 0
                }));

                document.getElementById('start-screen').classList.add('hidden');
                this.startRound();
            }

            buildHarmonyDeck() {
                const specs = [
                    {type:'solo', r:1, name:'SOLO'}, {type:'solo', r:1, name:'SOLO'},
                    {type:'duet', r:2, name:'DUET'}, {type:'duet', r:2, name:'DUET'}, {type:'duet', r:2, name:'DUET'},
                    {type:'trio', r:3, name:'TRIO'}, {type:'trio', r:3, name:'TRIO'},
                    {type:'quartet', r:4, name:'QUARTET'}
                ];
                return specs.sort(() => Math.random() - 0.5);
            }

            buildPlayDeck() {
                const deck = [];
                SUITS.forEach(s => {
                    for(let r=1; r<=12; r++) deck.push({s, r, id: s+r});
                });
                return deck.sort(() => Math.random() - 0.5);
            }

            startRound() {
                this.hDeck = this.buildHarmonyDeck();
                const cards = this.buildPlayDeck();
                this.players.forEach(p => {
                    p.hand = cards.splice(0, 12).sort((a,b) => SUITS.indexOf(a.s)-SUITS.indexOf(b.s) || a.r-b.r);
                });
                this.lead = (this.round - 1) % 4;
                this.trickNum = 0;
                this.nextHarmony();
                this.startTrick();
            }

            nextHarmony() {
                this.hActive = this.hDeck.shift() || {type:'solo', r:1, name:'SOLO'};
                this.hNext = this.hDeck[0] || null;
            }

            startTrick() {
                this.trickNum++;
                this.trick = [];
                this.suitsInTrick = new Set();
                this.turn = this.lead;
                this.state = 'playing';
                this.beginTurn();
            }

            beginTurn() {
                this.updateUI();
                const p = this.players[this.turn];
                this.showStatus(`${p.name}'s turn...`);
                if(p.isBot) setTimeout(() => this.botTurn(), 1000);
            }

            updateUI() {
                const opps = document.getElementById('opponents');
                opps.innerHTML = '';
                this.players.forEach(p => {
                    if(p.id === 0) return;
                    const div = document.createElement('div');
                    div.className = `player-info ${this.turn === p.id ? 'active' : ''}`;
                    div.innerHTML = `<div class="name">${p.name}</div><div class="score">${p.score}</div><div class="hand-count">${p.hand.length} cards</div>`;
                    opps.appendChild(div);
                });

                const hActive = document.getElementById('active-harmony');
                hActive.className = `harmony-card ${this.hActive.type}`;
                hActive.innerHTML = `
                    <div class="h-name">${this.hActive.name}</div>
                    <div class="h-req">${this.hActive.r} SUIT${this.hActive.r>1?'S':''}</div>
                    <div class="h-slots">
                        ${Array(this.hActive.r).fill(0).map((_, i) => `<div class="h-slot ${i < this.suitsInTrick.size ? 'active' : ''}">${i < this.suitsInTrick.size ? SYM[[...this.suitsInTrick][i]] : ''}</div>`).join('')}
                    </div>
                `;

                const hNext = document.getElementById('next-harmony');
                if(this.hNext) {
                    hNext.style.display = 'flex';
                    hNext.className = `harmony-card ${this.hNext.type}`;
                    hNext.innerHTML = `<div class="h-name" style="font-size:0.6rem">${this.hNext.name}</div>`;
                } else {
                    hNext.style.display = 'none';
                }

                const trickArea = document.getElementById('trick-area');
                trickArea.innerHTML = '';
                for(let i=0; i<4; i++) {
                    const played = this.trick.find(t => t.pId === i);
                    const div = document.createElement('div');
                    div.className = `trick-card ${played ? '' : 'empty'}`;
                    if(played) {
                        div.style.color = COL[played.card.s];
                        div.innerHTML = `<div style="font-size:1.5rem">${played.card.r}</div><div>${SYM[played.card.s]}</div>`;
                    } else {
                        div.innerHTML = `<div style="font-size:0.5rem; opacity:0.5;">${this.players[i].name}</div>`;
                    }
                    trickArea.appendChild(div);
                }

                const hand = document.getElementById('hand');
                hand.innerHTML = '';
                const {valid} = this.getPlayOptions(0);
                this.players[0].hand.forEach(c => {
                    const el = document.createElement('div');
                    const isValid = valid.some(v => v.id === c.id);
                    el.className = `hand-card ${isValid ? '' : 'invalid'}`;
                    el.style.color = COL[c.s];
                    el.innerHTML = `
                        <div class="rank-top">${c.r}</div>
                        <div class="suit-center">${SYM[c.s]}</div>
                        <div class="rank-bottom">${c.r}</div>
                    `;
                    if(isValid && this.turn === 0) el.onclick = () => this.playCard(0, c);
                    hand.appendChild(el);
                });
            }

            getPlayOptions(pId) {
                const hand = this.players[pId].hand;
                const req = this.hActive.r;
                const remaining = 4 - this.trick.length - 1;
                const valid = [];
                
                hand.forEach(c => {
                    const addsNew = !this.suitsInTrick.has(c.s);
                    const newCount = this.suitsInTrick.size + (addsNew ? 1 : 0);
                    const needed = req - newCount;
                    
                    if(newCount <= req && needed <= remaining) {
                        valid.push(c);
                    }
                });

                if(valid.length === 0) return { valid: hand, off: true };
                return { valid, off: false };
            }

            playCard(pId, card) {
                const {off} = this.getPlayOptions(pId);
                const p = this.players[pId];
                p.hand = p.hand.filter(c => c.id !== card.id);
                this.trick.push({ pId, card, off });
                if(!off) this.suitsInTrick.add(card.s);

                this.turn = (this.turn + 1) % 4;
                if(this.trick.length === 4) {
                    this.updateUI();
                    setTimeout(() => this.resolveTrick(), 1000);
                } else {
                    this.beginTurn();
                }
            }

            botTurn() {
                const {valid} = this.getPlayOptions(this.turn);
                const card = valid[Math.floor(Math.random() * valid.length)];
                this.playCard(this.turn, card);
            }

            resolveTrick() {
                const onH = this.trick.filter(t => !t.off);
                if(onH.length > 0) {
                    onH.sort((a,b) => b.card.r - a.card.r);
                    const winner = onH[0];
                    const loser = onH[onH.length - 1];
                    
                    this.players[winner.pId].score += 2; // High card facedown = 2pts
                    if(winner !== loser) {
                        this.players[loser.pId].score += loser.card.r; // Low card faceup = rank pts
                    }
                    this.lead = winner.pId;
                }

                if(this.trickNum >= 12) {
                    this.endRound();
                } else {
                    this.nextHarmony();
                    this.startTrick();
                }
            }

            endRound() {
                this.state = 'roundOver';
                const ov = document.getElementById('round-screen');
                const stats = document.getElementById('round-stats');
                stats.innerHTML = this.players.map(p => `<div class="score-row"><span>${p.name}</span><span>${p.score} pts</span></div>`).join('');
                
                const btn = document.getElementById('btn-next-round');
                if(this.round < 2) {
                    btn.textContent = "START ROUND 2";
                    btn.onclick = () => { this.round++; ov.classList.add('hidden'); this.startRound(); };
                } else {
                    btn.textContent = "FINAL SCORES";
                    btn.onclick = () => { ov.classList.add('hidden'); this.endGame(); };
                }
                ov.classList.remove('hidden');
            }

            endGame() {
                this.state = 'gameOver';
                const ov = document.getElementById('win-screen');
                const stats = document.getElementById('final-stats');
                const sorted = [...this.players].sort((a,b) => b.score - a.score);
                document.getElementById('winner-title').textContent = sorted[0].id === 0 ? "CONCERT MASTER" : "OUT OF SYNC";
                stats.innerHTML = sorted.map((p, i) => `<div class="score-row" style="${i===0?'color:var(--accent);font-weight:900':''}"><span>#${i+1} ${p.name}</span><span>${p.score} points</span></div>`).join('');
                ov.classList.remove('hidden');
            }

            showStatus(m) { document.getElementById('status-msg').textContent = m; }
        }

        const game = new SuitSync();
    </script>
</body>
</html>
