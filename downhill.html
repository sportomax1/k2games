<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Olympic Downhill Pro - K2 games</title>
    <style>
        :root {
            --ui-font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --primary: #ffffff;
            --secondary: #3b82f6;
            --accent: #ef4444;
            --gold: #fbbf24;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #0f172a;
            font-family: var(--ui-font);
            color: #1e293b;
            user-select: none;
            height: 100dvh;
            width: 100%;
            position: fixed;
        }

        #game-container { width: 100%; height: 100%; }

        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; padding: 20px; box-sizing: border-box; z-index: 10;
        }

        .hud-top { display: flex; justify-content: space-between; align-items: flex-start; }

        .stat-box {
            background: rgba(15, 23, 42, 0.7);
            padding: 10px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            min-width: 120px;
            color: #fff;
            backdrop-filter: blur(12px);
        }

        .stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; color: #94a3b8; margin-bottom: 2px; }
        .stat-value { font-size: 22px; font-weight: 900; font-family: monospace; color: var(--primary); }

        .speedometer {
            position: absolute; bottom: 30px; right: 20px; text-align: right;
            background: rgba(15, 23, 42, 0.7); padding: 15px 25px; border-radius: 20px;
            backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1);
        }
        .speed-num { font-size: 42px; font-weight: 900; color: #fff; font-family: monospace; line-height: 1; }
        .speed-unit { font-size: 12px; color: var(--secondary); font-weight: 800; letter-spacing: 1px; }

        .instructions {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            text-align: center; background: rgba(15, 23, 42, 0.8); padding: 12px 30px;
            border-radius: 50px; font-weight: bold; color: #fff; backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem;
        }

        .key { display: inline-block; padding: 2px 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; margin: 0 3px; }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; pointer-events: auto; text-align: center;
        }

        h1 {
            font-size: clamp(40px, 10vw, 80px); margin-bottom: 5px; color: #fff; font-weight: 900;
            text-transform: uppercase; letter-spacing: -2px; font-style: italic;
        }

        .subtitle { font-size: clamp(14px, 3vw, 20px); color: var(--secondary); margin-bottom: 40px; letter-spacing: 4px; font-weight: 800; }

        .btn-action {
            padding: 18px 50px; font-size: 20px; background: var(--secondary); color: white;
            border: none; border-radius: 50px; cursor: pointer; transition: 0.2s;
            font-weight: 900; text-transform: uppercase;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
        }
        .btn-action:active { transform: scale(0.95); }

        #game-over { display: none; margin-bottom: 25px; color: #fff; }
        
        /* Mobile Touch Zones */
        #touch-controls {
            position: absolute; inset: 0; display: none; z-index: 5;
        }
        @media (max-width: 1024px) { #touch-controls { display: flex; } }
        .touch-zone { flex: 1; height: 100%; }

        .back-link {
            position: absolute; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 10px; z-index: 100;
            font-weight: bold; font-size: 0.8rem; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← HUB</a>

    <div id="ui-overlay">
        <div class="hud-top">
            <div class="stat-box">
                <div class="stat-label">TIME</div>
                <div class="stat-value" id="time-val">00:00.00</div>
            </div>
            <div class="stat-box" style="border-bottom-color: var(--gold)">
                <div class="stat-label">RECORD</div>
                <div class="stat-value" id="best-val">--:--.--</div>
            </div>
        </div>

        <div class="speedometer">
            <div class="speed-num" id="speed-num">0</div>
            <div class="speed-unit">KM/H</div>
        </div>

        <div class="instructions" id="controls-hint">
            TAP SIDES OR USE ARROWS TO CARVE
        </div>
    </div>

    <div id="touch-controls">
        <div class="touch-zone" id="touch-left"></div>
        <div class="touch-zone" id="touch-right"></div>
    </div>

    <div id="start-screen">
        <div style="padding: 40px;">
            <h1>DOWNHILL <span style="color: var(--secondary)">PRO</span></h1>
            <div class="subtitle">EXTREME OLYMPIC SLALOM</div>
            <div id="game-over">
                <h2 id="fail-reason" style="color: var(--gold); font-size: 32px; margin-bottom: 10px;">COURSE COMPLETE!</h2>
                <p style="font-size: 18px; margin-bottom: 20px;">Time: <span id="final-time" style="color: var(--secondary); font-weight: 900;">00:00.00</span></p>
            </div>
            <button class="btn-action" id="start-btn">RACE START</button>
        </div>
    </div>

    <div id="game-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Config ---
        const CONFIG = {
            maxSpeed: 5.2,
            acceleration: 0.008,
            steeringSpeed: 0.12,
            friction: 0.994,
            gateSpacing: 80,
            gateWidth: 12,
            slopeAngle: 0.22,
            mountainLength: 12000,
            snowCount: 1500
        };

        // --- State ---
        let scene, camera, renderer;
        let skier, ground, gates = [], decorations = [], trails = [], globalSnow = [];
        let speed = 0, skierX = 0, skierZ = 0;
        let gameActive = false, startTime = 0, bestTime = localStorage.getItem('downhill_best') || Infinity;
        let keys = { left: false, right: false };

        if (bestTime !== Infinity) document.getElementById('best-val').textContent = formatTime(bestTime);

        // --- Init ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x93c5fd);
            scene.fog = new THREE.FogExp2(0x93c5fd, 0.004);

            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 3000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('game-container').appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);

            // Sun in the Sky
            const sunGroup = new THREE.Group();
            const sunGeo = new THREE.SphereGeometry(40, 32, 32);
            const sunMat = new THREE.MeshBasicMaterial({ color: 0xfff7ed });
            const sunMesh = new THREE.Mesh(sunGeo, sunMat);
            
            const sunGlow = new THREE.Mesh(
                new THREE.SphereGeometry(55, 32, 32),
                new THREE.MeshBasicMaterial({ color: 0xfde68a, transparent: true, opacity: 0.3 })
            );
            sunGroup.add(sunMesh, sunGlow);
            sunGroup.position.set(200, 400, -1000);
            scene.add(sunGroup);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
            dirLight.position.set(200, 400, 100);
            dirLight.castShadow = true;
            dirLight.shadow.camera.left = -150; dirLight.shadow.camera.right = 150;
            dirLight.shadow.camera.top = 150; dirLight.shadow.camera.bottom = -150;
            dirLight.shadow.mapSize.set(2048, 2048);
            scene.add(dirLight);

            // Ground
            const groundGeo = new THREE.PlaneGeometry(400, CONFIG.mountainLength);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
            ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2 - CONFIG.slopeAngle;
            ground.receiveShadow = true;
            scene.add(ground);

            createSkier();
            createEnvironment();
            createGlobalSnow();
            
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', (e) => handleKey(e.code, true));
            window.addEventListener('keyup', (e) => handleKey(e.code, false));
            
            const touchL = document.getElementById('touch-left');
            const touchR = document.getElementById('touch-right');
            touchL.ontouchstart = (e) => { e.preventDefault(); keys.left = true; };
            touchL.ontouchend = () => keys.left = false;
            touchR.ontouchstart = (e) => { e.preventDefault(); keys.right = true; };
            touchR.ontouchend = () => keys.right = false;

            document.getElementById('start-btn').onclick = startGame;

            resetCourse();
            animate();
        }

        function createSkier() {
            skier = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1, 1.4), new THREE.MeshStandardMaterial({ color: 0xef4444 }));
            body.position.y = 0.6;
            body.castShadow = true;
            skier.add(body);

            const head = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({ color: 0x1e293b }));
            head.position.set(0, 1.1, 0.5);
            skier.add(head);

            const skis = new THREE.Group();
            const skiGeo = new THREE.BoxGeometry(0.2, 0.05, 4);
            const skiMat = new THREE.MeshStandardMaterial({ color: 0x334155 });
            const l = new THREE.Mesh(skiGeo, skiMat); l.position.x = -0.45;
            const r = new THREE.Mesh(skiGeo, skiMat); r.position.x = 0.45;
            skis.add(l, r);
            skier.add(skis);
            scene.add(skier);
        }

        function createEnvironment() {
            for(let i=0; i<600; i++) {
                const tree = new THREE.Group();
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 3), new THREE.MeshStandardMaterial({ color: 0x451a03 }));
                tree.add(trunk);
                for(let j=0; j<3; j++) {
                    const l = new THREE.Mesh(new THREE.ConeGeometry(3-j*0.6, 5, 8), new THREE.MeshStandardMaterial({ color: 0x064e3b }));
                    l.position.y = 2 + j*3; tree.add(l);
                }
                tree.position.set((Math.random()-0.5)*350, 0, -Math.random()*CONFIG.mountainLength);
                if (Math.abs(tree.position.x) < 25) tree.position.x += (tree.position.x > 0 ? 30 : -35);
                tree.position.y = -tree.position.z * Math.tan(CONFIG.slopeAngle);
                tree.rotation.x = -CONFIG.slopeAngle;
                scene.add(tree);
            }
        }

        function createGlobalSnow() {
            const geo = new THREE.BufferGeometry();
            const pos = [];
            for(let i=0; i<CONFIG.snowCount; i++) {
                pos.push((Math.random()-0.5)*400, Math.random()*200, (Math.random()-0.5)*400);
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.8, transparent: true, opacity: 0.6 });
            const points = new THREE.Points(geo, mat);
            scene.add(points);
            globalSnow = points;
        }

        function createGate(z) {
            const group = new THREE.Group();
            const isRed = Math.random() > 0.5;
            const mat = new THREE.MeshStandardMaterial({ color: isRed ? 0xef4444 : 0x3b82f6 });
            const p1 = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 5), mat);
            const p2 = p1.clone();
            p1.position.set(-CONFIG.gateWidth/2, 2.5, 0);
            p2.position.set(CONFIG.gateWidth/2, 2.5, 0);
            const flag = new THREE.Mesh(new THREE.PlaneGeometry(3, 2), mat);
            flag.position.set(0, 4, 0);
            group.add(p1, p2, flag);
            group.position.set((Math.random()-0.5)*60, 0, z);
            group.position.y = -z * Math.tan(CONFIG.slopeAngle);
            group.rotation.x = -CONFIG.slopeAngle;
            scene.add(group);
            return { mesh: group, z, passed: false };
        }

        function resetCourse() {
            gates.forEach(g => scene.remove(g.mesh));
            gates = [];
            for(let i=1; i<=40; i++) gates.push(createGate(-i * CONFIG.gateSpacing - 200));
        }

        function startGame() {
            gameActive = true; startTime = Date.now(); speed = 0.5; skierX = 0; skierZ = 0;
            document.getElementById('start-screen').style.display = 'none';
            resetCourse();
        }

        function handleKey(code, val) {
            if (code === 'ArrowLeft' || code === 'KeyA') keys.left = val;
            if (code === 'ArrowRight' || code === 'KeyD') keys.right = val;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function formatTime(ms) {
            const s = ms / 1000;
            return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toFixed(2).padStart(5,'0')}`;
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            if (gameActive) {
                if (keys.left) skierX -= CONFIG.steeringSpeed * (1 + speed*0.1);
                if (keys.right) skierX += CONFIG.steeringSpeed * (1 + speed*0.1);
                
                speed += CONFIG.acceleration;
                speed *= CONFIG.friction;
                if (speed > CONFIG.maxSpeed) speed = CONFIG.maxSpeed;

                skierZ -= speed;
                skier.position.set(skierX, -skierZ * Math.tan(CONFIG.slopeAngle), skierZ);
                skier.rotation.z = THREE.MathUtils.lerp(skier.rotation.z, (keys.left ? 0.6 : (keys.right ? -0.6 : 0)), 0.1);
                skier.rotation.y = THREE.MathUtils.lerp(skier.rotation.y, (keys.left ? 0.4 : (keys.right ? -0.4 : 0)), 0.1);

                // Dynamic Camera
                const fov = 60 + (speed/CONFIG.maxSpeed)*25;
                camera.fov = THREE.MathUtils.lerp(camera.fov, fov, 0.05);
                camera.updateProjectionMatrix();
                
                const shake = (speed/CONFIG.maxSpeed)*0.04;
                camera.position.set(skierX + (Math.random()-0.5)*shake, skier.position.y + 5, skierZ + 15);
                camera.lookAt(skierX * 0.6, skier.position.y, skierZ - 40);

                // HUD
                const elapsed = Date.now() - startTime;
                document.getElementById('time-val').textContent = formatTime(elapsed);
                document.getElementById('speed-num').textContent = Math.floor(speed * 45);

                // Gates
                gates.forEach(g => {
                    if (!g.passed && skierZ < g.z) {
                        g.passed = true;
                        if (Math.abs(skierX - g.mesh.position.x) > CONFIG.gateWidth/2) speed *= 0.5;
                    }
                });

                if (Math.abs(skierZ) > 11500) {
                    gameActive = false;
                    document.getElementById('start-screen').style.display = 'flex';
                    document.getElementById('game-over').style.display = 'block';
                    document.getElementById('final-time').textContent = formatTime(elapsed);
                    if (elapsed < bestTime) { bestTime = elapsed; localStorage.setItem('downhill_best', bestTime); document.getElementById('best-val').textContent = formatTime(bestTime); }
                }

                // Trail particles
                spawnTrail(skierX-0.5, skierZ); spawnTrail(skierX+0.5, skierZ);
            } else {
                camera.position.set(Math.cos(time*0.2)*60, 30, -100);
                camera.lookAt(0, 0, -500);
            }

            // Update Global Snow
            const snowPos = globalSnow.geometry.attributes.position.array;
            for(let i=0; i<CONFIG.snowCount; i++) {
                snowPos[i*3+1] -= 0.5; // fall
                snowPos[i*3] += Math.sin(time + i)*0.1; // drift
                if(snowPos[i*3+1] < 0) snowPos[i*3+1] = 200;
            }
            globalSnow.geometry.attributes.position.needsUpdate = true;
            globalSnow.position.set(skierX, skier.position.y - 50, skierZ);

            updateTrails();
            renderer.render(scene, camera);
        }

        function spawnTrail(x, z) {
            const p = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 }));
            p.position.set(x, -z * Math.tan(CONFIG.slopeAngle), z);
            scene.add(p); trails.push({ m: p, l: 1.0 });
        }

        function updateTrails() {
            for(let i=trails.length-1; i>=0; i--) {
                const t = trails[i]; t.l -= 0.04; t.m.material.opacity = t.l;
                if(t.l <= 0) { scene.remove(t.m); trails.splice(i, 1); }
            }
        }

        init();
    </script>
</body>
</html>
