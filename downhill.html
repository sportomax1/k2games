<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Olympic Downhill Pro - K2 games</title>
    <style>
        :root {
            --ui-font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --primary: #ffffff;
            --secondary: #3b82f6;
            --accent: #ef4444;
            --gold: #fbbf24;
        }

        body {
            margin: 0; overflow: hidden; background: #0f172a; font-family: var(--ui-font);
            color: #1e293b; user-select: none; height: 100dvh; width: 100%; position: fixed;
        }

        #game-container { width: 100%; height: 100%; }

        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; padding: 20px; box-sizing: border-box; z-index: 10;
        }

        .hud-top { display: flex; justify-content: space-between; align-items: flex-start; }

        .stat-box {
            background: rgba(15, 23, 42, 0.7); padding: 10px 20px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            min-width: 120px; color: #fff; backdrop-filter: blur(12px);
        }

        .stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; color: #94a3b8; margin-bottom: 2px; }
        .stat-value { font-size: 22px; font-weight: 900; font-family: monospace; color: var(--primary); }

        .speedometer {
            position: absolute; bottom: 30px; right: 20px; text-align: right;
            background: rgba(15, 23, 42, 0.7); padding: 15px 25px; border-radius: 20px;
            backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1);
        }
        .speed-num { font-size: 42px; font-weight: 900; color: #fff; font-family: monospace; line-height: 1; }
        .speed-unit { font-size: 12px; color: var(--secondary); font-weight: 800; letter-spacing: 1px; }

        .instructions {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            text-align: center; background: rgba(15, 23, 42, 0.8); padding: 12px 30px;
            border-radius: 50px; font-weight: bold; color: #fff; backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem;
        }

        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; pointer-events: auto; text-align: center;
        }

        h1 { font-size: clamp(40px, 10vw, 80px); margin-bottom: 5px; color: #fff; font-weight: 900; font-style: italic; }
        .subtitle { font-size: clamp(14px, 3vw, 20px); color: var(--secondary); margin-bottom: 40px; letter-spacing: 4px; font-weight: 800; }

        .btn-action {
            padding: 18px 50px; font-size: 20px; background: var(--secondary); color: white;
            border: none; border-radius: 50px; cursor: pointer; transition: 0.2s;
            font-weight: 900; text-transform: uppercase; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
        }
        .btn-action:active { transform: scale(0.95); }

        #game-over { display: none; margin-bottom: 25px; color: #fff; }
        
        #touch-controls { position: absolute; inset: 0; display: none; z-index: 5; }
        @media (max-width: 1024px) { #touch-controls { display: flex; } }
        .touch-zone { flex: 1; height: 100%; }

        .back-link { position: absolute; top: 20px; left: 20px; color: white; text-decoration: none; background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 10px; z-index: 100; font-weight: bold; font-size: 0.8rem; backdrop-filter: blur(10px); }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CCZ9JJGEDP');
    </script>
</head>
<body>
    <a href="index.html" class="back-link">← HUB</a>

    <div id="ui-overlay">
        <div class="hud-top">
            <div class="stat-box">
                <div class="stat-label">TIME</div>
                <div class="stat-value" id="time-val">00:00.00</div>
            </div>
            <div class="stat-box" style="border-bottom-color: var(--gold)">
                <div class="stat-label">BEST</div>
                <div class="stat-value" id="best-val">--:--.--</div>
            </div>
        </div>

        <div class="speedometer">
            <div class="speed-num" id="speed-num">0</div>
            <div class="speed-unit">MPH</div>
        </div>

        <div class="instructions" id="controls-hint">
            ARROWS TO CARVE • SPACE TO TUCK
        </div>
    </div>

    <div id="touch-controls">
        <div class="touch-zone" id="touch-left"></div>
        <div class="touch-zone" id="touch-right"></div>
    </div>

    <div id="start-screen">
        <div style="padding: 40px;">
            <h1>DOWNHILL <span style="color: var(--secondary)">PRO</span></h1>
            <div class="subtitle">EXTREME OLYMPIC SLALOM</div>
            <div id="game-over">
                <h2 id="fail-reason" style="color: var(--gold); font-size: 32px; margin-bottom: 10px;">COURSE COMPLETE!</h2>
                <p style="font-size: 18px; margin-bottom: 20px;">Time: <span id="final-time" style="color: var(--secondary); font-weight: 900;">00:00.00</span></p>
            </div>
            <button class="btn-action" id="start-btn">RACE START</button>
        </div>
    </div>

    <div id="game-container"></div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        const CONFIG = {
            baseMaxSpeed: 5.5,
            tuckMaxSpeed: 7.5,
            acceleration: 0.012,
            carveTurnRate: 0.14,
            tuckTurnRate: 0.05,
            friction: 0.996,
            gateSpacing: 100,
            gateWidth: 14,
            slopeAngle: 0.35, // Steeper slope for better 3D feel
            mountainLength: 15000
        };

        let scene, camera, renderer;
        let skier, skierBody, poles = [], gates = [], trails = [], snowflakes = [];
        let speed = 0, skierX = 0, skierZ = 0, momentumX = 0;
        let gameActive = false, startTime = 0, bestTime = localStorage.getItem('downhill_best') || Infinity;
        let keys = { left: false, right: false, tuck: false };

        if (bestTime !== Infinity) document.getElementById('best-val').textContent = formatTime(bestTime);

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa5f3fc);
            scene.fog = new THREE.FogExp2(0xa5f3fc, 0.002);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 3000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('game-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(200, 500, 100); sun.castShadow = true;
            scene.add(sun);

            // Ground
            const groundGeo = new THREE.PlaneGeometry(800, CONFIG.mountainLength);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2 - CONFIG.slopeAngle; ground.receiveShadow = true;
            scene.add(ground);

            createSkier();
            createEnvironment();
            
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', (e) => handleInput(e.code, true));
            window.addEventListener('keyup', (e) => handleInput(e.code, false));
            
            const tL = document.getElementById('touch-left');
            const tR = document.getElementById('touch-right');
            tL.ontouchstart = (e) => { e.preventDefault(); keys.left = true; checkTuck(); };
            tL.ontouchend = () => { keys.left = false; checkTuck(); };
            tR.ontouchstart = (e) => { e.preventDefault(); keys.right = true; checkTuck(); };
            tR.ontouchend = () => { keys.right = false; checkTuck(); };

            document.getElementById('start-btn').onclick = startGame;
            resetCourse(); animate();
        }

        function checkTuck() { keys.tuck = (keys.left && keys.right); }

        function createSkier() {
            skier = new THREE.Group();
            
            skierBody = new THREE.Group();
            
            // Pants/Legs
            const legs = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.8, 0.5), new THREE.MeshStandardMaterial({ color: 0x1e3a8a }));
            legs.position.y = 0.4;
            skierBody.add(legs);

            // Torso/Jacket
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.6), new THREE.MeshStandardMaterial({ color: 0xef4444 }));
            torso.position.y = 1.1;
            skierBody.add(torso);

            // Head/Helmet
            const headGroup = new THREE.Group();
            const face = new THREE.Mesh(new THREE.SphereGeometry(0.25), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
            const helmet = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16, 0, Math.PI * 2, 0, Math.PI * 0.6), new THREE.MeshStandardMaterial({ color: 0x1e293b }));
            helmet.position.y = 0.05;
            const visor = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.15, 0.1), new THREE.MeshStandardMaterial({ color: 0x3b82f6 }));
            visor.position.set(0, 0, 0.25);
            headGroup.add(face, helmet, visor);
            headGroup.position.set(0, 1.6, 0.1);
            skierBody.add(headGroup);

            skier.add(skierBody);

            const skiGeo = new THREE.BoxGeometry(0.2, 0.05, 5);
            const skiMat = new THREE.MeshStandardMaterial({ color: 0x111827 });
            const s1 = new THREE.Mesh(skiGeo, skiMat); s1.position.x = -0.4;
            const s2 = new THREE.Mesh(skiGeo, skiMat); s2.position.x = 0.4;
            skier.add(s1, s2);

            // Poles
            const poleGeo = new THREE.CylinderGeometry(0.03, 0.03, 2.8);
            const poleMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8 });
            const p1 = new THREE.Mesh(poleGeo, poleMat); p1.position.set(-0.9, 1.0, -0.2); p1.rotation.x = 0.4;
            const p2 = new THREE.Mesh(poleGeo, poleMat); p2.position.set(0.9, 1.0, -0.2); p2.rotation.x = 0.4;
            poles.push(p1, p2);
            skier.add(p1, p2);

            scene.add(skier);
        }

        function createEnvironment() {
            // Add mountain peaks in background
            for(let i=0; i<15; i++) {
                const peak = new THREE.Mesh(new THREE.ConeGeometry(50 + Math.random()*100, 100 + Math.random()*200, 4), new THREE.MeshStandardMaterial({ color: 0xe2e8f0 }));
                peak.position.set((Math.random()-0.5)*2000, 0, -5000 - Math.random()*10000);
                peak.position.y = -peak.position.z * Math.tan(CONFIG.slopeAngle) - 100;
                scene.add(peak);
            }

            for(let i=0; i<1000; i++) {
                const tree = new THREE.Mesh(new THREE.ConeGeometry(3 + Math.random()*3, 10 + Math.random()*15, 8), new THREE.MeshStandardMaterial({ color: 0x064e3b }));
                tree.position.set((Math.random()-0.5)*600, 0, -Math.random()*CONFIG.mountainLength);
                if(Math.abs(tree.position.x) < 40) tree.position.x += (tree.position.x > 0 ? 50 : -50);
                tree.position.y = -tree.position.z * Math.tan(CONFIG.slopeAngle);
                tree.rotation.x = -CONFIG.slopeAngle;
                scene.add(tree);
            }
        }

        function resetCourse() {
            gates.forEach(g => scene.remove(g.mesh)); gates = [];
            let lastX = 0;
            for(let i=1; i<=60; i++) {
                // First gate is much closer
                const z = -i * CONFIG.gateSpacing - 120;
                const maxShift = 50;
                let x = lastX + (Math.random()-0.5) * maxShift;
                x = Math.max(-100, Math.min(100, x));
                lastX = x;

                const group = new THREE.Group();
                const isRed = i % 2 === 0;
                const mat = new THREE.MeshStandardMaterial({ color: isRed ? 0xef4444 : 0x3b82f6 });
                const p1 = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 7), mat);
                const p2 = p1.clone();
                p1.position.set(-CONFIG.gateWidth/2, 3.5, 0); p2.position.set(CONFIG.gateWidth/2, 3.5, 0);
                group.add(p1, p2); group.position.set(x, -z * Math.tan(CONFIG.slopeAngle), z);
                group.rotation.x = -CONFIG.slopeAngle;
                scene.add(group);
                gates.push({ mesh: group, z, x, passed: false });
            }
        }

        function startGame() {
            gameActive = true; startTime = Date.now(); speed = 0.5; skierX = 0; skierZ = 0; momentumX = 0;
            document.getElementById('start-screen').style.display = 'none';
            resetCourse();
        }

        function handleInput(code, val) {
            if (code === 'ArrowLeft' || code === 'KeyA') keys.left = val;
            if (code === 'ArrowRight' || code === 'KeyD') keys.right = val;
            if (code === 'Space') keys.tuck = val;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function formatTime(ms) {
            const s = ms / 1000;
            return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toFixed(2).padStart(5,'0')}`;
        }

        function animate() {
            requestAnimationFrame(animate);
            if (gameActive) {
                const turnRate = keys.tuck ? CONFIG.tuckTurnRate : CONFIG.carveTurnRate;
                const maxS = keys.tuck ? CONFIG.tuckMaxSpeed : CONFIG.baseMaxSpeed;
                
                if (keys.left && !keys.tuck) momentumX -= turnRate;
                if (keys.right && !keys.tuck) momentumX += turnRate;
                
                momentumX *= 0.94; // Lateral friction
                skierX += momentumX * (speed * 0.25);
                skierX = Math.max(-180, Math.min(180, skierX));

                speed += CONFIG.acceleration;
                if(!keys.tuck && Math.abs(momentumX) > 0.05) speed *= 0.994; // Carving friction
                speed *= CONFIG.friction;
                if (speed > maxS) speed = maxS;

                skierZ -= speed;
                skier.position.set(skierX, -skierZ * Math.tan(CONFIG.slopeAngle), skierZ);
                
                // Advanced Skier Animations
                const lean = momentumX * 0.9;
                skier.rotation.z = lean; // Angle skis to the turn
                skier.rotation.y = momentumX * 0.7; // Rotate skier slightly to direction
                
                // Bending knees / Tucking
                const targetYScale = keys.tuck ? 0.45 : (1.0 - Math.abs(momentumX) * 0.4);
                skierBody.scale.y = THREE.MathUtils.lerp(skierBody.scale.y, targetYScale, 0.15);
                skierBody.position.y = (1.0 - skierBody.scale.y) * 0.8;

                // Dynamic Pole Motion
                poles.forEach((p, i) => {
                    const side = i === 0 ? -1 : 1;
                    p.rotation.z = THREE.MathUtils.lerp(p.rotation.z, side * Math.abs(momentumX) * 0.6, 0.15);
                    p.rotation.x = 0.4 + (keys.tuck ? 0.8 : 0);
                });

                // Dramatic Chase Camera
                const camZOffset = 18 + (speed * 2);
                const camYOffset = 7 + (speed * 0.5);
                camera.position.set(skierX * 0.6, skier.position.y + camYOffset, skierZ + camZOffset);
                camera.lookAt(skierX * 0.3, skier.position.y, skierZ - 80);
                camera.rotation.z = -momentumX * 0.1; // Camera tilt

                const elapsed = Date.now() - startTime;
                document.getElementById('time-val').textContent = formatTime(elapsed);
                document.getElementById('speed-num').textContent = Math.floor(speed * 20);

                // Gates
                gates.forEach(g => {
                    if (!g.passed && skierZ < g.z) {
                        g.passed = true;
                        if (Math.abs(skierX - g.x) > CONFIG.gateWidth/2) {
                            speed *= 0.4; // Penalty
                            momentumX = 0;
                        }
                    }
                });

                if (Math.abs(skierZ) > CONFIG.mountainLength - 1000) {
                    gameActive = false;
                    document.getElementById('start-screen').style.display = 'flex';
                    document.getElementById('game-over').style.display = 'block';
                    document.getElementById('final-time').textContent = formatTime(elapsed);
                    if (elapsed < bestTime) { bestTime = elapsed; localStorage.setItem('downhill_best', bestTime); document.getElementById('best-val').textContent = formatTime(bestTime); }
                }

                // Snow Spray
                if(Math.abs(momentumX) > 0.04) spawnSnow(skierX, skierZ, Math.abs(momentumX));
            }
            renderer.render(scene, camera);
        }

        function spawnSnow(x, z, intensity) {
            const count = Math.floor(intensity * 25);
            for(let i=0; i<count; i++) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 }));
                p.position.set(x + (Math.random()-0.5)*4, -z * Math.tan(CONFIG.slopeAngle) + 0.3, z + (Math.random()-0.5)*3);
                scene.add(p);
                setTimeout(() => scene.remove(p), 350);
            }
        }

        init();
    </script>
</body>
</html>
