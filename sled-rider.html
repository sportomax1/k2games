<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sled Rider: Pro Edition - K2 games</title>
    <style>
        :root { --sky: #bae6fd; --snow: #f8fafc; --primary: #0ea5e9; --text: #0f172a; --glass: rgba(255, 255, 255, 0.85); }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: none; }
        body { background-color: var(--snow); color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 100; display: flex; flex-direction: column; }
        #top-bar { padding: 15px; display: flex; justify-content: space-between; pointer-events: auto; }
        .panel { background: var(--glass); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid rgba(0,0,0,0.1); padding: 8px; display: flex; gap: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn { width: 40px; height: 40px; border: none; border-radius: 10px; background: transparent; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        .btn.active { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: var(--primary); }
        #stats { position: absolute; top: 80px; left: 15px; padding: 10px 15px; min-width: 120px; }
        .stat { display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: 800; opacity: 0.6; }
        .val { color: var(--primary); font-family: monospace; font-size: 1rem; }
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
        #overlay { position: absolute; inset: 0; background: rgba(15,23,42,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; pointer-events: auto; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 800; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="top-bar">
            <div class="panel">
                <button class="btn active" id="t-draw">✏️</button>
                <button class="btn" id="t-erase">🧽</button>
                <div style="width:1px; background:#ddd; margin:5px;"></div>
                <button class="btn" id="t-play">▶️</button>
                <button class="btn" id="t-reset">🔄</button>
            </div>
            <div class="panel" style="padding:10px; font-size:0.6rem; font-weight:900; text-transform:uppercase;">
                Ink <div style="width:80px; height:6px; background:#eee; border-radius:3px; overflow:hidden; margin-top:3px;"><div id="ink" style="width:100%; height:100%; background:var(--primary);"></div></div>
            </div>
        </div>
        <div id="stats" class="panel" style="flex-direction:column; gap:2px;">
            <div class="stat">SPD <span id="s-val" class="val">0</span></div>
            <div class="stat">DST <span id="d-val" class="val">0</span></div>
        </div>
        <div id="overlay"><h1>WIPEOUT!</h1><p style="margin:15px 0; opacity:0.7;">Time to rebuild the track.</p><button class="btn-main" onclick="game.reset()">RESET</button></div>
    </div>
    <script>
        class SledRider {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.dpr = window.devicePixelRatio || 1;
                this.resize();
                this.state = 'draw'; this.tool = 'draw'; this.lines = []; this.curr = [];
                this.rider = { x: 100, y: 150, vx: 0, vy: 0, rot: 0, alive: true };
                this.cam = { x: 0, y: 0, zoom: 1 };
                this.ink = 10000; this.used = 0; this.mouse = { down: false };
                this.init();
            }
            resize() {
                this.canvas.width = window.innerWidth * this.dpr;
                this.canvas.height = window.innerHeight * this.dpr;
                this.ctx.scale(this.dpr, this.dpr);
                this.canvas.style.width = window.innerWidth + 'px';
                this.canvas.style.height = window.innerHeight + 'px';
            }
            init() {
                const getP = (e) => {
                    const t = e.touches ? e.touches[0] : e;
                    return { x: t.clientX/this.cam.zoom + this.cam.x, y: t.clientY/this.cam.zoom + this.cam.y };
                };
                this.canvas.onmousedown = (e) => { this.mouse.down = true; if(this.state==='draw'){ if(this.tool==='draw') this.curr = [getP(e)]; else this.erase(getP(e)); }};
                window.onmousemove = (e) => { if(!this.mouse.down || this.state!=='draw') return; const p = getP(e); if(this.tool==='draw'){ const last = this.curr[this.curr.length-1]; const d = Math.hypot(p.x-last.x, p.y-last.y); if(d>5 && this.used<this.ink){ this.curr.push(p); this.used+=d; this.upUI(); } } else this.erase(p); };
                window.onmouseup = () => { this.mouse.down = false; if(this.curr.length>1) this.lines.push([...this.curr]); this.curr = []; };
                document.getElementById('t-draw').onclick = () => this.setTool('draw');
                document.getElementById('t-erase').onclick = () => this.setTool('erase');
                document.getElementById('t-play').onclick = () => this.play();
                document.getElementById('t-reset').onclick = () => { this.lines=[]; this.used=0; this.reset(); };
                window.onresize = () => this.resize();
                requestAnimationFrame(() => this.loop());
            }
            setTool(t) { this.tool = t; document.querySelectorAll('.btn').forEach(b => b.classList.remove('active')); document.getElementById('t-'+t).classList.add('active'); }
            upUI() { document.getElementById('ink').style.width = (1 - this.used/this.ink)*100 + '%'; document.getElementById('s-val').textContent = Math.floor(Math.hypot(this.rider.vx, this.rider.vy)*5); document.getElementById('d-val').textContent = Math.floor(Math.max(0, (this.rider.x-100)/10)); }
            play() { if(this.lines.length===0) return; this.state='play'; this.rider={x:100,y:150,vx:2,vy:0,rot:0,alive:true}; document.getElementById('t-play').textContent='⏸️'; }
            reset() { this.state='draw'; this.cam={x:0,y:0,zoom:1}; document.getElementById('overlay').style.display='none'; document.getElementById('t-play').textContent='▶️'; this.upUI(); }
            erase(p) { this.lines = this.lines.filter(l => !l.some(pt => Math.hypot(pt.x-p.x, pt.y-p.y)<30)); }
            update() {
                if(this.state==='play' && this.rider.alive) {
                    const r = this.rider; const steps = 4;
                    for(let s=0; s<steps; s++) {
                        r.vy += 0.3/steps; r.vx *= 0.999; r.x += r.vx/steps; r.y += r.vy/steps;
                        let hit = false;
                        for(let l of this.lines) {
                            for(let i=0; i<l.length-1; i++) {
                                const p1=l[i], p2=l[i+1]; const d = this.dist(r, p1, p2);
                                if(d < 20) {
                                    const ang = Math.atan2(p2.y-p1.y, p2.x-p1.x); const spd = Math.hypot(r.vx, r.vy);
                                    r.rot = ang; r.vx = Math.cos(ang)*spd; r.vy = Math.sin(ang)*spd;
                                    const push = 20-d; r.x += Math.cos(ang-Math.PI/2)*push; r.y += Math.sin(ang-Math.PI/2)*push;
                                    hit = true; break;
                                }
                            }
                            if(hit) break;
                        }
                    }
                    this.cam.x += (r.x - window.innerWidth/2 - this.cam.x)*0.1;
                    this.cam.y += (r.y - window.innerHeight/2 - this.cam.y)*0.1;
                    if(r.y > 5000) { r.alive=false; document.getElementById('overlay').style.display='flex'; }
                    this.upUI();
                }
            }
            dist(p, a, b) { const l2 = Math.hypot(a.x-b.x, a.y-b.y)**2; if(l2===0) return Math.hypot(p.x-a.x, p.y-a.y); let t = ((p.x-a.x)*(b.x-a.x)+(p.y-a.y)*(b.y-a.y))/l2; t = Math.max(0, Math.min(1, t)); return Math.hypot(p.x-(a.x+t*(b.x-a.x)), p.y-(a.y+t*(b.y-a.y))); }
            draw() {
                const ctx = this.ctx; ctx.clearRect(0,0,window.innerWidth,window.innerHeight);
                ctx.save(); ctx.translate(-this.cam.x, -this.cam.y);
                ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#1e293b'; ctx.lineWidth = 6;
                this.lines.forEach(l => { ctx.beginPath(); ctx.moveTo(l[0].x, l[0].y); l.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke(); });
                if(this.curr.length>1) { ctx.strokeStyle=this.tool==='draw'?'#0ea5e9':'#f43f5e'; ctx.beginPath(); ctx.moveTo(this.curr[0].x, this.curr[0].y); this.curr.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke(); }
                if(this.state==='play' && this.rider.alive) { ctx.save(); ctx.translate(this.rider.x, this.rider.y); ctx.rotate(this.rider.rot); ctx.font='40px Arial'; ctx.textAlign='center'; ctx.fillText('🛷', 0, 5); ctx.restore(); }
                ctx.restore();
            }
            loop() { this.update(); this.draw(); requestAnimationFrame(() => this.loop()); }
        }
        const game = new SledRider();
    </script>
</body>
</html>
