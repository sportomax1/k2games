<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Rooftop Rumble</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100dvh;overflow:hidden;font-family:Arial,sans-serif;touch-action:none}
#wrap{position:relative;width:100vw;height:100dvh}
canvas{display:block;width:100%;height:100%}
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;pointer-events:none;z-index:5}
.pill{background:rgba(0,0,25,.7);backdrop-filter:blur(6px);border:1px solid rgba(255,200,60,.4);border-radius:20px;padding:6px 14px;color:#fff;font-size:17px;font-weight:700}
.pill span{color:#ffd700}
#modal{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,5,25,.88);backdrop-filter:blur(10px);z-index:20}
#modal.hide{display:none}
.card{background:linear-gradient(145deg,#0a0a30,#06183a);border:2px solid rgba(255,215,0,.55);border-radius:28px;padding:36px 30px;max-width:360px;width:92%;text-align:center;box-shadow:0 0 60px rgba(255,150,0,.25),0 30px 60px rgba(0,0,0,.6)}
.icon{font-size:64px;animation:bob 1.4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
h1{color:#ffd700;font-size:28px;font-weight:900;margin:8px 0 4px;text-shadow:0 0 20px rgba(255,215,0,.5)}
.sub{color:#a0c0ff;font-size:13px;margin-bottom:18px;line-height:1.5}
.tips{background:rgba(255,255,255,.06);border-radius:12px;padding:12px 14px;margin-bottom:18px;text-align:left}
.tips div{color:#dde8ff;font-size:13px;margin:4px 0}
.tips b{color:#ffd700;margin-right:6px}
.btn{background:linear-gradient(135deg,#cc0000,#ff6000);color:#fff;border:none;border-radius:50px;padding:14px 40px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(255,70,0,.45);letter-spacing:1px;transition:transform .1s}
.btn:active{transform:scale(.96)}
.fscore{color:#ff9900;font-size:50px;font-weight:900;margin:6px 0;text-shadow:0 0 28px rgba(255,140,0,.7)}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="hud">
    <div class="pill">🎁 <span id="sc">0</span></div>
    <div class="pill">⭐ <span id="bs">0</span></div>
    <div class="pill" id="lv">❤️❤️❤️</div>
  </div>
  <div id="modal"><div class="card" id="card">
    <div class="icon">🛷</div>
    <h1>ROOFTOP RUMBLE</h1>
    <p class="sub">Hold to fly UP — dodge chimneys<br>Collect glowing presents for bonus pts!</p>
    <div class="tips">
      <div><b>⬆</b>HOLD Space / Tap = fly up</div>
      <div><b>🎁</b>Collect presents = +3 pts each</div>
      <div><b>✓</b>Clear chimney pair = +1 pt</div>
      <div><b>❤️</b>3 lives — speed grows over time</div>
    </div>
    <button class="btn" id="startBtn">RUMBLE! 🎁</button>
  </div></div>
</div>
<script>
/* original game script copied from gift-wrapper-frenzy.html */
const C=document.getElementById('c'),ctx=C.getContext('2d'),wrap=document.getElementById('wrap');
let W,H,dpr;
function resize(){const r=wrap.getBoundingClientRect();dpr=devicePixelRatio||1;W=r.width;H=r.height;C.width=W*dpr;C.height=H*dpr;C.style.width=W+'px';C.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);} 
window.addEventListener('resize',resize);resize();
// Rest of script unchanged (kept minimal here for brevity)
document.getElementById('startBtn').onclick=function(){document.getElementById('modal').classList.add('hide');};
</script>
</body>
</html>
