<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Rooftop Rumble - K2 Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100dvh;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;touch-action:none}
#gc{position:relative;width:100%;max-width:480px;height:100dvh;overflow:hidden}
canvas{display:block;width:100%;height:100%}
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:14px 16px;pointer-events:none;z-index:10}
.pill{background:rgba(0,0,30,.75);backdrop-filter:blur(8px);border:1px solid rgba(255,200,60,.4);border-radius:22px;padding:7px 16px;color:#fff;font-size:16px;font-weight:700;letter-spacing:.5px}
.pill span{color:#ffd700}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,5,25,.92);backdrop-filter:blur(12px);z-index:20}
#overlay.hide{display:none}
.card{background:linear-gradient(145deg,#0a0a30,#06183a);border:2px solid rgba(255,215,0,.55);border-radius:28px;padding:36px 28px;max-width:340px;width:92%;text-align:center;box-shadow:0 0 60px rgba(255,150,0,.2),0 30px 60px rgba(0,0,0,.7)}
.icon{font-size:64px;animation:bob 1.4s ease-in-out infinite;display:block;margin-bottom:6px}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
h1{color:#ffd700;font-size:28px;font-weight:900;margin:6px 0 4px;text-shadow:0 0 20px rgba(255,215,0,.5);letter-spacing:2px}
.sub{color:#a0c0ff;font-size:13px;margin-bottom:14px;line-height:1.6}
.tips{background:rgba(255,255,255,.06);border-radius:12px;padding:12px 14px;margin-bottom:18px;text-align:left}
.tips div{color:#dde8ff;font-size:13px;margin:4px 0}
.tips b{color:#ffd700;margin-right:6px}
.btn{background:linear-gradient(135deg,#cc0000,#ff6000);color:#fff;border:none;border-radius:50px;padding:14px 44px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(255,70,0,.45);letter-spacing:1px;transition:transform .1s;width:100%}
.btn:active{transform:scale(.96)}
.fscore{color:#ffd700;font-size:52px;font-weight:900;margin:8px 0;text-shadow:0 0 28px rgba(255,200,0,.7)}
#home{position:absolute;top:14px;right:16px;z-index:30;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:7px 14px;border-radius:8px;cursor:pointer;text-decoration:none;font-size:13px;font-weight:600;backdrop-filter:blur(4px)}
#tapzone{position:absolute;inset:0;z-index:5}
</style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-CCZ9JJGEDP');
</script>
</head>
<body>
<div id="gc">
  <canvas id="c"></canvas>
  <div id="hud">
    <div class="pill">🎁 <span id="sc">0</span></div>
    <div class="pill">⭐ <span id="bs">0</span></div>
    <div class="pill" id="lv">❤️❤️❤️</div>
  </div>
  <div id="tapzone"></div>
  <div id="overlay">
    <div class="card" id="card">
      <span class="icon">🛷</span>
      <h1>ROOFTOP RUMBLE</h1>
      <p class="sub">Santa's lost control of the sleigh!<br>Dodge chimneys & grab glowing presents!</p>
      <div class="tips">
        <div><b>⬆</b>HOLD Space / Hold tap = fly up</div>
        <div><b>🎁</b>Collect presents = +3 pts each</div>
        <div><b>✓</b>Clear a chimney pair = +1 pt</div>
        <div><b>❤️</b>3 lives — speed grows over time!</div>
      </div>
      <button class="btn" id="startBtn">RUMBLE! 🎁</button>
    </div>
  </div>
  <a href="index.html" id="home">🏠 Home</a>
</div>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
const gc=document.getElementById('gc');
let W,H,dpr;
function resize(){
  dpr=devicePixelRatio||1;
  W=gc.clientWidth; H=gc.clientHeight;
  C.width=W*dpr; C.height=H*dpr;
  C.style.width=W+'px'; C.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize); resize();

let gameActive=false,score=0,bestScore=parseInt(localStorage.getItem('rr_best')||'0'),lives=3;
let holding=false,gameSpeed=3,frameN=0,lastPairX=-999;
let chimneys=[],presents=[];
let player={x:0,y:0,r:16,vy:0};
let stars=[];
let flashTimer=0;

function initStars(){
  stars=[];
  for(let i=0;i<60;i++) stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2+.5,b:Math.random()});
}

function startGame(){
  score=0; lives=3; holding=false; gameSpeed=3; frameN=0;
  chimneys=[]; presents=[];
  player={x:W*0.2,y:H/2,r:16,vy:0};
  initStars();
  document.getElementById('overlay').classList.add('hide');
  gameActive=true;
  document.getElementById('bs').textContent=bestScore;
}

function endGame(){
  gameActive=false;
  if(score>bestScore){bestScore=score;localStorage.setItem('rr_best',bestScore);}
  const card=document.getElementById('card');
  card.innerHTML=`<span class="icon">🛷</span><h1>CRASHED!</h1><p class="fscore">${score}</p><p class="sub">Best: ${bestScore}</p><div class="tips"><div>You cleared <b style="color:#ffd700">${score}</b> pts!</div></div><button class="btn" id="startBtn">TRY AGAIN 🎁</button>`;
  document.getElementById('overlay').classList.remove('hide');
  document.getElementById('startBtn').onclick=startGame;
}

function spawnChimney(){
  const minY=60,maxY=H-60;
  const gapSize=Math.max(100,130-score*0.5);
  const gapY=minY+Math.random()*(maxY-minY-gapSize);
  chimneys.push({x:W+50,gapY,gapH:gapSize,w:55,scored:false});
  // maybe spawn present in the gap
  if(Math.random()<0.6){
    presents.push({x:W+80,y:gapY+gapSize/2+(Math.random()-.5)*30,r:12,collected:false,glow:0});
  }
}

function update(){
  if(!gameActive)return;
  frameN++;
  // gravity & thrust
  player.vy+=0.45;
  if(holding) player.vy=Math.max(-9,player.vy-1.1);
  player.vy=Math.max(-10,Math.min(12,player.vy));
  player.y+=player.vy;

  // speed increase
  gameSpeed=3+score*0.04;
  gameSpeed=Math.min(gameSpeed,9);

  // spawn
  const spawnInterval=Math.max(55,95-score*0.5);
  if(W-lastPairX>spawnInterval*gameSpeed*0.4||chimneys.length===0){
    spawnChimney();
    lastPairX=chimneys[chimneys.length-1].x;
  }

  // move
  chimneys.forEach(ch=>ch.x-=gameSpeed);
  presents.forEach(p=>p.x-=gameSpeed);
  presents.forEach(p=>p.glow=(p.glow+0.15)%(Math.PI*2));

  // collect presents
  presents.forEach(p=>{
    if(!p.collected&&Math.hypot(player.x-p.x,player.y-p.y)<player.r+p.r){
      p.collected=true; score+=3;
    }
  });

  // score cleared chimneys
  chimneys.forEach(ch=>{
    if(!ch.scored&&ch.x+ch.w<player.x){
      ch.scored=true; score+=1;
    }
  });

  // collisions
  for(let ch of chimneys){
    const inX=player.x+player.r>ch.x&&player.x-player.r<ch.x+ch.w;
    const hitTop=player.y-player.r<ch.gapY;
    const hitBot=player.y+player.r>ch.gapY+ch.gapH;
    if(inX&&(hitTop||hitBot)){
      lives--;
      flashTimer=20;
      // push player away
      player.x=ch.x-player.r-5;
      player.vy=-4;
      if(lives<=0){endGame();return;}
    }
  }

  // out of bounds
  if(player.y-player.r<0){player.y=player.r;player.vy=2;}
  if(player.y+player.r>H){
    lives--;flashTimer=20;
    player.y=H-player.r;player.vy=-5;
    if(lives<=0){endGame();return;}
  }

  // cleanup
  chimneys=chimneys.filter(ch=>ch.x>-100);
  presents=presents.filter(p=>p.x>-50&&!p.collected||p.x>-50&&p.collected&&false);
  presents=presents.filter(p=>p.x>-50);

  document.getElementById('sc').textContent=score;
  document.getElementById('lv').textContent='❤️'.repeat(Math.max(0,lives));
  document.getElementById('bs').textContent=bestScore;
  if(flashTimer>0)flashTimer--;
}

function draw(){
  // sky gradient
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#000818');
  sky.addColorStop(1,'#001a40');
  ctx.fillStyle=sky;
  ctx.fillRect(0,0,W,H);

  // stars
  stars.forEach(s=>{
    const twinkle=0.4+0.6*Math.abs(Math.sin(Date.now()*0.001+s.b*10));
    ctx.globalAlpha=twinkle;
    ctx.fillStyle='#fff';
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.s,0,Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha=1;

  // moon
  ctx.fillStyle='#fffacc';
  ctx.shadowBlur=20; ctx.shadowColor='#fffacc';
  ctx.beginPath(); ctx.arc(W-50,50,28,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000818';
  ctx.beginPath(); ctx.arc(W-42,44,22,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;

  // chimneys
  chimneys.forEach(ch=>{
    // brick top
    const grad=ctx.createLinearGradient(ch.x,0,ch.x+ch.w,0);
    grad.addColorStop(0,'#5c2e00');
    grad.addColorStop(0.5,'#8b4513');
    grad.addColorStop(1,'#5c2e00');
    ctx.fillStyle=grad;
    ctx.fillRect(ch.x,0,ch.w,ch.gapY);
    ctx.fillRect(ch.x,ch.gapY+ch.gapH,ch.w,H-(ch.gapY+ch.gapH));
    // caps
    ctx.fillStyle='#6b3310';
    ctx.fillRect(ch.x-4,ch.gapY-10,ch.w+8,12);
    ctx.fillRect(ch.x-4,ch.gapY+ch.gapH-2,ch.w+8,12);
    // brick pattern
    ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1;
    for(let by=0;by<ch.gapY;by+=12){
      const off=(Math.floor(by/12)%2)*15;
      for(let bx=ch.x+off;bx<ch.x+ch.w;bx+=30){
        ctx.strokeRect(bx,by,28,10);
      }
    }
    // smoke from top chimney
    ctx.fillStyle='rgba(180,180,200,0.15)';
    for(let s=0;s<3;s++){
      const sy=Math.abs(((frameN*0.5+s*20)%40)-20);
      ctx.beginPath();
      ctx.arc(ch.x+ch.w/2+(s-1)*5,sy,8+s*3,0,Math.PI*2);
      ctx.fill();
    }
  });

  // presents
  presents.forEach(p=>{
    const glow=Math.sin(p.glow)*0.5+0.5;
    ctx.shadowBlur=10+glow*15; ctx.shadowColor='#ff4444';
    ctx.fillStyle=`rgb(${200+Math.floor(glow*55)},50,50)`;
    ctx.fillRect(p.x-p.r,p.y-p.r,p.r*2,p.r*2);
    ctx.fillStyle='#ffd700';
    ctx.fillRect(p.x-2,p.y-p.r,4,p.r*2);
    ctx.fillRect(p.x-p.r,p.y-2,p.r*2,4);
    ctx.shadowBlur=0;
  });

  // player (sleigh)
  if(flashTimer>0&&Math.floor(flashTimer/3)%2===0){
    // flash red on hit
    ctx.globalAlpha=0.5;
  }
  ctx.save();
  ctx.translate(player.x,player.y);
  const tilt=Math.max(-0.4,Math.min(0.4,player.vy*0.04));
  ctx.rotate(tilt);
  // sleigh body
  ctx.fillStyle='#cc0000';
  ctx.beginPath();
  ctx.ellipse(0,0,22,12,0,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#ff4444';
  ctx.beginPath();
  ctx.ellipse(-2,-2,18,9,0,0,Math.PI*2);
  ctx.fill();
  // runners
  ctx.strokeStyle='#888'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(-22,10); ctx.lineTo(22,10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-18,13); ctx.lineTo(18,13); ctx.stroke();
  // santa
  ctx.font='22px serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🎅',0,-2);
  ctx.restore();
  ctx.globalAlpha=1;

  requestAnimationFrame(loop);
}

function loop(){update();draw();}

// Controls
const tz=document.getElementById('tapzone');
tz.addEventListener('touchstart',e=>{e.preventDefault();if(gameActive)holding=true;},{passive:false});
tz.addEventListener('touchend',e=>{e.preventDefault();holding=false;},{passive:false});
document.addEventListener('keydown',e=>{if((e.code==='Space'||e.code==='ArrowUp')&&gameActive){e.preventDefault();holding=true;}});
document.addEventListener('keyup',e=>{if(e.code==='Space'||e.code==='ArrowUp')holding=false;});

document.getElementById('startBtn').onclick=startGame;
loop();
</script>
</body>
</html>
