<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>High Dive 3D - K2 games</title>
    <style>
        :root {
            --panel: rgba(7, 15, 26, 0.78);
            --line: rgba(255, 255, 255, 0.16);
            --gold: #ffd166;
            --cyan: #62d9ff;
            --green: #72f0a2;
            --red: #ff6b6b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #06111f;
            color: white;
            font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
        }

        #app,
        canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        .back-link {
            position: fixed;
            top: calc(14px + env(safe-area-inset-top, 0px));
            left: 14px;
            z-index: 50;
            padding: 8px 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(7, 15, 26, 0.72);
            color: white;
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 1000;
            letter-spacing: 0.08em;
        }

        #hud {
            position: fixed;
            inset: calc(14px + env(safe-area-inset-top, 0px)) 14px auto 92px;
            z-index: 30;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            pointer-events: none;
        }

        .cluster {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .panel {
            min-width: 96px;
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 14px 32px rgba(0, 0, 0, 0.22);
        }

        .brand {
            min-width: 180px;
            border-color: rgba(98, 217, 255, 0.36);
        }

        .label {
            display: block;
            color: rgba(255, 255, 255, 0.64);
            font-size: 0.62rem;
            font-weight: 900;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .value {
            margin-top: 4px;
            color: white;
            font-size: 1.35rem;
            line-height: 1;
            font-weight: 1000;
        }

        .brand .value {
            color: var(--cyan);
            font-size: 1.42rem;
        }

        .gold { color: var(--gold); }
        .cyan { color: var(--cyan); }
        .green { color: var(--green); }

        #meter {
            position: fixed;
            left: 50%;
            bottom: calc(18px + env(safe-area-inset-bottom, 0px));
            z-index: 32;
            width: min(560px, calc(100% - 28px));
            transform: translateX(-50%);
            display: grid;
            gap: 8px;
            pointer-events: none;
        }

        .meter-row {
            display: grid;
            grid-template-columns: 88px 1fr 64px;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(7, 15, 26, 0.78);
            color: rgba(255, 255, 255, 0.72);
            font-size: 0.68rem;
            font-weight: 1000;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .bar {
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.32);
            overflow: hidden;
            background: rgba(0, 0, 0, 0.28);
        }

        .fill {
            width: 100%;
            height: 100%;
            transform-origin: left;
            transform: scaleX(0.5);
            background: linear-gradient(90deg, #ff6b6b, #ffd166, #72f0a2);
        }

        #toast {
            position: fixed;
            left: 50%;
            top: 43%;
            z-index: 35;
            transform: translate(-50%, -50%) scale(0.8);
            color: white;
            font-size: clamp(2rem, 8vw, 5.6rem);
            line-height: 0.9;
            font-weight: 1000;
            text-align: center;
            text-shadow: 0 7px 0 #06111f, 0 0 28px rgba(98, 217, 255, 0.5);
            opacity: 0;
            pointer-events: none;
        }

        #toast.show {
            animation: toast 1.45s ease-out forwards;
        }

        @keyframes toast {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
            18% { opacity: 1; transform: translate(-50%, -50%) scale(1.06); }
            72% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.18); }
        }

        #overlay {
            position: fixed;
            inset: 0;
            z-index: 60;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22px;
            background: linear-gradient(180deg, rgba(5, 11, 20, 0.72), rgba(5, 11, 20, 0.94));
        }

        .modal {
            width: min(530px, 100%);
            padding: 24px;
            border: 2px solid rgba(98, 217, 255, 0.32);
            border-radius: 8px;
            background: rgba(7, 15, 26, 0.9);
            text-align: center;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
        }

        h1 {
            color: var(--cyan);
            font-size: clamp(2.7rem, 12vw, 5.8rem);
            line-height: 0.82;
            font-weight: 1000;
            letter-spacing: 0;
            text-transform: uppercase;
            text-shadow: 0 7px 0 #075985;
        }

        .brief {
            margin: 18px auto 20px;
            max-width: 430px;
            color: rgba(255, 255, 255, 0.78);
            font-size: 0.96rem;
            line-height: 1.45;
        }

        .btn {
            width: min(330px, 100%);
            height: 62px;
            border: 0;
            border-radius: 8px;
            background: white;
            color: #06111f;
            box-shadow: 0 8px 0 #8ba8b8;
            cursor: pointer;
            font-size: 1.08rem;
            font-weight: 1000;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #8ba8b8;
        }

        #touch {
            position: fixed;
            inset: auto 16px calc(88px + env(safe-area-inset-bottom, 0px)) 16px;
            z-index: 34;
            display: none;
            justify-content: space-between;
            pointer-events: none;
        }

        .pad,
        .actions {
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }

        .touch-btn {
            width: 68px;
            height: 68px;
            border: 2px solid rgba(255, 255, 255, 0.72);
            border-radius: 8px;
            background: rgba(7, 15, 26, 0.72);
            color: white;
            font-size: 1.02rem;
            font-weight: 1000;
        }

        .touch-btn.primary {
            width: 96px;
            background: var(--cyan);
            color: #06111f;
            border-color: white;
        }

        @media (max-width: 900px) {
            #hud { inset-right: 10px; }
            .brand { display: none; }
            .panel { min-width: 82px; padding: 8px 9px; }
            .value { font-size: 1.08rem; }
            #touch { display: flex; }
            #meter { bottom: calc(10px + env(safe-area-inset-bottom, 0px)); }
        }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CCZ9JJGEDP');
    </script>
</head>
<body>
    <div id="app"></div>
    <a href="index.html" class="back-link">HUB</a>

    <div id="hud">
        <div class="cluster">
            <div class="panel brand">
                <span class="label">High Dive</span>
                <div class="value">3D</div>
            </div>
            <div class="panel">
                <span class="label">Score</span>
                <div id="score" class="value gold">0</div>
            </div>
            <div class="panel">
                <span class="label">Best</span>
                <div id="best" class="value">0</div>
            </div>
        </div>
        <div class="cluster">
            <div class="panel">
                <span class="label">Flips</span>
                <div id="flips" class="value cyan">0</div>
            </div>
            <div class="panel">
                <span class="label">Entry</span>
                <div id="entry" class="value green">Ready</div>
            </div>
        </div>
    </div>

    <div id="meter">
        <div class="meter-row">
            <span>Power</span>
            <div class="bar"><div id="power-fill" class="fill"></div></div>
            <b id="power-label">50%</b>
        </div>
    </div>

    <div id="touch">
        <div class="pad">
            <button class="touch-btn" data-key="ArrowLeft">L</button>
            <button class="touch-btn" data-key="ArrowRight">R</button>
        </div>
        <div class="actions">
            <button class="touch-btn" data-key="ArrowDown">TUCK</button>
            <button class="touch-btn primary" data-key="Space">JUMP</button>
        </div>
    </div>

    <div id="toast"></div>

    <div id="overlay">
        <div class="modal">
            <h1 id="title">High Dive</h1>
            <div id="brief" class="brief">Aim your takeoff, launch from the tower, flip in 3D, tuck for speed, and hit the water clean.</div>
            <button id="start" class="btn">Start Dive</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from "three";

        const clamp = THREE.MathUtils.clamp;
        const lerp = THREE.MathUtils.lerp;
        const TAU = Math.PI * 2;

        class HighDive3D {
            constructor() {
                this.state = "menu";
                this.keys = {};
                this.score = 0;
                this.best = Number(localStorage.getItem("k2-highdive3d-best") || 0);
                this.power = 0.5;
                this.powerDir = 1;
                this.lastTime = performance.now();
                this.totalRotation = 0;
                this.splashes = [];
                this.ripples = [];
                this.ui = {
                    score: document.getElementById("score"),
                    best: document.getElementById("best"),
                    flips: document.getElementById("flips"),
                    entry: document.getElementById("entry"),
                    powerFill: document.getElementById("power-fill"),
                    powerLabel: document.getElementById("power-label"),
                    overlay: document.getElementById("overlay"),
                    title: document.getElementById("title"),
                    brief: document.getElementById("brief"),
                    start: document.getElementById("start"),
                    toast: document.getElementById("toast")
                };
                this.ui.best.textContent = this.best;
                this.initThree();
                this.createWorld();
                this.createDiver();
                this.bindInput();
                this.resetDiver();
                this.ui.start.addEventListener("click", () => this.start());
                requestAnimationFrame((time) => this.loop(time));
            }

            initThree() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x8fe0ff);
                this.scene.fog = new THREE.Fog(0x8fe0ff, 120, 620);

                this.camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.1, 1200);
                this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
                this.renderer.setSize(innerWidth, innerHeight);
                this.renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                document.getElementById("app").appendChild(this.renderer.domElement);

                this.scene.add(new THREE.HemisphereLight(0xe8fbff, 0x244050, 1.8));
                const sun = new THREE.DirectionalLight(0xfff1b8, 2.3);
                sun.position.set(-90, 180, 110);
                sun.castShadow = true;
                sun.shadow.mapSize.set(1024, 1024);
                sun.shadow.camera.left = -180;
                sun.shadow.camera.right = 180;
                sun.shadow.camera.top = 180;
                sun.shadow.camera.bottom = -180;
                this.scene.add(sun);

                window.addEventListener("resize", () => {
                    this.camera.aspect = innerWidth / innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(innerWidth, innerHeight);
                    this.renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
                });
            }

            mat(color, extra = {}) {
                return new THREE.MeshStandardMaterial({
                    color,
                    roughness: 0.62,
                    metalness: 0.04,
                    ...extra
                });
            }

            createWorld() {
                this.mats = {
                    concrete: this.mat(0xb8c2cc),
                    dark: this.mat(0x172033),
                    rail: this.mat(0xf8fafc, { metalness: 0.18, roughness: 0.32 }),
                    board: this.mat(0xf8fafc),
                    boardTip: this.mat(0xff5c6a),
                    water: new THREE.MeshPhysicalMaterial({
                        color: 0x119fe8,
                        roughness: 0.08,
                        metalness: 0,
                        transmission: 0.22,
                        transparent: true,
                        opacity: 0.78
                    }),
                    tile: this.mat(0xe9f1f7),
                    gold: this.mat(0xffd166),
                    red: this.mat(0xff6b6b),
                    blue: this.mat(0x62d9ff),
                    green: this.mat(0x72f0a2),
                    skin: this.mat(0xf1bc8a),
                    suit: this.mat(0xff5168),
                    hair: this.mat(0x1b1210)
                };

                const deck = new THREE.Mesh(new THREE.BoxGeometry(180, 3, 130), this.mats.tile);
                deck.position.set(30, -2, 0);
                deck.receiveShadow = true;
                this.scene.add(deck);

                this.water = new THREE.Mesh(new THREE.BoxGeometry(108, 1.2, 78), this.mats.water);
                this.water.position.set(36, 0, 0);
                this.water.receiveShadow = true;
                this.scene.add(this.water);

                const poolRim = new THREE.Group();
                [
                    [36, 1.1, 42, 118, 2, 5],
                    [36, 1.1, -42, 118, 2, 5],
                    [-25, 1.1, 0, 5, 2, 84],
                    [97, 1.1, 0, 5, 2, 84]
                ].forEach(([x, y, z, w, h, d]) => {
                    const rim = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), this.mats.rail);
                    rim.position.set(x, y, z);
                    rim.castShadow = true;
                    rim.receiveShadow = true;
                    poolRim.add(rim);
                });
                this.scene.add(poolRim);

                const tower = new THREE.Group();
                const colGeo = new THREE.BoxGeometry(3, 88, 3);
                [-10, 10].forEach((z) => {
                    const col = new THREE.Mesh(colGeo, this.mats.concrete);
                    col.position.set(-52, 42, z);
                    col.castShadow = true;
                    tower.add(col);
                });
                for (let y = 8; y < 80; y += 9) {
                    const rung = new THREE.Mesh(new THREE.BoxGeometry(3, 1, 24), this.mats.rail);
                    rung.position.set(-52, y, 0);
                    rung.castShadow = true;
                    tower.add(rung);
                }
                const platform = new THREE.Mesh(new THREE.BoxGeometry(24, 3, 24), this.mats.concrete);
                platform.position.set(-52, 83, 0);
                platform.castShadow = true;
                platform.receiveShadow = true;
                tower.add(platform);
                const board = new THREE.Mesh(new THREE.BoxGeometry(70, 1.4, 9), this.mats.board);
                board.position.set(-14, 84.2, 0);
                board.castShadow = true;
                board.receiveShadow = true;
                tower.add(board);
                const tip = new THREE.Mesh(new THREE.BoxGeometry(5, 1.6, 9.4), this.mats.boardTip);
                tip.position.set(23, 84.4, 0);
                tip.castShadow = true;
                tower.add(tip);
                this.board = board;
                this.scene.add(tower);

                this.createCrowd();
                this.createClouds();
            }

            createCrowd() {
                const stand = new THREE.Group();
                for (let row = 0; row < 5; row++) {
                    const bench = new THREE.Mesh(new THREE.BoxGeometry(145, 3, 8), this.mats.dark);
                    bench.position.set(20, 10 + row * 5, -75 - row * 5);
                    bench.castShadow = true;
                    stand.add(bench);
                    for (let i = 0; i < 18; i++) {
                        const mat = [this.mats.gold, this.mats.red, this.mats.blue, this.mats.green][(i + row) % 4];
                        const fan = new THREE.Mesh(new THREE.BoxGeometry(4, 5, 3), mat);
                        fan.position.set(-48 + i * 6, 14 + row * 5, -75 - row * 5);
                        fan.castShadow = true;
                        fan.userData.baseY = fan.position.y;
                        fan.userData.phase = Math.random() * TAU;
                        stand.add(fan);
                    }
                }
                this.crowd = stand.children.filter((child) => child.userData.baseY);
                this.scene.add(stand);
            }

            createClouds() {
                this.clouds = [];
                const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.74 });
                for (let i = 0; i < 10; i++) {
                    const cloud = new THREE.Group();
                    for (let j = 0; j < 4; j++) {
                        const puff = new THREE.Mesh(new THREE.SphereGeometry(8 + j * 2, 12, 8), mat);
                        puff.position.set(j * 9, Math.sin(j) * 2, 0);
                        cloud.add(puff);
                    }
                    cloud.position.set(-150 + i * 45, 120 + Math.sin(i) * 18, -160 - (i % 3) * 30);
                    cloud.userData.speed = 0.035 + i * 0.003;
                    this.clouds.push(cloud);
                    this.scene.add(cloud);
                }
            }

            createDiver() {
                this.diver = new THREE.Group();
                const skin = this.mats.skin;
                const suit = this.mats.suit;
                const hair = this.mats.hair;
                const torso = new THREE.Mesh(new THREE.BoxGeometry(3.6, 8, 2.3), suit);
                const head = new THREE.Mesh(new THREE.SphereGeometry(2.2, 16, 12), skin);
                const cap = new THREE.Mesh(new THREE.SphereGeometry(2.28, 12, 8, 0, TAU, 0, Math.PI / 2), hair);
                const armGeo = new THREE.BoxGeometry(1.1, 7, 1.1);
                const legGeo = new THREE.BoxGeometry(1.2, 8, 1.2);
                this.parts = {
                    torso,
                    head,
                    cap,
                    leftArm: new THREE.Mesh(armGeo, skin),
                    rightArm: new THREE.Mesh(armGeo, skin),
                    leftLeg: new THREE.Mesh(legGeo, skin),
                    rightLeg: new THREE.Mesh(legGeo, skin)
                };
                torso.position.y = 0;
                head.position.y = 6.2;
                cap.position.y = 7.0;
                this.parts.leftArm.position.set(-2.7, 0.5, 0);
                this.parts.rightArm.position.set(2.7, 0.5, 0);
                this.parts.leftLeg.position.set(-0.95, -7.3, 0);
                this.parts.rightLeg.position.set(0.95, -7.3, 0);
                Object.values(this.parts).forEach((mesh) => {
                    mesh.castShadow = true;
                    this.diver.add(mesh);
                });
                this.scene.add(this.diver);
            }

            bindInput() {
                window.addEventListener("keydown", (event) => {
                    this.keys[this.mapKey(event.code)] = true;
                    if (["ArrowLeft", "ArrowRight", "ArrowDown", "Space"].includes(this.mapKey(event.code))) event.preventDefault();
                });
                window.addEventListener("keyup", (event) => {
                    this.keys[this.mapKey(event.code)] = false;
                    if (["ArrowLeft", "ArrowRight", "ArrowDown", "Space"].includes(this.mapKey(event.code))) event.preventDefault();
                });
                document.querySelectorAll("[data-key]").forEach((button) => {
                    const code = button.dataset.key;
                    const down = (event) => {
                        event.preventDefault();
                        this.keys[code] = true;
                    };
                    const up = (event) => {
                        event.preventDefault();
                        this.keys[code] = false;
                    };
                    button.addEventListener("pointerdown", down);
                    button.addEventListener("pointerup", up);
                    button.addEventListener("pointercancel", up);
                    button.addEventListener("pointerleave", up);
                });
            }

            mapKey(code) {
                const map = { KeyA: "ArrowLeft", KeyD: "ArrowRight", KeyS: "ArrowDown", KeyW: "Space", ArrowUp: "Space" };
                return map[code] || code;
            }

            start() {
                this.score = 0;
                this.ui.score.textContent = "0";
                this.ui.overlay.style.display = "none";
                this.resetDiver();
                this.state = "aim";
                this.flash("READY");
            }

            resetDiver() {
                this.diver.position.set(17, 94, 0);
                this.diver.rotation.set(0, 0, -Math.PI / 2);
                this.velocity = new THREE.Vector3(0, 0, 0);
                this.totalRotation = 0;
                this.flips = 0;
                this.entryQuality = "Ready";
                this.tuck = 0;
                this.power = 0.5;
                this.powerDir = 1;
                this.boardWobble = 0;
                this.boardVel = 0;
            }

            launch() {
                this.state = "dive";
                this.velocity.set(1.05 + this.power * 0.82, 1.8 + this.power * 3.0, 0);
                this.totalRotation = 0;
                this.flash("DIVE");
            }

            scoreEntry() {
                if (this.state !== "dive") return;
                this.state = "splash";
                const normalized = ((this.diver.rotation.z % TAU) + TAU) % TAU;
                const feetFirst = Math.min(Math.abs(normalized - Math.PI / 2), Math.abs(normalized - Math.PI * 1.5));
                const headFirst = Math.min(Math.abs(normalized), Math.abs(normalized - TAU), Math.abs(normalized - Math.PI));
                const clean = Math.min(feetFirst, headFirst);
                const flips = Math.floor(Math.abs(this.totalRotation) / TAU);
                let label = "BIG SPLASH";
                let base = 240;
                let splash = 1.2;
                if (this.keys.ArrowDown || this.tuck > 0.78) {
                    label = "CANNONBALL";
                    base = 680;
                    splash = 2.3;
                } else if (clean < 0.18) {
                    label = "PERFECT";
                    base = 1600;
                    splash = 0.42;
                } else if (clean < 0.45) {
                    label = "CLEAN";
                    base = 850;
                    splash = 0.8;
                }
                const points = Math.round(base * (1 + flips * 0.65) * (0.75 + this.power));
                this.score += points;
                this.best = Math.max(this.best, this.score);
                localStorage.setItem("k2-highdive3d-best", this.best);
                this.ui.score.textContent = this.score;
                this.ui.best.textContent = this.best;
                this.entryQuality = label;
                this.ui.entry.textContent = label;
                this.createSplash(this.diver.position.x, this.diver.position.z, splash);
                this.flash(label + " +" + points);
                setTimeout(() => {
                    if (this.state === "splash") {
                        this.resetDiver();
                        this.state = "aim";
                    }
                }, 1500);
            }

            createSplash(x, z, size) {
                const mat = new THREE.MeshBasicMaterial({ color: 0xdff8ff, transparent: true, opacity: 0.82 });
                for (let i = 0; i < 42 * size; i++) {
                    const drop = new THREE.Mesh(new THREE.SphereGeometry(0.7 + Math.random() * 0.8, 8, 6), mat.clone());
                    drop.position.set(x, 2, z);
                    drop.userData.vel = new THREE.Vector3((Math.random() - 0.5) * 2.4 * size, Math.random() * 2.4 + 1.2, (Math.random() - 0.5) * 2.2 * size);
                    drop.userData.life = 1;
                    this.splashes.push(drop);
                    this.scene.add(drop);
                }
                const ring = new THREE.Mesh(new THREE.TorusGeometry(3, 0.16, 8, 40), new THREE.MeshBasicMaterial({ color: 0xe8fbff, transparent: true, opacity: 0.85 }));
                ring.position.set(x, 1, z);
                ring.rotation.x = Math.PI / 2;
                ring.userData.life = 1;
                ring.userData.scale = 1 + size;
                this.ripples.push(ring);
                this.scene.add(ring);
            }

            updatePose(time) {
                const p = this.parts;
                const tuck = this.tuck;
                p.leftArm.rotation.z = lerp(p.leftArm.rotation.z, tuck ? -1.9 : -2.8, 0.14);
                p.rightArm.rotation.z = lerp(p.rightArm.rotation.z, tuck ? 1.9 : 2.8, 0.14);
                p.leftLeg.rotation.z = lerp(p.leftLeg.rotation.z, tuck ? 0.85 : 0.08, 0.14);
                p.rightLeg.rotation.z = lerp(p.rightLeg.rotation.z, tuck ? -0.85 : -0.08, 0.14);
                if (this.state === "aim") {
                    this.diver.position.y = 94 + Math.sin(time * 0.006) * 0.8;
                    this.diver.rotation.z = -Math.PI / 2 + Math.sin(time * 0.006) * 0.05;
                }
            }

            update(dt, time) {
                this.clouds.forEach((cloud) => {
                    cloud.position.x += cloud.userData.speed * dt;
                    if (cloud.position.x > 220) cloud.position.x = -220;
                });
                this.crowd.forEach((fan) => {
                    fan.position.y = fan.userData.baseY + Math.max(0, Math.sin(time * 0.008 + fan.userData.phase)) * (this.state === "dive" ? 1.8 : 0.4);
                });
                this.water.material.opacity = 0.72 + Math.sin(time * 0.003) * 0.06;
                this.boardVel += -this.boardWobble * 0.08;
                this.boardVel *= 0.9;
                this.boardWobble += this.boardVel;
                this.board.rotation.z = this.boardWobble * 0.01;

                if (this.state === "aim") {
                    this.power += this.powerDir * 0.012 * dt;
                    if (this.power > 1 || this.power < 0) {
                        this.power = clamp(this.power, 0, 1);
                        this.powerDir *= -1;
                    }
                    if (this.keys.Space) {
                        this.keys.Space = false;
                        this.boardVel = 2.3;
                        this.launch();
                    }
                } else if (this.state === "dive") {
                    const spinInput = (this.keys.ArrowLeft ? 1 : 0) - (this.keys.ArrowRight ? 1 : 0);
                    this.tuck = lerp(this.tuck, this.keys.ArrowDown ? 1 : 0, 0.16);
                    const spin = (0.032 + this.tuck * 0.05 + Math.abs(spinInput) * 0.035) * dt * (spinInput || 1);
                    this.diver.rotation.z += spin;
                    this.totalRotation += spin;
                    this.velocity.y -= 0.1 * dt;
                    this.diver.position.addScaledVector(this.velocity, dt);
                    if (this.diver.position.y <= 4) this.scoreEntry();
                }

                this.splashes = this.splashes.filter((drop) => {
                    drop.position.addScaledVector(drop.userData.vel, dt);
                    drop.userData.vel.y -= 0.13 * dt;
                    drop.userData.life -= 0.025 * dt;
                    drop.material.opacity = Math.max(0, drop.userData.life);
                    if (drop.userData.life <= 0) {
                        this.scene.remove(drop);
                        return false;
                    }
                    return true;
                });
                this.ripples = this.ripples.filter((ring) => {
                    ring.scale.addScalar(0.045 * ring.userData.scale * dt);
                    ring.userData.life -= 0.018 * dt;
                    ring.material.opacity = Math.max(0, ring.userData.life);
                    if (ring.userData.life <= 0) {
                        this.scene.remove(ring);
                        return false;
                    }
                    return true;
                });

                this.flips = Math.floor(Math.abs(this.totalRotation) / TAU);
                this.ui.flips.textContent = this.flips;
                this.ui.powerFill.style.transform = "scaleX(" + this.power + ")";
                this.ui.powerLabel.textContent = Math.round(this.power * 100) + "%";
                this.updatePose(time);
                this.updateCamera(dt);
            }

            updateCamera(dt) {
                const target = this.state === "dive" ? this.diver.position : new THREE.Vector3(-8, 78, 0);
                const desired = target.clone().add(new THREE.Vector3(62, 34, 88));
                this.camera.position.lerp(desired, 1 - Math.pow(0.001, dt / 16.67));
                this.camera.lookAt(target.clone().add(new THREE.Vector3(0, 4, 0)));
            }

            flash(text) {
                this.ui.toast.textContent = text;
                this.ui.toast.classList.remove("show");
                void this.ui.toast.offsetWidth;
                this.ui.toast.classList.add("show");
            }

            loop(time) {
                const dt = clamp((time - this.lastTime) / 16.67, 0.25, 2);
                this.lastTime = time;
                if (this.state === "menu") {
                    this.camera.position.lerp(new THREE.Vector3(64, 62, 112), 0.035);
                    this.camera.lookAt(-18, 50, 0);
                    this.updatePose(time);
                } else {
                    this.update(dt, time);
                }
                this.renderer.render(this.scene, this.camera);
                requestAnimationFrame((next) => this.loop(next));
            }
        }

        window.game = new HighDive3D();
    </script>
</body>
</html>
