<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High Dive Pro - K2 games</title>
    <style>
        :root {
            --pool-blue: #0ea5e9;
            --deep-blue: #0369a1;
            --board-grey: #cbd5e1;
            --accent: #fbbf24;
            --sky: #7dd3fc;
            --crowd-bg: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100dvh;
            width: 100%;
            overflow: hidden;
            position: fixed;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, var(--sky), #bae6fd);
            overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; }

        .hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            pointer-events: none;
            z-index: 100;
        }

        .stat-card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            min-width: 100px;
        }

        .stat-val { font-size: 1.5rem; font-weight: 900; color: var(--accent); font-family: monospace; }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }

        .controls-hint {
            position: absolute;
            bottom: 140px;
            width: 100%;
            text-align: center;
            font-weight: 800;
            color: rgba(255,255,255,0.9);
            font-size: 0.9rem;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        #mobile-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            pointer-events: none;
        }

        .btn-action {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(0,0,0,0.4);
            border: 4px solid rgba(255,255,255,0.3);
            color: white;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            backdrop-filter: blur(5px);
            transition: transform 0.1s;
        }
        .btn-action:active { transform: scale(0.9); background: var(--accent); color: black; }

        .d-pad {
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px;
            gap: 5px;
            pointer-events: auto;
        }
        .d-btn {
            width: 60px; height: 60px;
            background: rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            color: white;
        }
        .d-btn:active { background: var(--accent); color: black; }
        .d-up { grid-column: 2; grid-row: 1; }
        .d-left { grid-column: 1; grid-row: 2; }
        .d-right { grid-column: 3; grid-row: 2; }
        .d-down { grid-column: 2; grid-row: 2; }

        .back-link {
            position: absolute; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 10px; z-index: 200;
            font-weight: bold; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.1);
        }

        #overlay {
            position: absolute; inset: 0; background: rgba(15, 23, 42, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; text-align: center; padding: 30px;
        }

        .btn-start {
            background: var(--accent); color: black; border: none; padding: 15px 50px;
            border-radius: 50px; font-weight: 900; cursor: pointer; font-size: 1.2rem;
            margin-top: 30px;
            box-shadow: 0 10px 0 #b45309;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-start:active { transform: translateY(5px); box-shadow: 0 5px 0 #b45309; }

        #feedback-display {
            position: absolute;
            top: 30%;
            width: 100%;
            text-align: center;
            font-size: 4rem;
            font-weight: 900;
            font-style: italic;
            color: white;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }
        #feedback-display.show { 
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5) rotate(-10deg); }
            50% { opacity: 1; transform: scale(1.2) rotate(5deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        .crowd-meter {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 200px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.2);
            overflow: hidden;
        }
        #hype-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, #ef4444, #fbbf24, #22c55e);
            transition: height 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <a href="index.html" class="back-link">← HUB</a>
        <canvas id="gameCanvas"></canvas>

        <div class="hud">
            <div class="stat-card">
                <div class="stat-label">Score</div>
                <div id="score-val" class="stat-val">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Best</div>
                <div id="best-val" class="stat-val">0</div>
            </div>
        </div>

        <div id="feedback-display">PERFECT!</div>

        <div class="crowd-meter">
            <div id="hype-bar"></div>
        </div>

        <div class="controls-hint" id="hint-text">Use Arrows to Climb & Choose Board</div>

        <div id="mobile-controls">
            <div class="d-pad">
                <div class="d-btn d-left" id="btn-left">←</div>
                <div class="d-btn d-up" id="btn-up">↑</div>
                <div class="d-btn d-down" id="btn-down">↓</div>
                <div class="d-btn d-right" id="btn-right">→</div>
            </div>
            <div class="btn-action" id="btn-jump">BOUNCE / JUMP</div>
        </div>

        <div id="overlay">
            <h1 style="font-size: 3.5rem; color: var(--accent); font-style: italic; font-weight: 900; line-height: 1;">HIGH DIVE<br>PRO</h1>
            <p style="margin-top: 20px; font-weight: 600; opacity: 0.8; max-width: 400px;">Climb the tower, walk the board, and BOUNCE to build wobble! Tap JUMP to fly!</p>
            <button class="btn-start" onclick="startGame()">START CAREER</button>
        </div>
    </div>

    <script>
        class HighDiveGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                this.playerFeetOffset = 28; // Scaled offset to feet
                this.resize();

                this.score = 0;
                this.best = localStorage.getItem('highdive_best') || 0;
                this.hype = 0;
                this.keys = {};
                this.playing = false;
                this.gravity = 0.25;
                
                this.clouds = [];
                for(let i=0; i<6; i++) this.clouds.push({ x: Math.random()*this.width, y: 50+Math.random()*200, s: 0.5+Math.random() });

                this.resetPlayer();
                document.getElementById('best-val').textContent = this.best;

                this.setupInputs();
                this.loop();
                window.addEventListener('resize', () => this.resize());
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.width = this.canvas.width;
                this.height = this.canvas.height;
                
                this.pool = {
                    y: this.height - 200,
                    width: this.width,
                    ripples: [],
                    particles: [],
                    splashes: []
                };

                this.boards = [
                    { y: this.height - 350, x: 100, label: 'LOW', wobble: 0, wobbleVel: 0 },
                    { y: this.height - 500, x: 100, label: 'MED', wobble: 0, wobbleVel: 0 },
                    { y: this.height - 650, x: 100, label: 'HIGH', wobble: 0, wobbleVel: 0 }
                ];

                this.ladder = {
                    x: 60,
                    width: 40,
                    bottom: this.height - 200,
                    top: this.height - 650
                };

                this.lifeguard = {
                    x: this.width - 150,
                    y: this.height - 350,
                    emoji: '👨‍✈️'
                };

                this.setupCrowd();
            }

            resetPlayer() {
                this.player = {
                    x: 80,
                    y: this.height - 200 - this.playerFeetOffset,
                    vx: 0,
                    vy: 0,
                    rotation: 0,
                    state: 'climbing', 
                    tuck: 0,
                    poseFrame: 0,
                    currentBoard: null,
                    climbY: this.height - 200 - this.playerFeetOffset,
                    faceDir: 1,
                    emoji: '😃'
                };
                this.totalRotation = 0;
                this.updateHint("Climb with UP/DOWN, Right to Board");
            }

            updateHint(msg) {
                document.getElementById('hint-text').textContent = msg;
            }

            setupCrowd() {
                this.crowd = [];
                const ems = ['😀', '😎', '😮', '😍', '🙌', '👏'];
                for(let r=0; r<4; r++) {
                    for(let c=0; c<Math.floor(this.width/40); c++) {
                        if(c * 40 < 200 && r < 3) continue;
                        if(c * 40 > this.width - 250) continue;
                        this.crowd.push({
                            x: c * 40 + 20 + (r%2 * 20),
                            y: this.height - 220 - (r * 30),
                            offset: Math.random() * Math.PI * 2,
                            excitement: 0,
                            shirt: `hsl(${Math.random()*360}, 50%, 50%)`,
                            emoji: ems[Math.floor(Math.random()*ems.length)]
                        });
                    }
                }
            }

            setupInputs() {
                window.onkeydown = e => { this.keys[e.code] = true; if(e.code === 'Space') this.handleAction(); };
                window.onkeyup = e => this.keys[e.code] = false;
                const bindBtn = (id, key) => {
                    const btn = document.getElementById(id);
                    btn.addEventListener('touchstart', e => { e.preventDefault(); this.keys[key] = true; }, {passive: false});
                    btn.addEventListener('touchend', () => this.keys[key] = false);
                    btn.addEventListener('mousedown', () => this.keys[key] = true);
                    btn.addEventListener('mouseup', () => this.keys[key] = false);
                };
                bindBtn('btn-left', 'ArrowLeft'); bindBtn('btn-right', 'ArrowRight');
                bindBtn('btn-up', 'ArrowUp'); bindBtn('btn-down', 'ArrowDown');
                const jumpBtn = document.getElementById('btn-jump');
                jumpBtn.addEventListener('mousedown', () => this.handleAction());
                jumpBtn.addEventListener('touchstart', e => { e.preventDefault(); this.handleAction(); }, {passive: false});
            }

            handleAction() {
                const p = this.player;
                if(p.state === 'standing') this.launch();
                else if(p.state === 'walking' && p.currentBoard) {
                    p.vy = -4;
                    p.currentBoard.wobbleVel += 15;
                    p.emoji = '😮';
                }
            }

            launch() {
                this.player.state = 'diving';
                this.player.vx = 4.5;
                this.player.vy = -8;
                this.player.emoji = '😲';
                if(this.player.currentBoard) this.player.currentBoard.wobbleVel = 25;
                this.hype = Math.min(100, this.hype + 5);
                this.updateHint("Hold LEFT/RIGHT to flip, DOWN for Cannonball!");
            }

            update() {
                if(!this.playing) return;
                const p = this.player;
                this.clouds.forEach(c => { c.x += 0.2 * c.s; if(c.x > this.width+100) c.x = -100; });
                this.boards.forEach(b => { b.wobbleVel += (0 - b.wobble) * 0.15; b.wobbleVel *= 0.94; b.wobble += b.wobbleVel; });
                this.crowd.forEach(person => { person.excitement *= 0.98; if(p.state === 'diving') person.excitement = Math.max(person.excitement, 0.2); });

                if (p.state === 'climbing') {
                    if (this.keys['ArrowUp']) { p.climbY -= 3; p.poseFrame += 0.2; }
                    if (this.keys['ArrowDown']) { p.climbY += 3; p.poseFrame += 0.2; }
                    p.climbY = Math.max(this.ladder.top - this.playerFeetOffset, Math.min(this.ladder.bottom - this.playerFeetOffset, p.climbY));
                    p.y = p.climbY; p.x = this.ladder.x; p.rotation = 0;
                    let board = this.boards.find(b => Math.abs(b.y - this.playerFeetOffset - p.y) < 15);
                    if (board && this.keys['ArrowRight']) { 
                        p.y = board.y - this.playerFeetOffset; p.currentBoard = board; p.state = 'walking'; p.faceDir = 1; 
                        this.updateHint("BOUNCE with SPACE, Walk to edge to DIVE"); 
                    }
                } else if (p.state === 'walking' || p.state === 'standing') {
                    if (p.state === 'walking') {
                        if (this.keys['ArrowLeft']) { p.x -= 2.5; p.faceDir = -1; p.poseFrame += 0.2; }
                        if (this.keys['ArrowRight']) { p.x += 2.5; p.faceDir = 1; p.poseFrame += 0.2; }
                        p.vy += 0.3; p.y += p.vy;
                    } else {
                        if (this.keys['ArrowLeft']) { p.state = 'walking'; p.faceDir = -1; }
                        p.poseFrame += 0.05;
                    }

                    const boardBaseX = this.ladder.x + 40;
                    const distOnBoard = Math.max(0, p.x - boardBaseX);
                    const boardAngle = p.currentBoard.wobble * 0.005;
                    const wobbleY = Math.sin(boardAngle) * distOnBoard;
                    const surfaceY = p.currentBoard.y - this.playerFeetOffset + wobbleY;

                    if(p.state === 'standing') { p.x = boardBaseX + 140; p.y = surfaceY; p.rotation = boardAngle; }
                    else {
                        if(p.y > surfaceY) { p.y = surfaceY; p.vy = 0; }
                        p.rotation = boardAngle;
                        if (p.x < this.ladder.x) { p.x = this.ladder.x; p.state = 'climbing'; p.climbY = p.y; p.currentBoard = null; this.updateHint("Climb Up!"); }
                        if (p.x > boardBaseX + 140) { p.x = boardBaseX + 140; p.state = 'standing'; this.updateHint("JUMP! (Hold DOWN for Cannonball)"); }
                    }
                } else if(p.state === 'diving') {
                    p.vy += this.gravity; p.x += p.vx; p.y += p.vy;
                    let rotSpeed = 0.12;
                    if(this.keys['ArrowLeft']) { p.rotation -= rotSpeed * 1.5; p.tuck = Math.min(1, p.tuck + 0.1); this.totalRotation -= rotSpeed * 1.5; }
                    else if(this.keys['ArrowRight']) { p.rotation += rotSpeed * 1.5; p.tuck = Math.min(1, p.tuck + 0.1); this.totalRotation += rotSpeed * 1.5; }
                    else { p.tuck = Math.max(0, p.tuck - 0.1); }
                    if(this.keys['ArrowDown']) { p.tuck = 1; p.emoji = '😨'; }
                    if(p.y + 30 > this.pool.y) this.handleEntry();
                } else if(p.state === 'swimming') {
                    if (this.keys['ArrowLeft']) { p.vx -= 0.4; p.faceDir = -1; p.poseFrame += 0.15; }
                    if (this.keys['ArrowRight']) { p.vx += 0.4; p.faceDir = 1; p.poseFrame += 0.15; }
                    if (this.keys['ArrowUp'] && p.y > this.pool.y + 10) p.vy -= 0.4;
                    if (this.keys['ArrowDown']) p.vy += 0.4;
                    p.vy *= 0.94; p.vx *= 0.94; p.y += p.vy; p.x += p.vx; p.vy -= 0.05; if (p.y < this.pool.y + 20) p.vy += 0.1;
                    if (p.x < this.ladder.x + 20 && Math.abs(p.y - (this.pool.y - this.playerFeetOffset)) < 60) {
                        p.state = 'climbing'; p.climbY = this.pool.y - this.playerFeetOffset; p.x = this.ladder.x;
                        this.updateHint("Climb back up!");
                    }
                }
                this.updateParticles();
                document.getElementById('hype-bar').style.height = this.hype + '%';
                this.hype *= 0.995;
            }

            updateParticles() {
                this.pool.particles = this.pool.particles.filter(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.02; return p.life > 0; });
                this.pool.ripples = this.pool.ripples.filter(r => { r.r += 2; r.opacity -= 0.02; return r.opacity > 0; });
                this.pool.splashes = this.pool.splashes.filter(s => { s.y -= s.v; s.v *= 0.9; s.opacity -= 0.03; return s.opacity > 0; });
            }

            handleEntry() {
                const isCannonball = this.keys['ArrowDown'] || this.player.tuck > 0.8;
                this.player.state = 'swimming';
                const normalizedRot = ((this.player.rotation % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
                const diffToVertical = Math.min(Math.abs(normalizedRot - Math.PI), Math.abs(normalizedRot - 0), Math.abs(normalizedRot - Math.PI * 2));
                const flips = Math.floor(Math.abs(this.totalRotation) / (Math.PI * 1.5));
                let quality = "", scoreMult = 0, splashSize = 0;
                if(isCannonball) { quality = "CANNONBALL!!"; scoreMult = 800; splashSize = 100; this.triggerCrowd(1.0); this.player.emoji = '😂'; }
                else if(diffToVertical < 0.25) { quality = "PERFECT!!"; scoreMult = 1500; splashSize = 10; this.triggerCrowd(1.0); this.player.emoji = '🤩'; }
                else if(diffToVertical < 0.6) { quality = "GOOD"; scoreMult = 500; splashSize = 30; this.triggerCrowd(0.5); this.player.emoji = '😊'; }
                else { quality = "SPLAT!"; scoreMult = 50; splashSize = 70; this.triggerCrowd(0.1); this.player.emoji = '🤕'; }
                let heightBonus = this.player.currentBoard ? (this.player.currentBoard.label === 'HIGH' ? 3 : (this.player.currentBoard.label === 'MED' ? 1.5 : 1)) : 1;
                this.addScore(Math.floor(scoreMult * (flips + 1) * heightBonus));
                this.showFeedback(quality); this.createSplash(this.player.x, splashSize);
                this.player.vy *= 0.1; this.player.vx *= 0.1; this.totalRotation = 0; this.player.rotation = 0;
                this.updateHint("Swim to the LADDER on the LEFT!");
            }

            createSplash(x, size) {
                for(let i=0; i<8; i++) this.pool.splashes.push({ x: x + (Math.random()-0.5)*size, y: this.pool.y, v: 4 + Math.random()*size*0.15, opacity: 1, w: 10 + Math.random()*15 });
                for(let i=0; i<size*3+30; i++) this.pool.particles.push({ x: x, y: this.pool.y, vx: (Math.random()-0.5)*size*0.4, vy: -Math.random()*size*0.6 - 3, life: 1, size: 2+Math.random()*5, color: '#fff' });
                this.pool.ripples.push({ x: x, y: this.pool.y, r: 10, opacity: 1 });
            }

            triggerCrowd(amount) { this.crowd.forEach(p => { if(Math.random() < amount) p.excitement = 1.0; }); this.hype = Math.min(100, this.hype + amount * 30); }
            showFeedback(msg) { const el = document.getElementById('feedback-display'); el.textContent = msg; el.classList.remove('show'); void el.offsetWidth; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2000); }
            addScore(pts) { this.score += pts; document.getElementById('score-val').textContent = this.score; if(this.score > this.best) { this.best = this.score; document.getElementById('best-val').textContent = this.best; localStorage.setItem('highdive_best', this.best); } }

            draw() {
                const ctx = this.ctx; ctx.clearRect(0, 0, this.width, this.height);
                this.drawSun(); this.drawClouds(); this.drawCrowd(); this.drawTower(); this.drawLifeguard(); this.drawWater();
                this.drawPlayer(this.player, false); this.drawParticles();
            }

            drawSun() { const ctx = this.ctx; ctx.fillStyle = '#fef08a'; ctx.shadowBlur = 50; ctx.shadowColor = '#facc15'; ctx.beginPath(); ctx.arc(this.width - 100, 100, 40, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0; }
            drawClouds() { const ctx = this.ctx; ctx.fillStyle = 'rgba(255,255,255,0.7)'; this.clouds.forEach(c => { ctx.beginPath(); ctx.arc(c.x, c.y, 20*c.s, 0, Math.PI*2); ctx.arc(c.x+20*c.s, c.y-10*c.s, 25*c.s, 0, Math.PI*2); ctx.arc(c.x+40*c.s, c.y, 20*c.s, 0, Math.PI*2); ctx.fill(); }); }
            drawCrowd() {
                const ctx = this.ctx; const time = Date.now() * 0.005; ctx.fillStyle = '#475569';
                for(let i=0; i<4; i++) ctx.fillRect(0, this.height - 220 - (i*30), this.width, 15);
                this.crowd.forEach(p => {
                    const jump = Math.sin(time + p.offset) * 5 * p.excitement;
                    ctx.fillStyle = p.shirt; ctx.fillRect(p.x-8, p.y-jump, 16, 12);
                    ctx.font = '16px Arial'; ctx.textAlign = 'center'; ctx.fillText(p.emoji, p.x, p.y - 12 - jump);
                    if(p.excitement > 0.5) { ctx.fillStyle = '#fcd3b1'; ctx.fillRect(p.x - 12, p.y - 15 - jump, 3, 10); ctx.fillRect(p.x + 9, p.y - 15 - jump, 3, 10); }
                });
            }

            drawLifeguard() {
                const ctx = this.ctx; const lg = this.lifeguard; ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(lg.x, this.height-200); ctx.lineTo(lg.x+10, lg.y); ctx.moveTo(lg.x+40, this.height-200); ctx.lineTo(lg.x+30, lg.y); ctx.stroke();
                ctx.fillStyle = '#ef4444'; ctx.fillRect(lg.x-10, lg.y, 60, 10);
                ctx.fillStyle = 'white'; ctx.font = 'bold 8px Arial'; ctx.textAlign = 'center'; ctx.fillText("LIFEGUARD", lg.x+20, lg.y+8);
                const dummy = { x: lg.x+20, y: lg.y-10, state: 'standing', poseFrame: 0, rotation: 0, faceDir: -1, emoji: '😎' };
                this.drawPlayer(dummy, true);
            }

            drawTower() {
                const ctx = this.ctx; ctx.fillStyle = '#64748b';
                ctx.fillRect(this.ladder.x - 5, this.ladder.top, 10, this.ladder.bottom - this.ladder.top);
                ctx.fillRect(this.ladder.x + 35, this.ladder.top, 10, this.ladder.bottom - this.ladder.top);
                ctx.fillStyle = '#94a3b8'; for(let y = this.ladder.bottom; y > this.ladder.top; y -= 30) ctx.fillRect(this.ladder.x - 5, y, 50, 5);
                this.boards.forEach(b => {
                    ctx.save(); ctx.translate(this.ladder.x + 40, b.y); ctx.rotate(b.wobble * 0.005);
                    ctx.beginPath(); ctx.moveTo(0, 10); ctx.lineTo(60, 10); ctx.lineTo(0, 50); ctx.fillStyle = '#475569'; ctx.fill();
                    ctx.fillStyle = '#f1f5f9'; ctx.fillRect(0, 0, 140, 10); ctx.fillStyle = '#ef4444'; ctx.fillRect(130, 0, 10, 10);
                    ctx.fillStyle = '#334155'; ctx.font = 'bold 12px Arial'; ctx.fillText(b.label, 10, -5); ctx.restore();
                });
            }

            drawWater() {
                const ctx = this.ctx; ctx.fillStyle = '#cbd5e1'; ctx.fillRect(0, this.pool.y, this.width, this.height - this.pool.y);
                const margin = 20, waterY = this.pool.y + margin, waterH = this.height - waterY;
                ctx.fillStyle = '#e2e8f0'; ctx.fillRect(0, this.pool.y, this.width, margin);
                const grad = ctx.createLinearGradient(0, waterY, 0, this.height);
                grad.addColorStop(0, 'rgba(14, 165, 233, 0.8)'); grad.addColorStop(1, 'rgba(3, 105, 161, 0.95)');
                ctx.fillStyle = grad; ctx.fillRect(margin, waterY, this.width - margin*2, waterH);
                this.pool.ripples.forEach(r => { ctx.strokeStyle = `rgba(255,255,255,${r.opacity})`; ctx.lineWidth = 3; ctx.beginPath(); ctx.ellipse(r.x, waterY, r.r, r.r*0.3, 0, 0, Math.PI*2); ctx.stroke(); });
                this.pool.splashes.forEach(s => { ctx.fillStyle = `rgba(255,255,255,${s.opacity})`; ctx.beginPath(); ctx.rect(s.x-s.w/2, waterY-s.y, s.w, s.y); ctx.fill(); ctx.beginPath(); ctx.arc(s.x, waterY-s.y, s.w/2, 0, Math.PI*2); ctx.fill(); });
            }

            drawPlayer(p, isLifeguard) {
                const ctx = this.ctx; ctx.save(); ctx.translate(p.x, p.y); 
                if(p.state === 'swimming') { ctx.rotate(Math.PI/2 * p.faceDir); }
                else { ctx.rotate(p.rotation); }
                
                const s = 0.6; ctx.scale(s, s);
                const skin = '#fcd3b1', trunks = isLifeguard ? '#fff' : '#ef4444';
                let armAngle = 0, legAngle = 0;
                if(p.state === 'walking') { armAngle = Math.sin(p.poseFrame) * 0.6; legAngle = Math.sin(p.poseFrame) * 0.5; }
                else if (p.state === 'swimming') { armAngle = Math.sin(p.poseFrame) * 1.5 + Math.PI/2; legAngle = Math.sin(p.poseFrame) * 1.5; }
                else if (p.state === 'climbing') { armAngle = Math.sin(p.poseFrame) * 1.2 + Math.PI; legAngle = Math.cos(p.poseFrame) * 0.6; }
                else if (p.state === 'diving') { if (p.tuck > 0.5) { armAngle = 2.2; legAngle = -2.2; } else { armAngle = Math.PI; legAngle = 0; } }
                else if (p.state === 'standing') { armAngle = 0.2; legAngle = 0; }
                
                if(p.faceDir === -1 && p.state !== 'diving' && p.state !== 'swimming') ctx.scale(-1, 1);
                ctx.font = '40px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(p.emoji, 0, -75);
                ctx.fillStyle = skin; ctx.fillRect(-10, -58, 20, 35); ctx.fillStyle = trunks; ctx.fillRect(-10, -23, 20, 15);
                ctx.fillStyle = skin;
                ctx.save(); ctx.translate(0, -55); ctx.rotate(armAngle); ctx.fillRect(-4, 0, 8, 25); ctx.translate(0, 25); ctx.rotate(-0.2); ctx.fillRect(-3, 0, 6, 25); ctx.restore();
                ctx.save(); ctx.translate(-5, -10); ctx.rotate(legAngle); ctx.fillRect(-4, 0, 8, 28); ctx.translate(0, 28); ctx.fillRect(-3, 0, 6, 28); ctx.restore();
                ctx.save(); ctx.translate(5, -10); ctx.rotate(-legAngle); ctx.fillRect(-4, 0, 8, 28); ctx.translate(0, 28); ctx.fillRect(-3, 0, 6, 28); ctx.restore();
                ctx.restore();
            }

            drawParticles() { const ctx = this.ctx; this.pool.particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); }); ctx.globalAlpha = 1; }
            loop() { this.update(); this.draw(); requestAnimationFrame(() => this.loop()); }
        }
        let game = new HighDiveGame();
        function startGame() { document.getElementById('overlay').style.display = 'none'; game.resetPlayer(); game.score = 0; document.getElementById('score-val').textContent = "0"; game.playing = true; }
    </script>
</body>
