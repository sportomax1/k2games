<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Peak Freak - K2 Games</title>
<style>
*{box-sizing:border-box;touch-action:none;user-select:none}html,body{margin:0;height:100%;overflow:hidden;background:#0b1020;color:#f8fafc;font-family:system-ui,-apple-system,Segoe UI,sans-serif}.back{position:fixed;top:12px;left:12px;z-index:30;color:white;text-decoration:none;background:rgba(15,23,42,.72);padding:9px 13px;border-radius:12px;font-weight:950;border:1px solid rgba(255,255,255,.18)}#wrap{position:fixed;inset:0;display:grid;place-items:center;padding:8px}canvas{width:min(100vw,900px);height:min(100vh,900px);max-height:100vh;background:#172033;border:4px solid #bae6fd;border-radius:20px;box-shadow:0 28px 90px rgba(0,0,0,.55);image-rendering:pixelated}.hud{position:fixed;top:12px;left:50%;transform:translateX(-50%);width:min(96vw,820px);display:grid;grid-template-columns:repeat(5,1fr);gap:7px;z-index:20;pointer-events:none}.pill{background:rgba(3,7,18,.72);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:8px 9px;text-align:center;font-size:12px;font-weight:950}.overlay{position:fixed;inset:0;display:grid;place-items:center;background:linear-gradient(rgba(0,0,0,.12),rgba(0,0,0,.82));z-index:25;padding:24px}.card{width:min(94vw,650px);background:rgba(15,23,42,.95);border:3px solid #e0f2fe;border-radius:24px;padding:25px;text-align:center;box-shadow:0 20px 70px rgba(0,0,0,.65)}h1{margin:0 0 8px;font-size:clamp(40px,9vw,78px);line-height:.85;letter-spacing:-2px;text-transform:uppercase}.sub{opacity:.93;line-height:1.48}.btn{display:inline-block;margin:10px 5px 0;background:linear-gradient(#fef9c3,#7dd3fc);color:#082f49;border:0;border-bottom:6px solid #0284c7;border-radius:15px;padding:14px 18px;font-weight:1000;font-size:16px}.small{font-size:13px;opacity:.82;margin-top:12px}.controls{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);width:min(96vw,760px);display:flex;justify-content:space-between;gap:10px;z-index:21}.pad{display:flex;gap:10px}.cbtn{width:66px;height:56px;border-radius:18px;border:2px solid rgba(255,255,255,.35);background:rgba(3,7,18,.62);color:white;font-weight:950;font-size:23px;box-shadow:0 7px 0 rgba(0,0,0,.28)}@media(pointer:fine){.controls{display:none}}@media(max-width:640px){.hud{grid-template-columns:repeat(2,1fr);top:50px}.pill{font-size:11px;padding:7px}.card{padding:20px}}
</style>
</head>
<body>
<a class="back" href="index.html">← HUB</a>
<div id="wrap"><canvas id="game" width="640" height="640"></canvas></div>
<div class="hud"><div class="pill">🧗 <span id="mode">MENU</span></div><div class="pill">🏆 <span id="score">0</span></div><div class="pill">⛰️ <span id="height">0 ft</span></div><div class="pill">💪 <span id="stamina">100</span></div><div class="pill">⭐ <span id="combo">1.0x</span></div></div>
<div class="controls"><div class="pad"><button class="cbtn" id="left">◀</button><button class="cbtn" id="right">▶</button></div><div class="pad"><button class="cbtn" id="up">▲</button><button class="cbtn" id="grab">✋</button><button class="cbtn" id="power">⚡</button></div></div>
<div class="overlay" id="overlay"><div class="card"><h1>PEAK<br>FREAK</h1><div class="sub">Vertical scrolling pixel rock climbing. Pick smart holds, time grabs, manage stamina, chain clean routes, dodge a few loose rocks, and grab chalk or rope powerups.</div><button class="btn" id="endless">ENDLESS CLIMB</button><button class="btn" id="level">SUMMIT MODE</button><div class="small">Desktop: arrows/WASD move, Space grab, Shift power. Mobile: buttons or swipe/tap.</div></div></div>
<script>
(function(){
const c=document.getElementById('game'),ctx=c.getContext('2d'),W=640,H=640;
const ids=['mode','score','height','stamina','combo','overlay'];const ui={};ids.forEach(id=>ui[id]=document.getElementById(id));
const keys={},lanes=[110,245,395,530];let running=false,mode='endless',score=0,best=Number(localStorage.peakFreakBest||0),tick=0,msg='Choose a route',shake=0;let holds=[],rocks=[],powers=[],bits=[];
const player={lane:1,x:245,y:500,stamina:100,combo:1,height:0,power:0,rope:0,cool:0};
function rnd(a,b){return a+Math.random()*(b-a)}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function rect(x,y,w,h,color){ctx.fillStyle=color;ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h))}
function burst(x,y,n,color){for(let i=0;i<n;i++)bits.push({x,y,vx:rnd(-3,3),vy:rnd(-5,1),life:rnd(16,34),color})}
function addHold(y){let used={};let count=2+(Math.random()<.35?1:0);for(let i=0;i<count;i++){let lane=Math.floor(rnd(0,4));if(used[lane])continue;used[lane]=1;holds.push({x:lanes[lane]+rnd(-15,15),y,good:Math.random()>.22,type:Math.random()<.15?'jug':'normal',hit:false})}if(Math.random()<.13)rocks.push({x:lanes[Math.floor(rnd(0,4))],y:y-35,v:rnd(.7,1.4)});if(Math.random()<.18)powers.push({x:lanes[Math.floor(rnd(0,4))],y:y-20,type:Math.random()<.55?'chalk':'rope',got:false})}
function seed(){holds=[];rocks=[];powers=[];for(let y=560;y>-2600;y-=72)addHold(y)}
function start(m){mode=m;running=true;score=0;tick=0;msg=m==='level'?'Reach 1000 ft':'Climb forever';Object.assign(player,{lane:1,x:245,y:500,stamina:100,combo:1,height:0,power:0,rope:0,cool:0});seed();ui.overlay.style.display='none'}
function gameOver(text){running=false;best=Math.max(best,Math.floor(score));localStorage.peakFreakBest=best;ui.overlay.style.display='grid';ui.overlay.querySelector('h1').innerHTML='PEAK<br>'+Math.floor(score);ui.overlay.querySelector('.sub').textContent=text+' Best climb: '+best+' points.';ui.endless&&0;document.getElementById('endless').textContent='ENDLESS AGAIN';document.getElementById('level').textContent='SUMMIT AGAIN'}
function update(){if(!running)return;tick++;let left=keys.ArrowLeft||keys.a,right=keys.ArrowRight||keys.d,up=keys.ArrowUp||keys.w,grab=keys[' ']||keys.Space,power=keys.Shift||keys.ShiftLeft||keys.ShiftRight;if(left&&!keys.leftLock){keys.leftLock=true;player.lane=clamp(player.lane-1,0,3)}if(!left)keys.leftLock=false;if(right&&!keys.rightLock){keys.rightLock=true;player.lane=clamp(player.lane+1,0,3)}if(!right)keys.rightLock=false;player.x+=(lanes[player.lane]-player.x)*.22;player.cool=Math.max(0,player.cool-1);player.power=Math.max(0,player.power-1);player.rope=Math.max(0,player.rope-1);if(power&&player.stamina>6){player.power=30;player.stamina-=.8}let climb=(up?.85:.24)+(player.power?.55:0)+(player.combo*.035);player.y-=climb;player.stamina=clamp(player.stamina-(up?.18:.05)+(player.power?.22:.08),0,100);if(player.y<245){let d=245-player.y;player.y=245;holds.forEach(o=>o.y+=d+1.5);rocks.forEach(o=>o.y+=d+1.5);powers.forEach(o=>o.y+=d+1.5)}player.height=Math.max(player.height,Math.floor((560-player.y+tick*.35)*.7));if(grab&&player.cool<=0){player.cool=18;let hit=null,dist=999;holds.forEach(h=>{let d=Math.hypot(h.x-player.x,h.y-player.y);if(!h.hit&&d<58&&d<dist){hit=h;dist=d}});if(hit){hit.hit=true;player.combo=hit.good?clamp(player.combo+.18,1,5):1;player.stamina=clamp(player.stamina+(hit.type==='jug'?10:4),0,100);let pts=(hit.good?120:35)*player.combo;score+=pts;msg=hit.good?'Clean grab +'+Math.floor(pts):'Sketchy hold';burst(hit.x,hit.y,18,hit.good?'#86efac':'#fb7185')}else{player.combo=1;player.stamina-=8;shake=8;msg='Air grab'}}rocks.forEach(r=>{r.y+=r.v;if(Math.hypot(r.x-player.x,r.y-player.y)<35){if(player.rope){msg='Rope save';r.y=999;burst(player.x,player.y,16,'#93c5fd')}else{player.stamina-=22;player.combo=1;shake=14;msg='Loose rock';r.y=999;burst(player.x,player.y,16,'#fb7185')}}});powers.forEach(p=>{if(!p.got&&Math.hypot(p.x-player.x,p.y-player.y)<42){p.got=true;if(p.type==='chalk'){player.stamina=100;player.power=90;msg='Chalk boost'}else{player.rope=260;msg='Rope shield'}burst(p.x,p.y,22,'#e0f2fe')}});holds=holds.filter(h=>h.y<H+100);rocks=rocks.filter(r=>r.y<H+100);powers=powers.filter(p=>p.y<H+100&&!p.got);let top=Math.min.apply(null,holds.map(h=>h.y));if(top>-800)for(let y=top-72;y>top-720;y-=72)addHold(y);bits.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.vy+=.13;b.life--});bits=bits.filter(b=>b.life>0);score+=.18*player.combo;if(mode==='level'&&player.height>=1000)gameOver('Summit reached!');if(player.stamina<=0)gameOver('Grip gave out.');ui.mode.textContent=mode==='level'?'SUMMIT':'ENDLESS';ui.score.textContent=Math.floor(score);ui.height.textContent=player.height+' ft';ui.stamina.textContent=Math.floor(player.stamina);ui.combo.textContent=player.combo.toFixed(1)+'x'}
function draw(){if(shake)shake*=.84;ctx.fillStyle='#111827';ctx.fillRect(0,0,W,H);for(let i=0;i<18;i++)rect((i*73+Math.sin(tick/40+i)*20)%W,0,4,H,'#1f2937');for(let y=-80;y<H+80;y+=64)rect(50,y+(tick%64),W-100,4,'rgba(148,163,184,.18)');rect(54,0,8,H,'#334155');rect(W-62,0,8,H,'#334155');holds.forEach(h=>{let col=h.hit?'#4ade80':h.good?(h.type==='jug'?'#facc15':'#38bdf8'):'#64748b';rect(h.x-18,h.y-8,36,16,col);rect(h.x-10,h.y-13,20,7,col)});rocks.forEach(r=>{rect(r.x-15,r.y-14,30,28,'#78716c');rect(r.x-6,r.y-22,14,11,'#a8a29e')});powers.forEach(p=>{if(p.got)return;rect(p.x-15,p.y-15,30,30,p.type==='chalk'?'#e0f2fe':'#93c5fd');ctx.fillStyle='#0f172a';ctx.font='900 18px monospace';ctx.textAlign='center';ctx.fillText(p.type==='chalk'?'C':'R',p.x,p.y+6)});bits.forEach(b=>rect(b.x,b.y,4,4,b.color));let sx=shake?rnd(-shake,shake):0;ctx.save();ctx.translate(player.x+sx,player.y);rect(-14,-31,28,28,'#f59e0b');rect(-18,-2,36,44,player.power?'#fef9c3':'#dc2626');rect(-34,0,16,10,'#f59e0b');rect(18,0,16,10,'#f59e0b');rect(-22,42,14,28,'#1f2937');rect(8,42,14,28,'#1f2937');rect(-6,-20,4,4,'#111827');rect(8,-20,4,4,'#111827');if(player.rope){ctx.strokeStyle='rgba(147,197,253,.8)';ctx.lineWidth=5;ctx.beginPath();ctx.arc(0,8,48,0,7);ctx.stroke()}ctx.restore();ctx.fillStyle='rgba(3,7,18,.68)';ctx.fillRect(16,H-62,W-32,42);ctx.fillStyle='#fff';ctx.font='900 16px monospace';ctx.textAlign='center';ctx.fillText(msg,W/2,H-36);ctx.fillStyle='#bae6fd';ctx.font='900 12px monospace';ctx.fillText('BEST '+best+' · blue/yellow holds good · gray sketchy · C chalk · R rope',W/2,H-16)}
function loop(){update();draw();requestAnimationFrame(loop)}
document.getElementById('endless').onclick=()=>start('endless');document.getElementById('level').onclick=()=>start('level');
addEventListener('keydown',e=>{keys[e.key]=true;keys[e.code]=true;if(['ArrowLeft','ArrowRight','ArrowUp','Space',' '].includes(e.key)||e.code==='Space')e.preventDefault()});addEventListener('keyup',e=>{keys[e.key]=false;keys[e.code]=false});[['left','ArrowLeft'],['right','ArrowRight'],['up','ArrowUp'],['grab',' '],['power','Shift']].forEach(([id,k])=>{let b=document.getElementById(id);b.onpointerdown=e=>{keys[k]=true;e.preventDefault()};b.onpointerup=b.onpointercancel=()=>keys[k]=false});let sx=0,sy=0;c.onpointerdown=e=>{sx=e.clientX;sy=e.clientY};c.onpointerup=e=>{let dx=e.clientX-sx,dy=e.clientY-sy;if(Math.abs(dx)>35)player.lane=clamp(player.lane+(dx>0?1:-1),0,3);else if(dy<-35){keys.ArrowUp=true;setTimeout(()=>keys.ArrowUp=false,160)}else{keys[' ']=true;setTimeout(()=>keys[' ']=false,90)}};seed();loop();
})();
</script>
</body></html>
