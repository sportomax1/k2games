<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Crusher</title>
    <style>
        :root {
            --bg: #121212;
            --text: #e0e0e0;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --error: #cf6679;
            --surface: #1e1e1e;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        #game-container {
            max-width: 800px;
            width: 100%;
            background: var(--surface);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 { color: var(--primary); margin-bottom: 2rem; }

        #stats-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 2rem;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .stat-item span { color: var(--secondary); }

        #display-area {
            font-size: 1.8rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            text-align: left;
            position: relative;
            user-select: none;
            min-height: 150px;
        }

        .char { position: relative; }
        .char.correct { color: var(--secondary); }
        .char.incorrect { color: var(--error); background: rgba(207, 102, 121, 0.2); }
        .char.current { border-bottom: 3px solid var(--primary); }

        #input-field {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        #result-screen {
            display: none;
        }

        .btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 1rem;
        }

        .btn:hover { background: var(--secondary); }

        #timer-ring {
            width: 100px;
            height: 100px;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 5px solid var(--surface);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            font-size: 1.5rem;
        }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CCZ9JJGEDP');
    </script>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <h1>Key Crusher</h1>
        <p>Test your typing speed (WPM) and accuracy!</p>
        <button class="btn" onclick="startGame()">Start 60s Challenge</button>
    </div>

    <div id="game-screen" style="display: none;">
        <div id="stats-bar">
            <div class="stat-item">WPM: <span id="wpm">0</span></div>
            <div class="stat-item">Acc: <span id="accuracy">100</span>%</div>
            <div class="stat-item">Time: <span id="timer">60</span>s</div>
        </div>
        <div id="display-area">
            <!-- Text generated here -->
        </div>
        <input type="text" id="input-field" autocomplete="off" autofocus>
        <p style="color: var(--muted); font-size: 0.8rem;">Start typing to begin...</p>
    </div>

    <div id="result-screen">
        <h1>Challenge Complete!</h1>
        <div id="final-stats" style="font-size: 2rem; margin: 2rem 0;">
            WPM: <span id="final-wpm" style="color: var(--secondary);">0</span><br>
            Accuracy: <span id="final-accuracy" style="color: var(--primary);">0</span>%
        </div>
        <button class="btn" onclick="resetGame()">Try Again</button>
    </div>
</div>

<script>
    const sentences = [
        "The quick brown fox jumps over the lazy dog.",
        "Programming is the art of telling another human what one wants the computer to do.",
        "Simple is better than complex, and complex is better than complicated.",
        "Quality is not an act, it is a habit that defines our best work.",
        "Stay hungry, stay foolish, and always keep pushing the boundaries of what is possible.",
        "In the middle of every difficulty lies a great opportunity for those who look.",
        "Action is the foundational key to all success in any endeavor you choose.",
        "Success is not final, failure is not fatal: it is the courage to continue that counts.",
        "Believe you can and you are halfway there to achieving your wildest dreams.",
        "The only way to do great work is to love what you do every single day."
    ];

    let timer = 60;
    let timerInterval;
    let gameActive = false;
    let currentText = "";
    let charIndex = 0;
    let mistakes = 0;
    let startTime;

    const displayArea = document.getElementById('display-area');
    const inputField = document.getElementById('input-field');
    const wpmEl = document.getElementById('wpm');
    const accuracyEl = document.getElementById('accuracy');
    const timerEl = document.getElementById('timer');

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        resetStats();
        loadNewText();
        inputField.focus();
        
        // Listen for input
        inputField.addEventListener('input', handleInput);
        document.addEventListener('keydown', () => inputField.focus());
        displayArea.addEventListener('click', () => inputField.focus());
    }

    function resetStats() {
        timer = 60;
        charIndex = 0;
        mistakes = 0;
        gameActive = false;
        clearInterval(timerInterval);
        wpmEl.innerText = 0;
        accuracyEl.innerText = 100;
        timerEl.innerText = 60;
    }

    function loadNewText() {
        currentText = sentences[Math.floor(Math.random() * sentences.length)];
        displayArea.innerHTML = "";
        currentText.split("").forEach(char => {
            const span = document.createElement('span');
            span.classList.add('char');
            span.innerText = char;
            displayArea.appendChild(span);
        });
        displayArea.children[0].classList.add('current');
        charIndex = 0;
    }

    function handleInput(e) {
        if (!gameActive) {
            gameActive = true;
            startTime = new Date();
            startTimer();
        }

        const characters = displayArea.querySelectorAll('.char');
        const typedChar = inputField.value.split("")[charIndex];

        if (typedChar == null) {
            // Handle backspace if allowed, but here we just advance
            return;
        }

        if (typedChar === currentText[charIndex]) {
            characters[charIndex].classList.add('correct');
        } else {
            mistakes++;
            characters[charIndex].classList.add('incorrect');
        }

        characters[charIndex].classList.remove('current');
        charIndex++;

        if (charIndex < currentText.length) {
            characters[charIndex].classList.add('current');
        } else {
            inputField.value = "";
            loadNewText();
            return;
        }

        // Calculate Stats
        let timePassed = (new Date() - startTime) / 60000; // in minutes
        let wpm = Math.round(((charIndex - mistakes) / 5) / timePassed);
        wpm = wpm < 0 || !wpm || wpm === Infinity ? 0 : wpm;
        
        wpmEl.innerText = wpm;
        let acc = Math.round(((charIndex - mistakes) / charIndex) * 100);
        accuracyEl.innerText = acc;
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            if (timer > 0) {
                timer--;
                timerEl.innerText = timer;
            } else {
                endGame();
            }
        }, 1000);
    }

    function endGame() {
        clearInterval(timerInterval);
        gameActive = false;
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-wpm').innerText = wpmEl.innerText;
        document.getElementById('final-accuracy').innerText = accuracyEl.innerText;
    }

    function resetGame() {
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'block';
    }
</script>

</body>
</html>
