<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frogger Ultra: Elite Edition</title>
    <style>
        :root {
            --bg: #020617;
            --surface: #1e293b;
            --accent: #2ecc71;
            --danger: #ef4444;
            --gold: #f59e0b;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        nav {
            height: 60px;
            padding: 0 1.5rem;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .logo { font-weight: 900; font-size: 1.2rem; color: var(--accent); letter-spacing: -0.5px; }
        .back-link { color: #94a3b8; text-decoration: none; font-size: 0.8rem; font-weight: bold; }

        #game-container {
            position: relative;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow: hidden;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
        }

        canvas { 
            background: #000; 
            border: 4px solid #334155; 
            border-radius: 12px; 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .ui-overlay {
            position: absolute; top: 25px; left: 25px; right: 25px;
            display: flex; justify-content: space-between; pointer-events: none; z-index: 50;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.8);
            padding: 10px 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            text-align: center;
            min-width: 110px;
        }

        .stat-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; display: block; margin-bottom: 2px; }
        .stat-val { font-size: 1.4rem; font-weight: 900; font-family: monospace; color: var(--accent); }

        #mobile-controls {
            position: absolute; bottom: 30px; right: 30px;
            display: grid;
            grid-template-areas: 
                ". up ."
                "left . right"
                ". down .";
            gap: 12px;
            z-index: 150;
        }

        .dpad-btn {
            width: 70px; height: 70px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.8rem; cursor: pointer;
            backdrop-filter: blur(10px); transition: 0.1s;
        }

        .dpad-btn:active { background: var(--accent); transform: scale(0.9); }
        .up { grid-area: up; } .down { grid-area: down; } .left { grid-area: left; } .right { grid-area: right; }

        @media (min-width: 1025px) { #mobile-controls { display: none; } }

        .screen {
            position: absolute; inset: 0;
            background: rgba(2, 6, 23, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; text-align: center; padding: 20px; backdrop-filter: blur(15px);
        }

        h1 { font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; font-style: italic; color: var(--accent); margin-bottom: 10px; }
        
        .btn-large {
            background: var(--accent); color: #000; border: none; padding: 1.2rem 4rem;
            border-radius: 100px; font-weight: 900; cursor: pointer; margin-top: 2rem;
            font-size: 1.4rem; box-shadow: 0 15px 30px rgba(46, 204, 113, 0.4);
            text-transform: uppercase; letter-spacing: 2px;
        }

        #win-overlay {
            position: absolute; inset: 0; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            background: rgba(6, 78, 59, 0.9); z-index: 300; backdrop-filter: blur(10px);
            animation: fadeIn 0.5s forwards;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <nav>
        <div class="logo">K2 FROGGER ULTRA</div>
        <a href="index.html" class="back-link">← EXIT HUB</a>
    </nav>

    <div id="game-container">
        <canvas id="frogger"></canvas>
        
        <div class="ui-overlay">
            <div class="stat-card">
                <span class="stat-label">HI-SCORE</span>
                <div id="hi-score" class="stat-val">0000</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">SCORE</span>
                <div id="score" class="stat-val">0000</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">LIVES</span>
                <div id="lives" class="stat-val">❤❤❤</div>
            </div>
        </div>

        <div id="mobile-controls">
            <button class="dpad-btn up" onpointerdown="game.inputMove('up')">▲</button>
            <button class="dpad-btn left" onpointerdown="game.inputMove('left')">◀</button>
            <button class="dpad-btn right" onpointerdown="game.inputMove('right')">▶</button>
            <button class="dpad-btn down" onpointerdown="game.inputMove('down')">▼</button>
        </div>

        <div id="start-screen" class="screen">
            <h1>FROGGER</h1>
            <p style="opacity: 0.7; font-size: 1.2rem; max-width: 400px;">Help the frog reach the top lily pads while dodging high-speed traffic and crossing the river!</p>
            <button class="btn-large" onclick="game.start()">KICK OFF</button>
        </div>

        <div id="win-overlay" class="screen">
            <h1 style="color: var(--gold); text-shadow: 0 0 30px rgba(245, 158, 11, 0.5);">🏆 VICTORY!</h1>
            <p id="final-stats" style="font-size: 1.8rem; font-weight: 900; margin-top: 10px;"></p>
            <button class="btn-large" onclick="location.reload()">NEXT ROUND</button>
        </div>
    </div>

    <script>
        const GRID = 48;
        const COLORS = {
            grass: '#14532d', road: '#1e293b', water: '#0c4a6e', 
            safe: '#334155', goal: '#064e3b', car1: '#ef4444', 
            car2: '#f59e0b', truck: '#94a3b8', log: '#78350f'
        };

        class Frogger {
            constructor() {
                this.canvas = document.getElementById('frogger');
                this.ctx = this.canvas.getContext('2d');
                this.canvas.width = 11 * GRID;
                this.canvas.height = 13 * GRID;

                this.frog = { 
                    x: 5 * GRID, y: 12 * GRID, 
                    targetX: 5 * GRID, targetY: 12 * GRID,
                    jumpAnim: 0, w: 32, h: 32, side: 'up'
                };
                
                this.score = 0;
                this.hiScore = parseInt(localStorage.getItem('k2-frogger-hi') || 0);
                this.lives = 3;
                this.gameFrame = 0;
                this.active = false;
                this.particles = [];

                this.rows = [
                    { y: 12*GRID, type: 'safe', color: COLORS.grass },
                    { y: 11*GRID, type: 'road', speed: -2.8, color: COLORS.road, items: [{x:0, w:50, c:COLORS.car1}, {x:250, w:50, c:COLORS.car1}, {x:450, w:50, c:COLORS.car1}] },
                    { y: 10*GRID, type: 'road', speed: 2.2, color: COLORS.road, items: [{x:100, w:90, c:COLORS.truck}, {x:400, w:90, c:COLORS.truck}] },
                    { y: 9*GRID, type: 'road', speed: -3.8, color: COLORS.road, items: [{x:50, w:50, c:COLORS.car2}, {x:220, w:50, c:COLORS.car2}, {x:380, w:50, c:COLORS.car2}] },
                    { y: 8*GRID, type: 'road', speed: 2.5, color: COLORS.road, items: [{x:0, w:50, c:COLORS.car1}, {x:300, w:50, c:COLORS.car1}] },
                    { y: 7*GRID, type: 'road', speed: -1.8, color: COLORS.road, items: [{x:120, w:120, c:COLORS.truck}, {x:420, w:120, c:COLORS.truck}] },
                    { y: 6*GRID, type: 'safe', color: COLORS.grass },
                    { y: 5*GRID, type: 'water', speed: -2.0, color: COLORS.water, items: [{x:0, w:160}, {x:320, w:160}] },
                    { y: 4*GRID, type: 'water', speed: 3.0, color: COLORS.water, items: [{x:40, w:110}, {x:240, w:110}, {x:440, w:110}] },
                    { y: 3*GRID, type: 'water', speed: -3.2, color: COLORS.water, items: [{x:0, w:200}, {x:380, w:200}] },
                    { y: 2*GRID, type: 'water', speed: 1.5, color: COLORS.water, items: [{x:80, w:130}, {x:300, w:130}] },
                    { y: 1*GRID, type: 'water', speed: -2.4, color: COLORS.water, items: [{x:20, w:150}, {x:280, w:150}] },
                    { y: 0*GRID, type: 'goal', color: COLORS.goal }
                ];

                window.onkeydown = (e) => this.handleKey(e.code);
                this.setupGamepad();
                this.loop = this.loop.bind(this);
                this.updateUI();
            }

            start() {
                this.active = true;
                document.getElementById('start-screen').style.display = 'none';
                this.loop();
            }

            handleKey(code) {
                if (!this.active) return;
                if(code === 'ArrowUp' || code === 'KeyW') this.inputMove('up');
                if(code === 'ArrowDown' || code === 'KeyS') this.inputMove('down');
                if(code === 'ArrowLeft' || code === 'KeyA') this.inputMove('left');
                if(code === 'ArrowRight' || code === 'KeyD') this.inputMove('right');
            }

            setupGamepad() {
                let lastP = 0;
                const poll = () => {
                    const pads = navigator.getGamepads();
                    if (pads[0]) {
                        const p = pads[0]; const now = Date.now();
                        if (now - lastP > 180) {
                            const b = p.buttons; const ax = p.axes[0], ay = p.axes[1];
                            if (ay < -0.5 || b[12].pressed) this.inputMove('up');
                            else if (ay > 0.5 || b[13].pressed) this.inputMove('down');
                            else if (ax < -0.5 || b[14].pressed) this.inputMove('left');
                            else if (ax > 0.5 || b[15].pressed) this.inputMove('right');
                            lastP = now;
                        }
                    }
                    requestAnimationFrame(poll);
                };
                poll();
            }

            inputMove(dir) {
                if (!this.active || this.frog.jumpAnim > 0) return;
                
                if(dir === 'up' && this.frog.targetY > 0) this.frog.targetY -= GRID;
                if(dir === 'down' && this.frog.targetY < 12*GRID) this.frog.targetY += GRID;
                if(dir === 'left' && this.frog.targetX > 0) this.frog.targetX -= GRID;
                if(dir === 'right' && this.frog.targetX < this.canvas.width - GRID) this.frog.targetX += GRID;
                
                this.frog.jumpAnim = 1.0;
                this.frog.side = dir;
                this.score += 10;
            }

            die(cause) {
                this.lives--;
                this.spawnParticles(this.frog.x + GRID/2, this.frog.y + GRID/2, cause === 'water' ? '#3b82f6' : '#ef4444', 20);
                
                if(this.lives <= 0) {
                    if(this.score > this.hiScore) {
                        this.hiScore = this.score;
                        localStorage.setItem('k2-frogger-hi', this.hiScore);
                    }
                    alert("GAME OVER! Final Score: " + this.score);
                    this.score = 0; this.lives = 3;
                }
                
                this.frog.x = this.frog.targetX = 5 * GRID;
                this.frog.y = this.frog.targetY = 12 * GRID;
                this.frog.jumpAnim = 0;
            }

            win() {
                this.active = false;
                this.score += 1000;
                if(this.score > this.hiScore) {
                    this.hiScore = this.score;
                    localStorage.setItem('k2-frogger-hi', this.hiScore);
                }
                this.updateUI();
                
                document.getElementById('win-overlay').style.display = 'flex';
                document.getElementById('final-stats').textContent = `SCORE: ${this.score}`;
                
                // Winning Celebration Particles
                for(let i=0; i<100; i++) {
                    setTimeout(() => {
                        this.spawnParticles(Math.random() * this.canvas.width, Math.random() * this.canvas.height, ['#f59e0b', '#2ecc71', '#ef4444', '#3b82f6'][Math.floor(Math.random()*4)], 15);
                    }, i * 50);
                }
            }

            spawnParticles(x, y, color, count) {
                for(let i=0; i<count; i++) {
                    this.particles.push({
                        x, y,
                        vx: (Math.random()-0.5)*15,
                        vy: (Math.random()-0.5)*15,
                        life: 1.0,
                        color
                    });
                }
            }

            update() {
                this.gameFrame++;
                
                // Frog Jump Lerp
                if(this.frog.jumpAnim > 0) {
                    this.frog.jumpAnim -= 0.15;
                    if(this.frog.jumpAnim < 0) this.frog.jumpAnim = 0;
                    this.frog.x += (this.frog.targetX - this.frog.x) * 0.4;
                    this.frog.y += (this.frog.targetY - this.frog.y) * 0.4;
                }

                let onLog = false;
                let logSpeed = 0;

                this.rows.forEach(r => {
                    if(r.items) {
                        r.items.forEach(item => {
                            item.x += r.speed;
                            if(item.x > this.canvas.width + 150) item.x = -150;
                            if(item.x < -150) item.x = this.canvas.width + 150;

                            if(r.type === 'road') {
                                // Hitbox slightly smaller than visual
                                if(this.rectIntersect(this.frog.x+12, this.frog.y+12, 24, 24, item.x, r.y+6, item.w, GRID-12)) {
                                    this.die('road');
                                }
                            } else if (r.type === 'water') {
                                if(Math.abs(this.frog.y - r.y) < 10) {
                                    if(this.frog.x + 24 > item.x && this.frog.x + 24 < item.x + item.w) {
                                        onLog = true;
                                        logSpeed = r.speed;
                                    }
                                }
                            }
                        });
                    }
                });

                const currentRow = this.rows.find(r => Math.abs(this.frog.y - r.y) < 10);
                if(currentRow && currentRow.type === 'water' && this.frog.jumpAnim <= 0) {
                    if(!onLog) this.die('water');
                    else {
                        this.frog.x += logSpeed;
                        this.frog.targetX += logSpeed;
                    }
                }

                if(this.frog.x < -GRID/2 || this.frog.x > this.canvas.width - GRID/2) this.die('water');
                
                if(this.frog.y < GRID / 2 && this.active) {
                    this.win();
                }

                // Particles
                for(let i=this.particles.length-1; i>=0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx; p.y += p.vy; p.vy += 0.5; p.life -= 0.02;
                    if(p.life <= 0) this.particles.splice(i, 1);
                }

                this.updateUI();
            }

            rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) {
                return x2 < x1 + w1 && x2 + w2 > x1 && y2 < y1 + h1 && y2 + h2 > y1;
            }

            updateUI() {
                document.getElementById('score').textContent = this.score.toString().padStart(4, '0');
                document.getElementById('hi-score').textContent = this.hiScore.toString().padStart(4, '0');
                document.getElementById('lives').textContent = "❤".repeat(Math.max(0, this.lives));
            }

            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.rows.forEach(r => {
                    // Draw Row BG
                    ctx.fillStyle = r.color;
                    ctx.fillRect(0, r.y, this.canvas.width, GRID);

                    if(r.type === 'road') {
                        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
                        ctx.setLineDash([20, 25]);
                        ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.moveTo(0, r.y + GRID/2); ctx.lineTo(this.canvas.width, r.y + GRID/2); ctx.stroke();
                        ctx.setLineDash([]);
                    }
                    if(r.type === 'water') {
                        // Water Shader Effect
                        const wave = Math.sin(this.gameFrame * 0.05 + r.y * 0.1) * 10;
                        ctx.fillStyle = 'rgba(255,255,255,0.05)';
                        for(let i=-50; i<this.canvas.width+50; i+=100) {
                            ctx.fillRect(i + wave, r.y + GRID/2 - 1, 40, 2);
                        }
                    }

                    if(r.items) {
                        r.items.forEach(item => {
                            if(r.type === 'road') {
                                // Draw High Quality Cars
                                ctx.save();
                                ctx.translate(item.x, r.y + 6);
                                if(r.speed < 0) { ctx.scale(-1, 1); ctx.translate(-item.w, 0); }
                                
                                // Body
                                ctx.fillStyle = item.c;
                                ctx.beginPath(); ctx.roundRect(0, 0, item.w, GRID-12, 8); ctx.fill();
                                // Windows
                                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                                ctx.fillRect(item.w - 20, 4, 15, GRID-20);
                                // Wheels
                                ctx.fillStyle = '#111';
                                ctx.fillRect(5, -2, 12, 4); ctx.fillRect(item.w-17, -2, 12, 4);
                                ctx.fillRect(5, GRID-14, 12, 4); ctx.fillRect(item.w-17, GRID-14, 12, 4);
                                // Headlights
                                ctx.fillStyle = '#fff';
                                ctx.shadowBlur = 10; ctx.shadowColor = '#fff';
                                ctx.fillRect(item.w - 5, 5, 5, 8); ctx.fillRect(item.w - 5, GRID-25, 5, 8);
                                ctx.restore();
                            } else {
                                // Draw High Quality Logs
                                ctx.save();
                                ctx.translate(item.x, r.y + 4);
                                ctx.fillStyle = COLORS.log;
                                ctx.beginPath(); ctx.roundRect(0, 0, item.w, GRID-8, 15); ctx.fill();
                                // Bark Detail
                                ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 2;
                                for(let lx=15; lx<item.w-10; lx+=30) {
                                    ctx.beginPath(); ctx.moveTo(lx, 5); ctx.lineTo(lx+10, GRID-15); ctx.stroke();
                                }
                                ctx.restore();
                            }
                        });
                    }
                });

                // Goal lily pads
                ctx.fillStyle = COLORS.goal;
                for(let i=0; i<5; i++) {
                    const gx = (i * 2 + 1) * GRID;
                    ctx.beginPath(); ctx.arc(gx + GRID/2, GRID/2, 20, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 2; ctx.stroke();
                }

                // Draw Frog with Jump Animation
                ctx.save();
                const jumpScale = 1.0 + Math.sin(this.frog.jumpAnim * Math.PI) * 0.5;
                const squashX = 1.0 / jumpScale;
                const squashY = jumpScale;
                
                ctx.translate(this.frog.x + GRID/2, this.frog.y + GRID/2);
                ctx.scale(squashX, squashY);
                
                ctx.font = '36px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // Rotate based on direction
                const rots = { up: 0, down: Math.PI, left: -Math.PI/2, right: Math.PI/2 };
                ctx.rotate(rots[this.frog.side]);
                
                ctx.fillText('🐸', 0, 0);
                ctx.restore();

                // Draw Particles
                this.particles.forEach(p => {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
                });
                ctx.globalAlpha = 1.0;
            }

            loop() {
                this.update();
                this.draw();
                if(this.active || this.particles.length > 0) {
                    requestAnimationFrame(this.loop);
                }
            }
        }

        const game = new Frogger();
    </script>
</body>
</html>
