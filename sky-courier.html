<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K2 Planes: Global Elite - K2 games</title>
    <style>
        :root {
            --bg: #0f172a;
            --primary: #3b82f6;
            --accent: #fbbf24;
            --panel: rgba(30, 41, 59, 0.95);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: white; font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        nav {
            height: 60px; padding: 0 1.5rem;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; border-bottom: 1px solid var(--border);
        }

        .logo { font-weight: 900; font-size: 1.2rem; color: var(--accent); letter-spacing: -0.5px; }
        .back-link { color: #94a3b8; text-decoration: none; font-size: 0.8rem; font-weight: bold; }

        #game-layout { flex: 1; display: grid; grid-template-columns: 380px 1fr; overflow: hidden; }

        @media (max-width: 1024px) {
            #game-layout { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
            #sidebar { order: 2; border-right: none; border-top: 1px solid var(--border); }
        }

        /* Map Area */
        #map-area { position: relative; background: #1e293b; overflow: hidden; }
        canvas { width: 100%; height: 100%; cursor: crosshair; }

        /* Sidebar */
        #sidebar {
            background: var(--panel); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 20px; gap: 20px; overflow-y: auto;
        }

        .section-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #94a3b8; font-weight: 800; }

        .plane-card {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 12px; padding: 15px; cursor: pointer; transition: 0.2s;
        }
        .plane-card.selected { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }

        .plane-info { display: flex; justify-content: space-between; align-items: center; }
        .plane-status { font-size: 0.6rem; padding: 2px 8px; border-radius: 50px; background: #334155; }
        .plane-status.flying { background: var(--primary); }

        .job-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .job-item { 
            background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; font-size: 0.8rem; 
            display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent;
        }
        .job-item.selected { border-color: var(--accent); background: rgba(251, 191, 36, 0.1); }

        #stats-hud {
            position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7);
            padding: 10px 20px; border-radius: 50px; display: flex; gap: 20px;
            font-weight: 900; border: 1px solid var(--border); z-index: 50;
        }

        .btn-action {
            background: var(--accent); color: #000; border: none; padding: 12px;
            border-radius: 10px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 10px;
        }
        .btn-action:disabled { opacity: 0.3; cursor: not-allowed; }

        .cargo-bay { display: flex; gap: 5px; margin-top: 5px; }
        .cargo-slot { width: 25px; height: 25px; background: rgba(255,255,255,0.1); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
    </style>

<body>
    <nav>
        <div class="logo">K2 PLANES ELITE</div>
        <a href="index.html" class="back-link">← EXIT HUB</a>
    </nav>

    <div id="game-layout">
        <aside id="sidebar">
            <div id="plane-detail" style="margin-bottom: 20px;">
                <div class="section-title">Current Plane</div>
                <div id="selected-plane-info" style="margin-top:10px"></div>
            </div>
            
            <div id="job-board">
                <div class="section-title">Job Board: <span id="current-city-name">Select City</span></div>
                <div id="jobs-container" class="job-list"></div>
                <button class="btn-action" id="fly-btn" onclick="game.dispatchPlane()" disabled>TAKEOFF</button>
            </div>

            <div style="margin-top: auto">
                <div class="section-title">Fleet Status</div>
                <div id="fleet-list" style="display:flex; flex-direction:column; gap:10px; margin-top:10px;"></div>
            </div>
        </aside>

        <main id="map-area">
            <div id="stats-hud">
                <div>🪙 <span id="coins">2000</span></div>
                <div>⛽ <span id="fuel">1000</span></div>
            </div>
            <canvas id="mapCanvas"></canvas>
        </main>
    </div>

    <script>
        const CITIES = [
            { id: 'NYC', name: 'New York', x: 200, y: 300, color: '#fb7185' },
            { id: 'LDN', name: 'London', x: 550, y: 200, color: '#818cf8' },
            { id: 'PAR', name: 'Paris', x: 600, y: 250, color: '#4ade80' },
            { id: 'TKY', name: 'Tokyo', x: 900, y: 350, color: '#fbbf24' },
            { id: 'LAX', name: 'Los Angeles', x: 100, y: 350, color: '#38bdf8' },
            { id: 'SYD', name: 'Sydney', x: 850, y: 550, color: '#f472b6' }
        ];

        const JOB_TYPES = [
            { name: 'Passenger', icon: '👤', pay: 400 },
            { name: 'Cargo', icon: '📦', pay: 600 },
            { name: 'VIP', icon: '💎', pay: 1200 }
        ];

        class PocketPlanesElite {
            constructor() {
                this.canvas = document.getElementById('mapCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.resize();

                this.coins = 2000;
                this.fuel = 1000;
                this.planes = [
                    { id: 1, name: 'K2-Air 1', loc: 'NYC', dest: null, progress: 0, capacity: 2, cargo: [] }
                ];
                this.selectedPlane = this.planes[0];
                this.selectedCity = null;
                this.cityJobs = {};

                this.init();
            }

            resize() {
                this.canvas.width = this.canvas.offsetWidth;
                this.canvas.height = this.canvas.offsetHeight;
            }

            init() {
                CITIES.forEach(c => this.generateJobs(c.id));
                this.setupInputs();
                this.renderAll();
                setInterval(() => this.tick(), 100);
                setInterval(() => CITIES.forEach(c => this.generateJobs(c.id)), 15000);
            }

            generateJobs(cityId) {
                if(!this.cityJobs[cityId]) this.cityJobs[cityId] = [];
                if(this.cityJobs[cityId].length < 5) {
                    const dest = CITIES[Math.floor(Math.random()*CITIES.length)];
                    if(dest.id !== cityId) {
                        const type = JOB_TYPES[Math.floor(Math.random()*JOB_TYPES.length)];
                        this.cityJobs[cityId].push({ id: Math.random(), type, to: dest.id, toName: dest.name });
                    }
                }
            }

            setupInputs() {
                this.canvas.onclick = (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    const mx = e.clientX - rect.left;
                    const my = e.clientY - rect.top;
                    CITIES.forEach(c => {
                        const px = (c.x / 1000) * this.canvas.width;
                        const py = (c.y / 600) * this.canvas.height;
                        if(Math.hypot(mx - px, my - py) < 30) this.selectCity(c);
                    });
                };
            }

            selectCity(city) {
                this.selectedCity = city;
                this.renderAll();
            }

            loadJob(jobId) {
                if(this.selectedPlane.dest) return;
                const jobs = this.cityJobs[this.selectedPlane.loc];
                const jobIdx = jobs.findIndex(j => j.id === jobId);
                if(jobIdx > -1 && this.selectedPlane.cargo.length < this.selectedPlane.capacity) {
                    this.selectedPlane.cargo.push(jobs[jobIdx]);
                    jobs.splice(jobIdx, 1);
                    this.renderAll();
                }
            }

            dispatchPlane() {
                if(!this.selectedCity || this.selectedPlane.dest || this.selectedPlane.loc === this.selectedCity.id) return;
                
                const dist = Math.hypot(
                    CITIES.find(c => c.id === this.selectedPlane.loc).x - this.selectedCity.x,
                    CITIES.find(c => c.id === this.selectedPlane.loc).y - this.selectedCity.y
                );
                
                const fuelCost = Math.floor(dist / 2);
                if(this.fuel >= fuelCost) {
                    this.fuel -= fuelCost;
                    this.selectedPlane.dest = this.selectedCity.id;
                    this.selectedPlane.progress = 0;
                    this.selectedPlane.travelDist = dist;
                    this.renderAll();
                } else {
                    alert("Not enough fuel!");
                }
            }

            tick() {
                this.planes.forEach(p => {
                    if(p.dest) {
                        p.progress += 0.005;
                        if(p.progress >= 1) {
                            p.loc = p.dest;
                            p.dest = null;
                            p.progress = 0;
                            // Deliver cargo
                            p.cargo.forEach(c => {
                                if(c.to === p.loc) {
                                    this.coins += c.type.pay;
                                    this.fuel = Math.min(2000, this.fuel + 100);
                                }
                            });
                            p.cargo = p.cargo.filter(c => c.to !== p.loc);
                            this.renderAll();
                        }
                    }
                });
                this.draw();
            }

            renderAll() {
                this.renderSelected();
                this.renderJobs();
                this.renderFleet();
                document.getElementById('coins').textContent = Math.floor(this.coins);
                document.getElementById('fuel').textContent = Math.floor(this.fuel);
            }

            renderSelected() {
                const info = document.getElementById('selected-plane-info');
                const p = this.selectedPlane;
                info.innerHTML = `
                    <div class="plane-card selected">
                        <div class="plane-info"><b>${p.name}</b> <span class="plane-status ${p.dest ? 'flying' : ''}">${p.dest ? 'FLYING' : 'AT ' + p.loc}</span></div>
                        <div class="cargo-bay">
                            ${Array(p.capacity).fill(0).map((_, i) => `
                                <div class="cargo-slot">${p.cargo[i] ? p.cargo[i].type.icon : ''}</div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            renderJobs() {
                const container = document.getElementById('jobs-container');
                const cityName = document.getElementById('current-city-name');
                container.innerHTML = '';
                
                if(!this.selectedCity) return;
                cityName.textContent = this.selectedCity.name;

                if(this.selectedCity.id === this.selectedPlane.loc) {
                    const jobs = this.cityJobs[this.selectedCity.id] || [];
                    jobs.forEach(j => {
                        const div = document.createElement('div');
                        div.className = 'job-item';
                        div.innerHTML = `<div>${j.type.icon} ${j.type.name} to <b>${j.toName}</b></div> <div style="color:var(--accent)">$${j.type.pay}</div>`;
                        div.onclick = () => this.loadJob(j.id);
                        container.appendChild(div);
                    });
                } else {
                    container.innerHTML = '<div style="opacity:0.5; font-size:0.8rem">Plane is not at this airport. Select this city as destination below.</div>';
                }

                const flyBtn = document.getElementById('fly-btn');
                flyBtn.disabled = !this.selectedCity || this.selectedPlane.dest || this.selectedPlane.loc === this.selectedCity.id;
            }

            renderFleet() {
                const list = document.getElementById('fleet-list');
                list.innerHTML = this.planes.map(p => `
                    <div class="plane-card" onclick="game.selectedPlane = game.planes[0]; game.renderAll();">
                        <div class="plane-info"><b>${p.name}</b> <span>${p.dest ? 'In Flight' : p.loc}</span></div>
                    </div>
                `).join('');
            }

            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                const sw = this.canvas.width / 1000;
                const sh = this.canvas.height / 600;

                // Connection Lines
                ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                ctx.setLineDash([5, 5]);
                for(let i=0; i<CITIES.length; i++) {
                    for(let j=i+1; j<CITIES.length; j++) {
                        ctx.beginPath(); ctx.moveTo(CITIES[i].x * sw, CITIES[i].y * sh); ctx.lineTo(CITIES[j].x * sw, CITIES[j].y * sh); ctx.stroke();
                    }
                }
                ctx.setLineDash([]);

                // Cities
                CITIES.forEach(c => {
                    const isSelected = this.selectedCity?.id === c.id;
                    ctx.fillStyle = c.color;
                    ctx.beginPath(); ctx.arc(c.x * sw, c.y * sh, isSelected ? 12 : 8, 0, Math.PI*2); ctx.fill();
                    if(isSelected) { ctx.strokeStyle = 'white'; ctx.lineWidth = 3; ctx.stroke(); }
                    ctx.fillStyle = 'white'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
                    ctx.fillText(c.name, c.x * sw, c.y * sh + 25);
                });

                // Planes
                this.planes.forEach(p => {
                    let px, py;
                    if(p.dest) {
                        const start = CITIES.find(c => c.id === p.loc);
                        const end = CITIES.find(c => c.id === p.dest);
                        px = (start.x + (end.x - start.x) * p.progress) * sw;
                        py = (start.y + (end.y - start.y) * p.progress) * sh;
                        ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.moveTo(start.x * sw, start.y * sh); ctx.lineTo(end.x * sw, end.y * sh); ctx.stroke();
                    } else {
                        const loc = CITIES.find(c => c.id === p.loc);
                        px = loc.x * sw; py = loc.y * sh - 20;
                    }
                    ctx.font = '24px Arial'; ctx.textAlign = 'center';
                    ctx.fillText('✈️', px, py + 8);
                });
            }
        }
        const game = new PocketPlanesElite();
    </script>
</body>
</html>
