<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Eggscape Runner</title>
<style>/* styles from egg-hunt-master.html */
*{margin:0;padding:0;box-sizing:border-box}
body{background:#aaeeff;display:flex;justify-content:center;align-items:center;height:100dvh;overflow:hidden;font-family:Arial,sans-serif;touch-action:none}
#wrap{position:relative;width:100vw;height:100dvh}
canvas{display:block;width:100%;height:100%}
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:12px 16px;pointer-events:none;z-index:5}
.pill{background:rgba(30,100,30,.65);backdrop-filter:blur(5px);border:1px solid rgba(100,220,100,.4);border-radius:20px;padding:6px 14px;color:#fff;font-size:16px;font-weight:700}.pill span{color:#aaffaa}
#modal{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(10,50,10,.88);backdrop-filter:blur(10px);z-index:20}
.card{background:linear-gradient(145deg,#1a4418,#0d2e0d);border:2px solid rgba(120,220,80,.5);border-radius:28px;padding:34px 28px;max-width:360px;width:92%;text-align:center;box-shadow:0 0 50px rgba(60,200,60,.2),0 24px 50px rgba(0,0,0,.6)}</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas>
  <div id="hud"><div class="pill">🥚 <span id="sc">0</span></div><div class="pill">⭐ <span id="bs">0</span></div><div class="pill" id="lv">🥕🥕🥕</div></div>
  <div id="modal"><div class="card" id="card"><div class="icon">🐰</div><h1>EGGSCAPE RUNNER</h1><p class="sub">Hop platforms collecting Easter eggs!<br>Spring pads launch you sky-high!</p><button class="btn" id="startBtn">EGGSCAPE! 🥚</button></div></div>
</div>
<script>document.getElementById('startBtn').onclick=function(){document.getElementById('modal').classList.add('hide');};</script>
</body>
</html>
