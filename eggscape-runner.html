<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Eggscape Runner - K2 Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:#aaeeff;display:flex;justify-content:center;align-items:center;height:100dvh;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;touch-action:none}
#gc{position:relative;width:100%;max-width:480px;height:100dvh;overflow:hidden}
canvas{display:block;width:100%;height:100%}
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:14px 16px;pointer-events:none;z-index:10}
.pill{background:rgba(30,100,30,.65);backdrop-filter:blur(6px);border:1px solid rgba(100,220,100,.4);border-radius:22px;padding:7px 16px;color:#fff;font-size:16px;font-weight:700}
.pill span{color:#aaffaa}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(10,50,10,.92);backdrop-filter:blur(12px);z-index:20}
#overlay.hide{display:none}
.card{background:linear-gradient(145deg,#1a4418,#0d2e0d);border:2px solid rgba(120,220,80,.5);border-radius:28px;padding:36px 28px;max-width:340px;width:92%;text-align:center;box-shadow:0 0 50px rgba(60,200,60,.2),0 24px 50px rgba(0,0,0,.6)}
.icon{font-size:64px;animation:bob 1.3s ease-in-out infinite;display:block;margin-bottom:6px}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
h1{color:#55ff55;font-size:27px;font-weight:900;margin:6px 0 4px;text-shadow:0 0 18px rgba(100,200,100,.6);letter-spacing:2px}
.sub{color:#88dd88;font-size:13px;margin-bottom:14px;line-height:1.6}
.tips{background:rgba(255,255,255,.06);border-radius:12px;padding:12px 14px;margin-bottom:18px;text-align:left}
.tips div{color:#ccffcc;font-size:13px;margin:4px 0}
.tips b{color:#55ff55;margin-right:6px}
.btn{background:linear-gradient(135deg,#00aa44,#00ff66);color:#000;border:none;border-radius:50px;padding:14px 44px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(100,200,100,.45);letter-spacing:1px;transition:transform .1s;width:100%}
.btn:active{transform:scale(.96)}
.fscore{color:#00ff66;font-size:52px;font-weight:900;margin:8px 0;text-shadow:0 0 24px rgba(100,200,100,.7)}
#home{position:absolute;top:14px;right:16px;z-index:30;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:7px 14px;border-radius:8px;cursor:pointer;text-decoration:none;font-size:13px;font-weight:600;backdrop-filter:blur(4px)}
#mctrl{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:space-between;padding:20px 28px;z-index:10;pointer-events:none}
.mcbtn{width:78px;height:78px;border-radius:50%;background:rgba(0,200,100,.2);backdrop-filter:blur(4px);border:2px solid rgba(100,255,100,.4);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:24px;pointer-events:all;cursor:pointer;color:#fff;font-weight:700;transition:background .12s}
.mcbtn:active{background:rgba(0,200,100,.5)}
.mclabel{font-size:10px;margin-top:2px;letter-spacing:1px}
</style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-CCZ9JJGEDP');
</script>
</head>
<body>
<div id="gc">
  <canvas id="c"></canvas>
  <div id="hud">
    <div class="pill">🥚 <span id="sc">0</span></div>
    <div class="pill">⭐ <span id="bs">0</span></div>
    <div class="pill" id="lv">🥕🥕🥕</div>
  </div>
  <div id="mctrl">
    <div class="mcbtn" id="leftBtn">⬅️<div class="mclabel">LEFT</div></div>
    <div class="mcbtn" id="rightBtn">➡️<div class="mclabel">RIGHT</div></div>
  </div>
  <div id="overlay">
    <div class="card" id="card">
      <span class="icon">🐰</span>
      <h1>EGGSCAPE RUNNER</h1>
      <p class="sub">Hop across platforms collecting Easter eggs!<br>Spring pads launch you sky-high!</p>
      <div class="tips">
        <div><b>⬅➡</b>Arrow keys / Tap sides = move</div>
        <div><b>🐰</b>Bunny bounces automatically on platforms</div>
        <div><b>🌸</b>Pink spring pads = mega bounce!</div>
        <div><b>🥚</b>Collect eggs — don't fall below screen!</div>
      </div>
      <button class="btn" id="startBtn">EGGSCAPE! 🥚</button>
    </div>
  </div>
  <a href="index.html" id="home">🏠 Home</a>
</div>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
const gc=document.getElementById('gc');
let W,H,dpr;
function resize(){
  dpr=devicePixelRatio||1;
  W=gc.clientWidth; H=gc.clientHeight;
  C.width=W*dpr; C.height=H*dpr;
  C.style.width=W+'px'; C.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize); resize();

let gameActive=false,score=0,bestScore=parseInt(localStorage.getItem('er_best')||'0');
let lives=3,cameraY=0,frameN=0;

let platforms=[],eggs=[],particles=[];
let player={x:0,y:0,vx:0,vy:0,w:30,h:30,facing:1};
let keys={left:false,right:false};
let highestY=0;

const GRAVITY=0.5,JUMP=-13,SPRING_JUMP=-20,MOVE_SPD=4;

class Platform{
  constructor(x,y,w,type){
    this.x=x; this.y=y; this.w=w; this.h=12;
    this.type=type||'normal'; // normal, spring, moving
    this.bobPhase=Math.random()*Math.PI*2;
    if(this.type==='moving'){this.vx=1.5*(Math.random()>0.5?1:-1);}
  }
  update(){
    if(this.type==='moving'){
      this.x+=this.vx;
      if(this.x<0||this.x+this.w>W) this.vx*=-1;
    }
    this.bobPhase+=0.05;
  }
  draw(camY){
    const sy=this.y-camY;
    if(sy>H+20||sy<-30) return;
    if(this.type==='spring'){
      ctx.fillStyle='#ff88aa';
      ctx.shadowBlur=10; ctx.shadowColor='#ff88aa';
    } else if(this.type==='moving'){
      ctx.fillStyle='#88aaff';
      ctx.shadowBlur=6; ctx.shadowColor='#88aaff';
    } else {
      const g=ctx.createLinearGradient(this.x,sy,this.x,sy+this.h);
      g.addColorStop(0,'#66cc44');
      g.addColorStop(1,'#449922');
      ctx.fillStyle=g;
    }
    ctx.beginPath();
    ctx.roundRect(this.x,sy,this.w,this.h,6);
    ctx.fill();
    ctx.shadowBlur=0;
    // spring icon
    if(this.type==='spring'){
      ctx.fillStyle='#fff';
      ctx.font='10px Arial'; ctx.textAlign='center';
      ctx.fillText('🌸',this.x+this.w/2,sy+9);
    }
  }
}

class Egg{
  constructor(x,y){
    this.x=x; this.y=y;
    this.r=10; this.collected=false;
    this.bobPhase=Math.random()*Math.PI*2;
    this.color=`hsl(${Math.random()*360},80%,70%)`;
  }
  update(){this.bobPhase+=0.06;}
  draw(camY){
    const sy=this.y-camY+Math.sin(this.bobPhase)*3;
    if(sy>H+20||sy<-20||this.collected) return;
    ctx.fillStyle=this.color;
    ctx.shadowBlur=8; ctx.shadowColor=this.color;
    ctx.beginPath();
    ctx.ellipse(this.x,sy,this.r,this.r*1.3,0,0,Math.PI*2);
    ctx.fill();
    ctx.shadowBlur=0;
    // stripe
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(this.x-8,sy);
    ctx.quadraticCurveTo(this.x,sy-6,this.x+8,sy);
    ctx.stroke();
  }
}

class Particle{
  constructor(x,y,color){
    this.x=x; this.y=y;
    const a=Math.random()*Math.PI*2;
    const s=3+Math.random()*5;
    this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s-3;
    this.life=1; this.color=color; this.r=4+Math.random()*4;
  }
  update(){this.vy+=0.15;this.x+=this.vx;this.y+=this.vy;this.life-=0.03;return this.life>0;}
  draw(camY){
    ctx.globalAlpha=this.life;
    ctx.fillStyle=this.color;
    ctx.beginPath();ctx.arc(this.x,this.y-camY,this.r*this.life,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
}

function generateLevel(){
  platforms=[];
  eggs=[];
  // starting platform
  platforms.push(new Platform(W/2-50,H-60,100,'normal'));
  let y=H-60;
  for(let i=0;i<200;i++){
    y-=(50+Math.random()*60);
    const x=Math.random()*(W-90);
    const w=55+Math.random()*50;
    let type='normal';
    if(i>5&&Math.random()<0.15) type='spring';
    else if(i>5&&Math.random()<0.12) type='moving';
    platforms.push(new Platform(x,y,w,type));
    if(Math.random()<0.5) eggs.push(new Egg(x+w/2+(-20+Math.random()*40),y-25));
  }
}

function startGame(){
  score=0; lives=3; cameraY=0; frameN=0;
  highestY=H;
  generateLevel();
  player.x=W/2; player.y=H-100;
  player.vx=0; player.vy=0;
  document.getElementById('bs').textContent=bestScore;
  document.getElementById('overlay').classList.add('hide');
  gameActive=true;
}

function endGame(){
  gameActive=false;
  if(score>bestScore){bestScore=score;localStorage.setItem('er_best',bestScore);}
  const card=document.getElementById('card');
  card.innerHTML=`<span class="icon">🐰</span><h1>SPLAT!</h1><p class="fscore">${score}</p><p class="sub">Best: ${bestScore}</p><button class="btn" id="startBtn">EGGSCAPE! 🥚</button>`;
  document.getElementById('overlay').classList.remove('hide');
  document.getElementById('startBtn').onclick=startGame;
}

function update(){
  if(!gameActive)return;
  frameN++;

  // input
  let moveX=0;
  if(keys.left) moveX=-MOVE_SPD;
  if(keys.right) moveX=MOVE_SPD;
  player.vx=moveX;
  if(moveX!==0) player.facing=moveX>0?1:-1;

  // physics
  player.vy+=GRAVITY;
  player.vy=Math.min(player.vy,16);
  player.x+=player.vx;
  player.y+=player.vy;

  // wrap horizontal
  if(player.x<-10) player.x=W+10;
  if(player.x>W+10) player.x=-10;

  // platform collisions (only landing on top)
  if(player.vy>0){
    for(let p of platforms){
      p.update();
      const px=player.x, py=player.y;
      const prevY=py-player.vy;
      if(px>p.x-player.w/2&&px<p.x+p.w+player.w/2&&
         prevY+player.h/2<=p.y+4&&py+player.h/2>=p.y){
        if(p.type==='spring'){
          player.vy=SPRING_JUMP;
          for(let i=0;i<10;i++) particles.push(new Particle(player.x,player.y,'#ff88aa'));
        } else {
          player.vy=JUMP;
        }
        player.y=p.y-player.h/2;
        break;
      }
    }
  } else {
    platforms.forEach(p=>p.update());
  }

  // camera
  const targetCamY=player.y-H*0.4;
  if(targetCamY<cameraY) cameraY+=(targetCamY-cameraY)*0.1;

  // score height
  const height=Math.max(0,H-player.y);
  if(height>highestY-H){
    const newH=H-player.y;
    if(newH<highestY){
      score+=Math.floor((highestY-newH)/20);
      highestY=Math.min(highestY,newH);
    }
  }

  // collect eggs
  eggs.forEach(e=>{
    if(!e.collected&&Math.abs(player.x-e.x)<25&&Math.abs(player.y-e.y)<25){
      e.collected=true; score+=10;
      particles.push(new Particle(e.x,e.y,e.color));
    }
    e.update();
  });

  particles=particles.filter(p=>p.update());

  // fell off bottom
  if(player.y-cameraY>H+60){
    lives--;
    if(lives<=0){endGame();return;}
    // respawn on lowest visible platform
    const visible=platforms.filter(p=>p.y>cameraY&&p.y<cameraY+H);
    if(visible.length>0){
      const p=visible[visible.length-1];
      player.x=p.x+p.w/2; player.y=p.y-40;
    } else {
      player.y=cameraY+H/2;
    }
    player.vy=-8;
  }

  document.getElementById('sc').textContent=score;
  document.getElementById('lv').textContent='🥕'.repeat(Math.max(0,lives));
  document.getElementById('bs').textContent=bestScore;
}

function draw(){
  // sky gradient
  const sy=ctx.createLinearGradient(0,0,0,H);
  sy.addColorStop(0,'#66ccff');
  sy.addColorStop(0.6,'#aaeeff');
  sy.addColorStop(1,'#ccffee');
  ctx.fillStyle=sy; ctx.fillRect(0,0,W,H);

  // clouds
  ctx.fillStyle='rgba(255,255,255,0.7)';
  [[W*0.1,H*0.15+Math.sin(frameN*0.005)*5,60,25],
   [W*0.6,H*0.25+Math.sin(frameN*0.004+1)*5,80,30],
   [W*0.35,H*0.08+Math.sin(frameN*0.006+2)*4,50,20]
  ].forEach(([cx,cy,cw,ch])=>{
    ctx.beginPath();
    ctx.ellipse(cx,cy,cw,ch,0,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx-20,cy+5,cw*0.6,ch*0.7,0,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx+20,cy+5,cw*0.6,ch*0.7,0,0,Math.PI*2);
    ctx.fill();
  });

  // platforms
  platforms.forEach(p=>p.draw(cameraY));
  // eggs
  eggs.forEach(e=>e.draw(cameraY));
  // particles
  particles.forEach(p=>p.draw(cameraY));

  // player (bunny)
  const px=player.x, py=player.y-cameraY;
  ctx.save();
  ctx.translate(px,py);
  if(player.facing<0) ctx.scale(-1,1);
  ctx.font='30px serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🐰',0,0);
  ctx.restore();

  requestAnimationFrame(loop);
}

function loop(){update();draw();}

// Controls
document.addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left=true;
  if(e.code==='ArrowRight'||e.code==='KeyD') keys.right=true;
});
document.addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left=false;
  if(e.code==='ArrowRight'||e.code==='KeyD') keys.right=false;
});
document.getElementById('leftBtn').addEventListener('touchstart',e=>{e.preventDefault();keys.left=true;},{passive:false});
document.getElementById('leftBtn').addEventListener('touchend',e=>{e.preventDefault();keys.left=false;},{passive:false});
document.getElementById('rightBtn').addEventListener('touchstart',e=>{e.preventDefault();keys.right=true;},{passive:false});
document.getElementById('rightBtn').addEventListener('touchend',e=>{e.preventDefault();keys.right=false;},{passive:false});

document.getElementById('startBtn').onclick=startGame;
loop();
</script>
</body>
</html>
