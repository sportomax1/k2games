<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Call the Card - K2 games</title>
    <style>
        :root {
            --bg: #0f172a;
            --orange: #f97316;
            --green: #22c55e;
            --blue: #3b82f6;
            --star: #fbbf24;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        nav {
            height: 50px;
            padding: 0 1.5rem;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .logo { font-weight: 900; font-size: 1.2rem; color: var(--star); letter-spacing: 1px; }
        .restart-btn { 
            position: absolute; right: 1.5rem;
            background: rgba(255,255,255,0.1); border: 1px solid var(--border); 
            color: var(--text-main); padding: 5px 12px; border-radius: 5px; 
            cursor: pointer; font-weight: bold; font-size: 0.7rem; 
        }

        #game-layout {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            position: relative;
        }

        /* Players Area */
        #players-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 600px;
        }

        .player-chip {
            background: var(--glass);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            transition: 0.3s;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 70px;
        }
        .player-chip.active { border-color: var(--star); background: rgba(251, 191, 36, 0.1); }
        .player-chip .score { font-size: 1.4rem; font-weight: 900; color: white; line-height: 1; }
        .player-chip .name { font-size: 0.55rem; font-weight: bold; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
        
        /* Fixed: Guess preview moved into a non-overlapping slot */
        .player-chip .guess-slot {
            height: 20px;
            margin-top: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .player-chip .guess-preview { 
            font-size: 1.2rem; 
            opacity: 0; 
            transform: scale(0.5);
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .player-chip.revealed .guess-preview { opacity: 1; transform: scale(1); }

        /* Table Area */
        #table {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .card {
            width: 105px;
            height: 150px;
            background: #1e293b;
            border-radius: 15px;
            border: 4px solid white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: 900;
            color: white;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card.orange { background: var(--orange); }
        .card.green { background: var(--green); }
        .card.blue { background: var(--blue); }
        .card.star-card::after {
            content: '✨';
            position: absolute;
            top: 10px; right: 10px;
            font-size: 1.2rem;
        }

        .deck-info { font-size: 0.7rem; color: var(--text-muted); font-weight: bold; }

        /* Controls Area */
        #controls {
            width: 100%;
            max-width: 500px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }

        .guess-btn {
            background: var(--glass);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 12px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }
        .guess-btn:active { transform: scale(0.95); }
        .guess-btn:hover { background: rgba(255,255,255,0.15); border-color: var(--star); }
        .guess-btn span { font-size: 1.6rem; }
        .guess-btn label { font-size: 0.55rem; font-weight: 800; color: white; cursor: pointer; }
        .guess-btn.disabled { opacity: 0.2; pointer-events: none; }

        /* Overlays */
        .overlay {
            position: absolute; inset: 0;
            background: rgba(15, 23, 42, 0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; text-align: center; padding: 20px;
        }

        .btn-large {
            background: var(--star); color: #000; border: none; padding: 1.2rem 3.5rem;
            border-radius: 50px; font-weight: 900; cursor: pointer; margin-top: 2rem;
            font-size: 1.3rem; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        #result-banner {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 4rem; font-weight: 900; pointer-events: none; z-index: 150;
            text-shadow: 0 0 40px rgba(0,0,0,0.8); display: none;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">CALL THE CARD</div>
        <button class="restart-btn" onclick="location.reload()">RESTART</button>
    </nav>

    <div id="game-layout">
        <div id="players-grid"></div>

        <div id="result-banner"></div>

        <div id="table">
            <div id="main-card" class="card">?</div>
            <div class="deck-info"><span id="cards-left">20</span> cards remaining • <span id="stars-found">0</span>/3 Stars</div>
        </div>

        <div id="controls">
            <button class="guess-btn" id="btn-higher" onclick="game.makeGuess('higher')">
                <span>👆</span>
                <label>HIGHER (+2)</label>
            </button>
            <button class="guess-btn" id="btn-lower" onclick="game.makeGuess('lower')">
                <span>👇</span>
                <label>LOWER (+2)</label>
            </button>
            <button class="guess-btn" id="btn-suit" onclick="game.makeGuess('suit')">
                <span>🫲</span>
                <label>SUIT (+4)</label>
            </button>
            <button class="guess-btn" id="btn-star" onclick="game.makeGuess('star')">
                <span>✊</span>
                <label>STAR (+7)</label>
            </button>
        </div>

        <div id="start-screen" class="overlay">
            <h1 style="font-size: 3.5rem; color: var(--star); font-weight: 900; font-style: italic;">CALL THE CARD</h1>
            <p style="color: var(--text-muted); margin: 20px 0; max-width: 400px; font-weight: 600;">Predict the next card! Higher/Lower, Same Suit, or the big risky Star call.</p>
            <button class="btn-large" onclick="game.start()">DEAL IN</button>
        </div>

        <div id="win-screen" class="overlay" style="display:none">
            <h1 id="winner-title" style="font-size: 3.5rem; color: var(--star);">ROUND OVER</h1>
            <div id="final-stats" style="margin-top: 20px; font-size: 1.2rem;"></div>
            <button class="btn-large" onclick="location.reload()">NEW ROUND</button>
        </div>
    </div>

    <script>
        class CallTheCard {
            constructor() {
                this.deck = [];
                this.currentCard = null;
                this.starsFound = 0;
                this.players = [];
                this.state = 'waiting';
                
                this.guesses = {
                    higher: { icon: '👆', pts: 2 },
                    lower: { icon: '👇', pts: 2 },
                    suit: { icon: '🫲', pts: 4 },
                    star: { icon: '✊', pts: 7 }
                };
            }

            start() {
                this.generateDeck();
                this.setupPlayers();
                this.currentCard = this.deck.pop();
                this.renderPlayers();
                this.renderCard(this.currentCard);
                this.updateInfo();
                document.getElementById('start-screen').style.display = 'none';
                this.state = 'guessing';
            }

            generateDeck() {
                this.deck = [];
                for (let i = 1; i <= 7; i++) this.deck.push({ val: i, suit: 'orange', star: i === 4 });
                for (let i = 8; i <= 14; i++) this.deck.push({ val: i, suit: 'green', star: i === 11 });
                for (let i = 15; i <= 21; i++) this.deck.push({ val: i, suit: 'blue', star: i === 18 });
                this.deck.sort(() => Math.random() - 0.5);
            }

            setupPlayers() {
                this.players = [{ name: 'You', score: 0, isBot: false, guess: null }];
                for(let i = 1; i <= 5; i++) {
                    this.players.push({ name: `Robot #${i}`, score: 0, isBot: true, guess: null });
                }
            }

            makeGuess(type) {
                if (this.state !== 'guessing') return;
                this.state = 'revealing';
                
                this.players[0].guess = type;
                this.players.forEach(p => {
                    if (p.isBot) {
                        const types = ['higher', 'lower', 'suit', 'star'];
                        const weights = [0.4, 0.4, 0.15, 0.05];
                        const rand = Math.random();
                        let sum = 0;
                        for(let i=0; i<4; i++) {
                            sum += weights[i];
                            if(rand <= sum) { p.guess = types[i]; break; }
                        }
                    }
                });

                this.revealNext();
            }

            revealNext() {
                const nextCard = this.deck.pop();
                const prevCard = this.currentCard;

                const chips = document.querySelectorAll('.player-chip');
                this.players.forEach((p, i) => {
                    chips[i].classList.add('revealed');
                    const preview = chips[i].querySelector('.guess-preview');
                    if(preview) preview.textContent = this.guesses[p.guess].icon;
                });

                setTimeout(() => {
                    this.renderCard(nextCard);
                    if (nextCard.star) {
                        this.starsFound++;
                        this.showResultEffect('✨ STAR ✨', 'var(--star)');
                    }

                    this.players.forEach(p => {
                        const isCorrect = this.checkCorrect(p.guess, prevCard, nextCard);
                        p.score += isCorrect ? this.guesses[p.guess].pts : -1;
                    });

                    this.currentCard = nextCard;
                    this.updateInfo();
                    this.renderPlayers();

                    if (this.starsFound >= 3 || this.players.some(p => p.score >= 15) || this.deck.length === 0) {
                        setTimeout(() => this.endGame(), 1000);
                    } else {
                        setTimeout(() => {
                            this.players.forEach(p => { p.guess = null; });
                            chips.forEach(c => c.classList.remove('revealed'));
                            this.state = 'guessing';
                        }, 1200);
                    }
                }, 400);
            }

            checkCorrect(guess, prev, next) {
                switch(guess) {
                    case 'higher': return next.val > prev.val;
                    case 'lower': return next.val < prev.val;
                    case 'suit': return next.suit === prev.suit;
                    case 'star': return next.star === true;
                }
                return false;
            }

            renderCard(card) {
                const el = document.getElementById('main-card');
                el.className = `card ${card.suit} ${card.star ? 'star-card' : ''}`;
                el.textContent = card.val;
                if (card.star) {
                    el.style.transform = 'scale(1.15) rotate(5deg)';
                    setTimeout(() => el.style.transform = 'scale(1) rotate(0)', 300);
                }
            }

            renderPlayers() {
                const grid = document.getElementById('players-grid');
                grid.innerHTML = '';
                this.players.forEach(p => {
                    const div = document.createElement('div');
                    div.className = `player-chip ${p.name === 'You' ? 'active' : ''} ${p.guess ? 'revealed' : ''}`;
                    div.innerHTML = `
                        <div class="name">${p.name}</div>
                        <div class="score">${p.score}</div>
                        <div class="guess-slot">
                            <div class="guess-preview">${p.guess ? this.guesses[p.guess].icon : ''}</div>
                        </div>
                    `;
                    grid.appendChild(div);
                });
            }

            updateInfo() {
                document.getElementById('cards-left').textContent = this.deck.length;
                document.getElementById('stars-found').textContent = this.starsFound;
            }

            showResultEffect(text, color) {
                const banner = document.getElementById('result-banner');
                banner.textContent = text;
                banner.style.color = color;
                banner.style.display = 'block';
                setTimeout(() => { banner.style.display = 'none'; }, 1000);
            }

            endGame() {
                const screen = document.getElementById('win-screen');
                const standings = document.getElementById('final-stats');
                const sorted = [...this.players].sort((a,b) => b.score - a.score);
                standings.innerHTML = sorted.map((p, i) => `
                    <div style="margin-bottom:12px; ${i===0?'color:var(--star); font-weight:900;':''}">
                        #${i+1} ${p.name}: ${p.score} pts
                    </div>
                `).join('');
                document.getElementById('winner-title').textContent = sorted[0].name === 'You' ? "YOU WIN!" : "ROBOTS WIN!";
                screen.style.display = 'flex';
            }
        }
        const game = new CallTheCard();
    </script>
</body>
</html>
