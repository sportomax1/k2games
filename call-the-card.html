<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Call the Card - K2 games</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --accent: #fbbf24;
            --border: rgba(255, 255, 255, 0.1);
            --orange: #f97316;
            --green: #22c55e;
            --blue: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        nav {
            height: 50px;
            padding: 0 1rem;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .logo { font-weight: 900; color: var(--accent); letter-spacing: 1px; }
        .restart-btn { background: var(--surface); border: 1px solid var(--border); color: white; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }

        #game-layout {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            position: relative;
        }

        /* Opponents */
        #opponents {
            display: flex;
            justify-content: center;
            gap: 8px;
            height: 80px;
        }

        .player-info {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 6px;
            text-align: center;
            flex: 1;
            max-width: 110px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }
        .player-info.active { border-color: var(--accent); background: rgba(251, 191, 36, 0.1); }
        .player-info .name { font-size: 0.55rem; font-weight: 800; text-transform: uppercase; color: #94a3b8; }
        .player-info .score { font-size: 1.1rem; font-weight: 900; color: white; }
        .player-info .guess-icon { font-size: 1.2rem; margin-top: 2px; height: 20px; opacity: 0; transition: 0.2s; }
        .player-info.revealed .guess-icon { opacity: 1; }

        /* Table Area */
        #table-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            position: relative;
        }

        .card {
            width: 110px;
            height: 160px;
            background: #1e293b;
            border-radius: 15px;
            border: 4px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 900;
            color: white;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card.orange { background: var(--orange); }
        .card.green { background: var(--green); }
        .card.blue { background: var(--blue); }
        .card.star::after { content: '✨'; position: absolute; top: 10px; right: 10px; font-size: 1.2rem; }

        .deck-info { font-size: 0.7rem; font-weight: bold; opacity: 0.6; }

        /* Interaction Area */
        #interaction-container {
            background: rgba(0,0,0,0.3);
            border-top: 1px solid var(--border);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .btn-guess {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 12px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }
        .btn-guess:hover { border-color: var(--accent); background: rgba(255,255,255,0.05); }
        .btn-guess:active { transform: scale(0.95); }
        .btn-guess span { font-size: 1.5rem; }
        .btn-guess label { font-size: 0.5rem; font-weight: 900; cursor: pointer; }

        #status-msg {
            position: absolute;
            top: 95px;
            width: 100%;
            text-align: center;
            font-weight: 900;
            font-size: 1.1rem;
            color: var(--accent);
            text-shadow: 0 0 15px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 50;
        }

        .overlay {
            position: absolute; inset: 0;
            background: rgba(15, 23, 42, 0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 500; text-align: center; padding: 20px;
        }

        .btn-large {
            background: var(--accent); color: #000; border: none; padding: 1.2rem 3.5rem;
            border-radius: 50px; font-weight: 900; cursor: pointer; margin-top: 1.5rem;
            font-size: 1.3rem;
        }

        .score-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); width: 100%; max-width: 400px; }

        .hidden { display: none !important; }

        #result-banner {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 4rem; font-weight: 900; pointer-events: none; z-index: 150;
            text-shadow: 0 0 40px rgba(0,0,0,0.8); display: none;
        }
    </style>

<body>
    <nav>
        <div class="logo">CALL THE CARD</div>
        <button class="restart-btn" onclick="location.reload()">RESTART</button>
    </nav>

    <div id="game-layout">
        <div id="opponents"></div>
        <div id="status-msg">CALL THE NEXT CARD</div>

        <div id="result-banner"></div>

        <div id="table-area">
            <div id="main-card" class="card">?</div>
            <div class="deck-info"><span id="cards-left">20</span> REMAINING • <span id="stars-found">0</span>/3 STARS</div>
        </div>

        <div id="interaction-container">
            <div id="controls">
                <button class="btn-guess" onclick="game.makeGuess('higher')"><span>👆</span><label>HIGHER</label></button>
                <button class="btn-guess" onclick="game.makeGuess('lower')"><span>👇</span><label>LOWER</label></button>
                <button class="btn-guess" onclick="game.makeGuess('suit')"><span>🫲</span><label>SUIT</label></button>
                <button class="btn-guess" onclick="game.makeGuess('star')"><span>✊</span><label>STAR</label></button>
            </div>
        </div>

        <div id="start-screen" class="overlay">
            <h1 style="font-size: 3rem; color: var(--accent); font-style: italic; font-weight: 900;">CALL THE CARD</h1>
            <p style="opacity: 0.8; margin-top: 15px; max-width: 400px; font-weight: 600;">Predict the next card's value, suit, or find the hidden Stars to win!</p>
            <button class="btn-large" onclick="game.start()">DEAL IN</button>
        </div>

        <div id="win-screen" class="overlay hidden">
            <h1 id="winner-title" style="font-size: 3rem; color: var(--accent);">ROUND OVER</h1>
            <div id="final-stats" style="margin-top: 20px; width: 100%; max-width: 400px;"></div>
            <button class="btn-large" onclick="location.reload()">NEW ROUND</button>
        </div>
    </div>

    <script>
        class CallTheCard {
            constructor() {
                this.deck = [];
                this.currentCard = null;
                this.starsFound = 0;
                this.players = [];
                this.state = 'setup';
                this.icons = { higher:'👆', lower:'👇', suit:'🫲', star:'✊' };
                this.pts = { higher:2, lower:2, suit:4, star:7 };
            }

            start() {
                this.generateDeck();
                this.players = [
                    { id:0, name:'You', score:0, isBot:false, guess:null },
                    { id:1, name:'AI #1', score:0, isBot:true, guess:null },
                    { id:2, name:'AI #2', score:0, isBot:true, guess:null },
                    { id:3, name:'AI #3', score:0, isBot:true, guess:null }
                ];
                this.currentCard = this.deck.pop();
                document.getElementById('start-screen').classList.add('hidden');
                this.state = 'guessing';
                this.renderCard(this.currentCard);
                this.updateUI();
            }

            generateDeck() {
                this.deck = [];
                for (let i=1; i<=7; i++) this.deck.push({ val:i, suit:'orange', star:i===4 });
                for (let i=8; i<=14; i++) this.deck.push({ val:i, suit:'green', star:i===11 });
                for (let i=15; i<=21; i++) this.deck.push({ val:i, suit:'blue', star:i===18 });
                this.deck.sort(() => Math.random() - 0.5);
            }

            makeGuess(type) {
                if (this.state !== 'guessing') return;
                this.state = 'revealing';
                this.players[0].guess = type;
                this.players.forEach(p => {
                    if (p.isBot) {
                        const types = ['higher', 'lower', 'suit', 'star'];
                        p.guess = types[Math.floor(Math.random() * 4)];
                    }
                });
                this.updateUI();
                setTimeout(() => this.revealNext(), 600);
            }

            revealNext() {
                const nextCard = this.deck.pop();
                const prevCard = this.currentCard;
                this.renderCard(nextCard);

                if (nextCard.star) {
                    this.starsFound++;
                    this.showBanner('✨ STAR ✨', 'var(--accent)');
                }

                this.players.forEach(p => {
                    const correct = this.checkCorrect(p.guess, prevCard, nextCard);
                    p.score += correct ? this.pts[p.guess] : -1;
                });

                this.currentCard = nextCard;
                this.updateUI();

                if (this.starsFound >= 3 || this.players.some(p => p.score >= 20) || this.deck.length === 0) {
                    setTimeout(() => this.endGame(), 1200);
                } else {
                    setTimeout(() => {
                        this.players.forEach(p => p.guess = null);
                        this.state = 'guessing';
                        this.updateUI();
                    }, 1200);
                }
            }

            checkCorrect(guess, prev, next) {
                if (guess === 'higher') return next.val > prev.val;
                if (guess === 'lower') return next.val < prev.val;
                if (guess === 'suit') return next.suit === prev.suit;
                if (guess === 'star') return next.star;
                return false;
            }

            updateUI() {
                const opps = document.getElementById('opponents');
                opps.innerHTML = '';
                this.players.forEach(p => {
                    if (p.id === 0) return;
                    const div = document.createElement('div');
                    div.className = `player-info ${p.guess ? 'revealed' : ''}`;
                    div.innerHTML = `<div class="name">${p.name}</div><div class="score">${p.score}</div><div class="guess-icon">${p.guess ? this.icons[p.guess] : ''}</div>`;
                    opps.appendChild(div);
                });

                document.getElementById('cards-left').textContent = this.deck.length;
                document.getElementById('stars-found').textContent = this.starsFound;
                
                const myInfo = this.players[0];
                this.showStatus(this.state === 'guessing' ? 'CALL THE CARD' : `YOU CALLED ${myInfo.guess?.toUpperCase()}`);
            }

            renderCard(card) {
                const el = document.getElementById('main-card');
                el.className = `card ${card.suit} ${card.star ? 'star' : ''}`;
                el.textContent = card.val;
            }

            showBanner(text, color) {
                const b = document.getElementById('result-banner');
                b.textContent = text; b.style.color = color; b.style.display = 'block';
                setTimeout(() => b.style.display = 'none', 1000);
            }

            endGame() {
                this.state = 'over';
                const ov = document.getElementById('win-screen');
                const stats = document.getElementById('final-stats');
                const sorted = [...this.players].sort((a,b) => b.score - a.score);
                document.getElementById('winner-title').textContent = sorted[0].id === 0 ? "PREDICTION MASTER" : "DEFEATED";
                stats.innerHTML = sorted.map((p, i) => `<div class="score-row" style="${i===0?'color:var(--accent);font-weight:900':''}"><span>#${i+1} ${p.name}</span><span>${p.score} pts</span></div>`).join('');
                ov.classList.remove('hidden');
            }

            showStatus(m) { document.getElementById('status-msg').textContent = m; }
        }
        const game = new CallTheCard();
    </script>
</body>
</html>
