<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minion Mayhem: Gru's Command - K2 games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Bangers&display=swap');

        :root {
            --minion-yellow: #facc15;
            --denim-blue: #3b82f6;
            --gru-grey: #2d3436;
            --glass: rgba(15, 23, 42, 0.9);
        }

        body { margin: 0; overflow: hidden; background: radial-gradient(1200px 700px at 75% -20%, #3b82f6 0%, #0f2744 45%, #060f1d 100%); font-family: 'Rajdhani', 'Segoe UI', system-ui, sans-serif; user-select: none; color: white; touch-action: none; }
        
        #ui-layer {
            position: absolute; inset: 0; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between; padding: 20px;
            z-index: 10;
        }

        .hud-top { display: flex; justify-content: space-between; }
        
        .stat-card {
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 10px 20px; border-radius: 16px; border: 2px solid rgba(255,255,255,0.1);
            text-align: center; min-width: 120px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .stat-label { font-size: 0.72rem; text-transform: uppercase; opacity: 0.82; letter-spacing: 2.2px; color: #fde68a; }
        .stat-val { font-size: 1.95rem; font-weight: 900; text-shadow: 0 2px 10px rgba(0,0,0,0.45); }

        #action-grid {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 12px; pointer-events: auto;
            background: var(--glass); padding: 20px; border-radius: 24px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .action-btn {
            width: 65px; height: 65px; background: rgba(255,255,255,0.05); 
            border: 2px solid rgba(255,255,255,0.2); border-radius: 18px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .action-btn:hover { background: rgba(255,255,255,0.1); transform: scale(1.1); border-color: var(--minion-yellow); }
        .action-btn:active { transform: scale(0.9); background: var(--minion-yellow); color: #000; }

        .back-link {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            color: white; text-decoration: none; font-weight: 900;
            background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 10px;
        }

        #speech-bubble {
            position: absolute; top: 25%; left: 50%; transform: translate(-50%, -50%);
            background: white; color: black; padding: 15px 30px; border-radius: 40px;
            font-weight: 900; font-family: 'Comic Sans MS', cursive, sans-serif;
            display: none; pointer-events: none; z-index: 50; box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            text-transform: uppercase; border: 4px solid var(--minion-yellow);
            font-size: 1.2rem;
        }
        .pop-anim { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { opacity: 0; transform: translate(-50%, 20px) scale(0.5); } 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); } }

        .controls-hint {
            position: absolute; top: 80px; right: 20px; font-size: 0.7rem; color: rgba(255,255,255,0.5);
            text-align: right; pointer-events: none;
        }
        /* High-fidelity UI refinements */
        .back-link {
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
        }
        .hud-top { gap: 10px; }
        .stat-card {
            background: linear-gradient(180deg, rgba(20,36,62,0.92), rgba(10,18,35,0.85));
            border: 1px solid rgba(201,227,255,0.24);
            box-shadow: 0 18px 35px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.12);
        }
        #action-grid {
            background: linear-gradient(180deg, rgba(16,28,49,0.9), rgba(8,15,30,0.85));
            border: 1px solid rgba(173,209,255,0.22);
            box-shadow: 0 22px 45px rgba(0,0,0,0.55);
        }
        .action-btn {
            background: linear-gradient(180deg, rgba(59,98,150,0.55), rgba(20,38,66,0.84));
            border: 1px solid rgba(173,209,255,0.35);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
            font-weight: 900;
            text-shadow: 0 2px 0 rgba(0,0,0,0.35);
        }
        .action-btn:hover {
            transform: translateY(-2px) scale(1.06);
            filter: saturate(1.12);
        }
        .controls-hint {
            font-size: 0.78rem;
            color: rgba(232,245,255,0.78);
            text-shadow: 0 2px 10px rgba(0,0,0,0.55);
        }
        #speech-bubble {
            border: 4px solid #fde68a;
            box-shadow: 0 14px 38px rgba(0,0,0,0.5);
            font-family: 'Bangers', 'Rajdhani', sans-serif;
            letter-spacing: 1px;
        }
    </style>

<body>
    <a href="index.html" class="back-link">&larr; HUB</a>
    <div id="speech-bubble">ASSEMBLE!</div>

    <div id="ui-layer">
        <div class="hud-top">
            <div class="stat-card">
                <div class="stat-label">CHAOS LEVEL</div>
                <div id="chaos-val" class="stat-val">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">MINION COUNT</div>
                <div id="count-val" class="stat-val">40</div>
            </div>
        </div>

        <div id="action-grid">
            <div class="action-btn" id="btn-banana" title="Banana Feast">&#x1F34C;</div>
            <div class="action-btn" id="btn-dance" title="Disco">&#x1F483;</div>
            <div class="action-btn" id="btn-panic" title="Panic">&#x1F4E2;</div>
            <div class="action-btn" id="btn-fart" title="Fart Gun">&#x1F4A8;</div>
            <div class="action-btn" id="btn-soccer" title="Soccer">&#x26BD;</div>
            <div class="action-btn" id="btn-spin" title="Tornado">&#x1F32A;&#xFE0F;</div>
            <div class="action-btn" id="btn-jet" title="Jetpacks">&#x1F680;</div>
            <div class="action-btn" id="btn-sleep" title="Nap">&#x1F634;</div>
            <div class="action-btn" id="btn-cong" title="Conga">&#x1F3C3;</div>
            <div class="action-btn" id="btn-stac" title="Stack">&#x1F3D7;&#xFE0F;</div>
        </div>
    </div>

    <div class="controls-hint">ARROWS to Control Gru<br>CLICK to Command</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        class MinionGame {
            constructor() {
                this.state = 'playing';
                this.chaos = 0;
                this.minions = [];
                this.items = [];
                this.soccerBall = null;
                this.keys = {};
                this.initEngine();
                this.createWorld();
                this.createGru();
                this.createMinionHorde(40);
                this.setupInput();
                
                this.loop = this.loop.bind(this);
                requestAnimationFrame(this.loop);
            }

            initEngine() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x6ca4df); 
                this.scene.fog = new THREE.FogExp2(0x6e90b7, 0.0019);
                
                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
                this.camera.position.set(0, 60, 100);
                
                this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.12;
                this.renderer.outputColorSpace = THREE.SRGBColorSpace;
                this.clock = new THREE.Clock();
                document.body.appendChild(this.renderer.domElement);
                
                this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
                const sun = new THREE.DirectionalLight(0xfff3c8, 1.9);
                sun.position.set(200, 400, 100); 
                sun.castShadow = true;
                sun.shadow.camera.left = -300; sun.shadow.camera.right = 300;
                sun.shadow.camera.top = 300; sun.shadow.camera.bottom = -300;
                sun.shadow.mapSize.set(4096, 4096); 
                this.scene.add(sun);
                this.sun = sun;
                const hemi = new THREE.HemisphereLight(0xaad6ff, 0x2f4a2f, 0.45);
                this.scene.add(hemi);
                this.rim = new THREE.PointLight(0x7dd3fc, 1.05, 260);
                this.rim.position.set(-120, 40, -80);
                this.scene.add(this.rim);

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            createWorld() {
                // Ground
                const ground = new THREE.Mesh(
                    new THREE.PlaneGeometry(1000, 1000), 
                    new THREE.MeshStandardMaterial({ color: 0x3d8a2a, roughness: 0.8 })
                );
                ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; this.scene.add(ground);

                // Main Plaza
                const plaza = new THREE.Mesh(
                    new THREE.CircleGeometry(150, 32),
                    new THREE.MeshStandardMaterial({ color: 0x94a3b8, roughness: 0.5 })
                );
                plaza.rotation.x = -Math.PI / 2; plaza.position.y = 0.02; plaza.receiveShadow = true; this.scene.add(plaza);

                // Trees
                for(let i=0; i<60; i++) {
                    const tree = new THREE.Group();
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 2, 20), new THREE.MeshStandardMaterial({color: 0x451a03})); trunk.position.y = 10;
                    const leaves = new THREE.Mesh(new THREE.DodecahedronGeometry(12), new THREE.MeshStandardMaterial({color: 0x166534})); leaves.position.y = 25;
                    tree.add(trunk, leaves); 
                    const angle = Math.random()*Math.PI*2; const rad = 180 + Math.random()*200;
                    tree.position.set(Math.cos(angle)*rad, 0, Math.sin(angle)*rad); 
                    tree.traverse(c => { if(c.isMesh) { c.castShadow = true; c.receiveShadow = true; }});
                    this.scene.add(tree);
                }
            }

            createGru() {
                this.gru = new THREE.Group();
                
                // Gru's distinctive shape: Big upper body, skinny legs
                // Coat
                const body = new THREE.Mesh(
                    new THREE.CapsuleGeometry(2.5, 5, 4, 8),
                    new THREE.MeshStandardMaterial({ color: 0x2d3436 })
                );
                body.position.y = 6;
                body.scale.set(1.2, 1, 0.8); // Wider shoulders
                this.gru.add(body);

                // Head
                const head = new THREE.Mesh(
                    new THREE.SphereGeometry(1.8, 16, 16),
                    new THREE.MeshStandardMaterial({ color: 0xffdbac })
                );
                head.position.y = 10.5;
                this.gru.add(head);

                // Nose (pointy!)
                const nose = new THREE.Mesh(
                    new THREE.ConeGeometry(0.3, 1.5, 8),
                    new THREE.MeshStandardMaterial({ color: 0xffdbac })
                );
                nose.rotation.x = Math.PI / 2;
                nose.position.set(0, 10.5, 1.8);
                this.gru.add(nose);

                // Scarf
                const scarf = new THREE.Mesh(
                    new THREE.TorusGeometry(1.8, 0.5, 8, 16),
                    new THREE.MeshStandardMaterial({ color: 0x636e72 }) // Grey scarf
                );
                scarf.rotation.x = Math.PI / 2;
                scarf.position.y = 9;
                this.gru.add(scarf);

                // Legs
                const lLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.3, 5), new THREE.MeshStandardMaterial({color: 0x000000}));
                lLeg.position.set(-1, 2.5, 0);
                const rLeg = lLeg.clone();
                rLeg.position.set(1, 2.5, 0);
                this.gru.add(lLeg, rLeg);

                this.gru.traverse(c => { if(c.isMesh) c.castShadow = true; });
                this.gruTarget = new THREE.Vector3(0,0,0);
                this.scene.add(this.gru);
            }

            createMinionHorde(count) {
                const colors = [0xfacc15, 0xfde047];
                for(let i=0; i<count; i++) {
                    const m = new THREE.Group();
                    const isTall = Math.random() > 0.7; 
                    const isOneEye = Math.random() > 0.5;
                    const bodyH = isTall ? 2.8 : 1.8;
                    
                    // Body
                    const body = new THREE.Mesh(
                        new THREE.CapsuleGeometry(0.9, bodyH, 4, 8), 
                        new THREE.MeshStandardMaterial({ color: colors[i%2] })
                    ); 
                    body.position.y = bodyH/2+1; 
                    m.add(body);
                    
                    // Overalls
                    const pants = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.95, 0.95, 1.5, 12), 
                        new THREE.MeshStandardMaterial({ color: 0x3b82f6 })
                    ); 
                    pants.position.y = 1.2; 
                    m.add(pants);
                    
                    // Goggles
                    const gMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8, metalness: 0.9, roughness: 0.1 });
                    if(isOneEye) { 
                        const g = new THREE.Mesh(new THREE.TorusGeometry(0.55, 0.15, 8, 16), gMat); 
                        g.position.set(0, bodyH + 0.2, 0.7); 
                        g.rotation.y = 0;
                        m.add(g); 
                        const eye = new THREE.Mesh(new THREE.SphereGeometry(0.4, 8, 8), new THREE.MeshBasicMaterial({color: 0xffffff}));
                        eye.position.set(0, bodyH + 0.2, 0.6);
                        m.add(eye);
                    } else { 
                        const g1 = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.1, 8, 16), gMat); 
                        g1.position.set(-0.45, bodyH + 0.2, 0.7); 
                        m.add(g1); 
                        const g2 = g1.clone(); g2.position.x = 0.45; m.add(g2); 
                        const e1 = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), new THREE.MeshBasicMaterial({color: 0xffffff}));
                        e1.position.set(-0.45, bodyH + 0.2, 0.6); m.add(e1);
                        const e2 = e1.clone(); e2.position.x = 0.45; m.add(e2);
                    }

                    m.position.set((Math.random()-0.5)*200, 0, (Math.random()-0.5)*200);
                    m.userData = { 
                        vel: new THREE.Vector3(), 
                        state: 'idle', 
                        id: i, 
                        timer: 0, 
                        phase: Math.random() * Math.PI * 2 
                    }; 
                    m.traverse(c => { if(c.isMesh) c.castShadow = true; });
                    this.scene.add(m); this.minions.push(m);
                }
            }

            setupInput() {
                window.addEventListener('keydown', (e) => this.keys[e.code] = true);
                window.addEventListener('keyup', (e) => this.keys[e.code] = false);

                window.addEventListener('pointerdown', (e) => {
                    if(e.target.closest('.action-btn')) return;
                    const ray = new THREE.Raycaster();
                    const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
                    ray.setFromCamera(mouse, this.camera);
                    const hits = ray.intersectObjects(this.scene.children);
                    if(hits.length > 0) { 
                        this.gruTarget.copy(hits[0].point); this.gruTarget.y = 0; 
                        this.shout("OVER THERE!", 1000);
                    }
                });

                const b = (id, f) => document.getElementById(id).onclick = f;
                b('btn-banana', () => this.tossBanana());
                b('btn-dance', () => this.trigger('dance'));
                b('btn-panic', () => this.trigger('panic'));
                b('btn-fart', () => this.trigger('panic', "PUUUU!!"));
                b('btn-soccer', () => this.spawnSoccer());
                b('btn-spin', () => this.trigger('spin'));
                b('btn-jet', () => this.trigger('jet'));
                b('btn-sleep', () => this.trigger('sleep'));
                b('btn-cong', () => this.trigger('conga'));
                b('btn-stac', () => this.trigger('stack'));
            }

            tossBanana() {
                const b = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1.2), new THREE.MeshStandardMaterial({color: 0xfef08a}));
                b.position.copy(this.gru.position).add(new THREE.Vector3(0, 15, 0));
                const tx = (Math.random()-0.5)*150, tz = (Math.random()-0.5)*150;
                const dir = new THREE.Vector3(tx, 0, tz).sub(b.position).normalize();
                b.userData = { vel: dir.multiplyScalar(2.5).add(new THREE.Vector3(0, 1.2, 0)) };
                this.scene.add(b); this.items.push(b); 
                this.shout("BANANA!", 2000); 
                this.updateChaos(5);
            }

            spawnSoccer() {
                if(this.soccerBall) this.scene.remove(this.soccerBall);
                this.soccerBall = new THREE.Mesh(
                    new THREE.SphereGeometry(5, 32, 32), 
                    new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 0.2})
                );
                this.soccerBall.position.set(this.gru.position.x, 30, this.gru.position.z + 10); 
                this.soccerBall.userData = { vel: new THREE.Vector3(0,0,0) };
                this.scene.add(this.soccerBall); 
                this.shout("GOAL!!", 2000); 
                this.updateChaos(10);
            }

            updateChaos(v) {
                this.chaos = Math.min(100, this.chaos + v);
                document.getElementById('chaos-val').textContent = this.chaos + "%";
            }

            trigger(type, msg = null) {
                this.minions.forEach(m => { 
                    m.userData.state = type; 
                    if(type==='panic') m.userData.vel.set(Math.random()-0.5, 0, Math.random()-0.5).multiplyScalar(4); 
                });
                const ms = { 
                    'dance': "DISCO TIME!", 
                    'panic': msg || "BEE-DOO!", 
                    'spin': "TORNADO!", 
                    'jet': "WE HAVE LIFT OFF!", 
                    'sleep': "SHHH...", 
                    'conga': "FOLLOW THE LEADER!", 
                    'stack': "ASSEMBLE!" 
                };
                this.shout(ms[type] || "GO!", 2000); 
                this.updateChaos(10);
            }

            shout(t, d) {
                const el = document.getElementById('speech-bubble'); el.textContent = t; el.style.display = 'block';
                el.classList.remove('pop-anim'); void el.offsetWidth; el.classList.add('pop-anim');
                if(this.shoutTimeout) clearTimeout(this.shoutTimeout);
                this.shoutTimeout = setTimeout(() => el.style.display = 'none', d);
            }

            update(dt) {
                const time = Date.now() * 0.001;
                
                // Gru Keyboard Control
                const gruSpeed = 30 * dt;
                let moved = false;
                if(this.keys['ArrowUp'] || this.keys['KeyW']) { this.gru.position.z -= gruSpeed; moved = true; this.gru.rotation.y = Math.PI; }
                if(this.keys['ArrowDown'] || this.keys['KeyS']) { this.gru.position.z += gruSpeed; moved = true; this.gru.rotation.y = 0; }
                if(this.keys['ArrowLeft'] || this.keys['KeyA']) { this.gru.position.x -= gruSpeed; moved = true; this.gru.rotation.y = -Math.PI/2; }
                if(this.keys['ArrowRight'] || this.keys['KeyD']) { this.gru.position.x += gruSpeed; moved = true; this.gru.rotation.y = Math.PI/2; }

                if(moved) {
                    this.gruTarget.copy(this.gru.position);
                    this.gru.position.y = Math.abs(Math.sin(time*12)) * 0.5;
                } else {
                    // Gru Click Control
                    if(this.gru.position.distanceTo(this.gruTarget) > 1.0) {
                        const d = this.gruTarget.clone().sub(this.gru.position).normalize();
                        this.gru.position.add(d.multiplyScalar(20 * dt)); 
                        this.gru.lookAt(this.gruTarget.x, this.gru.position.y, this.gruTarget.z);
                        this.gru.position.y = Math.abs(Math.sin(time*12)) * 0.5;
                    } else {
                        this.gru.position.y = THREE.MathUtils.lerp(this.gru.position.y, 0, 0.1);
                    }
                }

                // Soccer Physics
                if(this.soccerBall) {
                    this.soccerBall.position.add(this.soccerBall.userData.vel); 
                    this.soccerBall.userData.vel.multiplyScalar(0.985);
                    if(this.soccerBall.position.y > 5) this.soccerBall.userData.vel.y -= 0.2; 
                    else { this.soccerBall.position.y = 5; this.soccerBall.userData.vel.y *= -0.6; if(Math.abs(this.soccerBall.userData.vel.y) < 0.1) this.soccerBall.userData.vel.y = 0; }
                    
                    // Kick with Gru
                    if(this.gru.position.distanceTo(this.soccerBall.position) < 10) {
                        const kickDir = this.soccerBall.position.clone().sub(this.gru.position).normalize();
                        this.soccerBall.userData.vel.add(kickDir.multiplyScalar(1.5));
                        this.soccerBall.userData.vel.y += 0.5;
                    }
                }

                // Minion Behavior
                this.minions.forEach(m => {
                    const d = m.userData;
                    if(d.state === 'dance') { 
                        m.rotation.y += 0.2; 
                        m.position.y = Math.abs(Math.sin(time*12 + d.id))*3; 
                    }
                    else if(d.state === 'spin') { 
                        m.rotation.y += 0.8; 
                        m.position.y = 0; 
                    }
                    else if(d.state === 'sleep') { 
                        m.rotation.x = THREE.MathUtils.lerp(m.rotation.x, Math.PI/2, 0.1); 
                        m.position.y = THREE.MathUtils.lerp(m.position.y, 1, 0.1); 
                    }
                    else if(d.state === 'panic') { 
                        m.position.add(d.vel); 
                        m.rotation.y += 0.6; 
                        if(m.position.length() > 200) d.vel.multiplyScalar(-1); 
                    }
                    else if(d.state === 'jet') { 
                        m.position.y = 20 + Math.sin(time*4 + d.id)*12; 
                        m.rotation.x = Math.sin(time*2) * 0.5;
                    }
                    else if(d.state === 'stack') {
                        const target = new THREE.Vector3(0, (d.id % 8) * 3.2, 0);
                        m.position.lerp(target, 0.08); 
                        m.lookAt(0, m.position.y, 0);
                    }
                    else if(d.state === 'conga') { 
                        const t = d.id === 0 ? this.gru.position : this.minions[d.id-1].position;
                        if(m.position.distanceTo(t) > 8) { 
                            m.position.add(t.clone().sub(m.position).normalize().multiplyScalar(0.45)); 
                            m.lookAt(t.x, m.position.y, t.z); 
                        }
                        m.position.y = Math.abs(Math.sin(time*10 + d.id)) * 0.5;
                    } else {
                        // Default Idle/Feast
                        m.rotation.x = THREE.MathUtils.lerp(m.rotation.x, 0, 0.1);
                        let it = null; 
                        this.items.forEach(i => { if(m.position.distanceTo(i.position) < 60) it = i; });
                        
                        if(it) {
                            m.position.add(it.position.clone().sub(m.position).normalize().multiplyScalar(0.6)); 
                            m.lookAt(it.position.x, m.position.y, it.position.z);
                            if(m.position.distanceTo(it.position) < 4) { 
                                this.scene.remove(it); this.items.splice(this.items.indexOf(it), 1); 
                                this.shout("YUM BANANA!", 1000); d.state = 'dance'; 
                            }
                        } else {
                            // Simple Flock
                            if(Math.random() < 0.02) d.vel.set(Math.random()-0.5, 0, Math.random()-0.5).multiplyScalar(0.5);
                            m.position.add(d.vel); 
                            m.lookAt(m.position.clone().add(d.vel));
                            m.position.y = Math.abs(Math.sin(time*5 + d.id)) * 0.2;
                        }
                    }
                    
                    // Minion vs Soccer interaction
                    if(this.soccerBall && m.position.distanceTo(this.soccerBall.position) < 8) {
                        const push = this.soccerBall.position.clone().sub(m.position).normalize().multiplyScalar(0.8);
                        this.soccerBall.userData.vel.add(push);
                    }
                });

                // Camera follow Gru
                const camOffset = new THREE.Vector3(0, 70, 110);
                const targetPos = this.gru.position.clone().add(camOffset);
                this.camera.position.lerp(targetPos, 0.08); 
                this.camera.lookAt(this.gru.position.x, 0, this.gru.position.z);

                // Items physics
                for(let i=this.items.length-1; i>=0; i--) { 
                    const it = this.items[i]; 
                    it.position.add(it.userData.vel); 
                    it.userData.vel.y -= 0.08; 
                    if(it.position.y < 1) { it.position.y = 1; it.userData.vel.set(0,0,0); } 
                }
            }

            loop() { 
                const dt = Math.min(0.033, this.clock ? this.clock.getDelta() : 0.016);
                this.update(dt); 
                const t = performance.now() * 0.00035;
                if(this.sun) { this.sun.position.x = Math.cos(t) * 200; this.sun.position.z = Math.sin(t) * 120; }
                if(this.rim) this.rim.intensity = 0.85 + Math.abs(Math.sin(t * 3)) * 0.35;
                this.renderer.render(this.scene, this.camera); 
                requestAnimationFrame(this.loop); 
            }
        }
        window.game = new MinionGame();
    </script>
</body>
</html>
