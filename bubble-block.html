<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#0f172a"><title>JezzBall Elite</title><style>
:root{--bg:#0f172a;--panel:#1e293b;--accent:#38bdf8;--danger:#ef4444;--success:#22c55e;--text:#f8fafc;--muted:#94a3b8}*{box-sizing:border-box;touch-action:none;user-select:none}html,body{width:100%;height:100%;margin:0;overflow:hidden}body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:radial-gradient(circle at 15% 10%,#38bdf826,transparent 30%),var(--bg);color:var(--text)}.app{height:100dvh;display:grid;grid-template-rows:auto 1fr auto;gap:8px;padding:max(8px,env(safe-area-inset-top)) max(8px,env(safe-area-inset-right)) max(8px,env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left));overflow:hidden}.top,.bottom{width:min(900px,100%);margin:auto;display:flex;align-items:center;justify-content:space-between;gap:8px}.back{color:#fff;text-decoration:none;padding:8px 11px;border-radius:10px;background:#ffffff10;border:1px solid #ffffff1c;font-weight:800;font-size:.8rem}.stats{display:flex;gap:6px}.stat{min-width:64px;text-align:center;padding:6px 9px;border-radius:12px;background:#ffffff0d;border:1px solid #ffffff18}.stat span{display:block;color:var(--muted);font-size:.56rem;text-transform:uppercase}.stat b{color:var(--accent);font-size:1rem}.stage{position:relative;width:min(900px,100%);height:100%;min-height:0;margin:auto;padding:8px;border-radius:18px;background:var(--panel);border:1px solid #ffffff18;box-shadow:0 20px 60px #0008;overflow:hidden}canvas{display:block;width:100%;height:100%;background:#020617;border-radius:12px;cursor:crosshair}.bottom{justify-content:center}.btn{min-height:40px;padding:8px 14px;border-radius:12px;border:1px solid #ffffff20;background:#ffffff10;color:#fff;font-weight:850}.btn.primary{background:var(--accent);color:#06121c;border:0}.hint{color:var(--muted);font-size:.72rem;text-align:center}.overlay{position:absolute;inset:8px;display:none;place-items:center;background:#0f172ae8;border-radius:12px;backdrop-filter:blur(8px)}.overlay.show{display:grid}.panel{text-align:center;padding:22px}.panel h2{margin:0 0 8px;font-size:clamp(1.8rem,7vw,3rem);color:var(--accent)}.panel p{margin:0 0 14px;color:var(--muted)}.progress{width:120px;height:7px;border-radius:999px;background:#ffffff12;overflow:hidden;margin-top:4px}.progress i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--success))}@media(max-width:650px){.app{grid-template-rows:38px 1fr 44px}.hint{display:none}.stat{min-width:54px;padding:5px}.btn{min-height:36px;padding:6px 11px;font-size:.76rem}}@media(orientation:landscape) and (max-height:520px){.app{grid-template-rows:34px 1fr 38px}.back{padding:5px 9px}.stat{padding:3px 7px}.stat b{font-size:.85rem}}
</style></head><body><div class="app"><header class="top"><a class="back" href="index.html">← K2</a><div class="stats"><div class="stat"><span>Level</span><b id="level">1</b></div><div class="stat"><span>Cleared</span><b id="cleared">0%</b><div class="progress"><i id="bar"></i></div></div><div class="stat"><span>Lives</span><b id="lives">3</b></div></div></header><main class="stage" id="stage"><canvas id="game"></canvas><div class="overlay" id="overlay"><div class="panel"><h2 id="ot">LEVEL CLEAR</h2><p id="om">Ready for more?</p><button class="btn primary" id="ob">Continue</button></div></div></main><footer class="bottom"><button class="btn primary" id="dir">➖ HORIZONTAL</button><button class="btn" id="restart">Restart</button><div class="hint">Tap/click to build • right-click or Space to rotate</div></footer></div><script>
(()=>{'use strict';const $=id=>document.getElementById(id),cv=$('game'),ctx=cv.getContext('2d'),stage=$('stage'),levelEl=$('level'),clearedEl=$('cleared'),livesEl=$('lives'),bar=$('bar'),dirBtn=$('dir'),overlay=$('overlay'),ot=$('ot'),om=$('om'),ob=$('ob');const W=800,H=500,R=8,TARGET=75;let level=1,lives=3,horizontal=true,gameOver=false,balls=[],regions=[],line=null,pointer={x:W/2,y:H/2};function resize(){const r=stage.getBoundingClientRect(),d=Math.min(devicePixelRatio||1,2);cv.width=Math.max(1,(r.width-16)*d);cv.height=Math.max(1,(r.height-16)*d);ctx.setTransform(cv.width/W,0,0,cv.height/H,0,0)}new ResizeObserver(resize).observe(stage);function regionOf(x,y){return regions.find(a=>!a.filled&&x>=a.x&&x<=a.x+a.w&&y>=a.y&&y<=a.y+a.h)}function init(resetLives=false){if(resetLives)lives=3;gameOver=false;line=null;regions=[{x:0,y:0,w:W,h:H,filled:false}];balls=[];for(let i=0;i<Math.min(8,level);i++){let a=Math.random()*Math.PI*2,s=2.2+Math.min(level,8)*.18;balls.push({x:W*.3+Math.random()*W*.4,y:H*.3+Math.random()*H*.4,vx:Math.cos(a)*s,vy:Math.sin(a)*s,color:`hsl(${Math.random()*360} 82% 62%)`})}overlay.classList.remove('show');updateUI()}function clearedPct(){return regions.filter(r=>r.filled).reduce((n,r)=>n+r.w*r.h,0)/(W*H)*100}function updateUI(){let p=clearedPct();levelEl.textContent=level;livesEl.textContent=lives;clearedEl.textContent=Math.floor(p)+'%';bar.style.width=Math.min(100,p/TARGET*100)+'%'}function toggle(){horizontal=!horizontal;dirBtn.textContent=horizontal?'➖ HORIZONTAL':'➖ VERTICAL'}function point(e){const r=cv.getBoundingClientRect();return{x:(e.clientX-r.left)/r.width*W,y:(e.clientY-r.top)/r.height*H}}function begin(){if(gameOver||line)return;const area=regionOf(pointer.x,pointer.y);if(!area)return;line={dir:horizontal?'h':'v',x:pointer.x,y:pointer.y,p1:horizontal?pointer.x:pointer.y,p2:horizontal?pointer.x:pointer.y,area,active:true}}function hitLine(b){if(!line||!line.active)return false;const pad=R+4;return line.dir==='h'?Math.abs(b.y-line.y)<pad&&b.x>=line.p1-pad&&b.x<=line.p2+pad:Math.abs(b.x-line.x)<pad&&b.y>=line.p1-pad&&b.y<=line.p2+pad}function loseLife(){line=null;lives--;updateUI();if(lives<=0){gameOver=true;show('GAME OVER',`You reached level ${level}.`,'Play Again',()=>{level=1;init(true)})}}function split(){const l=line;if(!l)return;let a=l.area,a1,a2;if(l.dir==='h'){a1={x:a.x,y:a.y,w:a.w,h:l.y-a.y,filled:false};a2={x:a.x,y:l.y,w:a.w,h:a.y+a.h-l.y,filled:false}}else{a1={x:a.x,y:a.y,w:l.x-a.x,h:a.h,filled:false};a2={x:l.x,y:a.y,w:a.x+a.w-l.x,h:a.h,filled:false}}if(a1.w<3||a1.h<3||a2.w<3||a2.h<3){line=null;return}for(const r of[a1,a2])r.filled=!balls.some(b=>b.x>r.x&&b.x<r.x+r.w&&b.y>r.y&&b.y<r.y+r.h);regions=regions.filter(r=>r!==a).concat(a1,a2);line=null;updateUI();if(clearedPct()>=TARGET){gameOver=true;show('LEVEL CLEAR',`Captured ${Math.floor(clearedPct())}% of the field.`,'Next Level',()=>{level++;init(false)})}}function show(t,m,bt,fn){ot.textContent=t;om.textContent=m;ob.textContent=bt;ob.onclick=fn;overlay.classList.add('show')}function step(){if(gameOver)return;const sub=2;for(let k=0;k<sub;k++){for(const b of balls){b.x+=b.vx/sub;b.y+=b.vy/sub;const a=regionOf(b.x,b.y)||regionOf(b.x-b.vx/sub,b.y-b.vy/sub);if(a){if(b.x-R<a.x){b.x=a.x+R;b.vx=Math.abs(b.vx)}else if(b.x+R>a.x+a.w){b.x=a.x+a.w-R;b.vx=-Math.abs(b.vx)}if(b.y-R<a.y){b.y=a.y+R;b.vy=Math.abs(b.vy)}else if(b.y+R>a.y+a.h){b.y=a.y+a.h-R;b.vy=-Math.abs(b.vy)}}if(hitLine(b)){loseLife();return}}}if(line){const speed=7;if(line.dir==='h'){line.p1=Math.max(line.area.x,line.p1-speed);line.p2=Math.min(line.area.x+line.area.w,line.p2+speed);if(line.p1<=line.area.x&&line.p2>=line.area.x+line.area.w)split()}else{line.p1=Math.max(line.area.y,line.p1-speed);line.p2=Math.min(line.area.y+line.area.h,line.p2+speed);if(line.p1<=line.area.y&&line.p2>=line.area.y+line.area.h)split()}}}function draw(){ctx.fillStyle='#020617';ctx.fillRect(0,0,W,H);for(const a of regions){if(a.filled){ctx.fillStyle='#1e293b';ctx.fillRect(a.x,a.y,a.w,a.h);ctx.strokeStyle='#334155';ctx.strokeRect(a.x,a.y,a.w,a.h)}}if(!line){const a=regionOf(pointer.x,pointer.y);if(a){ctx.save();ctx.strokeStyle='#38bdf855';ctx.setLineDash([6,6]);ctx.beginPath();if(horizontal){ctx.moveTo(a.x,pointer.y);ctx.lineTo(a.x+a.w,pointer.y)}else{ctx.moveTo(pointer.x,a.y);ctx.lineTo(pointer.x,a.y+a.h)}ctx.stroke();ctx.restore()}}if(line){ctx.strokeStyle='#fff';ctx.lineWidth=4;ctx.shadowColor='#38bdf8';ctx.shadowBlur=14;ctx.beginPath();if(line.dir==='h'){ctx.moveTo(line.p1,line.y);ctx.lineTo(line.p2,line.y)}else{ctx.moveTo(line.x,line.p1);ctx.lineTo(line.x,line.p2)}ctx.stroke();ctx.shadowBlur=0}for(const b of balls){ctx.fillStyle=b.color;ctx.shadowColor=b.color;ctx.shadowBlur=12;ctx.beginPath();ctx.arc(b.x,b.y,R,0,Math.PI*2);ctx.fill()}ctx.shadowBlur=0;step();requestAnimationFrame(draw)}cv.addEventListener('pointermove',e=>pointer=point(e));cv.addEventListener('pointerdown',e=>{pointer=point(e);if(e.button===2)toggle();else begin();e.preventDefault()});cv.addEventListener('contextmenu',e=>e.preventDefault());dirBtn.onclick=toggle;$('restart').onclick=()=>{level=1;init(true)};window.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();toggle()}});init(true);resize();draw()})();
</script></body></html>
