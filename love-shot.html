<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Love Shot</title>
<style>/* minimal copy from cupids-arrow-challenge.html */
*{margin:0;padding:0;box-sizing:border-box}
body{background:#ff2266;display:flex;justify-content:center;align-items:center;height:100dvh;overflow:hidden;font-family:Arial,sans-serif;touch-action:none}
#wrap{position:relative;width:100vw;height:100dvh}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas>
<div id="modal"><div class="card" id="card"><div class="icon">💘</div><h1>LOVE SHOT</h1><p class="sub">Pull Cupid's bowstring and fire arrows at hearts!</p><button id="startBtn" class="btn">LOVE SHOT! 💘</button></div></div>
</div>
<script>document.getElementById('startBtn').onclick=function(){document.getElementById('modal').classList.add('hide');};</script>
</body>
</html>
