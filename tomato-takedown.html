<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Tomato Takedown</title><meta name="theme-color" content="#ef4444"><style>*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#111827;color:white;font-family:system-ui,-apple-system,Segoe UI,sans-serif;touch-action:none}canvas{display:block;width:100vw;height:100vh}.hud{position:fixed;top:max(10px,env(safe-area-inset-top));left:10px;right:10px;display:flex;justify-content:space-between;gap:8px;z-index:5;pointer-events:none}.group{display:flex;gap:8px;flex-wrap:wrap}.pill,.btn{border:1px solid #ffffff33;background:#111827cc;color:#fff;border-radius:14px;padding:9px 12px;font-weight:900;backdrop-filter:blur(8px)}.btn{pointer-events:auto;cursor:pointer}.overlay{position:fixed;inset:0;display:grid;place-items:center;background:#030712d9;z-index:20;padding:18px;text-align:center}.card{width:min(92vw,620px);border:1px solid #ffffff33;border-radius:24px;padding:24px;background:linear-gradient(180deg,#1f2937,#111827);box-shadow:0 28px 80px #0009}.card h1{font-size:clamp(40px,10vw,74px);line-height:.88;margin:0 0 14px}.card p{color:#d1d5db;line-height:1.45}.primary{border:0;border-radius:999px;padding:14px 22px;font-size:18px;font-weight:1000;cursor:pointer}.controls{position:fixed;inset:0;z-index:8;pointer-events:none}.joy{position:absolute;left:18px;bottom:calc(18px + env(safe-area-inset-bottom));width:120px;height:120px;border-radius:50%;border:2px solid #ffffff33;background:#11182766;pointer-events:auto}.nub{position:absolute;left:37px;top:37px;width:46px;height:46px;border-radius:50%;background:#fff9}.action{position:absolute;right:22px;bottom:calc(24px + env(safe-area-inset-bottom));width:94px;height:94px;border-radius:50%;border:2px solid #ffffff55;color:#fff;font-weight:1000;font-size:15px;pointer-events:auto}.action2{right:128px;width:72px;height:72px;bottom:calc(42px + env(safe-area-inset-bottom))}.home{position:fixed;left:50%;bottom:6px;transform:translateX(-50%);z-index:30;color:#fff;text-decoration:none;font-size:12px;font-weight:900;background:#0007;padding:6px 10px;border-radius:999px}@media(pointer:fine){.joy,.action,.action2{opacity:.55}}@media(max-width:640px){.pill{font-size:12px;padding:7px 9px}.joy{width:108px;height:108px}.nub{left:31px;top:31px}.action{width:84px;height:84px}.action2{right:112px;width:64px;height:64px}}</style></head><body><canvas id="c"></canvas><div class="hud"><div class="group"><div class="pill">SCORE <b id="score">0</b></div><div class="pill">WAVE <b id="wave">1</b></div><div class="pill">HEALTH <b id="hp">5</b></div><div class="pill">AMMO <b id="ammo">8</b></div></div><button class="btn" id="pause">PAUSE</button></div><div class="controls"><div class="joy" id="joy"><div class="nub" id="nub"></div></div><button class="action action2" id="dash" style="background:#2563eb">DODGE</button><button class="action" id="throw" style="background:#ef4444">THROW</button></div><a class="home" href="index.html">← K2 HUB</a><div class="overlay" id="ov"><div class="card"><h1 style="color:#ef4444">TOMATO<br>TAKEDOWN</h1><p>A top-down festival food fight. Move through the plaza, use tables and carts as cover, collect tomato crates, and splatter every rival.</p><p><b>Move:</b> WASD/arrows or joystick &nbsp; <b>Aim:</b> mouse/touch &nbsp; <b>Throw:</b> click/Space</p><button class="primary" id="start" style="background:#ef4444;color:white">START THE FIGHT</button></div></div><script>(()=>{const c=document.getElementById('c'),g=c.getContext('2d');let W,H,D=1,run=0,last=0,keys={},joy={x:0,y:0},mouse={x:0,y:0},score=0,wave=1,hp=5,ammo=8,cool=0,dash=1,inv=0,en=[],shots=[],enemyShots=[],cover=[],crates=[],splats=[],spawn=0,player={x:0,y:0,vx:0,vy:0,r:18};const $=id=>document.getElementById(id),rnd=(a,b)=>a+Math.random()*(b-a),clamp=(v,a,b)=>Math.max(a,Math.min(b,v));function rs(){D=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;g.setTransform(D,0,0,D,0,0)}addEventListener('resize',rs);rs();function build(){cover=[];crates=[];for(let i=0;i<7;i++)cover.push({x:rnd(50,W-160),y:rnd(120,H-170),w:rnd(70,130),h:rnd(30,58),type:Math.random()<.5?'table':'cart'});for(let i=0;i<3;i++)crates.push({x:rnd(50,W-70),y:rnd(120,H-60),r:18})}function reset(){run=1;score=0;wave=1;hp=5;ammo=8;cool=0;dash=1;inv=0;en=[];shots=[];enemyShots=[];splats=[];spawn=0;player.x=W/2;player.y=H*.7;player.vx=player.vy=0;build();$('ov').style.display='none';last=performance.now()}function enemy(){let side=Math.floor(rnd(0,4)),x=side%2?rnd(30,W-30):side===0?30:W-30,y=side%2?(side===1?100:H-30):rnd(100,H-30);return{x,y,vx:0,vy:0,r:17,hp:2+Math.floor(wave/3),cool:rnd(.5,1.4),type:Math.random()<.18?'pie':'tomato'}}function blocked(o){return cover.some(b=>o.x+o.r>b.x&&o.x-o.r<b.x+b.w&&o.y+o.r>b.y&&o.y-o.r<b.y+b.h)}function update(dt){cool=Math.max(0,cool-dt);dash=Math.min(1,dash+dt*.6);inv=Math.max(0,inv-dt);spawn-=dt;if(spawn<=0&&en.length<4+wave){en.push(enemy());spawn=Math.max(.5,1.35-wave*.05)}let ax=((keys.ArrowRight||keys.KeyD)?1:0)-((keys.ArrowLeft||keys.KeyA)?1:0)+joy.x,ay=((keys.ArrowDown||keys.KeyS)?1:0)-((keys.ArrowUp||keys.KeyW)?1:0)+joy.y,l=Math.hypot(ax,ay)||1;player.vx=player.vx*.8+ax/l*24;player.vy=player.vy*.8+ay/l*24;if((keys.ShiftLeft||$('dash').dataset.down==='1')&&dash>=1){player.vx+=ax/l*65;player.vy+=ay/l*65;dash=0;inv=.3}let ox=player.x,oy=player.y;player.x=clamp(player.x+player.vx,24,W-24);player.y=clamp(player.y+player.vy,90,H-28);if(blocked(player)){player.x=ox;player.y=oy}if((keys.Space||$('throw').dataset.down==='1')&&cool<=0&&ammo>=1){let dx=mouse.x-player.x,dy=mouse.y-player.y,d=Math.hypot(dx,dy)||1;shots.push({x:player.x,y:player.y,vx:dx/d*520,vy:dy/d*520,r:7,t:1.3});ammo--;cool=.24;keys.Space=0;$('throw').dataset.down='0'}crates.forEach(q=>{if(Math.hypot(q.x-player.x,q.y-player.y)<38){ammo=Math.min(12,ammo+6);q.x=rnd(40,W-40);q.y=rnd(110,H-40)}});en.forEach(o=>{let dx=player.x-o.x,dy=player.y-o.y,d=Math.hypot(dx,dy)||1;o.vx=o.vx*.9+dx/d*8;o.vy=o.vy*.9+dy/d*8;let px=o.x,py=o.y;o.x+=o.vx;o.y+=o.vy;if(blocked(o)){o.x=px;o.y=py;o.vx*=-.5;o.vy*=-.5}o.cool-=dt;if(o.cool<=0&&d<520){enemyShots.push({x:o.x,y:o.y,vx:dx/d*(o.type==='pie'?250:330),vy:dy/d*(o.type==='pie'?250:330),r:o.type==='pie'?13:7,t:2.4,type:o.type});o.cool=rnd(.8,1.6)}});shots.forEach(s=>{s.x+=s.vx*dt;s.y+=s.vy*dt;s.t-=dt;if(blocked(s))s.t=0;en.forEach(o=>{if(s.t>0&&Math.hypot(s.x-o.x,s.y-o.y)<s.r+o.r){o.hp--;s.t=0;splats.push({x:o.x,y:o.y,r:rnd(10,24),c:'#ef4444'});if(o.hp<=0){score+=100*wave;o.dead=1}}})});shots=shots.filter(s=>s.t>0);en=en.filter(o=>!o.dead);enemyShots.forEach(s=>{s.x+=s.vx*dt;s.y+=s.vy*dt;s.t-=dt;if(blocked(s))s.t=0;if(s.t>0&&inv<=0&&Math.hypot(s.x-player.x,s.y-player.y)<s.r+player.r){hp--;inv=.8;s.t=0;splats.push({x:player.x,y:player.y,r:20,c:s.type==='pie'?'#f5f5dc':'#ef4444'});if(hp<=0){run=0;$('ov').style.display='grid';$('ov').querySelector('h1').innerHTML='SPLATTERED!';$('ov').querySelector('p').innerHTML='Score <b>'+score+'</b>. Wave <b>'+wave+'</b>.';$('start').textContent='FIGHT AGAIN'}}});enemyShots=enemyShots.filter(s=>s.t>0);if(en.length===0&&spawn<.2){wave++;ammo=Math.min(12,ammo+4)}ammo=Math.min(12,ammo+dt*.22);$('score').textContent=score;$('wave').textContent=wave;$('hp').textContent=hp;$('ammo').textContent=Math.floor(ammo)}function draw(){g.fillStyle='#f59e0b';g.fillRect(0,0,W,H);g.fillStyle='#fde68a';for(let x=0;x<W;x+=64)for(let y=90;y<H;y+=64){g.strokeStyle='#f59e0b55';g.strokeRect(x,y,64,64)}splats.forEach(s=>{g.fillStyle=s.c;g.beginPath();g.arc(s.x,s.y,s.r,0,7);g.fill()});cover.forEach(b=>{g.fillStyle=b.type==='table'?'#92400e':'#7c3aed';g.fillRect(b.x,b.y,b.w,b.h);g.fillStyle='#fff';g.font='900 11px system-ui';g.textAlign='center';g.fillText(b.type.toUpperCase(),b.x+b.w/2,b.y+b.h/2+4)});crates.forEach(q=>{g.fillStyle='#166534';g.fillRect(q.x-18,q.y-18,36,36);g.fillStyle='#ef4444';g.beginPath();g.arc(q.x,q.y,9,0,7);g.fill()});shots.forEach(s=>{g.fillStyle='#ef4444';g.beginPath();g.arc(s.x,s.y,s.r,0,7);g.fill()});enemyShots.forEach(s=>{g.fillStyle=s.type==='pie'?'#f5f5dc':'#dc2626';g.beginPath();g.arc(s.x,s.y,s.r,0,7);g.fill()});en.forEach(o=>{g.fillStyle=o.type==='pie'?'#7c3aed':'#0ea5e9';g.beginPath();g.arc(o.x,o.y,o.r,0,7);g.fill();g.fillStyle='#fff';g.font='900 11px system-ui';g.textAlign='center';g.fillText(o.type==='pie'?'PIE':'T',o.x,o.y+4)});g.save();g.translate(player.x,player.y);g.fillStyle=inv>0?'#fde68a':'#2563eb';g.beginPath();g.arc(0,0,player.r,0,7);g.fill();let a=Math.atan2(mouse.y-player.y,mouse.x-player.x);g.rotate(a);g.fillStyle='#ef4444';g.beginPath();g.arc(24,0,8,0,7);g.fill();g.restore()}function loop(t){let dt=Math.min(.033,(t-last)/1000||0);last=t;if(run)update(dt);draw();requestAnimationFrame(loop)}function stick(){let el=$('joy'),n=$('nub'),id=null;function mv(e){let r=el.getBoundingClientRect(),x=e.clientX-r.left-r.width/2,y=e.clientY-r.top-r.height/2,m=Math.hypot(x,y)||1,s=Math.min(1,45/m);joy.x=x/45*s;joy.y=y/45*s;n.style.transform=`translate(${joy.x*32}px,${joy.y*32}px)`}el.onpointerdown=e=>{id=e.pointerId;el.setPointerCapture(id);mv(e)};el.onpointermove=e=>{if(e.pointerId===id)mv(e)};el.onpointerup=()=>{id=null;joy.x=joy.y=0;n.style.transform=''}}stick();addEventListener('pointermove',e=>{mouse.x=e.clientX;mouse.y=e.clientY});c.addEventListener('pointerdown',e=>{mouse.x=e.clientX;mouse.y=e.clientY;$('throw').dataset.down='1'});addEventListener('keydown',e=>keys[e.code]=1);addEventListener('keyup',e=>keys[e.code]=0);$('throw').onpointerdown=e=>{e.stopPropagation();$('throw').dataset.down='1'};$('dash').onpointerdown=()=> $('dash').dataset.down='1';$('dash').onpointerup=()=> $('dash').dataset.down='0';$('start').onclick=reset;$('pause').onclick=()=>run=!run;mouse.x=W/2;mouse.y=H/3;requestAnimationFrame(loop)})()</script></html>
