<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Tomato Takedown</title><meta name="theme-color" content="#dc2626"><style>*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#1f130d;color:#fff;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;touch-action:none}canvas{width:100vw;height:100vh;display:block}.hud{position:fixed;z-index:9;top:max(10px,env(safe-area-inset-top));left:10px;right:10px;display:flex;justify-content:space-between;gap:8px;pointer-events:none}.stats{display:flex;gap:8px;flex-wrap:wrap}.pill,.btn{border:1px solid #ffffff30;background:#111827d9;color:#fff;border-radius:14px;padding:9px 12px;font-weight:900;box-shadow:0 8px 24px #0005;backdrop-filter:blur(8px)}.pill b{color:#fca5a5}.btn{pointer-events:auto}.overlay{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 50% 25%,#dc262666,#100706ef 65%);z-index:30;padding:20px;text-align:center}.card{width:min(92vw,660px);padding:26px;border:1px solid #ffffff2d;border-radius:27px;background:linear-gradient(180deg,#3b1717dd,#17110fee);box-shadow:0 30px 100px #000b}.card h1{font-size:clamp(43px,10vw,80px);line-height:.84;margin:0;color:#f87171;text-shadow:0 6px 0 #7f1d1d}.card p{color:#fee2e2;line-height:1.5}.primary{border:0;border-radius:999px;background:linear-gradient(135deg,#ef4444,#f97316);color:#fff;padding:14px 24px;font-size:18px;font-weight:1000}.controls{position:fixed;inset:0;z-index:12;pointer-events:none}.joy{position:absolute;left:18px;bottom:calc(18px + env(safe-area-inset-bottom));width:118px;height:118px;border-radius:50%;border:2px solid #ffffff35;background:#0005;pointer-events:auto}.nub{position:absolute;left:36px;top:36px;width:46px;height:46px;border-radius:50%;background:#60a5facc}.action{position:absolute;right:22px;bottom:calc(24px + env(safe-area-inset-bottom));width:94px;height:94px;border-radius:50%;border:2px solid #ffffff50;color:#fff;font-weight:1000;pointer-events:auto;box-shadow:0 8px 0 #450a0a}.throw{background:linear-gradient(135deg,#ef4444,#991b1b)}.dodge{right:130px;bottom:calc(42px + env(safe-area-inset-bottom));width:70px;height:70px;background:#2563eb;box-shadow:0 7px 0 #1e3a8a}.home{position:fixed;left:50%;bottom:6px;transform:translateX(-50%);z-index:20;color:#fff;text-decoration:none;font-size:12px;font-weight:900;background:#0008;padding:6px 10px;border-radius:999px}@media(pointer:fine){.joy,.action{opacity:.48}}@media(max-width:650px){.pill{font-size:12px;padding:7px 9px}.joy{width:106px;height:106px}.nub{left:30px;top:30px}.action{width:82px;height:82px}.dodge{right:112px;width:62px;height:62px}}</style></head><body><canvas id="c"></canvas><div class="hud"><div class="stats"><div class="pill">SCORE <b id="score">0</b></div><div class="pill">WAVE <b id="wave">1</b></div><div class="pill">HEALTH <b id="hp">5</b></div><div class="pill">AMMO <b id="ammo">8</b></div></div><button class="btn" id="pause">PAUSE</button></div><div class="controls"><div class="joy" id="joy"><div class="nub" id="nub"></div></div><button class="action dodge" id="dodge">DODGE</button><button class="action throw" id="throw">THROW</button></div><a class="home" href="index.html">← K2 HUB</a><div class="overlay" id="ov"><div class="card"><h1>TOMATO<br>TAKEDOWN</h1><p>A tighter twin-stick food fight. Movement stops immediately, aiming is independent, throws have wind-up and splash, and cover blocks both teams.</p><p><b>Move:</b> WASD/arrows or joystick &nbsp; <b>Aim:</b> mouse/right-side touch &nbsp; <b>Throw:</b> click/Space &nbsp; <b>Dodge:</b> Shift</p><button class="primary" id="start">START THE FIGHT</button></div></div><script>(()=>{const c=document.getElementById('c'),x=c.getContext('2d'),$=id=>document.getElementById(id),rnd=(a,b)=>a+Math.random()*(b-a),clamp=(v,a,b)=>Math.max(a,Math.min(b,v));let W=1,H=1,D=1,run=false,paused=false,last=0,score=0,wave=1,hp=5,ammo=8,keys={},joy={x:0,y:0},aim={x:0,y:0},enemies=[],shots=[],enemyShots=[],cover=[],crates=[],splats=[],fx=[],texts=[],spawn=0,shake=0,player={x:0,y:0,r:17,dirX:1,dirY:0,cool:0,charge:0,dodge:1,inv:0};function resize(){D=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0);if(!run){aim.x=W*.75;aim.y=H*.4}}addEventListener('resize',resize);resize();function build(){cover=[];crates=[];const rows=H>600?7:5;for(let i=0;i<rows;i++){const t=Math.random()<.55?'table':'cart',w=rnd(78,130),h=t==='table'?38:52;cover.push({x:rnd(55,W-55-w),y:rnd(120,H-90-h),w,h,t})}for(let i=0;i<3;i++)crates.push({x:rnd(55,W-55),y:rnd(120,H-55),r:18})}function enemy(type){let edge=Math.floor(rnd(0,4)),px=edge===0?35:edge===1?W-35:rnd(35,W-35),py=edge===2?100:edge===3?H-35:rnd(100,H-35);return{x:px,y:py,r:type==='pie'?19:16,type,hp:type==='pie'?4:2+Math.floor(wave/3),cool:rnd(.7,1.5),strafe:Math.random()<.5?-1:1,hit:0}}function blocked(px,py,r){return cover.some(o=>px+r>o.x&&px-r<o.x+o.w&&py+r>o.y&&py-r<o.y+o.h)}function reset(){run=true;paused=false;score=0;wave=1;hp=5;ammo=8;spawn=.4;enemies=[];shots=[];enemyShots=[];splats=[];fx=[];texts=[];shake=0;build();player.x=W/2;player.y=H*.7;player.cool=0;player.charge=0;player.dodge=1;player.inv=0;$('ov').style.display='none';$('pause').textContent='PAUSE';last=performance.now()}function fire(){if(player.cool>0||ammo<1)return;ammo--;player.cool=.26;const speed=500,dx=player.dirX,dy=player.dirY;shots.push({x:player.x+dx*22,y:player.y+dy*22,vx:dx*speed,vy:dy*speed,r:8,t:1.45,arc:0,splash:34});for(let i=0;i<5;i++)fx.push({x:player.x+dx*20,y:player.y+dy*20,vx:rnd(-40,40)-dx*40,vy:rnd(-40,40)-dy*40,t:.3,c:'#fca5a5'})}function update(dt){if(paused)return;spawn-=dt;if(spawn<=0&&enemies.length<4+wave){enemies.push(enemy(Math.random()<.22?'pie':'tomato'));spawn=Math.max(.55,1.35-wave*.055)}let mx=((keys.ArrowRight||keys.KeyD)?1:0)-((keys.ArrowLeft||keys.KeyA)?1:0)+joy.x,my=((keys.ArrowDown||keys.KeyS)?1:0)-((keys.ArrowUp||keys.KeyW)?1:0)+joy.y,ml=Math.hypot(mx,my);if(ml>1){mx/=ml;my/=ml}let dx=aim.x-player.x,dy=aim.y-player.y,dl=Math.hypot(dx,dy)||1;if(dl>10){player.dirX=dx/dl;player.dirY=dy/dl}if((keys.ShiftLeft||keys.ShiftRight||$('dodge').dataset.down==='1')&&player.dodge>=1){const dl2=ml||1,ddx=ml?mx/dl2:-player.dirY,ddy=ml?my/dl2:player.dirX;player.x=clamp(player.x+ddx*100,28,W-28);player.y=clamp(player.y+ddy*100,95,H-28);player.inv=.42;player.dodge=0;shake=6;for(let i=0;i<15;i++)fx.push({x:player.x,y:player.y,vx:rnd(-100,100),vy:rnd(-100,100),t:rnd(.2,.5),c:'#93c5fd'});$('dodge').dataset.down='0'}player.dodge=Math.min(1,player.dodge+dt*.68);player.inv=Math.max(0,player.inv-dt);const nx=clamp(player.x+mx*235*dt,27,W-27),ny=clamp(player.y+my*235*dt,94,H-27);if(!blocked(nx,player.y,player.r))player.x=nx;if(!blocked(player.x,ny,player.r))player.y=ny;player.cool=Math.max(0,player.cool-dt);if((keys.Space||$('throw').dataset.down==='1')&&player.cool<=0){fire();keys.Space=0;$('throw').dataset.down='0'}crates.forEach(q=>{if(Math.hypot(q.x-player.x,q.y-player.y)<36){ammo=Math.min(12,ammo+6);texts.push({x:q.x,y:q.y,t:.8,txt:'+6 TOMATOES'});q.x=rnd(50,W-50);q.y=rnd(110,H-50)}});enemies.forEach(e=>{let vx=player.x-e.x,vy=player.y-e.y,d=Math.hypot(vx,vy)||1,move=d>220?75:d<145?-55:0,side=e.strafe*58;let ex=(vx/d)*move+(-vy/d)*side,ey=(vy/d)*move+(vx/d)*side,nx=e.x+ex*dt,ny=e.y+ey*dt;if(!blocked(nx,e.y,e.r)&&nx>25&&nx<W-25)e.x=nx;else e.strafe*=-1;if(!blocked(e.x,ny,e.r)&&ny>92&&ny<H-25)e.y=ny;else e.strafe*=-1;e.cool-=dt;if(e.cool<=0&&d<520){const s=e.type==='pie'?240:330;enemyShots.push({x:e.x,y:e.y,vx:vx/d*s,vy:vy/d*s,r:e.type==='pie'?13:7,t:2.2,type:e.type,splash:e.type==='pie'?42:18});e.cool=rnd(.85,1.5)}});shots.forEach(s=>{s.x+=s.vx*dt;s.y+=s.vy*dt;s.t-=dt;s.arc+=dt*8;if(blocked(s.x,s.y,s.r))s.t=0;if(s.t>0)for(const e of enemies){if(e.hit>0)continue;if(Math.hypot(s.x-e.x,s.y-e.y)<s.r+e.r){s.t=0;for(const o of enemies){if(Math.hypot(s.x-o.x,s.y-o.y)<s.splash){o.hp--;o.hit=.08;if(o.hp<=0){o.dead=1;score+=o.type==='pie'?250:120}}}splats.push({x:s.x,y:s.y,r:rnd(22,38),c:'#dc2626'});for(let i=0;i<18;i++)fx.push({x:s.x,y:s.y,vx:rnd(-130,130),vy:rnd(-130,130),t:rnd(.25,.6),c:'#ef4444'});shake=4;break}}});shots=shots.filter(s=>s.t>0);enemies.forEach(e=>e.hit=Math.max(0,e.hit-dt));enemies=enemies.filter(e=>!e.dead);enemyShots.forEach(s=>{s.x+=s.vx*dt;s.y+=s.vy*dt;s.t-=dt;if(blocked(s.x,s.y,s.r))s.t=0;if(s.t>0&&player.inv<=0&&Math.hypot(s.x-player.x,s.y-player.y)<s.r+player.r){s.t=0;hp--;player.inv=.8;shake=12;splats.push({x:player.x,y:player.y,r:s.splash,c:s.type==='pie'?'#fef3c7':'#b91c1c'});texts.push({x:player.x,y:player.y-35,t:.8,txt:s.type==='pie'?'PIED!':'SPLAT!'});if(hp<=0){run=false;$('ov').style.display='grid';$('ov').querySelector('h1').innerHTML='SPLATTERED!';$('ov').querySelector('p').innerHTML='Score <b>'+score+'</b> through wave <b>'+wave+'</b>.';$('start').textContent='FIGHT AGAIN'}}});enemyShots=enemyShots.filter(s=>s.t>0);if(enemies.length===0&&spawn<.25){wave++;ammo=Math.min(12,ammo+3);hp=Math.min(5,hp+1);spawn=.75;texts.push({x:W/2,y:H/2,t:1.2,txt:'WAVE '+wave})}fx.forEach(f=>{f.x+=f.vx*dt;f.y+=f.vy*dt;f.t-=dt});fx=fx.filter(f=>f.t>0);texts.forEach(t=>{t.y-=25*dt;t.t-=dt});texts=texts.filter(t=>t.t>0);shake=Math.max(0,shake-dt*28);$('score').textContent=score;$('wave').textContent=wave;$('hp').textContent=hp;$('ammo').textContent=ammo}function plaza(){x.fillStyle='#f2c078';x.fillRect(0,0,W,H);for(let yy=90;yy<H;yy+=54)for(let xx=0;xx<W;xx+=54){x.strokeStyle='#b4530940';x.strokeRect(xx,yy,54,54)}x.fillStyle='#b91c1c';x.fillRect(0,80,W,12);x.fillStyle='#fef3c7';for(let xx=0;xx<W;xx+=40)x.fillRect(xx,80,20,12)}function drawCover(o){x.save();x.translate(o.x,o.y);if(o.t==='table'){x.fillStyle='#92400e';x.fillRect(0,8,o.w,o.h-8);x.fillStyle='#fef3c7';x.fillRect(-4,0,o.w+8,14);x.fillStyle='#78350f';x.fillRect(8,o.h-2,8,18);x.fillRect(o.w-16,o.h-2,8,18)}else{x.fillStyle='#7c3aed';x.fillRect(0,8,o.w,o.h-8);x.fillStyle='#facc15';x.fillRect(0,0,o.w,14);x.fillStyle='#111827';x.beginPath();x.arc(12,o.h+2,7,0,7);x.arc(o.w-12,o.h+2,7,0,7);x.fill()}x.restore()}function enemyDraw(e){x.save();x.translate(e.x,e.y);x.fillStyle=e.hit>0?'#fff':e.type==='pie'?'#7c3aed':'#0ea5e9';x.beginPath();x.arc(0,0,e.r,0,7);x.fill();x.fillStyle='#fed7aa';x.beginPath();x.arc(0,-e.r*.8,e.r*.55,0,7);x.fill();x.fillStyle=e.type==='pie'?'#fef3c7':'#ef4444';x.beginPath();x.arc(13,0,e.type==='pie'?8:6,0,7);x.fill();x.restore()}function draw(){x.save();if(shake)x.translate(rnd(-shake,shake),rnd(-shake,shake));plaza();splats.forEach(s=>{x.globalAlpha=.75;x.fillStyle=s.c;x.beginPath();x.arc(s.x,s.y,s.r,0,7);x.fill();for(let i=0;i<5;i++){x.beginPath();x.arc(s.x+Math.cos(i*1.7)*s.r*1.2,s.y+Math.sin(i*1.7)*s.r*1.2,rnd(3,7),0,7);x.fill()}x.globalAlpha=1});cover.forEach(drawCover);crates.forEach(q=>{x.fillStyle='#166534';x.fillRect(q.x-18,q.y-18,36,36);x.fillStyle='#ef4444';x.beginPath();x.arc(q.x,q.y,9,0,7);x.fill();x.fillStyle='#14532d';x.fillRect(q.x-2,q.y-14,4,6)});shots.forEach(s=>{x.fillStyle='#ef4444';x.beginPath();x.arc(s.x,s.y,s.r+Math.sin(s.arc)*2,0,7);x.fill();x.fillStyle='#14532d';x.fillRect(s.x-2,s.y-11,4,5)});enemyShots.forEach(s=>{x.fillStyle=s.type==='pie'?'#fef3c7':'#b91c1c';x.beginPath();x.arc(s.x,s.y,s.r,0,7);x.fill()});enemies.forEach(enemyDraw);x.save();x.translate(player.x,player.y);x.rotate(Math.atan2(player.dirY,player.dirX));x.globalAlpha=player.inv>0&&Math.floor(player.inv*20)%2?.45:1;x.fillStyle='#2563eb';x.beginPath();x.arc(0,0,player.r,0,7);x.fill();x.fillStyle='#fed7aa';x.beginPath();x.arc(0,-15,9,0,7);x.fill();x.fillStyle='#ef4444';x.beginPath();x.arc(23,0,8,0,7);x.fill();x.strokeStyle='#fff';x.globalAlpha=.35;x.beginPath();x.moveTo(24,0);x.lineTo(82,0);x.stroke();x.restore();fx.forEach(f=>{x.globalAlpha=Math.max(0,f.t*2);x.fillStyle=f.c;x.fillRect(f.x,f.y,5,5);x.globalAlpha=1});texts.forEach(t=>{x.globalAlpha=t.t;x.fillStyle='#fff';x.strokeStyle='#7f1d1d';x.lineWidth=5;x.font='1000 22px system-ui';x.textAlign='center';x.strokeText(t.txt,t.x,t.y);x.fillText(t.txt,t.x,t.y);x.globalAlpha=1});x.restore();x.fillStyle='#ffffff22';x.fillRect(W-20,H-140,8,100);x.fillStyle='#60a5fa';x.fillRect(W-20,H-140+(1-player.dodge)*100,8,player.dodge*100)}function loop(t){let dt=Math.min(.033,(t-last)/1000||0);last=t;if(run)update(dt);draw();requestAnimationFrame(loop)}function stick(){const el=$('joy'),nub=$('nub');let id=null;function mv(e){let r=el.getBoundingClientRect(),dx=e.clientX-r.left-r.width/2,dy=e.clientY-r.top-r.height/2,m=Math.hypot(dx,dy)||1,s=Math.min(1,43/m);joy.x=dx/43*s;joy.y=dy/43*s;nub.style.transform=`translate(${joy.x*31}px,${joy.y*31}px)`}el.onpointerdown=e=>{id=e.pointerId;el.setPointerCapture(id);mv(e)};el.onpointermove=e=>{if(e.pointerId===id)mv(e)};el.onpointerup=()=>{id=null;joy.x=joy.y=0;nub.style.transform=''}}stick();addEventListener('pointermove',e=>{aim.x=e.clientX;aim.y=e.clientY});c.onpointerdown=e=>{aim.x=e.clientX;aim.y=e.clientY;$('throw').dataset.down='1'};addEventListener('keydown',e=>{keys[e.code]=1;if(e.code==='KeyP')$('pause').click()});addEventListener('keyup',e=>keys[e.code]=0);$('throw').onpointerdown=e=>{e.preventDefault();e.stopPropagation();$('throw').dataset.down='1'};$('throw').onpointerup=()=>$('throw').dataset.down='0';$('dodge').onpointerdown=e=>{e.preventDefault();$('dodge').dataset.down='1'};$('dodge').onpointerup=()=>$('dodge').dataset.down='0';$('start').onclick=reset;$('pause').onclick=()=>{if(!run)return;paused=!paused;$('pause').textContent=paused?'RESUME':'PAUSE'};aim.x=W*.75;aim.y=H*.45;requestAnimationFrame(loop)})()</script></body></html>
