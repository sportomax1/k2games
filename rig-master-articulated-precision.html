<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>Rig Master: Boat Ramp</title>
<style>
:root {
  --panel: rgba(9, 11, 11, 0.76);
  --line: rgba(255, 255, 255, 0.24);
  --ink: #f6f3e8;
  --gold: #ffbd38;
  --orange: #ff8a00;
  --danger: #ee5f4f;
  --good: #80de78;
}
* {
  box-sizing: border-box;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}
html,
body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #122624;
  color: var(--ink);
  font-family: Impact, Haettenschweiler, "Arial Narrow Bold", system-ui, sans-serif;
  touch-action: none;
}
body {
  position: fixed;
  inset: 0;
  min-height: 100dvh;
}
#app {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
  overflow: hidden;
  background:
    radial-gradient(circle at 20% 18%, rgba(112, 150, 93, 0.26), transparent 30%),
    radial-gradient(circle at 86% 78%, rgba(21, 97, 105, 0.42), transparent 36%),
    #122624;
}
#stage {
  position: relative;
  width: min(100vw, calc(100dvh * 9 / 16));
  height: min(100dvh, calc(100vw * 16 / 9));
  max-width: 720px;
  max-height: 1280px;
  overflow: hidden;
  background: #213a34;
  box-shadow: 0 0 34px rgba(0, 0, 0, 0.55);
}
#game {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  background: #31544e;
}
.hud {
  position: absolute;
  z-index: 5;
  border: 2px solid rgba(255, 255, 255, 0.22);
  background: var(--panel);
  box-shadow:
    inset 0 0 0 1px rgba(0, 0, 0, 0.28),
    0 10px 24px rgba(0, 0, 0, 0.24);
  backdrop-filter: blur(8px);
  text-shadow: 0 2px 4px rgba(0, 0, 0, 0.75);
}
#menu {
  left: max(12px, env(safe-area-inset-left));
  top: max(12px, env(safe-area-inset-top));
  width: clamp(40px, 8.5vw, 54px);
  aspect-ratio: 1;
  border-radius: 8px;
  display: grid;
  place-items: center;
  pointer-events: auto;
  cursor: pointer;
}
.reset-icon {
  position: relative;
  display: block;
  width: 24px;
  height: 24px;
  border: 4px solid #fff;
  border-right-color: transparent;
  border-radius: 999px;
  transform: rotate(-35deg);
  filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.55));
}
.reset-icon::after {
  content: "";
  position: absolute;
  right: -5px;
  top: -5px;
  border-left: 9px solid #fff;
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
  transform: rotate(30deg);
}
#mission {
  top: max(13px, env(safe-area-inset-top));
  left: 50%;
  transform: translateX(-50%);
  width: min(46%, 310px);
  min-height: 48px;
  border-radius: 8px;
  display: grid;
  place-items: center;
  padding: 7px 10px;
  text-align: center;
  font-size: clamp(13px, 2.7vw, 21px);
  line-height: 1.15;
  letter-spacing: 0.04em;
}
#level-card {
  right: max(12px, env(safe-area-inset-right));
  top: max(12px, env(safe-area-inset-top));
  width: clamp(68px, 13vw, 90px);
  min-height: 62px;
  border-radius: 8px;
  padding: 8px 5px;
  text-align: center;
  font-size: clamp(12px, 2.3vw, 17px);
  line-height: 1.1;
  letter-spacing: 0.03em;
}
#stars {
  margin-top: 5px;
  display: flex;
  justify-content: center;
  gap: 3px;
}
.star {
  width: clamp(12px, 2.7vw, 18px);
  height: clamp(12px, 2.7vw, 18px);
  clip-path: polygon(50% 0%, 62% 34%, 98% 35%, 69% 56%, 79% 91%, 50% 70%, 21% 91%, 31% 56%, 2% 35%, 38% 34%);
  background: linear-gradient(#fff5a8, var(--gold) 58%, #b55d10);
  filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.75));
}
.star.dim {
  background: linear-gradient(#626767, #363b3d);
}
#toast {
  display: none;
  left: 50%;
  bottom: 22%;
  transform: translateX(-50%);
  min-width: 180px;
  max-width: 76%;
  border-radius: 10px;
  padding: 10px 14px;
  text-align: center;
  opacity: 0;
  translate: 0 12px;
  transition: opacity 180ms ease, translate 180ms ease;
  font-size: clamp(16px, 3.2vw, 24px);
  letter-spacing: 0.04em;
  pointer-events: none;
}
#toast.show {
  opacity: 1;
  translate: 0 0;
}
#readouts {
  left: max(12px, env(safe-area-inset-left));
  top: 76px;
  border-radius: 8px;
  padding: 6px 8px;
  font-family: "Arial Narrow", Arial, sans-serif;
  font-weight: 900;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  font-size: clamp(9px, 1.8vw, 12px);
}
#wheel-pad {
  position: absolute;
  z-index: 6;
  left: max(14px, env(safe-area-inset-left));
  bottom: max(16px, env(safe-area-inset-bottom));
  width: clamp(128px, 27vw, 190px);
  aspect-ratio: 1;
  border-radius: 999px;
  pointer-events: auto;
  touch-action: none;
}
#wheel {
  position: absolute;
  inset: 0;
  border-radius: 999px;
  background:
    radial-gradient(circle at 50% 50%, #f2f2f2 0 5%, #8d8f8d 8%, #222 9% 16%, transparent 17%),
    conic-gradient(from 0deg, #060707, #333 18%, #0b0b0b 34%, #333 51%, #0a0a0a 70%, #363636 86%, #060707);
  box-shadow:
    inset 0 0 0 9px #111,
    inset 0 0 0 16px rgba(255, 255, 255, 0.04),
    0 9px 22px rgba(0, 0, 0, 0.58);
}
#wheel::before,
#wheel::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 50%;
  width: 42%;
  height: 12%;
  border-radius: 999px;
  background: linear-gradient(#252525, #080808);
  transform-origin: left center;
  box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.12);
}
#wheel::before { transform: rotate(24deg); }
#wheel::after { transform: rotate(156deg); }
#wheel-spoke {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 12%;
  height: 38%;
  border-radius: 999px;
  background: linear-gradient(90deg, #070707, #272727, #070707);
  transform: translateX(-50%);
  transform-origin: top center;
}
#turn-arrow {
  position: absolute;
  z-index: 7;
  left: max(32px, env(safe-area-inset-left));
  bottom: calc(max(16px, env(safe-area-inset-bottom)) + clamp(126px, 26vw, 186px));
  width: clamp(42px, 9vw, 66px);
  height: clamp(30px, 6vw, 46px);
  opacity: 0.72;
  filter: drop-shadow(0 3px 3px rgba(0, 0, 0, 0.5));
  pointer-events: none;
}
#turn-arrow::before {
  content: "";
  position: absolute;
  inset: 0;
  border-left: clamp(9px, 2vw, 14px) solid #fff;
  border-top: clamp(9px, 2vw, 14px) solid #fff;
  border-radius: 100% 0 0 0;
  transform: rotate(34deg);
}
#turn-arrow::after {
  content: "";
  position: absolute;
  right: 0;
  top: 0;
  border-left: clamp(18px, 3.2vw, 28px) solid #fff;
  border-top: clamp(12px, 2.4vw, 18px) solid transparent;
  border-bottom: clamp(12px, 2.4vw, 18px) solid transparent;
  transform: rotate(24deg);
}
#shifter {
  position: absolute;
  z-index: 8;
  right: max(14px, env(safe-area-inset-right));
  bottom: calc(max(16px, env(safe-area-inset-bottom)) + 98px);
  width: clamp(52px, 10vw, 72px);
  height: clamp(150px, 27vh, 220px);
  border-radius: 11px;
  padding: 12px 7px;
  pointer-events: auto;
  touch-action: none;
}
.gear-row {
  position: relative;
  z-index: 2;
  height: 25%;
  display: grid;
  align-items: center;
  justify-items: start;
  padding-left: 10%;
  color: #dad8d2;
  font-size: clamp(17px, 3.5vw, 25px);
  line-height: 1;
}
.gear-row.active {
  color: var(--orange);
  text-shadow: 0 0 13px rgba(255, 138, 0, 0.95);
}
#slot {
  position: absolute;
  right: 10px;
  top: 20px;
  bottom: 20px;
  width: 16px;
  border-radius: 999px;
  background: #070707;
  box-shadow: inset 0 0 8px rgba(255, 255, 255, 0.13);
}
#knob {
  position: absolute;
  z-index: 3;
  right: 1px;
  width: 36px;
  height: 36px;
  border-radius: 999px;
  background: radial-gradient(circle at 33% 30%, #fff, #d9d9d9 22%, #8c8c8c 42%, #303030 72%);
  box-shadow: 0 5px 12px rgba(0, 0, 0, 0.58);
  transition: top 150ms ease;
}
#camera {
  position: absolute;
  z-index: 8;
  right: max(14px, env(safe-area-inset-right));
  bottom: max(16px, env(safe-area-inset-bottom));
  width: clamp(52px, 10vw, 70px);
  aspect-ratio: 1;
  border-radius: 9px;
  pointer-events: auto;
  display: grid;
  place-items: center;
  cursor: pointer;
}
#camera-icon {
  width: 29px;
  height: 20px;
  border-radius: 4px;
  background: #fff;
  position: relative;
}
#camera-icon::after {
  content: "";
  position: absolute;
  right: -12px;
  top: 4px;
  border-left: 12px solid #fff;
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
}
@media (max-width: 520px) {
  #mission {
    top: 12px;
    min-height: 42px;
    padding: 6px 8px;
  }
  #readouts {
    display: none;
  }
}
</style>
</head>
<body>
<div id="app">
  <main id="stage" aria-label="Rig Master boat ramp game">
    <canvas id="game" width="720" height="1280"></canvas>

    <button id="menu" class="hud" type="button" aria-label="Restart level">
      <span class="reset-icon"></span>
    </button>

    <section id="mission" class="hud">BACK TRAILER DOWN THE RAMP AND INTO THE WATER</section>

    <section id="level-card" class="hud" aria-live="polite">
      <div id="level-label">LEVEL 1</div>
      <div id="stars" aria-label="star rating">
        <span class="star"></span>
        <span class="star"></span>
        <span class="star"></span>
      </div>
    </section>

    <section id="readouts" class="hud">
      <div id="speed">MPH 0</div>
      <div id="angle">ANGLE 0</div>
      <div id="damage">DAMAGE 0%</div>
    </section>

    <div id="toast" class="hud">Line up slow and steady</div>

    <div id="turn-arrow"></div>
    <div id="wheel-pad" aria-label="Steering wheel">
      <div id="wheel"><div id="wheel-spoke"></div></div>
    </div>

    <div id="shifter" class="hud" aria-label="Gear selector">
      <div id="slot"></div>
      <div id="knob"></div>
      <div class="gear-row" data-gear="P">P</div>
      <div class="gear-row active" data-gear="R">R</div>
      <div class="gear-row" data-gear="N">N</div>
      <div class="gear-row" data-gear="D">D</div>
    </div>

    <button id="camera" class="hud" type="button" aria-label="Reset camera">
      <span id="camera-icon"></span>
    </button>
  </main>
</div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d", { alpha: false });
  const stage = document.getElementById("stage");
  const wheelPad = document.getElementById("wheel-pad");
  const wheel = document.getElementById("wheel");
  const shifter = document.getElementById("shifter");
  const knob = document.getElementById("knob");
  const gearRows = [...document.querySelectorAll(".gear-row")];
  const levelLabel = document.getElementById("level-label");
  const stars = [...document.querySelectorAll(".star")];
  const mission = document.getElementById("mission");
  const speedEl = document.getElementById("speed");
  const angleEl = document.getElementById("angle");
  const damageEl = document.getElementById("damage");
  const menuBtn = document.getElementById("menu");
  const cameraBtn = document.getElementById("camera");

  const W = 720;
  const H = 1280;
  const gears = ["P", "R", "N", "D"];
  const levelData = [
    { name: "LEVEL 1", rampX: 360, rampW: 184, startX: 360, truckY: 340, targetX: 360, targetY: 915, dockX: 570, wind: 0.05, bend: 0 },
    { name: "LEVEL 2", rampX: 332, rampW: 162, startX: 346, truckY: 300, targetX: 334, targetY: 924, dockX: 552, wind: 0.13, bend: 34 },
    { name: "LEVEL 3", rampX: 358, rampW: 146, startX: 360, truckY: 288, targetX: 358, targetY: 938, dockX: 565, wind: 0.19, bend: -42 }
  ];

  const truck = { x: 360, y: 320, a: -Math.PI / 2, v: 0 };
  const trailer = { x: 360, y: 440, a: -Math.PI / 2 };
  const input = {
    steer: 0,
    steerTarget: 0,
    wheelPointer: null,
    wheelActive: false,
    wheelStartX: 0,
    wheelStartY: 0,
    wheelStartSteer: 0,
    gas: false,
    brake: false,
    keys: new Set()
  };
  const state = {
    level: 0,
    gear: "R",
    t: 0,
    damage: 0,
    score: 3,
    win: false,
    lastHitchX: 360,
    lastHitchY: 380,
    cameraShake: 0,
    tireTracks: []
  };

  const truckLen = 86;
  const trailerLen = 154;
  const hitchOffset = 56;
  const tongueLen = 42;
  const maxSteer = 0.58;

  function clamp(n, a, b) {
    return Math.max(a, Math.min(b, n));
  }

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  function normAngle(a) {
    while (a > Math.PI) a -= Math.PI * 2;
    while (a < -Math.PI) a += Math.PI * 2;
    return a;
  }

  function preventDefaults(target) {
    ["touchstart", "touchmove", "touchend", "pointerdown", "pointermove", "pointerup", "contextmenu", "dragstart", "selectstart"].forEach((name) => {
      target.addEventListener(name, (event) => event.preventDefault(), { passive: false });
    });
  }

  preventDefaults(window);
  preventDefaults(document);
  preventDefaults(stage);

  function resetLevel(next = false) {
    if (next) state.level = (state.level + 1) % levelData.length;
    const level = levelData[state.level];
    truck.x = level.startX;
    truck.y = level.truckY;
    truck.a = -Math.PI / 2;
    truck.v = 0;
    trailer.a = -Math.PI / 2;
    const hitchX = truck.x - Math.cos(truck.a) * hitchOffset;
    const hitchY = truck.y - Math.sin(truck.a) * hitchOffset;
    trailer.x = hitchX - Math.cos(trailer.a) * trailerLen;
    trailer.y = hitchY - Math.sin(trailer.a) * trailerLen;
    state.lastHitchX = hitchX;
    state.lastHitchY = hitchY;
    state.damage = 0;
    state.score = 3;
    state.win = false;
    state.cameraShake = 0;
    state.tireTracks = [];
    state.gear = "R";
    input.steer = 0;
    input.steerTarget = 0;
    mission.textContent = "BACK TRAILER DOWN THE RAMP AND INTO THE WATER";
    updateHud();
  }

  function setGear(gear) {
    state.gear = gear;
    updateHud();
  }

  function updateHud() {
    const level = levelData[state.level];
    levelLabel.textContent = level.name;
    gearRows.forEach((row) => row.classList.toggle("active", row.dataset.gear === state.gear));
    stars.forEach((star, index) => star.classList.toggle("dim", index >= state.score));
    const rowIndex = gears.indexOf(state.gear);
    const shifterH = shifter.getBoundingClientRect().height || 260;
    const knobH = knob.getBoundingClientRect().height || 52;
    const top = 12 + (rowIndex + 0.5) * ((shifterH - 24) / 4) - knobH / 2;
    knob.style.top = `${top}px`;
    const angle = Math.round(normAngle(truck.a - trailer.a) * 180 / Math.PI);
    speedEl.textContent = `MPH ${Math.abs(truck.v * 0.62).toFixed(1)}`;
    angleEl.textContent = `ANGLE ${angle}`;
    damageEl.textContent = `DAMAGE ${Math.round(state.damage)}%`;
  }

  function pickGearFromY(y) {
    const rect = shifter.getBoundingClientRect();
    const index = clamp(Math.floor(((y - rect.top) / rect.height) * 4), 0, 3);
    setGear(gears[index]);
  }

  shifter.addEventListener("pointerdown", (event) => {
    event.preventDefault();
    pickGearFromY(event.clientY);
    shifter.setPointerCapture(event.pointerId);
  }, { passive: false });
  shifter.addEventListener("pointermove", (event) => {
    if (event.buttons) pickGearFromY(event.clientY);
  }, { passive: false });

  function wheelInput(event, start = false) {
    const rect = wheelPad.getBoundingClientRect();
    if (start) {
      input.wheelStartX = event.clientX;
      input.wheelStartY = event.clientY;
      input.wheelStartSteer = input.steerTarget;
      return;
    }
    const dx = event.clientX - input.wheelStartX;
    const dy = event.clientY - input.wheelStartY;
    input.steerTarget = clamp(input.wheelStartSteer + (dx - dy * 0.24) / (rect.width * 0.58), -1, 1);
  }

  wheelPad.addEventListener("pointerdown", (event) => {
    event.preventDefault();
    input.wheelActive = true;
    input.wheelPointer = event.pointerId;
    wheelPad.setPointerCapture(event.pointerId);
    wheelInput(event, true);
  }, { passive: false });
  wheelPad.addEventListener("pointermove", (event) => {
    if (input.wheelPointer !== event.pointerId) return;
    event.preventDefault();
    wheelInput(event);
  }, { passive: false });
  function releaseWheel(event) {
    if (input.wheelPointer !== event.pointerId) return;
    input.wheelPointer = null;
    input.wheelActive = false;
  }
  wheelPad.addEventListener("pointerup", releaseWheel, { passive: false });
  wheelPad.addEventListener("pointercancel", releaseWheel, { passive: false });

  window.addEventListener("keydown", (event) => {
    if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "KeyW", "KeyA", "KeyS", "KeyD", "Space", "KeyR", "KeyP", "KeyN"].includes(event.code)) {
      event.preventDefault();
    }
    if (!event.repeat && event.code === "KeyR") setGear("R");
    if (!event.repeat && event.code === "KeyP") setGear("P");
    if (!event.repeat && event.code === "KeyN") setGear("N");
    input.keys.add(event.code);
  }, { passive: false });
  window.addEventListener("keyup", (event) => input.keys.delete(event.code));

  menuBtn.addEventListener("pointerdown", (event) => {
    event.preventDefault();
    resetLevel(false);
  }, { passive: false });
  cameraBtn.addEventListener("pointerdown", (event) => {
    event.preventDefault();
  }, { passive: false });

  function rampCenterAt(y) {
    const level = levelData[state.level];
    const p = clamp((y - 340) / 600, 0, 1);
    return level.rampX + Math.sin(p * Math.PI) * level.bend;
  }

  function rampWidthAt(y) {
    const level = levelData[state.level];
    const p = clamp((y - 300) / 700, 0, 1);
    return lerp(level.rampW + 70, level.rampW, p);
  }

  function rampHalfAt(y) {
    return rampWidthAt(y) / 2;
  }

  function addDamage(amount, message) {
    state.damage = clamp(state.damage + amount, 0, 100);
    state.cameraShake = Math.max(state.cameraShake, amount * 0.9);
    state.score = state.damage > 45 ? 1 : state.damage > 16 ? 2 : 3;
  }

  function update(dt) {
    state.t += dt;

    const left = input.keys.has("ArrowLeft") || input.keys.has("KeyA");
    const right = input.keys.has("ArrowRight") || input.keys.has("KeyD");
    const gasKey = input.keys.has("ArrowUp") || input.keys.has("KeyW");
    const brakeKey = input.keys.has("ArrowDown") || input.keys.has("KeyS") || input.keys.has("Space");
    const keySteer = (right ? 1 : 0) - (left ? 1 : 0);
    if (keySteer && !input.wheelActive) input.steerTarget = keySteer;
    if (!keySteer && !input.wheelActive) input.steerTarget *= Math.max(0, 1 - dt * 3.8);
    input.steer += (input.steerTarget - input.steer) * clamp(dt * 5.5, 0, 1);

    let accel = 0;
    if (state.gear === "R") accel = -58;
    if (state.gear === "D") accel = 62;
    if (state.gear === "P") truck.v *= Math.max(0, 1 - dt * 16);
    if (state.gear !== "P" && state.gear !== "N") {
      const crawl = gasKey ? 1 : 0.42;
      truck.v += accel * crawl * dt;
    }
    if (brakeKey) truck.v *= Math.max(0, 1 - dt * 8.5);

    const level = levelData[state.level];
    const waterDrag = trailer.y > 860 ? 1.6 : 0;
    truck.v -= truck.v * (0.84 + waterDrag) * dt;
    truck.v = clamp(truck.v, -82, 92);
    if (Math.abs(truck.v) < 0.018) truck.v = 0;

    truck.a += (truck.v / truckLen) * Math.tan(input.steer * maxSteer) * dt;
    truck.x += Math.cos(truck.a) * truck.v * dt;
    truck.y += Math.sin(truck.a) * truck.v * dt;

    truck.x = clamp(truck.x, 80, W - 80);
    truck.y = clamp(truck.y, 160, 1030);

    const hitchX = truck.x - Math.cos(truck.a) * hitchOffset;
    const hitchY = truck.y - Math.sin(truck.a) * hitchOffset;
    const hvx = (hitchX - state.lastHitchX) / Math.max(dt, 0.001);
    const hvy = (hitchY - state.lastHitchY) / Math.max(dt, 0.001);
    state.lastHitchX = hitchX;
    state.lastHitchY = hitchY;

    const trailerSide = -Math.sin(trailer.a) * hvx + Math.cos(trailer.a) * hvy;
    const windPush = (trailer.y > 720 ? level.wind : level.wind * 0.2) * Math.sin(state.t * 0.9 + state.level);
    trailer.a += clamp(trailerSide / trailerLen + windPush, -1.65, 1.65) * dt;
    trailer.x = hitchX - Math.cos(trailer.a) * trailerLen;
    trailer.y = hitchY - Math.sin(trailer.a) * trailerLen;

    const art = Math.abs(normAngle(truck.a - trailer.a));
    if (art > 1.32 && Math.abs(truck.v) > 10) {
      truck.v *= 0.94;
      addDamage(dt * 14, "Jackknife angle");
    }

    const truckOff = Math.abs(truck.x - rampCenterAt(truck.y)) > rampHalfAt(truck.y) + 48;
    const trailerOff = Math.abs(trailer.x - rampCenterAt(trailer.y)) > rampHalfAt(trailer.y) + 28;
    if ((truckOff || trailerOff) && Math.abs(truck.v) > 8) addDamage(dt * 12, "Ramp edge");

    if (truck.y > 918 && Math.abs(truck.v) > 8) addDamage(dt * 8, "Truck too deep");

    const dockHit = trailer.x > level.dockX - 48 && trailer.x < level.dockX + 94 && trailer.y > 695 && trailer.y < 1080;
    const rockHit = (trailer.x < 146 && trailer.y > 790) || (truck.x < 118 && truck.y > 760);
    if ((dockHit || rockHit) && Math.abs(truck.v) > 5) {
      truck.v *= 0.78;
      addDamage(dt * 36, dockHit ? "Dock strike" : "Rock strike");
    }

    if (state.tireTracks.length === 0 || Math.hypot(state.tireTracks[state.tireTracks.length - 1].x - truck.x, state.tireTracks[state.tireTracks.length - 1].y - truck.y) > 10) {
      state.tireTracks.push({ x: truck.x, y: truck.y, a: truck.a, life: 1 });
      if (state.tireTracks.length > 86) state.tireTracks.shift();
    }

    const targetClose = Math.abs(trailer.x - level.targetX) < 44 && trailer.y > level.targetY - 56 && trailer.y < level.targetY + 58;
    const linedUp = art < 0.72 && Math.abs(normAngle(trailer.a - Math.PI / 2)) < 0.42;
    const slow = Math.abs(truck.v) < 14;
    if (!state.win && targetClose && linedUp && slow && truck.y < 870) {
      state.win = true;
      mission.textContent = "LAUNCH COMPLETE";
    } else if (!state.win && state.damage >= 100) {
      mission.textContent = "RIG DAMAGED";
      truck.v *= 0.9;
    } else if (!state.win) {
      mission.textContent = trailer.y < 760 ? "BACK TRAILER DOWN THE RAMP" : "EASE THE BOAT INTO THE WATER";
    }

    state.cameraShake = Math.max(0, state.cameraShake - dt * 13);
    wheel.style.transform = `rotate(${input.steer * 138}deg)`;
    updateHud();
  }

  function roundedRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function fillRound(x, y, w, h, r, color) {
    ctx.fillStyle = color;
    roundedRect(x, y, w, h, r);
    ctx.fill();
  }

  function drawWater() {
    const grd = ctx.createLinearGradient(0, 730, 0, H);
    grd.addColorStop(0, "#26717a");
    grd.addColorStop(0.58, "#0f5a5c");
    grd.addColorStop(1, "#0a383b");
    ctx.fillStyle = grd;
    ctx.fillRect(0, 730, W, 550);
    ctx.globalAlpha = 0.22;
    ctx.strokeStyle = "#d9fff1";
    ctx.lineWidth = 2;
    for (let i = 0; i < 36; i++) {
      const y = 760 + i * 16 + Math.sin(state.t * 1.7 + i) * 7;
      const start = (i * 31 + state.t * 22) % 160 - 80;
      ctx.beginPath();
      for (let x = start; x < W + 100; x += 18) {
        const yy = y + Math.sin(x * 0.025 + state.t * 2.4 + i) * 4;
        if (x === start) ctx.moveTo(x, yy);
        else ctx.lineTo(x, yy);
      }
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function drawTrees() {
    ctx.fillStyle = "#2b4c2e";
    ctx.fillRect(0, 0, 118, 760);
    ctx.fillRect(594, 0, 126, 700);
    for (let i = 0; i < 82; i++) {
      const right = i % 2 === 0;
      const x = right ? 590 + ((i * 53) % 160) : -30 + ((i * 47) % 150);
      const y = -20 + ((i * 91) % 820);
      const r = 26 + ((i * 7) % 28);
      const color = i % 3 === 0 ? "#537a34" : i % 3 === 1 ? "#2f6334" : "#6c8f3d";
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = "#122c1a";
      ctx.beginPath();
      ctx.arc(x + r * 0.18, y + r * 0.2, r * 0.72, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  function drawGround() {
    ctx.fillStyle = "#53615a";
    ctx.fillRect(110, 0, 480, 730);
    ctx.globalAlpha = 0.13;
    for (let i = 0; i < 900; i++) {
      const x = 112 + ((i * 37) % 476);
      const y = ((i * 67) % 720);
      ctx.fillStyle = i % 4 === 0 ? "#0f1312" : "#d5d2bd";
      ctx.fillRect(x, y, 1.4, 1.4);
    }
    ctx.globalAlpha = 1;

    ctx.strokeStyle = "rgba(255,255,255,0.36)";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(0, 246);
    ctx.lineTo(135, 285);
    ctx.moveTo(135, 285);
    ctx.lineTo(135, 464);
    for (let i = 0; i < 8; i++) {
      ctx.moveTo(28 + i * 18, 280 + i * 3);
      ctx.lineTo(135, 330 + i * 18);
    }
    ctx.stroke();

    fillRound(38, 280, 72, 176, 8, "#182023");
    fillRound(48, 292, 52, 150, 7, "#222b30");
    ctx.fillStyle = "#0d1418";
    ctx.fillRect(42, 302, 8, 120);
  }

  function drawRamp() {
    const level = levelData[state.level];
    ctx.save();
    ctx.fillStyle = "#77736b";
    ctx.beginPath();
    for (let y = 314; y <= 1032; y += 16) {
      const c = rampCenterAt(y);
      const half = rampHalfAt(y);
      if (y === 314) ctx.moveTo(c - half - 16, y);
      else ctx.lineTo(c - half - 16, y);
    }
    for (let y = 1032; y >= 314; y -= 16) {
      const c = rampCenterAt(y);
      const half = rampHalfAt(y);
      ctx.lineTo(c + half + 16, y);
    }
    ctx.closePath();
    ctx.fill();

    const grd = ctx.createLinearGradient(0, 300, 0, 1020);
    grd.addColorStop(0, "#8a8880");
    grd.addColorStop(0.62, "#6f6b63");
    grd.addColorStop(1, "#4e5554");
    ctx.fillStyle = grd;
    ctx.beginPath();
    for (let y = 316; y <= 1030; y += 16) {
      const c = rampCenterAt(y);
      const half = rampHalfAt(y);
      if (y === 316) ctx.moveTo(c - half, y);
      else ctx.lineTo(c - half, y);
    }
    for (let y = 1030; y >= 316; y -= 16) {
      const c = rampCenterAt(y);
      const half = rampHalfAt(y);
      ctx.lineTo(c + half, y);
    }
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "rgba(34,32,30,0.52)";
    ctx.lineWidth = 5;
    for (let y = 575; y < 1018; y += 18) {
      const c = rampCenterAt(y);
      const half = rampHalfAt(y) - 10;
      ctx.beginPath();
      ctx.moveTo(c - half, y);
      ctx.lineTo(c + half, y);
      ctx.stroke();
    }

    ctx.fillStyle = "rgba(255,255,255,0.24)";
    ctx.beginPath();
    ctx.ellipse(level.targetX, level.targetY, 64, 92, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.7)";
    ctx.setLineDash([12, 10]);
    ctx.lineWidth = 4;
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.restore();
  }

  function drawDockAndSign() {
    const level = levelData[state.level];
    fillRound(level.dockX, 770, 82, 362, 2, "#b7aa94");
    ctx.strokeStyle = "#827767";
    ctx.lineWidth = 3;
    for (let y = 784; y < 1120; y += 26) {
      ctx.beginPath();
      ctx.moveTo(level.dockX + 4, y);
      ctx.lineTo(level.dockX + 78, y);
      ctx.stroke();
    }
    for (let y = 765; y <= 1125; y += 95) {
      ctx.fillStyle = "#f2f0e8";
      ctx.beginPath();
      ctx.arc(level.dockX - 10, y, 15, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#52534d";
      ctx.fillRect(level.dockX - 15, y + 10, 10, 32);
      ctx.fillStyle = "#f2f0e8";
      ctx.beginPath();
      ctx.arc(level.dockX + 92, y + 25, 15, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.save();
    ctx.translate(570, 438);
    ctx.rotate(0.08);
    fillRound(-70, -34, 140, 68, 3, "#62411d");
    ctx.strokeStyle = "#b68a52";
    ctx.lineWidth = 4;
    ctx.strokeRect(-66, -30, 132, 60);
    ctx.fillStyle = "#fff5dd";
    ctx.font = "900 21px Arial";
    ctx.textAlign = "center";
    ctx.fillText("BOAT RAMP", 0, -5);
    ctx.font = "900 10px Arial";
    ctx.fillText("KEEP AREA CLEAR", 0, 17);
    ctx.fillStyle = "#573616";
    ctx.fillRect(-54, 34, 10, 54);
    ctx.fillRect(44, 34, 10, 54);
    ctx.restore();

    const rocks = [
      [77, 716, 28], [116, 740, 18], [575, 706, 20], [620, 725, 30],
      [676, 754, 24], [92, 820, 35], [42, 792, 22], [635, 650, 18]
    ];
    rocks.forEach(([x, y, r], i) => {
      ctx.fillStyle = i % 2 ? "#73796f" : "#9a9a8a";
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.28;
      ctx.fillStyle = "#222";
      ctx.beginPath();
      ctx.arc(x + r * 0.18, y + r * 0.22, r * 0.72, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    });
  }

  function drawTracks() {
    ctx.save();
    ctx.globalAlpha = 0.12;
    ctx.strokeStyle = "#0e0e0e";
    ctx.lineWidth = 5;
    state.tireTracks.forEach((mark) => {
      ctx.save();
      ctx.translate(mark.x, mark.y);
      ctx.rotate(mark.a);
      ctx.beginPath();
      ctx.moveTo(-34, -16);
      ctx.lineTo(-34, 16);
      ctx.moveTo(34, -16);
      ctx.lineTo(34, 16);
      ctx.stroke();
      ctx.restore();
    });
    ctx.restore();
  }

  function drawTrailerAndBoat() {
    const hitchX = truck.x - Math.cos(truck.a) * hitchOffset;
    const hitchY = truck.y - Math.sin(truck.a) * hitchOffset;

    ctx.save();
    ctx.strokeStyle = "#343b3d";
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.moveTo(hitchX, hitchY);
    ctx.lineTo(hitchX - Math.cos(trailer.a) * tongueLen, hitchY - Math.sin(trailer.a) * tongueLen);
    ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.translate(trailer.x, trailer.y);
    ctx.rotate(trailer.a + Math.PI / 2);

    ctx.strokeStyle = "#4d5a60";
    ctx.lineWidth = 10;
    ctx.beginPath();
    ctx.moveTo(0, -88);
    ctx.lineTo(0, 88);
    ctx.moveTo(-34, -42);
    ctx.lineTo(34, -42);
    ctx.moveTo(-34, 42);
    ctx.lineTo(34, 42);
    ctx.stroke();

    ctx.fillStyle = "#141414";
    ctx.fillRect(-58, 36, 16, 28);
    ctx.fillRect(42, 36, 16, 28);

    ctx.beginPath();
    ctx.moveTo(0, -116);
    ctx.bezierCurveTo(57, -90, 64, -12, 52, 74);
    ctx.bezierCurveTo(34, 122, -34, 122, -52, 74);
    ctx.bezierCurveTo(-64, -12, -57, -90, 0, -116);
    ctx.closePath();
    const boatGrad = ctx.createLinearGradient(-54, -116, 54, 112);
    boatGrad.addColorStop(0, "#ffffff");
    boatGrad.addColorStop(0.54, "#ded9cd");
    boatGrad.addColorStop(1, "#aaa69d");
    ctx.fillStyle = boatGrad;
    ctx.fill();
    ctx.strokeStyle = "#74736e";
    ctx.lineWidth = 4;
    ctx.stroke();

    fillRound(-34, -42, 68, 54, 18, "#2d3334");
    fillRound(-38, 10, 30, 58, 8, "#6c7170");
    fillRound(8, 10, 30, 58, 8, "#6c7170");
    fillRound(-44, -14, 88, 42, 7, "rgba(14,18,18,0.68)");
    ctx.fillStyle = "#1a2632";
    ctx.fillRect(-16, 86, 32, 46);
    ctx.fillStyle = "#101519";
    ctx.fillRect(-11, 96, 22, 28);

    ctx.restore();
  }

  function drawTruck() {
    ctx.save();
    ctx.translate(truck.x, truck.y);
    ctx.rotate(truck.a + Math.PI / 2);

    ctx.shadowColor = "rgba(0,0,0,0.45)";
    ctx.shadowBlur = 13;
    ctx.shadowOffsetY = 8;
    fillRound(-43, -78, 86, 156, 22, "#114889");
    ctx.shadowBlur = 0;
    fillRound(-36, -70, 72, 56, 14, "#1d5aac");
    fillRound(-38, -10, 76, 82, 9, "#0d315d");
    fillRound(-30, 4, 60, 56, 4, "#151b20");
    ctx.fillStyle = "#03070a";
    ctx.fillRect(-50, -51, 12, 36);
    ctx.fillRect(38, -51, 12, 36);
    ctx.fillRect(-50, 37, 13, 34);
    ctx.fillRect(37, 37, 13, 34);
    fillRound(-34, -73, 68, 24, 12, "#0c1925");
    fillRound(-30, -69, 60, 17, 8, "#7195b2");
    ctx.fillStyle = "#f02727";
    ctx.fillRect(-26, 75, 16, 5);
    ctx.fillRect(10, 75, 16, 5);
    ctx.fillStyle = "#e5f0ff";
    ctx.fillRect(-26, -80, 16, 6);
    ctx.fillRect(10, -80, 16, 6);

    ctx.restore();
  }

  function drawScene() {
    const shake = state.cameraShake;
    ctx.save();
    ctx.clearRect(0, 0, W, H);
    if (shake > 0) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);

    drawGround();
    drawTrees();
    drawWater();
    drawRamp();
    drawDockAndSign();
    drawTracks();
    drawTrailerAndBoat();
    drawTruck();

    ctx.globalAlpha = 0.12;
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, W, 2);
    ctx.globalAlpha = 1;

    ctx.restore();
  }

  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;
    update(dt);
    drawScene();
    requestAnimationFrame(frame);
  }

  resetLevel(false);
  requestAnimationFrame(frame);
})();
</script>
