<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>Rig-Master Boat Ramp</title>
<style>
:root {
  --bg: #1b2f36;
  --hud: #0e1a1f;
  --ink: #dce9db;
  --good: #8fd46a;
  --warn: #f7be4a;
  --bad: #e76b59;
}
* {
  box-sizing: border-box;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: none;
  background: #142329;
  font-family: "Courier New", monospace;
}
body {
  position: fixed;
  inset: 0;
  min-height: 100dvh;
  color: var(--ink);
}
#app {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  height: 100dvh;
  overflow: hidden;
  padding:
    max(8px, env(safe-area-inset-top))
    max(8px, env(safe-area-inset-right))
    max(8px, env(safe-area-inset-bottom))
    max(8px, env(safe-area-inset-left));
  background: var(--bg);
  touch-action: none;
}
#game-wrap {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
}
#game {
  width: min(100vw, calc(100dvh * 16 / 9));
  height: min(100dvh, calc(100vw * 9 / 16));
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  border: 4px solid #2f4e50;
  background: #3e6b76;
}
.hud {
  position: fixed;
  z-index: 5;
  background: var(--hud);
  border: 3px solid #395a5d;
  color: var(--ink);
  font-size: clamp(10px, 2.5vw, 14px);
  line-height: 1.2;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  pointer-events: none;
}
#stats {
  top: max(8px, env(safe-area-inset-top));
  left: max(8px, env(safe-area-inset-left));
  padding: 8px 10px;
  min-width: 150px;
}
#status {
  top: max(8px, env(safe-area-inset-top));
  right: max(8px, env(safe-area-inset-right));
  padding: 8px 10px;
  max-width: min(50vw, 260px);
  text-align: right;
}
#controls {
  position: fixed;
  inset: 0;
  z-index: 8;
  pointer-events: none;
}
#wheel-box {
  position: fixed;
  left: max(10px, env(safe-area-inset-left));
  bottom: max(10px, env(safe-area-inset-bottom));
  width: clamp(130px, 32vw, 190px);
  height: clamp(130px, 32vw, 190px);
  border: 4px solid #3f6063;
  border-radius: 999px;
  background: #192b31;
  pointer-events: auto;
  touch-action: none;
}
#wheel {
  position: absolute;
  inset: 8%;
  border: 5px solid #94bcc0;
  border-radius: 999px;
}
#wheel::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 8%;
  width: 12%;
  height: 22%;
  transform: translateX(-50%);
  background: #c8e6ea;
}
.pedal-col {
  position: fixed;
  right: max(10px, env(safe-area-inset-right));
  bottom: max(10px, env(safe-area-inset-bottom));
  display: grid;
  gap: 10px;
  pointer-events: auto;
  touch-action: none;
}
.ctrl-btn {
  width: clamp(96px, 23vw, 150px);
  min-height: clamp(62px, 12vw, 86px);
  border: 4px solid #344f53;
  background: #1b2f36;
  color: var(--ink);
  font: 900 clamp(18px, 5vw, 28px)/1 "Courier New", monospace;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  touch-action: none;
}
.ctrl-btn:active,
.ctrl-btn.active { background: #2f454c; }
#gas.active { background: #294833; border-color: #567b4d; }
#brake.active { background: #4c2b2b; border-color: #7c5656; }
#gear {
  min-height: clamp(48px, 9vw, 66px);
  font-size: clamp(14px, 3.5vw, 18px);
}
#gear.rev { background: #5a2a2a; border-color: #875555; }
</style>
</head>
<body>
<div id="app" aria-label="Rig-Master Boat Ramp Simulator">
  <div id="game-wrap">
    <canvas id="game" width="400" height="225" aria-label="Boat ramp trailer simulator"></canvas>
  </div>

  <div id="stats" class="hud">
    <div id="gear-readout">GEAR: D</div>
    <div id="mph-readout">MPH: 0.0</div>
    <div id="angle-readout">ANGLE: 0°</div>
  </div>
  <div id="status" class="hud">Back trailer into water</div>

  <div id="controls">
    <div id="wheel-box" aria-label="Steering wheel control">
      <div id="wheel"></div>
    </div>
    <div class="pedal-col">
      <button id="gear" class="ctrl-btn" type="button">GEAR: D</button>
      <button id="gas" class="ctrl-btn" type="button">GAS</button>
      <button id="brake" class="ctrl-btn" type="button">BRAKE</button>
    </div>
  </div>
</div>

<script>
(() => {
  const app = document.getElementById("app");
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d", { alpha: false });

  const statsGear = document.getElementById("gear-readout");
  const statsMph = document.getElementById("mph-readout");
  const statsAngle = document.getElementById("angle-readout");
  const statusEl = document.getElementById("status");

  const wheelBox = document.getElementById("wheel-box");
  const wheel = document.getElementById("wheel");
  const gasBtn = document.getElementById("gas");
  const brakeBtn = document.getElementById("brake");
  const gearBtn = document.getElementById("gear");

  const W = canvas.width;
  const H = canvas.height;

  const state = {
    truck: { x: 200, y: 84, a: Math.PI / 2, v: 0 },
    trailer: { x: 200, y: 56, a: Math.PI / 2 },
    gear: "D",
    steer: 0,
    steerTarget: 0,
    throttle: false,
    brake: false,
    keys: new Set(),
    wheelActive: false,
    wheelPointer: null,
    hitchPrevX: 200,
    hitchPrevY: 98,
    warning: "",
    won: false,
    hitObstacle: false,
    t: 0,
  };

  const truckLen = 18;
  const trailerLen = 30;
  const hitchOffset = 11;
  const maxSteer = 0.52;
  const maxFwd = 28;
  const maxRev = -22;

  const rampCenter = 200;
  const targetZone = { x: 165, y: 186, w: 70, h: 34 };
  const dock = { x: 252, y: 150, w: 16, h: 52 };
  const posts = [
    { x: 144, y: 120, r: 2.6 }, { x: 256, y: 120, r: 2.6 },
    { x: 146, y: 142, r: 2.4 }, { x: 254, y: 142, r: 2.4 },
    { x: 148, y: 166, r: 2.2 }, { x: 252, y: 166, r: 2.2 }
  ];

  const clamp = (n, a, b) => Math.max(a, Math.min(b, n));
  const normalizeAngle = (a) => {
    while (a > Math.PI) a -= Math.PI * 2;
    while (a < -Math.PI) a += Math.PI * 2;
    return a;
  };

  function preventDefaults(target) {
    ["touchstart", "touchmove", "touchend", "pointerdown", "pointermove", "pointerup", "contextmenu", "selectstart", "dragstart"].forEach((evt) => {
      target.addEventListener(evt, (e) => e.preventDefault(), { passive: false });
    });
  }
  preventDefaults(window);
  preventDefaults(document);
  preventDefaults(app);

  ["copy", "cut"].forEach((evt) => {
    document.addEventListener(evt, (e) => e.preventDefault());
  });

  function toggleGear() {
    state.gear = state.gear === "D" ? "R" : "D";
  }

  function setPressButton(btn, setter) {
    const on = (e) => { e.preventDefault(); setter(true); btn.classList.add("active"); };
    const off = (e) => { e.preventDefault(); setter(false); btn.classList.remove("active"); };
    btn.addEventListener("pointerdown", on, { passive: false });
    btn.addEventListener("pointerup", off, { passive: false });
    btn.addEventListener("pointercancel", off, { passive: false });
    btn.addEventListener("pointerleave", off, { passive: false });
  }

  setPressButton(gasBtn, (v) => { state.throttle = v; });
  setPressButton(brakeBtn, (v) => { state.brake = v; });

  gearBtn.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    toggleGear();
  }, { passive: false });

  function wheelInputFromEvent(e) {
    const rect = wheelBox.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const ang = Math.atan2(e.clientY - cy, e.clientX - cx);
    const rel = normalizeAngle(ang + Math.PI / 2);
    state.steerTarget = clamp(rel / 1.9, -1, 1);
  }

  wheelBox.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    state.wheelActive = true;
    state.wheelPointer = e.pointerId;
    wheelBox.setPointerCapture(e.pointerId);
    wheelInputFromEvent(e);
  }, { passive: false });

  wheelBox.addEventListener("pointermove", (e) => {
    if (!state.wheelActive || state.wheelPointer !== e.pointerId) return;
    e.preventDefault();
    wheelInputFromEvent(e);
  }, { passive: false });

  function endWheel(e) {
    if (state.wheelPointer !== e.pointerId) return;
    state.wheelActive = false;
    state.wheelPointer = null;
  }

  wheelBox.addEventListener("pointerup", endWheel, { passive: false });
  wheelBox.addEventListener("pointercancel", endWheel, { passive: false });

  window.addEventListener("keydown", (e) => {
    if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " ", "KeyW", "KeyA", "KeyS", "KeyD", "KeyR"].includes(e.code)) {
      e.preventDefault();
    }
    if (!e.repeat && e.code === "KeyR") toggleGear();
    state.keys.add(e.code);
  }, { passive: false });

  window.addEventListener("keyup", (e) => {
    state.keys.delete(e.code);
  });

  function drivableHalfWidth(y) {
    if (y < 108) return 130;
    if (y < 220) return 56;
    return 52;
  }

  function circleRectHit(cx, cy, r, rx, ry, rw, rh) {
    const nx = clamp(cx, rx, rx + rw);
    const ny = clamp(cy, ry, ry + rh);
    const dx = cx - nx;
    const dy = cy - ny;
    return dx * dx + dy * dy <= r * r;
  }

  function update(dt) {
    state.t += dt;
    const t = state.truck;
    const tr = state.trailer;

    const left = state.keys.has("ArrowLeft") || state.keys.has("KeyA");
    const right = state.keys.has("ArrowRight") || state.keys.has("KeyD");
    const keySteer = (left ? -1 : 0) + (right ? 1 : 0);
    const hasSteerInput = state.wheelActive || keySteer !== 0;

    if (keySteer !== 0 && !state.wheelActive) state.steerTarget = keySteer;
    if (!hasSteerInput) state.steerTarget *= Math.max(0, 1 - dt * 4.2);

    const steerRate = 4.8;
    state.steer += (state.steerTarget - state.steer) * clamp(dt * steerRate, 0, 1);

    const kbGas = state.keys.has("ArrowUp") || state.keys.has("KeyW");
    const kbBrake = state.keys.has("ArrowDown") || state.keys.has("KeyS") || state.keys.has("Space");
    const throttle = state.throttle || kbGas;
    const brake = state.brake || kbBrake;

    const accel = 22;
    const rollingDrag = 1.2;
    const waterDrag = t.y > 186 ? 2.4 : 0;

    if (throttle) t.v += (state.gear === "D" ? accel : -accel) * dt;
    if (brake) t.v *= Math.max(0, 1 - dt * 9.5);

    t.v -= t.v * (rollingDrag + waterDrag) * dt;
    t.v = clamp(t.v, maxRev, maxFwd);

    const steerAngle = state.steer * maxSteer;
    const yawRate = (t.v / truckLen) * Math.tan(steerAngle) * 0.95;
    t.a += yawRate * dt;
    t.x += Math.cos(t.a) * t.v * dt;
    t.y += Math.sin(t.a) * t.v * dt;

    t.x = clamp(t.x, 30, W - 30);
    t.y = clamp(t.y, 30, H - 20);

    const hitchX = t.x - Math.cos(t.a) * hitchOffset;
    const hitchY = t.y - Math.sin(t.a) * hitchOffset;
    const hvx = (hitchX - state.hitchPrevX) / Math.max(dt, 0.001);
    const hvy = (hitchY - state.hitchPrevY) / Math.max(dt, 0.001);
    state.hitchPrevX = hitchX;
    state.hitchPrevY = hitchY;

    const side = -Math.sin(tr.a) * hvx + Math.cos(tr.a) * hvy;
    let trailerOmega = side / trailerLen;
    trailerOmega = clamp(trailerOmega, -1.5, 1.5);
    tr.a += trailerOmega * dt;

    const art = normalizeAngle(t.a - tr.a);
    if (Math.abs(art) > 1.28) {
      t.v *= 0.94;
      state.warning = "Jackknife!";
    }

    tr.x = hitchX - Math.cos(tr.a) * trailerLen;
    tr.y = hitchY - Math.sin(tr.a) * trailerLen;

    const truckOffRamp = Math.abs(t.x - rampCenter) > drivableHalfWidth(t.y);
    const trailerOffRamp = Math.abs(tr.x - rampCenter) > drivableHalfWidth(tr.y) + 2;
    const tooDeep = t.y > 202;

    state.hitObstacle =
      circleRectHit(t.x, t.y, 7, dock.x, dock.y, dock.w, dock.h) ||
      circleRectHit(tr.x, tr.y, 6, dock.x, dock.y, dock.w, dock.h) ||
      posts.some((p) => {
        const dx1 = t.x - p.x;
        const dy1 = t.y - p.y;
        const dx2 = tr.x - p.x;
        const dy2 = tr.y - p.y;
        return (dx1 * dx1 + dy1 * dy1 < (p.r + 5) * (p.r + 5)) || (dx2 * dx2 + dy2 * dy2 < (p.r + 4) * (p.r + 4));
      });

    if (state.hitObstacle) {
      t.v *= 0.65;
      state.warning = "Collision!";
    } else if (tooDeep) {
      state.warning = "Truck too deep!";
    } else if (truckOffRamp || trailerOffRamp) {
      state.warning = "Ramp edge!";
    } else if (Math.abs(art) > 1.0) {
      state.warning = "Watch angle";
    } else {
      state.warning = "Back trailer into water";
    }

    const inTarget =
      tr.x > targetZone.x && tr.x < targetZone.x + targetZone.w &&
      tr.y > targetZone.y && tr.y < targetZone.y + targetZone.h;

    state.won = inTarget && !tooDeep && Math.abs(art) < 0.95 && Math.abs(t.v) < 8;
    if (state.won) state.warning = "Good launch!";

    const mph = Math.abs(t.v) * 1.65;
    statsGear.textContent = `GEAR: ${state.gear}`;
    statsMph.textContent = `MPH: ${mph.toFixed(1)}`;
    statsAngle.textContent = `ANGLE: ${Math.round((art * 180) / Math.PI)}°`;

    const rev = state.gear === "R";
    gearBtn.textContent = `GEAR: ${state.gear}`;
    gearBtn.classList.toggle("rev", rev);
    statusEl.textContent = state.warning;
    statusEl.style.color = state.won ? "#8fd46a" : (state.warning.includes("!") ? "#f7be4a" : "#dce9db");

    const wheelDeg = state.steer * 110;
    wheel.style.transform = `rotate(${wheelDeg}deg)`;
  }

  function drawRect(x, y, w, h, c) {
    ctx.fillStyle = c;
    ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
  }

  function drawWorld() {
    drawRect(0, 0, W, H, "#2e5a4d");
    drawRect(0, 172, W, 53, "#2a7ea6");

    for (let i = 0; i < 8; i++) {
      const waveY = 176 + i * 6 + Math.sin(state.t * 2 + i) * 1.6;
      drawRect(0, waveY, W, 2, i % 2 ? "#3f9ec5" : "#2a8ab4");
    }

    drawRect(70, 0, 260, 108, "#5e6668");
    drawRect(146, 108, 108, 117, "#6f7779");

    drawRect(145, 110, 2, 115, "#f7d87e");
    drawRect(253, 110, 2, 115, "#f7d87e");

    drawRect(targetZone.x, targetZone.y, targetZone.w, targetZone.h, "#2a93bb");
    drawRect(targetZone.x + 2, targetZone.y + 2, targetZone.w - 4, targetZone.h - 4, "#4cb1d8");

    drawRect(dock.x, dock.y, dock.w, dock.h, "#8a6f49");
    drawRect(dock.x - 6, dock.y + 12, 6, 4, "#977a51");
    drawRect(dock.x - 6, dock.y + 30, 6, 4, "#977a51");

    posts.forEach((p) => {
      drawRect(p.x - p.r, p.y - p.r, p.r * 2, p.r * 2, "#d78d4f");
      drawRect(p.x - 1, p.y + p.r, 2, 3, "#f2c77f");
    });

    for (let i = 0; i < 7; i++) {
      const y = 118 + i * 12;
      drawRect(196, y, 8, 1, "#505558");
      drawRect(191, y + 2, 18, 1, "#505558");
    }
  }

  function drawRig() {
    const t = state.truck;
    const tr = state.trailer;
    const hitchX = t.x - Math.cos(t.a) * hitchOffset;
    const hitchY = t.y - Math.sin(t.a) * hitchOffset;

    ctx.save();
    ctx.translate(tr.x, tr.y);
    ctx.rotate(tr.a);
    drawRect(-5, -16, 10, 22, "#7f8f95");
    drawRect(-7, -10, 14, 14, "#55666d");
    drawRect(-6, -30, 12, 12, "#a3d0df");
    drawRect(-5, -28, 10, 8, "#5a8ea5");
    drawRect(-6, 6, 3, 3, "#1a1a1a");
    drawRect(3, 6, 3, 3, "#1a1a1a");
    ctx.restore();

    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.rotate(t.a);
    drawRect(-7, -12, 14, 20, "#e5d37b");
    drawRect(-6, -12, 12, 8, "#8398a0");
    drawRect(-8, 8, 4, 3, "#151515");
    drawRect(4, 8, 4, 3, "#151515");
    drawRect(-8, -12, 4, 3, "#151515");
    drawRect(4, -12, 4, 3, "#151515");
    ctx.restore();

    drawRect(hitchX - 2, hitchY - 2, 4, 4, "#f6e4a2");
  }

  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;
    update(dt);
    drawWorld();
    drawRig();
    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
