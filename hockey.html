<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#060d1a;color:#fff;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
canvas{display:block;width:100%;height:100%}
a.back{position:fixed;left:14px;bottom:14px;background:rgba(255,255,255,0.07);padding:8px 14px;border-radius:10px;text-decoration:none;color:#ccc;font-size:13px;z-index:30;backdrop-filter:blur(6px);transition:background .2s}
a.back:hover{background:rgba(255,255,255,0.15)}
/* broadcast scoreboard */
#scoreboard{position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:30;display:flex;align-items:stretch;font-weight:800;border-radius:0 0 14px 14px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.5);backdrop-filter:blur(12px)}
.sb-team{padding:10px 18px;font-size:20px;letter-spacing:1px;display:flex;align-items:center;gap:10px}
.sb-team.home{background:rgba(31,191,122,0.85);color:#fff}
.sb-team.away{background:rgba(214,74,74,0.85);color:#fff}
.sb-score{font-size:28px;font-variant-numeric:tabular-nums}
.sb-center{background:rgba(10,16,30,0.92);padding:8px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:100px}
.sb-period{font-size:11px;opacity:0.7;text-transform:uppercase;letter-spacing:2px}
.sb-time{font-size:22px;font-variant-numeric:tabular-nums}
/* controls hint */
#controls-hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);font-size:12px;opacity:0.5;z-index:30;text-align:center;pointer-events:none}
#status-strip{position:fixed;top:88px;left:50%;transform:translateX(-50%);z-index:31;display:flex;gap:8px;align-items:center}
#status-strip span{background:rgba(8,14,26,0.84);border:1px solid rgba(255,255,255,0.08);border-radius:999px;padding:6px 10px;font-size:11px;letter-spacing:0.6px;text-transform:uppercase;font-weight:700;backdrop-filter:blur(8px)}
#pauseOverlay{position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;background:rgba(4,9,18,0.78);backdrop-filter:blur(6px)}
#pauseOverlay[hidden]{display:none}
#pauseCard{width:min(560px,90vw);padding:24px 26px;border-radius:14px;background:rgba(10,16,30,0.92);border:1px solid rgba(255,255,255,0.1);box-shadow:0 20px 40px rgba(0,0,0,0.45)}
#pauseTitle{font-size:26px;font-weight:900;letter-spacing:1px;margin-bottom:8px}
#pauseSub{font-size:13px;opacity:0.75;line-height:1.5}
#pauseKeys{margin-top:14px;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px}
#pauseKeys div{font-size:12px;opacity:0.9;background:rgba(255,255,255,0.05);padding:8px 10px;border-radius:8px}
/* charge bar */
#chargeWrap{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);width:180px;height:8px;background:rgba(255,255,255,0.08);border-radius:6px;overflow:hidden;z-index:30}
#chargeBar{height:100%;width:0%;background:linear-gradient(90deg,#ffd24d,#ff4444);border-radius:6px;transition:width 0.05s}
/* goal flash overlay */
#goalFlash{position:fixed;inset:0;pointer-events:none;opacity:0;z-index:25;background:radial-gradient(circle at center,rgba(255,60,60,0.45),transparent 60%);transition:opacity 0.6s}
/* goal celebration text */
#goalText{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:72px;font-weight:900;color:#fff;text-shadow:0 0 40px rgba(255,80,80,0.8),0 0 80px rgba(255,60,60,0.4);z-index:26;pointer-events:none;transition:transform 0.3s cubic-bezier(.17,.67,.35,1.5),opacity 0.5s;opacity:0;letter-spacing:6px}

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

/* ───── renderer ───── */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
let W = innerWidth, H = innerHeight;
renderer.setSize(W,H);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1020);
scene.fog = new THREE.Fog(0x0a1020,80,160);

/* ───── camera ───── */
const camera = new THREE.PerspectiveCamera(42,W/H,0.1,250);
camera.position.set(0,32,42);

/* ───── reflection ───── */
const reflectRT = new THREE.WebGLRenderTarget(512,512);
const reflectCam = new THREE.PerspectiveCamera(42,1,0.1,250);

/* ───── arena lighting rig ───── */
scene.add(new THREE.AmbientLight(0x8899bb,0.35));
scene.add(new THREE.HemisphereLight(0xddeeff,0x334455,0.5));
[[12,38,15],[-12,38,15],[12,38,-15],[-12,38,-15]].forEach(p=>{
  const s=new THREE.SpotLight(0xffffff,1.6,120,Math.PI/5,0.4,1);
  s.position.set(...p);s.target.position.set(0,0,0);s.castShadow=true;
  s.shadow.mapSize.set(1024,1024);s.shadow.bias=-0.001;
  scene.add(s);scene.add(s.target);
});
const rim1=new THREE.PointLight(0x4488ff,0.4,60);rim1.position.set(20,8,0);scene.add(rim1);
const rim2=new THREE.PointLight(0x4488ff,0.4,60);rim2.position.set(-20,8,0);scene.add(rim2);

/* ───── rink constants ───── */
const RW=26, RL=62, GOAL_W=4.4;

/* ───── ice surface ───── */
function makeIceTexture(){
  const sw=2048,sh=Math.round(sw*(RL/RW));
  const c=document.createElement('canvas');c.width=sw;c.height=sh;const x=c.getContext('2d');
  const gr=x.createLinearGradient(0,0,0,sh);
  gr.addColorStop(0,'#e8f4ff');gr.addColorStop(0.5,'#eaf8ff');gr.addColorStop(1,'#e6f2fc');
  x.fillStyle=gr;x.fillRect(0,0,sw,sh);
  // center red line (dashed)
  x.fillStyle='#c62828';x.fillRect(0,sh/2-12,sw,24);
  for(let i=0;i<sw;i+=60){x.fillStyle='#ffffff';x.fillRect(i,sh/2-3,30,6);}
  // blue lines
  x.fillStyle='#1565c0';x.fillRect(0,sh*0.28-10,sw,20);x.fillRect(0,sh*0.72-10,sw,20);
  // center circle
  x.strokeStyle='#1565c0';x.lineWidth=6;x.beginPath();x.arc(sw/2,sh/2,sw*0.075,0,Math.PI*2);x.stroke();
  x.fillStyle='#1565c0';x.beginPath();x.arc(sw/2,sh/2,8,0,Math.PI*2);x.fill();
  // zone faceoff circles
  [[sw*0.3,sh*0.16],[sw*0.7,sh*0.16],[sw*0.3,sh*0.84],[sw*0.7,sh*0.84]].forEach(([fx,fy])=>{
    x.strokeStyle='#c62828';x.lineWidth=4;x.beginPath();x.arc(fx,fy,sw*0.055,0,Math.PI*2);x.stroke();
    x.fillStyle='#c62828';x.beginPath();x.arc(fx,fy,6,0,Math.PI*2);x.fill();
  });
  // neutral zone dots
  [[sw*0.3,sh*0.38],[sw*0.7,sh*0.38],[sw*0.3,sh*0.62],[sw*0.7,sh*0.62]].forEach(([fx,fy])=>{
    x.fillStyle='#c62828';x.beginPath();x.arc(fx,fy,6,0,Math.PI*2);x.fill();
  });
  // goal creases
  x.fillStyle='rgba(100,160,255,0.15)';
  x.beginPath();x.arc(sw/2,sh*0.04,sw*0.055,0,Math.PI);x.fill();
  x.beginPath();x.arc(sw/2,sh*0.96,sw*0.055,Math.PI,Math.PI*2);x.fill();
  x.strokeStyle='#c62828';x.lineWidth=3;
  x.beginPath();x.arc(sw/2,sh*0.04,sw*0.055,0,Math.PI);x.stroke();
  x.beginPath();x.arc(sw/2,sh*0.96,sw*0.055,Math.PI,Math.PI*2);x.stroke();
  // center logo
  x.save();x.globalAlpha=0.06;x.font='bold '+Math.round(sw*0.12)+'px sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillStyle='#003';x.fillText('K2',sw/2,sh/2);x.restore();
  // scratches
  for(let i=0;i<350;i++){x.strokeStyle='rgba(180,200,220,'+(0.008+Math.random()*0.015)+')';x.lineWidth=0.5+Math.random();x.beginPath();const px=Math.random()*sw,py=Math.random()*sh;x.moveTo(px,py);x.lineTo(px+(Math.random()-0.5)*80,py+(Math.random()-0.5)*80);x.stroke();}
  const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;return t;
}
const iceTex=makeIceTexture();
const icePlane=new THREE.Mesh(new THREE.PlaneGeometry(RW,RL),new THREE.MeshPhysicalMaterial({map:iceTex,roughness:0.05,metalness:0.01,clearcoat:1.0,clearcoatRoughness:0.02,transparent:true,opacity:0.97}));
icePlane.rotation.x=-Math.PI/2;icePlane.position.y=0.01;icePlane.receiveShadow=true;scene.add(icePlane);
const iceBase=new THREE.Mesh(new THREE.BoxGeometry(RW,0.5,RL),new THREE.MeshStandardMaterial({color:0xd8ecf8,roughness:0.1}));
iceBase.position.y=-0.25;iceBase.receiveShadow=true;scene.add(iceBase);
// reflection overlay
const reflPlane=new THREE.Mesh(new THREE.PlaneGeometry(RW,RL),new THREE.MeshBasicMaterial({map:reflectRT.texture,transparent:true,opacity:0.18}));
reflPlane.rotation.x=-Math.PI/2;reflPlane.position.y=0.015;scene.add(reflPlane);

/* ───── boards with dasher ads ───── */
function makeDasherTex(){
  const w=2048,h=128,c=document.createElement('canvas');c.width=w;c.height=h;const x=c.getContext('2d');
  const ads=['K2 GAMES','PLAY MORE','HOCKEY','GO TEAM','ICE COLD','MVP','SLAP SHOT','HAT TRICK'];
  const cols=['#d32f2f','#1565c0','#2e7d32','#f57f17','#6a1b9a','#00838f','#bf360c','#283593'];
  const seg=w/ads.length;
  ads.forEach((t,i)=>{x.fillStyle=cols[i];x.fillRect(i*seg,0,seg,h);x.fillStyle='#fff';x.font='bold 56px sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillText(t,i*seg+seg/2,h/2+2);});
  const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;t.wrapS=THREE.RepeatWrapping;return t;
}
const boardH=1.0,thick=0.5;
function addBoard(w,h,d,px,py,pz,dt){
  const geo=new THREE.BoxGeometry(w,h,d);
  const wh=new THREE.MeshStandardMaterial({color:0xeeeeee,roughness:0.5});
  const ad=dt?new THREE.MeshStandardMaterial({map:dt,roughness:0.4}):wh;
  const mats=[wh,wh,wh,wh,ad,ad];
  const m=new THREE.Mesh(geo,mats);m.position.set(px,py,pz);m.castShadow=true;scene.add(m);
}
const dtex=makeDasherTex();
addBoard(thick,boardH,RL, RW/2+thick/2,boardH/2,0,dtex);
addBoard(thick,boardH,RL,-RW/2-thick/2,boardH/2,0,dtex);
addBoard(RW+thick*2,boardH,thick,0,boardH/2, RL/2+thick/2,dtex);
addBoard(RW+thick*2,boardH,thick,0,boardH/2,-RL/2-thick/2,dtex);
// glass
const glassMat=new THREE.MeshPhysicalMaterial({color:0xaaccee,transparent:true,opacity:0.12,roughness:0.02,clearcoat:0.5});
function addGlass(w,h,px,py,pz,ry){const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),glassMat);m.position.set(px,py,pz);m.rotation.y=ry;scene.add(m);}
const glH=2.0;
addGlass(RL,glH, RW/2+0.05,boardH+glH/2,0,-Math.PI/2);
addGlass(RL,glH,-RW/2-0.05,boardH+glH/2,0, Math.PI/2);
addGlass(RW,glH,0,boardH+glH/2, RL/2+0.05,Math.PI);
addGlass(RW,glH,0,boardH+glH/2,-RL/2-0.05,0);

/* ───── goals with nets + red lights ───── */
function makeGoal(zPos){
  const g=new THREE.Group();
  const pm=new THREE.MeshStandardMaterial({color:0xdd2222,metalness:0.7,roughness:0.2});
  const pR=0.06,pH=1.0;
  const lp=new THREE.Mesh(new THREE.CylinderGeometry(pR,pR,pH,8),pm);lp.position.set(-GOAL_W/2,pH/2,0);g.add(lp);
  const rp=lp.clone();rp.position.x=GOAL_W/2;g.add(rp);
  const cb=new THREE.Mesh(new THREE.CylinderGeometry(pR,pR,GOAL_W+pR*2,8),pm);cb.rotation.z=Math.PI/2;cb.position.y=pH;g.add(cb);
  // net (wireframe box)
  const nd=1.2,dir=zPos<0?1:-1;
  const net=new THREE.Mesh(new THREE.BoxGeometry(GOAL_W,pH,nd,8,4,4),new THREE.MeshStandardMaterial({color:0xffffff,wireframe:true,transparent:true,opacity:0.35}));
  net.position.set(0,pH/2,dir*nd/2);g.add(net);
  // red goal light
  const gl=new THREE.PointLight(0xff2200,0,8);gl.position.set(0,1.5,dir*1.0);g.add(gl);
  g.position.set(0,0,zPos);g.userData={light:gl};scene.add(g);return g;
}
const goalHome=makeGoal(RL/2-0.3);
const goalAway=makeGoal(-RL/2+0.3);

/* ───── crowd / stands ───── */
const crowdMeshes=[];
function makeFanTex(shirt,skin,hat,sz){
  const c=document.createElement('canvas');c.width=sz;c.height=sz;const x=c.getContext('2d');
  x.clearRect(0,0,sz,sz);
  x.fillStyle=shirt;x.fillRect(sz*0.25,sz*0.48,sz*0.5,sz*0.42);
  x.fillStyle=shirt;x.fillRect(sz*0.12,sz*0.5,sz*0.16,sz*0.28);x.fillRect(sz*0.72,sz*0.5,sz*0.16,sz*0.28);
  x.fillStyle=skin;x.fillRect(sz*0.14,sz*0.76,sz*0.12,sz*0.08);x.fillRect(sz*0.74,sz*0.76,sz*0.12,sz*0.08);
  x.fillStyle=skin;x.beginPath();x.arc(sz*0.5,sz*0.32,sz*0.14,0,Math.PI*2);x.fill();
  x.fillStyle=hat;x.fillRect(sz*0.32,sz*0.15,sz*0.36,sz*0.08);x.fillRect(sz*0.36,sz*0.1,sz*0.28,sz*0.08);
  x.fillStyle='#111';x.fillRect(sz*0.43,sz*0.29,sz*0.04,sz*0.04);x.fillRect(sz*0.53,sz*0.29,sz*0.04,sz*0.04);
  x.fillStyle='#c33';x.fillRect(sz*0.46,sz*0.37,sz*0.08,sz*0.03);
  const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;return t;
}
(function buildCrowd(){
  const rows=8,perRow=40,baseR=Math.max(RW,RL)/2+7;
  const skins=['#ffd9b3','#f5c6a0','#d4a574','#8d5524','#c68642'];
  const shirts=['#1fbf7a','#d64a4a','#fff','#ffd24d','#4488ff','#ff88cc','#88ff88','#ffaa33','#aaf','#f66'];
  const hats=['#222','#444','#1a5','#a22','#22a','#a80'];
  for(let r=0;r<rows;r++){
    for(let i=0;i<perRow;i++){
      const a=(i/perRow)*Math.PI*2+r*0.08;
      const rad=baseR+r*1.6;
      const tex=makeFanTex(shirts[(i+r*2)%shirts.length],skins[(i*3+r)%skins.length],hats[(i+r)%hats.length],128);
      const m=new THREE.Mesh(new THREE.PlaneGeometry(1.3,1.3),new THREE.MeshBasicMaterial({map:tex,transparent:true,alphaTest:0.1}));
      m.position.set(Math.cos(a)*rad,3.2+r*0.6,Math.sin(a)*rad);
      m.lookAt(0,2.5,0);
      m.userData={baseY:3.2+r*0.6,row:r,idx:i,wavePhase:a};
      scene.add(m);crowdMeshes.push(m);
    }
  }
})();

/* ───── benches & penalty boxes (outside rink) ───── */
function addBench(px,pz,ry){
  const b=new THREE.Group();
  const seat=new THREE.Mesh(new THREE.BoxGeometry(7,0.25,1),new THREE.MeshStandardMaterial({color:0x222222}));seat.position.set(0,0.35,0);b.add(seat);
  const back=new THREE.Mesh(new THREE.BoxGeometry(7,0.8,0.15),new THREE.MeshStandardMaterial({color:0x181818}));back.position.set(0,0.9,-0.35);b.add(back);
  const stripe=new THREE.Mesh(new THREE.BoxGeometry(7,0.06,1.02),new THREE.MeshStandardMaterial({color:px>0?0x1fbf7a:0xd64a4a}));stripe.position.set(0,0.48,0);b.add(stripe);
  b.position.set(px,0,pz);b.rotation.y=ry;scene.add(b);
}
addBench(RW/2+2.5,0,-Math.PI/2);
addBench(-RW/2-2.5,0,Math.PI/2);
function addPenBox(px,pz,ry){
  const b=new THREE.Group();
  const base=new THREE.Mesh(new THREE.BoxGeometry(3.5,0.3,1.2),new THREE.MeshStandardMaterial({color:0x333}));base.position.set(0,0.15,0);b.add(base);
  const gl=new THREE.Mesh(new THREE.BoxGeometry(3.5,1.4,0.08),new THREE.MeshPhysicalMaterial({color:0x88aacc,transparent:true,opacity:0.15}));gl.position.set(0,1.0,0.6);b.add(gl);
  b.position.set(px,0,pz);b.rotation.y=ry;scene.add(b);
}
addPenBox(RW/2+2.5,10,-Math.PI/2);
addPenBox(-RW/2-2.5,-10,Math.PI/2);

/* ───── overhead light rigs ───── */
for(let i=-1;i<=1;i+=2){
  const rig=new THREE.Mesh(new THREE.BoxGeometry(RW*0.8,0.3,2),new THREE.MeshStandardMaterial({color:0x333,metalness:0.5}));
  rig.position.set(0,22,i*12);scene.add(rig);
  for(let j=-3;j<=3;j++){const panel=new THREE.Mesh(new THREE.BoxGeometry(1.5,0.15,1.2),new THREE.MeshBasicMaterial({color:0xffeedd}));panel.position.set(j*2.8,21.8,i*12);scene.add(panel);}
}

/* ═══════════════════ PLAYER BUILDER ═══════════════════ */
const playerGroup=new THREE.Group();scene.add(playerGroup);
const teams={A:[],B:[]};
let _pNum=0;

function makePlayer(teamColor,isGoalie=false){
  _pNum++;
  const num=isGoalie?1:(_pNum%99)+2;
  const g=new THREE.Group();
  const col=new THREE.Color(teamColor);
  const colHex='#'+col.getHexString();
  const skins=['#ffd9b3','#f5c6a0','#d4a574','#c68642','#8d5524'];
  const skin=skins[_pNum%skins.length];

  /* procedural jersey texture (512px) */
  function jerseyTex(){
    const s=512,cv=document.createElement('canvas');cv.width=s;cv.height=s;const cx=cv.getContext('2d');
    cx.fillStyle=colHex;cx.fillRect(0,0,s,s);
    // chest stripe
    cx.fillStyle='rgba(255,255,255,0.18)';cx.fillRect(0,s*0.42,s,s*0.08);
    // sleeve cuffs
    cx.fillStyle='rgba(255,255,255,0.14)';cx.fillRect(0,s*0.16,s*0.1,s*0.1);cx.fillRect(s*0.9,s*0.16,s*0.1,s*0.1);
    // collar
    cx.fillStyle='rgba(0,0,0,0.15)';cx.fillRect(s*0.35,0,s*0.3,s*0.05);
    // front number
    cx.fillStyle='#fff';cx.font='bold 120px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
    cx.strokeStyle='rgba(0,0,0,0.3)';cx.lineWidth=4;cx.strokeText(String(num),s/2,s*0.58);cx.fillText(String(num),s/2,s*0.58);
    // lace detail at collar
    cx.fillStyle='rgba(255,255,255,0.5)';cx.fillRect(s*0.48,s*0.02,s*0.04,s*0.06);
    // fabric noise
    for(let i=0;i<500;i++){cx.fillStyle='rgba(0,0,0,'+(Math.random()*0.012)+')';cx.fillRect(Math.random()*s,Math.random()*s,1,1);}
    const t=new THREE.CanvasTexture(cv);t.colorSpace=THREE.SRGBColorSpace;return t;
  }

  const jTex=jerseyTex();

  /* torso (cylinder) */

function spawnP(x,z,color,n=8){for(let i=0;i<n;i++){const p=particlePool.pop();if(!p)break;p.material.color.set(color||0xfff);p.visible=true;p.position.set(x,0.15,z);p.scale.setScalar(0.5+Math.random()*0.5);p.userData={vx:(Math.random()-0.5)*8,vy:2+Math.random()*5,vz:(Math.random()-0.5)*8,life:0.7+Math.random()*0.3};particles.push(p);}}
function spawnIce(x,z,dx,dz){for(let i=0;i<5;i++){const p=icePool.pop();if(!p)break;p.visible=true;p.position.set(x,0.05,z);p.userData={vx:dx*2+(Math.random()-0.5)*3,vy:1+Math.random()*2,vz:dz*2+(Math.random()-0.5)*3,life:0.4+Math.random()*0.2};iceParticles.push(p);}}
function updateParts(dt){
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.userData.life-=dt;if(p.userData.life<=0){p.visible=false;particlePool.push(p);particles.splice(i,1);continue;}p.position.x+=p.userData.vx*dt;p.position.y+=p.userData.vy*dt;p.position.z+=p.userData.vz*dt;p.userData.vy-=12*dt;p.scale.multiplyScalar(0.97);}
  for(let i=iceParticles.length-1;i>=0;i--){const p=iceParticles[i];p.userData.life-=dt;if(p.userData.life<=0){p.visible=false;icePool.push(p);iceParticles.splice(i,1);continue;}p.position.x+=p.userData.vx*dt;p.position.y+=p.userData.vy*dt;p.position.z+=p.userData.vz*dt;p.userData.vy-=8*dt;p.material.opacity=p.userData.life*1.5;}
}

  charge=0;
  const title=scoreA===scoreB?'FINAL: TIE':(scoreA>scoreB?'FINAL: HOME WINS':'FINAL: AWAY WINS');
  const sub='Press R to start a new game.';
  setPaused(true,title,sub);
}

function advancePeriod(){
  if(period<GAME_CFG.maxPeriods){
    period+=1;
    timeLeft=GAME_CFG.periodSeconds;
    faceoffTimer=GAME_CFG.faceoffFreeze;
    positionPlayers();
    resetPuck(true,true);
    showBanner('PERIOD '+period,'Faceoff incoming.',1300);
    return;
  }
  if(period===GAME_CFG.maxPeriods&&scoreA===scoreB){
    period=GAME_CFG.maxPeriods+1;
    timeLeft=GAME_CFG.overtimeSeconds;
    faceoffTimer=GAME_CFG.faceoffFreeze;
    positionPlayers();
    resetPuck(true,true);
    showBanner('OVERTIME','Next goal wins.',1400);
    return;
  }
  endMatch();
}

function updateGameClock(dt){
  if(!periodActive||matchEnded||isPaused)return;
  timeLeft-=dt;
  if(timeLeft<=0){
    timeLeft=0;
    advancePeriod();
  }
}

let aCtx=null;
function getA(){if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();return aCtx;}
function unlockAudio(){if(!audioEnabled)return;try{const a=getA();if(a.state==='suspended')a.resume();}catch(e){}}
function tone(f,d,v,tp){
  if(!audioEnabled)return;
  try{
    const a=getA(),o=a.createOscillator(),g=a.createGain();
    o.type=tp||'sine';
    o.frequency.value=f;
    g.gain.setValueAtTime(v||0.04,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d);
    o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+d);
  }catch(e){}
}
function goalHorn(){tone(220,1.5,0.06,'sawtooth');setTimeout(()=>tone(277,1.2,0.05,'sawtooth'),200);}
function hitSnd(){tone(180,0.08,0.03,'square');}
function shotSnd(){tone(400,0.1,0.025,'triangle');}

function toggleMute(){
  audioEnabled=!audioEnabled;

}

const keys={left:false,right:false,up:false,down:false,sprint:false};
window.addEventListener('keydown',e=>{
  const k=e.key||'',c=e.code||'',low=k.toLowerCase();
  if((c.startsWith('Arrow')||k===' '||k==='Spacebar'||c==='Space'))e.preventDefault();

  if(c==='Escape'){
    if(!matchEnded)setPaused(!isPaused,'PAUSED','Press ESC to resume.');
    return;
  }
  if(c==='KeyR'){restartGame();return;}
  if(c==='KeyM'){toggleMute();return;}
  if(c==='KeyG'){toggleGraphics();return;}

  if(isPaused||matchEnded)return;

  if(c==='ArrowLeft'||c==='KeyA'||low==='a')keys.left=true;
  if(c==='ArrowRight'||c==='KeyD'||low==='d')keys.right=true;
  if(c==='ArrowUp'||c==='KeyW'||low==='w')keys.up=true;
  if(c==='ArrowDown'||c==='KeyS'||low==='s')keys.down=true;
  if(c==='ShiftLeft'||c==='ShiftRight')keys.sprint=true;
  if(c==='KeyP'||low==='p')passQueued=true;
  if((c==='Space'||k===' '||k==='Spacebar')&&!isCharging&&hasControlledPossession()){
    isCharging=true;
    charge=0;
  }
});

window.addEventListener('keyup',e=>{
  const k=e.key||'',c=e.code||'',low=k.toLowerCase();
  if((c.startsWith('Arrow')||k===' '||k==='Spacebar'||c==='Space'))e.preventDefault();

  if(c==='ArrowLeft'||c==='KeyA'||low==='a')keys.left=false;
  if(c==='ArrowRight'||c==='KeyD'||low==='d')keys.right=false;
  if(c==='ArrowUp'||c==='KeyW'||low==='w')keys.up=false;
  if(c==='ArrowDown'||c==='KeyS'||low==='s')keys.down=false;
  if(c==='ShiftLeft'||c==='ShiftRight')keys.sprint=false;

  if(isCharging&&(c==='Space'||k===' '||k==='Spacebar'))releaseShot();
});

function updatePointerTarget(e){
  const r=canvas.getBoundingClientRect();
  const nx=(e.clientX-r.left)/r.width*2-1;
  const nz=1-(e.clientY-r.top)/r.height*2;
  pointerTarget.x=THREE.MathUtils.clamp(nx*(RW/2-1),-RW/2+1,RW/2-1);
  pointerTarget.y=THREE.MathUtils.clamp(nz*(RL/2-2),-RL/2+2,RL/2-2);
}

canvas.addEventListener('pointerdown',e=>{
  unlockAudio();
  if(isPaused||matchEnded)return;
  touchActive=true;
  canvas.setPointerCapture(e.pointerId);
  updatePointerTarget(e);
});
canvas.addEventListener('pointermove',e=>{if(touchActive&&!isPaused&&!matchEnded)updatePointerTarget(e);});
canvas.addEventListener('pointerup',e=>{touchActive=false;try{canvas.releasePointerCapture(e.pointerId);}catch(_){}});
canvas.addEventListener('pointercancel',()=>{touchActive=false;});
window.addEventListener('keydown',unlockAudio,{once:true});
canvas.addEventListener('pointerdown',unlockAudio,{once:true});

  scoreA=0;scoreB=0;
  period=1;timeLeft=GAME_CFG.periodSeconds;periodActive=true;matchEnded=false;
  faceoffTimer=0;isCharging=false;charge=0;
  crowdExcitement=0;waveActive=false;waveTime=0;
  stuckTimer=0;passQueued=false;touchActive=false;
  possessionPlayer=null;possessionTeam='NONE';
  positionPlayers();
  resetPuck(true,true);
  setPaused(false,'PAUSED','Press ESC to resume.');
  showBanner('NEW GAME','Puck dropped.',1000);
  updateHUD();
  updateTimer();

function resetPuck(center,still){
  puck.position.set(0,0.1,center?0:(Math.random()<0.5?RL/4:-RL/4));
  puckVel.set(still?0:(Math.random()-0.5)*0.5,0,still?0:(Math.random()-0.5)*0.5);
  trailPts.length=0;
  trailGeo.setFromPoints(trailPts);
}

function hasControlledPossession(){
  return possessionPlayer===controlledPlayer&&possessionTeam==='HOME';
}

function releaseShot(){
  if(!isCharging)return;
  if(!hasControlledPossession()){
    isCharging=false;
    charge=0;
    return;
  }
  tmpV1.subVectors(puck.position,controlledPlayer.position).setY(0);
  if(tmpV1.lengthSq()<1e-6)tmpV1.set(0,0,-1);
  tmpV1.normalize();
  const str=THREE.MathUtils.clamp(charge,0,maxCharge);
  puckVel.addScaledVector(tmpV1,6+str*6);
  tmpV2.set(-tmpV1.z,0,tmpV1.x).multiplyScalar((Math.random()-0.5)*str*1.4);
  puckVel.add(tmpV2);
  isCharging=false;
  charge=0;
  shotSnd();
  spawnIce(controlledPlayer.position.x,controlledPlayer.position.z,tmpV1.x,tmpV1.z);
}

function passToTeammate(){
  if(!hasControlledPossession())return false;
  let best=null,bestScore=-1e9;
  for(let i=1;i<teams.A.length;i++){
    const mate=teams.A[i];
    if(mate===controlledPlayer)continue;
    tmpV1.subVectors(mate.position,controlledPlayer.position);
    const dist=tmpV1.length();
    if(dist<1||dist>24)continue;
    const forwardBonus=-tmpV1.z*0.8;
    const score=-dist+forwardBonus;
    if(score>bestScore){bestScore=score;best=mate;}
  }
  if(!best)return false;
  tmpV2.subVectors(best.position,puck.position).setY(0);
  if(tmpV2.lengthSq()<1e-6)return false;
  tmpV2.setLength(8.5);
  puckVel.copy(tmpV2);
  shotSnd();
  spawnIce(controlledPlayer.position.x,controlledPlayer.position.z,tmpV2.x*0.1,tmpV2.z*0.1);
  return true;
}

function collide(a,ar,b,br){
  const dx=a.x-b.x,dz=a.z-b.z,d2=dx*dx+dz*dz,r=ar+br;
  return{hit:d2<=r*r,dx,dz,dist:Math.sqrt(d2)};
}

function strikePuck(pl,str){
  const c=collide(pl.position,0.8,puck.position,0.4);
  if(!c.hit)return;
  const nx=c.dx/(c.dist||0.001),nz=c.dz/(c.dist||0.001);
  tmpV1.set(nx,0,nz);
  let boost=0;
  if(pl===controlledPlayer&&isCharging&&hasControlledPossession())boost=1.6+Math.min(maxCharge,charge)*3.2;
  puckVel.copy(tmpV1.multiplyScalar(str+boost));
  puck.position.x=pl.position.x-nx*1.2;
  puck.position.z=pl.position.z-nz*1.2;
  spawnP(puck.position.x,puck.position.z,pl.userData.teamColor,6);
  hitSnd();
}

function updateControlledPlayer(dt){
  const baseSpeed=GAME_CFG.playerSpeed*(keys.sprint?GAME_CFG.sprintMult:1);
  const maxStep=baseSpeed*dt;
  if(touchActive){
    const dx=pointerTarget.x-controlledPlayer.position.x;
    const dz=pointerTarget.y-controlledPlayer.position.z;
    const dist=Math.hypot(dx,dz);
    if(dist>0.001){
      const step=Math.min(dist,maxStep);
      controlledPlayer.position.x+=dx/dist*step;
      controlledPlayer.position.z+=dz/dist*step;
    }
  }else{
    let mx=0,mz=0;
    if(keys.left)mx-=1;
    if(keys.right)mx+=1;
    if(keys.up)mz-=1;
    if(keys.down)mz+=1;
    if(mx||mz){
      const len=Math.hypot(mx,mz)||1;
      controlledPlayer.position.x+=mx/len*maxStep;
      controlledPlayer.position.z+=mz/len*maxStep;
    }
  }
  controlledPlayer.position.x=THREE.MathUtils.clamp(controlledPlayer.position.x,-RW/2+1,RW/2-1);
  controlledPlayer.position.z=THREE.MathUtils.clamp(controlledPlayer.position.z,-RL/2+1.5,RL/2-1.5);
}

function updatePlayerAnimations(dt,t){
  playerGroup.children.forEach((pl,idx)=>{
    const d=pl.userData;
    const vx=(d._lx===undefined)?0:pl.position.x-d._lx;
    const vz=(d._lz===undefined)?0:pl.position.z-d._lz;
    const speed=Math.sqrt(vx*vx+vz*vz)/Math.max(dt,0.001);
    if(speed>0.3){
      const tgt=Math.atan2(vx,vz);
      pl.rotation.y+=(tgt-pl.rotation.y)*0.12;
    }
    const freq=Math.min(speed*1.2,12),amp=Math.min(speed*0.04,0.5);
    if(d.lLeg){d.lLeg.rotation.x=Math.sin(t*freq+idx)*amp;d.rLeg.rotation.x=Math.sin(t*freq+idx+Math.PI)*amp;}
    if(d.lArm){d.lArm.rotation.x=Math.sin(t*freq+idx+Math.PI)*amp*0.6;d.rArm.rotation.x=Math.sin(t*freq+idx)*amp*0.6;}
    pl.position.y=Math.sin(t*5+idx*0.7)*0.03;
    if(speed>5&&Math.random()<0.08)spawnIce(pl.position.x,pl.position.z,-vx*0.5,-vz*0.5);
    if(d.ring)d.ring.material.opacity=pl===controlledPlayer?0.5+Math.sin(t*4)*0.2:0;
    if(pl===controlledPlayer&&d.stickPiv)d.stickPiv.rotation.x=isCharging?-0.3-Math.min(0.8,charge/maxCharge*0.8):0;
    d._lx=pl.position.x;d._lz=pl.position.z;
  });
}

function steerPlayer(p,tx,tz,k,dt){
  p.position.x+=(tx-p.position.x)*k*dt*60;
  p.position.z+=(tz-p.position.z)*k*dt*60;
}

function nearestPlayerIndexes(team,n){
  return team
    .map((p,i)=>({i,d:p.position.distanceToSquared(puck.position)}))
    .sort((a,b)=>a.d-b.d)
    .slice(0,n)
    .map(o=>o.i);
}

function updateAI(dt){
  teams.A[0].position.x+=(THREE.MathUtils.clamp(puck.position.x,-GOAL_W/2+0.5,GOAL_W/2-0.5)-teams.A[0].position.x)*GAME_CFG.goalieSlide;
  teams.B[0].position.x+=(THREE.MathUtils.clamp(puck.position.x,-GOAL_W/2+0.5,GOAL_W/2-0.5)-teams.B[0].position.x)*GAME_CFG.goalieSlide;
  teams.A[0].position.z+=((RL/2-2-(puck.position.z>RL/4?1.5:0))-teams.A[0].position.z)*0.06;
  teams.B[0].position.z+=((-RL/2+2+(puck.position.z<-RL/4?1.5:0))-teams.B[0].position.z)*0.06;

  const fA=[null,{x:-4,z:RL/4+4},{x:4,z:RL/4+4},{x:0,z:4},{x:-5,z:RL/4-2},{x:5,z:RL/4-2}];
  const fB=[null,{x:-4,z:-RL/4-4},{x:4,z:-RL/4-4},{x:0,z:-4},{x:-5,z:-RL/4+2},{x:5,z:-RL/4+2}];
  const chaseA=nearestPlayerIndexes(teams.A,2),chaseB=nearestPlayerIndexes(teams.B,2);

  const predX=puck.position.x+puckVel.x*0.45;
  const predZ=puck.position.z+puckVel.z*0.45;

  for(let i=1;i<teams.A.length;i++){
    if(teams.A[i]===controlledPlayer)continue;
    const h=fA[i];
    if(chaseA.includes(i)&&teams.A[i].position.distanceTo(puck.position)<14){
      steerPlayer(teams.A[i],predX,predZ,0.08,dt);
    }else{
      steerPlayer(teams.A[i],h.x,h.z,0.04,dt);
    }
  }
  for(let i=1;i<teams.B.length;i++){
    const h=fB[i];
    if(chaseB.includes(i)&&teams.B[i].position.distanceTo(puck.position)<14){
      steerPlayer(teams.B[i],predX,predZ,0.1,dt);
    }else{
      steerPlayer(teams.B[i],h.x,h.z,0.04,dt);
    }
  }
}

function separatePlayers(){
  const pls=playerGroup.children;
  for(let i=0;i<pls.length;i++){
    for(let j=i+1;j<pls.length;j++){
      const dx=pls[i].position.x-pls[j].position.x;
      const dz=pls[i].position.z-pls[j].position.z;
      const d2=dx*dx+dz*dz;
      if(d2>0&&d2<1.44){
        const d=Math.sqrt(d2),ov=(1.2-d)*0.5,nx=dx/d,nz=dz/d;
        pls[i].position.x+=nx*ov;pls[i].position.z+=nz*ov;
        pls[j].position.x-=nx*ov;pls[j].position.z-=nz*ov;
      }
    }
  }
  pls.forEach(p=>{
    p.position.x=THREE.MathUtils.clamp(p.position.x,-RW/2+0.8,RW/2-0.8);
    p.position.z=THREE.MathUtils.clamp(p.position.z,-RL/2+0.8,RL/2-0.8);
  });
}

function triggerGoal(team,goalObj){
  if(team==='HOME')scoreA++;else scoreB++;
  goalObj.userData.light.intensity=8;
  crowdExcitement=1;waveActive=true;waveTime=0;
  ui.goalFlash.style.opacity='1';
  setTimeout(()=>{ui.goalFlash.style.opacity='0';},600);
  showBanner(team+' GOAL!','',1450);
  goalHorn();
  for(let i=0;i<25;i++)spawnP((Math.random()-0.5)*8,goalObj.position.z,[0xff4444,0xffdd44,0x44ff44,0x4444ff,0xff44ff][i%5],1);
  if(period>GAME_CFG.maxPeriods){
    endMatch();
  }else{
    faceoffTimer=GAME_CFG.faceoffFreeze;
    positionPlayers();
    resetPuck(true,true);
  }
}

function updatePuck(dt){
  puck.position.addScaledVector(puckVel,dt);
  puckVel.multiplyScalar(Math.pow(GAME_CFG.puckDrag,dt*60));
  puck.position.y=0.1;

  const goalLine=RL/2-1.2;
  if(faceoffTimer<=0&&puck.position.z<-goalLine&&Math.abs(puck.position.x)<GOAL_W/2){
    triggerGoal('HOME',goalAway);
    return;
  }
  if(faceoffTimer<=0&&puck.position.z>goalLine&&Math.abs(puck.position.x)<GOAL_W/2){
    triggerGoal('AWAY',goalHome);
    return;
  }

  if(puck.position.x<-RW/2+0.5){puck.position.x=-RW/2+0.5;puckVel.x*=-0.85;hitSnd();}
  if(puck.position.x>RW/2-0.5){puck.position.x=RW/2-0.5;puckVel.x*=-0.85;hitSnd();}

  const outOfMouth=Math.abs(puck.position.x)>GOAL_W/2;
  if(puck.position.z<-RL/2+0.5&&outOfMouth){puck.position.z=-RL/2+0.5;puckVel.z*=-0.85;hitSnd();}
  if(puck.position.z>RL/2-0.5&&outOfMouth){puck.position.z=RL/2-0.5;puckVel.z*=-0.85;hitSnd();}

  for(let i=0;i<teams.A.length;i++)strikePuck(teams.A[i],5+(i===0?1:0));
  for(let i=0;i<teams.B.length;i++)strikePuck(teams.B[i],5.5);

  const pls=playerGroup.children;
  if(puckVel.length()<0.06){
    let overlaps=0,nearest=null,best=1e9;
    pls.forEach(p=>{
      const d=p.position.distanceTo(puck.position);
      if(d<0.9)overlaps++;
      if(d<best){best=d;nearest=p;}
    });
    if(overlaps>=1){
      stuckTimer+=dt;
      if(stuckTimer>0.15){
        if(nearest){
          tmpV1.subVectors(puck.position,nearest.position).setY(0);
          if(tmpV1.lengthSq()<1e-6)tmpV1.set(Math.random()-0.5,0,Math.random()-0.5);
          tmpV1.normalize();
          puckVel.addScaledVector(tmpV1,2);
        }
        stuckTimer=0;
      }
    }else{
      stuckTimer=0;
    }
  }else{
    stuckTimer=0;
  }

  if(puckVel.length()>1){
    trailPts.push(puck.position.clone());
    if(trailPts.length>MAX_TRAIL)trailPts.shift();
    trailGeo.setFromPoints(trailPts);
  }else if(trailPts.length>0){
    trailPts.shift();
    trailGeo.setFromPoints(trailPts);
  }
  trailMat.opacity=Math.min(puckVel.length()*0.04,0.35);
  puck.rotation.z+=puckVel.length()*dt*4;
}

function updatePossession(){
  let nearest=null,best=1e9;
  playerGroup.children.forEach(pl=>{
    const d2=pl.position.distanceToSquared(puck.position);
    if(d2<best){best=d2;nearest=pl;}
  });
  const acquire2=GAME_CFG.possessionAcquire*GAME_CFG.possessionAcquire;
  const release2=GAME_CFG.possessionRelease*GAME_CFG.possessionRelease;
  if(!possessionPlayer){
    if(nearest&&best<=acquire2){
      possessionPlayer=nearest;
      possessionTeam=nearest.userData.team||'NONE';
    }
    return;
  }
  if(possessionPlayer.position.distanceToSquared(puck.position)>release2){
    possessionPlayer=null;
    possessionTeam='NONE';
    if(nearest&&best<=acquire2){
      possessionPlayer=nearest;
      possessionTeam=nearest.userData.team||'NONE';
    }
  }
}

function updateCrowd(dt,t){
  crowdExcitement=Math.max(0,crowdExcitement-dt*0.3);
  if(waveActive)waveTime+=dt*2.5;
  if(waveTime>Math.PI*4)waveActive=false;
  crowdMeshes.forEach(m=>{
    let dy=0;
    if(waveActive){
      const w=Math.sin(waveTime-m.userData.wavePhase*1.5);
      if(w>0.3)dy=w*0.8;
    }
    dy+=Math.sin(t*8+m.userData.idx*0.3)*crowdExcitement*0.4;
    dy+=Math.sin(t*1.2+m.userData.idx*0.5)*0.05;
    m.position.y=m.userData.baseY+dy;
  });
}

function updateCamera(dt){
  camTarget.set(controlledPlayer.position.x*0.4,28+Math.abs(controlledPlayer.position.z)*0.08,controlledPlayer.position.z*0.35+18);
  camera.position.lerp(camTarget,dt*2);
  camLookTarget.set(controlledPlayer.position.x*0.3,0,controlledPlayer.position.z*0.5-4);
  camera.lookAt(camLookTarget);
}

function renderReflection(){
  if(graphicsQuality!=='HIGH')return;
  reflectCam.position.copy(camera.position);
  reflectCam.position.y*=-1;
  camera.getWorldDirection(reflectDir);
  reflectDir.y*=-1;
  reflectCam.lookAt(tmpV3.copy(reflectCam.position).add(reflectDir));
  reflPlane.visible=false;
  renderer.setRenderTarget(reflectRT);
  renderer.render(scene,reflectCam);
  renderer.setRenderTarget(null);
  reflPlane.visible=true;
}

let last=performance.now(),accTime=0;
function animate(ts){
  const dt=Math.min((ts-last)/1000,0.033);
  last=ts;
  accTime+=dt;

  fpsAccum+=dt;
  fpsFrames+=1;
  if(fpsAccum>=0.5){
    fpsValue=Math.round(fpsFrames/fpsAccum);
    fpsAccum=0;
    fpsFrames=0;
  }

  if(!isPaused){
    if(isCharging)charge=Math.min(charge+dt,maxCharge);
    if(passQueued){passToTeammate();passQueued=false;}

    if(faceoffTimer>0)faceoffTimer=Math.max(0,faceoffTimer-dt);
    updateControlledPlayer(dt);
    updateAI(dt);
    separatePlayers();
    updatePuck(dt);
    updatePossession();
    updatePlayerAnimations(dt,accTime);
    updateParts(dt);
    updateCrowd(dt,accTime);
    updateGameClock(dt);

    [goalHome,goalAway].forEach(g=>{if(g.userData.light.intensity>0)g.userData.light.intensity*=0.96;});
  }

  updateTimer();
  updateHUD();
  updateCamera(dt);
  renderReflection();
  renderer.render(scene,camera);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

window.addEventListener('resize',()=>{
  W=innerWidth;
  H=innerHeight;
  renderer.setSize(W,H);
  camera.aspect=W/H;
  camera.updateProjectionMatrix();
});

resetPuck(true,true);
updatePossession();
updateHUD();
updateTimer();
applyGraphicsQuality();
showBanner('FACEOFF','Take control and score.',1000);

</script>
