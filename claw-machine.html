<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade Claw Master Pro - K2 games</title>
    <style>
        :root {
            --machine-red: #ef4444;
            --machine-dark: #b91c1c;
            --neon-blue: #22d3ee;
            --neon-yellow: #fbbf24;
            --bg: #0f172a;
            --panel: rgba(15, 23, 42, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: none; }
        
        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        nav {
            padding: 1rem 2rem;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo { font-weight: 900; font-size: 1.5rem; color: var(--neon-yellow); font-style: italic; }
        .back-link { color: #94a3b8; text-decoration: none; font-weight: bold; font-size: 0.8rem; }

        #game-container {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas { display: block; max-width: 100%; max-height: 100%; }

        #ui {
            position: absolute; inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            z-index: 50;
        }

        .stat-card {
            background: var(--panel);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            width: fit-content;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            pointer-events: auto;
        }

        .label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: #94a3b8; }
        .val { font-size: 2rem; font-weight: 900; color: var(--neon-yellow); font-family: monospace; }

        #controls {
            align-self: center;
            display: flex;
            gap: 2rem;
            pointer-events: auto;
            align-items: center;
        }

        .joystick-container {
            width: 140px; height: 140px;
            background: rgba(255,255,255,0.05);
            border: 3px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            position: relative;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }

        .joystick-knob {
            width: 60px; height: 60px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            position: absolute;
            cursor: pointer;
        }

        .btn-drop {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, var(--machine-red), var(--machine-dark));
            border: 4px solid white;
            border-radius: 50%;
            color: white;
            font-weight: 900;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.4);
            display: flex; align-items: center; justify-content: center;
            transition: 0.1s;
        }
        .btn-drop:active { transform: scale(0.9) translateY(5px); box-shadow: 0 5px 10px rgba(0,0,0,0.3); }
        .btn-drop:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }

        #overlay {
            position: absolute; inset: 0;
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(15px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            text-align: center;
        }

        .win-title { font-size: 4rem; color: var(--neon-yellow); font-weight: 900; margin-bottom: 1rem; }
        .prize-preview { font-size: 6rem; margin: 2rem 0; animation: float 2s infinite ease-in-out; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(5deg); }
            50% { transform: translateY(-20px) rotate(-5deg); }
        }

        .btn-restart {
            padding: 1rem 3rem;
            background: var(--neon-blue);
            color: black;
            border: none;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.2rem;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            #controls { gap: 1rem; }
            .joystick-container { width: 120px; height: 120px; }
            .btn-drop { width: 80px; height: 80px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">CLAW MASTER PRO</div>
        <a href="index.html" class="back-link">← EXIT ARCADE</a>
    </nav>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div class="stat-card">
                <div class="label">Prizes Collected</div>
                <div id="score-val" class="val">0</div>
            </div>
            <div id="controls">
                <div class="joystick-container" id="joy-base">
                    <div class="joystick-knob" id="joy-knob"></div>
                </div>
                <button class="btn-drop" id="btn-drop">DROP</button>
            </div>
        </div>
        <div id="overlay">
            <h1 class="win-title">BIG WIN!</h1>
            <div class="prize-preview" id="prize-emoji">🎁</div>
            <p style="margin-bottom: 2rem; opacity: 0.7;">You caught a rare prize!</p>
            <button class="btn-restart" onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const EMOJIS = ['🧸', '🐼', '🦊', '🦄', '🦖', '🚗', '🏀', '💎', '🎨', '🎮'];

        class ClawGame {
            constructor() {
                this.initScene();
                this.initMachine();
                this.initPrizes();
                this.initClaw();
                this.setupControls();
                
                this.score = 0;
                this.state = 'idle'; // idle, dropping, grabbing, lifting, returning
                this.grabbedPrize = null;
                
                this.loop();
            }

            initScene() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x0f172a);
                
                this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(0, 12, 28);
                this.camera.lookAt(0, 8, 0);

                this.renderer = new THREE.WebGLRenderer({ 
                    canvas: document.getElementById('gameCanvas'),
                    antialias: true 
                });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;

                // Lighting
                this.scene.add(new THREE.AmbientLight(0xffffff, 0.4));
                
                const spot = new THREE.PointLight(0xffffff, 1.5);
                spot.position.set(0, 20, 10);
                spot.castShadow = true;
                spot.shadow.mapSize.width = 1024;
                spot.shadow.mapSize.height = 1024;
                this.scene.add(spot);

                const neonLeft = new THREE.RectAreaLight(0x22d3ee, 5, 2, 20);
                neonLeft.position.set(-8.5, 10, 8);
                neonLeft.lookAt(0, 10, 8);
                this.scene.add(neonLeft);

                const neonRight = new THREE.RectAreaLight(0xfbbf24, 5, 2, 20);
                neonRight.position.set(8.5, 10, 8);
                neonRight.lookAt(0, 10, 8);
                this.scene.add(neonRight);

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            initMachine() {
                // Base
                const base = new THREE.Mesh(
                    new THREE.BoxGeometry(18, 2, 18),
                    new THREE.MeshStandardMaterial({ color: 0xef4444, roughness: 0.2, metalness: 0.5 })
                );
                base.position.y = -1;
                base.receiveShadow = true;
                this.scene.add(base);

                // Floor (inside)
                const floor = new THREE.Mesh(
                    new THREE.BoxGeometry(16, 0.5, 16),
                    new THREE.MeshStandardMaterial({ color: 0x1e293b })
                );
                floor.position.y = 0.25;
                floor.receiveShadow = true;
                this.scene.add(floor);

                // Prize Chute
                const chute = new THREE.Mesh(
                    new THREE.BoxGeometry(5, 1, 5),
                    new THREE.MeshStandardMaterial({ color: 0x000000 })
                );
                chute.position.set(-5.5, 0.26, -5.5);
                this.scene.add(chute);

                // Glass Box
                const glassMat = new THREE.MeshPhysicalMaterial({
                    color: 0xffffff,
                    transmission: 0.9,
                    thickness: 0.5,
                    roughness: 0.1,
                    transparent: true,
                    opacity: 0.3
                });
                const glass = new THREE.Mesh(new THREE.BoxGeometry(16, 18, 16), glassMat);
                glass.position.y = 9;
                this.scene.add(glass);

                // Metal Pillars
                const pGeo = new THREE.BoxGeometry(0.5, 18, 0.5);
                const pMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8, metalness: 0.8, roughness: 0.2 });
                [[-8,-8], [8,-8], [8,8], [-8,8]].forEach(([x,z]) => {
                    const pillar = new THREE.Mesh(pGeo, pMat);
                    pillar.position.set(x, 9, z);
                    this.scene.add(pillar);
                });

                // Top Housing
                const top = new THREE.Mesh(
                    new THREE.BoxGeometry(18, 2, 18),
                    new THREE.MeshStandardMaterial({ color: 0xef4444 })
                );
                top.position.y = 19;
                this.scene.add(top);
            }

            initPrizes() {
                this.prizes = [];
                const pGeo = new THREE.SphereGeometry(1, 16, 16);
                
                for(let i=0; i<20; i++) {
                    const prizeGroup = new THREE.Group();
                    
                    // Simple procedural plushie
                    const body = new THREE.Mesh(
                        pGeo,
                        new THREE.MeshStandardMaterial({ 
                            color: Math.random() * 0xffffff,
                            roughness: 0.8 
                        })
                    );
                    body.castShadow = true;
                    prizeGroup.add(body);

                    const head = new THREE.Mesh(
                        new THREE.SphereGeometry(0.6),
                        body.material
                    );
                    head.position.y = 0.8;
                    prizeGroup.add(head);

                    prizeGroup.position.set(
                        (Math.random() - 0.5) * 12,
                        1,
                        (Math.random() - 0.5) * 12
                    );
                    
                    // Avoid chute
                    if (prizeGroup.position.x < -3 && prizeGroup.position.z < -3) {
                        prizeGroup.position.x += 6;
                    }

                    prizeGroup.rotation.y = Math.random() * Math.PI;
                    prizeGroup.userData = { emoji: EMOJIS[Math.floor(Math.random() * EMOJIS.length)] };
                    
                    this.scene.add(prizeGroup);
                    this.prizes.push(prizeGroup);
                }
            }

            initClaw() {
                this.clawGroup = new THREE.Group();
                this.clawPos = { x: 0, z: 0, y: 17 };
                
                // Housing
                const housing = new THREE.Mesh(
                    new THREE.CylinderGeometry(1, 1.2, 1.5, 8),
                    new THREE.MeshStandardMaterial({ color: 0x334155, metalness: 0.8 })
                );
                this.clawGroup.add(housing);

                // Cable
                const cableGeo = new THREE.CylinderGeometry(0.05, 0.05, 20);
                const cableMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
                this.cable = new THREE.Mesh(cableGeo, cableMat);
                this.cable.position.y = 10;
                this.clawGroup.add(this.cable);

                // Fingers
                this.fingers = [];
                const fGeo = new THREE.BoxGeometry(0.2, 2, 0.2);
                const fMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8, metalness: 0.9 });
                
                for(let i=0; i<3; i++) {
                    const finger = new THREE.Group();
                    const mesh = new THREE.Mesh(fGeo, fMat);
                    mesh.position.y = -1;
                    finger.add(mesh);
                    
                    const angle = (i / 3) * Math.PI * 2;
                    finger.position.set(Math.cos(angle)*0.8, -0.5, Math.sin(angle)*0.8);
                    finger.rotation.y = -angle;
                    
                    this.clawGroup.add(finger);
                    this.fingers.push(finger);
                }

                this.scene.add(this.clawGroup);
            }

            setupControls() {
                this.joy = { active: false, x: 0, y: 0 };
                const joyBase = document.getElementById('joy-base');
                const joyKnob = document.getElementById('joy-knob');
                const btnDrop = document.getElementById('btn-drop');

                const handleMove = (e) => {
                    if (!this.joy.active) return;
                    const touch = e.touches ? e.touches[0] : e;
                    const rect = joyBase.getBoundingClientRect();
                    const cx = rect.left + rect.width/2;
                    const cy = rect.top + rect.height/2;
                    const dx = touch.clientX - cx;
                    const dy = touch.clientY - cy;
                    const dist = Math.min(rect.width/2, Math.hypot(dx, dy));
                    const angle = Math.atan2(dy, dx);
                    
                    this.joy.x = (Math.cos(angle) * dist) / (rect.width/2);
                    this.joy.y = (Math.sin(angle) * dist) / (rect.width/2);
                    
                    joyKnob.style.transform = `translate(${this.joy.x * 40}px, ${this.joy.y * 40}px)`;
                };

                joyBase.addEventListener('touchstart', (e) => { this.joy.active = true; handleMove(e); });
                window.addEventListener('touchmove', handleMove);
                window.addEventListener('touchend', () => { 
                    this.joy.active = false; this.joy.x = 0; this.joy.y = 0; 
                    joyKnob.style.transform = 'translate(0,0)';
                });

                btnDrop.onclick = () => { if(this.state === 'idle') this.dropClaw(); };

                // Keyboard
                this.keys = {};
                window.onkeydown = (e) => {
                    this.keys[e.code] = true;
                    if(e.code === 'Space' && this.state === 'idle') this.dropClaw();
                };
                window.onkeyup = (e) => this.keys[e.code] = false;
            }

            dropClaw() {
                this.state = 'dropping';
                document.getElementById('btn-drop').disabled = true;
            }

            update(dt) {
                // Movement
                if (this.state === 'idle') {
                    let dx = this.joy.x;
                    let dz = this.joy.y;

                    if (this.keys['ArrowLeft'] || this.keys['KeyA']) dx = -1;
                    if (this.keys['ArrowRight'] || this.keys['KeyD']) dx = 1;
                    if (this.keys['ArrowUp'] || this.keys['KeyW']) dz = -1;
                    if (this.keys['ArrowDown'] || this.keys['KeyS']) dz = 1;

                    this.clawPos.x += dx * 0.15;
                    this.clawPos.z += dz * 0.15;
                    this.clawPos.x = THREE.MathUtils.clamp(this.clawPos.x, -7, 7);
                    this.clawPos.z = THREE.MathUtils.clamp(this.clawPos.z, -7, 7);
                    
                    // Claw slightly open
                    this.fingers.forEach(f => f.rotation.z = THREE.MathUtils.lerp(f.rotation.z, 0.4, 0.1));
                }

                if (this.state === 'dropping') {
                    this.clawPos.y -= 0.2;
                    if (this.clawPos.y <= 3) this.state = 'grabbing';
                }

                if (this.state === 'grabbing') {
                    // Close fingers
                    let closed = true;
                    this.fingers.forEach(f => {
                        f.rotation.z = THREE.MathUtils.lerp(f.rotation.z, -0.6, 0.15);
                        if (f.rotation.z > -0.55) closed = false;
                    });

                    if (closed) {
                        // Check for prize
                        const clawV = new THREE.Vector3(this.clawPos.x, this.clawPos.y - 1, this.clawPos.z);
                        this.grabbedPrize = this.prizes.find(p => p.position.distanceTo(clawV) < 2.2);
                        this.state = 'lifting';
                    }
                }

                if (this.state === 'lifting') {
                    this.clawPos.y += 0.15;
                    if (this.grabbedPrize) {
                        this.grabbedPrize.position.set(this.clawPos.x, this.clawPos.y - 1.5, this.clawPos.z);
                    }
                    if (this.clawPos.y >= 17) this.state = 'returning';
                }

                if (this.state === 'returning') {
                    const targetX = -5.5, targetZ = -5.5;
                    const dx = targetX - this.clawPos.x;
                    const dz = targetZ - this.clawPos.z;
                    const dist = Math.hypot(dx, dz);

                    if (dist < 0.1) {
                        this.state = 'releasing';
                    } else {
                        this.clawPos.x += (dx / dist) * 0.1;
                        this.clawPos.z += (dz / dist) * 0.1;
                        if (this.grabbedPrize) {
                            this.grabbedPrize.position.set(this.clawPos.x, this.clawPos.y - 1.5, this.clawPos.z);
                        }
                    }
                }

                if (this.state === 'releasing') {
                    let opened = true;
                    this.fingers.forEach(f => {
                        f.rotation.z = THREE.MathUtils.lerp(f.rotation.z, 0.6, 0.1);
                        if (f.rotation.z < 0.5) opened = false;
                    });

                    if (opened) {
                        if (this.grabbedPrize) {
                            this.win(this.grabbedPrize);
                            this.grabbedPrize = null;
                        }
                        this.state = 'idle';
                        document.getElementById('btn-drop').disabled = false;
                    }
                }

                this.clawGroup.position.set(this.clawPos.x, this.clawPos.y, this.clawPos.z);
                this.cable.scale.y = (20 - this.clawPos.y) / 10;
                this.cable.position.y = (20 - this.clawPos.y) / 2;
            }

            win(prize) {
                this.score++;
                document.getElementById('score-val').textContent = this.score;
                document.getElementById('prize-emoji').textContent = prize.userData.emoji;
                document.getElementById('overlay').style.display = 'flex';
                this.scene.remove(prize);
                this.prizes = this.prizes.filter(p => p !== prize);
            }

            loop() {
                this.update(0.016);
                this.renderer.render(this.scene, this.camera);
                requestAnimationFrame(() => this.loop());
            }
        }

        new ClawGame();
    </script>
</body>
</html>
