<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Slice</title>
    <style>
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #2c3e50, #1a1a1a); 
            color: white; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            overflow: hidden; 
            touch-action: none; 
        }
        canvas { display: block; }
        .ui { position: absolute; top: 30px; left: 30px; font-size: 2.5rem; font-weight: 900; pointer-events: none; text-shadow: 0 4px 8px rgba(0,0,0,0.5); font-variant-numeric: tabular-nums; }
        .back { position: absolute; bottom: 30px; left: 30px; color: #fff; text-decoration: none; font-weight: 800; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 12px 24px; border-radius: 12px; backdrop-filter: blur(5px); transition: all 0.3s; }
        .back:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-CCZ9JJGEDP');
</script>
</head>
<body>
    <div class="ui">SCORE: <span id="score">0</span></div>
    <canvas id="game"></canvas>
    <a href="index.html" class="back">← HUB</a>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let fruits = [];
        let particles = [];
        let slash = [];
        let isMouseDown = false;

        const FRUIT_TYPES = [
            { emoji: '🍉', color: '#ff4757' },
            { emoji: '🍊', color: '#ffa500' },
            { emoji: '🍎', color: '#ff6b81' },
            { emoji: '🥝', color: '#2ecc71' },
            { emoji: '🍍', color: '#f1c40f' },
            { emoji: '🍐', color: '#badc58' },
            { emoji: '💣', type: 'bomb' }
        ];

        function spawnFruit() {
            const type = FRUIT_TYPES[Math.floor(Math.random() * FRUIT_TYPES.length)];
            const side = Math.floor(Math.random() * 3); // 0: Bottom, 1: Left, 2: Right
            
            let x, y, vx, vy;
            
            if (side === 0) { // Bottom launcher
                x = Math.random() * (canvas.width * 0.6) + (canvas.width * 0.2);
                y = canvas.height + 50;
                vx = (Math.random() - 0.5) * 8;
                vy = -(Math.random() * 6 + 14);
            } else if (side === 1) { // Left launcher
                x = -50;
                y = Math.random() * (canvas.height * 0.4) + (canvas.height * 0.4);
                vx = Math.random() * 10 + 10;
                vy = -(Math.random() * 10 + 5);
            } else { // Right launcher
                x = canvas.width + 50;
                y = Math.random() * (canvas.height * 0.4) + (canvas.height * 0.4);
                vx = -(Math.random() * 10 + 10);
                vy = -(Math.random() * 10 + 5);
            }

            fruits.push({
                x, y, vx, vy,
                type: type,
                sliced: false,
                rot: 0,
                vrot: (Math.random() - 0.5) * 0.2
            });
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    size: Math.random() * 8 + 2,
                    color,
                    life: 1
                });
            }
        }

        let gpCursor = { x: canvas.width/2, y: canvas.height/2, active: false };

        function update() {
            // Gamepad polling
            const pads = navigator.getGamepads();
            if (pads[0]) {
                gpCursor.active = true;
                const p = pads[0];
                gpCursor.x += p.axes[0] * 20;
                gpCursor.y += p.axes[1] * 20;
                gpCursor.x = Math.max(0, Math.min(canvas.width, gpCursor.x));
                gpCursor.y = Math.max(0, Math.min(canvas.height, gpCursor.y));
                
                isMouseDown = p.buttons[0].pressed || p.buttons[7].pressed || p.buttons[6].pressed;
                if (isMouseDown) slash.push({ x: gpCursor.x, y: gpCursor.y });
            }

            if (Math.random() < 0.03) spawnFruit();

            fruits.forEach((f, i) => {
                f.x += f.vx;
                f.y += f.vy;
                f.vy += 0.25; // Gravity
                f.rot += f.vrot;

                if (f.y > canvas.height + 150 || f.x < -150 || f.x > canvas.width + 150) {
                    fruits.splice(i, 1);
                }

                // Slice check
                if (!f.sliced && isMouseDown && slash.length > 1) {
                    for (let j = 0; j < slash.length; j++) {
                        let dist = Math.hypot(f.x - slash[j].x, f.y - slash[j].y);
                        if (dist < 50) {
                            f.sliced = true;
                            if (f.type.type === 'bomb') {
                                // Bomb effect
                                createParticles(f.x, f.y, '#ffffff');
                                createParticles(f.x, f.y, '#ff0000');
                                setTimeout(() => {
                                    alert("KABOOM! Game Over. Score: " + score);
                                    location.reload();
                                }, 100);
                            } else {
                                score += 10;
                                document.getElementById('score').textContent = score;
                                createParticles(f.x, f.y, f.type.color);
                            }
                            break;
                        }
                    }
                }
            });

            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                p.vy += 0.1; // Particle gravity
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            });

            if (slash.length > 12) slash.shift();
            else if (slash.length > 0 && !isMouseDown) slash.shift();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw slash
            if (slash.length > 1) {
                ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
                ctx.lineWidth = 8;
                ctx.lineCap = "round";
                ctx.lineJoin = "round";
                ctx.shadowBlur = 15;
                ctx.shadowColor = "rgba(255, 255, 255, 0.5)";
                ctx.beginPath();
                ctx.moveTo(slash[0].x, slash[0].y);
                for (let i = 1; i < slash.length; i++) ctx.lineTo(slash[i].x, slash[i].y);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            // Draw gamepad cursor
            if (gpCursor.active) {
                ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(gpCursor.x, gpCursor.y, 12, 0, Math.PI*2); ctx.stroke();
                ctx.fillStyle = "rgba(255,255,255,0.2)"; ctx.fill();
            }

            // Draw fruits
            fruits.forEach(f => {
                if (f.sliced) return;
                ctx.save();
                ctx.translate(f.x, f.y);
                ctx.rotate(f.rot);
                ctx.font = "60px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "rgba(0,0,0,0.3)";
                ctx.fillText(f.type.emoji, 0, 0);
                ctx.restore();
            });

            // Draw particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            update();
            requestAnimationFrame(draw);
        }

        window.onmousedown = (e) => isMouseDown = true;
        window.onmouseup = (e) => isMouseDown = false;
        window.onmousemove = (e) => {
            if (isMouseDown) slash.push({ x: e.clientX, y: e.clientY });
        };
        // Touch support
        window.ontouchstart = (e) => { isMouseDown = true; };
        window.ontouchend = (e) => { isMouseDown = false; slash = []; };
        window.ontouchmove = (e) => {
            if (isMouseDown) slash.push({ x: e.touches[0].clientX, y: e.touches[0].clientY });
        };

        draw();
    </script>
</body>
</html>
