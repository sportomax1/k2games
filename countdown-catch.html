<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Countdown Catch</title>
<style>/* trimmed from new-years-ball-drop.html */
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100dvh;overflow:hidden;font-family:Arial,sans-serif;touch-action:none}
#wrap{position:relative;width:100vw;height:100dvh}
canvas{display:block;width:100%;height:100%}
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:12px 16px;pointer-events:none;z-index:5}
.pill{background:rgba(0,0,15,.7);backdrop-filter:blur(6px);border:1px solid rgba(255,215,0,.35);border-radius:20px;padding:6px 14px;color:#fff;font-size:16px;font-weight:700}.pill span{color:#ffd700}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="hud"><div class="pill">⭐ <span id="sc">0</span></div><div class="pill">🏆 <span id="bs">0</span></div><div class="pill">⏱ <span id="tm">60</span>s</div></div>
  <div id="modal"><div class="card" id="card"><div class="icon">🎊</div><h1>COUNTDOWN CATCH</h1><p class="sub">Catch falling numbers in the right lane!<br>Build your combo to drop the ball at midnight!</p><button class="btn" id="startBtn">CATCH! 🎊</button></div></div>
</div>
<script>document.getElementById('startBtn').onclick=function(){document.getElementById('modal').classList.add('hide');};</script>
</body>
</html>
