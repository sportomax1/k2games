<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Harvest Hustle - K2 Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:#1a0a00;display:flex;justify-content:center;align-items:center;height:100dvh;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;touch-action:none}
#gc{position:relative;width:100%;max-width:480px;height:100dvh;overflow:hidden}
canvas{display:block;width:100%;height:100%}
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:14px 16px;pointer-events:none;z-index:10}
.pill{background:rgba(20,8,0,.75);backdrop-filter:blur(8px);border:1px solid rgba(218,165,32,.4);border-radius:22px;padding:7px 16px;color:#fff;font-size:16px;font-weight:700}
.pill span{color:#ffd700}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(10,4,0,.92);backdrop-filter:blur(12px);z-index:20}
#overlay.hide{display:none}
.card{background:linear-gradient(145deg,#3a1800,#1e0c00);border:2px solid rgba(218,165,32,.55);border-radius:28px;padding:34px 28px;max-width:340px;width:92%;text-align:center;box-shadow:0 0 50px rgba(200,100,0,.2),0 24px 50px rgba(0,0,0,.7)}
.icon{font-size:64px;animation:bob 1.3s ease-in-out infinite;display:block;margin-bottom:6px}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
h1{color:#ffd700;font-size:27px;font-weight:900;margin:6px 0 4px;text-shadow:0 0 18px rgba(255,200,0,.5);letter-spacing:2px}
.sub{color:#e8c88a;font-size:13px;margin-bottom:14px;line-height:1.6}
.tips{background:rgba(255,255,255,.06);border-radius:12px;padding:12px 14px;margin-bottom:18px;text-align:left}
.tips div{color:#f5e0c0;font-size:13px;margin:4px 0}
.tips b{color:#ffd700;margin-right:6px}
.btn{background:linear-gradient(135deg,#cc5500,#ff8c00);color:#fff;border:none;border-radius:50px;padding:14px 44px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(200,80,0,.45);letter-spacing:1px;transition:transform .1s;width:100%}
.btn:active{transform:scale(.96)}
.fscore{color:#ff9900;font-size:52px;font-weight:900;margin:8px 0;text-shadow:0 0 24px rgba(255,140,0,.7)}
#home{position:absolute;top:14px;right:16px;z-index:30;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:7px 14px;border-radius:8px;cursor:pointer;text-decoration:none;font-size:13px;font-weight:600;backdrop-filter:blur(4px)}
#mctrl{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:space-between;padding:20px 28px;z-index:10;pointer-events:none}
.mcbtn{width:80px;height:80px;border-radius:50%;background:rgba(255,140,0,.2);backdrop-filter:blur(4px);border:2px solid rgba(255,200,0,.4);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:26px;pointer-events:all;cursor:pointer;color:#fff;font-weight:700;transition:background .12s}
.mcbtn:active{background:rgba(255,140,0,.5)}
.mclabel{font-size:10px;margin-top:2px;letter-spacing:1px}
</style>
</head>
<body>
<div id="gc">
  <canvas id="c"></canvas>
  <div id="hud">
    <div class="pill">🌽 <span id="sc">0</span></div>
    <div class="pill">⭐ <span id="bs">0</span></div>
    <div class="pill" id="lv">❤️❤️❤️</div>
  </div>
  <div id="mctrl">
    <div class="mcbtn" id="duckBtn">🪨<div class="mclabel">DUCK</div></div>
    <div class="mcbtn" id="jumpBtn">⬆️<div class="mclabel">JUMP</div></div>
  </div>
  <div id="overlay">
    <div class="card" id="card">
      <span class="icon">🦃</span>
      <h1>HARVEST HUSTLE</h1>
      <p class="sub">The farmer's chasing you! Run, jump & duck!<br>Grab harvest items for big points!</p>
      <div class="tips">
        <div><b>⬆</b>Space / Tap RIGHT = Jump over rocks</div>
        <div><b>⬇</b>Down / Tap LEFT = Duck under fence</div>
        <div><b>🌽</b>Corn +1 &nbsp;🎃 Pumpkin +5 &nbsp;⭐ Golden +15</div>
        <div><b>❤️</b>3 lives — turkey speeds up over time!</div>
      </div>
      <button class="btn" id="startBtn">HUSTLE! 🦃</button>
    </div>
  </div>
  <a href="index.html" id="home">🏠 Home</a>
</div>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
const gc=document.getElementById('gc');
let W,H,dpr;
function resize(){
  dpr=devicePixelRatio||1;
  W=gc.clientWidth; H=gc.clientHeight;
  C.width=W*dpr; C.height=H*dpr;
  C.style.width=W+'px'; C.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize); resize();

let gameActive=false,score=0,bestScore=parseInt(localStorage.getItem('hh_best')||'0'),lives=3;
let gameSpeed=4,distance=0,frameN=0,flashTimer=0;
let obstacles=[],items=[],bgLayers=[];

// Ground Y for two lanes
const LANE_TOP=()=>H*0.38;
const LANE_BOT=()=>H*0.68;
const GROUND=()=>H*0.82;

let player={x:0,y:0,w:44,h:44,vy:0,onGround:true,ducking:false,lane:1};
// lane 0 = top path, lane 1 = bottom path (default)

let keys={};

class Obstacle{
  constructor(){
    this.lane=Math.random()<0.5?0:1;
    this.y=this.lane===0?LANE_TOP():LANE_BOT();
    this.type=Math.random()<0.5?'rock':'fence';
    this.x=W+60;
    this.w=this.type==='rock'?44:55;
    this.h=this.type==='rock'?36:50;
    this.needsDuck=this.type==='fence';
  }
  update(){this.x-=gameSpeed;}
  draw(){
    if(this.type==='rock'){
      ctx.fillStyle='#888';
      ctx.beginPath();
      ctx.ellipse(this.x+this.w/2,this.y+this.h/2,this.w/2,this.h/2,0,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle='#aaa';
      ctx.beginPath();
      ctx.ellipse(this.x+this.w/2-5,this.y+this.h/2-5,this.w/3,this.h/3,-.3,0,Math.PI*2);
      ctx.fill();
    } else {
      ctx.strokeStyle='#8b6914'; ctx.lineWidth=5;
      for(let i=0;i<3;i++){
        ctx.beginPath();
        ctx.moveTo(this.x+i*20,this.y);
        ctx.lineTo(this.x+i*20,this.y+this.h);
        ctx.stroke();
      }
      ctx.strokeStyle='#a07820'; ctx.lineWidth=4;
      ctx.beginPath();
      ctx.moveTo(this.x-5,this.y+this.h*0.35);
      ctx.lineTo(this.x+this.w+5,this.y+this.h*0.35);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(this.x-5,this.y+this.h*0.65);
      ctx.lineTo(this.x+this.w+5,this.y+this.h*0.65);
      ctx.stroke();
    }
  }
  get box(){return{x:this.x+4,y:this.y+4,w:this.w-8,h:this.needsDuck?this.h*0.5:this.h-8};}
}

class Item{
  constructor(){
    this.lane=Math.random()<0.5?0:1;
    this.y=this.lane===0?LANE_TOP()-20:LANE_BOT()-20;
    const r=Math.random();
    if(r<0.6){this.type='corn';this.pts=1;this.emoji='🌽';}
    else if(r<0.88){this.type='pumpkin';this.pts=5;this.emoji='🎃';}
    else{this.type='golden';this.pts=15;this.emoji='⭐';}
    this.x=W+40;
    this.bobPhase=Math.random()*Math.PI*2;
    this.collected=false;
  }
  update(){this.x-=gameSpeed;this.bobPhase+=0.1;}
  draw(){
    const by=Math.sin(this.bobPhase)*5;
    ctx.font='28px serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    if(this.type==='golden'){
      ctx.shadowBlur=15; ctx.shadowColor='#ffd700';
    }
    ctx.fillText(this.emoji,this.x,this.y+by);
    ctx.shadowBlur=0;
  }
  get box(){return{x:this.x-18,y:this.y-20,w:36,h:40};}
}

function hits(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

function doJump(){
  if(player.onGround&&!player.ducking){
    player.vy=-12;
    player.onGround=false;
  }
}
function doDuck(on){
  player.ducking=on;
  if(on) player.h=22; else player.h=44;
}

// Build infinite scrolling bg hills
let bgX=0;
function drawBg(){
  bgX-=gameSpeed*0.3;
  if(bgX<-W) bgX+=W;

  // sky
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#1a0500');
  sky.addColorStop(0.6,'#3d1a00');
  sky.addColorStop(1,'#5a2800');
  ctx.fillStyle=sky;
  ctx.fillRect(0,0,W,H);

  // moon
  ctx.fillStyle='#fffacc';
  ctx.shadowBlur=18; ctx.shadowColor='#fffacc';
  ctx.beginPath(); ctx.arc(W-60,55,25,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#3d1a00';
  ctx.beginPath(); ctx.arc(W-52,48,19,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;

  // hills bg
  ctx.fillStyle='rgba(80,30,0,0.5)';
  for(let i=-1;i<2;i++){
    ctx.beginPath();
    ctx.arc((bgX+W*0.3+i*W)%W+i*W,H*0.55,180,Math.PI,0);
    ctx.fill();
    ctx.beginPath();
    ctx.arc((bgX+W*0.75+i*W)%W+i*W,H*0.6,140,Math.PI,0);
    ctx.fill();
  }

  // two ground paths
  const gTop=LANE_TOP();
  const gBot=LANE_BOT();
  const gnd=GROUND();

  ctx.fillStyle='#3a2000';
  ctx.fillRect(0,gTop+30,W,gBot-gTop-30);
  ctx.fillStyle='#4a2800';
  ctx.fillRect(0,gBot+30,W,H-gBot-30);

  // path lines
  ctx.strokeStyle='rgba(255,200,100,0.15)'; ctx.lineWidth=2;
  ctx.setLineDash([20,15]);
  const doff=(frameN*gameSpeed*0.5)%35;
  ctx.lineDashOffset=-doff;
  ctx.beginPath(); ctx.moveTo(0,gTop+18); ctx.lineTo(W,gTop+18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,gBot+18); ctx.lineTo(W,gBot+18); ctx.stroke();
  ctx.setLineDash([]);

  // ground
  ctx.fillStyle='#2a1500';
  ctx.fillRect(0,gnd,W,H-gnd);
  ctx.strokeStyle='rgba(255,180,0,0.2)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,gnd); ctx.lineTo(W,gnd); ctx.stroke();
}

function startGame(){
  score=0; lives=3; gameSpeed=4; distance=0; frameN=0;
  player.lane=1;
  player.x=W*0.18;
  player.y=LANE_BOT();
  player.vy=0; player.onGround=true; player.ducking=false; player.h=44;
  obstacles=[]; items=[];
  document.getElementById('bs').textContent=bestScore;
  document.getElementById('overlay').classList.add('hide');
  gameActive=true;
}

function endGame(){
  gameActive=false;
  if(score>bestScore){bestScore=score;localStorage.setItem('hh_best',bestScore);}
  const card=document.getElementById('card');
  card.innerHTML=`<span class="icon">🦃</span><h1>CAUGHT!</h1><p class="fscore">${score}</p><p class="sub">Best: ${bestScore}</p><button class="btn" id="startBtn">HUSTLE AGAIN! 🦃</button>`;
  document.getElementById('overlay').classList.remove('hide');
  document.getElementById('startBtn').onclick=startGame;
}

let spawnTimer=0;
function update(){
  if(!gameActive)return;
  frameN++;
  distance+=gameSpeed;
  gameSpeed=Math.min(9,4+distance*0.00015);

  // player physics
  const groundY=player.lane===0?LANE_TOP():LANE_BOT();
  if(!player.onGround){
    player.vy+=0.6;
    player.y+=player.vy;
    if(player.y>=groundY){player.y=groundY;player.vy=0;player.onGround=true;}
  }
  if(player.ducking&&player.onGround){player.y=groundY+22;}
  else if(player.onGround){player.y=groundY;}

  // spawn
  spawnTimer--;
  if(spawnTimer<0){
    if(Math.random()<0.65) obstacles.push(new Obstacle());
    if(Math.random()<0.5) items.push(new Item());
    spawnTimer=Math.max(25,50-distance*0.002);
  }

  obstacles.forEach(o=>o.update());
  items.forEach(i=>i.update());
  obstacles=obstacles.filter(o=>o.x>-100);
  items=items.filter(i=>i.x>-60);

  // player box
  const pb={x:player.x-player.w/2+6,y:player.y,w:player.w-12,h:player.h};

  // collect items
  items.forEach(i=>{
    if(!i.collected&&i.lane===player.lane&&hits(pb,i.box)){
      i.collected=true;score+=i.pts;
    }
  });

  // obstacle collision
  for(let o of obstacles){
    if(o.lane!==player.lane)continue;
    if(o.needsDuck&&player.ducking)continue; // ducking clears fence
    if(!o.needsDuck&&!player.onGround)continue; // jumping clears rock
    if(hits(pb,o.box)){
      lives--;flashTimer=30;
      o.x=-200;
      if(lives<=0){endGame();return;}
    }
  }

  if(flashTimer>0)flashTimer--;
  document.getElementById('sc').textContent=score;
  document.getElementById('lv').textContent='❤️'.repeat(Math.max(0,lives));
  document.getElementById('bs').textContent=bestScore;
}

function draw(){
  drawBg();
  items.forEach(i=>i.draw());
  obstacles.forEach(o=>o.draw());

  // farmer chasing (far right)
  ctx.font='32px serif';
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  const farmerX=W-40;
  const farmerY=player.lane===0?LANE_TOP()+36:LANE_BOT()+36;
  ctx.fillText('👨‍🌾',farmerX,farmerY);

  // player (turkey)
  if(flashTimer>0&&Math.floor(flashTimer/4)%2===0){ctx.globalAlpha=0.4;}
  ctx.font=(player.ducking?'24px':'32px')+' serif';
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillText('🦃',player.x,player.y+player.h+(player.ducking?4:0));
  ctx.globalAlpha=1;

  requestAnimationFrame(loop);
}

function loop(){update();draw();}

// Keyboard
document.addEventListener('keydown',e=>{
  if(!gameActive)return;
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();doJump();}
  if(e.code==='ShiftLeft'||e.code==='ShiftRight'||e.code==='ArrowDown'){e.preventDefault();doDuck(true);}
});
document.addEventListener('keyup',e=>{
  if(e.code==='ShiftLeft'||e.code==='ShiftRight'||e.code==='ArrowDown')doDuck(false);
});

// Mobile buttons
document.getElementById('jumpBtn').addEventListener('touchstart',e=>{e.preventDefault();doJump();},{passive:false});
document.getElementById('duckBtn').addEventListener('touchstart',e=>{e.preventDefault();doDuck(true);},{passive:false});
document.getElementById('duckBtn').addEventListener('touchend',e=>{e.preventDefault();doDuck(false);},{passive:false});

document.getElementById('startBtn').onclick=startGame;
loop();
</script>
</body>
</html>
