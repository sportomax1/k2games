<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Harvest Hustle</title>
<style>
/* styles copied from turkey-gobble-dash.html */
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a0a00;display:flex;justify-content:center;align-items:center;height:100dvh;overflow:hidden;font-family:Arial,sans-serif;touch-action:none}
#wrap{position:relative;width:100vw;height:100dvh}
canvas{display:block;width:100%;height:100%}
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:12px 16px;pointer-events:none;z-index:5}
.pill{background:rgba(20,8,0,.7);backdrop-filter:blur(6px);border:1px solid rgba(218,165,32,.4);border-radius:20px;padding:6px 14px;color:#fff;font-size:16px;font-weight:700}.pill span{color:#ffd700}
#modal{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(10,4,0,.88);backdrop-filter:blur(10px);z-index:20}
#modal.hide{display:none}
.card{background:linear-gradient(145deg,#3a1800,#1e0c00);border:2px solid rgba(218,165,32,.55);border-radius:28px;padding:34px 28px;max-width:360px;width:92%;text-align:center;box-shadow:0 0 50px rgba(200,100,0,.2),0 24px 50px rgba(0,0,0,.6)}
.icon{font-size:64px;animation:bob 1.3s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
h1{color:#ffd700;font-size:28px;font-weight:900;margin:8px 0 4px;text-shadow:0 0 18px rgba(255,200,0,.5)}
.sub{color:#e8c88a;font-size:13px;margin-bottom:16px;line-height:1.5}
.tips{background:rgba(255,255,255,.06);border-radius:12px;padding:12px 14px;margin-bottom:18px;text-align:left}
.tips div{color:#f5e0c0;font-size:13px;margin:4px 0}.tips b{color:#ffd700;margin-right:6px}
.btn{background:linear-gradient(135deg,#cc5500,#ff8c00);color:#fff;border:none;border-radius:50px;padding:14px 40px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(200,80,0,.45);letter-spacing:1px;transition:transform .1s}.btn:active{transform:scale(.96)}
.fscore{color:#ff9900;font-size:50px;font-weight:900;margin:6px 0;text-shadow:0 0 24px rgba(255,140,0,.7)}
#mctrl{position:absolute;bottom:0;left:0;right:0;display:none;justify-content:space-between;padding:16px 24px;pointer-events:none;z-index:5}
.mcbtn{width:80px;height:80px;border-radius:50%;background:rgba(255,140,0,.22);backdrop-filter:blur(4px);border:2px solid rgba(255,200,0,.4);display:flex;align-items:center;justify-content:center;font-size:28px;pointer-events:all;user-select:none;cursor:pointer;color:#fff;font-weight:700;transition:background .1s}
.mcbtn:active{background:rgba(255,140,0,.5)}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="hud">
    <div class="pill">🌽 <span id="sc">0</span></div>
    <div class="pill">⭐ <span id="bs">0</span></div>
    <div class="pill" id="lv">❤️❤️❤️</div>
  </div>
  <div id="mctrl">
    <div class="mcbtn" id="duckBtn">🪨<br><small>DUCK</small></div>
    <div class="mcbtn" id="jumpBtn">⬆️<br><small>JUMP</small></div>
  </div>
  <div id="modal"><div class="card" id="card">
    <div class="icon">🦃</div>
    <h1>HARVEST HUSTLE</h1>
    <p class="sub">The farmer is after you! Run, gobble, survive!<br>Collect harvest items for big points!</p>
    <div class="tips">
      <div><b>⬆</b>Space / Tap RIGHT = Jump</div>
      <div><b>⬇</b>Shift / Tap LEFT = Duck</div>
      <div><b>🌽</b>Corn +1 &nbsp;🎃 Pumpkin +5 &nbsp;⭐ Golden +15</div>
      <div><b>❤️</b>3 lives — speed grows with distance</div>
    </div>
    <button class="btn" id="startBtn">HUSTLE! 🦃</button>
  </div></div>
</div>
<script>
// minimal start handler
document.getElementById('startBtn').onclick=function(){document.getElementById('modal').classList.add('hide');};
</script>
</body>
</html>
