<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Street Guess — Single File</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root{--gap:12px;--bg:#0f1724;--card:#0b1220;--accent:#60a5fa;--muted:#94a3b8}
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial}
    body{background:linear-gradient(180deg,#071126 0%, #081421 100%);color:#e6eef8}
    .container{display:flex;gap:var(--gap);padding:16px;height:100%;box-sizing:border-box}
    .panel{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:8px;box-shadow:0 6px 18px rgba(2,6,23,0.6);padding:12px;display:flex;flex-direction:column}
    .left{flex:1;min-width:320px}
    .right{flex:1;min-width:320px}
    .photo-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
    .photo{max-width:100%;max-height:60vh;border-radius:6px;box-shadow:0 8px 20px rgba(2,6,23,0.6)}
    .caption{color:var(--muted);font-size:14px;display:none}
    #map{height:60vh;border-radius:6px;overflow:hidden}
    .controls{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
    button{background:var(--accent);border:none;padding:8px 12px;border-radius:6px;color:#07203a;font-weight:600;cursor:pointer}
    button.ghost{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted);font-weight:600}
    .status{display:flex;gap:12px;align-items:center;margin-bottom:8px}
    .pill{background:rgba(255,255,255,0.03);padding:6px 10px;border-radius:999px;font-size:14px;color:var(--muted)}
    .modal{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--card);padding:16px;border-radius:8px;box-shadow:0 8px 40px rgba(2,6,23,0.7);z-index:999;min-width:280px}
    .hidden{display:none}
    .leaderboard{max-height:60vh;overflow:auto;margin-top:8px}
    .row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed rgba(255,255,255,0.02)}
    footer{position:fixed;left:16px;bottom:16px;color:var(--muted);font-size:13px}
    @media(max-width:900px){.container{flex-direction:column}.photo{max-height:40vh}#map{height:40vh}}
  </style>
<!-- Google tag (gtag.js) -->

<body>
  <div class="container">
    <div class="panel left">
      <div class="status">
        <div class="pill" id="roundPill">Round 0 / 5</div>
        <div class="pill" id="timerPill">30s</div>
        <div class="pill">Score: <span id="scoreVal">0</span></div>
      </div>
      <div class="photo-wrap">
        <img id="photo" class="photo" src="" alt="Street photo" />
        <div class="caption" id="caption"></div>
      </div>
      <div class="controls">
        <button id="btnConfirm">Confirm Guess</button>
        <button id="btnSkip" class="ghost">Skip</button>
        <button id="btnNext" class="ghost">Next</button>
        <button id="btnLeaderboard" class="ghost">Leaderboard</button>
        <button id="btnResetLead" class="ghost">Clear Leaderboard</button>
      </div>
    </div>
    <div class="panel right">
      <div id="map"></div>
      <div style="margin-top:8px;display:flex;gap:8px;align-items:center;justify-content:space-between">
        <div style="display:flex;gap:8px;align-items:center">
          <div class="pill" id="hintPill">Click map to place marker</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <div class="pill" id="latlngPill">Lat: --, Lng: --</div>
        </div>
      </div>
    </div>
  </div>

  <div id="resultModal" class="modal hidden">
    <div id="resultText"></div>
    <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end">
      <button id="resultNext">Next</button>
    </div>
  </div>

  <div id="leaderModal" class="modal hidden">
    <h3>Leaderboard</h3>
    <div class="leaderboard" id="leaderboardList"></div>
    <div style="margin-top:12px;display:flex;gap:8px;justify-content:space-between">
      <div>
        <input id="playerName" placeholder="Your name" style="padding:6px;border-radius:6px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:#e6eef8" />
        <button id="saveScore" class="ghost">Save Score</button>
      </div>
      <div>
        <button id="closeLead">Close</button>
      </div>
    </div>
  </div>

  <footer>Street Guess — Single-file demo</footer>

      {url:'https://upload.wikimedia.org/wikipedia/commons/d/d6/Grand_Bazaar_Istanbul.jpg',lat:41.0106,lng:28.9681,caption:'Grand Bazaar, Istanbul, Turkey'},
      {url:'https://upload.wikimedia.org/wikipedia/commons/2/26/Manhattan_from_Hoboken.jpg',lat:40.7128,lng:-74.0060,caption:'Manhattan Skyline, USA'},

      {url:'https://upload.wikimedia.org/wikipedia/commons/5/59/Mosque_of_Cordoba.jpg',lat:37.8882,lng:-4.7794,caption:'Mezquita (Cordoba), Spain'},
      {url:'https://upload.wikimedia.org/wikipedia/commons/9/94/Hanoi_Old_Quarter.jpg',lat:21.0278,lng:105.8342,caption:'Hanoi Old Quarter, Vietnam'},
      {url:'https://upload.wikimedia.org/wikipedia/commons/8/8d/Minsk_Panorama.jpg',lat:53.9045,lng:27.5615,caption:'Minsk, Belarus'},
      {url:'https://upload.wikimedia.org/wikipedia/commons/7/79/Oslo_Fjord.jpg',lat:59.9139,lng:10.7522,caption:'Oslo, Norway'},
      {url:'https://upload.wikimedia.org/wikipedia/commons/0/06/Zurich_Limmat.jpg',lat:47.3769,lng:8.5417,caption:'Zurich, Switzerland'},
      {url:'https://upload.wikimedia.org/wikipedia/commons/2/2a/Tiananmen_Square.jpg',lat:39.9087,lng:116.3975,caption:'Tiananmen Square, Beijing, China'},
      {url:'https://upload.wikimedia.org/wikipedia/commons/4/4b/AlUla_Madah.jpg',lat:26.6971,lng:38.0246,caption:'AlUla, Saudi Arabia'},
      {url:'https://upload.wikimedia.org/wikipedia/commons/8/82/Nairobi_City.jpg',lat:-1.2921,lng:36.8219,caption:'Nairobi, Kenya'},
      {url:'https://upload.wikimedia.org/wikipedia/commons/5/5b/Dubrovnik_walls.jpg',lat:42.6403,lng:18.1084,caption:'Dubrovnik Old Town, Croatia'}
    ];

    // Configurable constants
    const TOTAL_ROUNDS = 5;
    const ROUND_TIME = 30; // seconds
    const BASE_POINTS = 5000;
    const DEDUCTION_PER_KM = 200;
    const BONUS_CLOSE_KM = 0.5;
    const BONUS_VERY_CLOSE_KM = 0.1;
    const BONUS_CLOSE = 1000;
    const BONUS_VERY_CLOSE = 2000;

    // State
    let rounds = [];
    let currentIndex = 0; // index in rounds
    let score = 0;
    let timer = null;
    let timeLeft = ROUND_TIME;
    let map, guessMarker = null, trueMarker = null, polyline = null;

    // UI refs
    const photoEl = document.getElementById('photo');
    const captionEl = document.getElementById('caption');
    const roundPill = document.getElementById('roundPill');
    const timerPill = document.getElementById('timerPill');
    const scoreVal = document.getElementById('scoreVal');
    const latlngPill = document.getElementById('latlngPill');
    const btnConfirm = document.getElementById('btnConfirm');
    const btnSkip = document.getElementById('btnSkip');
    const btnNext = document.getElementById('btnNext');
    const btnLeaderboard = document.getElementById('btnLeaderboard');
    const btnResetLead = document.getElementById('btnResetLead');
    const resultModal = document.getElementById('resultModal');
    const resultText = document.getElementById('resultText');
    const resultNext = document.getElementById('resultNext');
    const leaderModal = document.getElementById('leaderModal');
    const leaderboardList = document.getElementById('leaderboardList');
    const closeLead = document.getElementById('closeLead');
    const saveScore = document.getElementById('saveScore');
    const playerName = document.getElementById('playerName');

    function init(){
      // prepare rounds (random sample)
      rounds = shuffleArray(PHOTOS).slice(0, TOTAL_ROUNDS);
      currentIndex = 0; score = 0; scoreVal.textContent = '0';
      initMap();
      loadRound();
      btnConfirm.addEventListener('click', onConfirm);
      btnSkip.addEventListener('click', onSkip);
      btnNext.addEventListener('click', onNext);
      btnLeaderboard.addEventListener('click', showLeaderboard);
      btnResetLead.addEventListener('click', clearLeaderboard);
      resultNext.addEventListener('click', onNext);
      closeLead.addEventListener('click', ()=>leaderModal.classList.add('hidden'));
      saveScore.addEventListener('click', saveScoreToLeaderboard);
    }

    function initMap(){
      map = L.map('map',{scrollWheelZoom:true}).setView([20,0],2);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
      map.on('click', function(e){
        placeGuessMarker(e.latlng);
      });
    }

    function loadRound(){
      clearResult();
      const item = rounds[currentIndex];
      // preload image and use fallback if it fails
      preloadImage(item.url).then(u=>{
        photoEl.src = u;
        photoEl.alt = item.caption || 'Street photo';
      });
      captionEl.textContent = item.caption || '';
      roundPill.textContent = `Round ${currentIndex+1} / ${TOTAL_ROUNDS}`;
      scoreVal.textContent = score;
      btnNext.disabled = true;
      enableConfirm(true);
      timeLeft = ROUND_TIME; updateTimerUI();
      startTimer();
      // center map a bit away global
      map.setView([20,0],2);
      if(guessMarker){ map.removeLayer(guessMarker); guessMarker=null; }
      if(trueMarker){ map.removeLayer(trueMarker); trueMarker=null; }
      if(polyline){ map.removeLayer(polyline); polyline=null; }
      latlngPill.textContent = 'Lat: --, Lng: --';
    }

    // Image preloader with proxy fallback and SVG placeholder
    const PLACEHOLDER_SVG = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800"><rect width="100%" height="100%" fill="%23071a2b"/><text x="50%" y="50%" fill="%23ffffff" font-family="Arial,Helvetica,sans-serif" font-size="28" text-anchor="middle">Image unavailable</text></svg>';
    function imagesWeservProxy(u){
      try{
        // strip protocol
        const noProto = u.replace(/^https?:\/\//, '');
        return 'https://images.weserv.nl/?url=' + encodeURIComponent(noProto) + '&w=1600&h=900&fit=cover';
      }catch(e){ return u; }
    }
    function preloadImage(url){
      return new Promise((resolve)=>{
        let resolved = false;
        const tidy = (u)=>{ if(!resolved){ resolved=true; resolve(u); } };

        const tryLoad = (src, onFail)=>{
          const img = new Image();
          img.onload = ()=> tidy(src);
          img.onerror = ()=> { if(typeof onFail==='function') onFail(); else tidy(PLACEHOLDER_SVG); };
          // don't set crossOrigin — some hosts reject anonymous CORS requests
          img.src = src;
        };

        // first attempt: direct URL (no crossOrigin)
        tryLoad(url, ()=>{
          // second attempt: use images.weserv.nl proxy to avoid CORS/hotlink blocks
          tryLoad(imagesWeservProxy(url), ()=>{
            // final fallback: placeholder
            tidy(PLACEHOLDER_SVG);
          });
        });

        // ultimate timeout
        setTimeout(()=> tidy(PLACEHOLDER_SVG), 12000);
      });
    }

    function placeGuessMarker(latlng){
      if(guessMarker){ guessMarker.setLatLng(latlng); }
      else{ guessMarker = L.marker(latlng,{draggable:true}).addTo(map); guessMarker.on('drag', (e)=> {const p=e.target.getLatLng(); latlngPill.textContent = `Lat: ${p.lat.toFixed(4)}, Lng: ${p.lng.toFixed(4)}`}); }
      latlngPill.textContent = `Lat: ${latlng.lat.toFixed(4)}, Lng: ${latlng.lng.toFixed(4)}`;
    }

    function onConfirm(){
      if(!guessMarker){ // no guess placed
        // treat as skip / zero points
        revealAnswer(null, true);
      } else {
        const g = guessMarker.getLatLng();
        revealAnswer({lat:g.lat,lng:g.lng}, false);
      }
    }

    function onSkip(){
      revealAnswer(null, true);
    }

    function onNext(){
      stopTimer();
      currentIndex++;
      if(currentIndex >= rounds.length){
        // game over
        showGameOver();
      } else {
        loadRound();
      }
    }

    function revealAnswer(guess, skipped){
      stopTimer(); enableConfirm(false); btnNext.disabled = false;
      const item = rounds[currentIndex];
      const truth = {lat:item.lat,lng:item.lng};
      // show true marker and polyline
      trueMarker = L.marker([truth.lat, truth.lng],{icon: L.icon({iconUrl:'https://upload.wikimedia.org/wikipedia/commons/e/ec/RedDot.svg',iconSize:[12,12]})}).addTo(map);
      if(guess){
        polyline = L.polyline([[guess.lat,guess.lng],[truth.lat,truth.lng]],{color:'yellow'}).addTo(map);
        const distKm = haversine(guess.lat,guess.lng,truth.lat,truth.lng);
        const pts = computePoints(distKm);
        score += pts;
        resultText.innerHTML = `<strong>${item.caption}</strong><br>Distance: ${distKm.toFixed(2)} km<br>Points: ${pts}`;
      } else {
        resultText.innerHTML = `<strong>${item.caption}</strong><br>No guess placed — 0 points`;
      }
      scoreVal.textContent = score;
      resultModal.classList.remove('hidden');
      map.fitBounds([[truth.lat,truth.lng],[guess?guess.lat:truth.lat,guess?guess.lng:truth.lng]],{padding:[60,60]});
    }

    function clearResult(){ resultModal.classList.add('hidden'); }

    function computePoints(distanceKm){
      let deduction = Math.round(DEDUCTION_PER_KM * distanceKm);
      let bonus = 0;
      if(distanceKm <= BONUS_VERY_CLOSE_KM) bonus = BONUS_VERY_CLOSE;
      else if(distanceKm <= BONUS_CLOSE_KM) bonus = BONUS_CLOSE;
      let pts = Math.max(0, BASE_POINTS - deduction + bonus);
      return pts;
    }

    function showGameOver(){
      resultText.innerHTML = `<strong>Game Over</strong><br>Your final score: ${score}`;
      resultModal.classList.remove('hidden');
      resultNext.textContent = 'View Leaderboard';
      resultNext.onclick = ()=>{ showLeaderboard(); resultNext.textContent='Next'; resultNext.onclick = onNext; };
    }

    function showLeaderboard(){
      leaderModal.classList.remove('hidden');
      populateLeaderboard();
    }

    function getLeaderboard(){
      try{ return JSON.parse(localStorage.getItem('streetGuess_leaderboard')||'[]'); }catch(e){return []}
    }
    function saveLeaderboard(arr){ localStorage.setItem('streetGuess_leaderboard', JSON.stringify(arr)); }

    function populateLeaderboard(){
      const lb = getLeaderboard(); leaderboardList.innerHTML='';
      if(lb.length===0){ leaderboardList.innerHTML='<div class="row">No scores yet.</div>'; return; }
      lb.forEach((r,idx)=>{
        const row = document.createElement('div'); row.className='row';
        row.innerHTML = `<div>${idx+1}. ${escapeHtml(r.name)}</div><div>${r.score}</div>`;
        leaderboardList.appendChild(row);
      });
    }

    function saveScoreToLeaderboard(){
      const name = (playerName.value||'Anonymous').trim();
      if(!name) return alert('Enter a name');
      const lb = getLeaderboard();
      lb.push({name:name,score:score,date:new Date().toISOString()});
      lb.sort((a,b)=>b.score-a.score);
      while(lb.length>10) lb.pop();
      saveLeaderboard(lb);
      populateLeaderboard();
    }

    function clearLeaderboard(){ if(confirm('Clear leaderboard?')){ localStorage.removeItem('streetGuess_leaderboard'); populateLeaderboard(); }}

    function startTimer(){ stopTimer(); timer = setInterval(()=>{ timeLeft--; updateTimerUI(); if(timeLeft<=0){ onConfirm(); } },1000); }
    function stopTimer(){ if(timer){ clearInterval(timer); timer=null; } }
    function updateTimerUI(){ timerPill.textContent = `${timeLeft}s`; }

    function haversine(lat1,lon1,lat2,lon2){
      const R = 6371; // km
      const toRad = x=>x*Math.PI/180;
      const dLat = toRad(lat2-lat1);
      const dLon = toRad(lon2-lon1);
      const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)*Math.sin(dLon/2);
      const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
      return R*c;
    }

    // Utils
    function shuffleArray(a){ return a.slice().sort(()=>Math.random()-0.5); }
    function escapeHtml(s){ return (s+'').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch])); }
    function enableConfirm(v){ btnConfirm.disabled = !v; }

    // init app
    init();
  </script>
