<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nash Ball Elite - K2 games</title>
    <style>
        :root {
            --primary: #1e3c72;
            --secondary: #2a5298;
            --accent: #FFD700;
            --text: #ffffff;
            --panel: rgba(0, 0, 0, 0.6);
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background: #0f172a;
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100dvh;
            width: 100%;
            overflow: hidden;
            position: fixed;
            display: flex;
            flex-direction: column;
        }

        #game-container {
            flex: 1;
            position: relative;
            width: 100%;
            display: flex;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
        }

        canvas {
            background: transparent;
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* HUD Overlay */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 100;
        }

        .hud-card {
            background: var(--panel);
            backdrop-filter: blur(12px);
            padding: 10px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            min-width: 100px;
        }

        .stat-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; font-weight: 800; }
        .stat-val { font-size: 1.4rem; font-weight: 900; color: var(--accent); font-family: monospace; }

        /* Selection Screen */
        #selection-screen {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.98);
            z-index: 1000;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 40px;
            overflow-y: auto;
            backdrop-filter: blur(20px);
        }

        .player-card {
            background: var(--glass);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .player-card:hover { transform: translateY(-5px); border-color: var(--accent); background: rgba(255,255,255,0.05); }

        .card-num { font-size: 2.5rem; font-weight: 900; opacity: 0.8; }
        .card-name { font-size: 1.1rem; font-weight: 800; }

        /* Controls */
        #mobile-controls {
            position: absolute;
            bottom: 40px;
            right: 40px;
            display: none;
            z-index: 100;
        }
        @media (max-width: 1024px) { #mobile-controls { display: block; } }

        .shoot-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--accent);
            color: black;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.4);
            border: 5px solid rgba(255,255,255,0.3);
        }
        .shoot-btn:active { transform: scale(0.9); filter: brightness(1.2); }

        .back-hub {
            position: absolute; top: 15px; left: 15px; color: #94a3b8; text-decoration: none;
            font-weight: bold; font-size: 0.8rem; z-index: 200;
        }

        #meter-container {
            position: absolute;
            left: 40px;
            bottom: 40px;
            width: 25px;
            height: 200px;
            background: rgba(0,0,0,0.5);
            border: 2px solid white;
            border-radius: 15px;
            overflow: hidden;
            display: none;
        }
        #meter-fill {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 0%;
            background: linear-gradient(to top, #22c55e, #eab308, #ef4444);
        }

        #overlay {
            position: absolute; inset: 0; background: rgba(2, 6, 23, 0.9);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; text-align: center;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div class="hud-card">
            <div class="stat-label">Score</div>
            <div id="score-val" class="stat-val">0</div>
        </div>
        <div class="hud-card">
            <div class="stat-label">Time</div>
            <div id="timer-val" class="stat-val">60s</div>
        </div>
        <div class="hud-card">
            <div class="stat-label">Streak</div>
            <div id="streak-val" class="stat-val">0</div>
        </div>
    </div>

    <div id="game-container">
        <a href="index.html" class="back-hub">← HUB</a>
        <canvas id="gameCanvas"></canvas>

        <div id="meter-container">
            <div id="meter-fill"></div>
        </div>

        <div id="mobile-controls">
            <div class="shoot-btn" id="btn-shoot">SHOOT</div>
        </div>

        <div id="selection-screen"></div>

        <div id="overlay">
            <h1 style="font-size: 4rem; font-style: italic; font-weight: 900; color: var(--accent);">TIME!</h1>
            <p id="final-stats" style="font-size: 1.5rem; margin: 20px 0; font-weight: 800;"></p>
            <button class="shoot-btn" style="border-radius: 50px; width: auto; padding: 0 40px;" onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const PLAYERS = [
            { name: 'Stephen Curry', number: '30', team: 'Warriors', color: '#1D428A', jersey: '#FFC72C' },
            { name: 'Steve Nash', number: '13', team: 'Suns', color: '#1D1160', jersey: '#E56020' },
            { name: 'Ray Allen', number: '34', team: 'Celtics', color: '#007A33', jersey: '#BA9653' },
            { name: 'Larry Bird', number: '33', team: 'Celtics', color: '#007A33', jersey: '#BA9653' },
            { name: 'Reggie Miller', number: '31', team: 'Pacers', color: '#002D62', jersey: '#FDBB30' },
            { name: 'Klay Thompson', number: '11', team: 'Warriors', color: '#1D428A', jersey: '#FFC72C' }
        ];

        class NashBall {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.width = 1000;
                this.height = 700;
                this.canvas.width = this.width;
                this.canvas.height = this.height;

                this.gameState = 'menu';
                this.player = null;
                this.ball = { x: 150, y: 580, r: 18, vx: 0, vy: 0, active: false, shot: false };
                this.rim = { x: 820, y: 350, r: 30 };
                
                this.meter = { val: 0, dir: 1, charging: false };
                this.timer = 60;
                this.score = 0;
                this.streak = 0;
                this.made = 0;
                this.shots = 0;
                this.particles = [];

                this.init();
            }

            init() {
                const screen = document.getElementById('selection-screen');
                PLAYERS.forEach((p, i) => {
                    const card = document.createElement('div');
                    card.className = 'player-card';
                    card.innerHTML = `<div class="card-num" style="color:${p.jersey}">#${p.number}</div><div class="card-name">${p.name}</div>`;
                    card.onclick = () => this.selectPlayer(i);
                    screen.appendChild(card);
                });

                const startShoot = () => { if(this.gameState === 'playing' && !this.ball.active) { this.meter.charging = true; document.getElementById('meter-container').style.display = 'block'; } };
                const endShoot = () => { if(this.meter.charging) this.shoot(); };

                window.onkeydown = (e) => { if(e.code === 'Space') startShoot(); };
                window.onkeyup = (e) => { if(e.code === 'Space') endShoot(); };

                const btn = document.getElementById('btn-shoot');
                btn.ontouchstart = (e) => { e.preventDefault(); startShoot(); };
                btn.ontouchend = (e) => { e.preventDefault(); endShoot(); };

                this.loop();
            }

            selectPlayer(idx) {
                this.player = PLAYERS[idx];
                this.gameState = 'playing';
                document.getElementById('selection-screen').style.display = 'none';
                this.startTimer();
            }

            startTimer() {
                const t = setInterval(() => {
                    if(this.gameState === 'playing') {
                        this.timer--;
                        document.getElementById('timer-val').textContent = this.timer + 's';
                        if(this.timer <= 0) { clearInterval(t); this.endGame(); }
                    }
                }, 1000);
            }

            shoot() {
                this.meter.charging = false;
                document.getElementById('meter-container').style.display = 'none';
                this.ball.active = true;
                this.ball.shot = true;
                this.shots++;

                const power = 16 + (this.meter.val / 100) * 12;
                const accuracy = 1 - Math.abs(55 - this.meter.val) / 45; // Sweet spot 55%
                this.ball.accuracy = accuracy;

                const angle = -Math.PI / 3.4;
                this.ball.vx = Math.cos(angle) * power;
                this.ball.vy = Math.sin(angle) * power;
                this.meter.val = 0;
            }

            update() {
                if(this.gameState !== 'playing') return;

                if(this.meter.charging) {
                    this.meter.val += 2.5 * this.meter.dir;
                    if(this.meter.val >= 100 || this.meter.val <= 0) this.meter.dir *= -1;
                    document.getElementById('meter-fill').style.height = this.meter.val + '%';
                }

                if(this.ball.active) {
                    this.ball.vy += 0.5; // Gravity
                    this.ball.x += this.ball.vx;
                    this.ball.y += this.ball.vy;

                    // Floor
                    if(this.ball.y > 630 - this.ball.r) {
                        this.ball.y = 630 - this.ball.r;
                        this.ball.vy *= -0.4;
                        this.ball.vx *= 0.7;
                        if(Math.abs(this.ball.vx) < 0.5) this.resetBall();
                    }

                    // Rim/Hoop
                    this.checkHoop();
                }

                this.particles.forEach((p, i) => {
                    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.l -= 0.02;
                    if(p.l <= 0) this.particles.splice(i, 1);
                });

                document.getElementById('score-val').textContent = this.score;
                document.getElementById('streak-val').textContent = this.streak;
            }

            checkHoop() {
                // Backboard
                if(this.ball.x > 850 && this.ball.x < 870 && this.ball.y > 200 && this.ball.y < 450) {
                    this.ball.vx *= -0.5; this.ball.x = 849;
                }
                // Rim
                const dist = Math.hypot(this.ball.x - 800, this.ball.y - 350);
                if(dist < this.ball.r + 8) {
                    this.ball.vx *= -0.7; this.ball.vy *= -0.7;
                }
                // Goal
                if(this.ball.shot && this.ball.vy > 0 && this.ball.y > 350 && this.ball.y < 380 && this.ball.x > 780 && this.ball.x < 860) {
                    if(Math.random() < (0.4 + this.ball.accuracy * 0.6)) {
                        this.score += 2; this.made++; this.streak++;
                        this.createParticles(820, 360, varColor('--accent'), 25);
                    } else { this.streak = 0; }
                    this.ball.shot = false;
                }
            }

            createParticles(x, y, color, count) {
                for(let i=0; i<count; i++) this.particles.push({ x, y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, l: 1, color });
            }

            resetBall() {
                this.ball.active = false; this.ball.shot = false;
                this.ball.x = 150; this.ball.y = 580; this.ball.vx = 0; this.ball.vy = 0;
            }

            endGame() {
                this.gameState = 'over';
                document.getElementById('overlay').style.display = 'flex';
                document.getElementById('final-stats').innerHTML = `POINTS: ${this.score}<br>MADE: ${this.made}/${this.shots}<br>BEST STREAK: ${this.streak}`;
            }

            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.width, this.height);

                // Stadium Background
                const grad = ctx.createLinearGradient(0, 0, 0, 630);
                grad.addColorStop(0, '#0f172a'); grad.addColorStop(1, '#1e293b');
                ctx.fillStyle = grad; ctx.fillRect(0, 0, this.width, 630);

                // Crowd Silhouette
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                for(let i=0; i<20; i++) {
                    ctx.beginPath(); ctx.arc(i*60, 600, 30, Math.PI, 0); ctx.fill();
                }

                // Court
                ctx.fillStyle = '#94a3b8'; ctx.fillRect(0, 630, this.width, 70);
                ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(0, 635); ctx.lineTo(this.width, 635); ctx.stroke();

                // Hoop
                ctx.strokeStyle = '#334155'; ctx.lineWidth = 12;
                ctx.beginPath(); ctx.moveTo(920, 630); ctx.lineTo(920, 350); ctx.stroke();
                ctx.fillStyle = '#fff'; ctx.fillRect(910, 250, 15, 150); // Backboard
                ctx.strokeStyle = '#f97316'; ctx.lineWidth = 8;
                ctx.beginPath(); ctx.moveTo(800, 350); ctx.lineTo(910, 350); ctx.stroke(); // Rim
                // Net
                ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2;
                for(let i=0; i<6; i++) {
                    ctx.beginPath(); ctx.moveTo(810 + i*18, 350); ctx.lineTo(820+i*18, 420); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(820 + i*18, 350); ctx.lineTo(810+i*18, 420); ctx.stroke();
                }

                // Player
                if(this.player) {
                    const waddle = Math.sin(Date.now()/200)*5;
                    ctx.fillStyle = this.player.color; ctx.fillRect(130, 550+waddle, 40, 80); // Jersey
                    ctx.fillStyle = '#ffccaa'; ctx.beginPath(); ctx.arc(150, 530+waddle, 20, 0, Math.PI*2); ctx.fill(); // Head
                    ctx.fillStyle = '#fff'; ctx.font = '900 18px Arial'; ctx.textAlign = 'center';
                    ctx.fillText(this.player.number, 150, 590+waddle);
                }

                // Ball
                ctx.save();
                ctx.translate(this.ball.x, this.ball.y);
                ctx.rotate(this.ball.active ? this.ball.x/20 : 0);
                ctx.fillStyle = '#f97316'; ctx.beginPath(); ctx.arc(0, 0, this.ball.r, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
                ctx.restore();

                // Particles
                this.particles.forEach(p => {
                    ctx.globalAlpha = p.l; ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, 6, 6);
                });
                ctx.globalAlpha = 1;
            }

            loop() { this.update(); this.draw(); requestAnimationFrame(() => this.loop()); }
        }

        function varColor(v) { return v.startsWith('var') ? getComputedStyle(document.documentElement).getPropertyValue(v.match(/\((.*?)\)/)[1]) : v; }
        window.onload = () => new NashBall();
    </script>
</body>
</html>
