<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nash Ball Elite - K2 games</title>
    <style>
        :root {
            --primary: #1e3c72;
            --secondary: #2a5298;
            --accent: #FFD700;
            --text: #ffffff;
            --panel: rgba(15, 23, 42, 0.85);
            --glass: rgba(255, 255, 255, 0.1);
            --court: #d97706;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background: #020617;
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100dvh;
            width: 100%;
            overflow: hidden;
            position: fixed;
            display: flex;
            flex-direction: column;
        }

        #game-container {
            flex: 1;
            position: relative;
            width: 100%;
            display: flex;
            background: #000;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* HUD Overlay */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 100;
        }

        .hud-card {
            background: var(--panel);
            backdrop-filter: blur(15px);
            padding: 12px 24px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            min-width: 120px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .stat-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; font-weight: 900; margin-bottom: 4px; }
        .stat-val { font-size: 1.8rem; font-weight: 900; color: var(--accent); font-family: monospace; }

        /* Selection Screen */
        #selection-screen {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(15, 23, 42, 0.98) 0%, #020617 100%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            overflow-y: auto;
            backdrop-filter: blur(20px);
        }

        .selection-title { font-size: 3rem; font-weight: 900; font-style: italic; margin-bottom: 40px; color: var(--accent); text-align: center; }

        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .player-card {
            background: var(--glass);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        
        .player-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }

        .player-card:hover { 
            transform: translateY(-10px) scale(1.02); 
            border-color: var(--accent); 
            background: rgba(255,255,255,0.05); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
        }
        
        .player-card:hover::before { opacity: 0.1; }

        .card-num { font-size: 4rem; font-weight: 900; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); position: relative; }
        .card-name { font-size: 1.6rem; font-weight: 800; position: relative; }
        .card-team { font-size: 0.9rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; position: relative; }

        .jersey-preview {
            width: 60px;
            height: 80px;
            margin: 0 auto 15px auto;
            position: relative;
            background: var(--card-color);
            clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 100%, 0% 100%, 0% 20%);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--jersey-color);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Controls */
        #mobile-controls {
            position: absolute;
            bottom: 40px;
            right: 40px;
            display: none;
            z-index: 100;
        }
        @media (max-width: 1024px) { #mobile-controls { display: block; } }

        .shoot-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, #d97706 100%);
            color: black;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(251, 191, 36, 0.4);
            border: 6px solid rgba(255,255,255,0.3);
            font-size: 1.2rem;
            transition: transform 0.1s;
        }
        .shoot-btn:active { transform: scale(0.9); filter: brightness(1.2); }

        .back-hub {
            position: absolute; top: 15px; left: 15px; color: #94a3b8; text-decoration: none;
            font-weight: bold; font-size: 0.8rem; z-index: 200;
        }

        #meter-container {
            position: absolute;
            left: 40px;
            bottom: 40px;
            width: 45px;
            height: 300px;
            background: rgba(0,0,0,0.7);
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            overflow: hidden;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        
        #meter-fill {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 0%;
            background: linear-gradient(to top, #ef4444, #fbbf24, #22c55e, #fbbf24, #ef4444);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
        }

        .sweet-spot-marker {
            position: absolute;
            bottom: 50%;
            left: 0;
            width: 100%;
            height: 15%;
            background: rgba(255, 255, 255, 0.2);
            border-top: 2px solid white;
            border-bottom: 2px solid white;
            pointer-events: none;
            z-index: 10;
        }

        #overlay {
            position: absolute; inset: 0; background: rgba(2, 6, 23, 0.95);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; text-align: center; padding: 40px;
            backdrop-filter: blur(15px);
        }

        .event-text {
            position: absolute;
            top: 40%;
            width: 100%;
            text-align: center;
            font-size: 5rem;
            font-weight: 900;
            font-style: italic;
            color: var(--accent);
            text-shadow: 0 0 30px rgba(0,0,0,0.8);
            opacity: 0;
            pointer-events: none;
            z-index: 150;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .event-text.show { opacity: 1; transform: scale(1.1); }
    </style>

</head>
<body>
    <div id="hud">
        <div class="hud-card">
            <div class="stat-label">Score</div>
            <div id="score-val" class="stat-val">0</div>
        </div>
        <div class="hud-card">
            <div class="stat-label">Time</div>
            <div id="timer-val" class="stat-val">60s</div>
        </div>
        <div class="hud-card">
            <div class="stat-label">Streak</div>
            <div id="streak-val" class="stat-val">0</div>
        </div>
    </div>

    <div id="game-container">
        <a href="index.html" class="back-hub">← EXIT HUB</a>
        <canvas id="gameCanvas"></canvas>

        <div id="meter-container">
            <div class="sweet-spot-marker"></div>
            <div id="meter-fill"></div>
        </div>

        <div id="mobile-controls">
            <div class="shoot-btn" id="btn-shoot">SHOOT</div>
        </div>

        <div id="event-banner" class="event-text">SWISH!</div>

        <div id="selection-screen">
            <div class="selection-title">CHOOSE YOUR LEGEND</div>
            <div class="player-grid" id="player-list"></div>
        </div>

        <div id="overlay">
            <h1 style="font-size: 5rem; font-style: italic; font-weight: 900; color: var(--accent); line-height: 1;">BUZZER BEATER!</h1>
            <div style="margin: 30px 0; background: var(--glass); padding: 30px; border-radius: 32px; border: 1px solid var(--border);">
                <p id="final-stats" style="font-size: 1.8rem; font-weight: 800; color: #fff;"></p>
            </div>
            <button class="shoot-btn" style="border-radius: 100px; width: auto; padding: 0 60px;" onclick="location.reload()">REPLAY CHALLENGE</button>
        </div>
    </div>

    <script>
        const PLAYERS = [
            { name: 'Stephen Curry', number: '30', team: 'Warriors', color: '#1D428A', jersey: '#FFC72C' },
            { name: 'Steve Nash', number: '13', team: 'Suns', color: '#1D1160', jersey: '#E56020' },
            { name: 'Ray Allen', number: '34', team: 'Celtics', color: '#007A33', jersey: '#BA9653' },
            { name: 'Larry Bird', number: '33', team: 'Celtics', color: '#007A33', jersey: '#BA9653' },
            { name: 'Reggie Miller', number: '31', team: 'Pacers', color: '#002D62', jersey: '#FDBB30' },
            { name: 'Klay Thompson', number: '11', team: 'Warriors', color: '#1D428A', jersey: '#FFC72C' }
        ];

        class NashBall {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.width = 1000;
                this.height = 700;
                this.canvas.width = this.width;
                this.canvas.height = this.height;

                this.gameState = 'menu';
                this.player = null;
                this.ball = { x: 150, y: 580, r: 18, vx: 0, vy: 0, active: false, shot: false, angle: 0, spin: 0 };
                this.rim = { x: 820, y: 350, r: 30 };
                
                this.meter = { val: 0, dir: 1, charging: false };
                this.timer = 60;
                this.score = 0;
                this.streak = 0;
                this.made = 0;
                this.shots = 0;
                this.particles = [];
                this.screenshake = 0;

                this.init();
            }

            init() {
                const list = document.getElementById('player-list');
                PLAYERS.forEach((p, i) => {
                    const card = document.createElement('div');
                    card.className = 'player-card';
                    card.innerHTML = `
                        <div class="jersey-preview" style="--card-color:${p.color}; --jersey-color:${p.jersey}">${p.number}</div>
                        <div class="card-name">${p.name}</div>
                        <div class="card-team">${p.team}</div>
                    `;
                    card.onclick = () => this.selectPlayer(i);
                    list.appendChild(card);
                });

                const startShoot = () => { if(this.gameState === 'playing' && !this.ball.active) { this.meter.charging = true; document.getElementById('meter-container').style.display = 'block'; } };
                const endShoot = () => { if(this.meter.charging) this.shoot(); };

                window.onkeydown = (e) => { if(e.code === 'Space') startShoot(); };
                window.onkeyup = (e) => { if(e.code === 'Space') endShoot(); };

                const btn = document.getElementById('btn-shoot');
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); startShoot(); });
                btn.addEventListener('touchend', (e) => { e.preventDefault(); endShoot(); });

                this.loop();
            }

            selectPlayer(idx) {
                this.player = PLAYERS[idx];
                this.gameState = 'playing';
                document.getElementById('selection-screen').style.display = 'none';
                this.startTimer();
            }

            startTimer() {
                const t = setInterval(() => {
                    if(this.gameState === 'playing') {
                        this.timer--;
                        document.getElementById('timer-val').textContent = this.timer + 's';
                        if(this.timer <= 0) { clearInterval(t); this.endGame(); }
                    }
                }, 1000);
            }

            shoot() {
                this.meter.charging = false;
                document.getElementById('meter-container').style.display = 'none';
                this.ball.active = true;
                this.ball.shot = true;
                this.shots++;

                const power = 17 + (this.meter.val / 100) * 11;
                // Wider sweet spot: 50% to 65%
                let accuracy = 0;
                if (this.meter.val >= 50 && this.meter.val <= 65) {
                    accuracy = 1;
                } else {
                    accuracy = 1 - Math.min(1, Math.abs(57.5 - this.meter.val) / 40);
                }
                this.ball.accuracy = accuracy;

                const angle = -Math.PI / 3.5;
                this.ball.vx = Math.cos(angle) * power;
                this.ball.vy = Math.sin(angle) * power;
                this.ball.spin = 0.2;
                this.meter.val = 0;
            }

            update() {
                if(this.gameState !== 'playing') return;

                if(this.meter.charging) {
                    this.meter.val += 2.5 * this.meter.dir; // Slower meter for easier timing
                    if(this.meter.val >= 100 || this.meter.val <= 0) this.meter.dir *= -1;
                    document.getElementById('meter-fill').style.height = this.meter.val + '%';
                }

                if(this.ball.active) {
                    this.ball.vy += 0.48; // Gravity
                    this.ball.vx *= 0.998; // Air resistance
                    this.ball.x += this.ball.vx;
                    this.ball.y += this.ball.vy;
                    this.ball.angle += this.ball.spin;

                    // Floor
                    if(this.ball.y > 630 - this.ball.r) {
                        this.ball.y = 630 - this.ball.r;
                        this.ball.vy *= -0.4;
                        this.ball.vx *= 0.6;
                        this.ball.spin *= 0.5;
                        if(Math.abs(this.ball.vx) < 0.5) this.resetBall();
                    }

                    // Rim/Hoop
                    this.checkHoop();
                }

                this.particles.forEach((p, i) => {
                    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.l -= 0.025;
                    if(p.l <= 0) this.particles.splice(i, 1);
                });

                if(this.screenshake > 0) this.screenshake *= 0.9;

                document.getElementById('score-val').textContent = this.score;
                document.getElementById('streak-val').textContent = this.streak;
            }

            checkHoop() {
                // Backboard - more forgiving bounce
                if(this.ball.x > 850 && this.ball.x < 880 && this.ball.y > 200 && this.ball.y < 450) {
                    this.ball.vx *= -0.5; this.ball.x = 849;
                    this.ball.spin *= -1;
                }
                
                // Rim Collision - slightly smaller collision box for better swishes
                const rimX = 805, rimY = 350;
                const dist = Math.hypot(this.ball.x - rimX, this.ball.y - rimY);
                if(dist < this.ball.r + 5) {
                    const angle = Math.atan2(this.ball.y - rimY, this.ball.x - rimX);
                    this.ball.vx = Math.cos(angle) * 4;
                    this.ball.vy = Math.sin(angle) * 4;
                    this.ball.shot = false; // Ruined shot
                }
                
                // Scored! Higher base success and more forgiving box
                if(this.ball.shot && this.ball.vy > 0 && this.ball.y > 340 && this.ball.y < 390 && this.ball.x > 770 && this.ball.x < 870) {
                    const success = Math.random() < (0.5 + this.ball.accuracy * 0.5);
                    if(success) {
                        this.score += 3; this.made++; this.streak++;
                        this.screenshake = 10;
                        this.triggerEvent(this.streak > 2 ? "ON FIRE! 🔥" : "SWISH!");
                        this.createParticles(820, 360, '#fbbf24', 30);
                    } else { this.streak = 0; }
                    this.ball.shot = false;
                }
            }

            triggerEvent(txt) {
                const el = document.getElementById('event-banner');
                el.textContent = txt;
                el.classList.add('show');
                setTimeout(() => el.classList.remove('show'), 1500);
            }

            createParticles(x, y, color, count) {
                for(let i=0; i<count; i++) this.particles.push({ x, y, vx: (Math.random()-0.5)*18, vy: (Math.random()-0.5)*18, l: 1, color });
            }

            resetBall() {
                this.ball.active = false; this.ball.shot = false;
                this.ball.x = 150; this.ball.y = 580; this.ball.vx = 0; this.ball.vy = 0; this.ball.angle = 0;
            }

            endGame() {
                this.gameState = 'over';
                document.getElementById('overlay').style.display = 'flex';
                document.getElementById('final-stats').innerHTML = `FINAL SCORE: ${this.score}<br>ACCURACY: ${Math.round((this.made/Math.max(1,this.shots))*100)}%<br>LONG STREAK: ${this.streak}`;
            }

            draw() {
                const ctx = this.ctx;
                ctx.save();
                if(this.screenshake > 0.5) ctx.translate((Math.random()-0.5)*this.screenshake, (Math.random()-0.5)*this.screenshake);
                
                ctx.clearRect(0, 0, this.width, this.height);

                // --- PRO STADIUM BACKGROUND ---
                const skyGrad = ctx.createLinearGradient(0, 0, 0, 630);
                skyGrad.addColorStop(0, '#020617'); skyGrad.addColorStop(1, '#1e293b');
                ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, this.width, 630);

                // Crowd / Flashbulbs
                ctx.fillStyle = 'rgba(255,255,255,0.05)';
                for(let i=0; i<40; i++) {
                    const cx = (i*25 + Date.now()*0.05) % 1000;
                    ctx.beginPath(); ctx.arc(cx, 100 + Math.sin(i)*50, 2, 0, Math.PI*2); ctx.fill();
                    if(this.streak > 2 && Math.random() < 0.05) { // Flashbulbs
                        ctx.fillStyle = '#fff'; ctx.fillRect(cx-2, 100 + Math.sin(i)*50-2, 4, 4);
                        ctx.fillStyle = 'rgba(255,255,255,0.05)';
                    }
                }

                // Parquet Court
                ctx.fillStyle = '#d97706'; ctx.fillRect(0, 630, this.width, 70);
                ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 1;
                for(let x=0; x<this.width; x+=40) { ctx.beginPath(); ctx.moveTo(x, 630); ctx.lineTo(x, 700); ctx.stroke(); }

                // Key / Lines
                ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(0, 635); ctx.lineTo(this.width, 635); ctx.stroke();

                // --- HOOP SYSTEM ---
                ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 15;
                ctx.beginPath(); ctx.moveTo(920, 630); ctx.lineTo(920, 350); ctx.stroke(); // Pole
                // Backboard
                ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.fillRect(910, 240, 15, 160);
                ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 4;
                ctx.strokeRect(910, 310, 5, 50);
                // Rim
                ctx.strokeStyle = '#f97316'; ctx.lineWidth = 8; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(800, 350); ctx.lineTo(910, 350); ctx.stroke();
                // Dynamic Net
                ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 2;
                const netSwing = Math.sin(Date.now()*0.01)*2;
                for(let i=0; i<7; i++) {
                    ctx.beginPath(); ctx.moveTo(805 + i*16, 350); ctx.lineTo(815 + i*16 + netSwing, 420); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(815 + i*16, 350); ctx.lineTo(805 + i*16 + netSwing, 420); ctx.stroke();
                }

                // --- PLAYER ---
                if(this.player) {
                    const bob = Math.sin(Date.now()*0.01)*3;
                    const px = 150, py = 540 + bob;
                    // Jersey
                    ctx.fillStyle = this.player.color;
                    ctx.beginPath(); ctx.roundRect(px-25, py, 50, 90, 10); ctx.fill();
                    // Number
                    ctx.fillStyle = this.player.jersey; ctx.font = '900 24px Arial'; ctx.textAlign = 'center';
                    ctx.fillText(this.player.number, px, py + 55);
                    // Arms (Shooting Pose)
                    ctx.strokeStyle = '#ffccaa'; ctx.lineWidth = 12; ctx.lineCap = 'round';
                    if(this.meter.charging) {
                        ctx.beginPath(); ctx.moveTo(px-20, py+20); ctx.lineTo(px+30, py-40); ctx.stroke();
                    } else {
                        ctx.beginPath(); ctx.moveTo(px-20, py+20); ctx.lineTo(px+10, py+10); ctx.stroke();
                    }
                    // Head
                    ctx.fillStyle = '#ffccaa'; ctx.beginPath(); ctx.arc(px, py-10, 22, 0, Math.PI*2); ctx.fill();
                }

                // --- BALL ---
                ctx.save();
                ctx.translate(this.ball.x, this.ball.y);
                ctx.rotate(this.ball.angle);
                // 3D Ball Shadow/Glow
                ctx.shadowBlur = 15; ctx.shadowColor = 'rgba(249, 115, 22, 0.4)';
                ctx.fillStyle = '#f97316'; ctx.beginPath(); ctx.arc(0, 0, this.ball.r, 0, Math.PI*2); ctx.fill();
                // Seams
                ctx.shadowBlur = 0; ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(0, 0, this.ball.r, 0.5, 2.5); ctx.stroke();
                ctx.beginPath(); ctx.arc(0, 0, this.ball.r, 3.5, 5.5); ctx.stroke();
                ctx.restore();

                // Particles
                this.particles.forEach(p => {
                    ctx.globalAlpha = p.l; ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, 6, 6);
                });
                
                ctx.restore();
            }

            loop() { this.update(); this.draw(); requestAnimationFrame(() => this.loop()); }
        }

        window.game = new NashBall();
    </script>
</body>
</html>
