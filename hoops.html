<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hoops Elite: 3D Arcade - K2 games</title>
    <style>
        :root { --bg: #111; --accent: #f59e0b; --primary: #3b82f6; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        #game-container { position: relative; width: 100%; height: 100vh; background: #000; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        #hud { position: absolute; top: 0; left: 0; width: 100%; padding: 20px 40px; display: flex; justify-content: space-between; pointer-events: none; z-index: 100; }
        .scoreboard { display: flex; gap: 40px; background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.1); padding: 15px 40px; border-radius: 12px; backdrop-filter: blur(10px); pointer-events: auto; }
        .score-val { font-size: 3.5rem; font-weight: 900; font-family: 'Impact', sans-serif; }
        .timer-val { font-size: 2rem; font-family: monospace; color: #f59e0b; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(5px); }
        .btn { background: var(--primary); color: white; border: none; padding: 15px 40px; font-size: 1.5rem; font-weight: 900; border-radius: 50px; cursor: pointer; }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CCZ9JJGEDP');
    </script>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="hud">
            <a href="index.html" style="color:white;text-decoration:none;pointer-events:auto;font-weight:bold;">← HUB</a>
            <div class="scoreboard">
                <div style="text-align:center"><div id="p-score" class="score-val" style="color:#60a5fa">0</div><div style="font-size:0.8rem;opacity:0.7">PLAYER</div></div>
                <div style="text-align:center"><div id="timer" class="timer-val">2:00</div><div style="font-size:0.8rem;opacity:0.7">1st QTR</div></div>
                <div style="text-align:center"><div id="ai-score" class="score-val" style="color:#f87171">0</div><div style="font-size:0.8rem;opacity:0.7">CPU</div></div>
            </div>
            <div style="width:80px"></div>
        </div>
        <div id="overlay">
            <h1 style="font-size:4rem; font-style:italic; color:var(--accent); margin-bottom:10px;">HOOPS ELITE</h1>
            <button class="btn" onclick="game.startMatch()">TIP OFF</button>
        </div>
    </div>
    <script>
        class HoopsGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.state = 'menu'; this.score = {p:0, ai:0}; this.time = 120;
                this.player = { x: 0, z: -200, y: 0, hasBall: true };
                this.ai = { x: 0, z: 100, y: 0, hasBall: false };
                this.ball = { x: 0, z: -200, y: 60, state: 'held', owner: 'player', vx:0, vy:0, vz:0 };
                this.cam = { x: 0, y: 300, z: -700 }; this.keys = {};
                this.resize(); this.setupInputs();
                window.addEventListener('resize', () => this.resize());
                this.loop = this.loop.bind(this);
                requestAnimationFrame(this.loop);
            }
            resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
            setupInputs() {
                window.onkeydown = (e) => this.keys[e.code] = true;
                window.onkeyup = (e) => this.keys[e.code] = false;
            }
            startMatch() { document.getElementById('overlay').style.display='none'; this.state='playing'; this.score={p:0, ai:0}; this.time=120; }
            constrain(e) { e.x = Math.max(-350, Math.min(350, e.x)); e.z = Math.max(-500, Math.min(500, e.z)); }
            update() {
                if(this.state !== 'playing') return;
                this.time -= 1/60; if(this.time <= 0) this.state = 'over';
                const s = this.keys['ShiftLeft'] ? 8 : 4.5;
                if(this.keys['KeyW']) this.player.z += s; if(this.keys['KeyS']) this.player.z -= s;
                if(this.keys['KeyA']) this.player.x -= s; if(this.keys['KeyD']) this.player.x += s;
                this.constrain(this.player);
                if(this.ball.state === 'held') {
                    const h = this.ball.owner === 'player' ? this.player : this.ai;
                    this.ball.x = h.x; this.ball.z = h.z; this.ball.y = 60 + Math.abs(Math.sin(Date.now()/150))*40;
                }
                document.getElementById('p-score').textContent = this.score.p;
                document.getElementById('ai-score').textContent = this.score.ai;
                const m = Math.floor(this.time/60), sec = Math.floor(this.time%60).toString().padStart(2,'0');
                document.getElementById('timer').textContent = `${m}:${sec}`;
            }
            draw() {
                const ctx = this.ctx; const w = this.canvas.width, h = this.canvas.height;
                ctx.fillStyle = '#111'; ctx.fillRect(0,0,w,h);
                const project = (x, y, z) => { const scale = 1000 / (1000 + (z - this.cam.z)); return { x: w/2 + (x - this.cam.x) * scale, y: h/2 - (y - this.cam.y) * scale, s: scale }; };
                const f1 = project(-400,0,-550), f2 = project(400,0,-550), f3 = project(400,0,550), f4 = project(-400,0,550);
                ctx.fillStyle = '#d97706'; ctx.beginPath(); ctx.moveTo(f1.x,f1.y); ctx.lineTo(f2.x,f2.y); ctx.lineTo(f3.x,f3.y); ctx.lineTo(f4.x,f4.y); ctx.fill();
                const entities = [{t:'p',z:this.player.z,obj:this.player},{t:'ai',z:this.ai.z,obj:this.ai},{t:'b',z:this.ball.z,obj:this.ball}].sort((a,b)=>b.z-a.z);
                entities.forEach(e => {
                    const p = project(e.obj.x, e.obj.y, e.obj.z);
                    if(e.t==='b') { ctx.fillStyle='#ea580c'; ctx.beginPath(); ctx.arc(p.x, p.y-15*p.s, 15*p.s, 0, Math.PI*2); ctx.fill(); }
                    else { ctx.fillStyle=e.t==='p'?'#3b82f6':'#ef4444'; ctx.fillRect(p.x-20*p.s, p.y-100*p.s, 40*p.s, 100*p.s); }
                });
            }
            loop() { this.update(); this.draw(); requestAnimationFrame(this.loop); }
        }
        window.game = new HoopsGame();
    </script>
</body>
</html>
