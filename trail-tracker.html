<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memoarrr! Island - K2 games</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: rgba(30, 41, 59, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --p1: #3b82f6;
            --p2: #ef4444;
            --p3: #22c55e;
            --p4: #eab308;
            /* Themes */
            --green: #4ade80; /* Plants */
            --red: #f87171;   /* Lava */
            --blue: #60a5fa;  /* Water */
            --yellow: #fde047; /* Desert */
            --pink: #f472b6;   /* Flowers */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100dvh;
            width: 100%;
            overflow: hidden;
            position: fixed;
            display: flex;
            flex-direction: column;
        }

        nav {
            padding: 0.75rem 1.5rem;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .logo { font-weight: 900; font-size: 1.2rem; color: #fff; letter-spacing: -0.5px; }
        .back-link { color: #94a3b8; text-decoration: none; font-size: 0.8rem; font-weight: bold; }

        #game-layout {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            gap: 20px;
        }

        /* Players HUD */
        #hud {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .player-chip {
            background: var(--panel);
            padding: 8px 15px;
            border-radius: 12px;
            border: 2px solid transparent;
            text-align: center;
            transition: 0.3s;
            opacity: 0.5;
            min-width: 80px;
        }
        .player-chip.active { opacity: 1; transform: scale(1.1); border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .player-chip.out { opacity: 0.2; text-decoration: line-through; filter: grayscale(1); }
        .player-chip.p1.active { border-color: var(--p1); }
        .player-chip.p2.active { border-color: var(--p2); }
        .player-chip.p3.active { border-color: var(--p3); }
        .player-chip.p4.active { border-color: var(--p4); }

        /* Grid */
        #grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1/1;
        }

        .card {
            background: #1e293b;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border);
        }
        .card.flipped { transform: rotateY(180deg); }
        
        .card-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 2rem;
        }

        .card-back {
            background: linear-gradient(135deg, #334155 0%, #0f172a 100%);
            border: 2px solid rgba(255,255,255,0.05);
        }
        .card-back::after { content: '❓'; opacity: 0.2; font-size: 1.2rem; }

        .card-front {
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        /* Background Colors */
        .bg-green { background-color: var(--green); color: #064e3b; }
        .bg-red { background-color: var(--red); color: #450a0a; }
        .bg-blue { background-color: var(--blue); color: #1e3a8a; }
        .bg-yellow { background-color: var(--yellow); color: #713f12; }
        .bg-pink { background-color: var(--pink); color: #500724; }

        #center-treasure {
            grid-area: 3 / 3;
            background: #fbbf24 !important;
            cursor: default !important;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
        }

        /* Interaction Overlay */
        .screen-overlay {
            position: absolute; inset: 0;
            background: rgba(2, 6, 23, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; text-align: center; padding: 20px;
        }

        .btn-large {
            background: #3b82f6; color: white; border: none; padding: 1rem 3rem;
            border-radius: 50px; font-weight: 800; cursor: pointer; margin-top: 1rem;
            font-size: 1.2rem; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
            width: 250px;
        }

        #turn-msg {
            font-size: 1.2rem; font-weight: 800; color: #fff;
            background: var(--panel); padding: 10px 30px; border-radius: 50px;
        }

        @media (max-width: 600px) {
            .card-face { font-size: 1.5rem; }
            #grid { gap: 5px; }
        }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CCZ9JJGEDP');
    </script>
</head>
<body>
    <nav>
        <div class="logo">K2 MEMOARRR!</div>
        <a href="index.html" class="back-link">← HUB</a>
    </nav>

    <div id="game-layout">
        <div id="hud">
            <div id="p1-chip" class="player-chip p1" style="display:none">P1: <span id="p1-score">0</span></div>
            <div id="p2-chip" class="player-chip p2" style="display:none">P2: <span id="p2-score">0</span></div>
            <div id="p3-chip" class="player-chip p3" style="display:none">P3: <span id="p3-score">0</span></div>
            <div id="p4-chip" class="player-chip p4" style="display:none">P4: <span id="p4-score">0</span></div>
        </div>

        <div id="turn-msg">SELECT PLAYERS...</div>

        <div id="grid"></div>

        <div id="start-screen" class="screen-overlay">
            <h1 style="font-size: 3.5rem; font-style: italic; font-weight: 900; color: var(--accent);">MEMOARRR!</h1>
            <p style="opacity: 0.7; margin-top: 10px; max-width: 400px; font-weight: 600;">Sort cards by animal or location.</p>
            <div style="display:flex; flex-direction:column; gap:10px; margin-top: 20px;">
                <button class="btn-large" onclick="game.init(2)" style="background: var(--p1);">2 PLAYERS</button>
                <button class="btn-large" onclick="game.init(3)" style="background: var(--p3);">3 PLAYERS</button>
                <button class="btn-large" onclick="game.init(4)" style="background: var(--p2);">4 PLAYERS</button>
            </div>
        </div>

        <div id="round-overlay" class="screen-overlay" style="display:none">
            <h1 id="round-result">PLAYER 1 WINS ROUND!</h1>
            <p style="opacity: 0.7; margin-top: 10px;">Cards are staying where they are...</p>
            <button class="btn-large" onclick="game.nextRound()">NEXT ROUND</button>
        </div>
    </div>

    <script>
        const ANIMALS = ['🐢', '🐙', '🐧', '🦀', '🦭'];
        const LOCATIONS = ['green', 'red', 'blue', 'yellow', 'pink'];

        class Memoarrr {
            constructor() {
                this.gridEl = document.getElementById('grid');
                this.cards = [];
                this.players = [];
                this.turn = 0;
                this.lastFlip = null;
                this.playing = false;
                this.round = 1;
            }

            init(playerCount) {
                this.players = Array(playerCount).fill(0).map((_, i) => ({ id: i, score: 0, out: false }));
                for(let i=1; i<=4; i++) {
                    const el = document.getElementById(`p${i}-chip`);
                    el.style.display = i <= playerCount ? 'block' : 'none';
                }
                this.generateCards();
                this.startRound();
                document.getElementById('start-screen').style.display = 'none';
            }

            generateCards() {
                const deck = [];
                ANIMALS.forEach(animal => { LOCATIONS.forEach(loc => { deck.push({ animal, loc }); }); });
                deck.sort(() => Math.random() - 0.5);
                this.cards = deck.map((data, i) => ({ ...data, id: i, flipped: false }));
                this.renderGrid();
            }

            renderGrid() {
                this.gridEl.innerHTML = '';
                this.cards.forEach((c, i) => {
                    if (i === 12) {
                        const t = document.createElement('div');
                        t.id = 'center-treasure'; t.textContent = '💎';
                        this.gridEl.appendChild(t);
                        return;
                    }
                    const card = document.createElement('div');
                    card.className = 'card'; card.dataset.id = i;
                    card.onclick = () => this.handleFlip(i);
                    const b = document.createElement('div'); b.className = 'card-face card-back';
                    const f = document.createElement('div'); f.className = `card-face card-front bg-${c.loc}`; f.textContent = c.animal;
                    card.appendChild(b); card.appendChild(f);
                    this.gridEl.appendChild(card);
                });
            }

            startRound() {
                this.cards.forEach(c => c.flipped = false);
                this.players.forEach(p => p.out = false);
                this.lastFlip = null;
                this.turn = 0;
                this.playing = true;
                this.updateUI();
                this.updateGridVisuals();
                document.getElementById('round-overlay').style.display = 'none';
            }

            handleFlip(idx) {
                if (!this.playing || this.cards[idx].flipped || idx === 12) return;
                const card = this.cards[idx];
                const p = this.players[this.turn];
                let success = true;
                if (this.lastFlip) {
                    if (card.animal !== this.lastFlip.animal && card.loc !== this.lastFlip.loc) success = false;
                }
                card.flipped = true;
                this.updateGridVisuals();
                if (!success) {
                    p.out = true;
                    this.nextTurn();
                } else {
                    this.lastFlip = card;
                    this.nextTurn();
                }
                this.checkRoundEnd();
            }

            nextTurn() {
                let attempts = 0;
                do { this.turn = (this.turn + 1) % this.players.length; attempts++; } 
                while (this.players[this.turn].out && attempts < this.players.length);
                this.updateUI();
            }

            checkRoundEnd() {
                const active = this.players.filter(p => !p.out);
                if (active.length <= 1) {
                    this.playing = false;
                    const winner = active[0] || this.players[0];
                    winner.score++;
                    setTimeout(() => {
                        const ov = document.getElementById('round-overlay');
                        ov.style.display = 'flex';
                        document.getElementById('round-result').textContent = `PLAYER ${winner.id + 1} WINS!`;
                        document.getElementById('round-result').style.color = `var(--p${winner.id + 1})`;
                    }, 1000);
                }
            }

            nextRound() { this.round++; this.startRound(); }

            updateUI() {
                this.players.forEach((p, i) => {
                    const chip = document.getElementById(`p${i+1}-chip`);
                    const score = document.getElementById(`p${i+1}-score`);
                    score.textContent = p.score;
                    chip.classList.toggle('active', this.turn === i && !p.out);
                    chip.classList.toggle('out', p.out);
                });
                const cur = this.players[this.turn];
                document.getElementById('turn-msg').textContent = `PLAYER ${cur.id + 1}'S TURN`;
                document.getElementById('turn-msg').style.color = `var(--p${cur.id + 1})`;
            }

            updateGridVisuals() {
                const els = document.querySelectorAll('.card');
                this.cards.forEach((c, i) => {
                    if (i === 12) return;
                    const el = Array.from(els).find(e => e.dataset.id == i);
                    if (c.flipped) el.classList.add('flipped');
                    else el.classList.remove('flipped');
                });
            }
        }

        const game = new Memoarrr();

        // Gamepad polling
        (function() {
            let cursor = 0; let lastP = 0;
            function poll() {
                const pads = navigator.getGamepads();
                if (pads[0] && game.playing) {
                    const p = pads[0]; const now = Date.now();
                    const cards = document.querySelectorAll('.card');
                    cards.forEach(c => c.style.boxShadow = '');
                    if (cards[cursor]) cards[cursor].style.boxShadow = '0 0 20px #fbbf24';
                    if (now - lastP > 200) {
                        const b = p.buttons;
                        if (b[12].pressed || p.axes[1] < -0.5) cursor = Math.max(0, cursor - 5);
                        else if (b[13].pressed || p.axes[1] > 0.5) cursor = Math.min(cards.length - 1, cursor + 5);
                        else if (b[14].pressed || p.axes[0] < -0.5) cursor = Math.max(0, cursor - 1);
                        else if (b[15].pressed || p.axes[0] > 0.5) cursor = Math.min(cards.length - 1, cursor + 1);
                        if (b[0].pressed && cards[cursor]) cards[cursor].click();
                        lastP = now;
                    }
                }
                requestAnimationFrame(poll);
            }
            poll();
        })();
    </script>
</body>
</html>
