<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Claim the Gardens - K2 games</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --accent: #f59e0b;
            --border: rgba(255, 255, 255, 0.1);
            --red: #f87171;
            --blue: #60a5fa;
            --yellow: #fbbf24;
            --teal: #2dd4bf;
            --purple: #c084fc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        nav {
            height: 50px;
            padding: 0 1rem;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .logo { font-weight: 900; color: var(--accent); letter-spacing: 1px; }
        .restart-btn { background: var(--surface); border: 1px solid var(--border); color: white; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }

        #game-layout {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            position: relative;
        }

        /* Opponents */
        #opponents {
            display: flex;
            justify-content: center;
            gap: 8px;
            height: 80px;
        }

        .player-info {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 6px;
            text-align: center;
            flex: 1;
            max-width: 110px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }
        .player-info.active { border-color: var(--accent); background: rgba(245, 158, 11, 0.1); }
        .player-info .name { font-size: 0.55rem; font-weight: 800; text-transform: uppercase; color: #94a3b8; }
        .player-info .score { font-size: 1.1rem; font-weight: 900; color: white; }
        .player-info .hand-count { font-size: 0.6rem; opacity: 0.6; }

        /* Gardens Area */
        #gardens-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #gardens-circle {
            position: relative;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 2px dashed var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .garden-slot {
            position: absolute;
            width: 90px;
            height: 90px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .garden-slot.g-0 { border-color: var(--red); color: var(--red); }
        .garden-slot.g-1 { border-color: var(--blue); color: var(--blue); }
        .garden-slot.g-2 { border-color: var(--yellow); color: var(--yellow); }
        .garden-slot.g-3 { border-color: var(--teal); color: var(--teal); }
        .garden-slot.g-4 { border-color: var(--purple); color: var(--purple); }

        .garden-val { font-size: 1.5rem; font-weight: 900; }
        .garden-name { font-size: 0.5rem; font-weight: bold; opacity: 0.7; }
        .garden-dice { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; margin-top: 2px; }
        .g-die { width: 10px; height: 10px; border-radius: 2px; }

        .start-node {
            width: 60px;
            height: 60px;
            background: var(--bg);
            border: 2px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            font-weight: 900;
            color: var(--accent);
        }

        .pawn {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid white;
            z-index: 50;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.5rem;
            font-weight: 900;
            color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* Interaction Area */
        #interaction-container {
            background: rgba(0,0,0,0.3);
            border-top: 1px solid var(--border);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #hand {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 15px 5px;
            justify-content: center;
            min-height: 80px;
        }

        .die {
            width: 40px;
            height: 40px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .die:hover { transform: translateY(-5px); border-color: var(--accent); }
        .die.selected { background: var(--accent); color: black; border-color: white; transform: translateY(-10px); }
        .die.used { opacity: 0.2; cursor: default; }

        #controls {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn-action {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .btn-action:disabled { opacity: 0.3; cursor: not-allowed; }

        #status-msg {
            position: absolute;
            top: 95px;
            width: 100%;
            text-align: center;
            font-weight: 900;
            font-size: 1.1rem;
            color: var(--accent);
            text-shadow: 0 0 15px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 100;
        }

        .overlay {
            position: absolute; inset: 0;
            background: rgba(15, 23, 42, 0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 500; text-align: center; padding: 20px;
        }

        .btn-large {
            background: var(--accent); color: #000; border: none; padding: 1.2rem 3.5rem;
            border-radius: 50px; font-weight: 900; cursor: pointer; margin-top: 1.5rem;
            font-size: 1.3rem;
        }

        .score-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); width: 100%; max-width: 400px; }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            #gardens-circle { width: 300px; height: 300px; }
            .garden-slot { width: 70px; height: 70px; }
            .garden-val { font-size: 1.1rem; }
        }
    </style>

<body>
    <nav>
        <div class="logo">CLAIM THE GARDENS</div>
        <button class="restart-btn" onclick="location.reload()">RESTART</button>
    </nav>

    <div id="game-layout">
        <div id="opponents"></div>
        <div id="status-msg"></div>

        <div id="gardens-area">
            <div id="gardens-circle">
                <div class="start-node">START</div>
                <!-- Slots and pawns rendered here -->
            </div>
        </div>

        <div id="interaction-container">
            <div id="controls">
                <button id="btn-move" class="btn-action" onclick="game.movePawn()" disabled>MOVE & PLANT</button>
            </div>
            <div id="hand"></div>
        </div>

        <div id="start-screen" class="overlay">
            <h1 style="font-size: 3rem; color: var(--accent); font-style: italic; font-weight: 900;">CLAIM THE GARDENS</h1>
            <p style="opacity: 0.8; margin-top: 15px; max-width: 400px; font-weight: 600;">Float your dandelion from garden to garden to plant seeds. Control the most gardens to win the season!</p>
            <div style="margin-top: 25px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;">
                <button class="btn-large" onclick="game.init(2)">2 PLAYERS</button>
                <button class="btn-large" onclick="game.init(3)" style="background: #818cf8; color: white;">3 PLAYERS</button>
            </div>
        </div>

        <div id="round-screen" class="overlay hidden">
            <h1 id="round-title">ROUND OVER</h1>
            <div id="round-stats" style="margin-top: 20px; width: 100%; max-width: 400px;"></div>
            <button class="btn-large" id="btn-next-round">NEXT ROUND</button>
        </div>

        <div id="win-screen" class="overlay hidden">
            <h1 id="winner-title" style="font-size: 3rem; color: var(--accent);">SEASON WINNER</h1>
            <div id="final-stats" style="margin-top: 20px; width: 100%; max-width: 400px;"></div>
            <button class="btn-large" onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const GARDEN_VALS = [1, 2, 3, 5, 8];
        const GARDEN_NAMES = ['Rose', 'Hydrangea', 'Lily', 'Lotus', 'Orchid'];
        const PLAYER_COLORS = ['#f87171', '#60a5fa', '#fbbf24'];

        class ClaimTheGardens {
            constructor() {
                this.players = [];
                this.gardens = [];
                this.currentRound = 1;
                this.turn = 0;
                this.selectedDieIdx = -1;
                this.state = 'setup';
            }

            init(count) {
                this.players = Array(count).fill(0).map((_, i) => ({
                    id: i, name: i === 0 ? 'You' : `Robot #${i}`,
                    dice: this.createDiceSet(), totalScore: 0, roundScore: 0,
                    pawnPos: i, isBot: i !== 0, color: PLAYER_COLORS[i]
                }));

                document.getElementById('start-screen').classList.add('hidden');
                this.startRound();
            }

            createDiceSet() {
                const dice = [];
                for(let v=1; v<=6; v++) {
                    for(let i=0; i<2; i++) dice.push({ value: v, used: false });
                }
                return dice.slice(0, 11);
            }

            startRound() {
                this.gardens = GARDEN_VALS.map((v, i) => ({ val: v, name: GARDEN_NAMES[i], dice: [] }));
                this.players.forEach(p => {
                    p.dice = this.createDiceSet();
                    p.roundScore = 0;
                });
                this.turn = (this.currentRound - 1) % this.players.length;
                this.state = 'playing';
                this.beginTurn();
            }

            beginTurn() {
                this.selectedDieIdx = -1;
                this.updateUI();
                const p = this.players[this.turn];
                this.showStatus(`${p.name}'s turn...`);
                if(p.isBot) setTimeout(() => this.botTurn(), 1000);
            }

            updateUI() {
                const opps = document.getElementById('opponents');
                opps.innerHTML = '';
                this.players.forEach(p => {
                    if(p.id === 0) return;
                    const div = document.createElement('div');
                    div.className = `player-info ${this.turn === p.id ? 'active' : ''}`;
                    div.innerHTML = `<div class="name">${p.name}</div><div class="score">${p.totalScore}</div><div class="hand-count">${p.dice.filter(d=>!d.used).length} dice</div>`;
                    opps.appendChild(div);
                });

                const circle = document.getElementById('gardens-circle');
                circle.querySelectorAll('.garden-slot, .pawn').forEach(el => el.remove());

                this.gardens.forEach((g, i) => {
                    const angle = (i * 72) * (Math.PI / 180) - Math.PI / 2;
                    const x = 200 + Math.cos(angle) * 140;
                    const y = 200 + Math.sin(angle) * 140;

                    const slot = document.createElement('div');
                    slot.className = `garden-slot g-${i}`;
                    slot.style.left = `${x-45}px`;
                    slot.style.top = `${y-45}px`;
                    slot.innerHTML = `
                        <div class="garden-val">${g.val}</div>
                        <div class="garden-name">${g.name}</div>
                        <div class="garden-dice">
                            ${g.dice.map(d => `<div class="g-die" style="background:${this.players[d.pId].color}"></div>`).join('')}
                        </div>
                    `;
                    circle.appendChild(slot);
                });

                this.players.forEach(p => {
                    let x, y;
                    if(p.pawnPos === 0) { x = 200; y = 200; }
                    else {
                        const angle = ((p.pawnPos - 1) * 72) * (Math.PI / 180) - Math.PI / 2;
                        x = 200 + Math.cos(angle) * 140;
                        y = 200 + Math.sin(angle) * 140;
                    }
                    const pawn = document.createElement('div');
                    pawn.className = 'pawn';
                    pawn.style.background = p.color;
                    pawn.style.left = `${x-10 + (p.id*5)}px`;
                    pawn.style.top = `${y-10 + (p.id*5)}px`;
                    pawn.textContent = p.id === 0 ? 'P' : p.id;
                    circle.appendChild(pawn);
                });

                const hand = document.getElementById('hand');
                hand.innerHTML = '';
                this.players[0].dice.forEach((d, i) => {
                    const el = document.createElement('div');
                    el.className = `die ${d.used ? 'used' : ''} ${this.selectedDieIdx === i ? 'selected' : ''}`;
                    el.textContent = d.value;
                    if(!d.used) el.onclick = () => { this.selectedDieIdx = i; this.updateUI(); };
                    hand.appendChild(el);
                });

                document.getElementById('btn-move').disabled = this.selectedDieIdx === -1 || this.turn !== 0;
            }

            movePawn() {
                const p = this.players[this.turn];
                const die = p.dice[this.selectedDieIdx];
                die.used = true;

                p.pawnPos = (p.pawnPos + die.value) % 6;
                if(p.pawnPos > 0) {
                    this.gardens[p.pawnPos-1].dice.push({ pId: p.id, val: die.value });
                } else {
                    // PUFF: Recover unused dice
                    p.dice.forEach(d => { if(!d.used) d.used = false; }); // placeholder for "re-roll" logic
                }

                this.finishTurn();
            }

            botTurn() {
                const p = this.players[this.turn];
                const avail = p.dice.map((d, i) => d.used ? -1 : i).filter(i => i !== -1);
                if(avail.length > 0) {
                    this.selectedDieIdx = avail[Math.floor(Math.random() * avail.length)];
                    this.movePawn();
                } else {
                    this.finishTurn();
                }
            }

            finishTurn() {
                const allUsed = this.players.every(p => p.dice.every(d => d.used));
                if(allUsed) {
                    this.endRound();
                } else {
                    this.turn = (this.turn + 1) % this.players.length;
                    this.beginTurn();
                }
            }

            endRound() {
                this.state = 'scoring';
                this.gardens.forEach(g => {
                    const counts = {};
                    const pips = {};
                    g.dice.forEach(d => {
                        counts[d.pId] = (counts[d.pId] || 0) + 1;
                        pips[d.pId] = (pips[d.pId] || 0) + d.val;
                        this.players[d.pId].roundScore += g.val;
                    });
                    
                    let maxCount = 0;
                    Object.values(counts).forEach(c => { if(c > maxCount) maxCount = c; });
                    if(maxCount > 0) {
                        const winners = Object.keys(counts).filter(pId => counts[pId] === maxCount);
                        winners.forEach(pId => this.players[pId].roundScore += pips[pId]);
                    }
                });

                this.players.forEach(p => p.totalScore += p.roundScore);

                const ov = document.getElementById('round-screen');
                const stats = document.getElementById('round-stats');
                stats.innerHTML = this.players.map(p => `<div class="score-row"><span>${p.name}</span><span>${p.roundScore} pts (Total: ${p.totalScore})</span></div>`).join('');
                
                const btn = document.getElementById('btn-next-round');
                if(this.currentRound < 3) {
                    btn.textContent = `START ROUND ${this.currentRound + 1}`;
                    btn.onclick = () => { this.currentRound++; ov.classList.add('hidden'); this.startRound(); };
                } else {
                    btn.textContent = "VIEW FINAL RESULTS";
                    btn.onclick = () => { ov.classList.add('hidden'); this.endGame(); };
                }
                ov.classList.remove('hidden');
            }

            endGame() {
                this.state = 'gameOver';
                const ov = document.getElementById('win-screen');
                const stats = document.getElementById('final-stats');
                const sorted = [...this.players].sort((a,b) => b.totalScore - a.totalScore);
                document.getElementById('winner-title').textContent = sorted[0].id === 0 ? "GARDEN MASTER" : "SEASON END";
                stats.innerHTML = sorted.map((p, i) => `<div class="score-row" style="${i===0?'color:var(--accent);font-weight:900':''}"><span>#${i+1} ${p.name}</span><span>${p.totalScore} points</span></div>`).join('');
                ov.classList.remove('hidden');
            }

            showStatus(m) { document.getElementById('status-msg').textContent = m; }
        }

        const game = new ClaimTheGardens();
    </script>
</body>
</html>
