<style>
:root{--panel:rgba(7,10,12,.78);--line:rgba(255,255,255,.22);--ink:#f8fafc;--gold:#fbbf24;--orange:#fb923c;--danger:#ef4444;--good:#86efac;--blue:#38bdf8}*{box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;touch-action:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0b1720;color:var(--ink);font-family:Impact,Haettenschweiler,"Arial Narrow Bold",system-ui,sans-serif}body{position:fixed;inset:0;min-height:100dvh}#app{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 18% 12%,rgba(59,130,246,.22),transparent 30%),radial-gradient(circle at 84% 82%,rgba(34,197,94,.20),transparent 38%),#0b1720}#stage{position:relative;width:min(100vw,calc(100dvh * 9 / 16));height:min(100dvh,calc(100vw * 16 / 9));max-width:720px;max-height:1280px;overflow:hidden;background:#213a34;box-shadow:0 0 40px rgba(0,0,0,.58)}#game{position:absolute;inset:0;width:100%;height:100%;display:block;background:#31544e}.hud{position:absolute;z-index:5;border:2px solid var(--line);background:var(--panel);box-shadow:inset 0 0 0 1px rgba(0,0,0,.28),0 10px 24px rgba(0,0,0,.25);backdrop-filter:blur(8px);text-shadow:0 2px 4px rgba(0,0,0,.75)}#home{left:max(12px,env(safe-area-inset-left));top:max(12px,env(safe-area-inset-top));border-radius:999px;padding:9px 12px;color:#fff;text-decoration:none;font-family:system-ui,sans-serif;font-weight:900;font-size:12px;pointer-events:auto}#mission{top:max(12px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);width:min(50%,350px);min-height:48px;border-radius:10px;display:grid;place-items:center;padding:7px 10px;text-align:center;font-size:clamp(13px,2.7vw,21px);line-height:1.12;letter-spacing:.04em}#mode-card{right:max(12px,env(safe-area-inset-right));top:max(12px,env(safe-area-inset-top));width:clamp(88px,16vw,116px);min-height:70px;border-radius:10px;padding:8px 5px;text-align:center;font-size:clamp(11px,2.1vw,16px);line-height:1.1;letter-spacing:.03em}#stars{margin-top:5px;display:flex;justify-content:center;gap:3px}.star{width:clamp(12px,2.7vw,18px);height:clamp(12px,2.7vw,18px);clip-path:polygon(50% 0%,62% 34%,98% 35%,69% 56%,79% 91%,50% 70%,21% 91%,31% 56%,2% 35%,38% 34%);background:linear-gradient(#fff5a8,var(--gold) 58%,#b55d10);filter:drop-shadow(0 2px 2px rgba(0,0,0,.75))}.star.dim{background:linear-gradient(#626767,#363b3d)}#readouts{left:max(12px,env(safe-area-inset-left));top:70px;border-radius:10px;padding:7px 9px;font-family:"Arial Narrow",Arial,sans-serif;font-weight:900;letter-spacing:.05em;text-transform:uppercase;font-size:clamp(9px,1.8vw,12px)}#toast{display:none;left:50%;bottom:22%;transform:translateX(-50%);min-width:190px;max-width:78%;border-radius:12px;padding:10px 14px;text-align:center;opacity:0;translate:0 12px;transition:opacity 180ms ease,translate 180ms ease;font-size:clamp(16px,3.2vw,24px);letter-spacing:.04em;pointer-events:none}#toast.show{opacity:1;translate:0 0}#mode-buttons{left:50%;top:74px;transform:translateX(-50%);border-radius:999px;padding:5px;display:flex;gap:4px;pointer-events:auto;font-family:system-ui,sans-serif}#mode-buttons button{border:0;border-radius:999px;padding:8px 10px;font-weight:900;color:#e5e7eb;background:transparent}#mode-buttons button.active{background:linear-gradient(135deg,var(--blue),#2563eb);color:#03111f}#wheel-pad{position:absolute;z-index:6;left:max(14px,env(safe-area-inset-left));bottom:max(16px,env(safe-area-inset-bottom));width:clamp(128px,27vw,190px);aspect-ratio:1;border-radius:999px;pointer-events:auto;touch-action:none}#wheel{position:absolute;inset:0;border-radius:999px;background:radial-gradient(circle at 50% 50%,#f2f2f2 0 5%,#8d8f8d 8%,#222 9% 16%,transparent 17%),conic-gradient(from 0deg,#060707,#333 18%,#0b0b0b 34%,#333 51%,#0a0a0a 70%,#363636 86%,#060707);box-shadow:inset 0 0 0 9px #111,inset 0 0 0 16px rgba(255,255,255,.04),0 9px 22px rgba(0,0,0,.58)}#wheel:before,#wheel:after{content:"";position:absolute;left:50%;top:50%;width:42%;height:12%;border-radius:999px;background:linear-gradient(#252525,#080808);transform-origin:left center;box-shadow:inset 0 1px 2px rgba(255,255,255,.12)}#wheel:before{transform:rotate(28deg)}#wheel:after{transform:rotate(156deg)}#wheel-spoke{position:absolute;left:50%;top:50%;width:12%;height:38%;border-radius:999px;background:linear-gradient(90deg,#070707,#272727,#070707);transform:translateX(-50%);transform-origin:top center}#turn-arrow{position:absolute;z-index:7;left:max(32px,env(safe-area-inset-left));bottom:calc(max(16px,env(safe-area-inset-bottom)) + clamp(126px,26vw,186px));width:clamp(42px,9vw,66px);height:clamp(30px,6vw,46px);opacity:.72;filter:drop-shadow(0 3px 3px rgba(0,0,0,.5));pointer-events:none}#turn-arrow:before{content:"";position:absolute;inset:0;border-left:clamp(9px,2vw,14px) solid #fff;border-top:clamp(9px,2vw,14px) solid #fff;border-radius:100% 0 0 0;transform:rotate(34deg)}#turn-arrow:after{content:"";position:absolute;right:0;top:0;border-left:clamp(18px,3.2vw,28px) solid #fff;border-top:clamp(12px,2.4vw,18px) solid transparent;border-bottom:clamp(12px,2.4vw,18px) solid transparent;transform:rotate(24deg)}#pedals{position:absolute;z-index:8;right:max(14px,env(safe-area-inset-right));bottom:max(16px,env(safe-area-inset-bottom));display:grid;gap:8px}.pedal{width:clamp(58px,11vw,78px);height:clamp(54px,9vw,70px);border-radius:12px;border:2px solid var(--line);background:var(--panel);color:#fff;font-weight:1000;font-size:clamp(12px,2.5vw,18px);box-shadow:0 7px 0 rgba(0,0,0,.32)}.pedal.active{transform:scale(.94);background:rgba(56,189,248,.45)}#shifter{position:absolute;z-index:8;right:max(14px,env(safe-area-inset-right));bottom:calc(max(16px,env(safe-area-inset-bottom)) + 146px);width:clamp(52px,10vw,72px);height:clamp(150px,27vh,220px);border-radius:12px;padding:12px 7px;pointer-events:auto;touch-action:none}.gear-row{position:relative;z-index:2;height:25%;display:grid;align-items:center;justify-items:start;padding-left:10%;color:#dad8d2;font-size:clamp(17px,3.5vw,25px);line-height:1}.gear-row.active{color:var(--orange);text-shadow:0 0 13px rgba(251,146,60,.95)}#slot{position:absolute;right:10px;top:20px;bottom:20px;width:16px;border-radius:999px;background:#070707;box-shadow:inset 0 0 8px rgba(255,255,255,.13)}#knob{position:absolute;z-index:3;right:1px;width:36px;height:36px;border-radius:999px;background:radial-gradient(circle at 33% 30%,#fff,#d9d9d9 22%,#8c8c8c 42%,#303030 72%);box-shadow:0 5px 12px rgba(0,0,0,.58);transition:top 150ms ease}#start{position:absolute;inset:0;z-index:20;display:grid;place-items:center;background:rgba(2,6,23,.78);padding:18px;text-align:center}.card{width:min(94vw,560px);background:linear-gradient(180deg,rgba(15,23,42,.96),rgba(8,47,73,.96));border:1px solid rgba(255,255,255,.18);border-radius:28px;padding:22px;box-shadow:0 28px 90px rgba(0,0,0,.55)}.card h1{font-size:clamp(42px,11vw,74px);line-height:.85;margin-bottom:12px}.card p{font-family:system-ui,sans-serif;font-weight:800;line-height:1.4;color:#dbeafe}.btn{border:0;border-radius:18px;background:linear-gradient(135deg,#fbbf24,#fb923c);color:#301403;font-size:18px;font-weight:1000;padding:14px 22px;margin-top:16px;box-shadow:0 10px 28px rgba(251,191,36,.22)}@media(max-width:520px){#mission{top:12px;min-height:42px;padding:6px 8px}#readouts{display:none}#mode-buttons{top:62px}#shifter{display:none}}@media(orientation:landscape) and (max-height:540px){#mode-buttons{display:none}.pedal{width:54px;height:42px;font-size:11px}#wheel-pad{width:100px}.card{max-height:94vh;overflow:auto}}

<body>
<div id="app"><main id="stage" aria-label="Back It Up full trailer trip game"><canvas id="game" width="720" height="1280"></canvas><a href="index.html" id="home" class="hud">← HUB</a><section id="mission" class="hud">DRIVE TO THE EXIT</section><section id="mode-buttons" class="hud"><button data-map="rv" class="active">RV PAD</button><button data-map="boat">BOAT RAMP</button></section><section id="mode-card" class="hud"><div id="level-label">HIGHWAY</div><div id="stars"><span class="star"></span><span class="star"></span><span class="star"></span></div></section><section id="readouts" class="hud"><div id="gear-read">GEAR D</div><div id="speed">MPH 0</div><div id="angle">ANGLE 0</div><div id="damage">DAMAGE 0%</div></section><div id="toast" class="hud">Drive forward, take the exit, then back it in</div><div id="turn-arrow"></div><div id="wheel-pad" aria-label="Steering wheel"><div id="wheel"><div id="wheel-spoke"></div></div></div><div id="shifter" class="hud"><div id="slot"></div><div id="knob"></div><div class="gear-row" data-gear="P">P</div><div class="gear-row" data-gear="R">R</div><div class="gear-row" data-gear="N">N</div><div class="gear-row active" data-gear="D">D</div></div><div id="pedals"><button class="pedal" id="gas">GAS</button><button class="pedal" id="brake">BRAKE</button></div><div id="start"><div class="card"><h1>Back It Up</h1><p>Full trip mode: drive forward on the highway, take the exit, roll into the campground or ramp lot, then shift to reverse and back the trailer into place.</p><button class="btn" id="startBtn">START TRIP</button></div></div></main></div>
<script>
(()=>{const canvas=document.getElementById('game'),ctx=canvas.getContext('2d',{alpha:false}),stage=document.getElementById('stage'),wheelPad=document.getElementById('wheel-pad'),wheel=document.getElementById('wheel'),shifter=document.getElementById('shifter'),knob=document.getElementById('knob'),gearRows=[...document.querySelectorAll('.gear-row')],levelLabel=document.getElementById('level-label'),stars=[...document.querySelectorAll('.star')],mission=document.getElementById('mission'),speedEl=document.getElementById('speed'),angleEl=document.getElementById('angle'),damageEl=document.getElementById('damage'),gearRead=document.getElementById('gear-read'),modeButtons=[...document.querySelectorAll('[data-map]')],start=document.getElementById('start'),gasBtn=document.getElementById('gas'),brakeBtn=document.getElementById('brake');
const W=720,H=1280,gears=['P','R','N','D'];const maps={rv:[{name:'RV PAD 1',mode:'rv',startX:360,truckY:330,targetX:360,targetY:920,targetA:Math.PI/2,padW:190,padH:250,wind:.03,bend:0,ob:[{x:130,y:650,w:80,h:190,t:'picnic'},{x:520,y:720,w:80,h:160,t:'tree'}]}],boat:[{name:'BOAT RAMP 1',mode:'boat',startX:360,truckY:340,targetX:360,targetY:915,targetA:Math.PI/2,padW:184,padH:260,wind:.05,bend:0,ob:[{x:560,y:695,w:100,h:370,t:'dock'},{x:36,y:790,w:94,h:190,t:'rock'}]}]};let mapType='rv';const truck={x:360,y:320,a:-Math.PI/2,v:0},trailer={x:360,y:440,a:-Math.PI/2};const input={steer:0,steerTarget:0,wheelPointer:null,wheelActive:false,wheelStartX:0,wheelStartY:0,wheelStartSteer:0,keys:new Set(),gas:false,brake:false};const state={phase:'highway',level:0,gear:'D',t:0,damage:0,score:3,win:false,lastHitchX:360,lastHitchY:380,cameraShake:0,tireTracks:[],toastT:0,roadY:0,roadX:360,exitProgress:0,lotProgress:0};const truckLen=86,trailerLen=154,hitchOffset=56,maxSteer=.58;function clamp(n,a,b){return Math.max(a,Math.min(b,n))}function lerp(a,b,t){return a+(b-a)*t}function normAngle(a){while(a>Math.PI)a-=Math.PI*2;while(a<-Math.PI)a+=Math.PI*2;return a}function preventDefaults(target){['touchstart','touchmove','touchend','pointerdown','pointermove','pointerup','contextmenu','dragstart','selectstart'].forEach(name=>target.addEventListener(name,e=>e.preventDefault(),{passive:false}))}preventDefaults(window);preventDefaults(document);preventDefaults(stage);function current(){return maps[mapType][state.level]}
function resetTrip(){state.phase='highway';state.gear='D';state.t=0;state.damage=0;state.score=3;state.win=false;state.roadY=0;state.roadX=360;state.exitProgress=0;state.lotProgress=0;state.tireTracks=[];truck.x=360;truck.y=880;truck.a=-Math.PI/2;truck.v=0;trailer.a=-Math.PI/2;placeTrailer();mission.textContent='DRIVE FORWARD TO THE EXIT';levelLabel.textContent='HIGHWAY';showToast('Use the wheel plus GAS/BRAKE. Take the exit when it appears.');updateHud()}function resetBacking(){const l=current();state.phase='backing';truck.x=l.startX;truck.y=l.truckY;truck.a=-Math.PI/2;truck.v=0;trailer.a=-Math.PI/2;placeTrailer();state.lastHitchX=truck.x-Math.cos(truck.a)*hitchOffset;state.lastHitchY=truck.y-Math.sin(truck.a)*hitchOffset;state.gear='R';state.win=false;state.tireTracks=[];mission.textContent=mapType==='rv'?'BACK THE CAMPER ONTO THE PAD':'BACK THE BOAT DOWN THE RAMP';showToast('Now reverse. Small steering moves. Watch trailer angle.');updateHud()}function placeTrailer(){const hx=truck.x-Math.cos(truck.a)*hitchOffset,hy=truck.y-Math.sin(truck.a)*hitchOffset;trailer.x=hx-Math.cos(trailer.a)*trailerLen;trailer.y=hy-Math.sin(trailer.a)*trailerLen}function setMap(type){mapType=type;modeButtons.forEach(b=>b.classList.toggle('active',b.dataset.map===type));resetTrip()}modeButtons.forEach(b=>b.addEventListener('pointerdown',e=>{e.preventDefault();setMap(b.dataset.map)},{passive:false}));document.getElementById('startBtn').onclick=()=>{start.style.display='none';resetTrip()};function setGear(g){state.gear=g;updateHud()}function updateHud(){const l=current();if(state.phase==='backing')levelLabel.textContent=l.name;gearRows.forEach(r=>r.classList.toggle('active',r.dataset.gear===state.gear));stars.forEach((s,i)=>s.classList.toggle('dim',i>=state.score));const rowIndex=gears.indexOf(state.gear),shifterH=shifter.getBoundingClientRect().height||260,knobH=knob.getBoundingClientRect().height||52;knob.style.top=`${12+(rowIndex+.5)*((shifterH-24)/4)-knobH/2}px`;const angle=Math.round(normAngle(truck.a-trailer.a)*180/Math.PI);gearRead.textContent=`GEAR ${state.gear}`;speedEl.textContent=`MPH ${Math.abs(truck.v*.62).toFixed(1)}`;angleEl.textContent=`ANGLE ${angle}`;damageEl.textContent=`DAMAGE ${Math.round(state.damage)}%`}function pickGearFromY(y){const r=shifter.getBoundingClientRect(),i=clamp(Math.floor(((y-r.top)/r.height)*4),0,3);setGear(gears[i])}shifter.addEventListener('pointerdown',e=>{e.preventDefault();pickGearFromY(e.clientY);shifter.setPointerCapture(e.pointerId)},{passive:false});shifter.addEventListener('pointermove',e=>{if(e.buttons)pickGearFromY(e.clientY)},{passive:false});function wheelInput(e,start=false){const r=wheelPad.getBoundingClientRect();if(start){input.wheelStartX=e.clientX;input.wheelStartY=e.clientY;input.wheelStartSteer=input.steerTarget;return}const dx=e.clientX-input.wheelStartX,dy=e.clientY-input.wheelStartY;input.steerTarget=clamp(input.wheelStartSteer+(dx-dy*.24)/(r.width*.58),-1,1)}wheelPad.addEventListener('pointerdown',e=>{e.preventDefault();input.wheelActive=true;input.wheelPointer=e.pointerId;wheelPad.setPointerCapture(e.pointerId);wheelInput(e,true)},{passive:false});wheelPad.addEventListener('pointermove',e=>{if(input.wheelPointer!==e.pointerId)return;e.preventDefault();wheelInput(e)},{passive:false});function releaseWheel(e){if(input.wheelPointer!==e.pointerId)return;input.wheelPointer=null;input.wheelActive=false}wheelPad.addEventListener('pointerup',releaseWheel,{passive:false});wheelPad.addEventListener('pointercancel',releaseWheel,{passive:false});function pedalDown(btn,key){btn.addEventListener('pointerdown',e=>{e.preventDefault();input[key]=true;btn.classList.add('active')},{passive:false});btn.addEventListener('pointerup',e=>{e.preventDefault();input[key]=false;btn.classList.remove('active')},{passive:false});btn.addEventListener('pointercancel',()=>{input[key]=false;btn.classList.remove('active')},{passive:false})}pedalDown(gasBtn,'gas');pedalDown(brakeBtn,'brake');window.addEventListener('keydown',e=>{if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','Space','KeyR','KeyP','KeyN','Digit1','Digit2'].includes(e.code))e.preventDefault();if(e.code==='ArrowUp'||e.code==='KeyW')input.gas=true;if(e.code==='ArrowDown'||e.code==='KeyS'||e.code==='Space')input.brake=true;if(!e.repeat&&e.code==='KeyR')setGear('R');if(!e.repeat&&e.code==='KeyP')setGear('P');if(!e.repeat&&e.code==='KeyN')setGear('N');if(!e.repeat&&e.code==='KeyD')setGear('D');if(!e.repeat&&e.code==='Digit1')setMap('rv');if(!e.repeat&&e.code==='Digit2')setMap('boat');input.keys.add(e.code)},{passive:false});window.addEventListener('keyup',e=>{if(e.code==='ArrowUp'||e.code==='KeyW')input.gas=false;if(e.code==='ArrowDown'||e.code==='KeyS'||e.code==='Space')input.brake=false;input.keys.delete(e.code)});function showToast(txt){const toast=document.getElementById('toast');toast.textContent=txt;toast.style.display='block';toast.classList.add('show');state.toastT=2.4}function addDamage(amount,msg){state.damage=clamp(state.damage+amount,0,100);state.cameraShake=Math.max(state.cameraShake,amount*.9);state.score=state.damage>45?1:state.damage>16?2:3;if(state.damage>=100&&!state.win){mission.textContent='TRIP FAILED';truck.v*=.86;showToast(msg||'Too much damage.')}}function laneCenterAt(y){const l=current(),p=clamp((y-340)/600,0,1);return 360+Math.sin(p*Math.PI)*l.bend}function laneWidthAt(y){const l=current(),p=clamp((y-300)/700,0,1);return lerp(l.padW+90,l.padW,p)}function rectHit(px,py,r,o){const nx=clamp(px,o.x,o.x+o.w),ny=clamp(py,o.y,o.y+o.h);return Math.hypot(px-nx,py-ny)<r}
function updateDriving(dt){state.roadY+=Math.max(1,Math.abs(truck.v))*dt*5;state.exitProgress=clamp((state.roadY-1500)/900,0,1);state.lotProgress=clamp((state.roadY-2450)/620,0,1);const exitOpen=state.exitProgress>0&&state.exitProgress<1;let desiredX=exitOpen?lerp(360,520,state.exitProgress):state.roadY>2350?lerp(520,360,state.lotProgress):360;const off=Math.abs(truck.x-desiredX);if(off>120&&Math.abs(truck.v)>25)addDamage(dt*8,'Stay in your lane. Trailer sway is no joke.');if(state.roadY>3020){resetBacking();return}mission.textContent=state.roadY<1450?'DRIVE FORWARD TO THE EXIT':state.roadY<2350?'TAKE THE EXIT RAMP':'ARRIVE AT THE LOT';}
function update(dt){state.t+=dt;if(state.toastT>0){state.toastT-=dt;if(state.toastT<=0)document.getElementById('toast').classList.remove('show')}const left=input.keys.has('ArrowLeft')||input.keys.has('KeyA'),right=input.keys.has('ArrowRight')||input.keys.has('KeyD'),keySteer=(right?1:0)-(left?1:0);if(keySteer&&!input.wheelActive)input.steerTarget=keySteer;if(!keySteer&&!input.wheelActive)input.steerTarget*=Math.max(0,1-dt*3.8);input.steer+=(input.steerTarget-input.steer)*clamp(dt*5.5,0,1);let accel=0;if(state.gear==='R')accel=-58;if(state.gear==='D')accel=62;if(state.gear==='P')truck.v*=Math.max(0,1-dt*16);if(state.gear!=='P'&&state.gear!=='N'&&input.gas)truck.v+=accel*dt;if(!input.gas&&state.phase==='highway'&&state.gear==='D')truck.v+=25*dt;if(input.brake)truck.v*=Math.max(0,1-dt*8.5);const l=current(),waterDrag=state.phase==='backing'&&mapType==='boat'&&trailer.y>860?1.6:0,grassDrag=state.phase==='backing'&&mapType==='rv'&&trailer.y>760?.35:0;truck.v-=truck.v*(state.phase==='highway'?.18:.84+waterDrag+grassDrag)*dt;truck.v=clamp(truck.v,state.phase==='highway'?-20:-82,state.phase==='highway'?105:92);if(Math.abs(truck.v)<.018)truck.v=0;truck.a+=(truck.v/truckLen)*Math.tan(input.steer*maxSteer)*dt;truck.x+=Math.cos(truck.a)*truck.v*dt;truck.y+=Math.sin(truck.a)*truck.v*dt;if(state.phase==='highway'){truck.y=880;truck.a=clamp(truck.a,-Math.PI*.72,-Math.PI*.28);truck.x=clamp(truck.x,120,600)}else{truck.x=clamp(truck.x,80,W-80);truck.y=clamp(truck.y,160,1030)}const hx=truck.x-Math.cos(truck.a)*hitchOffset,hy=truck.y-Math.sin(truck.a)*hitchOffset,hvx=(hx-state.lastHitchX)/Math.max(dt,.001),hvy=(hy-state.lastHitchY)/Math.max(dt,.001);state.lastHitchX=hx;state.lastHitchY=hy;const trailerSide=-Math.sin(trailer.a)*hvx+Math.cos(trailer.a)*hvy,windPush=state.phase==='backing'?(trailer.y>720?l.wind:l.wind*.2)*Math.sin(state.t*.9+state.level):0;trailer.a+=clamp(trailerSide/trailerLen+windPush,-1.65,1.65)*dt;trailer.x=hx-Math.cos(trailer.a)*trailerLen;trailer.y=hy-Math.sin(trailer.a)*trailerLen;const art=Math.abs(normAngle(truck.a-trailer.a));if(art>1.32&&Math.abs(truck.v)>10){truck.v*=.94;addDamage(dt*14,'Jackknife angle')}if(state.phase==='highway')updateDriving(dt);else updateBacking(dt);if(state.tireTracks.length===0||Math.hypot(state.tireTracks.at(-1).x-truck.x,state.tireTracks.at(-1).y-truck.y)>10){state.tireTracks.push({x:truck.x,y:truck.y,a:truck.a,life:1});if(state.tireTracks.length>92)state.tireTracks.shift()}state.cameraShake=Math.max(0,state.cameraShake-dt*13);wheel.style.transform=`rotate(${input.steer*138}deg)`;document.getElementById('turn-arrow').style.transform=`scaleX(${input.steer>=0?1:-1})`;updateHud()}
function updateBacking(dt){const l=current(),truckOff=Math.abs(truck.x-laneCenterAt(truck.y))>laneWidthAt(truck.y)/2+48,trailerOff=Math.abs(trailer.x-laneCenterAt(trailer.y))>laneWidthAt(trailer.y)/2+28;if((truckOff||trailerOff)&&Math.abs(truck.v)>8)addDamage(dt*12,mapType==='rv'?'Off the driveway':'Ramp edge');for(const o of l.ob){if((rectHit(trailer.x,trailer.y,34,o)||rectHit(truck.x,truck.y,42,o))&&Math.abs(truck.v)>5){truck.v*=.78;addDamage(dt*36,o.t+' strike')}}if(mapType==='boat'&&truck.y>918&&Math.abs(truck.v)>8)addDamage(dt*8,'Truck too deep');const art=Math.abs(normAngle(truck.a-trailer.a)),targetClose=Math.abs(trailer.x-l.targetX)<44&&trailer.y>l.targetY-56&&trailer.y<l.targetY+58,linedUp=art<.72&&Math.abs(normAngle(trailer.a-l.targetA))<.42,slow=Math.abs(truck.v)<14;if(!state.win&&targetClose&&linedUp&&slow&&(mapType==='rv'||truck.y<870)){state.win=true;mission.textContent=mapType==='rv'?'CAMPER PARKED':'LAUNCH COMPLETE';showToast('Full trip complete! Highway, exit, and back-in finished.')}else if(!state.win&&state.damage>=100){mission.textContent='TRAILER DAMAGED';truck.v*=.9}else if(!state.win){const drift=normAngle(truck.a-trailer.a);mission.textContent=mapType==='rv'?(trailer.y<760?'BACK TOWARD THE CAMP PAD':Math.abs(drift)>.65?'CORRECT THE JACKKNIFE':'EASE INTO THE PAD'):(trailer.y<760?'BACK TRAILER DOWN THE RAMP':'EASE THE BOAT INTO THE WATER')}}
function roundedRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}function fillRound(x,y,w,h,r,color){ctx.fillStyle=color;roundedRect(x,y,w,h,r);ctx.fill()}function drawHighway(){const scroll=state.roadY%160;ctx.fillStyle='#2f5d37';ctx.fillRect(0,0,W,H);ctx.fillStyle='#1f2937';ctx.beginPath();ctx.moveTo(205,0);ctx.lineTo(515,0);ctx.lineTo(575,H);ctx.lineTo(145,H);ctx.closePath();ctx.fill();ctx.strokeStyle='#f8fafc';ctx.lineWidth=6;ctx.setLineDash([42,38]);ctx.beginPath();ctx.moveTo(360,-scroll);ctx.lineTo(360,H);ctx.stroke();ctx.setLineDash([]);if(state.roadY>1350&&state.roadY<2450){let p=clamp((state.roadY-1350)/1100,0,1),y=lerp(220,760,p);ctx.fillStyle='#374151';ctx.beginPath();ctx.moveTo(470,y-190);ctx.bezierCurveTo(610,y-80,625,y+180,410,y+310);ctx.lineTo(350,y+230);ctx.bezierCurveTo(510,y+120,520,y-40,430,y-120);ctx.closePath();ctx.fill();ctx.fillStyle='#fbbf24';ctx.font='900 34px system-ui';ctx.textAlign='center';ctx.fillText(mapType==='rv'?'CAMPGROUND EXIT':'BOAT RAMP EXIT',360,y-215)}if(state.roadY>2320){ctx.fillStyle=mapType==='rv'?'#6b5f45':'#6b6a61';ctx.fillRect(120,720,480,560);if(mapType==='boat'){ctx.fillStyle='#0f5a5c';ctx.fillRect(0,980,W,300)}ctx.fillStyle='#fff';ctx.font='900 28px system-ui';ctx.textAlign='center';ctx.fillText('SLOW LOT',360,780)}drawTrailer();drawTruck()}function drawBackground(){const grd=ctx.createLinearGradient(0,0,0,H);grd.addColorStop(0,mapType==='rv'?'#38533a':'#36594f');grd.addColorStop(1,mapType==='rv'?'#1b2a20':'#183438');ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);for(let i=0;i<80;i++){const x=(i*47)%W,y=(i*83)%H,r=18+(i*7)%30;ctx.fillStyle=i%3?'#315c36':'#52743a';ctx.globalAlpha=.62;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}function drawWater(){if(mapType!=='boat')return;const grd=ctx.createLinearGradient(0,730,0,H);grd.addColorStop(0,'#26717a');grd.addColorStop(.58,'#0f5a5c');grd.addColorStop(1,'#0a383b');ctx.fillStyle=grd;ctx.fillRect(0,730,W,550);ctx.globalAlpha=.22;ctx.strokeStyle='#d9fff1';ctx.lineWidth=2;for(let i=0;i<36;i++){const y=760+i*16+Math.sin(state.t*1.7+i)*7,start=(i*31+state.t*22)%160-80;ctx.beginPath();for(let x=start;x<W+100;x+=18){const yy=y+Math.sin(x*.025+state.t*2.4+i)*4;if(x===start)ctx.moveTo(x,yy);else ctx.lineTo(x,yy)}ctx.stroke()}ctx.globalAlpha=1}function drawLane(){ctx.save();ctx.beginPath();for(let y=250;y<1120;y+=18){const c=laneCenterAt(y),hw=laneWidthAt(y)/2;if(y===250)ctx.moveTo(c-hw,y);else ctx.lineTo(c-hw,y)}for(let y=1110;y>=250;y-=18){const c=laneCenterAt(y),hw=laneWidthAt(y)/2;ctx.lineTo(c+hw,y)}ctx.closePath();ctx.fillStyle=mapType==='rv'?'#6b5f45':'#6b6a61';ctx.fill();ctx.strokeStyle='rgba(255,255,255,.28)';ctx.lineWidth=6;ctx.stroke();ctx.restore()}function drawTarget(){const l=current();ctx.save();ctx.translate(l.targetX,l.targetY);ctx.rotate(l.targetA-Math.PI/2);ctx.strokeStyle=state.win?'#86efac':'#fbbf24';ctx.lineWidth=7;ctx.setLineDash([18,10]);roundedRect(-l.padW/2,-l.padH/2,l.padW,l.padH,18);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=state.win?'rgba(134,239,172,.18)':'rgba(251,191,36,.14)';roundedRect(-l.padW/2,-l.padH/2,l.padW,l.padH,18);ctx.fill();ctx.restore()}function drawObstacles(){for(const o of current().ob){if(o.t==='dock'){fillRound(o.x,o.y,o.w,o.h,14,'#7c4a22');ctx.fillStyle='#d6a15b';for(let y=o.y+16;y<o.y+o.h;y+=34)ctx.fillRect(o.x+8,y,o.w-16,8)}else if(o.t==='rock'){ctx.fillStyle='#64748b';ctx.beginPath();ctx.ellipse(o.x+o.w/2,o.y+o.h/2,o.w/2,o.h/2,0,0,7);ctx.fill()}else if(o.t==='tree'){ctx.fillStyle='#14532d';ctx.beginPath();ctx.arc(o.x+o.w/2,o.y+o.h/2,Math.max(o.w,o.h)/2,0,7);ctx.fill();ctx.fillStyle='#713f12';ctx.fillRect(o.x+o.w/2-10,o.y+o.h/2,20,70)}else if(o.t==='picnic'){fillRound(o.x,o.y,o.w,o.h,10,'#7c2d12');ctx.fillStyle='#fbbf24';ctx.fillRect(o.x+8,o.y+20,o.w-16,12)}else{fillRound(o.x,o.y,o.w,o.h,14,'#475569')}}}function drawTracks(){ctx.globalAlpha=.22;ctx.fillS
