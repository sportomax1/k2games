<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>Back It Up - Trailer Backing</title>
<style>
:root{--panel:rgba(7,10,12,.78);--line:rgba(255,255,255,.22);--ink:#f8fafc;--gold:#fbbf24;--orange:#fb923c;--danger:#ef4444;--good:#86efac;--blue:#38bdf8}*{box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0b1720;color:var(--ink);font-family:Impact,Haettenschweiler,"Arial Narrow Bold",system-ui,sans-serif;touch-action:none}body{position:fixed;inset:0;min-height:100dvh}#app{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 18% 12%,rgba(59,130,246,.22),transparent 30%),radial-gradient(circle at 84% 82%,rgba(34,197,94,.20),transparent 38%),#0b1720}#stage{position:relative;width:min(100vw,calc(100dvh * 9 / 16));height:min(100dvh,calc(100vw * 16 / 9));max-width:720px;max-height:1280px;overflow:hidden;background:#213a34;box-shadow:0 0 40px rgba(0,0,0,.58)}#game{position:absolute;inset:0;width:100%;height:100%;display:block;background:#31544e}.hud{position:absolute;z-index:5;border:2px solid var(--line);background:var(--panel);box-shadow:inset 0 0 0 1px rgba(0,0,0,.28),0 10px 24px rgba(0,0,0,.25);backdrop-filter:blur(8px);text-shadow:0 2px 4px rgba(0,0,0,.75)}#home{left:max(12px,env(safe-area-inset-left));top:max(12px,env(safe-area-inset-top));border-radius:999px;padding:9px 12px;color:#fff;text-decoration:none;font-family:system-ui,sans-serif;font-weight:900;font-size:12px;pointer-events:auto}#mission{top:max(12px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);width:min(48%,330px);min-height:48px;border-radius:10px;display:grid;place-items:center;padding:7px 10px;text-align:center;font-size:clamp(13px,2.7vw,21px);line-height:1.12;letter-spacing:.04em}#mode-card{right:max(12px,env(safe-area-inset-right));top:max(12px,env(safe-area-inset-top));width:clamp(82px,15vw,106px);min-height:70px;border-radius:10px;padding:8px 5px;text-align:center;font-size:clamp(11px,2.1vw,16px);line-height:1.1;letter-spacing:.03em}#stars{margin-top:5px;display:flex;justify-content:center;gap:3px}.star{width:clamp(12px,2.7vw,18px);height:clamp(12px,2.7vw,18px);clip-path:polygon(50% 0%,62% 34%,98% 35%,69% 56%,79% 91%,50% 70%,21% 91%,31% 56%,2% 35%,38% 34%);background:linear-gradient(#fff5a8,var(--gold) 58%,#b55d10);filter:drop-shadow(0 2px 2px rgba(0,0,0,.75))}.star.dim{background:linear-gradient(#626767,#363b3d)}#readouts{left:max(12px,env(safe-area-inset-left));top:70px;border-radius:10px;padding:7px 9px;font-family:"Arial Narrow",Arial,sans-serif;font-weight:900;letter-spacing:.05em;text-transform:uppercase;font-size:clamp(9px,1.8vw,12px)}#toast{display:none;left:50%;bottom:22%;transform:translateX(-50%);min-width:190px;max-width:78%;border-radius:12px;padding:10px 14px;text-align:center;opacity:0;translate:0 12px;transition:opacity 180ms ease,translate 180ms ease;font-size:clamp(16px,3.2vw,24px);letter-spacing:.04em;pointer-events:none}#toast.show{opacity:1;translate:0 0}#mode-buttons{left:50%;top:74px;transform:translateX(-50%);border-radius:999px;padding:5px;display:flex;gap:4px;pointer-events:auto;font-family:system-ui,sans-serif}#mode-buttons button{border:0;border-radius:999px;padding:8px 10px;font-weight:900;color:#e5e7eb;background:transparent}#mode-buttons button.active{background:linear-gradient(135deg,var(--blue),#2563eb);color:#03111f}#wheel-pad{position:absolute;z-index:6;left:max(14px,env(safe-area-inset-left));bottom:max(16px,env(safe-area-inset-bottom));width:clamp(128px,27vw,190px);aspect-ratio:1;border-radius:999px;pointer-events:auto;touch-action:none}#wheel{position:absolute;inset:0;border-radius:999px;background:radial-gradient(circle at 50% 50%,#f2f2f2 0 5%,#8d8f8d 8%,#222 9% 16%,transparent 17%),conic-gradient(from 0deg,#060707,#333 18%,#0b0b0b 34%,#333 51%,#0a0a0a 70%,#363636 86%,#060707);box-shadow:inset 0 0 0 9px #111,inset 0 0 0 16px rgba(255,255,255,.04),0 9px 22px rgba(0,0,0,.58)}#wheel:before,#wheel:after{content:"";position:absolute;left:50%;top:50%;width:42%;height:12%;border-radius:999px;background:linear-gradient(#252525,#080808);transform-origin:left center;box-shadow:inset 0 1px 2px rgba(255,255,255,.12)}#wheel:before{transform:rotate(28deg)}#wheel:after{transform:rotate(156deg)}#wheel-spoke{position:absolute;left:50%;top:50%;width:12%;height:38%;border-radius:999px;background:linear-gradient(90deg,#070707,#272727,#070707);transform:translateX(-50%);transform-origin:top center}#turn-arrow{position:absolute;z-index:7;left:max(32px,env(safe-area-inset-left));bottom:calc(max(16px,env(safe-area-inset-bottom)) + clamp(126px,26vw,186px));width:clamp(42px,9vw,66px);height:clamp(30px,6vw,46px);opacity:.72;filter:drop-shadow(0 3px 3px rgba(0,0,0,.5));pointer-events:none}#turn-arrow:before{content:"";position:absolute;inset:0;border-left:clamp(9px,2vw,14px) solid #fff;border-top:clamp(9px,2vw,14px) solid #fff;border-radius:100% 0 0 0;transform:rotate(34deg)}#turn-arrow:after{content:"";position:absolute;right:0;top:0;border-left:clamp(18px,3.2vw,28px) solid #fff;border-top:clamp(12px,2.4vw,18px) solid transparent;border-bottom:clamp(12px,2.4vw,18px) solid transparent;transform:rotate(24deg)}#shifter{position:absolute;z-index:8;right:max(14px,env(safe-area-inset-right));bottom:calc(max(16px,env(safe-area-inset-bottom)) + 98px);width:clamp(52px,10vw,72px);height:clamp(150px,27vh,220px);border-radius:12px;padding:12px 7px;pointer-events:auto;touch-action:none}.gear-row{position:relative;z-index:2;height:25%;display:grid;align-items:center;justify-items:start;padding-left:10%;color:#dad8d2;font-size:clamp(17px,3.5vw,25px);line-height:1}.gear-row.active{color:var(--orange);text-shadow:0 0 13px rgba(251,146,60,.95)}#slot{position:absolute;right:10px;top:20px;bottom:20px;width:16px;border-radius:999px;background:#070707;box-shadow:inset 0 0 8px rgba(255,255,255,.13)}#knob{position:absolute;z-index:3;right:1px;width:36px;height:36px;border-radius:999px;background:radial-gradient(circle at 33% 30%,#fff,#d9d9d9 22%,#8c8c8c 42%,#303030 72%);box-shadow:0 5px 12px rgba(0,0,0,.58);transition:top 150ms ease}#camera{position:absolute;z-index:8;right:max(14px,env(safe-area-inset-right));bottom:max(16px,env(safe-area-inset-bottom));width:clamp(52px,10vw,70px);aspect-ratio:1;border-radius:10px;pointer-events:auto;display:grid;place-items:center;cursor:pointer}#camera-icon{width:29px;height:20px;border-radius:4px;background:#fff;position:relative}#camera-icon:after{content:"";position:absolute;right:-12px;top:4px;border-left:12px solid #fff;border-top:6px solid transparent;border-bottom:6px solid transparent}@media(max-width:520px){#mission{top:12px;min-height:42px;padding:6px 8px}#readouts{display:none}#mode-buttons{top:62px}}
</style>
</head>
<body>
<div id="app">
  <main id="stage" aria-label="Back It Up trailer backing game">
    <canvas id="game" width="720" height="1280"></canvas>
    <a href="index.html" id="home" class="hud">← HUB</a>
    <section id="mission" class="hud">BACK IT UP</section>
    <section id="mode-buttons" class="hud"><button data-map="rv" class="active">RV PAD</button><button data-map="boat">BOAT RAMP</button></section>
    <section id="mode-card" class="hud" aria-live="polite"><div id="level-label">RV PAD 1</div><div id="stars"><span class="star"></span><span class="star"></span><span class="star"></span></div></section>
    <section id="readouts" class="hud"><div id="gear-read">GEAR R</div><div id="speed">MPH 0</div><div id="angle">ANGLE 0</div><div id="damage">DAMAGE 0%</div></section>
    <div id="toast" class="hud">Turn the wheel opposite the trailer drift</div>
    <div id="turn-arrow"></div>
    <div id="wheel-pad" aria-label="Steering wheel"><div id="wheel"><div id="wheel-spoke"></div></div></div>
    <div id="shifter" class="hud" aria-label="Gear selector"><div id="slot"></div><div id="knob"></div><div class="gear-row" data-gear="P">P</div><div class="gear-row active" data-gear="R">R</div><div class="gear-row" data-gear="N">N</div><div class="gear-row" data-gear="D">D</div></div>
    <button id="camera" class="hud" type="button" aria-label="Reset camera"><span id="camera-icon"></span></button>
  </main>
</div>
<script>
(()=>{const canvas=document.getElementById('game'),ctx=canvas.getContext('2d',{alpha:false}),stage=document.getElementById('stage'),wheelPad=document.getElementById('wheel-pad'),wheel=document.getElementById('wheel'),shifter=document.getElementById('shifter'),knob=document.getElementById('knob'),gearRows=[...document.querySelectorAll('.gear-row')],levelLabel=document.getElementById('level-label'),stars=[...document.querySelectorAll('.star')],mission=document.getElementById('mission'),speedEl=document.getElementById('speed'),angleEl=document.getElementById('angle'),damageEl=document.getElementById('damage'),gearRead=document.getElementById('gear-read'),modeButtons=[...document.querySelectorAll('[data-map]')];
const W=720,H=1280,gears=['P','R','N','D'];
const maps={rv:[{name:'RV PAD 1',mode:'rv',startX:360,truckY:330,targetX:360,targetY:920,targetA:Math.PI/2,padW:190,padH:250,wind:0.03,bend:0,ob:[{x:130,y:650,w:80,h:190,t:'picnic'},{x:520,y:720,w:80,h:160,t:'tree'}]},{name:'RV PAD 2',mode:'rv',startX:310,truckY:300,targetX:390,targetY:930,targetA:Math.PI/2,padW:170,padH:240,wind:0.08,bend:42,ob:[{x:135,y:700,w:95,h:170,t:'firepit'},{x:520,y:610,w:90,h:240,t:'tree'}]},{name:'RV PAD 3',mode:'rv',startX:410,truckY:286,targetX:320,targetY:950,targetA:Math.PI/2,padW:154,padH:230,wind:0.12,bend:-48,ob:[{x:128,y:625,w:82,h:210,t:'tree'},{x:510,y:720,w:100,h:185,t:'truck'}]}],boat:[{name:'BOAT RAMP 1',mode:'boat',startX:360,truckY:340,targetX:360,targetY:915,targetA:Math.PI/2,padW:184,padH:260,wind:0.05,bend:0,ob:[{x:560,y:695,w:100,h:370,t:'dock'},{x:36,y:790,w:94,h:190,t:'rock'}]},{name:'BOAT RAMP 2',mode:'boat',startX:346,truckY:300,targetX:334,targetY:924,targetA:Math.PI/2,padW:162,padH:260,wind:0.13,bend:34,ob:[{x:542,y:695,w:110,h:385,t:'dock'},{x:42,y:806,w:88,h:210,t:'rock'}]},{name:'BOAT RAMP 3',mode:'boat',startX:390,truckY:288,targetX:358,targetY:938,targetA:Math.PI/2,padW:146,padH:260,wind:0.19,bend:-42,ob:[{x:555,y:685,w:104,h:390,t:'dock'},{x:34,y:770,w:100,h:260,t:'rock'}]}]};
let mapType='rv';const truck={x:360,y:320,a:-Math.PI/2,v:0},trailer={x:360,y:440,a:-Math.PI/2};const input={steer:0,steerTarget:0,wheelPointer:null,wheelActive:false,wheelStartX:0,wheelStartY:0,wheelStartSteer:0,keys:new Set()};const state={level:0,gear:'R',t:0,damage:0,score:3,win:false,lastHitchX:360,lastHitchY:380,cameraShake:0,tireTracks:[],toastT:0};const truckLen=86,trailerLen=154,hitchOffset=56,maxSteer=.58;
function clamp(n,a,b){return Math.max(a,Math.min(b,n))}function lerp(a,b,t){return a+(b-a)*t}function normAngle(a){while(a>Math.PI)a-=Math.PI*2;while(a<-Math.PI)a+=Math.PI*2;return a}function preventDefaults(target){['touchstart','touchmove','touchend','pointerdown','pointermove','pointerup','contextmenu','dragstart','selectstart'].forEach(name=>target.addEventListener(name,e=>e.preventDefault(),{passive:false}))}preventDefaults(window);preventDefaults(document);preventDefaults(stage);function current(){return maps[mapType][state.level]}
function resetLevel(next=false){if(next)state.level=(state.level+1)%maps[mapType].length;const l=current();truck.x=l.startX;truck.y=l.truckY;truck.a=-Math.PI/2;truck.v=0;trailer.a=-Math.PI/2;const hx=truck.x-Math.cos(truck.a)*hitchOffset,hy=truck.y-Math.sin(truck.a)*hitchOffset;trailer.x=hx-Math.cos(trailer.a)*trailerLen;trailer.y=hy-Math.sin(trailer.a)*trailerLen;state.lastHitchX=hx;state.lastHitchY=hy;state.damage=0;state.score=3;state.win=false;state.cameraShake=0;state.tireTracks=[];state.gear='R';input.steer=0;input.steerTarget=0;mission.textContent=mapType==='rv'?'BACK THE CAMPER ONTO THE PAD':'BACK THE BOAT DOWN THE RAMP';showToast('Slow speed. Small wheel moves. Watch trailer angle.');updateHud()}
function setMap(type){mapType=type;state.level=0;modeButtons.forEach(b=>b.classList.toggle('active',b.dataset.map===type));resetLevel(false)}modeButtons.forEach(b=>b.addEventListener('pointerdown',e=>{e.preventDefault();setMap(b.dataset.map)},{passive:false}));function setGear(g){state.gear=g;updateHud()}function updateHud(){const l=current();levelLabel.textContent=l.name;gearRows.forEach(r=>r.classList.toggle('active',r.dataset.gear===state.gear));stars.forEach((s,i)=>s.classList.toggle('dim',i>=state.score));const rowIndex=gears.indexOf(state.gear),shifterH=shifter.getBoundingClientRect().height||260,knobH=knob.getBoundingClientRect().height||52;knob.style.top=`${12+(rowIndex+.5)*((shifterH-24)/4)-knobH/2}px`;const artDeg=Math.round(normAngle(truck.a-trailer.a)*180/Math.PI);gearRead.textContent=`GEAR ${state.gear}`;speedEl.textContent=`MPH ${Math.abs(truck.v*.62).toFixed(1)}`;angleEl.textContent=`ANGLE ${artDeg}`;damageEl.textContent=`DAMAGE ${Math.round(state.damage)}%`}
function pickGearFromY(y){const r=shifter.getBoundingClientRect(),i=clamp(Math.floor(((y-r.top)/r.height)*4),0,3);setGear(gears[i])}shifter.addEventListener('pointerdown',e=>{e.preventDefault();pickGearFromY(e.clientY);shifter.setPointerCapture(e.pointerId)},{passive:false});shifter.addEventListener('pointermove',e=>{if(e.buttons)pickGearFromY(e.clientY)},{passive:false});function wheelInput(e,start=false){const r=wheelPad.getBoundingClientRect();if(start){input.wheelStartX=e.clientX;input.wheelStartY=e.clientY;input.wheelStartSteer=input.steerTarget;return}const dx=e.clientX-input.wheelStartX,dy=e.clientY-input.wheelStartY;input.steerTarget=clamp(input.wheelStartSteer+(dx-dy*.24)/(r.width*.58),-1,1)}wheelPad.addEventListener('pointerdown',e=>{e.preventDefault();input.wheelActive=true;input.wheelPointer=e.pointerId;wheelPad.setPointerCapture(e.pointerId);wheelInput(e,true)},{passive:false});wheelPad.addEventListener('pointermove',e=>{if(input.wheelPointer!==e.pointerId)return;e.preventDefault();wheelInput(e)},{passive:false});function releaseWheel(e){if(input.wheelPointer!==e.pointerId)return;input.wheelPointer=null;input.wheelActive=false}wheelPad.addEventListener('pointerup',releaseWheel,{passive:false});wheelPad.addEventListener('pointercancel',releaseWheel,{passive:false});window.addEventListener('keydown',e=>{if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','Space','KeyR','KeyP','KeyN','Digit1','Digit2'].includes(e.code))e.preventDefault();if(!e.repeat&&e.code==='KeyR')setGear('R');if(!e.repeat&&e.code==='KeyP')setGear('P');if(!e.repeat&&e.code==='KeyN')setGear('N');if(!e.repeat&&e.code==='Digit1')setMap('rv');if(!e.repeat&&e.code==='Digit2')setMap('boat');input.keys.add(e.code)},{passive:false});window.addEventListener('keyup',e=>input.keys.delete(e.code));document.getElementById('camera').addEventListener('pointerdown',e=>e.preventDefault(), {passive:false});function showToast(txt){const toast=document.getElementById('toast');toast.textContent=txt;toast.style.display='block';toast.classList.add('show');state.toastT=2.2}function laneCenterAt(y){const l=current(),p=clamp((y-340)/600,0,1);return 360+Math.sin(p*Math.PI)*l.bend}function laneWidthAt(y){const l=current(),p=clamp((y-300)/700,0,1);return lerp(l.padW+90,l.padW,p)}function addDamage(amount,msg){const before=state.damage;state.damage=clamp(state.damage+amount,0,100);state.cameraShake=Math.max(state.cameraShake,amount*.9);state.score=state.damage>45?1:state.damage>16?2:3;if(before<20&&state.damage>=20)showToast(msg||'Careful. Damage hurts stars.')}function rectHit(px,py,r,o){const nx=clamp(px,o.x,o.x+o.w),ny=clamp(py,o.y,o.y+o.h);return Math.hypot(px-nx,py-ny)<r}
function update(dt){state.t+=dt;if(state.toastT>0){state.toastT-=dt;if(state.toastT<=0)document.getElementById('toast').classList.remove('show')}const left=input.keys.has('ArrowLeft')||input.keys.has('KeyA'),right=input.keys.has('ArrowRight')||input.keys.has('KeyD'),gasKey=input.keys.has('ArrowUp')||input.keys.has('KeyW'),brakeKey=input.keys.has('ArrowDown')||input.keys.has('KeyS')||input.keys.has('Space'),keySteer=(right?1:0)-(left?1:0);if(keySteer&&!input.wheelActive)input.steerTarget=keySteer;if(!keySteer&&!input.wheelActive)input.steerTarget*=Math.max(0,1-dt*3.8);input.steer+=(input.steerTarget-input.steer)*clamp(dt*5.5,0,1);let accel=0;if(state.gear==='R')accel=-58;if(state.gear==='D')accel=62;if(state.gear==='P')truck.v*=Math.max(0,1-dt*16);if(state.gear!=='P'&&state.gear!=='N'){const crawl=gasKey?1:.42;truck.v+=accel*crawl*dt}if(brakeKey)truck.v*=Math.max(0,1-dt*8.5);const l=current(),waterDrag=mapType==='boat'&&trailer.y>860?1.6:0,grassDrag=mapType==='rv'&&trailer.y>760?.35:0;truck.v-=truck.v*(.84+waterDrag+grassDrag)*dt;truck.v=clamp(truck.v,-82,92);if(Math.abs(truck.v)<.018)truck.v=0;truck.a+=(truck.v/truckLen)*Math.tan(input.steer*maxSteer)*dt;truck.x+=Math.cos(truck.a)*truck.v*dt;truck.y+=Math.sin(truck.a)*truck.v*dt;truck.x=clamp(truck.x,80,W-80);truck.y=clamp(truck.y,160,1030);const hx=truck.x-Math.cos(truck.a)*hitchOffset,hy=truck.y-Math.sin(truck.a)*hitchOffset,hvx=(hx-state.lastHitchX)/Math.max(dt,.001),hvy=(hy-state.lastHitchY)/Math.max(dt,.001);state.lastHitchX=hx;state.lastHitchY=hy;const trailerSide=-Math.sin(trailer.a)*hvx+Math.cos(trailer.a)*hvy,windPush=(trailer.y>720?l.wind:l.wind*.2)*Math.sin(state.t*.9+state.level);trailer.a+=clamp(trailerSide/trailerLen+windPush,-1.65,1.65)*dt;trailer.x=hx-Math.cos(trailer.a)*trailerLen;trailer.y=hy-Math.sin(trailer.a)*trailerLen;const art=Math.abs(normAngle(truck.a-trailer.a));if(art>1.32&&Math.abs(truck.v)>10){truck.v*=.94;addDamage(dt*14,'Jackknife angle')}const truckOff=Math.abs(truck.x-laneCenterAt(truck.y))>laneWidthAt(truck.y)/2+48,trailerOff=Math.abs(trailer.x-laneCenterAt(trailer.y))>laneWidthAt(trailer.y)/2+28;if((truckOff||trailerOff)&&Math.abs(truck.v)>8)addDamage(dt*12,mapType==='rv'?'Off the driveway':'Ramp edge');for(const o of l.ob){if((rectHit(trailer.x,trailer.y,34,o)||rectHit(truck.x,truck.y,42,o))&&Math.abs(truck.v)>5){truck.v*=.78;addDamage(dt*36,o.t+' strike')}}if(mapType==='boat'&&truck.y>918&&Math.abs(truck.v)>8)addDamage(dt*8,'Truck too deep');if(state.tireTracks.length===0||Math.hypot(state.tireTracks.at(-1).x-truck.x,state.tireTracks.at(-1).y-truck.y)>10){state.tireTracks.push({x:truck.x,y:truck.y,a:truck.a,life:1});if(state.tireTracks.length>92)state.tireTracks.shift()}const targetClose=Math.abs(trailer.x-l.targetX)<44&&trailer.y>l.targetY-56&&trailer.y<l.targetY+58,linedUp=art<.72&&Math.abs(normAngle(trailer.a-l.targetA))<.42,slow=Math.abs(truck.v)<14;if(!state.win&&targetClose&&linedUp&&slow&&(mapType==='rv'||truck.y<870)){state.win=true;mission.textContent=mapType==='rv'?'CAMPER PARKED':'LAUNCH COMPLETE';showToast('Nice! Shift to another map or keep practicing.')}else if(!state.win&&state.damage>=100){mission.textContent='TRAILER DAMAGED';truck.v*=.9}else if(!state.win){const drift=normAngle(truck.a-trailer.a);mission.textContent=mapType==='rv'?(trailer.y<760?'BACK TOWARD THE CAMP PAD':Math.abs(drift)>.65?'CORRECT THE JACKKNIFE':'EASE INTO THE PAD'):(trailer.y<760?'BACK TRAILER DOWN THE RAMP':'EASE THE BOAT INTO THE WATER')}state.cameraShake=Math.max(0,state.cameraShake-dt*13);wheel.style.transform=`rotate(${input.steer*138}deg)`;document.getElementById('turn-arrow').style.transform=`scaleX(${input.steer>=0?1:-1})`;updateHud()}
function roundedRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}function fillRound(x,y,w,h,r,color){ctx.fillStyle=color;roundedRect(x,y,w,h,r);ctx.fill()}function drawBackground(){const grd=ctx.createLinearGradient(0,0,0,H);grd.addColorStop(0,mapType==='rv'?'#38533a':'#36594f');grd.addColorStop(1,mapType==='rv'?'#1b2a20':'#183438');ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);for(let i=0;i<80;i++){const x=(i*47)%W,y=(i*83)%H,r=18+(i*7)%30;ctx.fillStyle=i%3?'#315c36':'#52743a';ctx.globalAlpha=.62;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}function drawWater(){if(mapType!=='boat')return;const grd=ctx.createLinearGradient(0,730,0,H);grd.addColorStop(0,'#26717a');grd.addColorStop(.58,'#0f5a5c');grd.addColorStop(1,'#0a383b');ctx.fillStyle=grd;ctx.fillRect(0,730,W,550);ctx.globalAlpha=.22;ctx.strokeStyle='#d9fff1';ctx.lineWidth=2;for(let i=0;i<36;i++){const y=760+i*16+Math.sin(state.t*1.7+i)*7,start=(i*31+state.t*22)%160-80;ctx.beginPath();for(let x=start;x<W+100;x+=18){const yy=y+Math.sin(x*.025+state.t*2.4+i)*4;if(x===start)ctx.moveTo(x,yy);else ctx.lineTo(x,yy)}ctx.stroke()}ctx.globalAlpha=1}function drawLane(){ctx.save();ctx.beginPath();for(let y=250;y<1120;y+=18){const c=laneCenterAt(y),hw=laneWidthAt(y)/2;if(y===250)ctx.moveTo(c-hw,y);else ctx.lineTo(c-hw,y)}for(let y=1110;y>=250;y-=18){const c=laneCenterAt(y),hw=laneWidthAt(y)/2;ctx.lineTo(c+hw,y)}ctx.closePath();ctx.fillStyle=mapType==='rv'?'#6b5f45':'#6b6a61';ctx.fill();ctx.strokeStyle='rgba(255,255,255,.28)';ctx.lineWidth=6;ctx.stroke();ctx.setLineDash([20,18]);ctx.strokeStyle='rgba(255,255,255,.32)';ctx.lineWidth=3;ctx.beginPath();for(let y=270;y<1110;y+=20){const c=laneCenterAt(y);if(y===270)ctx.moveTo(c,y);else ctx.lineTo(c,y)}ctx.stroke();ctx.setLineDash([]);ctx.restore()}function drawTarget(){const l=current();ctx.save();ctx.translate(l.targetX,l.targetY);ctx.rotate(l.targetA-Math.PI/2);ctx.strokeStyle=state.win?'#86efac':'#fbbf24';ctx.lineWidth=7;ctx.setLineDash([18,10]);roundedRect(-l.padW/2,-l.padH/2,l.padW,l.padH,18);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=state.win?'rgba(134,239,172,.18)':'rgba(251,191,36,.14)';roundedRect(-l.padW/2,-l.padH/2,l.padW,l.padH,18);ctx.fill();ctx.restore()}function drawObstacles(){const l=current();for(const o of l.ob){if(o.t==='dock'){fillRound(o.x,o.y,o.w,o.h,14,'#7c4a22');ctx.fillStyle='#d6a15b';for(let y=o.y+16;y<o.y+o.h;y+=34)ctx.fillRect(o.x+8,y,o.w-16,8)}else if(o.t==='rock'){ctx.fillStyle='#64748b';ctx.beginPath();ctx.ellipse(o.x+o.w/2,o.y+o.h/2,o.w/2,o.h/2,0,0,7);ctx.fill()}else if(o.t==='tree'){ctx.fillStyle='#14532d';ctx.beginPath();ctx.arc(o.x+o.w/2,o.y+o.h/2,Math.max(o.w,o.h)/2,0,7);ctx.fill();ctx.fillStyle='#713f12';ctx.fillRect(o.x+o.w/2-10,o.y+o.h/2,20,70)}else if(o.t==='firepit'){ctx.fillStyle='#57534e';ctx.beginPath();ctx.arc(o.x+o.w/2,o.y+o.h/2,45,0,7);ctx.fill();ctx.fillStyle='#f97316';ctx.beginPath();ctx.arc(o.x+o.w/2,o.y+o.h/2,22,0,7);ctx.fill()}else{fillRound(o.x,o.y,o.w,o.h,14,'#475569')}}}function drawTracks(){ctx.globalAlpha=.22;ctx.fillStyle='#111827';state.tireTracks.forEach(p=>{ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.a+Math.PI/2);ctx.fillRect(-41,35,10,28);ctx.fillRect(31,35,10,28);ctx.restore()});ctx.globalAlpha=1}function drawTrailer(){ctx.save();ctx.translate(trailer.x,trailer.y);ctx.rotate(trailer.a+Math.PI/2);ctx.shadowColor='rgba(0,0,0,.45)';ctx.shadowBlur=13;ctx.shadowOffsetY=8;fillRound(-46,-70,92,164,10,'#3b3f43');ctx.shadowBlur=0;if(mapType==='boat'){fillRound(-34,-88,68,160,22,'#f8fafc');fillRound(-24,-70,48,120,18,'#1d4ed8');ctx.fillStyle='#0f172a';ctx.fillRect(-14,76,28,42)}else{fillRound(-48,-90,96,178,14,'#e5e7eb');fillRound(-38,-76,76,40,10,'#94a3b8');ctx.fillStyle='#334155';ctx.fillRect(-34,-22,68,72);ctx.fillStyle='#fbbf24';ctx.fillRect(-40,70,80,12)}ctx.fillStyle='#111827';ctx.fillRect(-58,-28,12,36);ctx.fillRect(46,-28,12,36);ctx.res
