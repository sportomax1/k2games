<script>
(function(){
'use strict';

// ─── CANVAS SETUP ────────────────────────────────────────────────────────────
const cv = document.getElementById('gameCanvas');
const cx = cv.getContext('2d');
const W = 920, H = 570;
cv.width = W; cv.height = H;

function resize(){
    const mw = Math.min(window.innerWidth - 10, 920);
    const mh = window.innerHeight - 70;
    const sc = Math.min(mw/W, mh/H);
    cv.style.width  = (W*sc)+'px';
    cv.style.height = (H*sc)+'px';
}
window.addEventListener('resize', resize); resize();

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const GY      = 430;   // ground y
const FX      = 88;    // fence x (left field wall)
const WALL_Y  = 310;   // top of wall — ball above this clears fence
const BTR_X   = 795;   // batter x
const PCH_X   = 510;   // pitcher x
const TOTAL_PITCHES = 10;

// ─── GAME DATA ───────────────────────────────────────────────────────────────
const CHARS = [
    {id:0,name:'Mike Rodriguez',nick:'The Monster',clr:'#e74c3c',pw:9,ct:5,tm:6},
    {id:1,name:'Sarah Chen',nick:'Speedy',clr:'#3498db',pw:6,ct:9,tm:7},
    {id:2,name:'Billy Johnson',nick:'Blast',clr:'#f39c12',pw:8,ct:7,tm:6},
    {id:3,name:'Tanya Williams',nick:'Tornado',clr:'#9b59b6',pw:9,ct:6,tm:5},
    {id:4,name:"Kevin O'Brien",nick:'Clutch',clr:'#27ae60',pw:6,ct:7,tm:9},
    {id:5,name:'Lisa Park',nick:'Lightning',clr:'#1abc9c',pw:5,ct:10,tm:8},
    {id:6,name:'Danny Garcia',nick:'Dynamite',clr:'#e67e22',pw:10,ct:5,tm:5},
    {id:7,name:'Emma Thompson',nick:'Exact',clr:'#ec407a',pw:6,ct:8,tm:9},
    {id:8,name:'Carlos Martinez',nick:'Cannon',clr:'#ff5722',pw:8,ct:6,tm:7},
    {id:9,name:'Zoe Anderson',nick:'Zap',clr:'#00bcd4',pw:7,ct:7,tm:7}
];

const VENUES = [
    {id:0,name:'Backyard Park',desc:'Classic suburban yard',sky1:'#5BC8E8',sky2:'#87CEEB',gr1:'#4CAF50',gr2:'#388E3C',dirt:'#D2691E',wall:'#FFFFFF',fenceClr:'#8B4513',wallH:60,fX:90,cloud:true,night:false,star:false},
    {id:1,name:'City Rooftop',desc:'Urban sunset skyline',sky1:'#FF6B35',sky2:'#FF9A6C',gr1:'#607D8B',gr2:'#455A64',dirt:'#78909C',wall:'#263238',fenceClr:'#37474F',wallH:50,fX:95,cloud:false,night:false,star:false},
    {id:2,name:'Beach Blast',desc:'Sandy shores & waves',sky1:'#29B6F6',sky2:'#81D4FA',gr1:'#F9A825',gr2:'#F57F17',dirt:'#FFD54F',wall:'#FF7043',fenceClr:'#BF360C',wallH:55,fX:85,cloud:true,night:false,star:false},
    {id:3,name:'Forest Field',desc:'Deep in the woods',sky1:'#1B5E20',sky2:'#2E7D32',gr1:'#388E3C',gr2:'#2E7D32',dirt:'#4E342E',wall:'#1B0000',fenceClr:'#3E2723',wallH:85,fX:80,cloud:false,night:false,star:false},
    {id:4,name:'Night Stadium',desc:'Prime time under lights',sky1:'#0D0D2E',sky2:'#1A1A3E',gr1:'#1A4731',gr2:'#0D3020',dirt:'#37474F',wall:'#212121',fenceClr:'#000',wallH:60,fX:90,cloud:false,night:true,star:true}
];

const POWERUPS = [
    {id:'mega',name:'MEGA BAT',icon:'🏏',clr:'#FFD700',desc:'2× power next swing!',dur:1},
    {id:'slow',name:'SLOW PITCH',icon:'🐌',clr:'#00BCD4',desc:'3 slow pitches!',dur:3},
    {id:'acc', name:'ACCURACY+',icon:'🎯',clr:'#4CAF50',desc:'Bigger sweet spot!',dur:3},
    {id:'wind',name:'WIND BOOST',icon:'💨',clr:'#2196F3',desc:'Ball flies further!',dur:1},
    {id:'spin',name:'SUPER SPIN',icon:'🌀',clr:'#9C27B0',desc:'Wicked curve power!',dur:1},
    {id:'frz', name:'TIME FREEZE',icon:'❄️',clr:'#E91E63',desc:'Slow-mo pitch!',dur:1},
    {id:'gar', name:'HOMER MAGIC',icon:'⭐',clr:'#FF5722',desc:'Guaranteed HR!',dur:1}
];

const LINES = {
    intro:   ["Let's play BALL! ⚾","Batter up!","Play ball! Here we go!"],
    hr:      ["IT'S OUTTA HERE! 🔥","HOME RUN! WHAT A BLAST! 💥","SEE YA LATER! 🚀","MOONSHOT! Into orbit! 🌙","GOODBYE BASEBALL! ⭐","WOW — STILL GOING! 💨","CRUSHED IT! Off the charts!"],
    perfect: ["PERFECT TIMING! 🎯","FLAWLESS contact! Chef's kiss! 👨‍🍳","PICTURE-PERFECT swing!"],
    great:   ["GREAT contact! Crushed! 💪","That's hit HARD! 🔥","A ROCKET off the bat!"],
    good:    ["Good swing! Solid contact!","Nice hit! Well struck!","That one's got legs!"],
    foul:    ["Foul ball! Just missed it!","Off the foul line!","Barely caught it!"],
    miss:    ["SWING AND A MISS! 😬","He'll want that one back!","Caught looking! Strike!","Whiffed it! Nasty pitch!"],
    combo:   ["COMBO x2! On fire! 🔥","TRIPLE COMBO! Incredible! 💥","UNSTOPPABLE! Hat trick! 🏆","FOUR IN A ROW! LEGENDARY! 👑"],
    pu:      ["POWER UP collected! 🌟","BOOSTER activated! ⚡","SUPERCHARGED! 🚀"],
    end:     ["What a game! The fans go wild!","Outstanding performance! 🏆","One for the record books!","That's how you play Backyard Blast!"]
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let SCR = 'CHAR';  // CHAR | VENUE | PLAY | OVER
let selChar = -1, selVenue = -1;
let G = null;       // gameplay state

// Mouse / touch
const mouse = {x:0,y:0,down:false,clicked:false};
function getPos(e, r){
    const src = e.touches ? e.touches[0]||e.changedTouches[0] : e;
    return {x:(src.clientX-r.left)*(W/r.width), y:(src.clientY-r.top)*(H/r.height)};
}
cv.addEventListener('mousemove', e=>{const r=cv.getBoundingClientRect(),p=getPos(e,r);mouse.x=p.x;mouse.y=p.y;});
cv.addEventListener('mousedown', e=>{const r=cv.getBoundingClientRect(),p=getPos(e,r);mouse.x=p.x;mouse.y=p.y;mouse.down=true;});
cv.addEventListener('mouseup',   e=>{const r=cv.getBoundingClientRect(),p=getPos(e,r);mouse.x=p.x;mouse.y=p.y;mouse.clicked=true;});
cv.addEventListener('touchstart',e=>{e.preventDefault();const r=cv.getBoundingClientRect(),p=getPos(e,r);mouse.x=p.x;mouse.y=p.y;mouse.down=true;},{passive:false});
cv.addEventListener('touchend',  e=>{e.preventDefault();const r=cv.getBoundingClientRect(),p=getPos(e,r);mouse.x=p.x;mouse.y=p.y;mouse.clicked=true;},{passive:false});

// Keyboard
const keys = {};
document.addEventListener('keydown', e=>{
    const k = e.key.toLowerCase();
    if(keys[k]) return;
    keys[k] = true;
    if(SCR==='PLAY'&&G){
        if(k==='q') G.swType='contact';
        if(k==='w') G.swType='power';
        if(k==='e') G.swType='timing';
        if(k==='r') G.swType='late';
        if(k===' '||k==='enter'){e.preventDefault(); trySwing();}
    }
});
document.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()]=false; });

// ─── UTILITIES ───────────────────────────────────────────────────────────────
const rnd = (a,b)=>a+Math.random()*(b-a);
const pick = arr=>arr[Math.floor(Math.random()*arr.length)];
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
function lerp(a,b,t){return a+(b-a)*t;}
function inBox(mx,my,x,y,w,h){return mx>=x&&mx<=x+w&&my>=y&&my<=y+h;}
function roundRect(x,y,w,h,r){cx.beginPath();cx.roundRect(x,y,w,h,r);cx.closePath();}

// ─── DRAW HELPERS ────────────────────────────────────────────────────────────
function drawText(txt,x,y,{sz=16,col='#fff',al='left',bl='middle',bold=false,fnt='Arial',stk=false,stkCol='#000',stkW=3}={}){
    cx.font=`${bold?'bold ':''} ${sz}px ${fnt}`;
    cx.textAlign=al; cx.textBaseline=bl;
    if(stk){cx.strokeStyle=stkCol;cx.lineWidth=stkW;cx.strokeText(txt,x,y);}
    cx.fillStyle=col; cx.fillText(txt,x,y);
}

function drawBar(x,y,w,h,val,max,fg,bg='#333'){
    cx.fillStyle=bg; cx.fillRect(x,y,w,h);
    cx.fillStyle=fg; cx.fillRect(x,y,w*(val/max),h);
    cx.strokeStyle='rgba(255,255,255,0.3)'; cx.lineWidth=1; cx.strokeRect(x,y,w,h);
}

function btn(label,x,y,w,h,hov,col='#f39c12',textCol='#000'){
    cx.fillStyle = hov ? lightenHex(col,30) : col;
    roundRect(x,y,w,h,10); cx.fill();
    cx.strokeStyle='rgba(255,255,255,0.4)'; cx.lineWidth=2; roundRect(x,y,w,h,10); cx.stroke();
    drawText(label,x+w/2,y+h/2,{sz:Math.min(16,h*0.45),col:textCol,al:'center',bold:true,stk:true,stkCol:'rgba(0,0,0,0.4)',stkW:2});
}

function lightenHex(hex,amt){
    let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=clamp(r+amt,0,255);g=clamp(g+amt,0,255);b=clamp(b+amt,0,255);
    return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ─── PARTICLES ───────────────────────────────────────────────────────────────
let parts = [];

function addParts(x,y,n,sMin,sMax,cols,life=40,grav=0.2,sz=5){
    for(let i=0;i<n;i++){
        const ang=Math.random()*Math.PI*2, sp=rnd(sMin,sMax);
        parts.push({x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,life,maxLife:life,sz:rnd(2,sz),col:pick(cols),grav,type:'dot'});
    }
}

function addText3D(txt,x,y,col){
    parts.push({type:'txt',txt,x,y,vy:-2,life:90,maxLife:90,col,sz:28});
}

function addShockwave(x,y){
    parts.push({type:'wave',x,y,r:5,maxR:60,life:25,maxLife:25});
}

function addHRBoom(x,y){
    addParts(x,y,35,3,14,['#FFD700','#FF4500','#FF8C00','#FFFF00','#FFA500'],70,0.2,10);
    addParts(x,y,20,1,6,['#FFFFFF','#FFE4B5'],45,0.3,5);
    for(let i=0;i<10;i++){const a=(i/10)*Math.PI*2,sp=10+rnd(0,4);parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:55,maxLife:55,sz:7,col:'#FFD700',grav:0.15,type:'dot'});}
    addShockwave(x,y);
    addText3D('HOME RUN! 🔥',x,y-20,'#FFD700');
}

function addHitSpark(x,y){
    addParts(x,y,15,2,9,['#FFF','#FFD700','#FF8C00'],35,0.4,6);
    addShockwave(x,y);
}

function addDust(x,y){
    addParts(x,y,10,0.5,3,['#D2B48C','#C4A882','#E0C090'],28,-0.08,5);
}

function addStars(x,y){
    addParts(x,y,12,2,7,['#FFD700','#FFFACD','#FFF8DC'],50,0.1,6);
}

function tickParts(){
    parts=parts.filter(p=>{
        if(p.type==='dot'){p.x+=p.vx;p.y+=p.vy;p.vy+=p.grav;p.vx*=0.97;p.life--;return p.life>0;}
        if(p.type==='txt'){p.y+=p.vy;p.vy*=0.96;p.life--;return p.life>0;}
        if(p.type==='wave'){p.r=lerp(p.r,p.maxR,0.25);p.life--;return p.life>0;}
        return false;
    });
}

function drawParts(){
    parts.forEach(p=>{
        const t=p.life/p.maxLife;
        cx.globalAlpha=t;
        if(p.type==='dot'){
            cx.fillStyle=p.col;
            cx.beginPath();cx.arc(p.x,p.y,p.sz*lerp(0.4,1,t),0,Math.PI*2);cx.fill();
        } else if(p.type==='txt'){
            drawText(p.txt,p.x,p.y,{sz:p.sz*lerp(0.7,1,t),col:p.col,al:'center',bold:true,stk:true,stkW:4});
        } else if(p.type==='wave'){
            cx.strokeStyle='#FFD700';cx.lineWidth=3*(t);
            cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.stroke();
        }
        cx.globalAlpha=1;
    });
}

// ─── COMMENTARY ──────────────────────────────────────────────────────────────
let comText='', comTimer=0;
function say(text){comText=text;comTimer=220;}

// ─── FIELD DRAWING ───────────────────────────────────────────────────────────
function drawField(v, frame){
    // Sky
    const skyG=cx.createLinearGradient(0,0,0,310);
    skyG.addColorStop(0,v.sky1); skyG.addColorStop(1,v.sky2);
    cx.fillStyle=skyG; cx.fillRect(0,0,W,310);

    // Stars (night)
    if(v.star){
        cx.fillStyle='rgba(255,255,255,0.8)';
        for(let i=0;i<60;i++){
            const sx=((i*137+73)%W), sy=((i*97+41)%260);
            const blink=Math.sin(frame*0.05+i)*0.4+0.6;
            cx.globalAlpha=blink*0.9;
            cx.fillRect(sx,sy,1.5,1.5);
        }
        cx.globalAlpha=1;
        // Stadium lights
        const lights=[{x:100,y:80},{x:250,y:60},{x:670,y:60},{x:820,y:80}];
        lights.forEach(l=>{
            const g=cx.createRadialGradient(l.x,l.y,2,l.x,l.y+60,90);
            g.addColorStop(0,'rgba(255,255,200,0.35)'); g.addColorStop(1,'transparent');
            cx.fillStyle=g; cx.fillRect(l.x-90,l.y,180,160);
            cx.fillStyle='#FFFACD'; cx.beginPath();cx.arc(l.x,l.y,7,0,Math.PI*2);cx.fill();
            cx.strokeStyle='#888';cx.lineWidth=3;cx.beginPath();cx.moveTo(l.x,l.y);cx.lineTo(l.x,GY);cx.stroke();
        });
    }

    // Clouds
    if(v.cloud){
        const cloudOff=(frame*0.2)%300;
        [[100,90,60],[300+cloudOff,70,50],[600,100,70]].forEach(([cx2,cy2,sz])=>{
            cx.fillStyle='rgba(255,255,255,0.7)';
            cx.beginPath();cx.ellipse(cx2,cy2,sz,sz*0.6,0,0,Math.PI*2);cx.fill();
            cx.beginPath();cx.ellipse(cx2+sz*0.5,cy2+5,sz*0.7,sz*0.5,0,0,Math.PI*2);cx.fill();
            cx.beginPath();cx.ellipse(cx2-sz*0.4,cy2+5,sz*0.6,sz*0.45,0,0,Math.PI*2);cx.fill();
        });
    }

    // City skyline for rooftop
    if(v.id===1){
        cx.fillStyle='#1a2638';
        const blds=[[50,200,60,130],[130,210,50,120],[200,190,70,140],[300,220,40,110],[380,200,55,130],[470,215,45,115],[560,195,65,135],[660,205,50,125],[740,190,60,140],[830,200,55,130]];
        blds.forEach(([bx,by,bw,bh])=>{cx.fillRect(bx,by,bw,bh);});
        // Windows
        cx.fillStyle='rgba(255,240,150,0.6)';
        blds.forEach(([bx,by,bw,bh])=>{
            for(let wr=0;wr<Math.floor(bh/20);wr++) for(let wc=0;wc<Math.floor(bw/18);wc++){
                if(Math.random()<0.6) cx.fillRect(bx+6+wc*18,by+8+wr*20,8,12);
            }
        });
    }

    // Beach waves
    if(v.id===2){
        for(let wi=0;wi<3;wi++){
            const waveY=260+wi*20;
            const woff=(frame*0.8+wi*40)%100;
            cx.strokeStyle=`rgba(255,255,255,${0.3-wi*0.05})`; cx.lineWidth=2;
            cx.beginPath();
            for(let wx=0;wx<W;wx+=5) cx.lineTo(wx,waveY+Math.sin((wx+woff)*0.05)*6);
            cx.stroke();
        }
    }

    // Forest trees
    if(v.id===3){
        const trees=[[30,280,25,90],[55,270,20,80],[620,275,22,85],[660,268,18,78],[700,272,24,88],[740,265,20,82],[800,270,22,84],[860,275,18,75]];
        trees.forEach(([tx,ty,tw,th])=>{
            cx.fillStyle='#1A4726'; cx.beginPath();
            cx.moveTo(tx,ty); cx.lineTo(tx-tw,ty+th); cx.lineTo(tx+tw,ty+th); cx.closePath(); cx.fill();
            cx.fillStyle='#0D3015'; cx.beginPath();
            cx.moveTo(tx,ty+th*0.3); cx.lineTo(tx-tw*0.8,ty+th); cx.lineTo(tx+tw*0.8,ty+th); cx.closePath(); cx.fill();
        });
    }

    // Outfield grass (deep)
    const grassG=cx.createLinearGradient(0,310,0,GY);
    grassG.addColorStop(0,v.gr1); grassG.addColorStop(1,v.gr2);
    cx.fillStyle=grassG; cx.fillRect(0,310,W,GY-310);

    // Grass stripes
    cx.fillStyle='rgba(0,0,0,0.06)';
    for(let s=0;s<8;s++) cx.fillRect(0+s*(W/8),310,(W/16),GY-310);

    // Warning track
    cx.fillStyle='rgba(139,90,43,0.5)';
    cx.fillRect(FX-5,310,65,GY-310);

    // Dirt infield area near home plate
    const dirtG=cx.createRadialGradient(BTR_X,GY,0,BTR_X,GY,200);
    dirtG.addColorStop(0,v.dirt+'CC'); dirtG.addColorStop(1,'transparent');
    cx.fillStyle=dirtG; cx.fillRect(BTR_X-200,310,260,GY-310);

    // Home plate
    cx.fillStyle='#EEEEEE';
    cx.beginPath();
    cx.moveTo(BTR_X-10,GY-2); cx.lineTo(BTR_X+10,GY-2); cx.lineTo(BTR_X+10,GY+4); cx.lineTo(BTR_X,GY+8); cx.lineTo(BTR_X-10,GY+4); cx.closePath(); cx.fill();

    // Pitcher mound
    cx.fillStyle=v.dirt+'99';
    cx.beginPath();cx.ellipse(PCH_X,GY-2,35,12,0,0,Math.PI*2);cx.fill();

    // Ground line
    cx.fillStyle=v.gr2;cx.fillRect(0,GY,W,H-GY);

    // Left field wall
    cx.fillStyle=v.wall;
    cx.fillRect(FX-5, WALL_Y+2, 18, GY-WALL_Y-2);
    cx.fillStyle=v.fenceClr;
    cx.fillRect(FX-5, WALL_Y, 18, 10);

    // Fence distance marker
    drawText('310 ft',FX+20,WALL_Y+20,{sz:10,col:'rgba(255,255,255,0.6)',al:'left'});

    // Foul lines
    cx.strokeStyle='rgba(255,255,255,0.4)'; cx.lineWidth=1.5;
    cx.setLineDash([6,4]);
    cx.beginPath();cx.moveTo(BTR_X-10,GY);cx.lineTo(FX,WALL_Y+8);cx.stroke();
    cx.beginPath();cx.moveTo(BTR_X+10,GY);cx.lineTo(W,GY-60);cx.stroke();
    cx.setLineDash([]);
}

// ─── CHARACTER DRAWING ───────────────────────────────────────────────────────
function drawBatter(x, y, clr, swingFrame, idle){
    const sw = swingFrame; // 0=idle,1-15=swing anim
    const bob = idle ? Math.sin(Date.now()*0.003)*2 : 0;
    const headY = y-58+bob;

    cx.strokeStyle = '#333'; cx.lineWidth = 2;
    // Helmet
    cx.fillStyle = clr;
    cx.beginPath();cx.arc(x,headY-2,13,0,Math.PI*2);cx.fill();
    cx.fillStyle='#222';cx.beginPath();cx.arc(x-4,headY+2,7,0,Math.PI*2);cx.fill();
    // Face
    cx.fillStyle='#FDBCB4';cx.beginPath();cx.arc(x+2,headY,9,0,Math.PI*2);cx.fill();
    // Body
    cx.fillStyle=clr;
    cx.fillRect(x-9,headY+12,18,28);
    // Legs
    cx.fillStyle='#3d3d3d';
    cx.fillRect(x-9,headY+38,8,22+bob);
    cx.fillRect(x+1,headY+38,8,22-bob);
    // Shoes
    cx.fillStyle='#111';
    cx.fillRect(x-12,headY+58,14,5);
    cx.fillRect(x+1,headY+58,12,5);

    // Bat and arms
    const batAngle = sw>0 ? lerp(-2.2,-0.4,clamp(sw/12,0,1)) : -2.0;
    const armAngle = sw>0 ? lerp(-1.8,-0.2,clamp(sw/12,0,1)) : -1.7;
    cx.save();
    cx.translate(x-5, headY+18);
    cx.rotate(armAngle);
    // Arms
    cx.strokeStyle=clr; cx.lineWidth=7;
    cx.beginPath();cx.moveTo(0,0);cx.lineTo(12,12);cx.stroke();
    // Bat
    cx.strokeStyle='#8B4513'; cx.lineWidth=5;
    cx.beginPath();cx.moveTo(12,12);cx.lineTo(12+Math.cos(batAngle)*38,12+Math.sin(batAngle)*38);cx.stroke();
    cx.fillStyle='#A0522D';
    cx.beginPath();cx.arc(12+Math.cos(batAngle)*38,12+Math.sin(batAngle)*38,7,0,Math.PI*2);cx.fill();
    cx.restore();
}

function drawPitcher(x, y, clr, phase, pTimer){
    const bob = Math.sin(Date.now()*0.003)*1.5;
    const windupOff = phase==='WINDUP' ? Math.sin((60-pTimer)/60*Math.PI)*8 : 0;
    const headY = y-55+bob;

    cx.strokeStyle='#333';cx.lineWidth=2;
    cx.fillStyle=clr;
    cx.beginPath();cx.arc(x,headY,11,0,Math.PI*2);cx.fill();
    cx.fillStyle='#FDBCB4';cx.beginPath();cx.arc(x+2,headY+1,8,0,Math.PI*2);cx.fill();
    // Body
    cx.fillStyle=clr;cx.fillRect(x-8,headY+12,16,24);
    // Legs
    cx.fillStyle='#3d3d3d';cx.fillRect(x-8,headY+34,7,20);cx.fillRect(x+1,headY+34,7,20);
    cx.fillStyle='#111';cx.fillRect(x-10,headY+52,12,5);cx.fillRect(x+1,headY+52,10,5);
    // Pitching arm
    const armY = headY+16+windupOff;
    cx.strokeStyle=clr;cx.lineWidth=6;
    if(phase==='PITCH'||phase==='WINDUP'){
        const throwRot = phase==='PITCH' ? lerp(-Math.PI*0.7,0.3,clamp((60-pTimer)/60,0,1)) : -Math.PI*0.6;
        cx.save();cx.translate(x+8,armY);cx.rotate(throwRot);
        cx.beginPath();cx.moveTo(0,0);cx.lineTo(18,0);cx.stroke();cx.restore();
    } else {
        cx.beginPath();cx.moveTo(x+8,armY);cx.lineTo(x+24,armY+14);cx.stroke();
    }
}

// ─── INIT GAME ────────────────────────────────────────────────────────────────
function initGame(ci, vi){

        char:CHARS[ci], venue:VENUES[vi],

        // ball
        bx:PCH_X, by:GY-35, bvx:0, bvy:0, bVis:false,
        trail:[],
        // phase
        phase:'IDLE', pTimer:0, // IDLE|WINDUP|PITCH|HIT|FLIGHT|RESULT|HR
        swingFrame:0,
        hrDetected:false, landHandled:false,
        pitchTargetY:GY-38,
        pitchSpeed:4.5,
        isFoul:false,
        // power-ups
        pu:null, puTimer:0,
        fieldPU:null, fpuX:300, fpuY:GY-15, fpuBob:0, fpuTimer:0,
        // results
        lastQual:'', lastDist:0, longestHR:0,
        distances:[], allHits:[], lastPts:0,
        // animation

    };

    say(pick(LINES.intro));
    setTimeout(()=>startPitch(),600);

// ─── PITCH LOGIC ─────────────────────────────────────────────────────────────
function startPitch(){
    if(!G||SCR!=='PLAY') return;
    G.bx=PCH_X; G.by=GY-35;
    G.bvx=0; G.bvy=0;
    G.bVis=true;
    G.trail=[];
    G.swingFrame=0;
    G.hrDetected=false;
    G.landHandled=false;
    G.isFoul=false;
    G.phase='WINDUP';
    G.pTimer=50;

    const staminaFactor = G.stamina/100;
    G.pitchSpeed = (3.8 + staminaFactor*1.2) * (G.pu==='slow'?0.45 : G.pu==='frz'?0.38 : 1);
    const wobble = (100-G.focus)/100*18;
    G.pitchTargetY = GY-36+rnd(-wobble,wobble);

    // Pitcher stamina + focus drain
    G.stamina = Math.max(0, G.stamina - rnd(4,9));
    G.focus   = Math.max(0, G.focus   - rnd(1,6));

    // Maybe spawn field power-up
    if(!G.fieldPU && Math.random()<0.28){
        G.fieldPU = POWERUPS[Math.floor(Math.random()*POWERUPS.length)];
        G.fpuX = rnd(160,620);
        G.fpuY = GY-18;
        G.fpuTimer = 320;
    }
}

function trySwing(){
    if(!G||G.phase!=='PITCH') return;
    doSwing();
}

function doSwing(){
    const ball = {x:G.bx, y:G.by};
    const sw = G.swType;
    const windows={contact:42,power:26,timing:34,late:40};
    const idealX = sw==='late' ? 748 : 762;
    const win = windows[sw] * (G.pu==='acc'?1.55:1);
    const diff = Math.abs(ball.x - idealX);

    let qual;
    if(G.pu==='gar') { qual='perfect'; }
    else if(diff<=9)        qual='perfect';
    else if(diff<=20)       qual='great';
    else if(diff<=win)      qual='good';
    else if(diff<=win+18)   qual='foul';
    else                    qual='miss';

    G.lastQual=qual;
    G.swingFrame=1;

    if(qual==='miss'){
        say(pick(LINES.miss));
        G.combo=0; G.mult=Math.max(1,G.mult-0.5);
        addDust(ball.x,ball.y);
        G.phase='RESULT';
        setTimeout(nextPitch,1600);
        return;
    }
    if(qual==='foul'){
        say(pick(LINES.foul));
        G.bvx=rnd(4,7); G.bvy=rnd(-6,-3);
        G.phase='FLIGHT'; G.isFoul=true;
        setTimeout(nextPitch,1600);
        return;
    }

    // Hit!
    const qm={perfect:1.0,great:0.82,good:0.64}[qual];
    const ch=G.char;
    let charB, angBase;
    if(sw==='power')  {charB=(ch.pw*1.6+ch.ct*0.4)/20; angBase=42;}
    else if(sw==='contact'){charB=(ch.ct*1.6+ch.pw*0.4)/20; angBase=38;}
    else if(sw==='timing'){charB=(ch.tm*1.5+ch.pw*0.5)/20; angBase=44;}
    else              {charB=(ch.ct+ch.pw+ch.tm)/30;    angBase=50;}

    let spd=26*qm*charB;
    if(G.pu==='mega')  spd*=2.1;
    if(G.pu==='wind')  spd*=1.35;
    if(G.pu==='spin')  spd*=1.25;
    if(G.pu==='gar')   spd=22;
    if(sw==='timing'&&qual==='perfect') spd*=1.3;

    const ang=(angBase+rnd(-10,10))*Math.PI/180;
    G.bvx=-Math.cos(ang)*spd;
    G.bvy=-Math.sin(ang)*spd;
    G.phase='FLIGHT';

    if(qual==='perfect') say(pick(LINES.perfect));
    else if(qual==='great') say(pick(LINES.great));
    else say(pick(LINES.good));

    addHitSpark(ball.x,ball.y);

    // Collect field PU on good hit
    if(G.fieldPU && Math.abs(G.bx-G.fpuX)<80) collectPU();
}

function collectPU(){
    if(!G.fieldPU) return;
    const pu=G.fieldPU;
    G.pu=pu.id;
    G.puTimer=pu.dur;
    G.fieldPU=null;
    say(pick(LINES.pu)+' '+pu.name+'!');
    addStars(G.fpuX,G.fpuY);
}

function nextPitch(){
    if(!G||SCR!=='PLAY') return;
    G.pitchesLeft--;
    G.swingFrame=0;
    G.bVis=false;
    G.trail=[];
    G.phase='IDLE';

    // Decrement active PU
    if(G.pu){
        G.puTimer--;
        if(G.puTimer<=0) G.pu=null;
    }

    if(G.pitchesLeft<=0){
        G.bVis=false;
        setTimeout(()=>{SCR='OVER';say(pick(LINES.end));},800);
        return;
    }
    setTimeout(startPitch,900);
}

function scoreHR(dist){
    G.hrs++;
    G.combo++;
    if(G.combo>=4)     G.mult=Math.min(5,G.mult+0.5);
    else if(G.combo>=3) G.mult=Math.min(4,G.mult+0.5);
    else if(G.combo>=2) G.mult=Math.min(3,G.mult+0.5);

    if(G.combo>=2) say(LINES.combo[Math.min(G.combo-2,LINES.combo.length-1)]);
    else           say(pick(LINES.hr));

    const base=100+Math.round((dist-200)*0.6);
    const pts=Math.round(Math.max(80,base)*G.mult);
    G.score+=pts;
    G.lastPts=pts;
    G.lastDist=dist;
    G.allHits.push({dist,pts});
    if(dist>G.longestHR) G.longestHR=dist;

    addHRBoom(G.bx, G.by);
    G.phase='HR';
    setTimeout(nextPitch, 2800);
}

// ─── GAME UPDATE ─────────────────────────────────────────────────────────────
function update(){
    if(SCR!=='PLAY'||!G) return;
    G.frame++;

    // Phase timer
    if(G.pTimer>0) G.pTimer--;

    // Swing anim
    if(G.swingFrame>0&&G.swingFrame<20) G.swingFrame++;

    // Field power-up bob + auto-expire
    if(G.fieldPU){
        G.fpuBob=Math.sin(G.frame*0.08)*5;
        G.fpuTimer--;
        if(G.fpuTimer<=0) G.fieldPU=null;
    }

    // WINDUP → PITCH
    if(G.phase==='WINDUP'&&G.pTimer===0){
        G.phase='PITCH';
    }

    // Ball movement
    if(G.phase==='PITCH'){
        G.bx+=G.pitchSpeed;
        const prog=clamp((G.bx-PCH_X)/(BTR_X-PCH_X),0,1);
        G.by=G.pitchTargetY+Math.sin(prog*Math.PI)*(-14);
        G.trail.push({x:G.bx,y:G.by});
        if(G.trail.length>12) G.trail.shift();

        // Auto-miss if ball passes batter
        if(G.bx>BTR_X+40&&G.phase==='PITCH'){
            G.lastQual='miss';
            say(pick(LINES.miss));
            G.combo=0; G.mult=Math.max(1,G.mult-0.5);
            G.phase='RESULT';
            setTimeout(nextPitch,1600);
        }

        // Click/tap swing detection on canvas (during pitch)
        if(mouse.clicked){
            const r=cv.getBoundingClientRect();
            // SWING! button occupies x:395-560, y:518-558 (matches sbx/sby/sbw/sbh below)
            const SWING_BTN={x:360,y:510,w:200,h:45};
            if(inBox(mouse.x,mouse.y,SWING_BTN.x,SWING_BTN.y,SWING_BTN.w,SWING_BTN.h)){
                doSwing();
            }
        }
    }

    if(G.phase==='FLIGHT'){
        G.bx+=G.bvx; G.by+=G.bvy;
        G.bvy+=0.42;
        G.bvx*=0.999;
        G.trail.push({x:G.bx,y:G.by});
        if(G.trail.length>22) G.trail.shift();

        // HR check
        if(!G.hrDetected&&G.bx<FX&&G.by<WALL_Y){
            G.hrDetected=true;
            const a2=0.21, b2=G.bvy, c2=G.by-GY;
            const disc=b2*b2-4*a2*c2;
            const t2=disc>=0?(-b2+Math.sqrt(disc))/(2*a2):0;
            const landX=G.bx+G.bvx*t2;
            const distPx=BTR_X-Math.min(landX,BTR_X-50);
            const distFt=Math.round(220+distPx*0.38);
            scoreHR(clamp(distFt,220,600));
        }

        // Ball lands
        if(!G.hrDetected&&G.by>=GY&&!G.landHandled){
            G.landHandled=true;
            addDust(G.bx,G.by);
            G.phase='RESULT';
            setTimeout(nextPitch,1500);
        }

        // Ball off screen right (foul or crazy hit)
        if(G.bx>W+80||G.by>H+40){
            G.phase='RESULT';
            setTimeout(nextPitch,1200);
        }
    }

    // Combo decay
    if(G.phase==='RESULT'&&G.lastQual==='miss'){
        G.combo=0;
    }

    tickParts();
    if(comTimer>0) comTimer--;

    // Clear click
    mouse.clicked=false;
}

// ─── GAMEPLAY RENDER ──────────────────────────────────────────────────────────
function drawGameplay(){
    const v=G.venue, ch=G.char;

    // Field
    drawField(v, G.frame);

    // Field power-up
    if(G.fieldPU){
        const px=G.fpuX, py=G.fpuY+G.fpuBob;
        const pu=G.fieldPU;
        // Glow
        const grd=cx.createRadialGradient(px,py,2,px,py,28);
        grd.addColorStop(0,pu.clr+'88'); grd.addColorStop(1,'transparent');
        cx.fillStyle=grd; cx.beginPath();cx.arc(px,py,28,0,Math.PI*2);cx.fill();
        // Circle
        cx.fillStyle=pu.clr;
        cx.beginPath();cx.arc(px,py,18,0,Math.PI*2);cx.fill();
        cx.strokeStyle='#fff';cx.lineWidth=2;cx.stroke();
        drawText(pu.icon,px,py,{sz:18,al:'center',bl:'middle'});
        drawText(pu.name,px,py-28,{sz:9,col:'#fff',al:'center',bold:true,stk:true,stkW:2});
        // Timer bar
        const ratio=G.fpuTimer/320;
        cx.fillStyle='rgba(0,0,0,0.4)';cx.fillRect(px-22,py+22,44,5);
        cx.fillStyle=pu.clr;cx.fillRect(px-22,py+22,44*ratio,5);
    }

    // Pitcher
    drawPitcher(PCH_X, GY, CHARS[1].clr, G.phase, G.pTimer);

    // Ball trail
    if(G.bVis&&G.trail.length>1){
        G.trail.forEach((p,i)=>{
            const t=i/G.trail.length;
            cx.globalAlpha=t*0.5;
            cx.fillStyle=G.pu==='frz'?'#E91E63':G.pu==='spin'?'#9C27B0':'#FFFFFF';
            cx.beginPath();cx.arc(p.x,p.y,5*t,0,Math.PI*2);cx.fill();
        });
        cx.globalAlpha=1;
    }

    // Ball
    if(G.bVis){
        const bclr=G.pu==='mega'?'#FFD700':G.pu==='frz'?'#E0F7FA':'#FFFFFF';
        const brad=G.pu==='mega'?11:8;
        cx.fillStyle=bclr;
        cx.beginPath();cx.arc(G.bx,G.by,brad,0,Math.PI*2);cx.fill();
        cx.strokeStyle='#333';cx.lineWidth=1.5;cx.stroke();
        // Seams
        cx.strokeStyle='rgba(200,0,0,0.7)';cx.lineWidth=1;
        cx.beginPath();cx.arc(G.bx,G.by,brad,0.3,1.2);cx.stroke();
        cx.beginPath();cx.arc(G.bx,G.by,brad,3.4,4.3);cx.stroke();
    }

    // Batter
    drawBatter(BTR_X, GY, ch.clr, G.swingFrame, G.phase==='IDLE');

    // Swing zone indicator (during pitch)
    if(G.phase==='PITCH'){
        const wins={contact:42,power:26,timing:34,late:40};
        const idealX=G.swType==='late'?748:762;
        const win=(wins[G.swType]||34)*(G.pu==='acc'?1.55:1);
        const bDiff=G.bx>0?Math.abs(G.bx-idealX):999;
        let zoneAlpha=bDiff<80?0.18+0.3*(1-bDiff/80):0.08;
        if(G.pu==='frz') zoneAlpha*=1.5;
        const zCol=bDiff<win?'#00FF80':bDiff<win+25?'#FFFF00':'#FF4444';
        cx.fillStyle=zCol;cx.globalAlpha=zoneAlpha;
        cx.beginPath();cx.ellipse(idealX,GY-35,win,30,0,0,Math.PI*2);cx.fill();
        cx.globalAlpha=1;
        cx.strokeStyle=zCol;cx.lineWidth=1.5;cx.globalAlpha=0.5;
        cx.beginPath();cx.ellipse(idealX,GY-35,win,30,0,0,Math.PI*2);cx.stroke();
        cx.globalAlpha=1;
        if(bDiff<win) drawText('SWING!',idealX,GY-80,{sz:16,col:'#00FF80',al:'center',bold:true,stk:true,stkW:3,stkCol:'#004400'});
    }

    // Particles
    drawParts();

    // ─ HUD ─────────────────────────────────────────────────────────────────
    // Top bar
    cx.fillStyle='rgba(0,0,0,0.72)'; cx.fillRect(0,0,W,50);

    // Score
    drawText('SCORE',12,12,{sz:10,col:'#aaa'});
    drawText(G.score.toLocaleString(),12,32,{sz:22,col:'#FFD700',bold:true,stk:true,stkW:2,stkCol:'#000'});

    // HRs
    drawText('HOME RUNS',130,12,{sz:10,col:'#aaa'});
    drawText('⚾ '+G.hrs+' / '+TOTAL_PITCHES,130,32,{sz:18,col:'#FF6B35',bold:true});

    // Multiplier
    drawText('MULTIPLIER',280,12,{sz:10,col:'#aaa'});
    const multStr='×'+G.mult.toFixed(1);
    cx.fillStyle=G.mult>=3?'#FF4500':G.mult>=2?'#FFD700':'#fff';
    cx.font='bold 20px Arial'; cx.textAlign='left'; cx.textBaseline='middle';
    cx.fillText(multStr,280,32);

    // Combo flames
    if(G.combo>=2){
        const flames='🔥'.repeat(Math.min(G.combo,5));
        drawText(flames,380,31,{sz:16,al:'left'});
    }

    // Pitches left
    drawText('PITCHES',W-120,12,{sz:10,col:'#aaa'});
    for(let p=0;p<TOTAL_PITCHES;p++){
        const filled=p<(TOTAL_PITCHES-G.pitchesLeft);
        cx.fillStyle=filled?'#555':'#FFD700';
        cx.beginPath();cx.arc(W-115+p*13,32,5,0,Math.PI*2);cx.fill();
    }

    // ─ Left panel: Pitcher meters ───────────────────────────────────────────
    cx.fillStyle='rgba(0,0,0,0.65)'; roundRect(8,55,130,62,8); cx.fill();
    drawText('PITCHER',12,65,{sz:9,col:'#aaa',bold:true});
    drawText('STAMINA',12,79,{sz:9,col:'#aaa'});
    const sCol=G.stamina>50?'#4CAF50':G.stamina>25?'#FFC107':'#F44336';
    drawBar(60,74,72,8,G.stamina,100,sCol);
    drawText('FOCUS',12,95,{sz:9,col:'#aaa'});
    const fCol=G.focus>50?'#2196F3':G.focus>25?'#9C27B0':'#F44336';
    drawBar(60,90,72,8,G.focus,100,fCol);
    drawText(Math.round(G.stamina)+'%',134,79,{sz:8,col:sCol});
    drawText(Math.round(G.focus)+'%',134,95,{sz:8,col:fCol});

    // Low stamina warning
    if(G.stamina<30){
        const warn=Math.sin(G.frame*0.18)>0?'TIRED PITCHER! ':'';
        drawText(warn,12,108,{sz:9,col:'#FFC107',bold:true});
    }

    // ─ Active power-up HUD ─────────────────────────────────────────────────
    if(G.pu){
        const pup=POWERUPS.find(p=>p.id===G.pu);
        cx.fillStyle='rgba(0,0,0,0.72)'; roundRect(W-160,55,152,55,8); cx.fill();
        cx.strokeStyle=pup.clr; cx.lineWidth=2; roundRect(W-160,55,152,55,8); cx.stroke();
        drawText('ACTIVE:',W-156,68,{sz:9,col:'#aaa'});
        drawText(pup.icon+' '+pup.name,W-130,68,{sz:11,col:pup.clr,bold:true});
        drawText(pup.desc,W-156,84,{sz:9,col:'#ddd'});
        const barW=140, ratio=G.puTimer/(pup.dur>1?pup.dur:1)*0.5+0.5;
        drawBar(W-156,95,barW,6,G.puTimer,Math.max(1,pup.dur),pup.clr);
    }

    // ─ Bottom HUD ──────────────────────────────────────────────────────────
    cx.fillStyle='rgba(0,0,0,0.75)'; cx.fillRect(0,H-60,W,60);

    // Swing type buttons
    const swBtns=[['Q','contact','Contact','#27ae60'],['W','power','Power','#e74c3c'],['E','timing','Timing','#3498db'],['R','late','Late','#9b59b6']];
    swBtns.forEach(([key,id,lbl,col],i)=>{
        const bx=12+i*95, by=H-52, bw=88, bh=42;
        const sel=G.swType===id;
        const hov=inBox(mouse.x,mouse.y,bx,by,bw,bh);
        cx.fillStyle=sel?(col+'EE'):(hov?col+'88':'rgba(40,40,60,0.9)');
        roundRect(bx,by,bw,bh,8); cx.fill();
        cx.strokeStyle=sel?'#FFD700':(hov?col:'rgba(255,255,255,0.2)');
        cx.lineWidth=sel?3:1.5; roundRect(bx,by,bw,bh,8); cx.stroke();
        drawText('['+key+']',bx+bw/2,by+14,{sz:10,col:sel?'#FFD700':'#aaa',al:'center',bold:true});
        drawText(lbl,bx+bw/2,by+28,{sz:13,col:'#fff',al:'center',bold:true});
        if(mouse.clicked&&hov){ G.swType=id; mouse.clicked=false; }
    });

    // SWING button (big)
    const sbx=395, sby=H-52, sbw=165, sbh=42;
    const swingPhase=G.phase==='PITCH';
    const sHov=inBox(mouse.x,mouse.y,sbx,sby,sbw,sbh);
    const swingPulse=swingPhase?(Math.sin(G.frame*0.25)*0.15+0.85):1;
    cx.globalAlpha=swingPhase?swingPulse:0.5;
    cx.fillStyle=swingPhase?(sHov?'#FFD700':'#f39c12'):'#555';
    roundRect(sbx,sby,sbw,sbh,10); cx.fill();
    cx.strokeStyle=swingPhase?'rgba(255,255,255,0.6)':'rgba(255,255,255,0.15)';
    cx.lineWidth=2; roundRect(sbx,sby,sbw,sbh,10); cx.stroke();
    cx.globalAlpha=1;
    drawText(swingPhase?'⚾  SWING! [SPACE]':'Wait for pitch...',sbx+sbw/2,sby+sbh/2,{sz:14,col:swingPhase?'#000':'#666',al:'center',bold:true});

    if(mouse.clicked&&sHov&&swingPhase){ doSwing(); mouse.clicked=false; }

    // Last HR distance display
    if(G.phase==='HR'&&G.lastDist>0){
        const dtxt=G.lastDist+' ft!';
        drawText(dtxt, W/2, H/2-30, {sz:36,col:'#FFD700',al:'center',bold:true,stk:true,stkW:5,stkCol:'#8B0000'});
        drawText('+'+G.lastPts+' pts ×'+G.mult.toFixed(1),W/2,H/2+10,{sz:20,col:'#fff',al:'center',bold:true,stk:true,stkW:3,stkCol:'#333'});
    }

    // Commentary
    if(comTimer>0){
        const alpha=Math.min(1,comTimer/30);
        cx.globalAlpha=alpha;
        cx.fillStyle='rgba(0,0,0,0.6)';
        roundRect(W/2-220,H-108,440,34,8); cx.fill();
        drawText('▶ '+comText,W/2,H-91,{sz:14,col:'#FFD700',al:'center',bold:true,stk:true,stkW:2,stkCol:'#000'});
        cx.globalAlpha=1;
    }

    // Pitch info during flight
    if(G.phase==='RESULT'&&G.lastQual==='miss'){
        drawText('STRIKE!',BTR_X,GY-80,{sz:24,col:'#FF4444',al:'center',bold:true,stk:true,stkW:3,stkCol:'#000'});
    }
    if(G.phase==='RESULT'&&G.lastQual==='foul'){
        drawText('FOUL BALL!',BTR_X-60,GY-80,{sz:22,col:'#FFA500',al:'center',bold:true,stk:true,stkW:3,stkCol:'#000'});
    }

    // Windup indicator
    if(G.phase==='WINDUP'){
        const wProgress=1-(G.pTimer/50);
        drawText('Pitcher winding up...',PCH_X,GY-90,{sz:13,col:'#aaa',al:'center'});
        cx.fillStyle='rgba(0,0,0,0.4)';cx.fillRect(PCH_X-50,GY-78,100,8);
        cx.fillStyle='#f39c12';cx.fillRect(PCH_X-50,GY-78,100*wProgress,8);
    }

    mouse.clicked=false;
}

// ─── GAME OVER ────────────────────────────────────────────────────────────────
function drawGameOver(){
    const bg=cx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#050520'); bg.addColorStop(1,'#110000');
    cx.fillStyle=bg; cx.fillRect(0,0,W,H);

    // Trophy particles
    if(Math.random()<0.08) addParts(rnd(0,W),H,1,rnd(-2,2),-rnd(3,8),['#FFD700','#FF6B35','#FF4500','#FFF'],100,0.2,8);
    drawParts(); tickParts();

    drawText('⭐  GAME OVER  ⭐',W/2,45,{sz:36,col:'#FFD700',al:'center',bold:true,stk:true,stkW:5,stkCol:'#8B0000'});

    if(G){
        const ch=G.char, v=G.venue;
        // Character info
        cx.fillStyle=ch.clr+'AA'; roundRect(W/2-280,75,560,50,10); cx.fill();
        drawText(ch.name+' "'+ch.nick+'"',W/2,93,{sz:16,col:'#fff',al:'center',bold:true});
        drawText('at '+v.name,W/2,112,{sz:13,col:'rgba(255,255,255,0.7)',al:'center'});

        // Main score
        cx.fillStyle='rgba(0,0,0,0.55)'; roundRect(W/2-200,140,400,90,12); cx.fill();
        drawText('FINAL SCORE',W/2,160,{sz:14,col:'#aaa',al:'center'});
        drawText(G.score.toLocaleString(),W/2,195,{sz:44,col:'#FFD700',al:'center',bold:true,stk:true,stkW:4,stkCol:'#000'});

        // Stats grid
        const stats=[
            ['Home Runs','⚾ '+G.hrs+' / '+TOTAL_PITCHES,'#FF6B35'],
            ['Longest HR',G.longestHR>0?G.longestHR+' ft':'N/A','#4CAF50'],
            ['Best Multiplier','×'+G.mult.toFixed(1),'#9C27B0'],
            ['Pitches',TOTAL_PITCHES+' pitches','#3498db']
        ];
        const sgx=W/2-270, sgy=248;
        stats.forEach((s,i)=>{
            const col=i%2===0?0:1, row=Math.floor(i/2);
            const sx=sgx+col*280, sy2=sgy+row*58;
            cx.fillStyle='rgba(0,0,0,0.5)'; roundRect(sx,sy2,260,48,8); cx.fill();
            drawText(s[0],sx+130,sy2+16,{sz:11,col:'#aaa',al:'center'});
            drawText(s[1],sx+130,sy2+34,{sz:17,col:s[2],al:'center',bold:true});
        });

        // HR distances
        if(G.allHits&&G.allHits.length>0){
            const dy=sgy+2*58+10;
            cx.fillStyle='rgba(0,0,0,0.4)'; roundRect(W/2-270,dy,540,50,8); cx.fill();
            drawText('HR Distances:',W/2-260,dy+16,{sz:10,col:'#aaa'});
            G.allHits.slice(0,8).forEach((h,i)=>{
                drawText(h.dist+'ft',W/2-220+i*68,dy+34,{sz:11,col:'#FFD700',al:'left',bold:true});
            });
        }

        // Rating
        const rating=G.hrs>=8?'⭐⭐⭐ LEGENDARY!':G.hrs>=6?'⭐⭐ GREAT!':G.hrs>=4?'⭐ GOOD':G.hrs>=2?'Not bad!':'Keep practicing!';
        drawText(rating,W/2,H-110,{sz:22,col:'#FFD700',al:'center',bold:true,stk:true,stkW:3,stkCol:'#000'});

        if(comTimer>0){
            cx.globalAlpha=Math.min(1,comTimer/30);
            drawText(comText,W/2,H-82,{sz:13,col:'#ddd',al:'center',stk:true,stkW:2,stkCol:'#000'});
            cx.globalAlpha=1;
        }
    }

    // Buttons
    const py2A=H-58, bw=190, bh=40;
    const raHov=inBox(mouse.x,mouse.y,W/2-200,py2A,bw,bh);
    btn('⚾ Play Again',W/2-200,py2A,bw,bh,raHov,'#f39c12','#000');
    if(mouse.clicked&&raHov){ selChar=-1; selVenue=-1; G=null; SCR='CHAR'; parts=[]; mouse.clicked=false; }

    const csHov=inBox(mouse.x,mouse.y,W/2+20,py2A,bw,bh);
    btn('🔄 New Character',W/2+20,py2A,bw,bh,csHov,'#3498db','#fff');
    if(mouse.clicked&&csHov){ selVenue=-1; G=null; SCR='CHAR'; parts=[]; mouse.clicked=false; }

    mouse.clicked=false;
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function loop(){
    cx.clearRect(0,0,W,H);
    if(SCR==='CHAR')  drawCharSelect();
    else if(SCR==='VENUE') drawVenueSelect();
    else if(SCR==='PLAY'){ update(); drawGameplay(); }
    else if(SCR==='OVER')  drawGameOver();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
</script>
