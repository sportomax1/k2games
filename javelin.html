<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Javelin Pro: Gold Medalist - K2 games</title>
    <style>
        :root {
            --track: #f97316;
            --field: #22c55e;
            --sky-top: #0ea5e9;
            --sky-bottom: #7dd3fc;
            --bg: #0f172a;
            --gold: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100dvh;
            width: 100%;
            overflow: hidden;
            position: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
            overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* UI Layer */
        #ui-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 100;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .stat-card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            min-width: 100px;
            pointer-events: auto;
        }

        .stat-val { font-size: 1.2rem; font-weight: 900; color: var(--gold); font-family: monospace; }
        .stat-label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; margin-bottom: 2px; }

        .meters-container {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            pointer-events: none;
        }

        .meter-box { display: flex; flex-direction: row; align-items: center; gap: 8px; }
        
        .gauge-bg {
            width: 120px; height: 12px;
            background: rgba(0,0,0,0.5); border-radius: 6px;
            position: relative; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .gauge-fill { position: absolute; left: 0; height: 100%; transition: width 0.05s; }
        .gauge-target {
            position: absolute; left: 40%; height: 100%; width: 20%;
            background: rgba(255,255,255,0.3); border-left: 2px solid #fff; border-right: 2px solid #fff;
        }

        #mobile-controls {
            position: absolute; bottom: 30px; width: 100%; left: 0;
            display: flex; justify-content: space-between; padding: 0 25px;
            pointer-events: none;
        }

        .btn-action {
            width: 85px; height: 85px;
            border-radius: 50%; border: 4px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.4); backdrop-filter: blur(5px);
            color: white; font-weight: 900; font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto; user-select: none;
            transition: transform 0.1s;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }
        .btn-action:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }
        .btn-run { border-color: #f87171; color: #f87171; }
        .btn-throw { border-color: var(--gold); color: var(--gold); }

        .back-link {
            position: absolute; top: 15px; left: 15px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 10px; z-index: 200;
            font-weight: bold; font-size: 0.75rem; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        #overlay {
            position: absolute; inset: 0; background: rgba(15, 23, 42, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; backdrop-filter: blur(15px); text-align: center; padding: 20px;
        }

        .btn-start {
            background: var(--gold); color: #000; border: none; padding: 15px 50px;
            border-radius: 50px; font-weight: 900; cursor: pointer; font-size: 1.2rem;
            margin-top: 25px; box-shadow: 0 10px 20px rgba(251, 191, 36, 0.3);
        }
        .btn-start:active { transform: scale(0.95); }

        #msg-box {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3.5rem; font-weight: 900; color: #ef4444; text-shadow: 0 0 20px black;
            opacity: 0; pointer-events: none; transition: 0.3s; z-index: 500;
        }
        #msg-box.show { opacity: 1; transform: translate(-50%, -60%); }

        @media (min-width: 1024px) {
            .meters-container { top: 100px; right: 50%; transform: translateX(50%); flex-direction: row; }
            .meter-box { flex-direction: column; }
            .gauge-bg { width: 16px; height: 140px; }
            .gauge-fill { bottom: 0; width: 100%; left: auto; height: 0; transition: height 0.05s; }
            .gauge-target { bottom: 40%; width: 100%; left: 0; height: 20%; border-left: 0; border-right: 0; border-top: 2px solid #fff; border-bottom: 2px solid #fff; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <a href="index.html" class="back-link">← HUB</a>
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui-layer">
            <div class="hud-top">
                <div class="stat-card" style="margin-left: 100px;">
                    <div class="stat-label">Best</div>
                    <div id="best-val" class="stat-val">0.00m</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Round</div>
                    <div id="round-val" class="stat-val">1/3</div>
                </div>
            </div>

            <div class="meters-container">
                <div class="meter-box">
                    <div class="stat-label" style="color: #f87171">PWR</div>
                    <div class="gauge-bg">
                        <div id="speed-fill" class="gauge-fill" style="width: 0%; height: 100%; background: #f87171"></div>
                    </div>
                </div>
                <div class="meter-box">
                    <div class="stat-label" style="color: #38bdf8">ANG</div>
                    <div class="gauge-bg">
                        <div class="gauge-target"></div>
                        <div id="angle-fill" class="gauge-fill" style="width: 0%; height: 100%; background: #38bdf8"></div>
                    </div>
                </div>
            </div>

            <div id="mobile-controls">
                <div class="btn-action btn-run" id="btn-run">RUN</div>
                <div class="btn-action btn-throw" id="btn-throw">THROW</div>
            </div>
        </div>

        <div id="msg-box">FAULT!</div>

        <div id="overlay">
            <h1 style="font-size: 3rem; color: var(--gold); font-style: italic; font-weight: 900;">JAVELIN PRO</h1>
            <p style="font-size: 1rem; opacity: 0.8; max-width: 400px; margin-top: 15px; font-weight: 600;">Tap RUN to build speed.<br>Tap THROW in the sweet spot!</p>
            <button class="btn-start" onclick="startGame()">START EVENT</button>
        </div>
    </div>

    <script>
        class Javelin {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.resize();

                this.bestDist = 0;
                this.round = 1;
                this.reset();
                this.setupInput();
                this.loop();
                window.addEventListener('resize', () => this.resize());
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.width = this.canvas.width;
                this.height = this.canvas.height;
            }

            reset() {
                this.state = 'idle'; 
                this.player = { x: 100, y: this.height - 120, speed: 0, frame: 0 };
                this.javelin = { x: 0, y: 0, vx: 0, vy: 0, angle: 0, active: false, rot: 0 };
                
                // Extended Run Window: lineX moved from 0.7 to 1.5 relative to width 
                // (requires camera/offset management to view)
                // Actually, lineX is relative to the world. Let's make it 2500 pixels.
                this.lineX = 2500; 
                this.offset = 0;
                this.angleVal = 0;
                this.angleDir = 1;
                
                const speedFill = document.getElementById('speed-fill');
                const angleFill = document.getElementById('angle-fill');
                if (window.innerWidth < 1024) {
                    speedFill.style.width = '0%';
                    angleFill.style.width = '0%';
                } else {
                    speedFill.style.height = '0%';
                    angleFill.style.height = '0%';
                }
            }

            setupInput() {
                const runAction = () => {
                    if(this.state === 'running') {
                        this.player.speed = Math.min(18, this.player.speed + 1.8);
                        this.player.frame += 0.5;
                    }
                };

                const throwAction = () => {
                    if(this.state === 'running') this.throw();
                };

                window.onkeydown = (e) => {
                    if(e.code === 'Space') runAction();
                    if(e.code === 'KeyT') throwAction();
                };

                const btnRun = document.getElementById('btn-run');
                const btnThrow = document.getElementById('btn-throw');

                btnRun.addEventListener('touchstart', (e) => { e.preventDefault(); runAction(); }, {passive: false});
                btnThrow.addEventListener('touchstart', (e) => { e.preventDefault(); throwAction(); }, {passive: false});

                // Gamepad Adapter
                const pollGamepad = () => {
                    const pads = navigator.getGamepads();
                    if (pads[0]) {
                        const p = pads[0], b = p.buttons;
                        if (b[0].pressed && !this.lastB0) { runAction(); this.lastB0 = true; } else if (!b[0].pressed) this.lastB0 = false;
                        if (b[2].pressed && !this.lastB2) { throwAction(); this.lastB2 = true; } else if (!b[2].pressed) this.lastB2 = false;
                        if (b[9].pressed && this.state === 'idle') startGame();
                    }
                    requestAnimationFrame(pollGamepad);
                };
                pollGamepad();
            }

            throw() {
                if(this.player.x + this.offset > this.lineX) {
                    this.triggerFault();
                    return;
                }

                this.state = 'flight';
                const effectiveAngle = 20 + (this.angleVal / 100) * 50; 
                const angleRad = -effectiveAngle * Math.PI / 180;
                const power = this.player.speed;
                
                this.javelin = {
                    x: this.player.x,
                    y: this.player.y - 60,
                    vx: power * 1.6,
                    vy: Math.sin(angleRad) * (power * 2.4),
                    rot: angleRad
                };
            }

            triggerFault() {
                this.state = 'result';
                const msg = document.getElementById('msg-box');
                msg.textContent = 'FAULT!';
                msg.style.color = '#ef4444';
                msg.classList.add('show');
                setTimeout(() => this.nextAttempt(), 2000);
            }

            nextAttempt() {
                document.getElementById('msg-box').classList.remove('show');
                this.round++;
                if (this.round > 3) {
                    this.endEvent();
                } else {
                    document.getElementById('round-val').textContent = `${this.round}/3`;
                    this.reset();
                    this.state = 'running';
                }
            }

            endEvent() {
                this.state = 'idle';
                const overlay = document.getElementById('overlay');
                const title = overlay.querySelector('h1');
                const msg = overlay.querySelector('p');
                const btn = overlay.querySelector('button');
                
                title.textContent = 'EVENT COMPLETE';
                msg.textContent = `FINAL BEST: ${this.bestDist.toFixed(2)}m`;
                btn.textContent = 'RETRY EVENT';
                overlay.style.display = 'flex';
                this.round = 1;
                document.getElementById('round-val').textContent = '1/3';
            }

            update() {
                if(this.state === 'running') {
                    this.player.speed *= 0.96; 
                    this.offset += this.player.speed;
                    this.player.frame += this.player.speed * 0.1;
                    
                    const pwrPct = (this.player.speed / 18 * 100) + '%';
                    const angPct = this.angleVal + '%';
                    
                    const speedFill = document.getElementById('speed-fill');
                    const angleFill = document.getElementById('angle-fill');
                    
                    if (window.innerWidth < 1024) {
                        speedFill.style.width = pwrPct;
                        angleFill.style.width = angPct;
                    } else {
                        speedFill.style.height = pwrPct;
                        angleFill.style.height = angPct;
                    }

                    this.angleVal += 3 * this.angleDir;
                    if(this.angleVal >= 100 || this.angleVal <= 0) this.angleDir *= -1;

                    if(this.player.x + this.offset > this.lineX + 30) this.triggerFault();
                }

                if(this.state === 'flight') {
                    this.javelin.vy += 0.22; 
                    this.javelin.x += this.javelin.vx;
                    this.javelin.y += this.javelin.vy;
                    this.javelin.rot = Math.atan2(this.javelin.vy, this.javelin.vx);

                    if(this.javelin.y > this.height - 80) {
                        this.javelin.y = this.height - 80;
                        this.land();
                    }
                }
            }

            land() {
                this.state = 'result';
                const distRaw = (this.javelin.x + this.offset - this.lineX) / 12;
                const dist = Math.max(0, distRaw).toFixed(2);
                
                if(parseFloat(dist) > this.bestDist) {
                    this.bestDist = parseFloat(dist);
                    document.getElementById('best-val').textContent = dist + 'm';
                }

                const msg = document.getElementById('msg-box');
                msg.textContent = dist + 'm';
                msg.style.color = '#fbbf24';
                msg.classList.add('show');

                setTimeout(() => this.nextAttempt(), 2500);
            }

            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.width, this.height);

                // Sky already handled by CSS background

                // Ground
                const groundY = this.height - 80;
                ctx.fillStyle = '#22c55e'; ctx.fillRect(0, groundY, this.width, 80); // Grass
                ctx.fillStyle = '#f97316'; ctx.fillRect(0, groundY - 40, this.width, 40); // Track

                // Line
                const lx = this.lineX - this.offset;
                ctx.fillStyle = 'white'; ctx.fillRect(lx, groundY - 40, 10, 40);

                // Distance Lines
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                for(let i=0; i<10000; i+=120) { 
                    const mx = lx + i;
                    if(mx > -100 && mx < this.width + 100) {
                        ctx.fillRect(mx, groundY - 5, 2, 15);
                        ctx.fillText((i/12) + 'm', mx, groundY + 25);
                    }
                }

                // Player
                if(this.state !== 'flight') {
                    this.drawPlayer(this.player.x, this.player.y);
                }

                // Javelin in Flight
                if(this.state === 'flight' || this.state === 'result') {
                    ctx.save();
                    ctx.translate(this.javelin.x, this.javelin.y);
                    ctx.rotate(this.javelin.rot);
                    
                    ctx.strokeStyle = '#111'; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.moveTo(-40, 0); ctx.lineTo(40, 0); ctx.stroke();
                    ctx.fillStyle = '#fbbf24';
                    ctx.beginPath(); ctx.moveTo(40, 0); ctx.lineTo(25, -4); ctx.lineTo(25, 4); ctx.fill();
                    
                    ctx.restore();
                }
            }

            drawPlayer(x, y) {
                const ctx = this.ctx;
                const bob = Math.sin(this.player.frame) * 6;
                ctx.save();
                ctx.translate(x, y + bob);
                
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
                ctx.fillStyle = '#1d4ed8';
                
                // Body
                ctx.beginPath(); ctx.roundRect(-12, -50, 24, 45, 8); ctx.fill(); ctx.stroke();
                // Head
                ctx.fillStyle = '#ffccaa'; ctx.beginPath(); ctx.arc(0, -65, 14, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                
                // Arms holding javelin
                if(this.state !== 'flight') {
                    ctx.save();
                    ctx.translate(8, -45);
                    ctx.rotate(-Math.PI/4 + Math.sin(this.player.frame)*0.2);
                    ctx.strokeStyle = '#111'; ctx.lineWidth = 4;
                    ctx.beginPath(); ctx.moveTo(-45, 0); ctx.lineTo(45, 0); ctx.stroke(); 
                    ctx.restore();
                }

                ctx.restore();
            }

            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        }

        let game = new Javelin();
        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            game.reset();
            game.state = 'running';
            game.round = 1;
            document.getElementById('round-val').textContent = '1/3';
        }
    </script>
</body>
</html>
