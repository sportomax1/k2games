<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Javelin Pro - K2 games</title>
    <style>
        :root {
            --track: #ef4444;
            --field: #22c55e;
            --accent: #fbbf24;
            --glass: rgba(15, 23, 42, 0.85);
        }

        body { margin: 0; overflow: hidden; background: #7dd3fc; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; color: white; touch-action: none; }
        
        #ui-layer {
            position: absolute; inset: 0; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between; padding: 25px;
            z-index: 10;
        }

        .hud-top { display: flex; justify-content: space-between; }
        
        .stat-card {
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 10px 30px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; min-width: 140px;
        }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.7; letter-spacing: 1.5px; font-weight: 800; }
        .stat-val { font-size: 2.2rem; font-weight: 900; color: var(--accent); font-family: 'Courier New', monospace; }

        #angle-gauge {
            position: absolute; bottom: 150px; left: 50%; transform: translateX(-50%);
            width: 150px; height: 150px; background: rgba(0,0,0,0.3); border-radius: 50%;
            border: 4px solid white; display: none;
        }
        #angle-needle {
            position: absolute; bottom: 50%; left: 50%; width: 4px; height: 60px;
            background: var(--accent); transform-origin: bottom center; transform: rotate(0deg);
        }

        #mobile-controls {
            position: absolute; bottom: 40px; left: 0; right: 0;
            display: none; justify-content: space-around; padding: 0 40px;
            pointer-events: none;
        }
        @media (max-width: 1024px) { #mobile-controls { display: flex; } }
        .m-btn {
            width: 100px; height: 100px; background: rgba(255,255,255,0.1);
            border: 4px solid white; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; color: white;
            font-weight: 900; pointer-events: auto; backdrop-filter: blur(5px);
            font-size: 1.2rem; text-transform: uppercase;
        }
        .m-btn:active { background: white; color: black; transform: scale(0.9); }

        #overlay {
            position: absolute; inset: 0; background: radial-gradient(circle at center, #7dd3fc, #0ea5e9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center; padding: 30px;
        }
        h1 { font-size: 5rem; color: #fff; font-style: italic; font-weight: 900; line-height: 0.9; margin: 0; text-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .btn {
            padding: 20px 80px; font-size: 1.8rem; background: var(--accent); color: #000;
            border: none; border-radius: 100px; font-weight: 900; cursor: pointer; margin-top: 40px;
            box-shadow: 0 10px 0 #b45309; transition: transform 0.1s;
        }
        .btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #b45309; }

        .back-link {
            position: fixed; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 10px; z-index: 2000;
            font-weight: bold; font-size: 0.8rem; backdrop-filter: blur(5px); pointer-events: auto;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← HUB</a>

    <div id="ui-layer">
        <div class="hud-top">
            <div class="stat-card">
                <div class="stat-label">Power</div>
                <div id="power-val" class="stat-val">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Best</div>
                <div id="best-val" class="stat-val">0.00m</div>
            </div>
        </div>
        
        <div id="angle-gauge"><div id="angle-needle"></div></div>
    </div>

    <div id="mobile-controls">
        <div class="m-btn" id="m-run">RUN</div>
        <div class="m-btn" id="m-throw" style="background:var(--accent); color:black;">THROW</div>
    </div>

    <div id="overlay">
        <h1>JAVELIN<br>PRO</h1>
        <p style="color: #fff; margin-top: 20px; max-width: 400px; font-weight: 600; line-height: 1.5; opacity: 0.8;">
            1. <b>MASH</b> Arrow Right to Build Speed.<br>
            2. <b>HOLD</b> Arrow Up to Set Angle.<br>
            3. <b>RELEASE</b> to Launch!
        </p>
        <button class="btn" onclick="window.game.start()">ENTER FIELD</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        class JavelinGame {
            constructor() {
                this.state = 'menu'; // menu, running, aiming, flying, result
                this.speed = 0;
                this.angle = 0;
                this.bestDist = 0;
                this.runPos = -100;
                this.particles = [];
                
                this.initEngine();
                this.createWorld();
                this.createAthlete();
                this.setupInput();
                
                this.loop = this.loop.bind(this);
                requestAnimationFrame(this.loop);
            }

            initEngine() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x7dd3fc);
                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                document.body.appendChild(this.renderer.domElement);

                this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
                const sun = new THREE.DirectionalLight(0xfffae3, 1.2);
                sun.position.set(100, 300, 100); sun.castShadow = true;
                this.scene.add(sun);

                // THE SUN VISUAL
                const sunGroup = new THREE.Group();
                const sunCore = new THREE.Mesh(new THREE.SphereGeometry(15, 32, 32), new THREE.MeshBasicMaterial({color: 0xfff176}));
                const sunGlow = new THREE.Mesh(new THREE.SphereGeometry(25, 32, 32), new THREE.MeshBasicMaterial({color: 0xfff176, transparent: true, opacity: 0.3}));
                sunGroup.add(sunCore, sunGlow);
                sunGroup.position.set(-200, 400, -500);
                this.scene.add(sunGroup);

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            createWorld() {
                // Ground
                const field = new THREE.Mesh(new THREE.PlaneGeometry(10000, 10000), new THREE.MeshStandardMaterial({color: 0x22c55e}));
                field.rotation.x = -Math.PI/2; field.receiveShadow = true;
                this.scene.add(field);

                // Run-up Track
                const track = new THREE.Mesh(new THREE.PlaneGeometry(15, 200), new THREE.MeshStandardMaterial({color: 0xef4444}));
                track.rotation.x = -Math.PI/2; track.position.set(0, 0.05, -100);
                this.scene.add(track);

                // Scratch Line
                const line = new THREE.Mesh(new THREE.PlaneGeometry(15, 1), new THREE.MeshStandardMaterial({color: 0xffffff}));
                line.rotation.x = -Math.PI/2; line.position.set(0, 0.1, 0);
                this.scene.add(line);

                // Distance Markers
                for(let i=1; i<=10; i++) {
                    const marker = new THREE.Mesh(new THREE.PlaneGeometry(100, 0.5), new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.5}));
                    marker.rotation.x = -Math.PI/2; marker.position.set(0, 0.05, i*25);
                    this.scene.add(marker);
                }
            }

            createAthlete() {
                this.athlete = new THREE.Group();
                const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1.5), new THREE.MeshStandardMaterial({color: 0x3b82f6}));
                body.position.y = 1.2;
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({color: 0xffdbac}));
                head.position.y = 2.4;
                this.athlete.add(body, head);
                this.scene.add(this.athlete);

                // Javelin
                this.javelin = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 10), new THREE.MeshStandardMaterial({color: 0x111111}));
                this.javelin.rotation.x = Math.PI/2;
                this.javelin.position.set(0.8, 2, 0);
                this.athlete.add(this.javelin);
            }

            setupInput() {
                this.keys = {};
                window.onkeydown = e => {
                    if (this.state === 'running' && e.code === 'ArrowRight') this.speed = Math.min(1, this.speed + 0.08);
                    if (this.state === 'aiming' && e.code === 'ArrowUp') this.state = 'aiming'; // handled in update
                    this.keys[e.code] = true;
                };
                window.onkeyup = e => {
                    if (this.state === 'aiming' && e.code === 'ArrowUp') this.throwJavelin();
                    this.keys[e.code] = false;
                };

                const bind = (id, key, press) => {
                    const el = document.getElementById(id);
                    el.ontouchstart = (e) => { e.preventDefault(); if(press) press(); this.keys[key] = true; };
                    el.ontouchend = (e) => { e.preventDefault(); if(key === 'ArrowUp') this.throwJavelin(); this.keys[key] = false; };
                };
                bind('m-run', 'ArrowRight', () => { if(this.state === 'running') this.speed = Math.min(1, this.speed + 0.1); });
                bind('m-throw', 'ArrowUp');
            }

            start() {
                this.state = 'running';
                this.speed = 0; this.runPos = -100;
                document.getElementById('overlay').style.display = 'none';
            }

            throwJavelin() {
                if(this.state !== 'aiming') return;
                this.state = 'flying';
                document.getElementById('angle-gauge').style.display = 'none';
                
                this.javVel = new THREE.Vector3(0, Math.sin(this.angle) * this.speed * 2, Math.cos(this.angle) * this.speed * 2);
                this.scene.attach(this.javelin);
            }

            update(dt) {
                if(this.state === 'running') {
                    this.speed *= 0.98;
                    this.runPos += this.speed * 40 * dt;
                    this.athlete.position.z = this.runPos;
                    
                    // Running animation (bobbing)
                    this.athlete.position.y = Math.abs(Math.sin(Date.now()*0.01)) * this.speed;
                    
                    if (this.runPos > -10) {
                        this.state = 'aiming';
                        document.getElementById('angle-gauge').style.display = 'block';
                    }
                } 
                else if (this.state === 'aiming') {
                    this.angle += dt * 2;
                    const displayAngle = Math.abs(Math.sin(this.angle)) * 90;
                    document.getElementById('angle-needle').style.transform = `rotate(${-90 + displayAngle}deg)`;
                    this.javelin.rotation.x = Math.PI/2 - (displayAngle * Math.PI/180);
                }
                else if (this.state === 'flying') {
                    this.javelin.position.y += this.javVel.y;
                    this.javelin.position.z += this.javVel.z;
                    this.javVel.y -= 0.02; // Gravity
                    
                    // Arc rotation
                    this.javelin.lookAt(this.javelin.position.clone().add(this.javVel));

                    if (this.javelin.position.y <= 0.1) {
                        this.state = 'result';
                        const dist = this.javelin.position.z;
                        if(dist > this.bestDist) this.bestDist = dist;
                        document.getElementById('best-val').textContent = dist.toFixed(2) + "m";
                        setTimeout(() => this.reset(), 2000);
                    }
                }

                document.getElementById('power-val').textContent = Math.floor(this.speed * 100) + "%";

                // Camera
                const target = this.state === 'flying' ? this.javelin : this.athlete;
                const offset = new THREE.Vector3(15, 10, -15);
                this.camera.position.lerp(target.position.clone().add(offset), 0.1);
                this.camera.lookAt(target.position);
            }

            reset() {
                this.state = 'running';
                this.speed = 0; this.runPos = -100;
                this.athlete.add(this.javelin);
                this.javelin.position.set(0.8, 2, 0);
                this.javelin.rotation.set(Math.PI/2, 0, 0);
            }

            loop() {
                this.update(0.016);
                this.renderer.render(this.scene, this.camera);
                requestAnimationFrame(this.loop);
            }
        }

        window.game = new JavelinGame();
    </script>
</body>
</html>
