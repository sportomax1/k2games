<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Go Fast Pro: Turbo GP - K2 games</title>
    <style>
        :root {
            --primary: #3b82f6;
            --accent: #ef4444;
            --gold: #fbbf24;
            --bg: #0f172a;
            --glass: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        #game-container {
            position: relative;
            flex: 1;
            background: #000;
            overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* HUD Layer */
        .hud-overlay {
            position: absolute; inset: 0;
            pointer-events: none;
            z-index: 50;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hud-top { display: flex; justify-content: space-between; align-items: flex-start; }
        
        .stat-group { display: flex; flex-direction: column; gap: 8px; }
        
        .stat-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            min-width: 120px;
        }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; opacity: 0.6; letter-spacing: 1px; }
        .stat-val { font-size: 1.4rem; font-weight: 900; font-family: monospace; }

        /* Minimap */
        #minimap {
            width: 150px;
            height: 150px;
            background: var(--glass);
            border-radius: 15px;
            border: 2px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        #minimap canvas { width: 100%; height: 100%; }

        /* Standings */
        #standings {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--border);
            min-width: 180px;
        }
        .standing-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.85rem;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .standing-row.player { color: var(--gold); background: rgba(251, 191, 36, 0.1); border-radius: 4px; padding: 4px 8px; margin: 0 -8px; }
        .rank { opacity: 0.6; margin-right: 10px; width: 20px; display: inline-block; }

        /* Speedo */
        .speedometer {
            align-self: flex-end;
            text-align: right;
        }
        .speed-val { font-size: 3rem; font-weight: 900; line-height: 1; }
        .speed-unit { font-size: 0.8rem; color: var(--primary); font-weight: 800; }

        /* Screen Overlays */
        .screen-overlay {
            position: absolute; inset: 0;
            background: rgba(2, 6, 23, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; text-align: center; padding: 20px;
        }

        .btn-large {
            background: var(--primary); color: white; border: none; padding: 1.2rem 3.5rem;
            border-radius: 50px; font-weight: 800; cursor: pointer; margin-top: 2rem;
            font-size: 1.2rem; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
            text-transform: uppercase;
        }

        #start-screen h1 { font-size: 4rem; font-style: italic; font-weight: 900; color: #fff; line-height: 1; }
        #start-screen span { color: var(--primary); }

        /* Mobile Controls */
        #mobile-controls {
            position: absolute; bottom: 30px; left: 0; right: 0;
            display: none; justify-content: space-between; padding: 0 30px;
            pointer-events: none; z-index: 100;
        }
        @media (max-width: 900px) { #mobile-controls { display: flex; } }
        .control-btn {
            width: 80px; height: 80px; background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2); border-radius: 50%;
            pointer-events: auto; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; backdrop-filter: blur(5px);
        }
        .control-btn:active { background: var(--primary); }

        .back-link { position: fixed; bottom: 20px; left: 20px; color: #94a3b8; text-decoration: none; font-size: 0.8rem; z-index: 1000; font-weight: bold; }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="hud-overlay">
            <div class="hud-top">
                <div class="stat-group">
                    <div class="stat-card">
                        <span class="stat-label">Lap</span>
                        <div class="stat-val" id="lap-val">1/3</div>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Time</span>
                        <div class="stat-val" id="time-val">00:00.00</div>
                    </div>
                </div>

                <div id="standings">
                    <div class="standing-row player"><span class="rank">1</span> <span>YOU</span></div>
                    <div class="standing-row"><span class="rank">2</span> <span>CPU 1</span></div>
                    <div class="standing-row"><span class="rank">3</span> <span>CPU 2</span></div>
                    <div class="standing-row"><span class="rank">4</span> <span>CPU 3</span></div>
                </div>

                <div id="minimap">
                    <canvas id="minimapCanvas"></canvas>
                </div>
            </div>

            <div class="speedometer">
                <div class="speed-val" id="speed-val">0</div>
                <div class="speed-unit">KM/H</div>
            </div>
        </div>

        <div id="mobile-controls">
            <div style="display:flex; gap:20px;">
                <div class="control-btn" id="btn-left">◀</div>
                <div class="control-btn" id="btn-right">▶</div>
            </div>
            <div class="control-btn" id="btn-gas" style="background:rgba(59, 130, 246, 0.3); border-color:var(--primary);">GAS</div>
        </div>

        <div id="start-screen" class="screen-overlay">
            <h1>GO FAST <span>PRO</span></h1>
            <p style="opacity: 0.6; margin-top: 10px; max-width: 400px;">Ultimate Turbo Racing. Outpace the competition and dominate the track.</p>
            <div id="results" style="display:none; margin-top: 20px;">
                <h2 id="finish-msg" style="color: var(--gold); font-size: 2rem;">VICTORY!</h2>
                <p>Final Time: <span id="final-time">00:00.00</span></p>
            </div>
            <button class="btn-large" id="start-btn">START RACE</button>
        </div>
    </div>

    <a href="index.html" class="back-link">← HUB</a>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

        class GoFastPro {
            constructor() {
                this.state = {
                    playing: false,
                    lap: 1,
                    totalLaps: 3,
                    startTime: 0,
                    speed: 0,
                    maxSpeed: 3.5,
                    accel: 0.012,
                    friction: 0.985,
                    steering: 0,
                    trackPos: 0,
                    standings: [
                        { name: 'YOU', dist: 0, isPlayer: true, color: 0x3b82f6 },
                        { name: 'VIPER', dist: 0, speed: 2.8, color: 0xef4444 },
                        { name: 'TURBO', dist: 0, speed: 3.0, color: 0x10b981 },
                        { name: 'GHOST', dist: 0, speed: 3.2, color: 0xfbbf24 }
                    ]
                };

                this.initEngine();
                this.createTrack();
                this.createVehicles();
                this.setupControls();
                this.setupMinimap();
                
                this.loop = this.loop.bind(this);
                requestAnimationFrame(this.loop);
            }

            initEngine() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x0c4a6e);
                this.scene.fog = new THREE.FogExp2(0x0c4a6e, 0.001);

                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 3000);
                this.camera.up.set(0, 1, 0); // Force absolute Y-up
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                document.getElementById('game-container').appendChild(this.renderer.domElement);

                // Better Lighting
                this.scene.add(new THREE.AmbientLight(0xffffff, 0.4));
                const sun = new THREE.DirectionalLight(0xffffff, 1.5);
                sun.position.set(200, 500, 200);
                sun.castShadow = true;
                sun.shadow.camera.left = -500;
                sun.shadow.camera.right = 500;
                sun.shadow.camera.top = 500;
                sun.shadow.camera.bottom = -500;
                sun.shadow.mapSize.width = 2048;
                sun.shadow.mapSize.height = 2048;
                this.scene.add(sun);

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            createTrack() {
                const points = [];
                const radius = 400;
                const segments = 120;
                for(let i=0; i<segments; i++) {
                    const a = (i / segments) * Math.PI * 2;
                    const r = radius + Math.sin(a * 5) * 80 + Math.cos(a * 2) * 40;
                    const x = Math.cos(a) * r;
                    const z = Math.sin(a) * r;
                    const y = Math.sin(a * 3) * 20;
                    points.push(new THREE.Vector3(x, y, z));
                }
                
                this.trackCurve = new THREE.CatmullRomCurve3(points, true);
                
                // Create ROAD MESH
                const roadWidth = 22;
                const roadSegments = 600;
                const roadGeo = new THREE.PlaneGeometry(roadWidth, 1, 1, roadSegments);
                const lineGeo = new THREE.PlaneGeometry(0.8, 1, 1, roadSegments);
                
                const rPos = roadGeo.attributes.position;
                const lPos = lineGeo.attributes.position;

                for(let i=0; i<=roadSegments; i++) {
                    const t = i / roadSegments;
                    const p = this.trackCurve.getPoint(t);
                    const tangent = this.trackCurve.getTangent(t).normalize();
                    const right = tangent.clone().cross(new THREE.Vector3(0,1,0)).normalize();
                    
                    // Main Road
                    rPos.setXYZ(i*2, p.x - right.x * roadWidth/2, p.y + 0.1, p.z - right.z * roadWidth/2);
                    rPos.setXYZ(i*2 + 1, p.x + right.x * roadWidth/2, p.y + 0.1, p.z + right.z * roadWidth/2);

                    // Center Line (Slightly higher)
                    lPos.setXYZ(i*2, p.x - right.x * 0.4, p.y + 0.15, p.z - right.z * 0.4);
                    lPos.setXYZ(i*2 + 1, p.x + right.x * 0.4, p.y + 0.15, p.z + right.z * 0.4);
                }
                rPos.needsUpdate = true;
                lPos.needsUpdate = true;
                roadGeo.computeVertexNormals();
                lineGeo.computeVertexNormals();

                // Asphalt
                this.roadMesh = new THREE.Mesh(roadGeo, new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.8 }));
                this.roadMesh.receiveShadow = true;
                this.scene.add(this.roadMesh);

                // Dashed Line Material
                const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                this.lineMesh = new THREE.Mesh(lineGeo, lineMat);
                this.scene.add(this.lineMesh);

                // Ground
                const groundGeo = new THREE.CircleGeometry(1500, 64);
                const groundMat = new THREE.MeshStandardMaterial({ color: 0x064e3b });
                const ground = new THREE.Mesh(groundGeo, groundMat);
                ground.rotation.x = -Math.PI / 2;
                ground.position.y = -10;
                ground.receiveShadow = true;
                this.scene.add(ground);

                // Foliage
                for(let i=0; i<250; i++) {
                    const t = Math.random();
                    const pos = this.trackCurve.getPoint(t);
                    const tangent = this.trackCurve.getTangent(t);
                    const normal = tangent.clone().cross(new THREE.Vector3(0,1,0)).normalize();
                    
                    const tree = new THREE.Group();
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.2, 8), new THREE.MeshStandardMaterial({ color: 0x451a03 }));
                    const leaves = new THREE.Mesh(new THREE.SphereGeometry(6, 8, 8), new THREE.MeshStandardMaterial({ color: 0x14532d }));
                    leaves.position.y = 8;
                    tree.add(trunk, leaves);
                    
                    const side = Math.random() > 0.5 ? 1 : -1;
                    const offset = 40 + Math.random() * 60;
                    tree.position.copy(pos).add(normal.multiplyScalar(offset * side));
                    tree.position.y -= 2;
                    this.scene.add(tree);
                }
            }

            createVehicles() {
                this.playerCar = this.createCarMesh(0x3b82f6);
                this.scene.add(this.playerCar);

                this.opponentCars = this.state.standings.filter(s => !s.isPlayer).map(s => {
                    const car = this.createCarMesh(s.color);
                    s.mesh = car;
                    this.scene.add(car);
                    return s;
                });
            }

            createCarMesh(color) {
                const car = new THREE.Group();
                
                // Body
                const body = new THREE.Mesh(
                    new THREE.BoxGeometry(3, 0.8, 6), 
                    new THREE.MeshStandardMaterial({ color: color, metalness: 0.8, roughness: 0.2 })
                );
                body.position.y = 0.6;
                body.castShadow = true;
                
                // Cockpit
                const cockpit = new THREE.Mesh(
                    new THREE.SphereGeometry(1.2, 16, 16), 
                    new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 1, roughness: 0 })
                );
                cockpit.scale.set(1, 0.6, 1.5);
                cockpit.position.set(0, 1.2, 0.5);
                
                // Wing
                const wing = new THREE.Mesh(
                    new THREE.BoxGeometry(3.5, 0.2, 1.2), 
                    new THREE.MeshStandardMaterial({ color: color })
                );
                wing.position.set(0, 1.8, -2.2);

                // Brake Lights
                const lightGeo = new THREE.BoxGeometry(0.8, 0.3, 0.1);
                const lightMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
                const l1 = new THREE.Mesh(lightGeo, lightMat);
                const l2 = l1.clone();
                l1.position.set(-1, 0.8, -3);
                l2.position.set(1, 0.8, -3);

                car.add(body, cockpit, wing, l1, l2);
                return car;
            }

            setupControls() {
                this.keys = {};
                window.onkeydown = e => {
                    this.keys[e.key.toLowerCase()] = true;
                    this.keys[e.code] = true;
                };
                window.onkeyup = e => {
                    this.keys[e.key.toLowerCase()] = false;
                    this.keys[e.code] = false;
                };

                const addTouch = (id, key) => {
                    const el = document.getElementById(id);
                    el.addEventListener('touchstart', (e) => { e.preventDefault(); this.keys[key] = true; }, {passive: false});
                    el.addEventListener('touchend', () => this.keys[key] = false);
                };
                addTouch('btn-left', 'arrowleft');
                addTouch('btn-right', 'arrowright');
                addTouch('btn-gas', ' ');

                document.getElementById('start-btn').onclick = () => this.startRace();
            }

            setupMinimap() {
                this.minimapCanvas = document.getElementById('minimapCanvas');
                this.mctx = this.minimapCanvas.getContext('2d');
                this.minimapCanvas.width = 150;
                this.minimapCanvas.height = 150;
                
                // Add Speed Streaks
                this.streaks = [];
                for(let i=0; i<40; i++) {
                    const streak = new THREE.Mesh(
                        new THREE.BoxGeometry(0.1, 0.1, 2),
                        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 })
                    );
                    streak.visible = false;
                    this.scene.add(streak);
                    this.streaks.push(streak);
                }
            }

            startRace() {
                this.state.playing = true;
                this.state.startTime = Date.now();
                this.state.lap = 1;
                this.state.speed = 0;
                this.state.trackPos = 0;
                this.state.steering = 0;
                this.state.standings.forEach(s => s.dist = 0);
                document.getElementById('start-screen').style.display = 'none';
            }

            update() {
                if (!this.state.playing) {
                    const t = Date.now() * 0.0002;
                    this.camera.position.set(Math.cos(t) * 500, 200, Math.sin(t) * 500);
                    this.camera.lookAt(0, 0, 0);
                    return;
                }

                // Input Logic (Fixed Axis)
                const pads = navigator.getGamepads();
                const pad = pads[0];
                if (pad) {
                    const axesX = pad.axes[0];
                    const gasBtn = pad.buttons[7]?.pressed || pad.buttons[0]?.pressed;
                    if (gasBtn) this.state.speed += this.state.accel;
                    this.state.steering = THREE.MathUtils.lerp(this.state.steering, axesX * 12, 0.1);
                } else {
                    const gas = this.keys['arrowup'] || this.keys[' '] || this.keys['w'] || this.keys['Space'];
                    const left = this.keys['arrowleft'] || this.keys['a'];
                    const right = this.keys['arrowright'] || this.keys['d'];
                    
                    if (gas) this.state.speed += this.state.accel;
                    
                    // Correcting the Axis: Right = Positive Offset, Left = Negative Offset
                    const targetSteer = (right ? 10 : 0) + (left ? -10 : 0);
                    this.state.steering = THREE.MathUtils.lerp(this.state.steering, targetSteer, 0.08);
                }

                this.state.speed *= this.state.friction;
                this.state.speed = Math.min(this.state.speed, this.state.maxSpeed);

                this.state.trackPos += this.state.speed * 0.0008;
                if (this.state.trackPos >= 1) {
                    this.state.trackPos -= 1;
                    this.state.lap++;
                    if (this.state.lap > this.state.totalLaps) this.finishRace();
                }
                
                this.updateCar(this.playerCar, this.state.trackPos, this.state.steering);
                this.state.standings.find(s => s.isPlayer).dist = (this.state.lap-1) + this.state.trackPos;

                this.opponentCars.forEach(opp => {
                    opp.dist += (opp.speed || 3.0) * 0.0003;
                    const t = opp.dist % 1;
                    this.updateCar(opp.mesh, t, Math.sin(Date.now() * 0.001 + opp.dist * 10) * 8);
                });

                // HUD Updates
                const elapsed = Date.now() - this.state.startTime;
                document.getElementById('time-val').textContent = this.formatTime(elapsed);
                document.getElementById('lap-val').textContent = `${Math.min(this.state.lap, this.state.totalLaps)}/${this.state.totalLaps}`;
                
                // MPH SCALING: speed * 60 approx
                document.getElementById('speed-val').textContent = Math.floor(this.state.speed * 62);

                // Standings Refresh
                if (this.frame % 30 === 0) {
                    this.state.standings.sort((a, b) => b.dist - a.dist);
                    const standingsEl = document.getElementById('standings');
                    standingsEl.innerHTML = '';
                    this.state.standings.forEach((s, i) => {
                        const row = document.createElement('div');
                        row.className = `standing-row ${s.isPlayer ? 'player' : ''}`;
                        row.innerHTML = `<span class="rank">${i + 1}</span> <span>${s.name}</span>`;
                        standingsEl.appendChild(row);
                    });
                }
                this.frame = (this.frame || 0) + 1;

                // Speed Streaks
                const speedFactor = this.state.speed / this.state.maxSpeed;
                this.streaks.forEach((s, i) => {
                    if (Math.random() < speedFactor * 0.4) {
                        const t = (this.state.trackPos + 0.05 + Math.random() * 0.1) % 1;
                        const p = this.trackCurve.getPoint(t);
                        s.position.set(p.x + (Math.random()-0.5)*40, p.y + (Math.random()*20), p.z + (Math.random()-0.5)*40);
                        s.lookAt(this.trackCurve.getPoint((t + 0.01) % 1));
                        s.visible = true;
                    } else {
                        s.visible = false;
                    }
                });

                // Dynamic Chase Camera (Refined)
                const camFollowDist = 0.02;
                const camLookDist = 0.04;
                const tCam = (this.state.trackPos - camFollowDist + 1) % 1;
                const camBasePos = this.trackCurve.getPoint(tCam);
                const tangent = this.trackCurve.getTangent(tCam).normalize();
                const right = tangent.clone().cross(new THREE.Vector3(0,1,0)).normalize();
                
                const targetCamPos = camBasePos.clone()
                    .add(new THREE.Vector3(0, 7, 0))
                    .add(right.clone().multiplyScalar(this.state.steering * 0.4));
                
                this.camera.position.lerp(targetCamPos, 0.1);
                
                const fovTarget = 60 + (speedFactor * 30);
                this.camera.fov = THREE.MathUtils.lerp(this.camera.fov, fovTarget, 0.05);
                this.camera.updateProjectionMatrix();
                
                const lookAtTarget = this.trackCurve.getPoint((this.state.trackPos + camLookDist) % 1);
                this.camera.lookAt(lookAtTarget.x, lookAtTarget.y + 2, lookAtTarget.z);
                
                // Bank the camera based on steering
                this.camera.rotation.z += this.state.steering * -0.005;

                this.drawMinimap();
            }

            updateCar(mesh, t, steeringOffset) {
                const pos = this.trackCurve.getPoint(t);
                const tangent = this.trackCurve.getTangent(t).normalize();
                const right = tangent.clone().cross(new THREE.Vector3(0,1,0)).normalize();
                
                // Lock car ON TOP of road (p.y + offset)
                mesh.position.copy(pos).add(right.clone().multiplyScalar(steeringOffset));
                mesh.position.y += 0.2; 
                
                const lookTarget = this.trackCurve.getPoint((t + 0.01) % 1);
                mesh.lookAt(lookTarget.x, mesh.position.y, lookTarget.z);
                // Banking effect
                mesh.rotation.z = steeringOffset * -0.04;
            }

            drawMinimap() {
                const ctx = this.mctx;
                ctx.clearRect(0, 0, 150, 150);
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                const points = this.trackCurve.getPoints(60);
                points.forEach((p, i) => {
                    const x = 75 + p.x * 0.12;
                    const z = 75 + p.z * 0.12;
                    if(i === 0) ctx.moveTo(x, z); else ctx.lineTo(x, z);
                });
                ctx.closePath();
                ctx.stroke();
                this.state.standings.forEach(s => {
                    const t = s.dist % 1;
                    const p = this.trackCurve.getPoint(t);
                    ctx.fillStyle = s.isPlayer ? '#fbbf24' : '#ef4444';
                    ctx.beginPath();
                    ctx.arc(75 + p.x * 0.12, 75 + p.z * 0.12, 4, 0, Math.PI*2);
                    ctx.fill();
                });
            }

            formatTime(ms) {
                const totalSeconds = ms / 1000;
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = Math.floor(totalSeconds % 60);
                const centi = Math.floor((ms % 1000) / 10);
                return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}.${centi.toString().padStart(2, '0')}`;
            }

            finishRace() {
                this.state.playing = false;
                const elapsed = Date.now() - this.state.startTime;
                const rank = this.state.standings.findIndex(s => s.isPlayer) + 1;
                document.getElementById('start-screen').style.display = 'flex';
                document.getElementById('results').style.display = 'block';
                document.getElementById('finish-msg').textContent = rank === 1 ? "VICTORY! 🏆" : `FINISH: ${rank}${['st','nd','rd','th'][Math.min(rank-1, 3)]}`;
                document.getElementById('final-time').textContent = this.formatTime(elapsed);
                document.getElementById('start-btn').textContent = "RETRY RACE";
            }

            render() {
                this.renderer.render(this.scene, this.camera);
            }

            loop() {
                this.update();
                this.render();
                requestAnimationFrame(this.loop);
            }
        }

        const game = new GoFastPro();
    </script>
</body>
</html>
