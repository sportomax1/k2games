<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nitro Formula 3D - K2 games</title>
    <style>
        :root {
            --accent: #fbbf24;
            --danger: #ef4444;
            --glass: rgba(15, 23, 42, 0.85);
        }

        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; color: white; touch-action: none; }
        
        #ui-layer {
            position: absolute; inset: 0; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between; padding: 25px;
            z-index: 10;
        }

        .hud-top { display: flex; justify-content: space-between; }
        
        .stat-card {
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 10px 30px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; min-width: 140px;
        }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.7; letter-spacing: 1.5px; font-weight: 800; }
        .stat-val { font-size: 2.2rem; font-weight: 900; color: var(--accent); font-family: 'Courier New', monospace; }

        #speedometer {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            text-align: center;
        }
        .speed-unit { font-size: 0.8rem; font-weight: 900; opacity: 0.6; }

        #mobile-controls {
            position: absolute; bottom: 40px; left: 0; right: 0;
            display: none; justify-content: space-between; padding: 0 40px;
            pointer-events: none;
        }
        @media (max-width: 1024px) { #mobile-controls { display: flex; } }
        .m-btn {
            width: 90px; height: 90px; background: rgba(255,255,255,0.1);
            border: 3px solid white; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; color: white;
            font-weight: 900; pointer-events: auto; backdrop-filter: blur(5px);
        }

        #overlay {
            position: absolute; inset: 0; background: radial-gradient(circle at center, #1e293b, #020617);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center; padding: 30px;
        }
        h1 { font-size: 5rem; color: var(--accent); font-style: italic; font-weight: 900; line-height: 0.9; margin: 0; text-shadow: 5px 5px 0 #000; }
        .btn {
            padding: 20px 80px; font-size: 1.8rem; background: var(--accent); color: #000;
            border: none; border-radius: 100px; font-weight: 900; cursor: pointer; margin-top: 40px;
            box-shadow: 0 10px 0 #b45309; transition: transform 0.1s;
        }
        .btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #b45309; }

        .back-link {
            position: fixed; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 10px; z-index: 2000;
            font-weight: bold; font-size: 0.8rem; backdrop-filter: blur(5px); pointer-events: auto;
        }
    </style>

<body>
    <a href="index.html" class="back-link">← HUB</a>

    <div id="ui-layer">
        <div class="hud-top">
            <div class="stat-card">
                <div class="stat-label">Rank</div>
                <div id="pos-val" class="stat-val">1/5</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Lap</div>
                <div id="lap-val" class="stat-val">1/3</div>
            </div>
        </div>
        
        <div id="speedometer">
            <div id="speed-val" style="font-size: 4rem; font-weight: 900;">0</div>
            <div class="speed-unit">KM/H</div>
        </div>
    </div>

    <div id="mobile-controls">
        <div style="display:flex; gap:15px;">
            <div class="m-btn" id="m-left">←</div>
            <div class="m-btn" id="m-right">→</div>
        </div>
        <div class="m-btn" id="m-accel" style="background:var(--accent); color:black;">GAS</div>
    </div>

    <div id="overlay">
        <h1>NITRO<br>FORMULA</h1>
        <p style="color: #94a3b8; margin-top: 20px; max-width: 400px; font-weight: 600; line-height: 1.5;">
            Master the circuit in this high-speed racer.<br>
            Arrows to Steer & Accelerate.<br>
            Push forward to victory!
        </p>
        <button class="btn" onclick="window.game.start()">RACE NOW</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        class RacingGame {
            constructor() {
                this.state = 'menu';
                this.speed = 0;
                this.maxSpeed = 3.0;
                this.accel = 0.008;
                this.friction = 0.99;
                this.steering = 0;
                this.trackProgress = 0;
                this.laps = 1;
                this.opponents = [];
                
                this.initEngine();
                this.createTrack();
                this.createEnvironment();
                this.createPlayer();
                this.createAI();
                this.setupInput();
                
                this.loop = this.loop.bind(this);
                requestAnimationFrame(this.loop);
            }

            initEngine() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x7dd3fc);
                this.scene.fog = new THREE.FogExp2(0x7dd3fc, 0.001);

                this.camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 5000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                document.body.appendChild(this.renderer.domElement);

                this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
                const sun = new THREE.DirectionalLight(0xfffae3, 1.2);
                sun.position.set(100, 300, 100); sun.castShadow = true;
                this.scene.add(sun);

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            createTrack() {
                const pts = [
                    new THREE.Vector3(0, 0, 0),
                    new THREE.Vector3(100, 0, -300),
                    new THREE.Vector3(400, 0, -600),
                    new THREE.Vector3(800, 0, -400),
                    new THREE.Vector3(900, 0, 0),
                    new THREE.Vector3(700, 0, 400),
                    new THREE.Vector3(300, 0, 600),
                    new THREE.Vector3(-100, 0, 300)
                ];
                this.trackCurve = new THREE.CatmullRomCurve3(pts, true);
                
                // FLAT GREY TRACK
                const trackGeo = new THREE.TubeGeometry(this.trackCurve, 256, 12, 12, false);
                // We'll flatten the tube to make a road
                const pos = trackGeo.attributes.position;
                for (let i = 0; i < pos.count; i++) {
                    let y = pos.getY(i);
                    // Force the bottom half of the tube to be extremely flat
                    pos.setY(i, y * 0.05);
                }
                const trackMat = new THREE.MeshStandardMaterial({ color: 0x334155, roughness: 0.9 });
                this.trackMesh = new THREE.Mesh(trackGeo, trackMat);
                this.trackMesh.receiveShadow = true;
                
                // LANES
                const laneGeo = new THREE.TubeGeometry(this.trackCurve, 256, 12.2, 12, false);
                for (let i = 0; i < laneGeo.attributes.position.count; i++) {
                    laneGeo.attributes.position.setY(i, laneGeo.attributes.position.getY(i) * 0.01 + 0.1);
                }
                const laneMat = new THREE.MeshStandardMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.2 });
                const lanes = new THREE.Mesh(laneGeo, laneMat);
                
                this.scene.add(this.trackMesh, lanes);
            }

            createEnvironment() {
                const ground = new THREE.Mesh(new THREE.PlaneGeometry(10000, 10000), new THREE.MeshStandardMaterial({color: 0x166534}));
                ground.rotation.x = -Math.PI/2; ground.position.y = -0.5;
                this.scene.add(ground);

                for(let i=0; i<150; i++) {
                    const tree = new THREE.Group();
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(1, 1.5, 10), new THREE.MeshStandardMaterial({color: 0x451a03}));
                    const leaves = new THREE.Mesh(new THREE.ConeGeometry(6, 15), new THREE.MeshStandardMaterial({color: 0x064e3b}));
                    leaves.position.y = 10; tree.add(trunk, leaves);
                    const ang = Math.random() * Math.PI * 2; const rad = 250 + Math.random() * 1200;
                    tree.position.set(Math.cos(ang)*rad, 0, Math.sin(ang)*rad);
                    this.scene.add(tree);
                }
            }

            createCar(color) {
                const car = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(2, 0.6, 4.5), new THREE.MeshStandardMaterial({color}));
                const nose = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.3, 2), new THREE.MeshStandardMaterial({color}));
                nose.position.z = -2.5;
                const wing = new THREE.Mesh(new THREE.BoxGeometry(3, 0.1, 0.8), new THREE.MeshStandardMaterial({color: 0x111111}));
                wing.position.set(0, 0.8, 2);
                
                const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.5);
                const wheelMat = new THREE.MeshStandardMaterial({color: 0x111111});
                const w1 = new THREE.Mesh(wheelGeo, wheelMat); w1.rotation.z = Math.PI/2; w1.position.set(1.2, 0, -1.5);
                const w2 = w1.clone(); w2.position.x = -1.2;
                const w3 = w1.clone(); w3.position.set(1.2, 0, 1.5);
                const w4 = w3.clone(); w4.position.x = -1.2;
                
                car.add(body, nose, wing, w1, w2, w3, w4);
                car.castShadow = true;
                return car;
            }

            createPlayer() {
                this.playerCar = this.createCar(0xef4444);
                this.scene.add(this.playerCar);
            }

            createAI() {
                const colors = [0x3b82f6, 0xfacc15, 0x22c55e, 0xa855f7];
                for(let i=0; i<4; i++) {
                    const car = this.createCar(colors[i]);
                    const ai = { mesh: car, progress: 0.02 + (i * 0.01), speed: 0.9 + Math.random()*0.3, offset: (i-1.5)*6 };
                    this.opponents.push(ai);
                    this.scene.add(car);
                }
            }

            setupInput() {
                this.keys = {};
                window.onkeydown = e => this.keys[e.code] = true;
                window.onkeyup = e => this.keys[e.code] = false;
                
                const bind = (id, k) => {
                    const el = document.getElementById(id);
                    el.ontouchstart = (e) => { e.preventDefault(); this.keys[k] = true; };
                    el.ontouchend = (e) => { e.preventDefault(); this.keys[k] = false; };
                };
                bind('m-left', 'ArrowLeft'); bind('m-right', 'ArrowRight'); bind('m-accel', 'ArrowUp');
            }

            start() {
                this.state = 'playing';
                document.getElementById('overlay').style.display = 'none';
            }

            update(dt) {
                if(this.state !== 'playing') return;

                // Player Physics
                if (this.keys['ArrowUp'] || this.keys['KeyW']) this.speed = Math.min(this.maxSpeed, this.speed + this.accel);
                else this.speed *= this.friction;
                
                if (this.keys['ArrowDown'] || this.keys['KeyS']) this.speed *= 0.9;

                this.trackProgress += (this.speed * dt * 0.08);
                if (this.trackProgress > 1) { this.trackProgress -= 1; this.laps++; }

                let steerTarget = 0;
                if (this.keys['ArrowLeft'] || this.keys['KeyA']) steerTarget = 8;
                if (this.keys['ArrowRight'] || this.keys['KeyD']) steerTarget = -8;
                this.steering = THREE.MathUtils.lerp(this.steering, steerTarget, 0.1);

                // Update Position on Track
                const pos = this.trackCurve.getPointAt(this.trackProgress % 1);
                const tangent = this.trackCurve.getTangentAt(this.trackProgress % 1).normalize();
                
                this.playerCar.position.copy(pos);
                this.playerCar.lookAt(pos.clone().add(tangent));
                
                // Steer offset
                const side = new THREE.Vector3(0, 1, 0).cross(tangent).normalize();
                this.playerCar.position.add(side.multiplyScalar(this.steering));
                this.playerCar.rotation.z = -this.steering * 0.05; // Bank

                // AI Opponents
                this.opponents.forEach(ai => {
                    ai.progress += (ai.speed * dt * 0.08);
                    if(ai.progress > 1) ai.progress -= 1;
                    const aPos = this.trackCurve.getPointAt(ai.progress % 1);
                    const aTan = this.trackCurve.getTangentAt(ai.progress % 1).normalize();
                    ai.mesh.position.copy(aPos);
                    ai.mesh.lookAt(aPos.clone().add(aTan));
                    const aSide = new THREE.Vector3(0, 1, 0).cross(aTan).normalize();
                    ai.mesh.position.add(aSide.multiplyScalar(ai.offset));
                });

                // HUD
                document.getElementById('speed-val').textContent = Math.floor(this.speed * 110);
                document.getElementById('lap-val').textContent = `${this.laps}/3`;
                
                // Perspective Camera (Follow from behind, looking up-screen)
                const camOffset = new THREE.Vector3(0, 5, 12).applyQuaternion(this.playerCar.quaternion);
                this.camera.position.lerp(this.playerCar.position.clone().add(camOffset), 0.1);
                this.camera.lookAt(this.playerCar.position.clone().add(tangent.multiplyScalar(50)));
                
                // Speed FOV effect
                this.camera.fov = 60 + (this.speed * 10);
                this.camera.updateProjectionMatrix();

                if(this.laps > 3) {
                    alert("YOU FINISHED THE RACE!");
                    location.reload();
                }
            }

            loop() {
                this.update(0.016);
                this.renderer.render(this.scene, this.camera);
                requestAnimationFrame(this.loop);
            }
        }

        window.game = new RacingGame();
    </script>
</body>
</html>
