<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Go Fast Pro: Turbo GP - K2 games</title>
    <style>
        :root {
            --primary: #3b82f6;
            --accent: #ef4444;
            --gold: #fbbf24;
            --bg: #0f172a;
            --glass: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        #game-container {
            position: relative;
            flex: 1;
            background: #000;
            overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* HUD Layer */
        .hud-overlay {
            position: absolute; inset: 0;
            pointer-events: none;
            z-index: 50;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hud-top { display: flex; justify-content: space-between; align-items: flex-start; }
        
        .stat-group { display: flex; flex-direction: column; gap: 8px; }
        
        .stat-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            min-width: 120px;
        }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; opacity: 0.6; letter-spacing: 1px; }
        .stat-val { font-size: 1.4rem; font-weight: 900; font-family: monospace; }

        /* Minimap */
        #minimap {
            width: 150px;
            height: 150px;
            background: var(--glass);
            border-radius: 15px;
            border: 2px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        #minimap canvas { width: 100%; height: 100%; }

        /* Standings */
        #standings {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--border);
            min-width: 180px;
        }
        .standing-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.85rem;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .standing-row.player { color: var(--gold); background: rgba(251, 191, 36, 0.1); border-radius: 4px; padding: 4px 8px; margin: 0 -8px; }
        .rank { opacity: 0.6; margin-right: 10px; width: 20px; display: inline-block; }

        /* Speedo */
        .speedometer {
            align-self: flex-end;
            text-align: right;
        }
        .speed-val { font-size: 3rem; font-weight: 900; line-height: 1; }
        .speed-unit { font-size: 0.8rem; color: var(--primary); font-weight: 800; }

        /* Screen Overlays */
        .screen-overlay {
            position: absolute; inset: 0;
            background: rgba(2, 6, 23, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; text-align: center; padding: 20px;
        }

        .btn-large {
            background: var(--primary); color: white; border: none; padding: 1.2rem 3.5rem;
            border-radius: 50px; font-weight: 800; cursor: pointer; margin-top: 2rem;
            font-size: 1.2rem; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
            text-transform: uppercase;
        }

        #start-screen h1 { font-size: 4rem; font-style: italic; font-weight: 900; color: #fff; line-height: 1; }
        #start-screen span { color: var(--primary); }

        /* Mobile Controls */
        #mobile-controls {
            position: absolute; bottom: 30px; left: 0; right: 0;
            display: none; justify-content: space-between; padding: 0 30px;
            pointer-events: none; z-index: 100;
        }
        @media (max-width: 900px) { #mobile-controls { display: flex; } }
        .control-btn {
            width: 80px; height: 80px; background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2); border-radius: 50%;
            pointer-events: auto; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; backdrop-filter: blur(5px);
        }
        .control-btn:active { background: var(--primary); }

        .back-link { position: fixed; bottom: 20px; left: 20px; color: #94a3b8; text-decoration: none; font-size: 0.8rem; z-index: 1000; font-weight: bold; }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="hud-overlay">
            <div class="hud-top">
                <div class="stat-group">
                    <div class="stat-card">
                        <span class="stat-label">Lap</span>
                        <div class="stat-val" id="lap-val">1/3</div>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Time</span>
                        <div class="stat-val" id="time-val">00:00.00</div>
                    </div>
                </div>

                <div id="standings">
                    <div class="standing-row player"><span class="rank">1</span> <span>YOU</span></div>
                    <div class="standing-row"><span class="rank">2</span> <span>CPU 1</span></div>
                    <div class="standing-row"><span class="rank">3</span> <span>CPU 2</span></div>
                    <div class="standing-row"><span class="rank">4</span> <span>CPU 3</span></div>
                </div>

                <div id="minimap">
                    <canvas id="minimapCanvas"></canvas>
                </div>
            </div>

            <div class="speedometer">
                <div class="speed-val" id="speed-val">0</div>
                <div class="speed-unit">KM/H</div>
            </div>
        </div>

        <div id="mobile-controls">
            <div style="display:flex; gap:20px;">
                <div class="control-btn" id="btn-left">◀</div>
                <div class="control-btn" id="btn-right">▶</div>
            </div>
            <div class="control-btn" id="btn-gas" style="background:rgba(59, 130, 246, 0.3); border-color:var(--primary);">GAS</div>
        </div>

        <div id="start-screen" class="screen-overlay">
            <h1>GO FAST <span>PRO</span></h1>
            <p style="opacity: 0.6; margin-top: 10px; max-width: 400px;">Ultimate Turbo Racing. Outpace the competition and dominate the track.</p>
            <div id="results" style="display:none; margin-top: 20px;">
                <h2 id="finish-msg" style="color: var(--gold); font-size: 2rem;">VICTORY!</h2>
                <p>Final Time: <span id="final-time">00:00.00</span></p>
            </div>
            <button class="btn-large" id="start-btn">START RACE</button>
        </div>
    </div>

    <a href="index.html" class="back-link">← HUB</a>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

        class GoFastPro {
            constructor() {
                this.state = {
                    playing: false,
                    lap: 1,
                    totalLaps: 3,
                    startTime: 0,
                    speed: 0,
                    maxSpeed: 2.5,
                    accel: 0.008,
                    friction: 0.98,
                    steering: 0,
                    pos: new THREE.Vector3(),
                    trackPos: 0,
                    standings: [
                        { name: 'YOU', dist: 0, isPlayer: true },
                        { name: 'VIPER', dist: 0, speed: 2.1 },
                        { name: 'TURBO', dist: 0, speed: 2.2 },
                        { name: 'GHOST', dist: 0, speed: 2.3 }
                    ]
                };

                this.initEngine();
                this.createTrack();
                this.createVehicles();
                this.setupControls();
                this.setupMinimap();
                
                this.loop = this.loop.bind(this);
                requestAnimationFrame(this.loop);
            }

            initEngine() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x0c4a6e);
                this.scene.fog = new THREE.Fog(0x0c4a6e, 50, 500);

                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                document.getElementById('game-container').appendChild(this.renderer.domElement);

                const ambient = new THREE.AmbientLight(0xffffff, 0.6);
                this.scene.add(ambient);

                const sun = new THREE.DirectionalLight(0xffffff, 1.2);
                sun.position.set(100, 200, 100);
                sun.castShadow = true;
                this.scene.add(sun);

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            createTrack() {
                const points = [];
                const radius = 250;
                const segments = 100;
                for(let i=0; i<segments; i++) {
                    const a = (i / segments) * Math.PI * 2;
                    const r = radius + Math.sin(a * 4) * 40;
                    const x = Math.cos(a) * r;
                    const z = Math.sin(a) * r;
                    const y = Math.sin(a * 2) * 10;
                    points.push(new THREE.Vector3(x, y, z));
                }
                
                this.trackCurve = new THREE.CatmullRomCurve3(points, true);
                const trackGeo = new THREE.TubeGeometry(this.trackCurve, 200, 12, 8, true);
                const trackMat = new THREE.MeshStandardMaterial({ color: 0x334155, roughness: 0.8 });
                this.trackMesh = new THREE.Mesh(trackGeo, trackMat);
                this.trackMesh.receiveShadow = true;
                this.scene.add(this.trackMesh);

                const curbGeo = new THREE.TubeGeometry(this.trackCurve, 200, 13, 8, true);
                const curbMat = new THREE.MeshStandardMaterial({ color: 0xef4444, wireframe: true });
                this.scene.add(new THREE.Mesh(curbGeo, curbMat));

                const groundGeo = new THREE.PlaneGeometry(2000, 2000);
                const groundMat = new THREE.MeshStandardMaterial({ color: 0x064e3b });
                const ground = new THREE.Mesh(groundGeo, groundMat);
                ground.rotation.x = -Math.PI / 2;
                ground.position.y = -20;
                ground.receiveShadow = true;
                this.scene.add(ground);

                for(let i=0; i<100; i++) {
                    const t = i / 100;
                    const pos = this.trackCurve.getPoint(t);
                    const tangent = this.trackCurve.getTangent(t);
                    const normal = tangent.clone().cross(new THREE.Vector3(0,1,0)).normalize();
                    
                    const tree = new THREE.Group();
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 4), new THREE.MeshStandardMaterial({ color: 0x451a03 }));
                    const leaves = new THREE.Mesh(new THREE.ConeGeometry(3, 6, 8), new THREE.MeshStandardMaterial({ color: 0x14532d }));
                    leaves.position.y = 4;
                    tree.add(trunk, leaves);
                    
                    const side = Math.random() > 0.5 ? 1 : -1;
                    tree.position.copy(pos).add(normal.multiplyScalar(30 * side));
                    tree.position.y = -10;
                    this.scene.add(tree);
                }
            }

            createVehicles() {
                this.playerCar = this.createCarMesh(0x3b82f6);
                this.scene.add(this.playerCar);

                this.opponentCars = this.state.standings.filter(s => !s.isPlayer).map(s => {
                    const car = this.createCarMesh(0xef4444);
                    s.mesh = car;
                    this.scene.add(car);
                    return s;
                });
            }

            createCarMesh(color) {
                const car = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 4), new THREE.MeshStandardMaterial({ color: color }));
                body.position.y = 0.5;
                body.castShadow = true;
                
                const cockpit = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.8, 1.5), new THREE.MeshStandardMaterial({ color: 0x111111 }));
                cockpit.position.set(0, 1.2, -0.5);
                
                const spoiler = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.2, 0.8), new THREE.MeshStandardMaterial({ color: color }));
                spoiler.position.set(0, 1.5, 1.8);

                car.add(body, cockpit, spoiler);
                return car;
            }

            setupControls() {
                this.keys = {};
                window.onkeydown = e => this.keys[e.key] = true;
                window.onkeyup = e => this.keys[e.key] = false;

                const addTouch = (id, key) => {
                    const el = document.getElementById(id);
                    el.addEventListener('touchstart', (e) => { e.preventDefault(); this.keys[key] = true; });
                    el.addEventListener('touchend', () => this.keys[key] = false);
                };
                addTouch('btn-left', 'ArrowLeft');
                addTouch('btn-right', 'ArrowRight');
                addTouch('btn-gas', ' ');

                document.getElementById('start-btn').onclick = () => this.startRace();
            }

            setupMinimap() {
                this.minimapCanvas = document.getElementById('minimapCanvas');
                this.mctx = this.minimapCanvas.getContext('2d');
                this.minimapCanvas.width = 150;
                this.minimapCanvas.height = 150;
            }

            startRace() {
                this.state.playing = true;
                this.state.startTime = Date.now();
                this.state.lap = 1;
                this.state.speed = 0;
                this.state.trackPos = 0;
                this.state.standings.forEach(s => s.dist = 0);
                document.getElementById('start-screen').style.display = 'none';
            }

            update() {
                if (!this.state.playing) {
                    const t = Date.now() * 0.0002;
                    this.camera.position.set(Math.cos(t) * 300, 100, Math.sin(t) * 300);
                    this.camera.lookAt(0, 0, 0);
                    return;
                }

                const gas = this.keys['ArrowUp'] || this.keys[' '] || this.keys['w'];
                const left = this.keys['ArrowLeft'] || this.keys['a'];
                const right = this.keys['ArrowRight'] || this.keys['d'];

                if (gas) this.state.speed += this.state.accel;
                this.state.speed *= this.state.friction;
                if (this.state.speed > this.state.maxSpeed) this.state.speed = this.state.maxSpeed;

                if (left) this.state.steering = THREE.MathUtils.lerp(this.state.steering, 8, 0.1);
                else if (right) this.state.steering = THREE.MathUtils.lerp(this.state.steering, -8, 0.1);
                else this.state.steering = THREE.MathUtils.lerp(this.state.steering, 0, 0.1);

                this.state.trackPos += this.state.speed * 0.001;
                if (this.state.trackPos >= 1) {
                    this.state.trackPos -= 1;
                    this.state.lap++;
                    if (this.state.lap > this.state.totalLaps) this.finishRace();
                }
                
                this.updateCar(this.playerCar, this.state.trackPos, this.state.steering);
                this.state.standings.find(s => s.isPlayer).dist = (this.state.lap-1) + this.state.trackPos;

                this.opponentCars.forEach(opp => {
                    opp.dist += opp.speed * 0.0004;
                    const t = opp.dist % 1;
                    this.updateCar(opp.mesh, t, Math.sin(Date.now() * 0.001 + opp.dist) * 2);
                });

                const elapsed = Date.now() - this.state.startTime;
                document.getElementById('time-val').textContent = this.formatTime(elapsed);
                document.getElementById('lap-val').textContent = `${Math.min(this.state.lap, this.state.totalLaps)}/${this.state.totalLaps}`;
                document.getElementById('speed-val').textContent = Math.floor(this.state.speed * 120);

                this.state.standings.sort((a, b) => b.dist - a.dist);
                const standingsEl = document.getElementById('standings');
                standingsEl.innerHTML = '';
                this.state.standings.forEach((s, i) => {
                    const row = document.createElement('div');
                    row.className = `standing-row ${s.isPlayer ? 'player' : ''}`;
                    row.innerHTML = `<span class="rank">${i + 1}</span> <span>${s.name}</span>`;
                    standingsEl.appendChild(row);
                });

                const camPos = this.trackCurve.getPoint((this.state.trackPos - 0.02 + 1) % 1);
                this.camera.position.copy(camPos).add(new THREE.Vector3(0, 6, 0));
                
                const fovTarget = 60 + (this.state.speed / this.state.maxSpeed) * 30;
                this.camera.fov = THREE.MathUtils.lerp(this.camera.fov, fovTarget, 0.05);
                this.camera.updateProjectionMatrix();
                
                const target = this.trackCurve.getPoint((this.state.trackPos + 0.05) % 1);
                this.camera.lookAt(target);
                this.camera.rotation.z = this.state.steering * 0.01;

                this.drawMinimap();
            }

            updateCar(mesh, t, steeringOffset) {
                const pos = this.trackCurve.getPoint(t);
                const tangent = this.trackCurve.getTangent(t);
                const normal = tangent.clone().cross(new THREE.Vector3(0,1,0)).normalize();
                mesh.position.copy(pos).add(normal.multiplyScalar(steeringOffset));
                mesh.lookAt(this.trackCurve.getPoint((t + 0.01) % 1));
                mesh.rotation.y += Math.PI;
            }

            drawMinimap() {
                const ctx = this.mctx;
                ctx.clearRect(0, 0, 150, 150);
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 4;
                ctx.beginPath();
                const points = this.trackCurve.getPoints(50);
                points.forEach((p, i) => {
                    const x = 75 + p.x * 0.2;
                    const z = 75 + p.z * 0.2;
                    if(i === 0) ctx.moveTo(x, z); else ctx.lineTo(x, z);
                });
                ctx.closePath();
                ctx.stroke();
                this.state.standings.forEach(s => {
                    const t = s.dist % 1;
                    const p = this.trackCurve.getPoint(t);
                    ctx.fillStyle = s.isPlayer ? '#fbbf24' : '#ef4444';
                    ctx.beginPath();
                    ctx.arc(75 + p.x * 0.2, 75 + p.z * 0.2, 4, 0, Math.PI*2);
                    ctx.fill();
                });
            }

            formatTime(ms) {
                const totalSeconds = ms / 1000;
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = Math.floor(totalSeconds % 60);
                const centi = Math.floor((ms % 1000) / 10);
                return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}.${centi.toString().padStart(2, '0')}`;
            }

            finishRace() {
                this.state.playing = false;
                const elapsed = Date.now() - this.state.startTime;
                const rank = this.state.standings.findIndex(s => s.isPlayer) + 1;
                document.getElementById('start-screen').style.display = 'flex';
                document.getElementById('results').style.display = 'block';
                document.getElementById('finish-msg').textContent = rank === 1 ? "VICTORY! 🏆" : `FINISH: ${rank}${['st','nd','rd','th'][Math.min(rank-1, 3)]}`;
                document.getElementById('final-time').textContent = this.formatTime(elapsed);
                document.getElementById('start-btn').textContent = "RETRY RACE";
            }

            render() {
                this.renderer.render(this.scene, this.camera);
            }

            loop() {
                this.update();
                this.render();
                requestAnimationFrame(this.loop);
            }
        }

        const game = new GoFastPro();
    </script>
</body>
</html>
