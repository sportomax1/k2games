<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rail Forge - K2 Games</title>
    <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8Xw8AAnUB9WQ0N2IAAAAASUVORK5CYII=">
    <style>
        :root {
            --ink: #142017;
            --panel: rgba(21, 29, 25, 0.86);
            --panel-strong: rgba(11, 15, 13, 0.92);
            --line: rgba(255, 255, 255, 0.13);
            --cream: #f6f0db;
            --muted: #bfd1b8;
            --gold: #f4c74c;
            --green: #60b96f;
            --sky: #bfe6f7;
            --red: #ef6b5f;
            --blue: #58a5f5;
            --shadow: rgba(0, 0, 0, 0.32);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #88c47f;
            color: var(--cream);
            font-family: Inter, "Segoe UI", system-ui, sans-serif;
        }

        body {
            display: grid;
            grid-template-columns: 300px minmax(0, 1fr);
            grid-template-rows: 100dvh;
        }

        button {
            font: inherit;
        }

        #hud {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 0;
            padding: 14px;
            background:
                linear-gradient(180deg, rgba(20, 29, 25, 0.98), rgba(11, 15, 13, 0.94)),
                radial-gradient(circle at 10% 5%, rgba(244, 199, 76, 0.18), transparent 34%);
            border-right: 1px solid var(--line);
            box-shadow: 18px 0 38px rgba(0, 0, 0, 0.18);
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .back-link {
            width: 36px;
            height: 36px;
            display: grid;
            place-items: center;
            color: var(--cream);
            text-decoration: none;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.06);
            font-size: 22px;
            line-height: 1;
        }

        .brand {
            min-width: 0;
        }

        .app-logo {
            width: 46px;
            height: 46px;
            flex: 0 0 46px;
            position: relative;
            display: grid;
            place-items: center;
            border-radius: 10px;
            color: #1b2114;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.46), rgba(255, 255, 255, 0) 38%),
                linear-gradient(145deg, #f4c74c, #de8640);
            box-shadow:
                inset 0 -5px 0 rgba(0, 0, 0, 0.16),
                0 12px 24px rgba(0, 0, 0, 0.2);
            font-weight: 1000;
            letter-spacing: 0;
        }

        .app-logo::before,
        .app-logo::after {
            content: "";
            position: absolute;
            left: 9px;
            right: 9px;
            height: 4px;
            border-radius: 999px;
            background: #25301d;
            transform: rotate(-24deg);
        }

        .app-logo::before {
            top: 14px;
        }

        .app-logo::after {
            bottom: 13px;
        }

        .app-logo span {
            position: relative;
            z-index: 1;
            padding: 2px 4px;
            border-radius: 5px;
            background: rgba(246, 240, 219, 0.86);
            font-size: 14px;
            line-height: 1;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            line-height: 1;
            letter-spacing: 0;
        }

        .subtitle {
            margin-top: 5px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .stat {
            min-width: 0;
            padding: 10px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.06);
        }

        .stat label {
            display: block;
            color: var(--muted);
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .stat strong {
            display: block;
            margin-top: 5px;
            font-size: 19px;
            line-height: 1;
            overflow-wrap: anywhere;
        }

        .panel {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            overflow: hidden;
            min-height: 0;
        }

        .panel-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.05);
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--muted);
        }

        .tools {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            padding: 10px;
        }

        .tool,
        .action {
            min-height: 44px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.07);
            color: var(--cream);
            cursor: pointer;
            font-weight: 900;
            transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
        }

        .tool {
            display: grid;
            place-items: center;
            font-size: 22px;
        }

        .tool:hover,
        .action:hover {
            transform: translateY(-1px);
            border-color: rgba(244, 199, 76, 0.58);
            background: rgba(255, 255, 255, 0.12);
        }

        .tool.active {
            border-color: var(--gold);
            background: rgba(244, 199, 76, 0.2);
            box-shadow: inset 0 0 0 1px rgba(244, 199, 76, 0.2);
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            padding: 10px;
        }

        .action.primary {
            background: linear-gradient(135deg, #f1c64b, #de8640);
            color: #231d0f;
            border-color: rgba(255, 255, 255, 0.24);
        }

        #contracts {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px;
        }

        .contract {
            display: grid;
            grid-template-columns: 30px minmax(0, 1fr) auto;
            gap: 9px;
            align-items: center;
            min-height: 52px;
            padding: 8px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.055);
        }

        .contract.done {
            border-color: rgba(96, 185, 111, 0.58);
            background: rgba(96, 185, 111, 0.12);
        }

        .cargo {
            width: 30px;
            height: 30px;
            border-radius: 7px;
            display: grid;
            place-items: center;
            color: #142017;
            font-weight: 1000;
            box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.18);
        }

        .contract b {
            display: block;
            font-size: 12px;
        }

        .contract span {
            display: block;
            margin-top: 2px;
            color: var(--muted);
            font-size: 11px;
            line-height: 1.2;
        }

        .payout {
            color: var(--gold);
            font-weight: 1000;
            font-size: 13px;
        }

        #log {
            flex: 1;
            min-height: 72px;
            padding: 10px 12px;
            color: #dbead4;
            font-size: 12px;
            line-height: 1.45;
            overflow: auto;
        }

        #worldWrap {
            position: relative;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
            background: linear-gradient(#aee1f4 0 24%, #96d18b 24% 100%);
        }

        #game {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        #floating {
            position: absolute;
            left: 18px;
            right: 18px;
            bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 12px;
            pointer-events: none;
        }

        .pill {
            max-width: min(620px, 100%);
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.26);
            border-radius: 8px;
            background: rgba(19, 27, 23, 0.72);
            backdrop-filter: blur(12px);
            color: var(--cream);
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.2);
            font-size: 12px;
            font-weight: 800;
            line-height: 1.35;
        }

        .minimap {
            width: 132px;
            height: 92px;
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: 8px;
            background: rgba(19, 27, 23, 0.68);
            backdrop-filter: blur(12px);
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.2);
        }

        .toast {
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%) translateY(-8px);
            padding: 10px 14px;
            border-radius: 8px;
            background: rgba(20, 27, 23, 0.86);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--cream);
            font-size: 12px;
            font-weight: 900;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 820px) {
            body {
                grid-template-columns: 1fr;
                grid-template-rows: minmax(0, 1fr) auto;
            }

            #worldWrap {
                grid-row: 1;
            }

            #hud {
                grid-row: 2;
                max-height: 46dvh;
                overflow: auto;
                border-right: 0;
                border-top: 1px solid var(--line);
                padding: 10px;
            }

            .topbar {
                align-items: start;
            }

            h1 {
                font-size: 21px;
            }

            .stats {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }

            .stat {
                padding: 8px;
            }

            .stat strong {
                font-size: 15px;
            }

            .tools {
                grid-template-columns: repeat(6, minmax(0, 1fr));
            }

            .tool {
                min-height: 40px;
            }

            #floating {
                bottom: 10px;
                left: 10px;
                right: 10px;
            }

            .minimap {
                display: none;
            }
        }

        @media (max-width: 520px) {
            .stats {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .panel-title {
                padding: 8px 10px;
            }

            .actions,
            #contracts,
            .tools {
                padding: 8px;
            }

            .action {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <aside id="hud">
        <div class="topbar">
            <a class="back-link" href="index.html" aria-label="Back to K2 Games">&lsaquo;</a>
            <div class="app-logo" aria-label="Rail Forge logo"><span>RF</span></div>
            <div class="brand">
                <h1>Rail Forge</h1>
                <div class="subtitle">Mountain switchyard builder</div>
            </div>
            <button class="action" id="pauseBtn" type="button" aria-label="Pause simulation">Pause</button>
        </div>

        <section class="stats" aria-label="Railroad stats">
            <div class="stat"><label>Funds</label><strong id="money">$780</strong></div>
            <div class="stat"><label>Rating</label><strong id="rating">100%</strong></div>
            <div class="stat"><label>Trains</label><strong id="trainCount">0</strong></div>
            <div class="stat"><label>Build</label><strong id="buildCost">$0</strong></div>
        </section>

        <section class="panel" aria-label="Build tools">
            <div class="panel-title">Tools <span id="toolName">Track</span></div>
            <div class="tools">
                <button class="tool active" data-tool="track" title="Track" type="button" aria-label="Track">T</button>
                <button class="tool" data-tool="station" title="Station" type="button" aria-label="Station">S</button>
                <button class="tool" data-tool="depot" title="Depot" type="button" aria-label="Depot">D</button>
                <button class="tool" data-tool="signal" title="Signal" type="button" aria-label="Signal">!</button>
                <button class="tool" data-tool="trees" title="Trees" type="button" aria-label="Trees">+</button>
                <button class="tool" data-tool="bulldoze" title="Bulldoze" type="button" aria-label="Bulldoze">X</button>
            </div>
        </section>

        <section class="panel" aria-label="Rail actions">
            <div class="panel-title">Operations <span id="day">Day 1</span></div>
            <div class="actions">
                <button class="action primary" id="dispatchBtn" type="button">Dispatch</button>
                <button class="action" id="autoBtn" type="button">Auto Off</button>
                <button class="action" id="clearBtn" type="button">Recall</button>
                <button class="action" id="newMapBtn" type="button">New Map</button>
            </div>
        </section>

        <section class="panel" aria-label="Contracts">
            <div class="panel-title">Contracts <span id="doneCount">0/3</span></div>
            <div id="contracts"></div>
        </section>

        <section class="panel" id="log" aria-live="polite"></section>
    </aside>

    <main id="worldWrap">
        <canvas id="game"></canvas>
        <div class="toast" id="toast"></div>
        <div id="floating">
            <div class="pill" id="hint">Drag between glowing pins to lay track. Place at least two stations, then dispatch.</div>
            <canvas class="minimap" id="mini" width="132" height="92" aria-label="Minimap"></canvas>
        </div>
    </main>

    <script>
        (() => {
            "use strict";

            const canvas = document.getElementById("game");
            const ctx = canvas.getContext("2d");
            const mini = document.getElementById("mini");
            const mtx = mini.getContext("2d");
            const hud = {
                money: document.getElementById("money"),
                rating: document.getElementById("rating"),
                trainCount: document.getElementById("trainCount"),
                buildCost: document.getElementById("buildCost"),
                toolName: document.getElementById("toolName"),
                contracts: document.getElementById("contracts"),
                doneCount: document.getElementById("doneCount"),
                log: document.getElementById("log"),
                hint: document.getElementById("hint"),
                toast: document.getElementById("toast"),
                pauseBtn: document.getElementById("pauseBtn"),
                autoBtn: document.getElementById("autoBtn"),
                day: document.getElementById("day")
            };

            const grid = { cols: 17, rows: 13, cell: 56 };
            const costs = { track: 22, station: 95, depot: 120, signal: 45, trees: 8, bulldoze: 0 };
            const cargoColors = {
                mail: "#f4c74c",
                lumber: "#73bd65",
                steel: "#98a8b7",
                people: "#67b7f7",
                food: "#ed886c"
            };

            const state = {
                tool: "track",
                money: 780,
                rating: 100,
                day: 1,
                paused: false,
                auto: false,
                autoTimer: 0,
                tick: 0,
                dpr: 1,
                buildStart: null,
                hoverNode: null,
                hoverSegment: null,
                tracks: new Map(),
                stations: new Map(),
                signals: new Map(),
                trains: [],
                trees: [],
                towns: [],
                clouds: [],
                contracts: [],
                messageTimer: 0
            };

            const uiNames = {
                track: "Track",
                station: "Station",
                depot: "Depot",
                signal: "Signal",
                trees: "Trees",
                bulldoze: "Bulldoze"
            };

            const logLines = [];

            function key(x, y) {
                return `${x},${y}`;
            }

            function parseKey(k) {
                const parts = k.split(",").map(Number);
                return { x: parts[0], y: parts[1] };
            }

            function segKey(a, b) {
                const ka = key(a.x, a.y);
                const kb = key(b.x, b.y);
                return ka < kb ? `${ka}|${kb}` : `${kb}|${ka}`;
            }

            function sameNode(a, b) {
                return a && b && a.x === b.x && a.y === b.y;
            }

            function adjacent(a, b) {
                const dx = Math.abs(a.x - b.x);
                const dy = Math.abs(a.y - b.y);
                return (dx <= 1 && dy <= 1 && dx + dy > 0);
            }

            function nodeToWorld(x, y) {
                const cx = canvas.width / (2 * state.dpr);
                const cy = canvas.height * 0.23 / state.dpr;
                const isoX = (x - y) * grid.cell * 0.95;
                const isoY = (x + y) * grid.cell * 0.47;
                const ridge = Math.sin(x * 0.72 + y * 0.36) * 12 + Math.cos(y * 0.68) * 9;
                return {
                    x: cx + isoX,
                    y: cy + isoY - ridge,
                    z: ridge
                };
            }

            function worldToNearestNode(px, py, radius = 28) {
                let best = null;
                let bestDist = radius * radius;
                for (let y = 0; y < grid.rows; y++) {
                    for (let x = 0; x < grid.cols; x++) {
                        const p = nodeToWorld(x, y);
                        const dx = px - p.x;
                        const dy = py - p.y;
                        const d = dx * dx + dy * dy;
                        if (d < bestDist) {
                            bestDist = d;
                            best = { x, y, screen: p };
                        }
                    }
                }
                return best;
            }

            function segmentCenter(seg) {
                const a = nodeToWorld(seg.a.x, seg.a.y);
                const b = nodeToWorld(seg.b.x, seg.b.y);
                return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
            }

            function nearestSegment(px, py, radius = 18) {
                let best = null;
                let bestDist = radius * radius;
                state.tracks.forEach((seg, k) => {
                    const a = nodeToWorld(seg.a.x, seg.a.y);
                    const b = nodeToWorld(seg.b.x, seg.b.y);
                    const d = pointToSegmentDistance(px, py, a.x, a.y, b.x, b.y);
                    if (d < bestDist) {
                        bestDist = d;
                        best = { key: k, seg };
                    }
                });
                return best;
            }

            function pointToSegmentDistance(px, py, x1, y1, x2, y2) {
                const dx = x2 - x1;
                const dy = y2 - y1;
                if (dx === 0 && dy === 0) return Math.hypot(px - x1, py - y1);
                const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy)));
                const x = x1 + t * dx;
                const y = y1 + t * dy;
                return Math.hypot(px - x, py - y);
            }

            function fitCanvas() {
                const rect = canvas.getBoundingClientRect();
                const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
                state.dpr = dpr;
                canvas.width = Math.floor(rect.width * dpr);
                canvas.height = Math.floor(rect.height * dpr);
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            }

            function rand(seed) {
                let value = seed % 2147483647;
                return () => {
                    value = value * 16807 % 2147483647;
                    return (value - 1) / 2147483646;
                };
            }

            function resetWorld() {
                state.money = 780;
                state.rating = 100;
                state.day = 1;
                state.paused = false;
                state.auto = false;
                state.autoTimer = 0;
                state.tick = 0;
                state.buildStart = null;
                state.tracks.clear();
                state.stations.clear();
                state.signals.clear();
                state.trains = [];
                state.trees = [];
                state.towns = [];
                state.clouds = [];
                state.contracts = [];
                logLines.length = 0;

                const random = rand(Date.now() % 999999 + 17);
                for (let i = 0; i < 96; i++) {
                    state.trees.push({
                        x: Math.floor(random() * grid.cols),
                        y: Math.floor(random() * grid.rows),
                        offX: (random() - 0.5) * 42,
                        offY: (random() - 0.5) * 20,
                        pine: random() > 0.48,
                        size: 0.72 + random() * 0.72
                    });
                }

                state.towns.push({ x: 2, y: 2, name: "Pine", color: cargoColors.people });
                state.towns.push({ x: 13, y: 2, name: "Mill", color: cargoColors.lumber });
                state.towns.push({ x: 4, y: 10, name: "Mesa", color: cargoColors.mail });
                state.towns.push({ x: 14, y: 9, name: "Steel", color: cargoColors.steel });
                state.towns.push({ x: 9, y: 5, name: "Grove", color: cargoColors.food });

                for (let i = 0; i < 7; i++) {
                    state.clouds.push({
                        x: random(),
                        y: 0.05 + random() * 0.18,
                        s: 0.7 + random() * 1.4,
                        speed: 0.008 + random() * 0.014
                    });
                }

                state.contracts = [
                    makeContract("people", "Pine", "Grove", 145),
                    makeContract("lumber", "Mill", "Mesa", 180),
                    makeContract("steel", "Steel", "Pine", 230)
                ];

                addTrack({ x: 2, y: 2 }, { x: 3, y: 3 }, true);
                addTrack({ x: 3, y: 3 }, { x: 4, y: 4 }, true);
                addTrack({ x: 4, y: 4 }, { x: 5, y: 5 }, true);
                addTrack({ x: 5, y: 5 }, { x: 6, y: 5 }, true);
                addStation({ x: 2, y: 2 }, "Pine", "station", true);
                addStation({ x: 6, y: 5 }, "Depot", "depot", true);
                message("Fresh valley charter signed. The first spur is free.");
                updateHud();
            }

            function makeContract(cargo, from, to, payout) {
                return { cargo, from, to, payout, done: false };
            }

            function spend(amount) {
                if (state.money < amount) {
                    flash(`Need $${amount}`);
                    return false;
                }
                state.money -= amount;
                updateHud();
                return true;
            }

            function addTrack(a, b, free = false) {
                if (!adjacent(a, b)) return false;
                const k = segKey(a, b);
                if (state.tracks.has(k)) return false;
                if (!free && !spend(costs.track)) return false;
                state.tracks.set(k, { a: { x: a.x, y: a.y }, b: { x: b.x, y: b.y }, age: 0 });
                updateHud();
                return true;
            }

            function addStation(node, name = "", type = "station", free = false) {
                const k = key(node.x, node.y);
                if (state.stations.has(k)) return false;
                const cost = type === "depot" ? costs.depot : costs.station;
                if (!free && !spend(cost)) return false;
                const town = nearestTown(node.x, node.y);
                const stationName = name || (town && Math.hypot(town.x - node.x, town.y - node.y) < 1.7 ? town.name : `Post ${state.stations.size + 1}`);
                state.stations.set(k, {
                    x: node.x,
                    y: node.y,
                    name: stationName,
                    type,
                    cargo: town ? cargoForTown(town.name) : "mail"
                });
                message(`${type === "depot" ? "Depot" : "Station"} opened at ${stationName}.`);
                updateHud();
                return true;
            }

            function cargoForTown(name) {
                if (name === "Mill") return "lumber";
                if (name === "Steel") return "steel";
                if (name === "Grove") return "food";
                if (name === "Pine") return "people";
                return "mail";
            }

            function nearestTown(x, y) {
                let best = null;
                let dist = Infinity;
                for (const town of state.towns) {
                    const d = Math.hypot(town.x - x, town.y - y);
                    if (d < dist) {
                        dist = d;
                        best = town;
                    }
                }
                return best;
            }

            function toggleSignal(node) {
                const k = key(node.x, node.y);
                const touches = getNeighbors(k);
                if (touches.length < 2) {
                    flash("Signal needs track");
                    return;
                }
                if (state.signals.has(k)) {
                    state.signals.get(k).held = !state.signals.get(k).held;
                } else if (spend(costs.signal)) {
                    state.signals.set(k, { x: node.x, y: node.y, held: false });
                }
                updateHud();
            }

            function bulldoze(node, px, py) {
                const sKey = key(node.x, node.y);
                if (state.stations.has(sKey)) {
                    state.stations.delete(sKey);
                    state.money += 26;
                    message("Structure salvaged.");
                } else if (state.signals.has(sKey)) {
                    state.signals.delete(sKey);
                    state.money += 8;
                } else {
                    const near = nearestSegment(px, py, 26);
                    if (near) {
                        state.tracks.delete(near.key);
                        state.money += 5;
                        message("Track removed.");
                    }
                }
                updateHud();
            }

            function plantTree(node) {
                if (!spend(costs.trees)) return;
                state.trees.push({
                    x: node.x,
                    y: node.y,
                    offX: (Math.random() - 0.5) * 48,
                    offY: (Math.random() - 0.5) * 24,
                    pine: Math.random() > 0.5,
                    size: 0.8 + Math.random() * 0.7
                });
                updateHud();
            }

            function getNeighbors(k) {
                const n = parseKey(k);
                const out = [];
                state.tracks.forEach(seg => {
                    const ak = key(seg.a.x, seg.a.y);
                    const bk = key(seg.b.x, seg.b.y);
                    if (ak === k) out.push(bk);
                    if (bk === k) out.push(ak);
                });
                return out.filter(v => v !== key(n.x, n.y));
            }

            function findPath(startKey, endKey) {
                if (startKey === endKey) return [startKey];
                const queue = [startKey];
                const came = new Map([[startKey, null]]);
                while (queue.length) {
                    const current = queue.shift();
                    for (const next of getNeighbors(current)) {
                        if (came.has(next)) continue;
                        came.set(next, current);
                        if (next === endKey) {
                            const path = [next];
                            let p = current;
                            while (p) {
                                path.unshift(p);
                                p = came.get(p);
                            }
                            return path;
                        }
                        queue.push(next);
                    }
                }
                return null;
            }

            function dispatchTrain() {
                const stations = [...state.stations.entries()].filter(([, s]) => s.type === "station");
                if (stations.length < 2) {
                    flash("Build two stations");
                    return;
                }

                const pending = state.contracts.find(c => !c.done);
                let startEntry;
                let endEntry;
                if (pending) {
                    startEntry = stations.find(([, s]) => s.name === pending.from) || stations[0];
                    endEntry = stations.find(([, s]) => s.name === pending.to) || stations[stations.length - 1];
                } else {
                    startEntry = stations[Math.floor(Math.random() * stations.length)];
                    endEntry = stations.find(([k]) => k !== startEntry[0]);
                }

                const path = findPath(startEntry[0], endEntry[0]);
                if (!path || path.length < 2) {
                    flash(`${startEntry[1].name} is not connected`);
                    return;
                }

                state.trains.push({
                    id: Math.random().toString(36).slice(2),
                    path,
                    from: startEntry[1].name,
                    to: endEntry[1].name,
                    cargo: pending ? pending.cargo : startEntry[1].cargo,
                    leg: 0,
                    t: 0,
                    speed: 0.13 + Math.random() * 0.04,
                    cars: 2 + Math.floor(Math.random() * 3),
                    stopped: false,
                    wait: 0
                });
                message(`Train dispatched: ${startEntry[1].name} to ${endEntry[1].name}.`);
                updateHud();
            }

            function update(dt) {
                state.tick += dt;
                if (!state.paused) {
                    state.day += dt * 0.018;
                    state.autoTimer += dt;
                    if (state.auto && state.autoTimer > 8) {
                        state.autoTimer = 0;
                        dispatchTrain();
                    }
                    for (const train of state.trains) updateTrain(train, dt);
                    checkTrainSpacing();
                    state.trains = state.trains.filter(t => !t.finished);
                }

                for (const cloud of state.clouds) {
                    cloud.x += cloud.speed * dt;
                    if (cloud.x > 1.18) cloud.x = -0.2;
                }

                if (state.messageTimer > 0) state.messageTimer -= dt;
                updateHud();
            }

            function updateTrain(train, dt) {
                if (train.wait > 0) {
                    train.wait -= dt;
                    return;
                }
                const currentKey = train.path[train.leg];
                const signal = state.signals.get(currentKey);
                if (signal && signal.held && train.t < 0.08) {
                    train.wait = 0.35;
                    return;
                }

                train.t += train.speed * dt;
                if (train.t >= 1) {
                    train.leg += 1;
                    train.t = 0;
                    if (train.leg >= train.path.length - 1) {
                        finishTrain(train);
                    }
                }
            }

            function finishTrain(train) {
                const contract = state.contracts.find(c => !c.done && c.from === train.from && c.to === train.to && c.cargo === train.cargo);
                if (contract) {
                    contract.done = true;
                    state.money += contract.payout;
                    state.rating = Math.min(100, state.rating + 2);
                    message(`${contract.from} to ${contract.to} contract paid $${contract.payout}.`);
                    flash(`Contract paid $${contract.payout}`);
                } else {
                    const fare = 38 + train.path.length * 7;
                    state.money += fare;
                    message(`${train.to} delivery paid $${fare}.`);
                }
                train.finished = true;
                if (state.contracts.every(c => c.done)) {
                    state.contracts.push(makeContract("food", "Grove", "Steel", 260));
                    state.contracts.push(makeContract("mail", "Mesa", "Mill", 210));
                    flash("New contracts unlocked");
                }
                updateHud();
            }

            function trainPosition(train) {
                const a = parseKey(train.path[train.leg]);
                const b = parseKey(train.path[Math.min(train.leg + 1, train.path.length - 1)]);
                const pa = nodeToWorld(a.x, a.y);
                const pb = nodeToWorld(b.x, b.y);
                return {
                    x: pa.x + (pb.x - pa.x) * train.t,
                    y: pa.y + (pb.y - pa.y) * train.t,
                    angle: Math.atan2(pb.y - pa.y, pb.x - pa.x)
                };
            }

            function checkTrainSpacing() {
                for (let i = 0; i < state.trains.length; i++) {
                    for (let j = i + 1; j < state.trains.length; j++) {
                        const a = trainPosition(state.trains[i]);
                        const b = trainPosition(state.trains[j]);
                        const d = Math.hypot(a.x - b.x, a.y - b.y);
                        if (d < 18 && !state.trains[i].finished && !state.trains[j].finished) {
                            state.trains[i].wait = 1.8;
                            state.trains[j].wait = 1.8;
                            state.rating = Math.max(0, state.rating - 4);
                            message("Near miss slowed the line. Rating dropped.");
                        }
                    }
                }
            }

            function draw() {
                const w = canvas.width / state.dpr;
                const h = canvas.height / state.dpr;
                ctx.clearRect(0, 0, w, h);
                drawSky(w, h);
                drawTerrain(w, h);
                drawTowns();
                drawTracks();
                drawStations();
                drawSignals();
                drawTrees();
                drawTrains();
                drawBuildPreview();
                drawPins();
                drawMini();
            }

            function drawSky(w, h) {
                const sky = ctx.createLinearGradient(0, 0, 0, h * 0.45);
                sky.addColorStop(0, "#bde7f8");
                sky.addColorStop(1, "#e8f7ea");
                ctx.fillStyle = sky;
                ctx.fillRect(0, 0, w, h);

                drawMountain(0, h * 0.25, w * 0.25, "#8abf9a");
                drawMountain(w * 0.15, h * 0.27, w * 0.33, "#76aa88");
                drawMountain(w * 0.58, h * 0.26, w * 0.27, "#84b98e");
                drawMountain(w * 0.78, h * 0.25, w * 0.25, "#6ca37b");

                for (const cloud of state.clouds) {
                    drawCloud(cloud.x * w, cloud.y * h, cloud.s);
                }
            }

            function drawMountain(x, y, size, color) {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.moveTo(x - size * 0.2, y + size * 0.22);
                ctx.lineTo(x + size * 0.38, y - size * 0.45);
                ctx.lineTo(x + size * 0.92, y + size * 0.22);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = "rgba(255,255,255,0.3)";
                ctx.beginPath();
                ctx.moveTo(x + size * 0.38, y - size * 0.45);
                ctx.lineTo(x + size * 0.24, y - size * 0.2);
                ctx.lineTo(x + size * 0.48, y - size * 0.18);
                ctx.closePath();
                ctx.fill();
            }

            function drawCloud(x, y, s) {
                ctx.save();
                ctx.globalAlpha = 0.72;
                ctx.fillStyle = "#fffdf2";
                ctx.beginPath();
                ctx.ellipse(x, y, 25 * s, 9 * s, 0, 0, Math.PI * 2);
                ctx.ellipse(x + 22 * s, y + 2 * s, 20 * s, 7 * s, 0, 0, Math.PI * 2);
                ctx.ellipse(x - 18 * s, y + 3 * s, 18 * s, 7 * s, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            function drawTerrain(w, h) {
                const horizon = h * 0.23;
                ctx.fillStyle = "#97d38b";
                ctx.fillRect(0, horizon, w, h - horizon);
                const rows = [];
                for (let y = 0; y < grid.rows - 1; y++) {
                    for (let x = 0; x < grid.cols - 1; x++) {
                        const p1 = nodeToWorld(x, y);
                        const p2 = nodeToWorld(x + 1, y);
                        const p3 = nodeToWorld(x + 1, y + 1);
                        const p4 = nodeToWorld(x, y + 1);
                        rows.push({ y: Math.max(p1.y, p2.y, p3.y, p4.y), p: [p1, p2, p3, p4], x, yy: y });
                    }
                }
                rows.sort((a, b) => a.y - b.y);
                for (const tile of rows) {
                    const tone = 128 + Math.sin(tile.x * 0.8 + tile.yy * 0.5) * 10 + tile.yy * 4;
                    ctx.fillStyle = `rgb(${Math.round(tone * 0.78)}, ${Math.round(174 + tile.yy * 4)}, ${Math.round(112 + tile.x * 1.2)})`;
                    ctx.beginPath();
                    ctx.moveTo(tile.p[0].x, tile.p[0].y);
                    ctx.lineTo(tile.p[1].x, tile.p[1].y);
                    ctx.lineTo(tile.p[2].x, tile.p[2].y);
                    ctx.lineTo(tile.p[3].x, tile.p[3].y);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = "rgba(255,255,255,0.035)";
                    ctx.stroke();
                }

                ctx.fillStyle = "rgba(86, 144, 80, 0.22)";
                for (let i = 0; i < 8; i++) {
                    const p = nodeToWorld(i * 2, 11 - (i % 3));
                    ctx.beginPath();
                    ctx.ellipse(p.x + i * 48 - 170, p.y + 30, 170, 28, -0.08, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function drawTowns() {
                for (const town of state.towns) {
                    const p = nodeToWorld(town.x, town.y);
                    ctx.save();
                    ctx.translate(p.x, p.y - 8);
                    ctx.fillStyle = "rgba(0,0,0,0.16)";
                    ctx.beginPath();
                    ctx.ellipse(0, 20, 42, 12, 0, 0, Math.PI * 2);
                    ctx.fill();
                    for (let i = 0; i < 4; i++) {
                        const x = -24 + i * 16;
                        ctx.fillStyle = i % 2 ? "#f2eee1" : "#d7ece9";
                        ctx.fillRect(x, 1 - (i % 2) * 4, 13, 14 + (i % 2) * 4);
                        ctx.fillStyle = town.color;
                        ctx.beginPath();
                        ctx.moveTo(x - 2, 2 - (i % 2) * 4);
                        ctx.lineTo(x + 6.5, -7 - (i % 2) * 4);
                        ctx.lineTo(x + 15, 2 - (i % 2) * 4);
                        ctx.closePath();
                        ctx.fill();
                    }
                    ctx.fillStyle = "rgba(20,32,23,0.84)";
                    ctx.fillRect(-29, 25, 58, 16);
                    ctx.fillStyle = "#fff5d7";
                    ctx.font = "800 10px Inter, system-ui";
                    ctx.textAlign = "center";
                    ctx.fillText(town.name, 0, 37);
                    ctx.restore();
                }
            }

            function drawTracks() {
                const segments = [...state.tracks.values()].sort((a, b) => segmentCenter(a).y - segmentCenter(b).y);
                for (const seg of segments) {
                    const a = nodeToWorld(seg.a.x, seg.a.y);
                    const b = nodeToWorld(seg.b.x, seg.b.y);
                    drawRail(a, b, false);
                }
            }

            function drawRail(a, b, ghost) {
                const dx = b.x - a.x;
                const dy = b.y - a.y;
                const len = Math.hypot(dx, dy) || 1;
                const nx = -dy / len;
                const ny = dx / len;
                const tieCount = Math.max(3, Math.floor(len / 13));
                ctx.save();
                ctx.globalAlpha = ghost ? 0.58 : 1;
                ctx.lineCap = "round";
                ctx.strokeStyle = "rgba(47,33,24,0.38)";
                ctx.lineWidth = 14;
                ctx.beginPath();
                ctx.moveTo(a.x, a.y + 5);
                ctx.lineTo(b.x, b.y + 5);
                ctx.stroke();

                for (let i = 0; i <= tieCount; i++) {
                    const t = i / tieCount;
                    const x = a.x + dx * t;
                    const y = a.y + dy * t;
                    ctx.strokeStyle = "#6b4f37";
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(x - nx * 12, y - ny * 12);
                    ctx.lineTo(x + nx * 12, y + ny * 12);
                    ctx.stroke();
                }

                ctx.strokeStyle = ghost ? "#f4c74c" : "#252d2e";
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(a.x + nx * 7, a.y + ny * 7);
                ctx.lineTo(b.x + nx * 7, b.y + ny * 7);
                ctx.moveTo(a.x - nx * 7, a.y - ny * 7);
                ctx.lineTo(b.x - nx * 7, b.y - ny * 7);
                ctx.stroke();
                ctx.strokeStyle = "rgba(255,255,255,0.35)";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(a.x + nx * 8, a.y + ny * 8 - 1);
                ctx.lineTo(b.x + nx * 8, b.y + ny * 8 - 1);
                ctx.stroke();
                ctx.restore();
            }

            function drawStations() {
                const items = [...state.stations.values()].sort((a, b) => nodeToWorld(a.x, a.y).y - nodeToWorld(b.x, b.y).y);
                for (const s of items) {
                    const p = nodeToWorld(s.x, s.y);
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.fillStyle = "rgba(0,0,0,0.18)";
                    ctx.beginPath();
                    ctx.ellipse(0, 18, 32, 10, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = s.type === "depot" ? "#34404a" : "#f3ead6";
                    ctx.fillRect(-22, -18, 44, 28);
                    ctx.fillStyle = s.type === "depot" ? "#cf7054" : cargoColors[s.cargo];
                    ctx.beginPath();
                    ctx.moveTo(-26, -18);
                    ctx.lineTo(0, -34);
                    ctx.lineTo(26, -18);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = "#201a15";
                    ctx.fillRect(-7, -2, 14, 12);
                    ctx.fillStyle = "rgba(20,32,23,0.78)";
                    ctx.fillRect(-32, 17, 64, 16);
                    ctx.fillStyle = "#fff4d0";
                    ctx.font = "900 10px Inter, system-ui";
                    ctx.textAlign = "center";
                    ctx.fillText(s.name, 0, 29);
                    ctx.restore();
                }
            }

            function drawSignals() {
                state.signals.forEach(sig => {
                    const p = nodeToWorld(sig.x, sig.y);
                    ctx.save();
                    ctx.translate(p.x + 14, p.y - 10);
                    ctx.strokeStyle = "#34261a";
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(0, 20);
                    ctx.lineTo(0, -8);
                    ctx.stroke();
                    ctx.fillStyle = sig.held ? varColor("--red") : varColor("--green");
                    ctx.beginPath();
                    ctx.arc(0, -9, 7, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                });
            }

            function varColor(name) {
                return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
            }

            function drawTrees() {
                const trees = [...state.trees].sort((a, b) => nodeToWorld(a.x, a.y).y - nodeToWorld(b.x, b.y).y);
                for (const tree of trees) {
                    const p = nodeToWorld(tree.x, tree.y);
                    drawTree(p.x + tree.offX, p.y + tree.offY, tree.size, tree.pine);
                }
            }

            function drawTree(x, y, s, pine) {
                ctx.save();
                ctx.translate(x, y);
                ctx.scale(s, s);
                ctx.fillStyle = "rgba(0,0,0,0.13)";
                ctx.beginPath();
                ctx.ellipse(0, 12, 14, 5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#6a4628";
                ctx.fillRect(-3, 0, 6, 14);
                if (pine) {
                    ctx.fillStyle = "#1e5b3e";
                    for (let i = 0; i < 3; i++) {
                        ctx.beginPath();
                        ctx.moveTo(0, -28 + i * 10);
                        ctx.lineTo(-16 + i * 3, 2 + i * 5);
                        ctx.lineTo(16 - i * 3, 2 + i * 5);
                        ctx.closePath();
                        ctx.fill();
                    }
                } else {
                    ctx.fillStyle = "#357846";
                    ctx.beginPath();
                    ctx.arc(-5, -13, 12, 0, Math.PI * 2);
                    ctx.arc(7, -12, 13, 0, Math.PI * 2);
                    ctx.arc(1, -22, 11, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }

            function drawTrains() {
                const trains = [...state.trains].sort((a, b) => trainPosition(a).y - trainPosition(b).y);
                for (const train of trains) {
                    const p = trainPosition(train);
                    drawTrain(p.x, p.y, p.angle, train);
                }
            }

            function drawTrain(x, y, angle, train) {
                const color = cargoColors[train.cargo] || "#f4c74c";
                ctx.save();
                ctx.translate(x, y - 5);
                ctx.rotate(angle);
                for (let i = train.cars; i >= 1; i--) {
                    ctx.fillStyle = "rgba(0,0,0,0.16)";
                    ctx.fillRect(-18 - i * 22, 8, 17, 5);
                    ctx.fillStyle = i % 2 ? "#45545a" : color;
                    ctx.fillRect(-18 - i * 22, -8, 17, 14);
                    ctx.fillStyle = "#1a201e";
                    ctx.fillRect(-15 - i * 22, 5, 4, 4);
                    ctx.fillRect(-6 - i * 22, 5, 4, 4);
                }
                ctx.fillStyle = "rgba(0,0,0,0.18)";
                ctx.fillRect(-5, 9, 26, 5);
                ctx.fillStyle = "#2a3135";
                ctx.fillRect(-3, -10, 25, 17);
                ctx.fillStyle = color;
                ctx.fillRect(13, -16, 10, 23);
                ctx.fillStyle = "#fff4d2";
                ctx.fillRect(2, -7, 8, 5);
                if (train.wait > 0) {
                    ctx.fillStyle = "rgba(255,255,255,0.72)";
                    ctx.beginPath();
                    ctx.arc(28, -8, 4 + Math.sin(state.tick * 8) * 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }

            function drawBuildPreview() {
                if (state.tool === "track" && state.buildStart && state.hoverNode && !sameNode(state.buildStart, state.hoverNode)) {
                    const a = nodeToWorld(state.buildStart.x, state.buildStart.y);
                    const b = nodeToWorld(state.hoverNode.x, state.hoverNode.y);
                    drawRail(a, b, adjacent(state.buildStart, state.hoverNode));
                }
            }

            function drawPins() {
                if (state.tool !== "track" && state.tool !== "station" && state.tool !== "depot" && state.tool !== "signal") return;
                for (let y = 0; y < grid.rows; y++) {
                    for (let x = 0; x < grid.cols; x++) {
                        const p = nodeToWorld(x, y);
                        const active = state.hoverNode && state.hoverNode.x === x && state.hoverNode.y === y;
                        ctx.fillStyle = active ? "rgba(244,199,76,0.92)" : "rgba(255,255,255,0.18)";
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, active ? 6 : 3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            function drawMini() {
                mtx.clearRect(0, 0, mini.width, mini.height);
                mtx.fillStyle = "#8fcf82";
                mtx.fillRect(0, 0, mini.width, mini.height);
                mtx.strokeStyle = "rgba(30,40,33,0.55)";
                mtx.lineWidth = 2;
                state.tracks.forEach(seg => {
                    mtx.beginPath();
                    mtx.moveTo(10 + seg.a.x / (grid.cols - 1) * 112, 10 + seg.a.y / (grid.rows - 1) * 72);
                    mtx.lineTo(10 + seg.b.x / (grid.cols - 1) * 112, 10 + seg.b.y / (grid.rows - 1) * 72);
                    mtx.stroke();
                });
                state.stations.forEach(s => {
                    mtx.fillStyle = s.type === "depot" ? "#d36e4e" : cargoColors[s.cargo];
                    mtx.beginPath();
                    mtx.arc(10 + s.x / (grid.cols - 1) * 112, 10 + s.y / (grid.rows - 1) * 72, 4, 0, Math.PI * 2);
                    mtx.fill();
                });
                mtx.fillStyle = "#212b25";
                for (const train of state.trains) {
                    const p = trainPositionGrid(train);
                    mtx.fillRect(10 + p.x / (grid.cols - 1) * 112 - 2, 10 + p.y / (grid.rows - 1) * 72 - 2, 4, 4);
                }
            }

            function trainPositionGrid(train) {
                const a = parseKey(train.path[train.leg]);
                const b = parseKey(train.path[Math.min(train.leg + 1, train.path.length - 1)]);
                return {
                    x: a.x + (b.x - a.x) * train.t,
                    y: a.y + (b.y - a.y) * train.t
                };
            }

            function setTool(tool) {
                state.tool = tool;
                state.buildStart = null;
                document.querySelectorAll(".tool").forEach(btn => {
                    btn.classList.toggle("active", btn.dataset.tool === tool);
                });
                hud.toolName.textContent = uiNames[tool];
                hud.buildCost.textContent = `$${costs[tool]}`;
                const hints = {
                    track: "Drag between glowing pins to lay track. Place at least two stations, then dispatch.",
                    station: "Stations anchor contracts near towns and earn fares.",
                    depot: "Depots expand the network and give trains a home base.",
                    signal: "Signals hold busy junctions when clicked again.",
                    trees: "Trees raise scenery score. Completely practical? No. Charming? Yes.",
                    bulldoze: "Remove rails, signals, and buildings for a small salvage refund."
                };
                hud.hint.textContent = hints[tool];
            }

            function updateHud() {
                hud.money.textContent = `$${Math.round(state.money)}`;
                hud.rating.textContent = `${Math.round(state.rating)}%`;
                hud.trainCount.textContent = `${state.trains.length}`;
                hud.buildCost.textContent = `$${costs[state.tool]}`;
                hud.pauseBtn.textContent = state.paused ? "Resume" : "Pause";
                hud.autoBtn.textContent = state.auto ? "Auto On" : "Auto Off";
                hud.day.textContent = `Day ${Math.max(1, Math.floor(state.day))}`;
                hud.doneCount.textContent = `${state.contracts.filter(c => c.done).length}/${state.contracts.length}`;
                hud.contracts.innerHTML = state.contracts.map(c => `
                    <div class="contract ${c.done ? "done" : ""}">
                        <div class="cargo" style="background:${cargoColors[c.cargo] || cargoColors.mail}">${c.done ? "OK" : c.cargo.charAt(0).toUpperCase()}</div>
                        <div><b>${c.from} to ${c.to}</b><span>${c.cargo} manifest</span></div>
                        <div class="payout">$${c.payout}</div>
                    </div>
                `).join("");
                hud.log.innerHTML = logLines.slice(-6).map(line => `<div>${line}</div>`).join("");
            }

            function message(text) {
                logLines.push(text);
                hud.hint.textContent = text;
                state.messageTimer = 3;
            }

            function flash(text) {
                hud.toast.textContent = text;
                hud.toast.classList.add("show");
                clearTimeout(flash.timer);
                flash.timer = setTimeout(() => hud.toast.classList.remove("show"), 1300);
            }

            function pointerPos(event) {
                const rect = canvas.getBoundingClientRect();
                const point = event.touches ? event.touches[0] : event;
                return {
                    x: point.clientX - rect.left,
                    y: point.clientY - rect.top
                };
            }

            function onDown(event) {
                event.preventDefault();
                const pos = pointerPos(event);
                const node = worldToNearestNode(pos.x, pos.y, 34);
                if (!node) return;
                if (state.tool === "track") {
                    state.buildStart = node;
                } else if (state.tool === "station") {
                    addStation(node, "", "station");
                } else if (state.tool === "depot") {
                    addStation(node, "", "depot");
                } else if (state.tool === "signal") {
                    toggleSignal(node);
                } else if (state.tool === "trees") {
                    plantTree(node);
                } else if (state.tool === "bulldoze") {
                    bulldoze(node, pos.x, pos.y);
                }
            }

            function onMove(event) {
                const pos = pointerPos(event);
                state.hoverNode = worldToNearestNode(pos.x, pos.y, 34);
                if (state.tool === "bulldoze") state.hoverSegment = nearestSegment(pos.x, pos.y);
            }

            function onUp(event) {
                const pos = pointerPos(event);
                const node = worldToNearestNode(pos.x, pos.y, 42);
                if (state.tool === "track" && state.buildStart && node && !sameNode(state.buildStart, node)) {
                    if (adjacent(state.buildStart, node)) {
                        addTrack(state.buildStart, node);
                    } else {
                        flash("Too steep");
                    }
                }
                state.buildStart = null;
            }

            function bind() {
                window.addEventListener("resize", fitCanvas);
                canvas.addEventListener("pointerdown", onDown);
                canvas.addEventListener("pointermove", onMove);
                canvas.addEventListener("pointerup", onUp);
                canvas.addEventListener("pointerleave", () => {
                    state.hoverNode = null;
                    state.buildStart = null;
                });
                document.querySelectorAll(".tool").forEach(btn => {
                    btn.addEventListener("click", () => setTool(btn.dataset.tool));
                });
                document.getElementById("dispatchBtn").addEventListener("click", dispatchTrain);
                document.getElementById("autoBtn").addEventListener("click", () => {
                    state.auto = !state.auto;
                    state.autoTimer = 0;
                    updateHud();
                });
                document.getElementById("clearBtn").addEventListener("click", () => {
                    state.trains = [];
                    message("All active trains recalled.");
                    updateHud();
                });
                document.getElementById("newMapBtn").addEventListener("click", resetWorld);
                hud.pauseBtn.addEventListener("click", () => {
                    state.paused = !state.paused;
                    updateHud();
                });
                window.addEventListener("keydown", event => {
                    const map = { "1": "track", "2": "station", "3": "depot", "4": "signal", "5": "trees", "6": "bulldoze" };
                    if (map[event.key]) setTool(map[event.key]);
                    if (event.key.toLowerCase() === " ") {
                        event.preventDefault();
                        dispatchTrain();
                    }
                    if (event.key.toLowerCase() === "p") {
                        state.paused = !state.paused;
                        updateHud();
                    }
                });
            }

            let last = performance.now();
            function frame(now) {
                const dt = Math.min(0.05, (now - last) / 1000) * 60;
                last = now;
                update(dt / 60);
                draw();
                requestAnimationFrame(frame);
            }

            fitCanvas();
            resetWorld();
            setTool("track");
            bind();
            requestAnimationFrame(frame);
        })();
    </script>
</body>
</html>
