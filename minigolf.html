<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Mini Golf: Pro Tour - K2 games</title>
    <style>
        :root {
            --primary: #22c55e;
            --accent: #fbbf24;
            --danger: #ef4444;
            --bg: #0f172a;
            --panel: rgba(30, 41, 59, 0.9);
            --border: rgba(255, 255, 255, 0.1);
            --p1: #3b82f6;
            --p2: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        nav {
            padding: 0.75rem 1.5rem;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; border-bottom: 1px solid var(--border);
        }

        .logo { font-weight: 900; font-size: 1.2rem; color: #fff; letter-spacing: -0.5px; }
        .back-link { color: #94a3b8; text-decoration: none; font-size: 0.8rem; font-weight: bold; }

        #game-container {
            flex: 1;
            position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            padding: 10px; overflow: hidden;
        }

        canvas {
            background: #000; box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            border-radius: 15px; width: 67.5vmin; height: 90vmin;
            max-width: 600px; max-height: 800px;
        }

        #hud {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; pointer-events: none; z-index: 50;
        }

        .stat-card {
            background: var(--panel); backdrop-filter: blur(12px);
            padding: 8px 20px; border-radius: 12px; border: 1px solid var(--border);
            text-align: center; min-width: 100px;
        }

        .stat-val { font-size: 1.5rem; font-weight: 900; font-family: monospace; color: var(--primary); }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.7; }

        #turn-indicator {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: var(--panel); padding: 10px 30px; border-radius: 30px;
            font-weight: 900; letter-spacing: 2px; border: 2px solid transparent;
            z-index: 50; transition: 0.3s;
        }

        .screen-overlay {
            position: absolute; inset: 0; background: rgba(2, 6, 23, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; text-align: center; padding: 20px; backdrop-filter: blur(10px);
        }

        .btn-large {
            background: var(--primary); color: #064e3b; border: none; padding: 1.2rem 4rem;
            border-radius: 50px; font-weight: 900; cursor: pointer; margin-top: 20px;
            font-size: 1.2rem; box-shadow: 0 10px 25px rgba(34, 197, 94, 0.4);
        }

        .mode-select { display: flex; gap: 20px; margin-top: 30px; }
        .mode-btn {
            background: rgba(255,255,255,0.05); border: 2px solid var(--border);
            padding: 20px; border-radius: 20px; cursor: pointer; transition: 0.2s;
            width: 160px; text-align: center;
        }
        .mode-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-5px); }
        .mode-btn.active { border-color: var(--primary); background: rgba(34, 197, 94, 0.1); }
        .mode-icon { font-size: 2.5rem; display: block; margin-bottom: 10px; }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CCZ9JJGEDP');
    </script>
</head>
<body>
    <nav>
        <div class="logo">K2 MINI GOLF PRO</div>
        <a href="index.html" class="back-link">← EXIT HUB</a>
    </nav>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="hud">
            <div class="stat-card"><div class="stat-label">Hole</div><div id="hole-val" class="stat-val">1</div></div>
            <div class="stat-card" id="card-p1"><div class="stat-label" id="label-p1">P1 Score</div><div id="score-p1" class="stat-val" style="color:var(--p1)">0</div></div>
            <div class="stat-card" id="card-p2" style="display:none"><div class="stat-label">P2 Score</div><div id="score-p2" class="stat-val" style="color:var(--p2)">0</div></div>
        </div>

        <div id="turn-indicator" style="display:none">PLAYER 1</div>

        <div id="start-screen" class="screen-overlay">
            <h1 style="font-size: 4rem; color: var(--primary); font-style: italic;">NEON TOUR</h1>
            <p style="opacity: 0.7;">Select your game mode</p>
            
            <div class="mode-select">
                <div class="mode-btn active" onclick="game.setMode('solo', this)">
                    <span class="mode-icon">🏌️</span>
                    <b>SOLO PRO</b>
                </div>
                <div class="mode-btn" onclick="game.setMode('multi', this)">
                    <span class="mode-icon">👥</span>
                    <b>PASS & PLAY</b>
                </div>
            </div>

            <button class="btn-large" onclick="game.start()">TEE OFF</button>
        </div>

        <div id="hole-screen" class="screen-overlay" style="display:none">
            <h1 id="hole-msg" style="font-size: 3rem; color: var(--accent);">HOLE COMPLETE</h1>
            <div id="hole-scores" style="margin: 20px 0; display: flex; gap: 40px;"></div>
            <button class="btn-large" onclick="game.nextHole()">CONTINUE TOUR</button>
        </div>
    </div>

    <script>
        class MiniGolfElite {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.width = 600; this.height = 800;
                this.canvas.width = this.width; this.canvas.height = this.height;

                this.mode = 'solo';
                this.turn = 0; // 0 for P1, 1 for P2
                this.level = 0;
                this.ball = { x: 0, y: 0, vx: 0, vy: 0, r: 10, active: false };
                this.hole = { x: 300, y: 150, r: 18 };
                this.players = [
                    { score: 0, total: 0, finished: false },
                    { score: 0, total: 0, finished: false }
                ];
                
                this.levels = [
                    { ball: {x: 300, y: 700}, hole: {x: 300, y: 100}, walls: [] },
                    { ball: {x: 300, y: 700}, hole: {x: 300, y: 100}, walls: [{x: 150, y: 350, w: 300, h: 20}] },
                    { ball: {x: 300, y: 400}, hole: {x: 300, y: 50}, walls: [{x: 50, y: 50, w: 500, h: 20}, {x: 50, y: 50, w: 20, h: 700}, {x: 530, y: 50, w: 20, h: 700}, {x: 50, y: 730, w: 500, h: 20}] }, // Hole 7 verified
                    { ball: {x: 100, y: 700}, hole: {x: 500, y: 100}, walls: [{x: 0, y: 400, w: 400, h: 20}, {x: 200, y: 200, w: 400, h: 20}] }
                ];

                this.drag = { active: false, startX: 0, startY: 0, currX: 0, currY: 0 };
                this.setupInputs();
                this.loop();
            }

            setMode(m, btn) {
                this.mode = m;
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('card-p2').style.display = m === 'multi' ? 'block' : 'none';
                document.getElementById('label-p1').textContent = m === 'multi' ? 'P1 Score' : 'Strokes';
            }

            start() {
                this.level = 0;
                this.players.forEach(p => { p.score = 0; p.total = 0; });
                document.getElementById('start-screen').style.display = 'none';
                if(this.mode === 'multi') document.getElementById('turn-indicator').style.display = 'block';
                this.initLevel();
            }

            initLevel() {
                const l = this.levels[this.level % this.levels.length];
                this.ball.x = l.ball.x; this.ball.y = l.ball.y;
                this.ball.vx = 0; this.ball.vy = 0; this.ball.active = false;
                this.hole.x = l.hole.x; this.hole.y = l.hole.y;
                this.walls = l.walls;
                this.players.forEach(p => { p.score = 0; p.finished = false; });
                this.turn = 0;
                this.updateUI();
            }

            setupInputs() {
                const getPos = (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    const t = e.touches ? e.touches[0] : e;
                    return { x: (t.clientX - rect.left) * (this.width / rect.width), y: (t.clientY - rect.top) * (this.height / rect.height) };
                };
                const start = (e) => {
                    if (this.ball.active) return;
                    const pos = getPos(e);
                    if (Math.hypot(pos.x - this.ball.x, pos.y - this.ball.y) < 60) {
                        this.drag.active = true; this.drag.startX = this.drag.currX = this.ball.x; this.drag.startY = this.drag.currY = this.ball.y;
                    }
                };
                const move = (e) => { if (this.drag.active) { const pos = getPos(e); this.drag.currX = pos.x; this.drag.currY = pos.y; } };
                const end = () => {
                    if (this.drag.active) {
                        const dx = this.drag.startX - this.drag.currX, dy = this.drag.startY - this.drag.currY;
                        if (Math.hypot(dx, dy) > 10) {
                            this.players[this.turn].score++; this.ball.vx = dx * 0.12; this.ball.vy = dy * 0.12; this.ball.active = true; this.updateUI();
                        }
                        this.drag.active = false;
                    }
                };
                this.canvas.onmousedown = start; window.onmousemove = move; window.onmouseup = end;
                this.canvas.ontouchstart = (e) => { e.preventDefault(); start(e); };
                window.ontouchmove = (e) => { if(this.drag.active) e.preventDefault(); move(e); };
                window.ontouchend = end;
            }

            update() {
                if (!this.ball.active) return;
                this.ball.x += this.ball.vx; this.ball.y += this.ball.vy;
                this.ball.vx *= 0.985; this.ball.vy *= 0.985;

                if (this.ball.x < 10 || this.ball.x > this.width-10) this.ball.vx *= -0.8;
                if (this.ball.y < 10 || this.ball.y > this.height-10) this.ball.vy *= -0.8;

                this.walls.forEach(w => {
                    if (this.ball.x + 10 > w.x && this.ball.x - 10 < w.x + w.w && this.ball.y + 10 > w.y && this.ball.y - 10 < w.y + w.h) {
                        this.ball.vx *= -0.8; this.ball.vy *= -0.8;
                    }
                });

                if (Math.hypot(this.ball.x - this.hole.x, this.ball.y - this.hole.y) < this.hole.r) {
                    if (Math.hypot(this.ball.vx, this.ball.vy) < 4) this.completeHole();
                }

                if (Math.hypot(this.ball.vx, this.ball.vy) < 0.2) {
                    this.ball.vx = 0; this.ball.vy = 0; this.ball.active = false;
                    if(this.mode === 'multi') { this.turn = (this.turn + 1) % 2; this.updateUI(); }
                }
            }

            completeHole() {
                this.ball.active = false;
                this.players[this.turn].finished = true;
                this.players[this.turn].total += this.players[this.turn].score;
                
                if (this.mode === 'solo' || this.players.every(p => p.finished)) {
                    document.getElementById('hole-screen').style.display = 'flex';
                    let html = `<div>P1: ${this.players[0].score}</div>`;
                    if(this.mode === 'multi') html += `<div>P2: ${this.players[1].score}</div>`;
                    document.getElementById('hole-scores').innerHTML = html;
                } else {
                    this.turn = (this.turn + 1) % 2;
                    this.ball.x = this.levels[this.level % this.levels.length].ball.x;
                    this.ball.y = this.levels[this.level % this.levels.length].ball.y;
                    this.updateUI();
                }
            }

            nextHole() { this.level++; document.getElementById('hole-screen').style.display = 'none'; this.initLevel(); }

            updateUI() {
                document.getElementById('hole-val').textContent = this.level + 1;
                document.getElementById('score-p1').textContent = this.players[0].score;
                document.getElementById('score-p2').textContent = this.players[1].score;
                const ind = document.getElementById('turn-indicator');
                ind.textContent = `PLAYER ${this.turn + 1}`;
                ind.style.borderColor = this.turn === 0 ? 'var(--p1)' : 'var(--p2)';
                ind.style.color = this.turn === 0 ? 'var(--p1)' : 'var(--p2)';
            }

            draw() {
                const ctx = this.ctx; ctx.clearRect(0, 0, this.width, this.height);
                ctx.fillStyle = '#064e3b'; ctx.fillRect(0, 0, this.width, this.height);
                ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(this.hole.x, this.hole.y, this.hole.r, 0, Math.PI*2); ctx.fill();
                this.walls.forEach(w => { ctx.fillStyle = '#334155'; ctx.fillRect(w.x, w.y, w.w, w.h); });
                if (this.drag.active) {
                    ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 3; ctx.setLineDash([5, 5]);
                    ctx.beginPath(); ctx.moveTo(this.ball.x, this.ball.y);
                    ctx.lineTo(this.ball.x + (this.drag.startX - this.drag.currX), this.ball.y + (this.drag.startY - this.drag.currY));
                    ctx.stroke(); ctx.setLineDash([]);
                }
                ctx.fillStyle = this.turn === 0 ? '#3b82f6' : '#ef4444';
                if(this.mode === 'solo') ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(this.ball.x, this.ball.y, this.ball.r, 0, Math.PI*2); ctx.fill();
            }
            loop() { this.update(); this.draw(); requestAnimationFrame(() => this.loop()); }
        }
        const game = new MiniGolfElite();
    </script>
</body>
</html>
