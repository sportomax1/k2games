<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Floor Is Lava!</title><style>:root{--bg:#100b18;--text:#fff8e8;--muted:#c8bdd8;--yellow:#ffd43b}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);font-family:Inter,system-ui,sans-serif;color:var(--text);touch-action:none}button{font:inherit}#app{height:100dvh;display:grid;grid-template-rows:auto 1fr auto;background:radial-gradient(circle at 50% 115%,#ff44004d,transparent 42%),linear-gradient(#241539,#100b18 64%)}header,footer{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 12px;background:#08050ef2;border-color:#ffffff14;z-index:5}header{border-bottom:1px solid #ffffff14}.brand{font-weight:1000;font-size:clamp(18px,3vw,28px)}.hud{display:flex;gap:7px}.stat{min-width:62px;padding:6px 8px;background:#ffffff12;border:1px solid #ffffff1f;border-radius:12px;text-align:center}.stat small{display:block;color:var(--muted);font-size:8px;text-transform:uppercase}.stat strong{font-size:15px}main{position:relative;min-height:0;overflow:hidden}canvas{display:block;width:100%;height:100%}.overlay{position:absolute;inset:0;display:grid;place-items:center;padding:20px;background:#07040d85;backdrop-filter:blur(8px);z-index:10}.hidden{display:none}.card{width:min(560px,100%);padding:clamp(20px,4vw,36px);border-radius:28px;background:linear-gradient(145deg,#251937fa,#110c1bfa);border:1px solid #ffffff24;box-shadow:0 30px 90px #0008;text-align:center}h1{font-size:clamp(40px,8vw,76px);line-height:.88;margin:0 0 16px;letter-spacing:-.075em;text-transform:uppercase;text-shadow:0 5px 0 #a92510,0 10px 28px #ff440073}h1 em{font-style:normal;color:var(--yellow)}.subtitle{color:var(--muted);font-size:clamp(15px,2.5vw,19px);line-height:1.5}.tips{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0}.tip{padding:12px 8px;border-radius:15px;background:#ffffff0f;border:1px solid #ffffff14}.tip b{display:block;font-size:24px}.tip span{color:var(--muted);font-size:12px;font-weight:700}.primary,.secondary{border:0;border-radius:16px;padding:14px 20px;font-weight:1000;cursor:pointer;min-height:50px}.primary{color:#3a1600;background:linear-gradient(#ffe15d,#ff9f1c);box-shadow:0 7px 0 #a9450b}.secondary{color:white;background:#ffffff1a;border:1px solid #ffffff1f}.row,.controls,.actions{display:flex;gap:8px;justify-content:center}footer{border-top:1px solid #ffffff14;padding-bottom:calc(9px + env(safe-area-inset-bottom))}.control{width:56px;height:56px;border:1px solid #ffffff29;border-radius:16px;color:white;background:#ffffff1a;font-size:23px;font-weight:1000}.control:active,.control.active{background:linear-gradient(#8a5cff,#5f36ce)}#jump{width:94px;background:linear-gradient(#ff9f1c,#ed4e00);font-size:16px}.iconbtn{width:44px;height:44px;border-radius:13px;border:1px solid #ffffff1f;background:#ffffff14;color:white;font-size:19px}.toast{position:absolute;top:18%;left:50%;transform:translate(-50%,-50%);z-index:8;font-weight:1000;font-size:clamp(24px,5vw,50px);opacity:0;text-shadow:0 5px 20px #000}.toast.show{animation:pop .8s}@keyframes pop{25%,75%{opacity:1}100%{opacity:0;transform:translate(-50%,-70%)}}@media(max-width:650px){.brand span{display:none}.tips{grid-template-columns:1fr}.tip{display:flex;align-items:center;gap:12px;text-align:left}}</style></head><body><div id="app"><header><div class="brand">🌋 <span>FLOOR IS LAVA</span></div><div class="hud"><div class="stat"><small>Score</small><strong id="score">0</strong></div><div class="stat"><small>Best</small><strong id="best">0</strong></div><div class="stat"><small>Level</small><strong id="level">1</strong></div><div class="stat"><small>Lives</small><strong id="lives">❤️❤️❤️</strong></div></div></header><main id="wrap"><canvas id="game"></canvas><div class="toast" id="toast"></div><section class="overlay" id="start"><div class="card"><h1>Floor Is<br><em>Lava!</em></h1><p class="subtitle">Leap across furniture, collect golden stars, and keep climbing before the lava swallows the room.</p><div class="tips"><div class="tip"><b>⬅️ ➡️</b><span>Move with arrows, A/D, or touch</span></div><div class="tip"><b>⬆️</b><span>Jump with Space, W, Up, or button</span></div><div class="tip"><b>⭐</b><span>Grab stars and survive</span></div></div><button class="primary" id="startBtn">START GAME</button></div></section><section class="overlay hidden" id="over"><div class="card"><h1>Game<br><em>Over!</em></h1><p class="subtitle">Final score: <strong id="final">0</strong></p><p id="record"></p><div class="row"><button class="primary" id="again">PLAY AGAIN</button><button class="secondary" id="menu">MAIN MENU</button></div></div></section><section class="overlay hidden" id="pause"><div class="card"><h1>Paused</h1><button class="primary" id="resume">RESUME</button></div></section></main><footer><div class="controls"><button class="control" id="left">◀</button><button class="control" id="right">▶</button><button class="control" id="jump">JUMP</button></div><div class="actions"><button class="iconbtn" id="sound">🔊</button><button class="iconbtn" id="pauseBtn">⏸</button></div></footer></div><script>(()=>{"use strict";const $=id=>document.getElementById(id),c=$("game"),x=c.getContext("2d"),wrap=$("wrap");let W=900,H=560,dpr=1,running=false,paused=false,sound=true,last=0,score=0,level=1,lives=3,time=0,cam=0,lava=0,lavaSpeed=22,platforms=[],stars=[],particles=[],audio=null,best=+(localStorage.floorIsLavaBest||0);const keys={left:false,right:false},p={x:100,y:0,w:36,h:48,vx:0,vy:0,speed:320,jump:650,grounded:false,inv:0,face:1};$("best").textContent=best;function resize(){const r=wrap.getBoundingClientRect();dpr=Math.min(devicePixelRatio||1,2);W=Math.max(320,r.width);H=Math.max(260,r.height);c.width=W*dpr;c.height=H*dpr;c.style.width=W+"px";c.style.height=H+"px";x.setTransform(dpr,0,0,dpr,0,0);draw()}function beep(f=440,d=.08,t="sine",v=.06){if(!sound)return;try{audio||=new(AudioContext||webkitAudioContext);const o=audio.createOscillator(),g=audio.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,audio.currentTime);g.gain.exponentialRampToValueAtTime(.001,audio.currentTime+d);o.connect(g);g.connect(audio.destination);o.start();o.stop(audio.currentTime+d)}catch{}}function makePlatforms(toY){let top=Math.min(...platforms.map(q=>q.y));while(top>toY){top-=75+Math.random()*42;const w=85+Math.random()*100,px=18+Math.random()*Math.max(20,W-w-36),types=["chair","table","shelf","box","bed"];platforms.push({x:px,y:top,w,h:18+Math.random()*8,type:types[Math.random()*types.length|0]});if(Math.random()<.58)stars.push({x:px+w/2,y:top-30,taken:false,bob:Math.random()*6.28})}}function hud(){$("score").textContent=score|0;$("level").textContent=level;$("lives").textContent="❤️".repeat(lives)||"—";$("best").textContent=best}function reset(){score=0;level=1;lives=3;time=cam=0;lavaSpeed=22;platforms=[];stars=[];particles=[];const gy=H-90;platforms.push({x:30,y:gy,w:190,h:24,type:"sofa"},{x:260,y:gy-90,w:120,h:22,type:"table"},{x:420,y:gy-170,w:150,h:22,type:"shelf"},{x:620,y:gy-80,w:130,h:22,type:"chair"},{x:W-150,y:gy-210,w:130,h:22,type:"box"});makePlatforms(-2000);Object.assign(p,{x:75,y:gy-p.h,vx:0,vy:0,grounded:true,inv:1.5});lava=H+50;hud()}function startGame(){reset();$("start").classList.add("hidden");$("over").classList.add("hidden");$("pause").classList.add("hidden");running=true;paused=false;last=performance.now();beep(520,.1,"square");requestAnimationFrame(loop)}function end(){running=false;$("final").textContent=score|0;if(score>best){best=score|0;localStorage.floorIsLavaBest=best;$("record").textContent="🏆 NEW HIGH SCORE!"}else $("record").textContent=`Best score: ${best}`;hud();$("over").classList.remove("hidden");beep(180,.3,"sawtooth")}function burst(px,py,color,n){for(let i=0;i<n;i++)particles.push({x:px,y:py,vx:(Math.random()-.5)*260,vy:(Math.random()-.75)*260,life:.4+Math.random()*.5,color,size:2+Math.random()*5})}function toast(t){$("toast").textContent=t;$("toast").classList.remove("show");void $("toast").offsetWidth;$("toast").classList.add("show")}function lose(){if(p.inv>0)return;lives--;burst(p.x+p.w/2,p.y+p.h/2,"#ff7a18",24);if(lives<=0)return end();const safe=platforms.filter(q=>q.y<lava-70&&q.y>cam+80).sort((a,b)=>a.y-b.y)[0]||platforms[0];p.x=safe.x+safe.w/2-p.w/2;p.y=safe.y-p.h;p.vx=0;p.vy=-250;p.inv=2;toast("🔥 TOO HOT! −1 LIFE");hud()}function jump(){if(running&&!paused&&p.grounded){p.vy=-p.jump;p.grounded=false;beep(290,.08,"square")}}function update(dt){time+=dt;p.inv=Math.max(0,p.inv-dt);level=1+(score/500|0);lavaSpeed=22+level*4.3;const a=1800;if(keys.left){p.vx-=a*dt;p.face=-1}if(keys.right){p.vx+=a*dt;p.face=1}if(!keys.left&&!keys.right)p.vx*=Math.pow(.001,dt);p.vx=Math.max(-p.speed,Math.min(p.speed,p.vx));p.vy+=1700*dt;const old=p.y;p.x+=p.vx*dt;p.y+=p.vy*dt;if(p.x<-p.w)p.x=W;if(p.x>W)p.x=-p.w;p.grounded=false;if(p.vy>=0)for(const q of platforms)if(p.x+p.w>q.x&&p.x<q.x+q.w&&old+p.h<=q.y+5&&p.y+p.h>=q.y){p.y=q.y-p.h;p.vy=0;p.grounded=true;break}if(p.y-cam<H*.42)cam=p.y-H*.42;lava-=lavaSpeed*dt;if(lava-cam>H+60)lava=cam+H+60;if(p.y+p.h>lava)lose();for(const s of stars){s.bob+=dt*3;if(!s.taken){const sy=s.y+Math.sin(s.bob)*5,dx=p.x+p.w/2-s.x,dy=p.y+p.h/2-sy;if(dx*dx+dy*dy<1024){s.taken=true;score+=125;burst(s.x,sy,"#ffd43b",16);toast("+125 ⭐");beep(900,.09,"triangle")}}}score+=dt*(12+level*1.5);if(Math.min(...platforms.map(q=>q.y))>cam-800)makePlatforms(cam-1700);platforms=platforms.filter(q=>q.y<lava+200);stars=stars.filter(s=>!s.taken&&s.y<lava+200);particles.forEach(q=>{q.x+=q.vx*dt;q.y+=q.vy*dt;q.vy+=600*dt;q.life-=dt});particles=particles.filter(q=>q.life>0);hud()}function rr(px,py,w,h,r){x.beginPath();x.roundRect(px,py,w,h,r)}function draw(){x.clearRect(0,0,W,H);let g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,"#27173c");g.addColorStop(1,"#120c1c");x.fillStyle=g;x.fillRect(0,0,W,H);x.globalAlpha=.12;x.fillStyle="#b89cd6";for(let i=0;i<W;i+=90)x.fillRect(i,0,2,H);x.globalAlpha=1;for(const q of platforms){const y=q.y-cam;if(y<-80||y>H+80)continue;const cs={sofa:["#7048a8","#4c2b7c"],table:["#b7793d","#744320"],shelf:["#3e8f88","#215e59"],chair:["#d95d74","#8f3047"],box:["#cf8b3c","#925723"],bed:["#4e77c7","#2b4d91"]}[q.type];g=x.createLinearGradient(0,y,0,y+q.h+10);g.addColorStop(0,cs[0]);g.addColorStop(1,cs[1]);x.fillStyle=g;rr(q.x,y,q.w,q.h,8);x.fill()}for(const s of stars){const y=s.y-cam+Math.sin(s.bob)*5;x.save();x.translate(s.x,y);x.fillStyle="#ffd43b";x.beginPath();for(let i=0;i<10;i++){const a=-Math.PI/2+i*Math.PI/5,r=i%2?4:11;x.lineTo(Math.cos(a)*r,Math.sin(a)*r)}x.closePath();x.fill();x.restore()}const py=p.y-cam;if(!(p.inv>0&&(p.inv*10|0)%2===0)){x.save();x.translate(p.x+p.w/2,py+p.h/2);if(p.face<0)x.scale(-1,1);x.fillStyle="#57e0c0";rr(-14,-12,28,34,8);x.fill();x.fillStyle="#f3b58c";x.beginPath();x.arc(0,-22,13,0,Math.PI*2);x.fill();x.fillStyle="#3b2453";x.beginPath();x.arc(0,-26,13,Math.PI,Math.PI*2);x.fill();x.restore()}particles.forEach(q=>{x.globalAlpha=Math.max(0,q.life);x.fillStyle=q.color;x.fillRect(q.x-q.size/2,q.y-cam-q.size/2,q.size,q.size)});x.globalAlpha=1;const ly=lava-cam;g=x.createLinearGradient(0,ly-20,0,H);g.addColorStop(0,"#ffd43b");g.addColorStop(.1,"#ff7a18");g.addColorStop(1,"#b71018");x.fillStyle=g;x.beginPath();x.moveTo(0,H);for(let i=0;i<=W;i+=18)x.lineTo(i,ly+Math.sin(i*.035+time*5)*9);x.lineTo(W,H);x.closePath();x.fill()}function loop(now){if(!running)return;const dt=Math.min(.033,(now-last)/1000||0);last=now;if(!paused)update(dt);draw();requestAnimationFrame(loop)}function toggle(force){if(!running)return;paused=typeof force==="boolean"?force:!paused;$("pause").classList.toggle("hidden",!paused);$("pauseBtn").textContent=paused?"▶":"⏸";if(!paused)last=performance.now()}function hold(id,key){const e=$(id),on=a=>{a.preventDefault();keys[key]=true;e.classList.add("active")},off=a=>{a.preventDefault();keys[key]=false;e.classList.remove("active")};e.addEventListener("pointerdown",on);["pointerup","pointercancel","pointerleave"].forEach(v=>e.addEventListener(v,off))}hold("left","left");hold("right","right");$("jump").onpointerdown=e=>{e.preventDefault();jump()};$("startBtn").onclick=$("again").onclick=startGame;$("menu").onclick=()=>{$("over").classList.add("hidden");$("start").classList.remove("hidden");reset();draw()};$("pauseBtn").onclick=()=>toggle();$("resume").onclick=()=>toggle(false);$("sound").onclick=e=>{sound=!sound;e.currentTarget.textContent=sound?"🔊":"🔇"};addEventListener("keydown",e=>{if(["ArrowLeft","a","A"].includes(e.key))keys.left=true;if(["ArrowRight","d","D"].includes(e.key))keys.right=true;if(["ArrowUp","w","W"," "].includes(e.key)){jump();e.preventDefault()}if(["p","P","Escape"].includes(e.key))toggle()});addEventListener("keyup",e=>{if(["ArrowLeft","a","A"].includes(e.key))keys.left=false;if(["ArrowRight","d","D"].includes(e.key))keys.right=false});addEventListener("blur",()=>{keys.left=keys.right=false;if(running&&!paused)toggle(true)});addEventListener("resize",resize);resize();reset();draw()})();</script></body></html>
