<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snowball Fight Pro - K2 games</title>
    <style>
        :root {
            --bg: #eaf6ff;
            --snow: #ffffff;
            --ui-bg: rgba(15, 23, 42, 0.7);
            --accent: #3b82f6;
            --danger: #ef4444;
            --gold: #fbbf24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0f172a;
            color: #1e293b;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            width: 100%;
            position: fixed;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #dbeafe, #ffffff);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        .stat-card {
            background: var(--ui-bg);
            backdrop-filter: blur(12px);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            font-weight: 900;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 90px;
            color: white;
        }

        .stat-label { font-size: 0.55rem; text-transform: uppercase; opacity: 0.7; letter-spacing: 1px; }
        .stat-val { font-size: 1.2rem; color: var(--gold); font-family: monospace; }

        #mobile-controls {
            position: absolute; bottom: 40px; left: 0; right: 0;
            display: none; justify-content: space-between; padding: 0 40px;
            z-index: 100; pointer-events: none;
        }
        .joy-zone {
            width: 140px; height: 140px; background: rgba(0,0,0,0.15);
            border: 3px solid rgba(255,255,255,0.4); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto; backdrop-filter: blur(5px);
        }
        .joy-stick {
            width: 60px; height: 60px; background: rgba(255,255,255,0.9);
            border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .m-action {
            width: 100px; height: 100px; background: var(--accent);
            border: 4px solid white; border-radius: 50%; color: white;
            font-weight: 900; font-size: 1.2rem; display: flex;
            align-items: center; justify-content: center; pointer-events: auto;
        }
        @media (max-width: 1024px) { #mobile-controls { display: flex; } }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
<script>

  function gtag(){dataLayer.push(arguments);}

</head>
<body>
    <div id="game-container">
        <!-- HUD and Canvas unchanged -->
        <div id="mobile-controls">
            <div class="joy-zone" id="joy-base"><div class="joy-stick" id="joy-knob"></div></div>
            <div class="m-action" id="btn-throw">THROW</div>
        </div>

        <a href="index.html" class="back-link">← HUB</a>

        <div id="start-modal" class="modal">
            <h1 style="font-size: 3rem; font-style: italic; font-weight: 900; color: var(--accent);">SNOWBALL FIGHT</h1>
            <p style="margin-top: 15px; font-weight: 600; opacity: 0.8; max-width: 400px;">Dodge the incoming snowballs and hit the enemies to score!</p>
            <button class="btn-large" onclick="game.start()">START BATTLE</button>
        </div>

        <div id="gameover-modal" class="modal" style="display:none">
            <h1 style="font-size: 3rem; font-weight: 900; color: var(--danger);">GAME OVER</h1>
            <p id="final-stats" style="font-size: 1.2rem; margin-top: 10px;"></p>
            <button class="btn-large" onclick="location.reload()">REPLAY</button>
        </div>
    </div>

    <script>
        class SnowballFight {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                this.width = 800;
                this.height = 600;
                this.canvas.width = this.width;
                this.canvas.height = this.height;

                this.player = { x: 400, y: 500, r: 25, speed: 6, cooldown: 0, health: 5 };
                this.ais = [];
                this.snowballs = [];
                this.particles = [];
                this.backgroundParticles = [];
                
                this.score = 0;
                this.playing = false;
                this.keys = {};
                this.joy = { active: false, x: 0, y: 0 };

                this.init();
            }

            init() {
                this.resize();
                // Atmosphere snow: smaller, slower, more transparent
                for(let i=0; i<80; i++) {
                    this.backgroundParticles.push({
                        x: Math.random() * this.width,
                        y: Math.random() * this.height,
                        r: Math.random() * 1.5 + 0.5,
                        s: Math.random() * 0.5 + 0.3
                    });
                }
                
                this.setupInputs();
                window.addEventListener('resize', () => this.resize());
                this.loop();
            }

            resize() {
                const ratio = this.width / this.height;
                let w = window.innerWidth;
                let h = window.innerHeight;
                if (w / h > ratio) w = h * ratio;
                else h = w / ratio;
                this.canvas.style.width = w + 'px';
                this.canvas.style.height = h + 'px';
            }

            setupInputs() {
                window.onkeydown = e => this.keys[e.code] = true;
                window.onkeyup = e => this.keys[e.code] = false;

                const joyBase = document.getElementById('joy-base'), knob = document.getElementById('joy-knob');
                const handleJoy = (e) => {
                    if(!this.joy.active) return;
                    const rect = joyBase.getBoundingClientRect();
                    const t = e.touches ? e.touches[0] : e;
                    const dx = t.clientX - (rect.left + rect.width/2);
                    const dy = t.clientY - (rect.top + rect.height/2);
                    const dist = Math.min(45, Math.hypot(dx, dy));
                    const ang = Math.atan2(dy, dx);
                    this.joy.x = Math.cos(ang) * (dist/45);
                    this.joy.y = Math.sin(ang) * (dist/45);
                    knob.style.transform = `translate(${this.joy.x * 35}px, ${this.joy.y * 35}px)`;
                };

                joyBase.addEventListener('touchstart', e => { this.joy.active = true; handleJoy(e); }, {passive:false});
                window.addEventListener('touchmove', handleJoy, {passive:false});
                window.addEventListener('touchend', () => { 
                    this.joy.active = false; this.joy.x = this.joy.y = 0; 
                    knob.style.transform = 'translate(0,0)';
                });

                document.getElementById('btn-throw').addEventListener('touchstart', e => { e.preventDefault(); this.throwSnowball(); });
                window.addEventListener('keydown', e => { if(e.code === 'Space') this.throwSnowball(); });
            }

            start() {
                this.playing = true;
                this.score = 0;
                this.player.health = 5;
                this.ais = [];
                for(let i=0; i<3; i++) this.spawnAI();
                document.getElementById('start-modal').style.display = 'none';
                this.updateUI();
            }

            spawnAI() {
                this.ais.push({
                    x: Math.random() * (this.width - 100) + 50,
                    y: Math.random() * 150 + 50,
                    targetX: Math.random() * (this.width - 100) + 50,
                    targetY: Math.random() * 150 + 50,
                    r: 25,
                    cooldown: Math.random() * 60 + 60,
                    color: '#3b82f6'
                });
            }

            throwSnowball() {
                if(!this.playing || this.player.cooldown > 0) return;
                this.snowballs.push({ x: this.player.x, y: this.player.y - 20, vx: 0, vy: -10, owner: 'player', trail: [] });
                this.player.cooldown = 15;
            }

            update() {
                this.backgroundParticles.forEach(p => {
                    p.y += p.s;
                    p.x += Math.sin(Date.now() * 0.001 + p.y * 0.01) * 0.3;
                    if(p.y > this.height) { p.y = -10; p.x = Math.random() * this.width; }
                });

                if(!this.playing) return;

                let dx = 0, dy = 0;
                if(this.keys['ArrowLeft'] || this.keys['KeyA']) dx = -1;
                if(this.keys['ArrowRight'] || this.keys['KeyD']) dx = 1;
                if(this.keys['ArrowUp'] || this.keys['KeyW']) dy = -1;
                if(this.keys['ArrowDown'] || this.keys['KeyS']) dy = 1;
                if(this.joy.active) { dx = this.joy.x; dy = this.joy.y; }

                this.player.x += dx * this.player.speed;
                this.player.y += dy * this.player.speed;
                this.player.x = Math.max(this.player.r, Math.min(this.width - this.player.r, this.player.x));
                this.player.y = Math.max(this.height / 2 + this.player.r, Math.min(this.height - this.player.r, this.player.y));

                if(this.player.cooldown > 0) this.player.cooldown--;

                this.ais.forEach(ai => {
                    if(Math.abs(ai.x - ai.targetX) < 5 && Math.abs(ai.y - ai.targetY) < 5) {
                        ai.targetX = Math.random() * (this.width - 100) + 50;
                        ai.targetY = Math.random() * 150 + 50;
                    }
                    ai.x += (ai.targetX - ai.x) * 0.03;
                    ai.y += (ai.targetY - ai.y) * 0.03;

                    if(ai.cooldown > 0) ai.cooldown--;
                    else {
                        const dist = Math.hypot(this.player.x - ai.x, this.player.y - ai.y);
                        const vx = (this.player.x - ai.x) / dist * 7;
                        const vy = (this.player.y - ai.y) / dist * 7;
                        this.snowballs.push({ x: ai.x, y: ai.y + 20, vx, vy, owner: 'ai', trail: [] });
                        ai.cooldown = Math.random() * 60 + 40;
                    }
                });

                for(let i = this.snowballs.length - 1; i >= 0; i--) {
                    const s = this.snowballs[i];
                    s.x += s.vx;
                    s.y += s.vy;
                    
                    s.trail.push({x: s.x, y: s.y});
                    if(s.trail.length > 8) s.trail.shift();

                    if(s.x < 0 || s.x > this.width || s.y < 0 || s.y > this.height) {
                        this.snowballs.splice(i, 1);
                        continue;
                    }

                    if(s.owner === 'player') {
                        this.ais.forEach((ai, aiIdx) => {
                            if(Math.hypot(s.x - ai.x, s.y - ai.y) < ai.r + 10) {
                                this.score += 100;
                                this.spawnParticles(ai.x, ai.y, '#fff', 20);
                                this.ais.splice(aiIdx, 1);
                                this.snowballs.splice(i, 1);
                                this.updateUI();
                                setTimeout(() => this.spawnAI(), 1000);
                            }
                        });
                    } else {
                        if(Math.hypot(s.x - this.player.x, s.y - this.player.y) < this.player.r) {
                            this.player.health--;
                            this.spawnParticles(this.player.x, this.player.y, '#fff', 15);
                            this.snowballs.splice(i, 1);
                            this.updateUI();
                            if(this.player.health <= 0) this.gameOver();
                        }
                    }
                }

                for(let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx; p.y += p.vy;
                    p.vy += 0.2; p.life -= 0.02;
                    if(p.life <= 0) this.particles.splice(i, 1);
                }
            }

            spawnParticles(x, y, color, count) {
                for(let i=0; i<count; i++) {
                    this.particles.push({
                        x, y,
                        vx: (Math.random() - 0.5) * 12,
                        vy: (Math.random() - 0.5) * 12,
                        life: 1,
                        color
                    });
                }
            }

            updateUI() {
                document.getElementById('score-val').textContent = this.score;
                document.getElementById('health-val').textContent = "❤️".repeat(this.player.health);
            }

            gameOver() {
                this.playing = false;
                document.getElementById('gameover-modal').style.display = 'flex';
                document.getElementById('final-stats').textContent = `FINAL SCORE: ${this.score}`;
            }

            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.width, this.height);

                // Atmosphere snow
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                this.backgroundParticles.forEach(p => {
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                });

                ctx.strokeStyle = 'rgba(0,0,0,0.05)';
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(0, this.height/2); ctx.lineTo(this.width, this.height/2); ctx.stroke();

                this.drawCharacter(this.player.x, this.player.y, '#ef4444', '🧑‍🚀');
                this.ais.forEach(ai => this.drawCharacter(ai.x, ai.y, ai.color, '👾'));

                // Snowballs with TRAILS and OUTLINES
                this.snowballs.forEach(s => {
                    // Draw Trail
                    ctx.beginPath();
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.lineWidth = 4;
                    ctx.lineCap = 'round';
                    s.trail.forEach((pos, idx) => {
                        if(idx === 0) ctx.moveTo(pos.x, pos.y);
                        else ctx.lineTo(pos.x, pos.y);
                    });
                    ctx.stroke();

                    // Draw Ball
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, 7, 0, Math.PI*2);
                    const grad = ctx.createRadialGradient(s.x-2, s.y-2, 1, s.x, s.y, 7);
                    grad.addColorStop(0, '#ffffff');
                    grad.addColorStop(1, '#dbeafe');
                    ctx.fillStyle = grad;
                    ctx.fill();
                    ctx.strokeStyle = '#3b82f6';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    ctx.restore();
                });

                this.particles.forEach(p => {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
                });
                ctx.globalAlpha = 1;
            }

            drawCharacter(x, y, color, emoji) {
                const ctx = this.ctx;
                ctx.save();
                ctx.translate(x, y);
                ctx.fillStyle = 'rgba(0,0,0,0.1)';
                ctx.beginPath(); ctx.ellipse(0, 25, 20, 8, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = color;
                ctx.beginPath(); ctx.roundRect(-20, -20, 40, 45, 10); ctx.fill();
                ctx.font = '30px Arial';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(emoji, 0, 0);
                ctx.restore();
            }

            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        }

        const game = new SnowballFight();
    </script>
</body>
</html>
