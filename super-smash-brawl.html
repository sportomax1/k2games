<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Super Smash Brawl</title>
    <style>
        :root { --glass: rgba(7,12,30,.72); --line: rgba(255,255,255,.16); --cyan:#67e8f9; --pink:#fb7185; --gold:#fde68a; }
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background: radial-gradient(circle at 20% 0%, #283593 0, transparent 30%), radial-gradient(circle at 90% 10%, #7c2d12 0, transparent 28%), linear-gradient(135deg, #050816, #111827 55%, #020617); color: #e2e8f0; padding: 12px; overflow-x: hidden; }
        .wrap { max-width: 1100px; margin: 0 auto; }
        .top { display: flex; gap: 12px; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        a { color: var(--cyan); text-decoration: none; border: 1px solid rgba(103,232,249,.5); border-radius: 999px; padding: 8px 12px; font-weight: 800; background: rgba(8,47,73,.45); }
        h1 { margin: 8px 0; font-size: clamp(1.25rem, 4vw, 2.2rem); text-shadow: 0 4px 22px rgba(103,232,249,.45); }
        .hint { color:#cbd5e1; font-size:.95rem; }
        #game { width: 100%; aspect-ratio: 16 / 9; border-radius: 18px; display: block; margin-top: 10px; border: 1px solid rgba(255,255,255,.18); box-shadow: 0 22px 80px rgba(0,0,0,.55), inset 0 0 40px rgba(255,255,255,.05); touch-action: none; background:#020617; }
        .hud { margin: 10px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .panel { background: var(--glass); border: 1px solid var(--line); border-radius: 14px; padding: 10px 12px; backdrop-filter: blur(12px); box-shadow: 0 8px 24px rgba(0,0,0,.22); }
        .stat { display:flex; align-items:center; justify-content:space-between; gap:8px; font-weight:800; }
        .bar { height: 8px; background: rgba(255,255,255,.12); border-radius: 999px; overflow:hidden; margin-top:7px; }
        .fill { height:100%; width:0%; background: linear-gradient(90deg, #22d3ee, #facc15, #fb7185); transition: width .12s linear; }
        #msg { min-height: 42px; font-weight: 800; color:#f8fafc; }
        .controls { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-top: 8px; }
        button { padding: 12px 8px; border-radius: 14px; border: 1px solid rgba(255,255,255,.2); background: linear-gradient(180deg, #334155, #111827); color: white; font-weight: 900; box-shadow: 0 6px 0 rgba(0,0,0,.28); user-select:none; touch-action:none; }
        button:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,.28); }
        @media (max-width: 760px) { body { padding:8px; } .controls { grid-template-columns: repeat(3, 1fr);} .hud { grid-template-columns: 1fr; } .hint { width:100%; } }
    </style>
</head>
<body>
<div class="wrap">
    <div class="top">
        <a href="index.html">← Back</a>
        <h1>⚡ Super Smash Brawl</h1>
        <span class="hint">A/D move • W jump • J jab • K smash • L shield • Shift dash</span>
    </div>
    <canvas id="game" width="960" height="540"></canvas>
    <div class="hud">
        <div class="panel"><div class="stat">🧢 You <span><strong id="pLives">★★★</strong> <strong id="pDmg">0%</strong></span></div><div class="bar"><div id="pBar" class="fill"></div></div></div>
        <div class="panel"><div class="stat">🤖 Rival <span><strong id="eLives">★★★</strong> <strong id="eDmg">0%</strong></span></div><div class="bar"><div id="eBar" class="fill"></div></div></div>
    </div>
    <div class="panel" id="msg">Best of 3 stocks. Jab builds damage, smash launches, shield blocks, dash saves you from edge embarrassment.</div>
    <div class="controls">
        <button data-act="left">⬅ Left</button>
        <button data-act="right">Right ➡</button>
        <button data-act="jump">⬆ Jump</button>
        <button data-act="jab">👊 Jab</button>
        <button data-act="smash">💥 Smash</button>
        <button data-act="shield">🛡 Shield</button>
    </div>
</div>
<script>
const c = document.getElementById('game'), ctx = c.getContext('2d');
const ui = {
  pD: document.getElementById('pDmg'), eD: document.getElementById('eDmg'), pLives: document.getElementById('pLives'), eLives: document.getElementById('eLives'),
  pBar: document.getElementById('pBar'), eBar: document.getElementById('eBar'), msg: document.getElementById('msg')
};
const keys = new Set();
const gravity = 0.62, friction = 0.86;
const stage = { y: 418, left: 112, right: 848 };
const plats = [{x:260,y:325,w:170},{x:530,y:286,w:170},{x:405,y:220,w:150}];
let player, enemy, over=false, frame=0, shake=0, sparks=[], clouds=[];
for(let i=0;i<22;i++) clouds.push({x:Math.random()*960,y:25+Math.random()*170,s:35+Math.random()*90,v:.08+Math.random()*.25});
function fighter(name,x,y,color,accent,ai=false){return {name,x,y,vx:0,vy:0,w:42,h:70,d:0,lives:3,face:ai?-1:1,onGround:false,jumps:2,cd:0,shield:0,stun:0,combo:0,color,accent,ai,inv:70,smashWind:0};}
function start(){ player=fighter('You',285,260,'#38bdf8','#facc15'); enemy=fighter('Rival',675,260,'#fb7185','#a7f3d0',true); over=false; sparks=[]; shake=0; ui.msg.textContent='Best of 3 stocks. Knock the rival off stage. Tiny legal department says this is “inspired brawling.”'; }
function respawn(f){ f.x=f.ai?675:285; f.y=180; f.vx=f.vy=0; f.d=0; f.cd=0; f.stun=0; f.shield=0; f.inv=100; f.jumps=2; }
function burst(x,y,color,n=18,pow=4){ for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2, s=Math.random()*pow+1; sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:24+Math.random()*18,color,r:2+Math.random()*4}); } }
function platformLand(f,py){ let landed=false; if(f.vy>=0){ if(f.x>stage.left+10&&f.x<stage.right-10&&py+f.h<=stage.y&&f.y+f.h>=stage.y){f.y=stage.y-f.h; landed=true;} for(const p of plats){ if(f.x>p.x&&f.x<p.x+p.w&&py+f.h<=p.y&&f.y+f.h>=p.y){f.y=p.y-f.h; landed=true;} } } if(landed){f.vy=0; f.onGround=true; f.jumps=2;} else f.onGround=false; }
function physics(f){ const py=f.y; f.vy+=gravity; f.x+=f.vx; f.y+=f.vy; f.vx*=f.onGround?friction:.94; if(f.cd>0)f.cd--; if(f.stun>0)f.stun--; if(f.inv>0)f.inv--; if(f.smashWind>0)f.smashWind--; platformLand(f,py); if(f.x<20){f.x=20; f.vx=Math.abs(f.vx)*.35;} if(f.x>940){f.x=940; f.vx=-Math.abs(f.vx)*.35;} }
function attack(a,t,type='jab'){ if(over||a.cd>0||a.stun>0)return; const smash=type==='smash'; a.cd=smash?38:16; a.smashWind=smash?14:5; const range=smash?92:66, height=smash?78:62; const dir=a.face||1; burst(a.x+dir*38,a.y+35,a.accent,smash?12:6,smash?3:2); if(Math.abs((a.x+dir*30)-t.x)<range&&Math.abs((a.y+30)-(t.y+30))<height){ if(t.shield>0){ t.vx+=dir*1.8; t.shield=Math.max(0,t.shield-28); ui.msg.textContent='Blocked! Shield looking useful. 🛡'; burst(t.x,t.y+35,'#93c5fd',12,3); return; } const dmg=smash?18:7; t.d=Math.min(299,t.d+dmg); const kb=(smash?6.2:2.8)+t.d*(smash?.065:.032); t.vx=dir*kb; t.vy=-(smash?5.4:2.5)-t.d*(smash?.018:.008); t.stun=smash?24:10; shake=smash?14:6; burst(t.x,t.y+35,smash?'#f97316':'#fef08a',smash?34:16,smash?7:3.5); ui.msg.textContent=smash?'BOOM. Rival launched! 💥':'Nice jab combo.'; } }
function control(){ if(player.stun<=0){ let ax=0; if(keys.has('a')||keys.has('arrowleft')) ax-=.65; if(keys.has('d')||keys.has('arrowright')) ax+=.65; player.vx+=ax; if(ax) player.face=ax>0?1:-1; if((keys.has('shift')||keys.has('dash'))&&Math.abs(ax)>0) player.vx+=player.face*.95; } player.shield=(keys.has('l')||keys.has('shield'))?Math.min(100,player.shield+3):Math.max(0,player.shield-2); }
function jump(f){ if(f.jumps>0&&!over){ f.vy=f.onGround?-12.3:-10.2; f.onGround=false; f.jumps--; burst(f.x,f.y+f.h,f.accent,10,2.8); } }
function ai(){ if(enemy.stun>0||over)return; const dir=player.x<enemy.x?-1:1; enemy.face=dir; const dist=Math.abs(player.x-enemy.x); if(enemy.y>stage.y-80&&enemy.x<stage.left+70){enemy.vx+=.9; if(enemy.jumps)jump(enemy);} else if(enemy.y>stage.y-80&&enemy.x>stage.right-70){enemy.vx-=.9; if(enemy.jumps)jump(enemy);} else enemy.vx+=dir*(dist>90?.42:.18); if(player.y<enemy.y-55&&Math.random()<.026)jump(enemy); if(dist<120&&Math.random()<.036) attack(enemy,player, enemy.d>70||Math.random()<.35?'smash':'jab'); enemy.shield=(dist<95&&player.cd<8&&Math.random()<.08)?40:Math.max(0,enemy.shield-2); }
function koCheck(f,other){ if(f.y>670||f.x<-180||f.x>1140){ f.lives--; burst(Math.max(60,Math.min(900,f.x)),Math.max(60,Math.min(500,f.y)),f.color,50,9); shake=22; if(f.lives<=0){ over=true; ui.msg.textContent=(f===enemy?'Victory! ':'Defeat! ')+ 'Tap smash for rematch.'; } else { ui.msg.textContent=(f===enemy?'Rival':'You')+' lost a stock!'; respawn(f); other.d=Math.max(0,other.d-10); } } }
function update(){ frame++; if(!over){ control(); physics(player); ai(); physics(enemy); koCheck(player,enemy); koCheck(enemy,player); } sparks=sparks.filter(s=>(s.x+=s.vx,s.y+=s.vy,s.vy+=.12,s.life--)>0); ui.pD.textContent=Math.round(player.d)+'%'; ui.eD.textContent=Math.round(enemy.d)+'%'; ui.pLives.textContent='★'.repeat(player.lives)||'—'; ui.eLives.textContent='★'.repeat(enemy.lives)||'—'; ui.pBar.style.width=Math.min(100,player.d/2.2)+'%'; ui.eBar.style.width=Math.min(100,enemy.d/2.2)+'%'; }
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.roundRect(x,y,w,h,r); ctx.fill(); ctx.stroke(); }
function drawStage(){ const g=ctx.createLinearGradient(0,0,0,540); g.addColorStop(0,'#172554'); g.addColorStop(.55,'#4c1d95'); g.addColorStop(1,'#020617'); ctx.fillStyle=g; ctx.fillRect(0,0,960,540); ctx.globalAlpha=.55; for(const cl of clouds){ cl.x=(cl.x+cl.v)%1080-90; ctx.fillStyle='#dbeafe'; ctx.beginPath(); ctx.ellipse(cl.x,cl.y,cl.s,cl.s*.28,0,0,Math.PI*2); ctx.fill(); } ctx.globalAlpha=1; ctx.fillStyle='rgba(255,255,255,.08)'; for(let i=0;i<55;i++){ ctx.fillRect((i*97+frame*.25)%960,40+(i*47)%250,2,2); } ctx.fillStyle='#312e81'; ctx.strokeStyle='#c4b5fd'; ctx.lineWidth=3; rr(stage.left,stage.y,stage.right-stage.left,28,14); ctx.fillStyle='#0f766e'; ctx.fillRect(stage.left+22,stage.y+10,stage.right-stage.left-44,8); for(const p of plats){ ctx.fillStyle='rgba(30,41,59,.88)'; ctx.strokeStyle='rgba(255,255,255,.45)'; rr(p.x,p.y,p.w,16,8); } ctx.fillStyle='rgba(15,23,42,.7)'; ctx.fillRect(0,468,960,72); }
function drawF(f){ const flick=f.inv>0&&frame%8<4; if(flick)ctx.globalAlpha=.48; ctx.save(); ctx.translate(f.x,f.y); ctx.scale(f.face,1); if(f.shield>0){ ctx.strokeStyle='rgba(147,197,253,.85)'; ctx.lineWidth=5; ctx.beginPath(); ctx.arc(0,34,49,0,Math.PI*2); ctx.stroke(); } ctx.shadowColor=f.color; ctx.shadowBlur=18; ctx.fillStyle=f.color; ctx.strokeStyle='rgba(255,255,255,.7)'; ctx.lineWidth=3; ctx.beginPath(); ctx.roundRect(-21,22,42,47,14); ctx.fill(); ctx.stroke(); ctx.fillStyle=f.accent; ctx.fillRect(-24,33,48,9); ctx.fillStyle='#f8fafc'; ctx.beginPath(); ctx.roundRect(-19,-7,38,33,13); ctx.fill(); ctx.stroke(); ctx.fillStyle='#0f172a'; ctx.beginPath(); ctx.arc(8,7,3.5,0,Math.PI*2); ctx.fill(); ctx.strokeStyle=f.accent; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(18,32); ctx.lineTo(38+(f.smashWind?10:0),22); ctx.stroke(); ctx.strokeStyle='#111827'; ctx.lineWidth=5; ctx.beginPath(); ctx.moveTo(-10,68); ctx.lineTo(-18,80); ctx.moveTo(12,68); ctx.lineTo(19,80); ctx.stroke(); ctx.restore(); if(flick)ctx.globalAlpha=1; }
function draw(){ ctx.save(); if(shake>0){ ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake); shake*=.86; if(shake<.5)shake=0; } drawStage(); drawF(player); drawF(enemy); for(const s of sparks){ ctx.globalAlpha=Math.max(0,s.life/34); ctx.fillStyle=s.color; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); } ctx.globalAlpha=1; if(over){ ctx.fillStyle='rgba(2,6,23,.72)'; ctx.fillRect(0,0,960,540); ctx.fillStyle='#fff'; ctx.font='900 54px system-ui'; ctx.textAlign='center'; ctx.fillText(enemy.lives<=0?'YOU WIN!':'RIVAL WINS!',480,255); ctx.font='800 22px system-ui'; ctx.fillText('Press K / Smash to rematch',480,296); } ctx.restore(); }
function loop(){ update(); draw(); requestAnimationFrame(loop); }
function rematchOr(fn){ if(over){start();return;} fn(); }
document.addEventListener('keydown', e=>{ const k=e.key.toLowerCase(); keys.add(k); if(k==='w'||k==='arrowup')jump(player); if(k==='j')rematchOr(()=>attack(player,enemy,'jab')); if(k==='k')rematchOr(()=>attack(player,enemy,'smash')); });
document.addEventListener('keyup', e=>keys.delete(e.key.toLowerCase()));
document.querySelectorAll('[data-act]').forEach(b=>{ const act=b.dataset.act; const down=()=>{ if(act==='left')keys.add('arrowleft'); if(act==='right')keys.add('arrowright'); if(act==='shield')keys.add('shield'); if(act==='jump')jump(player); if(act==='jab')rematchOr(()=>attack(player,enemy,'jab')); if(act==='smash')rematchOr(()=>attack(player,enemy,'smash')); }; const up=()=>{ if(act==='left')keys.delete('arrowleft'); if(act==='right')keys.delete('arrowright'); if(act==='shield')keys.delete('shield'); }; b.addEventListener('pointerdown',e=>{e.preventDefault();down();}); b.addEventListener('pointerup',up); b.addEventListener('pointerleave',up); b.addEventListener('pointercancel',up); });
start(); loop();
</script>
</body>
</html>
