<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Jump Junkie - Monster Truck Racing</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#100b08;color:#fff;font-family:system-ui;touch-action:none}canvas{width:100%;height:100%;display:block}.hide{display:none!important}#hud{position:fixed;z-index:5;top:8px;left:8px;right:8px;display:grid;grid-template-columns:repeat(5,1fr);gap:5px}.s{background:#160d09cc;border:1px solid #ffffff22;border-radius:11px;padding:6px;text-align:center}.s small{display:block;color:#d8b48c;font-size:8px;font-weight:900}.s b{font-size:14px}.screen{position:fixed;z-index:20;inset:0;display:grid;place-items:center;padding:18px;background:radial-gradient(circle,#5b2a12ee,#0c0705fa)}.panel{max-width:560px;padding:28px;border:1px solid #ffffff22;border-radius:25px;background:#24130eee;text-align:center}.logo{font-size:clamp(45px,13vw,80px);line-height:.85;font-style:italic;margin:8px}.logo span{display:block;color:#ff6a2a}.btn{border:0;border-radius:99px;padding:14px 24px;margin:6px;background:linear-gradient(135deg,#ffc341,#ff6428);color:#231007;font-weight:1000}.alt{background:#ffffff15;color:#fff;border:1px solid #ffffff22}.controls{position:fixed;z-index:7;left:10px;right:10px;bottom:12px;display:flex;justify-content:space-between;pointer-events:none}.pad{display:flex;gap:7px;pointer-events:auto}.c{width:65px;height:65px;border-radius:19px;border:1px solid #ffffff2d;background:#160d09bb;color:#fff;font-size:21px;font-weight:900}.c.on{background:#ff6b2c66}.gas{width:82px;height:82px;border-radius:50%;font-size:12px}.nit{border-color:#50e5ff;color:#68edff;font-size:10px}.bar{position:fixed;z-index:6;top:70px;left:10px;width:210px;font-size:9px;font-weight:900}.trk{height:9px;margin:3px 0 7px;background:#0009;border-radius:9px;overflow:hidden}.fill{height:100%}.hp{background:#ff573d}.no{background:#52e7ff}.msg{position:fixed;z-index:8;left:50%;top:25%;transform:translateX(-50%);font-size:clamp(28px,8vw,65px);font-weight:1000;font-style:italic;text-shadow:0 4px 18px #000;opacity:0}.msg.show{opacity:1}.result{font-size:90px;color:#ffc341;font-weight:1000}@media(max-width:500px){#hud{gap:3px}.s{padding:5px 2px}.s b{font-size:11px}.s small{font-size:7px}.c{width:58px;height:58px}.gas{width:76px;height:76px}}</style></head><body><canvas id="g"></canvas><div id="hud" class="hide"><div class="s"><small>LAP</small><b id="lap">1/3</b></div><div class="s"><small>PLACE</small><b id="place">1ST</b></div><div class="s"><small>SPEED</small><b id="speed">0</b></div><div class="s"><small>SCORE</small><b id="score">0</b></div><div class="s"><small>STUNT</small><b id="stunt">0</b></div></div><div id="bar" class="bar hide">DAMAGE<div class="trk"><div id="hp" class="fill hp"></div></div>NITRO<div class="trk"><div id="no" class="fill no"></div></div></div><div id="msg" class="msg"></div><div id="ctrl" class="controls hide"><div class="pad"><button id="l" class="c">◀</button><button id="r" class="c">▶</button><button id="b" class="c">▼</button></div><div class="pad"><button id="n" class="c nit">NITRO</button><button id="a" class="c gas">GAS</button></div></div><section id="start" class="screen"><div class="panel"><div>K2 GAMES MOTORSPORT</div><h1 class="logo">JUMP <span>JUNKIE</span></h1><p>Race monster trucks around a dirt stadium. Drift, smash wrecks, hit ramps, rotate in the air, and land clean.</p><button id="play" class="btn">START RACE</button><button class="btn alt" onclick="location='index.html'">BACK TO VAULT</button><p>Arrows/WASD • Space nitro</p></div></section><section id="end" class="screen hide"><div class="panel"><div>RACE COMPLETE</div><div id="res" class="result">1ST</div><p id="txt"></p><button id="again" class="btn">RACE AGAIN</button><button class="btn alt" onclick="location='index.html'">BACK TO VAULT</button></div></section><script>(()=>{'use strict';const c=document.querySelector('#g'),x=c.getContext('2d'),$=s=>document.querySelector(s),TAU=Math.PI*2,cl=(v,a,b)=>Math.max(a,Math.min(b,v));let W,H,D,run=false,last=0,t=0,count=0,shake=0,P,R,O,Q,T;const I={l:0,r:0,g:0,b:0,n:0};function size(){D=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0);T={cx:W/2,cy:H*.53,rx:Math.min(W*.35,390),ry:Math.min(H*.28,235),lane:Math.min(W*.065,65)}}onresize=size;size();function hold(id,k){let e=$(id),on=v=>z=>{z.preventDefault();I[k]=v;e.classList.toggle('on',!!v)};e.onpointerdown=on(1);e.onpointerup=e.onpointercancel=e.onpointerleave=on(0)}hold('#l','l');hold('#r','r');hold('#a','g');hold('#b','b');hold('#n','n');onkeydown=e=>{if(e.code==='ArrowLeft'||e.code==='KeyA')I.l=1;if(e.code==='ArrowRight'||e.code==='KeyD')I.r=1;if(e.code==='ArrowUp'||e.code==='KeyW')I.g=1;if(e.code==='ArrowDown'||e.code==='KeyS')I.b=1;if(e.code==='Space')I.n=1};onkeyup=e=>{if(e.code==='ArrowLeft'||e.code==='KeyA')I.l=0;if(e.code==='ArrowRight'||e.code==='KeyD')I.r=0;if(e.code==='ArrowUp'||e.code==='KeyW')I.g=0;if(e.code==='ArrowDown'||e.code==='KeyS')I.b=0;if(e.code==='Space')I.n=0};function truck(color,lane,ai){return{a:4.72,lane,s:ai?2.2:0,lap:0,color,ai,hp:100,no:100,z:0,vz:0,rot:0,spin:0,score:0,best:0,cd:0,done:0}}function reset(){P=truck('#ff692b',0,0);R=[truck('#38b6ff',-.55,1),truck('#6ee55d',.55,1),truck('#d160ff',.1,1)];R.forEach((r,i)=>{r.a-=i*.05;r.skill=.9+i*.05});O=[['ramp',.15,-.5],['wreck',.8,.42],['ramp',1.35,.35],['mud',2,-.45],['ramp',2.65,0],['wreck',3.2,.55],['ramp',3.85,-.35],['mud',4.5,.5],['ramp',5.15,.35],['wreck',5.7,-.5]].map(v=>({type:v[0],a:v[1],lane:v[2],off:0}));Q=[];t=0;count=4;run=true;$('#start').classList.add('hide');$('#end').classList.add('hide');['#hud','#bar','#ctrl'].forEach(s=>$(s).classList.remove('hide'));last=performance.now();requestAnimationFrame(loop)}function pos(q){let rr=T.rx+q.lane*T.lane;return{x:T.cx+Math.cos(q.a)*rr,y:T.cy+Math.sin(q.a)*T.ry}}function say(s,col='#ffc341'){let m=$('#msg');m.textContent=s;m.style.color=col;m.classList.add('show');clearTimeout(say.id);say.id=setTimeout(()=>m.classList.remove('show'),850)}function burst(q,col,n=15){let p=pos(q);for(let i=0;i<n;i++)Q.push({x:p.x,y:p.y-q.z,vx:(Math.random()-.5)*130,vy:(Math.random()-.7)*100,l:.4+Math.random()*.5,col})}function step(q,dt){if(q.done)return;if(q.cd>0)q.cd-=dt;if(q.ai){let ramp=O.find(o=>o.type==='ramp'&&((o.a-q.a+TAU)%TAU)<.32),goal=ramp?ramp.lane:Math.sin(t*.5+q.skill*5)*.4;q.lane+=(goal-q.lane)*dt*.8;q.s+=(3.1+q.skill*.5-q.s)*dt*.7}else{let st=I.r-I.l;q.lane+=st*dt*(.8+q.s*.15)*(I.b?.55:1);q.s+=((I.g?4.2:1.5)-q.s)*dt*(I.g?1:.4);if(I.b)q.s-=dt*1.2;if(I.n&&I.g&&q.no>0){q.s+=dt*2.2;q.no-=dt*24}else q.no=Math.min(100,q.no+dt*4)}q.lane=cl(q.lane,-.9,.9);q.s=cl(q.s,.4,5.4);let old=q.a;q.a=(q.a+q.s*dt*.42)%TAU;if(old>5.5&&q.a<.6){q.lap++;if(q.lap>=3){q.done=1;if(q===P)finish()}}if(q.z>0||q.vz){q.vz-=18*dt;q.z+=q.vz*dt;q.rot+=q.spin*dt;if(!q.ai){q.spin+=(I.r-I.l)*dt*2.1;q.spin*=.994}if(q.z<=0){let rr=Math.atan2(Math.sin(q.rot),Math.cos(q.rot));if(Math.abs(rr)<.65){let pts=Math.max(100,Math.round((Math.abs(q.rot)/TAU*850+180+q.s*50)*10));q.score+=pts;q.best=Math.max(q.best,pts);q.no=Math.min(100,q.no+18);if(q===P)say('CLEAN LANDING +'+pts)}else{q.hp-=22;q.s*=.5;shake=15;if(q===P)say('HARD LANDING!','#ff5942')}q.z=q.vz=q.rot=q.spin=0}}for(const o of O){if(o.off>0){o.off-=dt;continue}let da=Math.abs(Math.atan2(Math.sin(q.a-o.a),Math.cos(q.a-o.a))),dl=Math.abs(q.lane-o.lane);if(da<.065&&dl<.28&&q.z<6){if(o.type==='ramp'){q.vz=9+q.s*.7;q.z=2;q.spin=q.ai?(Math.random()-.5):((I.r-I.l)*.8);q.score+=75;if(q===P)say('BIG AIR!','#58e8ff');burst(q,'#d59a62')}else if(o.type==='mud'){q.s*=.73;burst(q,'#6d4027',8)}else if(q.cd<=0){q.hp-=18;q.s*=.5;q.cd=.7;o.off=4;shake=12;burst(q,'#ff6a32',22);if(q===P)say('SMASH!','#ff5942')}}}if(q.hp<=0&&q===P)finish(1)}function update(dt){t+=dt;if(count>0){count-=dt;return}step(P,dt);R.forEach(r=>step(r,dt));for(let p of Q){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=90*dt;p.l-=dt}Q=Q.filter(p=>p.l>0);let prog=q=>q.lap*TAU+q.a,ord=[P,...R].sort((a,b)=>prog(b)-prog(a));P.place=ord.indexOf(P)+1;$('#lap').textContent=Math.min(3,P.lap+1)+'/3';$('#place').textContent=['1ST','2ND','3RD','4TH'][P.place-1];$('#speed').textContent=Math.round(P.s*27)+' MPH';$('#score').textContent=Math.round(P.score);$('#stunt').textContent=P.best;$('#hp').style.width=P.hp+'%';$('#no').style.width=P.no+'%';shake=Math.max(0,shake-30*dt)}function oval(rx,ry){x.beginPath();x.ellipse(T.cx,T.cy,rx,ry,0,0,TAU)}function drawTruck(q){let p=pos(q),s=cl(.72+(p.y-T.cy)/(T.ry*3.3),.58,1.1);x.save();x.translate(p.x,p.y-q.z*s);x.rotate(q.a+Math.PI/2+q.rot);x.scale(s,s);x.fillStyle='#0008';x.beginPath();x.ellipse(0,17+q.z*.1,35,10,0,0,TAU);x.fill();x.fillStyle='#111';for(let z of[-23,23]){x.beginPath();x.ellipse(z,12,15,19,0,0,TAU);x.fill()}x.fillStyle=q.color;x.fillRect(-30,-13,60,31);x.fillStyle='#171717';x.fillRect(-16,-16,32,15);x.fillStyle='#73d8ff';x.fillRect(-12,-13,9,8);x.fillRect(3,-13,9,8);x.fillStyle='#fff';x.font='bold 11px sans-serif';x.textAlign='center';x.fillText(q===P?'JJ':'R',0,8);x.restore()}function drawObj(o){if(o.off>0)return;let p=pos(o);x.save();x.translate(p.x,p.y);x.rotate(o.a+Math.PI/2);if(o.type==='ramp'){x.fillStyle='#f26b26';x.beginPath();x.moveTo(-25,13);x.lineTo(0,-20);x.lineTo(25,13);x.fill();x.fillStyle='#ffd55b';x.fillRect(-20,6,40,5)}else if(o.type==='wreck'){x.fillStyle='#333';x.fillRect(-25,-10,50,20);x.fillStyle='#a72d20';x.fillRect(-14,-16,28,12)}else{x.fillStyle='#3e2519cc';x.beginPath();x.ellipse(0,0,32,17,0,0,TAU);x.fill()}x.restore()}function draw(){x.save();x.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);let g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#110916');g.addColorStop(1,'#21130c');x.fillStyle=g;x.fillRect(-20,-20,W+40,H+40);x.fillStyle='#281610';oval(T.rx+110,T.ry+95);x.fill();x.fillStyle='#4a2c1b';oval(T.rx+60,T.ry+60);x.fill();x.fillStyle='#193818';oval(T.rx-58,T.ry-54);x.fill();oval(T.rx,T.ry);x.lineWidth=94;x.strokeStyle='#755038';x.stroke();oval(T.rx,T.ry);x.lineWidth=3;x.strokeStyle='#ffffff44';x.setLineDash([18,13]);x.stroke();x.setLineDash([]);let d=[];O.forEach(o=>d.push({y:pos(o).y,o}));[...R,P].forEach(q=>d.push({y:pos(q).y-q.z,q}));d.sort((a,b)=>a.y-b.y).forEach(v=>v.o?drawObj(v.o):drawTruck(v.q));for(const p of Q){x.globalAlpha=p.l/.9;x.fillStyle=p.col;x.beginPath();x.arc(p.x,p.y,4,0,TAU);x.fill()}x.globalAlpha=1;if(count>0){x.fillStyle='#0006';x.fillRect(0,0,W,H);x.fillStyle='#ffc341';x.font='bold '+Math.min(110,W*.22)+'px sans-serif';x.textAlign='center';x.fillText(count>1?Math.ceil(count-1):'GO!',W/2,H*.52)}x.restore()}function finish(dnf=0){if(!run)return;run=false;['#hud','#bar','#ctrl'].forEach(s=>$(s).classList.add('hide'));$('#end').classList.remove('hide');$('#res').textContent=dnf?'DNF':['1ST','2ND','3RD','4TH'][P.place-1];$('#txt').textContent=dnf?'Truck destroyed. Land cleaner next run.':P.place===1?'You owned the stadium!':'Finish stronger next race. Score: '+Math.round(P.score)}function loop(n){if(!run)return;let dt=Math.min(.033,(n-last)/1000||.016);last=n;update(dt);draw();requestAnimationFrame(loop)}$('#play').onclick=$('#again').onclick=reset;draw()})();</script></body></html>
