<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Shopping Cart Dash 3D - K2 games</title>
    <style>
        :root {
            --panel: rgba(255, 255, 255, 0.92);
            --line: rgba(15, 23, 42, 0.1);
            --ink: #142033;
            --blue: #38bdf8;
            --green: #22c55e;
            --gold: #fbbf24;
            --red: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #e7eef6;
            color: var(--ink);
            font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
        }

        #app,
        canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        .back-link {
            position: fixed;
            top: calc(14px + env(safe-area-inset-top, 0px));
            left: 14px;
            z-index: 50;
            padding: 8px 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.82);
            color: var(--ink);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 1000;
            letter-spacing: 0.08em;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
        }

        #hud {
            position: fixed;
            inset: calc(14px + env(safe-area-inset-top, 0px)) 14px auto 92px;
            z-index: 30;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            pointer-events: none;
        }

        .cluster {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .panel {
            min-width: 96px;
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 14px 32px rgba(15, 23, 42, 0.12);
        }

        .brand {
            min-width: 190px;
            border-color: rgba(56, 189, 248, 0.32);
        }

        .label {
            display: block;
            color: rgba(20, 32, 51, 0.6);
            font-size: 0.62rem;
            font-weight: 900;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .value {
            margin-top: 4px;
            color: var(--ink);
            font-size: 1.34rem;
            line-height: 1;
            font-weight: 1000;
        }

        .brand .value {
            color: #0284c7;
            font-size: 1.42rem;
        }

        .green { color: var(--green); }
        .gold { color: #d97706; }
        .red { color: var(--red); }

        #list {
            position: fixed;
            top: calc(86px + env(safe-area-inset-top, 0px));
            right: 14px;
            z-index: 31;
            width: min(245px, calc(100vw - 28px));
            padding: 13px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.93);
            box-shadow: 0 18px 42px rgba(15, 23, 42, 0.14);
            pointer-events: none;
        }

        #list h2 {
            margin: 0 0 8px;
            color: rgba(20, 32, 51, 0.64);
            font-size: 0.68rem;
            font-weight: 1000;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            padding: 7px 0;
            border-top: 1px solid rgba(15, 23, 42, 0.08);
            color: var(--ink);
            font-size: 0.86rem;
            font-weight: 900;
        }

        .item.done {
            color: rgba(20, 32, 51, 0.34);
            text-decoration: line-through;
        }

        .aisle-tag {
            color: rgba(20, 32, 51, 0.46);
            font-size: 0.64rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        #toast {
            position: fixed;
            left: 50%;
            top: 44%;
            z-index: 35;
            transform: translate(-50%, -50%) scale(0.8);
            color: white;
            font-size: clamp(2rem, 8vw, 5.6rem);
            line-height: 0.9;
            font-weight: 1000;
            text-align: center;
            text-shadow: 0 7px 0 #142033, 0 0 28px rgba(56, 189, 248, 0.5);
            opacity: 0;
            pointer-events: none;
        }

        #toast.show {
            animation: toast 1.25s ease-out forwards;
        }

        @keyframes toast {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.72); }
            18% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
            72% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.18); }
        }

        #overlay {
            position: fixed;
            inset: 0;
            z-index: 60;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22px;
            background: radial-gradient(circle at 50% 35%, rgba(255, 255, 255, 0.72), rgba(226, 237, 248, 0.96));
        }

        .modal {
            width: min(535px, 100%);
            padding: 24px;
            border: 2px solid rgba(56, 189, 248, 0.34);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
            text-align: center;
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.22);
        }

        h1 {
            color: #0284c7;
            font-size: clamp(2.65rem, 11vw, 5.6rem);
            line-height: 0.82;
            font-weight: 1000;
            letter-spacing: 0;
            text-transform: uppercase;
            text-shadow: 0 7px 0 #bae6fd;
        }

        .brief {
            margin: 18px auto 20px;
            max-width: 430px;
            color: rgba(20, 32, 51, 0.72);
            font-size: 0.96rem;
            line-height: 1.45;
        }

        .btn {
            width: min(330px, 100%);
            height: 62px;
            border: 0;
            border-radius: 8px;
            background: #142033;
            color: white;
            box-shadow: 0 8px 0 #475569;
            cursor: pointer;
            font-size: 1.08rem;
            font-weight: 1000;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #475569;
        }

        #touch {
            position: fixed;
            inset: auto 16px calc(24px + env(safe-area-inset-bottom, 0px)) 16px;
            z-index: 34;
            display: none;
            justify-content: space-between;
            pointer-events: none;
        }

        .stick-wrap {
            width: 126px;
            height: 126px;
            border: 2px solid rgba(20, 32, 51, 0.12);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.58);
            box-shadow: 0 14px 34px rgba(15, 23, 42, 0.14);
            pointer-events: auto;
            position: relative;
        }

        #stick {
            position: absolute;
            left: 37px;
            top: 37px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.18);
        }

        .touch-btn {
            width: 92px;
            height: 72px;
            align-self: end;
            border: 2px solid rgba(255, 255, 255, 0.92);
            border-radius: 8px;
            background: #142033;
            color: white;
            font-weight: 1000;
        }

        @media (max-width: 900px) {
            #hud { inset-right: 10px; }
            .brand { display: none; }
            .panel { min-width: 78px; padding: 8px 9px; }
            .value { font-size: 1.05rem; }
            #list { top: calc(72px + env(safe-area-inset-top, 0px)); width: 176px; padding: 10px; }
            .item { font-size: 0.76rem; padding: 5px 0; }
            #touch { display: flex; }
        }
    </style>

</head>
<body>
    <div id="app"></div>
    <a href="index.html" class="back-link">HUB</a>

    <div id="hud">
        <div class="cluster">
            <div class="panel brand">
                <span class="label">Shopping Cart</span>
                <div class="value">Dash 3D</div>
            </div>
            <div class="panel">
                <span class="label">Items</span>
                <div id="items" class="value green">0/6</div>
            </div>
            <div class="panel">
                <span class="label">Score</span>
                <div id="score" class="value gold">0</div>
            </div>
        </div>
        <div class="cluster">
            <div class="panel">
                <span class="label">Time</span>
                <div id="time" class="value">90</div>
            </div>
            <div class="panel">
                <span class="label">Speed</span>
                <div id="speed" class="value">0</div>
            </div>
        </div>
    </div>

    <div id="list">
        <h2>Shopping List</h2>
        <div id="list-body"></div>
    </div>

    <div id="touch">
        <div class="stick-wrap" id="joy"><div id="stick"></div></div>
        <button class="touch-btn" id="brake">BRAKE</button>
    </div>

    <div id="toast"></div>

    <div id="overlay">
        <div class="modal">
            <h1 id="title">Cart Dash</h1>
            <div id="brief" class="brief">Race through a glossy 3D supermarket, steer around displays, collect the exact list, and checkout before time runs out.</div>
            <button id="start" class="btn">Go Shopping</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from "three";

        const clamp = THREE.MathUtils.clamp;
        const lerp = THREE.MathUtils.lerp;

        const CATALOG = [
            { name: "Apples", aisle: "Produce", color: 0xef4444, shape: "sphere" },
            { name: "Bananas", aisle: "Produce", color: 0xfacc15, shape: "box" },
            { name: "Broccoli", aisle: "Produce", color: 0x22c55e, shape: "sphere" },
            { name: "Bread", aisle: "Bakery", color: 0xd97706, shape: "box" },
            { name: "Donuts", aisle: "Bakery", color: 0xfb7185, shape: "torus" },
            { name: "Milk", aisle: "Dairy", color: 0xe0f2fe, shape: "carton" },
            { name: "Cheese", aisle: "Dairy", color: 0xfbbf24, shape: "box" },
            { name: "Steak", aisle: "Deli", color: 0xb91c1c, shape: "box" },
            { name: "Chips", aisle: "Snacks", color: 0xf97316, shape: "bag" },
            { name: "Cookies", aisle: "Snacks", color: 0x92400e, shape: "box" },
            { name: "Soda", aisle: "Drinks", color: 0x38bdf8, shape: "can" },
            { name: "Coffee", aisle: "Drinks", color: 0x78350f, shape: "can" }
        ];

        class ShoppingCartDash3D {
            constructor() {
                this.state = "menu";
                this.keys = {};
                this.joy = { x: 0, y: 0 };
                this.score = 0;
                this.time = 90;
                this.lastTime = performance.now();
                this.products = [];
                this.obstacles = [];
                this.targets = [];
                this.collected = new Set();
                this.ui = {
                    items: document.getElementById("items"),
                    score: document.getElementById("score"),
                    time: document.getElementById("time"),
                    speed: document.getElementById("speed"),
                    list: document.getElementById("list-body"),
                    overlay: document.getElementById("overlay"),
                    title: document.getElementById("title"),
                    brief: document.getElementById("brief"),
                    start: document.getElementById("start"),
                    toast: document.getElementById("toast")
                };
                this.initThree();
                this.createStore();
                this.createCart();
                this.bindInput();
                this.ui.start.addEventListener("click", () => this.start());
                requestAnimationFrame((time) => this.loop(time));
            }

            initThree() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0xe7eef6);
                this.scene.fog = new THREE.Fog(0xe7eef6, 160, 620);
                this.camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.1, 1200);
                this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
                this.renderer.setSize(innerWidth, innerHeight);
                this.renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
                this.renderer.shadowMap.enabled = true;
                document.getElementById("app").appendChild(this.renderer.domElement);

                this.scene.add(new THREE.HemisphereLight(0xffffff, 0x9aa8b8, 1.55));
                const sun = new THREE.DirectionalLight(0xffffff, 1.8);
                sun.position.set(-80, 130, 90);
                sun.castShadow = true;
                sun.shadow.mapSize.set(1024, 1024);
                sun.shadow.camera.left = -190;
                sun.shadow.camera.right = 190;
                sun.shadow.camera.top = 190;
                sun.shadow.camera.bottom = -190;
                this.scene.add(sun);

                for (let i = 0; i < 8; i++) {
                    const light = new THREE.PointLight(0xffffff, 0.7, 120);
                    light.position.set(-105 + i * 30, 38, -48);
                    this.scene.add(light);
                }

                window.addEventListener("resize", () => {
                    this.camera.aspect = innerWidth / innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(innerWidth, innerHeight);
                    this.renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
                });
            }

            mat(color, extra = {}) {
                return new THREE.MeshStandardMaterial({ color, roughness: 0.55, metalness: 0.05, ...extra });
            }

            createStore() {
                this.mats = {
                    floor: this.mat(0xf8fafc, { roughness: 0.32 }),
                    shelf: this.mat(0xdbe4ef),
                    shelfDark: this.mat(0x94a3b8),
                    cart: this.mat(0xcbd5e1, { metalness: 0.42, roughness: 0.28 }),
                    handle: this.mat(0x142033, { metalness: 0.15 }),
                    rubber: this.mat(0x111827),
                    checkout: this.mat(0x22c55e),
                    red: this.mat(0xef4444),
                    sign: this.mat(0x142033),
                    glow: new THREE.MeshBasicMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.42 })
                };

                const floor = new THREE.Mesh(new THREE.PlaneGeometry(270, 190, 20, 20), this.mats.floor);
                floor.rotation.x = -Math.PI / 2;
                floor.receiveShadow = true;
                this.scene.add(floor);

                const wallBack = new THREE.Mesh(new THREE.BoxGeometry(270, 48, 4), this.mat(0xdbeafe));
                wallBack.position.set(0, 24, -93);
                wallBack.receiveShadow = true;
                this.scene.add(wallBack);

                this.createAisles();
                this.createDisplays();
                this.createCheckout();
            }

            createAisles() {
                const aisleNames = ["Produce", "Bakery", "Dairy", "Deli", "Snacks", "Drinks"];
                aisleNames.forEach((name, idx) => {
                    const x = -90 + idx * 36;
                    this.createShelfRun(x, -28, name, idx);
                    this.createShelfRun(x, 34, name, idx);
                });
            }

            createShelfRun(x, z, aisle, idx) {
                const group = new THREE.Group();
                const base = new THREE.Mesh(new THREE.BoxGeometry(22, 14, 44), this.mats.shelf);
                base.position.y = 7;
                base.castShadow = true;
                base.receiveShadow = true;
                group.add(base);
                [-14, 0, 14].forEach((zz) => {
                    const shelf = new THREE.Mesh(new THREE.BoxGeometry(24, 1.2, 40), this.mats.shelfDark);
                    shelf.position.set(0, 7 + (zz + 14) * 0.18, 0);
                    shelf.castShadow = true;
                    group.add(shelf);
                });
                const sign = this.makeTextSign(aisle);
                sign.position.set(0, 18.5, -20);
                group.add(sign);
                group.position.set(x, 0, z);
                this.scene.add(group);
                this.obstacles.push({ x, z, r: 17 });
            }

            makeTextSign(text) {
                const canvas = document.createElement("canvas");
                canvas.width = 512;
                canvas.height = 128;
                const ctx = canvas.getContext("2d");
                ctx.fillStyle = "#142033";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ffffff";
                ctx.font = "900 54px Trebuchet MS, Segoe UI, sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(text.toUpperCase(), 256, 66);
                const tex = new THREE.CanvasTexture(canvas);
                const mat = new THREE.SpriteMaterial({ map: tex });
                const sprite = new THREE.Sprite(mat);
                sprite.scale.set(18, 4.5, 1);
                return sprite;
            }

            productMesh(def) {
                const mat = this.mat(def.color);
                let mesh;
                if (def.shape === "sphere") mesh = new THREE.Mesh(new THREE.SphereGeometry(2.8, 18, 12), mat);
                else if (def.shape === "torus") mesh = new THREE.Mesh(new THREE.TorusGeometry(2.5, 0.85, 10, 24), mat);
                else if (def.shape === "can") mesh = new THREE.Mesh(new THREE.CylinderGeometry(2.2, 2.2, 5.2, 18), mat);
                else if (def.shape === "carton") mesh = new THREE.Mesh(new THREE.BoxGeometry(4.2, 6.2, 3.4), mat);
                else if (def.shape === "bag") mesh = new THREE.Mesh(new THREE.ConeGeometry(3.2, 6, 4), mat);
                else mesh = new THREE.Mesh(new THREE.BoxGeometry(5.2, 3.8, 4), mat);
                mesh.castShadow = true;
                return mesh;
            }

            createDisplays() {
                const spots = [
                    [-108, -60], [-74, -61], [-36, -62], [4, -61], [42, -62], [78, -61],
                    [-108, 67], [-70, 66], [-28, 67], [14, 66], [54, 67], [94, 66],
                    [-122, 0], [118, 0], [-18, 0], [20, 0]
                ];
                CATALOG.forEach((def, i) => {
                    const [x, z] = spots[i % spots.length];
                    const pedestal = new THREE.Mesh(new THREE.CylinderGeometry(6, 7, 2, 16), this.mat(0xffffff));
                    pedestal.position.set(x, 1, z);
                    pedestal.castShadow = true;
                    pedestal.receiveShadow = true;
                    this.scene.add(pedestal);
                    const product = this.productMesh(def);
                    product.position.set(x, 5.5, z);
                    product.userData = { def, baseY: 5.5, collected: false };
                    this.products.push(product);
                    this.scene.add(product);
                    this.obstacles.push({ x, z, r: 7 });
                });
            }

            createCheckout() {
                const belt = new THREE.Mesh(new THREE.BoxGeometry(40, 5, 18), this.mats.checkout);
                belt.position.set(0, 2.5, 86);
                belt.castShadow = true;
                belt.receiveShadow = true;
                this.scene.add(belt);
                const gate = new THREE.Mesh(new THREE.BoxGeometry(64, 2, 4), this.mats.sign);
                gate.position.set(0, 18, 77);
                gate.castShadow = true;
                this.scene.add(gate);
                this.checkout = { x: 0, z: 86, r: 24 };
            }

            createCart() {
                this.cart = new THREE.Group();
                const basket = new THREE.Mesh(new THREE.BoxGeometry(8, 6, 12), this.mats.cart);
                basket.position.y = 6;
                basket.scale.x = 1.2;
                const front = new THREE.Mesh(new THREE.BoxGeometry(10, 5, 0.7), this.mats.cart);
                front.position.set(0, 6, -6.4);
                const handle = new THREE.Mesh(new THREE.BoxGeometry(13, 1, 1), this.mats.handle);
                handle.position.set(0, 10, 7.4);
                this.cart.add(basket, front, handle);
                this.cartWheels = [];
                [[-4.8, 1.5, -5], [4.8, 1.5, -5], [-4.8, 1.5, 5], [4.8, 1.5, 5]].forEach(([x, y, z]) => {
                    const wheel = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.3, 0.8, 16), this.mats.rubber);
                    wheel.rotation.z = Math.PI / 2;
                    wheel.position.set(x, y, z);
                    wheel.castShadow = true;
                    this.cartWheels.push(wheel);
                    this.cart.add(wheel);
                });
                this.cart.traverse((n) => n.isMesh && (n.castShadow = true));
                this.scene.add(this.cart);
                this.cartState = { x: 0, z: 73, vx: 0, vz: 0, yaw: Math.PI };
            }

            bindInput() {
                window.addEventListener("keydown", (event) => {
                    const code = this.mapKey(event.code);
                    this.keys[code] = true;
                    if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Space"].includes(code)) event.preventDefault();
                });
                window.addEventListener("keyup", (event) => {
                    const code = this.mapKey(event.code);
                    this.keys[code] = false;
                    if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Space"].includes(code)) event.preventDefault();
                });

                const joy = document.getElementById("joy");
                const stick = document.getElementById("stick");
                let start = null;
                const move = (event) => {
                    if (!start) return;
                    const point = event.touches ? event.touches[0] : event;
                    const dx = point.clientX - start.x;
                    const dy = point.clientY - start.y;
                    const dist = Math.min(42, Math.hypot(dx, dy));
                    const angle = Math.atan2(dy, dx);
                    this.joy.x = Math.cos(angle) * dist / 42;
                    this.joy.y = Math.sin(angle) * dist / 42;
                    stick.style.transform = "translate(" + Math.cos(angle) * dist + "px," + Math.sin(angle) * dist + "px)";
                };
                const end = () => {
                    start = null;
                    this.joy.x = 0;
                    this.joy.y = 0;
                    stick.style.transform = "translate(0,0)";
                };
                joy.addEventListener("pointerdown", (event) => {
                    event.preventDefault();
                    start = { x: event.clientX, y: event.clientY };
                    joy.setPointerCapture(event.pointerId);
                });
                joy.addEventListener("pointermove", move);
                joy.addEventListener("pointerup", end);
                joy.addEventListener("pointercancel", end);
                const brake = document.getElementById("brake");
                brake.addEventListener("pointerdown", (event) => {
                    event.preventDefault();
                    this.keys.Space = true;
                });
                brake.addEventListener("pointerup", () => this.keys.Space = false);
                brake.addEventListener("pointercancel", () => this.keys.Space = false);
            }

            mapKey(code) {
                const map = { KeyA: "ArrowLeft", KeyD: "ArrowRight", KeyW: "ArrowUp", KeyS: "ArrowDown" };
                return map[code] || code;
            }

            start() {
                this.state = "play";
                this.score = 0;
                this.time = 90;
                this.collected = new Set();
                this.cartState = { x: 0, z: 73, vx: 0, vz: 0, yaw: Math.PI };
                this.products.forEach((product) => {
                    product.visible = true;
                    product.userData.collected = false;
                });
                this.pickTargets();
                this.ui.overlay.style.display = "none";
                this.flash("SHOP");
                this.updateUI();
            }

            pickTargets() {
                const shuffled = [...CATALOG].sort(() => Math.random() - 0.5);
                this.targets = shuffled.slice(0, 6);
                this.renderList();
            }

            renderList() {
                this.ui.list.innerHTML = "";
                this.targets.forEach((target) => {
                    const row = document.createElement("div");
                    const done = this.collected.has(target.name);
                    row.className = "item" + (done ? " done" : "");
                    row.innerHTML = "<span>" + target.name + "</span><span class=\"aisle-tag\">" + target.aisle + "</span>";
                    this.ui.list.appendChild(row);
                });
            }

            updateCart(dt) {
                const c = this.cartState;
                let ax = (this.keys.ArrowRight ? 1 : 0) - (this.keys.ArrowLeft ? 1 : 0);
                let az = (this.keys.ArrowDown ? 1 : 0) - (this.keys.ArrowUp ? 1 : 0);
                if (Math.abs(this.joy.x) + Math.abs(this.joy.y) > 0.05) {
                    ax = this.joy.x;
                    az = this.joy.y;
                }
                const len = Math.hypot(ax, az);
                if (len > 1) {
                    ax /= len;
                    az /= len;
                }
                c.vx += ax * 0.24 * dt;
                c.vz += az * 0.24 * dt;
                const brake = this.keys.Space ? 0.82 : 0.94;
                c.vx *= Math.pow(brake, dt);
                c.vz *= Math.pow(brake, dt);
                c.vx = clamp(c.vx, -2.35, 2.35);
                c.vz = clamp(c.vz, -2.35, 2.35);
                c.x += c.vx * dt;
                c.z += c.vz * dt;

                c.x = clamp(c.x, -126, 126);
                c.z = clamp(c.z, -82, 88);
                this.obstacles.forEach((o) => {
                    const dx = c.x - o.x;
                    const dz = c.z - o.z;
                    const d = Math.hypot(dx, dz);
                    const min = o.r + 5.5;
                    if (d < min && d > 0.001) {
                        const push = (min - d) / d;
                        c.x += dx * push;
                        c.z += dz * push;
                        c.vx *= -0.18;
                        c.vz *= -0.18;
                    }
                });
                if (Math.hypot(c.vx, c.vz) > 0.05) c.yaw = Math.atan2(c.vx, c.vz);
                this.cart.position.set(c.x, 0, c.z);
                this.cart.rotation.y = c.yaw;
                this.cartWheels.forEach((wheel) => wheel.rotation.x -= Math.hypot(c.vx, c.vz) * 0.22 * dt);
            }

            updateProducts(dt, time) {
                this.products.forEach((product) => {
                    if (!product.visible) return;
                    product.rotation.y += 0.025 * dt;
                    product.position.y = product.userData.baseY + Math.sin(time * 0.006 + product.position.x) * 0.25;
                    const d = Math.hypot(this.cartState.x - product.position.x, this.cartState.z - product.position.z);
                    if (d < 8.8) this.collect(product);
                });
            }

            collect(product) {
                if (product.userData.collected) return;
                const def = product.userData.def;
                const wanted = this.targets.some((target) => target.name === def.name);
                if (!wanted) {
                    this.score = Math.max(0, this.score - 75);
                    this.flash("WRONG AISLE");
                    product.position.y += 1.5;
                    return;
                }
                product.userData.collected = true;
                product.visible = false;
                this.collected.add(def.name);
                this.score += 500 + Math.round(this.time * 4);
                this.flash(def.name.toUpperCase());
                this.renderList();
                if (this.collected.size === this.targets.length) this.flash("CHECKOUT");
            }

            finish() {
                this.state = "over";
                const bonus = Math.max(0, Math.round(this.time * 25));
                this.score += bonus;
                this.ui.overlay.style.display = "flex";
                this.ui.title.textContent = "Complete";
                this.ui.brief.textContent = "Final score " + this.score + " including a time bonus of " + bonus + ".";
                this.ui.start.textContent = "Shop Again";
                this.updateUI();
            }

            fail() {
                this.state = "over";
                this.ui.overlay.style.display = "flex";
                this.ui.title.textContent = "Time";
                this.ui.brief.textContent = "You collected " + this.collected.size + " of " + this.targets.length + " items.";
                this.ui.start.textContent = "Try Again";
                this.updateUI();
            }

            updateUI() {
                this.ui.items.textContent = this.collected.size + "/" + this.targets.length;
                this.ui.score.textContent = Math.floor(this.score);
                this.ui.time.textContent = Math.max(0, Math.ceil(this.time));
                this.ui.speed.textContent = Math.round(Math.hypot(this.cartState.vx, this.cartState.vz) * 25);
            }

            update(dt, time) {
                if (this.state !== "play") {
                    this.cart.rotation.y += 0.004 * dt;
                    return;
                }
                this.time -= dt / 60;
                this.updateCart(dt);
                this.updateProducts(dt, time);
                if (this.collected.size === this.targets.length && Math.hypot(this.cartState.x - this.checkout.x, this.cartState.z - this.checkout.z) < this.checkout.r) this.finish();
                if (this.time <= 0) this.fail();
                this.updateUI();
                const speed = Math.hypot(this.cartState.vx, this.cartState.vz);
                const target = new THREE.Vector3(this.cartState.x, 5, this.cartState.z);
                const cam = target.clone().add(new THREE.Vector3(-Math.sin(this.cartState.yaw) * (42 + speed * 9), 34 + speed * 4, -Math.cos(this.cartState.yaw) * (42 + speed * 9)));
                this.camera.position.lerp(cam, 1 - Math.pow(0.001, dt / 16.67));
                this.camera.lookAt(target);
            }

            flash(text) {
                this.ui.toast.textContent = text;
                this.ui.toast.classList.remove("show");
                void this.ui.toast.offsetWidth;
                this.ui.toast.classList.add("show");
            }

            loop(time) {
                const dt = clamp((time - this.lastTime) / 16.67, 0.25, 2);
                this.lastTime = time;
                if (this.state === "menu") {
                    this.camera.position.lerp(new THREE.Vector3(0, 72, 126), 0.035);
                    this.camera.lookAt(0, 0, 0);
                    this.update(dt, time);
                } else {
                    this.update(dt, time);
                }
                this.renderer.render(this.scene, this.camera);
                requestAnimationFrame((next) => this.loop(next));
            }
        }

        window.game = new ShoppingCartDash3D();
    </script>
</body>
</html>
