<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shopping Cart Dash - K2 games</title>
    <style>
        :root {
            --bg: #f1f5f9;
            --shelf: #334155;
            --accent: #0ea5e9;
            --text: #1e293b;
            --glass: rgba(255, 255, 255, 0.9);
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        nav {
            height: 60px;
            padding: 0 1.5rem;
            background: #fff;
            border-bottom: 2px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo { font-weight: 900; font-size: 1.2rem; color: var(--accent); letter-spacing: -0.5px; }
        .back-link { color: #64748b; text-decoration: none; font-size: 0.8rem; font-weight: bold; }

        #game-layout {
            height: calc(100vh - 60px);
            display: grid;
            grid-template-columns: 320px 1fr;
            padding: 1rem;
            gap: 1rem;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            overflow: hidden;
        }

        @media (max-width: 900px) {
            #game-layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; overflow: auto; }
            #sidebar { height: auto !important; }
        }

        #sidebar {
            background: #fff;
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            overflow-y: auto;
        }

        .hud-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .timer-val { font-family: monospace; font-size: 1.2rem; font-weight: 900; color: var(--accent); }

        .list-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #64748b; font-weight: 800; }
        
        .shopping-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px;
            background: #f8fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }
        .list-item.checked { opacity: 0.5; text-decoration: line-through; background: #f1f5f9; border-color: var(--success); }
        .check { width: 18px; height: 18px; border: 2px solid #cbd5e1; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--success); }
        .list-item.checked .check::after { content: '✓'; }

        .controls-reminder {
            margin-top: auto;
            padding: 12px;
            background: #f8fafc;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            font-size: 0.7rem;
            line-height: 1.4;
        }

        #screen-area {
            position: relative;
            background: #fff;
            border-radius: 24px;
            border: 6px solid #cbd5e1;
            box-shadow: 0 15px 30px -5px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas { 
            width: 100%; 
            height: 100%; 
            display: block; 
            background: #f1f5f9;
            object-fit: contain;
        }

        .screen-overlay {
            position: absolute; inset: 0;
            background: rgba(255, 255, 255, 0.96);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; text-align: center; padding: 30px;
        }

        .btn-large {
            background: var(--accent); color: white; border: none; padding: 1.2rem 3.5rem;
            border-radius: 50px; font-weight: 800; cursor: pointer; margin-top: 1.5rem;
            font-size: 1.3rem; box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.4);
            transition: 0.2s;
        }
        .btn-large:hover { transform: scale(1.05); background: #0284c7; }

        #mobile-controls {
            position: absolute; bottom: 20px; width: 100%; left: 0;
            display: none; justify-content: space-between; padding: 0 30px;
            pointer-events: none; z-index: 60;
        }
        @media (max-width: 900px) { #mobile-controls { display: flex; } }

        .joystick-base { width: 90px; height: 90px; background: rgba(0,0,0,0.08); border-radius: 50%; display: flex; align-items: center; justify-content: center; pointer-events: auto; }
        .joystick-thumb { width: 35px; height: 35px; background: #fff; border-radius: 50%; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .action-btn { width: 75px; height: 75px; background: var(--accent); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: 900; pointer-events: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <nav>
        <div class="logo">K2 STORE DASH</div>
        <a href="index.html" class="back-link">← HUB</a>
    </nav>

    <div id="game-layout">
        <aside id="sidebar">
            <div class="hud-row">
                <span class="list-title">Time</span>
                <span class="timer-val" id="timer">00:00.0</span>
            </div>
            
            <div class="list-title" style="margin-top:10px">Shopping List</div>
            <ul class="shopping-list" id="todo-list">
                <!-- List items via JS -->
            </ul>
            
            <div class="controls-reminder">
                <div class="list-title" style="margin-bottom: 8px;">How to Play</div>
                1. Enter through the <b>GREEN DOOR</b>.<br>
                2. Use <b>SPACE</b> or <b>GRAB</b> to collect items.<br>
                3. Find everything, then hit <b>CHECKOUT</b>!
            </div>
        </aside>

        <main id="screen-area">
            <canvas id="gameCanvas"></canvas>

            <div id="mobile-controls">
                <div class="joystick-base" id="joy-base"><div class="joystick-thumb" id="joy-thumb"></div></div>
                <div class="action-btn" id="btn-grab">GRAB</div>
            </div>

            <div id="start-screen" class="screen-overlay">
                <h1 style="font-size: 3.5rem; font-weight: 900; color: var(--accent); line-height: 1;">STORE DASH</h1>
                <p style="opacity: 0.7; margin-top: 15px; max-width: 400px;">Aisle navigation challenge. Quick hands and sharp eyes needed!</p>
                <button class="btn-large" onclick="game.start()">START SHOPPING</button>
            </div>

            <div id="finish-screen" class="screen-overlay" style="display:none">
                <h1 style="font-size: 3.5rem; color: var(--success); font-weight: 900;">CHECKOUT SUCCESS!</h1>
                <div style="margin: 20px 0; padding: 20px; background: #f8fafc; border-radius: 20px; border: 2px solid #e2e8f0;">
                    <p style="font-size: 0.8rem; text-transform: uppercase; color: #64748b; font-weight: 800;">Your Final Time</p>
                    <h2 id="final-time-val" style="font-size: 3rem; color: var(--accent); font-family: monospace;">00:00.0</h2>
                </div>
                <button class="btn-large" onclick="location.reload()">PLAY AGAIN</button>
            </div>
        </main>
    </div>

    <script>
        const ALL_EMOJIS = [
            "🍎", "🍌", "🥕", "🥦", "🍕", "🍨", "🥤", "💧", "🥔", "🍿", "🥩", "🍗", "🥛", "🥚", "🧀", "🍦",
            "🍞", "🥐", "🥖", "🍩", "👕", "👖", "🧢", "👗", "🏈", "🏀", "🎾", "🏋️", "🧼", "🪥", "🧻", "🧴",
            "⛺", "🎒", "🔦", "🔥", "🍍", "🍓", "🍒", "🍇", "🍉", "🍑", "🍋", "🍊", "🥬", "🌽", "🌶️", "🍄",
            "🥨", "🥜", "🍪", "🍫", "🍬", "🍭", "🍯", "🍮", "🍰", "🥧", "🌮", "🌯", "🍝", "🍔", "🍟", "🍙",
            "🍣", "🦐", "🦞", "🦀", "🦑", "🐙", "🐠", "🐡", "🥣", "🥗", "🥘", "🧂", "🥢", "🍴", "🥣", "🍶",
            "🍵", "☕", "🍺", "🍷", "🍸", "🍹", "🍾", "🧁", "🎂", "🍳", "🥞", "🥓", "🥩", "🍖", "🦴", "🌭"
        ];

        class StoreGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.width = 1600; 
                this.height = 1000; 
                this.canvas.width = 800;
                this.canvas.height = 600;

                this.player = { x: 50, y: 500, r: 25, speed: 6, anim: 0, dir: 1 };
                this.cam = { x: 0, y: 0 };
                this.keys = {};
                this.joy = { active: false, x: 0, y: 0 };
                
                this.aisles = [];
                this.itemsOnField = [];
                this.shoppingList = [];
                this.playing = false;
                this.timer = 0;
                this.startTime = 0;

                this.checkoutZone = { x: 1450, y: 400, w: 100, h: 200 };
                this.entranceDoor = { x: 0, y: 450, w: 20, h: 100 };

                this.init();
            }

            init() {
                // Generate Aisles in 2 rows
                const aisleWidth = 100;
                const aisleHeight = 250;
                const row1Y = 150;
                const row2Y = 600;
                const aisleGap = 150;

                for (let row = 0; row < 2; row++) {
                    const y = row === 0 ? row1Y : row2Y;
                    for (let col = 0; col < 6; col++) {
                        const x = 200 + col * (aisleWidth + aisleGap);
                        this.aisles.push({
                            id: row * 6 + col + 1,
                            x, y, w: aisleWidth, h: aisleHeight
                        });
                    }
                }

                // Shuffle Emojis and assign to items
                const shuffledEmojis = [...ALL_EMOJIS].sort(() => 0.5 - Math.random());
                this.aisles.forEach((aisle, idx) => {
                    // Place 4 unique items per aisle
                    for (let i = 0; i < 4; i++) {
                        const emoji = shuffledEmojis.pop();
                        if (!emoji) break;
                        this.itemsOnField.push({
                            emoji: emoji,
                            x: aisle.x + 10 + Math.random() * (aisle.w - 20),
                            y: aisle.y + 20 + Math.random() * (aisle.h - 40),
                            aisleId: aisle.id
                        });
                    }
                });

                this.setupInputs();
                this.loop();
            }

            setupInputs() {
                window.onkeydown = e => this.keys[e.code] = true;
                window.onkeyup = e => this.keys[e.code] = false;
                
                const base = document.getElementById('joy-base'), thumb = document.getElementById('joy-thumb');
                const handleJoy = (e) => {
                    if(!this.joy.active) return;
                    const rect = base.getBoundingClientRect(), t = e.touches ? e.touches[0] : e;
                    const dx = t.clientX - (rect.left + rect.width/2), dy = t.clientY - (rect.top + rect.height/2);
                    const dist = Math.min(35, Math.hypot(dx, dy)), ang = Math.atan2(dy, dx);
                    this.joy.x = Math.cos(ang) * (dist/35); this.joy.y = Math.sin(ang) * (dist/35);
                    thumb.style.transform = `translate(${this.joy.x*35}px, ${this.joy.y*35}px)`;
                };
                base.addEventListener('touchstart', (e) => { this.joy.active = true; handleJoy(e); });
                window.addEventListener('touchmove', handleJoy);
                window.addEventListener('touchend', () => { this.joy.active = false; this.joy.x = this.joy.y = 0; thumb.style.transform = `translate(0,0)`; });

                document.getElementById('btn-grab').addEventListener('touchstart', (e) => { e.preventDefault(); this.grab(); });
                window.addEventListener('keydown', e => { if(e.code === 'Space') this.grab(); });
            }

            start() {
                // Select 6 items for the shopping list
                const listItems = [...this.itemsOnField].sort(() => 0.5 - Math.random()).slice(0, 6);
                this.shoppingList = listItems.map(item => ({ ...item, collected: false }));
                this.renderList();
                this.playing = true;
                this.startTime = Date.now();
                document.getElementById('start-screen').style.display = 'none';
            }

            grab() {
                if(!this.playing) return;
                
                // Check if near an item
                const nearItemIndex = this.itemsOnField.findIndex(i => Math.hypot(this.player.x - i.x, this.player.y - i.y) < 70);
                if(nearItemIndex !== -1) {
                    const nearItem = this.itemsOnField[nearItemIndex];
                    const listItem = this.shoppingList.find(li => li.emoji === nearItem.emoji && !li.collected);
                    if(listItem) {
                        listItem.collected = true;
                        this.itemsOnField.splice(nearItemIndex, 1);
                        this.renderList();
                    }
                }

                // Check if at checkout and list is finished
                if (this.shoppingList.every(li => li.collected)) {
                    if (this.player.x > this.checkoutZone.x && 
                        this.player.x < this.checkoutZone.x + this.checkoutZone.w &&
                        this.player.y > this.checkoutZone.y &&
                        this.player.y < this.checkoutZone.y + this.checkoutZone.h) {
                        this.finish();
                    }
                }
            }

            finish() {
                this.playing = false;
                const timeStr = this.formatTime(Date.now() - this.startTime);
                document.getElementById('finish-screen').style.display = 'flex';
                document.getElementById('final-time-val').textContent = timeStr;
            }

            formatTime(ms) {
                const totalSecs = ms / 1000;
                const m = Math.floor(totalSecs / 60);
                const s = (totalSecs % 60).toFixed(1);
                return `${m.toString().padStart(2, '0')}:${s.padStart(4, '0')}`;
            }

            renderList() {
                const list = document.getElementById('todo-list');
                list.innerHTML = this.shoppingList.map(item => `
                    <li class="list-item ${item.collected ? 'checked' : ''}">
                        <div class="check"></div>
                        <span>${item.emoji} Item</span>
                    </li>
                `).join('');
            }

            update() {
                if(!this.playing) return;

                this.timer = Date.now() - this.startTime;
                document.getElementById('timer').textContent = this.formatTime(this.timer);

                let dx = 0, dy = 0;
                if(this.keys['KeyW'] || this.keys['ArrowUp']) dy = -1; 
                if(this.keys['KeyS'] || this.keys['ArrowDown']) dy = 1;
                if(this.keys['KeyA'] || this.keys['ArrowLeft']) dx = -1; 
                if(this.keys['KeyD'] || this.keys['ArrowRight']) dx = 1;
                if(this.joy.active) { dx = this.joy.x; dy = this.joy.y; }

                const nextX = this.player.x + dx * this.player.speed;
                const nextY = this.player.y + dy * this.player.speed;

                let canMoveX = true;
                let canMoveY = true;
                const pr = 15; 

                this.aisles.forEach(a => {
                    if (nextX + pr > a.x && nextX - pr < a.x + a.w && this.player.y + pr > a.y && this.player.y - pr < a.y + a.h) canMoveX = false;
                    if (this.player.x + pr > a.x && this.player.x - pr < a.x + a.w && nextY + pr > a.y && nextY - pr < a.y + a.h) canMoveY = false;
                });

                if (canMoveX) this.player.x = nextX;
                if (canMoveY) this.player.y = nextY;

                if(dx !== 0 || dy !== 0) {
                    this.player.anim += 0.2;
                    if(dx !== 0) this.player.dir = dx > 0 ? 1 : -1;
                }

                this.player.x = Math.max(25, Math.min(this.width - 25, this.player.x));
                this.player.y = Math.max(25, Math.min(this.height - 25, this.player.y));

                this.cam.x = this.player.x - 400;
                this.cam.y = this.player.y - 300;
                this.cam.x = Math.max(0, Math.min(this.width - 800, this.cam.x));
                this.cam.y = Math.max(0, Math.min(this.height - 600, this.cam.y));
            }

            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, 800, 600);

                ctx.save();
                ctx.translate(-this.cam.x, -this.cam.y);

                // Floor
                ctx.fillStyle = '#f8fafc';
                ctx.fillRect(0, 0, this.width, this.height);
                ctx.strokeStyle = '#e2e8f0';
                ctx.lineWidth = 1;
                for(let i=0; i<this.width; i+=100) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,this.height); ctx.stroke(); }
                for(let j=0; j<this.height; j+=100) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(this.width,j); ctx.stroke(); }

                // Entrance
                ctx.fillStyle = '#22c55e';
                ctx.fillRect(this.entranceDoor.x, this.entranceDoor.y, this.entranceDoor.w, this.entranceDoor.h);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 12px Arial';
                ctx.fillText('ENTRANCE', 5, 510);

                // Checkout
                ctx.fillStyle = this.shoppingList.every(li => li.collected) ? '#0ea5e9' : '#94a3b8';
                ctx.fillRect(this.checkoutZone.x, this.checkoutZone.y, this.checkoutZone.w, this.checkoutZone.h);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('CHECKOUT', this.checkoutZone.x + 50, this.checkoutZone.y + 110);

                // Aisles
                this.aisles.forEach(a => {
                    ctx.fillStyle = '#334155';
                    ctx.beginPath(); ctx.roundRect(a.x, a.y, a.w, a.h, 8); ctx.fill();
                    ctx.fillStyle = '#475569';
                    ctx.fillRect(a.x + 5, a.y + 5, a.w - 10, a.h - 10); // Shelf look
                    
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 20px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(a.id, a.x + a.w/2, a.y + 30);
                });

                // Items
                ctx.font = '28px Arial';
                ctx.textAlign = 'center';
                this.itemsOnField.forEach(i => {
                    ctx.fillText(i.emoji, i.x, i.y + 10);
                });

                // Player
                ctx.save();
                ctx.translate(this.player.x, this.player.y);
                if(this.player.dir === -1) ctx.scale(-1, 1);
                
                const waddle = Math.sin(this.player.anim) * 4;
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(0,0,0,0.1)';
                ctx.font = '45px Arial';
                ctx.fillText('🛒', 0, waddle + 15);
                ctx.fillText('🚶', -15, waddle - 10);
                ctx.restore();

                ctx.restore();
            }

            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        }

        const game = new StoreGame();
    </script>
</body>
</html>
