<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shopping Cart Pro - K2 games</title>
    <style>
        :root {
            --shelf: #e2e8f0;
            --floor: #f8fafc;
            --accent: #fbbf24;
            --glass: rgba(255, 255, 255, 0.95);
        }

        body { margin: 0; overflow: hidden; background: #f1f5f9; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; color: #1e293b; touch-action: none; }
        
        #ui-layer {
            position: absolute; inset: 0; pointer-events: none;
            display: flex; flex-direction: column; padding: 15px;
            z-index: 10;
        }

        /* COMPACT LIST */
        #list-container {
            position: absolute; top: 70px; right: 15px;
            width: 180px; background: var(--glass); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 16px; border: 2px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); pointer-events: auto;
        }
        @media (max-width: 1024px) { #list-container { width: 140px; top: 15px; } }
        
        .list-title { font-size: 0.7rem; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; opacity: 0.6; margin-bottom: 8px; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; }
        .list-item { font-size: 0.9rem; font-weight: 700; margin: 4px 0; display: flex; align-items: center; gap: 8px; }
        .list-item.done { text-decoration: line-through; opacity: 0.3; }
        .check { color: #22c55e; }

        /* HUD TOP */
        .hud-top { display: flex; gap: 10px; pointer-events: auto; }
        .stat-pill { background: white; padding: 8px 20px; border-radius: 50px; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        #mobile-controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 400px; display: none; justify-content: space-between; padding: 0 30px;
            pointer-events: none;
        }
        @media (max-width: 1024px) { #mobile-controls { display: flex; } }
        .joy-pad { width: 120px; height: 120px; background: rgba(0,0,0,0.05); border-radius: 50%; position: relative; pointer-events: auto; border: 2px solid white; }
        #stick { width: 50px; height: 50px; background: white; border-radius: 50%; position: absolute; top: 35px; left: 35px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); pointer-events: none; }

        #overlay {
            position: absolute; inset: 0; background: radial-gradient(circle at center, #ffffff, #f1f5f9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center; padding: 30px;
        }
        h1 { font-size: 3.5rem; color: #1e293b; font-weight: 900; line-height: 0.9; margin: 0; }
        .btn {
            padding: 18px 60px; font-size: 1.4rem; background: #1e293b; color: white;
            border: none; border-radius: 100px; font-weight: 900; cursor: pointer; margin-top: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .back-link {
            position: fixed; top: 15px; left: 15px; color: #1e293b; text-decoration: none;
            background: white; padding: 8px 16px; border-radius: 10px; z-index: 2000;
            font-weight: bold; font-size: 0.8rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); pointer-events: auto;
        }
    </style>

<body>
    <a href="index.html" class="back-link">← HUB</a>

    <div id="ui-layer">
        <div class="hud-top">
            <div class="stat-pill" id="score-val">ITEMS: 0/5</div>
        </div>

        <div id="list-container">
            <div class="list-title">Shopping List</div>
            <div id="shopping-list"></div>
        </div>
    </div>

    <div id="mobile-controls">
        <div class="joy-pad" id="joystick"><div id="stick"></div></div>
    </div>

    <div id="overlay">
        <h1>SHOPPING<br>CART PRO</h1>
        <p style="opacity: 0.6; margin-top: 15px;">Navigate the aisles and grab your list!</p>
        <button class="btn" onclick="window.game.start()">GO SHOPPING</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const AISLES = [
            { name: "PRODUCE", items: ["🍎", "🍌", "🥦", "🥕", "🥑"] },
            { name: "BAKERY", items: ["🍞", "🥐", "🥯", "🥖", "🥨"] },
            { name: "DAIRY", items: ["🥛", "🧀", "🧈", "🍦", "🍳"] },
            { name: "MEAT", items: ["🥩", "🍗", "🥓", "🍖", "🌭"] },
            { name: "SNACKS", items: ["🍕", "🍔", "🍟", "🍩", "🍪"] },
            { name: "DRINKS", items: ["🥤", "🧃", "🍺", "🍷", "☕"] }
        ];

        class ShopGame {
            constructor() {
                this.state = 'menu';
                this.collected = [];
                this.targetItems = [];
                this.aisles = [];
                this.inputVec = {x:0, y:0};
                
                this.initEngine();
                this.createStore();
                this.createCart();
                this.setupInput();
                
                this.loop = this.loop.bind(this);
                requestAnimationFrame(this.loop);
            }

            initEngine() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0xf1f5f9);
                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                document.body.appendChild(this.renderer.domElement);

                this.scene.add(new THREE.AmbientLight(0xffffff, 0.8));
                const sun = new THREE.DirectionalLight(0xffffff, 0.5);
                sun.position.set(50, 100, 50); sun.castShadow = true;
                this.scene.add(sun);

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            createStore() {
                const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0xffffff}));
                floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; this.scene.add(floor);

                AISLES.forEach((aisle, index) => {
                    const z = (index - 2.5) * 60;
                    this.createAisle(aisle, z);
                });
            }

            createAisle(data, z) {
                // SHELF UNIT
                const shelfGroup = new THREE.Group();
                const shelfGeo = new THREE.BoxGeometry(150, 15, 10);
                const shelfMat = new THREE.MeshStandardMaterial({color: 0xe2e8f0});
                
                // Back Wall
                const back = new THREE.Mesh(new THREE.BoxGeometry(150, 20, 1), shelfMat);
                back.position.y = 10; back.position.z = -5; shelfGroup.add(back);

                // Levels
                [0, 8, 16].forEach(y => {
                    const lev = new THREE.Mesh(new THREE.BoxGeometry(150, 0.5, 10), shelfMat);
                    lev.position.y = y; shelfGroup.add(lev);
                    
                    // Emojis on this level
                    data.items.forEach((emoji, i) => {
                        const x = (i - 2) * 25;
                        const sprite = this.createEmojiSprite(emoji);
                        sprite.position.set(x, y + 2.5, 0);
                        sprite.userData = { emoji, name: data.name };
                        this.scene.add(sprite);
                        this.aisles.push(sprite);
                    });
                });

                // AISLE LABEL
                const label = this.createTextLabel(data.name);
                label.position.set(-85, 15, 0);
                shelfGroup.add(label);

                shelfGroup.position.set(0, 0, z);
                this.scene.add(shelfGroup);
            }

            createEmojiSprite(emoji) {
                const can = document.createElement('canvas'); const ctx = can.getContext('2d');
                can.width = 128; can.height = 128; ctx.font = '80px Arial'; ctx.textAlign = 'center';
                ctx.fillText(emoji, 64, 90);
                const mat = new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(can) });
                const spr = new THREE.Sprite(mat); spr.scale.set(10, 10, 1); return spr;
            }

            createTextLabel(text) {
                const can = document.createElement('canvas'); const ctx = can.getContext('2d');
                can.width = 256; can.height = 64; ctx.fillStyle = '#1e293b'; ctx.font = '900 40px Segoe UI'; ctx.textAlign = 'left';
                ctx.fillText(text, 10, 45);
                const mat = new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(can) });
                const spr = new THREE.Sprite(mat); spr.scale.set(20, 5, 1); return spr;
            }

            createCart() {
                this.cart = new THREE.Group();
                const basket = new THREE.Mesh(new THREE.BoxGeometry(8, 6, 12), new THREE.MeshStandardMaterial({color: 0xcbd5e1, wireframe: true}));
                basket.position.y = 5;
                const handle = new THREE.Mesh(new THREE.BoxGeometry(8, 0.5, 0.5), new THREE.MeshStandardMaterial({color: 0x1e293b}));
                handle.position.set(0, 8, 6);
                this.cart.add(basket, handle);
                this.scene.add(this.cart);
            }

            setupInput() {
                this.keys = {}; window.onkeydown = e => this.keys[e.code] = true; window.onkeyup = e => this.keys[e.code] = false;
                
                const joy = document.getElementById('joystick'); const stick = document.getElementById('stick');
                let startX, startY;
                joy.ontouchstart = e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; };
                joy.ontouchmove = e => {
                    const dx = e.touches[0].clientX - startX; const dy = e.touches[0].clientY - startY;
                    const dist = Math.min(35, Math.hypot(dx, dy)); const ang = Math.atan2(dy, dx);
                    stick.style.transform = `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px)`;
                    this.inputVec = { x: dx/35, y: dy/35 };
                };
                joy.ontouchend = () => { stick.style.transform = 'translate(0,0)'; this.inputVec = {x:0, y:0}; };
            }

            start() {
                this.state = 'playing'; document.getElementById('overlay').style.display = 'none';
                this.generateList();
            }

            generateList() {
                this.targetItems = [];
                const all = AISLES.flatMap(a => a.items);
                for(let i=0; i<5; i++) {
                    const itm = all[Math.floor(Math.random()*all.length)];
                    if(!this.targetItems.includes(itm)) this.targetItems.push(itm);
                    else i--;
                }
                this.updateUI();
            }

            updateUI() {
                const cont = document.getElementById('shopping-list'); cont.innerHTML = '';
                this.targetItems.forEach(itm => {
                    const div = document.createElement('div');
                    const done = this.collected.includes(itm);
                    div.className = `list-item ${done?'done':''}`;
                    div.innerHTML = `<span>${itm}</span> ${done?'<span class="check">✓</span>':''}`;
                    cont.appendChild(div);
                });
                document.getElementById('score-val').textContent = `ITEMS: ${this.collected.length}/${this.targetItems.length}`;
            }

            update(dt) {
                if(this.state !== 'playing') return;

                let dx = (this.keys['ArrowLeft']?-1:0) + (this.keys['ArrowRight']?1:0);
                let dz = (this.keys['ArrowUp']?-1:0) + (this.keys['ArrowDown']?1:0);
                if(this.inputVec.x || this.inputVec.y) { dx = this.inputVec.x; dz = this.inputVec.y; }

                if(dx || dz) {
                    this.cart.position.x += dx * 40 * dt;
                    this.cart.position.z += dz * 40 * dt;
                    this.cart.lookAt(this.cart.position.clone().add(new THREE.Vector3(dx, 0, dz)));
                }

                // Check Pickups
                for(let i=this.aisles.length-1; i>=0; i--) {
                    const spr = this.aisles[i];
                    const dist = this.cart.position.distanceTo(spr.position);
                    if(dist < 12) {
                        const itm = spr.userData.emoji;
                        if(this.targetItems.includes(itm) && !this.collected.includes(itm)) {
                            this.collected.push(itm);
                            this.scene.remove(spr); this.aisles.splice(i, 1);
                            this.updateUI();
                            if(this.collected.length === this.targetItems.length) {
                                alert("SHOPPING COMPLETE!"); location.reload();
                            }
                        }
                    }
                }

                this.camera.position.lerp(this.cart.position.clone().add(new THREE.Vector3(0, 60, 40)), 0.1);
                this.camera.lookAt(this.cart.position);
            }

            loop() { this.update(0.016); this.renderer.render(this.scene, this.camera); requestAnimationFrame(this.loop); }
        }
        window.game = new ShopGame();
    </script>
</body>
</html>
