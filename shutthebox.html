<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shut the Box: Pro Edition - K2 games</title>
    <style>
        :root {
            --wood-dark: #451a03;
            --wood-light: #78350f;
            --felt: #065f46;
            --accent: #fbbf24;
            --text: #fef3c7;
            --p1: #3b82f6;
            --p2: #ef4444;
            --p3: #10b981;
            --p4: #a855f7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: #1a1a1a;
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100dvh;
            width: 100%;
            overflow: hidden;
            position: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at center, #262626 0%, #000 100%);
        }

        #game-container {
            width: 95%;
            max-width: 600px;
            background: var(--wood-dark);
            border: 8px solid #271001;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 0 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        .tiles-container {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 8px;
            background: #1a0d02;
            padding: 15px;
            border-radius: 12px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.5);
        }

        .tile {
            aspect-ratio: 2/5;
            background: var(--wood-light);
            border: 2px solid #451a03;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--accent);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            transform-origin: bottom;
            box-shadow: 0 4px 0 #271001;
        }

        .tile.selected { background: var(--accent); color: var(--wood-dark); transform: translateY(-5px); box-shadow: 0 9px 0 #b45309; }
        .tile.shut { transform: rotateX(-90deg); opacity: 0.3; pointer-events: none; }

        .felt-area {
            height: 160px;
            background: var(--felt);
            border-radius: 12px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            position: relative;
            border: 4px solid #044e3a;
        }

        .dice {
            width: 60px; height: 60px; background: white; border-radius: 12px;
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
            padding: 8px; gap: 4px; box-shadow: 0 6px 0 #d1d5db, 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.5s;
        }

        .dot { background: #111; border-radius: 50%; width: 100%; height: 100%; visibility: hidden; }
        .dot.active { visibility: visible; }

        .controls { display: flex; gap: 15px; }

        .btn {
            flex: 1; padding: 15px; border-radius: 12px; border: none;
            font-weight: 900; font-size: 1.1rem; text-transform: uppercase;
            cursor: pointer; transition: 0.2s; box-shadow: 0 6px 0 rgba(0,0,0,0.2);
        }

        .btn-roll { background: var(--accent); color: var(--wood-dark); }
        .btn-confirm { background: #10b981; color: white; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
        .btn:disabled { opacity: 0.5; filter: grayscale(1); pointer-events: none; }

        .leaderboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin-top: 10px;
        }

        .score-chip {
            background: rgba(0,0,0,0.4);
            padding: 5px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.7rem;
            font-weight: 900;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .score-chip.active { border-color: white; background: rgba(255,255,255,0.1); }

        .player-indicator {
            text-align: center; font-size: 1.1rem; font-weight: 900; padding: 8px; border-radius: 10px;
            margin-bottom: 5px; transition: 0.3s; background: rgba(0,0,0,0.3);
        }
        
        .p1 { color: var(--p1); } .p2 { color: var(--p2); } .p3 { color: var(--p3); } .p4 { color: var(--p4); }

        .back-link { position: absolute; top: 20px; left: 20px; color: #64748b; text-decoration: none; font-weight: bold; font-size: 0.8rem; }

        .modal {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center; padding: 30px; border-radius: 12px;
        }

        .btn-mode {
            background: rgba(255,255,255,0.05); border: 2px solid var(--accent); color: var(--accent);
            margin: 5px; padding: 15px; border-radius: 15px; width: 220px; font-weight: 900;
            cursor: pointer; transition: 0.3s; font-size: 1rem;
        }
        .btn-mode:hover { background: var(--accent); color: var(--wood-dark); }
    </style>

<body>
    <a href="index.html" class="back-link">← HUB</a>

    <div id="game-container">
        <!-- Start Modal -->
        <div id="start-modal" class="modal" style="display: flex;">
            <h1 style="font-size: 2.5rem; margin-bottom: 10px; color: var(--accent);">SHUT THE BOX</h1>
            <p style="margin-bottom: 25px; opacity: 0.7;">Select Number of Players</p>
            <button class="btn-mode" onclick="game.startMode(1)">1 PLAYER</button>
            <button class="btn-mode" onclick="game.startMode(2)">2 PLAYERS</button>
            <button class="btn-mode" onclick="game.startMode(3)">3 PLAYERS</button>
            <button class="btn-mode" onclick="game.startMode(4)">4 PLAYERS</button>
        </div>

        <div id="turn-display" class="player-indicator p1">PLAYER 1'S TURN</div>

        <div class="leaderboard" id="leaderboard">
            <!-- Chips for P1-P4 -->
        </div>

        <div class="tiles-container" id="tiles"></div>

        <div class="felt-area">
            <div class="dice" id="die1">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="dice" id="die2">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-roll" id="roll-btn">Roll Dice</button>
            <button class="btn btn-confirm" id="confirm-btn" disabled>Confirm</button>
        </div>

        <!-- Result Modal -->
        <div id="overlay" class="modal">
            <div id="overlay-title" style="font-size: 2.5rem; font-weight: 900; color: var(--accent);">GAME OVER</div>
            <div id="overlay-results" style="margin: 20px 0; font-size: 1.1rem; line-height: 1.6;"></div>
            <button class="btn btn-roll" style="width: 200px;" onclick="location.reload()">New Game</button>
        </div>
    </div>

    <script>
        const dicePatterns = [[],[4],[0,8],[0,4,8],[0,2,6,8],[0,2,4,6,8],[0,2,3,5,6,8]];

        class ShutTheBox {
            constructor() {
                this.numPlayers = 1;
                this.currentPlayer = 0;
                this.scores = [];
                this.tiles = Array(9).fill(false);
                this.selected = new Set();
                this.canRoll = true;
                this.init();
            }

            init() {
                const container = document.getElementById('tiles');
                container.innerHTML = '';
                for (let i = 1; i <= 9; i++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.textContent = i;
                    tile.onclick = () => this.toggleTile(i);
                    container.appendChild(tile);
                }
                document.getElementById('roll-btn').onclick = () => this.roll();
                document.getElementById('confirm-btn').onclick = () => this.confirm();
            }

            startMode(num) {
                this.numPlayers = num;
                this.scores = Array(num).fill(0);
                document.getElementById('start-modal').style.display = 'none';
                this.updateLeaderboard();
                this.updateTurnDisplay();
            }

            updateLeaderboard() {
                const lb = document.getElementById('leaderboard');
                lb.innerHTML = this.scores.map((s, i) => `
                    <div class="score-chip ${i === this.currentPlayer ? 'active' : ''} p${i+1}">
                        P${i+1}: ${s || '-'}
                    </div>
                `).join('');
            }

            updateTurnDisplay() {
                const td = document.getElementById('turn-display');
                td.textContent = `PLAYER ${this.currentPlayer + 1}'S TURN`;
                td.className = `player-indicator p${this.currentPlayer + 1}`;
            }

            toggleTile(num) {
                if (this.canRoll || this.tiles[num-1]) return;
                const tileEl = document.getElementById('tiles').children[num-1];
                if (this.selected.has(num)) { this.selected.delete(num); tileEl.classList.remove('selected'); }
                else { this.selected.add(num); tileEl.classList.add('selected'); }
                this.checkSelection();
            }

            checkSelection() {
                const sum = Array.from(this.selected).reduce((a, b) => a + b, 0);
                document.getElementById('confirm-btn').disabled = (sum !== this.rollSum);
            }

            roll() {
                if (!this.canRoll) return;
                this.die1 = Math.floor(Math.random() * 6) + 1;
                this.die2 = Math.floor(Math.random() * 6) + 1;
                this.rollSum = this.die1 + this.die2;
                this.canRoll = false;
                document.getElementById('roll-btn').disabled = true;
                this.animateDice();
                setTimeout(() => { if (!this.hasPossibleMove()) this.endTurn(); }, 600);
            }

            animateDice() {
                const d1 = document.getElementById('die1'), d2 = document.getElementById('die2');
                d1.style.transform = `rotate(${Math.random()*360}deg) scale(1.1)`;
                d2.style.transform = `rotate(${Math.random()*360}deg) scale(1.1)`;
                setTimeout(() => {
                    d1.style.transform = 'rotate(0deg) scale(1)'; d2.style.transform = 'rotate(0deg) scale(1)';
                    this.updateDiceUI(d1, this.die1); this.updateDiceUI(d2, this.die2);
                }, 300);
            }

            updateDiceUI(el, val) {
                const dots = el.querySelectorAll('.dot');
                dots.forEach(d => d.classList.remove('active'));
                dicePatterns[val].forEach(idx => dots[idx].classList.add('active'));
            }

            confirm() {
                Array.from(this.selected).forEach(num => {
                    this.tiles[num-1] = true;
                    document.getElementById('tiles').children[num-1].classList.add('shut');
                });
                this.selected.clear();
                this.canRoll = true;
                document.getElementById('roll-btn').disabled = false;
                document.getElementById('confirm-btn').disabled = true;
                if (this.tiles.every(t => t)) this.endTurn();
            }

            hasPossibleMove() {
                const openTiles = [];
                this.tiles.forEach((shut, i) => { if (!shut) openTiles.push(i + 1); });
                return this.canMakeSum(openTiles, this.rollSum);
            }

            canMakeSum(nums, target) {
                if (target === 0) return true;
                if (target < 0 || nums.length === 0) return false;
                const [first, ...rest] = nums;
                return this.canMakeSum(rest, target - first) || this.canMakeSum(rest, target);
            }

            endTurn() {
                let finalScore = 0;
                this.tiles.forEach((shut, i) => { if (!shut) finalScore += (i+1); });
                this.scores[this.currentPlayer] = finalScore;
                this.updateLeaderboard();

                if (this.currentPlayer < this.numPlayers - 1) {
                    this.currentPlayer++;
                    setTimeout(() => this.resetForNextPlayer(), 1500);
                } else {
                    setTimeout(() => this.endGame(), 1000);
                }
            }

            resetForNextPlayer() {
                this.tiles = Array(9).fill(false);
                this.selected.clear();
                this.canRoll = true;
                this.init();
                this.updateTurnDisplay();
                this.updateLeaderboard();
                document.getElementById('roll-btn').disabled = false;
            }

            endGame() {
                const overlay = document.getElementById('overlay');
                const title = document.getElementById('overlay-title');
                const results = document.getElementById('overlay-results');
                overlay.style.display = 'flex';

                let minScore = Math.min(...this.scores);
                let winners = this.scores.map((s, i) => s === minScore ? i + 1 : null).filter(w => w !== null);

                if (this.numPlayers === 1) {
                    title.textContent = this.scores[0] === 0 ? "SHUT THE BOX!" : "GAME OVER";
                    results.textContent = `Final Sum: ${this.scores[0]}`;
                } else {
                    title.textContent = winners.length > 1 ? "DRAW!" : `PLAYER ${winners[0]} WINS!`;
                    results.innerHTML = this.scores.map((s, i) => `Player ${i+1}: <b>${s}</b>`).join('<br>');
                }
            }
        }
        const game = new ShutTheBox();
    </script>
</body>
