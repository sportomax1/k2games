<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#090b18"><title>Mind Trace</title><style>:root{--bg:#090b18;--text:#fff;--muted:#aab1cf;--cyan:#64f3ff;--mint:#69f0bd;--pink:#ff6ec7;--purple:#9d7cff;--yellow:#ffd76a;--red:#ff657d;--line:#ffffff22}*{box-sizing:border-box;touch-action:none;user-select:none}html,body{width:100%;height:100%;margin:0;overflow:hidden}body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;color:var(--text);background:radial-gradient(circle at 15% 15%,#64f3ff22,transparent 32%),radial-gradient(circle at 85% 80%,#9d7cff25,transparent 35%),var(--bg)}.app{height:100dvh;display:grid;grid-template-rows:auto 1fr auto;gap:8px;padding:max(8px,env(safe-area-inset-top)) max(8px,env(safe-area-inset-right)) max(8px,env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left));overflow:hidden}header,footer{width:min(1100px,100%);margin:auto;min-height:0}header{display:flex;justify-content:space-between;align-items:center;gap:8px}h1{margin:0;font-size:clamp(1.1rem,3vw,1.8rem);background:linear-gradient(90deg,#fff,var(--cyan),var(--pink));-webkit-background-clip:text;color:transparent}.stats{display:flex;gap:5px}.stat{min-width:53px;padding:6px 8px;border:1px solid var(--line);border-radius:12px;background:#ffffff0c;text-align:center}.stat span{display:block;color:var(--muted);font-size:.55rem;text-transform:uppercase}.stat b{font-size:.95rem}main{min-height:0;overflow:hidden}.board{position:relative;width:min(1100px,100%);height:100%;margin:auto;overflow:hidden;border:1px solid var(--line);border-radius:20px;background:linear-gradient(#ffffff05 1px,transparent 1px),linear-gradient(90deg,#ffffff05 1px,transparent 1px),#070917cc;background-size:32px 32px;box-shadow:0 18px 65px #0008}canvas{width:100%;height:100%;display:block}.hud{position:absolute;inset:10px 10px auto;display:flex;justify-content:space-between;pointer-events:none}.pill{padding:7px 11px;border:1px solid var(--line);border-radius:999px;background:#060816bd;color:var(--muted);font-size:.74rem}.overlay{position:absolute;inset:0;display:grid;place-items:center;padding:16px;pointer-events:none}.panel{width:min(460px,100%);padding:22px;border:1px solid var(--line);border-radius:20px;background:#080b1eea;text-align:center;box-shadow:0 20px 60px #0008;pointer-events:auto}.panel.hide{display:none}.panel h2{margin:0 0 8px;font-size:clamp(1.35rem,5vw,2rem)}.panel p{margin:0 0 16px;color:var(--muted);line-height:1.45}.btn{min-height:40px;padding:9px 14px;border-radius:12px;border:1px solid var(--line);font-weight:800;color:#fff;background:#ffffff12}.primary{color:#071019;border:0;background:linear-gradient(120deg,var(--cyan),var(--mint))}footer{display:flex;justify-content:space-between;align-items:center;gap:8px}.controls{display:flex;gap:6px;flex-wrap:wrap}.meter{min-width:180px;color:var(--muted);font-size:.72rem;text-align:right}.bar{height:7px;margin-top:4px;border-radius:999px;background:#ffffff12;overflow:hidden}.bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--red),var(--yellow),var(--mint),var(--cyan));transition:.4s}.count{position:absolute;inset:0;display:grid;place-items:center;font-size:clamp(4rem,20vw,9rem);font-weight:950;opacity:0;pointer-events:none;text-shadow:0 0 40px var(--cyan)}.count.go{animation:pop .45s}.burst{position:absolute;left:50%;top:50%;font-size:clamp(2rem,8vw,4rem);font-weight:900;opacity:0;pointer-events:none}.burst.go{animation:burst .8s}@keyframes pop{0%{opacity:0;transform:scale(.5)}35%{opacity:1}100%{opacity:0;transform:scale(1.3)}}@keyframes burst{0%{opacity:0;transform:translate(-50%,-20%) scale(.6)}25%{opacity:1;transform:translate(-50%,-50%) scale(1.05)}100%{opacity:0;transform:translate(-50%,-100%)}}@media(max-width:700px){.app{grid-template-rows:40px 1fr auto}.meter{min-width:0;text-align:left;flex:1}footer{align-items:flex-end}.stat{min-width:47px;padding:5px}.btn{min-height:36px;padding:7px 10px;font-size:.74rem}}@media(orientation:landscape) and (max-height:520px){.app{grid-template-rows:36px 1fr 38px}.meter{display:none}.panel{padding:14px}.panel p{font-size:.8rem;margin-bottom:10px}.panel h2{font-size:1.25rem}}</style></head><body><div class="app"><header><h1>Mind Trace</h1><div class="stats"><div class="stat"><span>Round</span><b id="round">0</b></div><div class="stat"><span>Score</span><b id="score">0</b></div><div class="stat"><span>Combo</span><b id="combo">×1</b></div><div class="stat"><span>Best</span><b id="best">0</b></div></div></header><main><section class="board" id="board"><canvas id="canvas"></canvas><div class="hud"><div class="pill" id="status">Ready</div><div class="pill" id="lives">♥ ♥ ♥</div></div><div class="count" id="count"></div><div class="burst" id="burst"></div><div class="overlay"><div class="panel" id="panel"><h2 id="title">Follow the glow</h2><p id="text">Watch the moving dot, then redraw the complete path from memory. Each round adds another movement.</p><button class="btn primary" id="mainBtn">Start Game</button></div></div></section></main><footer><div class="controls"><button class="btn" id="replay" disabled>Replay</button><button class="btn" id="clear" disabled>Clear</button><button class="btn" id="newGame">New Game</button></div><div class="meter"><span id="accuracy">Draw after the path disappears</span><div class="bar"><i id="fill"></i></div></div></footer></div><script>(()=>{'use strict';const $=id=>document.getElementById(id),cv=$('canvas'),ctx=cv.getContext('2d'),board=$('board'),roundEl=$('round'),scoreEl=$('score'),comboEl=$('combo'),bestEl=$('best'),livesEl=$('lives'),statusEl=$('status'),panel=$('panel'),titleEl=$('title'),textEl=$('text'),mainBtn=$('mainBtn'),replayBtn=$('replay'),clearBtn=$('clear'),newBtn=$('newGame'),accuracyEl=$('accuracy'),fill=$('fill'),count=$('count'),burst=$('burst'),COLORS=['#64f3ff','#ff6ec7','#9d7cff','#69f0bd','#ffd76a','#ff8e68'];let game={phase:'idle',round:0,score:0,combo:1,lives:3,best:+localStorage.mindTraceBest||0,segments:[],trace:[],drawing:false,token:0,replayed:false};function resize(){const r=board.getBoundingClientRect(),d=Math.min(devicePixelRatio||1,2);cv.width=Math.max(1,r.width*d);cv.height=Math.max(1,r.height*d);ctx.setTransform(d,0,0,d,0,0);render()}new ResizeObserver(resize).observe(board);function size(){return{w:cv.clientWidth,h:cv.clientHeight}}function norm(p){const{w,h}=size();return{x:p.x/w,y:p.y/h}}function denorm(p){const{w,h}=size();return{x:p.x*w,y:p.y*h}}function pointer(e){const r=cv.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}function distance(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}function bezier(s,t){const m=1-t;return{x:m*m*m*s.a.x+3*m*m*t*s.c1.x+3*m*t*t*s.c2.x+t*t*t*s.b.x,y:m*m*m*s.a.y+3*m*m*t*s.c1.y+3*m*t*t*s.c2.y+t*t*t*s.b.y}}function makeSegment(){const a=game.segments.length?game.segments.at(-1).b:{x:.2+Math.random()*.6,y:.2+Math.random()*.6},ang=Math.random()*Math.PI*2,len=.19+Math.random()*.14,b={x:Math.max(.1,Math.min(.9,a.x+Math.cos(ang)*len)),y:Math.max(.1,Math.min(.9,a.y+Math.sin(ang)*len))},dx=b.x-a.x,dy=b.y-a.y,n={x:-dy,y:dx},bend=(Math.random()-.5)*1.05;return{a,b,c1:{x:a.x+dx*.32+n.x*bend,y:a.y+dy*.32+n.y*bend},c2:{x:a.x+dx*.68+n.x*bend,y:a.y+dy*.68+n.y*bend},color:COLORS[game.segments.length%COLORS.length]}}function curve(s,p=1,alpha=1,width=5){ctx.save();ctx.globalAlpha=alpha;ctx.beginPath();let q=denorm(bezier(s,0));ctx.moveTo(q.x,q.y);const steps=Math.max(2,Math.ceil(60*p));for(let i=1;i<=steps;i++){q=denorm(bezier(s,p*i/steps));ctx.lineTo(q.x,q.y)}ctx.strokeStyle=s.color;ctx.lineWidth=width;ctx.lineCap='round';ctx.lineJoin='round';ctx.shadowColor=s.color;ctx.shadowBlur=14;ctx.stroke();ctx.restore()}function drawTrace(){if(game.trace.length<2)return;ctx.save();ctx.beginPath();let q=denorm(game.trace[0]);ctx.moveTo(q.x,q.y);for(let i=1;i<game.trace.length;i++){q=denorm(game.trace[i]);ctx.lineTo(q.x,q.y)}const g=ctx.createLinearGradient(0,0,cv.clientWidth,cv.clientHeight);g.addColorStop(0,'#69f0bd');g.addColorStop(.5,'#64f3ff');g.addColorStop(1,'#9d7cff');ctx.strokeStyle=g;ctx.lineWidth=5;ctx.lineCap='round';ctx.lineJoin='round';ctx.shadowColor='#64f3ff';ctx.shadowBlur=16;ctx.stroke();ctx.restore()}function render(show=false){ctx.clearRect(0,0,cv.clientWidth,cv.clientHeight);if(show)game.segments.forEach(s=>curve(s,1,.45,4));drawTrace()}function updateStats(){roundEl.textContent=game.round;scoreEl.textContent=game.score;comboEl.textContent='×'+game.combo;bestEl.textContent=game.best;livesEl.textContent=[0,1,2].map(i=>i<game.lives?'♥':'♡').join(' ')}function message(h,p,button,action){titleEl.textContent=h;textEl.textContent=p;mainBtn.textContent=button;mainBtn.onclick=action;panel.classList.remove('hide')}function hideMessage(){panel.classList.add('hide')}function meter(v,t){fill.style.width=v+'%';accuracyEl.textContent=t||`Accuracy: ${v}%`}const wait=ms=>new Promise(r=>setTimeout(r,ms));async function countdown(){for(const v of[3,2,1]){count.textContent=v;count.classList.remove('go');void count.offsetWidth;count.classList.add('go');await wait(450)}}function reset(){game={phase:'idle',round:0,score:0,combo:1,lives:3,best:+localStorage.mindTraceBest||0,segments:[],trace:[],drawing:false,token:game.token+1,replayed:false};updateStats();render();statusEl.textContent='Ready';replayBtn.disabled=clearBtn.disabled=true;meter(0,'Draw after the path disappears');message('Follow the glow','Watch the moving dot, then redraw the complete path from memory. Each round adds another movement.','Start Game',nextRound)}async function nextRound(){hideMessage();game.round++;game.segments.push(makeSegment());game.trace=[];game.replayed=false;updateStats();await countdown();play()}function play(){const token=++game.token;let index=0;game.phase='watch';replayBtn.disabled=clearBtn.disabled=true;statusEl.textContent=`Watch ${game.segments.length} move${game.segments.length>1?'s':''}`;function run(start){function frame(now){if(token!==game.token)return;const p=Math.min(1,(now-start)/900);ctx.clearRect(0,0,cv.clientWidth,cv.clientHeight);for(let i=0;i<index;i++)curve(game.segments[i],1,.18,3);curve(game.segments[index],p,1,5);const q=denorm(bezier(game.segments[index],p));ctx.save();ctx.beginPath();ctx.arc(q.x,q.y,10,0,Math.PI*2);ctx.fillStyle='#fff';ctx.shadowColor=game.segments[index].color;ctx.shadowBlur=25;ctx.fill();ctx.restore();if(p<1)requestAnimationFrame(frame);else if(++index<game.segments.length)setTimeout(()=>requestAnimationFrame(run),120);else setTimeout(recall,220)}requestAnimationFrame(frame)}requestAnimationFrame(run)}function recall(){game.phase='recall';render();statusEl.textContent='Trace the full path';replayBtn.disabled=game.replayed;clearBtn.disabled=false}cv.addEventListener('pointerdown',e=>{if(game.phase!=='recall')return;game.drawing=true;game.trace=[norm(pointer(e))];cv.setPointerCapture?.(e.pointerId);render();e.preventDefault()});cv.addEventListener('pointermove',e=>{if(!game.drawing||game.phase!=='recall')return;const p=norm(pointer(e)),last=game.trace.at(-1),{w,h}=size();if(Math.hypot((p.x-last.x)*w,(p.y-last.y)*h)>3){game.trace.push(p);render()}e.preventDefault()});function end(e){if(!game.drawing)return;game.drawing=false;if(game.trace.length<5){game.trace=[];render()}else evaluate();e.preventDefault()}cv.addEventListener('pointerup',end);cv.addEventListener('pointercancel',end);function sample(){const out=[];for(const s of game.segments)for(let i=0;i<45;i++)out.push(bezier(s,i/45));out.push(game.segments.at(-1).b);return out}function resample(a,n){const c=[0];for(let i=1;i<a.length;i++)c[i]=c[i-1]+distance(a[i-1],a[i]);const out=[],total=c.at(-1);let j=1;for(let i=0;i<n;i++){const t=total*i/(n-1);while(j<c.length-1&&c[j]<t)j++;const ratio=(t-c[j-1])/(c[j]-c[j-1]||1),u=a[j-1],v=a[j];out.push({x:u.x+(v.x-u.x)*ratio,y:u.y+(v.y-u.y)*ratio})}return out}function evaluate(){game.phase='result';const n=Math.max(80,game.segments.length*45),a=resample(sample(),n),u=resample(game.trace,n);let err=0;for(let i=0;i<n;i++)err+=distance(a[i],u[i]);err/=n;const accuracy=Math.round(100*Math.exp(-(err*.74+distance(a[0],u[0])*.13+distance(a.at(-1),u.at(-1))*.13)*7.1));meter(accuracy);render(true);if(accuracy>=50){const pts=Math.max(10,Math.round(accuracy*game.round*.62*(1+(game.combo-1)*.12)));game.score+=pts;game.combo=Math.min(9,game.combo+1);game.best=Math.max(game.best,game.score);localStorage.mindTraceBest=game.best;updateStats();burst.textContent='+'+pts;burst.classList.remove('go');void burst.offsetWidth;burst.classList.add('go');statusEl.textContent='Sequence cleared!';setTimeout(()=>message(`${accuracy}% accurate`,`Great trace. Your combo is now ×${game.combo}.`,'Next Round',nextRound),450)}else{game.lives--;game.combo=1;updateStats();statusEl.textContent=game.lives?'Life lost':'Game over';setTimeout(()=>game.lives?message(`${accuracy}% accurate`,`The correct path is shown. ${game.lives} ${game.lives===1?'life':'lives'} left.`,'Retry Round',async()=>{hideMessage();game.trace=[];game.replayed=false;await countdown();play()}):message('Game over',`You reached round ${game.round} with ${game.score} points.`,'Play Again',reset),450)}}replayBtn.onclick=()=>{if(game.phase!=='recall'||game.replayed)return;game.replayed=true;game.trace=[];play()};clearBtn.onclick=()=>{if(game.phase==='recall'){game.trace=[];render()}};newBtn.onclick=reset;reset();resize()})();</script></body></html>
