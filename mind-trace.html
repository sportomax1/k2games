<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#090b18"><title>Mind Trace</title><style>
:root{--bg:#090b18;--text:#fff;--muted:#aab1cf;--cyan:#64f3ff;--mint:#69f0bd;--pink:#ff6ec7;--purple:#9d7cff;--yellow:#ffd76a;--red:#ff657d;--line:#ffffff22}*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden}body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;color:var(--text);background:radial-gradient(circle at 15% 15%,#64f3ff22,transparent 32%),radial-gradient(circle at 85% 80%,#9d7cff25,transparent 35%),#090b18;touch-action:none;user-select:none}.app{height:100dvh;display:grid;grid-template-rows:auto 1fr auto;gap:8px;padding:max(8px,env(safe-area-inset-top)) max(8px,env(safe-area-inset-right)) max(8px,env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left));overflow:hidden}header,footer{width:min(1100px,100%);margin:auto;min-height:0}header{display:flex;justify-content:space-between;align-items:center;gap:8px}h1{margin:0;font-size:clamp(1.1rem,3vw,1.8rem);background:linear-gradient(90deg,#fff,var(--cyan),var(--pink));-webkit-background-clip:text;color:transparent}.stats{display:flex;gap:5px}.stat{min-width:53px;padding:6px 8px;border:1px solid var(--line);border-radius:12px;background:#ffffff0c;text-align:center}.stat span{display:block;color:var(--muted);font-size:.55rem;text-transform:uppercase}.stat b{font-size:.95rem}main{min-height:0;overflow:hidden}.board{position:relative;width:min(1100px,100%);height:100%;margin:auto;overflow:hidden;border:1px solid var(--line);border-radius:20px;background:linear-gradient(#ffffff05 1px,transparent 1px),linear-gradient(90deg,#ffffff05 1px,transparent 1px),#070917cc;background-size:32px 32px;box-shadow:0 18px 65px #0008}canvas{width:100%;height:100%;display:block}.hud{position:absolute;inset:10px 10px auto;display:flex;justify-content:space-between;pointer-events:none}.pill{padding:7px 11px;border:1px solid var(--line);border-radius:999px;background:#060816bd;color:var(--muted);font-size:.74rem}.overlay{position:absolute;inset:0;display:grid;place-items:center;padding:16px;po </style></head><body><div class="app"><header><h1>Mind Trace</h1><div class="stats"><div class="stat"><span>Round</span><b id="r">0</b></div><div class="stat"><span>Score</span><b id="s">0</b></div><div class="stat"><span>Combo</span><b id="c">×1</b></div><div class="stat"><span>Best</span><b id="b">0</b></div></div></header><main><section class="board" id="board"><canvas id="cv"></canvas><div class="hud"><div class="pill" id="status">Ready</div><div class="pill" id="lives">♥ ♥ ♥</div></div><div class="count" id="count"></div><div class="burst" id="burst"></div><div class="overlay"><div class="panel" id="panel"><h2 id="title">Follow the glow</h2><p id="text">Watch the moving dot, then redraw the complete path from memory. Each round adds another movement.</p><button class="btn primary" id="mainBtn">Start Game</button></div></div></section></main><footer><div class="controls"><button class="btn" id="replay" disabled>Replay</button><button class="btn" id="clear" disabled>Clear</button><button class="btn" id="new">New Game</button></div><div class="meter"><span id="acc">Draw after the path disappears</span><div class="bar"><i id="fill"></i></div></div></footer></div><script>
(()=>{"use strict";const $=x=>document.getElementById(x),cv=$("cv"),x=cv.getContext("2d"),board=$("board"),panel=$("panel"),title=$("title"),text=$("text"),mainBtn=$("mainBtn"),status=$("status"),lives=$("lives"),replay=$("replay"),clear=$("clear"),acc=$("acc"),fill=$("fill"),count=$("count"),burst=$("burst"),P=["#64f3ff","#ff6ec7","#9d7cff","#69f0bd","#ffd76a","#ff8e68"];let st={phase:"idle",round:0,score:0,combo:1,lives:3,best:+localStorage.mindTraceBest||0,seq:[],trace:[],draw:false,token:0,replayed:false};function size(){let d=Math.min(devicePixelRatio||1,2),r=board.getBoundingClientRect();cv.width=r.width*d;cv.height=r.height*d;x.setTransform(d,0,0,d,0,0);draw()}new ResizeObserver(size).observe(board);function wh(){return{w:cv.clientWidth,h:cv.clientHeight}}function N(p){let{w,h}=wh();return{x:p.x/w,y:p.y/h}}function D(p){let{w,h}=wh();return{x:p.x*w,y:p.y*h}}function pt(e){let r=cv.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}function bez(s,t){let m=1-t;return{x:m*m*m*s.a.x+3*m*m*t*s.c1.x+3*m*t*t*s.c2.x+t*t*t*s.b.x,y:m*m*m*s.a.y+3*m*m*t*s.c1.y+3*m*t*t*s.c2.y+t*t*t*s.b.y}}function seg(){let a=st.seq.length?st.seq.at(-1).b:{x:.2+Math.random()*.6,y:.2+Math.random()*.6},ang=Math.random()*Math.PI*2,d=.19+Math.random()*.14,b={x:Math.max(.1,Math.min(.9,a.x+Math.cos(ang)*d)),y:Math.max(.1,Math.min(.9,a.y+Math.sin(ang)*d))},dx=b.x-a.x,dy=b.y-a.y,n={x:-dy,y:dx},bend=(Math.random()-.5)*1.05;return{a,b,c1:{x:a.x+dx*.32+n.x*bend,y:a.y+dy*.32+n.y*bend},c2:{x:a.x+dx*.68+n.x*bend,y:a.y+dy*.68+n.y*bend},color:P[st.seq.length%P.length]}}function curve(s,p=1,alpha=1,w=5){x.save();x.globalAlpha=alpha;x.beginPath();let q=D(bez(s,0));x.moveTo(q.x,q.y);for(let i=1;i<=60*p;i++){q=D(bez(s,p*i/(60*p)));x.lineTo(q.x,q.y)}x.strokeStyle=s.color;x.lineWidth=w;x.lineCap="round";x.lineJoin="round";x.shadowColor=s.color;x.shadowBlur=14;x.stroke();x.restore()}function trace(){if(st.trace.length<2)return;x.save();x.beginPath();let q=D(st.trace[0]);x.moveTo(q.x,q.y);for(let i=1;i<st.trace.length;i++){q=D(st.trace[i]);x.lineTo(q.x,q.y)}let g=x.createLinearGradient(0,0,cv.clientWidth,cv.clientHeight);g.addColorStop(0,"#69f0bd");g.addColorStop(.5,"#64f3ff");g.addColorStop(1,"#9d7cff");x.strokeStyle=g;x.lineWidth=5;x.lineCap="round";x.lineJoin="round";x.shadowColor="#64f3ff";x.shadowBlur=16;x.stroke();x.restore()}function draw(show=false){x.clearRect(0,0,cv.clientWidth,cv.clientHeight);if(show)st.seq.forEach(s=>curve(s,1,.45,4));trace()}function stats(){r.textContent=st.round;s.textContent=st.score;c.textContent="×"+st.combo;b.textContent=st.best;lives.textContent=[0,1,2].map(i=>i<st.lives?"♥":"♡").join(" ")}function msg(h,p,bt,fn){title.textContent=h;text.textContent=p;mainBtn.textContent=bt;mainBtn.onclick=fn;panel.classList.remove("hide")}function hide(){panel.classList.add("hide")}function meter(v,t){fill.style.width=v+"%";acc.textContent=t||`Accuracy: ${v}%`}function wait(ms){return new Promise(r=>setTimeout(r,ms))}async function countdown(){for(let v of[3,2,1]){count.textContent=v;count.classList.remove("go");void count.offsetWidth;count.classList.add("go");await wait(450)}}function reset(){st={phase:"idle",round:0,score:0,combo:1,lives:3,best:+localStorage.mindTraceBest||0,seq:[],trace:[],draw:false,token:st.token+1,replayed:false};stats();draw();status.textContent="Ready";replay.disabled=clear.disabled=true;meter(0,"Draw after the path disappears");msg("Follow the glow","Watch the moving dot, then redraw the complete path from memory. Each round adds another movement.","Start Game",next)}async function next(){hide();st.round++;st.seq.push(seg());st.trace=[];st.replayed=false;stats();await countdown();play()}function play(){let token=++st.token,i=0;st.phase="watch";replay.disabled=clear.disabled=true;status.textContent=`Watch ${st.seq.length} move${st.seq.length>1?"s":""}`;function one(t0){function frame(t){if(token!==st.token)return;let p=Math.min(1,(t-t0)/900);x.clearRect(0,0,cv.clientWidth,cv.clientHeight);for(let j=0;j<i;j++)curve(st.seq[j],1,.18,3);curve(st.seq[i],p,1,5);let q=D(bez(st.seq[i],p));x.beginPath();x.arc(q.x,q.y,10,0,7);x.fillStyle="#fff";x.shadowColor=st.seq[i].color;x.shadowBlur=25;x.fill();if(p<1)requestAnimationFrame(frame);else if(++i<st.seq.length)setTimeout(()=>requestAnimationFrame(one),120);else setTimeout(recall,220)}requestAnimationFrame(frame)}requestAnimationFrame(one)}function recall(){st.phase="recall";draw();status.textContent="Trace the full path";replay.disabled=st.replayed;clear.disabled=false}cv.onpointerdown=e=>{if(st.phase!=="recall")return;st.draw=true;st.trace=[N(pt(e))];cv.setPointerCapture?.(e.pointerId);draw()};cv.onpointermove=e=>{if(!st.draw)return;let p=N(pt(e)),l=st.trace.at(-1),{w,h}=wh();if(Math.hypot((p.x-l.x)*w,(p.y-l.y)*h)>3){st.trace.push(p);draw()}};cv.onpointerup=e=>{if(!st.draw)return;st.draw=false;if(st.trace.length<5){st.trace=[];draw();return}score()};function sample(){let a=[];for(let s of st.seq)for(let i=0;i<45;i++)a.push(bez(s,i/45));a.push(st.seq.at(-1).b);return a}function res(a,n){let c=[0];for(let i=1;i<a.length;i++)c[i]=c[i-1]+dist(a[i-1],a[i]);let out=[],j=1,total=c.at(-1);for(let i=0;i<n;i++){let t=total*i/(n-1);while(j<c.length-1&&c[j]<t)j++;let q=(t-c[j-1])/(c[j]-c[j-1]||1),u=a[j-1],v=a[j];out.push({x:u.x+(v.x-u.x)*q,y:u.y+(v.y-u.y)*q})}return out}function score(){st.phase="result";let n=Math.max(80,st.seq.length*45),a=res(sample(),n),u=res(st.trace,n),e=0;for(let i=0;i<n;i++)e+=dist(a[i],u[i]);e/=n;let A=Math.round(100*Math.exp(-(e*.74+dist(a[0],u[0])*.13+dist(a.at(-1),u.at(-1))*.13)*7.1));meter(A);draw(true);if(A>=50){let pts=Math.max(10,Math.round(A*st.round*.62*(1+(st.combo-1)*.12)));st.score+=pts;st.combo=Math.min(9,st.combo+1);st.best=Math.max(st.best,st.score);localStorage.mindTraceBest=st.best;stats();burst.textContent="+"+pts;burst.classList.remove("go");void burst.offsetWidth;burst.classList.add("go");status.textContent="Sequence cleared!";setTimeout(()=>msg(`${A}% accurate`,`Great trace. Your combo is now ×${st.combo}.`,`Next Round`,next),450)}else{st.lives--;st.combo=1;stats();status.textContent=st.lives?"Life lost":"Game over";setTimeout(()=>st.lives?msg(`${A}% accurate`,`The correct path is shown. ${st.lives} ${st.lives===1?"life":"lives"} left.`,`Retry Round`,async()=>{hide();st.trace=[];st.replayed=false;await countdown();play()}):msg("Game over",`You reached round ${st.round} with ${st.score} points.`,`Play Again`,reset),450)}}replay.onclick=()=>{if(st.phase!=="recall"||st.replayed)return;st.replayed=true;st.trace=[];play()};clear.onclick=()=>{if(st.phase==="recall"){st.trace=[];draw()}};new.onclick=reset;reset();size()})();
</script></body></html>
