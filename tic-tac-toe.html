<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        :root { --p1: #ef4444; --p2: #3b82f6; }
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f8fafc; margin: 0; padding: 20px; }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; width: 90vmin; max-width: 400px; aspect-ratio: 1/1; }
        .cell { aspect-ratio: 1/1; background: white; border: 2px solid #e2e8f0; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 18vmin; font-weight: 900; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        @media (min-width: 400px) { .cell { font-size: 80px; } }
        .cell.cursor { outline: 6px solid #fbbf24; z-index: 10; transform: scale(1.05); box-shadow: 0 0 20px #fbbf24; }
        .cell:hover { background: #f1f5f9; }
        .cell.x { color: var(--p1); }
        .cell.o { color: var(--p2); }
        .status { font-size: 1.5rem; margin: 20px 0; font-weight: 600; }
        .btn { padding: 10px 20px; font-size: 1rem; cursor: pointer; background: #2563eb; color: white; border: none; border-radius: 8px; }
        .back { margin-top: 20px; text-decoration: none; color: #64748b; }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CCZ9JJGEDP');
    </script>
</head>
<body>
    <h1>Tic Tac Toe</h1>
    <div class="status" id="status">Player X's Turn</div>
    <div class="board" id="board"></div>
    <button class="btn" onclick="reset()">Reset Game</button>
    <a href="index.html" class="back">← Back to Hub</a>

    <script>
        let board = Array(9).fill(null);
        let xTurn = true;
        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');

        function createBoard() {
            boardEl.innerHTML = '';
            board.forEach((cell, i) => {
                const div = document.createElement('div');
                div.className = `cell ${cell ? cell.toLowerCase() : ''}`;
                div.textContent = cell;
                div.onclick = () => handleClick(i);
                boardEl.appendChild(div);
            });
        }

        function handleClick(i) {
            if (board[i] || checkWinner()) return;
            board[i] = xTurn ? 'X' : 'O';
            xTurn = !xTurn;
            updateStatus();
            createBoard();
        }

        function checkWinner() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let [a,b,c] of wins) {
                if (board[a] && board[a] === board[b] && board[a] === board[c]) return board[a];
            }
            return board.includes(null) ? null : 'Draw';
        }

        function updateStatus() {
            const winner = checkWinner();
            if (winner) {
                statusEl.textContent = winner === 'Draw' ? "It's a Draw!" : `Player ${winner} Wins!`;
            } else {
                statusEl.textContent = `Player ${xTurn ? 'X' : 'O'}'s Turn`;
            }
        }

        function reset() {
            board = Array(9).fill(null);
            xTurn = true;
            updateStatus();
            createBoard();
        }

        createBoard();

        // Gamepad Adapter
        (function() {
            let cursor = 4;
            let lastP = 0;
            function poll() {
                const pads = navigator.getGamepads();
                if (pads[0]) {
                    const p = pads[0]; const now = Date.now();
                    const cells = document.querySelectorAll('.cell');
                    cells.forEach(c => c.classList.remove('cursor'));
                    if (cells[cursor]) cells[cursor].classList.add('cursor');

                    if (now - lastP > 200) {
                        const b = p.buttons;
                        if (b[12].pressed || p.axes[1] < -0.5) cursor = Math.max(0, cursor - 3);
                        if (b[13].pressed || p.axes[1] > 0.5) cursor = Math.min(8, cursor + 3);
                        if (b[14].pressed || p.axes[0] < -0.5) cursor = (cursor % 3 === 0) ? cursor : cursor - 1;
                        if (b[15].pressed || p.axes[0] > 0.5) cursor = (cursor % 3 === 2) ? cursor : cursor + 1;

                        if (b[0].pressed) cells[cursor].click();
                        if (b[9].pressed) reset();
                        lastP = now;
                    }
                }
                requestAnimationFrame(poll);
            }
            poll();
        })();
        </script></body>
</html>
