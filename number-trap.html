<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number Trap - K2 games</title>
    <style>
        :root {
            --bg: #0f172a;
            --reactor: #1e293b;
            --fuel: #3b82f6; /* Blue */
            --coolant: #ef4444; /* Red */
            --accent: #f59e0b;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        nav {
            height: 60px;
            padding: 0 1.5rem;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .logo { font-weight: 900; font-size: 1.2rem; color: var(--accent); letter-spacing: -0.5px; }
        .back-link { color: #94a3b8; text-decoration: none; font-size: 0.8rem; font-weight: bold; }

        #game-layout {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 20px;
            position: relative;
        }

        /* Trap Meter */
        #stability-container {
            width: 100%;
            max-width: 500px;
            background: var(--glass);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #stability-val {
            font-size: 5rem;
            font-weight: 900;
            font-family: monospace;
            text-shadow: 0 0 20px var(--accent);
            color: var(--accent);
        }

        .meter-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; opacity: 0.6; }

        #gauge-track {
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            margin-top: 15px;
            position: relative;
            overflow: hidden;
        }
        #gauge-fill {
            height: 100%;
            width: 50%;
            background: linear-gradient(to right, #ef4444, #f59e0b, #22c55e, #f59e0b, #ef4444);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Opponents Area */
        #opponents {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .player-card {
            background: var(--glass);
            padding: 10px 20px;
            border-radius: 12px;
            border: 2px solid var(--border);
            text-align: center;
            min-width: 100px;
            transition: 0.3s;
        }
        .player-card.active { border-color: var(--accent); box-shadow: 0 0 15px rgba(245, 158, 11, 0.2); transform: scale(1.05); }
        .player-card.bust { border-color: var(--coolant); opacity: 0.5; }

        .error-icons { font-size: 1.2rem; margin-top: 5px; color: var(--coolant); }

        /* Hand Area */
        #hand-area {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        #hand {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px;
            width: 100%;
            justify-content: center;
        }

        .card {
            min-width: 80px;
            height: 120px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 2rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            border: 3px solid rgba(255,255,255,0.2);
        }
        .card:hover { transform: translateY(-10px); }
        .card.fuel { background: var(--fuel); color: #fff; }
        .card.coolant { background: var(--coolant); color: #fff; }
        .card.special { background: #8b5cf6; color: #fff; font-size: 1.2rem; }
        .card.disabled { opacity: 0.3; pointer-events: none; }

        /* Banner */
        #msg-banner {
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            background: var(--coolant); color: white; padding: 10px 40px; border-radius: 50px;
            font-weight: 900; z-index: 150; display: none;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.5);
        }

        .screen-overlay {
            position: absolute; inset: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; text-align: center; padding: 20px;
        }

        .btn-large {
            background: var(--accent); color: #000; border: none; padding: 1.2rem 3.5rem;
            border-radius: 50px; font-weight: 800; cursor: pointer; margin-top: 2rem;
            font-size: 1.3rem;
        }

        @media (max-width: 600px) {
            #stability-val { font-size: 3.5rem; }
            .card { min-width: 60px; height: 100px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">NUMBER TRAP</div>
        <div style="display:flex; gap:10px; align-items:center;">
            <button onclick="location.reload()" style="background:transparent; border:1px solid var(--border); color:var(--muted); padding:5px 10px; border-radius:5px; cursor:pointer; font-weight:bold; font-size:0.7rem;">RESTART</button>
        </div>
    </nav>

    <div id="game-layout">
        <div id="opponents">
            <!-- Bot Cards -->
        </div>

        <div id="msg-banner">SYSTEM CRITICAL!</div>

        <!-- Played Card Slot -->
        <div id="played-card-container" style="margin-bottom: 10px; display: flex; flex-direction: column; align-items: center; min-height: 140px;">
            <div class="meter-label" style="margin-bottom:5px">Last Played</div>
            <div id="played-card-slot"></div>
        </div>

        <div id="stability-container">
            <div class="meter-label">Trap Stability</div>
            <div id="stability-val">5</div>
            <div id="gauge-track">
                <div id="gauge-fill"></div>
            </div>
            <div style="display:flex; justify-content: space-between; font-size: 0.6rem; opacity: 0.5; margin-top: 5px;">
                <span>0 MIN</span>
                <span>10 MAX</span>
            </div>
        </div>

        <div id="hand-area">
            <div class="meter-label" id="turn-label">Your Turn</div>
            <div id="hand"></div>
        </div>

        <div id="start-screen" class="screen-overlay">
            <h1 style="font-size: 3.5rem; font-style: italic; color: var(--accent); font-weight: 900;">NUMBER TRAP</h1>
            <p style="opacity: 0.7; margin-top: 10px; max-width: 450px;">Keep the stability total between 0 and 10. Force opponents to overload the trap!</p>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="btn-large" onclick="game.init(2)" style="margin-top:0">2 PLAYERS</button>
                <button class="btn-large" onclick="game.init(3)" style="margin-top:0; background: #818cf8; color: white;">3 PLAYERS</button>
                <button class="btn-large" onclick="game.init(4)" style="margin-top:0; background: #22c55e; color: white;">4 PLAYERS</button>
            </div>
        </div>

        <div id="win-screen" class="screen-overlay" style="display:none">
            <h1 id="winner-text" style="font-size: 4rem; color: var(--accent); font-style: italic;">VICTORY</h1>
            <p id="final-stats" style="margin-top:10px; opacity:0.8; font-size: 1.2rem;"></p>
            <button class="btn-large" onclick="location.reload()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        class NumberTrap {
            constructor() {
                this.stability = 5;
                this.players = [];
                this.turn = 0;
                this.deck = [];
                this.errorsInPot = 1;
                this.state = 'playing';
                this.direction = 1;
                
                this.init();
            }

            init(count) {
                if(!count) return;
                this.players = Array(count).fill(0).map((_, i) => ({
                    id: i, name: i === 0 ? 'You' : `Bot ${i}`,
                    errors: 0, hand: [], isBot: i !== 0
                }));

                this.generateDeck();
                this.dealHands();
                this.startRound();
                document.getElementById('start-screen').style.display = 'none';
            }

            generateDeck() {
                this.deck = [];
                // 1-5 Fuel (Blue)
                for(let v=1; v<=5; v++) for(let i=0; i<4; i++) this.deck.push({ type: 'fuel', val: v });
                // 1-5 Coolant (Red)
                for(let v=1; v<=5; v++) for(let i=0; i<4; i++) this.deck.push({ type: 'coolant', val: -v });
                
                if (this.players.length > 2) {
                    for(let i=0; i<2; i++) {
                        this.deck.push({ type: 'special', val: 'REV', name: '🔄' });
                        this.deck.push({ type: 'special', val: 'COPY', name: '📋' });
                        this.deck.push({ type: 'special', val: 'CHOICE', name: '±' });
                    }
                }
                this.deck.sort(() => Math.random() - 0.5);
            }

            dealHands() {
                const count = this.players.length === 2 ? 7 : 6;
                this.players.forEach(p => {
                    p.hand = [];
                    for(let i=0; i<count; i++) p.hand.push(this.deck.pop());
                });
            }

            startRound() {
                this.stability = 5;
                this.updateUI();
                this.renderHand();
                this.renderOpponents();
                document.getElementById('played-card-slot').innerHTML = '';
            }

            playCard(pIdx, cardIdx) {
                const p = this.players[pIdx];
                const card = p.hand.splice(cardIdx, 1)[0];
                
                this.renderPlayedCard(card, p.name);

                let change = card.val;
                if (card.type === 'special') {
                    if (card.val === 'CHOICE') {
                        if (p.isBot) change = (this.stability > 5) ? -2 : 2;
                        else change = prompt("Fuel (+2) or Coolant (-2)?", "2") == "2" ? 2 : -2;
                    }
                    if (card.val === 'COPY') {
                        change = this.lastChange || 1;
                    }
                    if (card.val === 'REV') {
                        this.direction *= -1;
                        change = 0;
                    }
                }
                
                this.lastChange = change;
                this.stability += change;
                
                this.updateUI();
                
                if (this.stability < 0 || this.stability > 10) {
                    setTimeout(() => this.triggerBust(pIdx), 800);
                } else {
                    if (this.players.every(pl => pl.hand.length === 0)) {
                        setTimeout(() => this.triggerBreak(), 800);
                    } else {
                        setTimeout(() => this.nextTurn(), 1000);
                    }
                }
            }

            renderPlayedCard(card, playerName) {
                const slot = document.getElementById('played-card-slot');
                slot.innerHTML = '';
                const div = document.createElement('div');
                div.className = `card ${card.type}`;
                div.style.cursor = 'default';
                div.style.transform = 'scale(0.8)';
                div.style.margin = '0';
                
                let symbol = '';
                if(card.type === 'fuel') symbol = '+';
                
                div.textContent = typeof card.val === 'number' ? symbol + card.val : card.name;
                
                const nameTag = document.createElement('div');
                nameTag.textContent = playerName;
                nameTag.style.fontSize = '0.6rem';
                nameTag.style.marginTop = '5px';
                nameTag.style.opacity = '0.7';

                slot.appendChild(div);
                slot.appendChild(nameTag);
            }

            nextTurn() {
                this.turn = (this.turn + this.direction + this.players.length) % this.players.length;
                this.updateUI();
                this.renderHand();
                this.renderOpponents();

                if (this.players[this.turn].isBot) {
                    setTimeout(() => this.aiTurn(), 1000);
                }
            }

            aiTurn() {
                const p = this.players[this.turn];
                let bestIdx = 0;
                let bestDiff = 99;
                
                p.hand.forEach((c, i) => {
                    const v = typeof c.val === 'number' ? c.val : 0;
                    const diff = Math.abs(5 - (this.stability + v));
                    if (diff < bestDiff) {
                        bestDiff = diff;
                        bestIdx = i;
                    }
                });
                
                this.playCard(this.turn, bestIdx);
            }

            triggerBust(pIdx) {
                const p = this.players[pIdx];
                p.errors += this.errorsInPot;
                this.errorsInPot = 1;
                
                const banner = document.getElementById('msg-banner');
                banner.textContent = `${p.name.toUpperCase()} OVERLOADED!`;
                banner.style.display = 'block';
                
                setTimeout(() => {
                    banner.style.display = 'none';
                    if (p.errors >= 3) this.endGame();
                    else {
                        this.generateDeck();
                        this.dealHands();
                        this.startRound();
                    }
                }, 2000);
            }

            triggerBreak() {
                this.errorsInPot++;
                const banner = document.getElementById('msg-banner');
                banner.textContent = "TRAP STABILIZED. RECHARGING...";
                banner.style.background = "#22c55e";
                banner.style.display = 'block';
                
                setTimeout(() => {
                    banner.style.display = 'none';
                    banner.style.background = "var(--coolant)";
                    this.generateDeck();
                    this.dealHands();
                    this.startRound();
                }, 2000);
            }

            updateUI() {
                const valEl = document.getElementById('stability-val');
                valEl.textContent = this.stability;
                
                const fill = document.getElementById('gauge-fill');
                fill.style.width = (this.stability * 10) + '%';
                
                const label = document.getElementById('turn-label');
                const currP = this.players[this.turn];
                label.textContent = currP.isBot ? `${currP.name}'s turn...` : "Your Turn";
                label.style.color = currP.isBot ? '#fff' : 'var(--accent)';
            }

            renderHand() {
                const el = document.getElementById('hand');
                el.innerHTML = '';
                const p = this.players[0];
                p.hand.forEach((c, i) => {
                    const div = document.createElement('div');
                    div.className = `card ${c.type}`;
                    
                    let symbol = '';
                    if(c.type === 'fuel') symbol = '+';
                    
                    div.textContent = typeof c.val === 'number' ? symbol + c.val : c.name;
                    if (this.turn !== 0) div.classList.add('disabled');
                    div.onclick = () => this.playCard(0, i);
                    el.appendChild(div);
                });
            }

            renderOpponents() {
                const el = document.getElementById('opponents');
                el.innerHTML = '';
                this.players.slice(1).forEach(p => {
                    const div = document.createElement('div');
                    div.className = `player-card ${this.players[this.turn] === p ? 'active' : ''}`;
                    div.innerHTML = `
                        <div style="font-weight:900">${p.name}</div>
                        <div style="font-size:0.7rem; opacity:0.6">${p.hand.length} Cards</div>
                        <div class="error-icons">${'⚠️'.repeat(p.errors)}</div>
                    `;
                    el.appendChild(div);
                });
                
                // My Errors
                const myCard = document.createElement('div');
                myCard.className = `player-card ${this.turn === 0 ? 'active' : ''}`;
                myCard.innerHTML = `
                    <div style="font-weight:900">You</div>
                    <div class="error-icons">${'⚠️'.repeat(this.players[0].errors)}</div>
                `;
                el.insertBefore(myCard, el.firstChild);
            }

            endGame() {
                const winScreen = document.getElementById('win-screen');
                const text = document.getElementById('winner-text');
                const stats = document.getElementById('final-stats');
                
                const winner = this.players.sort((a,b) => a.errors - b.errors)[0];
                text.textContent = winner.id === 0 ? "TRAP SURVIVED" : "TRAP SPRUNG";
                text.style.color = winner.id === 0 ? "var(--accent)" : "var(--coolant)";
                stats.textContent = `${winner.name} managed the trap best.`;
                winScreen.style.display = 'flex';
            }
        }

        const game = new NumberTrap();

        // Gamepad Adapter
        (function() {
            let cursor = 0;
            let lastP = 0;
            function poll() {
                const pads = navigator.getGamepads();
                if (pads[0] && game.turn === 0) {
                    const p = pads[0]; const now = Date.now();
                    const cards = document.querySelectorAll('#hand .card');
                    cards.forEach(c => c.style.outline = '');
                    if (cards[cursor]) cards[cursor].style.outline = '4px solid var(--accent)';

                    if (now - lastP > 180) {
                        const b = p.buttons;
                        if (b[14].pressed || p.axes[0] < -0.5) cursor = Math.max(0, cursor - 1);
                        if (b[15].pressed || p.axes[0] > 0.5) cursor = Math.min(cards.length - 1, cursor + 1);
                        if (b[0].pressed && cards[cursor]) cards[cursor].click();
                        lastP = now;
                    }
                }
                requestAnimationFrame(poll);
            }
            poll();
        })();
    </script>
</body>
</html>
