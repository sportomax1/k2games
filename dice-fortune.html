<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yahtzee Pro</title>
    <style>
        :root { --p: #2563eb; --bg: #f8fafc; }
        body { font-family: sans-serif; background: #1e293b; color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; min-height: 100vh; }
        .game-layout { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; width: 100%; }
        .dice-area { display: flex; gap: 8px; margin: 15px 0; justify-content: center; width: 100%; }
        .die { width: 15vmin; max-width: 60px; height: 15vmin; max-height: 60px; background: white; color: #1e293b; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 6vmin; font-weight: bold; cursor: pointer; border: 4px solid transparent; }
        .held { border-color: #10b981; background: #ecfdf5; }
        .score-card { background: white; color: #1e293b; padding: 12px; border-radius: 12px; width: 90vmin; max-width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .score-row { display: flex; justify-content: space-between; padding: 6px; border-bottom: 1px solid #e2e8f0; cursor: pointer; font-size: 0.9rem; }
        .score-row:hover:not(.used) { background: #f1f5f9; }
        .used { color: #94a3b8; cursor: default; }
        .btn { padding: 12px 24px; background: var(--p); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; }
        .back { text-decoration: none; color: #94a3b8; margin-top: auto; padding: 20px; }
        @media (max-width: 600px) { h1 { font-size: 1.5rem; } .score-card { width: 95%; } }
    </style>
</head>
<body>
    <h1>🎲 Yahtzee 🎲</h1>
    <div id="status" style="margin-bottom:10px">Round 1/13</div>
    
    <div class="dice-area" id="dice"></div>
    <div style="margin-bottom:20px">
        <button class="btn" id="rollBtn" onclick="roll()">Roll Dice (3 left)</button>
    </div>

    <div class="game-layout">
        <div class="score-card">
            <h3 style="margin:0 0 10px 0; border-bottom: 2px solid #eee;">Scoreboard</h3>
            <div id="playerScores"></div>
            <div style="margin-top:10px; font-weight:bold; font-size:1.1rem; display:flex; justify-content:space-between">
                <span>Total:</span><span id="pTotal">0</span>
            </div>
        </div>
    </div>
    <a href="index.html" class="back">← HUB</a>

    <script>
        let dice = [1,1,1,1,1], held = [false,false,false,false,false], rolls = 3, round = 1;
        let pScores = {};
        const cats = {
            ones: "Ones", twos: "Twos", threes: "Threes", fours: "Fours", fives: "Fives", sixes: "Sixes",
            tok: "3 of Kind", fok: "4 of Kind", fh: "Full House", ss: "Sm Straight", ls: "Lg Straight", y: "Yahtzee", c: "Chance"
        };

        function roll() {
            if (rolls <= 0) return;
            for (let i=0; i<5; i++) if (!held[i]) dice[i] = Math.floor(Math.random()*6)+1;
            rolls--;
            render();
        }

        function toggleHold(i) {
            if (rolls < 3) { held[i] = !held[i]; render(); }
        }

        function getScore(cat, vals) {
            const counts = {}; vals.forEach(v => counts[v] = (counts[v]||0)+1);
            const sum = vals.reduce((a,b)=>a+b, 0);
            const freq = Object.values(counts);
            const unique = [...new Set(vals)].sort();
            
            const hasS = (len) => {
                let count=1, max=1;
                for(let i=0; i<unique.length-1; i++) {
                    if(unique[i+1] === unique[i]+1) count++; else count=1;
                    max = Math.max(max, count);
                }
                return max >= len;
            };

            switch(cat) {
                case 'ones': return (counts[1]||0)*1;
                case 'twos': return (counts[2]||0)*2;
                case 'threes': return (counts[3]||0)*3;
                case 'fours': return (counts[4]||0)*4;
                case 'fives': return (counts[5]||0)*5;
                case 'sixes': return (counts[6]||0)*6;
                case 'tok': return freq.some(f => f>=3) ? sum : 0;
                case 'fok': return freq.some(f => f>=4) ? sum : 0;
                case 'fh': return freq.includes(3) && freq.includes(2) ? 25 : 0;
                case 'ss': return hasS(4) ? 30 : 0;
                case 'ls': return hasS(5) ? 40 : 0;
                case 'y': return freq.includes(5) ? 50 : 0;
                case 'c': return sum;
            }
        }

        function select(cat) {
            if (pScores[cat] !== undefined || rolls === 3) return;
            pScores[cat] = getScore(cat, dice);
            nextRound();
        }

        function nextRound() {
            round++;
            if (round > 13) {
                const pt = Object.values(pScores).reduce((a,b)=>a+b,0);
                alert(`Game Over! Final Score: ${pt}`);
                location.reload();
                return;
            }
            rolls = 3; dice = [1,1,1,1,1]; held = [false,false,false,false,false];
            render();
        }

        function render() {
            const diceEl = document.getElementById('dice');
            diceEl.innerHTML = '';
            dice.forEach((d, i) => {
                const div = document.createElement('div');
                div.className = 'die' + (held[i] ? ' held' : '');
                div.textContent = d;
                div.onclick = () => toggleHold(i);
                diceEl.appendChild(div);
            });

            const pArea = document.getElementById('playerScores');
            pArea.innerHTML = '';
            let pTotal = 0;
            for (let k in cats) {
                const val = pScores[k];
                if (val !== undefined) pTotal += val;
                const div = document.createElement('div');
                div.className = 'score-row' + (val !== undefined ? ' used' : '');
                div.innerHTML = `<span>${cats[k]}</span><span>${val !== undefined ? val : getScore(k, dice)}</span>`;
                div.onclick = () => select(k);
                pArea.appendChild(div);
            }
            document.getElementById('pTotal').textContent = pTotal;
            document.getElementById('rollBtn').textContent = `Roll Dice (${rolls} left)`;
            document.getElementById('status').textContent = `Round ${round}/13`;
        }
        render();

        // Gamepad Adapter
        (function() {
            let cursor = 0; // 0-4 for dice, 5-17 for categories
            let lastP = 0;
            function poll() {
                const pads = navigator.getGamepads();
                if (pads[0]) {
                    const p = pads[0]; const now = Date.now();
                    document.querySelectorAll('.die, .score-row').forEach(el => el.style.outline = '');
                    const diceEls = document.querySelectorAll('.die');
                    const scoreEls = document.querySelectorAll('.score-row');
                    
                    if (cursor < 5) { if (diceEls[cursor]) diceEls[cursor].style.outline = '4px solid #fbbf24'; }
                    else { if (scoreEls[cursor - 5]) scoreEls[cursor - 5].style.outline = '4px solid #fbbf24'; }

                    if (now - lastP > 180) {
                        const b = p.buttons; const ay = p.axes[1];
                        if (b[12].pressed || ay < -0.5) cursor = Math.max(0, cursor - 1);
                        if (b[13].pressed || ay > 0.5) cursor = Math.min(17, cursor + 1);
                        if (b[0].pressed) {
                            if (cursor < 5) toggleHold(cursor);
                            else { const k = Object.keys(cats)[cursor-5]; select(k); }
                        }
                        if (b[3].pressed || b[7].pressed) roll();
                        lastP = now;
                    }
                }
                requestAnimationFrame(poll);
            }
            poll();
        })();
    </script>
</body>
</html>
