<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juggling Pro Elite - Physics Sim</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #000;
            --surface: #111;
            --text: #fff;
            --rec: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 0.5rem 1.5rem;
            background: #000;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            z-index: 100;
        }

        .back-btn { color: #888; text-decoration: none; text-transform: uppercase; font-weight: 800; }

        .cam-container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px;
            background: #222;
        }

        .view-pane { position: relative; background: #000; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; padding: 1rem;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .rec-dot { color: #fff; font-weight: 900; display: flex; align-items: center; gap: 0.5rem; }
        .rec-dot::before { content: ''; width: 10px; height: 10px; background: var(--rec); border-radius: 50%; animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0; } }

        .controls {
            background: #111;
            padding: 1rem;
            border-top: 1px solid #333;
            display: flex;
            gap: 1.5rem;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .ctrl-group { display: flex; flex-direction: column; gap: 0.2rem; }
        label { font-size: 0.6rem; color: #888; text-transform: uppercase; font-weight: 800; }
        input[type="range"] { width: 100px; accent-color: var(--primary); }

        .btn {
            background: #222; border: 1px solid #444; color: #fff;
            padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer;
            font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
        }
        .btn.active { background: var(--primary); border-color: var(--primary); }

        .manual-tip {
            position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%);
            font-size: 0.7rem; color: #555; background: rgba(0,0,0,0.6);
            padding: 2px 10px; border-radius: 10px;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="back-btn">Exit Sim</a>
        <div style="letter-spacing: 2px;">ELITE_JUGGLE // PHX_V2</div>
        <div id="clock">12:00:00</div>
    </header>

    <div class="cam-container">
        <div class="view-pane" id="pane-fp">
            <canvas id="canvas-fp"></canvas>
            <div class="overlay">
                <div class="rec-dot">REC [FPV]</div>
                <div style="font-size: 0.6rem; font-family: monospace;">STAB: ACTIVE | FOV: 90</div>
            </div>
            <div class="manual-tip">L-CLICK / SPACE to throw left</div>
        </div>
        <div class="view-pane" id="pane-tp">
            <canvas id="canvas-tp"></canvas>
            <div class="overlay">
                <div class="rec-dot">REC [EXT]</div>
                <div style="font-size: 0.6rem; font-family: monospace;">TRACKING: LOCK</div>
            </div>
            <div class="manual-tip">R-CLICK / ENTER to throw right</div>
        </div>
    </div>

    <div class="controls">
        <div class="ctrl-group">
            <label>Balls</label>
            <input type="range" id="ball-count" min="3" max="7" value="3">
        </div>
        <div class="ctrl-group">
            <label>Pattern</label>
            <select id="pattern" style="background: #222; color: #fff; border: 1px solid #444; font-size: 0.7rem;">
                <option value="cascade">Cascade</option>
                <option value="fountain">Fountain</option>
                <option value="shower">Shower</option>
            </select>
        </div>
        <div class="ctrl-group">
            <label>Tempo</label>
            <input type="range" id="tempo" min="0.5" max="2" step="0.1" value="1.2">
        </div>
        <div class="ctrl-group">
            <label>Dwell</label>
            <input type="range" id="dwell" min="0.1" max="0.8" step="0.05" value="0.4">
        </div>
        <button class="btn active" id="auto-btn">Auto-Sync</button>
        <button class="btn" id="reset-btn">Reset</button>
    </div>

    <script>
        const canvasFP = document.getElementById('canvas-fp');
        const canvasTP = document.getElementById('canvas-tp');
        const ctxFP = canvasFP.getContext('2d');
        const ctxTP = canvasTP.getContext('2d');

        let width, height;
        let balls = [];
        let time = 0;
        let isAuto = true;

        const COLORS = ['#f87171', '#60a5fa', '#34d399', '#fbbf24', '#a78bfa', '#f472b6', '#22d3ee'];

        class Hand {
            constructor(side) {
                this.side = side; // 'left' or 'right'
                this.x = side === 'left' ? -1 : 1;
                this.y = 0;
                this.angle = 0;
                this.holding = null;
                this.dwellTimer = 0;
            }

            update(pattern, tempo, dwell) {
                // Circular scoop motion
                // In FPV, x is screen-width relative (-1 to 1)
                // Scoop is a circle: x = center + cos(a), y = center + sin(a)
                const centerX = this.side === 'left' ? -0.6 : 0.6;
                const centerY = 0.8; // vertical position
                const radius = 0.2;

                // Adjust angle based on time and tempo
                this.angle = (time * 0.05 * tempo) + (this.side === 'right' ? Math.PI : 0);
                
                // If auto, timing is linked to angle
                // In a cascade, we release at a specific point in the scoop
                if (isAuto) {
                    // This is handled by ball distribution logic
                }

                this.x = centerX + Math.cos(this.angle) * radius;
                this.y = centerY + Math.sin(this.angle) * radius;

                if (this.holding) {
                    this.holding.x = this.x;
                    this.holding.y = this.y;
                    this.holding.state = 'held';
                }
            }
        }

        class Ball {
            constructor(id) {
                this.id = id;
                this.color = COLORS[id % COLORS.length];
                this.reset();
            }

            reset() {
                this.x = 0; this.y = 2; // Offscreen top
                this.vx = 0; this.vy = 0;
                this.state = 'flying'; // flying, held
            }

            throw(vx, vy) {
                this.vx = vx;
                this.vy = vy;
                this.state = 'flying';
            }

            update(gravity) {
                if (this.state === 'flying') {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += gravity; // gravity is positive (downward)
                }
            }
        }

        const handL = new Hand('left');
        const handR = new Hand('right');

        function init() {
            resize();
            resetSim();
            animate();
        }

        function resetSim() {
            balls = [];
            const count = parseInt(document.getElementById('ball-count').value);
            for (let i = 0; i < count; i++) {
                const b = new Ball(i);
                // Initial spread
                b.x = (i % 2 === 0 ? -0.6 : 0.6);
                b.y = 0.5 - (i * 0.3);
                b.vy = -0.05;
                balls.push(b);
            }
            handL.holding = null;
            handR.holding = null;
        }

        function resize() {
            width = canvasFP.parentElement.clientWidth;
            height = canvasFP.parentElement.clientHeight;
            [canvasFP, canvasTP].forEach(c => {
                c.width = width * window.devicePixelRatio;
                c.height = height * window.devicePixelRatio;
                c.getContext('2d').scale(window.devicePixelRatio, window.devicePixelRatio);
            });
        }

        function throwBall(hand) {
            if (!hand.holding) return;
            const pattern = document.getElementById('pattern').value;
            const tempo = parseFloat(document.getElementById('tempo').value);
            const b = hand.holding;
            hand.holding = null;

            let vx, vy;
            if (pattern === 'cascade') {
                vx = hand.side === 'left' ? 0.04 * tempo : -0.04 * tempo;
                vy = -0.15 * tempo;
            } else if (pattern === 'fountain') {
                vx = hand.side === 'left' ? -0.01 * tempo : 0.01 * tempo;
                vy = -0.16 * tempo;
            } else { // shower
                if (hand.side === 'left') { vx = 0.08 * tempo; vy = -0.18 * tempo; }
                else { vx = -0.1 * tempo; vy = -0.05 * tempo; }
            }
            b.throw(vx, vy);
        }

        function animate() {
            time++;
            const tempo = parseFloat(document.getElementById('tempo').value);
            const dwell = parseFloat(document.getElementById('dwell').value);
            const gravity = 0.005 * tempo;

            handL.update('cascade', tempo, dwell);
            handR.update('cascade', tempo, dwell);

            balls.forEach(b => {
                b.update(gravity);

                // Catch logic
                if (b.state === 'flying' && b.vy > 0) {
                    // Check Left Hand
                    const dL = Math.sqrt((b.x - handL.x)**2 + (b.y - handL.y)**2);
                    if (dL < 0.15 && !handL.holding) {
                        handL.holding = b;
                        if (isAuto) setTimeout(() => throwBall(handL), 300 / tempo);
                    }
                    // Check Right Hand
                    const dR = Math.sqrt((b.x - handR.x)**2 + (b.y - handR.y)**2);
                    if (dR < 0.15 && !handR.holding) {
                        handR.holding = b;
                        if (isAuto) setTimeout(() => throwBall(handR), 300 / tempo);
                    }
                }

                // Reset if dropped
                if (b.y > 1.2) b.reset();
            });

            drawFP();
            drawTP();
            document.getElementById('clock').textContent = new Date().toTimeString().split(' ')[0];
            requestAnimationFrame(animate);
        }

        function drawFP() {
            ctxFP.fillStyle = '#050505';
            ctxFP.fillRect(0, 0, width, height);

            // Draw Arms (FPV looking down)
            ctxFP.lineWidth = 40; ctxFP.lineCap = 'round'; ctxFP.strokeStyle = '#d4a373';
            
            // Left Arm
            const lx = width * (0.5 + handL.x * 0.4);
            const ly = height * (handL.y);
            ctxFP.beginPath(); ctxFP.moveTo(width * 0.2, height); ctxFP.lineTo(lx, ly); ctxFP.stroke();
            
            // Right Arm
            const rx = width * (0.5 + handR.x * 0.4);
            const ry = height * (handR.y);
            ctxFP.beginPath(); ctxFP.moveTo(width * 0.8, height); ctxFP.lineTo(rx, ry); ctxFP.stroke();

            // Balls
            balls.forEach(b => {
                const bx = width * (0.5 + b.x * 0.4);
                const by = height * b.y;
                const size = 25 + (1 - b.y) * 10;
                
                ctxFP.fillStyle = b.color;
                ctxFP.beginPath(); ctxFP.arc(bx, by, size, 0, Math.PI * 2); ctxFP.fill();
                ctxFP.fillStyle = 'rgba(255,255,255,0.3)';
                ctxFP.beginPath(); ctxFP.arc(bx - size/3, by - size/3, size/4, 0, Math.PI * 2); ctxFP.fill();
            });
        }

        function drawTP() {
            ctxTP.fillStyle = '#0a0a0a';
            ctxTP.fillRect(0, 0, width, height);

            // Silhouette
            ctxTP.fillStyle = '#222';
            ctxTP.beginPath(); ctxTP.arc(width/2, height * 0.3, 35, 0, Math.PI * 2); ctxTP.fill(); // Head
            ctxTP.fillRect(width/2 - 30, height * 0.35, 60, 120); // Torso

            // External Arms
            ctxTP.lineWidth = 15; ctxTP.strokeStyle = '#222';
            const lx = width/2 + handL.x * 80;
            const ly = height * 0.5 + handL.y * 50;
            ctxTP.beginPath(); ctxTP.moveTo(width/2 - 25, height * 0.4); ctxTP.lineTo(lx, ly); ctxTP.stroke();

            const rx = width/2 + handR.x * 80;
            const ry = height * 0.5 + handR.y * 50;
            ctxTP.beginPath(); ctxTP.moveTo(width/2 + 25, height * 0.4); ctxTP.lineTo(rx, ry); ctxTP.stroke();

            // Balls
            balls.forEach(b => {
                const bx = width/2 + b.x * 80;
                const by = height * 0.5 + b.y * 50 - (b.state === 'flying' ? 50 : 0);
                ctxTP.fillStyle = b.color;
                ctxTP.beginPath(); ctxTP.arc(bx, by, 12, 0, Math.PI * 2); ctxTP.fill();
            });
        }

        // Controls
        canvasFP.addEventListener('mousedown', () => { if(!isAuto) throwBall(handL); });
        canvasTP.addEventListener('mousedown', () => { if(!isAuto) throwBall(handR); });
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') throwBall(handL);
            if (e.code === 'Enter') throwBall(handR);
        });

        document.getElementById('auto-btn').addEventListener('click', () => {
            isAuto = !isAuto;
            document.getElementById('auto-btn').classList.toggle('active');
            document.getElementById('auto-btn').textContent = isAuto ? 'Auto-Sync' : 'Manual Mode';
        });

        document.getElementById('reset-btn').addEventListener('click', resetSim);
        document.getElementById('ball-count').addEventListener('input', resetSim);

        window.addEventListener('resize', resize);
        init();
    </script>
</body>
</html>
