<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Giraffe Grove 3D - K2 Games</title>
<link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8Xw8AAnUB9WQ0N2IAAAAASUVORK5CYII=">
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#8fcf88;color:#fff7df;font-family:Inter,"Segoe UI",system-ui,sans-serif;touch-action:none}
#game{position:fixed;inset:0;width:100vw;height:100vh;display:block}
#home{position:fixed;top:12px;left:12px;z-index:20;color:#fff7df;text-decoration:none;background:rgba(50,35,18,.7);border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(14px);padding:9px 13px;font-size:.75rem;font-weight:1000}
.hud{position:fixed;inset:12px 12px auto 82px;z-index:10;display:grid;grid-template-columns:minmax(230px,1fr) repeat(4,minmax(78px,auto));gap:10px;pointer-events:none}
.panel,.stat,.overlay,.touch{background:rgba(50,35,18,.7);border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(14px);box-shadow:0 20px 46px rgba(62,40,15,.25)}
.panel{display:grid;grid-template-columns:46px minmax(0,1fr);gap:12px;align-items:center;padding:11px 12px}
.mark{width:46px;height:46px;display:grid;place-items:center;background:linear-gradient(145deg,#fbbf24,#fff7ad);color:#35230f;font-weight:1000}
h1{font-size:clamp(1.2rem,2.7vw,2.2rem);line-height:.94;text-transform:uppercase;letter-spacing:0}.objective{margin-top:6px;color:#fcd34d;font-size:.78rem;font-weight:900}
.stat{padding:10px;min-width:78px}.label{display:block;color:rgba(255,247,223,.7);font-size:.62rem;font-weight:900;text-transform:uppercase}.value{display:block;margin-top:4px;color:#9cff75;font-size:1.08rem;font-weight:1000;font-variant-numeric:tabular-nums}
.overlay{position:fixed;inset:0;z-index:30;display:grid;place-items:center;text-align:center;padding:22px;background:linear-gradient(150deg,rgba(40,29,15,.94),rgba(96,128,50,.82))}
.menu{width:min(720px,100%)}.menu h2{font-size:clamp(3rem,9vw,6rem);line-height:.86;text-transform:uppercase;text-shadow:0 0 40px rgba(252,211,77,.35)}.menu p{margin:16px auto 22px;max-width:540px;color:rgba(255,247,223,.76);line-height:1.55;font-weight:750}
button{appearance:none;border:0;background:#fbbf24;color:#35230f;min-height:48px;padding:12px 22px;font:inherit;font-weight:1000;cursor:pointer}.ghost{margin-left:8px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff7df}
.touch{display:none;position:fixed;left:12px;right:12px;bottom:12px;z-index:15;grid-template-columns:repeat(5,1fr);gap:8px;padding:9px;pointer-events:auto}.touch button{min-height:42px;background:rgba(255,255,255,.14);color:#fff7df;border:1px solid rgba(255,255,255,.22)}.touch button:active,.touch button.active{background:#fbbf24;color:#35230f}
@media(max-width:820px){.hud{inset:9px 9px auto 70px;grid-template-columns:1fr 76px 76px}.stat:nth-of-type(n+4){display:none}.touch{display:grid}}
</style>
<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-CCZ9JJGEDP');</script>
</head>
<body>
<a id="home" href="index.html">HUB</a>
<canvas id="game"></canvas>
<div class="hud">
  <div class="panel"><div class="mark">GG</div><div><h1>Giraffe Grove 3D</h1><div class="objective" id="objective">Roam the savanna and stretch for treetop snacks.</div></div></div>
  <div class="stat"><span class="label">Leaves</span><span class="value" id="leaves">0/18</span></div>
  <div class="stat"><span class="label">Reach</span><span class="value" id="reach">0%</span></div>
  <div class="stat"><span class="label">Combo</span><span class="value" id="combo">1x</span></div>
  <div class="stat"><span class="label">Score</span><span class="value" id="score">0</span></div>
</div>
<div class="overlay" id="menu"><div class="menu"><h2>Giraffe Grove 3D</h2><p>Explore an open savanna as a giraffe. Move from tree to tree, hold stretch to grow your neck, and line up the head with leaves before your combo fades.</p><button id="start">PLAY</button><button class="ghost" onclick="location.href='index.html'">HUB</button></div></div>
<div class="touch"><button data-key="a">LEFT</button><button data-key="w">UP</button><button data-key="s">DOWN</button><button data-key="d">RIGHT</button><button data-key=" ">STRETCH</button></div>
<script type="module">
import * as THREE from 'three';
const canvas=document.getElementById('game');
const ui={menu:document.getElementById('menu'),leaves:document.getElementById('leaves'),reach:document.getElementById('reach'),combo:document.getElementById('combo'),score:document.getElementById('score'),objective:document.getElementById('objective')};
const scene=new THREE.Scene();scene.background=new THREE.Color(0xa7d88a);scene.fog=new THREE.Fog(0xa7d88a,160,650);
const camera=new THREE.PerspectiveCamera(60,1,.1,1000);
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;renderer.outputColorSpace=THREE.SRGBColorSpace;
scene.add(new THREE.HemisphereLight(0xfff4cf,0x486f32,1.4));const sun=new THREE.DirectionalLight(0xfff1bd,2.1);sun.position.set(-180,260,140);sun.castShadow=true;sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.left=-280;sun.shadow.camera.right=280;sun.shadow.camera.top=280;sun.shadow.camera.bottom=-280;scene.add(sun);
const mats={grass:new THREE.MeshStandardMaterial({color:0x6fb45f,roughness:.9}),dirt:new THREE.MeshStandardMaterial({color:0xa46f38,roughness:.9}),body:new THREE.MeshStandardMaterial({color:0xe1a84f,roughness:.62}),spot:new THREE.MeshStandardMaterial({color:0x8a4f20,roughness:.72}),mane:new THREE.MeshStandardMaterial({color:0x5b3418,roughness:.74}),leaf:new THREE.MeshStandardMaterial({color:0x42b44e,roughness:.55}),gold:new THREE.MeshStandardMaterial({color:0xffd166,emissive:0x9a6200,emissiveIntensity:.35}),gem:new THREE.MeshStandardMaterial({color:0x60a5fa,emissive:0x1e40af,emissiveIntensity:.9}),wood:new THREE.MeshStandardMaterial({color:0x7a4c27,roughness:.82}),shadow:new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:.16})};
const keys=new Map();let playing=false,score=0,eaten=0,combo=1,comboTimer=0,mega=0,clock=new THREE.Clock(),time=0;
function key(k){return keys.get(k.toLowerCase())||false}function setKey(k,v){keys.set(k.toLowerCase(),v)}
function box(w,h,d,mat){const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);m.castShadow=true;m.receiveShadow=true;return m}function cyl(r1,r2,h,s,mat){const m=new THREE.Mesh(new THREE.CylinderGeometry(r1,r2,h,s),mat);m.castShadow=true;m.receiveShadow=true;return m}
const ground=new THREE.Mesh(new THREE.CircleGeometry(360,80),mats.grass);ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;scene.add(ground);
for(let i=0;i<90;i++){const tuft=cyl(.08,.25,1+Math.random()*1.4,5,new THREE.MeshStandardMaterial({color:Math.random()>.5?0x4d8f3f:0x86b957,roughness:1}));const a=Math.random()*Math.PI*2,r=40+Math.random()*300;tuft.position.set(Math.cos(a)*r,.5,Math.sin(a)*r);scene.add(tuft)}

const giraffe=new THREE.Group();scene.add(giraffe);
const body=box(10,5.2,17,mats.body);body.position.y=8;giraffe.add(body);
const hips=box(8,4,7,mats.body);hips.position.set(0,8,5);giraffe.add(hips);
const legs=[];[[-4,-5], [4,-5], [-4,6], [4,6]].forEach(([x,z])=>{const leg=cyl(.8,.9,8,10,mats.body);leg.position.set(x,3.8,z);giraffe.add(leg);legs.push(leg);const hoof=box(1.7,.55,2,mats.mane);hoof.position.set(x,.3,z+.25);giraffe.add(hoof)});
for(let i=0;i<16;i++){const s=new THREE.Mesh(new THREE.SphereGeometry(.9+Math.random()*.8,10,8),mats.spot);s.scale.y=.3;s.position.set((Math.random()-.5)*9,10.7,(Math.random()-.5)*14);s.rotation.x=Math.PI/2;giraffe.add(s)}
const neckRoot=new THREE.Group();neckRoot.position.set(0,11,-7.2);giraffe.add(neckRoot);
const neckSegs=[];for(let i=0;i<8;i++){const seg=cyl(.78-.035*i,.9-.035*i,4.2,12,mats.body);seg.rotation.x=.08;neckRoot.add(seg);neckSegs.push(seg);const mane=box(.25,1.8,.55,mats.mane);neckRoot.add(mane);seg.userData.mane=mane}
const head=new THREE.Group();const skull=box(3.5,2.5,4.6,mats.body);skull.position.y=0;const snout=box(2.6,1.4,2.2,mats.body);snout.position.set(0,-.15,-2.8);const earL=box(.45,1.4,.35,mats.body);earL.position.set(-1.8,1.3,.6);earL.rotation.z=.5;const earR=earL.clone();earR.position.x=1.8;earR.rotation.z=-.5;const hornL=cyl(.22,.34,1.5,8,mats.mane);hornL.position.set(-.85,1.8,.3);const hornR=hornL.clone();hornR.position.x=.85;head.add(skull,snout,earL,earR,hornL,hornR);neckRoot.add(head);
const shadow=new THREE.Mesh(new THREE.CircleGeometry(9,32),mats.shadow);shadow.rotation.x=-Math.PI/2;shadow.position.y=.06;giraffe.add(shadow);
giraffe.position.set(0,0,0);giraffe.userData={speed:0,yaw:0,stretch:0};

const trees=[],foods=[],pops=[];
function makeTree(x,z,kind=0){const g=new THREE.Group();const trunk=cyl(1.4,2.1,18+Math.random()*5,12,mats.wood);trunk.position.y=9;const crown=new THREE.Group();for(let i=0;i<7;i++){const leaf=new THREE.Mesh(new THREE.SphereGeometry(5.5+Math.random()*1.8,14,10),mats.leaf);leaf.position.set((Math.random()-.5)*9,18+Math.random()*8,(Math.random()-.5)*9);leaf.castShadow=true;crown.add(leaf)}g.add(trunk,crown);g.position.set(x,0,z);scene.add(g);trees.push(g);for(let i=0;i<3;i++){const food=new THREE.Mesh(new THREE.SphereGeometry(kind===2?1.25:1.55,14,10),kind===2?mats.gem:kind===1?mats.gold:mats.leaf);food.position.set(x+(Math.random()-.5)*12,19+Math.random()*9,z+(Math.random()-.5)*12);food.userData={eaten:false,kind,value:kind===2?80:kind===1?35:10};food.castShadow=true;scene.add(food);foods.push(food)}}
for(let i=0;i<18;i++){const a=i/18*Math.PI*2+Math.random()*.25,r=70+Math.random()*205;makeTree(Math.cos(a)*r,Math.sin(a)*r,i%7===0?2:i%3===0?1:0)}

function headPos(){const stretch=giraffe.userData.stretch;const baseLen=17,extra=stretch*(mega>0?25:16),len=baseLen+extra;const dir=new THREE.Vector3(Math.sin(giraffe.userData.yaw),0,Math.cos(giraffe.userData.yaw));const p=giraffe.position.clone().add(new THREE.Vector3(0,15+extra*.42,0)).addScaledVector(dir,-len*.58);return p}
function layoutNeck(){const stretch=giraffe.userData.stretch,len=4.1+stretch*(mega>0?3.1:2.0);neckSegs.forEach((seg,i)=>{seg.position.set(0,i*len+2,-i*.12);seg.rotation.x=.12+stretch*.07+Math.sin(time*3+i)*.02;seg.userData.mane.position.set(0,i*len+2.5,.7)});head.position.set(0,neckSegs.length*len+3,-1.2-stretch*2.2);head.rotation.x=-.18-stretch*.18}
function pop(text,pos,color=0xfff7ad){const sprite=new THREE.Sprite(new THREE.SpriteMaterial({color,transparent:true,opacity:1}));sprite.position.copy(pos).add(new THREE.Vector3(0,5,0));sprite.scale.set(5,5,5);sprite.userData={life:1};scene.add(sprite);pops.push(sprite)}
function eat(food){food.userData.eaten=true;food.visible=false;eaten++;comboTimer=2.2;combo=Math.min(5,combo+.35);if(food.userData.kind===2)mega=6;score+=Math.round(food.userData.value*combo);pop('+'+food.userData.value,food.position,food.userData.kind===2?0x60a5fa:food.userData.kind===1?0xffd166:0xa7f3a0);if(eaten>=foods.length){ui.objective.textContent='Grove cleared. Keep roaming for a victory lap.'}}
function update(dt){time+=dt;if(!playing)return;mega=Math.max(0,mega-dt);comboTimer-=dt;if(comboTimer<=0)combo=THREE.MathUtils.lerp(combo,1,.035);
 const ix=(key('d')||key('arrowright')?1:0)-(key('a')||key('arrowleft')?1:0),iz=(key('s')||key('arrowdown')?1:0)-(key('w')||key('arrowup')?1:0);const move=new THREE.Vector3(ix,0,iz);
 if(move.lengthSq()>.01){move.normalize();giraffe.userData.yaw=Math.atan2(move.x,move.z);giraffe.position.addScaledVector(move,34*dt);giraffe.position.x=THREE.MathUtils.clamp(giraffe.position.x,-300,300);giraffe.position.z=THREE.MathUtils.clamp(giraffe.position.z,-300,300);giraffe.userData.speed=THREE.MathUtils.lerp(giraffe.userData.speed,1,.18)}else giraffe.userData.speed=THREE.MathUtils.lerp(giraffe.userData.speed,0,.12);
 giraffe.rotation.y=giraffe.userData.yaw;giraffe.position.y=Math.abs(Math.sin(time*8))*giraffe.userData.speed*.5;legs.forEach((l,i)=>l.rotation.x=Math.sin(time*7+i*Math.PI)*giraffe.userData.speed*.45);
 const stretching=key(' ')||key('space')||key('shift');giraffe.userData.stretch=THREE.MathUtils.lerp(giraffe.userData.stretch,stretching?1:0,stretching?.08:.055);layoutNeck();
 const hp=headPos();head.getWorldPosition(hp);foods.forEach(f=>{if(!f.userData.eaten){f.rotation.y+=dt*1.2;f.position.y+=Math.sin(time*2+f.position.x)*.006;if(f.position.distanceTo(hp)<4.4+(mega>0?3:0))eat(f)}});
 pops.forEach((p,i)=>{p.userData.life-=dt;p.position.y+=dt*5;p.material.opacity=p.userData.life;if(p.userData.life<=0){scene.remove(p);pops.splice(i,1)}});
 updateCamera(dt);updateUi();
}
function updateCamera(dt){const yaw=giraffe.userData.yaw;const headWorld=new THREE.Vector3();head.getWorldPosition(headWorld);const bodyTarget=giraffe.position.clone().add(new THREE.Vector3(0,11,0));const look=bodyTarget.clone().lerp(headWorld,.72);const span=Math.max(28,headWorld.distanceTo(bodyTarget));const followDistance=52+span*.56;const desired=new THREE.Vector3(giraffe.position.x-Math.sin(yaw)*followDistance,look.y+20+span*.22,giraffe.position.z-Math.cos(yaw)*followDistance);camera.position.lerp(desired,1-Math.pow(.001,dt));camera.lookAt(look)}
function updateUi(){ui.leaves.textContent=eaten+'/'+foods.length;ui.reach.textContent=Math.round(giraffe.userData.stretch*100)+'%';ui.combo.textContent=combo.toFixed(1)+'x';ui.score.textContent=score}
function resize(){renderer.setSize(innerWidth,innerHeight,false);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix()}addEventListener('resize',resize);resize();
addEventListener('keydown',e=>{setKey(e.key,true);setKey(e.code,true);if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault()});addEventListener('keyup',e=>{setKey(e.key,false);setKey(e.code,false)});
document.querySelectorAll('[data-key]').forEach(b=>{const v=b.dataset.key;const p=s=>{setKey(v,s);b.classList.toggle('active',s)};b.addEventListener('pointerdown',e=>{e.preventDefault();p(true)});['pointerup','pointercancel','pointerleave'].forEach(ev=>b.addEventListener(ev,()=>p(false)))});
document.getElementById('start').onclick=()=>{playing=true;ui.menu.style.display='none';ui.objective.textContent='Hold Space to stretch. Walk under tree crowns to line up bites.'};
function loop(){const dt=Math.min(clock.getDelta(),.04);update(dt);renderer.render(scene,camera);requestAnimationFrame(loop)}layoutNeck();updateCamera(.016);loop();
</script>
</body>
</html>
