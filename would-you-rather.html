            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: none; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        body.bad-mode { background: #1a0505; }
        body.great-mode { background: #051a1a; }

        nav {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo { font-weight: 900; font-size: 1.5rem; color: var(--accent); font-style: italic; }
        .back-link { color: #94a3b8; text-decoration: none; font-weight: bold; font-size: 0.8rem; }

        #game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .mode-toggle {
            margin-bottom: 2rem;
            display: flex;
            background: var(--card-bg);
            padding: 5px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .tgl-btn {
            padding: 10px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 800;
            font-size: 0.8rem;
            transition: 0.3s;
            border: none;
            background: transparent;
            color: #64748b;
        }

        .tgl-btn.active { background: var(--accent); color: black; }

        .vs-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: var(--bg);
            border: 4px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            z-index: 10;
            font-style: italic;
        }

        #options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 1000px;
            height: 60vh;
            position: relative;
        }

        .option-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .option-card:hover { transform: scale(1.02); background: #2d3748; }
        .option-card.left { border-bottom: 8px solid var(--p1); }
        .option-card.right { border-bottom: 8px solid var(--p2); }

        .option-text {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.2;
            z-index: 2;
        }

        .choice-indicator {
            position: absolute;
            bottom: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            opacity: 0;
            transition: 0.3s;
        }

        .option-card.selected .choice-indicator { opacity: 1; }

        #next-btn {
            margin-top: 3rem;
            padding: 15px 50px;
            background: white;
            color: black;
            border: none;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            display: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        @media (max-width: 768px) {
            #options-grid { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; height: 75vh; }
            .option-text { font-size: 1.4rem; }
            .vs-circle { width: 50px; height: 50px; font-size: 0.8rem; }
        }

        class Game {
            constructor() {
                this.mode = 'great';
                this.currentIndex = 0;
                this.answered = false;

                this.setupModes();
                this.loadNext();
                
                document.getElementById('next-btn').onclick = () => this.loadNext();
                document.getElementById('opt-left').onclick = () => this.answer(0);
                document.getElementById('opt-right').onclick = () => this.answer(1);
            }

            setupModes() {
                const btnGreat = document.getElementById('mode-great');
                const btnBad = document.getElementById('mode-bad');

                btnGreat.onclick = () => {
                    this.mode = 'great';
                    document.body.className = 'great-mode';
                    btnGreat.classList.add('active');
                    btnBad.classList.remove('active');
                    this.loadNext();
                };

                btnBad.onclick = () => {
                    this.mode = 'bad';
                    document.body.className = 'bad-mode';
                    btnBad.classList.add('active');
                    btnGreat.classList.remove('active');
                    this.loadNext();
                };
            }

            loadNext() {
                this.answered = false;
                document.getElementById('next-btn').style.display = 'none';
                document.getElementById('opt-left').classList.remove('selected');
                document.getElementById('opt-right').classList.remove('selected');

                const options = SCENARIOS[this.mode];
                let nextIndex = Math.floor(Math.random() * options.length);
                while(nextIndex === this.currentIndex && options.length > 1) {
                    nextIndex = Math.floor(Math.random() * options.length);
                }
                this.currentIndex = nextIndex;
                const current = options[this.currentIndex];

                document.getElementById('text-left').textContent = current[0];
                document.getElementById('text-right').textContent = current[1];
            }

            answer(choice) {
                if (this.answered) return;
                this.answered = true;

                if (choice === 0) document.getElementById('opt-left').classList.add('selected');
                else document.getElementById('opt-right').classList.add('selected');

                document.getElementById('next-btn').style.display = 'block';
            }
        }
