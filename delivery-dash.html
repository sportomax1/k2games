<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Delivery Dash</title><style>*{box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;touch-action:none}html,body{margin:0;height:100%;overflow:hidden;background:#07111f;color:#fff;font-family:system-ui,-apple-system,Segoe UI,sans-serif}canvas{width:100vw;height:100vh;display:block}.hud{position:fixed;top:max(10px,env(safe-area-inset-top));left:10px;right:10px;display:flex;justify-content:space-between;gap:8px;z-index:5;pointer-events:none}.pill{background:rgba(2,6,23,.78);border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:8px 10px;font-weight:1000;box-shadow:0 8px 22px rgba(0,0,0,.25)}.pill b{color:#38bdf8}.overlay{position:fixed;inset:0;display:grid;place-items:center;background:rgba(2,6,23,.86);z-index:20;padding:20px;text-align:center}.card{width:min(94vw,720px);background:linear-gradient(180deg,#0f766e,#0f172a);border:2px solid #bae6fd;border-radius:28px;padding:24px;box-shadow:0 24px 80px rgba(0,0,0,.58)}h1{font-size:clamp(44px,12vw,82px);line-height:.82;margin:0 0 12px;color:#bae6fd;text-shadow:0 5px 0 rgba(0,0,0,.38)}p{color:#e0f2fe;font-weight:760;line-height:1.4}.btn{border:0;border-radius:999px;background:linear-gradient(135deg,#67e8f9,#22c55e);color:#062b2b;font-weight:1000;padding:14px 22px;font-size:18px;margin-top:14px}.controls{position:fixed;bottom:calc(16px + env(safe-area-inset-bottom));left:0;right:0;display:flex;justify-content:space-between;align-items:flex-end;padding:0 18px;z-index:8;pointer-events:none}.pad{display:grid;grid-template-columns:64px 64px;gap:8px;pointer-events:auto}.cbtn{height:62px;border-radius:18px;border:2px solid rgba(255,255,255,.3);background:rgba(2,6,23,.76);color:#fff;font-weight:1000;font-size:18px;box-shadow:0 7px 0 rgba(0,0,0,.3)}.cbtn.on{transform:scale(.94);background:rgba(56,189,248,.55)}.boost{width:108px;height:86px;border-radius:28px;border:2px solid rgba(255,255,255,.3);background:rgba(34,197,94,.86);color:#052e16;font-weight:1000;font-size:17px;pointer-events:auto;box-shadow:0 8px 0 rgba(0,0,0,.3)}.boost:active{transform:scale(.94)}#arrow{position:fixed;left:50%;top:82px;transform:translateX(-50%);z-index:5;font-size:42px;text-shadow:0 4px 0 #000;pointer-events:none}a{position:fixed;left:50%;bottom:6px;transform:translateX(-50%);z-index:9;color:#e0f2fe;text-decoration:none;font-size:12px;font-weight:900;background:rgba(0,0,0,.25);padding:5px 10px;border-radius:999px}@media(max-width:760px){.pill{font-size:12px;padding:7px 8px}.pad{grid-template-columns:54px 54px}.cbtn{height:54px}.boost{width:86px;height:72px;font-size:14px}.hud{gap:5px}}</style></head><body><canvas id="c"></canvas><div class="hud"><div class="pill" id="score">Cash <b>$0</b></div><div class="pill" id="time">120</div><div class="pill" id="pkg">Packages 0</div><div class="pill" id="van">Van Lv 1</div></div><div id="arrow">⬆️</div><div class="controls"><div class="pad"><button class="cbtn" data-k="ArrowLeft">◀</button><button class="cbtn" data-k="ArrowRight">▶</button><button class="cbtn" data-k="ArrowUp">▲</button><button class="cbtn" data-k="ArrowDown">▼</button></div><button class="boost" id="boost">BOOST</button></div><a href="index.html">← K2 HUB</a><div class="overlay" id="overlay"><div class="card"><h1>Delivery Dash</h1><p>Crazy Taxi meets Paperboy: race through neighborhoods, dodge traffic, dogs, cones, and construction, grab bonus packages, and hit glowing delivery zones before deadlines expire.</p><button class="btn" id="start">START ROUTE</button></div></div><script>(()=>{const c=document.getElementById('c'),x=c.getContext('2d');let W,H,D=1;function rs(){D=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0)}addEventListener('resize',rs);rs();const ui={score:gid('score'),time:gid('time'),pkg:gid('pkg'),van:gid('van'),overlay:gid('overlay'),arrow:gid('arrow')};function gid(id){return document.getElementById(id)}let run=false,last=0,t=120,cash=0,delivered=0,van=1,roadY=0,keys={},fx=[],texts=[],cars=[],obs=[],packs=[],targets=[],boost=1,shake=0,player={x:0,y:0,vx:0,vy:0,a:0,dead:0};function rnd(a,b){return a+Math.random()*(b-a)}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function reset(){run=true;t=120;cash=0;delivered=0;van=1;roadY=0;fx=[];texts=[];cars=[];obs=[];packs=[];targets=[];boost=1;player.x=W/2;player.y=H*.76;player.vx=0;player.vy=0;player.dead=0;ui.overlay.style.display='none';for(let i=0;i<5;i++)newTarget();last=performance.now();requestAnimationFrame(loop)}function newTarget(){targets.push({x:rnd(90,W-90),y:roadY-rnd(650,1600),r:36,deadline:rnd(9,17)})}function spawn(){if(Math.random()<.045)cars.push({x:rnd(W*.26,W*.74),y:roadY-H-80,v:rnd(120,260),w:42,h:78,c:['#ef4444','#2563eb','#facc15','#22c55e'][cars.length%4]});if(Math.random()<.035)obs.push({x:rnd(50,W-50),y:roadY-H-80,type:Math.random()<.34?'dog':Math.random()<.6?'cone':'work',r:rnd(18,32)});if(Math.random()<.030)packs.push({x:rnd(60,W-60),y:roadY-H-80,type:Math.random()<.25?'boost':'pkg',r:22})}function pop(px,py,n,cset){for(let i=0;i<n;i++)fx.push({x:px,y:py,vx:rnd(-5,5),vy:rnd(-6,2),l:rnd(20,60),s:rnd(3,8),c:(cset||['#67e8f9','#22c55e','#fff'])[i%3]})}function text(txt,px,py,c){texts.push({txt,x:px,y:py,l:70,vy:-1.1,c})}function update(dt){if(!run)return;t-=dt;if(t<=0){end();return}spawn();let ax=(keys.ArrowRight||keys.KeyD?1:0)-(keys.ArrowLeft||keys.KeyA?1:0),ay=(keys.ArrowDown||keys.KeyS?1:0)-(keys.ArrowUp||keys.KeyW?1:0),boosting=(keys.Space||gid('boost').dataset.down==='1')&&boost>0;let sp=(boosting?28:17)+van*1.5;if(boosting)boost-=dt*.55;else boost=clamp(boost+dt*.16,0,1);player.vx=player.vx*.86+ax*sp;player.vy=player.vy*.86+ay*sp;player.x=clamp(player.x+player.vx,34,W-34);player.y=clamp(player.y+player.vy,H*.18,H*.88);player.a=player.vx*.018;let scroll=(210+van*12+(boosting?160:0)+Math.max(0,-player.vy*3))*dt;roadY+=scroll;cars.forEach(o=>o.y+=o.v*dt+scroll*.28);obs.forEach(o=>o.y+=scroll);packs.forEach(o=>o.y+=scroll);targets.forEach(o=>{o.y+=scroll;o.deadline-=dt});cars=cars.filter(o=>o.y<H+140);obs=obs.filter(o=>o.y<H+120);packs=packs.filter(o=>o.y<H+80);targets=targets.filter(o=>o.y<H+120&&o.deadline>0);if(targets.length<4)newTarget();for(const o of cars){if(hitRect(player.x,player.y,42,70,o.x,o.y,o.w,o.h)){crash('TRAFFIC!')}}for(const o of obs){if(Math.hypot(o.x-player.x,o.y-player.y)<o.r+28){if(o.type==='dog'){cash=Math.max(0,cash-50);text('DOG DETOUR -$50',player.x,player.y,'#fca5a5');o.y=H+999}else crash(o.type==='cone'?'CONE!':'CONSTRUCTION!')}}for(let i=packs.length-1;i>=0;i--){let o=packs[i];if(Math.hypot(o.x-player.x,o.y-player.y)<o.r+28){if(o.type==='boost'){boost=1;text('BOOST FULL',o.x,o.y,'#bbf7d0')}else{cash+=60;t+=1.5;text('BONUS PKG +$60',o.x,o.y,'#bae6fd')}pop(o.x,o.y,24);packs.splice(i,1)}}for(let i=targets.length-1;i>=0;i--){let o=targets[i];if(Math.hypot(o.x-player.x,o.y-player.y)<o.r+32){let tip=Math.floor(120+o.deadline*18+delivered*6);cash+=tip;delivered++;t+=2.5;if(cash>van*900){cash-=van*900;van++;text('VAN UPGRADE!',W/2,H*.28,'#fde047')}text('DELIVERED +$'+tip,o.x,o.y,'#bbf7d0');pop(o.x,o.y,42,['#22c55e','#67e8f9','#fff']);targets.splice(i,1);newTarget()}}fx.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.l--});fx=fx.filter(p=>p.l>0);texts.forEach(p=>{p.y+=p.vy;p.l--});texts=texts.filter(p=>p.l>0);shake=Math.max(0,shake-1);ui.score.innerHTML='Cash <b>$'+cash+'</b>';ui.time.textContent=Math.ceil(t);ui.pkg.textContent='Packages '+delivered;ui.van.textContent='Van Lv '+van;if(targets[0]){let ang=Math.atan2(targets[0].y-player.y,targets[0].x-player.x)+Math.PI/2;ui.arrow.style.transform=`translateX(-50%) rotate(${ang}rad)`}}function hitRect(px,py,pw,ph,rx,ry,rw,rh){return px+pw/2>rx-rw/2&&px-pw/2<rx+rw/2&&py+ph/2>ry-rh/2&&py-ph/2<ry+rh/2}function crash(msg){cash=Math.max(0,cash-80);t-=3;shake=13;text(msg+' -$80',player.x,player.y,'#fca5a5');pop(player.x,player.y,34,['#ef4444','#f97316','#111827']);player.vx*=-.6;player.vy*=.2}function end(){run=false;ui.overlay.style.display='grid';ui.overlay.querySelector('h1').textContent='Route Complete';ui.overlay.querySelector('p').textContent='Delivered '+delivered+' packages. Final cash $'+cash+'. Van level '+van+'. The neighborhood is only slightly traumatized.';ui.overlay.querySelector('.btn').textContent='DRIVE AGAIN'}function draw(){x.setTransform(D,0,0,D,0,0);x.clearRect(0,0,W,H);if(shake)x.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);x.fillStyle='#14532d';x.fillRect(-20,-20,W+40,H+40);drawRoad();targets.forEach(drawTarget);packs.forEach(drawPack);obs.forEach(drawObs);cars.forEach(drawCar);drawPlayer();fx.forEach(p=>{x.fillStyle=p.c;x.fillRect(p.x,p.y,p.s,p.s)});texts.forEach(p=>{x.globalAlpha=Math.min(1,p.l/25);x.fillStyle=p.c;x.font='1000 24px system-ui';x.textAlign='center';x.fillText(p.txt,p.x,p.y);x.globalAlpha=1})}function drawRoad(){x.fillStyle='#374151';x.fillRect(W*.22,-20,W*.56,H+40);x.fillStyle='#6b7280';x.fillRect(W*.20,-20,10,H+40);x.fillRect(W*.78,-20,10,H+40);x.strokeStyle='#fef3c7';x.lineWidth=5;x.setLineDash([34,42]);x.beginPath();x.moveTo(W*.5,-(roadY%76));x.lineTo(W*.5,H+80);x.stroke();x.setLineDash([]);for(let y=-(roadY%180);y<H;y+=180){x.fillStyle='#92400e';x.fillRect(25,y+35,72,52);x.fillStyle='#e5e7eb';x.fillRect(W-105,y+90,78,50)}}function drawTarget(o){x.save();x.translate(o.x,o.y);x.strokeStyle=o.deadline<5?'#ef4444':'#22c55e';x.lineWidth=6;x.setLineDash([12,8]);x.beginPath();x.arc(0,0,o.r,0,7);x.stroke();x.setLineDash([]);x.fillStyle='rgba(34,197,94,.22)';x.beginPath();x.arc(0,0,o.r,0,7);x.fill();x.fillStyle='#fff';x.font='900 22px system-ui';x.textAlign='center';x.fillText('📦',0,8);x.restore()}function drawPack(o){x.fillStyle=o.type==='boost'?'#22c55e':'#facc15';x.beginPath();x.arc(o.x,o.y,o.r,0,7);x.fill();x.fillStyle='#111827';x.font='900 18px system-ui';x.textAlign='center';x.fillText(o.type==='boost'?'⚡':'📦',o.x,o.y+7)}function drawObs(o){x.save();x.translate(o.x,o.y);if(o.type==='dog'){x.fillStyle='#92400e';x.beginPath();x.ellipse(0,0,32,18,0,0,7);x.fill();x.fillStyle='#451a03';x.beginPath();x.arc(24,-6,14,0,7);x.fill()}else if(o.type==='cone'){x.fillStyle='#f97316';x.beginPath();x.moveTo(0,-28);x.lineTo(22,24);x.lineTo(-22,24);x.closePath();x.fill();x.fillStyle='#fff';x.fillRect(-16,6,32,6)}else{x.fillStyle='#facc15';x.fillRect(-36,-22,72,44);x.fillStyle='#111827';x.fillRect(-28,-8,56,8)}x.restore()}function drawCar(o){x.save();x.translate(o.x,o.y);x.fillStyle=o.c;round(-o.w/2,-o.h/2,o.w,o.h,12);x.fill();x.fillStyle='#111827';x.fillRect(-o.w*.34,-o.h*.24,o.w*.68,o.h*.28);x.fillStyle='#fef3c7';x.fillRect(-o.w*.3,-o.h*.48,o.w*.25,6);x.fillRect(o.w*.05,-o.h*.48,o.w*.25,6);x.restore()}function drawPlayer(){x.save();x.translate(player.x,player.y);x.rotate(player.a);x.fillStyle='#0ea5e9';round(-32,-48,64,96,16);x.fill();x.fillStyle='#082f49';x.fillRect(-24,-25,48,32);x.fillStyle='#facc15';x.fillRect(-24,-52,18,8);x.fillRect(6,-52,18,8);x.fillStyle='#fff';x.font='900 24px system-ui';x.textAlign='center';x.fillText('📦',0,26);x.restore()}function round(x0,y0,w,h,r){x.beginPath();x.moveTo(x0+r,y0);x.arcTo(x0+w,y0,x0+w,y0+h,r);x.arcTo(x0+w,y0+h,x0,y0+h,r);x.arcTo(x0,y0+h,x0,y0,r);x.arcTo(x0,y0,x0+w,y0,r);x.closePath()}function loop(now){let dt=Math.min(.033,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}gid('start').onclick=reset;gid('boost').onpointerdown=e=>{gid('boost').dataset.down='1';e.preventDefault()};gid('boost').onpointerup=gid('boost').onpointercancel=()=>gid('boost').dataset.down='0';document.querySelectorAll('[data-k]').forEach(b=>{let k=b.dataset.k;b.onpointerdown=e=>{keys[k]=true;b.classList.add('on');e.preventDefault()};b.onpointerup=b.onpointercancel=()=>{keys[k]=false;b.classList.remove('on')}});addEventListener('keydown',e=>{keys[e.code]=true;if(e.code.startsWith('Arrow')||['Space'].includes(e.code))e.preventDefault()});addEventListener('keyup',e=>keys[e.code]=false)})();</script></body></html>
