name: New Game Alert

on:
  schedule:
    # Friday 9 AM Mountain during daylight time = Friday 15:00 UTC
    - cron: "0 15 * * 5"
    # Friday 9 AM Mountain during standard time = Friday 16:00 UTC
    - cron: "0 16 * * 5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify-new-games:
    runs-on: ubuntu-latest

    steps:
      - name: Check Mountain time
        id: mt
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_alert=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MT_DAY=$(TZ=America/Denver date +%u)
          MT_HOUR=$(TZ=America/Denver date +%H)

          if [ "$MT_DAY" = "5" ] && [ "$MT_HOUR" = "09" ]; then
            echo "run_alert=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_alert=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo
        if: steps.mt.outputs.run_alert == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find newly added game files
        if: steps.mt.outputs.run_alert == 'true'
        id: changes
        shell: bash
        run: |
          BASE=$(git rev-list -n 1 --before="7 days ago" HEAD || true)
          if [ -z "$BASE" ]; then
            BASE=$(git rev-list --max-parents=0 HEAD)
          fi

          mapfile -t NEW_GAMES < <(
            git diff --name-status "$BASE" HEAD |
              awk '$1 == "A" {print $2}' |
              grep -E '\.html$' |
              grep -Ev '(^|/)index\.html$' |
              grep -Ev '(^|/)(test|demo|admin|template|utility|debug|scratch)[^/]*\.html$' || true
          )

          if [ "${#NEW_GAMES[@]}" -eq 0 ]; then
            echo "has_new_games=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_new_games=true" >> "$GITHUB_OUTPUT"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          {
            echo 'game_list<<EOF'
            for file in "${NEW_GAMES[@]}"; do
              title=$(basename "$file" .html | sed 's/-/ /g' | sed 's/\b\w/\U&/g')
              echo "🎮 **$title** — <https://sportomax1.github.io/k2games/$file>"
            done
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Send Discord new game alert
        if: steps.mt.outputs.run_alert == 'true' && steps.changes.outputs.has_new_games == 'true'
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          content: |
            🕹️ **New K2 games added this week!**

            ${{ steps.changes.outputs.game_list }}

            🌐 **K2 Games:** <https://sportomax1.github.io/k2games/index.html>
            🔎 **Weekly changes:** <https://github.com/sportomax1/k2games/compare/${{ steps.changes.outputs.base }}...${{ github.sha }}>

      - name: Skip if no new games
        if: steps.mt.outputs.run_alert == 'true' && steps.changes.outputs.has_new_games != 'true'
        run: echo "No new K2 games were added in the last seven days."