<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fists: Boxing Legends - K2 games</title>
    <style>
        :root {
            --bg: #0f172a;
            --p1: #3b82f6;
            --p2: #ef4444;
            --accent: #fbbf24;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: manipulation; }
        
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 90vmin;
            height: 54vmin; /* 1000:600 ratio */
            max-width: 1000px;
            max-height: 600px;
            background: #000;
            border-radius: 20px;
            border: 8px solid #334155;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        canvas { display: block; width: 100%; height: 100%; }

        /* UI Overlays */
        #hud {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            pointer-events: none;
            z-index: 100;
        }

        .health-bar-container { width: 300px; height: 25px; background: rgba(255,255,255,0.1); border-radius: 50px; border: 2px solid rgba(255,255,255,0.2); overflow: hidden; }
        .health-fill { height: 100%; width: 100%; transition: width 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .p1-health { background: var(--p1); box-shadow: 0 0 15px var(--p1); }
        .p2-health { background: var(--p2); box-shadow: 0 0 15px var(--p2); }

        #timer { font-size: 2.5rem; font-weight: 900; font-family: monospace; color: var(--accent); text-shadow: 0 0 15px rgba(251, 191, 36, 0.5); }

        .screen {
            position: absolute; inset: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center; padding: 20px;
        }

        h1 { font-size: 4rem; font-weight: 900; font-style: italic; margin-bottom: 5px; color: #fff; letter-spacing: -2px; }
        .subtitle { font-size: 1rem; color: var(--accent); text-transform: uppercase; letter-spacing: 4px; margin-bottom: 40px; }

        .char-select { display: flex; gap: 20px; margin-bottom: 40px; }
        .char-card {
            background: var(--glass); border: 2px solid var(--border);
            padding: 20px; border-radius: 24px; cursor: pointer; transition: 0.3s;
            width: 150px; text-align: center;
        }
        .char-card:hover { transform: translateY(-10px); border-color: #fff; }
        .char-card.active { border-color: var(--p1); background: rgba(59, 130, 246, 0.1); box-shadow: 0 0 30px rgba(59, 130, 246, 0.2); }
        .char-emoji { font-size: 4rem; display: block; margin-bottom: 10px; }
        .char-name { font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .controls-guide {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.05);
            padding: 15px 30px;
            border-radius: 20px;
            font-size: 0.8rem;
            text-align: left;
        }
        .guide-item { display: flex; align-items: center; gap: 10px; }
        .key { background: #fff; color: #000; padding: 2px 8px; border-radius: 4px; font-weight: 900; min-width: 30px; text-align: center; }

        .btn {
            background: var(--p1); color: white; border: none; padding: 15px 60px;
            border-radius: 50px; font-weight: 900; font-size: 1.2rem; cursor: pointer;
            text-transform: uppercase; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
            transition: 0.2s;
        }
        .btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* Mobile Controls */
        #mobile-controls {
            position: absolute; bottom: 30px; left: 0; right: 0;
            display: none; justify-content: space-between; padding: 0 40px;
            z-index: 200; pointer-events: none;
        }
        @media (max-width: 900px) { 
            #mobile-controls { display: flex; } 
            .controls-guide { display: none; }
        }

        .control-group { display: flex; gap: 15px; pointer-events: auto; }
        .circle-btn {
            width: 85px; height: 85px; border-radius: 50%;
            background: rgba(0,0,0,0.4); border: 3px solid rgba(255,255,255,0.5);
            color: white; display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; font-weight: 900; backdrop-filter: blur(10px);
            pointer-events: auto;
        }
        .circle-btn:active { background: white; color: #000; transform: scale(0.9); }

        .action-btn { background: rgba(239, 68, 68, 0.5); border-color: var(--p2); }

        .back-link {
            position: fixed; top: 20px; left: 20px; color: white; text-decoration: none;
            background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 12px; z-index: 1100;
            font-weight: bold; font-size: 0.8rem;
        }
        .hidden { display: none !important; }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];

</head>
<body>
    <a href="index.html" class="back-link">← HUB</a>

    <div id="game-container">
        <div id="hud" class="hidden">
            <div class="health-bar-container"><div id="p1-hp" class="health-fill p1-health"></div></div>
            <div id="timer">60</div>
            <div class="health-bar-container"><div id="p2-hp" class="health-fill p2-health"></div></div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="mobile-controls" class="hidden">
            <div class="control-group">
                <div class="circle-btn" id="btn-left">←</div>
                <div class="circle-btn" id="btn-right">→</div>
            </div>
            <div class="control-group">
                <div class="circle-btn action-btn" id="btn-punch">PUNCH</div>
                <div class="circle-btn action-btn" id="btn-kick" style="background: rgba(59, 130, 246, 0.2); border-color: var(--p1); color: var(--p1);">KICK</div>
            </div>
        </div>

        <div id="menu-screen" class="screen">
            <h1>FISTS</h1>
            <div class="subtitle">BOXING LEGENDS</div>
            
            <div class="char-select">
                <div class="char-card active" onclick="selectChar(0, this)">
                    <span class="char-emoji">🥊</span>
                    <span class="char-name">Brutus</span>
                </div>
                <div class="char-card" onclick="selectChar(1, this)">
                    <span class="char-emoji">🥋</span>
                    <span class="char-name">Kenji</span>
                </div>
                <div class="char-card" onclick="selectChar(2, this)">
                    <span class="char-emoji">🦾</span>
                    <span class="char-name">Cyborg</span>
                </div>
            </div>

            <div class="controls-guide">
                <div class="guide-item"><span class="key">←</span> <span class="key">→</span> MOVE</div>
                <div class="guide-item"><span class="key">A</span> PUNCH</div>
                <div class="guide-item"><span class="key">S</span> KICK</div>
                <div style="font-style: italic; opacity: 0.7;">iPhone: Use On-Screen Buttons</div>
            </div>

            <button class="btn" onclick="startGame()">Enter Ring</button>
        </div>

        <div id="over-screen" class="screen hidden">
            <h1 id="result-title">KO!</h1>
            <p id="result-msg" style="font-size: 1.5rem; margin-bottom: 30px;"></p>
            <button class="btn" onclick="location.reload()">New Match</button>
        </div>
    </div>

    <script>
        const CHARS = ['🥊', '🥋', '🦾'];
        let game, selectedCharIdx = 0;

        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.width = 1000;
                this.height = 600;
                this.canvas.width = this.width;
                this.canvas.height = this.height;
                
                this.p1 = { x: 300, y: 480, hp: 100, state: 'idle', frame: 0, dir: 1, color: '#3b82f6', skin: '#ffdbac' };
                this.p2 = { x: 700, y: 480, hp: 100, state: 'idle', frame: 0, dir: -1, color: '#ef4444', skin: '#8d5524' };
                
                this.keys = {};
                this.timer = 60;
                this.lastTime = Date.now();
                this.isPlaying = false;
            }

            init() {
                this.isPlaying = true;
                this.setupInputs();
                this.loop();
            }

            setupInputs() {
                window.onkeydown = e => this.keys[e.code] = true;
                window.onkeyup = e => this.keys[e.code] = false;

                const mapping = { 'btn-left': 'ArrowLeft', 'btn-right': 'ArrowRight', 'btn-punch': 'KeyA', 'btn-kick': 'KeyS' };
                Object.entries(mapping).forEach(([id, key]) => {
                    const el = document.getElementById(id);
                    el.ontouchstart = (e) => { e.preventDefault(); this.keys[key] = true; };
                    el.ontouchend = () => this.keys[key] = false;
                });
            }

            update() {
                if(!this.isPlaying) return;

                // Gamepad
                const pads = navigator.getGamepads();
                if (pads[0]) {
                    const p = pads[0], ax = p.axes[0], ay = p.axes[1], b = p.buttons;
                    this.keys['ArrowLeft'] = ax < -0.3 || b[14].pressed;
                    this.keys['ArrowRight'] = ax > 0.3 || b[15].pressed;
                    this.keys['KeyA'] = b[0].pressed || b[2].pressed;
                    this.keys['KeyS'] = b[1].pressed || b[3].pressed;
                }

                if(Date.now() - this.lastTime > 1000) {
                    this.timer--;
                    document.getElementById('timer').textContent = this.timer;
                    this.lastTime = Date.now();
                    if(this.timer <= 0) this.resolveMatch();
                }

                // P1 Movement
                if(this.keys['ArrowLeft'] || this.keys['KeyA_moved']) this.p1.x -= 5;
                if(this.keys['ArrowRight'] || this.keys['KeyD_moved']) this.p1.x += 5;
                
                if(this.keys['KeyA'] && this.p1.state === 'idle') this.attack(this.p1, this.p2, 5, 'punch');
                if(this.keys['KeyS'] && this.p1.state === 'idle') this.attack(this.p1, this.p2, 10, 'kick');

                this.p1.x = Math.max(50, Math.min(this.width-50, this.p1.x));

                // AI P2
                if(this.p2.state === 'idle') {
                    if(Math.abs(this.p1.x - this.p2.x) > 120) {
                        this.p2.x += (this.p1.x > this.p2.x ? 3 : -3);
                    } else if(Math.random() < 0.05) {
                        this.attack(this.p2, this.p1, 5, 'punch');
                    }
                }

                document.getElementById('p1-hp').style.width = this.p1.hp + '%';
                document.getElementById('p2-hp').style.width = this.p2.hp + '%';

                if(this.p1.hp <= 0 || this.p2.hp <= 0) this.resolveMatch();
            }

            attack(attacker, target, damage, type) {
                attacker.state = type;
                attacker.frame = 20;
                if(Math.abs(attacker.x - target.x) < 150) {
                    target.hp -= damage;
                    target.x += attacker.dir * 30;
                }
            }

            resolveMatch() {
                this.isPlaying = false;
                document.getElementById('over-screen').classList.remove('hidden');
                document.getElementById('result-msg').textContent = this.p1.hp > this.p2.hp ? "BRUTUS WINS BY KO!" : "YOU WERE DEFEATED!";
            }

            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.width, this.height);

                // Floor
                ctx.fillStyle = '#1e293b';
                ctx.fillRect(0, 500, this.width, 100);
                ctx.fillStyle = '#334155';
                ctx.fillRect(0, 500, this.width, 5);

                this.drawFighter(this.p1);
                this.drawFighter(this.p2);
            }

            drawFighter(f) {
                const ctx = this.ctx;
                ctx.save();
                ctx.translate(f.x, f.y);
                ctx.scale(f.dir, 1);

                const t = Date.now() * 0.01;
                const bob = f.state === 'idle' ? Math.sin(t) * 5 : 0;
                
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath(); ctx.ellipse(0, 10, 50, 15, 0, 0, Math.PI*2); ctx.fill();

                // Realistic Skin Gradient (Muscles)
                const skinGrad = ctx.createLinearGradient(-30, -110, 30, -110);
                skinGrad.addColorStop(0, f.skin);
                skinGrad.addColorStop(0.5, 'rgba(255,255,255,0.2)'); // Muscle Highlight
                skinGrad.addColorStop(1, f.skin);

                // Torso
                ctx.fillStyle = skinGrad;
                ctx.beginPath(); ctx.roundRect(-35, -115 + bob, 70, 95, 20); ctx.fill();
                
                // Muscle Lines (Abs)
                ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 2;
                for(let i=0; i<3; i++) {
                    ctx.beginPath(); ctx.moveTo(-15, -85 + i*12 + bob); ctx.lineTo(15, -85 + i*12 + bob); ctx.stroke();
                }

                // Legs
                ctx.strokeStyle = '#111'; ctx.lineWidth = 14;
                ctx.beginPath(); ctx.moveTo(-18, -15); ctx.lineTo(-25, 12); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(18, -15); ctx.lineTo(25, 12); ctx.stroke();

                // Arms & Punch Logic
                ctx.strokeStyle = f.skin; ctx.lineWidth = 18;
                let punchExt = 0;
                if(f.state === 'punch') punchExt = Math.sin(f.frame * 0.2) * 100;
                
                // Back Arm
                ctx.beginPath(); ctx.moveTo(-30, -100 + bob); ctx.lineTo(-55, -75 + bob); ctx.stroke();
                
                // Front Arm
                ctx.beginPath(); ctx.moveTo(30, -100 + bob); 
                if(f.state === 'punch') ctx.lineTo(30 + punchExt, -100 + bob);
                else ctx.lineTo(60, -75 + bob);
                ctx.stroke();

                // Gloves
                ctx.fillStyle = f.color;
                ctx.shadowBlur = 5; ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.beginPath(); ctx.arc(30 + punchExt, f.state==='punch'?-100+bob:-75+bob, 22, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(-55, -75 + bob, 22, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;

                // Head
                ctx.fillStyle = f.skin;
                ctx.beginPath(); ctx.arc(0, -140 + bob, 28, 0, Math.PI*2); ctx.fill();
                // Face details (simplified eyes)
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath(); ctx.arc(12, -142 + bob, 3, 0, Math.PI*2); ctx.fill();

                ctx.restore();
            }

            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        }

        function selectChar(idx, el) {
            selectedCharIdx = idx;
            document.querySelectorAll('.char-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function startGame() {
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('mobile-controls').classList.remove('hidden');
            document.getElementById('menu-screen').classList.add('hidden');
            game = new Game();
            game.init();
        }
    </script>
</body>
</html>
