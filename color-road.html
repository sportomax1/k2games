<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Color Road | K2 Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d0d14;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Segoe UI',sans-serif;touch-action:none;user-select:none;}
canvas{display:block;touch-action:none;}
#score-display{position:fixed;top:0;left:0;right:0;text-align:center;padding-top:26px;pointer-events:none;z-index:5;}
#score{font-size:3rem;font-weight:900;color:#fff;letter-spacing:2px;text-shadow:0 0 24px rgba(255,255,255,0.25);}
#best-row{font-size:.68rem;color:rgba(255,255,255,0.35);letter-spacing:3px;margin-top:-4px;}
#start-screen,#mode-screen,#gameover-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.78);backdrop-filter:blur(12px);pointer-events:auto;z-index:10;}
#start-screen h1,#mode-screen h1{font-size:4rem;font-weight:900;color:#fff;letter-spacing:5px;margin-bottom:4px;}
#mode-screen{display:none;}
#mode-screen h2{font-size:2.2rem;color:rgba(255,255,255,0.7);margin-bottom:40px;}
.mode-btn{background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.22);color:#fff;padding:20px 48px;border-radius:60px;font-size:1rem;font-weight:700;letter-spacing:2px;cursor:pointer;margin:12px;animation:pb 2s ease-in-out infinite;min-width:180px;}
.mode-btn:hover{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.35);}
.sub{font-size:.72rem;color:rgba(255,255,255,0.4);letter-spacing:4px;margin-bottom:50px;}
.btn{background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.22);color:#fff;padding:16px 52px;border-radius:60px;font-size:.9rem;font-weight:700;letter-spacing:3px;cursor:pointer;animation:pb 2s ease-in-out infinite;}
@keyframes pb{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
#gameover-screen{display:none;}
#gameover-screen h2{font-size:2.4rem;font-weight:900;color:#fff;letter-spacing:2px;margin-bottom:6px;}
#go-score{font-size:5.5rem;font-weight:900;background:linear-gradient(135deg,#f472b6,#818cf8,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:4px;}
.go-best{font-size:.7rem;color:rgba(255,255,255,0.38);letter-spacing:3px;margin-bottom:10px;}
#new-best{color:#fbbf24;font-weight:700;font-size:.82rem;letter-spacing:2px;margin-bottom:30px;display:none;}
.back-btn{position:fixed;top:18px;left:18px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:9px 18px;border-radius:30px;font-size:.73rem;font-weight:700;letter-spacing:1px;text-decoration:none;pointer-events:auto;z-index:20;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="score-display">
  <div id="score">0</div>
  <div id="best-row">BEST: <span id="best-val">0</span></div>
</div>
<div id="start-screen">
  <a href="index.html" class="back-btn">↖ VAULT</a>
  <h1>COLOR ROAD</h1>
  <div class="sub">SELECT A MODE</div>
  <button class="mode-btn" id="mode1-btn">TILES FALL</button>
  <button class="mode-btn" id="mode2-btn">ROLL TRACK</button>
</div>
<div id="mode-screen">
  <a href="index.html" class="back-btn">↖ VAULT</a>
  <h1>COLOR ROAD</h1>
  <h2 id="mode-title"></h2>
  <div class="sub" id="mode-desc"></div>
  <div class="btn" id="mode-play-btn">TAP TO PLAY</div>
</div>
<div id="gameover-screen">
  <a href="index.html" class="back-btn">↖ VAULT</a>
  <h2>GAME OVER</h2>
  <div id="go-score">0</div>
  <div class="go-best">BEST: <span id="go-best">0</span></div>
  <div id="new-best">🏆 NEW BEST!</div>
  <div class="btn" id="retry-btn">PLAY AGAIN</div>
  <button class="mode-btn" style="margin-top:20px;min-width:140px;" id="back-to-modes">CHANGE MODE</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, DPR;

const PALETTE = [
  {name:'pink',  hex:'#f472b6', light:'#fda4cf', dark:'#9d174d'},
  {name:'blue',  hex:'#818cf8', light:'#a5b4fc', dark:'#3730a3'},
  {name:'green', hex:'#4ade80', light:'#86efac', dark:'#166534'},
  {name:'yellow',hex:'#fbbf24', light:'#fde68a', dark:'#92400e'},
  {name:'orange',hex:'#fb923c', light:'#fdba74', dark:'#9a3412'},
  {name:'purple',hex:'#c084fc', light:'#e9d5ff', dark:'#581c87'},
  {name:'red',   hex:'#f87171', light:'#fca5a5', dark:'#991b1b'},
  {name:'cyan',  hex:'#22d3ee', light:'#67e8f9', dark:'#0e7490'},
];
const NUM_COLORS = 4;
let activeColors = [];
let best = parseInt(localStorage.getItem('colorroad_best') || '0');
document.getElementById('best-val').innerText = best;

// ── LAYOUT ────────────────────────────────────────────────────────────────────
const BTN_AREA_H = 118, SEG_H = 88, BALL_R = 22;
let ROAD_HW, ballX, ballY, btnY, btnH, btnW, btnGap, btnStartX;

function resize() {
  DPR = window.devicePixelRatio || 1;
  W = Math.min(window.innerWidth, 520);
  H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ROAD_HW = Math.round(W * 0.30);
  ballX = W / 2;
  ballY = H - BTN_AREA_H - 58;
  btnH = 64; btnGap = 10;
  btnW = (W - 32 - btnGap * (NUM_COLORS - 1)) / NUM_COLORS;
  btnStartX = 16;
  btnY = H - BTN_AREA_H + (BTN_AREA_H - btnH) / 2;
}
resize();
window.addEventListener('resize', () => {
  resize();
  if (gameState === 'playing') resetGameForMode();
});

// ── STATE ────────────────────────────────────────────────────────────────────
let gameState = 'mode-select';
let gameMode = 1;
let score = 0, ballColorIdx = 0;
let screenShake = 0, particles = [], lt = 0;

// Mode 1: Tiles Fall
let tiles = [];
let speed = 0, baseSpeed = 2.4, combo = 0;

// Mode 2: Rolling Track
let playerX = 0, playerY = 0;
let obstacles = [];
let checkpoints = [];
let trackY = 0;
let baseTrackSpeed = 3.2;
let trackSpeed = baseTrackSpeed;
let laneWidth = W * 0.32;
const PLAYER_LANE_Y = H - BTN_AREA_H - 120;
const PLAYER_RADIUS = 16;
const OBSTACLE_RADIUS = 20;

// ── HELPERS ──────────────────────────────────────────────────────────────────
function pickActiveColors() {
  activeColors = [...PALETTE].sort(() => Math.random() - 0.5).slice(0, NUM_COLORS);
}
function randColor() { return activeColors[Math.floor(Math.random() * NUM_COLORS)]; }
function getBallColor() { return activeColors[ballColorIdx]; }
function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}
function burst(x, y, c) {
  for (let i = 0; i < 20; i++) {
    const a = Math.random() * Math.PI * 2, s = 60 + Math.random() * 160;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 90,
      r: 2.5 + Math.random() * 5, color: c.hex, life: 1 });
  }
}

// ────────────────────────────────────────────────────────────────────────────── MODE 1: TILES FALL ─
function makeTile(y, c) { return { y, color: c, passed: false, flash: 0 }; }

function maintainTiles() {
  tiles = tiles.filter(t => t.y < H + SEG_H);
  while (tiles.length < 10) {
    const top = tiles[tiles.length - 1];
    const ny = top ? top.y - (SEG_H * 2.0) : -SEG_H;
    tiles.push(makeTile(ny, randColor()));
  }
}

function resetMode1() {
  tiles = [];
  tiles.push(makeTile(-(SEG_H * 2.0), activeColors[ballColorIdx]));
  tiles.push(makeTile(-(SEG_H * 2.0) * 2, activeColors[ballColorIdx]));
  tiles.push(makeTile(-(SEG_H * 2.0) * 3, activeColors[ballColorIdx]));
  maintainTiles();
  score = 0; speed = baseSpeed; combo = 0; screenShake = 0; particles = [];
  document.getElementById('score').innerText = '0';
}

function updateMode1(now) {
  const dt = Math.min((now - lt) / 1000, 0.05);
  const px = speed * 60 * dt;
  tiles.forEach(t => { t.y += px; if (t.flash > 0) t.flash -= dt * 3.5; });
  maintainTiles();
  particles.forEach(p => { p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 290 * dt; p.life -= dt * 1.8; });
  particles = particles.filter(p => p.life > 0);

  for (const t of tiles) {
    if (t.passed) continue;
    if (t.y <= ballY + BALL_R && t.y + SEG_H >= ballY - BALL_R) {
      t.passed = true;
      const bc = getBallColor();
      if (t.color.name === bc.name) {
        score++; combo++;
        t.flash = 1;
        burst(ballX, ballY, t.color);
        document.getElementById('score').innerText = score;
        if (score > best) { best = score; localStorage.setItem('colorroad_best', best); document.getElementById('best-val').innerText = best; }
        speed = baseSpeed + Math.sqrt(score) * 0.25;
      } else {
        screenShake = 16; combo = 0;
        gameState = 'dying';
        setTimeout(showGameOver, 450);
      }
      break;
    }
  }
}

function drawMode1() {
  const rx = ballX - ROAD_HW, tw = ROAD_HW * 2;
  ctx.fillStyle = '#0d0d14'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,255,255,0.022)'; ctx.fillRect(rx, 0, tw, H - BTN_AREA_H);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(rx, 0); ctx.lineTo(rx, H - BTN_AREA_H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rx + tw, 0); ctx.lineTo(rx + tw, H - BTN_AREA_H); ctx.stroke();

  const g = ctx.createLinearGradient(0, ballY - 28, 0, ballY + 28);
  g.addColorStop(0, 'transparent'); g.addColorStop(0.5, 'rgba(255,255,255,0.05)'); g.addColorStop(1, 'transparent');
  ctx.fillStyle = g; ctx.fillRect(rx, ballY - 28, tw, 56);
  ctx.save(); ctx.strokeStyle = 'rgba(255,255,255,0.13)'; ctx.lineWidth = 1.5;
  ctx.setLineDash([5, 9]); ctx.beginPath(); ctx.moveTo(rx, ballY); ctx.lineTo(rx + tw, ballY); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();

  tiles.forEach(t => {
    if (t.y + SEG_H < 0 || t.y >= H) return;
    const c = t.color; ctx.save();
    if (t.flash > 0) { ctx.globalAlpha = Math.min(t.flash * 0.65, 0.65); ctx.fillStyle = '#fff'; ctx.fillRect(rx, t.y, tw, SEG_H); ctx.globalAlpha = 1; }
    const gg = ctx.createLinearGradient(rx, 0, rx + tw, 0);
    gg.addColorStop(0, c.dark); gg.addColorStop(0.15, c.hex); gg.addColorStop(0.5, c.light);
    gg.addColorStop(0.85, c.hex); gg.addColorStop(1, c.dark);
    ctx.globalAlpha = t.flash > 0 ? 0.65 : 1;
    ctx.fillStyle = gg; ctx.fillRect(rx, t.y, tw, SEG_H);
    ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fillRect(rx, t.y, tw, 2);
    ctx.strokeStyle = 'rgba(0,0,0,0.22)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(rx, t.y); ctx.lineTo(rx + tw, t.y); ctx.stroke();
    ctx.font = 'bold 13px Segoe UI'; ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText(c.name.toUpperCase(), ballX, t.y + SEG_H / 2 + 5);
    ctx.restore();
  });

  const fade = ctx.createLinearGradient(0, 0, 0, 72);
  fade.addColorStop(0, '#0d0d14'); fade.addColorStop(1, 'transparent');
  ctx.fillStyle = fade; ctx.fillRect(ballX - ROAD_HW, 0, ROAD_HW * 2, 72);

  const c = getBallColor(), x = ballX, y = ballY, r = BALL_R;
  const gr = ctx.createRadialGradient(x, y, 0, x, y, r * 3);
  gr.addColorStop(0, c.hex + '44'); gr.addColorStop(1, 'transparent');
  ctx.fillStyle = gr; ctx.beginPath(); ctx.arc(x, y, r * 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x, y + 4, r, 0, Math.PI * 2); ctx.fillStyle = 'rgba(0,0,0,0.32)'; ctx.fill();
  const sg = ctx.createRadialGradient(x - r * 0.3, y - r * 0.32, r * 0.06, x, y, r);
  sg.addColorStop(0, c.light); sg.addColorStop(0.55, c.hex); sg.addColorStop(1, c.dark);
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fillStyle = sg; ctx.fill();
  ctx.beginPath(); ctx.arc(x - r * 0.28, y - r * 0.28, r * 0.22, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.62)'; ctx.fill();

  ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, H - BTN_AREA_H, W, BTN_AREA_H);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, H - BTN_AREA_H); ctx.lineTo(W, H - BTN_AREA_H); ctx.stroke();

  activeColors.forEach((col, i) => {
    const bx = btnStartX + i * (btnW + btnGap);
    const isActive = i === ballColorIdx;
    ctx.save();
    if (isActive) { ctx.shadowBlur = 30; ctx.shadowColor = col.hex + 'cc'; }
    const gg = ctx.createLinearGradient(bx, btnY, bx, btnY + btnH);
    gg.addColorStop(0, col.light); gg.addColorStop(1, col.dark);
    rr(bx, btnY, btnW, btnH, 14);
    ctx.fillStyle = gg; ctx.fill();
    if (isActive) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; rr(bx, btnY, btnW, btnH, 14); ctx.stroke();
      ctx.beginPath(); ctx.arc(bx + btnW / 2, btnY + btnH / 2 - 4, 7, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.fill();
    } else { ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1; rr(bx, btnY, btnW, btnH, 14); ctx.stroke(); }
    ctx.font = 'bold 10px Segoe UI'; ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.fillText(String(i + 1), bx + btnW / 2, btnY + btnH - 7);
    ctx.restore();
  });

  particles.forEach(p => {
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color; ctx.globalAlpha = p.life * 0.9; ctx.fill();
  });
  ctx.globalAlpha = 1;

  if (combo < 3) return;
  ctx.save();
  const sz = Math.min(14 + combo * 0.5, 22);
  ctx.font = '900 ' + sz + 'px Segoe UI';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,' + Math.min(0.25 + combo / 30, 0.8) + ')';
  ctx.fillText(combo + '× COMBO', W / 2, ballY - 52);
  ctx.restore();
}

// ────────────────────────────────────────────────────────────────────────────── MODE 2: ROLLING TRACK ─
function resetMode2() {
  playerX = 0; playerY = PLAYER_LANE_Y;
  obstacles = [];
  checkpoints = [];
  trackY = 0;
  trackSpeed = baseTrackSpeed;
  score = 0;
  ballColorIdx = 0;
  screenShake = 0;
  particles = [];
  document.getElementById('score').innerText = '0';
  // spawn initial obstacles
  for (let i = 0; i < 6; i++) {
    const ty = -200 - i * 160;
    obstacles.push({y: ty, x: (Math.random() - 0.5) * W * 0.5, color: randColor(), passed: false});
  }
  // spawn first checkpoint
  checkpoints.push({y: -400, color: randColor(), passed: false});
}

function updateMode2(now) {
  const dt = Math.min((now - lt) / 1000, 0.05);
  trackY += trackSpeed * 60 * dt;

  // handle input
  if (keys.left) playerX = Math.max(-laneWidth, playerX - 180 * dt);
  if (keys.right) playerX = Math.min(laneWidth, playerX + 180 * dt);

  // move obstacles and checkpoints
  obstacles.forEach(ob => { ob.y += trackSpeed * 60 * dt; });
  checkpoints.forEach(cp => { cp.y += trackSpeed * 60 * dt; });

  // clean up far obstacles/checkpoints
  obstacles = obstacles.filter(ob => ob.y < H + 100);
  checkpoints = checkpoints.filter(cp => cp.y < H + 100);

  // spawn new obstacles
  const lastOb = obstacles[obstacles.length - 1];
  if (!lastOb || lastOb.y > -100) {
    const ty = (lastOb || {y: 0}).y - 160;
    const lane = Math.random() < 0.5 ? -1 : 1;
    obstacles.push({y: ty, x: lane * laneWidth * 0.6 + (Math.random() - 0.5) * 30, color: randColor(), passed: false});
  }

  // spawn new checkpoint
  const lastCp = checkpoints[checkpoints.length - 1];
  if (!lastCp || lastCp.y > 0) {
    checkpoints.push({y: (lastCp || {y: 0}).y - 320, color: randColor(), passed: false});
  }

  // collision detection
  particles.forEach(p => { p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 290 * dt; p.life -= dt * 1.8; });
  particles = particles.filter(p => p.life > 0);

  for (const ob of obstacles) {
    if (ob.passed) continue;
    const dist = Math.hypot(playerX - ob.x, playerY - ob.y);
    if (dist < PLAYER_RADIUS + OBSTACLE_RADIUS) {
      ob.passed = true;
      if (ob.color.name === getBallColor().name) {
        score++;
        burst(playerX, playerY, ob.color);
        document.getElementById('score').innerText = score;
        if (score > best) { best = score; localStorage.setItem('colorroad_best', best); document.getElementById('best-val').innerText = best; }
        trackSpeed = baseTrackSpeed + Math.sqrt(score) * 0.22;
      } else {
        screenShake = 16;
        gameState = 'dying';
        setTimeout(showGameOver, 450);
        return;
      }
    }
  }

  for (const cp of checkpoints) {
    if (cp.passed) continue;
    const dist = Math.hypot(playerX - (W / 2), playerY - cp.y);
    if (dist < PLAYER_RADIUS + 28) {
      cp.passed = true;
      ballColorIdx = activeColors.findIndex(c => c.name === cp.color.name);
      if (ballColorIdx === -1) ballColorIdx = 0;
      burst(playerX, playerY, cp.color);
    }
  }
}

function drawMode2() {
  ctx.fillStyle = '#0d0d14'; ctx.fillRect(0, 0, W, H);
  // track lanes
  const lx1 = W / 2 - laneWidth, lx2 = W / 2 + laneWidth;
  ctx.fillStyle = 'rgba(255,255,255,0.03)'; ctx.fillRect(lx1, 0, laneWidth * 2, H - BTN_AREA_H);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(lx1, 0); ctx.lineTo(lx1, H - BTN_AREA_H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lx2, 0); ctx.lineTo(lx2, H - BTN_AREA_H); ctx.stroke();

  // draw dashed line as track separator
  ctx.save(); ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
  ctx.setLineDash([8, 8]);
  const doff = (trackY / 20) % 16;
  ctx.beginPath(); ctx.moveTo(W / 2, -doff); ctx.lineTo(W / 2, H); ctx.stroke();
  ctx.restore();

  // obstacles
  obstacles.forEach(ob => {
    const dist = Math.hypot(playerX - ob.x, playerY - ob.y);
    if (ob.y > H) return;
    const obScreenX = W / 2 + ob.x;
    ctx.beginPath(); ctx.arc(obScreenX, ob.y, OBSTACLE_RADIUS, 0, Math.PI * 2);
    ctx.fillStyle = ob.color.hex;
    if (dist < PLAYER_RADIUS + OBSTACLE_RADIUS + 20) {
      ctx.shadowBlur = 20; ctx.shadowColor = ob.color.hex + 'aa';
    }
    ctx.fill();
    ctx.beginPath(); ctx.arc(obScreenX, ob.y - OBSTACLE_RADIUS * 0.5, OBSTACLE_RADIUS * 0.35, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.fill();
    ctx.shadowBlur = 0;
  });

  // checkpoints
  checkpoints.forEach(cp => {
    if (cp.y > H) return;
    ctx.save();
    ctx.globalAlpha = cp.passed ? 0.4 : 1;
    ctx.beginPath(); ctx.arc(W / 2, cp.y, 28, 0, Math.PI * 2);
    ctx.fillStyle = cp.color.hex;
    ctx.shadowBlur = 25; ctx.shadowColor = cp.color.hex;
    ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 18px Segoe UI'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('⭐', W / 2, cp.y);
    ctx.restore();
  });

  // player ball
  const pbx = W / 2 + playerX, pby = playerY;
  const pc = getBallColor();
  const pgr = ctx.createRadialGradient(pbx, pby, 0, pbx, pby, PLAYER_RADIUS * 3);
  pgr.addColorStop(0, pc.hex + '44'); pgr.addColorStop(1, 'transparent');
  ctx.fillStyle = pgr; ctx.beginPath(); ctx.arc(pbx, pby, PLAYER_RADIUS * 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(pbx, pby + 3, PLAYER_RADIUS, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fill();
  const psg = ctx.createRadialGradient(pbx - PLAYER_RADIUS * 0.3, pby - PLAYER_RADIUS * 0.3, PLAYER_RADIUS * 0.06, pbx, pby, PLAYER_RADIUS);
  psg.addColorStop(0, pc.light); psg.addColorStop(0.55, pc.hex); psg.addColorStop(1, pc.dark);
  ctx.beginPath(); ctx.arc(pbx, pby, PLAYER_RADIUS, 0, Math.PI * 2);
  ctx.fillStyle = psg; ctx.fill();
  ctx.beginPath(); ctx.arc(pbx - PLAYER_RADIUS * 0.28, pby - PLAYER_RADIUS * 0.28, PLAYER_RADIUS * 0.2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.fill();

  particles.forEach(p => {
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color; ctx.globalAlpha = p.life * 0.9; ctx.fill();
  });
  ctx.globalAlpha = 1;

  // bottom panel
  ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, H - BTN_AREA_H, W, BTN_AREA_H);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, H - BTN_AREA_H); ctx.lineTo(W, H - BTN_AREA_H); ctx.stroke();

  // left/right buttons or hints
  ctx.font = 'bold 11px Segoe UI'; ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillText('← SWIPE / ARROW KEYS →', W / 2, H - 20);
}

function resetGameForMode() {
  if (gameMode === 1) resetMode1();
  else resetMode2();
}

// ────────────────────────────────────────────────────────────────────────────── MAIN LOOP ─
let keys = {left: false, right: false};

document.addEventListener('keydown', e => {
  if (gameState === 'mode-select') {
    if (e.key === '1') selectMode(1);
    if (e.key === '2') selectMode(2);
    return;
  }
  if (gameState === 'idle') return;
  if (gameState === 'playing') {
    if (gameMode === 1) {
      const n = parseInt(e.key);
      if (n >= 1 && n <= NUM_COLORS) { ballColorIdx = n - 1; return; }
      if (e.code === 'Space' || e.code === 'ArrowRight') { e.preventDefault(); ballColorIdx = (ballColorIdx + 1) % NUM_COLORS; }
      if (e.code === 'ArrowLeft') { e.preventDefault(); ballColorIdx = (ballColorIdx + NUM_COLORS - 1) % NUM_COLORS; }
    } else {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
    }
  }
}, {passive: false});

document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
});

let touchStartX = 0;
canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (gameState === 'mode-select') return;
  if (gameState === 'idle') return;
  touchStartX = e.clientX;
  if (gameState === 'playing' && gameMode === 1) {
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    let hit = false;
    activeColors.forEach((_, i) => {
      const bx = btnStartX + i * (btnW + btnGap);
      if (cx >= bx && cx <= bx + btnW && cy >= btnY && cy <= btnY + btnH) {
        ballColorIdx = i; hit = true;
      }
    });
    if (!hit) ballColorIdx = (ballColorIdx + 1) % NUM_COLORS;
  }
}, {passive: false});

canvas.addEventListener('pointermove', e => {
  if (gameState === 'playing' && gameMode === 2) {
    const dx = e.clientX - touchStartX;
    if (dx < -30) keys.left = true; else keys.left = false;
    if (dx > 30) keys.right = true; else keys.right = false;
  }
});

canvas.addEventListener('pointerup', () => {
  keys.left = false; keys.right = false;
});

function frame(now) {
  requestAnimationFrame(frame);
  if (gameState !== 'playing') { lt = now; return; }

  update(now);
  lt = now;

  ctx.save();
  if (screenShake > 0) {
    ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake * 0.5);
    screenShake *= 0.72;
    if (screenShake < 0.5) screenShake = 0;
  }

  if (gameMode === 1) drawMode1();
  else drawMode2();

  ctx.restore();
}

function update(now) {
  if (gameState !== 'playing') return;
  if (gameMode === 1) updateMode1(now);
  else updateMode2(now);
}

function showGameOver() {
  document.getElementById('go-score').innerText = score;
  document.getElementById('go-best').innerText = best;
  document.getElementById('new-best').style.display = (score > 0 && score === best) ? 'block' : 'none';
  document.getElementById('gameover-screen').style.display = 'flex';
  gameState = 'gameover';
}

function selectMode(mode) {
  gameMode = mode;
  const titles = {1: 'TILES FALL', 2: 'ROLL TRACK'};
  const descs = {1: 'TAP COLOR BUTTONS AS TILES ARRIVE', 2: 'DODGE RED BALLS, COLLECT MATCHING COLORS'};
  document.getElementById('mode-title').innerText = titles[mode];
  document.getElementById('mode-desc').innerText = descs[mode];
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('mode-screen').style.display = 'flex';
}

document.getElementById('mode1-btn').onclick = () => selectMode(1);
document.getElementById('mode2-btn').onclick = () => selectMode(2);

document.getElementById('mode-play-btn').onclick = () => {
  document.getElementById('mode-screen').style.display = 'none';
  pickActiveColors();
  ballColorIdx = 0;
  resetGameForMode();
  gameState = 'playing';
};

document.getElementById('retry-btn').onclick = () => {
  document.getElementById('gameover-screen').style.display = 'none';
  pickActiveColors();
  ballColorIdx = 0;
  resetGameForMode();
  gameState = 'playing';
};

document.getElementById('back-to-modes').onclick = () => {
  document.getElementById('gameover-screen').style.display = 'none';
  document.getElementById('mode-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
  gameState = 'mode-select';
};

pickActiveColors();
ballColorIdx = 0;
requestAnimationFrame(frame);
</script>
</body>
