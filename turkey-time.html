<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turkey Time: Bowling Elite - K2 games</title>
    <style>
        :root {
            --lane: #eab308;
            --gutter: #334155;
            --bg: #0f172a;
            --accent: #f59e0b;
            --text: #f8fafc;
            --panel: rgba(30, 41, 59, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        nav {
            height: 50px; width: 100%; padding: 0 1.5rem;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo { font-weight: 900; font-size: 1rem; color: var(--accent); }
        .back-link { color: #94a3b8; text-decoration: none; font-size: 0.8rem; font-weight: bold; }

        #game-container {
            position: relative;
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        #scoreboard {
            width: 95%; max-width: 850px;
            background: var(--panel); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px;
            padding: 8px; display: flex; gap: 4px; margin-top: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow-x: auto;
        }

        .frame {
            flex: 1; min-width: 65px; height: 55px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; display: flex; flex-direction: column;
            align-items: center; justify-content: space-between; padding: 4px;
        }
        .frame.active { border-color: var(--accent); background: rgba(245, 158, 11, 0.15); }
        
        .rolls { display: flex; width: 100%; justify-content: flex-end; gap: 4px; font-size: 0.75rem; font-weight: 900; }
        .roll { width: 20px; text-align: center; border-bottom: 2px solid rgba(255,255,255,0.2); }
        .frame-total { font-size: 1.1rem; font-weight: 900; color: var(--accent); }

        canvas {
            background: #1e293b; border-radius: 12px;
            max-width: 100%; max-height: 72vh;
            border: 4px solid #334155;
            cursor: crosshair;
        }

        #overlay {
            position: absolute; inset: 0; background: rgba(15, 23, 42, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; backdrop-filter: blur(10px); text-align: center;
        }

        .btn {
            background: var(--accent); color: #000; border: none; padding: 18px 60px;
            border-radius: 100px; font-weight: 900; cursor: pointer; font-size: 1.4rem;
            margin-top: 25px; box-shadow: 0 15px 30px rgba(245, 158, 11, 0.4);
        }

        .hint { position: absolute; bottom: 20px; color: rgba(255,255,255,0.4); font-size: 0.8rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CCZ9JJGEDP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CCZ9JJGEDP');
    </script>
</head>
<body>
    <nav>
        <div class="logo">K2 TURKEY TIME ELITE</div>
        <a href="index.html" class="back-link">← HUB</a>
    </nav>

    <div id="game-container">
        <div id="scoreboard"></div>
        <canvas id="gameCanvas"></canvas>
        <div class="hint" id="hint-text">Drag to Position • Swipe UP to Bowl</div>

        <div id="overlay">
            <h1 style="font-size: 4rem; color: var(--accent); font-style: italic; font-weight: 900;">TURKEY TIME</h1>
            <p id="final-stats" style="margin: 15px 0; font-size: 1.8rem; font-weight: 800; color: #fff;"></p>
            <button class="btn" onclick="game.start()">START BOWLING</button>
        </div>
    </div>

    <script>
        class BowlingElite {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.width = 450;
                this.height = 700;
                this.canvas.width = this.width;
                this.canvas.height = this.height;

                this.state = 'menu'; 
                this.frames = Array.from({length: 10}, () => ({ rolls: [], cumulative: null }));
                this.currentFrame = 0;
                this.ball = { x: 225, y: 620, r: 22, vx: 0, vy: 0, active: false };
                this.pins = [];
                this.dragData = null;
                this.sweeperY = -50;
                this.sweeping = false;
                
                this.init();
            }

            init() {
                this.renderScoreboard();
                this.setupInputs();
                this.resetPins();
                this.loop();
            }

            setupInputs() {
                const getPos = (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    const t = e.touches ? e.touches[0] : e;
                    return {
                        x: (t.clientX - rect.left) * (this.width / rect.width),
                        y: (t.clientY - rect.top) * (this.height / rect.height)
                    };
                };

                const start = (e) => {
                    if (this.state !== 'aiming') return;
                    const pos = getPos(e);
                    if (Math.abs(pos.y - this.ball.y) < 100) {
                        this.dragData = { startX: pos.x, startY: pos.y, startTime: Date.now() };
                    }
                };

                const move = (e) => {
                    if (this.state !== 'aiming' || !this.dragData) return;
                    const pos = getPos(e);
                    // ALLOW LATERAL POSITIONING
                    this.ball.x = Math.max(120, Math.min(330, pos.x));
                };

                const end = (e) => {
                    if (!this.dragData) return;
                    const pos = getPos(e.changedTouches ? e.changedTouches[0] : e);
                    const dx = pos.x - this.dragData.startX;
                    const dy = pos.y - this.dragData.startY;
                    const dt = Date.now() - this.dragData.startTime;

                    if (dy < -40 && dt < 500) {
                        this.shoot(dx * 0.06, dy * 0.09);
                    }
                    this.dragData = null;
                };

                this.canvas.onmousedown = start;
                window.onmousemove = move;
                window.onmouseup = end;
                this.canvas.ontouchstart = (e) => { e.preventDefault(); start(e); };
                this.canvas.ontouchmove = (e) => { e.preventDefault(); move(e); };
                this.canvas.ontouchend = (e) => { e.preventDefault(); end(e); };
            }

            start() {
                this.state = 'aiming';
                this.frames = Array.from({length: 10}, () => ({ rolls: [], cumulative: null }));
                this.currentFrame = 0;
                this.renderScoreboard();
                document.getElementById('overlay').style.display = 'none';
                this.resetBall();
                this.resetPins();
            }

            resetPins() {
                this.pins = [];
                const rows = 4;
                const startY = 100;
                const spacingX = 30;
                const spacingY = 32;
                for (let r = 0; r < rows; r++) {
                    const pinsInRow = r + 1;
                    const rowStartX = 225 - ((pinsInRow - 1) * spacingX) / 2;
                    for (let i = 0; i < pinsInRow; i++) {
                        this.pins.push({ 
                            x: rowStartX + i * spacingX, 
                            y: startY + (rows - r) * spacingY, 
                            vx: 0, vy: 0, 
                            angle: 0, down: false, visible: true 
                        });
                    }
                }
            }

            resetBall() {
                this.ball.active = false;
                this.ball.x = 225;
                this.ball.y = 620;
                this.ball.vx = 0; this.ball.vy = 0;
            }

            shoot(vx, vy) {
                this.state = 'rolling';
                this.ball.vx = vx;
                this.ball.vy = vy;
                this.ball.active = true;
                document.getElementById('hint-text').style.opacity = 0;
            }

            update() {
                if (this.state === 'rolling') {
                    this.ball.x += this.ball.vx;
                    this.ball.y += this.ball.vy;
                    this.ball.vx *= 0.996;

                    this.pins.forEach(p => {
                        if (p.visible && !p.down && Math.hypot(p.x - this.ball.x, p.y - this.ball.y) < 28) {
                            p.down = true;
                            p.vx = (p.x - this.ball.x) * 0.6;
                            p.vy = (p.y - this.ball.y) * 0.6;
                        }
                    });

                    if (this.ball.y < 50 || Math.abs(this.ball.x - 225) > 150) {
                        this.state = 'calculating';
                        setTimeout(() => this.triggerSweep(), 1200);
                    }
                }

                if (this.sweeping) {
                    this.sweeperY += 8;
                    this.pins.forEach(p => {
                        if(p.down && p.y < this.sweeperY) p.visible = false;
                    });
                    if (this.sweeperY > 750) {
                        this.sweeping = false;
                        this.finishRoll();
                    }
                }

                this.pins.forEach(p => {
                    if (p.down && p.visible) {
                        p.x += p.vx; p.y += p.vy;
                        p.vx *= 0.92; p.vy *= 0.92;
                        p.angle += 0.15;
                    }
                });
            }

            triggerSweep() {
                this.sweeping = true;
                this.sweeperY = 0;
            }

            finishRoll() {
                const knockedThisRoll = this.pins.filter(p => p.down && p.visible).length; // BUG FIX: Use count of newly downed
                // Actually simpler: count how many are downed total and subtract previous roll if exists
                const totalKnocked = this.pins.filter(p => p.down).length;
                const frame = this.frames[this.currentFrame];
                const rollScore = totalKnocked - (frame.rolls[0] || 0);
                frame.rolls.push(rollScore);

                const isStrike = frame.rolls[0] === 10;
                const isSpare = frame.rolls.length === 2 && (frame.rolls[0] + frame.rolls[1] === 10);
                const frameFinished = isStrike || frame.rolls.length === 2;

                if (frameFinished) {
                    this.currentFrame++;
                    this.calculateBowlingScore();
                    if (this.currentFrame >= 10) {
                        this.endGame();
                    } else {
                        this.resetPins();
                        this.resetBall();
                        this.state = 'aiming';
                    }
                } else {
                    // SECOND ROLL - CLEAN FALLEN PINS
                    this.pins.forEach(p => { if(p.down) p.visible = false; });
                    this.resetBall();
                    this.state = 'aiming';
                }
                this.renderScoreboard();
                document.getElementById('hint-text').style.opacity = 0.4;
            }

            calculateBowlingScore() {
                let total = 0;
                for (let i = 0; i < 10; i++) {
                    const f = this.frames[i];
                    if (!f || f.rolls.length === 0) break;
                    let fScore = f.rolls.reduce((a,b) => a+b, 0);
                    if (f.rolls[0] === 10) { 
                        const next1 = this.frames[i+1]?.rolls[0] || 0;
                        const next2 = this.frames[i+1]?.rolls[1] ?? this.frames[i+2]?.rolls[0] ?? 0;
                        fScore += next1 + next2;
                    } else if (fScore === 10 && f.rolls.length === 2) { 
                        fScore += this.frames[i+1]?.rolls[0] || 0;
                    }
                    total += fScore;
                    f.cumulative = total;
                }
            }

            renderScoreboard() {
                const sb = document.getElementById('scoreboard');
                sb.innerHTML = this.frames.map((f, i) => `
                    <div class="frame ${i === this.currentFrame ? 'active' : ''}">
                        <div class="rolls">
                            <div class="roll">${f.rolls[0] === 10 ? 'X' : (f.rolls[0] ?? '')}</div>
                            <div class="roll">${(f.rolls[0] + f.rolls[1] === 10 && f.rolls.length === 2) ? '/' : (f.rolls[1] ?? '')}</div>
                        </div>
                        <div class="frame-total">${f.cumulative ?? ''}</div>
                    </div>
                `).join('');
            }

            endGame() {
                this.state = 'over';
                const total = this.frames[9].cumulative || 0;
                document.getElementById('overlay').style.display = 'flex';
                document.getElementById('final-stats').textContent = `FINAL SCORE: ${total}`;
            }

            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.width, this.height);

                // Lane (3D Perspective)
                ctx.fillStyle = '#1e293b'; ctx.fillRect(0, 0, this.width, this.height);
                ctx.fillStyle = '#eab308';
                ctx.beginPath();
                ctx.moveTo(140, 50); ctx.lineTo(310, 50);
                ctx.lineTo(420, 700); ctx.lineTo(30, 700);
                ctx.fill();

                // Pins
                this.pins.forEach(p => {
                    if(!p.visible) return;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle);
                    const scale = 0.6 + (p.y / 700) * 0.6;
                    ctx.scale(scale, scale);
                    
                    // High Quality Pin
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.moveTo(0, -18);
                    ctx.bezierCurveTo(8, -18, 8, -8, 5, -4);
                    ctx.bezierCurveTo(10, 0, 10, 15, 0, 15);
                    ctx.bezierCurveTo(-10, 15, -10, 0, -5, -4);
                    ctx.bezierCurveTo(-8, -8, -8, -18, 0, -18);
                    ctx.fill();
                    
                    // Red Stripes
                    ctx.fillStyle = '#ef4444';
                    ctx.fillRect(-6, -12, 12, 2);
                    ctx.fillRect(-7, -9, 14, 2);
                    
                    ctx.restore();
                });

                // Sweeper Bar
                if(this.sweeping) {
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.fillRect(0, this.sweeperY - 10, this.width, 20);
                    ctx.fillStyle = '#94a3b8';
                    ctx.fillRect(0, this.sweeperY - 4, this.width, 8);
                }

                // Foul Line
                ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 6;
                ctx.beginPath(); ctx.moveTo(50, 620); ctx.lineTo(400, 620); ctx.stroke();

                // BOWLER SPRITE
                if (this.state === 'aiming') {
                    ctx.save();
                    ctx.translate(this.ball.x, 680);
                    ctx.font = '80px Arial'; ctx.textAlign = 'center';
                    ctx.fillText('👤', 0, 0);
                    ctx.restore();
                }

                // Ball
                if (this.state !== 'menu') {
                    ctx.save();
                    const scale = 0.5 + (this.ball.y / 700) * 0.7;
                    ctx.translate(this.ball.x, this.ball.y);
                    ctx.scale(scale, scale);
                    
                    ctx.shadowBlur = 15; ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.fillStyle = '#334155';
                    ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI*2); ctx.fill();
                    
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI*2); ctx.stroke();
                    
                    // Finger Holes
                    ctx.fillStyle = '#000';
                    ctx.beginPath(); ctx.arc(-6, -6, 3, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(6, -6, 3, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(0, 6, 4, 0, Math.PI*2); ctx.fill();
                    ctx.restore();
                }

                // Aim Guide
                if (this.dragData) {
                    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                    ctx.setLineDash([8, 8]);
                    ctx.beginPath(); ctx.moveTo(this.ball.x, this.ball.y); ctx.lineTo(this.ball.x, 0); ctx.stroke();
                    ctx.setLineDash([]);
                }
            }

            loop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        }

        const game = new BowlingElite();
    </script>
</body>
</html>
